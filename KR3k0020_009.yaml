為政教之最十五曰詳錄典正辭理兼舉為文吏之最十六曰訪察精審弹舉必當為糾正之最十七曰明於勘覆稽失無隱為勾檢之最十八曰職事修理供奉强濟為監掌之最十九曰功課皆充丁匠無怨為役使之最二十曰耕耨以時收獲剰課為屯官之最二十一曰謹於盖藏明於出納為倉庫之最二十二曰推歩盈虛究理精宻為厯官之最二十三曰占候醫卜效驗居多為方術之最二十四曰譏察有方行旅無壅為關津之最二十五曰市廛不擾奸盗不行為市司之最二十六曰牧養肥碩蕃息孶多為牧官之最二十七曰邊境肅清城隍修理為鎮防之最一最以上有四善為上上一最以上有三善或無最而有四善為上中一最以上有二善或無最而有三善為上下一最以上有一善或無最而有二善為中上一最以上或無最而有一善為中中職事粗理善最弗聞為中下愛憎任情處斷乖理為下上背公向私職務廢闕為下中居官諂詐貪濁有狀為下下若於善最之外别有嘉尚及罪雖成殿情狀可矜雖不成殿而情狀可責者省校之日皆聴考官臨時量定百司量其閒劇諸州據其上下進考之人皆有定限茍無其功不要充數功過於限亦聽量進其流外官本司量其行能功過立四等考第而勉進之凡親勲翊衛皆有考第考第之中畧有三等諸衛主帥如三衛之考其監門校尉直長如帥之考其諡議之法古之通典皆審其事以為不刋國朝官品令尚書諸司郎中從六品懷印赴行在代宗幸陜考功郎中裴諝步懷考功及南曹二印赴行在上見而謂之曰疾風知勁草果信之矣員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令尚書諸司員外郎正七品掌貢舉唐武德令考功郎中監試貢舉人貞觀以来乃員外郎專掌貢舉省郎之殊者至開元移貢舉於禮部事具禮部侍郎門知舉黜浮艶貞觀中考功員外郎王師旦知舉時以冀州進士張昌齡王公瑾並有俊才聲振京邑而師旦考其文䇿全下舉朝不知所以及奏等第太宗怪無昌齡等名因召師旦問之對曰此軰誠有詞華然其體性輕薄文章浮艶必不成令器臣若擢之恐後生相效有變陛下風雅帝以為名言後並如其言多得俊才堪掌綸誥孫逖為考功員外郎集賢院修撰逖選貢士二年多得俊才初年杜鴻漸至宰相顔真卿為尚書後年㧞李華蕭頴士趙驛登上第逖謂人曰此三人堪掌論誥詩人宋之問弱冠知名尤善於五言詩當時無能出其右者景龍中為考功員外郎時中宗増置修文館學士擇朝中文學士之問與薛稷等首膺其選當時榮之考簿絶姦吏之弊王徽字昭文轉考功員外郎時考簿上中下字朱書吏緣為姦多有揩改徽白僕射請以墨書遂絶姦吏之弊典舉平允嚴挺之開元中為考功員外郎典舉二年大稱平允登科者頓减二分之一遷考功郎中又令知考功貢舉典舉得士席豫開元中累官主考功員外郎典舉二年大稱得士為時所稱三遷中書舍人皆有能名為鄭州刺史入為吏部侍郎𤣥宗謂之曰卿以前為考功職事平允故有此授預典選六年復有令譽條責廉吏鄭澣為考功員外郎刺史有驅廹人吏上言政績請刋石記政者澣探得其情條責亷吏巧迹遂露人服其敏識願公無權周墀輔政以韋澳為考功員外郎墀初作相私謂澳曰才小任重何以相救澳曰荷公重知願公無權足矣墀愕然不喻其㫖澳曰爵賞刑罰非公共欲行者願不以喜怒憎愛行之但令百司羣官各舉其職則公斂祍於廟堂之上天下自理何要權耶墀深然之崔郎儀貌不惡李迥秀任考功員外郎知貢舉有進士姓崔者文筆非佳迥秀覽之良久謂曰清河崔郎儀貌不惡鬚眉如㦸精彩甚高出身何處量必須進士再三喻而遣之聞者莫不大噱為考䇿官賈餗字子美登制䇿甲科文史兼美四選至考功員外郎長慶初䇿召賢良選當時名士考䇿餗與白居易俱為考䇿官選文人以為公不避權幸皆行陞黜李渤穆宗即位召為考功員外郎校定京官考不避權幸皆行陞黜奏曰三品考官先具如前其四品以下官績具聞奏狀入留中不下議者以宰輔曠官自宜上䟽論列而越職釣竒非盡事君之道也户部尚書前漢百官志成帝置尚書五人其三曰民曹主人吏上尚書事南齊百官志度支尚書領度攴金部倉部起部四曹隋百官志後齊尚書分綂列曹度支綂度支左户右户隋度支尚書綂度支户部侍郎各二人又三年改度支尚書為户部尚書唐職官志户部尚書一員正三品隋為民部尚書貞觀十三年復户部顯慶元年改度支龍朔二年改司元太常伯光部宅元年改地官尚書神龍復為户侍郎二人正四品下自隋以來改易名位並皆從尚書掌天下田户均輸錢穀之政令其屬有四一曰户部二曰度支三曰金部四曰倉部總其職務而行其制命凡中外百司之事由於所屬皆質正焉六典户部尚書一人正三品周之地官卿也後漢以民曹兼主繕脩功作當工官之任魏置左民尚書晋初省之太康中又置惠帝時有右民尚書東晉及宋齊並置左民尚書梁陳置左户尚書並掌户籍知工官之事後魏北齊有度支尚書亦左民右户之任後周依周官置地官府大司徒卿隋初曰度支開皇三年改為民部皇朝因之貞觀二十三年改户部餘同唐職官志侍郎二人正四品下周之地官小司徒中大夫也漢以來尚書侍郎今郎中之任後周依周官隋煬帝置民部侍郎唐見前尚書侍郎掌天下户口井田之政令凡徭賦職貢之方經費賙給之算藏貨贏儲之准悉以咨之餘同唐職官志國朝户部左曹掌天下諸路州縣户口農田貢賦税祖之政令及孝義婚姻繼嗣良賤田務劵債酒麴園宅凡課入之事右曹掌常平免役之政令坊場河渡水利伍保没官田産義倉賑濟公使之事並皆𨽻焉官品令户部尚書從二品階下讀奏吳志孫休初即位户部尚書階下讀奏得司馬懿二人復何憂晉書初魏文帝置度攴尚書專掌軍國支計朝議以征討未息動須節量及明帝嗣位欲用安平王孚問左右曰有兄風否答曰似兄帝曰吾得司馬懿二人復何憂轉度支尚書内以利人外以救邊杜元凱為度支尚書内以利人外以救邊備物致用以濟當時之益者五十餘條以竹蓬為屏風坐無毡席呉隱之為度支尚書以竹蓬為屏風坐無毡席後遷中領軍清儉不改毎月所得祿才留身糧餘悉分賑親族家人績紡以供朝夕時有困絶或并日而食身布衣不完妻子不沾寸祿一年不收使公私俱貴普起居注咸寧五年詔一年不收使公私俱貴不惟天時乃人事有不盡故也要總者正在度支尚書也其以散騎常侍中書令張華為度支尚書年糧計較一由之朱鳯晉書文帝立度攴尚書年糧計較一由之以司馬孚為之所莅以清白自修梁書到溉為左民尚書溉身長八尺美風儀善容止所莅以清白自修性又率儉不好聲色虚室單牀旁無姬侍自奉衣服不事鮮華冠履十年一易朝服或至穿補傳呼清道示有朝章而已給白衣尚書掾何𦙍字子季為左民尚書後辭官隱於若耶山雲門寺詔給白衣尚書祿道固辭中丞入省到洽為御史中丞兄溉為左民尚書舊中丞不得入尚書下舍洽引服親不應有碍刺省評决乃許入溉省亦以其兄弟素篤不能相别也夏月著犢鼻裩周如正為左民尚書夏月著犢鼻裩衣朱衣其放逸如此置棺㕔事後魏書陽平王子匡除度支尚書匡與尚書令高肇不平常無降下之色時世宗委政於肇朝廷傾憚惟匡與肇抗衡先自造棺置於㕔意欲詣闕論肇罪惡義倉隋書長孫平開皇三年為度支尚書平見天下州縣多罹水旱百姓不給奏令民間每秋家出榖麥一石以下貧富為差等儲之閭里以備㓙年名曰義倉好鬚唐書太宗幸翠㣲宫授司農卿李緯民部尚書房𤣥齡時在京城留守㑹有自京師來者太宗問曰𤣥齡聞李緯拜尚書如何對曰𤣥齡但云李緯好鬚更無他語太宗遽改授緯潞州刺史其為當時准的如此㓙官畢搆遷户部尚書開元四年遇疾上手䟽方以賜之時議户部尚書為㓙官遽改授太子詹事兾有瘉瘳尋卒正身奉法鄭善果檢校大理卿兼民部尚書正身奉法甚有善績制與裴寂等十人毎奏事及侍立並令升殿與從兄元濤在其數時以為榮拜官不俟時見列曹尚書門侍郎隋百官志唐職官志六典並見尚書門國朝官品令户部侍郎從三品不進户部錢以結私恩唐李綘為户部侍郎判本司事嘗因次對憲宗問曰户部比有進獻至卿獨無何也絳曰將户部錢進入内藏是用官物以結私恩上聳然益嘉其直伏獵侍郎嚴挺之為尚書右丞時宰相李林甫以蕭炅為户部侍郎常與挺之同行慶弔客次有禮記炅讀之曰烝嘗伏獵炅早從官無學術不識伏臘之意誤讀之挺之戯問炅對如初挺之白張九齡曰省中豈有伏獵侍郎耶由是出為岐州刺史林甫深恨之叙歴代户口盧承慶為民部侍郎太宗嘗問一代户口多少之數承慶叙夏以後至周隋皆有依據太宗嗟賞久之送物不受牛僧孺拜户部侍郎初韓𢎞入朝以宣武舊事人多流言者班列之中悉受其遺俄而父子俱卒孤㓜小穆宗恐為厮養竊盗乃命中使至其家閱其宅簿以付家老簿上其納賂之所唯於僧孺官側朱書曰某月日送牛侍郎物若干不受却付訖穆宗甚悦之居無何議命相帝首可僧孺之名精擇李元紘歴工兵吏三侍郎上令宰臣及公卿以下精擇堪為户部者多有薦李元紘者將授以户部尚書執政以其資淺未宜超㧞乃拜户部侍郎元紘因條奏人間利害及時政得失以奏之上大悅因賜衣一副偶承恩渥盛于一時韋表徵遷中書舍人俄拜户部侍郎職如故時自長慶寳厯國家比有變故凡在翰林遷擢例無滿歲由是表徵自監察六七年間秩正二卿偶承恩渥盛于一時貨泉之柄素非所長王彦威開元六年召拜户部侍郎尋判度支彦威儒學雖優亦勤吏事然貨泉之柄素非所長㑹邊軍上訴衣賜不時兼之朽敗宰臣惡其所為令攝度支人吏付臺推訊彦威畧不介懷入司視事及人吏受罰左授衛尉卿停務方還私第左户孟簡由工部侍郎進户部加御史中丞户部有二員别使授者居别一署謂之左户元和後選委華重宰相多由此進崔羣既相而簡代之年未四十潘孟陽為户部侍郎年未四十其母謂曰以爾之才而位丞郎使吾憂之自稱老奴無大臣之體張平叔長慶中為户部侍郎狡險大言因王播以進既掌財用常屈公利以便私嬖倖多狎之既有寵於上進退便僻雜以優諧或自稱老奴復無大臣之體嘗奏事畢降階復升又有論奏佻盪輕脫上毎為笑容之在班列間玩狎郎吏譁肆無忌精鹽法請宰相為之使因以自求樞機之任毎有内制出入輙疑授已整衣冠以俟後人多笑之請糶兩川祿米以救貧人庾敬休為户部侍郎奏兩川米價騰踴百姓流亡請糶兩川闕官職田祿米以救貧乏之徒郎中隋百官志後齊吏部三公各二人餘各一人隋度攴尚書綂度支户部侍郎各二人煬帝即位諸曹侍郎並改為郎又改户部為人部唐職官志户部郎中二員並五品上員外郎二員從六品上郎中員外郎自隋以來隨曹改易掌分理户口井田之事六典郎中二人從五品上周官司徒屬官有下大夫盖郎中之任也漢尚書郎一人主户口墾田魏有左民郎曹晉兼置右民郎曹東晉及宋齊唯有民部曹梁陳為左户郎後魏為左户曹郎北齊有左民郎曹隋初民部曹置侍郎二人煬帝除侍字皇朝為郎中顯觀二十三年改户部顯慶為度支龍朔為司元大夫咸亨光宅神龍並隨曹改復員外郎二人從六品上周官司徒屬官有上士後周依焉盖今員外之任隋開皇置民部員外郎煬帝改民曹承務郎皇朝改民部員外郎貞觀顯慶咸亨龍朔光宅神龍並隨曹改復郎中員外郎掌領天下州縣户口之事凡天下十道任土所出而為貢賦之差分十道以總之一曰關内二曰河南三曰河東四曰河北五曰山南六曰隴右七曰淮南八曰江南九曰劔南十曰嶺南凡天下之州府三百一十有五而羈縻之州盖八百焉京兆河南太原為三都潞揚益荆幽為大都督府單于安西安北為大都䕶府安南安東此庭為上都䕶府凉秦靈延代兖梁安越洪潭桂廣戎福為中都督府夏原慶豐勝營松洮鄯西雅瀘茂嶲姚䕫黔辰容邕為下都督府同華岐蒲為四輔州陜懷鄭汴魏絳為六雄州虢汝汾晉宋許滑衛相洺為十望州安東平營檀媯蔚朔忻安北單于代嵐雲勝豐鹽靈會凉肅甘𤓰沙伊西北庭安西河蘭鄯廓叠洮岷扶柘維靜悉翼松當戎茂嶲姚播黔驩容為邊州四萬户以上為上州二萬户以上為中州不滿為下州凡三都之縣在城内曰京縣城外曰畿縣又望縣八十有五其餘則六千户以上為上縣二千户以上為中縣一千户以上為中下縣不滿一千户皆為下縣凡天下之户百户為里五里為鄉兩京及州縣之郭内分為坊郊外為村里及村坊皆有正以司督察四家為鄰五家為保保有長以相禁約凡男女始生為黃四歲為小十六為中二十有一為丁六十為老毎一嵗一造計帳三嵗一造户籍縣以籍成于州州成于省户部總而領焉凡天下之户量其資産定為九等毎定户以仲年造籍以季年凡賦役之制有四一曰租二曰調三曰役四曰雜徭課户毎丁租粟二石其調隨鄉土所産綾絹絁各二丈布加五分之一輸綾絹絁者綿三兩布者麻三斤皆書印焉几丁歲役二旬無事則收其庸毎日三尺有事而加役者旬有五日免其調三旬則租調皆免國朝官品令尚書諸司郎中從六品讀判數遍詞理愜當隋書高搆徵拜比部郎尋轉民部時有叔姪爭嫡尚書省不能斷朝臣之議不决搆斷而合理上以為能召入内殿勞之曰我聞尚書郎上應列宿觀卿才識方之古人之言信矣嫡庶者禮教之所重我讀卿判數遍詞理愜當意所不能及也賜米百石由是知名分判度支案唐建中三年户部侍郎判度支杜佑奏天實以前户部事繁所有郎中員外各二人判署自兵興以來户部事簡度支事繁唯郎中員外各一人請回輟郎中員外各一人分判度支案待天下兵革息却歸本貫奉勑依詩名盧綸為户部郎中有詩名於貞元中與李端司空曙之徒名為十才子形於圖畫以美其名論事有風采武儒衡累遷户部郎時皇甫鎛以宰相領度攴剥下以媚上無敢言其罪者儒衡上䟽論列鎛宻訴其事帝曰勿以儒衡上䟽卿將報怨耶鎛不復敢言儒衡氣岸高雅論事有風采羣邪尤惡之書樓張家淳化二年户部郎中張郁卒郁父正仕至户部侍郎世尚儒學號書楼張家土山頭晉宋以還尚書省置員外郎分判曹事唐朝稱重其選舊制郎中不歴員外選謂之土山頭景龍中趙謙光自彭州司馬入為大理正遷户部郎中賀渉為員外乃戯詠之曰員外從來美郎中望不優誰言粉署裏翻作土山頭謙光酬之曰錦帳隨時設金爐任意薫唯慙員外置不應列星文員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令尚書諸司員外郎正七品二妙唐韋虚心自大理丞累至户部郎中善於剖判時員外郎宋之問工詩時人以為户部二妙聞其理行裴向字傃仁為京兆府户曹轉櫟陽渭南縣令奏課皆第一朝廷亟聞其理行擢為户部員外郎省中賞其俊㧞唐新語呂太一為户部員外郎吏部移牒户部令墻宇悉䜿棘以防令交通太一報牒曰眷彼吏部銓綜之司當須簡要清通何必豎籬揷棘省中賞其俊㧞不應列星文見郎中門度支郎中隋百官志後齊尚書分綂列曹度支綂度支左户右户吏部三公郎中各二人餘並一人隋煬帝改諸曹侍郎為郎唐職官志度支郎中一員從五品上龍朔改為司度大夫咸亨復員外郎一人從六品上掌判天下租賦多少之數物産豐約之冝水路道塗之利毎嵗計其所出而支其所用凡物之精與地之近者以供御物之固與地之遠者以供軍皆料其遠近時月衆寡好惡而節用之六典度攴郎中一人從五品上漢有度支侍郎即郎中之任也歴魏晉宋齊後魏北齊並有度支郎中梁陳隋為侍郎煬帝但曰郎自漢魏以來皆度支尚書領度支郎開皇三年改度支尚書為民部尚書始民部領之皇朝因之武德三年加中字員外郎一人從六品隋開皇六年置煬帝改曰承務郎皇朝為員外郎掌同唐職官志國朝掌度支軍國之用及上供科買俸祿賞賜雜給之事而會其出入以周知内外物産豐約及其經費之數官品令尚書諸司郎中從六品判入唐故事度支案郎中判入員外郎判出侍郎總綂押案而已理寃張仲方少朗秀為兒童時父友高郢見而竒之曰此子非常必為國器後為金州刺史郡人有田産為中人所奪仲方三疏奏聞竟理其寃入為度支郎中奏數千言手不執本崔仁師為度支郎中嘗奏度支財物數千言手不執本太宗怪之令黃門侍郎杜正倫齎本與仁師對唱一無差殊太宗夫竒之副知自蘇弁始蘇弁授度支郎中副知度支事仍命列於正郎之首有副知之名自蘇弁始也責坊州貢杜若筆談唐貞觀中勑下度支求杜若省郎以謝朓詩云芳州採杜若乃責坊州貢之當時以為嗤笑至如唐故事中書省中植紫薇花何異坊州貢杜若然歴世循之不以為非至今舍人院紫㣲閣前植紫薇花用唐故事也員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令諸司員外正七品判出見郎中門教漢隂令獻糗餌唐張濬為度支員外郎黄巢將逼關輔濬記病請告侍其母挈族避亂商州賊犯京師僖宗出幸途無供頓衛軍不得食漢隂令李康獻糗餌數百餘騾綱軍士始得食僖宗異之召康問曰卿為縣令安操心及此對曰臣為塵吏安敢有此進獻張濬員外教臣也帝異之金部郎中晉職官志魏尚書郎有金部隋百官志梁置金部等郎齊尚書分綂列曹度支綂金部隋度支尚書綂金部侍郎一人煬帝即位改為郎唐職官志金部郎中一員從五品上龍朔為司珍大夫咸亨復員外郎一員從六品上掌判天下庫藏錢帛出納之事頒其節制而司其簿領六典金部郎中一人從五品上漢置尚書郎四人其一人主財帛委輸蓋金部郎曹之任也歴魏晉宋齊後魏北齊並有金部郎梁陳隋為侍郎煬帝但曰郎皇朝因之武德三年加中字天寶改司金員外郎一人從六品隋開皇六年置煬帝改承務郎皇朝為員外郎掌庫藏出納之節金寳財貨之用權衡度量之制皆總其文籍而頒其節制國朝掌財物出納之政令而平其難易頒權衡度量之法官品令尚書諸司郎中從六品無媿幽明隋盧昌衡為僕射祖孝徵所薦遷尚書金部郎孝徵毎曰吾用盧子均為尚書郎自謂無媿幽明矣委錢穀唐德宗建中初罷劉宴鹽鐡等使天下錢榖委金部倉部中書門下揀兩司郎官准格式調掌尋復置使員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令諸司員外正七品貪猥唐李石用金部員外郎韓益判度攴案益坐贓繫臺石奏曰臣以韓益曉錢穀錄用之不謂貪猥如此帝曰宰相知人善則用有過則懲卿所用人且不掩其惡可謂至公從前宰相用人有過曲為蔽之此大謬也倉部郎中晉職官志魏尚書郎有倉部隋百官志後齊尚書分綂列曹度支綂倉部隋度支尚書綂倉部侍郎一人唐職官志倉部郎中一員從五品上員外郎一人從六品上掌判天下倉儲受納税租出給祿廪之事國朝倉部掌國之倉塲儲積之政令及其出納之事官品令諸司郎中從六品六典倉部郎中一人從五品上周禮地官有廩人下大夫為舍人倉人司祿之長掌九穀之數賙賜稍食以周知其數蓋倉部之任也自魏晉宋齊後魏北齊並有倉部郎中梁陳為侍郎後周地官府有司倉下大夫一人隋初置倉部侍郎煬帝但曰郎宋齊梁陳後魏北齊並以度支尚書領倉部開皇三年改度支為民部領之皇朝因隋曰倉部郎武德三年加中字龍朔二年改司庾大夫咸亨復故員外郎一人從六品上後周地官府有小司倉上七一人則其任也隋開皇六年置煬帝曰承務郎皇朝復曰倉部員外郎龍朔咸亨隨曹改復掌國之倉庾受納租稅出給祿廪之事受之恬然畢諴字存之歴駕部員外郎倉部郎中故事勢門子弟鄙倉駕二部居之者不悅惟諴受之恬然恭遜口無異言執政多之改職方郎中兼侍御史知雜員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令諸司員外正七品中立正色挺然不附唐長慶中孟簡遷倉部員外郎屬順宗登極王叔文竊政驟為户部侍郎簡為其屬中立正色挺然不附叔文忌之而不敢退黜言於宰相韋執誼換刑部員外郎職官分紀卷九
