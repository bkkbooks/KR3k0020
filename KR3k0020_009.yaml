body:
  text: 職官分紀卷九宋孫逢吉撰列曹尚書周禮司㑹中大夫二人司會主天下之大計官之長若今之尚書漢書百官表成帝初置尚書員五人如淳曰主天子書主天下物皆曰尚書如主者曰尚書主者漢書百官志成帝初置尚書四人分為四曹漢舊儀曰初置五曹有三公曹主斷獄蔡質漢儀曰典天下歲盡集課事三公尚書二人典三公文書吏曹尚書典選舉齋祀屬三公曹靈帝末梁為選部尚書常侍曹尚書主公卿事蔡質漢儀曰主常侍黄門御史事世祖改曰吏曹二千石曹尚書主郡國二千石事漢舊儀曰主刺史蔡質漢儀曰掌中郎官水火盗賊辭訟罪眚民曹尚書主凡吏上書事漢舊儀曰典繕治功作監池苑囿盗賊事客曹尚書主外國夷狄事世祖承遵後分二千石曹又分客曹為南主客曹北主客曹漢舊儀曰天子出獵駕御府曹郎屬之凡六曹續漢書百官志尚書秩六百石漢官儀尚書唐虞官也書曰龍作納言詩云維仲山甫王之喉舌秦改稱尚書漢亦尊此官典機宻也漢官解詁士之權貴不過尚書又曰唐虞曰納言周官為内史機事所總號令攸發應劭漢官儀漢明帝詔尚書盖古之納言出納朕命㡬事不宻則害成可不慎與韋昭辨釋名尚上也言最在上總領之也辨云尚猶奉也百官言事當省案平處奏之故曰尚書尚食尚方亦然晉職官志按尚書本漢承秦置及武帝逰宴後庭始用宦者主中書以司馬遷為之中間遂罷其官以為中書之職至成帝建始四年罷中書官者又置尚書五人一人為僕射而四人分為四曹通掌圖書秘記章奏之事各有其任其一曰常侍曹主丞相御史公卿事其二曰二千石曹主刺史郡國事其三曰民曹主吏民上書事其四曰主客曹主外國夷狄事後成帝又置三公曹主斷獄是為五曹後漢光武以三公曹主歲盡考課諸州郡事改常侍曹為吏部曹主選舉祠祀事民曹主繕修功作監池園苑事客曹主䕶駕羌胡朝賀事二千石曹主詞訟事中都官曹主水火盗賊事合為六曹是時尚書雖有曹名不以為號靈帝以侍中梁鵠為選部尚書於是始見曹名及魏改選部為吏部主選部事又有左民客曹五兵度攴凡五曹及晉置吏部三公客曹駕部屯田度攴六曹而無五兵咸寧二年省駕部尚書四年省一僕射又置駕部尚書太康中有吏部殿中及五兵田曹度支左民為六曹尚書又無駕部三公客曹惠帝世又有右民尚書止於六曹不知此時省何曹也及渡江有吏部祠部五兵左民度支五尚書祠部尚書常與右僕射通職不恒置以右僕射攝之若右僕射闕則以祠部尚書攝知右事康帝起居注詔曰尚書萬事之本朕所責成也而廪秩儉薄甚非治體今雖軍國多費不為元凱惜禄其依令僕給尚書各親信五十人廩賜宋百官志尚書古官也秦世少府遣吏四人在殿中主發書故謂之尚書尚猶主也漢初有尚冠尚衣尚食尚浴尚席尚書謂之六尚戰國時已有尚冠尚衣之屬矣餘如晉志南齊百官志宋有吏部尚書領吏部删定三公比部四曹度支尚書領度支金部倉部起部四曹左民尚書領左民駕部二曹都官尚書領都官水部庫部功論四曹五兵尚書領中兵外兵二曹祠部尚書左僕射通職不俱置起部尚書興立宫廟權置事畢省齊職儀尚書六人品第三秩六百石進賢兩梁冠納言幘絳朝服佩水蒼玉執笏負荷後魏官志皇始二年三月分尚書三十六曹及諸外署凡置三百六十曹令大夫主之大夫各有屬官其有文簿當曹敷奏欲以省彈駮之煩十二月復尚書三十六曹曹置代人令史一人譯令史一人書令史一人天賜二年二月復罷三十六曹别置武歸脩勤二職武歸比郎中脩勤比令史分主省務始元元年正月置右民尚書神䴥元年置諸曹尚書十餘人各居别寺興安二年置駕部右士尚書隋百官志梁武時尚書省置吏部祠部度支左户都官五兵等六尚書又有起部尚書營宗廟宫室則權置事畢則省陳承梁尚書置五員後齊六尚書分綂列曹吏部綂吏部考功主爵殿中統殿中儀曹三公駕部祠部綂祠部主客虞曹屯田起部祠部無尚書則右㒒射攝之五兵綂左中兵左外兵右外兵都兵都兵綂都官二千石比部水部膳部度支綂度攴倉部左户右户金部庫部凡二十八曹吏部三公郎中各二人餘並一人凡三十郎中隋高祖時吏部尚書綂吏部侍郎二人主爵侍郎一人司勲侍郎二人考功侍郎一人禮部尚書綂禮部祠部侍郎各一人主客膳部侍郎各二人兵部尚書綂兵部職方侍郎各二人駕部庫部侍郎各一人都官尚書綂都官侍郎二人刑部比部侍郎各一人司門侍郎二人度支尚書綂度支户部侍郎各二人金部倉部侍郎各一人工部尚書綂工部屯田侍郎各二人虞部水部侍郎各一人凡三十六侍郎分司曹務直宿禁省如漢之制唐百官志龍朔二年改尚書為太常伯咸亨元年依舊居三公曹後漢陳忠拜尚書使居三公曹注成帝置三公曹尚書主知斷獄有詔罷朝謝承後漢書陳禁字子雅拜尚書公卿朝日晏無詔禁問臺上故事何時可罷對言已食輙有詔罷今已晏禁曰寧可白耶尚書郎以上方晏樂不敢白禁使罷公卿既罷上問左右今未有詔而朝罷何也尚書直對曰陳禁上曰勿復問也禁在臺二年嘗病令僕射敷奏久病滿百日請輙免有詔賜布帛醫藥敕虎賁奪劔張陵字處仲為尚書省嵗朝梁兾帶劒入省陵叱兾令出勅虎賁奪其劒兾跪謝陵劾之詔以歲俸贖罪百寮肅然兾弟不疑曾舉陵孝廉謂曰昔舉君所以自罰也陵曰明府不以陵不肖誤見擢叙今申公憲報私恩爾不疑有慙色試政事對第一翟酺字子廣為侍中時尚書有缺詔將軍大夫以上試對政事天文道術以第一者補之由是酺對第一拜尚書焉謇諤禁省魏朗字少英入為尚書冄升紫㣲謇諤禁省不屈豪右為百寮所服以黨事免朗性矜嚴閉門整法長吏希見動有禮序室家相待如賔子孫如事嚴君焉三月之間周歴三臺蔡邕以侍書侍御史遷尚書三月之間周歴三臺賜珠不拜鍾離意明帝徵為尚書時交趾太守坐贓穢伏法以資物簿入大司農詔賜羣臣意得珠璣悉以委地而不拜帝怪而問其故對曰臣開孔子忍渴於盗泉之水曾參回車於勝毋之邑惡其名也此贓穢之寶誠不敢拜帝笑曰清乎尚書之言乃賜庫錢三十萬秉機平正荀緄字伯絛拜尚書緄性明寛敏分於衆職以厲羣僚秉機平正直道而行是時内外公卿大夫莫不敬憚天子傾意百僚側目楊喬字聖逹拜尚書喬淵冲博雅談術文辯優納王事明習國家舊典故幹機宻之職夙夜周慎退食自公喬儀容偉麗毎朝賀天子傾意百僚側目桓帝重其才貌詔妻以公主喬固辭不受因閉口不食匕日而卒妻以公主固辭不受上習漢家舊事王傳字季習拜尚書明敏習漢家舊事在臺歴載夙夜敬戒内外不漏白衣尚書鄭均字仲虞遷尚書以病乞骸骨拜議郎章帝東廵幸均舍勅賜尚書禄以終身故時人號曰白衣尚書讜言正直朱穆為尚書讜言正直喉舌續漢書李固上䟽曰陛下有尚書猶天之北斗為天喉舌尚書陛下之喉舌典樞機華嶠後漢書韋彪上䟽曰欲急世所務當先除其患其源在尚書典樞機天下事一决之不可忽也呵虎賁張璠漢記朱穆黨事禁錮徴拜尚書正月百官朝賀畢虎賁當陛下置弓於地謂羣僚曰此天子弓誰敢干越百僚皆回避不敢當穆乃呵之天子弓當載之於盾首之上乃敢置地大不敬即收虎賁付詔獄治罪莫不肅然服其忠烈周宻重慎所薦輙手書草東觀漢記陳寵字昭公為尚書周宻重慎時所薦輙手書革人莫得而知典定舊制袁崧漢書伏湛字惠公拜尚書典定舊制壯其公亮魏志崔琰為尚書時太子未立臨菑侯植有才而愛太祖狐疑以函令宻訪於外唯琰露版荅曰盖春秋之義立子以長加五官將仁孝聰明冝承正綂琰以死守之太祖壯其公亮喟然嘆息制九品陳羣為尚書制九品為官人之法臺中三狗丁謐字彦靜曹爽宿與相親㧞為散騎常侍轉尚書在臺閣數有所彈劾勢屈於爽爽亦敬之時謗書謂臺中有三狗三狗崖柴不可當一狗慿㸃作疽囊三狗謂何鄧丁也㸃者爽小字也意言三狗皆欲嚙人而謐尤疽囊也不復重奏罷役孫禮為尚書明帝方脩宫室而節氣不和天下少穀禮固爭罷役詔曰敬納讜言促遣民作時李惠監作復奏留一日有所成訖禮徑至作所不復重奏稱罷役明帝竒其意而不責帝獵於大石山虎趨乗輿禮便投鞭下馬奮劒欲砍之詔令扶上馬下馬斫虎上清醇許劭字子將清醇有鑒識明帝時為尚書刀鐶撞殺呉志尚書熊睦見孫皓酷虐㣲有所諫皓使人以刀鐶撞殺之身無完肌杜武庫王隠晉書杜預為尚書損益萬㡬不可勝數朝野伏焉號曰杜武庫言其無所不有委以老成山濤轉尚書表辭年老詔曰方今多事嘉謀良圖委以老成以九錫非先王之制劉頒見九錫門一年不收公私俱貴晉起居注詔曰一年不收使公私俱貴不唯天時乃人事有不盡故也要揔者正在度支尚書也其以散騎常侍中書令張華為度支尚書八座之任非賢莫居晉中興書蔡謨為尚書上䟽曰八座之任非賢莫居前後選用名資有常孔愉諸葛恢並以清節令才少有名望昔愉為御史中丞臣尚未為司徒長史恢為㑹稽太守臣為尚書郎恢尹丹陽臣守小郡名軰不同階級殊懸今猥以輕鄙超踰等匹上亂聖朝貫魚之次下違羣臣凖平之論豈惟㣲臣其亡之誠實貽聖政維塵之累事無大小無不綜傅子曰嘏為尚書事無大小無不綜身清行修不能沉浮薛瑩集繆禕質直好義身清行修為尚書不能沉浮為小人所疾光輝紫機韋誕集太僕杜侯諫云入作納言光輝紫機誅起部以塞天災石虎鄴中記以五月發五百里内民萬人築華林苑垣在宫西周環數十里羣臣或諌虎不從到八月天暴雨雪深三尺作者凍死數十人太史奏作役非時天降此變虎誅起部尚書以塞天災閑練舊典益部耆舊傳太尉李固薦楊淮累世服事臺閣既閑練舊典且有幹用宜在機宻特拜尚書固薨免官尚書令陳蕃表行狀復徵為尚書雷尚書郭子王公有幸妾姓雷預政事納貨蔡公謂之雷尚書八尚書共選一尚書晉劉寔崇讓論曰尚書缺擇尚書所讓最多者用之此為八尚書共選一尚書詳於臨缺令主者選八尚書拜官不俟時南史蔡景歴拜度支尚書舊式拜官在日午後景歴拜日適逢輿駕幸𤣥武觀在位皆侍宴帝恐景歴不遇時令早拜其見重如此喜朝廷得人梁明少逰知名之士位都官尚書簡文帝謂人曰我不喜明少逰作尚書喜朝廷得人晚至免官陸景遷尚書殿中曹郎拜日八座丞郎並列上省交禮而景至晚不及時刻坐免官十升龍管張瓚故左民尚書中子沈増旻墓銘云十升龍管四至九卿居高首映比德明賞參十亂躬越五本丘遲為范尚書拜表禄止一守官窮九列臣獲照秋陽取沃淮海發蒙去吝已若松喬匪富伊榮須㬰至此賞參十亂躬越五本歴覽前載孰與為匹百官根本蕭子範為兄宗正讓都官尚書表五星懸耀差池案宫之曲百官根本聯曹建禮之内綂庶事魏應璩雜詩尚書綂庶事官人承法憲袁尚書朕之杜預後魏書肅宗靈太后曾醼於華林園舉觴謂羣臣曰袁尚書朕之杜預欲以杯敬屬元凱侍坐者莫不仰羡翻名位俱重當時勘録省中書隋書于仲文上以尚書文簿繁雜吏多奸計令仲文勘録省中事其所發擿甚多上嘉其明斷厚加勞賞妙有德望新唐書𤣥宗欲以牛仙客為尚書張九齡諫曰不可尚書古之納言有唐以來多用舊相居之不然歴踐内外清貫之地妙有德望者充之仙客本河湟一使典爾㧞升清流齒班常伯此官邪也吏部尚書後漢百官志尚書六人六百石本注曰成帝初置尚書四人分為四曹常侍曹尚書主公卿事二千石曹尚書主郡國二千石事民曹尚書主凡吏上書事客曹尚書主外國夷狄事後漢書光武改常侍曹為吏部曹主選舉齋祀事晉職官志後漢靈帝以侍中梁鵠為選部尚書於此始見曹名及魏改選部為吏部主選部事晉百官表志吏部尚書一人諸尚書品俸以上皆與令僕同宋百官志世祖大明二年置二吏部尚書後還置一吏部尚書南齊百官志吏部尚書領吏部刪定三公比部四曹隋百官志後齊尚書分綂列曹吏部綂吏部考功主爵隋吏部尚書統吏部侍郎二人主爵侍郎一人司勲侍郎二人考功侍郎一人唐職官志吏部尚書一員正三品龍朔二年改為司列太常伯光宅元年改為天官尚書神龍復舊侍郎二員正四品上隋大業三年尚書六曹各置侍郎一人以二尚書之職並正四品國家定令諸曹侍郎降為正四品下唯吏部侍郎為正四品上龍朔改為司列少常伯咸亨復總章元年吏部各增侍郎一人吏部尚書侍郎之職掌天下官吏選授勲封考課之政令其屬有四一曰吏部二曰司封三曰司勲四曰考功總其職務而行其制命六典吏部尚書一人正三品周之天官卿也後周依周官置大冢宰卿一人是也隋後曰吏部尚書晉令吏部尚書五時朝服納言幘進賢兩梁冠佩水蒼玉乗軺車皂輪袁子正書曰尚書佩契刀囊執板加簪筆自魏至梁並第三品梁秩加至中二千石後定十八班班多為貴吏部尚書班第十四諸曹尚書班第十三陳梁隋並正第三品皇朝因之掌文官選舉天寳十一載改文部後復侍郎二人正四品上周之天官小宰中大夫也漢以來尚書侍郎仐郎中之任後周依周官隋煬帝三年尚書六曹各置侍郎一人以尚書之職並正四品唐天寳十一載改文部後復總章元年加一員聖厯二年减一員尚書侍郎之職掌天下官吏選授勲封考課之政令凡職官銓綜之典封爵䇿勲之制權衡殿最之法悉以咨之其屬有四吏部司封司勲考功尚書侍郎總其職務而奉行其制命凡中外百司之事由於所屬皆質正焉凡選授之制每歲孟冬以三旬㑹其人去王城五百里之内集於上旬千里之内集於中旬千里之外集於下旬以三銓分其選一曰尚書銓二曰中銓三曰東銓以四事擇其良一曰身二曰言三曰書四曰判以三類觀其異一曰德行二曰才用三曰勞効德鈞以才才鈞以勞其優者擢而升之否則量以退焉所以正權衡明與奪抑貪冒進賢能也然後據其狀以覆之量其資以擬之五品以上以名聞送中書門下聴制授焉六品以下常參之官量資注定其才識頗高可擢為拾遺補闕監察御史者亦以名送中書門下聴勑授焉其餘則各量資注擬若都畿清望歴職三任經十考以上者得隔路授之謂監察御史左右拾遺大理評事畿縣丞簿尉經三任十考以上有隔品授者凡出身非清流者不注清資之官凡注官皆對靣唱示若官資未相當及以為非便者聴至三注三注下伏注至冬檢舊判注擬凡伎術之官皆本司銓注訖吏部承以附甲焉凡同司聯事及勾檢之官皆不得注大功以上親凡皇親及諸軍功廉注員外官其内外員外官及檢校試官本司長官量閒劇取資歴清正舊人分判曹事自外則不判若長官及别駕長史司馬等官則不在此例凡注官階卑而擬高則曰守階高而擬卑則曰行凡三銓注擬訖皆當銓團甲以過左右丞相若中銓東銓則亦先過尚書訖乃上門下省給事中讀黃門侍郎省侍郎審然後進甲以聞凡大選終於季春之月所以定九流之品格補萬方之缺政官人之道備焉國朝官品令吏部尚書正二品吏部尚書掌總左右選文武官選試擬注及遷授䕃叙之政令郎中員外郎參掌其事凡注官皆當選團甲過本省訖擬奏歎不如毛尚書魏志毛玠為吏部尚書時無敢好衣美食者魏武帝歎曰孤之法不如毛尚書作考課法盧毓字子家為吏部尚書文帝使毓自選代曰得如卿者乃可毓舉鄭冲帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫邕帝於是用邕前此諸葛誕鄭颺等馳名譽有四聰八逹之謂帝疾之時舉中書郎詔曰得其人與否在盧生爾選舉莫取有名名如畫地作餅不可啖也毓對曰名不足以致異人而可以得常士畏教慕善然後有名非所當疾也愚臣既不足以識異人又王者正以循名按常為職但當有以驗其後故古者敷奏以言明試以功今考績之法廢而以毁譽相進退故真偽混雜虛實相蒙帝納其言即詔作考課法先性行盧毓於人及選舉先性行而後言才黃門李豐常以問毓毓對曰才所以為善也大才成大善小才成小善今稱之有才而不能為善是才不可器也豐等服其言又牛𢎞取士先德行後文才用多稱職使天下人自治毛玠為東曹掾與崔琰並典選舉用皆清正之士雖於時有盛名而行不由本者終莫得進務以儉率人由是天下之士莫不以廉節自勵雖貴寵之臣輿服不敢過度太祖歎曰用人如此使天下人自治吾復何為㦲文帝為五官將親自詣玠屬所親眷玠荅曰老臣以能守職幸得免戾今所説人非遷次是以不敢奉命大軍還鄴議所并省玠請謁不行時人憚之咸欲省東曹乃共白曰舊西曹為上東曹為次冝省東曹太祖知其情令曰日出於東月盛於東凡人言方亦復先東何以省東曹遂省西曹東曹上典省外奏事魏畧明帝逰宴在内乃選女子知書可付信者遂得六人為女尚書使典省外奏事處當畫可舉選號為得才呉志李肅字偉恭善議論臧否得中甄竒録異薦述後進題目品藻曲有貫以此人服之擢為選曹尚書舉選號為得才用情愛憎不由公理暨鄷為選曹尚書欲區别賢愚彈射百寮皆貶高就下降損數等其居貪鄙志節汚卑者皆以為軍吏置營府以處之故怨憤多積競言鄷用私情愛憎不由公理鄷至自殺才照人物德服衆望薛綜為選部尚書固讓顧譚曰譚心精體宻貫道逹㣲才照人物德服衆望誠非愚臣所可越譚後遂代綜吏㓗於上俗移於下先賢行狀毛玠雅亮公正在官清恪其典選舉㧞真實斥華偽進遜行抑阿黨諸宰臣治民功績不著而私財豐足者皆免黜停廢乆不選用于時四海翕然莫不勵行至乃長吏還者垢靣羸衣常乗柴車軍吏入府朝服徒行吏㓗於上俗移於下民到于今稱之朝廷歸美天下稱平崔琰委授銓衡總齊清議十有餘年文武羣才多所明㧞朝廷歸美天下稱平甄㧞人物各為題目晉山濤為吏部尚書固辭以老疾久而攝職為左丞自裒所奏帝曰濤以病聞但不聴之爾使濤坐執銓衡則何必上下耶濤不獲已乃起視事濤居職選部十餘年毎一官缺輙啓擬數人詔旨有所向然後顯奏隨帝意所欲為先故帝之所改用或非舉首衆情不察以濤輕重任意或譛於帝而濤行之自若濤所奏甄拔人物各為題目時稱山公啓事山公啓事上户調門選王戎為左僕射領吏部戎以晉室方亂慕蘧伯玉之為人與時舒卷無謇諤之節自經典選未嘗進寒素退虚名但與時浮沉户調門選而已門無私謁崔洪清厲骨鯁不同於物為吏部尚書舉用甄明門無私謁制九格晉陽秋陳羣為吏部尚書制九格登用皆由於中正考之簿書然後授任周悄廉素晉起居注太康四年詔選曹銓管人才冝得忠恪寡欲抑華崇本者尚書朱整周悄廉素以道自居是其人也其以整為吏部尚書不受一錢於人王隱晉書鄧攸遷吏部尚書牧馬於家庭妻息食素不受一錢於人無功譽有遺美樂廣為吏部尚書所在無當時功譽然時有遺美後人所思論人必先引其長屈其所短不明而自顯人有訾過先盡容𢎞恕而後善惡自著値世多難清白自將交無内外任誠保真人莫見其除者是以能自全當世以此多之使天下無遺才嵇紹字延祖裴頠深器之曰使延祖為吏部尚書可使天下無遺才矣居銓衡當舉此軰人呉隱之與太常韓康伯鄰居康伯母殷浩之姊賢明婦人也每聞隱之哭聲輟飱投杼為之悲泣既而語康伯曰若居銓衡當舉此軰人及伯康為吏部尚書隱之遂階清級茍進之徒望風畏惮蔡克居選官茍進之徒望風畏惮初克未仕時河内山簡嘗與瑯琊王衍書曰蔡子凡今之正人衍以書示衆曰山子以一卒㧞人然未易可稱後衍聞克在選官曰山子正人之言驗於今矣定選例諸公讃李育為吏部尚書正身率職不撓故能行其所見遂定選例而著於令清實選舉盧預晉書盧欽僕射領吏部清實選舉稱為廉平蔡廓不能為徐干木書紙尾蔡廓為吏部尚書因傅隆問傅亮選事若悉以見付不論不然不能拜亮以語錄尚書徐羡之羡之曰黄門以下悉以委蔡自此以上冝共參同異廓曰我不能為徐干木書紙尾遂不拜干木羡之小字也選案錄尚書與吏部尚書連名故廓云紙尾將加榮祿毎先呵責王𢎞自領選將加榮祿於人者毎先呵責譴辱之然後施若美相眄接語欣歡者必無所諧人問其故荅曰王爵既加於人又相撫勞便成與主分功此所謂姦以事君者也求者絶官叙之分既無以為惠又不㣲借顔色即大成怨府亦鄙薄所不任問者悦伏餉饋盈門一無所受江湛為吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食常為上所召遇澣衣稱疾經日衣成然後赴朝饋白檀牽車庾仲文性好㓗為吏部尚書用少府卿劉道錫為廣州刺史道錫饋餉白檀牽車常自乗焉或以白帝文帝見問曰道錫餉卿小車裝餙甚麗有之乎仲文懼起謝留令史免官庾炳之為吏部尚書通貨賂吏部令史錢秦能弹琵琶主客令史周伯舉善歌詣炳之宅諮事因留尚書舊制令史諮事不得宿停外雖有八座命亦不許為所司奏免官事異意同少帝即位以蔡廓為吏部尚書不肯拜乃以王惠代之惠被召即拜未嘗接客人有與書求官者得輙聚置閣上及去職其封如初時論者以廓之不拜惠之即拜雖事異而意同白衣領職晉中興書周顗為吏部尚書以醉酒為有司所糾白衣領職天下無滯才世説王戎濬冲裴楷叔則二人總角詣鍾士季須臾去後客問鍾曰向二童是誰曰裴王客曰何如曰裴楷清通王戎簡要後二十年此二賢當為吏部尚書當爾時天下無滯才也人中作市井語林袁真為監軍范立平為吏部尚書范坐語袁曰卿此選選不失䕶軍袁曰立平卿何事人中作市井專選天下百官袁子魏家置吏部尚書專選天下百官夫用人君之所不以假人者也天下之任非能獨辦魏名臣奏羽林右監朱遺言天令下之任非吏部尚書所能獨辦長以下可專付吏部守以上八座舉著選曹箴置之左右李重集為吏部尚書其箴曰重忝曹銓管人流品厚薄清濁雖思祇慎莫知所寄著選曹箴置左右六代五人並有文集梁書光祿大夫謝莊子朏朏子瀹瀹子覧覧孫溫六代五人皆為吏部尚書並有文集無慙小選初謝朓告王敬則敬則女為朓妻常懷刀以投朓朓不敢相見及當拜吏部謙挹尤甚尚書范績嘲之曰卿才人無慙小選但恨不可刑于寡妻朓遂有慙色九流賔客不與交言蕭子顯風神洒落雍容閑雅簡通賔客頗負才氣掌選見九流賔客不與交言但舉扇一撝而已衣冠竊恨有舊者多被㧞擢何異為尚書主選舉其宿與之有舊者多被㧞擢門庭蕭索禇炫為吏部尚書居身清正非弔問不雜交逰論者以為美及在選部門庭蕭索賔客罕至出行左右常捧一黄紙帽箱風吹紙剥殆盡求官袖金禇彦回為吏部尚書有一人求官密於袖中將一餅金因求請問出金示之曰人無知者彦回曰自應得官無假此物若必見與不得不相啓此人大懼收金而去彦回叙其事而不言其姓名時人莫知園阿望幣釣嶼投竿齊丘遲侍中吏部尚書何府君誄曰園阿望幣釣嶼投竿金張之貴允茲七侍顔竣嗔而與人官謝莊笑而不與人官宋顔竣為吏部尚書留心選舉自强不息委任既隆奏無不可後謝莊代竣意多不行竣容貌嚴毅莊風姿甚羙賔客喧訴常歡笑荅之時人為之語曰顔竣嗔而與人官謝莊笑而不與人官借皷吹梁蔡徴拜吏部尚書啓後主借鼔吹荅曰軍樂有功乃授蔡徵不自量揆紊我朝章然其父景歴既有締搆之功冝且如啓拜訖進還三代居選部謝覧朏之弟瀹之子自祖至孫三代居選部時以為榮衣冠傾屬王太字仲通為都官尚書能接人士士皆願其居選官頃之為吏部尚書衣冠傾屬三為此職前代未有謝舉字言揚遷掌吏部舉祖莊於宋代再與選至舉又三為此職前代未有亞冡司任昉為范雲讓散騎常侍吏部尚書表云去歲冬初國學之老博士爾今茲首夏將亞冡司千秋之一嵗九遷荀爽之十旬遠至方之㣲臣未為速達漢左雄晉山濤沈約為禇炫讓吏部尚書表東西兩漢左雄孤絶於前南北二晉山濤莫嗣於後良由性藏於貌才隱於心楚越無以况其迥殊山川未足方其阻險雖復拂暗為明免過生智亦何以登竒收異離渭分涇漢革民曹魏仍東掾張纉讓吏部尚書表曰漢革民曹魏仍東掾毛孝先以清公見羙盧子家以正固任職降及晉代希覩其人樂彦輔雍容自守當時恨其寡謇山巨源意存賞㧞不免與世沉浮鄧攸之牧馬家庭何益心競之操卞靈如金丸在冶未聞簡在之功天下稱能時人歸德王筠為第六叔讓吏部尚書表臣聞剸犀截兕必俟昆吾之鋒逐日追風信資伯樂之駿自非伯豪之天下稱能仲子之時人歸德孝先之㧞真抑偽巨源之黜惡舉善然後可以銓鏡流品平均衡石也擬魏之崔毛崔鴻十六國春秋錄記永寧伯郭撫初為吏部尚書與郎姚範清心虛永搜揚俊乂内外稱之以擬魏之崔毛通署三十六曹後魏崔𤣥伯遷吏部尚書命有司制官爵選朝儀恊音樂定律令申科禁𤣥伯總而裁之以為永式及置八部大夫擬八座𤣥伯通置三十曹如令僕綂事停年格崔亮為吏部尚書時羽林新害張彛之後靈太后令武官得依資入選官員既少應選者多前尚書李韶循常擢人百日姓大為嗟怨亮乃奏為格制不問士之賢愚專以停解月為斷雖復官湏此人停日後者終不得庸才下品年月久者灼然先用沈滯者稱其能亮外甥司空諮議劉宴遺書規亮曰殷周以鄉塾貢士兩漢由州郡薦才魏晉因循又置中正諦觀在昔莫不審舉雖未盡美足應十收六七而朝廷貢才止求其文不取其理察孝亷惟論章句不及治道立中正不考人才行業空辨氏姓高下至於取士之途不博沙汰之理未精而舅屬當銓衡宜湏改章易調如何反為停年格以限之天下士子誰復修厲名節哉亮荅書曰汝所言乃有深致吾乗時徼幸得為吏部尚書當其壯也尚不如人况今朽老而居帝難之任常思同升舉直以報明主之恩盡心竭力不為貽厥之累昨為此格有由而然今已為汝所怪千載之後誰知我哉可靜念吾言當為汝論之吾兼正六為吏部郎三為尚書銓衡所宜頗知之矣但古今不同時宜須異何者昔有中正品其才第上之尚書尚書據狀量人授職此乃天下羣賢共爵人也吾謂當爾之時無遺才無濫舉矣而汝猶云十收六七况今日之選專歸尚書以一人之鑒照察天下劉毅所云一吏部兩郎中而欲究鏡人物何異以管窺天求其博哉今勲人甚多又羽林入選武夫崛起不觧書計唯可彍弩前驅指蹤捕噬而已忽令垂組乗軒求其烹鮮之効猶未操刀而使專割文武人至多官員至少不可周溥設令十人共一官猶無官可授况一人望一官何由可不怨哉吾近靣執不宜使武人入選請賜其爵厚其祿既不見從是以權立此格限以停年爾昔子産鑄刑書以救弊叔向譏之以正法何異汝以古禮難權宜㦲仲尼云知我者春秋罪我者亦春秋吾之此旨其猶是也但令當來君子知吾意焉徘徊久之然後下筆郭祚為吏部持身㓗清重惜官位至於銓授假令得人必徘徊久之然後下筆即云此人便已貴矣由是頗勞滯當時每招怨言然所用者皆量才稱職時人以此歸之亢毅不撓元順為吏部尚書時三公曹令史朱暉素事錄尚書事高陽王雍欲以為廷尉評頻煩託順順不為用雍遂下命用之順投之於地雍聞之大怒昧爽坐都㕔召尚書及丞郎畢集欲待順至於衆挫之順日高方至雍攘袂撫几而言曰身天子之子天子之弟天子之叔天子之相四海之内親尊莫二元順何人以身成命投棄於地順鬚眉俱張仰靣看屋憤氣奔湧長歎而不言久之揺白羽扇徐而謂雍曰高祖遷宅中土剏定九流官方清濁軌儀萬古而朱暉小人身為省吏何合為廷尉官殿下既先皇同氣誠冝遵㫖自有恒規而復踰之雍曰身為丞相尚書如何不得用一人為官順曰庖人雖不理庖尸祝不越樽爼而代之未聞有别㫖令殿下參選事順又厲聲曰殿下必如是順當依事奏聞雍遂笑而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之亢毅不撓皆此類也授官有定價元修義遷吏部尚書及在銓衡唯事貨賄授官小大皆有定價時中散大夫高居者先叙上黨郡闕遂求之修義私巳許人抑居不與居大言不遜修義命左右臺拽之居對衆大呼大喝賊人問居曰白日公庭安得有賊居指修義曰此坐上者違天子明詔物多者得官京師白刼此非大賊乎修義失色居行馬而去政本實繁司會攸切溫子昇為廣陽王譲吏部尚書表曰假勢風雲非由羽翮徒得推遷就列僶俛當時曾無辟雍議禮之名未有銅雀獻賦之敏而政本實繁司㑹攸切天下尚書北齊段孝言為吏部尚書孝言既無深鑒又待物不平抽擢之徒非賄則舊有將作丞崔成忽於衆中抗言曰尚書天下尚書豈獨段家尚書也孝言無辭以荅唯厲色遣下而已六十人為一甲三國典畧東魏以楊愔典選常六十人為一甲愔令其自叙訖不省文簿便次第呼之無有誤者後有選人魯漫漢自言猥賤獨不見識愔曰卿前在元子思坊騎秃尾草驢經見我不下以方麴障靣我何以不識卿漫漢驚服愔又調之曰名以定體漫漢果自不虛又令史唱名誤以盧士深為士琛士深自言愔曰盧郎得潤所以比玉不許江總為詹事陳孔奐為吏部尚書太子叔寳欲以江總為太子詹事令管記陸瑜言之於奐奐謂瑜曰江總有陳陸之才而無園綺之實輔弼儲后竊有所難瑜具以白太子太子深以為恨乃自言於陳主將許之奐乃啓曰江總文章之人今太子文藻不少無藉於總如臣愚見願選敦重之才以居輔導陳主曰即如卿言誰當居此奐曰都官尚書王廓世有懿惠質性敦敏可以居之太子時亦在側乃曰廓王泰之子不可為太子詹事奐又啓宋朝范蔚宗即范泰之子亦為太子詹事前世不疑太子固爭之陳主卒以總為詹事總與太子為晝夜之飲太子常㣲行逰總家陳主恕而兔之先德行後文才隋書牛𢎞為吏部尚書其選舉先德行而後文才進用多稱職吏部侍郎高世本鑒賞機務清悄絶倫然爽俊有餘亦以輕薄時宰多以此疑之唯𢎞深識其真推心委任隋之選舉於斯為最斯須之間儀注悉備牛𢎞拜吏部尚書時高祖又令𢎞與楊素蘇威薛道衡許善心虞世基崔子發等并召諸儒論新禮殺輕重𢎞所立議衆咸推服之仁夀二年獻皇后崩王公以下不能定其儀注楊素謂𢎞曰公舊學時賢所仰今日之事决在於公𢎞乃不拜讓斯須之間儀注悉備皆有故實素歎曰衣冠禮樂盡在此矣非吾所及也前後十餘年多所進㧞韋世康拜吏部尚書前後十餘年多所進㧞朝廷稱為亷平嘗因休暇而謂子弟曰吾聞功成身退古人常道今年將耳順志在懸車汝軰以為云何子初嗣荅曰大人澡身浴徳名遂官成盛滿之誡先哲所重欲追蹤二疏伏奉尊命漢置五曹魏隆八凱江總讓吏部尚書表曰竊以漢置五曹方今六尚魏隆八凱擬古六卿近喻喉舌遠膺樞斗以宰臣知大選魏知古先天二年冬令徃東都知吏部尚書事深以為稱職手制曰卿以宰臣徃知大選官人知委情寄尤切遂能端本革弊忘私自公正色而行措心不撓鏡已徹則妍媸必鑒衡已舉則輕重㒺達朕遠聞之益用嘉嘆一時精選張九齡入相用嚴挺之為尚書在丞知吏部選陸景融知兵部選皆為一時精選糊名考判以求才彦則天時勅吏部糊名考選人判以求才彦劉憲與王適司馬鍾梁載言相次判入第二等為時所稱曲行私惠李嶠初在吏部時志欲曲行私惠兾得復居相位奏置員外官數千人至是官寮倍多府庫减耗乃抗表引咎辭職并陳利害十餘事中宗以嶠倡言時政之失輒請罷免手制慰諭而不允尋令復舊職抑貴勢親黨以避嫌疑楊師道轉吏部尚書師道貴家子四海人物未能委練所署用多非其才而深抑貴勢及其親黨以避嫌疑時論譏之被召不解佩刀見大理少卿門前後表薦四十餘人杜淹判吏部尚書參議朝政前後表薦四十餘人後多知名者淹嘗薦刑部員外郎郅懷道太宗問淹懷道才行何如淹對曰懷道在隋日作吏部主事甚有清慎之名自武職居選部韋待賈拜吏部尚書待賈素無藻鑒之才自武職而起居選部既銓綜無叙甚為當時所嗤被任遇始讀書侯君集拜吏部尚書君集出自行伍素無學術及被任遇方始讀書典選舉定考課出為將領入參朝政並有時譽侍郎歴代沿革並見尚書門國朝吏部侍郎左選掌文官選試擬注及遷叙之政令郎中員外郎㕘掌其事自注官皆當選團甲上都省訖擬奏右選掌武官選試擬注及遷叙之政令餘同左選官品令吏部侍郎從三品知人隋初高孝本為吏部侍郎房𤣥齡杜如晦與選孝本特加賞異後以為知人甄别士庶陸彦師為吏部侍郎隋承周制官無清濁彦師在職凡所任人頗甄别於士庶裴馬唐裴行儉馬載為吏部侍郎同時典選十餘年甚有能名時人稱為裴馬知人之鑒裴行儉為吏部侍郎典選有知人之鑒見王劇與蘇味道謂人曰二子亦當掌銓衡之任後劇果為天官侍郎味道至相位李敬𤣥尤重楊烱盧照鄰駱賔王王勃行儉曰王勃等浮躁淺露豈享爵祿之器乎楊子沉靜必至令長餘得令終為幸果如其言高選李元紘杜暹為相以開封廣平公宋璟為吏部尚書又為户部侍郎蘇晉與齊澣為吏部侍郎當時以為高選江南典選興元初劉滋為吏部侍郎徃洪州知選事時京師㓂盗之後天下蝗旱穀價翔貴選人不能赴調乃命滋江南典選以便江嶺之人時稱舉職鄧渴鄧𤣥挺則天時為吏部侍郎既不稱職為時所鄙又患消渴選人目為鄧渴為詩榜於衢路自唐掌選之失未有如𤣥挺者坐此左選後重為天官侍郎其失又甚于前賜金背鏡以表清鑒高季輔為吏部侍郎凡所銓叙時稱允當太宗嘗賜金背鏡以表其清鑒前有馬裴後有盧李盧從愿睿宗踐阼拜選吏部侍郎中宗之後司頗失綱紀從愿精心調理大稱平允典選六年前後無及之者上嘉之初高宗時裴行儉馬載為吏部最為稱職及是從愿與李朝隱同時典選時人稱曰吏部前有馬裴後有盧李選人訴訟含容無慍色苖晉卿知吏部選事性謙柔選人有訴訟索好官者雖至數千言或聲色甚厲者晉卿必含容之畧無慍色拜吏部侍郎前後典選五年政既寛弛胥吏多因緣為奸賄賂大行朝廷求理遠近皆須得人崔鄆判吏部東銓事文宗勤於政道每若選曹訛弊乃召三銓謂之曰卿等比選令錄如何注擬鄆對曰資叙相當問其為治之術視可否而擬之帝曰序資合得而才劣者何授對曰與邊遠漫官帝曰如以不肖之才治邊民則疾苦可知也朝廷求理遠近皆須得人茍非其才人受其弊尋拜吏部侍郎隨才銓擢咸得其冝劉祥道父林甫貞觀初遷吏部侍郎初遷代赴選者以十一月為始至春即停選限既促選司多不究悉時選人漸衆林甫奏請四時聴隨到注擬當時甚以為便時天下初定州府及詔使多有赤牒授官至是停省盡來赴集將萬餘人林甫隨才銓擢咸得其冝時人以林甫典選比隋之高孝基私書盈几不省孔緯字化文歴户部兵部侍郎吏部侍郎選曹動循格令權要有所託私書盈几不省不以藻鑒為意許子儒以學藝稱長壽中官至天官侍郎子儒居選部不以藻鑒為意委令史旬直以腹心注官之次子儒高枕而卧時云旬直平配由是補授失序無復綱紀道路以為口實復舊任崔𤣥暉拜天官侍郎每介然自守都絶請謁頗為執政者所忌轉文昌左丞經月餘則天謂曰自卿改職以來選人大有罪過或聞令史乃設齋自慶此俗甚為貪惡爾今要卿復舊任又除天官侍郎典選六年有令譽席豫為吏部侍郎𤣥宗謂之曰卿前為考功職事平允故有此授豫典選六年有譽令風采嚴整韋陟為吏部侍郎嘗病選人冒名接脚闕員既少取士良多正調者被擠偽集者冒進陟剛腸嫉惡風采嚴正選人疑其有瑕按聲盤詰無不首伏每歲皆賸得數百員缺可以待淹滯嘗謂所親曰使陟知銓衡一二年則無人可選矣權邪憚其嚴勁韋𢎞字景韓吏部侍郎銓綜平允權邪憚其嚴勁不敢干以非道頗隳公道盧藏用景龍中為吏部侍郎藏用性無挺特多為權要所逼頗隳公道意有沙汰多所損抑溫彦博為吏部侍郎彦博意有沙汰多所損抑而退者不伏嚚訟盈庭彦博惟騁辭辯與之相語終日喧擾頗為識者所嗤以進賢為務李季卿拜吏部侍郎俄兼御史大夫奉使河南江淮宣慰振㧞幽滯進用忠廉時人稱之任銓衡數年轉右散騎常侍季卿有雅量性識博逹善與人交襟懷豁如其在朝以進賢為務士以此多之抑文雅進酷吏楊纂既長于吏道所在皆有聲績俄又除吏部侍郎前後典選十餘載銓叙人倫稱為允當然而抑文雅進酷吏觀時任數頗為時論所譏奉法清慎隋楊恭仁大業初轉吏部侍郎楊𤣥感作亂煬帝制恭仁率兵經略與𤣥感戰于破陵大敗之軍旋煬帝召入内殿謂曰我聞破陵之軍唯卿力戰功最難比雖知卿奉法清慎都不知勇决如此納言蘇威曰仁者必有勇固非虛也四代居選部房頴叔拜天官侍郎自其高祖景伯至頴叔四代咸居選部時論榮之時人推其强直韋陟嘗任吏部侍郎有一致仕官叙五品陟判之曰青氊展慶曾不立班朱紱承榮無宜臥拜時人推其强直舉朝歎服姜晦為吏部侍郎性聰悟識理體舊制吏曹舍宇悉布棘以防令史與選人交通及晦領選事盡除之大開銓門示無所禁私引致者晦輙知之召問莫不首伏初朝廷以晦改革前規咸以為不可竟銓衡得所賄賂不行舉朝歎服振理風俗馬載為吏部侍郎考功員外郎劉思立子憲為河内尉思立今日亡明日選人有索憲闕者載深嗟咨以為名教所不容乃書其無行注冬集朝廷咸曰真銓衡流品之司可謂振理風俗也其出選為衆目所觀衆口所訐趑趄失歩吏部郎隋煬帝即位諸曹侍郎並改為郎北齊書陸卬兄弟相代為兵吏部今侍郎也公議得失以為褒貶魏志諸葛誕字公休為吏部郎人所屬託輙顯其言而仍用之後有當否則公議其得失以為褒貶自是羣寮莫不慎其所舉論議清當袁偘論議清當柔而不犯善與人交在廢興之間人趨務者常謙退不為也時人稱之歴選部郎號清平清通簡要晉吏部郎缺文帝問其人於鍾㑹曰裴楷清通王戎簡要皆其選也於是以楷為吏部郎清尚李重與李毅為吏部郎時王戎為尚書重以清尚見稱毅淹通有智識雖二人操異然俱處要職戎以識會待之各得其所二人操異俱處要職上銓綜廉平李淯字伯重為吏部郎銓綜亷平賜爵關内侯飲酒廢職畢卓為吏部郎常飲酒廢職見舍郎釀熟卓因即夜至其甕間盗之為掌酒者所縛明旦視之乃畢吏部也遽釋其縛卓遂引主人宴於甕間取醉而還卓嘗謂人曰左手持蟹螯右手持酒盃拍浮酒池中足了一生也名顯朝廷桓彛遷尚書吏部郎名顯朝廷于時王敦擅權嫌忌士望彛乃去職佳吏部禇亮毎屬桓彛覔一佳吏部彛曰輿縣宰徐寧海岱清士即遷吏部郎竟歴要職不抑寒素王蘊字叔仁遷吏部郎性平和不抑寒素毎一官缺求者十輩藴無所是非時簡文帝輔政藴輙連狀白之曰某人有地某人有才務在進達各隨其方故不得者無怨焉不敢用鄉曲一人杜錫補吏部郎不敢用鄉曲人頴悟王戎少有頴悟二十四為吏部郎明雅邁時王隱晉書山濤為吏部郎文帝與書曰足下任事明雅邁時念多所乏今致錢二十萬絲百斤穀二百斛忠心晉武詔曰太祖家令陸亮有忠心可補吏部郎斥華競塞私謁李重字茂曾遷尚書吏部郎詢朝衆而斥華競存公平而塞私謁是以羣才㒺不畢舉銓管之任甚有稱譽晉中興書阮放與從弟孚齊名為吏部郎銓管之任甚有稱譽性清不治産業在郎不免飢乏王導庾亮以放名士供給衣食放由是得立性清約不治産業上毋誨導茍綽晉州記武舍字景律官歴清資而邂逅不為尚書郎遷散騎常侍自以毋存時誨導云汝勉修其忠當為尚書郎恐違毋前言乃辭不就常侍尋為吏部郎乃就之為人夷曠似王東海晉懷帝永嘉官令吏部郎太原溫機元甫世論以其為人夷曠似王東海清直寡欲世說山濤舉阮咸為吏部郎曰清直寡欲萬物不能移也老嫗識其非常人郭子劉道真少時漁釣草澤善歌嘯聞之者莫不留連一老嫗識其非常人甚樂其歌嘯乃殺豚進之道真食豚盡了不謝嫗見其不飽又進一豚又食半還之後道真為吏部郎嫗兒為小史道真乃超用之兒不知所由問母而後知之於是齋牛酒以詣道真道真笑曰去去無可復相報典碎事山濤啓事吏部郎典碎事日夜相接非直當正已而乃當能正人議郎杜典德履亦佳太子庶子崔諒中郎陸唯皆有意正人其次不審有可用者否相遇之過袁宏與謝僕射書聞見疑為吏部郎不知審爾果當此誠相遇之過究識流品諳悉人物宋書王僧綽為吏部參掌大選䆒識流品諳悉人物㧞才舉能咸得其分揚我名者殺我身吏部尚書江湛舉王㣲為吏部郎㣲與湛書曰若平生云揚我名者殺我身天爵且猶㓕名安用吏部郎哉不受餅一甌王悦之為吏部郎鄰省有㑹同者遺悦之一甌餅辭不受曰此費誠小然少來不願當之願上封禅書袁淑為吏郎其秋大舉北伐淑侍坐從容曰今當鳴鑾中岳席卷趙魏檢玉岱宗今其時也將逢千載之㑹願上封禅書太祖笑曰盛德之事我何足以當之傾朝送别何尚之字彦德為吏部郎告休定省傾朝送别于冶渚及至郡父叔度謂曰聞汝來此傾朝送可有幾客荅曰殆數百人叔度笑曰此是送吏部郎爾非關何彦德也昔殷浩亦嘗作豫章定省送别者甚衆及廢徙東陽船泊征虜亭積日乃至親舊無復相視者居小選號為平允褚翔為義興太守徴為吏部郎去郡百姓老少追送出境涕泣拜辭翔居小選公清不為請屬易意號為平允遷侍中又謝朓初告王敬則反敬則女為朓妻常懷刀欲報眺朓不敢相見及當拜吏部郎謙挹尤甚尚書郎范縝嘲之曰卿人才無慙小選但恨不可刑於寡妻朓有愧色官當圖人人安得圖官有人嘗求吏部郎何尚之曰此敗風俗也官當圖人人安得圖官顔延之大笑曰我聞古者官人以才今官人以勢彼勢之所求子何疑焉不容令史諮執陸慧曉為吏部郎吏曹都令史歴政求諮執選事慧曉任已獨行未常與語帝遣主曹单景雋謂曰都令史諳悉舊貫可共參務慧曉謂景雋曰六十之年不復能諮都令史為吏部郎上若謂身不堪便當拂衣而退庭中植嘉樹顧憲之為尚書吏部郎其兄凱之嘗為吏部于庭中列植嘉樹謂人曰吾為憲之植爾至是憲之果為此職三讓吏部梁謝眺遷尚書吏部郎上表三讓中書疑朓官未及讓以問國子祭酒沈約曰宋元嘉中范曄讓吏部朱修之讓黃門蔡興宗讓中書並三表詔荅近代小官不讓遂成常俗恐此有乖讓意王藍田劉安西並貴重初自不讓今豈可不讓耶孫興公孔顗並讓記室今豈可三署皆讓耶謝吏部今授趨階讓則有意豈關官之大小撝讓之羙本出人情若大官必讓便與詣闕章表不異例既如此都是非宜銓序著稱王亮為吏部郎銓序著稱及為尚書拘資次而已當代謂為不能委以銓衡之任後魏書宋繇沮渠蒙遜平酒泉于繇室得書數千卷鹽米數十斛而蒙遜曰孤不喜尅李歆欣得宋繇爾拜尚書吏部委以銓衡之任明解制度多識故事鄧淵博覽經書長于易筮太祖定中原擢為吏部郎淵明解制度多識故事與崔𤣥伯參定朝儀律令音樂及國史記詔䇿多淵所為也非崔郎中選事不辦孝文帝欲創革舊制選置百官謂羣臣曰為朕舉一吏部郎中給卿三日假尋曰朕已得之矣乃徴崔亮為之自參選事垂將十年亷慎明决為尚書郭祚所委毎曰非崔郎中選事不辦鬻賣官吏皆有定價韋瑒為吏部郎性貪婪鬻賣官吏皆有定價清吏許允為吏部郎選郡守明帝疑其所用非次召入將加罪允妻阮氏跣出謂曰明主可以理奪難以請求允頷之而帝怒詰之允對曰某郡太守雖限文書先王年限在後日限在前取二事視之乃釋遣出望其衣敗曰清吏也賜之有喉舌之任宋張緬弟績遷尚書吏部郎河東裴子野曰張吏部有喉舌之任已恨其晚銓衡庶品歴選賔寮陸倕拜吏部郎表曰銓衡庶品歴選賔寮阮咸真素屢薦未登陸亮忠心裁居兹職自非李重清識李毅恬正何以區分管庫式鑒胥吏冝師此人為楷模隋李德林為吏部郎陸昂命其子與德林周旋誡之曰汝每事冝師此人為楷模郎中後齊吏部三公郎中各二人隋煬帝即位毎增置一曹郎各為二員尋又毎减一郎置承務郎中二員並從五品上龍朔為司列大夫並隨曹郎一人掌考天下文吏之班秩階品一人掌小銓亦分為九品通謂之行署以其在九流之外故謂之流外銓亦謂之小選六典郎中二人從五品上周官太宰屬官有下大夫盖郎中之任也秦有郎中以其為郎侍衛居中故曰郎中漢選尚書郎初從三署即次補之初入尚書臺稱郎中滿歲稱侍郎故郎中之名猶因三署舊號也按吏部郎中後漢置之職在選舉魏晉用人妙于時選其諸曹郎功高者選于吏部郎其吏部郎歴代品秩皆高于諸曹郎魏晉宋齊吏部郎品第五諸曹郎第六梁吏部郎品第四班第十一諸曹郎班第十陳因梁後魏北齊吏部郎品正第四上諸曹郎品正第六上後周依周官隋初二十四司並為侍郎品從第五煬帝三年置六司侍郎諸曹侍郎並改為郎又改吏部為選部郎異於六侍郎之名皇朝為吏部郎中龍朔二年改司列大夫咸亨光宅神龍並隨曹改復一人掌考天下文吏之班秩品命凡叙階二十有九從一品曰開府儀同三司正二品曰特進從二品曰光祿大夫正三品曰金紫光祿大夫從三品曰銀青光祿大夫正四品上曰正議大夫正四品下曰通議大夫從四品上曰太中大夫從四品下曰中大夫正五品上曰中散大夫正五品下曰朝議大夫從五品上曰朝請大夫從五品下曰朝散大夫正六品上曰朝議郎正六品下曰承議郎從六品上曰奏議郎從六品下曰通直郎正七品上曰朝請郎正七品下曰宣德郎從七品上曰朝散郎從七品下曰宣義郎正八品上曰給事郎正八品下曰從事郎從八品上曰承奉郎從八品下曰承務郎正九品上曰儒林郎正九品下曰登仕郎從九品上曰文林郎從九品下曰將仕郎凡散官四品以下九品以上並於吏部當畨上下凡叙階之法有以封爵有以親戚有以勲庸有以資䕃有以秀孝有以勞考有除免而復叙者皆循法以申之無或枉冒凡應入三品五品者皆待别制而進之不然則否凡文武百寮之班序官同者先爵爵同者先齒凡京師常參官謂五品以上職事官八品以上供奉官員外郎監察御史太常博士供奉官謂侍中中書令左右散騎常侍黃門中書侍郎諌議大夫給事中中書舍人起居郎起居舍人通事舍人左右補闕拾遺御史大夫御史中丞侍御史殿中侍御史諸司長官謂三品以上長官若勅換諸司長官及賜者開府儀同三司進光祿大夫太子賔客尚書左右丞相諸司侍郎中書門下五品以上官御史中丞並同長官例若賜物則中書門下官正三品准二品四品准三品五品准四品同中書門下平章事並同中書門下正三品清望官謂内外三品以上官及中書黃門侍郎尚書左右丞諸司侍郎太常少卿秘書少監太子少詹事左右庶子左右率及國子司業四品以下八品以上清望官每日以六品以上清望官兩人待制於衙内若供奉官宿衛官則不在此例凡授左右丞相侍中中書令六尚書以上官聽進讓其四品以上清望官才職相當不應進讓其嶺南黔中三年一置選補使號為南選凡天下官吏各有常員簿書累跡功當殿最具員皆與員外郎分而理焉一人掌小選凡未仕而吏京師者復分為九品通謂之行署其應選之人以其未入九流故謂之流外銓亦謂之小銓其校試銓注與流内銓畧同其在吏部兵部禮部考功都省御史臺中書門下是謂前行要望目為七司其餘則曰後行閒司凡擇流外職有三一曰書二曰計三曰時務其工書工計者雖時務非長亦叙限三事皆下則無取焉毎經三考聽轉選量其才能而進之否則從舊任國朝令諸司郎中從六品參選大事南史庾杲之遷吏部郎中參選大事省眼唐吏部郎中二㕔先小銓次格式員外郎二㕔先南曹次廢置舊説吏部為省眼君先捧紫泥柳公綽字起之武元衡罷相鎮西蜀與裴度俱為元衡判官尤相善先度入為吏部郎中度以詩餞别有兩人同日事征西今日君先捧紫泥之句按吏有風稜五代史劉鼎清泰中為吏部郎中兼侍御史知雜事鼎性若寛易而典選曹按吏有風稜員外郎隋百官志高祖六年尚書省二十四司各置員外郎一人以司其曹之籍帳煬帝即位廢諸司員外郎而每增置一曹郎各為二員尋又每减一郎置承務郎一人同員外之職唐職官志吏部員外郎二員並從六品上一人掌判南曹一人掌判曹務六典員外郎二人從六品上周官太宰屬官有上士盖今員外之任也宋百官階次有員外郎吳遷為尚書郎後周依周官隋文帝開皇六年尚書二十四司各置員外郎一人品從第六謂曹郎本員之外復置郎也煬帝三年廢皇朝尚書諸曹各置員外郎一人吏部置二人龍朔咸亨光宅神龍並隨曹改復一人掌選院謂之南曹其曹在選曹之南故謂之南曹也毎歲選人有解狀籍書資考課必由之以覈其實乃上三銓其三銓進甲則署焉一人掌判曹務凡當曹之事無鉅細皆與郎中分掌焉應簡試如貢舉之制國朝令尚書諸司員外郎正七品鈐制姦吏唐皇甫鏄為吏部員外郎判南曹凡三年頗能鈐制姦吏改吏部郎中吏事第一裴遵度遷吏部員外郎專判南曹天寳中海内無事九流輻凑會府毎歲吏部選人動盈萬數遵度敏識强記精覈文簿詳而不滯時稱吏事第一由是大知名孤寒無援者未常留滯崔郾資質秀偉神清重雅人望而愛之為吏部員外郎姦吏不敢欺孤寒無援者未常留滯銓叙之羙為時所稱姦吏不敢欺上銓叙稱正牛徽遷吏部員外郎乾符中選曹猥濫吏為姦弊毎歲選人四千餘人徽性剛直時為起請由是銓叙稱正能否族别物議稱之茍有才幹何限㣲累岑羲長安中為廣武令有能名則天嘗令宰相舉堪為員外郎者侍郎韋嗣立薦羲且奏曰恨其從父長倩犯逆為累則天曰茍有才幹何限㣲累遷拜天官員外郎滌除宿弊復清選部劉崇望字希徒轉吏部員外郎崔安潛為吏部尚書崇望判南曹滌除宿弊復清選部流内銓國朝初張昭為尚書領選事凡京官七品以下猶屬銓管自昭致仕始用他官兼判頗更舊制京官以上無選並中書門下特除又使府不許召置幕職悉於銓授今以選集者故止自節度判官以下州府判司諸縣令佐案資格注擬號流内銓其流外銓選人亦用焉建隆三年詔吏部流外銓選人並試判三道及流内出身題定為上中下三等乾德元年詔自今南曹銓司門下省三處磨勘注擬并㸃檢謝辭等共給限一月日開寳元年詔修循資格太平興國二年選人所試判三道定為四等兩道全通一道稍次而文翰俱優者為上等一道全通兩道稍次而文翰稍優者為中等三道全次而文翰無取者為中下等三道全不通而文翰紕繆者為下等判上者即與超一資注擬如入職事官即不超資與加一階判中者即依資注擬判中下者注同類官黃衣人即降一資如初入令錄者止於令錄資内降一資注擬判下者殿一選凡兩選經試判皆中下者擬同類官淳化四年三月以磨勘幕職州縣官院為考課院五月以考課院歸流内銓景德元年凡引選人齎所試書判以傋親覽三年詔流内銓自今幕職官赴調判上者超一資判中當循資者具歴任功過并試判引對天聖元年以毎道刑名全合者為通刑名及七分為精不及三分為否仍於逐巻頭定詞理書札優稍優次低次紕繆為五等以二通一粗而詞理書札俱優者為上等一通二粗或二通一否而詞理書札稍優者為中等三粗及二粗一否二否一粗而詞理書札俱次或低次紕繆者為中下等三否而詞理書札俱紕繆者為下等其全無詞理者縱刑名通書札優亦得入中下等其四等超資加階循資降資殿年並依舊例更取判中下内二否一粗及詞理書札俱低次紕繆者並注久闕官處八年勑自今銓司毎有移注對換對移就移就注選候移改定後限一日關貼過院限三日修書黃甲送南曹勾勘限一日却送銓當日牒送門下省本省限五日即書進入候降出中書即依元限一日却付門下省限次日付都省承勑人送入甲庫限兩日如及十人以上甲庫出給籖符及關南曹格式司官誥院限七日南曹出給厯子限七日官告院出給官告籖符厯子如是人數稍多依限修冩不及即具因依申銓