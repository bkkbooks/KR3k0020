朝各退歸司本朝視朝之制文徳殿内外朝凡不釐務朝臣日赴是謂常朝垂拱殿内曰殿宰臣樞宻使以下要近職事者并武班日赴是謂常起居每五日文武朝臣釐務不釐務並赴内朝謂之百官大起居是則奉朝之制自為三等盖天子坐朝莫先於正衙殿於禮羣臣無一日不朝者故正衙雖不坐常參官猶立班俟放朝乃退唐有職事者謂之常參今𨽻外朝不釐務者謂之常參分司分務孟棨本事詩杜牧為御史分務汾陽解官貧無賔客漢書張竦免官以例侯居長安貧無賔客時好事者從之質疑問事論道説書而已人稀至其門楊雄以病免家貧事酒人稀至其門好事者載酒饌從學座有清談之客門多好事之車李階廷有賦云座有淸談之客門多好事之車徒見二千石不如一縫掖後漢皇甫規解官歸安定雁門太守聞其器識還家書刺謁規規卧不迎入而曰卿食鴈美乎有頃門人又曰王符至在門規素聞符名乃驚遽而起衣不及帶屣履出迎握符手而還時人為之語曰徒見二千石不如一縫掖思母棄官周磬字堅伯除任城長遷陽夏重合令頻歴三城後思母棄官還家母老託疾謝􅔜字文儀以母老託疾去官母老去職謝况字行思少孤事母至孝會稽内史充引為參軍以母老去疾值兄喪去官楊仁字文義值兄喪去官後辟司徒桓虞府掾遭姊憂去官陳重遷會稽太守遭姊憂去官以父老歸養謝承後漢書黄香字文强除郎中以父老歸養罷官不完席衛良拜尚書郎以病罷官還家無完席賓客存問者坐桑下談飲水而去去位歸家著書為事董仲舒去位歸家以著書為事朝廷如有大議使者及張湯就其家而問之丈夫終當雄飛安能雌伏東觀漢記趙温為京兆郡丞歎曰大夫終當雄飛安能雌伏遂去官亟去無乆留魏志荀彧以董卓之亂求去補吏除元父令遂棄官歸謂父老曰潁川四戰之地也天下有變常為兵衝宜亟去無乆留求退數表乃聴晉山濤遷尚書以母老辭職詔曰君雖乃心在於色養然職有上日下旦夕不廢醫藥且當割情以崇在公濤心求退表疏數十上乆乃見聴以吏部尚書致仕母老輙去官虞譚母老輙去官還餘姚詔轉領軍將軍吳國内史親疾去官潘岳閒居賦序曰岳除長安令遷博士未召拜親疾去官百姓追思後漢寒朗遷濟陽令以母喪去官百姓追思之百姓涕淚而隨干寳晉紀孔率為全椒令治有惠政以母疾棄官百姓涕淚而隨之留於道路及卒市人皆哭弟亡去官李仲為平陽太守弟嶷亡而去官姊疾去官鍾岏賢吏傳姚英遷宛澤令以姊疾去官百姓號泣解脱車輪英還不停父疾陳辭蕭廣濟孝子傳何炯遷治書御史以父疾陳辭母疾解印綬决去廣州先賢傳鄧伯直為秭歸令以其母疾解印綬决去太尉焉公嘉其素履復薦辟之為府主簿兄疾去官宋書江夷守茂逺為郡守以兄疾去官遷右僕射池中龍種來㐮陽耆舊傳龎徳翁字子魚晉太康中棄官去守鄉里名南北沙里人皆敬之相語曰池中龍種來我家里中有其徳讓焉也禮遺無所受崔鴻十六國春秋范勝字元忠舉孝亷除郎中去官還家太守造之閉門不見禮遺一無所受輕舟浮海晉李智祖改河内太守欲强用之輕舟浮海莫知所終族無所庇左傳公孫蕩意歸去來陶潜為彭澤令日不能為五斗米折腰於鄉里小兒乃棄官作歸去來辭命駕適意張翰為齊王東曹掾在洛陽見秋風起因思江南菰菜尊羮鱸魚膾曰人生所貴適意何能羈宦數千里以邀名爵乃命駕東歸太守有嫌陶侃補武昌令以太守吕岳有嫌棄官而歸免官前漢貢禹少貧為河南令以賦事為府官所責免冠謝曰冠一免豈可復耶遂去官不過六百石邴漢兄子曼容為官不過六百石輙自免去戒子孫無為王國吏缺劾而去閔仲叔應司徒侯霸之辟既至不問以吏治仲叔乃辭去日始蒙嘉命且喜且懼令見明公喜懼皆去以仲叔為去不足問不當辟也辟而不問是失人也遂投劾而投版范滂為光禄勲主事時陳蕃為光禄勲滂執公議詣蕃蕃不為之上滂懷恨遂投版棄官而去郭林宗聞而讓蕃曰若范孟博者豈宜以公禮格之郡守非其人懐敷為蒙城令以郡守非其人乃去官不樂為吏枚乗為𢎞農都尉不樂為吏去官客㳺梁投傳陳蕃初舉孝㢘刺史周景辟為别駕從事以諫争不合投傳而去致仕書伊尹將告歸注告老歸邑也禮記大夫七十而致仕若不得謝賜之几杖行役以婦人適四方乗安車自稱曰老夫於其國朝稱君越國而問焉必告之以其制唐舊制年七十以上應致仕若齒力未衰亦聴釐務貞觀二年九月詔文武官年老致仕抗表去職者參朝之班宜在本品任之上開元五年十二月勅致仕三品以上並聴朝朔望建中三年九月勅致仕官所請半禄料及賜物等並宜從初春明退朝録吕許公以太尉致仕鄧公魯公並以太傅致仕陳恭公以司徒致仕李相昉張相齊賢章郇公宋鄭公富韓公並以司空致仕凡朝士父在經大禮推恩得致仕官不給俸父任升朝官以上致仕自得俸舊制若因其子更加秩則不給俸唐制宰相不兼尚書左右丞轄留省中領事元和中韋貫之為丞相平章事不乆而遷中書侍郎右僕射給諫不為致仕官然於陵為左僕射致仕請老左傳祁奚請老注云致仕歳時為朝臣前漢書石奮以上大夫禄歸老於家歳時為朝臣上賜食於家必稽首俯伏而食如在上前本注云歳時為朝臣謂預朝懸安車薛廣徳為御史大夫乞骸骨乃賜安車駟馬黄金六十斤罷東歸沛太守迎之界上沛以為榮懸其安車傳之子孫年至龔勝邴漢俱乞骸骨詔曰古者有司年至則致仕今大夫年至矣朕愍以官職之事煩大夫其上子若孫若同産子一人大夫其修身守道以終年高所上子男皆除為郎就問大議董仲舒為膠東相老病致仕朝廷每有大議使使者尉張湯就其家而問之問籌䇿趙充國乞骸骨賜安車駟馬黄金六十斤罷就第朝廷毎有四夷大籌䇿帝遣使問焉常與參兵謀歸老故鄉䟽廣為太保兄子受為少傅廣謂受曰吾聞知足不辱知止不殆功成身退天之道也豈若父子相隨出關老故鄊不亦善乎受曰從大夫議即日廣稱病篤上許罷皆賜黄金故人邑子設祖道供帳東都門外廣既歸鄊里日令家供設酒食請族人故舊相與娛樂子孫諸老人言於廣立産業基址廣曰吾豈老誖不念子孫哉又此金惠飬老臣也顧自有舊廬令子孫不欲益其過而生其怨故樂與鄊黨共饗其賜以盡吾餘日不亦可乎丞相致仕韋賢七十餘為相五歳地節三年以老病乞骸骨賜黄金百斤罷歸賜第一區丞相致仕自賢始懸車之義以洎小臣韋孟楚元王傅其孫戊荒滛孟作詩諷諫遂我髪去位詩曰我之退位請于天子天子我䘏矜齒赫赫天子明哲且仁懸車之義以洎小臣以二千石禄歸老于家周仁景帝為太子時為舍人景帝立以此得幸後宫秘戲仁常在旁終無所言武帝立為先帝臣重之仁力病免以二千石禄歸老于家子孫皆至大官焉白衣尚書後漢鄭均東平任城人遷尚書數納忠言肅宗重之後以病乞骸骨拜議郎告歸東巡過城任乃幸均舍賜尚書禄以終其身故時人號為白衣尚書八月牛酒元和中詔告東平議郎鄭均前在機宻以病致仕守義貞固黄髪不怠賜均米穀各千斛常以八月遣吏存問賜羊酒顕兹異行註云東觀記云賜羊一頭酒二斗終其身問遺賢良必以八月者老成故順其時氣助飬化育也故月令仲秋之月養衰老受几杖行糜粥飲食焉經傳有疑就問喬𤣥字仲卿召拜鴻臚年老乞骸骨賜牛酒粟米綵帛若經傳有疑使小黄門就問之鐘鳴漏盡魏志田豫屢乞遜位司馬宣王謂豫克壯書諭未聴豫答書曰年過七十而居位譬猶鐘鳴漏盡夜行不休是罪人也階庭蘭菊叢生晉羅含歴散騎常侍年老致仕加中散大夫門施行馬初含在官舍有一白雀栖集堂宇致仕還家階庭忽蘭菊叢生以為徳行之所感以致然也善言莫離口良藥莫離手唐孟詵長安中為同州刺史加銀青光禄大夫神龍初致仕歸伊陽山第以藥餌為事詵雖至老力壯常謂所親曰若能保身飬性者常須善言莫離口良藥莫離手此保身養性之術安車駟馬晉鄭冲致仕詔賜安車駟馬枕帳簟褥就咨大政劉寔以老病遜位惠帝即位復授太尉詔曰君年耆老確然難違今聴君以侯就第位居三司之上秩禄加舊賜几杖不朝及宅一區有大政就咨于君稱朕意焉以二千石終身續漢書鄧彪字智伯為太尉乞骸骨以二千石終身焉以二千石禄終其身第五倫章帝立拜司空奉公不撓言議果决後自陳老病乞骸骨帝以二千石俸禄終其身老不釋卷宋傅隆以光禄大夫致仕而歸在家老不釋卷與子處不競之地齊書王裕性貞正及致仕隱吳興與子瓉之書曰吾談欲與汝處不競之地瓉之歴官至兵部尚書未嘗一朝貴香山居士唐書白居易以刑部尚書致仕與香山僧如滿結香山社每肩輿徃還白衣鳩杖自稱香山居士身老才壯齒宿意新李百藥字重規貞觀中為宗正卿撰五禮及律令後數歳以老致仕太宗嘗制帝京篇命百藥並作上嘆其工手詔曰卿何身之老而才之壯齒之宿而意之新乎悠然賦詩杜鴻漸晚年樂于退静悠然賦詩曰常願追襌理安能挹化源及休政後病令僧剃須髪及卒命其子依胡法塔葬迹類緇流物議異之也詩酒賞詠盧簡求以太子太師致仕還於東都有國林别墅歳時行樂子弟侍側公卿在席詩酒賞詠竟日忘歸角巾東洛薛平除左散騎常侍致仕時有年過懸車而知止者唯平年至而無疾請諸老角巾東洛時甚高之逍遥山野嘯詠窮年蕭俛既致仕乃歸濟源别墅逍遥山野嘯詠窮年八十以壯恪太子在東宫上欲以耆徳輔導復以以少師召之俛令弟傑奉表京師復納制書詔曰吾以元子㓜冲急於師訓欲頼汝發明古今兾忠孝之規日聞于耳特遣左右至於園林而卿髙道翛然絶意仕進復遣令弟還吾詔書天爵自優賔鴻方逺不轉之志其堅若山終以吕尚之秩遂其焉疏受之心可太子太傅致仕非朽邁之致以餘忿見廢鮑防為禮部侍郎常遇侍御史竇參於逵衢導騎不時引避僕人為參所鞭及參秉政遽令致仕防謂親友曰吾與蕭聴之子齒而與昕同日懸車非朽邁之致以餘忿見廢防文學舊人歴職中外不因罪戾而為俗吏所擯竟以憤終多引後進與談讌李日知轉刑部尚書罷知政事頻乞骸骨許之初日知將有陳請而不與妻謀歸家而使左右飭装將出居别業妻驚曰家産屢空子弟名宦未立何為遽辭職也日知曰書生至此已過本分人情無厭若恣其心無止足日及歸田園不事産業但緝構池亭多引後進與之談讌也無意請老高郢嘗為右僕射致仕裴度為制云以年致仕抑有前聞近代寡亷罕由斯道時司徒杜佑年七十無意請老故度為舍人以譏之在家修史張説致仕詔在家修史特給禄俸惠養老臣丘為貞元四年以左散騎常侍致仕復舊官初為致仕還鄉給俸禄之半既丁憂蘓州疑所給請於觀察使韓滉滉以為授官致仕本不釐務特給禄俸養老臣也不可以在喪有異命仍舊給之惟春秋二時羊酒之直則所不給給半禄自蕭昕始貞元五年以太子少傅兼禮部尚書蕭昕為太子少師右武衛上將軍鮑防為工部尚書前太子詹事韋建為秘書監並致仕仍給半俸禄致仕官給半禄自蕭昕始也寵儒者給公乗孔述睿為太子賓客年未七十以疾請免例不給乗上寵儒者命給公乗以遣之筋力未衰堅請退戣以禮部尚書致事委所在長吏歳時親自存問兼致羊酒如例其芻秣什器之類委河南尹量事供送從優禮筋力未衰堅請休退故事優禮焉全給俸料陵以左僕射致仕時令全給俸料上䟽云伏以朝廷制禄本為職勞衰病乞閒自冝家食而半給之俸近古所行今若又踰常制重啓殊恩錫端寮之厚奉為朽質之私費循躬撫事情所不安招損害盈臣之所懼勅批云早更委任每著聲猷累聞古老之辭勉遂懸車之請故優廩禄以示寵勞明日更讓從之家貧路逺假公乗滕向以左庶子致仕欲歸鄉家在浙東道途遥逺忝四品乞特給婺州以來券庶使衰羸獲安光榮鄊里勅向致仕還鄊家貧路逺冝假公乗自今更有此便為定制理圃成畦布真珠南唐近事陳繼善自江寧尹拜少𫝊致仕繼善素秉性鄙屑别墅林池未常暫適既嗜酒杜絶賔客一旦荷一鋤理水圃成畦布以真珠百餘顆若種蔬狀布土問記顆俯拾周復始以此為樂預修求致政表國朝雍熙二年王彦超進封邠國公謂人曰吾聞朝廷之制七十致仕吾今六十九矣當自知止足之分於是年冬末預修求致政表凡僕𨽻彦之食者皆罷遣之明年果遂其請以太子太保致仕超歴仕累朝領節制者九所至雖無異政而能以富貴知止人以此多之召至御榻之側李昉以司空致仕上頗優待之每㳺讌必首召昉至御榻之側勞問安否及詔大朝㑹令綴丞相班歳時賜與一與丞相等焉朝會綴丞相班上作多幸老民自叙宋琪拜右僕射月給真俸以衰老特詔五日一朝後以數被病作多幸老民自叙以見志又曰上遣奏百字卒激勸風俗韓見素為審刑院詳議官監察御史表求致仕上問輔臣吕端曰見素好修養之事端曰近世朝行中躁競好進者多知止求退者少如允所請亦是激勸風俗遂授刑部員外郎致事恩渥之盛近代無比咸平四年對工部侍郎致仕朱昻于崇政殿命坐久之賜銀器二百兩帛三百疋上謂輔臣曰昻侍朕左右未嘗以私事干朕今其歸老可給以驛券令本府歳時省問如有章奏許附驛以聞命其子太祝正辭江陵府公安縣使得就養舊制致仕官引謝而昻特召見蒙優禮首途之日又遣中使賜宴于玉津園兩制館閣儒臣皆預仍詔賦詩以餞待恩渥之盛近代無比縉紳榮之二子掖升殿張齊賢以司空致仕歸西京入辭上憐其衰羸命不拜聴二子掖而升殿朝朔旦望慶厯三年許國公吕夷簡守太尉致仕每朝朔旦望大會綴中書門下班見客服彩帽杜祁公休退居南都客至無不見止服彩帽常曰七十致仕可用喬士服注喬以私諱借用出退朝録召陪祀不至皇祐二年仁宗始祀明堂范文正公時守杭州而杜正獻致仕居南都蔣侍郎希魯致仕居蘓州皆年老范康公建言朝廷闊禮冝召元老舊徳陪祀供帳都亭日以待焉二公卒不至加賜衣帶器幣賜一子出身前後兩府致政者大禮前率有詔召之亦有不至者禮畢皆賜衣帶器幣焉大禮畢賜衣帶器幣上大硯著春秋退朝錄楊庶幾孜言胡秘監旦退居襄陽鑱大硯以著漢春秋書成瘞其硯每聞大臣之卒必作傳以記其善惡然世不傳庶幾亦有所述朝會綴中書門下班王晏乾興元年進封韓國公上疏乞老太子太師致仕每朝會令綴中書門下班員外唐書會要員外郎官神龍以後有之開元除去唯皇親戰功之外不復除授今則貶責者然後以員外官處之永徽五年蔣孝彰除尚藥奉御員外特置仍同正員員外官自此始也又顯慶五年員外置同正員又云員外官自此始未知孰是神龍元年勑内外員官正令本司長官量閒劇取資䕃請正員人分判曹事自外並不在判事之限開元元年五月勑諸邑員外除皇親五品以上其戰陳要籍内侍省以外一切㧾停十九年正月京兆尹裴伷先奏曰神州務劇官寮已多更置員外官於事頗為繁冗天恩近已令即停猶恐選官更有注擬望請當府及京畿等縣自今一切不得過四人中州三人下州及縣各二人中縣下縣各一人乾元二年九月詔州縣員外並任其所適計考滿後各與成資仍於本色内减一兩選與留知員外郎中有材識幹濟曽經任所州縣成資者亦量留每上州不得過五人中州四人上縣三人中縣以下一人省員救時弊唐蘓瓌上封事臣聞蕭何載其清静歌以畫一漢文垂拱無為幾致刑措光武吏員并合務在省官此即省事清心大禆政要關輔菽粟非賤戎役頻擾望清省員以救時弊更置員外朝廷之失袁楚客奏記於魏元忠曰官以安人非以害人先王欲人治必選材欲人安必省事此誠同天下憂也人有樂君共之君有樂人慶之可謂同樂矣如此則上下無問而均一體也今天下困窮海内衰耗伏以州縣牧宰選受不得人自餘僚位鮮有稱職不務公謹專於害剥比之馬也必除其害此自有所闕而更員外置官所謂助桀為虐適足以速禍也夫人情自已以員外吏恐人之不畏也必峻法以懼之恐財之不奉也必枉道以奪之以有限之物供無厭之用欲其不困可得哉古人有言十羊九牧羊既不得食人亦不得息書曰官不必備惟其人孔子譏管仲曰官事不攝焉得儉據此正員之官猶不欲其備况正員之外更置員外此則朝廷之失非君侯他人誰正之哉數倍正闕韋嗣立上䟽曰古者取人必須採鄊曲譽然後辟於州郡州郡有聲然後辟於五府辟於五府然後升之天朝此則用一人所擇者甚悉擢一士所歴者甚深用得其方則理非其才則亂所繫焉可不深擇之哉今之取人有異此道遂至員外置官數倍正闕曹署典吏困於祗承府庫倉儲竭於資奉不司案牘空尸禄俸蘆懐慎為御史中丞上䟽曰臣竊見京諸司官員委積多者數餘十倍官不必備此則有餘人代天工多不釐務云云官員中或簮裾雅望或臺閣舊人或明習憲章或諳閑政要皆一時之良幹多不司案牘空尸禄俸滯其才而不勝其用尊其位而不盡其力周稱多士漢曰得人豈其然歟臣望請諸司員外官有才能器職衆所聞知堪為州牧縣宰上佐者並請遷擢若有老病及不堪理務者咸從廢省使賢不肖較然殊貫此濟時之務也贈官國朝宰相使相正一品並贈曽祖祖父東宫三師僕射留守節度使並贈祖父餘止贈父其後樞宻使副參知政事宣徽節度並贈三世三司使贈二世初拜宰相即贈三世其後及簽書樞宻院事以上皆即時贈之他官湏經恩學士及刺史以上内侍都知押班皆中書奉行餘則有司奏請其後觀文殿大學士資政殿大學士並同三司使例見任大兩省并待制及大卿監諸衛上將軍正防禦遥郡觀察使景福殿使客省使以上者父不以曽與不曽任官並許封贈至品即不得過三公如子官雖低其父若曽任上項文武官亦許封贈至三公止不如不曽任官及雖曽任官不至上件官者即許封贈至諸行尚書諸衛上將軍節度使止文官父不仕者初贈大理評事次轉一資武官父不仕者初贈太子左清道率府副率次贈左司禦率府次贈左監門衛將軍次贈將軍兩次合封三代者父贈少師祖贈少傅曽祖贈少保已是三少者入東宫三太已是三太者入三師如官高即從高贈合封二代者並優贈入官並贈兩資至侍郎止一資内學士以上並贈三資贈至侍郎止兩資帶緊職者其父優入清名都知押班軍員並贈三資春明退朝録唐制監官三品得贈官如胡文公曽為京兆尹兼御史大夫後終吏部侍郎而贈禮部尚書是也又觀察使多贈兩省侍郎以就三品得諡國初以來唯正官三品方得諡兼官贈三品不得之真宗命陳彭年詳定遂詔文武官至尚書節度使卒許輟朝贈至正三品許請諡而史失其傳唐相止贈一代權徳輿罷相為檢校吏部尚書興元節度使自潤州改葬其父於東都亡祖之域其祖倕終右羽林軍録事參軍因表納檢校吏部尚書兼御史大夫請回贈祖一官詔不許納官特贈倕尚書禮部郎中徳輿在遷祔暫假内公事皆差官勾當有勑使及别奉詔即令權服慘服承進止元祐令諸贈官父者不得過金紫光禄大夫節度使諸衛上將軍若身任或父曽任待制中散大夫上將軍景福殿使客省使以上及正任防禦使遥郡觀察使者不得過三公其父曽任一品及執政官節度或身應封贈父為武職者須身由武職換授及父祖曽任武職或軍職其武臣欲封贈父為文資者須身由文資換授及父祖曽任文資或父曽得郊方許陳乞諡號春明退朝録太子諡昭成許王元僖初諡共後改悼獻周王元佶諸王諡悼秦王廷美康惠岐王徳芳恭憲楚王元佐恭靖陳王元份文惠安王元傑恭懿鄧王元偓恭惠曹偁元恭肅燕王元儼懐靖襄王昉悼穆豫王昕悼懿鄂王曦公主諡恭懿宣祖女燕國大長公主降高懐徳賢肅太祖女秦國大長公主降王承衍賢靖太祖女晉國大長公主降石保吉恭惠太祖女許國公主降魏咸信初諡正惠英惠太宗女燕國大長公主降吳元扆和靖太宗女鄭國大長公主降王貽永慈明太宗女申國大長公主報慈正覺大師清裕獻穆太宗女齊國大長公主降李遵勉昭懐真宗女出俗為道士號清虚靈昭大師莊孝仁宗女楚國大長公主降李瑋宗室諡恭裕申王徳文康孝南陽郡王惟吉安懿濮王孝定相王允弼榮易定王允良恭肅廣平徳王徳思恪永嘉郡王允廸懿恭平陽郡王允升康簡康陵郡王徳雝脩國公承慶和懿安定郡王丞簡恭僖舒國公承藴僖靖同安郡王惟正僖穆丹陽郡王守節安僖榮王從式楚國公從信安簡信都郡王徳彛安恭博平郡王允初僖安楚國公守㢲慈惠申國公徳恭和惠河東郡王承衍惠恪楚國公從古僖温遂寧郡王承範良静魏國公宗懿恭簡韓國公宗禮良祁國公宗述吉國公尭昭昭裕遂國公宗顔恭孝南康郡王世永恭静樂平郡王丞亮康僖光國公克廣恭晉國公世滋榮僖陳國公承錫宰相諡文獻王祁公傳改文康宣懿魏僕射仁浦忠獻趙中令普文惠薛相居正陳相尭佐恭惠沈相倫惠安宋相瑛文正正字犯仁宗嫌名李司空昉王太尉旦正惠正字犯仁宗嫌名吕相端文穆吕許公蒙正王兾公欽若文靖李相沆吕許國夷簡文簡畢相士安向相敏中忠愍寇萊公凖文懿馮魏公拯張鄧公士遜文正王沂公曽文節張相知白章惠王相隨改文惠文憲章郇公得象改文簡元獻晏相殊正獻杜祁公衍恭陳相執中文元賈魏公昌朝莊敏龎籍公元憲宋鄭公庠樞宻使諡元靖李公崇矩景襄楚公昭輔元懿右僕射熙載恭懿王公繼英文莊高公若訥宣簡田公况惠穆吕公公弼參知政事諡文懿郭尚書贄孫少傅抃文恭李公穆景肅趙公昌言康節卒少傅仲甫恭肅温尚書仲舒惠獻王尚書化基文定趙右丞安仁石少師中立文僖陳公彭年康懿任尚書中正肅簡薛公奎宣獻先公文忠蔡公襄文肅成少傅度吴公奎忠憲朝少傅億忠穆王公康靖李少傅若谷文莊晁公宗慤安簡王尚書舉正文正范公仲淹正肅缺文烈明公鐫文簡丁右丞度康穆程公戡文安王公堯臣質肅唐公介樞宻副使知院同知院諡宣靖錢公若水恭質宋公瑋景莊王公嗣宗正惠正字犯仁宗嫌名馬公名節安惠周侍郎起任少傅中師武穆曹公瑋忠獻范尚書雍僖質趙少師積憲成李侍郎咨文孝張左丞觀文肅鄭公戬恭惠任少師布威敏孫公沔孝肅包公拯文忠胡少師宿忠簡王侍郎師相諡恭惠安陳王審琦元靖李中令景正懿正字犯仁宗嫌名高中令保融武烈石中令守信莊烈何中令福進恭孝王仲令相武穆高公懐徳忠順陳相洪進忠懿錢中令俶莊武李侍郎繼勲石公保吉安僖錢侍郎師偓莊惠宋太師偓恭惠張侍中美武肅李公繼隆武惠潘公美忠肅王公顯榮宻柴公宗慶恭宻楊公崇勲恭僖李侍中用和文簡程相琳良僖李公昭亮文臣諡文安朱尚書白文莊江陵陽公忠定張尚書詠文恭薛尚書映忠肅馬少保亮文楊侍郎億恭惠李中丞吉文元晁少傅逈宣孫公奭康肅陳公尭咨章靖馮侍郎充宣懿楊侍郎察恪李右丞昭述景文宋尚書祁襄余尚書靖恭安張尚書存莊李尚書兌修懿錢右丞明逸懿敏王尚書素懿靖李少保柬之武臣諡温肅杜公審肇恭僖杜公審瓊恭惠杜公審進武毅曺公翰崔公