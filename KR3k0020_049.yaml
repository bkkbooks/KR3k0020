body:
  text: 職官分紀卷四十九宋孫逢吉撰文散官隋以開府儀同三司特進光禄大夫左右光禄大夫朝議朝散正議通議朝請大夫朝議郎以下並為文散官唐因之國朝開府儀同三司特進光禄大夫金紫光禄大夫銀青光禄大夫正奉大夫通奉大夫太中大夫中大夫中散大夫朝議大夫朝散大夫朝奉大夫承直郎通直郎朝請郎宣徳郎朝散郎宣義郎給事郎承事郎承奉郎承務郎儒林郎登仕郎将仕郎為文散官元祐令開府儀同三司為使相特進至承務為寄禄官武散官隋百官志高祖有翊軍等四十三號将軍品凡十六等為散號将軍以加汎授居曹有職務者為執事官無職務者為散官煬帝八尉四十三號将軍官皆罷之置建節奮武宣恵綏徳懐仁守義奉誠立信等八尉以為散職唐職官志輔國鎮軍二大将軍冠軍雲麾忠武壮武宣威明威信逺游騎擊十将軍為散號将軍以加武士之無職者武徳十一年更置驃騎大將軍為従一品武散官輔國鎮軍二大將軍為従二品武散官冠軍將軍加大字及雲麾以下游擊以上改為五品以上武散官又置昭武振威致果翊麾宣節御武仁勇陪戎八校尉各有副尉為六品以下武散官國朝驃騎輔國正國冠軍懐化五将軍忠武壮武宣威明威定逺寧逺游騎游擊将軍昭武鎮威致果翊麾宣節御侮仁勇陪戎八尉校各有副尉為散官元祐令皆省勲官隋百官志文帝因周制更増損之有上柱國上大将軍大将軍上開府儀同三司開府儀同三司上儀同三司儀同三司大都督帥都督帥起正二品至正七品總十一等用賞勲勞煬帝改為光禄大夫左右光禄大夫左右金紫光禄大夫銀青光禄大夫正議大夫朝議大夫建節尉奮武尉宣惠尉十一等以代都督以上又増置綏徳懐仁守義奉誠立信等五尉以至従九品唐職官志武徳七年頒領定用上柱國柱國上䕶軍䕶軍上輕車都尉輕車都尉驍騎尉飛騎尉雲騎尉武騎尉凡十二等起正二品至七品為勲官五代初敘勲即授柱國國朝勲官自上柱國至武騎尉凡十二品等率因舊制凡賜勲者皆以制勅授之司勲給告身淳化元年詔自今京官幕職州縣官始武騎尉朝官始騎都尉歴級而進内殿崇班初授則騎都尉三班及軍員吏職並初授武騎尉治平三年文官常參官與為父後見任官者勲賜一轉以立今上為皇太子也元祐令上柱國至武騎尉為勲官上柱國柱國史記楚懐王使柱國昭陽將兵攻齊陳軫問楚國之法破軍殺將者何以貴之昭陽曰其官為柱國封上執圭軫曰其有貴於此乎曰令尹前漢書項羽入秦以楚懐王柱國共敖為臨江王應劭曰柱國上卿官也後魏孝莊以爾朱榮有翊戴之功拜為柱國大將軍位在丞相上又拜大丞相天柱大将軍增左吏及榮敗此官遂廢天柱之名尊榮莫二昔王莽末劉伯升起兵自號天柱大將軍都督諸軍事至大統中始以宇文泰為柱國大將軍其後功參佐命聲實俱重者亦居此職自大統十六年以前任者凡有八人時宇文泰任總百揆督中外軍事元欣以魏氏懿戚從容禁闥而已其餘六人各督二人將軍凡十二人元欣為大將軍當時榮盛莫與為比其稱門閥者咸推八柱國家其後功臣位至柱國者衆矣咸是散秩無統御也隋職官志後周建徳四年增置上柱國大將軍隋置上柱國以酬勲勞並為散官不理事煬帝大業三年改上柱國以下官為大夫唐職官志上柱國柱國並為勲官五代史後唐天成五年詔論官爵階勲四等之極自武騎尉經十二轉至上柱國國朝元祐令上柱國正二品柱國從二品勲徳隆重後周書詔曰諸柱國等勲徳隆重而未有優崇各准别制邑户聽寄食他邑邑户寄食他邑上公主為李敏求柱國隋書李敏美姿容善騎射開皇初周宣後樂平公生有女娥英廣擇婚對敕貴公子弟集𢎞聖宫者以百數公主先取李敏禮儀如常及後將侍燕公主謂敏曰我以天下為尊惟一女夫當為求柱國若授餘官慎無謝及進見上親御琵琶遣敏舞大悦公主曰敏何官對曰一白丁耳上謂敏可授儀同敏不荅上曰不滿爾意耶令授開府又不謝上曰公主有大功於我敏乃拜而蹈舞以主前詔授柱國購陳叔寳文帝伐陳詔購陳叔寳位上柱國萬户公會與父齊列楊𤣥感以父素軍功位至柱國與其父俱為第二品朝會則齊列後文帝乃命𤣥感降一等𤣥感拜謝曰不意陛下寵臣之甚許以公庭獲展私敬相不過柱國文帝常遇善相者未知是帝對曰不過柱國既而私謂帝曰公當為天下君必大誅而後定門立㦸唐勲至上柱國賜門立㦸授者三人劉仁軌伐新羅進爵為公子及兄弟子上柱國三人州黨榮之號所居為樂城鄉三柱里三柱里上上䕶軍䕶軍前漢百官表䕶軍都尉秦官高帝時以陳平為䕶軍中尉元狩四年以䕶軍都尉屬大司馬哀帝元壽元年更名司冦後漢書班固為大將軍中䕶軍𨽻將軍幕府非漢朝列職魏志武帝為丞相以韓浩為䕶軍史奐為領軍建安十二年改䕶軍為中䕶軍領軍為中領軍魏初因置䕶軍主武官選𨽻通典歴代史籍皆云䕶軍將軍主武官選則領軍無主選之文唯陶藻職官要録云領軍將軍主武官選舉而䕶軍不言主選又引曹昭叔述孝敘曰余年三十選中領軍總六軍之要秉選舉之機以此為證又按漢高帝初以陳平為䕶軍中尉今已主武官矣故有受金讒又魏畧曰䕶軍之官總有諸將主武官選前後當此官者不能止貨賂故蔣濟為䕶軍時有語曰欲求牙門當得千匹五百人督得五百匹司馬宣王與濟善聞此聲以問濟濟無以解之及夏𤣥代濟故不能上絶人事及晉景帝代𤣥為中䕶軍整頓發分人莫敢犯者又王隠晉書曰景帝為中䕶軍作選用之法舉不越次吏無私焉又晉起居注云武帝詔曰中䕶軍職典戎選宜得幹才遂以羊琇為之宋志又云主武官選按此則䕶軍主選明矣而陶藻所言領軍主選及昭叔之叙者當因省併之際為一時之權宜非歴代之常制晉江右領䕶各領營兵江左以來領軍不復别置營總管二衛驍騎材官諸營䕶軍猶别有營也周顗庾亮王善之謝安王彪之等並為䕶軍皇甫謐集䕶軍武者之官也宋䕶軍將軍一等掌外軍領䕶資重者為領軍將軍䕶軍將軍資輕者為中領軍中䕶軍其官屬有長史司馬功曹主簿五官受命出征則置參軍隋百官志齊梁陳並有䕶軍北齊䕶軍府統四中郎將皆置佐史隋帝十二衛置䕶軍四人以副將軍將軍無則一人攝尋改䕶軍為虎賁郎將唐採前代舊名置上䕶軍䕶軍為勲官國朝元祐令上䕶軍正三品䕶軍從三品觀上風采東觀漢記朱祐為䕶軍謂光武曰長安王公頭有日角之相欲觀上風采吾安可以無䕶軍魏志韓浩以忠勇顯為中䕶軍掌禁兵置長史司馬從太祖討張魯降議者以浩智畧足以綏邉欲畱使都督諸軍太祖曰吾安可以無䕶軍乃令與俱其見信如此臨䕶軍教晉書王羲之臨䕶軍教今所任委在於公役均平其差人吏謹在公者覆行諸營家至人告暢吾之心其病老篤疾不堪從役或有饑寒之危不能自存者區分處别自當參詳其宜也不得志王僧逹自負才地謂當時不及上初薦位即居端右一二年間便望宰相及為䕶軍不得志矣同滅王敦王隠晉書王敦將叛逆明帝問曰何如應詹厲然慷慨荅曰陛下宜奮赫斯之怒臣等當負戈從戎以順討逆誠社稷之計也即日以詹為䕶軍將軍因以滅敦職不宜曠何兖解領䕶軍事表曰臣忝臺司運臺内外事異不宜領攝詔曰朕知卿意然䕶軍職不宜曠矣微䕶軍不聞斯言蔣濟為䕶軍將軍景初中外勤征役内務宫室怨曠者多而年穀饑儉上䟽諫詔曰微䕶軍吾不聞斯言也待之若一鄧攸遷吏部尚書疏食敝衣周急振乏性謙和善與人交賔客無貴賤待之若一永昌中為䕶軍將軍豈可以趙冰為之王遵將以趙冰為䕶軍孔愉謂遵曰中興以來處此官者用周伯仁應思逺今誠乏材豈可以趙冰為之其秉政不撓皆此類㧞用武官無非俊傑世語夏侯𤣥世名知人為䕶軍㧞用武官無非俊傑多牧州典邵功臣唐徳宗興元元年大赦天下應赴奉天并進收京城壯士並賜名奉天定難功臣國朝修唐制宰相樞宻使初拜必賜為參知政事樞宻副使初或未賜遇加恩乃有之刺史以上階勲高者亦或得賜太平興國三年賜翰林院饒州防禦使杜彦鈞推忠宣力大中祥符賜豊州防禦使王承美翊戴天禧二年賜富州刺史向漢通保順中書樞宻則有推忠恊謀同徳佐理餘官則推誠保徳奉義翊戴掌兵則忠果雄勇外臣則純誠順化之名每二字恊意或因取為美稱宰相初加即六字餘並四字其進加則二字或四字多者有至十餘字天聖八年賜趙得明功臣凢二十字國家綏寵外臣非常數也又有崇仁佐運守正忠亮保順宣徳忠正保節宣忠亮節之號文武迭用焉中書樞宻院所賜名若罷免或出鎮則改之亦有不改者乾徳二年范質王溥魏仁浦罷相淳化二年吕蒙正罷相太平興國八年石熙載罷樞宻使大中祥符八年冦凖罷樞宻使皆不改賜功臣又有官不當賜而特賜者開保四年秘書少監韶州刺史王明太平興國八年度支使陳信從户部使郝正並賜推誠翼戴其諸班直禁軍將校則賜拱衛翊衛衛聖號遇恩累加但使改其名不過兩字其因舊名而始被賜及縁功寵而别為美名者咸畧記其人又國初功臣有扶天保慶致理竭忠輸誠効義忠力効忠毅勇保塞之號皆漢周時所賜今亦不録推忠佐理建隆二年以此四字賜趙普推誠奉義建隆二年賜王景惟誠奉義同徳翊戴太平興國初或改奉義為奉國同徳翊戴上守正保徳建徳二年賜皇弟推忠守正保徳恊謀乾徳元年賜趙普推忠恊謀佐理保順乾徳元年賜皇弟恊謀同徳保順宣力乾徳元年賜李崇矩推忠宣力保義賜宋廷握推忠宣力保義賜張永徳等推忠保義太平興國元年改為保順効節乾徳元年賜王全徳推忠効節恊力乾徳元年賜高懐徳推忠恊力保順順化乾徳元年賜陳進推誠順化承家保國宣徳守道忠正正字犯仁宗名恭順乾徳元年以此十二字賜吳越王錢俶崇仁乾徳元年賜符彦卿崇仁昭徳宣忠保正翊亮昭徳宣忠保正翊亮順徳正亮開保元年賜王彦超推誠奉義順徳翊戴正亮正字犯仁宗廟諱佐運開寳四年賜曹彬李進卿党位等推誠佐運同徳宣力奉節開寳四年賜皇子徳昭推誠奉節同徳保順順節開寳四年賜陳洪進推誠順節保正翊戴保節開寳四年賜李重勲推忠保節宣力効忠開寳四年賜白進超効忠宣力開吳鎮越崇文耀武宣徳守道開寳五年以此十二字賜錢俶守節開寳六年賜高麗王昭推誠宣化守節保義輸誠開寳六年賜孟元詰輸誠保義翊戴奉國開寳六年賜伊審徵焦繼勲䖍裕推誠奉國翊戴翊誠奉化太平興國五年以此四字賜𤓰涉州曹延禄承天懐忠太平興國七年賜皇子衛王徳崇承天佐運懐忠守正寧淮鎮海太平興國三年賜寧准鎮海崇文耀武宣徳守道寧江鎮國雍熙元年賜漢南國王錢俶寧江鎮國崇丈耀武宣徳守道保運忠正雍熙元年賜皇子陳王崇仁保運忠正安時端拱元年賜漢南國王錢俶安時鎮國崇文耀武宣徳守道佐運淳化三年賜趙興邦佐運同徳翊戴忠正効順至道三年賜趙保吉推忠効順亮節景徳三年賜趙徳明推忠保順亮節翊戴忠亮天禧三年賜王欽若推誠保徳崇仁忠亮翊戴恊恭昭順天聖二年賜楚王元佐推誠恊恭昭順同徳崇仁宣忠亮節守正保運翊戴純誠乾興元年賜趙徳明推忠宣徳崇仁保順純誠亮節恊恭賛治佐運守正翊戴經邦天聖二年賜王欽若推忠恊謀同徳守正佐理經邦賛治天聖八年賜趙徳明推忠宣徳崇仁保順純誠亮節恊恭賛治佐運守正翊戴體仁熙寜七年賜皇子永國公俊體仁保運同徳宣