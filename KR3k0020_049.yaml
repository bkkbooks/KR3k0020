body:
  text: 職官分紀卷四十九宋孫逢吉撰文散官隋以開府儀同三司特進光祿大夫左右光祿大夫朝議朝散正議通議朝請大夫朝議郎以下並為文散官唐因之國朝開府儀同三司特進光祿大夫金紫光祿大夫銀青光祿大夫正奉大夫通奉大夫太中大夫中大夫中散大夫朝議大夫朝散大夫朝奉大夫承直郎通直郎朝請郎宣德郎朝散郎宣義郎給事郎承事郎承奉郎承務郎儒林郎登仕郎將仕郎為文散官元祐令開府儀同三司為使相特進至承務為寄祿官武散官隋百官志高祖有翊軍等四十三號將軍品凡十六等為散號將軍以加泛授居曹有職務者為執事官無職務者為散官煬帝八尉四十三號將軍官皆罷之置建節奮武宣惠綏德懷仁守義奉誠立信等八尉以為散職唐職官志輔國鎮軍二大將軍冠軍雲麾忠武壯武宣威明威信逺遊騎擊十將軍為散號將軍以加武士之無職者武德十一年更置驃騎大將軍為從一品武散官輔國鎮軍二大將軍為從二品武散官冠軍將軍加大字及雲麾以下遊擊以上改為五品以上武散官又置昭武振威致果翊麾宣節御武仁勇陪戎八校尉各有副尉為六品以下武散官國朝驃騎輔國正國冠軍懷化五將軍忠武壯武宣威明威定逺寧逺遊騎遊擊將軍昭武鎮威致果翊麾宣節御侮仁勇陪戎八尉校各有副尉為散官元祐令皆省勳官隋百官志文帝因周制更增損之有上柱國上大將軍大將軍上開府儀同三司開府儀同三司上儀同三司儀同三司大都督帥都督帥起正二品至正七品總十一等用賞勳勞煬帝改為光祿大夫左右光祿大夫左右金紫光祿大夫銀青光祿大夫正議大夫朝議大夫建節尉奮武尉宣惠尉十一等以代都督以上又增置綏德懷仁守義奉誠立信等五尉以至從九品唐職官志武德七年頒領定用上柱國柱國上護軍護軍上輕車都尉輕車都尉驍騎尉飛騎尉雲騎尉武騎尉凡十二等起正二品至七品為勳官五代初敘勳即授柱國國朝勳官自上柱國至武騎尉凡十二品等率因舊制凡賜勳者皆以制敕授之司勳給告身淳化元年詔自今京官幕職州縣官始武騎尉朝官始騎都尉歷級而進內殿崇班初授則騎都尉三班及軍員吏職並初授武騎尉治平三年文官常參官與為父後見任官者勳賜一轉以立今上為皇太子也元祐令上柱國至武騎尉為勳官上柱國柱國史記楚懷王使柱國昭陽將兵攻齊陳軫問楚國之法破軍殺將者何以貴之昭陽曰其官為柱國封上執圭軫曰其有貴於此乎曰令尹前漢書項羽入秦以楚懷王柱國共敖為臨江王應劭曰柱國上卿官也後魏孝莊以爾朱榮有翊戴之功拜為柱國大將軍位在丞相上又拜大丞相天柱大將軍增左吏及榮敗此官遂廢天柱之名尊榮莫二昔王莽末劉伯升起兵自號天柱大將軍都督諸軍事至大統中始以宇文泰為柱國大將軍其後功參佐命聲實俱重者亦居此職自大統十六年以前任者凡有八人時宇文泰任總百揆督中外軍事元欣以魏氏懿戚從容禁闥而已其餘六人各督二人將軍凡十二人元欣為大將軍當時榮盛莫與為比其稱門閥者咸推八柱國家其後功臣位至柱國者衆矣咸是散秩無統御也隋職官志後周建德四年增置上柱國大將軍隋置上柱國以酬勳勞並為散官不理事煬帝大業三年改上柱國以下官為大夫唐職官志上柱國柱國並為勳官五代史後唐天成五年詔論官爵階勳四等之極自武騎尉經十二轉至上柱國國朝元祐令上柱國正二品柱國從二品勳德隆重後周書詔曰諸柱國等勳德隆重而未有優崇各準别制邑户聽寄食他邑邑户寄食他邑上公主為李敏求柱國隋書李敏美姿容善騎射開皇初周宣後樂平公生有女娥英廣擇婚對敕貴公子弟集𢎞聖宫者以百數公主先取李敏禮儀如常及後將侍燕公主謂敏曰我以天下為尊惟一女夫當為求柱國若授餘官慎無謝及進見上親御琵琶遣敏舞大悅公主曰敏何官對曰一白丁耳上謂敏可授儀同敏不答上曰不滿爾意耶令授開府又不謝上曰公主有大功於我敏乃拜而蹈舞以主前詔授柱國購陳叔寶文帝伐陳詔購陳叔寶位上柱國萬户公會與父齊列楊玄感以父素軍功位至柱國與其父俱為第二品朝會則齊列後文帝乃命玄感降一等玄感拜謝曰不意陛下寵臣之甚許以公庭獲展私敬相不過柱國文帝常遇善相者未知是帝對曰不過柱國既而私謂帝曰公當為天下君必大誅而後定門立戟唐勳至上柱國賜門立戟授者三人劉仁軌伐新羅進爵為公子及兄弟子上柱國三人州黨榮之號所居為樂城鄉三柱里三柱里上上護軍護軍前漢百官表護軍都尉秦官高帝時以陳平為護軍中尉元狩四年以護軍都尉屬大司馬哀帝元壽元年更名司冦後漢書班固為大將軍中護軍𨽻將軍幕府非漢朝列職魏志武帝為丞相以韓浩為護軍史奐為領軍建安十二年改護軍為中護軍領軍為中領軍魏初因置護軍主武官選𨽻通典歷代史籍皆云護軍將軍主武官選則領軍無主選之文唯陶藻職官要録云領軍將軍主武官選舉而護軍不言主選又引曹昭叔述孝敘曰余年三十選中領軍總六軍之要秉選舉之機以此為證又按漢高帝初以陳平為護軍中尉今已主武官矣故有受金讒又魏略曰護軍之官總有諸將主武官選前後當此官者不能止貨賂故蔣濟為護軍時有語曰欲求牙門當得千匹五百人督得五百匹司馬宣王與濟善聞此聲以問濟濟無以解之及夏玄代濟故不能上絶人事及晉景帝代玄為中護軍整頓發分人莫敢犯者又王隱晉書曰景帝為中護軍作選用之法舉不越次吏無私焉又晉起居注云武帝詔曰中護軍職典戎選宜得幹才遂以羊琇為之宋志又云主武官選按此則護軍主選明矣而陶藻所言領軍主選及昭叔之敘者當因省併之際為一時之權宜非歷代之常制晉江右領護各領營兵江左以來領軍不復别置營總管二衛驍騎材官諸營護軍猶别有營也周顗庾亮王善之謝安王彪之等並為護軍皇甫謐集護軍武者之官也宋護軍將軍一等掌外軍領護資重者為領軍將軍護軍將軍資輕者為中領軍中護軍其官屬有長史司馬功曹主簿五官受命出征則置參軍隋百官志齊梁陳並有護軍北齊護軍府統四中郎將皆置佐史隋帝十二衛置護軍四人以副將軍將軍無則一人攝尋改護軍為虎賁郎將唐採前代舊名置上護軍護軍為勳官國朝元祐令上護軍正三品護軍從三品觀上風采東觀漢記朱祐為護軍謂光武曰長安王公頭有日角之相欲觀上風采吾安可以無護軍魏志韓浩以忠勇顯為中護軍掌禁兵置長史司馬從太祖討張魯降議者以浩智略足以綏邉欲留使都督諸軍太祖曰吾安可以無護軍乃令與俱其見信如此臨護軍教晉書王羲之臨護軍教今所任委在於公役均平其差人吏謹在公者覆行諸營家至人告暢吾之心其病老篤疾不堪從役或有飢寒之危不能自存者區分處别自當參詳其宜也不得志王僧逹自負才地謂當時不及上初薦位即居端右一二年間便望宰相及為護軍不得志矣同滅王敦王隱晉書王敦將叛逆明帝問曰何如應詹厲然慷慨答曰陛下宜奮赫斯之怒臣等當負戈從戎以順討逆誠社稷之計也即日以詹為護軍將軍因以滅敦職不宜曠何兖解領護軍事表曰臣忝臺司運臺內外事異不宜領攝詔曰朕知卿意然護軍職不宜曠矣微護軍不聞斯言蔣濟為護軍將軍景初中外勤征役內務宫室怨曠者多而年穀飢儉上疏諫詔曰微護軍吾不聞斯言也待之若一鄧攸遷吏部尚書疏食敝衣周急振乏性謙和善與人交賔客無貴賤待之若一永昌中為護軍將軍豈可以趙冰為之王遵將以趙冰為護軍孔愈謂遵曰中興以來處此官者用周伯仁應思逺今誠乏材豈可以趙冰為之其秉政不撓皆此類拔用武官無非俊傑世語夏侯玄世名知人為護軍拔用武官無非俊傑多牧州典邵功臣唐德宗興元元年大赦天下應赴奉天并進收京城壯士並賜名奉天定難功臣國朝修唐制宰相樞密使初拜必賜為參知政事樞密副使初或未賜遇加恩乃有之刺史以上階勳高者亦或得賜太平興國三年賜翰林院饒州防禦使杜彥鈞推忠宣力大中祥符賜豐州防禦使王承美翊戴天禧二年賜富州刺史向漢通保順中書樞密則有推忠協謀同德佐理餘官則推誠保德奉義翊戴掌兵則忠果雄勇外臣則純誠順化之名每二字協意或因取為美稱宰相初加即六字餘並四字其進加則二字或四字多者有至十餘字天聖八年賜趙得明功臣凡二十字國家綏寵外臣非常數也又有崇仁佐運守正忠亮保順宣德忠正保節宣忠亮節之號文武迭用焉中書樞密院所賜名若罷免或出鎮則改之亦有不改者乾德二年范質王溥魏仁浦罷相淳化二年吕蒙正罷相太平興國八年石熙載罷樞密使大中祥符八年冦凖罷樞密使皆不改賜功臣又有官不當賜而特賜者開保四年祕書少監韶州刺史王明太平興國八年度支使陳信從户部使郝正並賜推誠翼戴其諸班直禁軍將校則賜拱衛翊衛衛聖號遇恩纍加但使改其名不過兩字其因舊名而始被賜及緣功寵而别為美名者咸略記其人又國初功臣有扶天保慶致理竭忠輸誠效義忠力效忠毅勇保塞之號皆漢周時所賜今亦不録推忠佐理建隆二年以此四字賜趙普推誠奉義建隆二年賜王景惟誠奉義同德翊戴太平興國初或改奉義為奉國同德翊戴上守正保德建德二年賜皇弟推忠守正保德協謀乾德元年賜趙普推忠協謀佐理保順乾德元年賜皇弟協謀同德保順宣力乾德元年賜李崇矩推忠宣力保義賜宋廷握推忠宣力保義賜張永德等推忠保義太平興國元年改為保順效節乾德元年賜王全德推忠效節協力乾德元年賜高懷德推忠協力保順順化乾德元年賜陳進推誠順化承家保國宣德守道忠正正字犯仁宗名恭順乾德元年以此十二字賜吳越王錢俶崇仁乾德元年賜符彥卿崇仁昭德宣忠保正翊亮昭德宣忠保正翊亮順德正亮開保元年賜王彥超推誠奉義順德翊戴正亮正字犯仁宗廟諱佐運開寶四年賜曹彬李進卿黨位等推誠佐運同德宣力奉節開寶四年賜皇子德昭推誠奉節同德保順順節開寶四年賜陳洪進推誠順節保正翊戴保節開寶四年賜李重勳推忠保節宣力效忠開寶四年賜白進超效忠宣力開吳鎮越崇文耀武宣德守道開寶五年以此十二字賜錢俶守節開寶六年賜高麗王昭推誠宣化守節保義輸誠開寶六年賜孟元詰輸誠保義翊戴奉國開寶六年賜伊審徵焦繼勳虔裕推誠奉國翊戴翊誠奉化太平興國五年以此四字賜瓜涉州曹延祿承天懷忠太平興國七年賜皇子衛王德崇承天佐運懷忠守正寧淮鎮海太平興國三年賜寧準鎮海崇文耀武宣德守道寧江鎮國雍熙元年賜漢南國王錢俶寧江鎮國崇丈耀武宣德守道保運忠正雍熙元年賜皇子陳王崇仁保運忠正安時端拱元年賜漢南國王錢俶安時鎮國崇文耀武宣德守道佐運淳化三年賜趙興邦佐運同德翊戴忠正效順至道三年賜趙保吉推忠效順亮節景德三年賜趙德明推忠保順亮節翊戴忠亮天禧三年賜王欽若推誠保德崇仁忠亮翊戴協恭昭順天聖二年賜楚王元佐推誠協恭昭順同德崇仁宣忠亮節守正保運翊戴純誠乾興元年賜趙德明推忠宣德崇仁保順純誠亮節協恭贊治佐運守正翊戴經邦天聖二年賜王欽若推忠協謀同德守正佐理經邦贊治天聖八年賜趙德明推忠宣德崇仁保順純誠亮節協恭贊治佐運守正翊戴體仁熙寧七年賜皇子永國公俊體仁保運同德宣