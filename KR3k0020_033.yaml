body:
  text: 職官分紀卷三十三宋孫逢吉撰總將軍周禮夏官大司馬凡制軍萬有二千五百人一鄉之民也凡起徒役家人也一王六軍六卿之數大國三軍公侯之封次國二軍諸伯之封小國一軍子男之封軍將皆命卿位視六事之人同于六軍之大夫也春秋之將列國有以正卿為將軍又以亞卿一人為佐用執政者貪其權以陵遲皆非周公之舊也左傳襄公十三年晉侯搜于綿上以治兵使士丐將中軍辭曰伯遊長昔臣習於知伯是以佐之非能賢也請從伯遊荀偃將中軍士丐佐之使韓起將上軍辭以趙武史記齊景公召穰苴與語大悅以為將軍將兵扞燕文帝後六年胸奴入上郡周亞夫為將軍居細栁宗正劉禮為將軍居霸上祝兹侯徐厲軍棘門以備胡十萬之軍無必亂尹子十萬之軍無將軍必亂斬莊賈以徇三軍史記齊景公以司馬穰苴為將軍苴曰臣素卑賤君擢之伍之中加之大夫之上士卒未附百姓不信人微權輕願得君之寵臣國之所尊以監軍景公許之使莊賈往穰苴與莊賈約曰日中會於軍門穰苴先馳至軍立表下漏待賈賈素驕貴不甚急親戚左右送之留飲日中賈不至穰苴則仆表次漏入行軍約束既定賈至苴曰將受命之日則忘其家臨軍約束則忘其親援抱鼓之急則忘其身召軍正問曰軍法後時者云何對曰當斬遂斬莊賈以徇三軍斬愛姬孫武以兵法見於吳王闔閭曰可以小試勒兵乎對曰可也闔閭曰可試以婦人乎曰可許出宫中美女百八十人孫子分為二隊王之寵姬二人各為隊長皆令持戟令曰汝知心與左右手背乎曰知孫子曰前則視心左視左手右視右手後視背婦人曰諾設鈇鉞三令五申鼓之婦人大笑乃斬左右隊長吳王臺上見斬愛姬曰吾非兩人不食曰已斬訖乃使下令曰寡人知將軍能用兵矣休就舍也死綏魏志太祖令曰司馬法將軍死綏綏却也有前一尺無却一寸曉暢軍事蜀諸葛亮出師表曰將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督愚以營中之事悉以咨之必能使行陳和睦優劣得所也大將軍上大將軍上將軍附後漢書靈帝時望氣者以為京師當有大兵兩宫流血大將軍司馬許涼説何進曰太公六韜有天子兵事可以威厭四方詔進大發兵講武於平樂觀下起大壇上建十二重五采華蓋十丈壇東北為小壇復建九重華蓋九丈列步兵騎士數萬人結營為陳天子親出臨軍駐大華蓋下進駐小華蓋下禮畢帝躬擐甲上馬稱無上將軍行陳三匝而還後漢百官志將軍不常置本注曰掌征伐背叛比公者品第一大將軍蔡質漢儀曰漢興置大將軍位次丞相初武帝以衛青數征伐有功以為大將軍欲尊寵之以古尊官惟三公皆將軍始自秦晉以為卿號故置大司馬官號以冠之其後霍光王鳯等皆然成帝綏和元年賜大司馬印綬罷將軍官世祖中興吳漢以大將軍為大司馬景丹為驃騎大將軍位在公下和帝即位以舅竇憲為車騎將軍征丐奴位在公下還復有功遷大將軍位在公上復征西羌還免官罷安帝即位西羌寇亂復以舅鄧隲為車騎將軍征之還遷大將軍位如憲數年復罷自安帝政治廢缺始以嫡舅耿寶為大將軍常在京都順帝即位又以皇后父兄弟相繼為大將軍如三公焉梁兾别傳日元嘉二年又加兾禮儀大將軍朝到端門若龍門謁者將引增掾屬舍人令史官騎鼓吹各十人長史司馬皆一人千石東觀書曰憲作大將軍置長史司馬員吏官屬位次太傅本注曰司馬主兵如太尉從事中郎二人六百石本注曰職參謀議東觀書曰大將軍出征置中護軍一人掾屬二十九人令史及御屬三十一人本注曰此皆府員職也續漢志大將軍營有五部部三校尉部下有曲曲有軍候一人韋昭辨釋名大將軍將軍之大者位在公上應劭漢官儀和帝以竇憲為大將軍乃冠三公魏志黃初中車騎將軍曹仁為大將軍明帝青龍三年以大將軍司馬宣王為太尉通典魏黃初中始有上大將軍以曹真為之吳亦以陸遜為上將軍晉職官志大將軍古官也漢武帝置冠以大司馬名為崇重之職及漢東京不常置為之者皆擅朝權至景帝為大將軍亦受非常之任後以叔父孚為太尉改大將軍在太尉下及晉受命猶依其制位次三司下後復在三司上太康元年琅邪王胄遷大將軍復制在三司下胄薨復如舊大將軍開府位從公者為武官著武冠平上黑幘宋百官志大將軍一人凡將軍皆掌征伐周制王立六軍晉獻公作二軍公將上軍將軍之名起於此也楚懷王遣三將入關宋義為上將漢高祖以韓信為大將軍漢西京以大司馬冠之漢東京大將軍自為一官位在三司上魏明帝青龍二年晉宣帝自大將軍為太尉然則大將軍在三司下矣其後又在三司上晉景帝為大將軍而景帝叔父孚為太尉奏改大將軍在太尉下後復舊南齊書百官志大將軍宋元嘉用彭城王義康為之後無人齊以為贈隋百官志梁武受命多循齊舊陳承梁大將軍以為贈後齊制官多循後魏大司馬大將軍是為二大並典司武事後周建德四年增置上大將軍隋高祖採後周之制置上大將軍並為散官不理事上大將軍從二品大將軍正三品煬帝十二衛各置大將軍一人將軍二人總府事并統諸鷹揚府唐職官志高祖貞觀十一年改上大將軍為上護軍大將軍為護軍十六衛軍十六衛左右衛等大將軍各一人正三品貞元二年詔六軍先已置統軍各一人今十六衛宜置上將軍一人秩從二品由是始列於品位封子三人為侯前漢丐奴大入邉衛青將三萬騎出高闕丐奴右賢王飲醉漢兵夜圍之右賢走青得右賢禆王十餘人而還拜青為大將軍益封八千七百户而封青子三人俱為侯青固謝曰軍大捷皆諸校力戰之功也臣青子在襁褓中未有勤勞為三侯何敢受上曰朕非忘諸校功也乃詔封公孫敖等不斬禆將丐奴入代大將軍衛青出定襄右將軍蘇建獨逢單于與戰盡亡其軍獨以身得亡自歸責青問軍正軍正曰自大將軍出未嘗斬禆將今建棄軍可斬以明將軍之威青不敢自擅専誅於境外遂囚建詣行在有揖客汲黯為主爵都尉列于九卿遷右內史時大將軍衛青既益尊姊為皇后然黯與抗禮或説黯不可不拜黯曰夫以大將軍有揖客反不重耶青聞之愈賢黯圖形麒麟閣宣帝甘露三年上思股肱之美乃圖畫大將軍霍光衛將軍張安世車騎將軍韓增後將軍趙充國丞相魏相丞相丙吉御史大夫杜延年宗正劉德少府梁丘賀太子太傅蕭望之典屬國蘇武等十一人於麒麟閣皆以有功德知名當世是以表而揚之繪其形貌署其官爵姓名唯霍光不名焉陳賜金於廊廡竇嬰字王孫孝景時吳楚及上察諸竇無如嬰賢乃拜嬰為大將軍賜金千斤嬰以所賜金陳廊廡下軍吏過輒令裁取為用金無入家者威震天下後漢竇憲為大將軍威震天下復出屯武威會帝西祠園陵詔憲與車駕會長安及憲至尚書以下議欲拜之伏稱萬嵗韓稜正色曰夫上交不諂下交不瀆禮無為人臣稱萬嵗之制議者皆慙而止至尊重前漢蘇建嘗責大將軍至尊重而天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賔客天子常切齒彼親待士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士驃騎亦方此意與士卒有功淮南王安陰有邪謀召伍被計事曰公以為大將軍何如人也被曰臣所善黃義從大將軍擊丐奴言大將軍遇士大夫以禮與士卒有恩衆皆樂為用騎上下山如飛神力絶人如此數將習兵未易當也及謁者曹梁使長安來言大將軍號令明當敵勇常為士卒先及士卒休乃舍穿井得水乃敢飲軍罷士卒已踰河乃渡皇太后所賜金錢盡以賞賜雖古名將不過也鎮撫四夷漢武柏梁臺詩大將軍曰鎮撫四夷不易哉政事一決武帝以霍光為大將軍輔昭帝車千秋為丞相及昭帝初即位未任聼政政事臺決大將軍光光謂千秋曰始與君侯俱受遺詔今光治內君侯治外宜有以教督使光無負天下千秋曰惟將軍留意即天下幸甚終不肯有言自置偏禆後漢光武加耿弇父況為大將軍得自置偏禆耿氏與漢興衰耿氏自中興以後迄建安之末大將軍二人將軍九人卿十三人尚公主三人列侯十九人中郎將護羌校尉及刺史二千石數十百人與漢興衰位在太傅下三公上竇憲班師還拜大將軍位在三公下置官屬依太尉憲威權震朝廷公卿希旨奉憲位在太傅下三公上若一敵國前漢劇孟洛陽人也周人以啇賈為資而劇孟任俠顯吳楚反時條侯為太尉乘傳東將至河南得劇孟喜曰吳楚舉大事而不求劇孟吾知其無能為也天下騷動大將軍得之若一敵國梁冀上比周霍應劭漢官梁冀為大將軍以三世姻婭援立之功公卿希旨上比周霍官屬倍餘府加九錫魏文帝以孫權為大將軍吳王加九錫君為周勃太傅司馬宣王奏免曹爽皇太后詔高文惠假節行大將軍事據爽營太傅謂之曰君為周勃矣納言左右陳思王輔臣論智慮深奧淵然難測恭以奉上愛以接下納言左右為帝唯曹大將軍也清嘯解圍晉書劉琨為并州都督拜大將軍在晉陽嘗為胡騎所圍數重城中窘迫無計琨乃秉月登樓清嘯賊聞之皆悽然長嘆中夜奏胡笳賊又流涕歔欷有懷土之思向曉復吹之賊並棄圍而走牙旗折成都王穎以陸機參大將軍軍事太安初穎與河間王起兵討長沙王又假機後將軍河北大都督督王粹等諸軍二十餘萬機以羈旅入官頻居羣士之右固辭不可機始臨戎而牙旗折意甚惡之列軍自朝歌至于河橋鼓聲聞數百里漢魏以來出師之盛未嘗有也長沙王又奉天子與機戰于鹿苑機軍大敗初宦人孟玖弟超並為穎所嬖寵超領萬人為小都督未戰縱兵大掠機録其至者超將鐵騎百餘人直入機麾下奪之謂機曰貉奴能作督乎機司馬孫拯勸機殺之機不能用超宣言於衆曰陸機能反又還書與玖言機持兩端及戰超不受機節度輕兵獨進而沒玖疑機殺之遂譛機于穎言有異志將軍王聞等皆玖所用共證之穎大怒使收機遂遇害于軍中臨刑而嘆曰莘亭鶴唳豈可復闈乎機既死非其罪士卒痛之莫不流涕是日昏霧畫合大風折木平地尺雪議者以為陸氏之寃機之敗也弟雲亦被誅及東海王越之討頴亦以機雲兄弟枉害罪狀移檄天下觸琳琅與珠玉見太尉門設壇拜韓信前漢高祖欲召韓信拜大將何曰王討必東能用信信即留不然信亡王曰以為大將何曰幸甚王素嫚無禮今拜大將如兒戲耳此信所以去也王必欲拜擇良日齋戒設壇具禮乃可王許之諸將皆喜人人自以為得大將至拜乃信一軍皆驚信已拜上坐王曰丞相數言將軍將軍何以教寡人計䇿信謝因言大王入武關秋毫無所害除秦苛法與民約法三章耳秦民無不欲得大王王秦者大王當王關中漢王大喜以得信晚驃騎將軍前漢書武帝以霍去病為票姚校尉征丐奴纍有功寵冠羣臣始置驃騎將軍秩與大將軍同後漢百官志將軍不常置驃騎將軍位次丞相世祖中興景丹為驃騎大將軍位在公下明帝初即位以弟東平王蒼有賢才以為驃騎將軍以王故位在公上數年後罷有長史司馬各一人漢書百官表注驃騎將軍漢官也長史司馬各一人金章紫綬五時朝服武冠佩山玄玉光武中興諸將皆稱大後天下既定武官悉省東觀漢記其將軍不常置比公者又為驃騎將軍建武二十年復置驃騎將軍位次公有長史一人魏志明帝以大將軍司馬宣王為驃騎大將軍晉職官志驃騎以下及諸大將軍不開府非持節都督者品秩第二其祿與特進同置長史司馬各一人秩千石主簿功曹史門下督録事兵鎧士賊曹營軍刺姦帳下都督功曹書佐門吏門下書吏各一人宋百官志驃騎將軍一人漢武元狩二年始用霍去病為之漢西京置大將軍驃騎將軍位次丞相南齊百官志驃騎車騎衛鎮軍中軍撫軍四征四鎮將軍凡諸將軍加大字位從公開府儀同如公凡公督府置佐長史司馬各一人咨議參軍二人諸曹有録事記室户曹倉曹中直兵外兵騎兵長流賊曹城局法曹田曹水曹鎧曹集曹右户十八曹局曹以上署正參軍法曹以下署行參軍各一人其行參軍與署者為長兼員其府佐使則從事中郎二人倉曹掾户曹屬東西閣祭酒各一人主簿舍人御屬二人加崇者則左右長史四人中郎掾屬並增數其未及開府則置府亦有佐史其數有減小府無長流置禁防參軍隋百官志梁陳皆循齊舊後齊有驃騎車騎衛四鎮四安等將軍以褒賞勳庸驃騎車騎將軍二將軍加大者在開國羣公下後周驃騎大將軍開府儀同三司建德四年改為開府儀同大將軍仍增置上開府儀同大將軍九命驃騎將軍正八命隋驃騎將軍正四品煬帝改驃騎為鷹揚郎將正五品唐職官志驃騎大將軍武散官從一品票姚前漢武帝以霍去病為票姚校尉服虔音飄搖徑疾之貌荀恱漢記作票鷂字去病後為驃騎將軍尚取票姚之字爾今讀者音飄搖則不當其義也太守郊迎去病為驃騎將軍過河東太守郊迎負弩矢前驅衛青門下惟任安不去武帝令大將軍驃騎將軍皆為大司馬秩祿且等自是後青日衷而去病日益貴青故人門下多去事去病輒得官爵惟獨任安不去將萬騎出隴西有功去病元狩三年為驃騎將軍將萬騎出隴西有功上曰驃騎將軍率我士隃烏盩討遫濮涉孤奴厯五王國輜重人衆懾讋者弗取幾獲單于子轉戰六日過焉支山千有餘里合短兵罪蘭下殺析蘭王斬盧侯王鋭悍者誅全甲獲醜執渾邪王子及相國都尉捷首虜八千九百六十級收休屠祭天金人師率減什七益封去病二千二百户一門九侯二十朱輪李尋為吏帝舅曲陽侯王根為大司馬驃騎將軍厚遇尋是時多災異根輔政數虛已問尋尋見漢家有中衰之象其意以為且洪水為災乃説根曰夫士者國家之大寶功名之本也將軍一門九侯二十朱輪漢興以來臣子貴盛未嘗至此云云寬博有謀東觀漢記明帝詔東平王蒼寬博有謀可以托六尺之孤臨大節而不可奪其以蒼為驃騎將軍討東甌備水戰之具張廣拜驃騎將軍討東甌備水戰之具一戰大破所向無前魁傑雄特秉心平直陳思王輔臣論魁傑雄特秉心平直威嚴足憚風行革靡戎昭果毅折衝厭難為司馬驃騎珠玉在側覺我形穢世説驃騎王武子是衛玠之舅俊爽有風姿見玠輒嘆曰珠玉在側覺我形穢高情避世何驃騎弟第五以高情避世而驃騎勸令仕對曰然第五之稱何必驃騎彈壓六戎梁簡文帝讓驃騎揚州刺史表曰常願侯服就列希同特進之班角巾還第不競龍驤之賞而天澤無涯名器總集竊以驃騎之官既為上將神州之重號中土彈塵六戎冠冕九牧豈止司𨽻降節金吾緹騎況復任總皇畿位重連率何則驃騎之號厯選為重元符之中始自去病永平之建特授劉蒼齊憲為公主所申吳漢因羣臣之舉帝與談論屢為前膝後周明帝時寇雋為驃騎大將軍雋年齒雖高而志識未衰教授子孫必先典禮帝尚儒重德特欽賞之屢加恩錫思與相見雋不得已乃入朝常與同席而坐因顧訪洛陽故事雋身長八尺鬚髮皓然容止端詳音韻清朗帝與之談論屢為之前膝及雋辭還帝親執其手曰公年德俱尊朕所欽向乞言之事所望於公宜數相見以慰虛想以御輿令於帝前乘出顧謂左右曰如此事惟積善者可以致之何止見重於今亦將傳之萬古時人咸以為榮卿當上日我寢處自安崔彭轉驃騎常與宿衛性謹密在省闥二十餘年每當上在仗危坐終日未嘗有怠墮之客上每謂曰卿當上日我寢處自安説君臣戒慎之義又嘗曰卿弓馬固以絶人頗知學不彭曰臣少愛周禮尚書每於休沐之暇不敢廢也上曰試為我言之彭因説君臣戒慎之義上稱善殺所乘馬分將士唐劉感武德初以驃騎將軍鎮涇州薛仁杲率衆圍之感嬰城拒守城中糧盡遂殺所乘馬以分將士感一無所噉唯取馬汁和木屑食之城垂陷者數矣長平王叔良援兵至仁杲解圍而去感與叔良出戰為賊所擒仁杲復圍涇州令感語城中云援軍已敗徒守孤城何益也宜早出降以全冡室感許之及至城下大呼曰逆賊飢餓亡在朝夕秦王率數十萬衆四靣俱集城中勿憂各自勉以全忠節仁杲大怒執感於城邊埋腳馳騎射殺之至死聲色逾厲賊平高祖購得其尸祭以少牢拔家人種桑果棄之北史王思政為驃騎將軍不營資産嘗被賜園地思政出征後家人種桑杲及還見而怒曰丐奴未滅去病辭家況大賊未平何事産業命左右拔而棄之故身陷之後家無蓄積望風懾憚揚思朂為驃騎大將軍性剛決所得俘囚多生剝靣或𠢐髮際掣去頭皮將士以下望風懾憚莫敢仰視刻石為人馬丘行恭為左驃騎將軍從太宗討王世充會戰于邙山之上太宗與諸騎相失惟行恭獨從尋有徑騎數人追及太宗矢中御馬行恭射之發無不中咸不能前然後下馬拔箭以所乘馬進太宗行恭於御馬前步執長刀巨躍大呼而出得入大軍貞觀中有詔刻石為人馬以象行恭拔箭之狀立於昭陵闕前食蔗無懼色梁後略陸納分衆騎掩襲巴陵晨至城下驃騎始命諸將會議及出壘門坐胡床以望之賊乘水來攻矢下如兩人情騷擾莫不震懼驃騎方食甘蔗曽無懼色車騎將軍前漢書文帝元年始用薄昭為車騎將軍灌嬰周亞夫金日磾並為之後漢書百官志將軍不常置車騎將軍位次上卿章帝即位西羌反故以舅馬防行車騎將軍征之銀印青綬在卿上絶席還復罷和帝即位以舅竇憲為車騎將軍征丐奴始賜金紫次司空安帝即位西羌寇亂以舅鄧隲為車騎將軍征之數年復罷靈帝數以車騎寵拜嬖臣又贈亡人應劭曰美號加于頑凶印綬汙于腐尸虧國家之舊傷武之重昔年有覩被髮之祥知其為戎今假號雲集不亦冝乎魏志黃初二年加遼東太守公孫恭為車騎將軍車騎為都督儀與四征同若不為都督雖持節屬四征者與前後左右雜號將軍同其或散還從文武之例則位次三司晉職官志漢殤帝延平元年鄧隲為車騎將軍儀同三司及魏黃權以車騎將軍開府儀同三司車騎將軍開府者皆為位從公車騎將軍位從公者為武官公著武冠平上黑幘餘見驃騎將軍門宋百官志車騎將軍一人漢文帝元年用薄昭為之魚豢曰魏世車騎為都督者儀與四征同餘已見前晉宋車騎衛不復為四征所督南齊百官志見驃騎將軍門隋百官志梁陳皆循齊舊後齊見驃騎將軍門後周車騎大將軍建德四年改儀同大將軍仍增上儀同大將軍九命車騎將軍正八命隋車騎將軍正五品煬帝改車騎為鷹揚副郎將從五品真將軍前漢文帝時丐奴大入邉以三將軍備胡上自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細栁軍士吏被甲鋭兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入上乃使持節詔將軍曰吾將勞軍亞夫乃傳言開壁門士吏請車騎曰將軍約軍中不得驅馳于是天子按轡徐行至中營將軍亞夫揖曰介胄之士不拜請以軍禮見天子為改容式車使人稱謝皇帝敬勞將軍成禮而去既出軍門羣臣皆驚文帝曰嗟乎此真將軍矣向者霸上棘門若兒戲爾銘燕然山後漢南單于請兵北伐乃拜竇憲為車騎將軍耿秉為副與北單于戰于稽落山大破之追斬名王以下萬三千級于是溫犢須日逐溫吾夫渠王祁鞮等八十一部率衆降者前後二十餘萬憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威德令班固作銘推功從事中郎馮鯤字鴻卿長沙蠻冦益陽荆南皆沒于是拜鯤為車騎將軍軍長沙進擊武陵蠻夷荆州平定詔賜錢一億固讓不受振旅還京師推功從事中郎位在九卿上絶席東觀漢記鄧鴻為車騎將軍位在九卿上絶席漢雜事章帝以城門校尉馬防為車騎將軍位在九卿上絶席家無餘財蜀志鄧芝益州從事張裕善相芝往從之謂曰君年過七十位至大將軍封侯為車騎將軍賞罰明斷善恤卒伍身之衣食資仰于官不茍素儉然終不治私産妻子不免飢寒死之日家無餘財能與霹靂鬪北齊薛孤延為車騎將軍從高祖西伐至蒲津及竇泰失利高祖班師延後殿且戰且行一日逢浮圖一所雷震火燒高祖令延視之延乃按矟直前未至四十步震火燒靣延大呼繞浮圖走火遂滅延還眉鬚及馬髮尾皆焦高祖歎曰薛孤延可能與霹靂闢其勇決如此不著新衣世説桓車騎不著新衣浴後婦送新衣與車騎大怒從使人持去婦持還傳語云衣不經新何由得故公大笑而著之臨哭甚慟梁書韋睿遷侍中車騎將軍以疾未拜卒于家武帝即日臨哭甚慟萬幾委卿先覽遂賜名隋長孫覽周武帝在藩與覽親善及即位深加禮焉超拜車騎將軍每公卿上奏必令省讀覽有口辨聲氣雄壯凡所宣傳百寮屬目帝每嘉歎之覽初名善帝謂之曰朕以萬幾委卿先覽遂賜名焉衛將軍左右衛前漢文帝始用宋昌為衛將軍位亞三司後漢百官志將軍不常置衛將軍金紫位次上卿有長史司馬各一人千石晉職官志左右衛將軍案文帝初置中衛及魏武帝受命分為左右衛以羊琇為左趙序為右並置長史司馬功曹主簿員江左罷長史王隱晉書羊琇為晉臺左衛將軍晉中興書虞漳陳晷曹毗毛安之並為左衛將軍宋百官志衛將軍一人漢文帝元年始用宋昌為之位亞三司章帝建初三年始使車騎將軍馬防為之班同三司班同三司自此始也沈約宋書左右衛將軍晉文建國所置南齊書百官志衛將軍見驃騎門後魏初加大則次儀同三司隋百官志梁左右衛將軍秩中二千石後齊見驃騎門衛大將軍加大者在太子太師上隋左右衛大將軍一人將軍二人有長史司馬録事功倉兵騎等曹參軍法曹鎧曹行參軍各一人等員煬帝改左右衛為左右翊衛六典左右衛大將軍各一人正四品官品沿革官屬並見左右衛門鎮南北軍漢文帝至渭橋羣臣奉天子法駕迎代邸皇帝即夕入未央官拜宋昌為衛將軍鎮南北軍軍長安文帝三年遣灌嬰擊丐奴中尉材官兵屬衛將軍軍長安貌如不武內實賢明晉虞潛為衛軍貌如不武內實賢明若冨貴作領護各十年羊琇字椎舒景獻皇后之從父弟涉學有智少與武帝通門相親每接筵同席常謂帝若冨貴見用作領護各十年帝戲而許之初帝未為太子而聲論不及弟攸文帝素意重攸恆有代宗之議琇密為武帝畫䇿甚有匡救又觀察文帝為政損益揆度應所顧問之事皆令武帝默而識之其後文帝與武帝論當世之務及人間可否武帝答無不允由是儲位遂定及帝為撫軍琇參軍事帝即王位擢琇為左衛將軍封甘露亭侯帝踐阼纍遷中護軍加散騎常侍琇在職三十年典禁兵預機密寵遇甚厚杜預拜鎮南將軍朝士畢賀皆連榻而坐琇與裴楷後至曰杜元凱乃以連榻坐客耶不坐而去性豪侈費用無復齊限嘗屑炭和作獸形以溫酒洛下豪貴共效之然黨慕勝已其所推奉便盡心無二窮窘之徒特能振恤選用多以得意者居先不盡銓次之理將士有冒官位者為其致節不惜軀命祿賜班親族吳隱之遷左衛將軍雖居清顯祿賜皆班親族冬月無被嘗浣衣乃破絮勤苦同于貧庶委以禁旅晉中興書南頓王宗字延祖拜左衛將軍委以禁旅少有風格王坦之字文度領左衛少有風格尚刑名之學嘗著廢莊論公事罩笠有虧體制宋元嘉十年起居注御史中丞荀伯子責左衛將軍何尚之公事罩笠有虧體制亷正節槩有古人之風隋薛世雄性亷謹凡所行軍破敵之處秋毫無犯帝由是嘉之帝嘗從容謂羣臣曰我欲舉好人未知諸君識否羣臣咸曰臣等何能測聖心帝曰我欲舉者薛世雄羣臣皆稱善帝復曰世雄亷正節槩有古人之風於是超拜右翊衛將軍罷中書草制唐元和中以朔方節度使王佖為左衛將軍佖在鎮無智略以馭下居多猜忌乃殺人以懼之衆益不附乃召至踰月而授以右衛將軍凡將相出入皆翰林草制謂之白麻佖以貴罷中書草制延入閣乙夜方出宇文士及為右衛大將軍甚見親顧每延入閣中乙夜方出遇其歸沐乃遣馳召同列莫與為比然尤謹密其妻每問向中使召有何樂事士及終無所言當今名將三人而已薛萬徹為右衛大將軍太宗從容謂近臣曰當今名將唯李績道宗萬徹三人而已李績道宗不能大勝亦不大敗萬徹非大勝即大敗仗氣凌物萬徹為右衛大將軍出青丘道伐高麗萬徹在軍仗氣凌物或奏之及還謁見太宗謂曰上書者論卿與諸將不協朕録功棄過不罪卿也因取書焚之不令剪去槐樹隋高熲拜左衛大將軍時突厥屢入冦詔熲鎮遏緣邊及還每坐朝堂北槐樹下聽事其樹不依行列有司請伐之上特不令剪去以示後人見重如此二陵百世之誡晉索綝為衛將軍三秦人尹桓解武等數千家盜發漢霸杜二陵多獲珍寶愍帝問綝曰漢陵中物何乃多耶對曰漢天子即位一年而為陵天下貢賦三分之一供宗廟一充山陵一供賔客漢武享年久長比葬而茂陵不能容物其樹皆已可供赤眉取陵中物不能減半于今猶朽帛委積珠玉未盡此二陵是儉者爾亦百世之誡也前後左右將軍前漢百官志前後左右將軍皆周末官秦因之位上卿金印紫綬漢不常置或有前後或有左右皆掌兵及四夷有長史秩千石前漢書昭帝元鳯元年以光祿勳張安世為右將軍漢書解詁武帝征四夷有左右前後將軍宣元以後雜錯更置或為前或為後或為左或為右雖不出征猶有其官在諸卿上為國爪牙所以揚示威靈於四遠折衝萬里如虎如熊後漢百官志將軍不常置有前後左右將軍蔡質漢儀曰金紫位次上卿典京師兵衛四夷屯警世祖中興前後左右雜號將軍衆多皆主征伐事訖皆罷魏志曹洪為文帝所廢明帝即位拜後將軍晉職官志左右前後軍將軍案魏明帝時有左軍則左軍魏官也至晉不改又置前軍右軍至泰始八年又置後軍掌宿衛是為四軍宋百官志左右前後將軍周末官秦漢因之光武建武七年省魏以來復置南齊百官志四安四平左右前後征虜將軍四中郎將晉世荀羡王胡之並居此官宋齊以來唯處諸王素族無為者隋百官志梁左右前後四將軍皆以分司丹禁侍衛左右陳左右前後將軍千石後齊四將軍從四品後周前後左右將軍正七品數竒前漢李廣為前將軍從大將軍衛青出擊丐奴青出塞捕虜而令廣出軍東道東道少回逺惑失道後大將軍大將軍使長史急責廣之幕府上簿廣曰諸校尉亡罪乃我自失道吾今自上簿至幕府廣謂其麾下曰廣結髮與丐奴大小七十餘戰今幸從大將軍出接單于兵而大將軍徙廣軍行回逺又迷失道豈非天哉且廣年六十餘終不能復對刀筆之吏矣遂引刀自剄百姓聞之知與不知老壯皆為泣初大將軍陰受上指以為李廣數竒母令當單于恐不得所欲圖上方略趙充字翁孫為後將軍西羌反上問誰可將者充國時年七十餘對曰無踰老臣上遣問焉曰將軍度羌虜如何當用幾人對曰百聞不如一見兵難預度臣願馳至金城圖上方略無功失侯公孫賀封南窖侯以左將軍出定襄無功失侯為國虎臣辛慶忌字子真為左將軍為國虎臣丐奴西域親附敬其威信失道贖為庶人趙食其為右將軍從大將軍出定襄迷失道當斬贖為庶人明習外國事常惠以明習外國事勤勞數有功為右將軍在家上疏傅喜為右將軍傅太后與政喜數諫后不悅上印綬在家上疏因請乃拜前將軍方靣之勳後漢賈復字君文光武以復敢深入希令遠征而壯其勇節常自從之故復少方靣之勳復知光武欲偃干戈修文德不欲功臣擁衆京師乃與鄧禹並剽甲兵敦儒學帝深然之遂罷左右將軍復以列侯就第加位特進復既還私第闔門養威重率宗族賔客二千餘人世祖自薊東南馳耿純與從昆弟欣宿值其率宗族賔客二千餘人純恐宗家懷異心乃使欣宿歸燒其廬舍絶其反顧之望世祖拜純前將軍威震江東魏志張遼為前將軍屯合肥時孫權復反文帝遣遼乘舟與曹休至海陵臨江權甚懼焉勑諸將張遼雖病不可當也慎之初遼為孫權所困遼潰圍出後權衆破走由是威震江東兒啼不肯止其父母呼遼以恐之不與老奴同列蜀志先主為漢中王遣費詩拜關羽為前將軍羽聞黃忠為後將軍怒曰大丈夫終不與老奴同列不肯受拜詩謂羽曰夫立王業者所用非一昔蕭曹與高祖少親舊而陳韓亡命後至論其班列韓最居上未聞蕭曹以此為怨也今漢中王以一時之功隆崇于漢室然意之輕重寧當與君侯齊乎王與君譬猶一體同休等戚禍福共之愚謂君侯不宜計官號之高下爵位之多少也僕一介之使銜命之臣君侯不受拜如是便還但相為惜此舉動恐有後悔爾羽大感悟即受拜名望非關馬之倫黃忠欲為後將軍諸葛亮説先主曰忠之名望素非關馬之倫而今使同列馬張在近親見其功尚可喻指關羽遙聞之恐必不悅得無不可乎先主曰吾自當解之遂與關羽等同位賜爵關內侯行丞相事諸葛亮上疏曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕斜谷不戒之失咎皆在臣授任無方恤事多暗春秋責帥臣職是當請自貶三等以督厥咎於是以亮為右將軍行丞相事所總統如前武力過人魏志張遼字文遠本聶一之後避怨變姓少為郡吏武力過人文帝即位轉前將軍當以功自效徐晃字公明為右將軍性儉約畏慎常遠斥候歎曰古人患不遭明君今幸遇之當以功自效將相之器東觀漢記賈復治尚書事舞陰李生竒之謂門人曰賈生容貌志意如是而勤于學此將相之器徴詣洛陽拜左將軍南擊赤眉轉戰有功又擊之劉盆子于澠池破宜在爪牙漢書雜事曰何武薦辛慶忌宜在爪牙乃拜為右將軍樂為邉將晉中興書郭默為右將軍默既逺人樂為邉將不願內轉謂劉胤曰我能禦胡而不用更用虛名者且右軍主禁兵禁兵不妄出有急方始配給兵將無素是謂棄之安能不亂不樂京師王羲之幼訥于言人未之知年十三嘗見周顗顗異之時重牛心炙座客未啖顗先割啖之羲之于是聞名及長尤善草𨽻書為今古冠絶纍遷為右將軍不樂京師遂往會稽與謝安孫綽等尋遊處山陰有道士好養鵝羲之意甚悅道士云為寫道德經當舉羣相贈乃為寫畢籠鵝而去通理有才義晉起居注山濤啓事右將軍楷通理有才義也瞎虎南史谷楷稱有幹局遷右將軍楷眇一目而性甚嚴急時人號為瞎虎中軍將軍前漢書馮奉世字子明元帝以為中軍將軍屯首陽魏志曹真持節督中外諸軍事受顧命王隱晉書太始元年以羊祜為中軍將軍總宿衛為君不顧萬死北齊書後苑之敗崔仲文捽馬尾以渡河波中乍沒乍出高祖望見之曰崔掾也遂遣船赴接既濟勞之曰卿為君不顧萬死可謂家之孝子國之忠臣加中將軍鎮軍將軍魏志甘露元年以石苞為鎮軍將軍沈約晉書齊王攸為鎮軍在驃騎上後復舊録尚書事魏黃初七年文帝以陳羣為鎮軍大將軍録尚書事受顧命撫軍將軍魏志黃初四年以司馬宣王為撫軍將軍輔政魏齊王嘉平三年以司馬景王為撫軍將軍輔政鼠迹語林簡文為撫軍時坐床上生塵不聽左右拂去見鼠行迹視以為佳有參軍見鼠以手扳格殺之撫軍曰無乃不可乎四征將軍後漢獻帝初平三年以馬騰為征東將軍光武建武中以馮異為征西大將軍二年置征南將軍以馮異為之魏明帝太和中置征北將軍以劉靖為之黃初中位次三公宋百官志魚豢曰四征魏武帝置秩二千石黃初中位次三公漢舊諸征與偏禆雜號同沈約宋書衡陽王義季為征北大將軍南齊百官志見驃騎門隋百官志梁以四征南東西北止施外四中單衛撫護止施內為二十三班陳四征擬官品第二秩中二千石後齊見驃騎門四征將軍正二品加大者次位大將軍後周征東征西征南征北將軍八命後魏書司馬景之字洪略明帝時封蒼梧公加征南大將軍征赤眉東觀漢記建武二年馮異為征西將軍入關征赤眉單于聞喪𠢐面耿恭為征西將軍鎮撫單于以下及薨南單于以國發喪𠢐面流血身先陷陳魏志張遼字文逺為征東將軍征孫權被甲持戟身先一作先登陷陳衛壘入至麾下守漢中夏侯淵字妙才為征西將軍守漢中清忠儉約滿寵字伯寧為征東將軍詔曰君典兵在外専心憂公賜田十頃穀五百斛錢二十萬以明清忠儉約之節從征討夏侯尚字伯仁文帝與之親友太祖定冀州尚為軍司馬常從征討遷征南將軍為將奉法曹仁為征南將軍陵侯彰北征烏丸文帝在東宫為書戒彰曰為將奉法不當如征南邪仗節屯一城杜恕為幽州刺史時征比將軍程喜屯薊尚書袁侃等誡恕曰程申伯今俱仗節共屯一城宜深有禮以待之真天人曹仁字子孝為征南將軍從武帝平荆州仁屯江陵拒吳將周瑜瑜將數萬人來攻仁被甲上馬將麾下壯士十數騎直前衝入賊圍賊衆乃退三軍壯其勇皆歎曰將軍真天人也座無空席門不停賔晉王渾平吳轉征東大將軍復鎮壽陽渾不尚刑名處斷明允時吳人新附頗懷畏懼渾撫循羈旅虛懷綏納座無空席門不停賔于是江東之士莫不悅附乘輦入殿無下拜羊祜為征南將軍寢疾求入朝既至洛陽會景獻宮車在殯哀慟至篤中詔申論扶疾引見命乘輦入殿廡無下拜甚見優禮涕淚霑鬚皆為氷羊祜為征南大將軍都督荆州諸軍事及薨武帝素服哭之甚哀是日大寒帝涕淚霑鬚皆為氷焉詔無下拜三十六國春秋征南大將軍羊祜來朝有疾詔無下拜祜密陳伐吳之計還鎮又上表陳之納而不宣也會祜疾甚上遣中書令張華就問䇿祜陳謀畫舉杜預自代從之彈燕後魏書李惠為雍州刺史征南大將軍惠長于思察雍州聼事有燕爭巢鬪已纍四惠令人掩獲試命網紀斷之並辭曰此乃上智所測非下愚所知惠乃使卒以的竹彈兩燕既而一去一留惠笑謂吏屬曰此留者自計為功重後去者既經楚痛理無固心羣下伏其深察摧鋒陷陳陸真少善騎射數從征伐所在摧鋒陷陳前後以功為征西將軍一箭射穿旗首吳國劉信吳王開國加征南大將軍後唐莊宗即位遣諌議大夫薛昭丈閩王假道豫章信勞之謂昭文曰皇帝知有信否昭文曰主上新有河南未熟公之名信曰漢有韓信吳有劉信異代其人也因指旗錕首舉巵酒以屬昭文曰射中此願公飲一箭而穿之四鎮將軍魏志文帝即王位以曹真為鎮西將軍宋百官志江左以來將軍則中鎮撫四鎮以上或加大鎮東將軍一人後漢末魏武帝為之鎮南將軍一人後漢末劉表居之鎮西將軍一人後漢初平三年韓遂居之鎮北將軍一人魚豢曰鎮北魏黃初太和中置中鎮撫三號比四鎮南齊百官志見驃騎門隋百官志梁以八鎮東南西北左右前後為二十二班陳八鎮擬官品第二秩中二千石後齊見驃騎門四鎮將軍加大者次四征以壯勇聞魏志臧霸字宣髙亡命東海以壯勇聞太祖募索得霸見而悅之以為琅邪相文帝即位遷鎮東將軍追蹤陳韓黃權字公衡伐吳敗于白帝後附魏文帝曰君捨逆歸順欲追蹤陳韓邪權曰臣降吳不可歸蜀無路惶恐歸命敗軍之將免死為幸何古人可慕帝善之拜鎮南將軍還金城蜀志馬超父騰靈帝末與邉章韓遂俱起事於西州初平三年遂騰率衆諸長安漢朝以遂為鎮西將軍遣還金城騰為征西將軍屯塢請吞偏將十萬之衆魏延為鎮逺將軍先主大會羣臣問延曰今委卿以重任卿居之欲云何延對曰若曹操舉天下而來請為大王拒之偏將十萬之衆至請為大王吞之先主稱善衆成壯其言先主踐尊號拜鎮北將軍築臺為京觀魏鄧艾為鎮西將軍既破蜀于綿竹築臺以為京觀用彰戰功士卒死事者皆與蜀兵同共埋藏艾深自矜伐謂蜀士大夫曰諸君賴遭某故有今日如過吳漢之徒已殄滅矣又曰薑維自一時雄兒也與某相值故窮爾有識者笑之定交州討九真吳志吕岱既定交州進討九真斬獲萬數又遣從事南宣國化及徼外蠻夷扶南林邑諸王各遣使奉貢權嘉其功進拜鎮南將軍黃中通理博識多聞吳録劉表黃中通理博識多聞至鎮南將軍賦弩文士傳吳朝鴻臚卿張儼議郎張純鎮南將軍朱異三人共詣驃騎將軍朱據據曰三賢屈顧老各為賦一物然後乃坐乃各賦所見異賦弩曰南嶽之幹鍾山之銅應機命中獲的高墉都督河北軍事魏氏春秋許元字士宗為鎮北將軍都督河北諸軍事兵威如破竹晉杜預字元凱征南將軍羊祜病舉預自代及祜卒拜預為鎮南大將軍都督荆州太康中陳兵于江陵循江西上旬日之問纍尅城邑吳都督孫歆與伍延書曰北來諸軍乃飛渡江也既平上流于是沅湘以南至于交廣吳之州郡皆望風歸命奉送印綬議者或曰百年之寇未可盡克今向暑水潦方降疾疫將起冝俟來冬更為大舉預曰昔樂毅藉濟西一戰以并強齊今兵已振譬如破竹數節之後皆迎刃而解無復著手處也孫皓既平振旅凱入以功進爵當陽侯繕兵甲耀威武預為鎮南將軍繕兵甲耀威武乃簡精鋭襲吳西陵都督張政大破之以功增封三百六十五户政吳之名將也據要害之地耻以無備取敗不以所喪之實告于孫皓預欲問吳邉將乃表還所獲之衆于皓皓果召政遣武昌監劉憲代之故大軍臨至使其將帥移易以成領蕩之勢預處分既定乃啓請伐吳之期功重報輕王濬平吳時人咸以濬功重報輕博士秦勇等並表訟濬之屈帝乃遷鎮軍大將軍帝過其子何曽為鎮北將軍文帝使武帝齊王攸送之帝又過其子劭曽先勑劭客必過汝汝當預嚴劭不冠𢃄停帝良久曽深以譴劭曽見崇重如此討平蜀賊唯收圖書應詹遷平南太守鎮南將軍山簡復假詹督五郡軍事蜀賊作亂討平之金寶充溢詹一無所取唯收圖書莫不歎之拓平西夏方隅清晏魏志鍾會為鎮西將軍假節都督關中諸軍事詔曰會所向摧斃前無強敵鉗制衆城罔羅遺逸蜀之豪帥而縛歸命謀無遺策舉無廢功凡所降誅動以萬計全勝獨克有征無戰拓平西夏方隅清晏其以會為司徒待以上客後魏唐和詣闕世祖優之待以上客髙祖以和歸誠先朝拜鎮南將軍四安將軍謝承後漢書光武以岑彭為安南將軍晉公卿禮秩世祖以扶風王駿為安東將軍宋百官志安東將軍一人後漢末陶謙為之安南將軍一人安西將軍一人後漢末段隈為之安北將軍一人魚豢曰鎮北四安魏黃初太和中置南齊百官志見左右前後將軍門隋百官志梁以八安東南西北止施外左右前後止施內為二十一班陳八安將軍擬官品第三秩中二千石後齊見驃騎門四安將軍三品從討馬超魏志曹仁字子孝少好弓馬弋獵後豪傑並起仁亦陰結少年周遊淮泗之間遂從太祖為别部司馬太祖討馬超以仁行安西將軍伐吳王隱晉書武帝代吳以王渾為安東將軍神情秀徹沈約宋書廬陵王義直美儀貌神情秀徹為安西將軍幸新亭視發引劉秀之少孤貧有志操為齊安北將軍雍州刺史上車駕幸新亭視秀之發引四平將軍宋百官志四平魏世置沈約宋書臨川王義慶為平西將軍隋百官志梁以四平東南北西四翊左右前後為二十班陳四平擬官品第三秩中二千石後齊四平將軍正三品後周平東平西平南平北等將軍正七命征兾州魏志太祖征兾州張燕求佐軍拜平北將軍城中震怖蜀志馬超聞先主圍劉璋于成都密書請降先主遣人迎超超將兵徑到城下城中震怖璋即稽首以超為平西將軍兵不血刃晉書乙亥詔進王濬為平東將軍假節都督益梁諸軍事濬兵不血刃攻無堅城夏口武昌無相支抗鐡猛獸後周書蔡祐為平東將軍與齊神武戰于芒山祐時著明光鐵鎧所向無敵齊人咸曰此是鐡猛獸也皆避之在州有惠政梁書蘭欽進號平南將軍改封曲江公在州有惠政吏民詣請立碑頌德從之請立碑夏侯進號平北將軍卒于鎮州人夏侯簡等表請為亶立碑中將軍附中軍將軍偏將軍歸心世祖范曄後漢書吳漢家貧販馬自業素聞世祖長者獨欲歸心及世祖于廣阿拜漢偏將軍諸將多稱勇宫從世祖征戰諸將多稱勇世祖至河北以為偏將軍長八尺三寸姚期長八尺三寸容貌絶異矜嚴有威拜偏將軍長七尺七寸吳志陳武字子列孫䇿在壽春武往修謁時年十八長七尺七寸尤為權所親愛為偏將軍長八尺武力過人董襲長八尺武力過人拜偏將軍禆將軍為先登破張繡軍魏志李通字丈逺以遊俠聞于江汝之間屬連嵗大飢通傾家濟與士分糟粳建安初通舉衆詣太祖于許太祖討張繡通為先登大破張繡軍拜禆將軍軍府官屬掾屬正曰掾副曰屬沿革各見諸將軍本門處士年少後漢竇憲為車騎將軍辟崔駰為掾憲府貴重掾屬三十人皆故刺史二千石唯駰以處士年少攫在其間其寮佐故事如太尉清白方正東觀漢記吳良以清白方正稱驃騎東平王蒼辟為西曹掾數諌正蒼多善䇿蒼上表薦良義士朱暉字文季驃騎將軍東平王蒼辟為掾正月朔旦蒼當入賀故事少府給璧是時陰就為府卿貴驕吏傲不奉法蒼坐朝堂漏且盡而求璧不可得顧謂掾屬曰若之何暉望見少府主簿持璧即往紿之曰我數聞璧而未嘗見試請觀之主簿以授暉暉顧召令吏奉之主簿大驚遽以白就就曰朱掾義士勿復求更以他璧朝蒼既罷召暉謂曰屬者掾自視孰與藺相如帝聞壯之及帝幸長安欲嚴宿衛故以暉為衛士馬氏五常白眉最良蜀志馬良字李常為將軍掾後使吳良謂亮曰今銜國命協穆二家幸為良介子孫將軍亮曰君試自為文良即為草曰寡君遣掾馬良通聘繼好以紹昆吾豕韋之勳竒人吉士荆楚之令鮮于造次之華而有克終之美願降心存納以慰將命權敬待之良兄弟五人並有才名鄉里為之諺曰馬氏五常白眉最良良眉中有白毛故以稱之先主稱尊號良為侍中後進領袖有裴秀王隱晉書裴秀字季彥少好學有風采能著文章大將軍曹爽精取掾屬辟秀為掾官至司空始秀年十餘嵗叔父微有名賔客詣徽出則過秀時人謡曰後進領袖有裴秀但如卿自中吾吏唐彬字儒宗纍遷别駕奉使詣相府計事僚佐薦為掾屬大將軍問其參軍孔皓皓忌其能不答陳騫曰彬之為人勝騫甚逺相國笑曰但如卿自中吾吏何論于勝辟彬為鎧曹轉騎兵掾有重名晉中興書王坦之字文度弱冠有重名撫軍會稽王辟以為掾以朗寤稱晉諸公讃溫美字長卿少以朗寤稱初鎮軍大將軍齊王攸辟以為掾其後遷太子洗馬清通簡要晉陽秋裴楷與王戎俱為太祖將軍掾太祖問鍾會對曰裴楷清通王戎簡要晉興山濤和嶠王濟等並以盛名居顯位鷹鸇之爪殷氏家傳泰字子平為太皇車騎掾委以書記上歎曰非唯秋兔之毫乃是鷹鸇之爪問祖考而識其父魏略令狐邵在武安毛城中會太祖攻破鄴遂圍毛城破邵等輩十餘人皆當斬太祖閲見之疑其衣冠也問祖考而識其父乃解放署軍謀掾並除幕府前漢書王鳯為大將軍秉政蕭育朱博並除幕府屬高才博通清浮樂道東觀漢記杜撫字敘和髙才博通清淨樂道舉動以禮驃騎將軍東平王蒼辟撫署西曹屬深加敬異言鍾會取艾不足自行魏志邵悌字元伯辟大將軍文王西曺屬初文王欲遣鍾會伐蜀悌求見曰今遣鍾會率十餘萬衆伐蜀愚謂會單身無重任不若使餘人行及會白鄧艾不軌文王將自西悌復曰鍾會所統五六倍于鄧艾但敕會取艾不足自行風情都雅過于所聞晉書庾亮隨父在會稽嶷然自守時人皆憚其方正儼然莫敢見之元帝為鎮東時聞其名辟西曺掾及引見風清都稚過于所聞甚器重之祭酒後漢建安三年曹公還許初置此官召見論天下事魏志郭嘉字奉孝時潁川戲志才籌畫士也太祖甚器之早卒太祖與茍彧書曰自志才亡後莫可與計事者汝潁固多竒士誰可以繼之彧薦嘉召見論天下事太祖曰使孤成大業者必此人也嘉出亦喜曰真吾主也表為司空軍咨祭酒幸宅同乘晉書紀瞻字思逺元帝為安東將軍引為軍咨祭酒轉鎮東長史帝親幸瞻宅與之同乘而歸懼法而至東觀漢記東平王蒼為驃騎將軍開東閣迎名士與參政事鴈門鄒恁隱居教授辟祭酒甚見禮敬後朝會漢明戲之曰先帝徴君不來驃騎辟君而來何也恁曰先帝秉德以惠下臣可得以禮進退驃騎執法御下臣懼法而至功曹收葬鍾會漢晉春秋向雄字茂伯為鎮西將軍鍾會功曹及會誅雄收而葬多才藝晉中興書羅企生少多才藝殷仲堪鎮江陵以為府功曹清介王述素清介康帝為驃騎將軍收為功曹新婦襄陽耆舊傳山簡以習嘏才博有文章為征南功曹舉大綱而已不拘文法時人號曰新婦簡益器之妙選嵇喜字公穆晉武為撫軍妙選官屬以喜為功曹主簿披荆棘定關中東觀漢記光武引進馮翼謂公卿曰是我起兵時主簿為吾披荆棘定關中奏記數十莘嶠後漢書崔駰為大將軍竇憲府主簿及憲擊丐奴路中愈多不法前後奏記數十上指功其短長憲不能容稍踈之因察駰高第出為長岑長駰自以逺去不得意乃還遂終于鄉里各為其主世語楊綜為大將軍曺爽主簿爽將誅及解印綬將出綜止之曰公挾主握權舍此以至東市乎不從有司奏綜導爽反宣王曰各為其主也宥之以為尚書郎諌法嚴峻邵氏家傳邵員字德方為驃騎主簿數諌法嚴峻主領頗後之京都三明晉中興書諸葛恢字道明弱冠知名元帝為安東將軍召補主簿于時穎川荀闉字道明陳留蔡謨亦字道明俱有名譽號中興三明時人為歌曰京都三明各有名蔡氏儒雅荀葛清器宇宏深名出我右何充字次道少有名望大將軍王敦以震主之權牧羅賢俊辟以為掾轉主簿始充年在童齓伯父謂之曰我小兒時亡伯車騎謂我後當與伯父爭名汝今器字宏深亦當名出我右多所規諌臧榮緒晉書任續字仲元為會稽王驃騎主簿多所規諌參軍并參三軍魏志于禁屯潁陰樂進屯陽翟張遼屯長社長社諸將任氣多不協使趙儼并參三軍每事訓諭遂相親睦射箭飛書關羽圍征南將軍曹仁于樊趙儼以議郎參仁軍事儼謂諸將曰今賊猶盛我徒卒軍少而仁隔絶不得同力不若前軍逼圍遣謀通仁使知外救以勵將士然後表裏俱發破賊必矣諸將皆喜便作地道射箭飛書與仁乃通消息征南晉王濬參征南軍事羊祜深知待之安東王渾參晉文帝安東軍事賜爵荀朂參晉文帝大將軍軍事賜爵關內侯武昌王戎為建威將軍引劉􅔬為參軍伐吳之役戎使􅔬與參軍羅尚濬江破武昌似是馬曹王徽之字子猷性卓犖不羈為司馬桓溫參軍蓬首散𢃄不綜府事又為車騎桓沖騎兵參軍沖問曰卿署何曹對曰似是馬曹又問管幾馬曰不知馬何由知數又問馬比死多少曰未知生焉知死嘗從沖行值暴雨徽之下馬排入車中謂曰公豈得獨擅一車冠絶當時顔延之為始興王濬後軍咨議參軍延之文章冠絶當時髯參軍郗超為大司馬桓溫參軍與主簿王珣並為溫所重府中語曰髯參軍短主簿能令公喜能令公怒謝安王坦之嘗詣溫論事溫令超帳中卧聽之風動帳開安笑曰郗生可謂入幕之賔也入幕之賔上龍山之宴孟嘉為桓溫參軍九月九日宴龍山寮佐畢集有風至吹嘉帽墮落嘉不之覺溫使左右勿言欲觀其舉止嘉良久如厠溫令馭還之命孫盛作文嘲嘉著嘉坐處嘉還見即答之其文甚美四坐嗟嘆黃散晉以劉隗為鎮北將軍外以討胡實禦王敦也及敦率衆內向以誅隗為名上疏曰劉隗外託舉義內自封殖奢僣過制乃以黃散為參軍晉魏以來未有此比也繼老夫劉𢎞為荆州刺史將之官辟陶侃為南蠻長史遣先向襄陽討賊破之𢎞既至謂侃曰吾昔為羊公參軍謂吾其後當居身處今相觀察必繼老夫矣侃後果為荆州刺史羊公祜也嘗為荆州其後當居身處上畏不敢辭晉中興書郭璞為尚書郎大將軍王敦以璞有術取為參軍璞畏不敢辭不問格鬬之罪中宗為安東取周訪為參軍在散􅒰中未之識也府進鎮東隨例為參軍時參軍譙國有罪當死吏誤收訪訪自列無罪而吏不察訪窮迫乃身自執木杖奮擊收捕數十人皆披散訪得逸走歸府自明中宗大驚怒不問格鬬之罪二府交命蘇峻反范汪逃遁西歸時庾亮溫嶠屯兵尋陽咸以衆少賊強未敢輕進且信使阻絶不相知及經汪過嶠等訪焉汪曰賊政令不一貪暴縱橫滅亡已兆雖強易弱朝廷有倒懸之急宜時進討嶠深納之是日護軍平南二府禮命交至始釋褐參護軍軍事蓬髮飲酒阮孚咸子也避亂渡江中宗以為安東參軍蓬髮飲酒不以上務嬰心盛德絶倫郗景興郗超字景興少卓犖不羈有曠世之度倜儻高雋籠蓋當時時人為之語曰揚州獨步王文度盛德絶倫郗景興交遊士林每存勝技又精于理義大司馬桓溫取為參軍才幹堪任當今之良器薛兼為軍祭酒言于中宗曰臣邑人張闉才幹堪任當今之良器願垂引納以綜朝事中宗即召闉為安東參軍智度沈邃言必有中李胤容貌簡素頽然若不足者而智度沈邃言必有中髙祖為大將軍時胤再參軍事上信重之雖參軍其實帥魏志曹休劉備遣將吳蘭屯下辨太祖遣曹洪征之以休參洪軍事太祖謂休曰汝雖參軍其實帥也洪聞此令常委事于休豈徒明於軍計又善處人父子之間太祖征馬超文帝留守使程昱參軍事田銀蘇伯等反河間遣將軍賈信討之賊有千餘人請降議者皆以為宜如舊法昱曰請降之意臣以為不可誅也縱誅之宜先啓聞衆議曰軍事有専無請昱不答文帝起入特引見昱昱曰凡専命者謂有臨時之急呼吸之間者耳今計賊制在賈信之手無朝夕之變故老臣不願將軍行之也文帝曰君慮之善即白太祖太祖果不誅太祖還聞之甚悅謂昱曰君豈徒明于軍計又善處人父子之間負氣傲俗宋書王瞻字明逺一字叔鸞負氣傲俗好貶裁人物仕宋為主府參軍嘗詣劉彥節直登榻曰君侯是公孫僕是公子引滿促膝唯余二人彥節外迹雖酬之意甚不悅身被重創沈攸之新亭之戰身被重創事畢為太尉行參軍不敬府主孫楚才藻卓絶爽邁不羣多所陵傲缺卿曲之譽年四十餘始參鎮東軍事後遷著作郎復參石苞驃騎軍事楚既負其才氣頗侮易于苞初至長揖曰天子命我參卿軍事因此嫌隙初參軍不敬府主楚既輕苞遂制施敬自楚始也人倫師表蔡興宗為郢州舉沈約為安西外兵參軍兼記室興宗嘗謂諸子曰沈記室人倫師表冝善師之及為荆州約又為征西記室隨問酬辨沈約宋書謝晦初為孟昶建威府中兵參軍昶死武帝問劉穆之孟昶軍誰堪入府穆之舉晦即命為太尉參軍武帝嘗決獄其旦刑獄參軍有疾以晦代之相府多事獄繫殷積晦隨問酬辨對答一無違忤武帝嘉之即署刑獄賊曹我府四字宗越隨柳元景侵魏領馬幢隊𨽻柳元怙有戰功還補後軍參軍督護隨王誕戲之曰汝何人遂得我府四字越答曰佛貍未死何為不得咨議參軍誕大笑割鵝炙齊劉璡為武陵王征虜參軍王與寮佐飲酒自割鵝炙璡曰應刃落俎是膳夫之事殿下親執鸞刀下官未敢安席因起請進璡兄瓛嘗夜隔壁呼璡璡不答下床著衣立然後應瓛怪其久璡曰向來𢃄未竟其立操如此專主文翰梁史武帝霸府初開以任昉為驃騎參軍記室專主文翰初武帝與昉遇竟陵王西邸從容謂昉曰我登三府當以卿為記室昉亦戲帝曰我若登三事當以卿為騎兵以帝善騎也至是引昉符昔言焉訪問遺忘劉杳博綜羣書梁天監中為豫章王行參軍沈約任昉以下每有遺忘皆訪問焉風儀方嵇康伏曼容字公儀遷驃騎將軍宋明帝好周易嘗集羣臣于清署殿講詔曼容執經曼容素有風儀帝嘗以方嵇康使吳人陸探微畫嵇康像以賜之東南豪士沈警字世聞惇篤有行業後將軍謝安命為參軍甚相敬重警東南豪士不樂就職安固留不止乃謂沈參軍卿有獨善之志不亦高乎警曰使君以道御物前所以懷德而至既無用佐時故遂飲啄之願爾還家積載以素自娛焉西山朝來致有爽氣世説王子猷作桓公車騎參軍桓謂王曰卿在府久比當相料理初不答直高視以手板拄頰云西山朝來致有爽氣作蠻語郝隆為桓公南蠻參軍三月三日作詩不能者罰酒三升隆初不能受罰既飲攬筆便作其一句云娵隅躍清池桓問娵隅是何語答曰蠻名魚為娵隅桓公曰作詩何以蠻語隆答曰千里投公始得為蠻府參軍那得不作蠻語每言輒盡俗説諸葛亮與軍師長史參軍掾屬教曰任重才輕固多闕漏前參軍董幼宰每言輒盡數有諌言雖資性鄙薄不能悉納幼宰參署七年事有不至至于十反來相啓告茍有忠於國亮可少過矣扶直繩違孫綽為功駮參軍駮事箋曰綱紀居管轄之任以純司外內駮議彈射誠無所拘然亦以獻可替否扶直繩違而已在北曰狐在南曰貉後秦説姚襄遣參軍薛瓉使桓溫溫以胡戲瓉瓉曰在北曰狐在南曰貉何所問也體中癡黠各半文章志顧愷之字長康博學有文章性遲鈍為桓溫參軍甚𬒳親近溫嘗語人曰愷之體中有癡黠各半合而論之只得平爾記室腹心之任魏志太祖以陳琳阮瑀管記室軍國書檄多琳瑀所作于時鍾會以中郎在大將軍府管記室事為腹心之任時人謂之子房報答書記典略阮瑀字元瑜曹洪聞其有才既使報答書記瑀不肯榜笞瑀終不至洪以語曹公公知其無病使人呼瑀瑀惶怖放杖詣門公見之謂曰卿不肯為洪且為我作之瑀曰諾遽任記室専主文翰見參軍門以稱職見知晉書孔衍字舒元元帝引為安東參軍専掌記室書令殷積而衍每以稱職見知昆季總文房之職南史梁建安王為雍州刺史表求管記以江革為征北記室參軍與弟觀少長共居不忍離别苦求同行以觀為征北行參軍兼記室時吳興沈約樂安任昉與革書云比聞雍府妙選英才文房之職總卿昆季可謂馭二龍於長途聘騏驥於千里途次江夏觀卒馭二龍於長途上從事中郎遺二婢晉書祖納字士言最有操行能清言文義可觀性至孝少孤貧常自炊㸑以養母平北將軍王敦聞之遣其二婢辟為從事中郎有戲之曰奴價倍婢納曰百里奚何必輕五羖皮耶才器雋秀晉中興書謝萬少而才器雋秀太宗聞其名取萬為撫軍從事中郎方直儒雅王隱晉書嵇紹方直儒雅為衛將軍從事中郎志越其疇三輔決録鄭達字文信纍辟不就大將軍何進表為從事中郎録曰文信超然志越其疇舍人漢書爰盎為將軍吕祿舍人壯勇前漢田叔字子仁以壯勇為衛將軍舍人令史占對間雅聲氣如流典略邉讓字文禮大將軍何進聞其名欲以禮辟恐不肯來乃使以軍事召之到署令史進以禮見之讓占對間雅聲氣如流時坐客百數皆高慕之職官分紀卷三十三
