body:
  text: 職官分紀卷五十宋孫逢吉撰官數通典唐官數闕尚書曰唐虞建官惟百而鄭𤣥云虞官六十唐官未聞堯舜同道或皆六十并屬官而言則皆有百虞官六十員明堂位曰有虞氏官五十而鄭注云六十夏官一百六十員尚書云夏商官倍注云一百二十殷官二百四十員明堂位曰殷官二百而鄭注云二百四十周官六萬三千六百七十五員内二千六百四十三人外侯國官六萬一千三十二人按王制云殷時天下諸侯國千七百七十三當時殷氏政衰諸侯相并季末之時所存之國耳大國二百四十九次國五百一小國一千二十三凡列國卿大夫士有六萬一千二十二人及周初有千八百國列國卿大夫士大約與殷不異漢官自丞相至佐史凡一十三萬二百八十五員哀帝時數兼諸府州郡胥吏後漢七千五百六十七員晉六千八百三十六員宋六千一百七十二員齊二千六十三員後魏七千七百六十四員北齊二千三百二十二員並内官後周二千九百八十九員並内官隋一萬二千五百七十六員内官二千五百八十一員外官郡縣九千九百九十五員大唐一萬八千八百五員内二千六百二十員外郡縣官六萬六千二百八十五官品通典周官九命漢自中二千石至斗食凡十六等後漢自中二千石至斗食凡十三等魏秩次多因漢制更置九品晉宋齊梁並因之梁更計十八班班多者為貴陳因之後魏置九品各置從凡十八品自四品以下每品分為上下階凡三十階北齊因之後周制九命毎命分為上下凡十隋置九品品各有從自四品以下毎品分為上下凡三十階自太師始謂之流内流内自此始也煬帝除上下階留正從各九品又置視正二品至九品各有從自行臺尚書令始謂之視流内視流内自此始也大唐自流内以上並因隋制又置視正五品視從七品謂之視流内又置勲品九品者自諸衛録事及五省令史始謂之流外流外自此始也勲品自齊梁以來有之國朝元祐令有九品品各有從總封爵書武成列爵惟五分土惟三五等公侯伯子男列土封國公侯方百里伯七十里子男五十里為三品禮王制王者之制禄爵公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等天子之田方千里公侯田方百里伯七十里子男五十里不能五十里者不逹於天子附於諸侯曰附庸天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸凡四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一國名山大澤不以封其餘以為附庸閒田八州州二百一十國天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以禄士以為閒田縣内夏時天子所居州界名也凡九州千七百七十三國天子之元士諸侯之附庸不與千里之外設方伯五國以為屬屬有長十國為連連有帥三十國以為卒卒有正二百一十國為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯千里之内曰甸千里之外曰采流謂九州之外天子三公九卿二十七大夫八十一元士此夏制也大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人天子使其大夫為三監監於方伯之國國三人使佐方伯領諸侯天子之縣内諸侯禄也選賢置之於位其國之禄諸侯不得世外諸侯嗣也有功乃封之使之世也冠禮曰繼世以立諸侯象賢也制三公一命卷若有加則賜也不過九命次國之君不過七命小國之君不過五命大國之卿不過三命下卿再命小國之卿與下大夫一命諸侯世子世國大夫不世爵世以徳爵以功未賜爵視天子之元士以君其國諸侯之大夫不世爵禄周禮大司徒凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一大宗伯以九儀之命正邦國之位壹命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯典命掌諸侯之五儀諸臣之五等之命上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命子男五命王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之内史凡命諸侯及孤卿大夫則䇿命之大司馬之職掌邦國之九灋以佐王平邦國制畿封國以正邦國設儀辨位以等邦國大行人以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賔客前漢諸侯王表昔周監於二代三聖制法立爵五等封國八百同姓五十有餘周公康叔建於魯衛各數百里太公於齊亦五侯九伯之地所以親親賢賢褒表功徳關諸盛衰深根固本為不可抜者也通典黄帝旁行天下分建萬國唐虞夏建國凡五等曰公侯伯子男殷公侯伯三等公百里侯七十里伯五十里周公侯伯子男五等周公居攝改制並見前秦爵二十等最高徹侯乃得食縣其次關内侯食租税於關内餘十八等犬庶長以下則如吏職前漢爵二等曰王曰侯後漢亦二等皇子封王其郡為國其列侯雖鄧冦元勲不過四縣魏王公侯伯子男次縣鄉亭關内等侯凡九等關内侯為虚封自此始也晉亦有王公侯伯子男又有開國郡公縣公郡侯縣侯伯子男及鄉亭關内等侯凡十五等宋氏亦用晉制唯小大國皆有三軍齊梁因之定制諸王言曰令境内稱之曰殿下公侯言曰教境内稱之日第下自第下稱皆曰寡人相以下表數如臣而不稱臣文書下郡官皆日告陳有郡王嗣王藩王開國郡公開國縣公侯伯子男沐食侯鄉亭侯關内侯關外侯凡十三等後魏有王公侯伯子男六等凡王食半公三分食一侯伯四分食一子男五分食一北齊有王公侯伯子男六等後周有公侯伯子男五等隋有國王郡王國公郡公縣公侯伯子男凡九等唐有國王郡王國公郡縣開國公侯伯子男凡九等並無官其上加實封者以租調給國朝元祐令王正一品嗣王郡王國公公從一品開國縣公從二品開國侯正三品開國伯正四品開國子正五品開國男從五品春明退朝録凡輔臣宣徽使初入封三代為東宫三少曽祖少保祖為少傅父為少師因進官或遇大禮進加至太師兩令國公使相節度使亦封三代尚書資政殿大學士三司使封二代至太尉大學士自如兩府例學士至待制封一代至太尉餘升朝官以上至吏部尚書父歴兩府贈至太師令國公歴兩制大兩省贈至太尉舊制將相食邑萬户即封國公王太尉為相過萬户而謙抑不封慶厯七年南郊中外將相唯夏鄭公滿萬户中書請封英國公因詔使相未滿萬户皆得封於是王文康封遂國公章文簡封郇國公王武恭封冀國公其後遂邑不滿萬户者皆封國朝以來封國公者范侍郎魯王文獻祁向侍中拱譙秦靖難節度劉公重進燕保大節度趙公賛衛定國節度馮公繼業梁張侍中永徳鄧衛張尚書昭舒鄭陳孟中令昶秦王中令彦超邠趙中令梁許陳吕文穆蔡徐許㓂忠愍萊丁秘監晉馮缺王文穆冀張榮僖岐鄧徐吕文靖申許王文正沂張文懿郢鄧章文簡郇夏文莊英鄭王文康遂鄧王武恭祁冀魯賈文元安許魏陳恭公英岐文侍中潞杜正獻祁宋元憲莒鄭龎莊敏潁韓侍中魏儀衛曽侍郎英兖魯冨相祁鄭韓兼五侯地史記太公兼五侯地尊勤勞也必封不久騶忌見齊王三日而受相印淳于髠曰善說哉髠有愚志願陳前髠説畢趨出至門而靣其僕曰是人者吾語之㣲言五其應我若響之應聲是必封不乆矣殺降不得侯前漢李廣與望氣王朔語曰漢擊匈奴廣未嘗不在其中而諸校尉以下材能不及中人以軍功取侯者數十人廣不為後人然終無尺寸功以封邑者何也豈吾相不當侯耶朔曰試自念豈甞有所恨者乎廣曰吾為隴西太守羌甞反吾誘降者八百餘人詐而同日殺之至今恨獨此耳朔曰禍莫大於殺已降此乃將軍所以不得侯也典諸侯封事東觀漢記馮勤使典諸侯封事勤差量功次輕重國土遠近地勢豐薄不相踰越莫不厭服自是封爵之制非勤不定受茅土漢雜事天子大社以五色土為壇封諸侯者取其土苴以白茅受之各以所封方之邑以立社於其國故謂之受茅土漢興唯皇子封為王者得茅土其他臣以户賦租入為節不受茅土不立社尚功尚恩吕民春秋太公望封於齊周公旦封於魯二君者甚相善也相謂曰何以治國太公望曰尊賢尚功周公曰親親尚恩太公曰自此削矣周公曰魯雖削有齊者亦必非吕氏也其後齊日以大至於二十四世而田氏有齊國魯日以削至僅四十四世而亡之列土分疆皆以為民白虎通王者即位先封賢者憂民之急也故列土分疆非為諸侯張官設府非為卿大夫皆以為民而已明王所貴惟爵商君書明王之所貴惟爵賞不榮則民不急列爵不顯則民不事爵易得也則民不貴禄賞不道則民不以死争位也世為强國鹽鐵論昔太公封營丘之墟辟草萊而居焉地薄人少於是通利末之道極女工之巧是以隣國交於齊財畜貨殖世為强國管仲相桓公襲先君業輕重之變南服强楚而霸諸侯斬一牙門將者封侯袁子今有卿相之才居三公之位其治政以寧國家未必封侯也今軍政之法斬一牙門將者封侯夫斬一將之功孰與安寕天下者乎夫斬一將之功者封侯失封賞之意也萬國盛磐石之固晉陸機五等論曰五等之制始於黄唐郡縣之始創自秦漢得失成敗備在典謨使萬國相維以成磐石之固宗庶雜居而定維城之業以爵為賞者民勸而費省後魏王粲爵論以貨財為賞者不可供以復除為賞者租税損减以爵為賞者民勸而費常省故古人重爵也天中容半印相書天中容半印者封侯天中正陷如刀人天中正陷如刀封侯親戚封左傳太上以徳撫民其次親親以相及也昔周公弟二叔之不咸故封親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公𦙍也詩閟宫乃命魯公俾侯于東錫之山川土田附庸前漢諸侯王表漢興之初海内新定同姓寡少懲戒亡秦孤立之敗尊王子弟大啓九國燕代齊趙梁楚荆呉淮南長沙魏志明帝詔改封諸王以郡為國崇建懿親呉胡綜請立諸王表曰崇建懿親列土封爵内蕃國朝外鎮天下古今同契其揆一也周室之興寵秩子弟姬姓之國五十有五諸王子受國者漸多光武中興四海擾攘凡諸制度未徧而九子受國明章即位男則封王女為公主二十五宗晉孫毓賀封諸侯王表曰軒轅二十五宗黄祚以繁姬姓建國七十周過其厯非親莫居惟賢斯授梁封臨川安興建安等五王詔曰非親莫居惟賢斯授伯叔追封琅邪傳國陳徐陵陳始興王詔曰漢祖天倫伯叔追封晉元世系琅邪傳國功臣封周禮司勲掌六鄉賞地之法以等其功王功曰勲國功曰功民功曰庸事功曰勞治功曰力戰功曰多史記古者人臣功有五品以徳立宗廟定社稷曰勲以言曰勞用力曰功明其等曰伐積日曰閱前漢諸侯王表漢興之初海内新定於是剖裂疆土二等之爵項羽曰漢封功臣大者王小者侯功臣侯者百有餘邑漢官解詁列侯金印紫綬以賞其有功功大者食縣邑小者鄉亭得臣其所食吏本謂徹侯避武帝諱曰通侯後更曰列侯封尚父於齊營丘史記武王克紂太公之謀居多於是封尚父於齊營丘成王幼少管蔡作亂淮夷畔周乃使召康公命太公東至海西至河南至穆陵北至無棣五使九伯實得征之由此征伐為大國也封召公於燕召公奭與周同姓武㓕紂封召公於燕封熊繹於楚鬻熊事周文王早卒當武王之時舉文武勤勞之嗣封熊繹於楚畢萬之後必大晉獻公伐霍耿魏滅之因以魏封畢萬為大夫卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣河山如帶漢興滅秦八載而天下乃平始論功而定封侯者百四十有三人時民人散亡大侯不過萬户小者五六百户封爵之誓曰使黄河如帶太山若礪於是申以丹書之信重以白馬之盟藏諸宗廟副在有司六益封陳平凡六出竒計計輙益封邑六益封列侯庶姓高祖封項伯等四人為列侯賜姓劉氏分地五封項羽曰吾聞漢購我頭千金邑萬户吾為若徳乃自刎而死王翳取其頭楊喜吕馬童吕勝楊武各一體故分其地為五封四縣三縣後漢中興論功封大功臣呉漢鄧禹各四縣賈復朱浮三縣耿弇等二十九人封侯不過百里東觀記上封功臣皆為列侯大國曰縣餘各有差博士丁恭等議古帝王封國不過百里故利以建侯富貴歸故鄉景丹字孫卿馮翊櫟陽人丹為驃騎大將軍封櫟陽侯帝謂曰今關東故王國雖數縣不過櫟陽萬户邑夫富貴不歸故鄉如衣繡夜行故以封卿爾定西域五十餘國班超定西域五十餘國悉皆納質内屬焉於是下詔封為定遠侯七十二孫皆關内侯魏志夏侯惇文帝追思惇功欲使子孫畢侯分邑千户七十二孫一皆關内侯惇弟亷及子林素列侯矣五子皆列侯曹真以功封邵陵侯真少與宗人曹遵鄉人朱讃並事太祖早亡真愍之乞分食邑封侯遵等子詔曰大司馬有叔向撫孤之仁晏平乆要之分賜遵等子爵關内侯及真薨明帝悉封真五子皆列侯大功未必野戰太祖表荀彧為萬歳亭侯太祖又與彧書曰君之相輔弼君之相為舉人君之相與建計君之相宻謀亦己多矣大功未必野戰也十二年復増食邑三千户前後尅敵皆其謀太祖表封荀攸曰前後尅敵皆其謀也封攸陵樹亭侯自擇所封太祖自栁城還過攸舍称攸前後謀曰昔高祖使張子房自擇齊三萬户君臣之間可謂相得矣今亦欲君自擇所封謀功為高増邑千户郭嘉字奉孝冀州平封洧陽亭侯及薨太祖表曰良䇿未决嘉輙成之平定天下謀功為高宜増邑并前千户高唐宿所願朱靈字文博封鄃侯帝曰將軍佐命先帝威行方郡平生所志願勿難言靈謝曰高唐宿所願乃更封高唐侯一門十侯冊孫太子登為東中郎將封縣侯萬户昔周嘉公旦祚流七𦙍漢封蕭何一門十侯建國開宇蕃屏王室梁任昉封諸功臣詔建國開宇蕃屏王室山河之誓永永無窮辭辟封奔宋左傳㑹于戚討曹成公也將立子臧辭曰前志有之曰聖逹節次守節遂逃奔宋棄室而耕呉子諸樊既除䘮將立季札季札辭而不受曰昔諸侯與曹人不義曹君將立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也誰敢奸君有國非吾節也棄其室而耕獨存九世而禮不絶韓子曰楚莊王既勝晉于河雍歸而賞孫叔敖叔敖請漢間之地沙石之處楚國之法禄官再世故唯叔敖獨存九世而禮不絶劾奏受爵前漢韋賢薨子𤣥成當為嗣心知非賢意乃佯狂妄語笑既葬當襲爵𤣥成素有名疑其欲讓兄遂劾奏之𤣥成不得已乃受侯爵讓職還土東觀漢記竇融數辭爵位又上䟽曰臣有一子質性頑鈍何况乃當傳以連城廣土享諸侯之國哉他日㑹見遂詔曰欲讓職還土今相見不冝論也不得已受封桓榮卒子郁當襲爵讓於兄子顯宗不許不得已受封悉以租入與之諸將皆欲縣獨求鄉丁琳從上渡河及封功臣上令各言所樂謂琳曰諸將皆欲縣子獨求鄉何也琳曰昔孫叔敖勑其子受封必求磽硧之地今琳能薄功㣲得鄉厚矣上從之封定陵新安鄉侯下獄襲封張鈍臨終謂家丞曰吾無功猥䝉爵土身死之後勿議傳國爵子奮上詔奮嗣爵奮稱鈍遺㫖固不肯受帝以奮違詔收下獄奮乃襲封不奪其志文帝欲封樊興印綬已具興固讓曰臣未有先登䧟陣之功而一家數人並蒙爵土令天下之人觖望上嘉之不奪其志斷絶封諸舅上欲封諸舅太后輙斷絶曰計之熟矣勿有疑也至孝之行安親為上今遭變異穀價數倍憂惶晝夜不安坐卧而欲封爵違逆慈母之拳拳吾素剛急有胸中氣不可不慎穰嵗之後唯子之志吾但含飴弄孫不能復知政豈可賣盧龍塞以易賞禄魏志田疇從太祖入盧龍塞太祖獨欲侯之疇素與夏侯惇善太祖語惇曰且徃以情喻之荅曰豈可賣盧龍塞以易賞禄哉縦國私疇疇獨不愧於心乎涕泣横流惇具荅太祖喟然知不可屈拜為議郎遺操益厲聴復本封晉起居注故南城侯羊祜固辭歴年志不可奪身沒讓存遺操益厲亦夷齊所稱賢也今聴復本封以彰厥美一門受封連城食邑魏武帝上書讓封曰蕭相國以關中之勞一門受封鄧禹以河北之勤連城食邑有連城而不辭有一邑而違命讓費亭侯書曰或有連城而不辭或有一邑而違命所以然者欲必正其名也婦人封六典外命婦之制皇姑封大長公主皇姊妹封長公主皇女封公主皆視正一品皇太子之女封郡主視從一品王之女封縣主視正二品王母妻為妃一品及國公母妻為國夫人三品以上母妻為郡夫人四品若勲官二品有封母妻為郡君五品若勲官三品有封母妻為縣君散官並同職事勲官四品有封母妻為鄉君其母邑號皆加太字各視其夫及子之品古者諸侯之妻邦人謂之曰夫人亦曰小君春秋傳云惠公元妃孟子則妃及夫人郡君縣君鄉君之號皆起於此漢高祖封蕭何夫人為鄼君景帝封王皇后母曰平原君後漢安帝封乳母王聖為野王君獻帝封董卓母為池陽君晉封虞潭母孫氏武昌侯太夫人加金章紫綬太康元年封羊城夫人為鄉君孝武時哀帝外祖母高安鄉君進封宣郡廣徳君宋髙祖母蕭氏初封豫章國太夫人妻臧氏為國夫人晉令式云郡公侯太夫人夫人皆銀印青綬佩水蒼玉宋齊之後多用其制至隋氏始定品格皇朝因之國朝皇太后三代祖母皇太子三代外祖母宗室郡國王曽祖母亡母並追封國太夫人諸叙封者祖母母追封亦同下准此宰相使相尚書令三師三公王母為國太夫人曽祖母祖母亦同妻為國夫人並中書施行㕘知政事宣徽使樞宻副使東宫一品二品尚書省二品三品御史大夫兩省侍郎太常卿留守節度使西班二品嗣王郡王國公郡公縣公大都督大都䕶母為郡太夫人妻為郡夫人㕘知政事第二次叙封母特加國太夫人並司封施行如夫子曽任將相已經封國者仍舊曽經封三代二代者准此東宫一品尚書省二品不帶平章事留守節度使祖母並許追封郡太夫人止左右常侍太子賔客御史中丞左右丞諸行侍郎給事中諫議大夫正言中書舍人翰林學士龍圖閤直學士以上諸寺大卿監國子祭酒太子詹事諸王傅諸衛大將軍中都護中都督防禦團練使母並封郡太君妻封郡君左右庶子諸寺少卿監諸行郎中國子監司業三京少尹赤令太子詹事左右諭徳衛將軍諸州刺史下都䕶下都督太子家令太子率更令太僕母並封縣太君妻封縣君諸母妻未封叙雖位至三品亦從初而叙諸任上州刺史或缺使缺并在京將軍諸衛將軍小將軍以上初任聴叙封母妻其自班行及遥郡除授中下州刺史者已同兩班次任即便許叙封五府少尹大都督左右司馬並許與母妻一次叙封元祐令諸封郡縣君鉅鹿樂安壽春仙逰萬嵗萬壽皆避之春明退朝録凡宰相使相母封國太夫人妻封國夫人樞宻使副使㕘知政事尚書節度使母封郡太夫人妻封郡夫人樞宻㕘知政事母經南郊封國太夫人直學士以上給諫大卿監觀察使母封郡太君妻封郡君舊制學士官至諫議大夫以上方得郡封天禧中詔改之少卿監防團以下至升朝官母封縣太君妻封縣君石窌左傳晉敗齊師諸侯遂自徐關入齊侯見保者日勉之齊師敗矣辟女子女子曰君免乎曰免矣鋭司徒免乎曰免矣茍君與吾父免矣可若何乃奔齊侯以為有禮既而問之辟司徒之妻也予之石窌封丘封翟母陳留風俗傳封丘者高祖與項氏戰厄於延鄉有翟母者免其難故以延鄉為封丘縣以封翟母焉勿抱舊典國朝開寳九年以錢俶妻賢徳順睦夫人孫氏為呉越國王妃女封彭城郡君時宰相言自古異姓諸侯王妻無封妃之禮太祖曰行自我朝勿抱舊典遣使存問超加封號咸平五年封供備庫使知鄜州衛居實母郭氏為邠陽郡太君居實扞冦有功母老寓潞州真宗聞之遣使存問超加封號公朝降命無嫌景徳四年封兵部侍郎樞宻院事陳堯叟母馮氏為上黨郡太夫人初馮氏從夫之故未加郡號堯叟父既卒至是帝欲褒封之問宰相王旦旦曰私門禮制未闋然公朝降命亦無嫌也故有是命詳討故事特加封郡號十二月駙馬都尉石保吉庶女為樂陵郡君初晉國長公主亟為乞恩帝以無例令中書詳討故事特加封郡號尊賢繼絶封尊賢不過二代禮記天子存二代之後猶尊賢尊賢不過二代武王克殷未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於祝殷之後於宋封陳備三恪左傳鄭子産曰昔虞關父為陶正以服事我先王先王頼其利器用與其神明之後也庸以元女大姬配胡公而封諸陳以備三恪封樂毅後為華成君漢高祖問樂毅有後乎得樂臣俶封之囂夏商世以備賓位自古創業之君必興滅繼絶修廢舉逸然後天下歸仁四方之政行周克殷追存賢聖至乎不及下車世代雖殊其揆一也高祖撥亂日不暇給然猶修祀六國求聘四皓過魏則寵無忌之墓適趙則封平原之後孝武疇咨前代初得周後復加爵邑元成之閒晚得夏商世以備賔位封周後為周子南君武帝還過洛陽三代邈逺以其三十里地封周後為周子南君紹蕭何曹參周勃後高祖功臣侯者子孫驕逸多䧟法禁訖于孝武靡有子遺於是成帝復紹蕭何哀平之世増修曹參周勃之後紹爵復家元康四年立靳歙夏侯嬰陳平張良周勃等一百一十八人後紹爵復家封曽孫為侯元狩中復以鄼户二千四百封蕭何曽孫慶為鄼侯布告天下令明知朕報以相國徳慶厚也景風紹封東觀漢記高祖功臣蕭曹為首有傳世不絶之誼蕭相國後容城侯無嗣朕甚愍焉望長陵東門見二臣之墓生既有節終不遠身誼臣受寵古今所同遣使者以中牢祀大鴻臚悉求近親宜為嗣者須景風紹封以彰厥功雙金重紫魏武帝謝襲費亭侯表曰未盈一時三命交至雙金重紫顯以方任雖不失義庶知所死誠足憐傷郭嘉追贈封表曰昔霍去病蚤死孝武為之咨嗟祭遵不究功業世祖望柩悲慟仁恩降下念發五内今嘉隕命誠足憐傷封近屬晉陽秋曰夏侯惇魏之元功勲書竹帛昔庭堅不祀猶或悼之况朕受終於魏而可忘其功臣哉其擇惇近屬封之興滅繼絶晉中興書泰元二年興滅繼絶故陳騫後浩之為高平公裴秀後球為鉅鹿公王沈後朴為博陵公荀勗後軌為濟北侯何曽後闡為朗陵侯羊祜後法興為鉅平侯紹封魏後元帝紹封魏後復曹勵為陳留王紹高宻者累葉嗣平陽者重世後周廋信襲封功臣不死王事表曰嘗聞紹高宻者累葉豈專鄧禹之正𦙍嗣平陽者重世何必曹參之嫡孫愚謂生有其勞死非王事雖在支庶並聴承襲幸使伯有之䰟不能為厲若敖之鬼其無餒而幽顯封揚人神咫尺俸禄禮記王制王者之制禄公侯伯子男凡五等制農田百畆百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫五人庶人在官者其禄以是為差也諸侯之下士視上農夫禄足以代其耕也其中士倍下士上士倍中士下大夫倍上士卿四大夫禄君十卿禄次國之卿三大夫禄君十卿禄小國之卿倍大夫禄周禮内史掌王之八枋之法以詔王治二曰禄王制禄則賛為之以方出之前漢自中二千石至百石凡十二等中二千石月俸八十斛千石百二十斛比二千石百斛千石百斛六百石七十斛比六百石六十斛四百石五十斛比四百石四十五斛三百石四十斛比三百石三十斛二百石三十斛比二百石二十七斛百石十六斛後漢大將軍三公俸月三百五十斛凡諸受俸者皆半錢半榖延平中定制中二千石俸錢九千米七十三斛真二千石錢六千五百米三十六斛比二千石五千三十四斛一千石四千三十斛六百石三千五百二十一斛四百石二千五百十五斛三百石二千十二斛二百石一千九斛百石八百四斛八斗臘及立春更班賜有差宋州郡秩俸多随土所出無有定准有父母祖父母年登七十者並給見錢其郡縣田禄以芒種為斷此前去官者則入前人此後去官者則入後人梁一品秩萬石二品三品為中二千石後魏其禄毎季一請諸宰人之官各隨近給公田刺史十五頃太守十頃治中别駕各八頃縣令郡丞六頃更代相付北齊官秩一品毎歲八百疋從一品七百疋二品六百疋從二品五百疋三品四百疋從三品三百疋四品二百四十疋從四品二百疋五品一百六十疋從五品一百二十疋六品百疋從六品八十疋七品六十疋從七品四十疋八品三十六疋從八品三十二疋九品二十四疋執事官一品以下給公田有差後周制禄秩下士一百二十五石中士以上至於大夫各倍之上大夫是為四千石卿二分孤三分公四分後益其一公因盈數為萬石其九秩百二十石八秩以至七秩毎二等六分而下各去其一二秩一秩俱為四千石隋京官一品禄九百其下毎以百石為差至正四品是為三百石從四二百五十石其下毎以五十石為差至正六品是為百石從六品九十石以下以十石為差至從八品是為五十石其給皆以春秋二季刺史太守縣令京官給職分田一品者給田五頃至五品則為田三頃其下毎品以五十畆為差又給公廨田以供用六典倉部郎中掌國之倉庾受納租税出給禄稟之事凡百官毎年禄正一品七百石從一品六百石正二品五百石從二品四百六十石正三品四百石從三品三百六十石正四品三百石從四品二百六十石正五品二百石從五品一百六十石正六品百石下以十石為差至從七品七十石正八品六十七石下以五石為差至從九品五十二石外官降為一等應降等者正從一品各以五十石為一等二品三品以三十石為一等四品五品皆以二十石為一等六品七品以二石五㪷為一等春夏二季則春給之秋冬二季則秋給之國朝大中祥符五年詔定加文武職官月俸三師月俸百二十貫東宫三師僕射九十貫東宫三少御史缺尚書左右常侍六十貫兩省侍郎太常卿御史中丞左丞右丞侍郎五十五貫太子賔客給事中中書舍人缺監光禄卿衛尉太僕大理鴻臚司農缺殿中監少府將作監太子詹事司天監四十五貫缺大夫四十貫少卿監國子司業左右諭徳諸行郎中三十五貫詹事二十九貫起居郎舍人侍御史殿中侍御史左右司課諸行員外郎四赤縣令三十貫正言監察御史太常博士通事舍人國子五經博士太常宗正秘書殿中丞著作郎大理正二十貫率更令尚奉御太子中允賛善中舍洗馬十八貫司天五官正十三貫秘書郎著作佐郎十七貫大理寺丞十四貫諸寺監丞十二貫大理評事奉禮太祝八貫諸衛上將軍六十貫金吾大將軍三十五貫諸衛大將軍二十五貫將缺職官分紀卷五十
