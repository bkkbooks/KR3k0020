body:
  text: 職官分紀卷三十八宋孫逢吉撰三輔前漢百官志內史周官秦因之掌治京師景帝二年命置左內史右內史武帝太初元年更名京兆尹秩二千石銀印青綬進賢兩梁冠降朝服佩水蒼玉屬官有長安市厨兩令丞又都水鐵官兩長丞左內史更名左馮翊其屬官有廪犧令丞尉又左都水鐵官雲壘長安四市四長丞皆屬焉又主爵中尉秦官掌列侯景帝中六年更名都尉武帝太初元年更名右扶風治內史右地屬官有掌畜令丞又有都水鐵官廄雍厨四長丞皆屬焉與左馮翊京兆尹是為三輔皆有兩丞列侯更屬大鴻臚元鼎四年更置三輔都尉後漢百官志河南尹一人其京兆尹左馮翊右扶風三人漢初都長安皆秩中二干石謂之三輔中興都雒陽更以河南郡為尹以三輔陵廟所在不改其號但减其秩應劭漢官儀河南尹新治周地也雒陽本成周周之衰微分為東西周秦兼天下治三川守河雒伊也漢更名河南孝武增曰太守世祖中興徒都雒陽改號為尹尹正也詩云赫赫師尹晉中興書晉太興元年改丹陽內史為丹陽尹通典凡前代帝王所都皆曰尹南朝曰丹陽尹後魏初曰代尹東魏曰魏尹北齊曰清都尹隋職官志隋雍州置牧京兆郡置尹唐職官志京兆河南太原等三府牧各一員從二品牧古官舜置十二牧是也秦以京城守為內史漢武改為尹後魏北齊周隋又以京守為牧武德初因隋置牧以親王為之或不出閣長史知府事尹各一員從三品京城守秦曰內史漢曰尹後代因之隋為內史武德初置牧以內尹總府事開元初并改府升長史為尹從三品専總府事少尹各二員從四品下魏晉以下州府有治中隋文改為司馬焬帝改為贊治又為丞武德改為治中永徽避高宗名改為司馬開元初改為少尹唐會昌三年五月京兆尹奏兩街閒行不事家業㸃刺身已屠宰猪狗酗酒鬬打及僦搆關節下脫錢物摴蒱賭錢人等伏乞今後如有犯者許臣追捉若是百姓當時處置屬諸軍諸使禁身奏聞從之六典京兆河南太原府牧各一人從二品昔舜分九州為十二置牧大禹鑄鼎貢金九牧周禮八命作牧秦分天下為三十六郡京為內史漢改為京兆尹秩二千石後漢都洛陽為河南尹魏晉因之歷代所都皆為尹江左為丹陽北齊為清都後周及隋復為京兆尹始秦分天下令御史監郡漢省之丞相遣史分刺諸州武帝初置郡刺史十三人掌奉詔條察州秩六百石類今之十道使也又置司𨽻校尉部三輔三河𢎞農類今之京畿按察使也成帝更名刺史為牧秩二千石後漢復為刺史後復為牧魏晉以下皆為刺史晉武帝罷司𨽻校尉置司州牧江左為揚州刺史後魏北齊皆為司州牧後周置雍州牧隋因之大業三年罷州置郡京兆河南皆為尹則兼牧之任矣皇朝又置雍州牧洛州初為都督府及置都亦為牧開元初復為京兆河南尹尹一人從三品漢京兆尹有都尉又丞皆詔除都比二千石典武職丞秩六百石後漢省都尉州又置别駕治中皆刺史自辟除魏晉以下皆因之隋文帝罷郡以州統縣改别駕治中為長史司馬煬帝罷州置郡罷長史司馬置贊治後改為丞又置通守以二太守京兆河南等為內史皇朝置雍州别駕永徽中改為長史正四品下開元初改長史為尹從三品然親王為牧皆不知事務職總歸於尹亦漢京兆之任少尹二人從四品下魏晉以下有治中隋文改為司馬焬帝改為贊治後改為丞皇朝復曰治中後避高宗諱改為司馬開元初改為少尹置二員司録參軍事二人正七品上漢魏以來及江左郡有督郵主簿蓋録事參軍之任也皆太守自辟除後魏北齊後周隋氏州皆有録事參軍及罷郡以州統縣皆吏部選除煬帝罷州置郡有東西曹掾及主簿皇朝省掾主簿置録事參軍開元初改為司録參軍録事四人從九品上隋置京兆録事四人皇朝因之府史各二人功曹參軍事二人正七品下漢魏以下司𨽻校尉及州郡皆有功曹戶曹賊曹兵曹等員北齊諸州有功倉中兵外兵甲法士左戶等參軍事隋諸州有工曹戶部兵曹等參軍事法曹士曹行參軍郡有西曹金曹戶曹兵曹法曹士曹等及罷郡置州以曹為名者改曰司煬帝罷州置郡改司功司倉司戶司兵司法司士等為書佐皇朝因其六司而改書佐為參軍事開元初為功曹參軍倉曹參軍事二人正七品下北齊諸州有倉曹參軍事隋文改為司倉煬帝改書佐皇朝復府八人史十六人户曹參軍事二人正七品下漢魏以來州郡皆有戶曹掾或為左右隋有戶部參軍文帝改司戶煬帝改書佐皇朝因為司戶參軍開元初為戶曹參軍府十一人史二十二人帳史一人景雲初置兵曹參軍事二人正七品下漢魏以來諸州皆有兵曹或為中兵外兵騎兵北齊以下改復並與功曹同府九人史十八人法曹參軍事二人正七品下漢魏以來州郡皆有賊曹决曹掾或法曹或墨曹自隋以下改復並與上同府九人史十八人士曹參軍事二人正七品下北齊諸州有士曹行參軍以下改復並與上同府七人史十四人參軍事六人正八品下注同王府參軍下國朝以開封河南應天為三京府牧不置唯仗內引則遣官攝事內史非素重臣不能任前漢汲黯傳公孫𢎞為相上言曰右內史界部中多貴人宗室難治非素重臣不能任請徙黯為右內史數嵗官事不廢不拜大將軍汲黯為右內史大將軍青既益尊姊為皇后然黯與亢禮或說黯曰自天子欲令羣臣下大將軍尊貴誠重君不可以不拜黯曰夫以大將軍而有揖客反不重邪開六輔渠倪寬遷左內史寬既治民勸農業表奏開六輔渠定水令以廣溉田收租稅時裁闊猿與民相假貸以故租多不入後有軍發左內史以負租課殿當免民聞皆恐失之大家牛車小家擔負繫租襁屬不絶課更以最上由是愈竒寬以國事為己任孔坦字君平為吳內史以國事為己任悲戚如身中之疾以私米作饘粥王薈字敬文恬虛守靜不競榮利為吳國內史時年飢粟貴人多飢死薈以私米作饘粥濟活甚衆嵗節放囚宋書謝方明為臨川內史至臨川嵗節放囚歸家囚感恩德赴期還獄出公祿營護殯葬梁書顧憲之仕齊為衡陽內史先是郡境連嵗疾疫死者大半棺槨尤貴悉裹以笙席棄之道旁憲之下車分告屬縣求其親黨悉令殯葬其家人絶滅者憲之乃為出公祿使綱紀營護之又土俗家人有疾輒云先亡為禍皆開冢割棺水洗枯骸名為除祟憲之曉諭為陳先死之别事不相由風俗遂改時刺史王興初至唯衡陽獨無訟者乃嘆曰顧衡陽之治至矣風雨飄㕔事傅昭為安成內史部自宋以來兵亂相接府舍稱凶每昏旦間人鬼相觸在地者鮮以吉終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰虛而去有頃風雨總至飄郡㕔事入隍中自是郡遂無患又郡多猛獸為害常設檻穽昭曰人不害猛獸猛獸亦不害人乃命去檻穽竟不為害咸以昭誠至所致也閉閣卧理殷鈞為臨川內史體羸多疾閉閣卧理百姓化其德劫盜皆奔出境在郡清潔政務安靜伏暅為永陽內史在郡清潔政務安靜郡人何真秀等一百五十四人詣州言狀相州刺史以聞詔勘有十五事為吏人所懷帝嘉之一郡無敢行巫袁君正為豫章內史性不信巫邪有師萬世榮稱道術為一郡巫長君正在郡小疾主簿熊嶽薦之師云須疾者衣為信君正命以所著襦與之事竟取襦師云神將送與北斗君君正使檢諸身於衣裹獲之以為亂政即刑於市而焚神一郡無敢行巫吏民化其德張總為豫章內史為政任恩惠不設鈎距吏民化其德亦不敢欺豫章父老咸云數十年未常有也猛獸鬬死郡西北齊書李繪為高陽內史郡境向有三猛獸民常患之繪欲修檻因鬬俱死於郡西咸以為孝感所致皆請申上繪曰因鬬而斃自是偶然將為己功人將窺我不聽不能逐飛走事佞人李繪為河陽內史時河間守崔諶恃其弟權勢從繪乞麋角翎羽繪答書曰翎有六翮飛則冲天麋有四足走便入海下官膚體踈懶手足遲鈍不能逐飛走事佞人是時文襄使暹選司徒暹薦繪既不果調咸由此書也别造玉麟符以代銅獸隋書樊子蓋為河南內史屢有治績文帝謂曰今為公别造玉麟符以代銅獸與朕卧理此州唐書王及善契丹作亂山東不安起授滑州刺史則天謂曰邉賊反叛卿雖疾病可將妻子日行三十里緩步至彼與朕卧理此州已斷河路也因問朝廷得失及善備陳理亂之冝十餘道則天曰彼末事也此為本也卿不可行乃留拜內史京兆尹吏民稱之不容口前漢趙廣漢為京兆尹政清吏民稱之不容口長老相傳以為自漢興以來治京兆者莫能及左馮翊右扶風皆治長安中犯法者蹤迹喜過京兆界廣漢歎曰亂吾治者常二輔也誠令廣漢得兼治之宜差易耳百姓歌之廣漢為京兆尹亷明威制豪彊小民得職百姓追思歌之至今發姦擲伏廣漢為京兆尹發姦擲伏如神吏民號泣願代死廣漢下獄吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使得牧養小民廣漢竟坐要斬枹鼓稀鳴張敞為京兆尹自趙廣漢誅後比更守尹如黃霸等數人皆不稱職長安市偷盜尤多百賈苦之上以問敞敞以為可禁敞既視事求問長安父老偷盜酋長多人居皆溫厚出從童騎閭里以為長者敞皆召見責問因貰其罪把其宿負令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受署敞皆以為吏遣歸休置酒小偷悉來賀且飲醉偷長以赭汚其衣裙吏坐里閭閲出者汚赭輒收縛之一日捕得數百人窮治所犯或一人百餘發盡行法罰由是抱鼓稀鳴市無偷盜張敞循廣漢之迹張敞治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰以此能自全推功善歸於下廣漢為京兆尹和顔接士事推功善歸之於下曰其掾卿所為非二千石所及行之發於至誠吏見者皆輸寫心腹無所隱匿二旬清南山羣盜漢南山羣盜數百人為吏民害逐捕嵗餘不能擒或說大將軍王鳯曰賊數百人在天子輦轂下發軍繫之不能得難以視天下制海內服四夷獨選賢京兆尹乃可以治鳯薦王尊徴為諌大夫遷京輔都尉行京兆尹事旬月間盜賊清遷光祿寺大夫守京兆尹後尊坐免吏民多稱惜之南湖縣三老公乘興等上書訟尊治京兆功效白著往者山盜賊橫行以尊為京兆尹尊盡節勞心夙夜思職卑體下上厲奔北之吏起沮傷之氣二旬之間大黨震攘渠率效首書奏天子復以尊為徐州刺史為婦畫眉張敞為京兆尹朝廷每有大議引古今處便冝公卿皆服敞無威儀時罷朝㑹敞走馬章臺街使御吏驅自以便靣拊馬又為婦畫眉長安中傳張京兆眉嫵有司以奏上問之對曰臣聞閨房之內夫婦之私有過於畫眉者上愛其能弗備責也然終不得大位為京兆尹九嵗與楊惲厚坐惲大逆免名敢直言王章在朝廷名敢直言初章為諸生學長安獨與妻居章疾病無被卧牛衣中與妻訣涕泣其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困厄不自激昻乃反涕泣何鄙也後章仕宦歷位及京兆欲上封事妻又止之曰人當知足獨不念牛衣中涕泣時邪章曰非女子所知也書遂上果下獄死妻子徙合浦前有趙張後有三王漢自孝武置左馮翊右扶風京兆尹而吏民為之語曰前有趙張後有三王謂趙廣漢張敞王尊王章王駿二千石以髙第入守京兆典京師長安中浩穰於三輔尤為劇郡國二千石以髙第入守及為最久者不過三二年近者數月一嵗輒毁傷失名以罪過罷唯趙廣漢張敞為久任職久任職上毋問平反罪人則喜雋不疑為京兆尹吏民敬其威信每行縣録囚徒還其毋輒問有所平反活幾何人不疑曰有其母即喜笑為飲食言語異於他時或亡所出母怒為不食故不疑為吏嚴而不殘嚴而不殘上搏擊豪彊翟方進為京兆尹搏擊豪彊京師畏之胡常與方進書曰竊聞政令甚明為京兆則恐有所不冝方進心知所謂其後少弛威嚴鷹隼始擊當順天氣孫寶徵為京兆尹以立秋日署故吏侯文東部督郵入見勑曰今日鷹隼始擊當順天氣取姦惡以成嚴霜之誅部詎有其人乎文即曰無其人不敢空受職寶曰誰也文曰霸陵杜稚季寶曰其次文曰豺狼橫道不宜復問狐狸寶默然稚季者大俠與衛尉淳于長大鴻臚蕭育等皆厚善寶前失車騎將軍自恐見危亦欲附之名聲重於朝廷始元五年有一男子乘黃犢車建黃旐衣黃襜褕著黃帽詣北闕自謂衛太子丞相御史中二千石至者皆莫敢發言京兆尹雋不疑後到叱從吏縛得之曰昔蒯瞶違命出奔輒距而不納春秋是之衛太子罪先帝亡不即死今來自請此罪人也遂送詔獄由是名聲重於朝廷在位者皆自以為不及也廷尉驗治何人竟得姦詐本夏陽人姓成名方遂邊延二君後漢延篤為京兆尹其政用寬仁憂恤民黎擢用長者與參政事郡中歡愛三輔咨嗟先是陳留邉鳯為京兆尹亦有能名郡人為之語曰前有趙張三王後有邉延二君飲賓客取車轄投井中陳遵為京兆尹嗜酒大飲賓客輒滿堂閉門取賓客車轄投井中雖有急終不得去視民如子謝承後漢書延篤字叔堅為京兆尹視民如子正身率下民不忍欺也正身率下民不忍欺上發姦擲伏明出自然延篤為京兆尹聽訟理寃發姦擲伏明出自然息譽京邑晉袁甫曰人各有能有不能黃霸馳名於州郡而息譽於京邑明智有餘英雄記董卓廢少帝自公卿以下莫不卑下唯京兆尹蓋勳長揖爭禮見者咸為失色卓問王允曰欲得快司𨽻誰可者允曰唯有蓋京兆可卓曰此人明知有餘然不可假以雄職乃以為越騎校尉復出為潁川太守雄職上吏民號泣遮道良吏傳顔裴字子林為京兆尹徙平康太守吏民號泣遮道步步稽留日行數十里及卒立碑作頌焉大臣當用儒術荀恱漢書男子成方遂詣北闕自謂衛太子上使公卿將軍中二千石雜識視之聚觀者數萬人大將軍勒兵闕下以備非常丞相以下至者皆莫敢言京兆尹雋不疑後到叱從吏使收之或曰是非未可知且按之不疑曰昔蒯瞶違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自見此罪人也遂送詔獄窮治奸詐本夏陽人姓成名方遂居湖注湖縣名也以筮卜為事有故太子舍人常從方遂卜謂曰子之貌甚似太子方遂録其言故敢詣闕廷尉逮召其鄉里張宗祿等皆識之方遂坐誣腰斬一云姓張名延年霍光曰大臣當用儒術士明於大義欲以女妻不疑不疑固辭畏盛滿也發姦楊彪為侍中京兆尹光和中黃門令王甫使門生於郡界私榷官財物七千餘萬彪發其奸言之司𨽻校尉楊球因此奏誅甫天下莫不愜心吏民愛敬作歌李燮别傳燮字德公拜京兆尹領蕩寇將軍加憧蓋鼓吹詔發西園錢三億尹上封事拒此橫調并陳禍敗辭義深切遂止不發尹履潔白之節秉執忠良吏民愛敬作歌曰我府君道教舉恩如春威如虎愛如母訓如父恩如春威如虎上减水救旱唐書崔珙為京兆尹京畿旱珙奏滻水入內者十分量减九分賜貧民溉田從之豪右斂迹許孟容為京兆尹神䇿軍吏李昱假貸長安富人錢八千貫滿三嵗不償孟容遣吏收捕械繫尅日命還之曰不及期當死自興元以後禁軍有功者即貴之尤有渥恩者方得議軍故軍士日益縱橫府縣不能制孟容剛正不懼以法繩之一軍盡驚寃訴於上立命中使宣㫖令送本軍孟容繫之不遣中使再至乃執奏曰臣誠知不奉詔當誅然臣職司輦轂合為陛下彈抑豪強錢本盡輸昱才可得上以其守正許之自此豪右斂迹威望大振後為河南尹亦有威名職司輦轂上比趙廣漢劉栖楚改京兆尹摧抑豪右甚有鈎距人多比之於西漢趙廣漢疏决三輔渠李元紘擢京兆少尹尋有詔令元紘疏决三輔渠時諸王公權要之家皆緣渠立磑以害水田元紘令吏人一切毁之百姓大獲其利以察為能於物少恩李齊物纍為京兆尹為政好發官吏隂事每以察為能於物少恩而清亷自飭人吏莫敢抵犯欲得米粟賤無過追李峴李峴遷將作監改京兆尹所在皆著聲績天寶十三載連雨六十餘日宰臣楊國忠惡其不附已以雨災歸咎京兆尹乃出為長沙郡太守時京師米麥踊貴百姓謡曰欲求米粟賤無過追李峴其為政得人心如此雖倉卒必指其姦幸德宗時大旱榖貴人多流亡京兆尹韓臯以政事不理黜官上召吳湊靣授京兆尹即日令視事繼宿方下制湊孜孜為理以勤儉為務人樂其政初府掾吏以湊起自戚藩不請簿領凡有疑獄難决之事多候湊將出時方呈冀免擲瑕病湊雖倉卒閲視必指其姦幸之處下車决斷無毫釐之差掾吏非大過不行笞責而召靣按問詰責而釋之吏尤惕厲庶務咸舉儲蓄之家出粟於市見河南尹輦轂之下彈壓為先栁仲郢先為京兆尹政號嚴明後為河南尹以寬惠為政言事者以為不類京兆時仲郢曰輦轂之下彈壓為先郡邑之治惠養為本烏可類乎政尚寬簡顧少連改京兆尹政尚寬簡不為灼灼名先是京畿租賦薄厚不能一少連以法均之免租逋不用詔李實為京兆尹京畿春夏旱乏食有詔免租逋而實不用詔書勇於殺害人吏不聊生貶為通州長史市人歡手皆袖瓦礫遮道伺之承大化栁渾為相帝常親擇吏宰畿邑而政有善狀召宰相語皆賀帝得人渾獨不賀曰此特京兆尹職耳陛下當擇臣輩以輔聖德臣當選京兆尹承大化尹當求令長親細事代尹擇令非陛下所宜帝然之民安於農而盜賊息魏志鄭渾字文公為京兆尹渾以百姓新集為制移居之法使兼復者與單輕者相伍溫信者與孤老為比勤稼穡明禁令以發姦者由是民安於農而盜賊止息豶豕乳子後周陸逞為京兆尹郡界有豕生數子經旬而死其家又有豶遂乳養諸豚賴之以活時論以逞任政所致政尚寬簡唐源乾曜為京兆尹政尚寬簡嚴肅為治黎幹為京兆尹嚴肅為治人頗便之軍容至不設酒饌李勉拜尹政尚簡肅時魚朝恩為觀軍容使仍知國子監事前尹黎幹求媚於朝恩每俟其將至監則傾府人吏具數百人之餼以待之及勉蒞職旬月朝恩入監府吏先期有請於勉勉曰軍容使判國子監勉候太學軍容宜厚具主禮勉官忝京兆軍容儻惠顧府廷豈敢不具蔬饌乎朝思深銜之自是不復往太學矣曲池禱雨孔楫為京兆尹時旱禱於曲池是夕大雨威風甚嚴薛元賞為京兆尹武宗謂宰相曰威風甚嚴難為繼者即令守取勑文李德裕奏京尹若非陛下假借與之作主則無由為德帝曰灼然公正方嚴吏不敢欺韋澳改京兆尹公正方嚴吏不敢欺人知畏愛韋澳為京兆尹留心政術孜孜求治凡大小獄訟先命僚屬議罪上裁其輕重而增損之無不允愜人知畏愛至於文案填委必盡究其情僞獄訟衰息囹圄空虛左馮翊閉閣思過前漢書韓延壽守左馮翊嵗餘不肯出行縣丞掾數白宜循行郡中覽觀民俗考長吏治迹延夀曰縣皆有賢令長督郵行縣恐無所益重為煩擾丞掾皆以方春月可一出勸耕桑延夀不得已行縣至高陵民有昆弟相與訟田延夀大傷之曰骨肉爭訟既傷風化咎在馮翊是日移病不聽事因入卧傳舍閉閣思過一縣莫知所為令丞嗇夫三老亦皆自繫待罪由是兩昆弟深自悔皆自髠肉袒不敢復爭恩信周遍二十四縣延夀入守馮翊恩信周遍二十四縣莫復辭訟自言者推其至誠吏民不忍欺紿嚴毅不畏彊禦謝承後漢書鄧道字子淵天性通敏以清亷正直為行又嚴毅不畏彊禦宜治三輔出為左馮翊右扶風課為三輔最前漢書尹翁歸入守右扶風京師畏其威嚴扶風大治盜賊課常為三輔最翁歸為政雖任刑其在公卿之間清潔自守語不及私然溫良謙退不以行能驕人甚得名譽於朝廷京師畏其威嚴上父老攀車以千數會稽典録徐洪遷右扶風都尉被召當發父老攀車以千數河南尹沿革見三輔私請不行魏志司馬芝為河南尹抑彊扶弱私請不行政號嚴明後漢袁安為河南尹政號嚴明然未曽以贓罪鞫人常曰凡學仕者高則望宰相下則希牧守錮人於聖世尹所不忍為也聞之者皆感激自厲在職十年京師肅然名重朝廷名重朝廷上計日受俸羊陟拜河南尹計日受俸常食乾飯茹菜禁制豪右京畿憚之禁制豪右上葬骸骨致雨周暢字伯持性仁慈為河南尹永初二年夏旱久禱無應暢自收洛陽城外客死骸骨凡萬餘人應時雨澍京師肅然東觀漢記張酺少篤學博通經籍以博士徴和帝即位遷河南尹京師肅然卿士尹王都揚雄河南尹針云芒芒天區畫異為京商邑翼翼四方之經爰作卿士以尹王都風化以興方國承流出臨京任魏志劉靖出為河南尹散騎常侍應璩與靖長書曰入作納言出臨京任冨民之術日引月吏民久而後安傅嘏傳河南尹內掌帝都外統京畿兼古六鄉六遂之事其民異方雜居多豪門大族商賈播路天下四方之會利之所聚而姦之所生前尹司馬芝舉其綱而太簡尹劉靖綜其目而太密後尹李勝毁常法以收一時之聲嘏立司馬氏之綱紀裁劉氏之細目以經緯之李氏所毁以漸補之其治以德教為本然持法有常簡而不可犯不為小惠有所薦達及大有益於民事皆隱其端迹若不由已出故當時無赫赫之名吏民久而後安之當時無赫赫名上掘墻得狸王隱晉書樂廣為河南尹郡中多妖怪前尹皆不敢處正寢唯廣居之不疑常外戶自開二子凱謨等驚怖廣使人掘墻比得狸乃絶代者乃相承而入清粹忠正庾純字謀甫太始六年詔曰河南京畿大郡四方表則中書令庾純清粹忠正才紹治化其以純為河南尹雋才令望王渾子濟字武子有雋才令望為河南尹省息七億餘萬汝南先賢傳應仲華遷河南尹入拜射聲校尉鷹揚虎視復遷大匠卿除無用割浮賞凡所省息七億餘萬整頓京師檢御貴戚李郃别傳鄧隲弟豹為將作大匠河南尹闕豹欲得之上凡隲兄弟亦欲用難使召拜下詔令公卿舉隲以㫖遣人諷公卿悉舉豹李公曰司𨽻河南尹當整頓京師檢御貴戚今乃使親家為之必不可為後法乃舉司𨽻羊祲不舉豹豹竟不得尹恨公不舉對士大夫曰李公寧能不舉我故使我不得尹耶忠亮篤誠才兼內外晉起居注武帝咸寧中詔河南百郡之首其風教冝為邇遐所模以導齊之奉車都尉王恂忠亮篤誠才兼內外明於治化其以恂為河南尹未到官遽事獻禮唐鄭珣瑜字元伯為河南尹未入境內會德宗生日尹當獻馬吏欲前取印白珣瑜視事且內贄珣瑜徐曰未到官而遽事獻禮歟不聽性嚴重少言既至河南清净惠下貴斂賤發以便民刋石水濱以紀其績季傑為河南尹傑既勤於聽理每有訴列雖衢路當食無廢處斷由衷官無留事人吏愛之先是河汴之間有梁公堰年久堰破江淮漕運不通傑奏調發汴鄭丁夫以濬之省公速就公私深以為利刋石水濱以紀其績勤舊勳賢蘇震為太常卿是嵗京都耆老表乞行幸上重違其心乃選勤舊勳賢為之牧守遂以震為河南尹兼御史中丞不務苛細李適之為河南尹性簡率不務苛細人吏便之李摩雲李罕之僖宗末為河南尹每討無不擒敵曽縱兵於蒲絳之地有山曰摩雲土人設堡於上號摩雲寨前後不能取罕之至則下焉目為李摩雲儲蓄之家出粟於市王起為河南尹時蝗旱粟價暴踊豪門閉糶以邀貴價起嚴誡儲蓄之家出粟於市隱者下於法由是民獲濟焉謁帝朝承明梁見諸府尹諸府尹少尹丞附晉中興書晉太興元年改丹陽內史為丹陽尹通典凡帝王所都皆曰尹南朝曰丹陽尹後魏初曰代尹東魏曰魏尹北齊曰清都尹預聞幾密晉中興書劉隗為長兼侍中出補丹陽尹隗雖在外而萬幾祕密皆預聞之羊固之豐腆不如羊曼之真率羊曼為丹陽尹時朝士過江初拜官相飾曼客來得早者得佳設日晏則漸罄不復及精隨客早晚不問貴賤有羊固拜臨海太守竟日皆美雖晚至者猶獲盛饌諸以固之豐腆不如曼之真率擲柱入穿宋書劉穆之遷丹陽尹與子弟於㕔事上飲宴㕔事柱上眉一穿穆之謂子弟及秀之汝等試以遙擲此柱若能入穿後必得此郡穆之諸子弟並不能中唯秀之獨入焉吾豈爼上腐肉任人割截語林蘇峻新平溫庾諸公以朝廷初復京尹宜得望實惟孔君平可以處之孔固辭二公逼諭甚苦孔勃然曰先帝大漸卿輩身據御牀共行遺詔孔坦爾時正瑣臣爾何與國家事不可今日喪亂而猥見逼吾豈爼上腐肉任人割截耶溫庾不能答輕薄京尹許𤣥度出都詣劉真長先不識至便造之一面留連劉素貴略無造詣遂九十日一詣許謂曰卿為不去家將成輕薄京尹謁帝朝承明梁元帝去丹陽尹尹荆州詩曰驂駕乘駟馬謁帝朝承明孫寶行嚴霜之誅袁安留冬日之愛元帝丹陽尹傳序曰傳曰大夫受郡漢書曰尹者正也及其用人實難授受廣漢和顔接下子高自輔經術孫寶行嚴霜之誅袁安留冬日之愛自二京版蕩五馬南渡固乃上燭天文下應地理爾其地勢可得而言東以赤山為城臯南以長淮為尹洛北以鍾山為草阜西以大江為黃河既變淮海為神州亦即丹陽為京尹讓表庾肩吾為南康王讓丹陽尹表曰臣聞劔鏤七星非有司天之用縑圖五嶽寧識崇朝之雲是知䇿彼泥龍不能令其逐日乘斯流馬安可使其奔電方今振鷺盈庭白駒空谷惟帝念功惟明克允君子之國罕聞其讓石門之水獲免於貪依倚權貴李澄為東京少尹蕭治為尹依倚權貴蒞事多不法澄以公正直之人用繫賴又道士孫甑生以左道求進託以修功往來嵩山求請無度澄必斥之肆行不軌無所忌憚郭英入兼城都尹到都肆行不軌無所忌憚取女人騎驢擊毬制鈿驢及諸般皆用侈靡裝飾日賚數萬以為笑樂未嘗問百姓間事人頗怨之府中白事見少尹署更不復省九國志吳國初建以徐延休為江都少尹將祀南郊以延休為鹵簿使於是法物始備李升輔政庶事詳悉因謂延休曰府中白事見少尹少尹署事則更不復省也雖佩恩寵還傷年鬢梁書蕭子範字景則再為戚信長史重任丹陽尹丞而諸弟並居顯列子範以深自慨為府箋云老少異時盛衰殊日雖佩恩寵還傷年鬢開封府五代唐汴州宣武軍節度領縣六梁升為開封府以滑州之酸棗長垣鄭州之中牟陽府宋州之襄邑曹州之戴邑許州之扶溝鄢陵陳州之太康九縣𨽻焉後唐復為汴州宣武軍以酸棗中牟襄邑鄢陵太康五縣還屬諸州晉天福三年復為開封府以五縣還𨽻國朝又置東明咸平二縣令領縣十七治開封府祥符戴邑後改考城牧國朝開封府牧一人從三品唐有京兆河南太原府牧國朝以開封應天河南為三京牧不置惟仗內奉引則遣官攝事尹少尹國朝開封府尹一人從三品少尹二人從四品下尹國朝以親王為之仍兼功德使太宗晉邸尹京及秦王許王為尹皆在南衙視事真宗尹京還就府署少尹不常置或受使則判官長權攝權知府事國朝尹闕則置權知開封府事一人以少卿以上充兼功德事及畿內勸農使豪右屏迹國朝翰林學士李穆知開封府事豪右屏迹權幸不敢干以私上益知其材决事如神程琳自益州召知開封府决事如神姦惡逃竄都下肅然鄭戩除龍圖閣直學士知開封府時有府吏馮士元者狡猾佞姦乃通結權貴恣為姦贓自尹而下至于權判官往往皆為所中權柄多出于士元偷㺯威勢以刑禍於人京師號為立地京兆尹戩至窮案其贓搜其家得與朝士往來交易貨賄簿書連及近臣而權貴多為之請戩俱不顧案成流於海島於是府中走吏而下日多戰汗股栗姦惡逃竄都下肅然朝廷無憂有范君范仲淹為禮部員外郎天章閣而待制權知開封府欲撓以煩劇不暇他議仲淹明敏通昭决事如神京師謡曰朝廷無憂有范君京師無事有希文聽斷如神杜衍知開封府聽斷如神權要之家不敢干以私嗜酒李詢為龍圖閣學士知開封府詢以嗜酒常旦朝上殿奏事御前宿酲未解酒氣薰然衝於御座上謂曰開封事煩宜節酒詢再拜謝罪然不飲酒不樂竟以過度而卒擢為宰相劉沆天聖中及第所治有治劇之聲自開封尹擢為宰相笑比黃河清筆談包孝肅尹京考為明案有編民犯法當杖脊吏受贓與之約曰今見尹必付我責狀汝第呼號辨我與汝分此罪汝决我亦决杖既而包引囚問畢果付吏責狀囚如吏言紛辨不已吏大聲訶之曰但受脊杖出去何用多言包謂其市權斥吏于庭杖之七十特寬囚罪止從杖坐以沮吏勢不知為其所賣卒如所約小人姦回難防也孝肅天性峭嚴未嘗有笑容人以其笑比黃河清判官推官國朝開封府判官推官舊各一人以朝官充親王尹京判官以給諌充真宗為尹置判官二人推官三人即位後各止一人景德四年增置判官推官一人掌府事並以常參官充以獄訟刑罰為生事戶口租賦為熟事分主之天禧四年分主左右軍廂無生熟事之别太平興國中命兵部員外郎宋琪通判府事尋省淳化五年以左諌議大夫楊徽之右諌議大夫畢士安並為開封府判官兵部郎中喬維嶽夀王府記室參軍水部郎中楊礪咨議司封員外郎直昭文館夏侯嶠並為開封府推官以夀王出閣判府事上特為精選其僚屬也治平三年以提㸃開封府界諸縣鎮公事祕閣校理孫坦為開封府判官專管局使院公事從知府沈遘請也謂開封府事叢雜推判官日力所給兩軍獄訟而已使院諸案多留滯為姦至是人以為便司録參軍國朝司録參軍事一人正七品上以朝官充通簽府院事諸府為司録諸州為録事五代職官志梁開平元年詔開封府司録參軍冝置一員元祐官品令開封府司録參軍事從七品五代職官志梁開平元年詔開封府六曹掾屬冝各置一員二年省諸道州府六曹掾屬止留户曹一員通判六曹國朝開封府諸事參軍事各一人正七品下唐之司録六曹軍事各一人梁開平元年咸置一人國朝因之凡六曹選州縣幕職官充亦有以京官知者分掌諸案事功曹與法曹檢法其餘曹事外兼領出入諸縣事覆及輪當一季與司録同推勘天聖元年六曹官吏更不差出外元祐官品令開封府諸曹參軍事正八品知其必貴歸田録薛簡肅公知開封府時明參政鎬為府曹官簡肅公待之甚厚直以公輔期之其後公守秦益常辟以自隨優禮特異有問于公何以知其為貴公曰其為人端肅其言簡而理盡凡人簡重則尊嚴此貴臣相也其後果至參知政事以卒時皆服公知人也左右軍巡使判官國朝開封府左右軍巡使判官正八品唐宋置後唐分左右左掌水北右掌水南𨽻京府國朝置左右軍巡使判官各一人分治獄事先是左右軍巡開封府選牙校為之開寶六年始用士流或以三班充判官選幕職州縣官充大中祥符二年詔到任一年無私罪與京官職知軍巡判官事軍巡使掌京城內風火盜賊及推鞫之事判官為之副左右廂公事所國朝熙寧三年五月詔以京朝官曽歷通判知縣者分四人治京城四廂其先差使臣並罷凡有民鬬訟事輕者得以决遣九月詔許留使臣兩員分左右廂管勾京留守唐貞觀十七年太宗親征遼東令太子太傅房𤣥齡充京城留守以蕭瑀為之副咸亨二年高宗幸洛陽以雍州長李晦為西京留守顧謂曰關中之事以付卿開元十一年敕太原尹為留守少尹為副留守七月勑三都留守兩京每月一日起居北都每季一起居並遣使行幸未有處三都留守三日一起居暫出行幸發處留守亦準此遞表長慶三年以前義成軍節度使陳楚為東郡留守判尚書省事東畿汝州防禦使開成二年東都留守牛僧孺召拜左僕射上令軍副使王元直齎告身宣賜舊例留守入朝無中使賜詔者上特寵異之五代晉天福七年勑留守之任委寄非輕凡降絲綸宜同將相今後除留守宜降麻制留守降麻自安彥威始也國朝天子巡狩親征則命親王或大臣總留守事建隆元年親征澤潞以樞密使吳延祚為東京留守西京南京留守各一人河南應天府尹各一人留守尹闕則置知副府事一人以郎中以上充通判各二人一掌留司一掌府事以朝官充守管籥蕭何傳贊何謹守管籥無復西顧之憂後漢鄧禹光武謂曰昔高祖任蕭何于關中無復西顧之憂得專精山東終成大業今河內守帶河為固户口殷實非寇恂莫可使也乃拜恂河內太行大將軍事光武於是復北征朱鮪聞光武北而河內孤使蘇茂來攻聞恂勒軍合戰大破之恂檄至光武大喜曰吾知寇子冀可任也守北宫和帝南巡祠園廟張禹以太尉兼為留守聞車駕進幸江陵禹以為不宜驛馬上諌詔報曰祠謁既訖當南禮大江會得君奏臨漢回輿而還又東觀記曰禹留守北宫大官朝夕進食特賜上方物除子男盛為郎定科令得止姦之要吳志孫權知新城使登守總知留守事時年穀不豐頗有盜賊乃表定科令得止姦之要承制行事晉張方劫惠帝幸長安僕射荀藩等在洛陽為留臺承制行事號東西臺東西臺上加持節後魏髙祖南伐以太尉元丕廣陵王羽留守京師並加持節備禦有功隋煬帝幸遼東命樊子蓋東都留守屬楊𤣥感作逆攻城子蓋備禦有功車駕至髙陽追詣行在所帝勞之以蕭何寇恂且謂曰公宜持重戈甲五百人而後出此亦勇夫重閉之義無賴不軌者便誅鋤之凡可施行無勞形迹今為公别造玉麟符以代銅獸比蕭何寇恂上蕭何之任唐太宗親征遼東命房𤣥齡京城留守手詔曰卿當蕭何之任朕無西顧憂進言書座右宋璟授開府儀同三司罷知政事明年京兆人權深山搆逆伏誅制河南尹王恂馳傳往長安窮其枝黨禁繫極衆久之未能決斷乃詔璟兼京兆留守并按覆其獄璟至惟罪元謀數人其餘盡奏原之十二年駕又東巡璟復為留守上臨發謂璟曰卿國之元老為朕股肱耳目今將巡洛邑為别歷時所有嘉謨嘉猷宜相告也璟因極言得失特賜綵絹等仍手制曰所進之言書之座右出入觀省以誡終身其見重如此繕修三宫開元中行幸東都詔杜暹為京留守暹因抽當番衛士繕修三宫增浚城隍躬自巡檢未肯休懈上聞而嘉之賜書曰卿素以清直兼之勤幹城隍宫室隨事修營具有工程不疲人力甚善慰朕懷也隨事即行不須聞奏河間王孝恭次子晦髙宗幸洛陽令在京居守顧謂之曰關中之事一以付卿但令或局人不可以成官政令式之外有利于人者隨事即行不須聞奏晦纍有異績則天臨朝遷户部尚書不賜旗甲吕元鷹拜東都留守舊例留守賜旗甲至元鷹不給或上言用兵討淮西東都近賊損其儀沮威望請援華汝夀三州例帝不聽并三州罷之留守不賜旗甲自元鷹始危惙尚能憂國家房𤣥齡為司空貞觀二十二年太宗幸玉華宫𤣥齡以疾卧總晉臺及漸篤𤣥齡乃謂諸子曰吾自度危篤而恩澤轉深若孤負聖君則死有餘責當今天下清平咸得其宜唯東討髙麗不止易為國患主上含怒意決臣下莫敢犯顔吾知而不言則銜恨入地遂抗表切諌云云太宗見其表謂𤣥齡子婦髙陽公主曰此人危惙如此能憂我國家宗社獲安實卿之功荀顔傳大駕行幸三州顏留守京師沙門法秀謀反顔率禁旅以掩畢獲內外晏然駕還飲至大明太后曰當爾之日卿若遲疑不即擒捕處分必致事成不測以今京畿不擾宗社獲安實卿之功執道士囚之儀鳯元年司農卿常𢎞機為東都留守時有道士朱欽遂為武后所寵所為橫恣𢎞機執而囚之因奏曰道士假稱中宫驅使依倚形勢臣恐虧損皇明為禍患之漸髙宗特發中使賜書慰諭仍云不須漏泄駁尚方鬻苑中果菜武后垂拱中蘇良嗣為西京留守時尚方監棐匪躬檢校京苑將鬻苑中果菜以收其利良嗣駁之曰昔公儀相魯猶能拔葵去織未聞萬乘之主鬻其果菜以與下人爭利也單馬待梅祿將軍栁公綽為北都留守充河南節度等使是嵗北方遣梅祿將軍李暢以馬萬匹來市且曰朝貢所經過守帥每假禮分虧其兵備留館則戒卒于外懼有襲奪太原故事亦有兵送之暢至界上公綽獨以牙門將祖孝恭單馬待以修好之禮暢感義出涕馳驅道中不妄游獵及至開牙門令譯引謁宴以常禮及市馬歸竟不敢有所犯府事一以相付隋楊瓉平齊之後留瓉居守常謂之曰六府事殷一以相付朕將遂事東方無西顧之憂其見親信如此也京師社廟所重非卿不可國朝王旦拜參知政事景德元年契丹犯邊大駕幸澶淵時親王元份留守東京得暴疾真宗謂旦曰京師廟社所重非卿不可詔馳赴送燈臺歸田録俚諺云趙老送燈臺一去更不來不知是何等語雖士大夫亦往往道之天聖中有尚書郎趙世長者嘗以滑稽自負其老也求為西京留臺御史有輕薄子送以詩云此回真是送燈臺世長深惡之亦以不能酬酢為恨其後竟卒于留臺新進陵慢熙寧初魏公罷相守北京新進多陵慢之魏公鬱鬱不得志嘗為詩云花去曉叢蜂蝶亂雨均春圃桔橰閒時人稱其微婉也判官推官國朝東京留守判官推官擇朝臣充西京南京留守判官推官各二人或以京朝簽書景德三年七月令審官院選京官一人知西京留守判官事三京府吏屬及給使之數自孔目官以至承府等自具本府元額敕大唐之録府史之類並省職官分紀卷三十八
