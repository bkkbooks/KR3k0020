body:
  text: 職官分紀巻一宋孫逢吉撰歴代總序前漢百官公卿表易敘宓羲神農黃帝作教化民而傳述其官以為伏羲龍師龍名神農火師火名黃帝雲師雲名少昊鳥師鳥名自顓頊以來為民師而命以民事有重黎句芒祝融后土蓐收𤣥冥之官然已上矣書載唐虞之際命羲和四子順天文授民時咨四岳以舉賢材揚側陋十有二牧柔逺能邇禹作司空平水土棄作后稷播百榖卨作司徒敷五教咎繇作士正五刑垂作共工利器用益作朕虞育草木烏獸伯夷作秩宗典三禮䕫典樂和神人龍作納言出入帝命夏殷亡聞焉周官則備矣天官冡宰地官司徒春官宗伯夏官司馬秋官司冦冬官司空是為六卿各有徒屬職分用於百事太師太傅太保是為三公盖參天子坐而議政無不總綂故不以一職為官名又立三少為之副少師少傅少保是為孤卿與六卿為九焉記曰三公無官言有其人然後充之舜之於堯伊尹於湯周公於周是也或說司馬主天司徒主人司空主土是為三公四岳謂四方諸侯自周衰官失而百職亂戰國並爭事各變異秦兼天下建皇帝之號立百官之職漢因循而不革明簡易隨時宜也其後頗有所改王莽簒位慕從古官而吏民弗安亦多虐政遂以亂亡故略表舉大分以通古今備温故知新之義云後漢百官志漢之初興承繼大亂兵不及戢法度草創略依秦制後嗣因循至景帝感吳楚之難始抑損諸侯王及至武帝多所改作然而奢廣民用匱乏世祖中興務從節約并官省職費減億計所以補復殘缺及身未改而四海從風中國安樂者也昔周公作周官分職著明法度相持王室雖微猶能久存今其遺書所以觀周室牧民之徳既至又其有益來事之範殆未有所窮也故新汲令王隆作小學漢官篇諸文倜説較略不究案胡廣注隆此篇其論之注曰前安帝時越騎校尉劉千秋校書東觀好事者樊長孫與書曰漢家禮儀叔孫通等所草創皆隨律令在理官藏於几閣無紀録者久令二代之業闇而不彰誠宜撰次依擬周禮定位分職各有條序令人無愚智入朝不惑君以公族元老正丁其任焉可以已劉君甚然其言與邑子通人郎中張平子參議未定而劉君遷為宗正衛尉平子為尚書郎太史令各務其職未暇恤也至順帝時平子為侍中與校書方作周官解說乃欲以漢次述事㑹復遷河間相遂莫能立也述作之功獨不易矣既感斯言顧見故新汲令王文山小學為漢官篇畧道公卿外内之職旁通四夷博物條暢多所發明足以知舊制儀品葢法有成易而道有因革是以聊集所宜為作詁解各隨其下綴續後事令世施行庶明厥旨廣前後率由之準増助來哲多聞之覽焉唯班固著百官公卿表記漢承秦置官本末訖于王莽差有條貫然皆孝武奢廣之事又職分未悉世祖節約之制宜為常憲故依其官簿粗注職分以為百官志臣昭曰本制既久是注曰百官簿今昭採又異同俱為細字如或相冒兼應注本注尤須分顯故凡是舊注通為大書稱木注曰以表其異也凡置官之本及中興所省無因復見者既在漢書百官表不復悉載晉百官志書曰唐虞稽古建官惟百所以奬導民萌裁成庶政易曰天垂象聖人則之執法在南宮之右上相處端門之外而鳥龍居位雲火垂名前史詳之其已尚矣黃帝置三公之秩以親黎元少昊配九扈之名以為農正命重黎於天地詔融㝠於水火則可得而言焉伊尹曰三公調隂陽九卿通寒暑大夫知人事列士去其私而成湯居亳初置二相以伊尹仲虺為之凡厥樞㑹仰承君命總及周武下車成康垂則六卿分職二公𢎞化咸樹司存各題標凖茍非其道人弗虛榮貽厥孫謀其固本也如此及秦變周官漢遵嬴舊或随時適用或因務遷革霸王之興義在於斯既獲厥安所謂得其時制也四征興於漢代四安起於魏初四鎮通於柔逺四平止於喪亂其渡遼凌江輕車强弩式揚遐外用表攻伐興而復毁厥號彌繁及當塗得志尅平諸夏初有軍師祭酒參掌戎律建安十三年罷漢台司更置丞相而以曹公居之用兼端揆孫吳劉蜀多依漢制雖復臨時命氏而無忝舊章世祖武帝即位之初以安平王孚為太宰鄭沖為太傅王祥為太保司馬望為太尉何曾為司徒荀顗為司空石苞為大司馬陳騫為大將軍世所謂八公同辰攀雲附翼者也若乃成乎棟宇非一枝之勢處乎經綸稱萬夫之敵或牽羊以叶於夢或垂釣以申其道或空桑以獻其術或操版以啟其心卧龍飛鴻方金擬璧秦奚鄭産楚材晉用斯亦曩時之良其又昭彰者焉宣王既誅曺爽政由已出網羅英俊以備天官及蘭卿受羈貴公顯戮雖復䇿名魏氏而乃心皇晉及文王纂業初啟晉臺始置二衞有前驅養由之弩及設三部有熊渠佽飛之衆是以武帝龍飛乘兹奮翼猶武王以周之十亂而理殷民者也是以泰始盡於太康喬柯茂葉來居斯位自大興訖于建元南金北銑用處兹秩雖未擬乎䕫拊龍言天工人代亦度㡬乎任官惟賢莅事惟能者也南齊百官志建官設職興自炎昊昉乎隆周之册表乎盛漢之書存改回沈備於歴代先賢往學以之雕篆者衆矣若夫胡廣舊儀半惟簡撮應劭官典殆無遺恨王郎奏議屬霸國之初基陳矯増曺由軍事而補闕今則有魏氏官儀魚豢中外官名山濤以意辨人不在位次荀朂欲去事煩唯論并省定制成文本之晉令後代承業案為前准肇域官品區别階次蔚宗選簿梗槩欽明階次詳悉虞通劉寅因荀氏之作矯舊增新今古相校齊受宋禪事遵常典既有司存無所偏廢其餘散在史注多已筌拾覽者易知不重述也後魏官氏志百姓不能以自治故立君以司牧元首不可以獨斷乃命臣以佐之然則安海内正國家非一人之力也書契以外其事蔑聞至於羲軒昊頊之間龍火鳥人之職頗可知矣唐虞六十夏商倍之周過三百是為大備而秦漢魏晉代有加減罷置盛衰隨時適務且國異政家殊俗設官命職何常之有帝王為治禮樂不相沿海内作家物色非一用其由來尚矣魏氏世君𤣥朔逺統臣屬掌事立司各有號秩及交好南夏頗亦改剙昭成之即王位已命燕鳳為右長史許謙為郎中令矣餘官雜號多同於晉朝建國二年初置左右近侍之職無常員或至百數侍直禁中傳宣詔命皆取諸部大人及豪族良家子弟儀貌端嚴機辨才幹者應選又置内侍長四人主顧問拾遺應對若今之侍中散騎常侍也其諸方雜人來附者總謂之烏丸各以多少稱酋庶長分為南北部復置二部大人以統攝之時帝弟觚監北部子寔君監南部分民而治若古之二伯焉太祖登國元年因而改南北猶置大人對治二部是年置都統長又置幢將及外朝大人官其都統長領殿内之兵直王宫幢將員六人主三郎衞士直宿禁中者自侍中以下中散以上皆統之外朝大人無常員主受詔命外使出入禁中國有大喪大禮皆與參知隨所典焉隋百官志易曰天尊地卑乾坤定矣卑髙既陳貴賤位矣是以聖人法乾坤以作則因卑髙以垂教設官分職錫珪胙土由近以致逺自中以統外内則公卿大夫士外則公侯伯子男咸所以協和萬邦平章百姓允釐庶績式敘彞倫其由來尚矣然古今異制文質殊途或以龍表官或以雲紀職放勲即分命四子重華乃爰置九官夏倍於虞殷倍於夏周監二代沿革不同其道既文置官彌廣逮於戰國戎馬交馳雖時有變革然猶承周制秦始皇廢先王之典焚百家之言創立朝儀事不師古始罷封侯之制立郡縣之官太尉主五兵丞相總百揆又置御史大夫以貳於相自餘衆職各有司存漢髙祖除暴寧亂輕刑約法而職官之制因於嬴氏其間同異抑亦可知光武中興聿遵前緒唯廢丞相與御史大夫而以三司綜理衆務洎於叔世事歸臺閣論道之官備員而已魏晉繼及大抵略同爰及宋齊亦無改作梁武受終多循齊舊然而定諸卿之位各配四時置戎狄之官百有餘號陳氏繼梁不失舊物髙齊創業亦遵後魏臺省位號與江左稍殊所有節文備詳於志有周創據闗右日不暇給洎乎克清江漢爰議憲章酌鄷鎬之遺文置六官以綜務詳其典制有可稱焉髙祖踐極百度伊始復廢周官還依漢魏唯以中書為内史侍中為納言自餘庶僚頗有損益煬帝嗣位意存稽古建官命職率由舊章大業三年始行新命于時三川定鼎萬國朝宗衣冠文物足為壯觀既而以人從欲待下若讎號令日改官名月易尋而南征不復朝廷播遷圖籍注記多從散逸今之存録者不能詳備焉唐百官志唐之官制其名號禄秩雖因時增損而大抵皆沿隋故其官司之别曰省曰臺曰寺曰監曰衞曰府各統其屬以分職定位其辨貴賤敘勞能則有品有爵有勲有階以時考覈而升降之所以任羣材治百事其法則精而密其施於事則簡而易行所以然者由職有常守而位有常員也方唐之盛時其制如此葢其始未嘗不欲立制度明紀綱為萬世法而常至交侵紛亂者由其時君不能慎守而徇一切之茍且故其事愈繁而官益冗至失其職業而卒不能復初太宗省内外官定制為七百三十貟曰吾以此待天下賢才足矣然是時已有員外置其後又有特置同正員至於檢校兼守判知之類皆非本制又有置使之名或因事而置事已則罷或遂置而不廢其名類繁多莫能徧舉自中世之後盜起兵興又有軍功之官遂不勝其濫矣故採其綱目條理可為後法及事雖非正後世遵用因仍而不能改者著于篇宰相之職佐天子總百官治萬事其任重矣然自漢以來位號不同而唐世宰相名尤不正初唐因隋制以三省之長中書令侍中尚書令共議國政此宰相職也其後以太宗嘗為尚書令臣下避不敢居其職由是僕射為尚書省長官與侍中中書令號為宰相其品位既崇不欲輕以授人故常以他官居宰相職而假以他名自太宗時杜淹以吏部尚書㕘議朝政魏徴以秘書監㕘預朝政其後或曰㕘議得失㕘知政事之類其名非一皆宰相職也貞觀八年僕射李靖以疾辭位詔疾小瘳三兩日一至中書門下平章事而平章事之名盖起於此其後李勣以太子詹事同中書門下三品謂同侍中中書令也而同三品之名葢起於此然二名不專用而他官居職者猶假他名如故自髙宗以後為宰相者必加同中書門下三品雖品髙者亦然惟三公三師中書令則否其後改易官名而張文瓘以東臺侍郎同東西臺三品同三品入銜自文瓘始永淳元年以黃門侍郎郭待舉兵部侍郎岑長倩等同中書門下平章事平章事入衘自待舉等始自是以後終唐之世不能改初三省長官議事于門下省之政事堂其後裴炎自侍中遷中書令乃徙政事堂於中書省開元中張說為相又改政事堂號中書門下列五房其後一曰吏房二曰機樞房三曰兵房四曰戸房五曰禮房分曺以主衆務焉宰相事無不統故不以一職名官自開元以後常以領他職實欲重其事而反輕宰相之體故時方用兵則為節度使時崇儒學則為大學士時急財用則為鹽鐵轉運使又其甚則為延資庫使至於國史太清宫之類其名頗多皆不足取法故不著其詳學士之職本以文學言語被顧問出入侍從因得㕘議謀納諌諍其禮尤寵而翰林院者待詔之所也唐制乗輿所在必有文詞經學之士下至卜醫伎術之流皆直於别院以備宴見而文書詔令則中書舍人掌之自太宗時名儒學士時召以草制然猶未有名號乾封以後始號北門學士𤣥宗初置翰林待詔以張說陸堅張九齡等為之掌四方表疏批答應和文章既而又以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢院學士分掌制詔書勅開元二十六年又改翰林供奉為學士别置學士院專掌内命凡拜免將相號令征伐皆用白麻其後選用益重而禮遇益親至號為内相又以為天子私人凡充其職者無定員自諸曺尚書下至秘校書皆得與選入院一嵗則遷知制誥未知制誥者不作文書班次各以其官内宴則居宰相之下一品之上憲宗時又置學士承㫖唐之學士𢎞文集賢分𨽻中書門下省而翰林學士獨無所屬故附列於此云五代職官志官非位無以分貴賤位非品無以定卑髙是以歴代史官咸有所紀皆窮源而討本期與世以作程逮乎唐祚方隆𤣥宗在宥採累朝之故事考衆職之遐源申命才臣著成六典其勲階之等級品秩之重輕則已備載於其中矣故今之所撰不敢相沿祖述五代之命官以踵百王之垂範或釐革升降則謹而志之俾後之為天官卿者得以觀焉職官分紀卷一
