body:
  text: 職官分紀卷二十宋孫逢吉撰鴻臚周禮大行人掌大賔客之禮又有象胥干寶注云若晉鴻臚也前漢百官表典客秦官景帝中六年更名大行令武帝太初元年更名大鴻臚屬官有行人譯官别火三令丞及郡邸長丞武帝太初元年更名行人為大行令王莽改大鴻臚曰典樂典屬國秦官掌蠻夷降者武帝元狩三年昆邪王降復增屬國置都尉丞候千人屬官九驛令成帝河平元年省併大鴻臚後漢百官表大鴻臚卿一人中二千石丞一人比千石大行令一人六百石治禮郎四十七人右屬大鴻臚晉職官志大鴻臚統大行典客園池華林園鈎盾等令又有青宫列丞鄴𤣥武苑丞及江左有事則權置無事則省宋百官志大鴻臚掌贊導拜授諸王鴻大也臚陳也晉江左初省有事則權置事畢則省沈約宗書南北客館各一人永初初置主四方賔客事漢曰傳邸魏曰客館隋百官志後齊九寺置卿少卿丞各一人各有功曹五官主簿録事等員鴻臚寺掌蕃客朝㑹吉凶弔祭統典客典寺司儀等署隋置鴻臚寺統典客司儀崇𤣥三署各置令典客署又有掌客司儀有掌儀等員髙祖三年廢鴻臚入太常十二年復置唐百官志鴻臚寺周曰大行人秦曰典客景帝曰大行令武帝曰大鴻臚梁承齊卿去大字署為寺後周曰賔部隋曰鴻臚寺龍朔改曰同文寺光宅曰司賔寺神龍復卿一員少卿二員丞二人主簿一人録事二人府五人史十二人亭長四人掌固六人六典鴻臚寺胡廣漢官解詁云鴻聲臚傳也所以傳聲贊導九賔也隋鴻臚寺統典客司儀崇𤣥三署開皇三年省并太常十二年復舊皇朝龍朔改同文咸亨元年復舊光宅元年改司賔神龍元年復舊舊屬官有崇𤣥署開皇二十五年改𨽻宗正寺國朝鴻臚寺掌賔客喪葬及封襲祭饗之事卿前漢武帝以蘇武為典屬國宣帝甘露二年以常惠為典屬國百官表典屬國見鴻臚門後漢百官志大鴻臚卿一人中二千石本注曰掌諸侯及四方歸義蠻夷其郊廟行禮贊導請行事既可以命羣司諸王入朝當郊迎典其禮儀及郡國上計四方賓客亦屬焉皇子拜王贊授印綬及拜諸侯諸侯嗣子及四方夷狄封者臺下鴻臚召拜之王薨則使弔之及拜王嗣丞一人比千石東觀漢記大鴻臚漢舊官建武元年復置屬有丞一人大行丞一人有禮員四十七人主齊祀儐贊九賔之禮韋昭辨釋名腹前肥者曰臚言以京師為腹心王侯外國為四體以養之也辨云鴻臚本故典客掌賔禮鴻大也臚陳序也欲以大禮陳序賔客也漢官解詁鴻聲也臚傳也所以傳聲贊導九賔也又曰昔唐虞賔於四門此則賔禮之制也與鴻臚之任亦同後魏職令鴻臚少卿第四品上第二清用雅學詳富明樞達理者隋百官志見鴻臚門唐百官志鴻臚卿一員從三品周曰大行人中大夫秦曰典客漢曰大鴻臚梁加卿字後周曰賔部中大夫隋官從三品龍朔為同文正卿光宅改曰司賔少卿二人從四品上卿之職掌賔客及凶儀之事領典客司儀二署以率其官屬供其職務少卿為之二唐百官志鴻臚卿位視尚書右丞掌導護贊拜六典鴻臚寺卿一人從三品梁天監七年象四時置十二卿除大字鴻臚寺為次卿第二品上太初二十二年九卿並第三品北齊因之後周有大賔部中大夫隋鴻臚寺卿一人正第三品煬帝降為從三品皇朝依焉國朝元祐官品令鴻臚卿從四品連擒大姦漢書田序字子公連擒大姦徴為大鴻臚卿慚長後漢陳實為大丘長以沛相賦斂違法乃解印綬去纍徴命不起閉門縣車棲遲養老時三公每缺議者歸之子紀亦以至德稱為平原相徴為尚書令建安初袁紹為太尉讓于紀紀不受拜大鴻臚卒於官子羣為魏司空天下以為公慙卿卿慙長遣小黃門就問經傳謝承後漢書商仁字季卿徴拜大鴻臚卿以年老乞骸骨詔賜牛酒米帛若經傳有疑使小黃門就問之病乞骸骨許還家奚徴拜大鴻臚以病乞骸骨許請還家大鴻臚小鴻臚魏志韓宣明帝時為大鴻臚數歲卒宣前後當官在能否之間然喜以已恕人始南陽韓暨以宿德在宣前為大鴻臚暨為賢人及宣在後亦稱職故鴻臚中為之語曰大鴻臚小鴻臚前後治行曷相如治行相如上移書燉煌崔林為大鴻臚龜兹王遣侍子來朝朝廷嘉逺至褒餘國各遣子來朝間使連屬林恐所遣或非其真的權取疏屬賈胡因通使命利有印綬而道路護送所損兹多勞所養之民資無益之事為夷狄所笑此曩時之患也乃移書燉煌喻指并録前世傳遇諸國豐約故事使有常靜默少言蜀志杜瓊字伯瑜後主立為大鴻臚為人靜默少言闔門自守不與世事有出境之才吳志張儼弱冠知名早歷顯位以博文多識拜大鴻臚使於晉吳主孫皓謂儼曰南北通好以君有出境之才故相屈行對曰皇皇者華臣蒙其榮􅘨無古人延譽之美磨鋒淬鍔思不辱命既至車騎將軍賈充尚書令裴秀侍中荀朂等欲傲以所不知而不能屈尚書僕射羊祜尚書何禎並結縞帶之好不任賔贊還官漢雜事蕭由為陳留太守入為鴻臚卿不任賔贊還官鴻臣司爵揚雄大鴻臚針蕩蕩唐虞經通該極陶陶百王天工人力畫為上下該羅百職人有材能官有級差遷能於官各有攸宜主不以廢官不以隳文不可武武不可文大小上下不可奪倫鴻臣司爵敢告在倫才任專對崔鴻十六國春秋前凉録晉使者俞歸至張重華識張鍳才任專對拜典客令歸責鍳禮供給薄鍳曰敝國僻小隔絶皇風行臺撫臨萬里傾躍今大義未崇先存口實非昭德示訓之謂也歸改容謝之職主胡事山濤啓事鴻臚職主胡事前後為之者率多不善今缺當選御史中丞刁修不審可不亡秦之官稱於上國北史李安世為主客令齊使劉纘朝貢安世奉詔勞之安世美容貌善舉止纘等自相謂曰不有君子其能國乎纘等呼安世為典客安世曰何亡秦之官稱於上國纘曰異世之號有幾安世曰周謂掌客秦改典客漢名鴻臚今曰主客君等不欲影響文武而殷勤亡秦乎採樹為樵唐劉世龍髙祖時從平京師纍轉鴻臚卿仍改名義節時草創伊始傾竭府藏以賜勳人而國用不足義節進計曰今義師數萬並在京師樵薪貴而布帛賤若採街衢及苑中樹為樵以易布帛歲收數十萬匹立可致也又藏內繒絹匹匹截之使申截取剩物以供雜費動盈十餘萬匹矣髙祖並從之大收其利少卿六典少卿二人從四品下魏後太和十五年九卿各置少卿一人第三品上二十二年降為正四品上北齊因之後周有賔部下大夫一人隋依北齊煬帝加置二人降為從四品皇朝武德中置一人貞觀中加置二人龍朔咸亨光宅神龍隨寺改復國朝元祐官品令鴻臚少卿正六品多才藝美容儀隋書煬帝時蠻夷朝貢前後相屬帝嘗從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令望寧有多才藝美容儀可以接賔客者為之乎咸以蘇䕫對帝然之即日拜鴻臚少卿以職業稱唐裴光庭開元中權兵部郎中鴻臚少卿性靜默寡交遊雖驟歷臺省人未之許既而以職業稱議者更推之丞前漢百官表見鴻臚門後漢百官志見卿門隋百官志見鴻臚門唐百官志鴻臚寺丞二人從六品上掌判寺事六典丞二人從六品下秦有典客丞漢因之武帝改曰大鴻臚丞比千石魏晉因之東晉省梁班第三陳因之後魏列卿丞從五品中太和二十二年降為第七品北齊為第七品下後周兵部有上士一人隋鴻臚丞二人正七品上大業五年加為正五品皇朝為從六品上國朝元祐官品令鴻臚寺丞正八品有祿能作否晉王敦為鴻臚卿謂阮修曰卿常無食鴻臚丞有祿能作否修曰聊復可耳乃為丞主簿隋百官志見鴻臚門唐百官志鴻臚寺主簿一人從七品上掌印勾檢稽失六典主簿一人從七品上漢官儀鹵簿篇鴻臚主簿駕四馬晉令大鴻臚置主簿録事史梁天監七年十二卿各置主簿位不登十八班者别為七班班第三陳因之後魏闕文北齊有功曹五官主簿隋鴻臚寺主簿三人皇朝因之武德中正八品貞觀中減置一人從七品上國朝元祐官品令鴻臚寺主簿從八品司農前漢百官表治粟內史秦官掌穀貨有兩丞景帝後元年更名大農令武帝太初元年更名大司農屬官有太倉均輸平凖都內籍田五令丞幹官鐡市兩長令丞又郡國諸倉農監都水六十五官長丞皆屬焉搜粟都尉武帝軍官不常置王莽改大司農曰羲和後更為納言初幹官屬少府中屬主爵後屬大司農後漢百官志大司農卿丞各一人部丞二人太倉令一人平凖令一人導官令一人右屬大司農晉職官志大司農統大簞導官二人令襄國都水長東西南北部諸文曹掾及江左哀帝省并都水武帝復置宋百官志大司農一人丞一人掌九穀六畜之供膳羞者舜攝帝位命棄為后稷則其任也周則為太府漢世丞二人魏以來一人隋百官志北齊司農寺掌倉正菜園池果實統平凖太倉鈎盾典農導官梁州水次倉籍田等令丞隋司農寺統太倉典農廩市鈎盾華林上林導官等署唐百官志司農寺梁置十二卿以署為寺以官為卿龍朔三年改為司稼咸亨復卿一員少卿二人丞六人主簿二人録事二人府二十八人史七十六人計史三人亭長九人掌固七人六典司農寺隋煬帝司農但統上林太倉鈎盾導官四署罷典農華林二署以平凖京市𨽻太府掌苑囿薪芻藴炭市易度量皇朝因之國朝司農寺掌倉場出納園苑種植及導擇米麥供給薪炭之事卿周禮冡宰有太府下大夫史記韓信歸漢以為治粟內史掌穀貨景帝更名大農令武帝更名大司農平帝元始元年改大司農曰羲和以劉歆為之後漢百官志大司農卿一人中二千石本注曰掌諸錢穀金帛諸貨幣郡國四時上月旦具錢穀簿其逋未畢各具别之邊郡諸官請調度者皆為報給應劭漢官儀大司農古官也唐虞分命羲和四子敬授民時髙祖受命懲秦之弊與民休息逮至文景國家無事家給人足京師之錢纍百巨萬貫朽而不可校太倉之粟陳陳相因充溢露積腐敗而不可食後魏職令司農第四品上第三請用堪勤有能幹者隋百官志梁司農卿位視散騎常侍主農功倉廩統太倉導官籍田上林令又管樂逰北苑丞左右中部三倉丞莢庫荻庫諸庫丞湖西諸屯務天監九年又置勸農謁者視殿中御史後齊九寺置卿少卿丞各一人隋九寺置卿少卿各一人唐百官志司農寺卿一人從三品上少卿二人從四品上卿之職掌邦國倉儲委積之事總上林太倉鈎盾導官四署與諸監之官屬謹其出納少卿為之二凡京師百司官屬祿廩皆仰給焉凡朝㑹祭祀供御所須及百官常料則率署監所貯之物以供其事凡孟春皇帝親籍田之禮有事於先農則奉進耒耜季冬藏冰祭司寒以黑牡秬黍仲春啓冰亦如之六典司農寺卿一人從三品左傳少昊氏九扈為九農正天監七年象四時置十二卿司農為春卿班第十一又置勸農謁者亦𨽻司農陳因之後魏大司農品第二太和二十二年改第三品北齊因之後周依周官有司農上士一人掌三農九穀改稼穡之政令隋一人正三品煬帝降從三品龍朔三年司稼寺正卿咸亨中復舊國朝官品令司農卿從四品行千里不賫糧前漢鄭當時字莊為大司農門下客至亡貴賤亡留門者執賔禮以下山東諸公翕然稱莊曰吾聞鄭莊行千里不賫糧閉門却掃非德不交趙典字仲經為大司閉閉門却掃非德不交免捶撲後漢大司農劉據以職事譴被召詣尚書傳呼促步又加以捶撲左雄上言九卿位亞三事班在大臣行有佩玉之節動有庠序之儀孝明皇帝始有撲罰皆非古典帝從而改之其後九卿無復捶撲者學問博通王孫端學問博通為大司農治行第一宣帝地節四年北海太守朱邑以治行第一為大司農盜田自殺田延年為大司農坐盜都內田三十萬自殺名卿東觀漢記牟融字子優為大司農性明達稱為名卿在朝以方正稱髙翊字季回以儒學徴拜大司農在朝以清白方正稱曉邊事能議論耿國為大司農曉邊事能議論數上便宜事天子器之給安車一乘鄭𤣥公車徴為大司農給安車一乘所過長吏送迎風聲大行張璠漢記陳寵為廣漢太守風聲大行入為大司農陳粟萬石揚以箕武帝柏梁詩大司農曰陳粟萬石揚以箕司金穀揚雄大司農針惟時大農爰司金榖粒民是職帝王之盛實在農殖又曰農臣司均農臣司均上穡臣張華大農針穡臣司農敢告左右政治為天下最魏志梁習字子虞為并州二十餘年政治為天下最徴拜大司農龜載碑從田內出異苑吳郡岑淵為吳時大司農卿碑注在江乘潮而西太元中村人見龜載碑從田中出還其先處萍藻猶著腹下天倉天文録天倉者大司農也印在吾手中晉陽秋司農桓範出奔曹爽云大司農印在吾手中所在得開倉而食國之泉史游急就篇司農少府國之泉也掌周稷之業漢朱邑為大司農張敞與邑書曰足下以清明之德掌周稷之業兩宫寵官隋江總司農陳暄墓銘曰其文骫骳其筆縱橫背筆即誦據馬俄成徘徊前古悵望今情兩宫寵官四王恩榮萬事休息一朝追送疇昔命觴文可吟諷今日酬君長悲宜慟納郡租不過十日趙元俶轉潁川太守有惠政因入朝㑹司農不時納諸郡租穀元俶奏之帝謂元俶曰如卿意者幾日當了元俶曰如臣意不過十日帝即日拜元俶為司農卿納天下郡租如言而了帝悅焉上疏言禁兵寡少唐段秀實為司農卿見禁兵寡少不足以備非常乃上疏曰臣聞天子曰萬乘諸侯曰千乘大夫曰百乘此蓋以大制小以十制一尊君卑臣强幹弱支之義在於此矣今外有不庭之虜內有梗命之臣竊觀禁兵不精其數全少卒有患難將何待之且猛虎所以百獸畏者為爪牙也若去其爪牙則犬馬牛悉能為敵伏願少留聖慮冀俾萬一其後涇原兵作亂召神策六軍遂無一人至者秀實守節不二竟沒於賊其明略義烈如此好鬚李緯見戶部尚書門倒用印秀實為司農卿建中四年朱泚盜據宫闕源休教泚僞迎鑾駕隂濟逆志泚乃遣其將韓旻領馬步三千疾趣奉天時蒼黃之中未有武備泚以秀實嘗為涇原節度使罷兵權以為畜憤且久必肯同惡乃召與謀議秀實初詐從之隂說大將劉海賔何明禮姚令言等與之一心同謀殺泚以兵迎乘輿三人皆許諾旻追駕秀實以為宗社之危期頃刻乃使人諭岐靈嶽竊令言印不獲乃倒用司農印印符以追之旻至駱馹得軍符令亦莫辨其印文遑遽而回秀實乃與海賔約事急為繼而令明禮應於外明日泚召秀實議事源休等皆在坐秀實與源休並膝語至僣位秀實悖然而起執休腕奪其象笏躍而前唾泚面大罵曰狂賊吾恨不斬汝萬段吾豈逐汝反耶遂擊之泚中其顙流血而走凶黨羣至遂遇害德宗在奉天聞其事惜其委用不至埀涕久之少卿隋百官志見卿門唐百官志見卿門六典司農少卿二人從四品上後魏初置少卿第三品太和二十二年為正第四品上北齊因之後周司農有中士一人隋品同北齊煬帝加置二人降為從四品龍朔咸亨隋寺改復國朝元祐官品令司農少卿正六品檢校東都營田園苑之事唐韋機為司農少卿受詔檢校東都營田園苑之事髙宗謂之曰兩都是朕東西之宅也今之宫館隋代所造歲序既淹將漸頽毁頓欲有修又費財力如何機奏曰臣任司農向已十年前後省費今見貯錢三十萬貫若以供葺理可不勞而就也上大悅宦有犯者杖而後奏機為司農少卿兼之東都營田甚見委遇有宦者於苑中犯法機杖而後奏髙宗嗟賞賜絹數十匹謂曰更有犯者卿即鞭之不復奏也丞沿革見司農門唐百官志司農寺丞六人從六品上掌判寺事凡天下租稅及拆造轉運於京師皆閲而納之以供國用以祿百官六典丞六人從六品上秦治粟內史有兩丞漢因之武帝改大司農亦兩丞桑𢎞羊為大司農置部丞數十人分部主郡國將以興利後漢司農丞一人比千石部丞一人六百石部丞主帑藏魏因之品第七晉亦品第七進賢一梁冠介幘皂衫銅印黃綬宋齊梁陳司農丞墨綬後魏從五品中太和二十二年為七品下北齊因之隋司農丞五人從第六品大業五年加至從五品皇朝武德中置四人貞觀中加至六人國朝元祐官品令司農丞正八品主簿隋百官志見司農門唐百官志司農寺主簿二人從七品上掌印署抄目勾檢稽失凡置木契二十隻應須出納與署合之十隻與太倉署令十隻與導官署令皆九雄一雌雄主簿掌雌留署勘同然後出給六典主簿二人從七品上晉太康中置主簿二人宋齊無聞梁置一人七班之中第三陳因之後魏不見北齊司農寺有功曹五官主簿隋二人皇朝因之國朝元祐官品令司農寺主簿從八品治平三年置主簿一員上林苑令六典上林署令二人從七品下漢百官表水衡都尉武帝置掌上林苑屬官有上林令丞尉又有甘泉上林長丞又步兵尉校掌上林苑又少府屬官有上林中十池監上林者漢之苑囿也司馬相如有上林賦後漢上林苑令一人六百石主苑中禽獸頗有人居皆主之捕得其獸送太官丞一人三百石魏晉因之江左闕其官宋武帝復置𨽻尚書省殿中曹及少府齊因之梁陳屬司農後魏闕文北齊及隋並屬司農皇朝因之掌苑囿園池之事丞為之二針揚雄上林苑令針曰芒芒大田芃芃柞棫山有陘陸野有林麓夷原汚藪禽獸攸伏魚鱉以時芻蕘咸殖國以殷富民以家給太倉令齊職儀太倉令周司徒屬官有廩人倉人則其職也六典太倉令三人從七品下石氏星經天倉六星在婁南倉穀所藏南三星天庚積厨粟之所天園十三星囷倉廩之屬主御糧也史記云武王伐殷散巨橋之粟周禮有廩人下大夫上士秦漢大司農屬官有太倉令丞各一人文帝時淳于意為之後漢一人六百石魏品第七晉宋齊梁陳亦然後魏闕文北齊司農統太倉令丞後周有司倉下大夫隋太倉令二人宋廩督四人榖倉督二人皇朝置太倉令三人東都則曰含嘉倉籍田令前漢百官表司農屬官有籍田令丞沈約宋書籍田令一人古官也于周為甸師前漢置後漢及魏闕晉太始十年復舊江左省後復置國朝元祐官品令籍田令正九品廩犧令漢百官表內史屬官有廩犧令丞尉後屬司農韋昭辨釋名犧戲也言廩養之也辨云凡六牲取其毛者别養之以奉祭祀純色者少故名曰犧犧希也齊職儀周牧人之職也掌六牲陽祀用騂隂祀用黝取純毛者光武中興屬河南秩六百石導官令六典導官署令二人八品上秦漢少府屬官有導官令丞主擇米以供祭祀及御饌導擇也後漢屬大司農令六百石丞三百石魏晉皆有令丞梁在七班之下為三品勳位陳因之後魏闕文北齊及隋皆有令丞並屬司農皇朝因之置令二人平凖令漢百官表司農屬官有平凖令續後漢書平凖令六百石韋昭辨釋名釋云平凖令主染色有常平之法凖的之也辨云主平物價使相依凖齊職儀染署掌染繒色少昊置五雉為工正掌雉氏設五色之工周有染人之職掌染帛以為服六典平凖署令二人從七品下周禮有貨人中士下士主平定物價漢大司農屬官有平凖令丞後漢令丞各一人令六百石丞三百石掌知物價及主練染作彩色至和帝改平凖為中凖以宦者為令丞列於內署自是諸署令悉用宦人魏氏闕文晉少府屬官有平凖令丞宋順帝諱改凖曰染署齊少府有平凖令丞梁陳有平凖水令丞後魏闕文北齊司農寺統平凖令丞後周有平凖中士下士隋司農屬官有平凖署令丞煬帝三年改𨽻太府皇朝因之掌供官市易之事籠天下之貨史記桑𢎞羊領大司農令以諸官各自市相爭以故物多騰踴乃請置大農部丞數十人分部主郡國置平凖於京師受天下委輸盡籠天下之貨物貴則賣之賤則買之如此則富商大賈無所牟大利矣所以置平凖焉亷潔下士趙廣漢亷潔下士州舉茂才為平凖令太府隋百官志後齊太府掌金帛府庫營造器物統左右中三尚方左藏司染諸冶東西道署黃藏右藏細作左校甄官等署隋太府寺統左藏左尚方內尚方右尚方司染右藏黃藏掌冶甄官等署煬帝即位分太府寺為少府監唐百官志太府寺卿一人少卿二人丞四人主簿二人録事二人府十五人史五十人計史四人亭長七人掌固七人國朝太府寺掌庫藏出納商稅市易平凖店宅之事六典見卿門卿隋百官志梁天監七年始置太府卿以少府為少府卿加置太僕卿三卿是為夏卿太府卿位視宗正掌金帛府帑後齊置卿少卿丞各一人置丞主簿録官主簿録事等員隋九寺並置卿少卿各一人各置丞主簿録事等員唐百官志太府卿一員從三品少卿二員從四品上卿掌邦國財貨總京都四市平凖左右府藏常平八署之官屬舉其綱目修其職務少卿為之二以二法平物一曰度量二曰權衡六典太府寺卿一人從三品周禮天官太府下大夫上士下士掌九貢九賦九功之二以受其貨賄之入頒其貨於受藏之府頒其賄於受用之府凡官府都鄙之吏及執事者受財用焉則今太府之任也秦漢以下不置其官其職并於司農少府梁天監七年始置太府班第十三掌金帛府帑統右藏令上庫丞太市南市北市令關津亦皆屬焉陳因之品第三後魏太和中始改少府為太府寺卿品第三北齊因之後周有太府中大夫又有計部中大夫隋太府寺卿一人正三品上煬帝分太府置少府監管三尚方及司染掌冶等署而太府寺管左右藏及兩市平凖等署焉大業四年降為從三品皇朝因之至龍朔三年改外府正卿咸亨元年復故光宅元年改司府寺神龍初復舊少卿二人從四品上後魏孝文帝改少府為太府置少卿一人第三品上北齊因之隋煬帝加至二人降為從四品皇朝减一人貞觀中復置二人龍朔咸亨光宅神龍並隨寺改復國朝元祐官品令太府卿從四品從車駕南巡後魏楊播少修飭事親盡禮遷左衛將軍從車駕南巡到懸瓠除太府卿貨幣山積唐楊國忠專判度支事𤣥宗召公卿百僚觀左藏庫喜其貨幣山積靣賜國忠金紫兼權太府卿事國忠既專錢榖之任出入禁中日加親幸財物經楊卿者無不精好見少卿門少卿沿革見卿門國朝元祐官品令太府寺少卿正六品尹卿筆唐尹思盾為司府少卿時侯知一亦厲威嚴吏人為之語曰不畏侯卿杖惟畏尹卿筆其為人所服如此前後無與為比楊崇禮開元初為太府少卿雖幣帛克牣丈尺間皆躬自省閲時議以為前後為太府無與為比擢拜太府卿時太平且久御府財物山積以為經楊卿者無不精好丞隋百官志見卿門唐百官志太府寺丞四人從四品上掌判寺事凡正至大朝應貢方物應陳於殿庭者皆受而進之六典丞四人從六品下梁選部太府丞一人品從第七陳因之後魏亦一人品第七下後周太府上下一人亦丞之任也隋太府丞六人正七品下大業三年增為從五品皇朝置四人從六品上垂拱中省一人開元又加焉國朝元祐官品令太府丞正八品主簿隋百官志見卿門唐百官志太府寺主簿二人從七品上六典主簿二人從七品上梁置太府主簿一人七班之中為第三陳因之後魏一人隋四人從七品皇朝置三人至太極中省二人太府寺管木器七十隻十隻與左藏東庫合十隻與左藏西庫合十隻與右藏內庫合十隻與右藏外庫合十隻與東都左藏庫合十隻與東都右藏庫合九雄一雌主簿掌一雌庫官掌右五隻與左藏朝堂庫合五隻與東都左藏朝堂庫合各四雄一雌其契以次行用之掌印署抄目勾檢稽失凡置木契九十五隻二十五隻與少府將作苑總監合七十隻與庫官合十五隻刻少府監字十四隻雄付少府監五隻刻將作監字四隻雄付將作監五隻刻苑總監字四隻雄付苑總監皆應索用物雌留太府市令長附史記司馬談祖為漢市長漢百官表內史屬官有長安市長又長安四市令丞長屬左馮翊六典兩京諸市署各令一人從六品上昔神農祝融氏始作市易曰日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑石氏星經天市垣二十二星周禮地官有司市下大夫上士中士下士其屬有盾人鄽人胥師賈師司暴司稽肆長蓋諸市官也漢改秦內史為京兆尹其屬官有長安市長丞後漢河南尹屬官有雒陽市長丞魏晉因之東晉𨽻丹陽尹宋齊因之梁始𨽻太府梁選部太市令屬四品市職之任不容過卑天監七年革其選陳因之後魏京邑市令從五品中北齊司州牧領東西市署令丞後周司市下大夫一人隋司農寺統京市令煬帝三年改京市𨽻太府市京師東市曰都㑹西市曰利人東都東市曰豐都南市曰大同北市曰通逺皇朝因之京置東西南三市按東都西市則隋南市也南市則隋東市也都南市舊兩坊之地武德中減為坊半焉垂拱中省京南市開元十年又省都西市掌百族交易之事丞為之二凡建標立候陳肆辨物按周禮肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相邇也以平正之以二物平市謂稱以格斗以槩以三賈均市精為上次為中粗為下格殺舍中兒東觀漢記祭遵從征河北為軍市令舍中兒犯法遵格殺之上怒命收遵主簿陳副諫曰明公常欲聚軍整齊今遵奉法不避是教令行也上乃貸之以為刺姦將軍語諸將曰當備祭遵吾舍中兒尚格殺之豈私諸卿耶逺量當至公輔石苞賣鐵鄞市中沛國趙元儒名知人見而異之便與結交歎其逺量當至公輔左右藏令齊職儀右藏庫周太府內府之任太府物所藏也內府掌邦布之出入以待王用後漢中藏府令丞掌幣帛金銀諸貨物晉置中黃左右藏六典左藏署令三人從七品下周禮有外府中士主泉藏之在外者掌邦布之出入以供百物而待邦用也又有職幣上士中士主貨幣之入也並今左藏之職也秦漢則在司農少卿屬官有中藏府令丞各一人掌中藏幣帛金銀貨物魏氏因之晉少府屬官有左右藏令東晉置御史九人各掌一曹有庫曹御史後復分庫曹置外左庫內左庫宋文帝省外左庫而內左庫直云左庫武帝復置前廢帝又省齊梁陳有右藏無左藏後魏闕文北齊太府寺統左右藏令丞後周有外府上士中士二人掌綿帛絲麻錢物皮角筋骨之藏隋有左藏署令丞皇朝因之左藏有東庫西庫朝堂庫又有東都朝堂庫各掌木雌契一與太府主簿合之掌邦國庫藏之事右藏署令二人正六品上周禮有內府中士主良貨賄藏在內也有職內上士中士主泉貨所入並令右藏職之至秦漢分在司農少卿其職掌廢置與左藏同隋太府寺統右藏令丞各二人皇朝因之右藏有內庫外庫東都庫各木雌契一隻與太府寺主簿合之掌邦國寶貨之事常平令六典常平署令一人從七品下漢書食貨志管仲相桓公通輕重之權曰歲有凶穰故穀有貴賤令有緩急故物有輕重人君不理則商賈逰於市乘民之不給百倍其本矣故萬乘之國必有萬金之賈千乘之國必有千金之賈者利有所并也計本量委則足矣然而民有飢餓者穀有所藏也民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重凡輕重斂散之以時即凖平李悝曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧故甚貴與甚賤其傷一也是故善平糴者必謹觀歲有上中下熟故大熟則上糴三而舍一中熟則糴二下熟則糴一小飢則發小熟之所斂中飢則發中熟之所斂大飢則發上熟之所斂而糶之故雖遇飢饉水旱糴不貴而人不散孟子曰狗彘食人食而不知檢塗有餓莩而不知發蓋並常平之義也漢宣帝即位歲數豐穰穀至石五錢農人少利大司農中丞耿壽昌遂白令邉郡皆築倉以榖賤時增其價而糴榖貴時減其價以糶名常平倉人便之後漢明帝永平五年歲比登稔作常滿倉立粟市於城東粟斛直錢三十晉武帝泰始四年乃立常平倉豐則糴儉則糶以利百姓東晉宋齊無聞梁有常平倉而不糴陳亦如之後魏太和十二年有司上言請京師度支歲用之餘各立官司年豐糴貯於倉時儉加私之二糶之於人北齊諸州郡皆别置富人倉初立之日凖所領中下戶口數得之一年糧遂次當州榖價賤時斟量割當年義租充入穀貴下價糶之賤則還用所糶物依時價糴貯隋開皇三年於河西勒百姓立堡營田積穀京師置常平監又以倉廩尚虛衛所置黎陽倉洛州置河陽倉陜州置常平倉華州置廣通倉轉相委輸漕關東之粟以給京師又募人能於洛陽運米四十石經砥柱達於常平倉者免其征戍以此通轉運亦非糶糴皇朝垂拱初兩京置常平署天下諸州亦置也掌平糴倉儲之事職官分紀卷二十
