body:
  text: 職官分紀卷四十七宋孫逢吉撰淮南浙江荆湖路都大發運使副使都監國朝以朝官或以諸司使仍兼制置本路茶鹽礬稅初淳化四年遣洛苑副使楊允恭内殿崇班朱冲同徃江南管勾運茶鹽粮帛又令太子中允王子輿與允恭等計度賣茶貨至道元年始命允恭西京作坊副使李廷遂及子輿為江淮兩浙發運使兼制置茶鹽事始就淮南置局三年省咸平三年鹽鐡判官王子輿閤門祗候秦羲復為制置淮南江浙茶鹽是年令兼制置礬稅仍領荆湖路三年以子輿兼充淮南轉運使四年又加都大發運使自後並以淮南轉運使領其務而無使名景徳三年復置一人後有二人副使以諸司副使充景徳三年置都監以閤門祗候以上充天禧二年置官崇者或爲使秩輕者或爲都監副使都監不常備置又有提㸃鑄錢事景徳中都大催綱一人以京朝官充後改爲輦運司許汝石塘催綱二人以京朝官三班充御河催綱一人以三班充提轄官二人以安利永靖二軍知軍兼充分轄縁河州縣汴河至泗州催綱三人以三班或内侍充皆分地而領之蔡河撥發一人以朝臣或三班充又江淮兩浙荆湖皆以三班爲撥發諸州又有監装卸斛㪷官一人或二人以京朝官三班幕職州縣官充大中祥符四年復置廣濟河催綱朝臣是職舊命常參官近嵗省去止用使臣而州郡皆不承禀故復之九年詔黄汴廣濟石塘河催綱廵河京朝官使臣自今每嵗許一次入奏三門白波發運判官毎嵗許二人更番入奏慶厯四年省廣濟河催綱朝臣一員熈寜三年以蔡河撥發堤岸斗門公事等今後並𨽻都大制置發運使司提舉管轄降勅書奨諭國朝天聖三年廣濟河催綱太子中舍成百璧到任二年催運斛斗五十六萬二千六餘石比前界甚有出剰降勅書奨諭諸路轉運使副使判官前漢書秦欲攻匃奴使天下飛芻輓粟起於黄陲琅琊至負海之郡轉輸北河率三十鍾而致一石六斛四㪷爲鍾漢興髙皇時漕山東之粟以給中都官嵗不過數十萬石孝武建元通西南夷道作者數萬人千里負擔饋粮率十餘鍾致一石管子曰粟行三百里則國無一年之積行四百里則國無三年之積粟行五百里則衆有饑色唐開元二年河南少尹李傑充水陸轉運使轉運使自此始也十八年拜宣州刺使裴耀卿爲江淮轉運使仍以鄭州刺史崔希逸河南少尹蕭旻爲之副轉運之有副使自此始也天寳二年陜郡太守韋堅加兼勾當縁河及江淮轉運使四載楊釗除殿中侍御史充水陸轉運使乾元元年第五琦除度支郎中充諸道轉運使貞元元年尚書右僕射韓滉充江淮轉運使永貞元年以司空平章事杜佑兼諸道轉運使諸道分置巡院皆統於使五代罷廵院始置轉運使國朝初但曰勾當某路水陸計度轉運事官髙者即曰某路計度轉運或曰同轉運使知某路轉運使又有同知者及勾當者知州亦有兼者太平興國初皆曰使兩省五品以上則為都轉運使又置副使判官又置同勾當轉運事俄罷諸路轉運副使止置使一員明年又置副使其後又置黄河御河轉運使尋省至道二年置諸路承受二人選朝官三班爲之常事郎與轉運使副聮書奏報大事即許非時乗驛入奏後罷三年分天下爲十五路其後又増三路凡十八路其京東京西河北河東陜西淮南兩浙各置使副使餘路不置副使大抵有二員者或皆爲副或爲同轉運使兩省五品以上任者或爲都轉運使又車駕廵幸則有行在轉運使王師征討則有隨軍轉運使或増置官勾當轉運事皆不常置惟京東京西河北河東陜西淮南兩浙有二員或爲使或皆爲使或皆爲副使或置判官無定制皇祐中以曹陳許壽滑五州爲京畿路置使尋罷天聖七年六月詔益梓廣東西四路轉運司各置判官一員與使副連書行遣位在同判之上知州依官位着緑者仍借緋三年一替九月就差梓州同判殿中丞徐越充梓州路轉運判官舊諸路提㸃刑獄朝臣使臣各一員近制以其生事罷之又以西川四路廣南兩路道里遐濶慮其有所不及乃於轉運司特設此職嘉祐六年詔其位在本路通判及兵馬都監之上知州則以官叙之使副使判官掌軍儲租税計度及刺舉官吏之事凡十八路一曰京東路熈寜七年分東西路二曰京西路太平興國三年分京西轉運爲二司各置使一員後併焉三曰河北路太平興國初分河北南路雍熈中又分東西路後併焉四曰河東路五曰陜西路太平興國分爲陜西路河北河東兩路各置使一員又有陜府西北路後皆併焉六曰淮南路太平興國初分淮南西路後併焉七曰江南東路八曰江南西路太平興國初分爲江南東西後併焉一路置使副二員天禧四年分爲西路各置使九曰荆湖南路十曰荆湖北路十一曰兩浙路太平興國中曰兩浙東北路後改焉十二曰福建路太平興國初爲兩浙西南置員使副二員後改焉止置使一十三曰益州路嘉祐四年改曰成都府路十四曰梓州路十五曰利州路十六曰䕫州路國初平劒南有西川但爲西川路其後分爲西川東路各置使副開寳六年又爲岷路亦置使副咸平四年分爲益梓利䕫四路各置使一員十七曰廣南東路十八曰廣南西路廣桂邕宻瓊州知州舊各兼本𬋩轉運使皆統於廣南轉運司開寳四年嘗以知宻州毋守素知邕州范旻通判桂州各知本𬋩轉運事其後止瓊州兼焉慶厯中諸路轉運有判官一員後因其與轉運争權而罷之嘉祐中張唐英因事奏䇿乞復判官於是復置判官一員令馮亮兼掌後别遣官大中祥符中屯田員外郎胡則自提㸃鑄錢爲發運使自是副使悉兼之慶厯七年上命發運副使更不置正使運米六百七十九萬石國朝大中祥符三年江泊發運李浦言今春運米六百七十九萬石諸路各留三年支用江南留七十萬石外有上萬供五十萬石淮南三百六十萬石外有上供五十七石所留以備賑糶兩浙有米五十萬石合上供外有九十一萬石以備淮南賑糶入難慶厯中王鼎淮南江浙荆湖制置發運副使内侍楊永徳奏請汾汴置鋪挽漕舟嵗可損卒六萬鼎議以爲不可永徳横猾執政乃重其奏令三司判官一員将永徳就鼎議鼎發八人難永徳不能後鼎因䟽言陛下幸用臣即不宜過聴小有所改更以誤國計於是永徳言始不用居三年遂以爲使得人乆任上以江淮制置發運使領六路七十六州之大其調財用幣帛榖粟嵗千百萬宜甚得其人乆任之無慮軍國之用有虧朕屢見許元奏事悉利害近累上章求替思之不若且委元使盡其才須優賞之可以激勸乃賜進士出身以為天章閣待制上之委任人如此勾當公事官國朝嘉祐二年置江淮荆湖制置司勾當運監公事一員治平三年以國子博士傅永為淮南江浙荆湖發運勾當公事三門白波黄河汴河水路發運使判官國朝以朝官充太平興國五年命右賛善大夫姚沆為陕府三門發運十月命太子中允劉順監三門發運務景徳二年太子中舍李渭充黄河三門發運使三門判官白波判官各以朝官一人充使迭入奏事各置吏屬催綱撥發輦運國朝三門白波發運司有催促装綱二人以京朝官三班充河陰至陜州自京至汴口催綱各一人並以三班以上充轉漕闗中漢與楚相守滎陽數年軍無糧蕭何轉漕闗中給食不乏又高祖曰鎮國家撫百姓給餉餽不絶糧道吾不如蕭何不絶糧道上計户轉漕給軍漢王擊楚蕭何守關中計户轉漕給軍輦車驪駕後漢光武南定河内時朱鮪據洛陽又并州未安擇可守河内者鄧禹舉冦恂乃拜恂河内太守行大將軍光武謂恂曰河内完冨吾將因是而起昔高祖留蕭何鎮關中吾今委公以河内堅守轉運給足軍糧防遏他兵勿令北度光武於是北征恂收租四百萬解轉以給軍朱鮪聞光武北而河内孤遣蘇茂等將三萬餘人度鞏河攻温破之檄至光武大喜時軍食急乏恂以輦車驪駕轉輸前後不絶注云驪駕也駕車人挽行也木牛流馬蜀諸葛亮與魏相距亮圍祁山以木牛運又亮悉大衆由斜谷出以流馬運亮長於巧思木牛流馬皆出其意運米濟關中劉晏為吏部尚書平章事領度支鹽鉄轉運租庸使罷相復為太子賓客領東都河南江淮山南等道轉運租庸鹽鉄使時新承兵戈之後中外艱食京師米價斗至一千晏受命後以轉運為己任凡所經歴必究利病自此每歳運米數十萬石以濟關中焦心苦形期報明主劉晏與元載書曰見一水不通思荷插而先徃見一粒不運願負米而先趨焦心苦形期報明主晏以轉運為任如是氣豪權重憲宗即位潘孟陽巡江淮省財賦仍知鹽鉄轉運副使且察東南鎮之政理孟陽以氣豪權重領行從四百人所歴鎮府但務逰賞與婦人為夜飲鹽鉄轉運院廣納財賄補吏職而已及歸大失人望憲宗每事求理嘗發江淮宣慰使左司郎中鄭敬奉使辭上戒之曰朕宫中用度一匹以上皆有簿籍惟賑恤貧民無所計算卿經明行修今登車傳命宜體吾懐勿學潘孟陽奉使所至但務酣飲逰山寺而已課入加倍盧𢎞正大中初轉户部侍郎充鹽鉄轉運使前是安邑觧縣兩池鹽法積弊課入不充𢎞正令判官司空輿至池務檢察特立新法仍奏輿為兩池使三年課入加倍其法至今頼之專督運務元琇判度支關輔旱儉請運江淮租米以給京師上以滉加江淮轉運使欲令專督運務琇以滉性剛愎難與集事乃條奏滉督運江南米自揚子南北皆元琇主之滉深怨於琇遂逞宿怒累誣奏琇貶雷州司戸其責既重舉朝以為非罪穿廣運潭以通舟檝韋堅與中貴人善探候主意見宇文融楊慎矜父子以勾剥財物爭行進奉而致恩顧堅乃以轉運江淮租賦所在置吏督察以裨國之倉廪歳益鉅萬𤣥宗以為能擢為陜府太守水陸轉運使奏請於咸陽壅渭水作興城堰望春樓下穿廣運潭以通舟檝樓下連彌亘數重觀者山積𤣥宗歡悅下詔曰關輔之間尤資殷贍比來轉輸未免艱辛故置此潭以通漕運萬代之利一朝而成一朝成萬代之利上長於治財賦僖宗即位時趙隠高璩知政事與崔彦昭同年薦彥昭長於治財賦召為吏部侍郎充諸道鹽鉄轉運使不以功利永寵裴耀卿拜黄門侍郎同中書門下平章事充轉運使凡三年運七百萬石省脚錢三十萬貫或説耀卿請進所省脚錢以明功利耀卿曰此盖公家盈縮之利爾不可以永寵乃奏充所司和糴等錢明年遷侍中剖析如流王播字明敭充諸道轉運使雖案牘鞅掌剖析如流黠吏詆欺無不彰敗亷訪能否國朝開寳九年詔諸道知州通判及臨事務官吏冝令諸路轉運司亷訪其能否第為三等歳終以以臨事簡慢所莅無狀者為下恪居官次職務粗治者為中尤異有殊績者為上當行大誅賞焉便冝從事范旻為淮南轉運使太祖謂曰卿家素貧凡所須並借用官錢悉以便宜從事不必一一中覆也每歳運米萬餘石以給京師時論許其有心計自劾請罪許仲宣為嶺南轉運使會征交州地炎熱瘴厲師卒不習其水土未戰死者十二三雖得之不能守因抗䟽極言其不可人恐論報稽緩即以便冝從事罷其軍分屯於諸郡開緍出庫錢賞賜亡卒自劾矯詔請罪嘉之降璽書褒諭改名知古淳化五年駕部郎中河北東路轉運使錢若冰因召見上問卿名出何典記對曰唐尚書右丞倪若氷亮直臣慕之遂名焉上笑曰可改名知古上以方用武惡其名類若兵也知古頓首奉詔倪若氷實名若水知古淺率引以對人皆笑之不繫品位至道元年荆湖轉運使何仕宗上言執政大臣出領外郡申轉運司公事只書通判以下姓名上謂宰相曰大臣品位雖崇若出臨外藩即轉運使所部按要繫州府不繫於品位也此朝廷典憲未可以輕改並仍舊貫平允之吏寛猛適中咸平元年上謂輔臣曰諸轉運使按察官吏事權甚重非其人則州縣受弊近地猶易為聴察逺方固難便聞太寛則弛慢太猛則苛刻必須平允之吏寛猛適中卿等其慎擇之量否臧以行賞罰三年秘書監查道言朝廷命轉運使副請令得替先批書一任曽舉若干亷勤才識之士曽奏若干貪殘猥濫之人朝廷量其否臧以行賞罰從之川陕四路四年以知益州右諫議大夫宋太初兼川陕四路都轉運使先是西蜀遼隔緩急應援不及故分為益梓利䕫四路别置官屬至是又以四路漕輓各司其局難於均濟故有是命察所部官吏為三等景祐元年令諸路轉運使副察所部官吏能否辨為三等公勤亷幹文武可取利益於國惠及於民者為上幹事而無治聲者為次畏懦而貪慢公不治敗狀未露濫聲頗彰者為下並列狀以闓賜方勝練鵲錦袍河北河東陕西三路轉運使賜方勝練鵲錦袍從河北轉運使劉定之請也供調百萬億李士衡為湖北轉運使真宗幸澶州東封西祀供調百萬億士衡有力焉列郡有數年之積李士衡拜樞宻直學士知益州復召為河北都轉運使謂曰河朔事重非卿不可既至調發得䇿列郡常有數年之積其餘以濟陜西之饑民吏不得為姦慶厯中王鼎遷尚書刑部郎中天章閣待制河北都轉運使科率税賦事皆躬親吏不得為姦郡縣官吏望風而肅何郊為河北都轉運使郡縣官吏望風而肅釋褐再任為轉運使李絢字公素景祐中及第授大理評事通判邠州召試授太子中允直集賢院未幾除京西轉運使時吕文靖執政好擢用竒材謂曰朝廷之制未嘗有釋褐再任為轉運使者以學士才器高􅐩故有此授冝副朝廷之意絢到任有澄清之志開營田以贍邉儲歐陽修出使河東開營田以贍邉儲至今頼之初執政委修以河北之漕亦幸其不職而汗漫其才修至頗稱其職召范仲淹飲後堂英宗時施昌言為轉運使時召范仲淹飲後堂出婢子俳優雜以丈夫無所言仲淹恠問之則皆昌言家人也仲淹大不懌辭而去其家法如此賜裦衣大帶侯陟建隆四年改淮南轉運使賜褎衣大帶勾當管勾官國朝熈寧三年七月詔三路轉運司奏舉京朝官知縣資序二人充本司勾當其京東西淮南兩浙各許舉一員八月詔川廣等路轉運司依京東等路於京朝官知縣資序内各舉一員充管勾文字不得差出時轉運使移就逺官之法故特置之諸路提㸃刑獄國朝以朝臣及閤門祗候以上充淳化三年遣官分徃諸路提㸃刑獄事四年省景徳四年諸路復置提㸃刑獄事四年省復以朝官充天禧四年加勸農使兼提㸃刑獄事俄改提㸃刑獄勸農使使臣為副使天聖六年悉罷八年復置大中祥符四年以資政殿大學士向敏中等磨勘提㸃刑獄朝官使臣課績文字第為三等帝以磨勘文字示王旦曰惟兩浙朝臣使臣有奏報雪活死罪者定為第二等餘皆有責罰或奏議不當並為第三等仍無可升第一者須旌賞以為激勸其朝臣第三等者與近地知州使臣第二等者與知州軍第三等監兵並免逺任嘉祐中又以武臣同提㸃刑獄多不得人遂罷之至和元年置提㸃京畿州刑獄官二年罷治平元年閏五月罷提㸃刑獄而以委轉運司熈寧十年復置提㸃京畿刑獄官得與文臣與舉元數分半三虎國朝慶厯初王鼎擢江東提㸃刑獄是時仁宗易置大臣欲有所為選擇諸路使者令按舉諸不法鼎為轉運使楊紘為判官王緯在京東大稱嚴肅多所奏劾官吏怒之指以為三虎摘發贓汙又提㸃河北刑獄摘發贓汙所案問於貴勢無所借以舊御史為之熈寧十年以館閣校勘丁執禮權發遣河北西路提㸃刑獄上宣諭曰朕惟河朔地重慎選監司故以舊御史為之又曰卿職在刑獄盗賊最急冝用心督捕提㸃府界諸縣鎮司國朝以朝臣及閤門祗候以上各一人充景徳二年置後罷武臣四年置提㸃公事一員熈寧四年鄧考甫張景温並為勾當公事提舉常平倉農田水利差役國朝熈寧二年量逐路錢物多少選官分詣提舉九年府界提舉倉專差官一員更不令司農寺丞兼領勾當公事官國朝熈寧二年於通判幕職官内選差一員不妨本職官諸路如管十縣以上軍州許差管勾官兩員職官分紀卷四十七
