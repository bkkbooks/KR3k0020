body:
  text: 職官分紀卷四十宋孫逢吉撰總州牧書舜肇十有二州十有二牧禹别九州有九牧周禮八命作牧史記黃帝置左右大監監於萬國前漢百官表監御史秦官也掌監郡漢省丞相遣使分刺州不常置武帝元封五年初置郡刺史常奉詔條察州師古曰漢官典職儀云刺史班宣周行郡國省察治狀黜陟能否斷治寃獄以六條問事非條所問即不省一條强宗豪右田宅踰制以強凌弱以衆暴寡二條二千石不奉詔書遵承典制背公向私旁詔牟利浸漁百姓聚斂為奸三條二千石不恤疑獄風厲殺人怒則任刑喜則淫賞煩擾刻暴剝截黎元為百姓所苦山崩瓦裂襖祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟恃怙榮勢請託所監六條二千石違公下比阿附豪强通行貨賂割損正令秩六百石員十二人成帝綏和元年更名牧秩二千石哀帝建平六年復為刺史元壽二年復為牧郡守秦官掌治其郡秩二千石有丞邊郡又有長史掌兵馬秩皆六百石景帝中二年更名太守何武與翟方進奏曰古選諸侯賢者以為州伯今部刺史居牧伯之任秉一州之統春秋之義用貴理賤不以卑臨尊刺史位下大夫而臨二千石輕重不相凖請罷刺史置州牧以應古制奏可朱博奏言漢家至德溥大宇內萬里立置州縣郡刺史奉使典州督察郡國吏民安寧故事居部九嵗舉為守相其異才功效著者輒登擢秩卑而賞厚咸勸功樂進前丞相方進奏罷刺史更置州牧其真二千石位次九鄉九鄉闕以髙第補其中材則茍自守而已竊恐功效陵夷姦宄不禁臣請罷州牧置刺史如故奏可後漢百官志十二州每州刺史一人六百石本注曰秦有監御史監諸郡漢興省之但遣丞相史分刺諸州無常官孝武帝初置刺史十三人秩六百石古今注曰常以春分行部郡國各遣一吏迎界上成帝更為牧二千石建武十八年復為刺史十二人各主一州其一州屬司𨽻校尉諸州常以八月巡行所部郡國録囚徒考殿最初嵗盡詣京都奏事中興但因計吏偕有從事史假佐本注曰員職略與司𨽻同無都官從事其功曹從事為治中從事豫州部郡國六冀州部九兖州部八徐州部五青州部六荆州部七揚州部六益州部十二并州部九幽州部十二凉州部十一交州部七凡九十八其二十七王國相其七十一郡太守其屬國都尉屬國分郡離逺縣置之如郡差小置本部郡名世祖并省郡縣四百餘所後世稍復增之靈帝中平五年改刺史新置牧當邊戍者丞為長史古今注曰建武六年三月令郡太守諸侯相病丞長史行事十四年罷邊郡太守丞長史領丞職王國之相亦如之漢官解詁太守専郡信理庶績勸農賑貧决訟斷辟興利除害檢察郡奸升善黜惡誅殺殘暴者也東觀漢記州牧刺史漢舊官建元元年復置牧十八年改為刺史督二千石晉職官志州置刺史别駕治中從事諸曹從事等員所領中郡以上及江揚朱提郡郡各置部從事一人小郡亦置一人又有主簿門亭長録事記室書守佐從諸曹佐守從事武猛從事等凡吏四十一人卒二十人諸州邊逺或有山險濱近冦賊羌夷者又置弓馬從事五十餘人徐州又置淮海凉州置河津諸州置都州從事各一人凉益州置吏八十五人卒二十人荆州又置監佃督一人郡皆置太守宋百官志刺史州各一人刺史之為言猶參覘也寫言亦謂之制刺漢制不得刺尚書事是也郡守秦官秦滅諸侯隨以其地為郡置守丞尉各一人守治民丞佐之郡當邊戍者丞為長史晉江左皆謂之丞尉典兵備盜賊漢景帝中二年更名曰大守尉曰都尉光武省後置東部西部都尉有蠻夷又有屬國都尉漢末及三國以為諸部都尉晉成帝咸康七年又有都尉郡丞宋太祖元嘉四年復置郡官屬略如公府無東西有功曹史主選舉五官掾主曹事部縣有都郵門亭長又有主記史催督期會漢制也略如之諸郡各有舊俗諸曹名號往往不同南齊百官志魏世州牧隆重刺史任重者為使持節都督輕者為持節督起漢帝時御史中丞馮獻討九江督揚徐二州軍事而徐爰宋志云起魏武遣詣州將督軍王圭之職儀云起光武並非也晉太康中都督知軍事刺史治民各用人惠帝末乃并任非要州則單為刺史州置别駕治中議曹文學祭酒諸曹部從事史郡太守大史部縣為國為內史相此假未詳隋百官志梁州刺史二千石受拜之明日辭宫廟而行州置别駕治中從事各一人主簿西曹議曹從事祭酒從事部傳從事文學從事各因其州之大小而置員陳承梁制荆江南兖郢湘雍等州刺史六州加督進在第三品東揚州下加都督進在第二品右光祿下庶姓為州無將軍者謂之單車後魏天錫二年制諸州置三刺史皇室一人異姓二人皆古之上中下三士也後齊司州置牧屬官有别駕從事史治中從事史州都主簿西曹書佐記室户曹功曹金曹租曹兵曹騎曹都官法曹部郡等從事員上上州刺史置府屬官有長史司馬録事功曹倉曹中兵等參軍事及掾史主簿及掾史記室掾史外兵騎兵長流城局刑獄等參軍事及掾史參軍事及法墨田鎧集士等曹行參軍及掾史右户掾史行參軍長兼行參軍督護統府録事統府直兵箱録事等員州屬官有别駕從事史治中從事史州都光迎主簿主簿西曹書佐月令及史祭酒從事史部郡從事皂服從事典籖及史門下督省事都録事及史箱録事及史朝直刺姦記室掾户曹田曹金曹租曹兵曹左户等掾史等員上上州府屬官佐史合三百九十三人上中州減上上州十人上下州減上中州十人中上州減上下州五十一人中中州減中上州十人中下州減中中州十人下上州減中下州五十人下中州減下上州十人下下州減下中州十人自州郡縣各因其大小置白直以供其役上州刺史三品下州刺史四品後周雍州牧九命户三萬以上州刺史正八品二萬以