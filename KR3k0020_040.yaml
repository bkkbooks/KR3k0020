不犯法如何戮乎若必須斬戮當以名卿應之普慶慙愧而退貶黜姦慝不畏強禦陳翔遷揚州刺史貶黜姦慝不畏強禦吏民請留一年种皓遷凉州刺史甚得百姓歡心被徵還吏民老少詣闕請留一年俸餘不入私門楊康為任成相自為刺史二千石計日受俸餘不入私門故吏賫錢百萬遺之閉門不受以廉潔稱外臺之表九伯之冠謝夷吾為荆州刺史第五倫薦之曰爰牧荆州威行郡國奉法作則居儉履潔尋功簡能為外臺之表聽聲察實為九伯之冠作弔書置子推之廟周舉為并州刺史太原舊俗以介子推焚骸有龍忌之禁新序曰晉文公反國介子推無爵遂去之介山之上公求之不得乃焚其山子推遂不出焚死龍星火之位也春見東方心為大火懼火之盛故禁之俗謂子推以此日被焚至正月咸言神靈不樂舉火由是士人冬中輒一月寒食莫敢烟火老少不堪之嵗多死者舉既到官乃作弔書以置子推之廟言盛冬去火殘損非賢者之意以宣示愚民使還溫食賜三公服郭賀字喬卿拜荆州刺史到官有殊政百姓便歌之曰厥德神明郭喬卿中正朝廷上下平顯宗巡狩到南陽特見嗟嘆賜以三公之服黼黻冕旒敕行部去襜帷使百姓見其容服以彰有德二天蘇章字孺文為冀州刺史故人為清河太守章行部案其姦贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今日蘇孺文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪州境知章無私望風畏肅賈父來晚賈琮字孟堅交趾土多珍産前後刺史率多無清行吏民怨叛中平元年交趾屯兵反執刺史及合浦太守靈帝以賈琮為交州刺史琮到部刺其反狀咸言賦斂過重京師遼逺告寃無所故遂為盜賊琮即行書告示各使安其資業誅斬渠帥百姓歌之曰賈父來晚使我先反今見清平吏不敢犯褰赤帷裳賈琮為冀州刺史舊典傳車驂駕乘赤帷裳迎于州界及琮之部升車言曰刺史當逺聽廣視糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震其贓過者望風解印綬去請一年租以濟飢民續漢書皇甫嵩冀北牧奏請一年租以賑飢民民歌曰天下亂兮市為墟母不任子兮妻失夫賴得皇甫嵩兮復安居宣恩逺夷种嵩字景伯益州刺史宣恩逺夷皆懷服漢德過江厲聲張禹拜揚州刺史當過江行部中土人皆以江南有子胥之神難于濟涉禹厲聲言曰子胥如有靈吾志在理察枉訟豈危我哉遂鼓楫而過誣富者以大罪沒入財物侯賢為益州刺史豐富者輒誣以大罪皆誅滅之沒入財物王獨坐謝承後漢書吳郡王閔為冀州刺史不發私書不畏豪強號曰王獨坐食乾飯左雄為冀州刺史不舉煙火常食乾飯入界即雨百里嵩為徐州刺史境遭旱嵩行部傳車所往甘雨即注東海金鄉兩縣僻在山間傳駟不往二縣獨不得雨父老請嵩曲到其縣入即雨與士對坐暗中巴秖字敬祖為揚州刺史在官不迎妻子俸祿不使有餘幘毁壞不復改易以水漆傅墨用之與士對坐暗中不燃官燭糾發單匡第五種遷兖州刺史中常侍單超兄子匡為濟陽太守負勢貪放種欲收舉未知所使會聞從事衛羽素抗厲乃召羽具告之曰聞公不畏強禦今欲相委以重事若何對曰願庶幾于一割羽出遂馳至定陶閉門收匡賓客親吏四十餘人六七日糾發其贓五六千萬種即奏匡并以劾超計日受俸楊秉字叔節雅素清儉為刺史二千石計日受俸不入私門家室貧寠并日而食併日而食見上誅刺史二千石貪殘者第五倫上疏褒揚盛美曰前嵗誅刺史二千石貪殘者皆明聖所察非臣所及從事餉錢五十萬黃亮為兖州刺史坐贓盜免時飢饉故從事聞之乃相合賫錢五十萬餉之妻子聞乃夜至于牀下叩頭請受之亮不應目下寢曰大丈夫行志自從即不遣從事載錢詣京師表亮和帝擢為南郡太守席羊皮卧布被東觀漢記李恂為兖州刺史清約率下席羊皮卧布被麻麥付從事李恂為兖州刺史所種小麥胡麻約付從事又壺遂為揚州刺史亦然起徒中段熲起徒中為并州刺史連騎相繼數千里段熲為并州刺史清約率下連騎相繼數千里十日一炊隱暹為徐州刺史以小銅釜甑十日一炊食不重味藍縷繩履漢末英雄記幽州刺史劉虞食不重味藍縷繩履常懷廉退恩化大行魏志太祖有袁紹之難以劉馥可任以東南之事遂表為揚州刺吏馥單馬到合肥空城建立州治南懷緒等皆安集之貢獻相繼數年中恩化大行流民越江山而歸者以萬數于是聚諸生立學校廣屯田興治芍陂及茹陂七門吳塘諸堰以溉稻田官民有蓄以儉率下司馬朗遷兖州刺史政化大行百姓稱之在軍旅中常惡衣服以儉率下召豪右薦幕府梁習以别部司馬領并州刺史時承髙幹荒亂之後吏民亡叛更相扇動習到官誘諭招納以禮召其豪右稍稍薦聞使詣幕府世多其能任賢吕䖍有膽勇文帝即王位為禆將軍徐州刺史加威勇將軍請琅琊王為别駕民事一以委之世多其能任賢不將妻子入官舍裴潜字文行為兖州刺史每之官不將妻子入官舍妻子貧織黎笓以自給皎然清白徐邈遷凉州刺史皎然清白不携妻子妻子常忍飢寒真刺史賈逵有文學為豫州刺史時天下初復州郡多不懾逵曰州本以御史出監諸郡以六條詔書察長吏二千石以下故其狀皆言嚴能薦揚有督察之才不言安靜寬仁有愷悌之德也今長吏慢法盜賊公行州知而不糾天子復何所取正乎兵曹從事受前刺史假逵到官數月乃還者見各具二千石以下阿縱不如法皆舉奏以免之帝曰逵真刺史矣布告天下以豫州為法衣繡晝行張饒字德容出為雍州刺史太祖謂曰君還本州可謂衣繡畫行也在州二十年而居處貧窮梁習為并州刺史政治常為天下最太初二年召為大司農習在州二十年而居處貧窮無方面珍物明帝異之禮賜甚厚雖在外任心存朝廷王昶字文舒遷兖州刺史明帝即位雖在外任心存朝廷以為魏承秦漢之弊法制苛碎不大釐改國典以凖先王之風而望治化復興不可得也乃著治論略依古制而合于時務者二十餘篇吏民追思賈逵為豫州刺史病薨吏民追思州人思之司馬朗字伯逺為兖州刺史政化大行百姓稱之建安二十三年與夏侯惇等征吳到居巢軍士大疫親視醫藥遇疾卒遺令以布衣幅巾殮以時服州人思之柱石之質忠於王室溫恢字曼基為梁州刺史卒年四十五詔曰恢有柱石之質服事先命功勤明著及為朕之執事忠于王室奉宣六條公卿以下大議損益杜恕以古之刺史奉宣六條以清淨為名威風著稱今可勿令領兵以專民事胡床掛柱魏略裴潜為越州刺史嘗作一胡床及去留以掛柱豫州立祠蜀志祖逖遷徐州刺史及卒豫州為立祠妻子飢乏吳志吕岱為交州刺史歷年不餉家妻子飢乏孫權聞之歎息以讓羣臣曰岱出守萬里為國勤事家門內困而孤不早知股肱耳目其責安在于是加助錢米緝布化行如神吳地志崔徴少有竒操兄弟七人號七龍遷益州刺史化行如神所部肅然吳録張康遷益州刺史端敕正厲威嚴表善惡所部肅然不發私書不發私書上假曲蓋鼓吹晉向雄太始中遷秦州刺史假赤幢曲蓋鼓吹扶出小吏劉抃為并州刺史初抃之并州昔同時為須昌小吏者十餘人祖餞之其一人輕抃抃扶出之人以此少之峻制繩僚屬郗隆為揚州刺史僚屬有罪輒依臺閣峻制繩之逺近感恱斷决如流人不敢欺荀晞字道將練于官事為兖州刺史案簿盈積斷决如流人不敢欺受杜預王渾節度晉初詔書使益州刺史王濬下建平受杜預節度至秣陵受王渾節度杜預至江陵謂諸將曰若濬得下建平則順流長驅威名已著不宜令受制於我乃與濬書曰足下既摧西蕃便當徑取秣陵濬大恱表呈預書曰及濬將至秣陵王渾遣使要令暫過論事濬揚帆直指報風利不得泊也王渾夕破皓中軍斬張悌等頓兵不敢進而濬乘勝納降渾恥而且忿表濬違詔不受節度誣罪狀之清畏人知胡威父質為荆州刺史威自京師定省告歸父賜絹一匹為裝威曰大人清髙何得此絹質曰吾俸祿之餘也後武帝問威曰卿孰與父清威對曰臣父清畏人知臣清畏人不知是臣不及父逺矣流柿蔽江王濬為益州刺史武帝謀伐吳詔濬修舟艦乃作大船起樓櫓其上皆得馳馬來往又畫作鷁鳥怪戰以懼江神濬造船于蜀其木柿蔽江而下吳建平太守吳彥取流柿以呈孫皓曰晉必有攻吳之計國之外臺陳頵為郡督郵遷主簿州辟部從事劾案沛王韜獄未竟會新刺史解結至大會問主簿史鳳曰沛王貴藩州據何法而擅拘耶時頵在坐對曰甲午詔書刺史銜命國之外臺其非所部而在境者刺史并糾事徴文墨前後列上七被詔書如州所劾無有違繆結曰宜依法窮竟墮淚碑羊祜為荆州刺史祜樂山水每思風景必造峴山置酒言詠終日及祜卒襄陽百姓于峴山祜平生遊憩之所建立碑廟嵗時饗祭望其碑者莫不流涕杜預因名曰墮淚碑夢三刀王濬為廣州漢陽太守夜夢三刀懸于卧室梁上須臾又益一刀濬甚惡之主簿李毅曰三刀為州又益一刀者明府其臨益州乎果遷益州刺史三品酒劉𢎞為荆州刺史持節南蠻校尉先是酒室中有齊中酒㕔事酒猥酒同麯蘖而優劣三品𢎞下教曰投醪常與三軍同醉豈得二其厚薄自今不得分别酌貪泉吳隱之為廣州刺史未至州二十里地名石門有水貪泉言飲者有無厭之求隱之酌飲之因賦詩曰古人云此水一啜重千金若使夷齊飲終當不易心妖星見元帝初拓定江南以祖逖為奮威將軍豫州刺史逖既渡江纍破石勒軍有妖星見于豫州之分歷陽陳訓謂人曰今年西北大將當死逖亦見星曰為我矣方平河北而天欲殺我此乃不祐國也又術人戴祥曰祖豫州九月當死逖俄卒豫州士女若喪考妣子弟樵薪祖逖為豫州刺史不畜資産克巳務施子弟耕耘負擔樵薪治稱不煩石彥遷江州刺史治稱不煩在郡弋釣山澤縱心流覽望之若畫秋夜登樓庾亮鎮武昌諸佐吏殷浩之徒乘秋夜共登南樓俄不覺亮至諸人將起避之亮徐曰諸君小住老子於此處興復不淺便據胡床與浩等談詠其坦率行已多如此殺典籖吉翰字休文為徐州刺史時有死罪囚典籖意欲活之因翰人關齊呈事翰省訖語令且去明旦可更呈明旦典籖不敢復入呼之乃來取昨所呈事視之謂曰卿意常欲宥此囚死罪昨覽卿呈事某亦有心活之但此囚罪重不可全貸既欲加恩命卿便當貸其重罪因命左右收典籖下獄殺之原此囚生命其於刑政類皆如此自是列吏莫敢犯禁旌命所加三千餘人王隱晉書山濤為冀州舊俗略無士人自濤居於此州搜賢求才旌命所加三千餘人皆顯名當世冀州之士于是為盛使私童樵採晉中興書禇裒字季默女即獻后也以后父告求外出降建威將軍江州刺史蒞政每崇清約但使私童樵採綏撫故舊桓宣為梁州刺史在鎮十餘年綏撫故舊甚得稱譽為中興第一桓伊字叔夏有武幹又善音律為中興第一遷都督江州荆州十郡豫州四郡軍事江州刺史乃上疏以江州虛耗年嵗不登宜併小縣除逋米州治置還豫州詔令移州尋陽餘皆聽之伊隨置拯撫百姓賴焉年二十荀羡為徐州刺史時年二十中興方伯未有如羡少者接豪士以友道臧榮緒晉書華􅀈字彥夏歷江州刺史在郡甚有威惠州之豪士以友道接之甚得江表之稱三窟王衍字夷甫為尚書㒒射領吏部後拜尚書令司徒母弟澄為荆州族弟敦為青州因謂澄敦曰荆有江漢之固青有附海之險卿二人在外而吾留于此足以為三窟也得劉公一紙書賢於十部從事晉陽秋劉𢎞字和季為荆州刺史值王室多難得専命一方盡其器能推誠羣下厲以公義而有興廢手書郡國丁寧欵密故莫不感悅爭赴之咸曰得劉公一紙書賢于十部從事牛産犢官舍留之而去晉書寧暨為青州刺史有私牛産犢官舍留之而去殺弟干寶晉記荀晞字道將為兖州刺史姨母有一子坐小事晞杖節斬之姨母叩頭及中外皆乞活不聽死後往哭之甚悲曰殺弟者兖州刺史哭弟者荀道將也姿容如畫觀者塞路王規字令武廣州刺史姿容如畫每行觀者寒路百姓感化復覩太平祖逖别傳逖為豫州刺史喪亂之餘骸骨未收者為之殯殮葬其骨肉恩薄不收殮者加貶責由是百姓感化復見太平置酒大會坐中耆老相與流涕而歎曰吾等投老更得父母死將何恨又童謡曰幸哉為民免豺虎三辰既朗遇慈父𤣥酒青醪甘瓠脯亦何報恩歌且舞男女出境迎者萬餘人宋書始興王淡字僧逺為荆州刺史曹無留事獄無滯囚還朝人歌曰始興王人之父赴民如急水火何時復來乳哺我重臨荆州男女出境迎者萬餘其得人心如此三臨徐州威惠宣著王懿字仲德為鎮北將軍徐州刺史仲德三臨徐州威惠宣著嗜酒醉輒纍旬荆州刺史王恱范泰外弟也嗜酒醉輒纍日及醒則儼然端肅泰謂曰酒雖㑹意亦以傷生治國如家宋略范泰奏交州刺史杜惠世司交部布衣蔬食治國如家羣蠻縗絰送千餘里雍州刺史晉安侯劉道彥卒在州有惠化及喪東歸漢濱羣蠻縗絰號哭送千餘里我是賈客耶齊書臨川王映為雍州刺史嘗置錢還都置物有獻計者曰于江陵買貨至都回換可得微有所增映笑曰我是賈客耶乃復求利置宅百三十萬王琨為廣州刺史南土沃實在任者常致巨富世謂廣州刺史但經城門一過便得三千萬琨無所取表獻俸祿之半州鎮舊有鼓吹又唘輸還及罷任孝武帝知其清問還資多少琨曰臣置宅百三十萬餘物稱之帝恱其對起臺榭延僚屬梁書夏侯詳為湘州刺史詳善吏事在州四載為百姓所稱州城南臨水有峻峯舊傳云刺史登此山輒代由是歷政莫敢至詳於其地起臺榭延僚屬主人憒憒不如客蕭恪為雍州刺史賓客有江仲舉蔡薳王臺卿庾仲容四人俱被接遇並有蓄積故人間歌曰江千萬蔡五百王新車庾大宅遂逹武帝接之曰主人憤憒不如客及恪還武帝問之恪大慙裂裳為帽哀哭送之安武康王秀遷雍州刺史初秀之西也郢州人聞其疾百姓商賈咸為請命及薨四州人裂裳為白帽哀哭以迎送之衣錦還鄉朕無西顧之憂栁慶逺字文和為雍州刺史髙祖餞於亭曰卿衣錦還鄉朕無西顧之憂二獸自斃宗室蕭業襲封長沙王者督南兖州刺史徙湘州尤著善政零陵舊有二猛獸為暴無故相枕而死郡人唐睿見猛獸旁有一人曰刺史德感神明所以二獸自斃言訖不見衆並異之四獸死於郭外宗室蕭象為湘州刺史湘州舊多猛獸為暴及象任州日四獸死于郭外自此靜息故老咸稱至德所感自立碑宗室蕭明為豫州刺史百姓詣闕拜表言其政德樹碑于州門內及碑匠採石出自巴陵明召廣營厨帳多召人物躬自率領與石至州識者笑之曰王自立碑非州人洗足致敗陰子春為梁泰州刺史子春雖無他才術臨人以廉潔稱閨門混雜其身服垢汚腳數月一洗言每洗則人才敗事云在梁州以洗足致敗衰老無能抗敵梁後略初任約之來江陵憂懼時上方議拒捍未得其人與晉州刺史蕭惠及董羅等議之羅曰當今所仗莫若蕭公上應聲謂惠曰社稷存亡在斯一舉卿去同族休戚為我行乎惠對曰臣之少壯猶不若人今衰老矣無能抗敵歐陽頠有匡濟才陳景平中元帝遍問朝宰曰各舉所知羣臣未有對元帝曰吾已得一人矣侍中王裒進曰未審為誰帝曰歐陽頠甚公正有匡濟才恐蕭廣州不肯致之乃授武州刺史臥彪後魏李崇沈深有將略寬厚善御衆在揚州凡經十年常飬壯士數千人冦賊侵邉所向榷破號臥彪父子相代畢終敬父子相代為兖州當世榮之時終敬以老還鄉常呼其子元賓為使君每元賓聽政時乘極輿出至元賓所先遣左右勑不聼起觀其斷决欣欣然喜見顔色為牧之道亦易亦難髙陽王雍為潮州刺史誡曰為牧之道亦易亦難其身正不令而行故曰是易其身不正雖令不從故曰是難修召公廟髙允為淮州刺史秋月巡境問人疾苦至郡縣見召公廟廢毁允歎曰召公之德闕而不祀為善者何望乃表修葺之允時年九十勸人學業風化頗行然儒者優遊不以斷决為事置鼓樓李崇為并州舊多劫盜崇乃村置一樓樓上懸一鼓有盜則擊之俄頃之間聲布百里遂多擒獲諸州置鼓自崇始武士彎弓文士下筆安南王禎為雅州刺史髙祖餞之于都亭詔曰今者之集賓曲宴各命賦詩不能者聽射當使武士彎弓文士下筆移治東城汝陰王子修義除徐州刺史修義以齊州頻喪刺史纍表固辭詔曰修短者命吉凶由人何過致憂憚以辜維城之寄違吉就凶時亦有之可聽更立廨宇修義于是移治東城斷亡失子李崇為揚州刺史先是壽春縣人茍泰有子三嵗遇賊亡失數年不知所在後見在同縣人趙俸伯家泰以狀告各言已子崇俱禁之各在别處禁經旬日遣人告之曰君兒遇患病已暴死有赦解禁可出奔喪也茍泰聞即號咷悲不自勝俸伯嗟咨而已殊無不滿之意崇乃以兒還泰詰俸伯詐狀俸伯欵引云先亡一子故妄認之州民請輸絹粟以報恩任城王雲冀州刺史留心政事甚得下情于是合州民請各輸絹五尺粟五升以報雲恩髙祖嘉之勸課農桑修飭太學季平為相州刺史勸課農桑修飭太學簡試通儒以充博士選五郡聰敏者以教圖孔子及七十二弟子于講堂親為立贊畫履虎尾踐薄氷於客館以示誡焉立文學崇武館韋彧為豫州刺史以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒於州總教又於城北置崇武館以習武事境內肅清以所賜穀帛分州內孤貧韋珍遷郢州刺史在州有聲績遷龍將將軍賜驊騮二匹帛五十匹穀三百斛珍乃集州內孤貧者謂曰天子以我能綏撫卿等故賜以榖帛吾何敢獨當遂以所賜悉分與之州中十善陸使長子馥多智有攴風髙祖見而悅之謂朝臣曰吾常嘆其父智過其軀是復踰于父矣少為內都下大夫出為湘州刺史假長廣公為政清平抑强扶弱中州有舊德宿老名望素重者以友禮待之詢之以政事責之以方略如此者十人號曰十善于是發姦摘伏事無不驗百姓以為神明無敢冦盜召為散騎常侍人乞留者千餘人州人乞留上封孫叔敖廟毁蔣子文廟任城王澄為揚州刺史下車封孫叔敖廟毁蔣子文廟請復皇宗之學四門之教詔從之慈父宗室元孚為冀州刺史勸課農桑境內稱為慈父都州號曰神君彈燕李惠為雍州刺史長於思察雍州㕔事有燕爭巢已纍日惠令人掩獲試命綱紀斷之並辭惠乃使卒以弱竹彈兩燕既而一去一留惠笑謂吏屬曰此留者自計為巢功重彼去者既經楚痛理無固心羣下服其深察辨訟李惠為雍州刺史人有負薪者同釋重擔息樹下二人將行爭一羊皮各有藉背之物惠遣爭者出顧州綱紀曰此羊皮可考知主乎羣下各無答者惠乃令人置羊皮席上以杖擊之見少鹽屑曰得其實矣使爭者視之負薪者乃伏而就罪凡所覽究多如此類表求賑貸北齊書李元忠為光州刺史州境災傷人皆菜色元忠表求賑貸被報聽用萬石元忠以為少遂出五十萬石賑之事訖表陳朝廷嘉而不責召拜侍中旬日成化南齊豫章王蕭嶷初為荆州刺史至州坦懷納善側席思政王儉以書與嶷曰舊楚蕭條仍嵗多故政荒人散實在緝理公臨蒞甫通英風惟穆江漢來蘇八荒慕義庾亮以來荆州無復此政古人云期月有成而公旬日成化豈不休哉桴鼓不鳴邢邵除兖州刺史有善政桴鼓不鳴吏人姦狀守令長短無不知之罷牛酒祈子胥廟宗室清河王勵為楚州刺史城北有伍子胥廟其俗敬鬼神祈者必以牛酒至破産業勵歎曰子胥賢者豈宜損百姓乎告諭所部自是遂止百姓賴之前兄後弟夏侯逵為南豫州刺史逵兄亶先經此任至是逵又居焉兄弟並有恩德於鄉里百姓歌曰我之有州賴得夏侯前兄後弟布政優優行事美惡係於典籖之口故事府州部內論事皆籖前直叙所論之事後云謹籖月日下又云某官某籖故府州置典籖以典之宋氏晚運多以幼少皇子為方鎮時主皆以親近左右領典籖典籖之權稍重大明太始長王臨藩貴族出鎮莫不皆出納教命刺史不得專其任也宗慤為豫州吳喜公為典籖慤刑政所施喜公每多違執慤大怒曰慤年將六十餘為國竭命正得一州如斗大不能復與典籖共臨之喜公稽顙流血乃止自後權寄彌隆典籖遞互還部一嵗數反將至輒與間言訪以方事刺史行事之美惡係於典籖之口莫不折節推奉惟慮不足於是威得州郡權重藩君得一州如斗大上放囚展謁親戚張華原字滿國兖州刺史獄先有禁囚華原科簡輕重十人謂曰今三元之始天下黎民皆得中賀尊老獨卿等幽閉今給假片日得展謁親戚期盡還也囚等應期畢至生男放囚平覽字明逺拜揚州刺史其妻生男覽因喜酣醉境內禁囚悉放時有上細作二人亦放覽醒而知之上表自劾顯宗原其罪夢山上掛綵張亮武定初拜大中大夫薛淑常夢亮於山上掛綵以告亮曰古之字山上絲幽字也君其守幽州乎數月果然六駁食猛獸張華原為兖州刺史先是東北十七里平山中有猛獸為暴忽有六駁食猛獸為化感所致正恐不久復來盧潛為揚州刺史甚為太守所憚武平二年徴為兵部尚書揚州民以潛戒斷酒肉篤信釋氏不殺僧㑹以香花緣道流涕送潜潜歎曰正恐不久復來爾至鄴未幾陳將吳明徹渡江侵掠復以潜為揚州刺史趙郡王泉趙郡王睿除北朔州刺史有無水處禱而掘井鍤才下泉源涌出號曰趙郡王泉捕獲換新靴人任城王楷為并州刺史時有婦人臨汾川洗衣有乘馬人携其新靴馳而去者婦人持故靴詣州言之楷召居城諸嫗示之曰有乘馬人被賊害劫遺此靴焉得無親屬乎一嫗撫膺哭之曰兒昨日著此靴去妻家如其語捕獲之時人伏其明察也祀井泉涌平覽遷懷州刺史覽奏請於西故車道築城以杜西軍尋而西魏來攻新築城糧糗未集素乏水南門內有大井隨汲即弱覽具衣冠向井而祝至期而井泉涌有異於常在此州唯飲此水竇熾為原州刺史挫抑豪右申理幽滯在州十載甚有政績州城北有泉水屢經擾踐常與僚吏於泉側因酌水自飲曰吾在此州惟飲此而已畫楊震像於私室題詩於清水亭申徽為襄州刺史時南方初附舊俗官人皆通餉遺徽性廉慎乃畫楊震像於私室以自戒及代還人送者數十里不絶徽自以無德於人慨然懷愧因賦詩題於清水亭長幼聞之皆競來讀遞相謂曰此申使君手迹並䉣誦之暴過猛獸庫狄士文為貝州刺史至州長吏尺布斗粟之贓無所旁貸得千人奏之悉配廣南親戚哭聲遮於州境士文聞之令人捕搦捶楚盈前哭者彌甚司馬京兆韋焜清河趙逹二人並苛刻惟長史有惠政人語曰刺史羅剎政司馬蝮蛇瞋長史含笑判清河生喫人上聞之歎曰士人暴過猛獸居室患蠅杖門者庫狄伏達為并州刺史好聚斂又嚴酷居室患蠅杖門者曰何故放入其妻病以百錢買藥每自恨之不識士流開府府參軍多是衣冠士族皆擒撻遣築墻受絹千匹斛律武都為兖州刺史塗經衛北受絹千匹黎陽郡守石曜手持一縑而謂之曰此是老石機杼聊以奉贈自此之外並須出於吏人武都知曜清素純儒笑而不責何忍欺仁君鄭祖𫐠為兖州刺史人有市盜布其父怒曰何忍欺仁君執布歸首祖述特原之置勳州後周文帝以韋孝寬立勳玉璧遂於玉璧置勳州以孝寬為刺史取孝寬之勳名之也路側植樹韋孝寬為雍州刺史先是路側一里置一土堠經雨頺毁每須修補孝寬臨州乃敕州內當土堠之處植樹以代之既免修補之勞旋又得庇蔭太祖後見之怪而問之人以狀對太祖嘉之曰豈得獨爾當令天下同之於是令諸夾道一里種一樹十里種二樹百里種五樹焉特給路車鼓吹蘇亮出為岐州刺史朝廷以其牧本州特給路車鼓吹先還其宅并給騎士三千列羽儀遊鄉黨經過故人宅旬月而後入州世以為榮為鄰境士庶所重獨孤信為泰州刺史常出獵日暮入城其帽微側詰旦而吏人有戴帽者咸慕信而側焉其為鄰境士庶所重如此為本州刺史劉雄髙祖嘗從容謂曰古人云富貴不歸本鄉猶衣錦夜遊今以卿為本州如何雄稽首拜謝於是以雄為河州刺史雄先已為本縣令今復有此授鄉里榮之賜以所服冠履衣被史寧為凉州刺史遣使詣朝太祖即以所服冠履衣服及弓箭甲楯等賜寧謂其人曰為謝凉州孤解衣以衣公公推心以輔孤其善始令終無損功名也容貌魁偉聲音如鐘長孫儉為荆州刺史時梁嶽陽王蕭察內附遣使入朝至荆州儉於㕔事列軍儀具戎服與使人以賓主禮相見儉容貌魁偉聲音如鐘又為鮮卑語遣人傳譯以答問客惶恐不敢仰視日晚儉乃著裙襦鈔帽引客宴于别齊因叙梁園喪亂朝廷招携之意發言可觀使人大恱出曰吾不能測也以其信著遐邇故賜名信獨孤信為泰州刺史先是守宰暗弱政令乖方民有寃訟歷年不能决信在州事無擁滯亦以禮教勸人以耕田種桑數年之中公私富實流民所歸數萬家太祖大悅以其信著遐邇故賜以名信肉袒自罰長孫儉為荆州刺史東南道行臺僕射所部鄭縣令泉璨為民所訟推治獲實儉即大集􅒼屬遂於㕔事前肉袒自罰捨璨不問於是州屬城肅然莫敢犯法魏文帝璽書勞之掘得黃金封送上王思政遷荆州刺史督工匠繕治城塹掘得黃金三十斤夜深密送之家至旦思政召左史以金示之曰為臣不宜有私悉以黃金封送上太祖嘉之賜錢二十萬鄉里運米以自給泉企為雍州刺史性清約纎毫不擾於民在州五年每於鄉里運米以自給孤之有卿若手臂李逺字萬嵗以有殊勳授原州刺史太祖謂之曰孤之有卿若身之手臂之用豈可暫輟於身於是令逺兄賢代州事一門之內再有衣錦之榮令孤整字延保弟休聰敏有文武才用與整同起兵逐張寶時多功於本州刺史晉公議謂整曰以公勳望應得本州但朝廷藉委任不宜逺出言公一門之內須再有衣錦之榮乃以整為燉煌太守老羆當道王羆字熊羆除華州刺史常修州城未畢梯在城外齊神武遣韓軌司馬子如從河東宵濟熊羆不之覺比曉衆已乘梯入城羆尚卧未起聞閣外洶洶有聲便袒身露髻徒跣持一白棒大呼而出謂曰老羆當道卧貉子那得遏敵見驚退逐至東左右稍集合戰破之軌遂投城遁走文帝聞而壯之元日放囚歸家蕭揮字智遐武帝安城王秀之子性溫裕有儀表出為上州刺史常至元日獄中所有繫囚悉放歸家聽三曰然後赴獄主者固執不可揮曰昔王長文虞廷見稱前史吾雖寡德竊景行之自此獲罪彌所甘心幸勿虞也諸囚荷恩並依限還吏不敢欺梁南康簡王績為南徐州刺史年始十餘主者受貨洗改解書行事不覺績知曰縣解有姦詰之由是吏不敢欺稱為明智文案無擁吳平侯為南兖州刺史清恪有信明解庶獄善知奸惡文案無擁吏民不敢欺間草𨽻有君子風吳均齊春秋徐州刺史陳顯達少有膽氣好弓馬頗間草𨽻有君子風自縣之州近世未有傅琰字季圭年二十為山陰令後重為山陰遷益州刺史自縣之州近世未有也贈竹屏風三國典略賀祥為荆州刺史有惠政逺近款附梁嶽陽王察欽其清德乃贈以竹屏風祥難違其意取付所司太祖聞之並賜祥置水器投書華陽國志趙琰為青州刺史有貴要囑記書琰於㕔事置水器發書皆投其中一無所報吏民塞路攀車隨之嚴尊字王思為青州刺史仁恕在民每當遷官吏民塞路攀車隨之喜慙悲三者交集桓氏家傳桓範為兖州刺史表謝曰喜於復見選擢慙於不堪所職悲於懷戀闕庭三者交集不知所裁聞喪罷市傳泣數千里鍾岏良吏傳羊枯字叔子為荆州刺史恩惠均給人不疲勞及祜卒於洛陽信日中至荆州荆州市方大合聞祜薨即罷市舉市肆皆號咷處處傳泣數千里在官不迎妻子巴祗遷揚州刺史在官舍不迎妻子未嘗食魚肉重授并州為天下最梁習字子虞遷并州刺史召其豪右邊境咸安兼貢達明士咸顯於世武帝善之文帝即位以習有譽并土重授并州為天下最茒茨六間坐無完席吳隱之字處默為廣州刺史及罷之日惟有茒茨六間而已坐無完席乃以蓬為屏風吳人襁負而至者數萬羊祜為荆州刺史恩施均及民不疫勞吳人襁負而至者以萬數開廩訖上聞喬𤣥字公祖徙梁州刺史嵗飢𤣥開倉以給之主者以舊典宜先表聞𤣥曰若待奏報民且死矣開廩訖乃上聞天子嘉之懷義忘罪王望字慈卿為青州刺史嵗飢俾有草食五百餘人因以便宜出布粟給廩與作衣事訖乃上表天子以不先表聞百官皆云犯專命之誅鍾離意獨曰昔華元子反楚宋之時不稟君命擅平二國春秋之義以為美論今望懷義忘罪當仁不讓若繩之以法忽其本情將乖聖朝愛人之㫖帝嘉之乃賞望市無二價江革字季思遷梁州刺史撫養邉戍好施惠愛市無二價攀車號惜邵瞻字思逺遷益州刺史百姓攀車號惜腹心臣零陵先賢傳衛臻領選舉傳為益州刺史文帝曰選吾腹心臣也吾方與運籌帷幄之中决勝千里之外不可授以逺任别選傳焉民吏懷之不忍欺陶氏傳基字子叔先為荆州刺史及薨百姓嘆息莫不號哭其子璜復為是州政務清淨而已民吏懷之不忍欺路旁女子哭聲不哀益部耆舊傳嚴遵為揚州刺史行部聞路旁女子哭聲不哀問所哭者誰對曰夫邅燒死遵敕吏與語謂吏曰死人自過不燒死攝女令人守尸曰當有物往吏曰有繩聚頭所遵搜視鐵釘貫項携問乃以淫殺夫得交刃為交州世說爰綜為新安太守南界有刻石綜至下有人於下得剪者咸異之主簿對曰昔長沙相王當餞孫同老云此州狹而長君當為長沙事果應夫三刀為益今得交刀君亦當為交州後果如其言重千斤語林孟業為幽州刺史其人甚大或以重千斤見庭前井中出異苑晉陸韋邵家在延陵元嘉初忽見人從庭前井中出長尺許被帶組甲伍相隨出門良久乃盡邵兄數善占筮常云吾子弟當刺史即青廣二州也吏人立廟設祭干寶搜神記王業和帝時為荆州刺史遷司𨽻校尉卒于枝江吏人立廟設祭刻石銘德刻石銘德上州界山響稱萬嵗者三隋書慕容三藏為廓州刺史時州略連雲三響稱萬嵗者三詔頒郡國仍遣使醮於山所其日景雲浮於上雉兔馴壇使還上大悅屈公卧治楊常希表有足疾上謂之曰蒲州出美酒足堪養病屈公卧治之於是出拜蒲州刺史還笏復拜張威以平王謙功拜青州刺史頗治産業遣家僚於民間鬻荻根其馭吏緣此侵擾百姓上深加譴責坐廢於家從行泰山至洛陽上謂威曰自朕之有天下每委公以重任可謂推赤心矣何乃不終名行唯利是嗜豈惟辜負朕心亦且纍公名德因謂威曰公所執笏今何在威頓首曰臣負罪虧憲無顔復執謹藏於家上曰可持來明日奉笏以見上曰雖不遵法度公效力實多朕不忘之今還公笏復拜洛陽刺史戴帽餳片梁彥先拜州刺史言於上曰臣前待罪湘州百姓呼為戴帽餳片自分廢黜無復衣冠之望不謂天恩復垂收採請為湘州改絃易轍以變其風俗上答隆恩從之復為湘州刺史豪猾聞彥先自請而來莫不嗤笑及下車發擲姦隱有若神明於是俠猾凶徒莫不潛竄合境大駭稱為良二千石令狐熙拜滄州刺史時山東承齊之後户口簿籍多不以實熙曉諭之令自歸首至者萬口在職數年風教大行稱為良二千石考績為天下最唐開皇四年上幸洛陽令狐熙來朝州民恐其遷易悲哭於道及熙復還百姓出境迎謁歡呼盈路在州獲白烏白麞嘉禾甘露降於庭前栁樹八年徙為河北行臺度支尚書吏民追思立碑頌德及上祠泰山還次汴州惡其殷盛多有姦俠乃命熙為汴州刺史下車禁遊食抑工啇民有向街開門者杜之船客停於郭外星居者勒為聚落僑人逐令歸本其有滯獄並决遣之令行禁止稱為良政上聞而嘉之護溝瀆于頔為湖州刺史因行縣至長城方山其下有水曰西湖南湖疏鑿溉田三千頃久湮廢者令設提塘以復之改蘇州刺史護溝瀆整街衢至今賴之吳俗事鬼頔疾其淫祀廢生業神宇皆徹去唯吳太伯伍員等廟存焉雖為政有績然橫暴尤甚削去煩苛崔瓘以士行聞蒞職清謹略遷澧州刺史下車削去煩苛以安人為務居二年風化大行流亡襁負而至增戶數萬有司以聞優詔特加五階至銀青光祿大夫以甄能政選循良大厯初叛臣周智光伏誅詔選循良為近輔以敬括為同州刺史嵗餘入為御史大夫遲重推誠未嘗以私害公衣錦姜譽泰州人以平薛仁杲拜秦州刺史髙祖曰衣錦還鄉古人所尚今以本州相授不遣妻子為質張萬福在泗州遇德宗幸奉天李希烈反陳少遊悉令管內刺史送妻小在揚州以質萬福獨不送謂使者曰為某白相公萬福妻子老且醜不足煩相公寄意終不之遣為人所稱奏放逃戶缺錢李渤字濬之遷江州刺史張平叔判度支奏理違逋渤上疏曰伏奉詔敕度支使所奏今臣設計督填逃戶所缺錢四千餘萬臣懼史官書陛下於大旱中督三十六年前逋臣任刺史罪無所逃臣既上不副聖情下不忍鞭笞黎庶不敢輕持節印特乞放臣歸田乃下詔曰江州所奏實為懇誠若不蠲免實難存濟所訴逋缺並放方渠水流楊朝晟字叔明為鄧州刺史奏方渠合通水波皆賊路也請城其地以備之軍至方渠無水師旅囂然遽有青蛇乘髙而下視其迹水隨而流朝晟命築防澤之遂為停泉軍人仰飲以足圖其事上聞詔置祠焉務舉大綱楊恭仁隋司空雄之長子仁壽中纍除甘州刺史恭仁務舉大綱不為苛察戎夏安之文帝謂雄曰恭仁在州甚有善政非惟朕舉得人亦是卿義方所致引水入城以代井汲長孫操為陜州刺史自州東引水入城以代井汲百姓於今稱之妙簡賢良分典大州則天常與宰相議及州縣官吏納言李嶠夏官尚書唐休璟等奏曰伏思當今要務莫如富國安人富國安人當在擇刺史竊見朝廷物議莫不重內官輕外職每除授牧伯皆再三披訴比來所遣外任多是貶纍之人風俗不登實由於此宜於臺閣寺監妙簡賢良分典大州共康庶績前後為治其政如一陸象先為刺史嘗有小吏犯罪但示語而遣之録事白曰此例當今豫杖象先曰人情相去不逺此豈不解吾言若必須行杖即當自汝為始録事慚懼而退象先常謂人曰天下本自無事祗是庸人擾之始為繁爾但當靜之於源亦何憂其不簡前後為治其政如一當靜之於源上務勸農桑蔣幹遷魏州刺史時河北饑饉舊吏苛酷百姓多逃散幹乃察奸吏務勸農桑由是逃散者皆來復業稱為良牧郡人勒碑頌德狄仁傑轉寧州刺史撫和戎夏民得歡心郡人勒碑頌德御史郭翰巡察隴右及入境內者老歌刺史美德者盈路翰薦於朝詔為冬官侍郎罷散繕城郭敬暉除衛州刺史時河北新有突厥之冦方秋而修城不輟下車謂曰金湯非粟不守豈可棄收穫而繕城郭哉悉令罷散不徒示寵賈敦頥為瀛州刺史弟敦實為饒陽令政清淨舊制大功之嫌不連官朝廷以其兄弟治行相髙故不徒以示寵奏課第一崔俊性介潔矜已之清視贓貪若仇以蘇州刺史奏課第一一劔下毗陵九國志張馴景福元年從行密歸江都路經毗陵行密顧左右毗陵大城也馴一劔下之不亦壯乎即授溫州刺史指獄門曰錢爐後蜀申貴歷昌渝文眉四州刺史貪鄙殘虐所在聚斂販貨民不勝其弊典眉州受財鬻獄恣其暴橫嘗指獄門謂左右曰此我家錢爐其暴如此祝神虎斃南漢謝傑為髙州刺史境多虎夜入郭中為暴人不安居傑一日沐浴謁城隍神舉酒祝曰愚民何辜而虎暴之蓋刺史無德化願虎只食刺史無傷愚民因屏去左右獨宿殿庭中是夜三鼓廟東南隅忽有物哮吼其聲如雷良久乃止及遲明視之數虎悉斃民安俗阜王延彬弱冠為泉州刺史在治三十餘年民安俗阜嵗無災沴人以為淳厚所致李大蟲楚李瓊為桂州刺史魁岸多力每食肉十餘斤据按大嚼耽耽然軍中號曰李大蟲先是桂州兒童聚戲衢路忽相驚走曰大蟲來至是果應刺其體作赤心殺賊字國朝兵馬副部署保州刺史呼延贊武人所為不近理忠實有膽勇常自言願死於賊刺其體作赤心殺賊字至妻子奴僕皆然鞍馬器用什物咸刺繡刻鏤亦為其字作破陳刀降魔杵鐵鞭鐵幞頭兩旁有刃皆重數十斤乘騅馬緋抹額自稱慕尉遲敬德之為人赴保州言於上曰臣服飾怪異所至之處觀者必衆願敕郡縣遣卒遮列清道上笑而不許服飾詭怪以遼州刺史呼􅵫贊為馬步軍都軍頭領扶州刺史上謂侍臣曰此人頗有膽勇往曽從朕北征服飾詭怪朕以其惑衆欲斬之且車服甲胄自有常制豈當自異乎如尉遲敬德對御毆傷人雖有匹夫之勇亦有何用為將以忠實為本至道元年汝州刺史常思德辭歸治所對於便殿上慰勞久之謂左右曰思德事朕曰固久今老矣當少壯之時甚鋭健大凡為將以忠實為本思德嘗領兵從曹彬至涿州會軍失利皆潰去思德以所部翼衛彬至德州謂人曰吾輩偏禆爾偶失主帥將何面目見君父用心如此可謂忠實矣立屏盜碑郭進為益州刺史㑹盜賊羣起攻劫居民進帥鎮兵剪除之部內清肅民吏千餘人詣闕乞立屏盜碑許之姚大蟲姚內斌太祖以西戎屢為寇抄選內斌為慶州刺史在部十餘年戎人畏服不敢犯塞號為姚大蟲别駕沿革更見州牧門應劭漢官儀元帝時丞相于定國條州大小為設員吏治中别駕諸部從事秩皆百戶刺史六條曰州别駕見部刺史持版拜刺史亦答拜晉職官志州置别駕治中從事隋百官志梁武帝州置别駕治中從事各一人為十班後齊司州置牧屬官有别駕司州别駕從四品上上州第六品中州從六品下州第七品後周八命州别駕正四品七命州四命州正六品隋雍州置牧屬官有别駕開皇二年改别駕贊務以為長史司馬唐職官志貞觀二十三年改别駕為長史永淳元年置州别駕唐百官志上中下州别駕各一人武德元年改丞曰别駕十年改雍州别駕為長史髙宗即位改别駕皆為長史上元二年諸州復置别駕以諸王子為之永隆元年省永淳元年復置景雲二年始𠫭用庶姓天寶八年諸郡奏减冗員罷諸州别駕其在京百司當八别駕者多處之朝列元和以來西河用兵偏禆立朝朱紫填擁久次當進及受代閒居者常數千人趣中書及宰相私第摩肩疾謁繁於辭語及韋處厚秉政復奏置六雄十望十緊三十四州别駕以處之清流不雜朝政清肅投傳後漢周景為豫州刺史辭蕃為别駕從事蕃以處諌諍不合投傳而去注簿符也捕獲沙門盜金後周栁慶為雍州别駕有賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失其金賈人謂是主人所竊郡縣訊問主人遂自誣伏慶聞而歎之乃問賈人曰卿鑰常置何處對曰常自𢃄之頗與人同宿乎曰無與人同宿者惟日者曾與沙門酣宴醉而酣寢慶曰主人持以痛掠自誣非盜也彼沙門乃真盜耳即遣吏速捕沙門乃懷金逃匿後捕獲盡得所失之金長史唐職官志見州牧門五代職官志清泰三年中書門下言長史因攝奏正比未有官者送名國朝淳化五年詔益王元傑可檢校太保兼侍中行揚州潤州大都督府長史充淮南鎮江軍節度使揚潤等州管內觀察處置營田堤堰橋道等使仍改封吳王翰林學士張洎上言今月二十七日制改封王以郡為國置傅相及內侍中尉等佐王為理自漢魏以降所封之王如不之國朝廷命卿大夫臨郡即稱內史行郡事晉永和泰和之際有琅琊王會稽王臨川王故謝靈運王羲之等為會稽臨川內史即其事也唐有天下以揚益潞荆幽五郡為大都督置長史司馬為上佐即前代內史之類也其大都督之號非親王不授其揚益郡等或有親王遙領朝廷命大臣臨郡者皆是長史副大使知節度事臣請以一二言之段文昌出鎮揚州云淮南節度管內營田觀察處置等使檢校尚書左僕射兼揚州大都督府長史李戴義鎮幽州盧龍軍節度副大使知節度事管內觀察處置押契丹兩蕃經略等使檢校司徒平章事兼幽州大都督府長史即其例也今益王以揚潤二郡建社為國正居大都督府之任又以正領節度使豈冝却加長史之號乃是國王自為上佐矣或朝廷且以長史拜命其如銜內又無副大使知節度事之目倘或他日别命守將禆臨本郡即不知以何名目除授也乞付中書門下施行上以制命已出不欲易洎表再上引典故論列宰相言曰襄王越王皆領長史今吳王獨為大都督居襄越之上非便上言曰業已差誤異日有除授即改正之洎奏遂寢至道二年以越王元份為桂州大都督兼領會稽吳王元傑為揚州大都督兼壽春先是洎常抗疏至是洎知政事因郊祀覃慶遂改正焉元祐令州長史正九品州長史為散官辟處士晉書桓冲溫之弟也最淹識有武幹為中軍將軍都督揚江豫三州刺史又遷為督江荆梁益寧交廣七州命處士劉麟之為長史麟之不肯屈親往迎禮甚厚真宰相才唐則天求宰相狄仁傑曰荆州長史張東之其人雖老真宰相才也誤寵崔敬嗣崔敬嗣為房州刺史中宗為廬陵王安置在州官吏多無禮敬嗣以親賢禮待之供給豐贍中宗深德之及登位有益州長史崔敬嗣既同姓名每進擬御筆超拜省者數四後引與語方知誤寵訪敬嗣已卒乃授其子注官别榻孔休源為晉安王長史南陵太守别𠡠專行南徐州事休源略佐名藩王常相倚仗常於齊中别施一榻云此是長史孔坐人莫預焉簡擇無如卿者崔神慶則天時擢拜并州刺史因謂曰并州朕之枌揄又有車馬此日簡擇無如卿者前後長史皆從尚書為之以其委重所以授卿也則天為按行圖擇日而遣之擇日遣行上前賈後張張志願中宗時檢校洛州長史時都城穀貴盜竊甚衆志願一切皆獲杖殺之積尸府門逺近震懼髙宗時賈敦頥為洛州刺史亦有政績與志願皆為一時之最故時人語曰洛州前賈後張可敵京兆三王挺身而去蘇瓌字昌容遷揚州刺史大都督府長史揚州地當衝要多富商大賈珠翠珍怪之産前長史張潛于辨機皆致資數萬惟瓌挺身而去烟霄失路劉鄴字漢藩同平章事僖宗即位蕭倣崔彥昭秉政素惡鄴乃罷授揚州大都督府長史淮南節度使是日鄴押班宣麻竟通事引鄴內殿謝不及笏記鄴遂自叙十句語曰霖雨無功深愧代天之用烟霄失路未知歸骨之期帝惻然散官粟行賑救李臯字子簡為溫州刺史無幾攝行州事嵗歉有官粟數千萬斛臯欲行賑救掾吏叩頭乞候上㫖曰夫人日不再食當死安暇禀命若殺我一身活人數千命利莫大焉於是開倉盡散之以擅貸之罪飛章自劾上嘉之起屯田以代轉輸李聽為靈州大都統府長史境內有光祿渠廢塞嵗久欲起屯田以代轉輸聽復開决舊渠溉田千餘頃至今賴之政在養人賈敦實咸亨中遷洛州長史甚有惠政時洛陽令楊德幹殺人以立威名敦實曰政在養人義須存撫傷生過多雖能亦不貴也德幹為之稍減不枉不漏張說字道濟睿宗即位遷中書侍郎雍州長史景雲秋譙王重福於東都搆逆而死留守捕繫枝黨經時不决睿宗令說往按其獄一宿捕獲重福謀主盡得其情狀其餘枉被繫禁者一切釋之睿宗勞之曰知卿按此獄不枉良善不漏卿人非卿忠正豈能如此司馬隋百官志唐職官志並見州牧門國朝元祐令州司馬正九品為散官除書未到欲視事唐書房嗣業除益州司馬除書未到欲視事益州録事𠫭軍杜景佺不從果除益州司馬委以州府之任任環為衡州司馬都督王勇甚敬異之委以州府之任㕔記白居易江州司馬㕔記曰自武帝以來庶官以便宜制事小攝大重侵輕郡守之職總於諸侯郡佐之職移於部從事故五大都督府至於上中下郡司馬之事盡去唯員與俸在凡內外文武官左遷右移者遞居之凡執役事上與給事於省寺軍府者遙署之凡仕久資髙耄昏軟弱不任事而時不忍棄者實蒞之進不課其能退不殿其否才不才一也江州土髙氣清富有佳綽景刺史守土不觀遊郡吏執事不自暇佚惟司馬綽可從容於山水詩酒間於是郡南樓山北樓水盆事百花風篁石嵓瀑布廬宫源潭洞東西二林寺泉石松雪司馬盡有之矣茍有志於吏隱者捨此官何求焉五品又云按唐典上州司馬秩五品嵗廩月俸官足以裨身食足以給家政康非司馬功壞非司馬罪無言責無事憂為國謀則尸素之尤蠧者身謀則祿仕之優穩者政康非功政壞非罪䘵優穩並見上豈是覔鷂人劉齊賢自侍御史出為晉州司馬髙宗聞其方正甚禮之時將軍史興宗嘗從事於苑中弋獵因言晉州出好鷂劉齊賢見為司馬請使捕之帝曰劉齊賢豈是覔鷂人耶卿何以此待之維舟月夜賦詩蕭遘與韋保衡同年登進士第保衡以干進無藝同年皆薄之遘形神秀偉志操不羣自比李德裕同年皆戲呼太尉保衡憾之保衡作相托遘之失貶播州司馬途中維舟月夜賦詩自悼慮保衡見害遽有神人謂之曰相公勿憂子平常禦侮遘心異之過峽州經帝祠即所見之神人也保衡誅後入同平章事天下甲門袁誼為蘇州刺史司馬張沛者即侍中文瓘之子誼謁之曰司馬何事沛曰此得一長史是隴西李亶天下甲門也誼曰司馬何言之失門戶須歷代人賢名節風教為衣冠顧矚始可稱舉此老夫是也作時柱石見危授命則則曠代無有何可說之以為門户沛懷慙而退御製詩以贈行賀知章因病上疏請入道求還鄉里拜其子曾為會稽郡司馬令侍養御製詩以贈行善政表於能官韋安石為永昌令并州司馬則天手制勞之曰聞卿在彼善政表於能官仁明彰於鎮撫如此稱職甚慰朕懷俄拜并州刺史散將受正員有醫士崔環者自淮南小將為黃州司馬𠡠至南省鄭餘慶執之封還以為諸道散將無故受正員五品官是開徼幸之路且無闕可供由是稍忤時相改太子少傅蘆生於室李全忠廣明中為棣州司馬有蘆生於室中一尺三節心惡之謂别駕張建曰吾室生蘆無乃怪歟建曰蘆芽類德澤而滋家有茅土之慶殆天意乎其生三節必傳三人公勉樹德名無要斯言全忠秩滿遝鄉里事節度使李可舉為牙將可舉死上章推全忠為留後朝廷因以節鉞授之李氏父子三葉十年而已不宜治郡白居易為太子左贊善大夫會有素惡居易者言居易作新井詩言浮華無實行不宜置彼周行執政貶為刺史詔出王涯上疏論之言居易所犯狀迹不宜治郡追詔授江州司馬治中漢制治中從事史一人居中治事主衆曹文書應劭漢官儀司𨽻功曹從事即治中也辭對無變謝承後漢書陳禪為州治中從事時刺史為人所劾受納贓賂禪當傳考及至笞掠無算五毒備加神意自若辭對無變事遂釋委腹心之任魏志審配少忠烈慷慨有不可犯之節表紹領冀州委配腹心之任以為治中别駕月旦各言其失太祖令曰頻年以來不聞嘉謀豈吾開延不勤之故耶自今諸掾屬治中别駕常以月旦各言其失荆州從事世說習鑿齒史才不常桓溫深器之年來三十用為荆州治中别駕謝箋日不遇明公荆州從事爾無車公不樂車𦙍為桓溫治中有會溫輒云無車公不樂當朝正色晉書唐彬檄為治中别駕忠肅公亮匡救違闕盡規誨以納言不顯諫以彰主當朝正色焉以手巾拭其面江表傳孫權尅荆州將吏悉皆歸附而濬獨稱疾不即見權遣人以牀就家輿致之濬伏面著牀涕泣交橫權至勞與語使親近以手巾拭其面濬起下地拜謝即為治中占術馳名後漢任文公為治中從事時天大旱白刺史曰五月一日當有大水宜令民預為備刺史不聼文公獨儲大船百姓或閒頗有為防者到其日旱烈文公急命促載使白刺史刺史笑之日中天北雲起須臾大雨至晡時滿水涌起十餘丈漂壞廬舍所害數千人文公遂以占術馳名洛陽主人周書趙肅字慶維洛陽人也早有操行知名于時獨孤信東討肅率宗人為援授司州治中糧頓不遺太祖曰趙肅可謂洛陽主人也主簿漢制州有主簿一人録閣下衆事省文書韋昭辨釋名主簿主諸簿書簿普也普關諸事彈箏歌秋風俗說謝景仁為豫州主簿在桓𤣥閣下𤣥聞其善彈箏使呼之既至取箏與彈因歌秋風意味殊適以此大竒之徒三十年看儒書不如一詣習主簿晉書習鑿齒為桓溫荆州主簿親遇深密時時曰徒三十年看儒書不如一詣習主簿家粟作粥餌飢人後魏韋朏少有志學業年十八辟州主簿屬嵗歉以家粟作粥以餌飢人所活甚衆諸從事後漢百官志司𨽻校尉從事史十二人本注曰都官從事主察舉百官犯法者蔡質漢儀曰都官主百官朝㑹與三府掾同慱物記曰中興以來都官從事多出之河內掊擊貴戚功曹從事主州選署及衆事别駕從事校尉行置兵曹從事主兵事其餘諸郡國從事每郡國各一人主督促文書察舉非法皆州自辟除故通為百石云晉職官志隋百官志皆見州牧門通典祭酒從事史漢魏以來置宋世分掌諸曹兵賊倉戶水鎧之事自江左揚州無祭酒而以主簿治事坐法失官前漢邴吉為廷尉右監坐法失官歸為州從事揚子雲誠知人揚雄少時從遊學侣而仕京師顯名為朝廷在位賢者稱嚴君平德杜陵李強素善雄久之為益州牧喜謂雄曰吾真得嚴君平矣雄曰君備禮以待之彼人可見而不可得詘也強心以為不然及至蜀與相見卒不敢言以為從事乃歎曰揚子雲誠知人職事修理續漢書楊球為幽州從事部分邊塞職事修理白馬陳從事謝承後漢書李憲于廬江自稱天子揚州討之不能得廬江人陳衆為從事白刺史歐陽歙請降之於是素車白馬往說皆降民大悅共生為立祠號曰白馬從事一州震懼華嶠後漢書衛羽為州從事時中常侍單超兄子匡為濟陰太守負其勢大為貪放刺史第五種欲收舉之聞羽素抗厲乃召羽謂曰聞公不畏強禦今欲相委以重事若何對曰願庶幾於一割羽出遂至定陶閉城門取匡賓客親史四十餘人七日中糾發其贓五六千萬種即奏舉一州震栗貴戚斂手避二鮑鮑永為司𨽻校尉帝叔父趙王良尊貴戚重永以事劾良大不敬由是朝廷肅然戒慎乃辟扶風鮑恢為從事恢亦抗直帝曰貴戚斂手以避二鮑不發私書樊凖為州從事臨幾介正不發私書聞有令問鍾離意别傳揚州刺史夏君三辟意為九江從事三府側席夏君謂意曰刺史得京師書聞從事有令問刺史何惜王之爵不貢乎乃表為尚書禽盜在明法不在數赦潛夫論孝明帝時荆州舉茂才過闕謝恩賜食既訖問何異聞對曰部有劇賊九人刺史數以督郡終不能得帝曰汝非部從事耶對曰是也帝乃震怒曰賊發部中而不能擒何以為茂才乃捶數百而切讓郡十日之間賊即伏誅由是觀之禽盜在明法不在數赦武力過人魏張遼字文逺漢末并州刺史丁原以遼武力過人召為從事禇裒指孟嘉晉書孟嘉傳庾亮辟嘉為勸學從事褚裒時為豫章太守嘉正旦入會嘉坐次甚逺褚裒問孟嘉何在亮曰在坐卿但自覔之裒歷觀之指嘉曰將母是乎亮欣然搜揚翹楚匪蘭弗刈羅含别傳庾刺史以親賢為重作鎮方嶽搜揚翹楚匪蘭弗刈辟為荆州從事州史有令僕才世說顧和為楊州從事月旦當朝未入停車門外缺𢎞正可集教曰丹陽從事陳恥器局轉主簿吳興從事謝鸞才幹正直可轉西曺癡不語髙孝甫陳留耆舊傳髙慎字孝甫敦質少華口不能劇語默而好沉深之謀其徒號曰卧虎故人謂之曰癡不語髙孝甫卧虎上不屈其志不纍其身益部耆舊傳李𢎞字士元為州從事揚雄稱之曰不屈其志不纍其身不夷不惠可否之間見其貌肅如也觀其行穆如也聞其言戚如也中正史記陳勝為楚王以朱房為中正而不言職事通典魏司空陳羣以天臺選用不盡人才擇州之才優有昭鑒者除為中正自拔人才銓定九品州郡皆置吳有大公平亦其比也干寶曰晉宣帝除九品置大中正議曰案九品之狀諸郡中正既未能斷究人才以為可除九品制置州大中正晉令大小中正為內官者聽月三會議上東門外設幔陳席晉起居注僕射諸葛恢啓稱州都大中正為吏部尚書及郎司徒左長史掾屬皆為中正臣今領吏部請解大中正以為都中正職局司理不宜兼也襄陽耆舊傳晉朝以江表始通人物悉使江南别立大中正曹儀集九品議曰使具論欲除九品而置州正欲檢虛實一州濶逺略不相識訪不得知㑹復轉訪本郡先達者爾此間州中正而實决於郡人孫楚集奏曰九品漢氏本無品班固著漢書序往代賢智以為九條此蓋記鬼録次第而陳羣依之以品生人又魏武拔竒决于胸臆收才不問階次豈賴九品而後缺為本官才有三難而治亂之所由人物難知一也愛憎難防二也情僞難明三也今立中正定九品操人主之威福奪天朝之權柄上品無勢族今職名中正實為姦府名九品而有八損宜罷中正除九品而棄魏弊法更立一代之義制又表刺史初臨州大中正史若吏部選內猶不中正問人事所在祖父位狀後魏孝文云中正之任必須才業兼資者及武帝時崔浩為冀州中正缺北齊郡縣皆有其本州中正以京官為之甚得州里之稱吳志習溫為荆州大公平大公即州都也後潘祕為尚書僕射習溫為大公平甚得州里之稱不宜勞以碎務晉書劉毅年七十以耆老後舉為青州大中正尚書以毅懸車致仕不宜勞以碎務孫户表曰司徒魏舒司𨽻校尉嚴詢與毅年齒相近詢管四十萬户州兼量司百寮總攝機委舒所統殷廣兼執九品銓十六州議論主者不以為劇昔鄭武公年過八十為周司徒毅志氣聰明一州品第不足勞其思慮毅遂為州銓正人流清濁區别其所彈貶自親貴始執九品銓十六州品第不勞思慮並上蓬蒿不足成林陳頵傳解結問别駕治中曰河北白壤膏梁何故少人每以三品為中正皆云不審陳頵對曰詩稱維嶽降神生甫及申夫英偉大賢多出山澤河北土平氣均蓬蒿栽髙三尺不足成林故也養進寒俊王隱晉書楊暉與陶侃其載詣榮州大中正溫雅責暉與小人同載暉曰江州多少風俗卿已不能飬進寒俊不可毁頃之楊暉代雅為中正陶侃為鄱陽小中正殿下何得見逼蕭子顯齊書張緒轉太子中庶子本州大中正長沙王晃屬選用吳與聞人雍為州議曹緒以資籍不審執不許晃遣書佐固請之緒正色謂晃使曰此是君家州殿下何得見逼品藻人物以正一州清論茍朂集袁讓豫州大中正奏曰被敕以臣為豫州大中正官與州閭鄉黨初不相接臣本州十郡多於他州人數倍多品藻人物以正一州清論此乃臧否之本威俗所重州閭與郡縣希疏如馬齒應璩新書曰百郡立中正九州置都士州閭與郡縣希疏如馬齒生不相識面何緣别義理開尚書八條事梁書沈約遷侍中光祿大夫領太子詹事揚州大中正開尚書八條事各舉其子後魏書房堅遷齊州大中正髙祖臨朝令諸州中正各舉所知千秋與幽州中正楊危各舉其子職官分紀卷四十
