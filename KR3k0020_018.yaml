廟則春夏用雞鳥之彛秋林冬用黃斝之彛內中外官用概尊嶽鎮海瀆用山尊山川澤用蜃尊衆星及丘陵用散尊凡祭祀之位簠簋為前登鈃次之籩豆為後簋鈃籩豆之位在廟堂上俱陳側階之北每坐四簋次之以六鈃次之以六登籩豆為後每坐異之皆以南為上屈陳而下凡大祭祀及朝㑹在位者拜跪之節皆贊導之贊者承傳焉又設牲版之位以成省牲之儀凡春秋二仲公卿巡行諸陵則主其威儀鼓吹之節而相其禮焉國朝元祐官品令奉禮郎從八品協律郎六典協律郎二人正八品上漢武帝時李延年為協律都尉後漢亦有之至魏武帝杜䕫亦為之晉改協律校尉宋齊亦有其官梁太常屬官有協律校尉後魏有協律郎太和初協律中郎從四品下協律郎從五品上至二十年協律郎正八品下北齊太常屬官協律郎二人隋太常寺有二人皇朝因之掌和六律六吕以辨四時之氣八風五音之節陽為六律所以統氣類物仲冬為黃鍾孟春為大蔟季春為姑洗仲夏為㽔賓孟秋為夷則季秋為無射隂為六吕所以旅陽宣氣季冬為大吕仲春為夾鍾孟夏為仲吕季夏為林鍾仲秋為南吕孟冬為應鍾凡律管之數起於九以九相成八十一以為宫三分去一五十四以為徴三分益一七十二以為商三分去一四十八以為羽三分益一六十四以為角黃鍾為宫太蔟為商姑洗為角林鍾為徴南吕為羽旋相為宫以生其聲焉凡大樂鼓吹教樂則監試之為之課限凡教樂淫聲過聲凶聲慢聲皆禁之淫聲若鄭衛者過聲失哀樂之節凶聲亡國之音若桑間濮上者慢聲不恭者使陽而不散隂而不敢集剛氣不怒柔氣不懾暢於中發於外以應天地之和若祭祀饗燕奏樂于庭則升堂執麾以為之節制舉麾鼓柷而樂作偃麾戛敔而後止國朝元祐官品令協律郎從八品善新聲前漢武帝時李延年善新聲以為協律都尉識舊樂魏武帝平荆州得杜䕫知音識舊樂以為協律郎郊社令唐職官志見太常門六典兩京郊社署令各一人從七品下周人建國左宗廟右社稷祭天於南郊之圜丘就陽位也祭地於北郊之方壇就隂位也故有典祀中士二人下士四人以時而祭則徴役於司𨽻帥其屬而修除之秦漢奉常省太祝令丞景帝改為祠祀武帝更曰廟祀後漢祠祀屬少府魏晉有太祝令丞宋有明堂令丞掌祭祀五郊之事齊有太祝及明堂令梁太常卿統明堂太祝等令丞北齊太廟令丞兼領郊祠崇虛二屬丞郊祀掌五郊羣神崇虛掌五嶽四瀆神祀後周有司郊上士一人中士一人下士一人隋太常統郊祀署令又置門僕齊郎皇朝因之掌五郊社稷明堂之位祠祀祈禱之禮丞為之二凡大祭祀則設神坐於壇上而别其位上帝之神席以藁秸衆神席以莞升中于太山則藉以三脊之茅與奉禮設樽罍篚冪之具太官令實之凡有事於百神則立燎壇而先積柴焉大祀燎壇方一丈其髙丈有二尺中祀方八尺其髙一丈下祀方五尺髙如其方凡有合朔之變别置五兵於太社矛居東㦸居南鉞在西矟在北巡察四門立矟於壇四隅以朱絲縈之以候變過時罷之國朝嘉祐元年置命將作監主簿石祖元為之熙寧元年郊社局令張伯世言局有郊社名而不立四郊之事按唐六典兩京郊社局令各一人掌五郊社稷明堂之位然則郊社令通掌五郊之事實有典據乞自今兼令勾當四郊壇壝之事使得巡視提舉所貴官正其名郊兆完潔從之元祐官品令郊社令正九品太樂令漢百官表太常屬官有太樂令丞續漢書太樂令秩六百石掌伎樂凡國祭祀掌請奏樂及大饗用樂掌其陳序六典太樂署令二人從七品下周禮大司樂中大夫二人樂師下大夫四人掌成均之法以樂舞教國子雲門大卷大咸大韶大夏大濩大武之舞樂師掌國學之政教國子帗舞羽舞皇舞旄舞干舞人舞之節又有太師下大夫二人掌六律六同以合隂陽之聲至秦漢奉常屬官有太樂令丞又少府屬官有樂府令丞後漢太常樂令一人六百石魏復為太樂令丞至晉元帝并太樂於鼓吹宋太常有太樂令丞齊因之品第七四百石銅印墨綬進賢一梁冠絳朝服梁太常屬官有太樂令班第一品從九又别領清商丞太樂有庫丞與清商丞並三品勳位陳因之後魏太和十五年置太樂官有太樂博士六品下北齊太常寺有太樂令丞後周有司樂上士中士隋太常寺統太常令丞二人皇朝因之開元二十三年各減一人掌教樂人調合鍾律以供邦國之祭祀饗燕丞為之二唐武德後置內教坊于禁中如意元年改曰雲韶府以中官為使開元二年又置內教坊于蓬萊宫側有音聲博士第一曹博士第二曹博士京都置左右教坊掌俳優雜伎自是不𨽻太常以中官為教坊使開成三年改法曲所處院曰仙韶院應圖䜟續漢書明帝永平十三年曹褒奏尚書璇璣鈐日有暈漢德令作樂名大豫下詔改太樂令丞以應圖䜟正雅樂魏黃初中以杜䕫為太樂令使正雅樂時散騎侍郎鄧靜善詠雅樂歌樂師尹相能習宗祀之典舞師馮肅曉知前代諸舞䕫與創定遷協律都尉教官伎樂晉起居注成帝咸和中詔太樂令戴綬教官伎賜米百石布三十匹針楊雄太樂令針曰陶唐五帝設為六樂鼓吹令隋職官志見太常門六典鼓吹署令一人從七品下周禮鼓人中士六人掌六鼓四金之音所謂靈鼓雷鼓路鼓鼗鼓晉鼓金錞和鼓金鐲節鼓金鐃止鼓金鐸通鼓後漢少府屬官有黃門令典黃門鼓吹一百三十五人百戲師二十七人晉遂置鼓吹令丞屬太常元帝省太樂并于鼓吹哀帝省鼓吹而存太樂宋齊並無梁太常卿統鼓吹令丞及清商署陳因之後齊闕北齊太常領鼓吹令丞掌百戲鼓吹樂人等事又兼領黃戶局掌供樂人衣服等隋太常寺統鼓吹令丞皇朝因省清商并于鼓吹開元二十三年減置一人掌見太常門國朝慶厯四年自鼓吹局移就武成王廟摩訶兜勒曲有角橫吹者始張騫使西域得摩訶兜勒曲其復李延年因之增為二十八解若隴頭水赤之楊黃覃子望行人出關入關出塞入塞之曲是也其短簫鐃歌音雜出漢代多戰陳之聲若思悲翁艾如張上之回戰城南樹上郎𤣥雲朱鷺之曲是也二十八解上太醫令漢書百官表少府屬官有太醫令丞續漢書志太醫令一人六百石有藥丞主藥方丞主藥方應劭漢官儀太醫周官也兩梁冠秩十石唐職官志隋百官志並見太常門六典太醫令二人從七品下周禮有醫師上士下士秦漢少府屬有太醫令丞無員多至十數人後漢藥有藥丞一人魏因之晉氏宗正屬官有太醫令丞銅印墨綬進賢一梁冠絳朝服品第七過江省宗正而太醫以給門下省宋齊太醫令丞𨽻侍中梁𨽻門下省令班第十一丞為三品勳位陳因之後魏有太醫博士助教北齊太常寺統太醫令丞後周有太醫下大夫小醫上士隋太常寺統太醫令丞有主藥醫師藥園師呪禁博士煬帝又置醫監五人醫正十人皇朝因之丞二人從八品下秦漢以來皆有丞一人隋又置二人皇朝因而不改醫監四人從八品下醫正八人從九品下醫師二十人醫工一百人醫生四十人典藥二人太醫令掌諸醫療之法丞為之二其屬有四曰醫師針師按摩師呪禁師皆有博士餘同太常門唐職官志有欒布之節魏略脂習字元升除太醫令與孔融親善融被誅習獨往哭之黃初中以習有欒布之節拜中散大夫飲酒輒掣引衣裳典論中常侍張讓子奉為太醫令與人飲酒輒掣引衣裳發露形體亂其舄履使小大跨倚無不傾倒針崔實太醫令針曰動不肆勤靜不宴逸有疾歸天醫無能恤太上防疾其次萌芽腠理不蠲骨髓奈何太醫丞沿革見令提舉管勾國朝熙寧四年置太醫丞請給佩魚視殿中省尚藥奉御叙班其下以處醫官之産科小方脉者不使為尚藥奉御五年以武成王廟建武學徙置他處遂相城西扁鵲廟置局先是慶厯四年自鼓吹局移就武成王廟八年以提舉太醫局所為額九年以秀州華亭縣主簿陳應之管勾太醫局五月詔中書禮局修太醫局式候修定即移市易務賣藥所往彼看詳太醫局今更不𨽻太常寺别置提舉一員判局二員其判局選差知醫事者充是月以知制誥熊本提舉太醫局改差提舉太醫局單驤充管勾仍令修葺舊司農寺充醫學公事有司相度寺屋修治浩大乞將舊朝集院修蓋從之八月改差前秀州華亭縣主簿管勾太醫局陳應之知太醫丞公事仍令後以朝官充判京官充管勾選人知丞事通不得過三員或俱是丞即以官髙者發遣元祐官品令太醫丞從七品禮院唐有知禮儀院禮儀使之目自建中後惟郊祀權置禮儀使事畢即停國朝初止以禮院掌其事雍熙封禪别命學士常參官七人同詳定儀注事畢即廢大中祥符元年東封又命學士待制五人與禮院李維孔與姜嶼詳定禮儀事畢遂不廢局六年詔以起居院詳定所為禮儀院命兵部侍郎趙安仁翰林學士陳彭年同知院初置詳定所即命彭年領其事以彭年修起居注故命就起居院為官局七年以參知政事丁謂判禮儀院而陳彭年知院如故自是多以參知政事一員判院以學士丞郎諸司三品以上一員知院揭榜刻印移文它局悉以銀臺書司為準若中書樞密院判官則移文諸司自宣徽院御史臺以下皆用劄子其後别置院於右掖門外凡行禮所用儀仗法物未合典禮悉裁定制度內外書奏中書禮房所主者悉付之三司京百司胥吏以充主吏又令禮院直官分畨祗應諸司職務相涉者咸得統之逐司各遣一人職掌一人每月輪畨赴院祗應急速公事皆填印紙劄子即付行遣時朝廷奉祠尤謹凡作一事必纎微委屈多所規創天聖元年罷禮儀院改知院為判太常寺改同判太常院為同知院雖𨽻太常寺然實專達康定初罷知院以判太常寺總之兼禮儀事近有至六七人者熙寧三年詔以太常禮院為審官西院其禮院歸太常寺置局四年以舊審刑院為太常禮院禮閣新儀國朝天聖五年禮院言自開國以來禮儀沿革刪去重復外都一千八百三十道辨其五禮之目各從類分更以年月為次編成六千卷名禮閣新儀上進詔付本院仁宗配饗明堂議治平元年詔以仁宗配饗明堂初禮院奏乞與兩制同議大行皇帝當配何制祭翰林學士王圭等奏唐代宗即位用禮儀使杜鴻漸等議季秋大饗明堂以考肅宗配昊天上帝德宗即位以考代宗配王涇郊祀録涇云即孝經周公嚴父之道本朝祀儀季秋大饗明堂配昊天上帝以真宗配今請以仁宗配則循用周公敬父之道知制誥錢公輔議按三代之法郊以祭天而明堂以祭五帝郊之祭以始封之祖冇聖人之德者配焉明堂之祭以創業繼體之君有聖人之德者配焉故孝經曰周公郊祀后稷以配天宗祀文王於明堂以配上帝又曰孝莫大於嚴父嚴父莫大於配天則周公其人也以周公言之則嚴父也以成王言之則嚴祖也方是之時政則周公祭則成王亦安在乎必嚴其父哉我將之詩是也後世失禮不足考據請亦以周事言之臣竊以為聖宋崛起非有始封之祖也則創業之君遂為太祖矣太祖則周公之后稷配祭于郊者也太宗則周之文王配祭于明堂者也此二配則至大至重百世不遷之法也真宗則周之武王宗乎廟而不祧者也雖有配天之功而無配天之祭未聞成王以嚴父之故廢文王配天之祭而移於武王也仁宗則周之成王也雖有配天之業而無配天之祭亦未聞康王以嚴父之故廢文王配天之祭而移於成王也以孔子之心推周公之志則嚴父也以周公之心攝成王之祭則嚴祖也嚴祖嚴父其義一也下至於兩漢去聖未逺而明堂配祭東漢為得在西漢時則孝武始營明堂而以髙帝配之其後又以景帝配之孝武之後無聞焉在東漢時則孝明始建明堂以光武配之其後孝章孝安又以光武配之孝安之後無聞焉當始配之代適符嚴父之說及時異事遷而章安二帝亦弗之變此最為近古而合乎禮者也有唐始在孝和時則以髙宗配之在明皇時則以睿宗配之在永泰時則以肅宗配之禮官杜鴻漸王涇輩不能推明經訓務合古初反以雷同其論以惑時主延及于今牢不可破當仁宗嗣位之初倘有建是論者則配天之祭當在太宗矣當時無言者故使宗周之典禮不明於聖代而有唐之曲學流弊於後人願陛下深詔有司博謀羣賢使配天之祭不膠於嚴父而嚴父之道不專乎配天循宗周之典禮替有唐之曲學於是又命臺諌及講讀官與兩制禮院再詳定以聞觀文殿學士兼翰林侍讀學士孫抃等奏謹案孝經出於聖述其談聖治之極則謂人之行莫大於孝舉孝之大則謂於嚴父而配天仲尼美周公以居攝而能行天子之禮尊隆于父故曰周公其人不可謂之安在乎必嚴其父也又若止於太祖比后稷太宗比文王則宣祖真宗向者皆不當在配天之序推而上之則謂明堂之祭真宗不當以太宗配先帝不當以真宗配今日不常以仁宗配必配以祖也臣等按易豫之說曰先王作樂崇德薦之上帝以配祖考蓋若祖若考並可配天者也兹又符於孝經之說亦不可謂安在乎必嚴其父也祖考皆可配帝郊與明堂不可同位亦不可謂嚴祖嚴父其義一也雖周家不聞廢文配而移於武廢武配而移於成然則易之配考孝經之嚴父歷代循守固亦不為無說魏明帝宗祀文帝於明堂以配上帝史官謂是時二漢郊祀之制具存魏所損益可知則亦不可謂東漢章安之後配祭無傳遂以為未嘗嚴父也自唐至本朝其間賢哲講議不為少矣所不敢以異者捨周孔之道無所本統也今以為我將之詩祀文王於明堂而歌者也亦安知非仲尼刪詩存周之全盛之頌被於管絃者獨取之也仁宗繼體保成置天下於大安者四十二年功德於人可謂極矣今祔廟之始遂抑而不得與上帝之饗甚非所以宣彰陛下為後嚴父之大孝臣等敢以前所定議為便知諫院司馬光吕誨議竊以孝子之心誰不欲尊其父者聖人制禮以為之極不敢踰也故祖已訓髙宗曰典祀無豐于昵孔子與孟懿子論孝亦曰祭之以禮然則事親者不以數祭為孝貴於得體而已先儒謂禘郊祖宗皆祭祀以配食也禘謂祭昊天於圜丘也祭上帝於南郊曰郊祀五帝五神於明堂曰祖宗故詩曰思文后稷克配彼天又我將祀文王明堂此其證也下此皆不見於經矣前漢以髙祖配天後漢以光武配明堂以是觀之古之帝王自非建都啓土及造有區夏者皆無配天之文故雖周之成康漢之文景明章其德業非不美也然而子孫不敢推以配天者避祖宗也孝經曰嚴父莫大於配天則周公其人也孔子以周公有聖人之德成太平之業制禮作樂而文王適其父故引之以證聖人之德莫大於孝答曽子之問而已非謂凡有天下皆當其以父配天然後為孝也近世祀明堂者皆以其父配五帝乃誤孝經之義而為先王之禮不可以為法也景祜二年仁宗詔禮官稽按典籍辨崇配之祀序定二祧之位乃以太祖為帝者之祖比周后稷太宗真宗為帝者之宗比周之文武然則祀真宗於明堂以配五帝亦未失古禮今仁宗雖豐功美德洽于四海而不在二祧之位議者乃欲捨真宗而以仁宗配食明堂恐於祭位不合又以人情言之是絀祖而進父也夏父弗忌躋僖公先兄而後弟孔子猶以為逆祀書於春秋况絀祖而進父乎必若此而行之不獨乖違典祀總亦非仁宗之意也臣等竊謂宜遵舊禮以真宗配五帝於明堂為便詔從抃等所議祀地祇備樂不作嘉祐八年五月禮院奏請祀地祇祗備樂而不作從之奏以太祖太宗為一世太常禮院奏神主祔廟當以太祖太宗為一世增一室詔兩府及待制以上與禮官考議觀文殿學士孫抃等議按禮曰三昭三穆與太祖之廟而七書曰七世之廟可以觀德曰世與昭穆云者據父子之正而言之也若兄弟則昭穆同不得以世數數之矣商之祖丁之子曰陽甲曰盤庚曰小辛曰小乙四人者皆有天下有始祖有太祖有太宗有中宗若以一君為一世則小乙之祭不及其父祖丁是太宗之兄弟相及昭穆同而不以世數數之明矣故晉之廟十一室而六世唐之廟十一室而九世中宗睿宗之於髙宗恭宗文宗武宗之於穆宗同居穆位國朝太祖為受命之祖太宗為有功德之宗此萬世不遷者也故太祖之室太宗稱孝弟真宗稱孝子大行皇帝稱孝孫而禘於廟之時太祖太宗同居昭位南向真宗居穆位北向蓋先帝稽用古禮而著之於祀典矣大行皇帝神主祔廟臣伏請增一室為八室以備天子事七世之禮詔從之於是龍圖閣直學士盧士宗天章閣待制司馬光等議謹按禮天子七廟三昭三穆與太祖之廟而七太祖之廟萬世不毁其餘昭穆親盡則毁示有終也自漢以來天子或起於布衣以受命之初太祖尚在三昭三穆之次故或祀四世或祀六世其太祖以上之主雖屬尊於太祖親盡則遷故漢元帝之世太上廟主藏於寢園魏明帝之世處士廟主遷於園邑晉武帝祔廟遷征西府君惠帝祔廟又遷豫州府君自是以下大扺過六世則遷其神主蓋以太祖未正東嚮之位故止三昭三穆若太祖己正東嚮之位則并三昭三穆為七世矣唐髙祖初立祀四世太宗增祀六世及太宗祔廟則遷淇農府君神主於夾室髙宗祔廟又遷宣皇帝神主於夾室皆祀六世此前世之成法也唯明皇立九室祀八世事不經見難可依據今若以太祖太宗為一世則大行皇帝祔廟之日禧祖親盡當遷於西夾室祀三昭三穆於先王典禮及近世之制無不符合太廟更不須添展一室又詔抃等再議議曰先王之禮自王以下降殺以兩故有天下者當祀七世有一國者祀五世自漢以來諸儒傳禮者至有夏五廟商六廟之說出於不見商書伊尹之言而承用禮學之誤蓋自唐及周凡廟制不同而大扺皆七世王制所謂三昭三穆與太祖之廟而七者是也今議者疑禧祖既非太祖又在三昭三穆之外以為於禮當遷如此則是以有天下之尊而所事止於六世不稱先王制禮降殺以兩之意且議者言禧祖當遷者以為在三昭三穆之外則於三代之禮未嘗有如此而不遷者臣等以為三代之禮不同則廟制亦不得不變出太祖之上者也後世之變既與三代不同則廟制亦不得不變而從時且自周以上所謂太祖亦非始受命之王特始封之君而已今禧祖雖非始封之君要為立廟之始祖宗廟數未過七世之時遂毁其廟遷其主考三代之禮亦未有如此者也漢魏及唐一時之議恐未合先王制禮之意臣等竊以為存禧祖之室以備七世之數合於經傳事七世之明文而亦不失先王之禮詔又從之地祇差官詣壇知諫院司馬光奏昨以大行皇帝諡號奏告天地宗廟社稷皇地祇止於園丘望告臣聞王者父天母地其尊一也今社稷之祀位為上公猶特遣官奏告而皇地祇寓於南郊下同綴食失尊卑之序乖重輕之儀欲乞自今凡祭告皇地祇並遣兩府官一員詣北郊行事詔禮院詳定禮院奏自今非次告即乞差官專詣壇行事從之太宗配雩祭治平元年十月殿中侍御史趙鼎請遞遷以真宗配孟夏雩祭以太宗專配上辛祈穀孟冬祀神州地祇循用者唐故事翰林學士王圭等議以為天地大祭有七皆用歷代故事以始封受命創業之君配神作主至於明堂之祭用古嚴父之道配以皇考故朝廷在真宗時以太宗配在仁宗時則以真宗配今則以仁宗配仁宗始以真宗配明堂罷太宗明堂之配而太宗先以配雩祈榖及神州之祭本非遞遷今明堂既用嚴父之道則仁宗配天之祭於禮當罷不當復從雩祭之配詔從圭等議留祭酒不以實尊尚書祠部郎中祕閣校理知太常禮院晏承裕奪兩官勒停坐監祀太廟留祭酒不以實尊及闌入真宗廟室為宫門令所發㑹降當原從御史趙鼎請重竄責以懲貪惡故有是命減定衮冕制度二年詔減定衮冕制度初袐閣校理知太常禮院李育奏本朝天子冕十二旒及二纊皆貫以真珠又有翠旒十二銜以翠鳯在珠旒外冕版以龍鱗表上綴玉為七星旁施琥珀餅犀餅各二十四周綴金絲網鈿以珠玉雜寶加紫雲白鶴錦裹四柱七寶飾之衮服亦飾以金珠琥珀雜寶竊以衮冕之飾皆存法象明水太羮不可以衆味和雲門咸池不可以新聲間則衮冕亦不宜以珍怪纍也仁宗景祐三年詔禮官詳據典故務從前詔其不經之飾重者多去而輕者尚存不能盡如詔意至至和三年王洙復議典禮畫圖以獻漸合古禮今有所造復如景祐以前未改之制臣以為宜悉改正於是禮院奏詳定冕服乃以羅為之冕廣尺玉二寸長二尺二寸前圖後方黝上朱下金飾版側以白為旒貫以五彩前後十二旒旒十二玉玉相去一寸朱組纓紸纊金飾玉簮導𤣥衣纁裳以日月星辰山龍華蟲火宗彛八章繪衣以藻粉米黼黻四章繡裳以升龍錦為標領詔用景祐二年所減制度又減裙繡花繪龍鱗紫雲白鶴及金龍四衣裳皆繪而不繡太常因革禮九月提舉編纂禮書參知政事歐陽修奏前陳州項城縣令姚闢等己編次成書百卷詔以太常因革禮為名初歐陽修同判太常寺奏禮院文字多散失請差官編修時朝廷重置局上以命禮官散祠祭齊宿又兼校館閣書籍或别領他局嘉祐六年祕閣校理張洞奏請用擇幕職州縣官文字該贍者三兩人置局命判寺一員總領於是姚闢蘇洵編纂令判寺官督趨之而知制誥張瓌又奏伏見差官編修開國以來禮書竊思事出一時不合經制著之方冊無以示後欲乞慎擇有學術方正大臣與禮官精議是非整正紬繹然後成書則垂之永久無損成憲時修為參知政事命修提舉至是書成宗正前漢百官表宗正秦官掌親屬有丞平帝元始四年更名宗伯屬官有都司空令丞內官長丞又諸公主家令皆屬焉王莽并其官于秩宗後漢百官志宗正卿一人丞一人晉職官志宗正統皇族宗人圖諜又統太醫令史又有司牧掾員及渡江哀帝省并太常太醫以給門下省隋百官志後齊九寺置卿少卿丞各一人各有功曹五官主簿録事等員隋九寺並置卿少卿一人各置丞主簿録事等員唐職官志宗正寺星經有宗正星在帝座之東南秦置宗正掌宗屬梁置十二卿宗正為一署加寺字光宅改為司屬神龍復卿一員少卿二員丞二人主簿一人録事一人府五人史九人亭長四人掌固四人六典宗正寺光武復置漢百官志宗正掌序録王國嫡庶之次宗室親屬逺近漢宗正之官不以他族楚元王子郢客劉辟疆劉德等為之魏亦如之晉桓溫奏省屬太常宋齊不置梁天監七年乃置唐龍朔二年改宗正寺曰司宗正寺光宅元年改為司屬神龍初復曰宗正國朝初在闕前廊下咸平二年以地窄徙延和坊建皇屬籍按大中祥符八年火乃徙于福善坊建玉牒殿屬籍堂舊有崇𤣥署今廢嘉祐六年詔以太廟南舊府司為知宗正寺廨八年以雜修宗正寺為太常寺先是以英宗知寺事故特置廨而帝固辭乃復以為太常寺掌修纂玉牒宗室屬籍及圖録之事卿後漢百官志宗正卿一人中二千石本注曰掌序録王國嫡庶之次及諸宗室親屬逺近郡國嵗計上宗室名籍若有犯法當髠以上先上諸宗正宗正以聞乃報決後魏職令宗正卿第四品上第三清選用忠懿清和識參教典者先用皇宗無則用庶姓隋百官志梁宗正卿位視列曹尚書主皇室外戚之屬以宗室為之後齊九寺置卿少卿丞一人各有功曹五官主簿録事等員隋九寺並置卿少卿一人唐百官志宗正卿一人從三品少卿二人從四品卿之職掌九族六親之屬籍以别昭穆之叙并領崇𤣥署少卿為之二六典宗正寺卿一人從三品梁宗正春卿位視列曹尚書班第十三陳因之後魏亦曰宗正卿第二品上北齊第三品隋開皇初正三品煬帝改為從三品皇朝因之少卿二人從四品上後魏太和中初置少卿第三品二十三年為第四品隋初上四品煬帝降為從四品皇朝因之掌同唐百官志國朝大中祥符九年以度支員外郎權知宗正寺事趙世長知河陽太子右贊善大夫趙廓權宗政丞事時本寺言陵廟行祀闕官准令文宗正卿一員少卿丞各二員主簿一員時止趙安仁兼卿世長知寺事上因謂宰臣曰安仁嘗參宰府與世長列銜非便王旦曰請自今京官兼主簿郎中以下兼丞給舍以下兼少卿丞郎以下兼卿以為永制世長知寺數年忽令兼丞亦似無謂王嗣宗嘗以世長父用成坐贓弃世不當使之司宗正望授外郡别擇官以備宗職上從之開寶六年以右于牛衛將軍趙崇濟為宗正少卿凡寺皆宗室為之時文班闕宗姓故命崇濟元祐官品令宗正卿四品少卿從五品封侯漢楚元王子郢客為宗正封上邳侯忠直劉向字子政蕭望之周堪薦向曰宗室忠直經明有行拜宗正世掌後漢劉珍梁孝王之孫為宗正卒官遂世掌焉伯臣司宗揚雄針巍巍帝堯欽親九族經哲宗伯禮有攸訓屬有攸籍各有育子世以不錯又云伯臣司宗敢告執玉宗室廣大日以滋漢武帝柏梁詩宗正曰宗室廣大日以滋以仁孝著聞東觀漢記劉平字子公以仁孝著聞拜宗正數薦達名士在官甚冇聲竭忠盡節劉般字伯興在朝竭忠盡節拜宗正精神衰耗唐竇誕拜宗正卿唐太宗常與之言昏忘不能對乃手詔曰朕聞為官擇人者治為人擇官者亂竇誕比來精神衰耗殊異常時知不肖而任之覩尸祿而不退非惟傷風亂政亦恐為君不明考績黜陟古今常典誕可光祿大夫還第尋卒上新修皇家屬籍咸平四年宗正卿趙安仁駕部郎中知制誥梁周翰上新修皇家屬籍三十三卷送宗正寺器貌瓌雅真吾所欲後魏杜銓世祖太后父豹喪在濮陽世祖欲命近葬於鄴謂司徒崔浩曰天下諸杜何處望髙浩對京兆為美世祖曰朕方今改葬外祖意欲取京兆杜長老一人以為宗正命營護凶事浩曰中書博士杜銓其家今在趙郡是杜預之後於今為諸杜最即命召之及見日器貌瓌雅世祖感悅謂浩曰此真吾所欲也以為宗正二星星經有宗正二星在帝座東南丞前漢公卿表宗正秦官掌親屬有丞後漢百官志宗正丞一人比千石隋百官志後齊九寺置丞各一人隋九寺各置丞唐百官志宗正丞一人從六品上掌判寺事六典宗正丞一人從六品上漢宗正丞秩千石魏晉亦如之東晉省宋齊因之梁宗正丞為四班陳六百石第八品後魏第七品北齊因之隋初丞二人並七品下煬帝大業五年增為從五品皇朝置二人國朝見卿門元祐官品令宗正丞從七品千里駒漢劉德數言時事詔見甘泉宫武帝謂千里駒昭帝初為宗正丞後為宗正卿主簿隋百官志後齊隋九寺各有主簿等員唐百官志宗正寺丞主簿一人從七品上掌印及勾校稽失六典主簿二人從七品上梁天監七年置為七班陳因之北齊同隋置二人皇朝置一人開元二十五年加一人自卿以下並於宗室中擇才行者補授國朝元祐官品令宗正寺丞簿從八品修玉牒官唐本宗正之職開成後始别置修玉牒官國朝大中祥符六年詔修玉牒以皇玉牒為名八年詔建玉牒殿屬籍堂于新寺命宗正卿趙安仁重修玉牒屬籍安仁又上仙源積慶圖詔嵗寫一本藏龍圖閣九年以右司諌知制誥劉筠户部員外郎知制誥夏竦為宗正寺修玉牒官自後置一員或二員掌帝籍玉牒及皇親屬籍昭穆之序凡玉牒書以銷金花白羅紙金軸銷金紅羅標帶禔黑漆金飾匣紅錦裹金鎖鑰屬籍諸王書以銷金白綾紙銀軸紅錦標帶紅羅禔黑漆塗金銀飾匣錦裹銀鎖鑰公侯以下白綾紙牙軸餘如諸王至和元年詔故事屬籍十年一修今雖及八年而宗支蕃衍其增修之熙寧元年玉牒所上仁宗皇帝玉牒四卷英宗皇帝玉牒四卷三年於三班院置局後徙編修院太廟令漢百官表太常屬官有諸廟令長丞續漢書髙廟令一人六百石主守宗廟按行掃除無丞世祖廟令一人宋書太廟令一人主守宗廟按行灑掃之事領齊郎二十四人齊職儀周有守祧之官掌先王之廟國朝别置太廟後廟宫閨令各一人以入內侍充後改以入內侍充𨽻以本寺周禮冢人下大夫二人中士四人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右漢書百官表太常屬官有諸陵令元光元年分諸陵邑屬三輔續漢書太常掌先帝陵每園各令一人秩六百石掌守園陵按行掃除丞及校長各一人校長主戒盜賊齊職儀周有墓大夫冢人之職掌先王之墓又曰每陵令一人品第七秩四百石銅印墨綬進賢一梁冠絳朝服唐官品志梁天監七年陵監之名不出前誥且宗廟憲章既備典禮園寢職司理不容異諸正陵先立監者改為令六典顯陵昭陵乾陵定陵橋陵恭陵署令各一人從五品晉太常統陵令丞主簿録事戶曹史禁備吏各一人侍一人凡吏四人卒一人宋太常統陵令齊舊用三品勳位孝建二年改為二品梁太常統陵監後改為令班第二品正第九陳承梁制置秩六百石北齊太常亦統諸陵令丞後周守陵每陵上士一人隋諸陵每陵令各一人皇朝因之開元二十五年諸陵廟𨽻宗正天寶十二年𨽻于太常後又改顯昭乾定橋五陵署為臺升令為從五品上至德二年復𨽻宗正永太元年𨽻太常大厯元年復五代史後唐應順元年詔特置陵臺令丞各一人國朝乾德二年以河南府鞏縣令孔美兼安陵臺令太平興國二年永昌陵復置令兼安陵事至道三年新修永熙陵特置令一員專切管勾景德四年正月詔永安鎮建為縣𨽻河南府同赤縣其知縣兼陵臺令元祐官品令陵臺令從六品陵臣司墓胡廣陵令針昔在皇初葬野衣薪禮非極哀不樹不封瓦棺堲周虞夏攸增壤不毁庸奢不害生是謂皇極百王此經故厚不可始皇薄不可