body:
  text: 職官分紀卷十八宋孫逢吉撰總叙卿前漢百官表周官則備矣天官冢宰地官司徒春官宗伯夏官司馬秋官司冦冬官司空是為六卿各有徒屬職分用於百事太師太傅太保是為三公蓋參天子坐而議政無不總統故不以一職為官名又立三少為之副少師少傅少保是為三卿與六卿為九焉漢官儀卿中二千石韋昭辨釋名卿慶也言萬國皆慶賴之又漢置十二卿一曰太常二曰太僕三曰衛尉四曰光祿勳五曰宗正六曰執金吾七曰司農八曰少府九曰鴻臚十曰廷尉十一曰大長秋十二曰將作大匠辨云漢正卿九一曰太常二曰光祿勳三曰衛尉四曰太僕五曰廷尉六曰鴻臚七曰宗正八曰司農九曰少府是為九卿後漢百官志太常卿一人光祿勳卿一人衛尉卿一人漢官目録云右三卿太尉所部太僕卿一人廷尉卿一人大鴻臚卿一人右三卿司徒所部宗正卿一人大司農卿一人少府卿一人右三卿司空所部帝王世紀九卿者所以參三公也白虎通卿章也章美明理也魏武帝紀初平十八年十一月初置六卿晉職官志太常光祿勳衛尉太僕廷尉大鴻臚宗正大司農少府將作大匠太后三卿大長秋皆為列卿各置丞功曹主簿五官等員南齊百官志太常光祿勳衛尉廷尉大司農少府各置丞一人將作太匠太僕太鴻臚三卿不常置將作掌宗廟土木太僕掌郊禮執轡鴻臚掌導護贊拜有事權置兼官事畢乃省宣德衛尉少府太僕鬱林立皇后置後魏官氏志太和十五年置少卿官百官令少卿第四品上隋百官志諸卿梁初猶依宋齊皆無卿名天監七年以太常卿加置宗正卿以大司農為司農卿三卿是為春卿加置太府卿以少府為少府卿加置太僕卿三卿是為夏卿以衛尉為衛尉卿廷尉為廷尉卿將作大匠為匠卿三卿是為秋卿以光祿勳為光祿卿大鴻臚為鴻臚卿都水使者為大舟卿是為冬卿凡十二卿皆置丞及功曹主簿陳承梁皆循其制後齊太常光祿衛尉宗正太僕大理鴻臚司農太府是為九寺置卿少卿丞各一人各有功曹五官主簿録事等員後周盧辨傳隋開皇初以辨前代名行追封沈國公初周文欲行周官命蘇綽專掌其事未幾而綽卒乃令辨成之於是依周禮建六官革漢魏之法以魏恭帝三年始命行之六卿之外置太師太傅太保各一人是曰三弼隋髙祖受命太常光祿衛尉宗正太僕鴻臚司農太府等九寺並置卿少各一人太僕尋加少卿一人各置丞太常衛尉宗正大理鴻臚將作二人光祿太僕三人司農五人太府六人主簿太府四人餘各二人録事各二人光祿加至三人司農太僕各四人等員三年廢光祿入司農廢衛尉入太常尚書省廢鴻臚亦入太常十二年復置光祿衛尉鴻臚等寺煬帝時光祿以下八寺卿皆降為從三品少卿各置二人為從七品唐百官志龍朔二年九寺卿皆曰正卿少卿皆曰大夫咸亨初復除正字五代職官志後唐同光元年十一月中書門下奏諸寺監各只請置大卿監祭酒司業各一員博士兩員敢辱高位以速官謗左傳陳敬仲奔齊懿氏卜妻之齊侯使敬仲為卿辭曰羇旅之臣幸若獲宥及於寬政赦其不間於教訓而免於罪戾弛於負擔君之惠也所獲多矣敢辱髙位以速官謗敢以死告非君命不越境卿非君命出不越境三圭之位莊子楚昭王延屠羊說以三圭之位謂三卿皆執圭內外必平國語晉悼公使張老為卿辭曰臣不如魏絳之智能治其大官其仁可以利公室若在卿位內外必平知其君子說苑秦繆公使賈人載監徵諸賈人賈人買百里奚使將車之秦秦繆公觀鹽見百里奚牛肥公問對曰臣飲食之以時使之不以暴是以肥也公知其君子以為上卿卿之事常在於德九卿者不失四時通於溝渠修堤防種樹木美五穀如是者舉以為九卿故卿之事常在於德賤不能臨貴齊桓公使管仲治園對曰賤不能臨貴桓公以為上卿舉一國之髙淮南子舉一國之髙以為九卿賓以上卿禮春秋桓公曹太子來朝賓以上卿禮饗曹太子樂奏而歎施父曰曹太子其有憂乎非歎所也辭上卿之饗齊侯使管仲平戎于王王以上卿禮饗之管仲辭曰臣賤有司也受下卿之禮而還君子曰管氏之世祀也宜哉讓不忘其上復召拜為上卿新序魏文侯曰寡人何如君也翟璜曰君伐中山不封君之弟而封君之長子君非仁君也文侯怒任座至對曰君仁君也曰何以言之曰其君仁者其臣直向翟璜之言直是以知君仁君也文侯曰善復召翟璜入拜為上卿以大功為上卿趙王以相如有大功拜為上卿位在廉頗之上亡走為客卿蘇秦佯得罪於燕而奔齊宣王以為客卿復通於燕燕趙以為客卿樂毅出奔趙往來復通於燕燕趙復以為客卿再至九卿史記濮陽段容始事蓋侯信信任容亦再至九卿四至九卿汲黯姊子司馬安少與黯四為太子洗馬安深巧善宦至九卿河南太守卒又前漢儒林傳曰長安許商子長伯善為算著五行論厯四至九卿下括河海謝承後漢書李淑諫更始曰夫三公上應台宿九卿下括河海身帶三綬馬防與九卿絶席身帶三綬寵貴至盛絶席上徇虛名而忘事實唐麟德二年將有事于泰山有司議依舊禮以太常卿為初獻光祿卿為終獻司禮太常伯劉祥道曰昔在三代六卿位重故得佐祠漢魏以來權歸臺省九卿皆為常伯屬官今登封大禮不以八座行事而用九卿無乃循虛名而忘事實乎髙宗從其意竟以司徒王元禮為初獻祥道為終獻分職帥屬倡九牧尚書周官六卿公職各帥其屬以倡九牧阜成兆民九棘周禮外朝之法左九棘孤卿大夫位焉法河海春秋漢含摯三公象五嶽九卿法河海三公在天法三台九卿法北斗法北斗上再見為上卿史記虞卿躡蹻擔簦說趙孝成王再見為趙上卿太常前漢百官表奉常秦官掌宗廟禮儀有丞景帝中六年更名太常應劭日常典也掌典三禮也師古曰太常王者旌旗也畫日月焉王有大事則建以行禮官主奉持之後改曰太常屬官有太樂太祝太宰太史太卜太醫六令丞又均官都水兩長丞有雍太宰太祝令丞五畤各一尉又博士及諸陵縣皆屬焉景帝中六年更名太祝為祠祀武帝太初元年更曰廟祀初置太卜漢官儀欲令國家盛太社稷常存故稱太常後漢百官志太常卿一人丞一人太史令一人六百石本注曰掌天時星厯凡嵗終奏新年厯凡國祭祀喪娶之事掌奏良日及時節禁忌凡國有瑞應災異掌記之太史待詔三十七人其六人治厯三人龜卜三人廬宅四人日時二人易筮二人典禳九人籍氏計氏典昌氏各三人嘉法請雨解事各二人醫二人丞二人明堂及靈臺丞二人二百石本注曰丞掌守明堂靈臺靈臺掌候日月星氣皆屬太史靈臺待詔四十二人其十四人候星二人候日三人候風十二人候氣三人候晷景七人候鍾律一人舍人博士祭酒一人太祝令一人六百石太宰令一人六百石本注曰掌宰工鼎爼饌具之物凡國祭祀陳饌具明堂丞一人二百石員吏四十二人其二人百石二人斗食二十三人佐九人有秩二人學事四人守學事宰二百四十二人屬者七十三人衛士一十五人丞一人太樂令一人六百石本注曰掌伎樂凡國祭祀掌請奏樂及大饗用樂掌其陳序員吏二十五人其二人百石二人斗食七人佐十人學事四人守學事樂人八佾舞三百八十人丞一人髙廟令一人六百石本注曰掌守廟案行掃除無丞員吏四人衛士一十五人世祖廟令一人六百石本注曰如髙廟員吏六人衛士二十人先帝陵每陵園令各一人六百石本注曰掌守陵園案行掃除丞及校長各一人本注曰校長主兵戎盜賊事先帝陵每陵食官令各一人六百石本注曰掌望晦時節祭祀漢官曰每陵食監一人秩六百石監丞一人三百石中黃門八人從官二人案食監是食官令號右屬太常本注曰有祠令一人後轉屬少府有太卜令六百石後省并太史中興以來省前凡十官案十官太宰均官都水雍太祝五時各一尉也漢官解詁太常社稷郊畤事重職尊故在九卿之首衛宏曰太常主導贊助祭皆平冕七旒𤣥上纁下畫華蟲七章魏志建初二十一年八月始置奉常正官黃初元年改奉常為太常晉職官志太常博士協律校尉員又統太學諸博士祭酒及太史太廟太樂鼓吹陵等令太史又别置靈臺丞宋百官志太常一人舜攝帝位命伯夷作秩宗掌三禮即其任也周時曰宗伯是為春官掌邦禮秦改曰奉常漢因之景帝六年更名太常前漢則以列侯忠孝敬謹者居之後漢不必列侯也南齊百官志太常府置丞一人五官功曹主簿博士謂之太學博士國子祭酒一人博士二人助教十人諸陵有令丞隋百官志梁太常位視金紫光祿大夫統明堂二廟太史太祝廩犧太樂鼓吹乘黃北館典客館等令丞及陵監國學等又置協律校尉總章校尉監掌故樂正之屬以掌樂事太樂又有清商署丞太史别有靈臺丞後齊太常寺掌廟陵羣祀禮樂儀制天文術數衣冠之屬其官有博士四人掌禮制協律郎八書博士等員統諸陵太廟太樂衣冠鼓吹太祝太史太醫廩犧太宰等署令丞而太廟兼領郊祠崇虛二局丞太樂兼領清商部丞鼓吹兼領黃户局丞太史兼領靈臺太卜二局丞隋髙祖太常寺又有博士四人協律郎二人奉禮郎十六人統郊社太廟諸陵太祝衣冠太樂清商鼓吹太醫太卜廩犧等署各置令丞郊社署又有典瑞太祝署有太祝太樂署清商各有樂師員鼓吹署有吹師太醫署有主藥醫師藥園師醫博士助教按摩博士呪禁博士等員太卜署有卜師相師男覡女巫太卜博士助教相博士等員煬帝罷太祝署而留太祝員八人屬寺後又增為十人奉禮減置六人太廟署又置隂室丞守視隂室改樂師為師正十人太卜又有博士員置太卜卜正二十人以掌其事太醫又置醫監五人正十人罷衣冠清商二署唐職官志太常寺古曰秩宗秦曰奉常漢髙改為太常梁加寺字唐初有衣冠署令正八品上貞觀元年署廢龍朔元年改太常寺曰奉常寺武后光宅元年復改太常寺曰司禮寺卿一人少卿二人丞二人主簿二人録事二人府十二人史二十三人博士四人謁者十人贊引二十人太祝六人祝史六人奉禮六人贊者十六人協律郎二人亭長八人掌固十二人太廟齊郎京都各一百三十人太廟門僕京都各三十人兩京郊社署令各一人丞一人府二人史四人典事三人掌固五人門僕八人齊郎一百一十人郊社令掌五郊社稷明堂之位祠祀祈禱之禮丞為之二諸陵署令一人録事一人府二人史四人主衣四人主輦四人主樂四人典事三人掌固二人陵户乾橋昭四百人獻定恭三百人陵令掌先帝山陵率戶守衛之丞為之二凡朔望元正冬至皆修饗於諸陵諸太子陵令各一人丞一人太樂署令一人丞一人府三人史六人樂正八人典事八人掌固八人文武二舞郎一百四十人太樂令調合鐘律以供邦國之祭祀饗宴丞為之二凡天子宫懸鐘磬凡三十六虡凡大宴㑹則設十部伎凡大祭祀朝㑹用樂辨其曲度章服而分始終之次有事於太廟每室酌獻各用舞凡祀昊天上帝及五方大明夜明之樂皆六成祭皇地祇神州社稷之樂皆九成其餘祭祀三成而已鼓吹署令一人丞三人府三人史六人樂正四人典事四人掌固四人鼓吹令掌鼓吹施用調習之節以備鹵簿之儀丞為之二凡大駕行幸鹵簿則分前後二部以統之法駕則三分減一小駕則減大駕之半皇太后皇后出則如小駕之例皇太子鼓吹亦有前後二部親王以下各有差凡駕行幸有夜警晨嚴之制太醫署令二人丞二人府二人史四人主藥八人藥童二十四人醫監四人醫正八人藥園師二人藥園生八人掌固四人太醫令掌醫療之法丞為之二其屬有四曰醫師針師按摩師呪禁師皆有博士以教之其考試登用如國子之法凡醫師醫工醫正療人疾病以其全多少而書之以為考課諸藥醫博士一人助教一人醫師二十人醫工一百人醫生四十人典藥二人博士掌以醫術教授諸生醫術謂習本草甲乙脉經分而為業一曰體療二曰瘡腫三曰少小四曰耳目口齒五曰角髮針博士一人針助教一人針師十人針工二十人針生二十人博士掌教針生以經脉孔穴使識浮沉澀滑之候又以九針為補㵼之法按摩博士一人按摩師四人按摩工十六人按摩生十五人按摩博士掌教按摩生消息導引之法呪禁博士一人呪禁師二人呪禁工八人呪禁生十人呪禁博士掌教呪禁生以呪禁除邪魅之為厲者太卜署令一人丞一人卜正二人卜博士二人太卜令掌卜筮之法丞為之二其法有四一曰龜二曰五兆三曰易四曰式廩犧署令一人丞一人令掌薦犧牲及粢盛之事丞為之二凡三祀之牲牢各有名數汾祠署令一人丞一人掌神祀饗祭灑掃之制兩京齊太公廟署令各一人丞各一人掌開闔灑掃及春秋仲釋奠之禮國朝太常寺掌禮樂器服郊廟社稷陵寢犧牲籍田祠祀醫藥之事慶厯四年自鼓吹局移就武成王廟春明退朝録太常寺國初以來皆禁林之長主判而禮院自有判院同判院大中祥符中符瑞繁縟别建禮儀院輔臣主判而兩制為知院天禧末罷知院天聖中省禮儀院而寺與禮院事舊不相兼康定元年置判寺同判寺並兼禮儀事近有至六七人者按唐太常置卿一員少卿二員博士四員祥符中博士二員後至四員今若置判寺一員同判寺二員合唐之卿數矣天聖元年改同判院為同知院即博士也又太常寺舊在興國坊今三班院是也景祐初燕侍郎肅判事㕔事畫寒林屏風時稱絶筆其後為判寺好事者竊取之嘉祐八年徙寺於福善坊其地本開封府納稅所英宗在藩邸判宗正寺搆為廨舍既成而已立為皇子遂為太常所請焉獻旋宫相生圖圖朝太常寺言音律官田琮以上所新增九絃琴五絃阮鈞配十二律旋相為宫隔八相生並已協律冠於雅樂以旋宫相生之法畫為圖獻上善之奏樂舞樂章太常寺奏大行皇帝祔廟本室酌獻其舞曰大仁之舞其樂章曰大哉至仁如天之臨享國長久及物功深旁魄涵濡結為民心億萬斯年於昭德音奏配饗樂曲太常寺奏仁宗配饗樂明堂奠幣用成安之曲其詩曰思皇烈考克配天明隆商雍饗惟孝惟成配獻用德安之曲其詩曰燾在同仁聲容無外饗帝于筵有嚴昭配言今樂太髙東齊記事燕龍圖肅刋太常寺建言今之樂太髙始下詔天下求知音者李照言樂比古髙五律而胡瑗阮逸相繼出矣李照之樂以縱黍纍尺黍細而尺長律之容乃千七百三十黍胡瑗以橫黍纍尺而尺短律之容千二百黍而空徑乃三分四釐六毫空徑三分四釐六毫與容千七百三十黍皆失於以尺而生律也最後有房庶者亦言今之樂髙五律蓋用唐樂而知之自收方響一笛一皆唐樂也其法以律生尺而黍用一麩二米者是時無二米黍據見黍其律雖無千七百三十黍之謬與三分四釐六毫之差然其聲才下三律蓋黍細耳其法則是也王原叔胡瑗大不喜其說朝廷但授庶試祕書省校書郎不究其法而止庶𤣥齡之後其為人簡脫嘗與鄉薦然好音宋子京田元均薦而召之是時丁正臣亦收牙笛二與庶笛同卿尚書堯典伯夷汝作秩宗典朕三禮周禮春官大宗伯掌天地神祇人鬼之祀後漢百官志太常卿一人二千石盧植禮注曰如太常正本注曰掌禮儀祭祀凡祭祀先奏其禮儀及行事贊天子每選試博士奏其能否大射養老大喪皆奏其禮儀每月前晦察行陵廟漢官曰員吏八十五人其十二人四科十五人佐五人假佐十三人騎吏九人學事十六人守學事漢官解詁太常社稷郊畤事重職尊故在九卿之首漢官典志惠帝改太常為奉常景帝復為太常衛宏曰太常主導贊助祭皆平冕七旒𤣥上纁下畫華蟲七章魏武帝紀初平十八年初置列卿後魏職令太常為列卿晉職官志太常少卿第四品上第一清選明禮樂兼天文陰陽齊職儀太常卿一人品第三秩中二千石銀章青綬進賢兩梁冠絳朝服佩水蒼玉王朗曰西京太常行陵赤車千乘職員令太常卿位任特隆學冠儒林藝通禮樂者可以居之隋百官志梁天監七年以太常為太常卿後齊太常為寺置卿少卿各一人隋髙祖因之唐百官志龍朔二年九月卿皆曰正卿少卿曰大夫咸亨初除正字太常寺卿一人正三品掌邦國禮樂郊廟社稷之事以八署分而理之一曰郊社二曰太廟三曰諸陵四曰太樂五曰鼓吹六曰太醫七曰太卜八曰廩犧總其官屬行其政令少卿為之二凡國有大禮則贊相禮儀有司攝事則為之亞獻率太樂官屬宿設樂懸以供其事宴㑹亦如之若三公行園陵則為之副公服乘輅備鹵簿而奉其禮若大祭祀則先省牲器凡太卜占國之大事及祭祀卜日皆往蒞之於太廟南門之外凡仲春薦氷及四時之物甘滋新成者皆薦焉凡有事於宗廟少卿帥太祝齊郎入薦香燈整拂神幄出入神主將饗則與良醖令實樽罍凡備大饗之器服有四院天府御衣樂懸神厨六典太常寺卿一人正三品宋太常用尚書亦轉為尚書如遷選曹尚書領護等齊因之梁天監七年象四時置十二卿太常宗正司農為春卿後魏太常與光祿勳衛尉為三上卿位從一品下北齊太常卿掌陵廟羣禮儀制天文術數衣冠之屬第三品龍朔二年改奉常咸亨元年復舊光宅元年改司禮神龍元年復舊掌同唐志國朝元祐官品令太常卿正四品今日知為皇帝之貴前漢叔孫通歸漢拜為博士髙帝悉去秦儀法為易簡羣臣飲酒爭功醉或妄呼拔劒擊柱上患之通說上曰願參古禮與秦儀雜就之於是通使徴魯諸生三十餘人及上左右為學者與其弟子百餘為綿蕝野外習之月餘㑹漢七年長樂宫成諸侯羣臣皆朝十月儀先平旦謁者治禮引以次入殿門自諸侯王以下莫不索恐肅敬御史執法舉不如儀者輒引去無敢歡譁失禮者髙帝曰吾乃今日知為皇帝之貴也拜通為奉常賜金五百斤定儀法惠帝即位謂太子太傅叔孫通曰先帝園陵寢廟羣臣莫能習乃徙通重為奉常定宗廟儀法及稍定漢諸儀法皆通所論著也坐免孝武元朔元年孔咸為太常坐南陵橋壞衣冠道絶免又宣帝地節四年任宣為太常坐盜茂陵園中物免不事權貴杜鄴有才能太常數言得失不事權貴翼翼崔駰太常針曰翼翼太常實為宗伯穆穆靈祇寢廟奕奕疑其詭激周澤字稚都為太常清潔循行盡敬宗廟常臥疾齊宫其妻哀澤老病窺問所苦澤大怒以妻干犯齊禁遂收送詔獄謝罪當時疑其詭激時人為之語曰生世不諧作太常妻一嵗三百六十日三百五十九日齊一日不齊醉如泥傳父業桓榮字春卿拜太常初遭倉卒與族人桓元卿同幾死而榮講論不息元卿嗤之及為太常嘆曰我農家子豈意學之為利乃若是哉又榮子郁字仲思敦厚篤學傳父業亦為太常初榮授朱普學四十萬言浮辭繁長多過其實及榮入授顯宗減為二十三萬言至是又省定為十三萬言由是有桓榮大小太常章句大小章句上立節可否之間續漢書張奐字然明拜太常立節可否之間强禦不敢奪也縱覽羣籍古今詳細東面坐設九賓東觀漢記桓榮為太常上幸太常府榮束面坐設九賓後為五更祿終厥身不汲汲時俗周澤少修髙節隱居田野不汲汲時俗為太常果敢有直言澤拜太常果敢數有直言朝廷嘉其清廉賜御府衣一襲楊賜以病罷居無何拜太常詔賜御衣一襲所服官幘綬玉壺華帶金鐍鈎佩難經伉伉劉太常華嶠後漢書劉愷為太常論議常引正大義諸儒為之語曰難經伉伉劉太常清貧至賣宅自給魏明帝時和洽為太常清貧守分至賣宅自給明帝聞之加賜穀帛布被瓦器益部耆舊傳趙典為太常雖處上卿而布被瓦器歸田里漢楊秉為太常時太常令李雲以諌受罪秉爭之不得免遂歸田里德行堂堂邢子昻魏志邢顒字子昻時人稱德行堂堂邢子昻文帝以為太常卿似尹翁歸晉書鄭默字思元遷太常山濤欲舉一親為博士見默語曰卿似尹翁歸令吾不敢復言謂其柔而能整也廟棟折免官張華為太常以太廟屋棟折免官歷位忠恪臧榮緒晉書華表清貧履道內圓外順歷位忠恪言行不玷其以表為太常卿還第攝事晉起居注太常王寶啓府舍窄狹不足移家毋鐘年髙違離靡寧乞還第攝事詔從之臨軒作樂晉中興書蔡謨拜太常咸康四年臨軒門下奏非祭祀宴饗則無設樂謨奏臨軒宜有金石憲宗納焉臨軒作樂自此始也氷清玉潔行為俗表賀循字彥先元帝以為太常而散騎常侍如故循以九卿舊不加官唯拜太常而已中宗踐阼下令曰循氷清玉潔行為俗表加以位處上卿而居身服物蓋周形而已屋才蔽風雨孤常造其廬以為慨然其賜以大尺床褥并錢二十萬以表至德九卿不加官上好生異議晉後略成泰位至太常卿好生異議故終無折衷之功異同顯於聲色傅暢晉讃劉實為太常與諸博士窮道義以理趣異同顯於聲色自謂閒職齊書張環以雍州刺史拜太常自謂閒職武帝曰卿昔未富貴謂人不與既富貴復欲委棄之環曰陛下御臣等若養馬無事就間廄有事優牽束帝猶怒以為散騎常侍宗卿梁陸倕為王光祿讓太常表曰昔者楚德方感叔敖濯衣漢道克昌王陽結綬故拜命無辭受爵不讓况宗卿清重歷選所難漢晉以降莫非素範辭爵則桓郁張奮讓封則丁鴻劉愷潘尼之文雅純深華表之從容退默自此迄兹風流繼軌以臣况之曽無等級九賓闕相封襌失儀陳沈炯讓太常表曰臣聞玉磶雕楹不取材於蟠木丹朱繡黼豈襲冕於絲蘿何則適用各有其儀倘九賓闕相封禪失儀責以司存云誰之咎况南史執簡轉見違才君舉必書尤難妄冒母子相泣北齊書趙彥深三嵗毋傅氏孀居家人欲以改適自誓以死彥深五嵗傅謂之曰家貧兒小何以能濟彥深泣而言曰若天哀矜兒大當仰報傅感其意對之流涕及彥深拜太常卿還不脫朝衣入見母跪陳幼小孤露䝉訓得至於此母子相泣久之然後改服復求為太常李元忠為侍中雖處要任殊不以物務干懷惟以聲酒自娛大率常醉家事大小了不關心園庭羅種果藥親友尋詣留連宴賞每挾彈携壺逰遨里閈嘗言寧無食不可使無酒阮步兵吾師也元忠先為太常卿後自中書令復求為太常以其有音樂而多美酒故神武欲用為僕射又嘗言其放達常醉不可委以臺閣其子聞之請節酒元忠曰我謂作僕射不勝飲酒作樂愛僕射時宜勿飲酒親導母輿唐崔邠字處仁為太常卿初上大閲四部樂於署觀者縱焉邠自私第去帽親導母與公卿逢者回騎避之衢路以為榮懦怯不任事趙宗儒為太常卿太常有師子樂備五方之色非㑹朝聘饗不作幼君荒誕伶官縱肆中人掌教坊者非牒取之宗儒不敢違以狀白宰相以為少事在有司執守合不關白以宗儒懦怯不任事改太子卿改按樂童王涯字廣津為太常卿文宗以樂府之音鄭衛太甚欲聞古樂命涯詢於舊工取開元時雅樂選樂童按之名曰雲韶樂樂成獻於梨園亭上上悅賜涯等綾錦振起廢禮元載秉政踈忌楊綰奏為國子祭酒天下清議益歸於綰上深知之以載在樞衡未即罷遣乃遷綰為太常卿充禮儀使以郊廟禮久廢藉綰振起之尚書裏行崔日知遷太常卿自以歷任年久每朝士參集常與尚書同列時人號為尚書裏行遂為口實禮曹素畏其該洽筆談江南陳彭年學書史於禮文尤所詳練歸朝列于侍從朝廷郊廟禮儀多委彭年裁定援引故事頗為該洽常攝太常卿導駕誤行黃道上有司止之彭年正色回顧曰自有典故禮曹素畏其該洽不復敢詰問誤行黃道上上少卿後魏書太和十五年置少卿官太常少卿一人第三品上至二十二年降為正四品上班職令景明初太常少卿第四品上第一清選明禮樂兼天文隂陽者為之隋百官志後齊太常為寺置少卿一人唐職官志少卿二人正四品上掌見卿門神龍元年增置一人六典少卿二人正四品上周禮有小宗伯中大夫二人後周亦為小宗伯隋太常寺置少卿一人正四品上煬帝加置一人降為從四品皇朝武德中置一人貞觀中加二人龍朔咸亨光宅神龍並隨時改復掌見卿門五代史後唐同光元年諸寺只置大卿一員國朝元祐官品令太常少卿從五品識錞于北史斛斯徴字士亮博覽羣書尤精三禮兼解音律為太常少卿自魏孝武西遷雅樂廢缺徴博采遺逸稽諸典故創新補舊方始備焉又樂有錞于者近代絶此器或有自蜀得之皆莫之識徴見之曰此錞于也衆弗之信徴遂依干寶周禮注以芒筒振之其聲極清衆乃欽服按南齊始興王鑑為益州刺史時有廣漢什邡人段祖以錞于獻鑑錞于者古禮器也髙三尺六寸六分圓三尺四寸圓如筒銅色黑如漆甚薄上有銅馬以繩懸焉令去地尺餘灌之以水又以器盛水於下芒莖當心跪拄錞于以手振芒則聲如雷清嚮良久乃絶古所以節樂者也白髮抽去不復生後魏元順為太常少卿以父憂去職哭泣嘔血身自負土時年二十五便有白髮免喪抽去不復更生世人以為孝思之所致也昔為清郎今為清卿三國典略齊太常少卿聿修巡省河南諸州兖州刺史邢邵與聿修故舊嘗於省中呼聿修為清郎至是遣送紬為信聿修不受與邵書曰瓜田李下古人所慎多言可畏譬之防川願長此心不貽後責爾邵亦欣然報書曰一日之贈率爾不思老夫匆匆意不及此敬承來㫖吾無間然第昔為清郎今為清卿者矣端凝若植唐馮定字翼夫美容止有文學為太常少卿文宗每聽樂鄙鄭衛聲詔奉常習開元霓裳羽衣舞以雲韶樂和之舞曲成定總樂工閲於庭定立於其間文宗以其端凝若植問其姓氏翰林學士珏曰此馮定也文宗喜問曰豈非能為古章句者邪及詔升階文宗自吟定送客西江詩吟罷益嘉因錫禁中瑞錦尋遷諫議大夫博士以下就决疑議鄭肅元和六年轉太常少卿肅能為古文長於經學左丘明三禮儀注疑議博士以下必就肅决之然後已參定雅樂張文收尤善音律太宗將創制禮樂詔文收于太常寺與少卿祖孝孫參定雅樂有古鐘十二近代唯用其七餘有五號啞鐘莫復通者文收吹律調之聲皆響徹時人服其妙增損樂稱職韋萬石頗有學業而特善音律上元中遷太常少卿當時郊廟調及宴㑹雜樂皆萬石與姚𤣥辨增損之時人以為稱職賜金紫國朝英宗嘉祐八年十一月賜太常少卿孔叔詹金紫叔詹以勞當遷上不欲以卿監當管庫之務故有賜後以為例丞前漢百官表奉常秦官掌宗廟禮儀有丞後漢百官志太常丞一人比千石如小樂正本注曰掌凡禮行及祭祀小事總署曹事其署曹掾史隨事為員諸卿皆然唐職官志太常置丞宋百官春秋太常丞視尚書郎銅印黃綬一梁冠品第七掌舉陵廟非法南齊百官志太常府置丞一人陶氏職官要録晉宋九卿置丞進賢一梁冠介幘皂衣銅印黃綬齊梁墨綬隋百官志梁十二卿皆置丞後齊丞一人隋髙祖增置蒸一人煬帝大業三年寺丞增為從五品唐職官志太常丞二人從五品上掌判寺庫凡大饗太廟則修七祀于太廟西門之內六典丞二人從五品上秦有奉常丞漢因之比千石魏晉宋皆置一人後魏五品下太和二十二年降為七品上北齊從六品下隋二人從六品下大業三年增為從五品皇朝因之若祫饗則兼修配饗功臣之禮餘同唐志五代職官志後唐同光元年太常寺除太常博士外許更置丞一員國朝元祐官品令太常丞從七品上疏言得失前漢谷永為太常丞數上疏言得失懷嫌不去官韋𢎞為太常寺丞父賢以𢎞當嗣太常職掌陵廟煩劇多遇勑𢎞自免懷嫌不去官及賢疾篤𢎞坐廟事繫獄定禮決疑問陶覆之陶氏家傳覆之字保宗為太常丞凡宗廟疑議多所決定時人為之語曰定禮決疑問陶覆之主簿漢鹵簿之制太常駕四馬主簿前車八乘晉職官志太常置主簿南齊百官志太常府置主簿隋百官志梁天監七年十二卿各置主簿陳承梁皆循其制後齊九卿各有主簿員隋髙祖太常置主簿二人唐職官志太常主簿從七品上六典主簿二人從七品上梁天監七年十二卿名置主簿一人遷為正官功曹又位不登十八班者别為七班太常主簿班第四梁選太常主簿視二衛主簿陳因之後魏不見北齊太常有功曹五官主簿二人武德中正八品上貞觀中正七品上掌印勾檢稽失省署抄目國朝皇祐三年宋祁言乞增置主簿一員勾檢在寺文簿及主掌出納遂除太子中舍致仕胡瑗大理評事兼太常寺主簿瑗尋復致仕詔更不置主簿博士晉職官志太常博士魏官也魏文帝初置晉因之掌引導乘輿王公以下應追諡者則博士議定之宋百官志博士班固云秦官史臣按六國時往往有博士掌通古今南齊百官志太常府博士謂之太學博士隋百官志後齊太常府有博士四人禮制隋太常寺有博士四人煬帝省博士員唐職官志太常置博士四人從七品上掌辨五禮之儀式奉先王之法制通變隨時而損益焉凡大祭祀及有大禮則與鄉導贊其儀凡公以下擬諡皆迹其功行而為之褒貶無爵稱子養德丘園聲實明著則諡曰先生大行大名小行小名之若大祭祀卿省其牲器謁者為之導若小祀及公卿大夫有嘉禮亦命謁者以贊之六典太常博士四人從七品上漢書百官表云博士秦官掌通古今秩比六百石員多至數十人髙祖時叔孫通始為博士定禮制後漢置十四人魏因之宋齊太常府官博士亦謂之太學博士梁陳亦兼統國學博士後魏七品下北齊置四人品同魏氏齊因之置謁者三十人贊引六十人皇朝武德中置二員貞