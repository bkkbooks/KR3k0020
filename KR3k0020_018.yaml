北齊煬帝即位加置一人降為從四品皇朝置一人貞觀中加置二人龍朔咸亨光宅神龍並隨寺改復掌同唐職官志五代職官志後唐同光元年諸寺監只置大卿各一員國朝元祐官品令光祿寺卿從四品少卿正六品浣滌親裙史記萬石君子建為郎中令每五日洗沐歸謁親入子舍竊問侍者取親中裙厠牏身自浣濯復與侍者不敢令萬石君知以為常屏人恣言建為郎中令事有可言屏人恣言極切至廷見如不能言者上以是親而禮之奏事誤書建書奏事事下建讀之曰誤書馬字與尾當五今乃是不足一上譴死矣甚惶恐其為謹慎皆如是終無所言周文名仁為郎中令仁為人隂重不泄常衣敝補衣溺袴期為不潔清以是得幸景帝入臥內於後宫祕戲仁常在旁至景帝崩仁尚為郎中令終無所言上時用人仁曰上自察之然亦無所毁以是景帝再幸其家隱人過失前漢張安世為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不反覆水漿耶如何以小過成罪郎淫官婢婢先自言安世曰奴以恚怒誣汚衣冠告署撻奴其隱人過失皆此類也總領從官柏梁臺武帝柏梁詩臺光祿勳曰總領從官柏梁臺貴寵最盛與九卿絶席後漢馬防貴寵最盛與九卿絶席拜光祿勳白馬生張湛字子孝拜光祿勳光武臨朝或有墮容湛輒陳諫其失常乘白馬帝每見湛輒言白馬生且復諌矣內奉宿衛外總三署杜林字伯山為光祿勳內奉宿衛外總三署周密敬慎選舉稱平郎有好學輒見引進所歷有稱任隗字仲和自將作大匠遷太僕又代竇固為光祿勳所歷皆有稱諌封賞踰制陳蓍遷光祿勳時封賞踰制內寵猥盛蓍上疏諌云云上疏陳三空之厄延熹六年車駕廣陵校獵陳蕃上疏諫曰當今之世有三空之厄田野空朝廷空倉庫空是謂三空加兵戎未戢四方離散是陛下焦心毁顔坐以待旦之時也豈宜揚旌耀武騁心輿馬之觀乎居守京師續漢書李通為光祿勳時上征討四方令通居守京師撫百姓治宫室選舉清平魯恭以侍中選光祿勳選舉清平不失次序京師貴重莫能屈視事三日拜司空茍爽字慈明為光祿勳視事三日即拜司空二雅東觀漢記孫湛字子雅為光祿勳以清廉稱周澤相類京師號之二雅授太子諸王經劉昆為光祿勳授皇太子及諸王小使五千人經昆老退位以二千石祿終其身將羽林宿衛宫省馬防為光祿勳上數幸防府賞賜飲食每出防輒將羽林宿衛宫省防在職數上疏言政事多見納鄉邑耆德魏志常林徙光祿勳晉宣王以林鄉邑耆德每為之拜或謂林曰司馬公貴重君宜止之林曰司馬公自欲敦長幼之序為後生之法貴非吾之所長拜非吾之所制也言者踧踖而退聞劉備死獨不賀袁煥魏國初建為郎中令時有傳劉備死者羣臣皆賀渙以嘗為備吏獨不賀優遊諷詠無所標名晉應詹字思逺遷光祿勳以王敦專制自樹故優遊諷詠無所標名觀此奏使朕懼魏髙堂隆遷光祿勳帝愈增崇宫殿雕飾觀閣百役繁興作者萬數隆上疏曰今陛下所與共坐廊廟治天下者非三司九列則臺閣近臣皆腹心造膝宜在無諱若見有過而不敢以告從命奔走惟恐不勝是則具臣非鯁輔也昔李斯敢奏二世曰為人主而不恣睢命之曰天下桎梏二世用之秦國以覆斯亦滅族是以史遷譏其不正諫而為世誡書奏帝覽焉謂中書監令曰觀隆此奏使朕懼哉關東觥觥郭子橫後漢郭憲為光祿勳車駕西征憲諌曰天下初定車駕未可以動憲乃當車拔佩刀斷靷帝不從遂出隴後潁川兵起乃回駕帝嘆曰恨不用子橫之言時胸奴數犯塞帝患之乃召百寮廷議憲以為天下疲弊不宜動衆諫諍不合乃伏地稱眩瞀不復言帝令兩郎扶下殿憲亦不拜帝曰嘗聞關東觥觥郭子橫竟不虛也憲遂以病辭卒於家清廉果於從政孫湛拜光祿勳清廉果於從政數有直言多見納用十八年以病乞身德行恂恂邵伯春東觀漢記邵馴字伯春鄉里號之曰德行恂恂邵伯春章和時為光祿勳上便宜陳緩刑簡役吳志薛瑩字道言以時政多謬舉措煩苛瑩每上便宜陳緩刑簡役以濟育百姓事或施行遷光祿勳以蓋并覆吳録王大暑嘗於樓上值雷雨以蓋自覆并以覆光祿勳劉基餘人不得也寬中博愛晉書鄭默字思元轉光祿勳寬中博愛不以聲色矜人以不見鄭光祿為恨王隱晉書鄭袤為光祿勳毌丘儉作亂景帝時為大將軍自出征之百官祖送於城東袤疾病不在㑹上謂中領軍王肅惟以不見鄭光祿為恨肅以語袤袤自追及於近道上笑曰固知生必來也與共載問以計謀二魚集武庫之屋王肅字子雍為光祿勳時有二魚長尺集武庫之屋有司以為吉祥肅辨之曰魚生於泉而見於屋鱗介之物失其所也邊將其殆有弃甲之變乎其後果有東關之敗吾得其人宋書王惠宋初置郎中令武帝難其人既而曰吾得其人矣乃以惠居之九列之首晉庾公集樂謨詔革云光祿九列之首且職典史署選貢惟允其以前散騎常侍謨為光祿勳吐麥飯孟宗别傳為光祿勳大㑹宗先止酒偶有强者飲一杯便出傳詔司察宗吐麥飯察者以聞上乃嘆息曰至德清純如此請假歸鄉船漏不沒後魏書邢虬字神寶為光祿少卿虬毌在鄉遇患請假而歸值秋水大瀑長河斷絶虬得一船渡漏滿而不沒時人異之授職宜存簡靜唐栁亨拜光祿少卿太宗每誡之曰與卿舊親情素兼宿卿為人交逰過多今授此職宜存簡靜亨性好射獵有叨酒之名此後頗自勗勵杜絶賓客約身節儉勤於職事太宗亦以此稱之丞前漢百官表郎中令有丞前漢百官志光祿勳丞一人比千石南齊百官志光祿勳府置丞一人隋百官志後齊九寺置丞各一人隋九寺各置丞光祿三人煬帝大業三年增為從五品唐職官志光祿寺丞二人從六品上掌判寺事六典光祿寺丞二人從六品上宋齊列卿丞並視朝請梁天監七年改視員外郎陳因之後魏列卿丞從五品中太和二十二年第七品上北齊一人從六品隋因之加置三人大業五年加為從五品皇朝改為從六品掌同唐職官志主簿晉職官志光祿置主簿員隋百官志後齊光祿寺有功曹五官主簿録事等員隋光祿寺置主簿二人唐職官志光祿寺主簿二人從七品上掌印勾檢稽失太官令漢百官表少府屬官有太官令一人丞七人應劭漢官儀太官令兩梁冠秩千石丞四人邵孝廉年五十清靜聰明光祿上其名乃召拜皆秩四百石三嵗為令以供養勞苦遷左丞有湯官丞掌諸甘肥果丞掌果瓜菜茹薪炭漢舊儀太官主飯肉湯官主酒皆有令丞治太官湯官奴婢各三十人置酒皆緹韝蔽膝六典太官署令二人從七品下周禮有庖人外饔中士蓋其任也秦漢少府屬官有太官湯官令丞太官主膳食湯官主餅餌漢官儀秩千石桓帝延熹元年使太官令得補二千石置四丞魏氏因之晉光祿勳有太官令宋侍中屬官有太官令一人齊因之梁門下省領太官陳因之後魏北齊分太官令為尚食中尚食尚食門下省領之中尚食集書省領之太官光祿勳領之尚食中尚食掌知御膳太官掌知百官之饌後周有典庖中士一人隋光祿寺統太官令丞皇朝置令二人丞四人從八品下周禮庖人有外饔下士秦漢有太官丞後漢丞一人四三百石又有左丞湯官丞甘丞果丞桓帝時太官置丞又有左右丞魏晉宋齊並有太官丞梁有四人又有市買丞正厨丞後魏北齊有太官丞一人後周內膳有中士四人隋有太官丞八人皇朝置四人令掌供膳之事丞為之二凡祭之日則白卿詣諸厨省牲鑊取明水於隂鑑取明火於陽燧帥宰人以鸞刀割牲取其毛血實之於豆遂烹牲焉又帥進饌者實簠簋設於饌幕之內國朝元祐官品令光祿寺太官令正九品進御食以髮貫炙謝承後漢書陳正為太官令黃門郎與正有隙因進御食以髮貫炙光武啖炙見髮敕斬正正曰臣罪有當死者三云云詔赦之詩漢武柏梁詩曰枇杷橘栗桃李梅針揚雄太官令針曰時惟膳夫實司王饗祁祁庶羞口實是供奉物百品八珍清觴以御賓客以膳于王膳夫司王饗上饔膳近任王朗集朗為大理時上言主簿趙郡張登昔為郡主簿值黑山賊圍郡登與縣長王雋帥吏兵七十二人俱往赴救與賊交戰吏兵散走雋幾見害登手格二賊以全雋命又守長夏逸為督卿所枉登身受拷掠理逸之罪義濟二君宜加顯異黃初詔曰登忠義彰著在職勤勤名位雖卑直亮宜顯饔膳近任當得此吏以登為太官令能為南人飲食後魏書毛循之能為南人飲食手自煎調多所適意世祖親待之進太官尚食賜爵南郡公加冠軍將軍常在太官至進御膳職官分紀卷十八
