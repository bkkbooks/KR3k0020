body:
  text: 職官分紀卷八宋孫逢吉撰尚書省前漢百官表成帝建始四年初置尚書員五人後漢百官志尚書令一人僕射一人尚書六人左右丞各一人侍郎三十六人符節令一人尚書璽郎中四人通典昔堯試舜於大麓領録天下事此其任也周之司會又其職焉秦時少府遣吏四人在殿中主發書故謂之尚書尚猶主也漢承秦置及武帝遊宴後庭始用宦者主中書以司馬遷為之中間遂罷其官以為中書之職至成帝建始四年罷中書宦者又置尚書五人一人為僕射四人分為四曹通掌圖書祕記章奏之事及封奏宣示內外而已其任猶輕至後漢則為優重出納王命敷奏萬幾蓋政令之所由宣選舉之所由定罪賞之所由正斯乃文昌天府衆務淵藪內外所折衷逺近所稟仰故李固云陛下之有尚書猶天之有北斗斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運平四時尚書出納王命賦政四海令及左丞揔領綱紀無所不統僕射及右丞分掌廩假錢榖漢書尚書雖有曹名不以為號及靈帝以侍中梁鵠為選部於是始見曹名總謂之尚書臺亦謂之中臺大事八座連名而有不合得建異議二漢皆屬少府魏置中書省有監令遂掌機衡之任而尚書之權漸減矣晉以後所掌略同八座丞郎初拜並集都省交禮遷職又解交本漢制也至於晉宋唯八座解交丞郎不復解交也宋曰尚書寺居建禮門內亦曰尚書省令若闕則左僕射為省主亦謂之內臺每八座以下入寺門生隨入者各有差不得雜以人士凡尚書官大罪則免小罪遣出遣出者百日無代人聽還本職其令及二僕射出行分道之制與中丞同令僕各給威儀十八人自晉以後八座及郎中多不奏事梁天監元年詔曰自禮闈凌替歷兹永久郎署備員無取職事粳粃文案貴尚虛間空有趨墀之名了無握蘭之實曹郎可依昔奏事自是始奏事矣又詔尚書中有疑事先於朝堂參議然後啓聞舊尚書官不以為贈唯朱異卒特贈右僕射武帝寵之故也自魏晉重中書之官居喉舌之任則尚書之職稍以疏逺至梁陳舉國機要悉在中書獻納之任又歸門下而尚書但聽命受事而已後魏天興元年置八部大夫於皇城四方四維面置一人以擬八座謂之八國各有屬官分尚書三十六曹及諸外置令大夫主之崔玄伯通署三十六曹如令僕統事四年又復尚書三十六曹天賜元年復罷尚書三十六曹别置武歸修勤二職分主省務武歸比郎中修勤比令史至神麚元年始置僕射左右丞及諸曹尚書十餘人各居别寺北齊尚書省亦有録令僕射總理六尚書事謂之都省亦謂之北省後濟北王以太子監國立大都督府與尚書省分理衆事仍開府置佐後周無尚書隋及大唐皆有其制略同凡尚書省事無不揔龍朔二年改尚書省為中臺咸亨初復舊光宅元年改為文昌臺埀拱元年又改為都臺咸通初復舊長安三年又改為中臺神龍初復舊為尚書省亦謂之南省宋百官志周官司書鄭玄云若今尚書矣秦時少府遣吏四人在殿中主發書故謂之尚書尚猶主也漢初有尚冠尚衣尚食尚浴尚席尚書謂之六尚戰國時已有尚冠尚衣之屬矣秦時有尚書令尚書僕射尚書丞至漢初並𨽻少府漢東京猶屬焉隋百官志梁尚書省置令左右僕射各一人又置吏部祠部度支左右都官五兵等六尚書左右丞各一人吏部刪定三公比部祠部儀曹虞曹主客度支殿中金部倉部左户駕部起部屯田都官水部庫部功論中兵外兵騎兵等郎二十三人令史百二十人書令史百三十人陳承梁尚書置五員郎二十一員後齊尚書省置令僕射吏部殿中祠部五兵都官度支等六尚書又有録尚書一人僕射置二則為左右僕射揔理六尚書事謂之都省其屬官左右丞各一人并都令史八人隋髙祖時尚書省事無不揔置令左右僕射各一人揔吏部禮部兵部都官度支工部等六曹事是為八座屬官左右丞各一人都事一人分司管轄唐百官志尚書省令一人左右僕射各一人左右丞郎中員外郎各十人以都事受事祭神察稽失監印給紙筆以主事令中書令史署覆文案出符目以亭長啓閉傳禁約以掌固守當倉庫及陳設諸司皆如之初有馹驛百人掌乘傳送符後廢都事各六人從七品上主事各六人從八品下吏部考功禮部主事皆如之諸司主事從九品上有令史各十八人書令史各三十六人亭長各六人掌固各十四人國朝大中祥符九年上與輔臣言及尚書省制度因曰今惟銓選典故稍存而幕職州縣中固亦有才俊不宜輕之王旦曰吏部與諸司不同但不能舉職爾上曰言事者屢請復二十四司之制楊礪嘗言行之不便但以郎官諸司使同領一職則漸可改作旦曰唐設內諸司悉擬尚書省如京倉部也莊田屯田也皇城司門也禮賔主客也雖名品可效而事任不同唐朝諸司所行惟京邑內外爾諸道兵職各歸藩鎮非南宫一郎中員外所能制也時朝廷得三分之一名曰上供其他留使之名皆藩臣所有其後諸帥跋扈由藩鎮強大也今之三司即尚書省故事盡在但一毫所賦皆歸於縣官而仰給焉故蠲放則澤及下賜豫則恩歸上此聖朝不易之制也上曰何承矩嘗請以五等爵給其户賦旦曰唐朝將帥富貴驕蹇往往陷於不道者良由姑息之過也每命一帥罕有帖然奉命者周世宗召襄州節度安審琦即馳驛而至世宗大喜寵以厚禮國家自太祖變革制度迄至於今藩鎮有提兵在邉位兼相位者每被君命奔命而至此制御之大要也好談古者恐思慮之未至上然之尚書省掌六曹諸司文書施行制命舉省內綱紀程式正御史糾不當者聽內外枉屈辨訴凡諸司奏請擬官應審察判書者勾檢以上門下中書省樞密院糾正其稽違舉簡納文案凡更改申明敕令格式一司條法議定以奏若朝廷有疑事則集百官議其可否辨定疑獄奏覆太常擬諡大祭祀則誓戒百官凡六尚書之務本曹所不能決者揔而決之春明退朝録尚書省二十四司唐世以事簡者兼學士舍人本朝惟重左曹名曹館提點刑獄例得名曹而開封府判官轉運使得名曹又遷左曹學士舍人待制進二資帶史撰更優遷如王原叔自工部郎中遷吏部郎中是也朝官帶史撰亦得優遷李邯鄲自博士為禮部員外郎賈魏公自司封貟外郎為禮部郎中是也景祐中宋景文修樂書成遷工部貟外郎慶厯中吕仲裕王原叔修崇文總目成並為工部貟外郎余預修唐書亦忝此官又朝選久不磨勘者郭諌議申錫遷右司貟外郎祖擇之遷工部貟外郎張修撰問遷禮部郎中都堂居中通典唐尚書省都堂居中左右分司堂東有吏户禮三行每行四司左司統之西有兵刑工三行每行四司右司統之凡二十四司分曹共理而天下之事盡矣制敕用黃紙唐髙宗時敕曰制敕施行既為永式比用白紙各有蟲蠧自今尚書省頒下諸州縣並用黃紙録尚書事魏志陳羣録尚書事晉職官志按漢武時左右曹諸吏分平尚書奏事知樞密者始領尚書事張安世以車騎將軍霍光以大將軍王鳳以大司馬師丹以左將軍並領尚書事後漢章帝以太傅趙熹太尉牟融並録尚書事尚書有録名蓋自熹始亦西京領尚書之任猶唐虞大麓之職也和帝時太尉鄧彪為太傅録尚書事位上公在三公上漢制遂以為常每少帝立則置太傅録尚書事猶古冡宰總已之義薨輒罷之自魏晉以後亦公卿權重者為之傅暢晉故事何劭王戎張華裴楷楊濟和嶠為愍懷太傅通省尚書事張華為光祿大夫尚書昭帝即位七條事皆咨而後行惠帝之世太保衛瓘太宰河間王顒太傳東海王越皆録三省尚書祕書事宋百官志漢武帝世使左右曹諸史分平尚書事昭帝即位霍光領尚書事成帝初王鳳録尚書事漢東京每帝即位輒置太傅録尚書事薨輒省晉康帝世何充讓録表曰咸康中分置三録王導録其一荀嵩陸曄各録六條事然則有二十四條若止有十二條則荀陸分録六條導又何所司乎若導總録荀陸分掌則不得復云導録其一也其後每置二録輒云各録六條事又是止有十二條也十二條者不知悉何條晉江右有四録則四人參録也江右張華江左庾亮並經關尚書七條則亦不知皆何事也後何充解録又參關尚書職無不總王肅注納于大麓曰堯納舜於尊顯之官大録萬幾之政也凡重號將軍刺史皆得命曹授用唯不得施除及加節宋世祖孝建中不欲威權外假省録大明末復置此後或置或省沈約宋書諸公録尚書事古制也按漢氏諸吏平尚書奏事後霍光以大司馬大將軍平尚書事唐百官志録尚書一人位在令上掌與令同但不糾察令則糾彈見事與御史中丞更相廉察韋昭辨釋名尚書上也言最在上揔領之也辨云尚猶奏也百官尚書言事當省委平處奏之故曰尚書事謹慎周密前漢張安世字子孺湯之子也拜大司馬車騎將軍領尚書事職典樞機以謹慎周密自著外內無間每言大政已決輒移病出聞有詔令驚使吏之丞相府問焉自朝廷大臣莫知其與議也嘗有所薦其人來謝安世大恨以為舉賢薦能豈有私謝耶絶弗復通有郎功髙不調自言安世應曰君之功高明主所知人臣執事何長短而自言乎絶不許已而郎果遷幕府長史遷辭去之官安世問以過失府長史曰將軍為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然臣下自修而已何知士而薦之其欲匿名迹逺權藝如此參録司馬彪續漢書李固字子堅狀有奇表鼎角匿犀足履龜文沖帝立以太尉參録尚書事匪石不二忠直不回應劭漢官儀沖帝丁酉䇿書太尉峻二世掌典機衡有匪石不二之心大司農李固公族之選忠直不回有史魚之風今以峻為太傅固為太尉與大將軍冀參録尚書事百官揔已以聽和帝丁酉䇿書故太尉鄧彪元勳之族三讓彌髙海內歸仁為羣賢首先帝褒表欲以崇化今彪聰明康強可謂老成人矣黃耉元老詩書所美其以彪為太傅録尚書事百官揔已以聽又煬帝䇿書司徒徐防以臺閣機密施政牧守其以防為太尉録尚書事百官揔已以聽張禹忠孝彌篤其以禹為太傅録尚書事百官揔已以聽明經篤行桓焉以父任為郎明經篤行有名稱特領講部授安帝經遷黃門郎侍中步兵校尉拜太傅録尚書事復入授順帝經于禁中因宴見建言宜引三公尚書入省事天子從之典職六年勤勞不怠章帝詔曰司空牟融典職六年勤勞不怠其以牟融為太尉録尚書事忠亮謇諤敦德允元靈帝癸巳䇿書太尉陳蕃忠亮謇諤有不吐茹之節司徒胡廣敦德允元五世之從政可謂老成人矣以蕃為太傅與廣參録尚書事問溫室省中木答以它語孔光字子夏領尚書事凡典樞機十餘年守法度修政事不希旨茍合或問溫室省中木皆何木也光答以它語其慎密如此與三公絶席張禹見太傅門領録天下事桓談新論昔堯試舜於大麓者領録天下事如今之尚書官矣宜得大賢乃堪使處議特平焉志誅曹節陳蕃見太傅門耻為魏臣魏楊彪為太尉録尚書事及李傕郭汜之亂彪盡節為主﨑嶇危難之間幾不免於害彪見漢符將終自以纍世為三公耻為魏臣遂稱足孿不復行積十餘年魏文帝即王位欲以為太尉令近臣宣旨彪辭曰嘗以漢朝為三公值危亂不能立尺寸之益若復為魏臣於國之選亦不為榮也帝不奪其意典兵萬人魏略明帝疾詔宣王到卧內勞勉之遂屬以少子與曹爽並輔政皆持節同都督中外諸軍録尚書事典兵各萬人爽遂貪冒多改舊法選舉或非其人又數窺伺神器宣王乃奏爽云天下洶洶人懷危懼陛下便為寄生豈得久安此非先帝臨困詔陛下及令臣升床之本意也臣雖朽邁敢忘往言拔萃處衆僚之右蜀志蔣琬為録尚書事時新喪元帥逺近危悚拔萃處衆僚之右既無戚容又無喜色神守舉止有如平日由是衆望漸伏東録西録晉宗室會稽丞王道子進位相録尚書事假節都督中外諸軍事勢傾天下道子世子元顯又加録尚書事道子政無大小一委元顯時謂道子為東録元顯為西録參弼機衡以亮天工王隱晉書元康元年詔司徒王渾秉德中正識量𢎞逺歷位內外文武勳庸著在方䇿宜參弼機衡以亮天工其令録尚書事朝政肅然司馬景王為撫軍大將軍持節督中外諸軍録尚書事上初揔萬幾正身率法朝政肅然劒履上殿汝南文成王亮為太宰録尚書事入朝不趨劎履上殿增掾屬十人與太保衛瓘對掌朝政楚王瑋誣亮與瓘有廢立之謀矯詔害之咸寧二年賈充遷太尉録尚書事上疏免録王導領中書監録尚書事時丞相參軍羅𢎞父母沒賊賊平不奔赴御史中丞熊逺奏請議而吏部尚書周顗選𢎞導亦署之其事為有司所奏茂𢎞上疏免録中宗令曰卿常揔萬幾何得解録可除節而已入朝不趨讃拜不名晉中興書泰和元年詔會稽王朕承洪緒乃聞善秀慎徽五教儀刑具瞻其以昱為丞相録尚書事入朝不趨讃拜不名劒履上殿給羽葆鼓吹班劒六十人録六條事晉起居注穆帝永和中詔曰尚書萬事之本王化所由宜參二親賢以康庶政侍中撫軍會稽王昱清劭秀令朕所慿賴其以本官録尚書六條事宜揔朝政大興初詔司徒荀組宜揔朝政可録尚書事給班劒六十人優䇿南齊高帝崩遺詔以禇彥回録尚書事江左以來無單拜録者有司議立優䇿尚書令王儉議以為見居本官别拜録應有䇿書而舊事不載中朝以來三公王侯則優䇿並設官品第二䇿而不優優者褒美䇿者兼明委寄尚書職居天官政化之本故尚書令品雖第三拜必有䇿録尚書品秩不見而揔任彌重前代多與本官同拜故不别有䇿即事緣情不容均之凡寮宜有䇿書用申隆寄既異王侯不假優文從之輔位明堂遺像麟閣謝朓為明帝拜録尚書事表曰無以輔位明堂遺像麟閣暴風震電拔木倒立後魏書北海王祥初遷大將軍録尚書事祥已拜命其夜有暴風震電拔木倒立其庭中桐樹大十圍倒立本處天威如此識者知其不終才伎庸劣不涉文史三國典略北齊以并省尚書令髙阿那肱為録尚書事那肱才伎庸劣不涉文史識解常在士開下而姦巧計數亦不逮士開天火示不復用徵祥記晉元興元年尚書下舍火是時桓玄用事出鎮姑孰名雖在外實遙録尚書故天火示不復用也尚書令後漢百官志尚書令一人千石本注曰承秦所置武帝用宦者更為中書謁者令成帝用士人復故掌凡選署及奏下尚書曹文書衆事晉職官志尚書令秩千石假銅印墨綬冠進賢兩梁冠納言幘五時朝服佩水蒼玉食奉月五十斛受拜則䇿命之以在端右故也太康二年始給賜絹春三十匹秋七十匹綿七十斤元康元年始給菜田六頃從騶六人立夏後不及者食奉一年始賈充為尚書令以目疾表置省事吏四人省事蓋自此始晉百官表注尚書令一人唐虞官也是謂文昌天府銅印墨綬五時服納言赤幘進賢兩梁冠佩水蒼玉官品第三俸月四十五斛領都揔攝諸曹出納王命晉公卿禮秩尚書令拜受命皆䇿命薨則於朝堂發哀若古之冡宰以在端右故也裴秀李徹衛瓘王戎樂廣王堪髙光荀藩和郁皆為尚書令漢官典職尚書令主贊奏揔典綱紀無所不統秩千石故公為之者朝會不陛奏事增秩二千石天子所服五時衣賜尚書令其三公列卿將大夫五營校尉行復道中遇尚書令僕射左右丞皆回車豫辟衛士傳不得忤臺官臺官過乃得去漢尚書稱臺魏晉以來為省齊職儀秦漢之世委政公卿尚書令之職掌封奏令贊文書僕射主關決令不在則僕射奏下其事魏氏重內職八座尚書任同六卿舜舉八元八凱以隆唐政故號八座為元凱謂以賢能用事義如昔也齊百官志無令則左右僕射為臺主與令同宋百官志尚書令任揔機衡徐廣車服儀制尚書令軺車墨耳後户隋百官志梁尚書省置令一人尚書掌出納王命敷奏萬幾令揔統之唐百官志尚書令一人正二品掌典領百官其屬有六一曰吏部二曰户部三曰禮部四曰兵部五曰刑部六曰工部兵部為前行刑户為中行工禮為後行行總四司以本行為頭司餘為子司太宗在藩日嘗為尚書令其後人臣莫敢為遂廢其官廣德元年代宗以親賢有大勳特拜尚書令六典尚書令一人正二品秦置尚書有令丞屬少府漢因之武昭之後其任稍重漢書云宣帝特任中尚書元帝時𢎞恭石顯相繼為中書令元帝被疾不親政事遂委任焉及前將軍蕭望之領尚書事知顯專權邪辟建言以為尚書百官之本國家樞機宜以通明公正處之武帝遊宴後庭故用宦者非古制也宜罷中尚書宦官中尚書謂中書及尚書也中書典尚書奏事故連言之及光武親揔吏職權歸尚書三公但受成事而已自魏至晉宋齊秩皆千石品並第三梁加秩中二千石班第十六陳加品至第一後魏北齊及隋品皆第二皇朝因之服鷩冕八旒七章三梁冠後漢以尚書令僕及六曹尚書為八座魏氏省為五曹則僕射有二若僕射省一掌則尚書有六率以為常今則以二丞相及六尚書為八座總領百官儀刑端揆其屬有六尚書法周之六卿一曰吏部二曰户部三曰禮部四曰兵部五曰刑部六曰工部凡庶務皆會而決之初秦變周法天下之事皆決丞相府置尚書於禁中有令丞掌通章奏而已漢初因之武宣之後稍以委任及光武親揔吏職天下事皆上尚書與人主參決乃下三府尚書令為端揆之官魏晉以來其任尤重皇朝武德中太宗初為秦王嘗親其職自是闕不復置其國政樞密皆委中書八座之官但受其成事而已五代職官志梁開平三年三月詔升尚書令為正一品按唐六典正二品是時將授趙王鎔此官故升之國朝官品令尚書令正一品以頭軔乘輿輪後漢申屠剛遷尚書令光武嘗欲出遊剛以隴蜀未平不宜宴安逸豫諌不見聽以頭軔乘輿輪遂止識亡書前漢張安世以父任為郎天子行幸河東嘗亡書三篋詔問莫能知唯安世識之某作某事後購求得書以相校無所遺失奇其才擢為尚書令三獨坐後漢尚書令主贊奏事揔領紀綱無所不統與司𨽻校尉御史中丞朝會皆專席而坐京師號曰三獨坐習故事侯霸字君房光武徵霸與車駕會壽春拜尚書令時無典故朝廷又少舊臣霸明習故事收録遺文條奏前世善政法度有益於時者皆施行之每春夏寬大之詔奉四時之令皆霸所建天下樞要韋彪曰天下樞要在於尚書補益王政鄭𢎞字巨君為尚書前後所陳有補益王政者皆著之南宫以為故事明習故事號為富贍司馬彪續漢書黃瓊字世英遷尚書令明習故事號為富贍處職機密數納忠諌郭伋遷尚書令處職機密數納忠諌諌捶撲近臣申屠剛為尚書令時內外羣官多帝自選舉加以法理嚴察職事過若尚書近臣乃至捶撲曳於前羣臣莫敢正言惟剛每極諌也送者不出郭門陳蕃為豫章太守性方峻不接賔客徴為尚書令送者不出郭門深見任用東觀漢記侯霸為尚書令深見任用明習漢家舊事樊凖為尚書令明習漢家舊事周密畏慎謇謇多直言申屠剛為尚書令謇謇多直言無所屈撓節儉自守韓稜為尚書令以節儉自守臺閣舊習黃香遷僕射月餘為尚書令增秩二千石上惜其幹用臺閣舊習遂見尊重香亦勤力憂公畏慎周密每月奏議所建書未嘗流布有蹇蹇之節謝承後漢書左雄順帝立虞詡薦之曰今公卿拱默為賢盡節為愚至相戒曰白璧不可為容容多後福伏見議郎左雄有王臣蹇蹇之節由是拜尚書令奏崇經術郡國耆儒年六十以上為郎不滿四十不得察舉若茂才異行不拘年齒帝從之有廣陵孝亷徐淑年未及舉臺郎疑而詰之對曰詔書曰有如顏子子奇不拘年齒是故本郡以臣充選郎不能詰雄詰之曰昔顏子聞一知十孝廉聞一知幾邪淑不能對乃譴去郡守自是持守莫敢輕舉自雄在尚書天下不敢妄選十餘年間稱為得人詰孝廉上奏召名儒為博士雄又奏召海內名儒為博士使公卿子弟為諸生有志操者加俸祿汝南謝廉河南趙建年始十二各能通經雄并奏拜童子郎於是負書來學雲集京師臺閣以奏章為故事雄掌納言多所匡肅每有奏章臺閣以為故事韓厥之舉初雄薦周舉宣光為尚書又舉馮直為將帥而直常坐贓受罪而舉以此劾雄雄悅曰吾曾事馮直父又與直善今宣光以此奏吾乃韓厥之舉也由是天下服焉賜劒書姓名郅壽為尚書令初壽為僕射章帝賜諸尚書劒惟壽等三人手自署姓名尚書令韓稜楚龍淵僕射郅壽蜀漢文尚書陳寵濟南鍛成時論者為之説以稜淵深有謀故得龍淵壽明逹有文章故得漢文寵敦謹不外見故得鍛成其見異如此言旨切直任昉為尚書令職典樞密常竭忠為國數條便宜譏刺時政以補闕失言皆切直剪邪截曲不撓強臣劉祐拜尚書令正身機密剪邪截曲不撓強臣旌賢退惡羊陟拜尚書令明審選舉旌賢退惡拔擢天下英俊衛良拜尚書令每當選舉拔擢天下英俊及二千石長吏功多者用之進善嫉惡不阿豪勢楊淮拜尚書令平心正直選舉髙妙進善嫉惡不阿豪勢視尚書如參佐衛瓘為尚書令加侍中下臺曰瓘常視尚書如參佐視議郎如掾屬治身無嫌唐仲謙唐約字仲謙拜尚書令自典樞機數有直言美䇿以補察主上每作表疏皆手自書之處官任職不言貨利之事當公法不阿所私京師號曰治身無嫌唐仲謙厥德仁明郭喬卿郭賀字喬卿為尚書令百姓歌之曰厥德仁明郭喬卿中正朝廷上下平條所奏以為故事陳忠為尚書令數進忠言辭旨𢎞麗前後所奏悉條於宫闕以為故事禮無稱萬歲之制韓稜入為尚書令以才能稱竇憲擊胸奴還尚書以下議欲拜憲伏稱萬歲稜正色曰夫上交不諂下交不瀆枉道以事人非所以立身且禮無稱萬歲之制左右皆慙天下皆慎選舉張璠漢紀左雄為尚書令限年四十先試經然後舉孝廉故雄為令在位者各肅清時稱曰左伯豪為尚書天下慎選舉在位肅清上天下精選楚國先賢傳左雄為尚書令天下精選言其人不素餐也乞留宿衛漢雜事黃香為東郡太守乞留宿衛拜尚書令居中持重魏志荀彧為漢侍中守尚書令常居中持重太祖雖征伐在外軍國大事皆與彧籌焉名重天下彧自為尚書令嘗以書陳事臨薨皆焚毁故案奇䇿密謀不得盡聞又非正道不用名重天下莫不以為儀表海內英才咸宗焉焚毁故案上一荀令之論人久而益信彧又舉荀攸可以代以後攸為尚書令亦推賢進士太祖曰一荀令之論人久而益信吾沒世不忘不稱職則請就黜陳矯為尚書令魏明帝卒至尚書門矯問曰陛下欲何之帝曰欲案行文書爾矯曰此臣職分非陛下所宜臨若不稱職則請就黜帝慙回車為後人所思晉樂廣為尚書令無當時稱然為後人所思端右之職太熙元年詔曰夫揔百揆之得失管王政之開塞者端右之職也是以自漢以來每選此官常慎其人議郎王戎清儉履道庸勳著于己試其以戎為尚書令空函桓溫素忌殷浩因其北征軍敗乃上疏請擯浩於荒裔竟坐廢為庶人徙於東陽之信安縣後溫復欲以浩為尚書令遺書告之浩欣然許之將答書慮有謬誤開閉者數十竟達空函大忤溫意由是遂絶持心平實典略荀彧折節待士坐不纍席其在臺閣不以私欲撓公意彧有羣從一人才德實薄或謂彧曰以君當事不可以為議郎耶彧笑曰官者表才也若如來言衆人謂我何其持心平實皆此類也坐處三日香襄陽耆舊傳劉季和曰荀令君至人家坐處三日香里啼巷哭後漢尚書左丞潘朂作尚書令荀氏碑文曰君生長世家祗訓法度注焉若洪河渺渺不可竭確乎若華山亭亭不可拔也年五十卒男女老幼里啼而巷哭駮議合上意永平七年宋均為尚書令忠正直言數納䇿謀每駮議未嘗不合上意外愚內智外怯內勇外弱內強魏氏春秋荀攸字公逹為尚書令太祖每稱曰公逹外愚內智外怯內勇外弱內強不伐善無施勞智可及愚不可及雖顏子寧武不能過也旬日之中事多停滯蜀志費褘字文偉代蔣琬為尚書令于時戰國多事衆務煩劇禕識悟無遺每省讀書記舉目暫視已究其意旨其速數倍於人亦不忘常以朝餔聽事其間接納賔客飲食嬉戲加之博奕每盡人之歡事亦不廢董允代禕為尚書令旬日之中事多停滯允乃歎曰人才力相縣若此非吾所及衆望漸服蔣琬字公琰諸葛亮每言公琰託志忠雅當與吾公贊王業也密表後主臣若不幸後事宜以付琬卒以琬為尚書令時喪元帥逺近危悚琬出類拔萃處羣寮之右既無戚容又無喜色神守舉止有如平常由是衆望漸服躬履清儉不治産業劉巴字子初代法正為尚書令躬履清儉不治産業又自以歸附非素懼見猜嫌恭默守道退無私交非公事不言為政不煩號為清能吕文字季陽代董允為尚書令庶事無留門無停賔又歷職內外治身儉約謙靜少言為政不煩號為清能然持法刻深好用俗吏故聲名損於郡縣時在位四載為當世名公晉裴秀為尚書令秀創制朝儀廣陳刑政朝廷多遵用之以為故事在位四載為當世名公歷職內外在公退食李徹為尚書令雖歷職內外而在公退食家至貧儉兒病無以市藥上賜錢十萬二令君之美荀朂守尚書令課試令史以下覆其才能有暗於文法不能決疑處事者即時遣出帝嘗謂曰魏武帝言荀文若之進善不進不止荀公逹之退惡不退不休二令君之美亦望於君也與謝安共掌朝政王彪之字叔虎為尚書令與謝安共掌朝政安每稱曰朝之大事衆不能決者咨之王公不得判判斷甚樂王儉為侍中兼尚書令鎮軍每上朝令恆有三五十人隨上咨事辨柝未嘗壅滯禇彥回時為司徒録尚書笑謂儉曰觀令判斷甚樂儉曰所以得厝私懷實由稟明公之言之化以法馭下衛瓘拜尚書令性嚴整以法御下視參佐尚書郎若掾屬納言之官出領牧伯熊遷啓曰伏見吏部以太尉荀組為尚書令復領荆州牧自三代以來未聞以納言之官而出領牧伯者舉朝憚卞壼晉中興書卞壼為尚書令司徒王導稱疾不朝壼奏導專任無敬事寢不行舉朝憚之抗志髙亮才鑒博雅刁協遷尚書令詔曰協抗志髙亮才鑒博雅朕甚嘉之揔事此三者荀朂集昔六官所掌冡宰為首秦公卿常以丞相御史兼官今者尚書令揔事此三者非臣駑暗所宜忝竊崇上抑下刁協為尚書令性剛亮每務崇上抑下中宗甚信重之揔括百揆憲範王猷謝石為尚書令上疏遜位曰尚書令國之冡司揔括百揆憲範王猷式是羣辟故必簡德而拔量才而授攝事干寶晉紀王述不拜中書監患腳就拜尚書令於府攝事何為復讓沈約晉書王述得官無所辭為尚書令子坦之勸讓述曰汝言我不堪邪坦之曰非也但克讓自是美事耳述曰既云堪何為復讓揔參機衡出納朝政晉起居注武帝詔曰尚書令百揆之首揔參機衡出納朝政治績之所由也車騎將軍賈充忠允清正通理經逺宣迪文武謨勳𢎞著其以充守尚書令車騎如故千里之應樞機在身摯虞尚書令針舜納大麓七政以齊內成外平風雨不迷補我衮闕闡我王猷王猷允塞四海咸休雖聖雖明必賴才良無曰我智官不能任發言如絲其出如綸千里之應樞機在身飛白題壁宋書王僧虔為尚書令嘗為飛白書題尚書壁曰圓行方止物之定質修之不已則溢髙之不已則躓引之不已則絶是故去之宜疾當時嗟賞以比座右銘猛獸入郭武帝踐阼王瑩遷尚書令時有猛獸入郭上意不悅以問羣臣皆莫能對瑩在御莚乃斂板答曰昔夔擊石拊石百獸率舞陛下膺籙御圖武象來格帝大悅衆咸服焉與僕射並受詞訴徐湛之為尚書僕射令何尚之以湛之國戚任遇隆重欲以朝政推之湛之以令事無不揔又以事歸尚之互相推委御史中丞袁淑奏並免官詔乃使湛之與尚之並受詞訴尚之雖為令以相事歸湛之納言加首鳴玉在腰梁何敬容為尚書令尊預機密後以罪免職復起為金紫光祿大夫未拜又加侍中敬容舊時賔客門生喧譁如昔會稽謝郁致書戒之曰昔君侯納言加首鳴玉在腰回豐貂以步文昌聳髙蟬而趨武帳不此時薦才拔士少報聖主之恩今人所以頗猶冇踵君侯之門者未必皆感惠懷仁冀君侯之復用也夫在思過之日而復用之意未可為智者説矣君侯宜杜門念失無有所通貪吝為時所嗤鄙敬容為尚書令貪吝為時所嗤鄙其書名敬字則大作茍小為文容字則大為父小為口陸倕戲之曰公家茍既甚大父亦不小敬容遂不能答又多漏禁中語故嘲誚日至嘗有客姓吉敬容問與邴吉逺近答曰如明公之與蕭何乘小車就席齊書謝朏因裴徵為司徒尚書令朏辭腳疾不堪謁仍角巾自輿詣雲龍門謝既見乘小車就席尊官曹羲九品議尚書令尊官也親作納言易曰樞機之發榮辱之主也體儀玉立山濤啓事尚書令李胤遷處缺宜得其人征南將軍羊祜體儀玉立可以整肅朝廷三人皆民望又云有疾若作大將軍雖不須筋力戎馬間猶宜得強健者征南大將軍衛缺直正靜一中書監荀朂逹於事物三人皆民望不審可參舉否為吳歌有慙色語林王恭嘗寓于司馬道子室尚書令謝石為吳歌恭曰居端右之重席宰相之座而效流俗之音乎石有慙色真賢人魏荀攸為尚書令從征孫權道死太祖言則流涕曰孤與荀公逹周旋二十年無毫毛可非者真賢人也名冠百僚會稽先賢傳沈勳徵詣南宫賜酒拜尚書令時節臨辟雍名冠百僚尖頭奴後魏古弼為尚書令太武大閲將校獵於河西弼留守詔以肥馬給騎人弼命弱者太武大怒曰尖頭奴敢裁量朕也還臺先斬此奴弼頭尖太武常名之曰筆頭時人呼為筆公屬官惶怖懼誅弼告之曰吾謂事君使田獵不逞盤遊其罪小也不備不虞使戎冦啓釁其罪大也今北狄孔熾南虜未滅狡焉之志窺伺邉境是吾憂也方選肥馬備軍實為不虞之逺慮茍使國家冇利吾寧能避死乎明主可以理干此自吾罪非卿等之咎太武聞而嘆之曰冇臣如此國之寶也平原帶地資緒極天後魏溫子升為臨淮王彧謝開府尚書令表但以平原帶地資緒極天出臨侯服既乏刺舉之能入踐帝閽又無應對之美入踐帝閽上冒釐綜之重負學製之談梁范雲為栁司空讓尚書令表中寢軫心方餐凝慮寧可冒釐宗之重負學製之談將玷朝徽匪伊身議揚職萬幾總任百揆北齊邢子才為文襄皇帝讓尚書令表揚職萬幾總任百揆相御庶物準的羣僚可以助日月之光華增天地之髙厚反鑒取照匹此何難倒裳求領方之為易爵人以世非盛德之舉又表晝覽泰山不假秋毫之察夜仰列宿豈籍燭龍之明爵人以世既非盛德之舉公門有私故是凌夷之運非經略之才隋薛道衡論陳必敗之勢曰為國之道在於寄任彼之公卿備員而已尚書江揔唯事詩酒本非經略之才天府文章萬方之藪江揔讓表竊以天府文昌萬方之藪天官冡宰無所不統禮尊三獨事昭百揆曠職云久三十餘載一旦開置必資望實豈期廷典私偏濫庸菲薄陛下聽覽餘辰曲垂昭納遂斯反汗髙選具瞻則敝蓋敝帷便臣暮齒歲制月制賖臣皓髮昔之冡司今日端揆又除尚書令謝臺啓昔之冡司今日端揆頃同台衮無人則闕臣之朽薄安可叨賁謹當奏承夜月兾奉三思之旨聲寄浮雲方祈九天之路司會治本冢宰朝端又除尚書令斷表後啓云司會治本冡宰朝端縉紳所屬儀刑攸在焉復表不受唐代宗以郭子儀為尚書令子儀讓以太宗昔居此官送纍聖相承曠而不置詔不允敕令宰相百官為尚書省上子儀復表讓不受許之左右僕射前漢百官表僕射秦官自侍中尚書博士郎皆有古者重武官有主射以督課之軍屯吏騶宰永巷宫人皆有取其領事之號孟康曰皆有僕射隨所領之事以為號也軍屯吏則有軍屯僕射永巷則有永巷僕射成帝建始元年初置尚書五人以一人為僕射主封門掌授廩假錢榖後漢百官志尚書僕射一人六百石本注曰署尚書事令不在則奏下衆事蔡質漢儀曰凡三公列卿將大夫五營校尉行復道左右丞郎御史中丞侍御史皆豫相回避衛士傳不得忤臺官臺官過後乃得去臣昭案獻帝分置左右僕射建安四年以榮卲為尚書令左僕射衛臻為右僕射是也晉職官志僕射服秩印綬與令同案漢本置一人至獻帝建安四年以執金吾榮邵為尚書左僕射分置左右僕射或不兩置但曰尚書僕射令闕則左為省主若左右僕射並闕則置尚書僕射以主左事宋百官志古者重武官以善射者掌事故曰僕射僕射者僕役於射事也秦世有左右曹諸吏官無職事將軍大夫以下皆得加此官漢獻帝建安四年以執金吾榮邵為左僕射衛臻為右僕射二僕射分置自此始也南齊書百官志左僕射領殿中主客二曹事諸曹郊廟園陵車駕行幸朝儀臺內非違文武舉補滿敘疾假事其諸吉慶瑞應衆賀災異賊發衆變臨軒崇拜改號格制蒞官銓選凡諸除署功論封爵貶黜八議疑讞通關案則左僕射主右僕射次經之黃案左僕射上署右僕射次署朱符見字經都丞竟右僕射橫畫成目左僕射畫令畫右官闕則以次拜畫若無左右則直置僕射在其中間揔左右事隋百官志梁武帝時尚書省僕射副令又與尚書分領諸曹令闕則左僕射為主其祠部尚書多不置以右僕射主之若左右僕射並闕則置尚書僕射以掌左事置祠部尚書以掌右事後齊僕射職為執法置二則為左右僕射皆與令同左糾彈而右不糾彈隋開皇三年詔尚書左僕射掌刺史吏部禮部兵部三尚書事御史糾不當者兼糾彈之尚書右僕射掌刺都官度支工部二尚書又知用度唐百官志左右僕射各二人從二品掌統理六官為令之二令闕則揔省事劾御史糾不當者龍朔二年改左右匡政光宅元年曰文昌左右相開元元年曰左右丞相天寶元年復舊唐官品志僕射為執法置二人則為左右皆與令同左糾彈而右不糾彈唐新語自武德至長安四年以前僕射並是正宰相故太宗謂房玄齡等曰公為宰相當須大開耳目求訪賢哲即其事也神龍初豆盧欽望為僕射不帶同中書門下三品不敢參議政事後加知軍國事韋安石為僕射東都留守自後僕射不知政事六典尚書左丞相一人右丞相一人並從二品漢官儀僕射秩六百石公為之加至二千石自晉以後給省事吏三人魏晉宋齊秩皆六百石品並第三梁品猶第三秩中二千石班第十五陳品加至第二後魏北齊及隋品皆從第二皇朝因之自漢以來章服並與今同掌總領六官紀綱百揆以二令之職今則專統焉初亦宰相之職開元中張説兼之後罷知政猶為丞相自此以後遂不知國政國朝大中祥符五年太常禮院上準詔定僕射赴上儀前一日都省設新舊僕射次於都堂後衆官次於廊廡其日衆官集省內以俟中書樞密院親王使相舊不赴僕射自正衙退將至都堂諸曹史序立迎拜僕射至都堂門外下馬諸行尚書丞郎郎中員外郎並門內分立迎候僕射北向揖其兼內職及知制誥者不迎候禮生引新舊僕射出次對拜禮生諸僕射升堂分東西坐降階就褥位對立新僕射就正位再拜復位對拜畢升堂如上僕射一員降階赴位拜訖升堂坐牙牀判案六行主事讀案堂上都事接案搢笏轉案僕射揖搢笏頂筆判準式凡三道如上儀判訖禮生引對拜賀謝舊僕射歸次新僕射立於都堂上面南引贊官告班致賀中丞以下拜僕射答拜百官退僕射升堂坐諸司賀訖降坐還次僕射與諸司三品尚書省御史臺四品兩省六品以上就食畢退如常儀元祐官品令左右僕射從一品春明退朝録國朝宰相為僕射魏公仁浦趙令薛文惠沈恭惠宋惠安李文正吕文穆吕文惠李文清張司空王文正向文簡王兾公冦萊公吕許公王沂公賈魏公陳恭公韓魏公文潞公富鄭公曾魯公二十二人樞相為僕射陳文忠曹襄悼張榮僖王康靖四人樞密使為僕射石元懿一人不歷尚書侍郎便為僕射唐姚南仲不歷尚書侍郎而入省便為僕射履聲前漢鄭崇字子遊為尚書僕射數直諫諍上初納用之每聞曳革履上笑曰我識鄭尚書履聲為人所譛奏上責崇曰君門如市何以欲禁切主上崇對曰臣門如市臣心如水上怒下崇獄死獄中當車諌遊田後漢明帝數幸廣成苑尚書僕射鍾離意以為從禽廢政常當車諌盤樂遊田之事天子悟其言即時還宫上疏諌威刑太過魏徐宣為左僕射時尚方令坐事被考劾宣上疏諌威刑太過又諌作宫殿窮盡民力帝加嘉納鍾離尚書若在此殿不立後漢鍾離意為僕射嘗以上疏出為魯相後德陽殿成百官大會帝思意謂公卿曰鍾離尚書若在此殿不立上書陳竇憲驕恣郅壽為僕射時大將軍竇憲以外戚威傾天下憲使門生齎書詣壽有所請託壽即送詣獄前後上書陳憲驕恣引王莽以戒國家皂襜東觀漢記鮑永字君長拜僕射行將軍將兵集河東永好文得行將軍常皂襜路稱鮑尚書兵排閣入謀鍾離意别傳意為僕射其年丐奴羌胡歸義來降詔賜縑三百匹尚書郎暨酆受詔誤以為三千匹詔大怒鞭之殿下欲死諸尚書莫不懾怖失色意獨排閣入誎曰陛下德被四海恩及夷狄是以左衽之徒皆頓首服義鄷小子受詔誤賞臣聞刑疑從輕今陛下以鄷誤賞發雷霆之威殺鄷海內遐邇謂陛下貴微財而賤人命愚臣不安明帝以合大義恚損怒消帝謂意曰非鍾離尚書朕幾降威於此郎不視奏呈文書魏志桓范薦徐宣為左僕射後加侍中光祿大夫車駕幸許昌宣揔統留事帝還主者奏呈文書語曰吾省與僕射何異竟不視典選舉陳泰為左僕射典選舉官之師長李傕等欲賈詡為尚書僕射詡曰尚書僕射官之師長詡名不素重非所以服人也國之司直我之周昌毛玠字孝先為尚書僕射時太子未定立臨淄王植有寵玠諫曰近袁紹以嫡庶不分覆宗滅國廢立大事非所宜聞會玠起更衣太祖謂左右曰國之司直我之周昌暫起復卧如是數歲魏略李豐字安國為侍中僕射在臺閣常多託疾時臺制告百日當解祿豐未滿百日暫起復卧如是數歲中臺近官吳志諸葛恪既定南越孫權使尚書僕射薛綜勞軍曰故遣中臺近官迎致犒賜三代晉太傅謝安生映映生子琨三代為僕射並有文集四辭而後受葛顗代陳泰為僕射四辭而後受清虛恬簡山濤清虛恬簡轉左僕射纍陳封禪魏舒太康初拜右僕射于時衛瓘山濤張華等以六合混一宜同古典封禪泰丘前後纍陳帝不許中正舊德武帝太康四年詔吏部掌敘人倫治化之本也宜得中正舊德尚書右僕射魏舒寬大洪毅潛通有才識其以舒為左僕射領選曹領選曹上廣登賢俊經始萬幾永昌元年詔尚書分置左右僕射所以廣登賢俊經始萬幾護軍周顗可左僕射領軍王邃可右僕射蒞官盡心尚書髙陽王圭忠允善政恩量洪濟蒞官盡心所居著稱其以圭為右僕射揔樞機之重羊祜泰始初詔曰夫揔齊機衡允釐六職朝政之本也祜秉德清劭忠亮純茂經緯文武謇謇正直雖處腹心之任而不揔樞機之重非垂拱無為委任責成之意也其以祐為尚書右僕射秉德清劭經緯文武上三日僕射周顗以雅望獲海內盛名後頗好酒為僕射略無醒日時人號為三日僕射庾曰視周侯末年可謂鳳德之衰矣吏曹晉武以僕射山濤領吏曹後依擬至今或領焉參贊百揆齊王儉讓左僕射表曰霸府方隆起居元佐國朝草昧參贊百揆暮出朝還晉中興書顧和康帝即位為尚書僕射以母老固辭詔敕特諭暮出朝還其優遇如此君便是一人紀瞻字思逺時為右僕射肅祖常引瞻內殿慨然憂天下曰社稷之臣欲得十人如何因數之云君便是一人瞻謝曰臣不敢聞命肅祖曰方欲善語云何復崇謙讓耶瞻以年在懸車自陳老疾詔曰豈朕德薄不足以與為治乎才學文章王珣為左僕射領吏部時烈宗雅好典籍深欽愛之與殷仲堪徐邈並以才學文章為上所服風流之美桓玄答道子箋云王珣名悟疏徽風流之美雖通於同異才用不盡然君子在朝可益自多也當時稱為強記刁協除左僕射中興草創制度未立朝臣無練習故儀者惟協以久在中朝加性聰朗多諳故事朝廷憲體出入威儀唱贊一皆稟於協當時稱為強記年三十七衆論為美晉諸公讃司馬圭少有令望早歷顯職晉受禪為右僕射時年三十七衆論以為美上問獄不對沈約宋書王敬𢎞為僕射關署文案初不省讀常預聽訟上問疑獄敬𢎞不對上變色問左右何故不以訊牒問僕射敬𢎞曰臣乃得訊牒讀之政自不解上不悅乘船至平昌門劉延孫為左僕射疾病不任拜起上使乘船自清溪至平昌門仍入尚書下舍奏彈謝靈運王𢎞為僕射奏彈康樂侯謝靈運人力桂輿淫其嬖妾殺輿江涘棄尸東流請免官削爵主收付大理治罪內臺舊體不得用風聲舉彈此事彰赫暴之朝野不敢拱默武帝令免官而已如汝人才皆已令僕南史劉祥少好文學輕言肆行不避髙下於朝士多所貶忽王奐為尚書僕射祥與奐子融同載見路人驅驢祥曰驢汝好為之如汝人才皆已令僕兄弟袁樞好學手不釋卷謹慎周密清白自居為左僕射弟憲幼聰敏好學有雅量為右僕射臺省目樞為大僕射憲為小僕射朝廷榮之大僕射小僕射上二王持平不送不迎齊王延之轉左僕射宋德既衰太祖輔政朝野未清人懷彼此延之與尚書王虔中立無所去就時人為之語曰二王持平不送不迎太祖以此善之南士少居此職帝欲用張緒為右僕射以問王儉儉曰緒少有清望誠美選也南士由來少居此職禇彥回曰儉少年或未憶耳江右用陸玩顧和皆南人也儉曰晉氏衰政不可為則有公輔之量趙善為右僕射性溫恭有器局雖位居端右而深自謙退其職務克舉則曰某官之力有罪責則曰善之咎也時人稱其有公輔之量換榻元順除右僕射及上省登階向榻見榻甚故問都令史徐仵起仵起曰此榻曽經先王坐順即哽塞涕泗交流久而不能言遂令換之黑面僕射陽平王子欽字思若纍遷右僕射色黑故時人號為黑面僕射騶唱不入宫門北史郭祚遷尚書右僕射時議定新令詔祚為侍中黃門參議刋正故事令僕中丞騶唱而入宫門至於馬道及祚為僕射以為非盡敬之宜言於帝納之下詔御在太極騶唱至上東門御在朝堂至司馬門騶唱不入宫門自此始也府庫關鑰一以委之三國典略東觀以徐騰兼左僕射府庫關鑰一以委之廢人飲酒北齊王晉明豪侈有俠氣留心經史招引賔客嘗為右僕射百餘日便謝病而退告人云廢人飲酒安能作刀筆吏批故紙乎給田均平高隆之為右僕射時初給民田貴勢皆占良美貧弱咸受瘠薄隆之啓髙祖悉更反易仍得均平損益舊章後周周惠逹為右僕射自關右草創禮樂缺然惠逹與禮官損益舊章是以儀䡄稍備魏文帝因朝奏樂顧謂惠逹曰此卿之功也任居端揆李遠除右僕射辭太祖曰遠秦隴匹夫才藝俱闕平生企望不過一郡守爾遭逢際會得奉聖明主貴臣遷以至於此今位居上列爵邁通侯受委方面生殺在手非直榮寵一時亦足光華身世但尚書僕射任居端揆今以賜授適所以重其罪責明公若欲全之乞寢此授太祖曰公勳德兼美朝廷欽屬選衆而舉何足為辭且孤之與公義等骨肉豈容於官位之間便至深讓非所望也逺不得已方拜職妙選陳徐陵讓左僕射初表陵聞七十二嵗揚雄擬經六十三年平津對䇿若斯強壯無歎耆老若漢武好少則微臣已老矣若周文愛老則有此羣才伏願天明更謀梓匠永其妙選稱是能官試船覆沒魏吉杜畿為僕射受詔作樓船於陶河試船遇風覆沒帝為之流泣望墳掩淚後魏李沖高祖時為尚書僕射卒葬於覆舟山近杜預冡高祖之意也後車駕自鄴還洛經沖墓左右以聞高祖卧疾望墳掩淚衣冠傾縱蕭方三十國春秋劉裕為太尉既拜朝賢畢至僕射謝琨後來衣冠傾縱頗有傲慢之容裕甚不平乃謂曰謝卿今日可謂旁若無人琨對曰明公將崇伊周之寄方使四方解襟謝琨何人而敢獨異乎以手板披橫襟袖皆散裕意悅時人亦莫不奇之也門列戟隋左僕射髙熲子𢎞德封應國公時制三品以上門皆列戟𢎞德申牒請戟栁彧判曰僕射之子更不異居父之戟槊已列門外尊有壓卑之義子有避父之禮豈容外門既設內閣又施事竟不行熲聞而歎服國之宰輔不可親細務楊素為右僕射與髙熲嘗專朝政後文帝漸忌素詔曰僕射國之宰輔不可親細務但三五日一度向省平論大事外示崇重實奪其權也解事僕射唐戴至德為僕射與劉仁軌更日受詞訟嘗有老母經省陳辭至德已收牒省視老母前曰本謂之解事僕射所以來訴公乃不是解事僕射請却付牒來至德笑而還之議者尤稱其長者呼裴監而不名髙祖受禪謂裴寂曰使我至此公之力也拜尚書右僕射賜以服玩仍詔尚書除食奉外每日賜寂御膳髙祖視朝必引與同坐入閣則延之卧內言無不從呼為裴監而不名當朝貴戚禮莫與比逍遙一代寂遷左僕射頓首言臣初發太原以有兹旨清平之後許以退耕今四海人安伏願賜臣骸骨髙祖泣下沾襟曰今猶未也要相偕老耳公為台司我為太上逍遙一代豈不快哉持法稍深蕭瑀字時文拜右僕射內外考績皆委諸司會為羣僚指南庶務繁揔瑀見事有時偏駁而持法稍深頗為時議所少議事輒變易封倫太宗立拜右僕射始倫之歸蕭瑀數薦之及是瑀為左僕射每議事倫初堅定至帝前輒變易由是有隙貞觀元年遭疾卧尚書省帝親臨視命尚輦送還邸出入卧內長孫無忌帝以皇后兄又相友眷倚甚厚常出入卧內進尚書右僕射廣耳目訪賢材房玄齡進左僕射帝曰公為僕射當助朕廣耳目訪賢才比聞閲牒訟日數百豈暇求人哉乃敕細務屬左右丞大事關僕射引士咸得職杜如晦進右僕射仍領選與玄齡共釐朝政引士賢者下不肖咸得職當時浩然歸重領選上終當坐此李靖仕隋為殿內直長左僕射楊素拊其牀謂曰卿終當坐此後以取定襄功遷右僕射靖每參議恂恂似不能言以沉厚稱恂恂似不能言上三世居此官髙儉字士廉遷右僕射士廉三世居此官世榮其貴太宗幸洛陽太子監國命攝少師手詔曰端拱三川不憂關中者以屬卿也久之請致仕聽解僕射叱左右批薛懷義頰蘇良嗣遷文昌左相同鳳閣鸞臺三品遇薛懷義於朝懷義偃蹇良嗣怒叱左右批其頰曳去武后聞之戒曰苐出入北門彼南衙宰相行來毋犯之南衙宰相上撰封禪壇頌張説東封還為尚書右丞相詔説撰封禪壇頌刻之泰山以夸成功班爵同禮數異裴耀卿進左僕射俄改右僕射而李林甫代之至本省具朝服劒佩博士導郎官唱案禮畢就耀卿聽事乃常服以贊者主事導唱林甫驚曰班爵與公同而禮數異何也耀卿曰比苦眩不堪重衣又郎博士紛泊非病士所宜林甫默然慙居歲卒僕射巾裴冕拜左僕射性豪侈既素貴輿服食飲皆光麗珍豐櫪馬且數百金者常十數每廣會賔客不能名其饌自製巾子工甚人爭效之號僕射巾自用隔品致恭竇易直為左僕射以公潔自喜方執政未嘗引用親黨初元和中鄭餘慶議僕射上儀不與隔品官亢禮易直為中丞奏駮之及為僕射乃自用隔品致恭為時鄙笑交結權幸而得貴位元和中裴均為僕射於尚書省都堂上事其選印及呈孔目唱案皆使尚書郎為之又三品以上升階列坐四品五品及郎官御史拜於廳下然後召御史中丞左右丞升階答拜初開元中張説為大丞相因製儀注自極尊大自中書門下及諸三品以上官是日皆坐受拜或徵其所從來答曰聖厯中王及善豆盧欽望同日拜文昌左右丞相亦用此儀當時以説方承恩寵不敢復詰因為故事非舊典也均交結權幸而得貴位班列嘗踰位而立御史中丞盧坦請退之均不受坦曰姚南仲為僕射例如此均曰南仲何人坦曰南仲是守正而不交權幸者也尋罷坦為右庶子時人歸咎於均師長庶僚寶厯中左僕射李絳與御史中丞王璠相遇於道璠車不為之却因上言故事云左右僕射師長庶僚開元中以為左右丞相其後雖去三事機務猶㧾百司之權表狀之中不書其姓尚書以下庭禮數衙上日百寮列班宰相居上中丞御史列位於之崇特為殊異所以自武德貞觀以來聖君賢臣布政除弊不革此禮謂為合宜茍有不安尋亦合廢近來緣有才不當位恩加特拜者遂從簡略不用舊儀酌於羣情事實未當今或有僕射初除就中丞院門相見者即與就參何殊或中丞新授亦無見僕射處又參謁處或僕射先至中丞後來憲度乖宜尊卑倒置倘人才忝位自合别授賢良若朝命守官豈得有虧法制伏望下百寮詳定事體使永可遵行敕旨令兩省詳議兩省奏曰元和中伊慎沗居師長之位太常博士韋謙削去舊儀今李絳所論於體甚當然其時璠黨方盛旋致絳改官共寢其議詔虞世南製碑文貞觀四年右僕射杜如晦薨帝手詔著作郎虞世南曰朕與如晦君臣義重不幸淹從物化追念勳舊痛惜于懷卿體吾此意為製碑文後因食瓜而美愴然悼之遂輟食之半遣置之靈座焉半瓜置靈座上諫不可廢后禇遂良拜右僕射帝將立武昭儀召長孫無忌李績于志寧及遂良入或謂無忌當先諫遂良曰太尉國元勳有不如意使上有棄親之譏又謂績上所重當進曰不可司空國元勳有不如意使上有斥功臣之嫌曰吾奉遺詔若不盡愚無以下見先帝既入帝曰罪莫大於絶嗣皇后無子今欲立昭儀謂何遂良曰皇后本名家奉事先帝先帝疾執陛下手詔臣曰我兒與婦今付卿且德音在陛下耳可遽忘之皇后無它過不可廢帝不悅翌日復言對曰陛下必欲改立后者請更擇貴姓昭儀昔事先帝身接帷笫今立之奈天下耳目何帝羞默遂良因致笏殿階叩頭流血曰還陛下笏丐歸田里帝大怒命引出武氏從幄後呼曰何不撲殺此獠無忌曰遂良受顧命有罪不加刑會李績議異武氏立乃左遷遂良潭州都督不雨乞身張行成拜左僕射永徽四年三月不雨五月行成懼以老乞身制答曰古者䇿免乖罪已之義此在朕寡德非宰相咎乃賜宫女黃金器敕勿復辭行成固請帝曰公朕之舊奈何舍朕去耶泫然流涕行成惶恐不得已復視事受四品以下官拜李程自宰相出鎮徴為左僕射中謝日奏曰臣所忝上官禮前後儀注不同在元和長慶中僕射數人上日不受四品以下官拜近日再定儀注不同四品以下官悉許受拜王瀝竇易直已行之於前今御史臺云已奏聞太常寺定取十五日上臣進退未知所獲時中丞李漢以為受四品以下拜太重敕曰僕射上儀近以詳定所緣拜禮皆約令文已經施行不合更改宜準太和四年十一月六日敕處分程義學優深然性放蕩不修儀檢􅉸稽好戲而居師長之地物議輕之􅉸稽居師長之地上奏儀制李漢為中丞李程為左僕射以儀注不定表請定制先是太和三年兩省官同定左右僕射儀注御史中丞以下與僕射相遇依令致敬斂馬側立待僕射過僕射謝官日大夫中丞三院御史就幕次參見其觀象門外立班既以後至為重大夫中丞到班後朝堂所由引僕射就位傳呼贊導如大夫就到之儀班退贊導亦如之御史大夫與僕射道塗相遇則分道而行舊事左右僕射上日御史中丞吏部侍郎羅拜四年中書奏曰僕射受中丞侍郎拜則似太重答郎官以下拜則太輕起今後諸司四品以下官及御史臺六品以下并郎官並望準故事餘依元和七年敕可之至是因李程奏漢議曰左右僕射初上受左右丞諸曹侍郎諸司四品及御史中丞以下拜謹案開元禮及六典並無此儀注不知所起之由或以為僕射師長百僚此語亦無證據唯曹魏時賈詡讓官表中一句語耳且尚書令是正長尚無受拜之文故事與御史中丞司𨽻校尉號三獨坐伏以朝廷比肩同事聖主南面受拜臣下何安縱有明文尚須釐革故禮記曰君於士不答拜非其臣則答之况御史中丞殿中是供奉官尤為不可儀注令雖有隔品之文不知便是受拜否及御史大夫亦曾受御史以下拜今並不行蓋以禮數僣逼非人臣所安元和六年詔崔邠段平仲與當時禮官王涇韋公肅等同議其事理甚精詳今請舉而行之庶為折衷時程入省竟依舊議議者以漢奏為是檢校官從其班令狐楚自河東節度使入為吏部尚書檢校右僕射故事檢校官者便從其班楚以正官有品不宜從二品之外請從本班優詔嘉之賜靈壽杖李靖為右僕射以足疾上表乞骸骨言甚懇至太宗乃下優詔授特進在第攝養每三兩日至中書門下平章政事賜靈壽杖助是足疾也超擢太驟上章懇辭蕭俯長慶中守左僕射俯性介獨持法守正以已輔政日淺超擢太驟三上章懇辭復詔授吏部尚書俯又以選曹簿書煩雜非攝生之道改兵部尚書大水請免官唐休璟拜右僕射是歲秋大水休璟兩上表自咎請免官甚切辭多不載中宗竟不允手制答曰隂陽乖爽事屬在豫待罪私門難依來表尋遷中書令豈得與人主爭權柄戴至德遷右僕射時劉仁軌為左僕射每遇申訴寃滯者輒美言許之而至德先據理難詰未嘗與奪若有理者密為奏之終不顯已之斷決由是時譽歸於仁軌或以問至德答曰夫慶賞刑罰人主之權柄凡為人臣豈得與人主爭權柄哉後髙宗知而深歎美之不欲一物失所房玄齡代長孫無忌為左僕射既任揔百司虔恭夙夜盡心竭節不欲一物失所聞人有善若已有之明逹吏事飾以文學定法令意在寬平不以求備取人不以已長格物隨能收敘無隔卑賤論者稱為良相賜三傑詩宋璟為尚書右丞相而張説為左丞相源乾曜為太子少傅同日拜有詔大官設饌太常奏樂會百官尚書省東堂帝賦三傑詩自寫以賜之班列五代史劉昫為僕射性剛羣情嫉之乃共右散騎常侍孔昭序論行香次第言常侍之臣立行合在僕射之前疏奏下御史臺定例同光以來李琪盧質繼為僕射性質輕脫不能守師長之體故昭序輕言宰相馬裔孫以羣情不悅劉昫馮道欲微抑之乃責臺司檢例而臺司言舊不見例據南北班位次即當在前俄屬國忌將就列未定裔孫即判臺狀曰既有援據足可遵行各侍本官劉昫怒揮袂而退自後日臺司定例崔居儉謂南宫同列曰孔昭序言語是朝廷人揔不解語也且僕射是師長中丞大夫就班修敬常侍班在南宫六卿之下况僕射呼已前騎省年深望南宫工部侍郎如仰霄漢彼癡人舉止何取笑之深也衆聞居儉言紛議稍息文士哂裔孫堂判有援據二字政事僕射九國志唐李升世家楊渭建國以升為左僕射參政事乘削亂之後漸復紀綱修典禮抑強暴中外謂之政事僕射楊削皮楊思恭時兵革屢興國力空匱命思恭為録軍國事增山澤隴畝之稅魚鹽蔬果皆倍其算道路側目號曰楊削皮勿藥恐傷僕射吳越崔仁兾父詢善射仁兾方娠而母病詢欲飲以藥一夕夢人謂已曰勿藥恐傷僕射及覺以語詢詢疑其誑弗聽自篝火煮藥見鐺上有蛇蜿蜒然遽覆其藥而沒後果遷左僕射奉朝請國朝淳化四年李昉為左僕射罷知政事先是上召翰林學士張洎草制授昉左僕射罷相洎上言曰昉因循保位近霖霪百餘日陛下焦勞惕厲憂形於色昉居輔相之任職在調燮隂陽乖度如此而昉晏然自若無歸咎引退之意矧中臺僕射之重百寮師長如減於左位望輕重不侔因而受之何以勸人臣之盡節宜加黜削以警其臣上以昉耆舊不欲譴黜但令為右僕射奉朝請師長百僚至道元年吕蒙正以左僕射罷相上召謂曰僕射師長百僚朕以中書政事煩多俾均勞逸蒙正頓首謝中書都堂赴上大中祥符四年詔文昌揆路師長百僚位望攸崇典章具載惟中臺之赴上久廢舊儀在多士之式瞻曷明異數宜加論討庶别等威自今宰臣官至僕射並於中書都堂赴上不帶平章事者亦於本省赴上令太常禮院與崇文院檢討詳定儀注時宰相王旦自兵部尚書遷右僕射止於本廳受賀僕射赴上禮久廢上寵待輔臣故振舉之大耐官真宗皇帝時向文簡拜右僕射下日李昌武為翰林學士嘗對上謂之曰朕即位以來未嘗除僕射今日以命敏中此殊命也敏中應甚喜對曰臣今自早候對亦未知敏中何如上曰敏中門下今日賀客必多卿往觀之明日却對來勿言朕意也昌武候丞相歸來往見丞相謝客門闌悄然無一人昌武與向親徑入見之徐賀曰今日聞降麻士大夫莫不歡慰朝野相慶公但唯唯又曰自上即位未曾除端揆此非常之命自非勳德隆重眷倚殊越何以至此公復唯唯終未測其意又歷陳前世為僕射者勳勞德業之盛禮命之重公亦唯唯卒無一言既退復使人至庖厨中問今日有無親戚賔客飲食宴會亦寂無一人明日再對上問昨日見敏中否對曰見之敏中之意何如乃具對上笑曰向敏中大耐官向為僕射年月未曾考於國史先賜進士出身而後除東齋記事曹利用先賜進士出身而後除僕射乃知進士為貴也八座晉職官志後漢光武以六曹尚書并令僕二人謂之八座魏以五曹尚書二僕射一令為八座晉八座丞郎初拜皆沿漢舊制並集都省交禮遷職又解交焉謝靈運晉書古者重武事貴射御取其捷御如僕各置一人尚書六人謂之八座參攝百揆出內王命古元凱之任也宋百官志晉西朝八座丞郎朝晡詣都堂朝江左惟旦朝而已八座丞郎初拜並集都省交禮遷職又解交漢舊制也今唯八座解交丞郎不復解交也南齊百官志八座各置郎中令史以下魏官氏志天興元年置八部大夫於皇城四方四維面置一人以擬八座謂之八國隋百官志自晉以後八座及郎中多不奏事梁天監元年詔曰自禮闈凌替歷兹永久郎署備員無取職事粳粃文案貴尚虛間空有趨墀之名了無握蘭之實郎曹可依舊奏事自是始奏事矣隋髙祖省置令左右僕射各揔吏部禮部兵部都官度支工部等六曹事是為八座唐與隋同非賢莫居晉中興書蔡謨為尚書上疏曰八座之任非賢莫居望省樓唐崔日知歷職中外恨不居八座為太常卿於都事廳後起一樓正與尚書省相望時人謂之崔公望省樓比文昌劉洎上疏曰尚書萬幾實為政本是以八座比於文昌二丞方於管轄左右丞前漢百官志成帝建始四年初置尚書員五人有四丞後漢百官志左右丞各一人四百石本注曰掌録文書期會左丞主吏民章服及騶伯史右丞假署印綬及紙筆墨諸財用庫藏漢儀曰右丞與僕射對掌授廪假錢穀與左丞無所不揔漢官典職尚書左右丞揔典臺中綱紀無所不統續漢書百官志左丞掌録尚書吏人上章百官威儀右丞主録文書期會假署印綬及筆墨諸財用物漢官儀漢制八座丞郎並集都省交禮遷職又解交又尚書左右丞秩四百石遷刺史晉職官志左右丞自漢成帝建始四年置尚書而便置丞四人及光武始減其二唯置左右丞左右丞自此始也至晉不改晉左丞主臺內禁令宗廟祠祀朝儀禮制選用署吏給假右丞掌臺內庫藏廬舍凡諸器用之稟振民户租布刑獄兵器督録逺近文書章表奏事晉百官表注左右丞俸月三十斛宋百官志應劭漢官儀尚書令左丞揔領綱紀無所不統僕射右丞掌廪假錢穀南齊百官志左丞一人掌宗廟郊祠吉慶瑞應災異立作格制諸案彈選用除置吏補滿除遣注職右丞一人掌兵士百工補役死叛考代年老疾病解遣其內外諸庫藏穀帛刑害割業諍訟田地船乘廪拘兵士死叛考剔討補差分百役兵器諸營署人領州郡租布人民户移徙州郡縣併帖城邑民户割屬刺史二千石令長尉被收及免贈文武諸犯削官事白案右丞上署左丞次署黃案左丞上署右丞次署諸立格制及詳讞大事宗廟朝廷儀體左丞上署右丞次署隋百官志梁武帝尚書省置左右丞各一人佐令僕射知省事左掌臺內分職儀禁令報人章督録近道文書章表奏事糾諸不法右掌臺內藏及廬舍凡諸器用之物督録逺道文書章表奏事凡諸尚書文書詣中書省者密事皆以契囊盛之封以左丞印後齊左右丞一人唐百官志左丞一人正四品上右丞一人正四品下掌辨六官之儀糾正省內劾御史臺不當者吏部户部禮部左丞總焉兵部刑部工部右丞總焉龍朔元年改左右丞曰左右肅機咸亨元年復舊六典左丞一人正四品上右丞一人正四品下丞者承也言承助令僕揔理臺事也晉傅咸云左丞待奏彈八座魏晉宋以來左右丞銅印黃綬絳朝服進賢一梁冠自魏至宋齊品皆第六秩四百石梁左丞班第九右丞班第八並第四品秩六百石陳因之後魏北齊左丞正四品下右丞從四品上隋初左丞從四品上右丞四品下煬帝左右丞並正四品皇朝服絺冕六旒三章兩梁冠永昌元年為從三品如意元年復故掌管轄省事糾舉憲章以辨六官之儀制而正其百寮之文法分而視焉若左闕則右兼知其事右闕則左亦如之若御史有糾劾不當兼得彈奏五代職官志梁開平二年改左右丞為左右司侍郎避廟諱也至後唐同光元年復舊長興元年九月詔曰臺轄之司官資並設左右貂素來相類左右揆不至相懸以此比方豈宜分别自此宜升尚書右丞官品與左丞為正四品國朝元祐令尚書左右丞並正二品諸尚書左右丞並執政官功滿詔留東觀漢記黃耆拜左丞功滿當還詔書留增秩拜尚書遷僕射進對威儀辭言辨逺謝承後漢書張諛少修志節性聰明有令才鄉曲稱曰神人除尚書侍郎左丞朝賀陛見進對威儀辭言辨逺帝深奇之特拜東海相間練漢家故事楊喬尚書侍郎左丞轉右丞自在臺閣間練漢家故事前後上表陳國政便宜正色在朝三臺肅清王隱晉書劉皎字長升為尚書左丞正色在朝三臺肅清出兼中丞懦弱非監司體晉中興書王國寶因酒坐怒右丞祖台之攘袂呼喚以盤盞藥器擲台之復為有司所彈烈宗詔曰國寶縱肆情性甚不可長台之懦弱非監司體其免官止桓溫豫章之封荀𬎼遷左丞時桓溫平蜀朝廷欲以豫章封溫㽔謂太宗曰若溫復假王威平定河洛修復山陵將復何以加之遂止臺閣大小望風自肅晉諸公贊傅咸字長虞為右丞臺閣大小望風自肅職輕事重傳咸表曰左丞職輕事重以賤制貴所以難居臣以暗劣猥忝斯任愧於不稱慮罪之及夙夜無寧彈八座以下傅咸答辛曠詩序曰尚書左丞彈八座以下居機密之會斯乃皇朝之司直天臺之管轄余前為右丞具此職之要後忝此位僶俯從事日慎一日郤詵糾崔洪干寶晉記郤詵為尚書左丞糾吏部尚書崔洪洪曰我舉郤丞而還奏我此為挽弩自射詵聞曰趙宣子任韓厥為司馬厥以軍法戮宣子之僕宣子謂諸大夫可賀我矣吾選厥任其事崔侯為國舉才我以才見舉唯才是視各明至公何故斯言乃至於此洪聞悅服八座以下側目憚之晉荀晞為左丞廉察諸曹八座以下皆側目憚之在朝為百僚所憚郤隆為尚書郎轉右丞在朝為百僚所憚後坐事免內外敬憚中興書孔坦善左氏兼有文章除尚書左丞內外並敬憚之纍相糾奏沈約宋書何承天為中丞與尚書左丞謝元表不相善二人競向二臺違戾相糾奏左君右君宋百官志漢制丞郎見二丞呼曰左君右君與三騶對飲南史尚書二丞給三騶謝幾卿性不拘朝憲嘗預宴樂遊苑不得醉而歸因詣道邉酒壚停車褰帷與車前三騶對飲觀者如堵幾卿處之自若糾舉稱職徐勉為尚書左丞自掌樞憲多所糾舉時論以為稱職樞憲上上殿不下有賀雅梁書賀琛遷尚書左丞并參禮儀事琛前後居職凡郊廟諸議多所創定每見髙祖與語常移晷刻故省中為之語曰上殿不下有賀雅琛容止都雅故時人以此呼之令史七百名一見記姓名劉儒弟覽除尚書左丞令史七百人一見並記姓名當官清正無所私姊夫御史中丞禇湮從兄吏部郎孝綽在職頗通贓貨覽劾奏並免官孝綽怨之常謂人曰犬嚙行路覽噬家人文宣夜還不開門三國典略北齊張耀嘗為尚書左丞文宣近出令耀居守文宣夜還耀不開門勒兵嚴備火至看面然後開迎文宣笑曰君卻學郅君章也賜以錦袍以其忠勤遂見親待求良田薦為左丞隋楊汪為兵部侍郎數年文帝謂諌議大夫王逹曰卿為我覓一好左丞逹遂私於汪曰我當薦君為左丞若事果當與良田為報汪以逹言奏之逹竟獲罪尋拜汪尚書汪明習法令果於割斷當時皆號為稱職奏劾宇文愷于仲文競銀窟煬帝即位郎茂為尚書左丞時工部尚書宇文愷右翊衛大將軍于仲文競河東銀窟茂奏劾愷位望已隆祿賜優厚拔葵去織寂爾無聞求利下交曾無愧色仲文大將軍近臣趨侍階廷朝夕聞道虞芮之風抑而不慕分銖之利知而必爭何以貽範庶僚示人軌物愷與仲文竟坐得罪方管轄唐劉洎上疏曰尚書萬幾實為政本是以八座比於文昌二丞方於管轄茍非稱職竊位興譏伏見比來尚書省詔敕稽停文案壅滯臣識雖庸劣請述其源貞觀之初未有令僕於時省務煩雜倍多於今左丞戴胄右丞魏徵並曉吏方質性平直事應彈舉無所回避陛下又假以恩慈自然肅物百司匪懈抑此之由及杜正倫續任右丞頗亦厲下比者綱維不舉並為勳舊在位品非其任功勢相傾將救滋弊且宜精簡四員左右丞左右司郎中如並得人自然綱維略舉亦當矯正趨競豈惟息其稽滯哉書奏未幾拜洎為尚書右丞精簡上稱職戴胄拜尚書右丞尋遷左丞郎右僕射蕭瑀免官僕射封德彛卒太宗謂胄曰尚書省天下綱維百司所稟若一事有失天下必有受其弊者今無令僕係之於卿當稱朕所望也胄性明敏逹於從政處斷明速議者以為左右丞稱職武德以來一人而已百職綱維白居易為授庾承宣尚書右丞制云昔我太宗文皇帝嘗謂尚書丞百職綱維一事失中則天下有受其弊者因命戴胄魏徵及杜正倫劉洎輩繼領是職分居左右官修事理人到於今稱之故吾前命崔從持左綱今乃命承宣操右轄無俾戴劉魏杜專美於貞觀中左綱右轄上以卿在省不置僕射宗文節貞觀中為尚書右丞明悉法令以幹局見稱江夏王道宗嘗以私事託於節節遂奏之太宗大悅賜絹二百匹仍勞之曰朕不置左右僕射者正以卿在省耳糾文規不省父難執姚朂不入清流韋溫為右丞吏部員外郎張文規父𢎞靖長慶中在幽州為朱克融所囚文規不時省赴人士喧然罪之溫居綱轄首糾其事出文規為安州刺史鹽鐵推官姚朂知河隂縣嘗雪寃獄鹽鐵使崔珙奏加酬奬乃令權職方員外郎制出令朂省上溫執奏曰國朝以來郎官最為清選不可以賞能吏上令中使宣諭言朂能官且放入省溫堅執不奉詔乃改朂檢校禮部郎中翼日帝謂楊嗣復曰韋溫不放姚朂入省有故事否嗣復對曰韋溫志在銓擇清流然姚朂士行無玷梁公元崇之孫自殿中判鹽鐵案陛下奬之宜也若人有吏能不入清流孰為陛下當煩劇者此衰晉之風也上素重溫亦不奪其操髙選中書令張説擇左右丞之才舉王丘為左丞齊幹為右丞當時以為髙選詩名王維以詩名盛於開元天寶間諸王駙馬豪貴之家無不拂席迎之乾元中為尚書右丞出郎官七人元稹為尚書左丞振舉紀綱出郎官乖公議者七人然以稹素無檢操人情不厭服不惜美錦韋思謙初拜右丞奏曰陛下為官擇人非其人則闕今不惜美錦令臣製之此陛下知臣之深亦微臣盡命之秋御製詩以敘其事張説代源乾曜為左丞視事之日上敕所司供帳設音樂內出酒食御製詩一篇以敘其事十八年遇疾玄宗每日令中使問疾并手寫方賜之有守執裴佶遷右丞時兵部尚書李巽兼鹽鐵使將以使局置於本行經構已半會佶拜命堅執以為不可遂令撤之巽恃恩而強時重佶之有守執作者之冠冕席豫天寶初改左丞玄宗幸溫泉宫登朝元閣賦詩羣臣屬和帝以豫詩為工手制褒美曰覽卿所進實詩人之首出作者之冠冕也崔子曲如鈎崔善為好學兼善天文算厯明逹時務武德中歷內史舍人尚書左丞甚得時譽諸曹令史惡其聽察因其身短而傴嘲之曰崔子曲如鈎隨例得封侯體上全無項胸前别有頭髙祖聞勞勉之因購流言者使加其罪郎吏望風修整韋𢎞景拜左丞駮吏部授官不當者六十人𢎞景素以鯁亮稱及居綱轄之地郎吏望風修整即日拜趙涓永泰初為監察御史時禁中失火焚其屋數十間火發處與東宫相近代宗疑之涓為巡使俾令即訊涓因歷壖囿按據迹狀乃上直中官遺火所致也既奏代宗稱賞焉德宗時在東宫賞涓之究理詳明及刺衢州年考既深又與觀察使韓滉不相得滉奏免涓官德宗見名謂宰相曰豈非永泰初御史趙涓乎對曰然即日拜尚書左丞三世韋嗣立子濟天寶中授尚書左丞凡三世居之批宇文化及子孫案新唐語楊昉為左丞時宇文化及子孫理資蔭朝廷以事隔兩朝且其家親戚族衆亦多為言者所司理之至於左司昉未詳其案狀訴者以道理已成無復凝滯勃然通昉昉曰適朝退未食食畢當詳案訴者曰公云未食亦知天下有纍年羇旅者乎昉遽命案立批之曰父殺隋主子訴隋資生者猶配逺方死者無疑更敘時人深賞之對宰相皇帝謁陵廟還宫先後顔真卿為尚書左丞代宗車駕自陜府還真卿請皇帝先謁五陵九廟而後還宫宰相元載謂真卿曰公所見雖美其如不合事宜何真卿怒而前曰用舍在相公爾言者何罪然朝廷事豈堪相公再破除邪載深銜之左右司郎中員外郎隋煬帝三年尚書都司始置左右司郎各一人品同諸曹郎從五品掌都省之職唐職官志尚書省左右司郎中各一人從五品上隋置武德初省貞觀初復置龍朔二年改為左右丞務咸亨中復舊左司郎中副左丞所轄諸司署録目勘稽失知省內宿直之事若右司郎中闕則併行之左右司員外郎各一人天后永昌元年置神龍初省後復置左右司郎中員外郎各掌付十有二司之事以舉正稽違省署符目焉六典左司郎中一人右司郎中一人並從五品上隋煬帝始置左右司郎中各一人皇朝因改曰郎中服章與諸司郎中並同玄冕五旒衣無章裳刺黻一章兩梁冠左司員外郎一人右司員外郎一人並從六品上天后永昌元年置時顧琮自侍御史除元懷貞以洛州司户遷其朝服與諸司員外郎並爵辨玄纓簪導青衣纁裳一梁冠郎中員外郎各掌付十有二司之事以舉正稽違省署符目都事監而受焉國朝元祐令尚書左右司郎中正六品員外從六品勵志守常介然獨立隋滑儀為右司郎中於時政漸亂濁貨賂公行凡當樞要之職無問貴賤並家纍金寶天下士大夫莫不變節而儀勵志守常介然獨立時以詳整稱重武元衡遷左司郎中時以詳整稱重精簡見左右丞門都公二十四司呼左右司為都公典選事九國志吳王潛吳國建遷左司郎中典選事時喪亂之後官失其守譜牒靡散甲簿湮沒真偽相蒙潛雍容欵接坐客常滿隨才而接人人自以為得徐知誥相吳掄選有序潛之力也或亡失官牒才無可用者多廩給之掄選有序潛之力也上尚書郎後漢百官志尚書郎三十六人四百石本注曰一曹有六人主作文書起草凡郎官皆主更直執戟宿衛諸殿門出充車騎唯議郎不在直中漢舊儀尚書郎四人一郎主胸奴單于營部一郎主羌夷吏民一郎主天下户口土田墾作一郎主錢帛貢獻委輸漢官職儀尚書郎初上臺稱守尚書郎中歲滿稱尚書郎三年稱侍郎凡三十四人選精鍊有吏能者乃用之見左右丞對揖無敬稱曰左右君見尚書執板對揖稱曰明侍見令僕射執板拜朝賀對揖漢官典職尚書給青縑白綾被或以錦被帷帳氊褥通中枕大官供食物湯官供餅餌五熟果實下天子一等給尚書郎侍史一人女侍史二人皆選端正妖麗執香爐燒薰從入臺護衣服奏事明光殿因得侍省中省中皆胡粉塗畫古賢人烈士郎握蘭含香趨走丹墀奏事黃門郎與對揖天子五時賜服若郎處曹三年遷二千石刺史謝承後漢書尚書郎舊典秩滿補令長鄭𢎞為僕射奏以臺職雖尊而賞薄人無樂者請使郎補二千石自此始也魏武集選舉令國家舊法選尚書郎取年未五十者使文筆真草有才能謹慎典曹法治事起草立議又以草呈示令僕訖乃付令史書之耳書訖共省讀之內事本末臺郎統之令史不得知也書之不好令史坐之主於謬誤讀省者坐之郎無使令史獨起草之法若郎不為文書臺當仰令史是為牽牛不可以服箱而當取辦於璽角也晉職官志尚書郎西漢舊置四人以分掌尚書及光武分為六曹之後今置三十四人秩四百石并左右丞為三十六人郎主作文書起草更直五日於建禮門內選有吏能者為之至魏尚書郎有殿中吏部駕部金部虞部比部南主客祠部度支庫部農部水部儀曹三公倉部民曹二千石中兵外兵都兵别兵考功定課凡二十三郎青龍六年尚書陳矯奏置都官騎兵合二十五郎每一郎缺白試諸孝亷能結文案者數人謹封奏其名以補之及晉受命武帝罷農部定課置直事殿中祠部儀曹吏部三公比部金部倉部度支都官二千石左民右民虞曹屯田起部水部左右主客駕部車部庫部左右中兵左右外兵别兵都兵騎兵左右士北主客南主客為三十四曹郎後又置運曹凡三十五曹置郎二十三人更相統攝及江左無直事右民屯田車部别兵都兵騎兵左右士運曹十曹郎康穆以後又無虞曹二千石二郎但有殿中祠部吏部儀曹三公比部金部倉部度支都官左民起部水部主客駕部庫部中兵外兵十八曹郎後又省主客起部水部餘十五曹云宋百官志漢成帝之置四尚書也無置郎之文漢官云置郎三十六人不知何帝增員然則一尚書則領六郎也宋髙祖始置騎兵主客起部水部四曹郎元嘉十年省儀曹主客比部騎兵十一年又並置尚書郎入直官供青縑白綾被或以錦緤為之給帷帳氈褥通中枕太官供食物湯官供餅餌及五熟果實之屬給尚書侍史一人女侍史二人皆選端正妖麗執香爐護衣服奏事明光殿殿以胡粉塗壁畫古賢烈女以丹朱飾地謂之丹墀尚書郎口含雞舌香以其奏事答對欲使氣息芬芳也奏事則與黃門侍郎對揖黃門侍郎稱已聞乃出天子所服五時衣以賜尚書令僕而丞郎月賜赤管大筆一雙隃麋墨一丸隋百官志梁武帝時吏部刪定三公比部祠部儀曹虞曹主客度支殿中金部倉部左民駕部起部屯田都官水部庫部功論中兵外兵騎兵等郎二十三人陳承梁其郎中在職勤能滿二歲者轉之隋初尚書有六曹二十四司凡領三十六侍郎分司曹務直宿禁省如漢之制開皇六年二十四司各置員外郎一人以司其曹之籍帳侍郎闕則釐其曹事煬帝即位改尚書六曹各置侍郎一人以二尚書之職又諸曹侍郎並改為郎又改吏部為選部郎户部為人部郎禮部為儀曹郎兵部為兵曹郎刑部為憲部郎工部為起部郎以異六侍郎之名廢諸司員外郎而每司增置一曹郎各為二員後又改主客郎為司蕃郎尋又每減一郎置承務郎一人同員外之職唐百官志尚書吏部禮部兵部刑部工部郎中一人從五品上員外郎各一人從六品上掌付諸司之務舉稽違署符目知宿直為丞之二隋尚書省諸司郎及承務郎各一人而廢左右武德三年改諸司郎中承務郎為員外郎貞觀元年復置左右司郎中龍朔元年改郎中曰左右承務諸司郎中曰大夫永昌元年復置員外郎神龍元年省明年復置六曹左右司郎中初秦置郎中令其屬官有五官中郎將左右中郎將秩皆二千石是為三署署中有中郎侍郎郎中郎中秩皆三百石侍郎秩皆四百石中郎秩皆六百石並無員數多至十人分𨽻三署主執戟宿衛宫殿門出充軍騎漢因之故馮唐為郎中署長揚雄為侍郎並其任也漢官儀云尚書郎初從三署郎選詣尚書臺試每一郎缺則試五人先試箋奏初入臺稱郎中滿歲稱侍郎視事五年選大縣令亦參用孝廉為之其郎中侍郎之名皆因三署舊號也客曹郎主胡羌事劇遷二千石或刺史其次遷為縣令秩滿自占縣詔書賜錢三萬與三臺祖餞然漢言郎者多非尚書郎漢文時直不疑買金償同舍郎漢武時顔駟為郎三朝不遇及諸言以資為郎父任為郎兄任為郎皆三署郎也至後漢二署尤難分有尚書及曹名冠首者即尚書郎也魏二晉以後無三署郎矣自漢以來尚書諸曹並通謂之尚書郎漢代兩置其職則同魏晉宋齊唯置郎中梁陳兩置後魏北齊唯置郎中隋開皇初唯置侍郎六年每司各置員外郎國朝元祐令尚書諸司郎中從六品員外郎正七品哀烏郎位前漢天文志南宫二十五星哀烏郎位故明帝云郎官上應列宿即此也二臺後漢陳忠上疏云今言事者杜根成翊世等新蒙表録顯列二臺必承風響應爭為切直也注二臺謂杜根為侍御史成翊世為尚書郎諸郎多文俗吏又陳忠上疏云尚書出納帝命為王喉舌臣等既愚暗諸郎多文俗吏鮮有雅才每為詔文宣示內外轉相求請或以不能而專已自由辭旨鄙陋竊見光祿郎周興韞櫝古今博物多聞屬文著辭有可觀采抱奇懷能隨輩栖遲誠可歎息詔乃拜興為尚書郎引被覆之華嶠後漢書馮豹為尚書郎勤力不懈每奏事未報常俯伏省閣下或從昏至明章帝嘉之數加賞賜豹眠熟上令引被覆之無被食糟粳明帝性褊察嘗以事怒郎樂嵩嵩逃入牀下上怒甚疾呼曰郎出郎出嵩曰天子穆穆諸侯皇皇未聞人君自起撞郎上乃舍之為人朴忠家貧為郎獨直臺上無被食糟粳為三臺表王談為尚書郎臺閣議奏常依義據法為三臺之表試孝廉旬日拜續漢書胡廣舉孝廉試為天下第一旬日拜尚書郎典職十年徐防為尚書郎周密畏慎在臺閣典職十年奏事三世未嘗有過拔佩刀斷絲方儲為郎中帝使文郎居左武郎居右儲正位中立曰文武兼備在所施用上嘉其才以繁亂絲付儲使理儲拔佩刀而斷之曰反經任勢臨事宜然守開陽門候何陽為郎中守開陽門候上微行夜還開陽不納更從中東門入明旦召詣太官賜食諸門候皆奪俸鼮鼠竇攸為郎世祖會百寮於靈臺得鼠如豹文問羣臣攸曰鼮鼠詔曰何以知之曰見爾雅知鼮鼠詔曰如攸言賜帛三百段更敕王子從攸受爾雅上應列宿出宰百里漢官儀明帝時館陶公主為子求郎不許賜錢千萬左右或云何愛一郎而賜太多上曰夫郎官上應列宿出宰百里茍非其人必受其傷不離省闥東觀漢記黃香為尚書郎嘗獨上宿臺上左右不離省闥上聞而嘉之體貌端嚴容止可觀徐防體貌端嚴容止可觀顯宗異之特補尚書郎天下名士鄭泰靈帝末隂交髙位各聞山東靈帝崩何進輔政徵天下名士以泰為尚書郎請補千石東觀漢記尚書郎舊典滿補長史鄭𢎞為僕射奏以為臺職尊而賞薄人無樂者請補千石自此始也文最髙華司馬彪漢書張衡字平子以才學通博稱文最髙華舉孝亷除尚書郎射䇿甲科前漢馬宫治春秋以射䇿甲科為郎誤取他鞍被其馬宣帝許皇后父廣漢為郎誤取他鞍被其馬下蠶室明易髙康以明易為郎十七年遷左丞漢雜事張禹為尚書郎十七年遷左丞舉孝亷鍾離意舉孝亷補尚書郎以病免奏事駐車待漏樊梵為郎每當奏事駐車待漏服事丹墀彌綸舊章謝承後漢書承父煚博物聰識為尚書侍郎服事丹墀彌綸舊章每誦髙祖及光武之後將相名臣佐國翊治謇諤諌爭清節隱逸儒林徵聘䇿文通訓條在南宫祕於省閣唯臺丞郎并復道取急因得聞覽其餘它官莫敢闞𨵦也在臺練國家故事劉裕補尚書郎才辨有文章自在臺閣練國家故事每有奏議決於口筆為羣寮所服深識國典龔遂拜尚書侍郎性敏逹彌綸舊章深識國典每入朝奏事當廷所問應時捷對桓帝嘉其才誤賜縑暨豐見僕射門修儒術樊凖字幼凌少修儒術和帝幸南陽凖為羣功曹召見帝器之從還補尚書郎俱拜陳重與其友雷義俱拜尚書郎義以左黜重見議去官奏議為臺閣崇信陽球補尚書嫻逹故事其所奏議嘗為臺閣崇信知騶牙前漢東方朔武帝時為郎建章宫後閣重機中有物出其狀似麋以聞帝往視之問左右羣臣奏事明經術者莫能知詔東方朔視之朔自言知之願賜美酒粱飯大餐臣朔乃言詔曰可已餐又曰某所有公田魚池蒲葦數頃陛下以賜臣臣朔乃言詔曰可於是朔乃肯言曰所謂騶牙者也逺方當來歸義而騶牙先見其齒前後若一齊等無牙故謂之騶牙其後一歲胸奴昆邪王果將十萬衆來降漢乃復賜東方生錢財甚多堂堂乎張京兆田郎三輔決録田鳳為尚書郎儀容端正入奏事靈帝目送因題柱曰堂堂乎張京兆田郎恥以孝廉為令史職丁邯有髙節正直不撓舉孝廉為郎故事郎以令史久次補之世祖改用孝廉邯稱病不就詔問病差為郎不對曰臣不病耻以孝廉為令史職爾世祖怒令虎賁旄頭杖之數十詔問欲為郎不邯曰能殺臣者陛下不能為郎者臣詔遣出竟不拜善天文益都耆舊傳翟酺善天文選尚書郎習天官於永安宫帝數幸宫問以得失賜之璧斂出逢童子結為兄弟會稽典録盛憲為臺郎嘗出逢一童子容貌非常憲怪而問之是魯國孔融談接知其不凡便結為兄弟有武有文未知所立陳宫既到東都遇上見天下郎制曰有文者左有武者右宫乃正居中立上問此何郡郎而不從行位宫從容對曰有武有文未知所立中聖人魏志徐邈為丞相軍謀掾又為東曹議令史魏國建為尚書郎科禁酒而邈私飲至沉醉校事趙逹問以曹事邈曰中聖人逹白之太祖太祖大怒度遼將軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性修慎偶酒言爾竟坐得免刑車駕幸許昌問邈曰頃中聖人否邈曰昔子反斃於榖陽御叔罰為飲酒臣耆同二子不能自懲時復中之矣然宿瘤以醜見傳臣今以酒見視帝大笑顧左右曰名不虛立呼小名傳幹字彥休司徒交辟皆不就公車徵除尚書郎傅子云太祖見幹年八歲時甚奇之及為司空呼幹小名召為尚書郎駐車解縛韓宣為尚書郎常以職事與諸曹當並受罰於殿前已皆束縛杖未行文帝輦過問此為誰左右對曰尚書郎渤海韓宣也上追念前臨淄侯所説乃曰是子建所道韓宣耶特原之駐車使問遂解其縛開河渠通漕運鄧艾遷尚書郎時欲廣田畜為滅吳之資遣艾行陳潁以東至壽春艾以為田良而水少不足盡地利宜開河渠以引水澆溉可大積運糧又通運漕之道乃著濟河論以為行止又以為昔破黃巾因屯田積穀許都以制四方今三隅已定事在淮南臣以為可省許昌左右諸稻田并水東下令淮北屯二萬人淮南三萬人十二分休常有四萬人且田且守永豐常收三倍於西計除衆費歲完五百斛以為軍資六七年間可積三十萬斛於淮上此則十萬之衆五年食也以此擒吳往而必克矣宣王善之事皆施行出參征西軍事關西無雙魏略毋丘儉字仲恭少時好名有才學故時人稱之曰關西無雙毋丘仲恭文帝時以父任為尚書郎相者以不過二千石張緝上便宜詔以問中書令孫資以為有籌略遂召拜騎都尉入為尚書郎以稱職為明帝所識上以為緝之才能多所堪任試呼相工相其官所至相者以不過二千石上曰何止如是乎未幾而明帝崩緝出為新平太守騁其能於萬乘之前魏名臣奏駙馬都尉甄猭奏曰漢時公卿皆奏事選尚書郎試然後得之其再職自賫所發書詣天子前發省便處當事輕重口自決定或天子難問據案處正乃見郎之割斷魏則不然今為尚書郎皆天下之選才技鋒出亦欲騁其能於萬乘之前宜如故事令郎面自奏事口自處當天下之選面自奏事口自處當並見上比一把葉汝南先賢傳陳蕃上書云昔明帝公主為子求郎不許與賜錢千萬左右問之帝曰郎天官也以當敘得何可妄人耶今陛下以郎比一把葉人以為反側也不屈撓屈霸字子卿拜尚書郎當五侯之時貴戚傾天下在朝者莫不趫捷承風子卿不屈撓奏投壺賦魏略陳留邯鄲淳奏投壺賦文帝以為尚書郎賜帛十匹才學冠羣宜作臺郎抱朴子漢末有禰衡者年二十三孔文舉齒過知命身居九列才學冠羣名位殊絶始友衡於布衣又薦之於朝以為宜使起家作臺郎不願為將蜀志薑維字伯約郡欲表維以為將維家本衣冠不願為將郡因表拜郎中才藝絶人宜在臺閣索靖字幼安同郡張穀特表靖以才藝絶人宜在臺閣不宜逺出邉塞武帝納之擢為尚書郎與襄陽羅尚河南潘嶽吳郡顧榮同官咸歎服焉人之水鏡樂廣為尚書郎與何晏鄧揚等談講衛瓘見而奇之曰常恐微言將絶今復聞知命諸子造焉謂曰此人之水鏡也每見此人瑩然猶披雲霧而覩青天也廊廟之才非簡札之用索靖子綝字巨秀少有大臣之量靖每曰廊廟之才非簡札之用州郡吏不足汙吾兒也舉秀才除郎中嘗報乞兄之讎手殺三十七人時人莫不壯之代兄命為桓溫所知吳隱之兄坦之為袁真功曹真敗將及禍隱之詣桓溫乞代兄命溫矜而釋之遂為溫所知賞拜奉朝請尚書郎銓定九品檢括精詳周馥遷司徒左西屬司徒王渾表曰馥理識清正兼有才幹銓定九品檢括精詳臣委任責成褒貶允當請補尚書郎許之不治威儀郭璞遷尚書郎性輕易不治威儀辨章制度王隱晉書賈充除尚書郎少定發令兼度支考課辨章制度事皆施行轉黃門郎自表易通事郎衛瓘弱冠為尚書郎時魏法嚴暴母陳氏泣瓘自表得易通事郎轉中書郎襆被而出魏舒為尚書郎時欲沙汰郎官非其才者罷之舒曰吾即其人也襆被而出同僚素無清論者咸有愧色談者莫不稱之定科律理寃訟劉訟為尚書郎定科律理寃訟數年轉廷尉正中書郎對䇿上第郤詵郡守文立舉詵賢良對䇿上第轉尚書郎奏駮古今尺摯虞補尚書郎將作大匠陳思掘地得古尺尚書奏今尺長於古尺宜於古為正潘嶽以為習用已久不宜復改虞駮曰昔聖有以見天下之賾而擬諸形容象物制器以存時用故參天兩地以正算數之紀依律計分以定長短之度其作之地有則故用之地有徵考步兩儀則天地無所隱其情凖正三辰懸象無所容其謬施之金石則音韻和諧楷之規矩則器用合宜一本不差而萬物皆正及其差也事皆反是今尺長於古尺幾於半寸樂用之律吕不合史官用之厯象失占醫署用之孔穴乖錯此三者度量之所由生得失之所取徵皆絶閡而不得通故宜改今而從古也唐虞之制同律度量衡仲尼之訓謹權審度今兩尺並用不可謂之同知失而行不可謂之謹不同不謹是謂謬法非所以軌物垂則示人之極凡物有多而易改易有少而難變亦有改而致煩有變而之簡度量是行人所常用而長短非人所戀惜是多而易改者也正失於得反邪於正一時之變永世無二是變而之簡者也憲章成式不失舊物末季茍合之制異端亂之所當以時釐改貞夫一者也臣以為宜如所奏兄弟俱歷解系字少連及二弟結育並清身潔已俱歷洗馬舍人尚書郎鄉里榮之不得意作謡潘嶽為尚書郎始嶽次宜為郎不得意時僕射山濤領選嶽內非之密作謡曰閣道東有大牛王濟鞍裴楷鞦和嶠刺促不得休蜀有兩郎李驤字升龍遷尚書郎與杜軫齊名號蜀有兩郎每議莫能踰之後俱遷太守頗涉文學陸機遷尚書中兵郎轉殿中郎機與吳王表云以臣頗涉文學故得轉殿中郎機在職多所駮議文儀可觀祖訥字士言最有操行能清言文儀可觀遷尚書三公郎不願超遷王彪之字叔武初除佐著作郎東海王文學從伯導謂曰選官欲以汝為尚書郎汝幸可作諸王佐耶彪之曰位之多少既不足計自當任之於時至於超遷是所不願遂為郎督責之官繁霜之任晉中興書郭璞遷尚書郎數言便宜多所匡益肅祖之在東宫與溫嶠庾亮並布衣之好璞雖孤寒亦以才學同見擕遇論者美之璞辭尚書郎表云今當以幼弱之質充督責之官以無用之才管繁霜之任實非所堪必速謗戾且臺郎清顯論啓宜允雖甘榮願就量力思退陛下既擢臣以非望之榮服使臣得以自效斯亦天地涵育含𢎞兼濟者也唯作吏部不作餘曹王國寶浮動躁競婦父謝安惡其傾側每抑不用補尚書郎國寶以中興以來膏腴唯作吏部不作餘曹固辭不受言郊廟有證據徐邈僉尚書祠部郎職主郊廟上言南北郊及明堂辟雍宗廟迭毁皆有證據名重華夏何邃少有美望公府十辟一無所就由是名重華夏起家除尚書主客郎賣鐵長安干寶晉紀石苞字仲容賣鐵於長安髙祖見而奇之擢尚書郎專典伐蜀事臧榮緒晉書鄭默字思玄為尚書考功郎專典伐蜀事州人才無先者山濤啓事尚書郎舊號大臣之次州取尤者雍州久無郎前尚書傅祗坐事免官在職日淺其州人才無先之者亦審可復用否有益臺閣皇太子東宫當多用人才宜純取清德太子舍人夏侯湛有文德而不長治民有益臺閣在東宫已久今殿中郎缺宜得才學不審湛可參此選否各為其主晉世語曹爽解印綬將出主簿楊綜止之爽不從有司奏曰綜導爽反宣王曰各為其主宥之為郎外望簡縱王處沖别傳處沖為尚書郎外望簡縱若有遺漏然事要輒執其中外之雖無所辨明臺閣益歸重在清途未免楚撻太康起居注故司空王基夙為先帝受任基子沖為尚書郎雖在清途猶未免楚撻其以沖為治書侍御史行義可用范汪箋參軍陶鎰家甚富盛近過其門屋穿籬倒略無人迹云皆以行義所致可用為尚書郎䇿在上第阮德輶集䇿在上第即拜尚書郎單寒之徒或言對者因緣假託詔乃集羣才使廷對之正用第二人世説王坦之郎中年少時汪彪為僕射領選擬之尚書郎人有語王者王曰自過江來尚書郎正用第二人何以擬我聞之而止鄰族相賀陸惠曉除尚書殿中郎鄰族來相賀惠曉舉酒曰陸惠曉年踰三十婦父領選始作尚書郎卿輩乃復以為慶耶比蹤昔人梁書王筠除尚書殿中郎王氏過江以來未有居此職郎署者或勸不就筠曰陸平原東南之秀王文度獨步江東得比蹤昔人何所多恨乃就職兄弟遞居此職劉洽為殿中尚書郎洽兄弟羣從遞居此職時人榮之居寫行之首殿中郎缺武帝曰此曹舊用文學且居寫行之首宜詳擇其人以張緬為之二十七年不徙官後魏書髙允為郎二十七年不徙官時百官無祿允恆使諸子樵採自給初尚書竇瑾坐事誅瑾子遵亡在山澤遵母焦氏沒入縣官後焦氏以老得免瑾之親故莫有恤者允愍焦年老保護其家積六年遵始蒙赦其篤行如此篤行上杖脛三十三國典略齊主命百司各列勤惰尚書郎皇甫亮三日不上齊主親詰其故亮對曰一日雨一日病一日酒齊主以其言實遂優容之杖脛三十作虎狀晉羊侃字祖欣少而瓌瑋身長七尺六寸初事魏為尚書郎以力聞魏文帝嘗謂曰郎官謂卿為虎豈羊質虎皮乎試作虎狀侃因伏以手抉殿沒搯魏帝壯之賜以殊劍沙汰見留北史辛雄為尚書郎會沙汰郎官雄與羊探等八人見留餘悉罷遣右僕射元狀欽稱雄之美左僕射蕭廣寶曰吾聞元僕射云得如雄者四五人共治省事足矣今日之賞庶其曉哉郎官家唐書韋虛舟家有禮則父子兄弟更踐郎省時稱郎官家入仕三十年方霑省官趙華早擅髙名在官垂五十年纍經貶謫蹇躓備至而入仕三十年方霑省官身在郎署子嘗徒徒衣食不充以至亡沒著王政記裴遵度初登省郎嘗著王政記述今古理體識者覽之知有公輔之量曹郎奏事梁武帝天監初詔曰自禮闈凌替歷兹永久郎省備員無取職事粃粳文案貴尚虛間空有趨墀之目了無握蘭之實曹郎可依昔奏事自是始奏事矣兄弟同省通典故事叔父兄弟不許同省為郎然官格令不載亦無正敕貞觀二年韋叔謹除刑部員外郎三年韋季武除庫部郎中太宗謂曰知卿兄弟近任尚書省故授卿此官欲成一家之美無避稍屈資也其後同省者甚多近日非特恩除拜即須相回避也都事職官要録尚書都令史晉百官表注云都令史絳朝服進賢一梁冠官品第八廩月八斗諸令史皆同掌與郎共平處事宜别録上士五章令史服與同官第九俸月五斗掌與令史典期告下别掌正書速文書作移屬作財用簿每月寫應為此故者送比部直事令史掌發內章表及上事其上尚書者條牒數奏門下注發日月其啓章皆宜注之詔書諭事及章表陳奏直事令史關直郎六典都事六人從七品上都事本尚書都令史之職沈約宋書云令史蓋前漢官也史記趙禹補中都官用亷為令史是也華嶠後漢書韋彪上疏曰有楚獄事煩故置尚書令史以助郎又云郎主文案與令史不殊漢官儀云尚書令史滿歲為尚書郎出亦與郎同宰百里郎與令史分職受事令史見僕射尚書執板拜見丞郎執板揖齊職儀云自魏晉宋齊正史令書令史皆有品秩朱衣執板進賢一梁冠楊楞伽北齊鄴都故事云尚書郎判事正坐都令史側坐書令書過事洛京鄴都令史皆有品秩漢尚書臺令史秩二百石魏氏令史皆八品晉百官公卿表云尚書都令史八人秩二百石左右丞㧾知都臺事宋齊八人梁陳五人品並第八梁武天監初詔曰尚書五郎職參政要非但統領衆局亦乃方軌二丞頃雖求才未臻妙簡可革用士流美盡時彥庶同持領秉此羣目於是以太學博士陳訥兼殿中都司空法曹參軍劉顯兼吏部都太學博士孔虔孫兼金部司空法曹參軍蕭軌兼左民都宣毅墨曹參軍王顒兼中兵都五人並以才地兼美首膺茲選矣隋開皇初改都令史為都事置八人正八品上皇朝置六人自晉宋齊後魏北齊隋都令史置八者當八座之數梁陳置五者南朝多不置祠部尚書當五曹之數皇朝置六者當六曹之數國朝官品令尚書省都事正八品在任專學王隱晉書虞溥字允元偏將軍領兵備隴西溥在任專學以郎中補尚書都令史清談有國士之風趙孟字長舒補尚書都令史善於清談有國士之風其面有疵黯諸事不決皆言當問疵面諸事問疵面上都中冗員王銓為尚書都令史惠帝南郊舊儀大小官共陪立乘左僕射王戎奏公族奢侈一人而兼倉大郡不唯宅耗也銓曰母弟之親一體而已公輔之下去無用之器撤空曠之宅并力務農以利於上可矣由世未能爾流遁不反未可量也戎大慙然不能改竟尋諸郎尚書曰不知都中冗員乃爾言古今葬地干寶晉紀太康六年尚書郎令史王銓上言古葬必於是地地不妨民今率土之臣各附京邑求墓地廣種松柏臣恐數十年後民稀松柏相望非永安之制主事六典主事六人從九品上漢官儀云光祿勳有南北廬主事三署主事於諸郎之中察茂材髙第者為之秩四百石次補尚書郎出宰百里謝承後漢書陳蕃范滂公沙穆並以俊才舉孝亷除郎中光祿勳主事後魏尚書吏部儀曹三公虞曹都官二千石比部各量事置掌故主事員門下置主事令史並從八品上隋初諸臺省並置主事令史煬帝三年並去令史名其主事隨曹間劇每置二十人令史置一主事不滿十者亦置一人雜用才術之士顔慜楚文學名家為內使主事其後尋罷皇朝流外入流者補之國朝官品令尚書省主事從八品投版棄官後漢范滂字孟博自光祿四行遷光祿主事時陳蕃為光祿勳滂執公儀詣蕃蕃不止之滂懷恨投版棄官去之郭林宗聞而讓蕃曰若范孟博者豈宜以公禮格之今成其去就之名得無自取不優之義也蕃乃謝馬麟之口光庭守見吏部尚書門令史書令史職官要録尚書令史應劭漢官儀曰尚書令史二十人皆出蘭臺以勞淂占好縣司馬彪續漢書云尚書令史十八人二百石曹有三人主書後增劇曹三人合二十一人華嶠漢書云韋彪上書曰往時有獄事故置令史助郎也六典尚書令史十八人書令史三十六人自魏晉以來令史之任用人常輕梁陳後魏北齊雖預品秩益又微矣其革選卑降始自平隋開皇初著令有流外勳品二品四品五品六品七品八品九品之差皇朝因之諸臺省並曰令史其尚書都省令史書令史並分抄行署文書食著米菜料日四十錢給三口糧國初限八考以上入流若六考以上頻上七考六上並入流為職事初隋氏革選令史為流外得官者少年限又深武德初天下始定京師榖價貴逺人不願任流外至調州佐使及朝集典充選不獲以相資而往故促以年優其敘次六七年有至本司主事及上縣尉近革選限十考六上入流每府使三考令史兩考聽轉選續前勞也國朝官品令尚書省令史書令史從八品用法平整王隱晉書李苾少剛簡毅斷郡禮聘功曹除吏部令史苾用法平整耻以孝亷為令史職見尚書郎門補令史以辱袁著後漢郎中袁著詣闕上書訟梁冀驕暴冀隂刺之學生劉常當代名儒素善於著冀召著補令史以辱之職尊賞薄舊制令史補丞尉尚書令鄭𢎞奏曰職尊賞薄多無樂者請諸令史為常帝從之良士吳志董厥為府令史諸葛亮稱之曰董令令良士也後遷至尚書令史平臺事宰相才晉姚萇圍苻堅遣僕射尹緯詣堅問事堅見其瓌傑問曰卿於朕代為何官緯對曰尚書令史堅曰卿宰相才王景略等儔也而朕失之今日之亡不亦宜乎訪以朝儀遁逃不出藏榮緒晉書張昌為逆欲以尚書令史郭真為尚書郎訪以朝儀遁逃不出昌制其妻子避之彌逺奉公憂職汝南先賢傳傅浮字隱公入補尚書令史奉公憂職以功除昌慮長名為神君三吳富人宋孔顗為御史中丞坐鞭令史為有司所糾孔顗性素儉蘭臺令史皆三吳富人輕顗也問令史今古不同隋牛𢎞嘗問於騎尉劉炫曰案周禮士多而府史少今令史百倍於前職官減則不濟其故何也炫曰古人委任責成歲中考其殿最案不重按文不繁悉府史之任掌要目而已今之文簿常慮覆理鍛鍊苦辛甚密萬里追證百年舊案故諺曰老吏抱案死古今不同若此之相懸也𢎞又曰後魏北齊之時令史從容而已今則不遑寧舍其事何由炫曰齊氏州不過十三行臺遞相統領文書行下不過旬餘今州二百其繁一也往者州惟置剛紀郡置守丞縣唯令而已其所具寮則長官自備受詔赴任每州不過數十今則不然大小之官悉由吏部纎芥之迹皆屬考功其繁二也省官不如省事省事不如清心官不省而從容其可得乎𢎞甚善其言而不能用限試一經唐總章中詔諸司令史考滿合選者限試一經時人嘆異著於謡訟時閻立本為右相薑恪為左相立本無它才識時以善畫稱之恪嘗纍為將軍立功塞外是嵗京都飢早𢎞文崇賢司成三館學生並放歸本貫當時為之語左相宣威沙漠右相馳譽丹青三館學生放散五臺令史明經五臺令史明經上為廷尉平見吏部尚書抗毅不撓注亭長掌固六典亭長六人漢因秦制率十里一亭長隋文帝始採古亭長之各以為流外號皇朝因之主守省門通傳約六典掌固十四人史記云郡國有好文學敬長上肅政教順鄉里者詣太常受業如博士弟子課能通一藝以上補文學掌故又東方朔云曾不得掌故安敢望侍郎乎掌故主故事也漢史本亦為此固字隋令稱掌事皇朝復稱掌固主守當倉庫及廳事鋪設職與古殊與亭長皆為畨下上通謂之畨官轉入府史從府史轉入令史選轉皆試判行臺省晉紀魏末晉文帝討諸葛誕散騎常侍裴秀尚書僕射陳泰黃門侍郎鍾會等以行臺從至晉永嘉四年東海王越帥衆許昌以行臺自隨是也後魏道武帝天興元年山東有變乃於中山置行臺詔衛王儀鎮之孝武永熙二年罷諸行臺在令無文其官置令僕射其尚書丞郎皆尋詔復以勃海王髙歡為大行臺隨機裁處隋百官志後齊在令無文其官置令僕射其尚書丞郎皆隨權制而置員焉隋行臺省則有尚書令僕射左右任置兵部兼吏部禮部度支兼都官工部禮部及丞左右任置各一人都事四人有考功兼吏部爵部司勳禮部兼祠部主客膳部兵部兼職方駕部庫部刑部兼都官司門度支兼倉部户部兼比部金部工部屯部兼水部虞部侍郎各一人每行臺置食貨農圃武器百工監副監各一人各置丞録事等員行臺尚書令為視二品上總管行臺尚書僕射為視從二品中總管行臺諸曹尚書為視正三品下總管為視從三品行臺尚書左右為視從四品行臺諸曹侍郎為視正六品行臺諸監為視從九品行臺尚書郎為視正九品行臺諸監丞為視從九品開皇二年置河北道行臺尚書省於并州以晉王廣為尚書令置河北南道行臺尚書省於洛州以秦王俊為尚書令置西南道行臺尚書省於益州以蜀王秀為尚書令唐職官志武德初以諸道軍務事繁分置行臺尚書省其陜東道大行臺尚書令方太子在藩為之及升儲位省之山東行臺武德五年省餘道九年省兼總民事北齊武定八年辛術為東南道行臺東徐州刺史郭志殺郡守文宣聞之敕術曰江淮初附百姓難向京師留卿為行臺欲理邊民寃枉監理牧守自今以後所統十餘州地諸有犯法刺史先啓聽報以下先理後表齊代行臺兼總民事自術始也有王佐才北齊蘇綽為周文帝行臺郎中在官歲餘未見知臺中咸稱其能僕射周惠逹稱其有王佐才屬周文帝與公卿往昆明池觀魚行至西漢故蒼池傾問左右莫有知者或曰蘇綽博物多方乃召問綽應對如流文帝嘉之乃令綽並行及至池竟不設網罟而還遂留綽至夜問以政道卧而聽之文帝乃起整衣冠危坐不覺膝之前席語遂逹曙朝謂周惠逹曰蘇綽真竒士也即拜大行臺左丞參典機密自是寵遇日隆綽始置文案程式朱出墨入及計帳户籍之法轉大行臺度支尚書周文方欲革易時政務𢎞國富人之道故綽得盡其才智贊成其事減官員置屯田以資軍國綽性儉素不事産業家無餘財以海內未平常以平天下為己任博求賢俊共𢎞正道凡所薦逹皆至大官周文推心委任或出逰常預置空紙以授綽隨事施行及還啓知焉車後酹酒綽為大行臺度支尚書卒於位帝痛惜之哀動左右及綽歸葬武功惟載以布車太祖與郡公皆步送出同州郭門外太祖親於車後酹酒而言曰尚書平生為事妻子兄弟不知者吾皆知之惟爾知吾心吾知爾意方欲共定天下不幸遂含我去奈何因舉聲痛哭不覺失巵於手至葬日乂遣使祭以太牢太祖自為祭文置學周文帝於行臺省置學取丞郎及府佐德行明敏者充學生悉令旦理公務晚就講學先六經後子史時薛慎為丞相府墨曹參軍以為學師知諸生課業辦馬槽解圍獨孤永業後主時為河陽道行臺僕射洛州刺史周武帝親攻金墉永業出兵以禦之曰是何逹官作何行動周人曰至尊自來主人何不出看客永業曰客行匆速是故不出乃連夜辦馬槽二千周人聞之以為大將軍至乃解圍去備小艇全河橋北齊張亮為行臺左丞髙仲密之叛也與斛律金守河陽周太祖於上流放大船燒河橋亮乃備小艇百餘艘皆載長鎖鎖頭施鈎火船將至即馳小艇以鈎鈎之引鎖向岸船不得及橋之獲全亮之立也恨不得兵三萬橫行天下侯景為南道大行臺位司􅑫言於神武曰恨不得兵三萬橫行天下要須濟江縛取蕭衍老翁以作太平寺主神武壯其言使擁兵十萬專制河南仗任若已之半體景右足短弓馬非其所長唯以智謀時髙昻彭樂皆雄勇冠時景常輕之仗任若半體上檄書薛收為大行臺金部郎中時太宗征伐檄書露布多出於收言辭敏速皆同宿構馬上即成曾無點竄論功第一屈突通判陜東道行臺左僕射時從討王世充世充平論功第一拜陜東道大行臺右僕射鎮東都隱若敵國顔氏家訓張道携之為晉州行臺左丞愛養將士鎮撫疆埸儲積器用愛活黎民隱若敵國職官分紀卷八
