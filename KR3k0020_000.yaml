body:
  text: 御製題職官分紀立政惟人義豈磨股肱喜起敕幾歌古今制異難沿襲襄贊職同在協和經史厯編無不備縹緗獨弆有堪多是書為宋孫逢吉撰本楊侃職林而推廣之凡官職之古今異制不相沿襲者俱分目編次不強為附合體例最稱精審徵引史傳亦極詳博雙松書屋東臯隱此皆蔣曽罃家藏書處既以隱居為志即不必寓意于紀職官之書因戲詰之弗出對揚又以何欽定四庫全書子部十一職官分紀類書類提要臣等謹案職官分紀五十卷宋孫逢吉撰逢吉字彥同富春人是書前有元祐七年秦觀序陳振孫書録解題亦載之考逢吉舉宋隆興元年進士距元祐七年凡七十二年又考朱子罷經筵直講逢吉代講詩權輿篇事在紹熙五年上距元祐七年凡一百三年逢吉至寧宗朝尚官祕書監吏郎侍郎知太平州距元祐七年則一百有餘年矣謂元祐時秦觀序之殆謬誤也其書每官先列周官典章次叙厯代制度沿革名姓故事根據經注沿考史傳搜採頗為繁富若其引易緯黃帝與司馬容光觀於元扈引論語緯孔子為素王顔子為司徒之類無關典要徒以愛博而存之然類事之書本為詩賦啓劄而設與考典之書溯厯代沿革源流以明設官分職之義者體例各殊取材亦異固未可執引緯解經之說責以泛濫也乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀職官分紀序職官之書尚矣前世士大夫所著如漢官儀魏官儀唐六典之類幾丗家而附見於類書中者如御覽通典㑹要之類又十餘家咸平中華隂楊侃始採諸家之書次為職林凡草卷號稱精博而斷自五代以前不及本朝之事元豐中朝廷刺六典之文傳有司之議建文昌之府立寄祿之格制度炳然一新可謂甚盛之舉也而因時撰次尚鮮其人富春孫彥同雅意斯事間因暇日取職林而廣之具載新制而又增門目之亡缺補事實之遺漏凡五十卷號職官分紀而古今之事於是備焉或曰君子之學當志其逺者大者楊氏之書弊精神於名物固已惑矣孫氏又從而廣之不亦大惑與余竊以為不然何則昔九方皋知千里之馬而不知牝牡驪黃以皋為善觀天機則可使皋為天子諸侯之有司則憊矣此其所以為黃老家之言也儒者則異於是不以內廢外不以精忘粗故上達天機之妙而不堪天子諸侯有司之則紀官之事仲尼嘗學於郯子矣何獨於二子而疑之彥同嗜學好古晚而不衰有志士也讀其書可以知其為人元祐七年六月望日祕書省校對黃本舊籍髙郵秦觀叙
