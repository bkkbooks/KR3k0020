body:
  text: 職官分紀卷四十四宋孫逢吉撰橫行東西班大小使臣唐制百官職皆九寺三監分典開元中始置諸使其後漸增由是寺監之物多歸諸使朝廷每有制詔則云諸司諸使以該之多內侍省官或將軍兼充天祐後及五代用廷外臣以卿監將軍刺使以上領使國朝定內客省使至閣門使之橫班皇城使以下二十名謂之東班宫苑使以下二十名謂之西班初猶有正官充其後但以檢校官為之或領觀察防禦團練使刺史慶厯四年皇城使不轉閣門昭宣使既難其磨勘又不可例除遙郡刺史舊制諸司副使當改官者降五資除使則是一日而遷十五資今欲皇城使改官及七嵗如曽任邊有路安撫轉運使揔管五人以上舉則與除遙郡刺史至遙郡防禦使諸司副使因差遣及有勞遷使如舊制兩省止因磨勘則不得過五資有戰功及殊績者不限又舊制兩省都知押班及帶內器械內臣合歷轉者臨時例取古今欲如舊制詔自今皇城宫苑副使當磨勘者各於本班額從下與升五資改諸司使其自左藏庫副使以上因酬奬及非次改官者如舊制餘皆如所奏初上謂執政曰諸司副使當從供備庫副使始今對行除除五資太優於是今儀條差而為此制嘉祐三年詔客省引進四方館各置使一員東西閣門共置使四員閣門引進客省共置副使六員閣門通事舍人八員閣門使須有闕乃補今欲引進四方館各增置使一員東西上閣門共增使二員閣門引進客省共增置使四員閣門通事舍人增置二員所增置員見閣門供職轉資七不供職轉五資熙寧五年詔今後諸司使副磨勘歷任內有戰功曽經轉酬奬者與轉七資使額其餘並轉五資舊制諸司使副使有戰功者磨勘轉官率用常調轉五資上謂無以褒勵武人而閣門兩省職事皆左右近習非勳勞不可超躐故有是命元祐令內客省使至閣門副使為橫行延福宫使至昭宣使為班官諸司使副使丞制崇班閣門祗候為大使臣供奉官侍禁殿直奉職借職為小使臣內客省使國朝崇政殿受朝則升東階侍立大中祥符四年樞密院言新除內客省使曹利用準例逐日赴樞密院同食其本廳宇已改充三班院請止令於三班院分廳視事從之客省國朝客省在閣門之西使闕則引進四方館閣門使副兼承受一十人舊名承旨淳化二年改大中祥符五年陳彭年進客省事例六卷康定元年章得象修成客省條例七卷使副使五代梁有客省使國朝因之掌四方進奏及四夷朝貢牧伯朝覲賜酒饌饔餼宰相近臣禁將軍校節儀諸州進奉使賜物回詔之事元祐令客省使從五品副使從七品次內相國朝張元嘉祐中為客省使上表乞換文資上以其嘗有功效令守舊官充徐州兵馬都總管元初及第遇相者曰君次內相元曰翰林學士為內相豫次之豈不侍講乎相者曰是也及第換武辨纍遷客省使凡十五年不能遷內客省使而卒引進使副使五代梁有引進使副使國朝因之慶厯四年詔引進使兼領閣門公事元祐令引進使從五品副使從七品四方館國朝四方館在朝堂門外使客則客省引進閣門使副兼掌大中祥符五年陳彭年進四方館儀一卷康定元年章得象修成四方館條例一卷使唐四方館以通事舍人判厯中書省五代晉始以卿監專判館國朝初以檢校官判館淳化四年改置使名掌通事分畨供奉宣贊之名籍文武官正衙見謝辭國忌賜香諸道月旦正至章表郊祀朝會蕃官貢舉人進奉使京官致仕官道釋父老陪位之事元祐令四方館使正六品東西上閣門國朝東西上閣門司紫宸殿前南廊置使副使常領本局事闕即取客省使副使以上同管勾或全闕官亦有通事舍人權發遣者承受十一人舊名承旨淳化二年改又有提點承受以承受行首入仕嵗久者命為三班以充役大中祥符五年陳彭年進閣儀制六卷康定元年章得象修成閣門儀制十二卷使副使國朝閣門使副使掌供奉乘輿朝會逰幸大宴及贊引親王宰相百寮蕃客朝見辭糾彈失儀元祐令東西上閣門使正六品副使從七品沮宦官內殿崇班錢晦纍遷至閣門使宦宦王守忠領節度觀察留後牒閣門定朝立燕坐晦因對言天子大朝令宦官齒是大夫坐殿上必為四夷所笑守忠又欲以禮服進酒晦以為不可禮官議與晦同而言事官亦有是言守忠由是大沮閣門通事舍人國朝太平興國五年通事舍人王睿失儀太宗乃令今後不得通贊只令引班故事閣門無通事舍人判𨽻中書省其長一人判四方館謂之館老如抽赴閣門祗應者兼稱閣門祗候今直授閣門通事舍人非舊制也天禧二年禮儀院制圖凡言閣門通事舍人者皆去閣門字因是制授官者亦去之嘉祐三年八月詔定以十員為額元祐令閣門通事舍人從七品書五字七字賜舍人仁宗時李惟賢為閣門通事舍人在閣門習朝廷儀制數奏事稱旨仁宗嘗書忠信李惟賢五字賜之後又賜以李惟賢忠孝勤謹七字閣門祗候國朝咸平五年諸王夫人及縣主等以親屬居三班者上言因聖節推恩願以次補閣門之職真宗曰此職非可以恩澤授也並不許天禧元年上與輔臣語及省費用減吏員向敏中曰閣門祗候先朝止有三五員宣導贊唱而已今踰數百而除授未已祿廪頗厚資地亦優願稍慎擇上曰此蓋相承為例當漸有省之天聖六年上封者言三班使臣帶閣門祗候並代諸司使副使差遣竊以太宗時閣門祗候人數不多真宗朝置諸路提點刑獄以閣門祗候同充時以員數闕少特令臣寮奏舉久歷外任有勞績者任之自後限以七人奏舉除授近年皇親及臣寮遇聖節及差遣并亡歿遺表有陳乞走馬承受亦以三年承例不問有無才幹並特轉閣門祗候欲望自今供奉官合該轉者並只與轉內殿崇班其在京及外任自來差閣門祗候勾當去處令樞密院相度選差侍禁以上使臣充填從之嘉祐八年李端慤奏近嵗閣門祗候以上領在京差遣不理資任是以各圖外任請自令通事舍人閣門祗候一任在京一任在外從之治平二年閣門言先詔通事舍人及閣門祗候共一十二人今止有九人熙寧四年閣門言係通事舍人十三員閣門祗候二十三員除見任祗應共十員外全少慣熟之人欲乞選擇內外仕族子弟自內殿承制以下至右班殿直六人令逐日前後殿亦閣門祗候諸般祗應以看班祗候為名候及五周年委是詳熟失儀數少令閣門委保與正除閣門祗候常以六人為定額其班著不以官序髙下並在閣門祗候班後别為一行不得帶出外任差遣詔三班院揀選士族之家子弟供奉官至殿直年四十以下好人材但曽歷任及無私罪使臣一十二人三班院以田奕等名聞揀用六人延福宫使國朝明道元年置元祐令延福宫使從五品景福殿使國朝大中祥符五年宣政使應州觀察使劉承圭以久疾辭職特置是名在客省使之上元祐令景福殿使從五品宣慶使國朝舊諸司使止於宣政使大中祥符元年東封禮畢宣政使季神福當遷職特置是名宣政使國朝淳化五年昭宣使王繼恩有平賊之功中書欲以為宣徽使詔朕讀前代書史多矣不欲令宦官干預事宣徽使執政之漸也不可止受他官宰相等懇言繼恩有大功非此任無足以議賞典上怒深責宰相等因命張洎等别立宣政使之目序在昭宣使之上以授之昭宣使國朝淳化四年置以皇城使王延德王繼恩莊宅使杜彥鈞為之以上朝參位在東班前元祐令昭宣使正六品皇城使副使五代梁乾化六年五月詔曰端闈正門也宜以時開敞用達陽氣委皇城使準例檢校啓門車駕出則闔扉國朝因其名元祐令皇城使以下諸司使正七品翰林使副使唐有翰林使掌伎術之待詔者五代有翰林茶酒使國朝初有茶酒使後止名翰林使尚食使副使五代梁有尚食使副使國朝因之御厨使副使五代梁以御食使為司膳使國朝置御厨使軍器庫使副使五代梁有武備庫儀鸞使副使唐置營幕使後置同知院使五代梁開平初改儀鸞使國朝置儀鸞使副使弓箭庫使副使唐有內弓箭庫使國朝因之後去內字衣庫使副使國朝初置內衣庫使後去內字東西綾錦院使副使東西八作使副使國朝舊有八作太平興國二年始分東西牛羊使副使香藥庫使副使國朝舊有香藥庫因置使榷場使副使國朝舊有𣙜場庫因置使氊毯使副使唐有氊坊毯坊使五代合為一國朝因之鞍轡庫使副使唐神䇿軍有御鞍轡庫五代置使國朝因之酒坊使副使唐有酒坊使國朝初加內字後去之法酒庫使副使周太祖平河中得酒工王恩善造法麵酒因置法酒庫使翰林醫官使副使以上二十使為東班宫苑使副使五代梁有宫苑使國朝因之左右騏驥院使副使唐有飛龍使乃小馬坊使五代梁改小馬坊使為天驥後唐復為飛龍小馬坊使長興元年改飛龍院為左飛龍院小馬坊為右飛龍院國朝太平興國三年改左右天廄坊雍熙二年又改左右騏驥院使名從之內藏庫使副使國朝太平興國初置庫及使名左藏庫使副使唐以太府少卿知左藏出納五代有使國朝因之東西作坊使副使唐有作坊五代置使國朝因之舊有南北熙寧三年改南北作坊為東西作坊其使副名額亦然莊宅使副使五代有莊宅使副使國朝因之六宅使副使唐置十宅六宅使以諸王所屬為名或總云十六宅後止云六宅國朝因之文思使副使五代有文思使國朝因之內園使副使五代有內園栽接國朝止名內園洛苑使副使五代有洛苑使國朝因之如京使副使五代有如京使國朝因之雍熙四年以侍御史鄭宣司門員外郎劉墀户部員外郎趙載並充如京使以殿中侍御史栁開為崇儀使左拾遺劉慶為西京作坊使先是太宗以五代戰爭以來自節鎮刺史皆用武臣多不曉政事人受其弊帝欲兼用文士漸復舊制故先擢宣等為內職崇儀使副使更見如京使門唐五代皆有間廄使國朝太平興國五年改今名遼不敢犯國朝雍熙四年以右拾遺曽諫為崇儀使初諫知定逺軍會遼人入冦兵少為城不固人心危懼欲降於遼諫斬數人乃定因率勵士卒遼不敢犯遂引去帝聞之降詔敦奬賜五品服未幾召赴闕改授是命西京左藏庫使副使西京左坊使副使東西染院使副使唐有染坊使國朝太平興國三年置東西二院使名從之禮賔院使副使賞捕繫蠻賊之勞國朝皇祐四年以權廣州畨禺縣令蕭注為禮賔副使仍權發遣畨禺縣事賞捕繫蠻賊之勞也供備庫使副使以上二十名為西班帶御器械國朝賞選三班以上武幹親信者帶櫜鞬御劒或以內臣為之初止名御帶咸平元年改為帶御器械以內園使馬知節領登州刺史知秦州西京作坊副使石知隅為西京作坊使綦政為供備庫使供奉官張旻為供備庫副使並帶御器械初是職止名御帶至是改焉天聖七年詔給馬三匹并芻粟景祐二年詔帶御器械自今不得過六人元豐二年帶御器械官遇獨員闕人祗應差內使省押班官權從下差內殿承制國朝大中祥符二年詔置內殿承制班在內殿崇班上秩比殿中丞元祐令內殿承制正八品內殿崇班國朝淳化二年詔置內殿崇班在供奉之上左右侍禁在右班殿直之上先是供奉官殿直有四十年不遷者故特置崇班侍禁之目差定其次授焉人用胥悅東西頭供奉官左右侍禁左右班殿直五代本曰殿前承旨晉天福五年詔除翰林承旨外殿前承旨改曰殿直後唐清泰元年七月殿直承旨都知以趙處願等為之三班奉職國朝淳化二年改殿前承旨為三班奉職元祐令三班奉職從九品三班借職國朝元祐令三班借職從九品職官分紀卷四十四
