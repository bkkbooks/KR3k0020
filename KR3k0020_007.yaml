body:
  text: 職官分紀卷七宋孫逢吉撰中書省魏志黃初初改祕書省為中書以劉放為監孫資為令晉職官志魏黃初初置中書令為祕書改令為監及晉受命武帝以祕書并中書省其祕書著作之局不廢環濟要略中書掌百官事益重有令僕射丞郎令史秩與尚書同南齊百官志中書省職置主書令史正書以下隋百官志梁中書省監令各一人後齊中書省管司王言及司進御之音樂并司伶官西凉部直長伶官西凉四部伶官龜兹四部伶官清商部直長伶官清商四部人領舍人省掌署勑行下宣㫖勞問隋內史省監令各一人煬帝大業十二年改內史為內書唐百官志中書省武德三年改內書省曰中書省龍朔元年改曰西臺光宅元年改中書省曰鳯閣開元元年改中書省曰紫微省時謂尚書省為南省門下中書為北省亦謂門下為左省中書為右省或通謂之兩省國朝中書省掌進擬庶務宣奉命令除授省臺寺監長二館閣帶職提舉官以上臺諌章奏臣僚請興革廢置及內外取㫖之事治平二年知制誥祖無擇言中書省不當在東乞與門下省對移門下中書與尚書號三省其長官皆宰相之任今乃左省在西右省在東不可唐龍朔中嘗改左右省為東西臺此又明不可易也從之西掖吳志劉楨贈徐幹詩曰誰謂相去遠隔此西掖垣拘限清切禁中情無由宣應劭漢官儀曰左右曹受尚書事前世文士以中書在右因謂中書為右曹又稱西掖右曹上西省何法盛中興書范寧拜中書侍郎專掌西省紅藥謝𤣥暉直中書省詩紫殿肅隂隂彤庭赫𢎞敞風動萬年枝日華承露掌玲瓏結綺錢深沈映珠網紅藥當階翻蒼苔依砌上兹言翔鳯池鳴珮多清響信美非吾室中園思偃仰朋情已欎陶春物方駘蕩安得凌風翰聊恣山泉賞鳯池上龍池卞伯玉中書郎詩曰大方信包含優渥遂不已躍鱗龍鳯池揮翰紫宸裏栁樹再榮見禮部侍郎門地在樞近多承寵任通典以其地在樞近多承寵任是以人固其位謂之鳯凰池鳯凰池上中書令監微右相紫令內史令晉百官志中書監及令案漢武帝逰宴後庭始使宦者典事尚書謂之中書謁者置令僕射成帝改中書謁者令為中謁者令罷僕射漢東京省中謁者令而有中官謁者令非其職也魏武帝為魏王置祕書令典尚書奏事文帝黃初初改為中書置監令以祕書左丞劉放為中書監右丞孫資為中書令監令蓋自此始也及晉因之並置員一人陶氏職官要録中書監舊視僕射梁選簿書自宋以來比尚書令特進之流而無事任清貴華重大臣多領之晉制中書令銅印墨綬進賢兩梁冠絳朝服佩水蒼玉乘軺車南齊百官志中書監令各一人梁因之掌出內帝命陳中書監中二千石二品中書令中二千石三品後齊監令各一人隋內史省監令各一人尋廢監置令二人唐百官志武德三年改內書令曰中書令龍朔元年改中書省曰西臺中書令曰右相光宅元年改中書省曰鳯閣中書令曰內史開元元年改曰紫微令天寶元年曰右相至德二年復為中書令本正三品大厯二年與侍中同升正二品其後不改門下省侍中二人凡國家之務與中書令參揔而専判省事六典中書令二人正三品周官內史掌王之八柄掌書王命蓋其任也漢中書謁者令丞屬少府自武帝逰宴後庭故用宦者司馬遷被腐刑之後為中書令即其任也不言謁者省文也宣帝時任中尚書官𢎞恭石顯皆宦者恭為令顯為僕射元帝即位恭死顯代為中書令元帝以中人無外黨遂委以政事事無大小皆因決白貴幸傾朝公卿以下畏之重足一迹成帝改中書謁者令曰中謁者令罷中書宦官更以士人為之漢舊儀云領贊尚書出入奏事秩千石後漢省獻帝時魏武為魏王置祕書令典尚書奏事此又中書之任也魏黃初初改祕書令典尚書奏事為中書令又置監與令各一人秩並千石以祕書左丞劉放為中書監右丞孫資為令二人用事權自此重矣魏制監右於令故孟康自中書令遷中書監時以為美也魏中書典尚書奏事若密詔下州郡及邊將則不由尚書晉氏監令並第三品秩千石銅印墨綬進賢兩梁冠絳朝服佩水蒼玉軺車監令掌贊詔命記㑹時事典作文書舊尚書并掌書奏既有中書官而詔悉由中書也故荀勗自中書監為尚書令人賀之乃發恚曰奪我鳯凰池何賀之有東晉更重其職多以諸公領之中興之後以中書之任并入散騎省後復置之宋齊置監令品秩並同晉氏梁監增秩至中二千石令秩增二千石監令並增置二品後定十八班監班第十五令班第十四陳氏因之依梁中書分為二十一局各掌尚書諸務揔國機要而尚書唯聽受而已後魏置監令各一人孝文初命定中書監正第一品中書令正第二品至太和末監從第二品令正第三品北齊依魏後周依周官春官府置內史中大夫二人掌王言蓋比中書監令之任後又增為上大夫隋文帝廢三公府寮令中書令與侍中知政事遂為宰相之職煬帝十二年改為內書省武德初為內史省龍朔二年改令為右相光宅二年改內史開元初改紫微令掌軍國之政令緝熙帝載統和天人入則告之出則奉之以釐萬邦以度百揆蓋以佐天子而執大政者也凡王言之制有七一曰册書立后建嫡封建藩屏寵命尊賢臨軒備禮則用之二曰制書行大賞罰授大官爵釐革舊政赦宥降㫖則用之三曰慰勞制書褒贊賢能勸勉勤勞則用之四曰發日敕謂御畫發敇日也增減官員廢置州縣徵發兵馬除免官爵授六品以下官處流以上罪用庫物五百段錢二百千倉糧五百石奴婢二十人馬五十匹牛五十頭羊五百口以上則用之五曰敇㫖謂百司承㫖而為程式奏事請施行者六曰諭事敇書慰諭公卿誡約臣下用之七曰敇牒隨事承㫖不易舊典則用之皆宣署申覆而施行焉尚書有典謨訓誥誓命之書皆帝王詔制記于簡策者也蔡雍獨斷稱漢制天子之書一曰策書二曰制書三曰詔書四曰戒敇策者以簡為之其制長三尺短者半之其次一長一短兩編下附篆書題年月日稱皇帝曰以命諸侯王三公制書帝者制度之命也其文曰制誥三公赦令之屬是也近道印付使逺道皆璽封尚書令印准赦贖令召三公諸朝堂受制書司徒露布州郡詔書有三品其文曰告某官某官如故事是為詔書羣臣有所奏請尚書令奏下之有制詔天子答之曰可以為詔書羣臣有所表奏無尚書令奏制曰之字則答曰已奏如書本官下所當至亦曰詔書刺史太守及三邊營被敕文曰有詔敕某官是為戒敕自魏晉以後因循有冊書詔敕總名曰詔後朝因隋不改天后天授元年以避諱改詔為制今䇿書用簡制書勞慰制書發日敇用黃􅏘紙敇㫖諭事敕及敇牒用黃藤紙其赦書頒下諸縣用絹凡大祭祀羣神則從升壇以相禮饗宗廟則從升阼階親征纂嚴則使戒敇百寮冊命親賢臨軒則使讀冊若命之于朝則宣而授之凡冊太子則授璽綬凡制詔宣傳文章獻納皆授之於記事之官國朝官品令中書令正一品諸三省長官為宰相春明退朝録或問今之敇起何時按蔡雍獨斷曰天子下書有四一曰策書二曰制書三曰詔書四曰戒敇然自隋唐以來除改百官必有告敇而告敇字豫家有景龍年敇其制蓋須申中書門下省故劉禕之云不經鳯閣鸞臺何謂之敇唐時政事堂在門下省而除擬百官必中書令宣侍郎奉舍人行進入畫敕字此所以為敇也然後政事堂出牒布於外所云牒奉敇云云也慶厯中豫與蘇子美同在館子美嘗㩦其逺祖坰唐時敇數本來觀與豫家者一同而獨不載敕字尊寵任職前漢司馬遷既被腐刑之後為中書令尊寵任職更置士人蕭望之以中書政事宜以賢明之選自武帝逰宴後庭故用宦者非因舊又違古不近刑人之義而欲更置士人貴幸傾朝石君防與𢎞恭皆少年腐刑為黃門以選為中尚書宣帝時任中書官以恭為令君防為僕射恭死君防為令貴幸傾朝草屋數間布被緼袍北史髙允字伯恭拜中書令司徒陸麗曰髙允雖蒙寵待而妻子不粒髙宗是日幸允第唯草屋數間布被緼袍髙宗歎息久之曰古人之清豈有如此耶賜帛五百匹並掌機密魏志黃初中改祕書為中書以劉放為監孫資為令遂並掌機密歷文明齊王三世號為専任蔣濟字子通時中書監令號為専任濟上疏曰大臣太重者國危左右太親者身弊古之至戒也往者大臣秉事外內扇動陛下卓然自攬萬幾莫不祗肅夫人臣匪不忠也然威權在下則衆心慢上勢之常也陛下既已察之於大臣願無忘於左右示天下以私晉中興書肅祖欲使庾亮為中書監亮上疏曰陛下踐阼以臣領中書則示天下以私也文清㫖逺宜居深密太寧初肅祖詔溫嶠曰卿既以令望忠允之懷著於周旋且文清而㫖逺宜居深密今欲以卿為中書令朝端亦咸以為宜少有名行晉陽秋曰朱整少有名行官至中書監魏禪晉使整與中書令劉良共為詔世祖踐阼遂用之異車曹嘉之晉記中書監令常同車入朝及和嶠為令荀勗為監嶠意髙抗専車而坐乃使監令異車自此始以著述為事臧榮緒晉書潘尼性淡退唯以著述為事永興末為中書令中書五郎晉諸公讃陳淮為中書令張華為監與華俱處機密而推崇之每至直詔書無大小先示華了不厝意華得詔書不復示淮時省中號淮為中書五郎其從容如此朝事莫不咨之懷帝以繆播為中書令朝事莫不咨之人君之所取信於臣下無以尚也清裁晉中興書顯宗加王治中書令帝曰敬和清裁貴重為中書郎吾尚小數呼見意甚親之命以為中書令欲共講文章之事不宜以親居之禇裒授衛將軍中書令鈐管詔命不宜以親居之鈐管詔命上大令小令續晉陽秋中書王獻之卒以王珉為中書令世稱大王令小王令珉父洽永和中為中書令至此珉復紹父人以為奕世令望奕世令望上清顯要任檀道鸞晉陽秋王洽為中書令時年二十九將授之從兄胡之遺書曰弟今二十九便居清顯要任敢不敬以先㫖為弟啓義讓之路焉若年至四五十之間雖復超登公輔非吾所豫况降此以還者耶洽遂不年酬對無方溫嶠為中書令詔曰中書令之職酬對無方斟酌體宜非唯文疏而已非望士良才何可妄居斯任纍拜乃止奪我鳯凰池荀勗自中書監為尚書令人賀之乃發恚曰奪我鳯凰池何賀之有宜處機近以參時務王珉别傳珉字季琰詔曰新除侍中珉才學廣贍理識清通宜處機近以參時務其以珉為長兼中書令入雲龍門殿前再拜太安元年有胡人入雲龍門殿前再拜曰我當作中書監付都虞侯斬之乞授子答詔晉諸公讃華廙為中書監時多事不泄啓世祖乞授子薈答詔先時苟勗為中書監病風亦使息但書啓事皆前後相承以子弟管之表乞除監王遵表曰臣表乞得中書監持節専一所司端誠保傅惟力是視有詔曰昔荀公曾從中書監為尚書令人賀之乃發恚曰奪我鳯凰池卿諸人賀我耶願足下處之勿疑清雅履正王敦表曰中書令領軍庾亮清雅履正可中書監領軍如故非輕才所能獨任王獻之為中書令啓琅瑘王為中書監表曰中書職掌詔命非輕才所能獨任自晉建國常命宰相參領中興以來益重其任故能王言彌徽德音四塞者也平和有文幹吳志胡冲平和有文幹天紀中為中書令以言語辨捷見知張尚有俊才孫皓時為侍郎以言語辨捷見知擢為侍中中書令兼管內樞以重其任宋泰始起居注王言之職揔司清要中𢎞軍丹陽尹王景文夙尚𢎞簡情度淹粹忠規茂績實資國道宜兼管內樞以重其任可中書令屏風隔坐吳録紀隲景皇時為中書令隲父亮為尚書令每朝㑹詔以屏風隔其坐作表不能改正晉司馬景王命虞松作表至再不可意松竭思不能改正鍾㑹視其草為定五字松大恱服共掌機密張華為監裴楷為令共掌機密雞棲樹郭頒魏晉世語劉放孫資共典樞密夏侯獻曹肇心內不平殿中有雞棲樹二人相謂此亦能幾指謂放資也門外車常數百兩沈約宋書傅亮為中書令直中書省専典詔命以亮任總國權聽於省見客神虎門外每旦車常數百兩清官齊書王延之代張緒為中書令何㸃嘆曰晉以子敬季琰為此職今以延之代緒為之可謂清官後接之者實為未易付紙筆為頌崔鴻後趙録徐光字季武幼有文才年十三王陽攻頓丘掠之令主秣馬光但書柱作詩賦左右以白勒勒令召光付紙筆光立為頌賜衣服遷中書令以文見美後魏任城王澄為中書令蕭頥使庾華來見澄音韻遒雅風儀秀逸謂主客郎中張尋曰往魏任城以武著稱今魏任城以文見美也真忠臣髙允為中書令髙宗禮敬甚重晨入暮出或積日居中朝臣莫知所論或有上書言得失者髙宗省而謂羣臣曰君父一也父有是非豈子何為不作書而諌之使人知惡而諌於家內隱處也非以父親恐惡彰於外也今國家善惡不能面陳而上表顯諌此豈不彰君之短明已之美至如髙允者真忠臣也朕有非恆正言面聞其過而天下不知其諌豈不忠乎汝等在左右曾不聞一正言但當朕喜時求官乞職汝等把弓刀侍朕左右徒勞力爾皆至王公此人把筆匡我國家不過作郎汝等不自愧乎於是拜允為中書令把筆正國家上不名允為中書令文帝重之不名呼為令公絲綸王言出納帝命宋謝莊讓中書令表曰臣聞壁門天邃鳯沼神深絲綸王言出納帝命自非望允當時譽宣庠孰未有謬承曲寵空席兹榮在於年壯猶不可勉況今綿痼百志俱淪進止詳華唐溫彥博字大臨遷中書令突厥降詔議所以安邉者彥博請如漢置降丐奴五原塞以為捍蔽與魏徵不勝其辨天子卒從之其後突厥可汗弟結社謀反帝始悔云彥博善辭令每問四方風俗臚傳誥命若成誦然進止詳華人皆拭目觀髙祖嘗宴近臣遣秦王諭㫖既而顧左右曰何如溫彥博第功班賞第一房𤣥齡太宗即位為中書令第功班賞第一與杜如晦長孫無忌尉遲敬德侯君集功第一非勳非舊責重位髙岑文本始為中書令有憂色母問之答曰非勳非舊責重位髙所以憂也有來慶者輒曰今日受弔不受賀或勸其營産業文本歎曰吾漢南一布衣徒步入關所望不過祕書郎縣令爾今無汗馬勞以文墨位宰相奉稍已重尚何殖産業耶故口未嘗言家事既任職久賚錫豐饒皆令弟文昭主之若在當以中書令處之薛收卒其後圖學士像歎其早死不得與既即位語房𤣥齡曰收若在朕當以中書令處之留卿若失一臂收子元超拜中書令兼左庶子帝幸東都留輔太子監國手敇曰朕留卿若失一臂顧太子未習庶務關中事卿悉專之盡誠輔太子禇遂良父喪起復拜中書令帝寢疾召遂良長孫無忌曰漢武帝寄霍光劉備託諸葛亮朕今委卿矣太子仁孝其盡誠輔之謂太子曰無忌遂良在而母憂執政事筆徙政事堂裴炎輔太子是為中宗改中書令舊宰相議事門下省號政事堂長孫無忌以司空房𤣥齡以僕射魏徵以太子太師皆知門下省事至炎以中書令執政事以故徙政事堂于中書省蓋自炎始也父子相失崔湜拜中書令時父挹以吏部尚書得謝而性貪數為請託以干湜湜多不從由是父子相失𤣥宗在東宫數幸其第申欵密湜隂附太平公主時人咸為之懼門下客獻海鷗賦以諷湜稱善而心實不恱以賞罰自肆鍾紹京夜拜中書侍郎參知機務明日進中書令既當路以賞罰自肆宰相中最憐我蕭至忠為中書令時宗楚客懷姦植黨而韋巨源楊再思李嶠務自安無所弼正至忠介其間獨不詭隨時望翕然歸重帝亦曰宰相中至忠最憐我倡封禪議張說進中書舍人倡封禪議受詔與諸儒草儀多所裁正撰封禪壇頌以夸成功東封還為尚書右丞兼中書舍人說撰封禪壇頌刻之泰山以夸成功初源乾曜不欲封禪說固請乃不相平及升山執事官當從者說皆引所厚超階五品從兵惟加勳而不賜衆怨其専善𫝊奏敏於裁遣張嘉貞遷中書令居位三年善𫝊奏敏於裁遣然强躁論者恨其不裕幸二員何相迫初嘉貞在兵部而張說已為侍郎及皆相說位其下議論無所讓故說不平未幾嘉貞拜金吾將軍兄弟要近人頗憚之帝幸太原嘉貞以贓聞說責嘉貞素服待罪不謁遂出為豳州刺史說代其處嘉貞銜之謂人曰中書令幸二員何相迫令君四俊嘉貞性簡疏與人不疑所薦中書舍人苗延嗣吕太一考功員外郎員嘉靜殿中侍御史崔訓皆位清要日與議政事故當時語曰四俊苗吕崔員此終其坐嘉貞其始為中書舍人崔湜輕之後與議政事正出其上湜驚曰此終其坐後十年為中書令以恩澤進白敏中為中書令自裴度以勳德居敏中以恩澤進緑野堂裴度徙東都留守加中書令時閹豎擅威天子擁虛器搢紳道喪度不復有經濟意乃治第東都集賢里築山穿池竹木叢萃有風亭水榭梯橋架閣島嶼回環極都城之勝槩又於午橋創别墅花木萬株中起凉臺暑館號緑野堂激波其下度野服蕭散與白居易劉禹錫為文章把酒窮晝夜相勸不問人間事而帝知度年雖及精神不衰每大臣自洛來必問度安否開成三年以病丐還東郡真拜中書令卧家未克謝有詔先給俸料上已宴羣臣曲江度不赴帝賜詩曰注想待元老識君恨不早我家柱石衰憂來學丘禱别詔方春慎疾為難勉醫藥自持朕集中欲見公詩故示此異日可進使者及門而度薨年七十六帝聞震悼以詩置靈几以詩置靈几上停嚴鼓車駕征遼中書令岑文本卒帝親臨視撫之流涕其夕帝聞嚴鼓三聲曰文本殞逰情深惻怛今宵夜警所不忍聞命停之諌不宜持國與人郝處俊遷中書令帝多疾欲遜位武后處俊諌曰天子治陽道后治隂德德陽之與隂各有所主不相奪也況天下者髙宗太宗之天下也陛下為子而守之不宜持國以與人缺位四年𤣥宗時宰相蕭嵩加中書令自張說罷中書令後缺此位四年嵩得之常帶河東節度使進金鏡録張九齡為中書令時天長節百官上壽多獻珍異唯九齡進金鏡録五卷言前古興廢之道上賞異之衣錦晝逰魏元忠為右僕射兼中書令請歸鄉拜掃特賜錦袍一領銀千兩并給千騎四人充其左右手敇曰衣錦晝逰在乎兹日散金敷惠諒屬斯辰元忠至鄉里竟自藏其銀無所賑施一代詞宗吏部郎中張九齡一代詞宗為中書令引韋陟為中書舍人與孫逖梁涉對掌文誥時人以為美談寒士韋挺為大夫時馬周為監察御史挺以周寒士殊不禮之至是周為中書令太宗嘗復欲用挺在門下周密陳挺傲狠非宰相器遂寢焚表草馬周為中書令臨終索陳事表草帙手自焚之慨然曰管晏彰君之過求身後之名吾弗為此有刀筆才間於時事吳薛瑩條列吳事曰胡冲意性調美心識解暢有刀筆才間於時事為中書令雖不能匡矯亦自守不茍求容媚職典文詞情思不至後魏孝文時蠕蠕國有喪帝遣髙問為書與之不叙凶事孝文謂曰卿為中書監職典文詞若情思不至當謝所任以元舅特兼筆談國朝未有官制以前異姓未有兼中書省贈官有之元豐中曹郡王以元舅特除兼中書例令下度支給俸有司言自來未有活中書令請受則活中書令請受則例上右相憂畏不自堪唐劉祥道麟德元年拜右相祥道性審謹居宰相憂畏不自堪數陳老病乞解馳譽丹青閻立本拜右相初太宗與侍臣泛舟春苑池見異鳥容與波上恱之詔坐者賦詩而召立本侔狀閣外傳呼畫師閻立本是時已為主爵郎中俯伏池左研吮丹粉望坐者羞悵流汗歸戒其子曰吾少讀書文辭不减儕輩今獨以畫見名與厮役等若曹慎毋習然性所好雖被訾屈亦不能罷也既輔政但以應務俗材無宰相器時姜恪以戰功擢左相故時人有左相宣威沙漠右相馳譽丹青之嘲辭疾許敬宗改右相辭疾拜太子少師同東西臺三品內史參謀軍事唐封倫兼內史令秦王討王世充命倫參謀軍事內外百務悉關決蕭瑀武德元年遷內史令帝委以樞管內外百務悉關決或引升御榻呼曰蕭郎詔嘗下中書未即行帝讓其稽瑀曰隋季內史詔敕多違舛百司不知所承今朝廷初基所以安危者繫號令比承一詔必覆審使先後不謬始得下此所以稽留也帝曰若爾朕何憂乎論政事必陳古為諭竇威武德元年授內史令每論政事得失必陳古為諭帝益親屬常引入卧內謂曰昔周有八柱國吾與公家是也今我為天子而公為內史令事固有不等耶威懼頓首謝曰臣家在漢再為外戚至元魏有三皇后今陛下龍興臣復以姻戚進夙夜懼不克任帝笑曰公以三后族夸我耶關東人與崔盧婚者猶自矜大公世為帝戚不亦貴乎世為帝戚上發孝經對天帝異稱邢文偉延載元年為內史后御明堂詔文偉發孝經后問天與帝異稱云何文偉曰天帝一也制曰郊祀后稷以配天宗祀文王于明堂以配上帝奈何而一對曰先儒執論不同昊天及五方揔六天帝后曰帝有六則天不同稱固矣文偉不得對后曰移風易俗莫善于樂伯牙鼓琴鍾期聽之知意在山水是人能移風易俗矣何取樂耶文偉曰聖人作樂平人心變風俗末世樂壞則為人所移后喜賜帛對樂上眷禮卓異狄仁傑除內史后幸三陽宫王公皆從獨賜仁傑第一區眷禮卓異時無輩者癡宰相楊再思遷內史居宰相十餘年阿匿取容無所薦達人主所不喜毁之所喜譽之畏慎足恭未嘗忤物或曰公位尊何自屈為答曰世路孔艱直者先禍不爾豈全吾軀于時水沴閉坊門有車陷於淖者曰何癡宰相燮理隂陽遣我艱于行再思遣吏謂曰汝牛自弱不得獨責宰相杖殺王慶之李昭德檢校內史武承嗣任文昌左相昭德諫曰承嗣已王不得典樞衡以惑衆庶且父子猶相篡奪況姑姪乎后矍然曰我未之思也乃罷承嗣為太子少保洛陽人王慶之率徒衆數百人請以承嗣為皇太子后不許固請后追昭德詰其故昭德笞殺慶之餘黨散走因奏曰自古有姪為天子而為姑立廟乎以親親言之天皇陛下夫也皇嗣陛下子也當傳之子孫為萬世計陛下承天皇顧託而有天下又立承嗣臣見天皇不來食矣后乃止承嗣恨譖短之后曰吾任昭德而獲安枕是代我勞非爾所知也叱獻赤文石者有人獲洛水白石而赤文者獻闕下曰此石赤心故以獻昭德叱曰洛水餘石豈盡能反耶膽大於身昭德頗怙權為衆指目王志愔上疏云云一切奏讞皆承風㫖隂相傅㑹臣觀其膽乃大於身鼻息所衝上拂雲漢請太子出外朝王及善拜內史廬陵王之還密贊其謀既立皇太子又請出外朝以安羣臣及善不甚文而清正自將臨事不可奪有大臣節臨事不奪有大臣節上中書令可一日不見天子乎時二張怙寵每侍宴無臣節及善數裁抑之后不恱曰卿年髙不宜侍遊宴但檢校閣中及善即移病餘月后不復問歎曰中書令可一日不見天子乎遂乞骸骨猶不許改文昌左相同鳯閣鸞臺三品卒辭劇李嶠遷內史嶠辭劇復為成均祭酒平章事賜金一函蕭瑀遷內史令時唐國草創方隅未寧髙祖乃委以心腹嘗奏便宜數十條手敕曰得公之言社稷所賴運智者之策以能成人之納諌者之言以金酬其德令賜金一函以報智者勿推遜紫微令奏請狀後言二理優劣唐開元二年紫微令姚崇奏紫微舍人六員每議事請舍人同簽狀凡事有是非理均與奪人心既異所先或殊抑使雷同情有不盡臣以為執見不同者望請刻作連本狀同奏若狀語交互恐煩聖思臣既見官長望於兩狀後略言二理優劣聽進止則人各盡能官無留事敕曰可官名改易崇睿宗時為中書令後貶中州刺史𤣥宗時復入相官名改易遷紫微令侍郎漢舊儀漢置中書領尚書事置丞郎魏志黃初初改祕書為中書置通事郎掌詔草環濟要略中書內密詔有令僕丞郎晉職官志魏黃初初中書既置監令又置通事郎次黃門郎黃門郎已署事過通事乃署名已署奏以入為帝省讀書可及晉改曰中書侍郎員四人中書侍郎蓋此始也及江右初改中書侍郎曰通事郎尋復為中書侍郎晉起居注詔曰今士大夫多不樂字牧而好內官今皆先經外郡治民著績然後入為常伯中書郎南齊百官志中書侍郎四人隋百官志梁中書侍郎四人功髙者一人主省內事陳中書侍郎千石四品隋初改為內史侍郎四人煬帝减二員改為內書侍郎唐百官志侍郎二人正三品掌二令之職朝廷大政參議焉臨軒冊命為使則侍冊書授之四夷來朝則受具表疏為奏之獻贄幣則受以付有司開元元年改中書省曰紫微省中書令曰紫微令至大厯五年紫微侍郎乃復為中書侍郎六典中書侍郎二人正四品上漢舊儀云置中書領尚書事掌丐奴營部一郎民曹一郎謁者一郎魏黃初中書置通事郎即其任也司馬宣王辟王伯輿擢為中書侍郎則其名起於魏氏晉令中書侍郎四人品第四給五時朝服進賢一梁冠晉氏每一郎入直西省専掌詔草更直者五日從駕則正直從次直守東晉又改為通事郎尋復舊宋齊並同晉氏梁功髙者一人主直內事秩千石班第九陳依梁後魏置四人初正第四品上太和末從四品上北齊因之後周春官府置小內史下大夫二人比中書侍郎之任也皇朝改內史侍郎武德三年改中書侍郎龍朔咸亨光宅神龍開元各隨曹改復掌二令之職凡邦國之庶務朝廷之大政皆參議焉凡臨軒冊命大臣令為之使則持冊書以授之若自內冊則以冊書授使者冊後則奉琮璽及授冊太子則奉璽皆以授之使者凡四夷來朝臨軒則受其表疏升于西階而奏之若獻贄幣則受之以授於所司國朝元祐官品令中書侍郎正二品兩省侍郎為執政官得人與不在盧生魏志明帝詔舉中書郎謂吏部尚書盧育曰得人與不在盧生爾選舉莫取有名如畫地作餅不可噉也育舉韓暨敦篤有至行帝乃用之敦篤至行上敏慧夙成鍾㑹少敏慧夙成遷中書侍郎辟未至王基字伯輿司馬宣王辟未至擢為中書侍郎公車未至王隱晉書羊祜太祖為大將軍辟公車徵未至除中書侍郎好學善屬文王沈字處道少好學善屬文大將軍曹爽辟補中書郎名家子孫華廙字長俊為人清簡𢎞雅名家子孫以婦父盧育典選至年三十五為中書通事郎智器文藻華表子簡字奉駿有智器文藻官至中書郎奏議多所施行張華字茂先大駕征鍾㑹兼中書郎奏議衆人多所施行而即真華别傳兼中書郎從行掌書疏表檄文帝善之還即真自起草荀勗集泰始中中書侍郎張華王濟猶上自起草及後遂失舊體議大事參以經典李重字茂曾少知名鎮重遷中書侍郎每大事及議輒參以經典處決多皆施行機符徹朗顧榮字彥先少有圭璋機符徹朗大司馬主簿轉中書郎文學陸機以文學轉中書侍郎練識舊典晉中興書孔演字元舒晉國建與庾亮俱補中書侍郎于時中興肇建庶事草創演經學淵博又練識舊典朝議軌則多取正焉由是元明二帝並親愛之侍講東宫庾亮字元規為中書郎又領著作侍講東宫亮所講論多見稱述時方任刑法詔以韓子賜太子肅祖恱之對亮稱美亮以申韓刻薄傷化非所宜述肅祖納之數侍接對號入室之賔王濛字仲祖性和暢能言理辭簡而有㑹與劉惔俱為中書郎太祖輔政蒙惔並數侍接對號為入室之賔濛惔比袁荀劉惔字真長少清峻終日不雜人以濛比袁曜卿惔比荀奉倩藻蔚華幄芳逸雲飛曹毗卒王仲祖誄云入管中書職典禁闈藻蔚華幄芳逸雲飛専掌西省多所獻替范寧字武子為臨淮太守徵拜中書侍郎専掌西省以職在機近固辭不許多所獻替有益治道自左西屬入晉陽秋殷康與王坦之韓康伯並以清望入理為㑹稽王賔僚自左西屬入為中書侍郎朝野多歎其屈臧榮緒晉書夏侯孝若為野王令居邑纍年朝野多歎其屈除中書郎髙才能文成公綏髙才能文當世顯名賦頌見傳世祖時為中書郎見者改容沈約晉書裴瓉風神髙邁為中書侍郎出入禁門見者皆肅然改容在職四年首尾如一王濛别傳濛為中書侍郎在職四年首尾如一無人對難與比肩故也尚帝女起家文王傳王濟少有俊才尚文帝女起家為中書郎醉眠妓屋中裴楷别傳裴綽字季舒為中書郎曽往石崇家聽女妓至沈醉因止妓屋中眠明旦輒車來迎直乃自內遙上車去崇性暴妬即殺妓婢抗表言之裴兄叔則與書曰季舒狂酒四海所知足下飲人以狂藥責人以正禮石得書釋然書檄不立草嵇氏世家嵇含字君道為中書郎書檄雲集含初不立草為山濤所知曹嘉之晉記汝南史曜為山濤所知為征南府小吏鄉人周浚見曜而友之配以女官至中書郎揮翰紫宸裏卞伯玉赴中書侍郎詩曰大方信包容優渥遂不已躍鱗龍鳯池揮翰紫宸裏識達事機梁王規為中書黃門侍郎髙祖普通初沈慶之北伐尅復洛陽百僚稱賀規退曰道家有云非為功難成功難也羯冦逰魂為日已久桓溫得而復失宋武竟無成功我孤軍無援深入冦境威勢不接餽運難繼將是役也為禍階矣俄王師復沒其識達事機如此馮祖及趙穢我鳯池北齊書趙彥深諷朝廷以子堅為中書府郎頗招物議時馮子琮子慈明祖珽子君信並相繼居中書故時語云馮祖及趙穢我鳯池凡有敷奏詞氣抑揚隋書元善拜內史侍郎上每望之曰人倫儀表也凡有敷奏詞氣抑揚觀者屬目人倫儀表上兄弟對居近侍唐書溫大有見黃門侍郎門特令預宴太宗嘗命貴臣內殿宴怪中書侍郎于志寧不見或奏曰敕召三品以上志寧非三品所以不來太宗特令預宴即放散騎常侍太子右庶子長在中書不藉多人薛元超髙宗時為中書侍郎特承恩遇常召入與諸王同預私宴又重其文學政理文才嘗謂元超曰長得卿在中書固不藉多人自舉一人岑文本字景仁李靖薦于帝擢中書舍人時顔師古為侍郎自武德以來詔誥或大事皆所草定及得文本號善職而敏速過之或策令叢遽敕吏六七人泚筆待文本口占授咸無遺意師古以譴罪溫彥博為請于帝曰師古練時事長於文誥人少逮者幸得復用帝曰朕自舉一人公母憂乃授文本侍郎専典機要練時事長於文誥専典機要上明習舊事郭正一除中書侍郎在中書纍年明習舊事兼有詞學制誥敕多出其手當時號為稱職上封事稱㫖杜正倫為中書侍郎與御史大夫韋挺袐書少監虞世南著作郎姚思廉等咸上封事稱㫖太宗為之設宴因謂曰朕歷觀自古人臣立忠之事若值明王使得盡誠規諌至如龍逢比干竟不免孥戮為君不易為臣極難我又聞龍可擾而馴然頷下有逆鱗觸之則殺人人主亦有逆鱗卿等遂不避犯觸各進封事常能如此朕豈慮有危亡哉我思卿等此意不能暫忘故聊設宴樂也仍並賜帛有差諫東西兩朋郝處俊為中書侍郎髙宗御殿觀酺時京城四縣及太常音樂分為東西兩朋帝令雍王賢為東朋周王曄為西朋務以角勝為樂處俊諌曰臣聞禮所以示童子無誑者恐其欺詐之心生也伏以二王春秋尚少意趣未定當須推多讓美相敬如一今匆分為二朋遞相誇競非所以遵仁義示和睦也髙宗矍然曰卿之逺識非衆人所及副二宰相崔沔當官正色未嘗撓沮拜中書侍郎或謂沔曰今之中書皆是宰相承宣制命侍郎雖是副二但署位而已甚無事也沔曰不然設官分職上下相維各申所見方可濟理豈可俯然偷安而為懷祿士也自是每有制敕及曹事沔多所異同張說頗不恱出為魏州刺史右散騎常侍見門下省左散騎常侍門舍人知制誥晉職官志案晉初置舍人通事各十人隋百官志梁中書省有中書舍人陳依减秩例八品後齊十人隋舍人八人煬帝减內史舍人為四人加置起居舍人二人唐百官志舍人六人正五品上掌侍進奏參議表章凡詔㫖制敕璽書冊命皆起草進畫既下則署行以久次者一人為閣老判本省雜事又一人知制誥専進畫其餘分署制敇以六員分押尚書六曹肅宗以他官知中書舍人事自是舍人不復押六曹之奏㑹昌末李德裕建議臺閣常務州縣奏請復以舍人平處可否先是知制誥率用前行正郎宣宗時尚書郎為之穆宗詔曰中書舍人故事分押六司佐宰臣判按革廢日久頓復稍難宜漸令條舉有須慎重者便令參議如關機密者即且如舊六典中書舍人六人正五品上魏氏中書置通事一人掌呈奏案章魏志云明帝時有通事劉泰是也髙貴鄉公正始中改為通事舍人尋又改為通事侍郎則猶兼侍郎之任也晉舍人通事各十人東晉合為一職謂之通事舍人専掌呈奏後復省之而以侍郎兼其職晉令中書通事舍人品第七絳朝服武冠宋初又置通事舍人四人品秩同晉氏入直閣內出宣詔命而侍郎之任輕矣齊武承明初中書通事舍人四人各住一省時謂之四戶既揔重權勢傾天下㑹熒惑入太微太史奏宜修祈禳之禮太尉王儉謂帝曰天文乖忤此由四户帝納之不能改梁氏秩四百石品第八梁用人殊重簡以才能不限資地多以他官兼領並入閣內専掌中書詔誥猶兼呈奏之事故裴子野以中書侍郎鴻臚卿常兼中書通事舍人别敕知詔誥自魏晉詔誥皆中書令及中書侍郎掌之至梁始舍人為之其後除通事直日中書舍人陳氏置五人餘同梁氏後魏第六品上史闕其員齊置十人品同魏氏並掌詔誥後周春官府置上史上士二人此其任也隋初改曰內史舍人置八人専掌詔誥正第六品上開皇三年加從第五品上煬帝三年减置四人十二年改內書舍人皇朝改曰內史舍人武德三年改中書舍人龍朔咸亨光宅神龍開元並隨曹改復掌侍奉進奏參議章表凡詔㫖制敕及璽書冊命皆按典故起草進畫既下則署而行之其禁有四一曰漏泄二曰稽緩三曰違失四曰忘誤所以重王命也制敇既行有誤則奏而改正之凡大朝㑹諸方起居則受狀而奏之國有大事若大尅捷及大祥瑞百僚表賀亦如之凡策命大臣于朝則使持節讀冊命命之凡將帥有功及有大賔客皆使以勞問之凡察天下寃滯與給事中及御史三司鞫其事凡百司奏議文武考課皆預裁焉陶氏職官要録環濟要略云舍人古官也史記云樊噲周昌並為髙祖舍人按魏唯有通事郎荀勗集云武帝時門下辟通事舍人史伊羡趙咸為舍人對掌文法元嘉初中書舍人秩當詣詹事王曇首下不敢坐其後中書舍人𢎞興為太祖所遇上謂曰卿欲作士人得就王球乃判耳若往詣球可稱㫖就席球舉扇曰君不得爾𢎞還依事啓文帝曰我無如此何也則中書舍人本卑職也職掌敕及雜表啓詣中書者後稱增為四人多以餘官兼領五代史晉天福五年詔文典云云古昔以來典實斯在爰從近代别創新名今運屬興王事從師古俾仍舊貫以耀前規其翰林院公事並歸中書舍人國朝元祐令中書舍人正四品才盡宋書世祖以鮑昭為中書舍人上為文章自謂物莫能及昭奉㫖為文章多鄙言纍句當時咸謂昭才盡實不然也四户南齊書吕文顯永明元年為中書通事舍人文顯臨事以刻核被知與茹法亮等遞出入為舍人並見親幸並造大宅聚山開池時中書舍人四人各住一省謂之四户既揔重權勢傾天下四方守宰餉遺一年咸數百萬舍人茹法亮於衆中語人曰何須覔外祿此一户內年辦百萬蓋約言之也其後𤣥象失度史官奏宜修祈禳之禮王儉聞之謂上曰天文乖忤此禍由四户仍奏文顯等専擅極言其事上雖納之而不能改中書權利之職茹法亮久為中書通事舍人後出為大司農以中書權利之職法亮戀之垂涕而去有古人之風傅昭為中書通事舍人時居此職者皆權傾天下昭獨廉靜無所干預器服率陋身安粗糲常睡獨版床明帝聞之賜漆合燭盤勑曰卿有古人之風故賜古人之物出納書命以忠慎稱晉中興書劉超遷中書舍人時臺省初建內外多事出納書命以忠慎稱加之治身清苦衣不重帛每上所賜束帛以上皆固辭曰凡陋小臣橫竊優賞無德而祿殃咎必至上益嘉焉撰正五經音訓徐邈字仙民少好學問尤善經𫝊于時烈宗始覽典籍招延禮學之士謝安舉邈選補中書舍人在西省撰正五經音訓學者宗之别勑知制誥梁書裴子野以中書侍郎鴻臚卿兼中書通事舍人别敕知制誥在省十六載器服不改常顧協為舍人同官皆愛潤屋協在省十六載器服飲食不改於常有門生始事協知其亷潔不敢厚餉止送錢二千協發怒杖之二十醜舍人北齊書荀士遜世祖時為中書舍人狀貌甚醜以文辭見稱曾有事須奏值世祖在後庭傳通者不得士遜姓名乃云醜舍人世祖曰必士遜也看封題果是內人莫不欣笑世號三才魏收兼中書舍人與溫子升邢子才齊譽世號三才海內當共推此一人隋書虞世基拜內史舍人煬帝即位顧遇彌隆祕書監河東栁顧言博學有才罕所推許至是與世基相見歎曰海內當共推此一人非吾儕所及也制誥皆成其手顏師古遷中書舍人専掌機密于時軍國多務凡有制誥皆成其手師古達于政理冊奏之工時無及者對掌文法荀勗集晉武帝時門下啓令史伊羡趙咸為中書舍人對掌文法勗奏以為不可草詔須臾成唐書岑文本拜中書舍人初武德中詔誥及軍國大事文皆出于顔師古至是文本所草詔誥或衆務繁湊即命書僮六七人隨口並寫須㬰悉成殆盡其妙賜鍾乳報藥石之言太宗時中書舍人髙季輔上封事上善之特賜鍾乳一劑曰卿進藥石之言故以藥石報之五花判太宗謂侍臣曰中書門下機要之司詔勑有不便者皆須執論比來遂無一言駮論者若惟署詔敕行文書而已人誰不堪故事中書有軍國政事則中書舍人各執所見雜署其名謂之五花判事其舍人中選一人明練事者専知機密謂之解事舍人解事舍人上一字一言不可加减馬周字賔王轉中書舍人周有機辦能敷奏深識事端動無不中太宗嘗曰我於馬周暫不見則便思之中書侍郎岑文本謂所親曰吾見周論事多矣一字不可加一言不可减聽之靡靡令人忘倦也諂順主心封倫隋時內史楊素負貴恃才多所凌侮獨擊節賞倫每引與論宰相之務終日忘倦因撫其牀曰封郎必當據吾此坐驟稱薦於文帝由是擢授內史舍人大業中倫見虞世基得幸煬帝不間吏務每有承受多失事機倫又託附之密為指畫宣行詔命諂順主心故世基之竉日隆而隋政日壞皆倫之所為也草五王冊武后天授元年壽春王成器等兄弟五人初出閣同日受冊有司撰儀注忘載冊文及百僚在列方知闕禮宰相相顧失色中書舍人王勃立召書吏五人各令執筆口占分寫一時俱畢詞理典贍時人歎服鳯閣舍人樣徐堅少好學遍覽經史聖厯中車駕在三陽宫御史大夫楊再思左庶子王方慶為東都留守引堅為判官表奏専委之方慶賞其文章典實常稱曰掌綸誥之選也再思又曰此鳯閣舍人樣如此才識走避不得人各盡能官無留事故事舍人六員各押尚書省一行天下衆務無不關決開元二年紫微令姚崇奏紫微舍人六員每一頭商量事諸舍人同押連署狀進說凡事有是非理均與奪人心既異所見不同者望請别作商量連狀同進若狀語交互恐煩聖思臣是官長望於兩狀後略言二理優劣奏聽進止則人各盡能官無留事敕曰可因是舍人唯知撰制不復分知機務既文書填委遂令書録委之堂後又其權勢傾動天下姚竟因主書趙誨贓犯所纍罷相姚誠多才而墮政擅權以成斯弊詔誥之美稱常楊楊炎為中書舍人與常衮並掌綸誥衮長於除書炎善為德音自開元以來言詔誥之美時稱常楊主書手腕將脫景龍四年初定內難唯中書舍人蘇頲在太極殿文詔填委動以萬計而手操口對無毫釐差誤主書韓禮談子陽傳書詔草謂頲曰乞公稍遲禮等書不及恐手腕將脫中書令李嶠見之歎曰舍人思若涌泉嶠所不及也至晚不能裁一言則天嘗引中書舍人陸餘慶入草詔餘慶回惑至晚竟不能裁一言由是轉左司郎中大手筆李嶠為鳯閣舍人朝廷每有大手筆特令嶠為之鳯閣王家王易從昆仲四人開元中三至鳯閣舍人故號鳯閣王家虛有其表𤣥宗欲命蘇頲為相前一日定祕密不欲令人知逮夜艾方令草詔謂侍臣曰外庭直宿者誰遽命秉燭召來至則中書舍人蕭嵩上手以頲姓名授之既成其詞曰國之瓌寶上謂嵩曰頲瓌之子朕不斥其父名卿當為刋削嵩久之復獻上以前詞非工謂沈思既久必當精密不覺前席及觀惟改曰國之珍寶上擲其草於地上曰虛有其表爾左右皆笑嵩頥大多髯故上有是言問古今事開元五年髙仲舒為中書舍人侍中宋璟每謁政事時有中書舍人崔琳達於政治璟等亦禮焉嘗謂人曰古事問髙仲舒今事問崔琳又何疑也十難韋處厚穆宗時為中書舍人時張平叔以便佞詼諧他門捷進自京兆少尹不數月為户部侍郎判度支平叔欲以射利中帝意以希大任以榷鹽舊法為弊年深欲官為茶鹽司可富國强兵疏利害十八條時宰相不能奪因下其議處厚于是奏議發十難以詰之帝然後深知害民乃止平叔於是始有疏斥之漸獨執異見崔祐甫為中書舍人大厯中隴州沂源縣江西軍都虞候趙貴莊營白有猫鼠同乳不相害隴右節度使宋泚籠而獻之代宗遣內常侍吳承倩出示百寮宰臣常衮等稱賀祐甫獨曰猫鼠不相傷是反天性違物理也不宜稱瑞對百寮白于衮衮愕眙久之謂曰國家祥瑞舍人獨執異見舍人自奏祐甫將中使口奏承倩不受乃抗疏云云宰臣常衮以為和同之象上表陳賀及祐甫疏入帝甚嘉之不復省表以古義謨誥為准的齊浣為中書舍人論駮書詔潤色王言皆以古義謨誥為凖的掌誥纍年家無制草髙郢為中書舍人性恭慎廉潔罕與人交遊當官奉法勤恪掌誥纍年家無制草或謂之曰前輩皆留制集公何焚之對曰王言不可存私家時人重其慎密掌兩宫文翰徐浩肅宗時拜中書舍人時天下事殷詔令多出于浩浩屬詞贍給又工楷𨽻肅宗恱其能加兼尚書右丞𤣥宗傳位誥冊皆浩為之參掌兩宫文翰寵遇罕比同僚閣筆鄭畋為中書舍人咸通十年討徐方禁庭書詔旁午畋灑翰泉涌動無滯思言皆破的同僚閣筆推之灑翰泉湧上文筆不過中才文宗即位澄汰浮華登用藝實為事乃以韋詞李翺同拜中書舍人詞素無清藻文筆不過中才然處事端實遊宦無黨與李翺特相善俱號文學髙名疏達自用不事檢操草制過為美詞鄭畋遷為中書舍人以本官充承㫖劉瞻以諌因醫巫宗族罷相出為荆南節度使畋草制過為美詞懿宗省之甚怒責之曰畋且居承㫖合體朕懷一昨劉瞻出藩朕豈無意爾次當視草過為美詞逞譎詭於筆端籠愛憎於形內徒知報瞻咳唾之惠誰思蔑我拔擢之恩可梧州刺史以公道處胥徒奚陟擢拜中書舍人中書省故事姑息胥徒以常在宰相左右也陟皆以公道處之時中書令李晟所贈紙筆雜給皆不受但告雜事舍人令且貯之他日便還以遺舍人前例雜事舍人自㩦私入陟以所得均分省內官又躬處庶務下至園蔬皆悉自㸃閲人以為難陟處之無倦文字之職首居其選白居易穆宗時為中書舍人凡朝廷文字之職無不首居其選然多為排擯不得用其才時天子荒縱不法執政非其人制御乖方河朔復亂居易纍上疏論其事天子不能用乃求外任除杭州刺史未嘗起草韋承慶纍遷鳯閣舍人承慶為文迅捷雖建國大事下筆輒成未嘗起草言古無天子求外國女張東之聖厯初為鳯閣舍人其年突厥默啜表言有女請和親天后盛意許之欲令淮陽郡王延秀娶之東之奏言自古無天子求外國女以配中國王者頗忤其㫖出為合州刺史揮翰如飛陸扆拜中書舍人扆文思敏速初無思慮揮翰如飛文理俱愜同舍服其能哀戚合禮歐陽通儀鳯中纍遷中書舍人丁母憂起復本官每入朝必徒跣至皇城門外直宿在省則席地藉藁非公事不言未嘗啓齒歸家必衣縗絰號慟無常自武德以來起復而能哀戚合禮者無與通比嘲噓鄭𤣥挺授中書舍人性俊辨機捷過人每有嘲噓朝廷稱為口實盛典出父子之手賈至天寶末為中書舍人祿山之亂從上皇幸蜀時肅宗即位於靈武上皇遣至為傳位冊文上皇覽之嘆曰昔先帝遜位于朕册文則卿之先父所為今朕以神器大寶付儲君卿又當演誥纍朝盛典出卿父子之手可謂繼美矣至伏於御前嗚咽感涕一時之秀許景先開元初為中書舍人以文翰見稱中書令張說嘗稱曰許舍人之文雖無峻峯激流嶄絶之勢然屬詞豐美得中和之氣亦一時之秀屬詞得中和之氣上叔姪對掌內外制封氏自太和以來世居兩制舜卿從子德昭時為翰林學士舜卿時為中書舍人叔侄對掌內外制時以為榮見石流涕薛元超道衡孫也為中書舍人中書省一盤石初道衡為內史侍郎嘗踞而草制元超再見此石未嘗不泫然流涕清名髙節稱於天下郤髙卿為中書舍人處事不回魚朝恩署牙將李琮為兩街功德使琮暴橫於銀臺門毁辱京兆尹崔昭髙卿立請元載抗疏論奏載不從髙卿遂以疾辭以前中書舍人居東洛凡十年自號伊川田父清名髙節稱於天下不以公事接私財敬宗初登位路隋拜中書舍人翰林學士仍賜金紫有金帛謝除制者隋叱而却之曰吾不以公事接私財終無所納草詔賜宫錦封敖為學士拜中書舍人敖搆思敏速語近而理勝不務竒澀武宗深重之嘗草賜陳傷邊將詔警句云傷居爾體痛在朕躬帝覽而善之賜之宫錦謝恩賜錦綵崔郾為中書舍人入思政殿謝恩郾奏曰陛下用臣為侍講卒嵗有餘未嘗問臣經義今蒙轉改實慙尸素有愧厚恩帝曰俟朕機務稍閒即當請益髙鉞曰陛下意雖樂善既未延接儒生天下之人寧知重道帝深引咎賜之錦綵書五字筆墮地而終中書舍人鄭居中少有時名揚歷清貫晚年尤薄名利以疾辭官恣逰名山一日搦管為詩才書五字曰雲山逰已遍紙猶在手筆忽墮地而終三世集賢記注唐徐堅祖孝德父齊𣆀及堅三世為中書舍人皇朝衣冠無以為比宰相判官盧氏雜說中書舍人時謂宰相判官文士之極任朝廷之盛選通典自永淳以來天下文章最盛臺閣髦彥無不以文章達故中書舍人為文士之極任朝廷之盛選諸官莫比焉除工部侍郎五代史晉少帝時桑維翰馮玉同在中書㑹舍人盧價秩滿玉下筆除價工部侍郎價久次綸闈舊例合遷禮部侍郎或御史中丞維翰曰詞臣除此官稍慢恐外有所議因不署名無何維翰休假數日玉獨奏行之自此維翰與玉尤不相協非代言之才殷鵬姿顔若婦人而性巧媚晉天福中拜中書舍人同職馮玉本非代言之才所得詞㫖多託鵬為之玉嘗以姑息字問于人人則以辜負字示玉玉乃信之當時以為笑端鵬之才比玉雖優纎佞過之制誥典雅有元和之風九國志南唐韓熙載為和州司馬久之召為中書舍人乃妱親職制誥典雅有元和之風兄弟對掌內外制南漢趙光裔見知制誥賜賚未嘗分遺故人馬希廣初襲位有其弟萼叛於朗州鍾允章聘湖南還晟問曰馬公復能經略南土乎允章曰馬公兄弟為梗天倫絶矣以臣觀之敗亡可待況能害我晟于是發兵復韶賀之地楚人果不能救因授允章中書舍人性吝嗇嵗獲賜賚甚厚然未嘗分遺故人其妻牢氏有賢行常語久章曰妾昔事君子家無釡鬵烹茶作糜止用一銚尚且接待朋友今寶貨盈室而義路榛塞雖富貴何足尚也乃出銚以示允章允章大慙自是稍揮散矣賦字字作金聲王翃乾亨初拜中書舍人賜紫金魚四年文德殿成著作郎陳光又獻賦陳賜珠數升翃見之色動後南詔獻朱鬛馬南宫白龍見昭陽殿成翃皆獻賦頌每賜豫稍緩必於同列中揚言曰吾賦字字作金聲何受賜之晚也陳聞之大笑誥命填委皆有典則前蜀庾朴進中書舍人時署百司誥命填委皆有典則人服其敏好一中書舍人南唐遺事張洎計偕之嵗為潤帥燕王冀所薦首謁韓熙載見待之如故舊謂洎曰子好一中書舍人也頃之韓主文柄洎拔擢不十年間果主綸闈之任經宿進碑國朝初王祐拜中書舍人史館受詔撰普照王寺碑經宿上進中外驚其神速宰相器范質漢初加中書舍人户部侍郎周祖征三叛每朝廷遣使質處分軍事皆合機宜周祖問誰為此辭使者以質對周祖歎曰宰相器也西掖六舍人退朝録端拱中西掖六舍人既而田錫罷職知陳州頃之宋湜貶均州團練副使王元之貶商州團練副使熙寧二年閣老錢君倚守江寧明年豫自請出院李才元蘇子容皆落職唯吳冲卿權三司使不焉佚職閣下無人為草制遂命冲卿為直院知制誥唐百官志見中書舍人門長慶二年敕員外郎知制誥二年後轉郎中又二年轉前行郎中又一年即除諫議大夫如同前行郎中給事中知翰林學士别宣者不在此詔國朝熙寧四年七月編定應試知制誥並召赴中書試制誥三道各一百五十字以上成進呈取㫖除授如係正言以上即守本官以上除右正言轉中丞唐王璠文詞知名以職方郎中知制誥轉御史中丞時李逢告為宰相與璠親厚故自郎官掌誥便拜中丞遷諫議栁公權為中書舍人文宗謂之曰極知舍人不合作諌議以卿言事有爭臣風采也翌日降制以諌議大夫知制誥不由相府穆宗在東宫有妃嬪左右誦元稹歌詩宫中呼為元才子荆南監軍崔潭峻遇稹謫官江陵甚禮接稹潭峻歸朝出稹連昌宫詞等百篇奏御穆宗大恱問稹安在對曰今為南宫散官即日轉祠部郎鄙之中知制誥朝廷以書命不由相府甚三世掌制誥李百藥隋內史令德林之子百藥之子安期亦善屬文自德林至安期三世掌制誥蘇李蘇頲與紫微侍郎李乂對掌文誥𤣥宗曰前朝有李嶠蘇味道號曰蘇李今有卿及李乂亦不謝之蘇賈賈曾授中書舍人曾以父名忠固辭乃拜諌議大夫知制誥至開元初復拜中書舍人又固辭議者以為中書是曹司名又與曾父音同字别于理無嫌乃就職與蘇晉同掌制誥皆以辭學見知時人稱為蘇賈先歷州縣或薦薛達知制誥劉瑑奏曰先朝立制兩省官給事舍人除拜須先歷州縣達未嘗治郡宜先試之乃出為巴州刺史詞誥與古為侔元稹知制誥凡詞誥所出敻然與古為侔盛傳於世也西掖獨掌權德輿生四嵗能為詩十五為文數百篇後為中書舍人時德宗親覽庶政重難除授凡命于朝多出自御札始德輿知制誥給事有徐岱舍人有髙郢岱卒郢知禮部貢舉獨德輿直禁垣數旬始歸嘗上疏請除兩省官德宗曰非不知卿之勞但擇如卿者未得其人德輿居西掖八年其間獨掌者數嵗文藻非優崔沂大中時宰相魏公鈜之幼子兄沆亦為宰相沂昭宗時授員外郎知制誥性頗守道而文藻非優嘗與同舍顔蕘錢珝秉筆見蕘珝贍速草制數十無妨談笑而沂自愧翌日謁國相訴曰沂疏淺不足以供詞翰之職遂移為諌議大夫草制數十無妨談笑上一人辦我事孫處約為中書舍人纍年中書令杜正倫奏請更授一舍人與處約同知制誥髙宗曰處約一人足辦我事何須多也御筆加知制誥韓臯滉之子丁父艱德宗宣令論撰滉之事業臯號泣承命立草數千言德宗嘉之及免喪執政者擬考功郎中御筆加知制誥遷中書舍人制誥所出人皆傳寫王仲舒自職方郎中知制誥文思溫雅制誥所出人皆傳寫詞氣不可奪栁公權為中書舍人充翰林書詔學士文宗便殿對六學士語及漢文恭儉帝舉袂曰此浣濯者三矣學士皆贊詠帝儉德唯公權無言帝留而問之對曰人主當進賢良退不肖納諌諍明賞罰服浣濯之衣乃小節爾時周墀同對為之惴栗公權詞氣不可奪翌日降制以為諌議大夫知制誥學士如故王言之最孫逖掌誥八年制敕所出為時流歎服議者以為自開元以來蘇頲齊浣蘇晉賈曾韓休許景先及逖為王言之最兄弟對掌內外制九國志南漢趙光裔以膳部郎中知制誥時兄光逢為翰林學士兄弟對掌內外制誥時論榮之致思敏速國朝初王祐以禮部郎中知制誥時方平蜀詔命填委祐致思敏速有餘力焉翰林學士陶榖見之深加歎焉韓徐李升開國徐鉉以袐書郎直門下省試知制誥忭卒璟襲位拜祠部員外郎知制誥與常夢錫對掌誥命與宋齊丘不協誣以書檄漏泄軍中事貶泰州司户李煜嗣位牽復舊職書命精當頗得典禮韓熙載亦同掌誥命與鉉齊名江東謂之韓徐書命精當上非千餘字不下筆淳化中趙鄰幾拜左補闕知制誥鄰幾為文師庾信徐陵之體每搆思必斂袵危坐非千餘字不下筆而屬對精當致意慎密人不可偕及掌誥命不能剪截浮詞時論少之自比東方朔雍熙二年左補范杲上書大言稱其才自比東方朔求顯用以觀其效上壯之詔以本官知制誥賜錢百萬三年以李沆王化基為右補闕知制誥太宗素聞沆湜有文學㑹化基上章自陳因令中書各試制誥二首帝嘉之故有是命仍賜錢百萬出領外藩四年以左補闕知制誥范杲為工部郎中知京兆府知制誥出領外藩自是始也草詔閉户至道中和㠓以右正言知制誥㠓之直中書也每草詔必閉户精思遍討羣籍而後成文頗同于比類偶對尤失典誥之體沙州曹延祿上表求經藏碑詔㠓撰以賜之㠓遣僕厮遍走京城浮屠舍借佛書數千卷人傳以為笑失典誥之體上先入者居上五年十二月命工部郎中知制誥胡旦序立於馮起之上故事知制誥以先入者居上不繫於官次至是馮起任祠部郎中故命旦居其上非例之常也凌霄聳壑梁棟之材王旦拜右正言知制誥父祐以清名久掌書命不十年旦繼其任時論美之錢若水有人倫鍳與之同列每曰王君凌霄聳壑梁棟之材貴不可涯非吾所及也不詔試而授至道三年以工部郎中史館修撰梁周翰為駕部郎中知制誥故事入西閣皆中書召試制誥三篇一篇各二百字一篇一百字惟周翰不召試而授焉其後薛映梁鼎楊億陳堯佐歐陽修亦如此例微纍謫遐荒七月以兵部郎中知制誥張秉為左諌議大夫罷職時秉草叙用官制而有頃因微纍謫於遐荒之句真宗覽之曰若是則先朝失刑矣故有是命以所試為優大中祥符七年陳知微為比部員外郎知制誥劉筠為左司諌知制誥兼賜金紫仍特詔筠在知微之上帝以筠所試為優特有是命止試制誥二篇九年召起居郎直史館樂黃目試於中書帝以黃目久在外官命止試制誥二篇遂授兵部員外郎知制誥訓詞深雅有常楊之風鄭戩佐宣城幕故相文定公李迪薦其才召試充集賢校理纍為知制誥訓詞深雅時以為有常楊之風不許契丹使升位次程琳遷祠部員外郎知制誥時契丹賀乾元節使言中國使至契丹坐之殿上今契丹使至中國位次在下欲升位次執政以為小事許之琳曰既許其小必啓其大後必有緣此而它求者上從其言文章典雅有元白之風謝綘遷兵部員外郎嘗上言議宣祖不當配感生帝及推洪範以明水災及請罷先生處士之號密花秀背之服宫市龜筒之器內降劄子之幸引褒姒滅國以戒廢后皆合經㫖權知制誥文章典雅有元白之風獻皇極針治平元年知制誥祖無擇獻皇極針詔奬之獨草晉天福中召入翰林學士知制誥北戎入冦少帝漢祖等出征是夕范質宿直少帝令召諸學士分草制質曰宫城已閉慮泄事機遂獨草以進辭理優贍當時文士稱之薄命慮不克享顯德中扈載以文章馳名樞密使王朴薦令知制誥除書未下朴請中書言之李榖曰斯人薄命慮不克享爾朴曰公在衡石之地當以才進何得言命而遺才載遂知制誥遷翰林學士世謂朴能薦士榖能知人以制誥為贄卷東齊記事丁文簡公嘗言舉進士時以制誥為贄卷既而復自笑曰是不揆也然其後為知制誥翰林學士參知政事亦見其所存有素矣夢窗下草制誥孫夢得初名貫字道卿嘗語豫曰某舉進士長安夢登塔見將大文卷者問之云來年春榜索而視之不可問其有孫貫否曰無惟第三人有孫抃既悟遂改名抃因字夢得又數日至華隂與數人同詣金天帝廟乞靈且求夢見窗下草制詔諸同人相慶曰它日為制誥翰林學士矣雖未以為信然乃隂自喜明年第三人及第其後為直集賢院知制誥如夢云秉小笏翰林學士楊偉秉小笏一日除知制誥中書進擬上問曰得非秉小笏者乎父子掌誥退朝録父子掌誥國初至熙寧元年凡九家李文正昌武王兵部政王惠獻安簡朝文元文莊錢希白修懿梁幹林莊肅吕文靖中裕宣獻公敬求蘇儀甫子容閣長壓角舍人院每知制誥上事必設紫褥於庭面北拜聽閣長立褥之東北隅謂之壓角閣長宗衮作掖垣叢志而不解其事按舊唐書亦無聞焉唯裴度紀正陵遺事云舍人上事知印宰相當壓角則其禮相傳自唐也豫為舍人日邵興宗入院不疑為舍人閣長壓角時議美之四公皆江南文士見直學士院門不試而命歸田録國朝知制誥必先試而後命有國以來百年一爾不試而命者才三人陳堯叟楊億及修忝與其纍格御史詔命熙寧三年知制誥李大臨蘇頌並落知制誥歸班坐纍格新除御史李定詔命不降也舍人院舍人正員闕則以正言以上至給事中知制誥院在中書制敕院內五代史初入者有儤直晉開運中楊昭儉約舊制刻石院中凡員外郎入五十直郎中入四十直它官入八十直自員外知制誥轉郎中依舊直者三十直拜舍人者三十直自常侍諌議給事中郎中拜舍人者三十直舊官再入約前任减半國朝西京舊有題名石柱都汴以來遂廢咸平三年李宗諤始為石壁刻記名氏寶元二年舍人院重修閣成令宋庠撰文熙寧四年中書門下言編修例所申舍人院除官皆未有定格除官之人無日不有而外制臣寮皆兼領他事既出倉卒褒貶重輕或未得中欲乞今後文臣兩制武臣閣門使以上及朝廷升擢職任特㫖改官并責降之人特撰告詞外其餘除授並撰定檢用從之退朝録見前中書舍人門閣長壓角注直舍人院國朝開寶九年太子中允張洎王克正並直舍人院治平三年司封員外郎直史館同修起居注蔡延慶兵部郎中充集賢校理王益柔並直舍人院直院祖宗朝例至是復除熙寧三年詔應臣僚差直舍人院只理本資序候如制誥不闕即令罷筆談唐制官序未至而以它官權攝者為直官如許敬宗為直記室是也國朝學士舍人皆置院熙寧中復置直舍人學士院但以資淺者為之其實正官也熙寧六年舍人皆遷罷閣下無人乃以章子平權知制誥而不除直院者以其暫攝也古之兼官多是暫時攝領有長兼者即同正官余家藏海陵王墓志謝朓文稱兼中書侍郎四公皆江南文士退朝録見直學士院門右諫議大夫見門下省左諌議大夫門起居舍人隋百官志唐百官志並見門下省起居郎中六典起居舍人二人從六品上起居舍人因起居注而名官焉古者人君言則右史書之即其任也其設官沿革起居注郎詳焉隋煬帝三年减內史舍人四員置起居舍人二人從第六品上次內史舍人下始以虞世南蔡允恭為之皇朝因之貞觀二年省顯慶二年又置龍朔二年改為右史咸亨元年復故天授元年又改為右史神龍元年復故掌修記言之史録天子之制誥德音如記事之制以紀時政之損益季終則授之於國史五代史後唐同光元年起居舍人置一半國朝元祐官品令起居舍人從六品减膳切諌唐邢文偉時右史官缺髙宗謂侍臣曰邢文偉事我兒能减膳切諌此正直人也遂擢右史教宫女蔡允恭有風采善綴文仕隋歷著作佐郎起居舍人雅善吟詠煬帝所屬詞賦多令諷誦又嘗遣教宫女允恭深以為恥因稱氣疾不時應召煬帝又許授以內史舍人更令入內教宫人允恭固辭不就以是稍被疏絶執筆立于螭頭之下張次宗有文學開成中為起居舍人文宗復故事每入閣左右史執筆立于螭頭之下宰相奏事得以備録宰臣既退上召左右史更質證所奏是非故開成政事詳於史氏次宗尤稱奉職妙選文宗稽古尚文多行貞觀開元中事妙選左右史以魏謨為右史俄兼大諌入閣秉筆直聲逺聞帝倚以為相會文宗晏駕遂中輟入閣秉筆直聲逺聞上論事忠切有文貞之風謨轉起居舍人紫宸中謝帝謂之曰以卿論事忠切有文貞之風故不循年限授卿此官又謂曰卿家有何舊書詔對曰比多失墜唯簮笏見在上令進鄭覃曰在人不在笏上曰鄭覃不㑹我意此即甘棠之義非在笏而已令進笏上為善勿畏臣不書謨拜諌議大夫兼起居舍人上遣中使取謨起居注欲視之謨執奏曰自古置史官書事以明鍳誡陛下但為善事勿畏臣不書如陛下所行錯誤臣敢不書之帝曰我嘗取觀之謨曰由史官不守職分也臣豈敢陷陛下為非法陛下一覽之後自此書事須有回避如此善惡不直非史也卿之令子朕之直臣見右補闕門右司諫補闕歷代沿革並具左司諌同輩注目唐韋渠牟為右補闕內供奉僚列初輕之上在延英既對宰相乃使中貴人召渠牟于官次同輩始注目矣豈避雷電韋溫為右補闕時宋申錫被誣溫倡言曰宋公履行有素身居台輔不當有此是姦人陷害也吾輩諌官豈避一時之雷電而致聖君賢相蒙蔽惡之咎耶因率同列伏閣切爭之由是知名獻疏切直鄭餘慶子幹為右補闕獻疏切直人為危之及餘慶入朝憲宗謂曰卿之令子朕之直臣可更相賀遂遷舍人卿之令子朕之直臣上諫上尊號韋溫為右補闕內史羣臣上尊號溫上疏曰德如三皇止稱皇功如五帝止稱帝徽號之稱乃聖王之末事今嵗三川水災江淮旱歉恐非崇飾徽稱之時帝深嘉之起復綴班國朝景祐元年令起復右司諌知制誥朝迥叙班仍舊時有司言迥起復故事合綴本班之末特有是命自褐衣拜真宗時种世衡自褐衣拜右司諫直昭文館右正言拾遺歷代沿革並具左正言門願寄一名唐歸登拜右拾遺時裴延齡姦佞欲為相諌議陽城上疏切直德宗赫怒熊執易等亦以危言忤㫖初執易草疏成示登登愕然曰願寄一名雷霆之下安忍足下獨當自是同列切諌登每聨署其奏無所回避時人稱重之記侍臣圖贊蔣乂字德源遷右拾遺充史館修撰上嘗登凌烟閣見左壁頽剝文字殘缺每行僅有三五命録之以問宰臣宰臣皇遽無以為對即令召乂至對曰此聖厯中侍臣圖贊臣皆記憶即于御前口誦以補其缺不失一字上嘆曰虞世南寫列女傳無以加也以才鑑見推張九齡遷右拾遺以才鑑見推當時史部拔萃選人及應舉者咸令九齡與左拾遺趙冬㬢考其等第前後數四每稱平允疏詞典美陳子昻為右拾遺上疏陳事詞皆典美時有同州徐元慶父為縣尉趙師韞所殺後師韞為御史元慶手刃殺之議者以元慶孝烈欲捨其罪子昻建議以為國法専殺者死元慶宜正國法然後旌其閭墓以褒其孝義可也當時議者咸以子昻為是正専殺之法上見卿筆蹟栁公權穆宗即位入奏事帝召見謂公權曰我於佛寺見卿筆蹟思之久矣即日拜右拾遺上疏論裴延齡王仲舒貞元十年試賢良方正能直言極諌科登乙第超拜右拾遺裴延齡領度支矯誕大言中傷良善仲舒上疏極論之與父並命趙宗儒拜右拾遺翰林學士父驊改祕書少監與父並命於中㫖當時榮之有文采能負荷堂構國朝至道元年和㠓獻七榜題名記以太子中允直集賢院遷右正言又獻歌詩稱㫖上謂近臣曰宰相子有文采能負荷堂構如㠓者不可得也未幾以本官知制誥通事舍人晉職官志晉初初置舍人通事各十人江左令舍人通事謂之通事舍人掌呈奏案後省而以中書侍郎一人直西省又掌誥命宋百官志宋初令置通事舍人而侍郎之任輕矣舍人直閣內𨽻中書其下有主事本用文武官宋改用文吏南齊百官志通事舍人無員隋百官志梁中書省有通事舍人主事令史等員及置令史以承其事通事舍人舊更直閣內梁用人殊重簡以才能不限資地多以他官兼領其後除通事直日中書舍人陳通事舍人依减秩例八品隋通事舍人十六人開皇六年增置十二人通舊為二十四員煬帝以通事舍人為謁者臺職唐百官志通事舍人十六人從六品上掌朝見引納殿庭通奏武德四年廢謁者臺改通事謁者為通事舍人六典通事舍人十六人從六品上即秦之謁者漢百官表云謁者掌賔贊受事員七十人秩比六百石有僕射秩比千石舊儀云謁者有缺選郎中美鬚眉大音者補後漢百官志和帝時陳郡何熙為謁者僕射贊拜殿中音動左右後漢有常侍謁者五人謁者三十五人二漢謁者臺並隸光祿勳魏置謁者十人晉武帝時省僕射以謁者并蘭臺晉初置舍人通事各一人隸中書東晉令舍人通事兼謁者之任通事舍人之名自此始也宋武帝置謁者僕射領謁者十八人齊因之梁置謁者十人亦隸謁者臺陳亦有之後魏謁者從第五品中北齊謁者三十人正第九品下隋置謁者官置通事舍人十六人從六品上開皇三年增舊二十四員又置謁者臺改通事舍人為通事謁者創置四方館於建國門外隸鴻臚寺以待四方使者皇朝廢謁者臺改謁者為通事舍人隸四方館屬中書省掌朝見引納及辭謝者於殿廷通奏凡近臣入侍文武就列則引以進退而告其拜起出入之節凡四方通表華夷納貢皆受而進之若有大詔令則承旨以宣示百寮凡軍旅之出則受命慰勞而遣之既行則每月存問將士之家以視其疾苦凱還則郊迓之皆復命凡致仕之臣與邦之耋老時巡問亦如之國朝歸於閣門不𨽻本省元祐官品令閣門通事舍人從七品賜良馬黃金唐崔敦禮武德中拜通事舍人太宗使敦禮往豳州召廬江王瑗瑗舉兵反執敦禮問京師之事敦禮竟無異詞太宗聞而壯之遷右衛郎將賜以良馬及黃金雜物善敷奏崔行功好學中書侍郎唐儉愛其才以女妻之儉前後征討所有文表皆行功之文高宗時纍遷吏部郎中以善敷奏嘗兼通事舍人主書六典主書四人從七品上周官天官有司書中士四人鄭注云主㑹計之簿書掌邦國六典以法九職蓋比主書之任也王秀百官春秋初晉中書置主書用武官宋文帝故用文吏齊氏中書置主書令史梁氏不置陳氏中書置主書十人去令史之名後魏中書有主書令史八人從第七品上北齊十人從第八品上天保中文宣躬政事主書令史頗亦受委并得奏事文宣曽立看主書令史題署嫌其遲語云但主書何須復著令史二字也即以去之至武成河清初左丞劾其輒改吏稱㫖云文宣口𠡠尋屬新令初頒遂去令史之字文宣之代雖曰委任用人猶輕至孝昭武成召引才學之士荀士遜李德林樊孝亷為之頗曰清舉猶未有酌然子弟屈為此職隋氏中書主書亦有令史字置十人正第九品上用人益輕煬帝三年減為四人皇朝因之流外入流纍轉為之手腕將廢見中書舍人門主事宋百官志中書有主事本用武官宋改用丈吏六典主事四人從八品下魏氏所置歷宋齊中書並置主事品第八梁中書令史品第八陳氏及後魏北齊並不置隋初諸臺省并置主事令史皆正第九品上煬帝三年並去令史之名前代用人皆輕而隋雜用四人為之故顔慜楚文學名家內史主事尋罷士人皇朝並用流外入流纍轉為之舊令第九品上開元二十四年敕進入八品國朝官品令中書令主事從八品令史書令史六典令史二十五人書令史五十人魏置中書令史品第八晉氏品第九宋氏品第八齊品第六梁令史八人書令史十二人品皆第九陳氏中書吏不置令史後魏北齊中書並有令史自前代以來令史皆有品秩至隋開皇初始降為流外行署國朝官品令中書省令史書令史從八品職官分紀卷七
