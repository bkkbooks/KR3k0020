  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0020_WYG_002-1a, image: WYG0923/WYG0923-0010c.png}
body:
  text: 職官分紀巻二宋孫逢吉撰三公三師書周官立太師太傅太保兹惟三公論道經邦燮理隂陽官不必備惟其人孔安國曰師天子所師法傅傅相天子保保安天子於徳義此惟三公之任佐王論道以經緯國事和理隂陽言有德乃堪之三公之官不必備員惟其人有德乃處之逸禮太公為太師周公為太傅召公為太保前漢百官表夏商無聞焉周官則備矣太師太傅太保是為三公葢參天子坐而議政無不總統故不以一職為官名又立三少為之副少師少傅少保是為孤卿與六卿為九焉記曰三公無官言有其人然後充之舜之於堯伊尹之於湯周公召公之於周是也或說司馬主天司徒主人司空主土是為三公太師太保皆古官平帝元始元年皆初置金印紫綬太師位在太傅上太保次太傅晉職官志太尉司徒司空並一官也自漢歴魏置以為三公及晉受命迄於江左其官相承不替宋百官志晉初依周禮備置三公三公之職太師居首景帝名師故置太宰以代之自太師至太保是為三公論道經邦燮理隂陽無其人則闕所以訓人主道以德義者宋書太師太傅太保為三公訓䕶人主道以徳義天子加拜以不臣之禮非其人則闕漢制傅保在三公上號曰上公南齊百官志太師太保太傅周舊官齊唯置太傅隋百官志梁武受命之初官班多同宋齊之舊太宰太傅太保太尉司徒司空陳承梁皆循其官制後齊多循後魏置太宰太傅太保是為三師擬古上公非勲德崇者不居次有大司馬大將軍是為二大並典司武事次置太尉司徒司空是為三公三師二大三公府三門當中開黃閣設内屏三師二大置佐史則同太尉周太祖命尚書令盧辯逺師周之建職置三公三孤以為論道之官次置六卿以分司庶務隋髙祖既受命改周之六官其所制名多依前代之法置三師三公三師不主事不置府僚葢與天子坐而論道者也三公參議國之大事依後齊置府僚無其人則闕祭祀則太尉亞獻司徒奉俎司空行掃除其位多曠皆稱行事尋省府及僚佐置公則坐於尚書都省朝之衆務總歸於臺閣及煬帝即位廢三師官唐百官志太師太傅太保各一人是為三師太尉司徒司空各一人是為三公皆正一品三師天子所師法無所總職無其人則闕三公佐天子理隂陽平邦國無所不統親王拜者不親事祭祀闕則攝隋廢貞觀十一年復置與三公皆不設官屬自髙宗以後為宰相者必加同中書門下三品雖品髙者亦然惟三師三公中書令則否唐書太宗手詔曰朕觀前代明王聖主曷常無師傅哉况朕踵百家之末智不周物其無師傅何以正朕之不逮詩云不愆不忘率由舊章宜依古道置三師官六典三師訓導之官也其名即周之三公漢哀平間始尊師傅之位在三公上謂之上公明雖天子必有所師其後或置或廢大抵無所統職至後魏特稱三師以正其名然非道德崇重則不居其位無其人則闕之故近代多以為贈官皇朝因之其或親王拜者但存其名爾三公論道之官也葢以佐天子理隂陽平郡國無所不統故不以一職名其官然周以來代存其任自隋文帝罷三公府寮皇朝因之其或親王拜者亦但存其名位爾漢承秦例不置三公漢末以大司馬大司徒大司空為三公師傅之官在三公上後漢因之師傅尊號曰上公置府寮魏晉江左皆然後魏太師太傅太保尊號曰三師後周又為三公隋氏又為三師皇朝因之又漢制三公府分部九卿獻帝建安十三年省三公官置丞相隋置太尉司徒司空為三公正一品置府寮置公則尚書省上皇朝因之武徳初秦王兼之永徽中長孫無忌為之其後親王拜三公者不視事祭祀則攝者行焉五代職官志後唐清泰二年制以前同州節度使檢校太尉同平章事馮道為守司空時議者曰自隋唐以來三公無職事非親王不常置於宰臣為加官無單置者道在相位時帶司空及罷鎮未命議者不練故事率意行之及制出言議紛然或云便可總中書門下事或云須策拜開府及就列無故事乃不就朝堂叙班臺官兩省入就列方入宰臣退踵後先退劉昫又以罷相為僕射出入就列一與馮道同議者非之及晉天福中以李鏻為司徒周廣順初以竇正固為司徒蘇禹珪為司空遂以為例議者不復有云國朝治平二年詔自今皇子及宗室卑屬除檢校師傅官者隨其遷序改授三公仍俟加恩改授元祐令諸太師太傅太保為三師太尉司徒司空為三公春明退朝錄國朝歴三師三公者太祖即位天雄節度符魏王彦卿自守太尉為太師定難節度西平王李中令彞興自守太傅為太尉荆南節度南平王髙中令保融自守太保為太傅太尉舊在三師之下繇唐以來以上公為重李光弼自司空為太尉薨贈太保郭子儀自司徒為太尉薨贈太師李德裕自司徒為太尉皆似超拜李載義自司徒為太保王智興自司徒為太傅二人卒俱贈太尉是以上公寵待宗臣餘雖有功可遷保傅而掌武之尊不可得也五代至國初節度皆自檢校太傅遷太尉太尉遷太師然無升秩明文賈黯在翰林建言皇子不當為檢校師傅乃止除太尉天子有爭臣孝經古者天子有爭臣七人注謂三公及前疑後丞左輔右弼三卿佐一公尚書大傅古者天子三公每一公三卿佐之毎一大夫三士佐之故天子三公九卿二十七大夫八十一元士所以為天子者若此三事詩雨無正大夫刺幽王也三事大夫莫肯夙夜三槐周禮朝士掌建邦外朝之法面三槐三公位焉内與王論道周禮地官注三公者内與王論道中參六官之事外與六卿之教其要為民是以屬之卿焉一命衮禮王制曰三公一命衮若有加則賜也不過九命三公八命矣復加一命則服衮龍與王者之後同多於此則賜也非命服也虞夏之制天子有日月星辰周禮曰諸公之服自衮冕而下如王之服獄成參聽又曰大司冦以獄之成告于王王命三公參聽之三宥然後制刑如喉在咽以理舌語春秋合誠圖曰天理在斗中司三公如人喉在咽以理舌語宋均注曰斗為天之舌口主出政教三公主導宣君命喻於人則宜如人喉在咽以理舌口使言有條理天子之相公羊隱公元年天子三公稱三公者何天子之相也又五年天子之相則何以二自陜而東者周公主之自陜而西者召公主之一相處乎内上賢荀子君道曰上賢使之為三公次賢使之為諸侯下賢使之為士大夫是所以顯設之也總方而議又王霸三公總方而議則天子共巳而巳矣百寮之率萬民之表漢詔曰夫三公者百寮之率萬民之表也未有樹直表而得曲影者也通經術知大體梁王所欲殺大臣十餘人文吏窮究其謀反端頗見太后不食日夜泣不止景帝甚憂之問公卿大臣大臣以通經術吏往治之乃可解於是遣田叔吕季主往治之此二人皆通經術知大體來還至霸昌廏取火悉燒梁之反辭但空手來對景帝帝曰何如對曰言梁王不知也造為之者獨其幸臣羊勝公孫詭之屬為之爾謹以伏誅死梁王無恙也景帝喜說曰急趨謁太后太后聞之立起坐食氣平復故曰不通經術知古今之大體不可以為三公及左右近臣少見之人如從管窺天也號稱萬石前漢百官公卿表注漢制三公號稱萬石其俸月各三百五十斛天子改容而禮之賈誼曰今自王侯三公之貴皆天子之所改客而禮之也古天子之所謂伯父伯舅也起白屋吾丘壽王曰今三公有司或由窮巷起白屋裂地而封者此議公孫𢎞也於赫三事匪俊匪作韋𤣥成詩三事三公之謂也言三公顯職以賢俊為之腹心策告師丹曰夫王公者朕之腹心也輔善相過匡率百寮和合天下也鼎足承君彭宣為大司空王莽專權宣上書言三公鼎足承君一足不任則覆亂美實也丞相獨兼成帝時何武為九卿建言舌者民樸事約國之輔佐必得聖賢然猶則天三光備三公官各有分職今末俗之弊政事煩多宰相之材不能及古而丞相獨兼三公之事所以久廢而不治也宜建三公官定卿大夫之任分職授政以考功效分職授政以考功效上上應台階下同元首後漢郎顗傳三公上應台階下同元首注春秋元命苞曰魁下六兩兩而比曰三台漢書音義曰泰階三台也又黃帝泰階六符經曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶人三階平則隂陽和風雨調尚書曰君為元首臣作股肱言三公上象天之台階下與人君同體三府郎顗拜章曰選舉牧守委任三府注三府三公也天地災變皆免後漢本制日蝕星流及大雨雹等災變者唯免太尉自徐防為太尉凡天地災變三公皆免至魏黃初二年始罷此例鼎象顯宗永平六年王雒山出寶鼎詔曰鼎象三公豈公卿奉職得其理耶鼎司楊秉曰三公鼎司無所不統明糾非法章帝二年詔春秋之義以貴理賤今自三公並宜明糾非法宣掁威風謡言奏事蔡邕上疏曰五年制書令三公謡言奏事是時奉公者欣然得志注漢官儀曰三公聽採長吏臧否人所疾苦條奏之是為舉謡言也登槐鼎之任光武尤信讖言以王梁孫咸名應圖籙越登槐鼎之任上則台階下象山岳劉愷傳陳忠上疏薦愷曰臣聞三公上則台階下象山岳股肱元首鼎足居職協和隂陽調訓五品協和隂陽調訓五品上台輔之任實和隂陽李固曰臣聞台輔之任實和隂陽去大名朱祐奏宜令三公去大名以法經典光武從之課覈朱浮論曰光武明帝躬好吏事亦以課覈三公其人或失而其禮稍薄至有誅斥詰辱之累任職責過一至於此股肱崔寔政論曰三公天子之股肱也在公台二十餘年謝承後漢書胡廣在公台二十餘年厯事六帝禮任甚優每遜位稱疾及逸退田里未嘗滿嵗輒復升進凢一履司空再作司徒三登太尉又為太傅其所辟命皆天下之士與故吏陳蕃李咸並為三司蕃等毎朝㑹輒稱疾避廣時人榮之不敢先佩印綬黄憲同郡陳蕃為三公臨朝歎曰叔度若在吾不敢先佩印綬矣食不過一肉脫粟飯荀悦漢紀荀爽為三公食不過一肉脫粟飯累世三公續漢書楊彪字文光博覽衆書有恭孝稱位至司徒太尉見漢祚將終自以累世三公恥復為魏臣乃稱脚攣不復行雀環續齊諧記𢎞農楊寳嘗見一黄雀為鴟梟所搏墜樹下又為螻蟻所困寳愍之取致中箱中養之唯食黄花百餘日毛羽成放之朝去暮還後或與羣雀俱來哀鳴遶室數日乃去爾夕三更寳讀書未卧有黃衣童子向室再拜曰我王母使臣為鴟梟所搏䝉君拯濟今當使南海不得復往以白環四枚與寶曰令君子孫潔白登三公辭去遂絶寶生震震生秉秉生賜賜生彪四世為三公延入講論得失魏初三公無事希預朝政髙柔上疏曰公輔之臣國之棟梁古者刑政有疑輒議於槐棘之下自今之後朝有疑議及刑獄大事宜數以咨訪三公三公朝朔望之日可特延入講論得失文帝嘉納焉載輿上殿魏志太傅鍾繇有膝疾拜起不便時太尉華歆亦以髙年疾病朝見皆使載輿車虎責舁上殿就坐是後三公有疾遂以為故事領兵入見交㦸叉頸又舊制三公領兵入見皆交㦸叉頸而前曹操將討張繡入覲天子時始復此制操自此不復朝見一代之偉人又文帝即王位鍾繇復為大理及踐阼轉太尉時司徒華歆司空王朗並先世名臣文帝罷朝謂左右曰凡三公者乃一代之偉人也後日殆難繼矣不過令吾不作三公辛毗字佐治魏明帝時中書監令劉放孫資見信於主制斷時政大臣莫不交好而毗不與往來子敞諫毗正色曰與劉孫不平不過令吾不作三公而已大丈夫欲為公而豈毁其髙節者即後畢軌表言尚書僕射王思忠亮計畧不如辛毗毗宜代思帝以訪放資放資對毗實亮直然性剛而専遂不用王公相去一階魏太尉王祥字休徵晉武帝為晉王祥與荀顗往謁顗謂祥曰相王尊重何侯既已盡敬今便當拜也祥曰相國誠為尊貴然是魏之宰相吾等魏之三公公王相去一階而已班列大同安有天子三公而輒拜人者損魏朝之望虧晉王之德君子愛人以禮吾不為也及入顗遂拜而祥獨長揖帝曰今日方知君見顧之重矣何侯謂何曽亦三公也三公封侯崔林生徳孺為司空封安陽亭侯邑六百戸三公封列侯自林始也論道之官徐邈字景山拜司空嘆曰三公論道之官無其人則缺豈可以老病取之哉固辭不受八公同辰攀雲附翼晉職官志晉受魏禪以安平王孚為太宰鄭沖為太傅王祥為太保司馬望為太尉何曽為司徒荀顗為司空石苞為大司馬陳騫為大將軍世所謂八公同辰攀雲附翼者也調隂陽又伊尹曰三公調隂陽九卿通寒暑大夫知人事列士去其私佩刀吕䖍有佩刀工相之以為必登三公可服此刀䖍謂王祥曰茍非其人刀或為害卿有公輔之量故以相與祥始固辭强之乃受祥後果為太保臨薨以刀授弟覽曰汝後必興足稱此刀覽後厯世多賢才興於江左矣三公自共選一公劉寔以世多進趨著崇讓論以一官缺擇衆官所讓最多者用之三司有缺檡三司所讓最多者用之此為一公缺三公預送之且主選之吏不必任公而選三公不如令三公自共選一公為詳臨軒遣使成帝臨軒遣使拜太傅太尉司空儀注太樂宿懸於殿庭門下奏非祭祀宴饗則無設樂之制太常蔡謨議曰凡敬其事則備其禮禮備則有樂今大拜輔相臨軒遣使宜有金石之樂從焉致拜盡敬文帝為晉王時何曾與髙柔鄭沖俱為三公將入見曽獨致拜盡敬二人獨揖而已策拜設小㑹前代三公策拜皆設小㑹所以崇宰輔之制自魏末以後廢不復行至石鑒拜司徒有詔令㑹遂以為常宣德化調七政天文志輔星傅乎開陽所以佐斗成功丞相之象也七政星明其國昌輔星明則臣强杓南三星及魁第一星西三星皆曰三公主宣徳化調七政和隂陽之官也和隂陽之官上職典天地禮志衞瓘奏曰夫三公職典天地實掌人物國之大事取義於此故漢氏封禪非是官也不在其事臣等前奏盖陳祖考之功天命又應陛下之德合同四海迹古考今宜修此禮夜聞神言知當為公魏舒未達時嘗詣野王主人妻夜産俄而聞車馬之聲相問曰男也女也曰男書之十五以兵死復問寢者為誰曰魏公舒後十五載詣主人問所生児何在曰因條桑為斧傷而死舒自知當為公矣其後果為司徒不過使吾不為三公顧顗之為吏部尚書出為吳興太守幸臣戴法興權傾人主而顗之未嘗低意光祿大夫蔡興宗與之善嫌其風節過峻顗之曰辛毗有云劉孫不過使吾不為三公爾論道興化庾純字謀甫而賈充宴相諷純上表自劾臣不惟生育之恩求養老父而懷祿貪榮烏烏之不若充為三公論道興化以教義責臣是也而以枉錯直居下犯上醉酒迷荒昏亂儀度臣得以凡材擢授顯任上應天心鄭袤字林叔以為司空天子臨軒遣國坦就第拜授袤上送印綬至于十數謂坦曰魏以徐景山為司空吾時為侍中受詔之日徐公語吾曰三公當上應天心茍非其人寔傷和氣不敢以垂死之年累辱朝廷也終於不就遵大雅君子之迹可不務乎父子居上公位諸公讃司馬望字子初孚之長子有才偉早著名咸熙中位至司徒入晉封義陽王遷太尉大司馬時孚為太宰父子居上公位百代以來未之有也灼然有公輔之望中興書謝安栖遲東山縱意遊玩弟子萬時為西中郎將位居藩任而安在私門名猶出萬右灼然有公輔之望血流彈壁仍作公字異苑曰陶侃曾如厠見數十人悉持大杖有一人衣平上㥽自稱後帝云君長者放出相見三載莫説當富貴言訖侃便起未幾失所在有大印作公字當其穢處侃左手有丈直達中指至横上節便絶占者以為此文若過位無極侃針挑合徹血流彈壁仍作公字又取紙袞公迹逾明具瞻所歸不用非其人荀朂别傳曰晉司徒缺武帝問其人於朂答曰三公具瞻所歸不用非其人魏文帝用賈詡孫權笑之我不獨拜公世說王丞相既拜司徒而歎曰王喬若過江我不獨拜公爾兼才望光祿大夫青州大中正劉毅卒武帝撫几驚曰失吾名臣不得生三公即贈儀同三司北海王宫上䟽曰中詔以毅忠允匪躬贈台司臣謹按諡者行之迹號者功之表今毅功德並立而有號無諡臣竊以春秋之事求之諡法主於行而不繫爵然漢魏相承爵非列侯則皆没而髙行不加之諡至使三事之賢臣不如野戰之將臣願舉春秋之逺制改列爵之舊限帝出其表使八座議之多同宫議奏寢不行口自為鼔齊張敬兒將拜三司謂其妻嫂曰我拜後府開黄閣口自為鼔聲初得鼔吹羞便奏之又於新林姥廟中為妾祈子咒神口自稱三公其鄙俚如此以任昉為記室梁武帝尅建業霸府初開以任昉為驃騎記室㕘軍專主文翰始梁武與昉遇竟陵王西邸從容謂昉曰我登三府當以卿為記室至是引昉以符昔言黃閤置鴟尾陳舊制三公黄閤聽事置鴟尾後帝時蕭摩訶以功授侍中驃騎大將軍左光祿大夫時詔摩訶開閤門施行馬聽事寢堂並置鴟尾黒頭三公後魏書宗室元彧少冇才學當時甚美侍中崔光見而謂人曰黒頭侍中當此人也司武司衆司土詔曰尉惟司武武在止戈徒惟司衆敬敷五教空惟司土利用厚生食不兼味長孫道生拜司空加侍中性忠厚亷約身為三司而衣不華飾食不兼味一熊皮鄣泥十年不易時人比之晏嬰中書令讀策唐宰相張延賞與李晟不協吐蕃尚結賛數遣使乞和晟奏曰戎狄無信不可許上意將帥生事邀功延賞揣上意奏罷晟兵權拜太尉兼中書令奉朝請而已故事冊拜三公中書令讀冊侍中奉禮如闕即以宰相攝之延賞欲輕其禮始令兵部尚書崔漢衡攝中書令讀冊時議非之正天下説苑三公正天下調隂陽節風雨在天曰三台天文錄三台星一名三能一名天柱三公之位也在人曰三公在天曰三台象鼎足承上環濟要畧三公者象鼎三足共承其上也三老五更禮記樂記曰食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也三老五更互言之耳皆老人更知三德五事者也冕而總干親在舞位也周名太學曰東膠文王世子曰天子視學大昕鼓徴所以警衆也衆至然後天子至乃命有司行事興秩節祭先師先聖焉有司卒事反命始之養也適東序釋奠於先老遂設三老五更羣老之席位焉適饌省醴養老之珍具養老東序則視學於上庠三老五更各一人也皆年老更事致仕者也天子以父兄養之示天下之孝弟也名以三五者取象三辰五星天所以照明天下者羣老無數其禮亡以鄉飲酒禮言之席位之處則三老如賓五更如介羣老如衆賓必也王制曰凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之五十養於鄉六十養於國七十養於學達於諸侯天子諸侯養老同有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊有虞氏深衣而養老夏后氏燕衣而養老殷人縞衣而養老周人𤣥衣而養老内則凡養老五帝憲三王有乞言有讀為又又從之求善言可施行也五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而後乞言亦微其禮皆有惇史惇史史教厚者也微其禮者依違言之求而不切也孝經援神契天子親臨辟雍尊事三老兄事五更三者道成於三五者訓於五品言其能以善道改更也三老五更皆取其首妻男完具者蔡邕月令章句五更當為五叟叟長老之稱也其字似更書者轉誤嫂字女旁叟今皆以為更矣應劭漢官儀天子父事三老兄事五更天子親割三公設几九卿正履以引以翼詩行葦周家忠厚仁及草木故能内睦九族外尊事黄耉養老乞言以成其福祿焉其詩曰曽孫惟主酒醴維醹酌以大斗以祈黄耉黃耉台背以引以翼幸辟雍行禮後漢明帝永平二年冬十月壬子幸辟雍初行養老禮詔曰復踐辟雍尊事三老兄事五更安車輭輪供綏執授侯王設醬公卿饌珍朕親袒割執爵而酳祝哽在前祝饁在後升歌鹿鳴下管新宫八佾具脩萬舞於庭朕固薄德何以克當三老李躬年者學明五更桓榮授朕尚書詩曰無德不報無言不酬其賜榮爵闗内侯邑五千戸三老五更皆以二千石祿養終其身注尊事三老父象也老人知天下之事者輭輪以蒲裹輪三老就車天子執綏授之五更老人知五行更代事者三老五更皆取有首妻男女全具者用其德行年耆髙者三公一人為三老次卿一人為五更皆服絺紵大袍單衣皂緣領袖冠進賢扶玉杖五更亦如之不杖皆齋于太學講堂其日乗輿先到辟雍遣使安車迎三老五更天子迎于門三公設几杖九卿正履天子親袒割爼執醬而饋執爵而酳明日皆詣闕謝以其於已禮太隆也奉杖進履賈山曰天子之尊四海之内莫不為臣然而養三老於太學親執醬而饋執爵而酳祝饐在前祝哽在後公卿奉杖大夫進履皤皤國老班固辟雍詩曰皤皤國老乃父乃兄玉杖續後漢三老五更杖玉杖長九尺端以鳩為飾鳩者不噎之烏欲老人之不噎也賜玉杖華嶠後漢書熙平中天子引袁逢為三老賜玉杖車駕躬行古禮魏志少帝詔曰夫養老興教三代所以樹風化也乞言納誨著在惇史其以王祥為三老鄭小同為五更車駕躬行古禮帝乞言於祥祥對曰昔者明王禮樂既備加之以忠誠忠誠之發形於言行以師道自居王隠晉書曰王祥字休徵魏髙貴鄉公入學命祥為三老鄭小同為五更祥南面以師道自居帝北面乞言於是仰惟明王聖帝君臣政化之要俯以訓帝于時羣卿士聞其格言莫不砥礪以老遜位後魏孝文太和十六年司徒尉元以老遜位八月己酉以尉元為三老游明根為五更尚父史記周本紀武王克商封功臣謀士而師尚父為首封於營丘曰齊也齊世家曰太公望吕尚窮困年老矣以漁釣干周西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔於是西伯獵果遇太公渭之陽與語大説曰自吾先君太公曰當有聖人適周周以興子真是耶吾太公望子久矣故號之曰太公望載與俱歸故文王時天下三分有二歸周者太公之謀計居多及武王滅商遷九鼎修周政而與天下更始尚父謀又居多於是封師尚父於齊營丘鷹揚詩大明維師尚父時維鷹揚涼彼武王注師太師也尚父可尚可父也鷹揚如鷹之飛揚也涼佐也師之尚之父之劉向别錄師之尚之父之故曰師尚父父亦男子之稱欲稱而止魏志董卓至西京為太師號曰尚父乗青葢金華車爪畫兩轓時人號曰竿摩車公卿見卓謁拜車下卓不為禮注獻帝記曰卓既為太師復欲稱尚父以問蔡邕邕對曰昔武王受命太公為師輔佐周室以代無道是以天子尊之稱父今公之功德誠為巍巍宜湏闗東悉定車駕東還然後議之乃止麾去妾婢待盧杞唐郭子儀建中初為尚父有疾百官造問皆不屏妾婢及御史中丞盧杞來子儀速麾去逺側獨隠几待杞杞去或問其故子儀曰彼形怪陋而險吾左右見之必笑此人若得權吾當族矣錢鏐吳越書天祐三年以鏐為尚父四輔尚書大傳古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無對責之疑有志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其祿視次國之君禮記文王世子曰虞夏商周有師保有疑丞設四輔及三公不必備惟其人語使能也得能則用之無則已不必備其官也小人處其位不如且闕君子曰德德成而教尊教尊而官正官正而國治君之謂也前漢平帝元始元年置太師太保孔光以太傅遷太師王舜以車騎將軍為太保王莽以大司馬領太傅又置少輔為四輔王莽居攝置四輔官初王莽為左輔甄豐為右弼甄邯為後丞後又制以太師太傅國師國將為四輔後周宣帝又置四輔官以大冢宰越王盛為大前疑蜀國公尉遲迥為大右弼申國公李穆為大左輔隋國公楊堅為大後丞欽四鄰書益曰欽四鄰庶頑讒說若不在時侯以明之撻以記之爭臣孝經古者天子有爭臣七人鄭𤣥注謂三公前疑後丞左輔右弼為國維綱前漢馬宫宇游卿為大司徒哀帝時賜策皆以四輔為國維綱三公之任鼎足承君不有鮮明無以居位如君言至誠可聽惟君之惡在洒心前不敢文過朕甚多之置七臣以廣諫道後漢劉瑜上疏曰惟陛下設置七臣以廣諫道爭臣七人以自鑒照郅夀傳何敞上疏理之曰臣聞聖王闢四門開四聰建直言之路下不諱之詔立敢諌之木聽歌謠於路爭臣七人以自鑒照太師大戴禮天子不諭於先聖之德不知君國畜民之道不見禮義之正不察應事之理不博古之典傳不閑威儀之數詩書禮樂無經學業不法凡是之屬太師之任也前漢百官公卿表太師古官平帝元始元年初置金印紫綬太師位在太傅上漢書音義師訓也應劭漢官儀太師古官殷紂時箕子周武王時太公成王時周公並為太師周公薨畢公代之秦及漢初並無至平帝元始元年初置以孔光居焉晉職官志晉初以景帝諱置太宰以代太師之任秩增三司太傅太保皆為三公宋百官志太宰一人周武王時周公旦始居之掌邦治為六卿之首秦漢魏不常置晉初依周禮備置三公之職太師居首景帝名師故置太宰以代之太宰葢古之太師也殷紂之時箕子為太師周武王時太公為太師周成王時周公為太師周公薨畢公代之漢西京初不置平帝始復置漢東京又廢獻帝初董卓為太師卓誅遂廢魏世不置晉既因太師而置太宰以安平王孚居焉南齊百官志太師太保太傅周舊官漢末董卓為太師晉惠帝初衞瓘為太保自後無太師而太保為贈齊唯置太傅隋百官志後齊多循後魏置太師太保太傅為三師唐百官志太師一人天寳以前唯以其官贈仲尼及長孫貞武士彠竇毅韋元貞張說裴光庭父師書微子作誥父師少師注父師太師三公箕子也周公為師君奭曰召公為保周公為師相成王為左右今予祗命畢命王曰嗚呼父師今予祗命公以周公之事徃哉天子所師法周官曰立太師太傅太保注師天子所師法也師保之訓太甲曰既徃背師保之訓弗克于厥初赫赫師尹民具爾瞻詩節彼南山維石巖巖赫赫師尹民具爾瞻又曰尹氏太師維周之氐秉國之均四方是維天子是毗俾民不迷箋云氐當作桎轄之桎毗輔也言尹氏當太師之官為周之桎轄持國政之平維制四方上輔天子下教化天下使民無迷惑之憂言任至重也維師尚父時維鷹揚大明見尚父門師尚父史記齊世家首封周本紀並見尚父門賜靈壽杖前漢平帝即位太后稱制委政王莽白太后帝㓜少宜置師傅乃以孔光為太傅明年徙先為太師莽為太傅光常稱疾不敢與莽並及莽為宰衡位諸侯王上光愈恐固稱疾辭位太后詔無朝十日一賜食賜太師靈壽杖黃門令為太師省中位坐置几太師入省中用杖賜食十七物篤學博聞宜備國師續漢書趙典篤學博聞宜備國師即太師也鴻鵠固有逺志獻帝春秋董卓自號太師御史中丞以下皆拜皇甫嵩與卓爭權後嵩為中丞見卓拜卓曰可以服未嵩曰安知明公乃至於是卓曰鴻鵠固有逺志但燕雀不知爾嵩曰昔與明公俱為鴻鵠但明公今日變為鳳凰卓笑曰卿早服何得不拜欲稱尚父魏志董卓見尚父門師臣軒轅聖人也仗師臣而授圖縞巾素帶居師友之位晉書蜀李壽以安車束帛聘龔壯為太師壯固辭特聽縞巾素帶居師友之位天地太師蜀李雄僣號時范長生自西山乗素輿詣成都雄拜長生為天地太師封西山侯秩贈三司贊拜不名隋髙祖受禪李穆來朝髙祖降坐禮之拜太師贊拜不名真食成安縣三千戸於是穆子孫雖襁褓悉拜儀同其一門執象笏者百餘人穆之貴盛當時無比師範一人唐置太師以師範一人儀刑四海官之極後唐天成三年詔曰太師官之極就賜生辰器幣國朝淳化三年遣左正言張秉齎太師趙普生辰器幣鞍馬就西京賜之國朝故事非同平章事者無生辰賜幣之例上以普勲舊故特異其禮養疾三月以西京留守太保兼中書令趙普為太師西京養疾以開國元臣故優拜之非常例也太傅大戴禮傅傅之徳義也天子無恩於父母不惠於庶民不禮於大臣不中於折獄無經於百官不哀於喪不敬於祭不信於諸侯不誡於戎事不誠於賞罰不厚於德不强於行賜予侈於近臣憐愛於疏逺卑賤不能懲忿窒欲不從太師之言凡是之屬太傅之任也前漢百官表太傅古官髙后元年初置金印紫綬後省八年復置後省哀帝元壽二年復置位三公上後漢百官志太傅上公一人本注曰掌以善道無常職世祖以卓茂為太傅薨因省其後每帝初即位輒置太傅錄尚書事薨輒省大戴記曰傅傅之德義也應劭漢官儀曰傅者覆也賈生曰天子不喻於先聖之德不知君民之道不見禮義之正詩書無宗學業不法此太師之責也古者齊太公職之天子不惠於庶民不禮於大臣不中於折獄無經於百官不哀於喪不敬於祭不戒於齊不信於事此太傅之責也古者周公職之天子處位不端受業不敬言語不敘音聲不中進退升降不以禮俯仰周旋無節此太保之責也古者燕召公職之天子燕業反其學左右之習詭其師答諸侯遇大臣不知文雅之辭已語之適簡聞少誦不博不習此少師之責也天子居處出入不以禮衣服冠帶不以制御器列側不以度采服從好不以章忿悦不以義與奪不以序此少傅之責也天子居處燕私安而易樂而眈飲食不時醉飽不節寢起早晏玩好器弄無制此少保之責也此古天子自輔弼之禮也身為天子而賢知維之故能慮無失計舉無過事終身得中也應劭漢官儀太傅古官也周成王時康叔為之髙后元年初用王陵金印紫綬晉職官志魏初唯置太傅以鍾繇為之末年又置太保以鄭沖為之宋書晉宣帝為魏太傅誅曹爽後置左右長史掾屬舍人各十人事既非常加又領兵非准例也宋百官志太傅一人周成王時畢公為之漢髙后元年初用王陵南齊百官志太師太傅太保周舊官齊唯置太傅齊職儀太傅品秩冠服同太宰成王即位周公為之太傅遷太師秦無其職漢惠帝崩吕后以丞相王陵為少帝太傅位在三公上隋百官志梁武受命之初官班多同宋齊之舊有太傅陳以為贈官後齊置太師太傅太保是為三師唐百官志太傅一人六典後漢光武惟置太傅有府寮拜故密令卓茂為之明帝以鄧禹為之章帝以下初即位皆置太傅錄尚書事其人亡則罷謝病杜門前漢王陵為人少文氣好直言為右丞相吕太后欲廢陵乃陽遷陵為帝太傅寔奪之權陵怒謝病杜門竟不朝請名冠天下後漢卓茂為密令教化大行更始立以茂為侍中祭酒知更始政亂以年老乞骸骨歸光武即位詔曰前密令卓茂名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封褒馬德侯食邑三千戸賜几杖車進見東向顯宗即位以鄧禹先帝元功拜為太傅進見東向甚見尊寵注臣當北面以尊如賓故令東向正身立朝趙熹内典宿衞外幹掌職正身立朝未嘗懈隋肅宗即位進為太傅錄尚書事又光武嘗稱熹真長者在位修身和帝即位以鄧彪為太傅錄尚書事賜爵闗内侯永光初竇氏專權驕縦朝廷多有諫諍而彪在位修身而已不能有所匡正又嘗奏免御史中丞周紆紆前失竇氏㫖故頗以此致譏然當時宗其禮讓元功之族和帝册故太尉鄧彪曰元功之族三讓彌髙今以彪為太傅與三公絶席張禹拜太傅錄尚書事鄧太后以殤帝初育欲重臣居禁内乃詔禹舍宫中給帷帳牀褥大官朝夕進食五日一歸府每朝贊與三公絶席志誅曹節陳蕃字仲舉年十五嘗閉一室蕪穢不掃曰大丈夫當掃除天下安事一室乎竇后臨朝以蕃為太傅錄尚書事蕃與后父大將軍竇武同心盡力徴用名賢共㕘政事志誅常侍曹節等以其諂事太后多行貪虐天下之士莫不延頸想望太平及事泄曹節矯詔誅武等蕃遂見害無咎無譽胡廣贊曰鄧張作傅無咎無譽胡公庸庸飾情克恭朝章雖理據正或撓練達事體明解朝章胡廣為太傅時年八十四練達事體明解朝章雖無謇直之風屢有補闕之益故京師號曰萬事不理問伯始天下中庸有胡公恩寵之異華嶠後漢書鄧彪字智伯為太傅賜爵闗内侯百官總已以聽於彪恩寵之異莫與為比三世在位為國元老東觀漢記章帝詔曰行太尉事趙熹三世在位為國元老其以熹為太𫝊時年八十而心力克壯繼母在堂朝夕瞻省傍無几杖言不稱老載輿上殿魏志明帝即位遷鍾繇為太傅繇膝疾朝見使載輿車虎青舁上殿就坐是後三公有疾遂為故事羣言系于口典誥總于心曹植輔臣論曰精微聽察理析毫分規矩可則阿保不傾羣言系于口而研摭是非典誥總于心而唯所用之者鍾太傅也朝之雋老晉鄭沖抗表致仕詔曰太傅韜徳深粹履行髙潔恬逺清虚確然絶世厯登三事仍荷保傅之重可謂朝之雋老衆所其瞻者也屢以年髙疾篤致仕告退今聽其所執以壽光公就第位同保傅在三司之右几杖不朝若朝有大政皆就諮之就諮國政上上貂蟬印綬习𨽻李憙等奏太傅鄭沖太保何曽太尉荀顗各以病疾俱應免帝不許沖遂不視事表乞骸骨優詔不許沖固辭上貂蟬印綬詔又不許㑹朝劍履乗輿上殿何曽為太傅乞遜位詔今朝㑹劍履乗輿上殿如漢相國蕭何田千秋魏太傅鍾繇故事保傅之賢明宗國用寧王􅛫之保傅箴曰保傅之賢明宗國用寧輔弼之不忠禍及于躬無曰父子無間昔有潘崇無曰至親無二或容江克三為太傅後魏淮陽王欣大統中為太傅文帝謂欣曰王三為太傅再為太師自古人臣未聞此例欣遜謝而已賜女樂北齊髙歸彦作亂冀州段韶與東安王婁叡率衆討平之遷太傅賜女樂十人并歸彦果園一千畝未嘗以勢位驕人後周王盟為太傅盟姿度𢎞雅仁而泛愛雖居師傅禮冠羣后而謙恭自處未嘗以勢位驕人魏文帝甚尊重之不持威儀行常單馬達奚武字成興轉太傅微時奢侈好華飾末居重位不持威儀行常單馬門不施㦸常晝掩一扉或謂武曰公位冠羣后何輕率若是武曰吾昔在布衣豈望富貴不可頓忘疇昔且天下未平國恩未報安可過事威容乎言者慙而退太保大戴禮天子處位不端受業不敬言語不序聲音不中律進退節度無禮升降揖讓無容周旋俯仰視瞻無儀不顧咳唾趨行不得色不比順隠琴瑟凡此之屬太保之任也前漢百官公卿表太保古官平帝元始元年初置金印紫綬次太傅應劭漢官儀太保古官也保養也晉百官志魏末年置太保以鄭沖為之宋百官志太保一人殷太甲時伊尹為之周武王時召公為之漢平帝元始元年始用王舜後漢至魏不置晉初復置焉齊職儀殷太甲時伊尹為太保周成王時召公為太保隋百官志梁武受命之初官班多同宋齊之舊有太保陳以為贈官後齊置太師太傅太保為三師唐百官志太保一人天寶以前唯以其官贈竇季謀而已召公為保書君奭曰召公為保周公為師相成王為左右召公不説周公作君奭以告之注尊之曰君相洛宅召誥曰成王在豐欲宅洛邑使召公先相宅作召誥曰惟太保先周公相宅故洛誥曰召公既相宅周公徃營成周保申笞王呂氏春杖曰荆文王得茄雲夢黃之狗宄路之矰以田於三月不返得丹陽之姬期年不聽朝保申曰先王以臣為保今王期年不聽朝王之罪當笞王伏臣將笞王王曰敬諾保申束細箭跪而加之于背如此者再謂王曰起矣王曰有笞之名一也遂致之保申曰君子恥之小人痛之恥之不變痛之何益保申趨出請死罪文王曰此不穀之過也保申何罪王乃殺茄黄之狗折宛路之矰放丹陽之姬兼國三十九保申之力也元老晉武初踐胙以王祥為太保進爵為公加置七官之職祥以年老累乞遜位不許御史中丞侯史光以祥久疾闕朝㑹禮請免祥官詔曰太保元老髙行朕所毗倚以降政道者也遂寢光奏明允詔曰太傅鄭沖太保何曽太尉荀顗各尚德依仁明允篤誠翼亮先皇濟光帝業清逺王祥薨奔赴者非朝廷之賢親親故吏而已門無雜弔之賓族孫戎嘆曰太保可謂清逺矣含素遲暮贊曰鄭沖含素王祥遲暮沖與祥曽俱為太保沖後遷太傅對掌朝政汝南王亮為太宰錄尚書事與太保衛瓘對掌朝政又衞瓘為太保以公就第置長史司馬從事中郎掾屬給兵千人衞瓘字伯玉性貞靜有名理以明識清允稱襲父爵楊駿專權與黃門等毁之瓘乃告老遜位詔進位太保以公就第給親兵百人置長史司馬從事中郎掾属惠帝即位復瓘千兵初瓘為廷尉鄧艾鍾㑹之伐蜀也瓘以本官持節監艾㑹軍事給兵千人至是而復欲養老屬太保雀鴻春秋蜀李雄錄曰雄異母兄始字伯敬為太保善撫士衆多歸之時人為之語曰欲養老屬太保同日降制國朝天禧元年司徒平章事王旦荆王元儼同日降制加太保三公併除雙員自此始也三少尚書周官少師少傅少保曰三孤貳公𢎞化寅亮天地弼予一人此三官名曰三孤孤時也言卑於公尊於卿特置此三者前漢百官公卿表太師太傅太保為三公又立三少為之副少師少傅少保是為三孤與六卿為九焉後漢百官志太傅天子燕業反其學左右之習詭其師答諸侯遇大臣不知文雅之辭已語之適簡聞少誦不博不習此少師之責也天子居處出入不以禮衣服冠帶不以制御器列側不以度采服從好不以章忿悦不以義與奪不以節此少傅之責也天子居處燕私安而易樂而躭飲食不時醉飽不節寢起早晏無常玩好器弄無制此少保之責也比干書㣲子殷之既喪天命㣲子誥父師少師注少師孤卿太尉禮記月令孟夏之月命太尉贊傑俊遂賢良舉長大行爵出祿必當其位春秋合誠圖堯坐中舟與太尉舜臨觀鳳凰圖春秋運斗樞赤龍負圖以出河見堯與太尉舜等百二十人集發藏大麓史記孝惠帝六年置太尉官前漢百官公卿表太尉秦官自上安下曰尉武官悉以為稱金印紫綬掌武事武帝建元二年省後漢百官志太尉公一人前漢書曰秦官鄭𤣥注月令亦曰秦官尚書中候云舜為太尉東晳據非秦官以此追難𤣥焉臣昭曰緯候衆書綜貫神詭出没隠顯動挾誕怪該覈陰陽徼迎起伏或有先徵時能後騐故守寄精思雜稱曉輔通儒達好時略文滯公輸益州具於張衡之詰無口漢輔炳乎尹敏之諷圖讖紛偽其俗多矣太尉官實司天虞舜作宰璇璣賦政將是據後位以書前非唐官之實號乎太尉所職即舜所掌遂以同掌追稱太尉乃中候之妄葢非官之為謬康成淵博自注中候裁及注禮而忘舜位豈其實哉是不發譏於中候而正之於月令也廣微之誚未探碩意說苑曰當堯之時舜為司徒新論曰昔堯試於大麓者領錄天子事如今尚書官矣古史考曰舜居百揆總領百事説者以百揆堯初别置於周更名冢宰斯其然矣本注曰掌四方兵事功課嵗盡即奏其殿最而行賞罰凡郊祀之事掌亞獻大喪則告諡南郊凡國有大造大疑則與司徒司空通而論之國有過事與二公通諫諍之世祖即位為大司馬漢官儀曰元狩六年罷太尉法周制置司馬時議者以為漢軍冇官候千人司馬故加大為大司馬所以别異於小司馬之號建武二十七年改為太尉蔡質漢儀曰府開闕王莽初起大司馬後簒盜神器故遂貶去其闕漢官儀曰張衡云明帝更司馬司空府欲復更太尉府時公趙熹也西曺掾安衆鄭均素好名節以為朝廷新造北宫整飭宫寺旱魃為虐民不堪命曽無殷湯六事周宣雲漢之辭今府本館陶公主第舍負職既少自足相容熹表陳之即聽許其冬臨辟雍厯二府見皆壯麗而太尉府獨卑陋顯宗東顧歎息曰椎牛縦酒忽令乞兒為宰時熹子世為侍中驂騎歸具白之熹以為恨頻譴責均均自劾去道發病亡占今注曰永平十五年更作太尉司徒司空府開陽城門内與此不同臣昭案劉虞為太尉司空而與太尉並置焉漢官典職太尉孝文三年始置七年省武帝建元二年置五年省武帝更名大司馬建武二十七年復置太尉晉百官志晉受命迄江左其相承不替宋百官志太尉一人掌兵事郊祀亞獻大喪則吿諡南郊堯時舜為太尉漢因之武帝建元二年置光武建武二十七年罷大司馬置太尉以代之靈帝末以劉虞為大司馬而太尉如故齊職儀太尉品第一金章紫綬進賢三梁冠絳朝服佩𤣥玉郊廟冕服七旒𤣥衣纁裳服七章隋百官志梁武受命之初官班多同宋齊之舊有太尉後齊置太尉司徒司空是為三公唐百官志太尉一人六典太尉晉以司馬望為太尉厯宋齊梁陳後魏北齊並為三公置府寮宋後魏有大將軍則不置太尉正光以後並置安劉氏者必勃前漢髙祖疾甚吕后問大臣上曰周勃重厚少文然安劉氏者必勃也可令為太尉跪上天子璽符文帝乗傳至渭橋羣臣拜謁稱臣代王下車拜太尉周勃進曰願請間言宋昌曰所言公公言之所言私王者不受私太尉乃跪上天子之壐符典職六年勤勞不怠後漢章帝詔曰司空牟融典職六年勤勞不怠其以融為太尉錄尚書事置雲母屏風鄭𢎞字巨君少為鄉嗇夫太守第五倫行春見而深竒之召署督郵舉孝㢘後為太尉時舉將第五倫為司空班次在下正朔朝見𢎞曲躬而自卑帝問之知其故遂聽置雲母屏風分隔其間由此以為故事四世德業相繼楊震秉賜彪四世為太尉德業相繼為東京名族震字伯起嘗居客于湖不答州郡禮命數十年衆人謂之晚暮而震愈篤後有鸛雀銜三鱣魚飛集講堂前都講取魚進曰鱣者卿大夫服之象也數三者法三台也先生自此升矣後果至太尉鸛雀銜三鱣見上奏劾近官楊秉字叔節為太尉時中常侍侯覽弟參為益州刺史累有贓暴虐一州明年秉劾奏參檻車徵詣廷尉參惶遽自殺秉因奏覽及中常侍具瑗口臣案圖舊典宦豎之官本在給事省闥司昏守夜而猥受過寵執政操權書奏尚書召對秉掾屬曰公府外職而奏劾近官經典漢制有故事乎秉使對曰春秋趙鞅以晉陽之甲逐君側之惡傳曰除君之惡惟力是視漢世故事三公之職無所不統尚書不能詰帝不得已竟免覽官而削瑗國毎朝廷有得失輒盡忠諫多見納用免歸鄉里劉寵字祖榮為太尉以日蝕策免歸鄉里時人稱長者寵為太尉以日蝕免歸嘗出京師欲息亭舍亭長止之曰整頓洒掃以待劉公不得入也寵無言而去時人稱其長者也清白為百寮式鄧彪字智伯為太尉在位清白為百寮武陳忠薦劉愷愷字伯豫厯位司空司徒上書稱疾致仕㑹太尉馬英策罷尚書陳忠上疏薦愷曰臣聞三公上則台階下象山岳股肱元首鼎足居職伏見前司徒劉愷沉重淵懿道德博備頻歴二司舉動得禮以疾致仕側身里巷處純進退有度百僚矜式海内歸懐徃者孔光師丹近世鄧彪張酺皆去宰相復序上司誠宜簡練卓異以厭衆書奏詔引愷拜太尉拒耿寶薦李常侍兄楊震代劉愷為太尉帝舅大鴻臚耿寶薦中常侍李閏見于震震不從寶乃自徃候震曰李常侍國家所重欲令公辟其兄寶惟傳上意爾震曰如朝廷欲令三府辟召固宜有尚書勅遂拒不許寶大恨而去視事三年病乞骸骨劉愷拜太尉視事三年病乞骸骨久乃許之有匪石不貳之心冲帝詔書曰太尉趙峻二世掌典樞衡有匪石不貳之心忠正不撓有史魚之風又曰三公國之楨幹朝廷取正以成斷金大司農李固公族之苗忠正不撓有史魚之風其以固為太尉與大將軍㕘錄尚書事璇璣不平冦賊姦宄則責太尉李固傳臣聞台輔之佐實和隂陽璇璣不平冦賊姦宄則責在太尉坐使人於單席羊續字興祖靈帝欲以續為太尉時拜三公者皆輸東園禮錢千萬令中使督之曰左騶其所之徃輒迎致禮敬厚贈賂續乃坐使人於單席舉縕袍以示之曰臣之所資惟斯而已左騶白之帝不悦以此故不登公位注騶騎士也任重責大劉寛字文饒為太尉常於坐被酒睡伏帝問曰太尉醉耶寛對曰臣不敢醉但任重責大憂心如醉三登胡廣在公台三十餘年厯事六帝禮任甚優毎遜位辭病及免退田里未嘗滿嵗輒復升進凡一履司空再作司徒三登太尉又為太傅其所辟命皆天下名士故吏陳蕃李咸並為三司蕃等每朝㑹輒稱疾避廣時人榮之箴崔駰箴曰上之云據下之云戴茍非其人斁我帝載食脱粟飯李咸孤時自立自大鴻臚拜太尉其在相位約身率下常食脱粟飯醬菜而已不與州郡交通刺史二千石牋記非公事不發省以先乞骸骨見許悉還所賜物乗敝牛車而去入三嵗租稅助郡國廪假張禹為太尉時連嵗災荒府藏空虚禹上疏求入三嵗租税以助郡國廪假許之不敢先佩印綬陳蕃與黄憲同郡及蕃為三公臨朝嘆曰叔度若在吾不敢先佩印綬矣貨賂中官宦者傳曹嵩靈帝時貨賂中官及輸西園錢壹萬億故位至太尉所辟皆海内長者續漢書王龔為太尉在位恭慎自守非公亊不通州郡書記其所辟命皆海内長者父尚在東觀漢記張酺字孟侯為太尉酺毎遷轉乃一到洛父來適㑹正臘公卿罷朝俱賀嵗奉酒上酺父壽極歡醼莫不嘉其榮也食脱粟飰卧布被謝承後漢書京兆朱寵字仲威為太尉家貧食脱粟飰卧布被朝廷賜錦被梁肉皆不敢當兩白鹿隨車鄭𢎞為臨淮太守行春有兩白鹿隨車夾轂而行𢎞怪問主簿黄國鹿為吉㐫國拜賀曰聞三公車圖畫作鹿明府當為宰相後果為太尉策免就國華嶠後漢書安帝即位太尉徐防以災異冦賊策免就國凡三公以災免自防始也羊續不代劉虞袁崧後漢書太尉劉虞讓位於羊續靈帝時為王公者皆輸禮錢十萬續舉縕袍以示之曰臣之所有惟此而已遂不代虞三不惑張璠漢記楊秉為太尉常曰我有三不惑酒色財天下稱為名公更治府應劭漢官儀河間相張衡云明帝以為司徒司空府已榮欲更治太尉府公南陽趙熹也餘見前後漢百官志注齊七政訓五兵汝南先賢傳陳蕃拜太尉讓曰齊七政訓五兵臣不如王暢載輿上殿魏志鍾繇字元常遷太尉時司空王盟並先世名臣文帝罷朝謂左右曰此三公者乃一代之偉人也後世殆難繼矣明帝即位遷太傅繇有膝疾拜起不便時華歆亦以髙年疾病朝見皆使輿車虎賁舁上殿就坐是後三公有疾遂以為故事不得已乃起華歆字子魚明帝即位轉太尉歆稱疾乞退讓位於管寧帝不許遣常侍繆襲奉詔喻指又詔襲須歆必起乃還歆不得已乃起其清不可及傅子曰敢問今之君子曰袁郎中積徳行儉華太尉積徳居順其智可及也其清不可及也事上以忠濟下以仁晏嬰行父何以加諸白起韓信吳漢亞夫不足比勲鄧艾既平劉禪詔曰艾耀武奮威深入虜廷雖白起破强楚韓信克勁趙吳漢擒子陽亞夫滅七國計功論美不足比勲其以艾為太尉登上公以副衆望吳志孫皓詔曰范慎勲徳俱茂朕所倚憑宜登上公以副衆望可為太尉安有三公輒拜人晉志王祥見三公門王公相去一階注旬月之中使者八至中興書桓溫授侍中太尉固讓不受旬月之中使者八至軺車相望於道溫遂領職進登上台摯虞册隴西王太尉文曰朕惟君行為時表親則宗臣論道經邦保又皇家是用進登上台在公位冲心愈約郄鑒為太尉雖在公位沖心愈約勞謙日昃誦玩墳索自少及長身無擇行咸康五年秋寢疾上疏遜位不許絶闇中遺金雀鴻前趙錄太尉范隆曽有所薦得美官者於闇中以金遺隆隆數而責之言人不知也謹不敢漏泄父母兄弟隆曰神已知矣其可取耶遂絶之觸目琳琅珠玉世説有人詣王太尉遇安豐大將軍丞相在徃别屋見秀𦙍平子還語人曰今日之行觸目琳琅與珠玉日蝕勿貶齊職儀魏黃初三年日蝕奏免太尉賈翊詔天地災害責在朕躬勿貶三公遂為永制異官同爵古今通語異官同爵共位别職興仁隆化幽贊神明者謂之太尉立五廟唐李晟拜太尉詔為晟立五廟成官給牲牢祭器床帳禮官相儀以稱焉定赴上儀優寵元臣國朝天禧元年王旦加太尉依前充玉清昭應宫使令禮院詳定赴上儀上優寵元臣故有是命扶掖升殿新授太尉王旦入謝便坐上以其羸瘠拜起頗難命謁者扶掖升殿賜坐勞問又遣其子大理評事雍賫官告賜之加襲衣金帶鞍勒馬如宰臣例星在杓南主宣德化天文錄三公星在北斗杓南主宣德化和隂陽若今之太尉司空之象也恨無官酬公唐李德裕以劉槙誅策功拜太尉德裕固讓言唐興太尉惟七人尚父子儀乃不敢拜近王智興李載義皆超拜保傅盖重惜此官裴度為司徒十年亦不遷臣願守舊秩足矣帝曰吾恨無官酬公母固辭毎顧我毛髮森豎宣宗即位德裕奉冊太極殿帝退謂左右曰向行事近我者非太尉耶毎顧我毛髪為森豎翼日罷為檢校司徒同中書門下平章事荆南節度使司徒尚書舜典帝曰契百姓不親五品不遜汝作司徒敬敷五教在寛周官司徒掌邦教敷五典擾萬民尚書大傳百姓不親五品不訓則責之司徒禮記王制司徒脩六禮以節民性明七教以興民德齊八政以防淫一道德以同俗養耆老以教孝恤孤獨以逮不足上賢以崇德簡不肖以黜惡曲禮曰天子之王官曰司徒司馬司空司士司冦月令孟夏之月司徒巡行縣鄙命農勉作毋休于都周禮地官大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國以天下之圖周知九州之地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物又曰大司徒之職凡建邦國以土圭土其地而制其域又曰大司徒之職以五禮防萬民之偽而教之中以六樂防萬民之情而教之和又曰大司徒之職以保息六養萬民大戴禮地宜不殖財物不蕃萬民饑寒教訓不行風俗淫僻百姓户亡人民流散曰危危則飭司徒左傳祝鳩氏司徒也論語摘輔像仲尼為素王顔淵為大司徒前漢百官公卿表卨作司徒敷五教周地官司徒掌邦教丞相秦官哀帝元壽二年更名大司徒後漢百官志司徒公一人孔安國曰主徒衆教以禮義本注曰掌人民事凡教民孝弟遜順謙儉養生送死之事則議其制建其度凡四方民事功課嵗盡則奏其殿最而行賞罰凡郊祀之事掌省牲視濯大喪則掌奉安梓宫凡國有大疑大事與太尉同世祖即位為大司徒漢官儀曰王莽時議以漢無司徒官故定三公之號曰大司馬大司徒大司空也世祖即位因而不改蔡質漢儀曰司徒府與蒼龍闕對厭於尊者不敢號府應劭曰此不然丞相舊位在長安時府有四出門隨時聽亊明帝本欲依之進於太尉司空但為東西門國毎有大議天子車駕親幸其殿西王侯以下更衣併存毎嵗州郡聴採長吏臧否民所疾苦還條奏之是謂之舉謡也頃者舉謡言者掾屬令史都㑹殿上主者大言某州郡行狀云何善者同聲稱之不善者各爾衘枚大較皆取無名勢其中或有愛憎微栽黜陟之闇昧也若乃中朝熙恬踐周召之列當軸處中忘蹇諤之節憚首尾之譏懸囊提撮無能清澄其與申屠嘉切責鄧通王嘉封還詔書邈矣乎周禮有外朝干寶注曰禮司徒府中有百官朝㑹天子與丞相決大事是外朝存者建武二十七年去大漢舊儀哀帝元壽二年以丞相為大司徒郡國守長史上記事竟遣公出庭上親問百姓所疾記室掾史一人大音讀勑畢遣勑曰詔書殿下禁吏無苛暴百姓困於衣食二千石帥勸農桑思稱德厚恩有賑贍無煩擾奪民時今日公卿已不務飭儉恪奢侈過制度以益甚二千石身帥有以化之民冗食者請謹以法養視疾病致醫藥務治之詔書無飭厨養至今未變乂更過度甚不稱歸告二千石務省約如法且案不改者長吏以官寺卿亭漏敗墻垣圯壞不治無辦䕶者不勝任先自劾不應法歸告二千石聽十年更名相國案獻帝初董卓自太尉進為相國而司徒不省及建安末曽公為丞相郄虞為御史大夫則罷三公官茍綽晉百官表注曰漢丞相府門無闌不設鈴不警鼔言其深大濶逺無節限也蔡邕月令章句司徒散官也魏志黃初元年改相國司徒魏名臣奏黃門杜恕奏曰漢故事人民疾病責之司徒晉職官志太尉司徒並古官自漢歴魏置以為三公及晉受命迄江左其官相承不替宋百官志司徒一人掌民事郊祀掌省牲視濯大喪安梓宫少昊氏以鳥名官而祀鳩氏為司徒堯時舜為司徒舜攝帝位命契為司徒契𤣥孫曰微亦為夏司徒周時司徒為地官掌邦教漢西京初不置哀帝元壽二年罷丞相置大司徒光武二十七年去大南齊百官志司徒府領天下州郡名數戸口籍齊職儀司徒品秩冠服同丞相郊廟服冕同太尉漢哀帝從朱博議始置三司改丞相為大司徒以孔光為之魏以華歆為之隋百官志梁武受命之初官班多同宋齊之舊有司徒後齊置太尉司空是為三公唐百官志司徒一人六典司徒漢制司徒所部太僕鴻臚廷尉三卿漢末罷三公置丞相魏罷丞相置三公以華歆為司徒晉以何曽為司徒趙王倫篡位以梁王彤為丞相省司徒肜遷復舊永嘉元年王夷甫為司徒東海王鉞為丞相則始兩置矣成帝以王導為丞相以司徒府為丞相府導薨復舊宋有丞相又置司徒齊以丞相為贈官梁又兩置陳氏以丞相為贈官後魏正光之後復兩置北齊廢丞相乾明中又兩置後周並廢丞相置司徒皇朝因之作股肱心膂書穆王命君牙為大司徒王若曰嗚呼君牙惟乃祖乃父服勞王家厥有成績紀于太常今命爾予翼作股肱心膂纉乃舊服毋忝祖考農父酒誥曰矧惟若疇圻父簿違農父若保宏父定辟注農父司徒也父子善於其職詩緇衣美鄭武公也父子並為周司徒善於其職國人愛之以官廢職左傳桓公六年九月丁卯子同生公與文姜宗婦命之公問名於申繻對曰不以官以官則廢職晉以僖候廢司徒僖侯名司徒廢為中軍也不與三桓謀而召孔丘符子曰魯侯以孔子為司徒將召三桓議之乃謂左丘明丘明曰孔丘其聖人歟夫聖人任政過者離位焉君雖欲謀其將弗合乎魯侯曰吾子奚以知之丘明曰周人有愛裘人而好珍羞欲為千金之裘而與狐謀其皮欲具少牢之珍而與羊謀其珍言未卒狐相與逃於重丘之下羊相呼藏於深林之中故周人五年不制一裘五年不足一牢何者周人之謀失今君欲以孔丘為司徒召三桓而議之與狐謀裘與羊謀羞哉於是魯侯遂不與三桓謀而召孔丘為司徒允民望江氏家傳江統字應元時太傅從亊中郎庾子嵩以風韻見重亦雅敬君德毎云當今可以居司徒允民望者江生具人也年二十四後漢光武即位於鄗使使持節拜鄧禹為大司徒策曰前將軍禹深執忠孝與朕謀謨平帷幄決勝千里孔子曰自吾有回門人日親斬將破軍定山西功効尤著百姓不親五品不訓汝作司徒敬敷五教在寛今遣奉車都尉授印綬封為鄼侯邑萬戸敬之哉禹時年二十四明察守正侯霸字君房為大司徒封闗内侯在位明察守正奉公不回恭約盡忠馮勤字偉伯遷司徒先是三公多見罪退帝賢勤欲令以善自終乃因宴見從容戒之曰朱浮上不忠於君下陵轢同列竟以中傷至今死生吉凶未可知豈不惜哉人臣放逐受誅雖復追加賞賜賻祭不足以償不訾之身忠臣孝子覧照前世以為鏡誡盡忠於國事君無二則爵賞光于當世功名列于不朽可不勉哉勤愈恭約盡忠號稱任職中元元年薨帝悼惜之在職清儉蔡茂字子禮為司徒在職清儉匪懈茂初在廣漢夢坐太殿極上有三嵗禾跳取之得其中穗輒復失之以問主簿郭賀賀離席而慶曰大殿者官府之形象也極而有禾人臣之上祿也取中穗中台之位也於字禾失為秩雖曰失之乃所以得祿秩也衮職有闕公其補之旬月而茂徴焉願降司徒伏公伏湛字惠公光武即位知湛名儒舊臣徴拜尚書時大司徒鄧禹西征闗中帝以湛才任宰相拜為司直行大司徒事車駕毎出征伐常留鎮守總攝羣司建武三年遂代鄧禹為大司徒時賊徐異卿等萬餘人據富平連攻之不平惟云願降司徒伏公帝知湛為青徐所信向遣到平原異卿等即日歸降以白虹貫日策免郎顗上章曰竊見今月十四日乙卯時白虹貫日凡日旁氣色白而純者名曰虹貫日中者侵太陽也見於春者政變常也易傳曰公能其事序賢進士後必有喜反之則白虹貫日以甲見則譴在中台自司徒居位隂陽多謬宜黜司徒以應天意注韓詩外傳曰三公者司空司徒司馬也司馬主天司空主地司徒主人是故隂陽不調星辰失度責之司馬山陵崩絶川谷不流青之司空五榖不殖草木不茂責之司徒甲乙東方主春生殖五穀之時也而白虹以甲乙日見明責在司徒也時劉﨑為司徒至陽熹三年策免祿養親族宣秉字臣公拜大司徒司直所得俸祿輒以收養親族自無擔石之儲賜帛什器帷帳鮑昱代王敏為司徒賜錢帛什器惟帳廉直公正郭丹為司徒在朝廉直公正有四子無立錐之計范遷為司徒有宅數畆田不過一頃復推與兄子其妻常曰君冇四子無立錐之計銅臭崔烈歴為郡守九卿靈帝時鴻都門榜賣官爵公卿州郡下至黃綬各有差時段熲樊陵張溫等雖有功勤名譽皆先輸貨財而後登公位烈入錢五百萬得為司徒於是聲譽衰減問其子鈞曰吾居三公於議者何如鈞曰大人少有英稱歴位卿寺論者皆謂當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭討赤眉不時進東觀漢記鄧禹為司徒討赤眉不時進光武書曰司徒堯也赤眉桀也今長安饑民孰不延望憂念王室袁安為司徒毎朝㑹憂念王室未嘗不流涕卧麄布被謝承後漢書劉寵為司徒卧麄布被妻子不入官舍續漢書王良拜司直行大司徒事妻子不入官舍贈賻異他相張酺字孟侯代魯恭為司徒月餘薨乗輿縞素臨弔賜冢塋贈賻恩寵異於他相也家無擔石之儲華歆文帝時為司徒素清貧祿賜以賑施親戚故家無擔石之儲公卿常並賜没入生口唯歆出而嫁之帝歎息賜生口出嫁上蔬食華歆為司徒素清貧文帝下詔曰司徒國之雋老所以和陰陽理庶事今大官重膳而司徒蔬食甚無謂也特賜御衣及明帝即位轉太尉夢松生腹上吳錄曰丁固初為尚書夢松樹生其腹上謂人曰松字十八公後十八嵗吾其為公乎卒如夢焉諸葛亮拜許靖蜀志許靖字文休先主即尊號策靖曰朕獲奉洪業君臨萬國夙宵惶懼不能綏百姓百姓不親五品不遜汝作司徒其敬七敷五教在寛君其朂哉秉德無怠稱朕意焉靖雖年踰十愛樂人物納誘後進清談不倦丞相諸葛亮皆為之拜得人副逺近之望晉荀朂答詔曰司徒何曽遷太宰詔問朂司徒當得人副逺近之望并治事見才誰可也朂表三公具瞻之望誠不可用非其人昔魏文帝用賈詡為公孫權笑之垂没之人汚官府山濤為司徒固辭已勑斷章表乃卧加章綬濤曰垂没之人豈可汚官府乎輿疾歸家膏肓之疾晉王戎拜司徒雖位總鼎司而委事僚寀間乗小馬從便門而出游見者不知其三公也故吏多至大官道路相遇輒避之性好興利廣收八方園田水碓周徧天下積貨聚錢不知紀極毎日執牙籌晝夜筭計恒若不足而又儉嗇不知奉養天下人謂之膏肓之疾朝罷逕還送章綬魏舒字陽元為司徒年過致仕有遜讓章而無居宅乃漸以俸秩之餘為第一所舒素為人先行而後言故未嘗語親疏言當遜位九年正月整法服入殿朝㑹罷逕還奉送章綬内外莫有知舒此情者五教之官王隠晉書石苞拜大司馬䇿免以公歸第詔以苞為司徒雖以過防受黜尋授五教之官深陳之農桑本務明其考課居五年天下稱年過致仕無田宅見上魏舒板輿上殿晉諸公讚司徒傅祇疾遜位不許板輿上殿美選晉中興書中書劉隗從兄疇字王喬司𨽻訥之子也永嘉中從左長史為閻鼎所害疇有重名司空蔡謨歎曰劉王喬南渡司徒公之美選也吏屬皆令皂服王渾遷司徒仍加兵渾以司徒文官主吏不持兵及吏屬絳衣自以非是舊典皆令皂服論者美其識體奏州郡農桑賞罰石苞為司徒奏州郡農桑未有賞罰之制宜遣掾屬循行皆當均其土宜舉其殿最然後黜陟舊丞相之職何曽以太保侍中領司徒曽固讓詔曰司徒舊丞相之職自古及今總論人物化治之本以君𢎞道故選於衆而復盤桓非所聞也煩務不可久勞耆艾武帝時何曽以太傅領司徒屢遜位詔以司徒所掌煩務不可以久勞耆艾其進位大朝㑹乗輿劍履上殿如漢蕭何魏鍾繇故事見者不知是台司曹嘉之晉記王戎再至司徒委事掾屬乗小馬從便門出見者不知是台司也舊望清重荀氏家傳維字大章中宗為晉王時將徴為司徒問太常賀循曰維舊望清重勤勞顯著遷訓五品以統人倫實允人望詔以為司徒落水三公宋謝超宗為人恃才使酒多凌忽司徒褚僕彦回因送湖州刺史王僧䖍閣道壊墜水射王儉驚跣下車超宗拍掌笑曰落水三公墜車僕射彦回出水霑濕狼籍超宗先在僧䖍舫曰有天道焉有地道焉天所不容地所不受投舁河伯河伯不受彦回大怒曰寒士不遜超宗曰我不賣袁劉得富貴焉免寒士乎欲減功臣之地以給民隋書王誼為大司徒蘇威立議以為戸口滋多民田不贍欲減功臣之地以給民誼奏曰百官表歴世勲賢方蒙爵土一旦削之未見其可如臣所慮正恐朝臣功德不建何患民田有不足上然之竟罷威議和五教理人倫古今通語和五教理人倫使風行俗平萬國咸寧者謂之司徒辨博通見曹植輔臣論辨博通見秉道度德才識充乎内智謀從於外解疑釋滯剖散盤結者主司徒録詔書頒天下國朝宰相吕夷簡詔特守司徒依前兼門下侍郎同中書門下平章事三表懇讓不敢當乃降詔上令錄其詔書頒於天下使四海之人知朝廷有退讓之臣司空尚書舜典舜曰咨四岳有能奮庸熙帝之載僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉周官司空掌邦土居四民時地利冬官卿主國土以居民士農工商四人使順天時分地利授之土生百榖故曰土大傳溝瀆壅遏水為民害廣而不墾則責之司空韓詩外傳山陵崩阤川谷不通五榖不殖草木不茂則責之司空禮記王制司空執度度地居民山川沮澤時四時量地逺近興事任力左傳爽鳩氏司空也春秋元命苞危東六星兩兩而比曰司空主水金木守之天下憂水家語魯定公以孔子為司空乃别五土之性而物其所生之宜咸得厥所又曰度量不審舉事失理都鄙不修財物失所曰貧貧則飭司空前漢百官公卿表禹作司空平水土師古曰空穴也穿土為空以居人也周冬官司空掌邦事御史大夫秦官成帝綏和元年更名大司空祿比丞相置長史如中丞官職如故哀帝建平二年復為御史大夫元壽二年復為大司空後漢百官志司空一人馬融曰掌營城郭主司空土以居民本注曰職掌水土事凡營城起邑浚溝洫修墳坊之事則議其利建其功凡四方水土功課嵗盡則奏其殿最而行賞罰凡郊祀事掌掃除樂器大喪則掌將校復土凡國有大造大疑諌争與太尉同世祖即位為大司空應劭漢官儀曰綏和元年罷御史大夫官法周制初置司空議者又以縣道官有獄司空故復加大亦所以别大小之文建武二十七年去大漢舊儀曰御史大夫勑上計丞長史曰詔書殿下布告郡國臣下承宣無状多不究百姓不蒙恩被化守長史到郡與二千石同力為民興利除害務有以安之稱詔書郡國有茂才不顯者言殘民貪汚煩擾之吏百姓所苦務勿任用方察不稱者刑罰務於得中惡惡止其身選舉民侈過度務有以化之問今嵗善惡執與徃年對上問今年盜賊孰與徃年得無有羣輩大賊對上臣昭案獻帝建安十三年又罷司空置御史大夫御史大夫郄慮免不復補荀綽晉百官表注曰獻帝置御史大夫職如司空不領侍御史晉職官志太尉司徒司空並古官自漢歴魏置以為三公及晉受命迄江左相承不替宋百官志司徒一人掌水土事郊祀掌掃除陳樂器大喪掌將校復土舜攝位以禹為司空契之子曰宜亦夏司空殷湯之時咎單為司空周時司空為冬官掌邦事漢西京初不置成帝綏和元年更名御史大夫為大司空哀帝建平二年復為御史大夫元壽二年復為大司空光武二十七年去大獻帝建安十三年又罷司空置御史大夫御史大夫郗慮免不復補魏初又置司空齊職儀司空品秩冠服同太宰舜以禹為司空成王以毛公為司空宋以武公之諱改司空為司城楚改司空為莫敖秦置御史大夫省司空後周書冬官謂之大司空掌邦事以五材九範之徒佐皇帝富邦國大祭祀行灑掃廟社四望則奉豕牲隋百官志梁武受命之初官班多同宋齊之舊有司空後周置太尉司徒司空是為三公唐百官志司空一人六典司空漢制司空所部宗正少府司農三卿魏省御史大夫置司空景初二年以司𨽻校尉崔林為司空晉以茍顗為之歴宋齊梁陳後魏北齊皆省御史大夫置司空後周二職並廢隋氏諱忠以御史中丞為大夫故又置司空環濟要略冬官司空掌邦事營城郭都邑立社稷宗廟造宫室器械監百工也以官廢職左傳宋以武公廢司空武公名司空故廢焉經為世儒宗德為國黃耉前漢師丹字仲公為大司空策免罷歸尚書令唐林上疏曰竊見免司空丹策書輒深痛切君子作文為賢者諱丹經為世儒宗德為國黄耉海内未見其大過事既已徃免爵太重京師識者咸以為宜復丹邑爵使奉朝請所居無赫赫名前漢何武字君公為楚内史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此人顯於世者何侯力也世以此多焉然疾朋黨問文吏必於儒者問儒者必於文吏以相參檢欲除吏先為科例以防請託其所居亦無赫赫名去後常見思及為御史大夫司空武後母在郡遣吏歸迎㑹成帝崩吏恐道路有盜賊後母留止左右或饑武事親不篤哀帝亦欲改易大臣遂策免武諌大夫鮑宣數稱寃復為御史大夫舉措煩碎不合衆心何武為司空事後母不篤詔以其舉措煩碎不合衆心孝聲不聞惡名流行其上大司空印綬遂策免之一旦入朝在功臣之右竇融拜冀州牧十餘日遷大司空融自以為非舊臣一旦入朝在功臣之右召㑹進見容貌辭氣卑恭巳甚帝以此愈親厚之去籍通客陳寵為司空故亊以計吏至時自公以下督屬籍不通賓客以防闗交寵去籍通客以明無所不受論者大之身死之後勿議傳國張奮字穉通父純臨終勑家丞曰為司空無功於時猥蒙爵土身死之後勿議傳國奮兄根少被疾光武詔奮嗣爵稱純遺勑固不肯受帝以奮違詔勑收下獄奮惶怖乃襲封口陳時政張奮為司空時嵗災旱祈雨不應乃上表即時引見復口陳時政之宜帝召太尉司徒幸洛陽獄錄囚徒大雨三日一足不任則覆亂美實彭宣字子佩自御史大夫轉為大司空㑹哀帝崩新都侯王莽為大司馬秉政專權宣上書言年齒老鈍數伏疾願上大司空長平侯印綬乞骸骨歸鄉里從之彭宣上書云三公鼎足承君一足不任則覆亂美實奉公盡節言事無所依違第五倫字伯魚為司空奉公盡節言亊無所依違諸子或時諌止輒比遣之吏人奏記及便宜者亦并封上其無私若此性質慤少文采在位以貞白稱時人方之前朝貢禹然少藴藉不修威儀亦以此見輕或問倫曰公有私乎曰昔人有與吾千里馬者吾雖不受毎三公有所選舉心不能忘而亦終不用也吾兄子嘗病一夜十徃退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎奉公不撓言議果決第五倫章帝立徵拜司空奉公不撓言議果決後自陳老以二千石祿俸終厥身以地震策免陳忠以三府任輕幾事専委尚書而災眚變咎輒切免公台忠以為非國舊體上疏諌曰臣聞君使臣以禮臣亊君以忠三公稱曰冢宰王者待以殊敬在輿為下御坐為起入則參對而議政亊出則監察而董是非漢典舊事丞相所請靡有不聽今之三公雖當其名而無其實選舉誅賞一由尚書尚書見任重於三公陵遲以來其漸久矣臣忠心常獨不安是故臨亊戰懼不敢穴見有所興造又不敢希意同僚以謬平典而謗讟日聞罪足萬死近以地震策免司空陳褒今者災異復欲切讓三公昔孝成皇帝以妖星守心移咎丞相使賁麗納説方進自引卒不蒙上天之福辟雍於行禮中拜伏恭為太傼帝臨辟雍於行禮中拜恭為司空儒者以為榮以沈正見重於世任隗字伯卿拜司空隗義行内修不求名譽以沈正見重於世諌竇憲擊匈奴獨與司徒袁安持重處正鯁言直議無所囬隠在位奉法而已張敏字伯達拜司空在位奉法而已視事三載以病乞身不聽六年春行大射禮陪位頓仆乃策罷之舉動方重得大臣節年融字子優為大司農時顯宗方勤萬幾公卿數朝㑹毎輒延謀政事判折獄訟融經明才髙善論議帝數嗟嘆以為才堪宰相明年代伏恭為司空舉動方重甚得大臣節家無資産以清行致稱宋𢎞字仲子為大司空所得相俸分贍九族家無資産以清行致稱𢎞推進賢士馮翊桓梁三十餘人或相及為公卿者𢎞常朝見御坐新屏風圗畫列女帝數顧視之𢎞正容言曰未見好德如好色者帝即為徹之斷斷守善謝弼上封事曰今之四公惟司空劉寵斷斷守善餘皆素餐致冦之人可因災異並加罷黜四公謂劉矩為太尉許訓為司徒胡廣為太傅及寵也書曰如冇一个臣斷斷兮無他技賣弄國恩朱浮為大司空坐賣弄國恩免下理坤道上和乾元漢官解詁能下理坤道上和乾元謂司空水土之官東觀漢記王梁初為野王令世祖議選大司空赤伏符曰王梁主衞作𤣥武上以野王衛之所徒𤣥武水神之名司空水土之官也於是拜梁為大司空掃地以待足下華陽國志趙瑶字元珪自扶風太守來之郡司空張隰謂曰第五伯魚從蜀郡為司空令掃吾第以待足下主土不言土白虎通司空主土不言土而言空空尚主之況於實乎白衣登三公荀氏家傳荀爽字慈明董卓秉政徴之起巖穴九十五日而為司空時號為白衣登三公三公封列侯魏志景初元年司徒司空並闕散騎侍郎孟康曰夫宰相者天下之所瞻效誠宜得秉忠履正本德仗義之士足為海内所師表者竊見司𨽻校尉崔林禀自然之正性體髙雅之宏量論其所長以比古人忠愷不回則史魚之儔清論守約則季文之匹遂為司空封安陽亭侯三公封列侯自林始也豈可以老病忝之徐邈拜司空歎曰三公論道之官無其人則缺豈可以老病忝之哉固辭不受上封事削其草陳羣為司空前後數密陳得失每上封事輒削其草時人及其子弟莫能知也論者或譏羣居位拱黙羣薨正始中詔送羣臣上書以為名臣奏議朝士方見羣諌事皆歎息焉名臣奏議上上疏諫逰獵王朗為司空文帝頗出遊獵或昏夜還宫郎上疏諌帝報曰覽表雖魏絳稱虞箴以諷晉悼相如陳猛獸以戒漢武未足以喻方今二冦未殄將帥逺征故時入原野以習戎備至於夜還之戒已詔有司施行不遣使世說諸葛誕為司空書至誕曰我當在王文舒後今便為司空不遣使健步賫書使以兵付樂綝此必綝所為乃將左右數百人至揚州州人欲閉門誕叱之曰卿非我故吏耶逕入綝逃上樓就斬之儒雅有籌略晉張華彊記黙識四海之内可指諸掌拜司空華儒雅有籌略盡忠佐輔雖當闇主虐后之朝而海内晏然華之功也不敢以垂死之年累辱朝廷秦始中鄭袤為司空曰三公上應天心茍非其人實傷和氣不敢以垂死之年累辱朝廷固辭久之見許以侯就第不營産業身没行顯詔故司空王基著德立勲治身清素不營産業身没行顯足用厲俗其以奴婢二人賜其家為三公是天下無人矣陸玩字士珪王導郗鑒庾亮繼薨遷玩司空給羽林四十人玩比陳讓既拜歎息謂賓客曰以我為三公是天下無人矣談者以為知言作禹貢地域圖十八篇裴秀為司空秀儒學洽聞留心政事當禪代之際總納言之要其所裁當禮無違者又以禹貢山川地名古有今無者皆隨時注列作禹貢地域圖十八篇奏上藏之秘府秀在位四年為當世名公齊三階之耀起居注武帝泰始七年詔光祿大夫鄭袤體行純正退有沖和之風進有素縁之節宜齊三階之耀補衮職之闕明弼朕躬匡其不逮以為司空内亞三鼎外齊四岳齊孔稚圭為王敬則讓司空表曰故李通豪贍以親寵登用王基才勇以聲華入選先帝擢臣以榮華陛下申臣以富貴遂得北帯五州東跨六郡内亞三鼎外齊四岳蟬佩之映則左右交輝龜組之華則縱横吐耀輕輪徐動則劍騎如雲飛葢暫停則歌鐘成列摐金龍吹欝其前鳴笳鳳管疊其後鄧禹若不遭漢光則南陽之掾史微臣若不逢明主則孤城之戍客豈可加以正台之席登以論道之寄啟黄扉而變五緯躡青帷而調四序職班三事任總六條梁劉孝儀為臨川王解司空表曰臣以庸薄謬竊隆重職班三事任總六條衣衮坐槐既闕論道馳傳憩棠猶慚為政而俯司土地仰變隂陽折撓之機已彰愆伏之咎爰著今水沴乃作旱魃為災山蕪薈蔚雲成烟火陛下曲私未垂策免臣職是當於何逃責乞降兹台步協此天人不為苛碎後魏伊馥拜司空及為三公清約自守為政舉大綱而已不為苛碎員外郎一人直第唐裴寂策司空遣尚書貟外郎一人毎月更直寂第其見崇貴如此太宗祠南郊命寂與長孫無忌同升金輅寂固辭讓太宗曰以公有佐命之勲無忌亦宣力於朕同載參乗非公而誰遂同乗而歸同升金輅上取其才行長孫無忌策拜司空固辭不許又因髙士亷奏曰臣幸居外戚恐招聖主私親之誚敢以死請太宗曰朕之授官必擇才行若才不至縱朕至親亦不虛授襄邑王神符是也若才行所適雖怨讐不棄魏徴等是也朕若以無忌居后兄之愛當多遺子女金帛更何須委以重官盖是取其才行爾朝廷舊官荀藩為司空劉琨表於天子曰司空荀藩朝廷之舊官繼世忠勤乃心皇家具瞻之望唯藩而已宜增位號授分陜之重永令臣等有所憑准法措刑清事均民聚古今通語曰使國無枉理法措刑清事均民聚者謂之司空掃職五代史馮道罷同州入朝拜司空唐制三公為加官無單拜者或云三公正宰相便合參大政又云合策授又云祭祀時使令掃除道聞之乃曰司空掃職也吾無所憚既而知非乃止立學士班國朝天禧四年以資政殿大學士太保致仕王欽若為司空職如故時欽若求侍東宫講誦以輔世兼領三少品序非便表求換秩乃有是命上立學士班非賞勞之臣熙寧二年宰臣曽公亮司徒兼侍中韓琦提舉兩朝實錄乞宥下推恩上以為有例而公亮奏臣當遷司空琦太保三公非賞勞之臣從之太宰亦曰冡宰尚書周官冢宰掌邦治統百官均四海禮記曲禮天子建天官先六太曰太宰此殷時制也周則太宰為天官周禮立天官冢宰使帥其屬而掌邦治以佐王均平邦國鄭司農云邦治謂總六官之職也故太宰職曰掌建邦之六典以佐王治邦國六官皆總屬於冢宰故論語曰君薨百官總巳以聽於冢宰盖言冢宰於百官無所不主爾雅曰冢大也治官之屬大宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人變冢言太進退異名也百官總已則謂之冢列職於王則稱大冢大之名也山頂曰冢旅衆也下士治衆事者自太宰至旅下士轉相副貳皆王臣也又曰太宰之職掌建邦之六典以佐王治邦國又以九兩繫邦國之民孔子家語官屬不治分職不明法政不一百事失紀曰亂亂則飭冢宰又曰古之御天下者以六官總治焉冢宰之官以成道司徒之官以成德宗伯之官以成仁司馬之官以成聖司冦之官以成義司空之官以成禮六官在手以為轡晉職官志太宰太傅太保周之三公官也晉初以景帝諱故又採周官官名置太宰以代太師之任增秩三司與太傅太保皆為上公論道經邦燮理隂陽無其人則闕以安平獻王孚居之自渡江以後其名不替而居之者甚寡六卿之首秦漢魏不常置晉初依周禮備置三公三公之職太師居首景帝名師故置太宰以代之太宰古之太師也案此條之首原本缺一行南齊百官志宋大明中用江夏王義恭以後無人齊以為贈齊職儀太宰品第一金章紫綬佩山𤣥玉堯命羲和使主隂陽羲和司天即天官也后稷服事虞夏敬授民時尊稷為天官夏衰后稷不窋失官由是廢稷殷以其官為冢宰周公在豐為太宰召公又居之秦漢魏無其職晉武以從髙祖安平王孚為太宰安平王薨省咸寧四年又置或謂本太師之職避景皇諱改為太宰太宰周之卿位晉武依周置職以尊安平非避諱也元興中恭帝為太宰桓𤣥都督中外博士徐豁議太宰非武官不應都督遂從豁議後魏初無至孝莊時以太尉上黨王天穆為之置佐吏後周文帝又依周禮建六官遂置天官太宰卿一人掌邦治以建邦之六典佐皇帝治邦國隋百官志梁武受命之初官班多同宋齊之舊有太宰陳以為贈官以三公攝冢宰書伊訓曰成湯既没伊尹奉嗣王祗見厥祖侯甸羣后咸在百官總巳以聽冢宰注云伊尹制百官以三公懾冢宰冢宰第一召公領之顧命注成王將崩冢宰第一召公領之司徒第二芮伯領之宗伯第三彤伯領之司馬第四畢公領之司冦第五衛侯領之司空第六毛公領之百官總己以聽論語子張曰書云髙宗諒隂三年不言何謂也子曰何必高宗古之人皆然君薨百官總己以聴於冢宰三年備置官屬晉志安平獻王孚宣帝次弟也位太傅詔曰勲德𢎞茂朕所瞻仰願奉以不臣之禮其封為安平王邑四萬戸進拜太宰持節都督中外諸軍事備置官屬朝㑹劍履乗輿上殿武帝時何曽遜位詔以司徒所掌務煩不可久勞耆艾其進太宰朝㑹劍履乗輿上殿如漢相國蕭何田千秋魏太傅鍾繇故事二子侍從何曽為太宰年老禮優毎召見勅以常所飲食服物自隨二子侍從帝親迎拜汝南文成王亮子羕為太宰明帝寢疾羕與王遵同受顧命輔成帝時帝㓜冲詔羕依安平獻王孚故事設床帳於殿上帝親迎拜對掌朝政見太保門不宜嬰拂事務安帝以太宰瑯瑯王德文不宜嬰拂事務以紆論道之重可衮冕之服緑綬羽葆鼓吹讓表後魏温子昇為上黨王穆讓太宰表曰臣聞䇿蹇長途終慚一日之致懸縷層臺難任干鈞之重因知才弱不可自強力微難以企及智小謀大恐貽折足之憂才輕任重懼有絶臏之悔既慮鑠金固陳匪石不可虛設唐憲宗以莊憲皇后崩上不聽政欲准故事置冢宰以總百官裴度獻議曰冢宰是殷周六官之首既掌邦治寔統百司故王者諒闇百官有權聽之制後代設官既無此號不可虚設且國朝故事或否古今異制不必因循勑㫖由諸司公事宜權取中書門下處分議者是之通于四海榖梁僖公九年公㑹宰周公齊侯宋衞鄭許曺于葵丘天子之宰通于四海注宰天官冢宰兼為三公者佐王治邦國故曰通于四海加宰者知其職大尊重而下為諸侯所㑹惡其不勝任也不可乃止國朝嘉祐八年四月英宗欲命韓琦攝冢宰躬行亮隂三年之禮執政皆以為不可乃止貳王而理天下王符潛夫論法誡篇周禮六典冢宰貳王而理天下復詔固辭乃免唐苗晉卿字元輔𤣥宗崩肅宗疾甚詔晉卿攝冢宰固讓曰大行遺詔皇帝三日聽政稽祖宗故事則無冢宰之文奉遺詔則宜聽朝惟陛下順變以幸萬國帝不聽後數日代宗立復詔攝冢宰固辭乃免大司馬尚書周官司馬掌邦教統六師平邦國尚書大傳蠻夷猾夏冦賊姦宄則責之司馬尚書中候稷為大司馬韓詩外傳隂陽不和四時不節星辰失度災變非常則責之司馬禮記曲禮天子之五官曰司馬王制司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之周禮大司馬之職掌建邦之九法以佐王平邦國制畿封國以正邦國設儀辨位以等邦國制軍誥禁以均邦國施貢分職以任邦國簡稽鄉民以用邦國均守平則以安邦國比大事小以和邦國又以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴内陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵正則杜之内外亂鳥獸行則滅之孔子家語賢能而失官爵功勞而失賞祿士卒疾怨兵弱不用曰不平不平則飭司馬春秋運斗樞黃帝與大司馬容光觀鳳凰銜圖置黃帝前河圖錄運法黃帝坐𤣥扈閣上與大司馬容光左右輔將案此下原本有缺文前漢百官公卿表周夏官司馬掌邦政武帝元狩四年初置大司馬以冠將軍之號宣帝地節三年置大司馬不冠將軍亦無印綬官屬成帝綏和元年初賜大司馬金印紫綬置官屬祿比丞相去將軍哀帝建平二年復去大司馬印綬官屬冠將軍如故元壽二年復賜大司馬印綬置官屬去將軍位在司徒上有長史秩二千石後漢百官志太尉公一人世祖即位為大司馬建武二十七年改為太尉將軍不常置初武帝以衞青數征伐有功以為大將軍欲尊寵之以古尊官惟有三公稱將軍始自秦晉以為卿號故置大司馬官號以冠之其後霍光王鳳等皆然成帝綏和元年賜大司馬印綬罷將軍官世祖中興吳漢以將軍為大司馬位在公下韋昭辨釋名大司馬司馬武也大總武事也大司馬掌軍古者兵車一車四馬故以司馬名官班彪上事元狩六年罷太尉置司馬時議以北軍中候有千人司馬故加之為大司馬所以别大小司馬之號吳志赤烏九年以車騎朱然為左大司馬衞將軍全琮為右大司馬命羲叔為司馬秦漢之際曹參周勃始居其職又曰大司馬府舊有闕王莽簒位貶去闕焉隋百官志梁武受命之初官班多同宋齊之制有司馬陳以為贈官後齊有大司馬大將軍並為二大掌六軍之事詩祈父刺宣王也注祈父之職掌六軍之事有九伐之法予王之爪牙胡轉予于恤靡所止居注此勇力之士責司馬之辭也我乃王之爪牙之士當為王閑守之衞女何移我於憂使我無所居止乎祈招之詩左傳昔周穆王欲肆其心周行天下將皆必有車轍馬迹焉祭公作祈招之詩以止王心注祈父周司馬也世掌甲兵之職招名也諌遊行故指司馬而言兩軍出塞前漢兩軍出塞閱官及私馬九十四萬匹及後入塞者不三萬匹乃置大司馬大將軍驃騎將軍皆為大司馬定令驃騎將軍秩與大將軍等自是後青日哀而去病日益貴故人門下多事去病輒得官爵唯獨任安不肯去受詔輔少主武帝疾病遂立昭帝為太子年八嵗以霍光為大司馬受遺詔輔少主奪我印綬霍光薨以子禹為大司馬冠小冠無印綬罷其右將軍屯兵官屬特使禹官名與光俱為大司馬者禹怨望曰縣官非我家將軍不得至是今將軍墳墓未乾盡外我家反任許史奪我印授年少不合衆心平帝即位詔曰大司馬賢年少不合衆心其上印綬罷賢即日自殺而新都侯王莽為大司馬領尚書事賀漢得賢臣董賢為大司馬是時年二十二雖為三公常給事中領尚書百官因賢奏事單于來朝見羣臣上前單于怪賢年少以問譚上令報曰大司馬年少以大賢居位單于乃起拜賀漢得賢臣郡國士馬羽林才武帝栢梁詩大司馬曰郡國士馬羽林才五大司馬孝元王皇后成帝母也家凡十侯五大司馬外戚莫盛不宜以案此下原本有缺文晉職官志大司馬古官也漢制以冠大將軍代太尉之職故常與太尉迭置不並列及魏有太尉而大司馬大將軍各自為官位在三司上晉受魏禪因其制以安平王孚為太宰鄭沖為太傅王祥為太保義陽王望為太尉何曾為司徒荀顗為司空石苞為大司馬陳騫為大將軍凡八公同時並置唯無丞相自義陽王望為大司馬之後定令如舊在三司上晉公卿禮秩司馬兵官也魏氏大司馬大將軍各自為官在三司上晉以石苞為大司馬次三司下宋百官志司馬一人掌武事司主也馬武也堯時棄為大稷兼掌司馬周時司馬為夏官掌邦政項籍以曹無咎周殷並為大司馬漢初不置武帝元狩四年初置始直云司馬議者以漢有軍候千人司馬官故加大及置司空又以縣道官有獄司空又加大王莽居攝以漢無小司徒而定司馬司徒司空之號並加大光武建武二十七年省大司馬以太尉代之魏文帝黃初二年復置以曹仁居之而太尉如故南齊百官志以為贈案此下當載梁陳隋唐之制原本髙並闕又下條之首亦有闕文奉皇帝壐綬詔屬城門校尉開通英悟秉意不羣晉武帝泰始中詔曰大司馬石苞開通英悟秉意不羣威惠服物武帝踐阼石苞遷大司馬進封樂陵郡公自諸葛誕破滅苞便鎮撫淮南士馬强盛邊境多務苞既勤庶事又日以威惠服物白頭翁入府齊王冏既輔政大築館第沈于酒色不入朝見坐拜百官宴然南靣朝廷側目海内失望主簿王豹屢有箴規遂奏殺之有白頭翁入府大呼言有兵起俄而冏敗斬于閭闔門外下階迎嵇紹劉喬為散騎常侍齊王冏為大司馬初嵇紹為冏所重毎下階迎之喬言于冏曰樂疹輔來公未嘗下床何獨加敬於紹冏乃止紹謂喬曰大司馬何故不復迎客喬曰似有正人言以卿不足迎者紹曰正人謂誰喬曰其則不逺紹黙然假黃鉞討石勒石勒侵阜陵詔加王導大司馬假黃鉞出討之軍次江寧帝親餞于郊俄而賊退解大司馬又石季龍掠騎至歴陽導請出討之加大司馬假黃鉞督中外諸軍置左右長史俄而賊退解大司馬也王公何緣拜晉中興書王猛少貧賤鬻畚為事常至洛陽有一人於市買畚其人云家在此可隨取直隨去忽至深山中人語猛曰爾住樹下先起道君湏臾猛進見一老翁坐胡床鬚髪悉白從十許人有一人引猛進見曰大司馬公可進猛拜翁曰王公何緣拜即十倍售畚遣人送猛出山既顧視乃嵩髙山父子居上公晉諸公讚義陽王為大司馬時父孚為太宰父子居上公中代以來未之有也夢婦人當道哭博物志太公為灌壇令文王夢見婦人當道哭問其故曰吾是太山神女嫁為西海婦灌壇令當吾道夢覺召太公三日果疾風暴雨文王乃拜太公為大司馬賁育弗如傅子曰曹大司馬之勇賁育弗如也職官分紀卷二
