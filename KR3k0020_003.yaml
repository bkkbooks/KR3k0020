body:
  text: 職官分紀卷三宋孫逢吉撰宰相漢舊儀丞相有病皇帝法駕親至問疾及瘳視事則賜以養牛上尊酒又曰天地大變天下大過皇帝使侍中持節乘四白馬賜上尊酒十斛牛一頭策告殃咎使者去半道丞相逮上病使者還來白事尚書以丞相不起病聞若丞相不勝任使者策書駕駱馬即時布衣步出府免為庶人若丞相有他過使者奉策書駕騅騩馬即時步出府乘棧車牝馬歸田里思過又曰大司空朱博奏曰帝王之道不必相襲高帝置御史大夫位次丞相典正法度以職相參歷載二百天下安寧今更為大司空與丞相同位故事選中二千石為御史大夫任職者為丞相今未更大夫而為丞相非所以重國政也臣願罷大司空以御史大夫為百僚率哀帝從之後漢百官志司徒漢舊儀曰哀帝元壽二年以丞相為大司徒十年更名相國案獻帝初董卓自太尉進為相國而司徒不省及建安末曹公為丞相郤慮為御史大夫始罷三公官荀綽晉百官表注曰漢丞相府門無闌不設鈐不警鼓言其深大濶遠無節限也漢舊儀丞相車兩黑轓騎者弋絳掾吏見禮如師弟子白録不拜朝示不臣也聽事閣曰黃閣又曰丞相有病皇帝法駕親至視疾薨即移於第中賜棺賻葬地葬日公卿以下㑹送物理論高祖定天下置丞相以統文德立大司馬以整武事為二府焉應劭漢官儀曰丞相有疾御史大夫三日一問起居百僚亦然晉職官志丞相相國並秦官也晉受魏禪並不置自惠帝之後省置無恆為之者趙王倫梁王彤成都王頴南陽王保王敦王導之徒皆非復尋常人臣之職宋百官志相國一人漢高祖時始置以蕭何居之罷丞相何薨曹參代之參薨罷魏齊王以晉景帝為相國晉惠帝時趙王倫愍帝時南陽王保安帝時宋國高祖順帝時齊王並為國相自魏晉以來非復人臣之位矣丞相一人成湯以伊尹為右相仲虺為左相秦悼武王二年始置丞相官丞奉相助也悼武王子昭襄王始以樗里疾為丞相後置左右丞相漢文帝二年復置一丞相哀帝元壽二年更名大司徒漢東京不復置至獻帝建安三年復置丞相魏世及晉初又廢惠帝趙王倫篡位以梁王彤為丞相永興元年以成都王頴為丞相愍帝建興元年以琅邪王睿為左丞相南陽王保為右丞相三年以保為相國睿為丞相元帝永昌元年以王敦為丞相轉司徒荀組為太尉以司徒官屬並丞相為留府敦不受成帝世以王導為丞相罷司徒府以為丞相導薨罷丞相復為司徒府宋世祖初以南郡王義宣為丞相而司徒府如故南齊百官志國相蕭曹以來為人臣極位宋孝武用南譙王義宣至齊不用人以為贈不列官齊職儀相國綟綬衮冕服魏襄王以公孫衍為相國趙孝成王以廉頗為相國隋百官志梁武受命之初官班多同宋齊之舊有丞相陳承梁皆循其官制而又置相國位列丞相上并丞相太宰太傅太保大司馬大將軍並以為贈官相國丞相秩萬石後魏有大將軍不置太尉有丞相不置司徒正光以後始俱置之然而猶重門下官以侍中為樞密之任後齊多循魏制乾明中置丞相河清中分為左右亦各置府寮後周魏恭帝三年初行周禮建六官有大冡宰靜帝二年置左右大丞相八月去左右號隋公楊堅為大丞相隋有內史納言侍中為納言中書令為內史令唐百官志宰相之職佐天子總百官治萬事其任重矣然自漢以來位號不同而唐世宰相名猶不正初唐因隋制以三省之長中書令侍中尚書令共議國政此宰相職也其後太宗嘗為尚書令臣下避不敢居其職由是僕射為尚書省長官與侍中中書令號為宰相其品位既崇不欲輕以授人故常以他官居宰相職而假以他名自太宗時杜淹以吏部尚書參議朝政魏徴以祕書監參預朝政其後或曰參議得失參知政事之類其名非一皆宰相職也貞觀八年僕射李靖以疾辭位詔疾小瘳三兩日一至中書門下平章事平章之名蓋始於此其後李績以太子詹事同中書門下三品位謂同侍中中書令也而同三品之名蓋起於此然二名不專用而他官居職者猶假他名如故自高宗以後為宰相者必加同中書門下三品雖品高者亦然惟三公三師中書令則否其後改易官名而張文瓘以東臺侍郎同東西臺三品同三品入銜自文瓘始永淳元年以黃門侍郎郭待舉兵部侍郎岑長倩等同中書門下平章事平章事入銜自待舉等始自是以後終唐之世不能改初三省長官議事於門下省之政事堂其後裴炎自侍中遷中書令乃徙政事堂于中書省開元中張說為相又改政事堂號中書門下列五房於其後一曰吏房二曰樞機房三曰兵房四曰户房五曰刑禮房分曹以主衆務焉宰相事無不統故不以一職名官自開元以後常以領他職實欲重其事而反輕宰相之體故時方用兵則為節度使時崇儒學則為大學士時急財用則為鹽鐵轉運使又其甚則為延資庫使至於國史太清宫之類其名煩多皆不足取法故不著其詳五代史後唐長興四年樞密使馮贇加平章事以其家諱改同中書門下三品周顯德中樞密使吳廷祚亦以家諱改焉國朝中書門下題榜止曰中書印文行勑曰中書門下中書令侍中及丞郎以上至三師同中書門下平章事並為正宰相二員以上即分日知印官至僕射以上書勑不著姓緣唐制領館職昭文殿大學士監修國史首相領之集賢殿大學士次相領之又嘗令首相領玉清昭應宫使亦如唐太清宫使也後罷之中書舍人以上至尚書為參知政事二宰相之任也乾德二年正月以趙普為宰相制既下時范質等已罷普等綸誥將出無宰相書勑太祖令問翰林學士講求故事承㫖陶榖以為自古輔相未嘗虛位惟唐太和中甘露事後數日無宰相當時僕射令狐楚等奉行制書今尚書亦南省官可以書敕學士竇儀曰榖之所陳非承平時事不足援據今皇弟開封尹同平章事即宰相之任也帝聞之曰儀之言是矣即命太宗書敕以賜之四月以樞密直學士尚書兵部侍郎薛居正兵部侍郎吕餘慶並本官參知政事先是已命趙普為相將用居正等為之副既而難其名稱召翰林學士承㫖陶榖問曰下丞相一等有何官對曰唐有參知機務參知政事故以命之仍令不宣制不押班不知印不升政事堂止令就宣徽院使㕔上事殿庭别設磚位於宰相後敕尾書銜降宰相數字月俸雜給皆半之蓋帝意未欲令居正等名位與普齊也史臣錢若水等曰按唐故事裴寂為右僕射知政事杜淹為御史大夫參議朝政魏徴為祕書監參議朝政蕭瑀為特進參議朝政劉洎為黃門侍郎參知政事劉幽求為中書舍人參知機務皆宰相之任也又高宗嘗欲用郭待舉等參知政事既而謂崔日知溫待舉等厯任尚淺未可與卿等同名稱遂令於中書門下同承受進止平章事以此言之平章事亞於參知政事矣今榖不能逺引漢御史大夫亞丞相故事為對翻以參知政事為下丞相一等穀失之矣惜哉開寶六年六月二十八日詔中書門下押班知印及祠祭行香今後令宰相趙普與薛居正等輪知雍熙四年九月御史臺言文德殿常朝百官皆有磚位唯參知政事每遇橫行參假未有磚位詔令依位排砌至道元年四月詔曰自今參知政事宜與宰相分日知印押正衙班其磚位先異宜合而為一遇宰相使相視事及商議軍國政事並得升都堂先是吕端冦凖並為諫議大夫參知政事至是端作相凖尚參知政事端慮凖不平且言臣兄餘慶任參知政事日悉與宰相同願舉行之特從其請以慰其心焉二年詔自今中書門下兵令宰相押班知印其參知政事遇正衙橫行參假並重行異位非議軍國政事不得升都堂祠祭行香書敕並以開寶六年六月二十八日詔書從事時既逐冦凖即命復舊咸平五年詔以宰相吕蒙正李沆各兼門下侍郎舊制三師三公左右僕射平章事兼兩省侍郎學士宋白梁周翰當草制之夕匆遽遺忘其事帝以問白等不能對但乞改正更不降制只貼麻用印重寫告身許之白等各罰俸一月慶厯五年十月宰臣賈昌朝陳執中言軍民之任自古則同有唐别命樞臣專主兵務五代始令輔相亦帶使名至于國初尚緣舊制乾德以後其職遂分是謂兩司對持大柄向以關陜未寧兵議須一復兹兼領適合權宜今西夏來庭防邊有序願罷兼樞密使從之皇祐元年六月詔中書樞密院非聚㕔毋得見客至和二年七月詔凡宰相召自外者令百官班迎之自內拜者聽行上事儀治平二年五月命宰相韓琦曾公亮權兼樞密院公事以樞密使富弼告故也三年五月帝謂宰臣曰朕日與公卿等相見每欲從容講論治道但患進呈文字頗繁有所不暇及中書常務有可付本司者悉以付之自是中書細務止進熟狀及事有定制歸有司中書降敕而已元祐令謂三省長官僕射為宰相春明退朝録國初范魯公王祁公魏僕射三相罷趙令獨相始置參知政事自是一相或二相至咸平中始有吕文穆李文靖向文簡三相又至和中文潞公劉丞相富鄭公三相唐制宰相四人首相為太清宫使次三相皆帶館職𢎞文館大學士監修國史集賢殿大學士以此為次序本朝置二相昭文修史首相領焉集賢次相領焉三館職唯修史有職事而頗以昭文為重自次相遷首相乃得之趙令初拜止獨相領集賢殿大學士續兼修國史久之方遷昭文館薛文惠與沈恭惠並相薛自參政領監修拜相仍舊而沈領集賢畢文簡與冦忠愍並相而畢領監修冦領集賢王太尉獨相亦止領集賢近時王章惠龎莊敏初拜及獨相悉兼昭文修史二職非舊制也唐制宰相不兼尚書左右丞蓋僕射常為宰相而丞轄留省中領事元和中韋貫之為右丞平章事不久而遷中書侍郎又二府舊以官相壓李文正公自文明殿學士工部侍郎為參知政事而宋惠安公自左諫議大夫參知政事遷刑部尚書居其上至祥符末王沂公與張文節公同參知政事王轉給事中張轉工部侍郎而班沂公下意頗不悅乃復還二卿之命止以舊官優加階邑自後第以先後入為次序筆談百官於中書見宰相九卿而下即省吏高聲唱一聲屈則趨而入宰相揖及進茶皆抗聲贊喝謂之屈揖待制以上見則言請某官更不屈揖臨退乃進湯皆於席南橫設百官之位升朝官則坐京官以下皆立後殿引臣僚則待制以上宣名拜舞庶官但贊拜不宣名不舞蹈中書略貴者示與之抗也上前則略微者殺禮也朝夕納誨書說命高宗夢得說乃審厥象俾以形旁求於天下說築傅巖之野惟肖爰立作相王置諸其左右命之曰朝夕納誨以輔台德若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啓乃心沃朕心若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷又曰若作酒醴爾惟麯糵若作和羮爾惟鹽梅爾交修豫罔豫棄豫惟克邁乃訓又曰昔先正保衡作我先王乃曰豫弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜佑我烈祖格于皇天爾尚明保豫罔俾阿衡專美有商注保衡伊尹也言天下所取平也汝庶幾明安我事則與伊尹同美也左相左傳仲虺居薛為湯左相十六相昔高陽氏有才子八人蒼舒隤呆檮戭大臨龎降庭堅仲容叔達齊聖廣淵明允篤誠天下之人謂之八愷高辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅恭懿宣慈和惠天下之民謂之八元舜有大功二十而為天子以其舉十六相去四凶也六相管子黃帝得六相而天下治神明至蚩尤明乎天道故為當時太常察乎地利故使為廪者蒼龍辨乎東方故使為士師祝融辨乎南方故使為司徒太封辨乎西方故使為司馬后土辨乎北方故使為李上相漢陸賈謂陳平曰足下位為上相食三萬户侯安劉氏者必勃吕后問宰相高祖曰陳平智有餘王陵少戅可以佐之安劉氏者必勃也又問其次云過此以後非乃所及終皆如言周勃為漢伊周勃為布衣時鄙朴庸人至登輔位正國家難誅吕氏立孝文為漢伊周何其盛也自海瀕而登宰相外戚恩澤侯表高祖爵以功為先後官用能為次序後嗣其曰遵舊業臣繼踵居位至于孝武元功宿將略盡㑹上亦興文學進拔幽隱公孫𢎞自海瀕而登宰相寵以列侯之爵布被汲黯曰公孫𢎞位在三公奉祿甚多然為布被此詐也上問𢎞𢎞謝曰有之天子以為謙讓愈益厚之也無功封侯𢎞常病甚自以為無功而封侯居宰相位乃上書願歸侯乞骸骨避賢者路上報曰君宜省思慮一精神輔以醫藥因賜牛酒雜帛數月病瘳視事持祿保位孔光傳贊曰自孝武興學公孫以儒相其後蔡義韋賢𤣥成匡衡張禹翟方進孔光平當馬宫及當子晏咸以儒宗居宰相位服儒衣冠傳先王語其醖藉可也然當持祿保位被阿諛之譏彼以古人之迹見繩烏能勝其任哉召用儒生元帝少而好儒及即位召用儒生委之以政貢薛韋匡迭為宰相注貢禹薛廣德韋賢匡衡也儒宗翟方進傳司徒掾班彪曰丞相方進以孤童攜老母羇旅入京師身為儒宗致位宰相盛矣何壽知何武有宰相器武初為郡吏是時太守何壽知武有宰相器以其同姓故厚之後為司空以公位歸第養疾後漢李通自為宰相謝病不親事連年乞骸骨帝每優寵之令以公位歸第養疾宰相自有體朱浮論曰吳起與田文論公文不及者三朱買臣難公孫𢎞十䇿𢎞不得其一終之田文相魏公孫宰漢誠知宰相自有體運動樞極梁統傳論夫宰相運動樞極感㑹天人中於道則易以興政乖於務則難乎御物名宰朱穆論曰田蚡以尊顯治安國之金淳于以貴勢司方進之言夫以韓翟之操為漢之名宰然猶不能振一貧賢薦一孤士外鎮四夷內撫諸侯何敞曰昔者陳平生於征伐之世猶知宰相之分云外鎮四夷內撫諸侯使卿大夫各得其宜者也纍葉載德楊震傳論曰震為上相抗直方以臨權先公道而後身名遂纍葉載德繼踵宰相擢士為相陳龜上疏臣聞三辰不軌擢士為相蠻夷不恭拔卒為宰宅惟數畝范遷位在公輔宅惟數畝田不過一頃復推與兄弟家無擔石年且百嵗猶居相位應劭漢官儀臣瑗云許敬年且百嵗猶居相位國柱吳志陸凱上疏曰臣聞宰相者國之柱也不可不强王導吾之蕭何晉元帝謂王導曰卿吾之蕭何仲父初元帝徙鎮逮康俄而洛京傾覆王導勸帝收其賢人君子與之圖事帝尤委任號為仲父帝拜王導受遺詔輔成帝帝幼冲見導每拜又嘗與導書手詔則云惶恐言中書作詔則曰敬問如是以為定制自後元正導入帝猶為之興焉有將相之器導年十四陳留高士張公見之謂其從兄敦曰此有將相之器有宰相望王隱晉書山濤薨魏舒領司徒有頃即真舒居位持重為任職臣不激厲治冇所彈免務欲掩容不顯人之短咸推其有宰相望祿賜散之九族家無餘財也昴星精拾遺記漢太上皇微時遊豐沛山澤之中寓居窮巷有鑄冶太上皇問此鑄何器工人曰為天子鑄劍若得腰間佩刀雜鑄而冶即成神器可以克天下昴星精為輔位以殱三猾木衰火盛此為興冼太上皇日余有此物名為匕首其利難鑄遂解投爐中俄而烟熖衝天白日為之盡晦及劍成授上皇上皇以賜高祖長佩於身乃殘三猾定天下鉤命决云蕭何為昴星精項羽陳勝胡亥為三猾周為木德漢叶大位此其徴也風流宋王儉曰江左風流宰相唯有謝安蓋自况也少有宰相之志儉少便有宰相之志賦詩曰稷契贊虞夏伊吕翼商周及生子曰𤣥成取仍世作相之義賔客盈門王暕年數嵗而風神聳拔有成人之度時祖儉作宰相賔客盈門見暕曰公才公望復在此矣獨勤庶務何敬容梁武帝時為尚書令專務預幾密敬容明達勤於簿領而拙於草𨽻淺於學術通苞苴餉饋無賄則略不交語晉宋以來宰相皆文義自逸敬容獨勤庶務貧吝為世所嗤鄙文義自逸上少才過十上問何容敬曰褚彥回年幾嵗為宰相曰少才過十遲行緩步得宰相蕭子顯齊書褚􅘢字彥回美儀貌善容止俯仰進退咸有風則每朝㑹百寮逺國莫不延首目送之宋明帝常歎曰禇淵能遲行緩步便持此得宰相矣卞氏六龍三十國春秋卞粹以清辨稱兄弟六人並登宰輔世稱卞氏六龍謂姓吉者為邴吉之後何敬容嘗有客姓吉者敬容曰卿與邴吉遠近答曰如明公之與蕭何奏減賊數隋大業末尤多征役至於論功行賞蘇威每承望風㫖輒寢其命時羣盜蜂起郡縣冇奏詣闕者又訶詰令文減賊數故出師攻討多不克遂致敗亂為物議所譏及唐太宗平王世充威請謁見且稱老病不能拜起上遣人數之曰公隋朝相輔亂政不能匡救遂令品物塗炭君弒國亡見李密王世充拜伏舞蹈今既老病不能拜無勞相見朝野推服高熲事文帝煬帝兩朝文武大略明逹政務及蒙寄任之後竭誠盡節引進賢良以天下為己任蘇威楊素賀若弼韓擒虎等皆熲所薦各盡其用為一代名臣其餘立事者不可勝數當朝執政將二十年朝野推服物無異議時政升平熲之力也論者以為真宰相及煬帝誅之天下莫不傷惜至今稱寃不已國家有賊無行意虞慶則京兆櫟陽人也嶺南李世賢據州反議欲討之諸將二三請行皆不行帝顧謂慶則曰位居宰相爵為上公國家有賊無行意何也慶則拜謝恐懼出入將相三十年唐段文昌方布素之時不偶及其達也揚歷顯重出入將相幾三十年其服飾玩好歌童妓女茍悅於心無所愛惜乃至奢侈過度物議貶之召復位房𤣥齡以譴歸第時長孫皇后將疾大漸與上辭訣曰𤣥齡事陛下最久小心謹畏皆所預聞竟無一言漏泄非有大故願勿棄之褚遂良又抗疏理之遂召𤣥齡復位相須而成太宗以𤣥齡圖事則曰非如晦莫能籌之及如晦在焉竟用𤣥齡之策蓋房知杜之能斷大事杜知房之善建嘉謀相須而成俾無悔事初太宗義師至渭北房𤣥齡仗䇿謁軍門太宗一見如舊相識引為謀主定典章房𤣥齡杜如晦昔掌朝政至於臺閣規模典章文物皆二人所定危惙憂國事𤣥齡疾既篤太宗遣名醫救療若微減損太宗即喜見顔色如聞增劇便為改容悽愴𤣥齡疾亟抗表諫伐高麗事太宗曰此人危惙如此尚能憂我國事薨諡曰文昭如失兩手𤣥齡進拜司空乃綜朝政依舊監修國史𤣥齡乃抗表陳辭太宗遣使謂之曰昔晉侯讓位竇融辭榮自懼盈滿知進能善退自止足前代美之公亦欲齊蹤往哲實可嘉尚然國家久相任使一朝忽無良相如失兩手𤣥齡遂止良相上對創業守文帝嘗問創業守文孰難𤣥齡曰時方草昧羣雄競逐攻破乃降戰乃克創業則難魏徴曰王者之興必乘衰亂昏暴殆天授人與者既得天下則安于驕逸人欲靜徭役毒之世方敝衰刻窮之國繇此衰則守文為難帝曰𤣥齡從我定天下冒百死過一生見創業之難徴與我安天下畏富貴則驕驕則怠怠則亡見守文之不為易然創業之不易既往矣守文之難方與公等懼之𤣥齡當國夙夜勤强在公竭節不欲一物失所無妬忌聞人善若巳有之明達吏治而緣飾以文雅議法處令務為寬平不以己長望人取人不求備雖卑賤皆得盡其所能或以事被讓必稽顙請罪畏惕視若無所容以文雅緣飾吏治上引賢者下不肖杜如晦字克明進位右僕射乃領選與𤣥齡共管朝政引賢者下不肖咸得職當時浩然歸重監察御史陳師合上拔士論謂一人不可總數職隂刺諷如晦等制曰𤣥齡如晦不以勳舊進特其才可㠘治天下者師合欲以此離間吾君臣邪斥嶺表棟梁之用如晦隋大業中以常調預選吏部侍郎高孝基深所器重謂之曰公有應變之才當為棟梁之用後如晦為相以孝基有知人之鑒為其樹神道碑以紀其德手詔製碑如晦薨太宗手詔著作郎虞世南曰朕與如晦君臣義重不幸奄從物化追念勳舊痛悼于懷卿體吾此意為製碑文也一鏡魏徴傳太宗嘗謂侍臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕嘗保此三鏡以防過今魏徴殂逝亡一鏡矣帝親製碑徴薨陪葬昭陵太宗登苑西樓望喪而哭詔百官送出郊外帝親製碑文并為書石舊宅還子孫翰林學士白居易奏今日奉宣令撰與李師道詔收贖魏徴宅還其子孫甚合朕意允依奏者臣伏見魏徴太宗宰相盡忠輔佐以致太平在於子孫合加優恤今緣子孫窮賤舊宅典賣與人師道請出私財收贖却還其後嗣事關激勸合出朝廷師道何人輒掠此美若便許之臣恐非宜伏望明敕有司給以官錢收贖使還後嗣以勸忠臣則事出皇恩美歸聖德臣茍有所見不敢不陳其與師道詔未敢依宣便撰伏待聖㫖憲宗深然之仁者之勇蕭嵩為宰相時侍中喪光庭卒上令嵩舉賢以待之嵩以韓休和柔易制故薦引之休既知政事多折正嵩遂與休不協宋璟聞之曰不謂韓休乃能如此是仁者之勇也峭直𤣥宗既命蕭嵩為相嵩性寬博多優柔嵩引韓休同列休峭直骨鯁時政得失言之未嘗不切直上每從禽苑囿張樂禁中稍為過差必顧左右曰韓休知否言畢而諫疏輒上上嘗引鏡自照默然不樂左右曰韓休入相陛下無一日盡歡何不逐去使天顔戚戚上曰吾貌雖瘦天下必肥蕭嵩每啓事言必順㫖退而思天下事我未嘗安寢韓休每敷陳理道言必訐直退而思天下事我寢必安吾用韓休為社禝之計爾蕭遘掖王鐸蕭遘與王鐸並居相位帝常召宰相鐸年高升階足跌踣勾陳中遘旁掖起帝目之喜曰輔弼之臣和豫之幸也謂遘曰適見卿扶王鐸豫嘉卿善事長矣遘對曰臣扶王鐸不獨事長臣應舉時鐸為主司以臣中選門生也上笑曰王鐸選進士朕選宰相於卿無負矣遘謝而退圖形凌煙閣貞觀十七年詔司徒趙國公無忌以下二十四人並圖形於凌煙閣魏徴房𤣥齡杜如晦預焉季秋花則天時杜景佺為相則天嘗於內出梨花一枝示宰臣曰是何祥也諸宰相曰陛下德及草木故秋木再花雖周文德及行葦無以過也景佺獨曰謹按洪範五行傳隂陽不相奪淪瀆之即為災春秋云冬無愆陽夏無伏隂春無凄風秋無苦雨今已秋矣草木黃落而忽生此花瀆隂陽也臣恐陛下布教施令冇虧禮典又臣等忝為宰輔助天理物理而不和臣之罪也於是再拜謝罪則天曰卿真宰相也助天理物上沈厚有謀能斷大事則天問狄仁傑曰朕要一好漢任使有乎仁傑曰陛下作何任曰朕欲待以將相仁傑曰荆州長史張柬之其人雖老真宰相才也則天乃召之為洛州司馬他日又求賢仁傑曰臣前言張柬之猶末用也則天曰已遷之矣對曰臣薦之為相也今洛州司馬非用之也又遷秋官侍郎及姚元之將赴靈武則天命舉外司堪為宰相者元之曰柬之沈厚有謀能斷大事且其人年老唯陛下急用之則天即日召見拜之為相且八十矣八十為相上死姚崇能算生張說明皇雜録崇與張說同為宰輔頗懷疑沮屢以事相侵張銜之頗切崇既病戒諸子曰張丞相與吾不叶釁隙甚深然其為人稍懷奢侈尤好服玩吾身沒之後以吾平生同寮當來弔汝具陳吾平生服玩寶帶重器羅列於悵前張若不顧汝計家事舉族無類矣若顧此吾屬無虞當録其玩用致公仍以神道碑為請既獲其文即時録進仍先礱石以待至便鐫刻張丞相見事常遲於我數日之後必當有悔若却徴碑文以刋削為辭當引使視其鐫石仍告已具聞上姚崇沒張果至目其服玩者三四姚崇諸子悉如教誡不數日文成敘述該詳時謂極華其略曰八柱承天高明之位列四時成嵗亭育之功成後數日果遣使取本以為辭未周密欲加刪改姚氏諸子乃引使者視其碑仍告以奏御使者復命張悔恨撫膺曰死姚崇能算生張說吾今日方知才之不及遠矣務清政刑使官人皆任職宋璟為宰相務清政刑使官人皆任職聖厯後突厥默啜負其彊數窺邊侵九姓拔曳負勝輕出為其狙擊斬之入蕃使郝靈佺傳其首京師靈佺自謂還必厚見賞璟顧天子方少恐後干寵蹈利者夸威武為生事故抑之踰年才授右武衛郎將靈佺恚憤不食死張嘉貞後為相閲堂案見其危言切議未嘗不失聲歎息以十事說天子贊曰姚崇以十事要說天子而後輔政顧不偉哉而舊史不傳觀開元中初皆已施行信不證已宋璟剛正又過於崇𤣥宗素所尊憚常屈意聽納故史臣稱崇善應變以成天下之務璟善守文以持天下之正二人道不同同歸于治此天所以佐唐使中興也嗚呼崇勸天子不求邊功璟不肯賞邊臣而天寶之亂卒罹其害可謂先見矣然唐三百年輔弼者不為少獨前稱房杜後稱姚宋何哉君臣之遇合蓋難矣夫前稱房杜後稱姚宋上舉蘇宋自代姚崇有足疾舉蘇宋自代蘇頲宋璟也再升台坐三入冢司宋璟以老年上表曰臣再升台坐三入冡司也父子同時為相蘇宋為政相得甚歡璟剛正多所裁斷頲皆順從其美璟嘗謂人曰吾與蘇家父子前後同時為相僕射長房誠為國器若盡臣節斷割吏事即過其父上鬬羊以申諷諭張說始為相帝欲事吐蕃說密請講和以休息朝塞帝曰朕待王君毚計之說出謂源乾矔曰君毚好兵以求利彼入吾言不用矣後君毚破吐蕃於青海西說策其且敗因上雋州鬬羊於帝以中諷諭曰使羊能言必將日鬬而不解立有死者所賴至仁無殘量力取歡焉帝識其意納之賜綵千匹後瓜州失守君毚死朝廷大述作多出其手說敦氣節立然諾喜推藉後進於君臣朋友大義甚篤帝在東宫所與祕謀密計甚衆後卒為宗臣朝廷大述作多出其手帝好文詞有所為必使視草善用人之長多引天下名士以佐佑王化粉澤典章成一王法天子尊尚經術開館置學士修太宗之政皆說倡之為文屬思精壯長於碑志世所不逮既謫嶽州而詩益悽惋人謂得江山助云開元後宰相不以姓著者燕公云不以姓著上燕許大手筆蘇頲自景龍後與張說以文章顯稱望略等故時號燕許大手筆帝愛其文曰卿所為詔令别録副本署臣某撰朕當留中後遂為故事其後李德裕著論曰近臣詔誥惟頲敘事外自為文章云詔令副本留中上諤諤有大臣節張九齡為相諤諤冇大臣節當是時帝在位久稍怠於政故九齡議論必極言得失所推引皆正人所推引皆正人上房幄安有外言武惠妃謀陷太子瑛九齡執不可妃密遣宦奴牛貴兒告之曰發必有興公為援宰相可長處九齡叱曰房幄安有外言哉遽遂奏之帝為動色故卒九齡相而太子無患請誅安祿山安祿山初以范陽偏校入奏氣驕蹇九齡謂裴光庭曰亂幽州者此胡雛也及討奚契丹敗張守圭執如京師九齡署其狀曰穰苴出師而誅莊賈孫武習戰猶戮宮嬪守圭法行于軍祿山不容免死帝不許赦之九齡曰祿山狼子野心有逆相宜即事誅之以絶後患帝曰卿無以王衍知石勒而害忠良卒不用帝後在蜀思其忠為泣下且遣使祭於韶州厚幣恤其家稱曲江公而不名上以文行為上所知九齡為相以文行為上所知李林甫自無學術心頗忌之隂欲以事中之九齡為燕詩以貽林甫曰海燕何微眇乘春亦暫來豈知泥滓賤祗見玉堂開繡户時雙入華軒日幾回無心與物競鷹隼莫相猜為燕詩以貽林甫上風度九齡遷尚書右僕射罷政事後宰執否每薦引公卿上必問風度得如九齡罷相賦詩李適之罷相遽命親故歡㑹賦詩曰避賢初罷相樂聖且銜杯為問門前客今朝幾個來鎮靜太和九年中人自邊還走馬入金馬門道路妄言兵且至京師歡走塵起百官或鞿而騎臺省吏稍稍遁去鄭覃將出李石曰事未可知宜坐須其定宰相走則亂矣若變出不虞逃將安適人之所瞻不可忽也益治籍書沛然如平時里閭羣無賴望南闕隂持兵俟變金吾衛大將軍陳君賞率衆立望仙門內使趨闔門君賞不從日入乃止當是時非石鎮靜君賞有謀幾亂金甌覆名𤣥宗善八分書將命相皆先御書其名置桉上會太子入侍上舉金甌覆其名以告之曰此宰相名也汝知其誰耶射中賜巵酒肅宗拜而稱曰非崔琳盧從願乎上曰然自舉甌以示之乃賜巵酒是時崔琳盧從願𤣥宗欲倚以為相數矣竟以宗族蕃盛附比者衆卒不用片言悟主房琯贊曰唐名儒多言琯德器有王佐才而史載行事亦少貶矣一舉喪師訖不復振原琯以忠誼自奮片言悟主而取宰相必有以過人者用違所長遂無成功然盛名之下為難居矣夫名盛則責望備實不副則訾毁深使琯遭時承平從容帷幄不失為名相而倉卒濟難事敗隙生陷於浮虛比周之罪名之為纍也戒哉起布衣二朞至宰相張鎬起布衣二朞至宰相居身清廉不殖資産善待士性簡重論議有體在位雖淺而天下之人推為舊德云在位日淺天下推為舊德上多識大體鎬自入仕三十年致仕宰相居身清廉不營資産謙恭下士善談論多識大體故天下具瞻逹練事體苗晉卿寬厚廉謹為政舉大綱不問小過所到有惠化及秉鈞衡小心畏慎未嘗忤人意性聰敏達練事體百司文簿經目必曉而修身守位以智自全議者比漢之胡廣也苗晉卿比漢胡廣上復貞觀開元之太平崔祐甫為相謀猷啓沃多所𢎞益天下以為復貞觀開元之太平除吏職幾八百元載秉政公道隘塞官由賄成中書主事卓倩李榮輩用事勢傾朝列天下官爵大者出元載小者自倩榮四方賫貨賄求官者道路相屬靡不稱而去於是大壞網紀及元載敗楊綰尋卒常衮當國杜絶其門四方奏請莫有過者雖權勢與匹夫等非以詞賦登科者莫得進用雖賄賂稱絶然無所甄異故賢愚同滯及祐甫代衮薦延推舉日除十數人作相未逾年凡除吏職幾八百矣多稱允當上嘗謂曰有人謗卿所除擬官多涉親故何也祐甫奏曰臣頻奉聖㫖令臣進擬必須諳其才行臣若與其相識方可粗諳若素不知聞何由知其言行獲謗之由實在於此上以為然用道德寬大以𢎞上意德宗初即位擢崔祐甫為相頗用道德寬大以𢎞上意故建中初政聲藹然海內想望貞觀之治也選擢賢俊李吉甫自翰林承㫖拜平章事詔將下之夕感恩出涕謂裴垍曰吉甫自尚書郎流落遠地十餘年方歸使入禁署今才滿嵗後進人物罕所接識宰相之職宜選擢賢俊今則懵然莫能知否卿多精鑒今之才傑為我言之垍取筆疏其名氏得三十餘人數日之內選用略盡當時翕然稱吉甫有得人之譽矣朋黨初吉甫在相位時牛僧儒李宗閔應詔舉直言極諫科一人對詔深詆時政考策官楊於陵韋貫之李益等取其策為甲等吉甫泣訴於憲宗前於陵等皆貶出元和初吉甫經畫欲定兩河方欲出師而卒武元衡裴度繼之而韋貫之李逢吉議深以用兵為非故逢吉常怒吉甫之子德裕於元和時久不調而逢吉僧儒宗閔以私怨常排擯之及逢吉代裴度為相既得權位鋭意報怨元稹與李紳李德裕同為翰林學士情意相善當時謂之三俊既稹作相逢吉搆稹隂事出為同州刺史時僧孺德裕俱有相望逢吉欲僧孺為相而懼李紳李德裕於禁中沮議乃黜紳為御史大夫德裕為浙西觀察使及昭愍遇盜而殂文宗即位召德裕入朝裴度薦以為相而李宗閔有中人之助拜平章事懼德裕大用出為鄭滑節度使德裕為逢吉所擯在浙西八年徴入朝未旬時又為宗閔所逐中懷於悒無以自申賴鄭覃侍講禁中時稱其善覃為工部尚書罷侍講學士覃稽古守正常嫉人朋黨為宗閔所薄故也及德裕代宗閔出為興元節度使李訓鄭注素惡德裕排己復召宗閔於興元代德裕為相及宗閔再貶文宗崩㑹昌初德裕再秉政發宗閔舊事貶郴州司馬僧孺屢為德裕掎托欲加之罪但以僧孺貞方有素人望式瞻無以伺其隙及德裕南遷所著窮愁志引里俗聵子之讖以斥僧孺又目為太牢公其相憎如此故文宗以二李朋黨絶之不能去嘗謂侍臣曰去河北賊非難去此朋黨難也乏知人之鑒關播為相乏知人之鑒如大言虛誕者播必說而親信之播從幸奉天盧杞白志貞已貶而播猶執政議者不平遂罷為刑部尚書翼從先是武元衡被害憲宗出內庫弓箭陌刀賜左右衛使俟宰相入朝以為翼從及建福門退至文宗太和八年方停對地震李絳為相憲宗謂曰昨者地震草木皆動搖何祥也絳對曰在昔𤣥元皇帝以大聖明睿通天人之理因周三川之震云天地之氣不適其序人亂之也人政乖錯則上感隂陽之氣隂伏而不能出陽逆而不能升於是有地震又孔子於春秋所記災異先地震日食蓋地載萬物日為君象震有感傷天地見眚書之示戒用警後王伏願陛下勉保䖍恭之誠動萬民綏萬物為慮則變異自消休祥可致也帝深然之不受四方問遺文宗時宰相宋申錫為王守澄鄭注所搆言申錫獄付外廷請不於禁中訊鞫文宗終悟外廷之言貶申錫開州司馬申錫自居內庭及為宰相以時風侈靡居要位者尤納賄賂遂成風俗不暇更防遠害且與貞元時甚相背矣申錫至此約身謹潔尤以公廉而為己任四方問遺悉無所受既被罪為有司驗劾多獲其四方所還問道之狀朝野為之歎息顧問必極言李晟之在鳯翔謂賔介曰魏徴能直言極諫致太宗於堯舜之上真忠臣也僕所慕之行軍司馬李叔度對曰此縉紳儒者之事非勳德所宜晟斂容曰行軍失言傳稱邦有道危言危行今休明之期晟等幸得備位將相心有不可忍而不言豈所謂有犯而無隱知無不為者乎是非在人主所擇爾叔度慙而退故晟為相每當上所顧問必極言匪躬盡大臣之節性沉默未嘗泄於所親上不負天子下不負所學陸贄為相常自以少年入翰林䝉天子長養成就之恩不敢自愛事之不可者皆力爭之曰吾上不負天子下不負吾所學不恤其他清儉為時所稱鄭餘慶再為相罷免皆非大過尤以清廉為時所稱不敢更入中書文宗時宰相鄭覃曰陛下開成元年二年政事至好三年四年漸不如前楊嗣復曰元年二年是鄭覃陳夷行用事三年四年臣與李珏同之臣䝉聖慈擢處相位不能悉心奉職鄭覃云三年之後一年不如一年臣之辜也陛下縱不誅夷臣合自求泥滅因叩頭曰臣今日便拜不敢更入中書即趨去上令中使召還勞之曰鄭覃失言卿何及此於是嗣復數上表請罷帝方委用乃罷鄭覃夷行知政事自是政歸嗣復壞白麻德宗時欲相裴延齡諫議大夫陽城曰脫以延齡為相城當取白麻壞之竟坐延齡為國子司業觀崖州圖以為不祥韋執誼自卑官常自諱不欲人言嶺南州縣名為郎官常與同舍詣職方觀圖每至嶺南執誼遽命去之閉目不視及拜相還所坐堂見北壁有圖不就省七八日試觀之乃崖州圖也以為不祥甚惡之不敢出口及坐王叔文黨果貶崖州司户卒於貶所管葛伊周王叔文本以碁待詔粗知書好言理道德宗令直東宫皇太子頗重之宫中之事倚之裁決與韋執誼韓泰吕溫柳宗元劉禹錫等十人定為死交德宗崩順宗疾久不復問庶政深居施簾帷閹官李忠美人牛昭容侍左右百官上議自帷中可其奏王伾嘗論上屬意叔文宫中諸黃門稍稍知之其日詔入翰林為學士叔文與吏部郎中韋執誼善詩用為宰相叔文因伾伾因李忠言忠言因牛昭容轉相結托事下翰林叔文定可否宣於中書俾執誼承奏於外以韓泰劉禹錫等唱和曰管曰葛曰伊曰周凡其黨􅍀然自得謂天下無人陰結權幸以求宰相皇甫鎛陰結權幸以求宰相宰臣崔羣纍疏其姦邪嘗因面對語及天寶中事羣曰安危在出令存亡繫所任𤣥宗用姚崇宋璟張九齡韓休元結杜暹則理用李林甫楊國忠則亂人皆以天寶十五年祿山自漁陽起兵是理亂分時臣以為開元二十年罷賢相張九齡專任姦臣李林甫理亂自此已分矣用人得失所繫非小詞意激切左右為之感動鎛深銜之而憲宗終用鎛為宰相存亡繫所任上上調陰陽下安黎庶文宗以淮南諸道纍嵗大旱租賦不登國用多闕及是以度支户部分命宰臣領之郭承嘏論之曰宰相者上調隂陽下安黎庶致君堯舜致時清平俾之閲簿書算緡帛非所宜也帝深嘉之閲簿書算緡帛上唯器是適韓愈作進學解云校短量長唯器是適者宰相之任也復入相如父年李德裕父吉甫年五十一出鎮淮南五十四復相今德裕自鎮淮南復入相一如父之年平泉别墅德裕之孫敬義者後唐時退官居洛南平泉舊業為河南尹張全義所知初德裕於平泉置别墅採天下竒葩異竹珍木怪石為池之玩自為家戒序録志其草木刻諸石云移吾片石折吾一樹非子孫也洎黃巢之亂洛都災毁李氏花木多為都下移植樵人鬻賣圍亭掃地矣有醒酒石德裕醉即踞之最寶惜者有中使監全義軍者得此石置於家園敬義泣謂全義曰平泉業吾祖戒約甚嚴子孫不肖動逹先㫖因托全義詰石於監軍監軍忿厲聲曰巢賊敗後誰家園池完復豈獨平泉之石哉三遇異人德裕自言三遇異人非卜祝之流皆有道者故入禁苑居相位領節制三者皆與之協不差嵗月唯再謫南荒末嘗有前知之士為豫言之豈禍患不可移者神道所祕莫得預聞不疑朋黨德裕特承武宗恩顧委以樞衡決策論兵舉無遺悔以身扞難功流社稷及昭肅棄天下不逞之伍咸害其功白敏中令狐綯在㑹昌中德裕不以朋黨疑之置之臺閣及德裕失勢抵掌㦸手同謀斥逐而崔鉉罷相亦怨德裕故敏中復薦鉉在中書乃相與掎托令其黨人訟德裕輔政時隂事乃罷德裕分司東都再貶潮州司馬又貶崖州司户讀書不輟德裕以器業自居特達不羣好著書為文奬善嫉惡雖位極台輔而讀書不輟初貶潮陽雖蒼黃顛沛之中猶留心著述竒才史臣曰德裕以身犯難酬特達之遇言行計從功成事遂觀其禁掖彌綸嵓廊啓奏料敵制勝襟虛獨斷如由基命中罔有虛發實竒才也延英對宰相文宗即位虛心聽納每延英對宰相十一刻太專德裕在相位已久朝臣為其所抑者皆怨之自崔絃杜悰罷相後中貴人上前言德裕太專武宗意頗不恱起草指縱皆獨決德裕自開成五年冬回鵑至天德至㑹昌四年平澤路首尾五年其籌度機宜選用將帥軍中書詔奏請雲合起草指縱皆獨決於德裕諸相無預焉白敏中與李德裕有隙馬植以文學政事為時所知自黔中觀察使入朝為大理卿以不獲顯官心微有悵望李德裕素不重之宣宗即位宰相白敏中與德裕有隙凡德裕所薄者必不次拔擢之乃加植刑部侍郎充諸道鹽鐵使轉運使尋拜相及敏中罷相植亦罷為太子賔客分司東都金印朝天客楊收王鐸皆薛逢之同年也收作相逢有詩云須知金印朝天客同是沙堤避路人威鳯偶時皆瑞聖應龍無水漫通神收聞大銜之王鐸拜相逢又有詩云昨日鴻毛萬鈞重今朝山嶽一毛輕鐸又怒之公卿以下皆頥指氣使楊國忠既以便佞得宰相處決機務居之不疑立朝之際或攘袂扼腕自公卿以下皆頥指氣使無不警憚笑中有刀李義府狀貌溫恭與人語必嬉笑而褊忌隂賊既處權要欲人附巳微忤意者輒加傾陷故人言義府笑中有刀又以其柔而害物謂之李猫李猫上銅山大賊義府貪冒無厭賣官鬻獄其門如市嘗遣子司議郎津召長孫無忌之孫延謂曰相為得一官數日詔書當出居五日果授延司津監乃取延錢七百貫於是右金吾倉曹參軍楊頴表言義府罪狀制下司刑太常伯劉祥道等推其事義府除名長流雋州諸子並除名長流朝野莫不稱慶或作河間道行軍元帥劉祥道破銅山大賊李義府露布榜之通衢義府先多取人奴婢及敗一時奔散各歸其家故露布稱混奴婢而亂放各識家而競入不識枤杜字𤣥宗朝宰相李林甫自無學術僅能秉筆有才名於時者忌之林甫與選部時選人嚴迥判語秋杜二字林甫不識謂吏部侍郎韋陟曰此云杖杜何也陟俯首不敢言又太常少卿姜度妻誕子林甫手書慶之曰聞有弄麞之慶客視之掩口弄麞上奏請必先賂遺林甫每冇奏請必先賂遺左右伺察上㫖以固恩寵上在位多載倦於萬幾常以大臣接對拘檢難徇私欲自得林甫一以委成故杜絶逆耳之言恣行宴樂衽席無别不以為恥由林甫之贊成也伐櫻桃賦林甫聞蕭頴士之名欲拔用之時頴士寓居廣陵居母喪即哀麻詣京師徑謁林甫於政事省林甫素不識遽見衷麻大惡之即令斥去頴士大忿乃著伐櫻桃賦刺林甫云擢無庸之瑣質因本支而自庇洎枝幹而非據專朝廷之右地誅不附己者林甫既貶韋堅太子妃兄太子不自安乃上表請與妃韋氏絶上亦知太子無他許之自是連有獄於長安中别起推事院誅鋤不附己者左相李適之之子曰霅嘗盛饌以邀衆賔竟日無人敢往其威如此適之尋亦罷知政事不能弼諧啓沃德宗幸奉天盧杞等並貶黜關播尚知政事中外囂然以為不可播在位斂袵取容而已事決於盧杞也既而播亦罷相改刑部尚書太常卿韋倫於朝堂嗚咽而言曰宰相不能弼諧啓沃使天下一至於此而尚為尚書可痛心哉姦邪宰相盧杞既貶新州司馬德宗又欲授饒州刺史諫官上疏論之袁高當宿直草制亦執奏之乃改澧州别駕上謂李勉曰衆人皆言盧杞姦邪朕何不知勉對曰盧杞姦邪天下人皆知獨陛下不知此所以為姦邪也諷上以刑名整齊天下杞為相諷上以刑名整齊天下時李希烈李惟嶽田恱等叛河北河南連兵不息京師帑廪不支數月杞以户部侍郎趙贊判度支乃謀行括率京師囂然如被賊盜及滔師犯闕亂兵呼於市曰不奪汝商户僦質矣不稅汝間架除陌矣是時人心愁怨滔師乘間謀亂奉天之奔播職杞之由物議喧騰乃貶杞新州司馬咳唾立至青雲杞作相矯詐隂賊排斥忠良朋附者咳唾立至青雲睚眦者顧盼已躋溝壑忌能妬善杞居相位忌能妬善小不附者必致之於死惡顔真卿之直言令奉使李希烈竟殁於賊陰禍賊物楊炎以杞無職同處台司心甚不恱為杞所譖京兆尹嚴郢與炎有隙杞乃擢郢為御史大夫以頎炎炎既逐於崖州而死又惡郢圖欲去之宰相張鎰忠懿有才上所委信杞頗惡之㑹朱滔朱泚兄弟不睦有泚判官蔡廷玉者離間滔滔論奏請殺之廷玉既貶殿中侍御史鄭詹遣吏監送廷玉投水而卒把因奏曰恐朱泚疑為詔㫖請三司按鞫詹又御史所為禀大夫命并令按嚴郢鄭詹郢詹與張鎰善每伺杞晝眠詣鎰把知之他日杞假寐佯熟伺詹果來方與鎰語把遽至鎰閣中詹趨避把把遽言密事鎰曰殿中鄭侍御在此把佯愕曰向者所言非他人所宜聞時三司使方按詹郢獄未具把奏殺詹貶郢為歡州刺史鎰尋罷相出鎮鳳翔其陰禍賊物如此不許李懷光朝覲德宗幸奉天李懷光率兵赴難朱泚解圍而去懷光緣道數言盧把趙贊白志貞等姦佞且曰天下之亂皆此輩也吾見上必誅之把等微知之大懼把因說上令懷光乘勝逐泚收復京師不許其至奉天朝覲懷光大怒遂有異志來護兒兒作宰相來恆及弟濟相次知政事時以為榮初濟父護兒為隋猛將而恆濟俱以學行稱時虞世南子昶既無才術歷將作少匠工部侍郎纍居工作之司濟初升相位許敬宗歎曰士之登庸不繫世業履道則為衣冠失緒則為匹夫來護兒兒作宰相虞世南兒作木匠忠賢文武固無種也改鄉里五代史後唐馮道瀛州人也唐長興二年敕瀛州景州景城縣莊來蘇鄉改為元輔鄉朝漢里改為行孝里洛陽莊貫河南府洛陽縣三州縣改為上相鄉虛臺里改為中台里及拜守太尉兼侍中又奉敕改上相鄉為太尉鄉中台里為侍中里論時事時政道為相天成中明宗問曰時事如何道對曰時熟人安帝曰此外如何道對曰陛下淳德上合天心臣闈堯舜之君人所慕之桀紂之主人所惡之蓋為有道無道也今陛下恭修儉德留心治道民無徭役故曰堯舜之日不過人安俗阜爾貞觀十年以後魏元成等奏太宗曰願常如貞觀之初臣今亦願陛下常思登極之初則天下幸甚戊午帝又謂道曰時政何者為切道對曰務惜生靈為切臣記近代詞人為古調詩云正月賣新絲二月糶新粟救得眼下瘡割却心頭肉我願君王心化作光明燭不照綺羅筵偏照逃亡屋此詞義雖淺規諫道深臣諷誦之實覺有理帝深納之久雨無妨聖政長興三年帝謂馮道曰春雨稍多久未晴霽何也道對曰水旱作沴雖是天之常道然季春行秋令臣之罪也更望陛下廣敷恩宥久雨無妨聖政矣好宰相明宗初入洛遽謂近臣安重誨曰先帝時馮道郎中何在重誨曰近除翰林學士明宗曰此人朕素諳悉甚好宰相遂大用長興中平章事明宗謂侍臣曰馮道性純儉頃在德勝寨所居一茅庵與從人同器食卧則芻藁一束其心晏如及以父憂退歸鄉里耕耘樵牧與農夫雜處略不以素貴介懷真士大夫也道歷仕四朝三入中書在相位二十餘年以持重鎮俗為己任性廉儉不受四方之賂不以片簡擾諸侯私門之內無纍茵無重味不畜姬僕不聽絲竹有寒素之士來見者必引於中堂語及平生其待遇也心無適莫朝代遷易人無間言屹若巨山不可移也歷仕四朝三入中書上沒字碑任圖見中書門下平章事書姓名投琉璃瓶中清泰初中書闕輔相末帝訪之於朝左右曰臣見班行中所譽當大拜者姚頴盧文紀崔居儉爾或品藻三人才行其心愈惑末帝乃俱書當時清望達官數人姓名投琉璃瓶中月夜焚香禱請於天旭旦以筯挾之首得文紀之名次頴末帝素以竒待歡然命之二人同升相位三不開末帝命馬裔孫為相其中書百職裔孫素未諳練無能專決但書名而已又少賔客時人目之為三不開謂口不開印不開門不開夢神授二筆裔孫初為河中從事因事赴闕宿邏店其地上有邏神祠夜夢神見召待以殊禮手授二筆一大一小為翰林學士裔孫以為契鴻筆之兆洎入中書治事堂吏奉二筆大小如昔時夢中所授者讓子授員外郎晉開運中朝廷以宰相桑維翰長子坦為屯田員外郎次子塤為祕書郎維翰謂同列曰漢世三公之子郎廢久矣近或行之甚為外議乃抗表回讓不受尋改坦為大理司直塤為祕書省議者善之希㫖取容少帝以知制誥馮玉皇后之兄也寵任為宰相軍國政事一以委之時少帝方務奢佚後宫大恣華侈玉希㫖取容未嘗諫止故少帝愈寵焉玉曾冇疾帝語諸宰相曰自刺史以上伺玉愈即得除授其待任如此名動殊俗虜遣使加徽號於晉晉亦獻徽號於虜命宰相馮道充使及行將達西樓虜長欲自出迎道虜之羣僚奏天子無迎宰相禮乃止其名動殊俗也如此禪僧放鷹或人問馮道於少帝曰道好平時宰相無以濟其艱難譬如禪僧不可令致鷹也由是出為司州節度使平時宰相上是非相半馮道常問熟客曰道在政事有何說客曰是非相半幸有曾孫在目前周蕭願梁宰相傾之子曾孫倣唐僖宗朝入相接客之次願為兒童戲效為傳呼之聲倣謂客曰余不敢以得位而喜所幸者奕世壽考今又有曾孫在吾目前居相位不預政事九國志南唐徐玠好貨殖雖居相位不預政事尤好神仙服餌常以賤價市人丹砂以充用士流以此鄙之金碗玉杯盛溲溺孫忌馮延已俱作相忌輕延已嘗數謂人曰金碗玉杯而盛溲溺可乎年而罷議公事但熟睡後蜀徐光傳見中書門下優游廊廟十有四年國朝范質為人敏悟清正儼然有大臣之體及為宰輔而善於財成故優游廊廟十有四年而朝野無間言搢紳有嘉譽抑有由也齪齪固寵沈倫十年在相位齪齪固寵不能有所建明性尤好釋氏雅信因果之說常盛夏裸坐室中恣蚊蚋噆其膚通夕不寢寐以邀福人皆笑之恣蚊蚋噆膚以邀福上言丁謂曹利用不可輔幼主章聖既倦政而丁謂曲姦迎合太后之意有臨朝之謀宰相冦凖便殿請對言太子睿德天縱足以任天下之事陛下胡不協天人之係望講社稷之至謀引登大明敷照重霄若丁謂恃才而挾姦曹利用恃權而使氣皆不可輔幼主恐敗陛下家事因俯伏嗚咽流涕真宗命中人掖起慰諭之明日謂之黨以急變聞飛不軌之語以中凖凖坐是罷相乾興元年貶雷州司户參軍無地起樓臺相公魏野贈冦凖詩曰有官居鼎鼐無地起樓臺及上即位北使至賜宴惟兩府預焉北使歷觀坐中問譯者曰誰是無地起樓臺相公坐中無答丁謂令譯者謂曰朝廷初即位南方須大臣鎮撫冦公宣撫南夏不久即還冦凖比魏鄭公狄梁公皇祐中上因覽史見凖忠於國家因謂近臣曰故太子太傅萊國公冦凖方嚴梗亮有文武全才在仁宗朝建大功大節上親篆旌忠之碑以表其隧天下之人皆以比魏鄭公狄梁公焉過求虛譽無大臣體景德三年凖罷相是日王旦入謝便坐上謂曰凖竊國家爵賞過求虛譽無大臣體罷其重柄亦庶保其終吉也進賢退不肖大中祥符七年上謂王旦等曰上書者言中書不言事罕接賔客政令頗稽滯旦等對曰中書當言者惟進賢退不肖四方邊事郡縣水旱官吏能否刑法枉直此數事自奉德音動禀進止外人不知者是臣等無漏言也罕接賔客誠亦有之如轉運使副提㸃刑獄邊要舊郡知州及非次將命羣官使臣辭見之後多接見又或賫到劄子者觀其所言可以詳悉治體再加詢問多涉陳乞大約中等遮事動守程式不敢隨意增損行遣疾徐日有奏籍然思慮不至事有未便未免重煩聖斷是臣等過也皆再拜上慰諭之罷百官班賀新授玉清昭應宫使王旦赴上日權罷百官班賀先是旦領使職詔太常撰赴上儀禮官言唐制宰相進秩百官班賀開成中宰相鄭覃加太師於詹事府禮上旦當赴上本宫百官班賀如儀修宫使公宇未備恐難為班集故罷語開元天寶政治九年上與宰相語唐開元天寶政治因曰姚崇宋璟真名相也明皇委之無疑誠為至當而過信國忠林甫斯可惜也王旦曰姦邪之人誣陷良善得以專橫人君若能察陷人而自進者十可見其七八唐室顛危數四而人歸唐德者賴祖宗仁恩浸厚故也上曰陸贄言德宗英睿有獨斷御衆之志且天下至大人君何由獨治也姚宋真名相上手植三槐以為識王旦沈默好學父祐器之常曰此兒異日必為三公輔臣因手植三槐以為識登柄用十八年旦登柄用凡十八年為首相當國僅一紀為首相當國僅一紀上當國年深始終如一向敏中因奏對曰王旦令其子至待漏院附臣等奏方拜讓章不敢不謁上曰旦既堅辭諒亦難違其意至於引退未可輕言朕察其至誠固非矯飾況體質羸弱衆所共知但當國年深始終如一鎮靜中外實有賴焉敏中與之同列最久必熟見履行未嘗有一事干撓朝廷斯亦難矣敏中曰旦之為人實如聖誨陛下眷待優異終始保全自古輔相遭遇之榮無以加也平世之良相旦之為相也屬罷兵之後朝廷求治旦能遵守法度承導善意妙於啓奏言簡理順有識略善鎮定大事慎惜名器敘進材品使人各得其所雖咈於己者亦不以私廢公隂薦天下士有終身不知者搢紳咸服其平恕久於其位終始如一上以此優待之沖淡寡欲其身至薄所居舊第甚陋被服質素家人欲以繒錦飾氊席揾而不許其在中書未嘗奏䕃諸子婚姻不求門閥事寡嫂有禮與弟旭友愛甚篤留意文雅及近世典章官族志敦奬名教中外莫不欽其風德為國宗臣上所尊禮平世之良相也題品乖當王沔在中書日士大夫謁見沔必甘言以啖之皆大喜過望而題品乖當進退非允人用胥怨矣得及第者十八九每上親試考舉人必命近臣讀所試詩賦因升黜之沔善讀書聲氣敷暢凡經沔讀者十八九得及第撫夷夏和隂陽淳化五年上謂吕蒙正曰曰朕以宰相之職所任甚重欲修唐朝書考之事以責卿等輔佐之效又念考第之設亦空言爾莫若撫夷夏和隂陽使百度大理一人端拱無事此宰相之職也豈有居其事而不知其職任乎蒙正等俯伏稱謝舉官故事十一月上因言多士滿朝朕試令索班簿閲之求一材中轉運使三司判官者了不能得雖多亦奚以為宰相吕䝉正對曰臣職在辨論官材總領衆職而使陛下孜孜勞於求賢臣等之罪也上曰人心不同有如面焉使卿等何由盡知朕以求人之要莫若責舉主因詔蒙正以下至知制誥各舉有器業可任以事者一人以姓名聞蒙正奏曰臣備位宰相可以進百官今獨舉一二人示天下以隘也上曰前代亦合有宰相舉官故事可令史館檢討之既而有司具以歷代故實來上上復召謂䝉正曰虞丘子舉孫叔敖崔祐甫舉吏八百員狄仁傑自薦其男光嗣為地官員外郎何謂無也因書優孟對楚莊王録孫叔敖之詞故事為一幅以賜䝉正䝉正等再拜退而各舉所知以名聞未嘗以私事干廷尉李昉在相位日不敢有所請託給事中張佖炚介士也昉初甚薄之而雅厚善張洎及昉之罷政事也洎草制深攻昉之短而佖朔望常詣第謁見人或謂李公待君素不厚佖曰我掌廷尉日朝廷諸公多所請求李公未嘗以私事干廷尉我由此重之故也賜飛白書至道二年五月上飛白書數幅以示近臣字皆廣袤盈尺先賜宰相吕端一幅侍臣因競前爭取上笑曰昔劉洎登床正如此矣顧命元老不名呼真宗初即位對宰相皆不名呼吕端等再拜懇請帝曰公等顧命元老朕何敢比先帝乎學飛白書自召為相天聖初上學飛白之次忽書王欽若三字中人持示太后因命緘為湯藥合以賜之遂再召為相及欽若至中外無有知者奏許契丹借雄州牧馬欽若在中書契丹遣使言彼國飢饉暫借雄州牧馬欽若奏曰但許之上問其故對曰彼若果有窺中國之心豈先有書蓋欲以此相試爾但許之彼必不來果如其言也沮太后臨朝章聖不豫彌留之際劉后諷宰相丁謂欲臨朝中外洶洶無敢言者時宰相王曾謂后戚錢惟演曰漢之吕氏唐之武氏皆圖非據之位其後子孫誅戮不保首領公實肺腑何不入白皇后萬一宫車不諱太子即位建長樂為太后以輔政豈不為劉氏之福乎若欲稱制以取疑於天下非惟為劉氏之禍恐亦延及公矣惟演大懼入白太后其議遂止上既即位奉遺制軍國事權聽太后㫖丁謂沿后意乃奏議太后朝近臣以決大政皇帝惟朔望見羣臣其餘庶務悉令入內押班雷允恭傳奏禁中取可㫖即下不覆丁謂之黨皆以為是王曾獨曰太祖太宗先帝之天下非劉氏之天下也奈何使兩宫異位不共天下之政是壅主上之聰明絶下情而不使通啓宫人專政之害請依後漢馬鄧故事九卿朝帝坐於右而垂簾以奏事從之朝士以為名言吕夷簡比姚崇夷簡時之名相多識知謀慮上嘗以比姚崇孫沔雖言其短上不以為非夷簡觀之乃謂人曰元規之言可謂藥石但恨聞之遲其十年其度量如此賜生日物英宗治平元年翰林學士賈黯奏大臣生日朝廷頒賫詔文須言資助家庭宴樂之意伏見以壽聖節日陛下但以夷使來㑹時一舉觴自餘慶禮率從損抑將相大臣同國休戚生日頒賫伏望權寢曾公亮奏亦望允從詔以大臣有已經賜者令賜之如例救弊以漸五月上問執政積弊之衆何以裁救富弼對曰須以漸釐改又問寬治如何吳奎對曰聖人之治國以寬然不可以無節書曰寬而有制從容以和對明皇治政閏五月上問執政曰唐明皇治致太平末年何以至此富弼對曰明皇初平內亂而勵精求治委政得人所以治安末年任非其人遂至禍亂人主惟在擇賢不可使姦人當國胡宿對曰姦人得志亦以貴妃干預國事故也吳奎曰明皇惟豪邁無防檢用王忠嗣統制萬里如忠嗣忠純可矣如安祿山桀黠亦令統制萬里安得不作亂乎上皆以為然常務付有司三年上謂宰相曰朕日與公等相見每欲從容講論治道但進呈文字頗繁故不暇及中書常務有可付有司者悉以付之自是中書細務止進熟狀及事有定制者歸有司中書降敕而已一片文章南唐近事李建勳博覽羣籍頗善理論宋齊丘嘗曰李相清談不必潤色自是一片文章矣三入春明退朝録宰相三入者趙中令太祖朝初相太宗朝兩入吕文穆太宗朝再相真宗朝一入吕許公張鄧公仁宗朝皆三入居位不久杜祁公相甫百日當慶厯四年郊祠貂冠公衮又升輅奉冊改諡諸后杜祁公罷相知兖州寓北郊佛寺以待兖州踰再浹日㑹宗衮自汲陽召還過其寺造謁而杜公曰處此幾與在中書日同矣且莫北去欲識壁云郭汾陽曽留此蓋自戲其居位不久也奏請唐宰相奏請即退延英止論政事大體其進擬差除但入熟狀畫可今所存有開元宰相奏請狀二卷鄭畋鳯池藁草內載兩為相奏議狀數卷祕府有擬狀注制十卷多用四六紀其人履厯性行論請皆宰相自草五代亦然冦萊公謂楊文公曰豫不能為唐時宰相蓋孏於命詞也今中書白進呈差除退即朼聖㫖而同列押字國初范魯公始為之旬假對後殿唐王及善曰中書令可一日不見天子乎太祖開寶九年以中外無事始詔旬假日不坐然其日輔臣猶於後殿問聖體而退至道三年三月二十九日旬假是日太宗猶對輔臣至夕帝崩李南陽永熙挽詞曰朝憑玉几言猶在夜啓金縢事已非時稱佳作至真宗朝時旬假輔臣始不入寶元中西事方興假日視事至慶厯初乃如舊拜命詣景靈宫朝謝文穆冀公天聖初再為相既拜命謝恩即請詣景靈宫奉真殿朝謝真宗皇帝冀公仍以五百千建道場託先公為齊文其略曰奉諱之初謝病於外臨梓宫而莫及念南狩以方遙失其本餘不盡記自後二府初拜恩入謝即詣景靈蓋踵冀公故事也入謝有對賜凡拜職入謝多有對賜拜官加勳封謝恩雖二府亦有景德初王冀公以參知政事判大名府召還加封邑時契丹方講好真宗欲重其事冀公入謝特命以衣帶鞍馬賜之自後二府轉官加階勳封邑入謝皆有對賜百日宰相東齊記事豫與邵不疑于元于彭年飲於建隆觀衛道士處是日有報杜祁公拜相彭年曰百日宰相其後杜丞相百日果罷彭年名壽深於術數又善相以舉賢為本職以掩善為不忠國朝范質奏曰臣念為宰相者以舉賢為本職以掩善為不忠所以上佐一人開物成務竊以端明殿學士吕餘慶樞密副使趙普富有材謀精通治道經事霸府自陛下委以艱難無不倚任臣每自退食備覩公忠而皆際㑹風雲遭逢聖主廊廟之器為時而生伏乞授以台司俾伸才用宰相未滿久難其人以二臣之器能自攀附之幸㑹置之此任孰不為然上嘉納之不營産業太祖謂侍臣曰朕聞范質但有所居宅不營産業為真宰輔也太祖雅重質嘗對近臣稱纍朝宰弼以循規矩慎名器持廉節無出質之右者循規矩慎名器上宰相豈盡由科第魏仁浦從平壽春遷中書侍郎平章事集賢殿大學士兼樞密使初欲命仁浦為相議者以不由科第為言世宗曰古以文武材為宰相者豈盡由科第耶遂決意用之何以鎮服百寮歸田録故老能言五代時事者馮相道和相凝同在中書一日和問馮曰公靴新買其直幾何馮舉左足示和曰九百和性褊急遽回顧小吏云吾靴何用一千八百因詬責久之馮徐舉其右足曰此亦九百於是哄堂大笑時謂宰相如此何以鎮服百寮大臣不當收恩避怨王文正公曾為人方正持重在中書最為賢相嘗謂大臣執政不當收恩避怨公嘗語尹師魯曰恩欲歸己怨使誰當聞者歎服以為名言用人從人望至和初陳恭公罷相而並用文富二公正衙宣麻之際上遣小黃門三輩密於百官班中聽其論議而二公久有人望一旦復用朝士往往相賀黃門具奏上大恱余時為學士後數日奏事垂拱上問新除彥博等外議如何余以朝士相賀為對上曰古者人君用人或以夢卜茍不知人當從人望夢卜豈足憑耶故余作文公批答云永惟商周之所記至以夢卜而求賢孰若用搢紳之公言從中外之人望者具述上意也少年歸田録國朝宰相最少年者惟王溥罷相時父母皆在人以為榮罷相父母皆在上母喪在殯特罷晏富相弼入中書時年五十二太夫人在堂康强後三年太夫人薨有司議贈恤之典云無見任宰相丁憂例是嵗三月十七日春宴百司已具前一夕有㫖富某母喪在殯特罷宴此事亦前世未有不用照二百里古鑑吕文穆公䝉正以寬厚為相太宗尤眷遇有一朝士家藏古鑑自言能照二百里欲因弟獻以求知其弟伺間從容言之公笑曰吾面不遇鏡子大安用照二百里其弟遂不復敢言聞者歎服以為賢於李衛公遠矣蓋寡好而不為物纍者昔賢之所難也真宰相之言東齊記事薛簡肅公天禧中為江淮發運使辭王文正公王無他語但云東南民力竭矣薛退而謂人曰真宰相之言也丞相事無大小皆決史記二世誅李斯乃拜趙高為中丞相事無大小皆決之設鹿為馬趙高為丞相欲為亂恐羣臣不聽乃設驗持鹿獻於二世笑曰丞相誤耶設鹿為馬問左右或言馬以阿順趙高或言鹿高因隂中諸言鹿者以法檄召鄧通張蒼免相文帝以申屠嘉為丞相嘉為人廉直不受私謁時大中大夫鄧通方愛幸賞賜纍巨萬文帝常燕飲通家是時嘉入朝而通居上旁有怠慢之意嘉奏事畢因言曰陛下幸愛羣臣則富貴之至於朝廷之禮不可以不肅朝罷嘉為檄召通通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如弗為禮責曰夫朝廷者高皇帝之朝廷通小臣戲殿上大不敬當斬使吏令行斬之上度丞相困通使持節召通而謝丞相此吾弄臣君釋之相之當至丞相韋賢魯人也讀書為吏至大鴻臚相工相之當至丞相有男四人使相之至第子名𤣥成相工曰此子貴當封侯丞相曰我丞相有子是安從得後賢為丞相而病死長子有罪論不得嗣而立𤣥成令諸吏帶劍前奏事魏相以文吏至丞相好武令諸吏帶劍前奏事或有不帶劍者當入奏事乃借劍而敢入不出長安城門而至丞相匡衡為御史大夫嵗餘韋丞相死代為丞相封樂安侯以十年不出長安城門而至丞相豈非遇時而合也丞相封侯公孫𢎞封平津侯六百五十户丞相封侯自𢎞始食一肉脫粟飯故人賔客仰衣食無餘財多隂謀丞相陳平為高祖謀且六出竒計歎曰我多隂謀道家所禁吾世即廢以吾多隂謀故也其後曾孫掌以衛氏親戚貴達願得續封而終不得也陽遷太傅前漢王陵為人少文任氣好直言為左丞相吕太后欲廢陵乃陽遷陵為帝太傅實奪之權陵怒謝病免杜門竟不朝請安劉氏初吕后問丞相高祖曰陳平智冇餘王陵少戅可以佐之安劉氏者必勃也又問其次云過此以後非乃所及終皆如言上佐天子理隂陽順四時下遂萬物之宜漢文帝既益明習國家事朝而問右丞相勃曰天下一嵗决獄幾何勃謝曰不知問天下一嵗錢榖幾何勃又謝曰不知汗出浹背愧不能對上亦問左丞相平平曰有主者上曰主者為誰平曰陛下即問決獄責廷尉問錢穀責治粟內史上曰茍各有主者而君所主何事平謝曰陛下不知臣駑下使得待罪宰相宰相者上佐天子理隂陽順四時下遂萬物之宜外鎮撫四夷諸侯內親附百姓使卿大夫各得任其職也上稱善勃大慙出而讓平曰君獨不素教我乎平笑曰君居其位獨不知其任邪且陛下即問長安中盜賊數又欲强對耶於是絳侯自知其能弗如平遠矣居頃之勃謝免相而平轉為右丞相也不受私謁文帝以御史大夫申屠嘉為丞相嘉為人廉直不受私謁自嘉死後陶青劉舍及武帝時薛澤嚴青翟趙周皆以列侯繼踵持守廉謹為丞相備員而已無所能發明功名著於世好儒術竇嬰字王孫為丞相田蚡為太尉嬰蚡俱好儒術推轂趙綰為御史大夫王臧為郎中令也以肺腑為相田蚡孝景王皇后同母弟也武帝即位以舅武安侯蚡新欲用事卑下賔客進名士欲以傾諸將相及為丞相上初即位蚡以肺腑為相入奏事語移日所言皆聽薦人或起家至二千石權移主上上乃曰君除吏盡未吾亦欲除吏蚡嘗請考工地益宅上怒曰君何不遂取武庫是後乃退嘗召客欲坐其兄蓋侯北鄉自坐東鄉以為漢相尊不可以兄故私撓由此滋驕治宅甲諸第田園極膏腴而市買郡縣器物相屬於道前堂羅鐘鼓立曲旃後房婦女以百數諸奉珍物狗馬玩好不可勝數注旃旗也奉邑無水災蚡為丞相元光中河決瓠子蚡奉邑食鄃鄃居河北河北而南則鄃無水災邑收入多蚡言於帝曰河北之決皆天事未易以人事强塞之未必應天而望氣用數者亦以為然是以久不復塞也所推舉皆廉士韓安國字長孺為人多大略智足以當世取舍而出於忠厚焉貪嗜於財利然所推舉皆廉士賢於己者於梁舉壺遂臧固至他皆天下名士士亦以此稱慕之唯天子以為國器安國為御史大夫四年丞相蚡薨安國行丞相事奉引墮車蹇上欲用安國為丞相使使視蹇甚乃更以薛澤為相安國數月愈復為中尉以春秋之義繩臣下食貨志云公孫𢎞以春秋之義繩臣下取漢相賜子孫爵平帝元始中詔曰漢興以來股肱宰相身行儉約輕財重義較然著明未有若丞相公孫𢎞者竟以善終於相位𢎞子度嗣爵後坐法失侯表德彰義所以率俗厲化其賜𢎞度子孫之次當為後者爵關內侯不受印綬公孫賀字子叔代石慶為丞相時朝廷多事督責大臣自公孫𢎞後丞相李蔡嚴青翟趙周三人比坐事死石慶雖以謹得終然數被譴初賀引拜為丞相不受印綬頓首涕泣曰臣本邊鄙以鞍馬騎射為材官誠不任宰相上與左右見賀悲哀感動下泣曰扶起丞相賀不肯起上乃起去賀不得已拜出左右問其故賀曰主上賢明臣不足以稱恐負重責從是殆矣一言寤意車千秋本姓田氏千秋為高寢郎㑹衛太子為江充所譛敗久之千秋上急變訟太子寃曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上大感悟召千秋曰此高廟神靈使公教我公當為吾輔佐立拜千秋為大鴻臚數月遂代劉屈氂為丞相封富民侯千秋無他材能術學又無閥閲功勞特以一言寤意旬月取宰相封侯世未嘗有後漢使者至胸奴單于問曰聞漢所拜丞相非用賢也一男子上書即時封侯使者還道單于語武帝以為辱命下之吏良久貰之然千秋為人敦厚有智居位自稱踰於前後數公又千秋年老上優之朝見得乘小車入宫殿中因號曰車丞相也車丞相上當軸處中贊曰車丞相履伊吕之列當軸處中括囊不言容身而去彼哉彼哉黜黃老刑名百家之言儒林傳曰武安君田蚡為丞相黜黃老刑名百家之言延文學儒者以百數而公孫𢎞治春秋為丞相封侯天下學士靡然嚮風開東閣以延賢人與參謀議武帝方興功業屢舉賢良公孫𢎞自見為舉者起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議𢎞身食一肉脫粟飯故人賔客仰衣食俸祿皆以給之家無所餘然其性忌外寬內深諸常與𢎞有隙無遠近雖陽與善後竟報其過殺主父偃徙董仲舒皆𢎞力也𢎞為丞相御史六年年八十終丞相位其後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼踵為丞相自蔡至慶丞相府客館丘墟而已至賀屈氂時以為馬廄車庫奴婢室矣唯慶以醇謹得終相位餘伏誅丞相致仕韋賢字長孺年七十餘為丞相五嵗以老病乞骸骨賜黃金百斤罷歸家賜第一區丞相致仕自賢始也賢少子𤣥成復以明經歷位至丞相故鄒魯諺曰遺子黃金滿籝不如教子一經以明經至丞相上韋平父子平當字子思為丞相子晏以明經歷任大司徒封防鄉侯漢興唯韋平父子至宰相注韋𤣥成核名實而相總領衆職甚稱上意時丙吉為御史大夫同心輔政上寬皆重之魏相為人嚴毅不如吉公府不按吏丙吉字少卿代魏相為丞相性寬大好禮讓掾吏有罪輒與長休告終無所按驗或謂吉曰君侯為漢相姦吏成其私然無所懲艾吉曰夫以三公之府冇按吏之名吾竊陋焉後人代吉因以為故事公府不按吏自吉始也於官屬掾吏務掩過揚善吉馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車上西曹主吏欲斥之吉曰以醉飽之失去士使此人將何所容西曹第忍之此不過汙丞相車茵爾吏嘔吐汙車茵上問牛喘吉嘗出逢羣鬬者死傷橫道吉過之不問前行逢人逐牛牛喘吐舌止駐使騎吏問逐牛行幾里掾吏怪之問吉吉曰民相鬬殺傷長安令京兆尹職所當禁嵗竟丞相課殿最奏行賞罰而已方春少陽用事未可大熱恐牛近行用暑故喘三公典調隂陽職當憂也掾吏乃服以吉知大體知大體上稱為知人吉病篤上自臨問吉曰君即有不諱誰可以自代者吉曰西河太守杜延年明於法度曉國家故事前為九卿十餘年今在郡治有能名廷尉于定國執憲詳平天下自以不寃太僕陳萬年事後母孝惇厚備于行止此三人皆能在臣右惟上察之上以吉言皆是而許焉及吉薨御史大夫黃霸為丞相徴西河太守杜延年為御史大夫㑹其年老乞骸骨疾免以廷尉于定國為御史大夫黃霸薨而定國為丞相太僕陳萬年代定國為御史大夫居位皆稱職上稱吉為知人丙魏有聲魏相丙吉贊曰近觀漢相高祖開基蕭曹為冠孝宣中興丙魏有聲是時黜陟有序衆職修理公卿多稱其位海內興於禮讓覽其行事豈虛乎哉有隂德武帝末戾太子巫蠱事起丙吉為廷尉監時宣帝生數月坐太子事繫獄望氣者言長安獄中有天子氣於是上遣使者分條中都官詔獄繫者亡輕重一切皆殺之內謁者令郭穰至郡邸獄吉閉門扞拒曰他人無辜猶不可也況親曾孫乎穰不得入還以聞上曰天使之然也因大赦天下曾孫賴吉得全宣帝立吉為丞相末及封而病上憂吉不起夏侯勝曰此未死也臣聞有隂德者必饗其樂以及子孫後吉病愈轉博陽侯薨子顯嗣甘露中削爵為關內侯至孫昌復封博陽侯傳子至孫王莽敗乃絶免非其辜孔光罷相退閭里杜門自守而朱博代為丞相數月坐承傅太后㫖妄奏事自殺以平當代為丞相數月薨王嘉為丞相數諫諍忤㫖旬嵗間閲三相議者皆以為不及光上由是思之㑹日食徴光詣公車問日食事書奏上說拜光為光祿大夫給事中遂復為丞相上乃知光前免非其辜以過侍臣毁短光者免傅嘉為庶人旬嵗閲三相上願還千户朱博為丞相封陽侯食邑二千户博上書讓曰故事封丞相不滿千户而臣過制願還千户單于仰視大畏王商代匡衡為丞相商為人多質有威重長八尺餘身體鴻大容貌過人河平四年單于來朝引見白虎殿丞相商坐未央庭中單于前拜謁商商起離席與語單于仰視商貌大畏之遷延却退天子聞而嘆曰此真漢相矣真漢相上絳侯非社稷臣文帝時丞相絳侯朝罷趨出上目送之中郎袁盎進曰丞相何如人也上曰社稷臣也盎曰絳侯所謂功臣非社稷臣夫社稷臣主在與在主亡與亡方吕后時諸吕用事擅相王時劉氏不絶如帶是時絳侯為太尉主兵柄弗能正吕后崩大臣相與共謀誅諸吕太尉主兵適㑹其成功所謂功臣非社稷臣特立後起十餘年至宰相翟方進字子威家世微賤年十二三失父孤學給事太守府為小吏從汝南蔡父相大竒其容貌曰小吏有封侯骨方進乃西至京師受經後母憐其幼隨之長安織屨以給方進後為丞相公潔請託不行郡國持法深刻舉奏牧守九卿峻文深詆中傷者尤多如陳咸朱博蕭育逢信孫閡之屬皆京師世家以才能少歷牧守列卿知名當世而方進特立後起十餘年間至宰相據法以彈咸等皆罷退之司徒掾班彪曰丞相方進以孤童擕老母羇旅入京師身為儒宗致位宰相盛矣身為儒宗致位宰相上春秋之義尊上公謂之宰方進奏曰臣聞國家之興尊尊而敬長爵位上下之禮王道綱紀春秋之義尊上公謂之宰海內無不統馬丞相進見聖主御坐為起在輿為下進見聖主御坐為起在輿為下上不為後母服方進為丞相封高陵侯後母既葬三十六日除服起視事以為身備漢相不敢踰國家之制賜策自殺方進為丞相綏和二年春熒惑守心方進憂之不知所出㑹郎賁麗為星上言大臣當之上乃殺召方進還歸未及引決上遂賜策云云方進即日自兼三公之事成帝時何武為九卿建言古者民朴事約國之輔佐必得賢聖然猶則天三光備三公官名有分職今末俗之弊政事煩多宰相之材不能及古而丞相獨兼三公之事所以久廢而不治也宜建三公官定卿大夫之任分職授政以考功效上以問張禹禹以為然於是上賜曲陽侯王根為大司馬印綬置官屬以御史大夫何武為大司空封列侯皆增俸加丞相以備三公官焉議者多以古今異制漢自天子之號下至佐史皆不同於古而獨改三公職事難分無益於治亂將相不對理陳寃哀帝初封重賢又益爵土丞相王嘉纍上封事切諫及封還詔書帝乃發怒下嘉廷尉詔獄使者既到府掾吏涕泣而具和藥進嘉不肯服主簿曰將相不對理陳寃君侯宜引决嘉引藥杯以擊地遂隨使者詣廷尉嘉繫獄二十餘日不食嘔血而死官屬譏其煩碎薛宣為丞相相府詞訟不滿萬錢不為移書後遵用薛侯故事然官屬譏其煩碎無大體不稱賢相也無大體不稱賢相上乘棧車歸田里孔光罷丞相詔曰上丞相博山侯印綬罷歸注漢舊儀云丞相有他過使者奉策書即時步出府乘棧車歸田里二王而理天下後漢王符潜夫論法誡篇周禮六典冡宰二王而理天下春秋之時諸侯明德者皆一卿為政爰及戰國亦皆然也秦兼天下則置丞相而二之以御史大夫自高帝逮於孝成因而不改多終其身漢之隆盛是惟在焉夫任一人則政專任數人則相倚政專則和諧相倚則違戾光武愠數世之失權政不任下雖置三公事歸臺閣自此以來三公之職備員而已汲黯不拜田蚡漢雜事田蚡為丞相中二千石拜謁不為禮汲黯為主爵都尉見蚡未嘗拜揖之而已決富室公生子得其真風俗通陳留有富室公年九十餘更取田舍女為婦一交接事訖便氣絶生得男大男謂其女曰我父年尊復無人道一宿斯須何因有子汝小家淫佚反欲汚我種類乎爭財相告數年州郡不能決讞之廷尉按問丞相丙吉思惟良久言曽聞真人無影老公子亦無影又不耐寒寧可共試察之於是時嵗八月矣取同年小兒俱解裏衣餘無聲響此兒獨啼言寒又並令行日中復獨無影大小咸服吉處度得其真王蕃嘲荀彧魏志荀彧為右丞相王蕃嘲彧曰魚濳於淵出水吹沫何則物有本性不可橫處非分也或出自溪谷羊質虎皮虛受光赫之寵跨越三九之位犬馬猶能識養將何以報厚施乎彧曰唐虞之朝無繆舉之才造父之門無駑蹇之質蕃上誣明選下誣楨幹亦何傷於日月多見其不知量爾有桑八百株薄田十五頃蜀志諸葛亮為丞相自表後主曰成都有桑八百株薄田十五頃子孫衣食自有餘饒至於臣在外任無他調度隨身衣食悉仰於官不别治生以長尺寸若臣死之日不使內有餘帛外有贏財以負陛下及卒如其所言隨能任將吏吳志顧雍字元歎代孫邵為丞相平尚書事其所選用文武將吏各隨其能所任心無適莫時訪逮民間及政職所宜輒密以聞若見納用則歸之於上不用終不宣泄權以此重之孫權敬信顧雍雍為丞相孫權常遣中書郎詣雍有所咨訪若合雍意事可施行雍即與相反覆究而論之為設酒食如不合意雍即正色改容默然不言無所施設即退告權權曰顧公歡恱是事合宜也其不言者是未平也孤當重思之其見敬信如此誨育門生步隲字子山代陸遜為丞相猶誨育門生手不釋書被服居處有如儒生然門內妻妾服飾奢侈頗以此見譏孫皓聽陸凱目視陸遜遷丞相孫皓性不好人視已羣臣朝見睛莫敢近凱說皓曰夫君臣無不相識之道若卒有不虞不知所赴皓聽凱目視陸凱面責何定凱為丞相時殿上列將何定佞巧便僻貴任幸事凱面責定曰卿見前後事主不忠傾亂國政寧有得以夀終者乎何以専為姦邪穢塵天聽宜自改厲不然將見卿有不測之禍矣定大恨凱思中傷之凱終不以為意乃心公家義形於色表疏皆指事不飾忠懇內發丞相事煩張昭字子布初權當置丞相衆議歸昭權曰方今事職充者責重非所以優之也後孫邵卒百僚復舉昭權曰孤豈為愛乎顧丞相事煩而此公性剛所言不從怨咎將至非所以益國也相國蕭何益封召平獨弔史記蕭何拜相國益封五千户卒五百人為衛衆人皆賀召平獨弔謂何曰禍自此始矣何乃讓封悉以家財佐軍上喜趣治裝當入相曹參聞蕭何薨告舍人趣治裝當入相使者果召參為相擇郡國長吏訥文辭謹厚者為丞相史參日夜飲酒賔客見參不事事皆欲有言至者參輒飲以醇酒醉而後去終莫得開說帶劔履上殿入朝不趨前漢五年已殺項羽即皇帝位論功行封上以蕭何功最盛先封為鄼侯功臣皆曰蕭何未嘗有汗馬之勞徒持文墨議論又論位次皆曰曹參身被七十創攻城略地功最多宜第一鄂千秋曰曹參野戰略地之功此特一時之事爾夫上與楚相拒五嵗失軍亡衆跳身遁者數矣然蕭何常從關中遣軍補其缺非上所詔令而數萬衆㑹上之乏絶者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕關中給食不乏陛下數亡山東蕭何常全關中以待陛下此萬世功也仐雖無曹參等百數何缺於漢漢得之不必待以全奈何以一旦之功而加萬世之功哉蕭何當第一曹參次之上曰善於是乃令何第一帶劔履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖高須鄂君乃益得明封鄂千秋為安平侯益封置衛陳豨反上自將兵至邯鄲而韓信謀反關中吕后用蕭何計誅信上使使拜丞相何為相國益封五千戶令卒五百人一都尉為相國衛諸君皆賀召平獨弔謂何禍自此始矣上暴露於外而君守於內非被矢石之艱而益君封置衛者以今者淮隂新反於中有疑君心矣夫置衛衛君者非以寵君也願君讓封勿受悉以家私財佐軍何從之上大悅買田宅必居窮僻蕭何買田宅必居窮僻處為家不治垣屋曰令後世賢師吾儉不賢無為勢家所奪為民請上林中空地何為民請曰長安地狹上林中多空地願令民得入田上大怒曰相國多受賈人金為請吾苑乃下何廷尉械繫之數日王衛尉曰夫職事茍有利於民而請之真宰相事也奈何乃疑受錢乎是日使使持節赦何何入謝上曰相國為民請吾苑不許我不過為桀紂而相國為賢相吾故繫相國使百姓聞吾過舉事無所變更蕭何薨曹參聞之告舍人曰趣治裝吾且入相居無何使者果召參始時與蕭何善及為宰相有隙至何且死所推賢惟參參代何為相國舉事無所變更一遵何之約束擇郡國長吏訥於文辭謹厚長者即召除為丞相史吏言文刻深欲務聲名者輒斥去之日夜飲酒卿大夫以下吏及賔客見參不事事來者皆欲有所言至者參輒飲以醇酒度之欲有所言復飲酒醉而後去終莫得開說惠帝怪相國不治事乃令參子中大夫窋從容諫參參怒而笞之二百帝讓參參免冠謝曰陛下自察聖武孰與髙皇帝上曰朕乃安敢望先帝乎參曰陛下觀參孰與蕭何賢上曰君似不及也參曰陛下言之是也且髙皇帝與蕭何定天下法令既明且今陛下垂拱參等守職遵而勿失不亦可乎帝曰善參為相國三年薨百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靖民以寧一初高祖崩何事惠帝何病上親臨視疾因問曰君即百嵗後誰可代對曰知臣莫若主帝曰曹參何如頓首曰帝得之矣何死不恨矣守畫一之法上起刀筆吏班固曰蕭何曹參皆起秦刀筆吏當時録録未有竒節漢興依日月之末光何以信謹守管鑰參與韓信俱征伐天下既定因民之疾奉法順流與之更始二人同心遂安海內淮隂黥布等已滅唯何參擅功名位冠羣后聲施後世位冠羣后上掩匿細過相舍後園近吏舍吏舍日飲酒歌呼從吏患之乃請參遊後園聞吏醉歌呼從吏幸參召按之乃反取酒張坐飲大歌呼與相和參見人有細過掩匿覆蓋之傳世不絶和帝三年詔曰高祖功臣蕭曹為首有傳世不絶之義曹相國後容城侯無嗣朕望長陵東門見二臣之壠循其遠節每有感焉可遣使者以中牢祠大鴻臚求近親宜為嗣者須景風紹封以章厥功賜五熟釜魏志鍾繇魏國初建為大理遷相國文帝在東宫賜五熟釡為之銘曰於赫有魏作漢蕃輔殿相惟鍾實幹心膂靖共夙夜匪遑安處百僚師師楷兹度矩中書門下平章事同承受進止平章事資任尚淺預聞政事唐高宗永淳元年黃門侍郎郭待舉兵部侍郎岑長倩中書侍郎郭正一吏部侍郎魏元同並與中書門下同承受進止平章事上謂參知政事崔知溫曰待舉等資任尚淺且令預聞政事未可與卿等同名稱自是外司四品以下知政事者始以平章事為名平章事自郭正一始郭正一永隆中遷祕書少監檢校中書侍郎詔與郭待舉岑長倩魏元同並同中書門下承受進止平章事平章事自郭正一始永淳中直遷中書侍郎執政久明習故事文辭詔敕多出其手對盧把姦邪李勉字元卿以檢校司徒平章事貞元初帝起盧杞為刺史袁高還詔不得下帝問勉曰衆謂盧把姦邪朕顧不知謂何勉曰天下皆知而陛下獨不知此所以為姦邪也時韙其對塞政事堂後門常衮為門下侍郎平章事其輕重任情不達時政又政事堂有後門蓋宰相時過中書舍人院咨訪政事衮塞絶其門以自專大不相往來輕重任情不達時政上天下事皆先平章文宗以杜琮領度支稱職欲加户部尚書因紫宸言之陳夷行曰一切恩權合歸君上陛下自看可否李珏對曰太宗用宰相天下事皆先平章謂之平章事代天理物上下無疑所以致太平者也若拜一官命一職事事皆決於君上即焉用彼相昔隋文帝一切自勞心力臣下發論則疑凡臣下用文則宰相不用即常僚豈可自保陛下常語臣云竇易直勸我宰相進擬但五人留三人兩人勾一人渠即合勸我擇宰相不合勸我疑宰相易直此言甚鄙食實封三百户𤣥宗時有上書者以為國之執政同其休戚若不稍加崇寵何以責其盡心開元十年十一月赦敕中書門下共食實封三百户自源乾曜及張嘉貞始奏狀不帶平章事昭愍皇帝見裴度奏狀不帶平章事謂韋處厚曰度即曽為宰相何無平章事處厚因奏為逢吉所擠度自僕射出鎮興元遂於舊使銜中减落帝曰何至是耶翌日下詔復兼同平章事引中官升政事堂故事宰相不於政事堂邀客時海內多務宰相元載等見中官宣傳詔命至中書者引之升政事堂仍置榻待之李􅀈為相即令去其榻臂可截宰相不可得裴冕為僕射平章事時輔國驕恣日甚求為宰臣肅宗曰以公勳力何官不可以俱未允朝望如何輔國諷冕聨章薦已帝密謂宰臣蕭華曰輔國欲帶平章事卿等欲有章薦信乎華問冕曰初無此事吾臂可截宰相不可得也華復入奏帝喜曰冕固堪大用輔國深銜之平章事非序進而得權德輿與李藩同在相位時河中節度使王鍔來朝權幸多舉鍔者憲宗將加平章事李藩堅執以為不可德輿繼奏曰夫平章事非序進而得國朝方鎮帶宰相者蓋有大忠大勳大厯以來又有跋扈難制者不得已而與之今王鍔無大忠勳又非姑息之時欲假此名實恐不可帝從之請弟不言中書事五代史後唐趙光逢莊宗同光末年平章事其弟謁問於私第嘗語及政事他日至止光逢己書其户曰請弟不言中書之事其清靜寡欲如此擔子入門盧程莊宗同光初自太原觀察判官與定州判官豆盧革並命為平章事程本非重器驟登顯位舉止不常時朝廷草創庶物未備班列蕭然寺署多闕程革受命之日即乘肩輿騶導喧沸帝聞呵道之聲詢于左右曰宰相擔子入門帝駭異登樓視之笑曰所謂似是而非者也為名教宗主趙光逢為平章事常有女貞寄黃金一鎰於其室時正屬亂離女貞委化於他邑後二十年金無所歸納於河南尹張全義請付諸宫觀其舊封尚在兩登廊廟四退丘圉百行五常不欺室搢紳咸仰以為名教宗主兩登廊廟四退丘園上所居寢室蕭然四壁李愚為中書侍郎平章事長興四年遇病明宗使中使宣問愚所居寢室蕭然四壁病揭弊氊而已中使具言其事帝曰宰相月俸幾何而委頓如此詔賜絹百匹錢百千帷帳什物一十三事舉六典舊章書之粉壁長興末王政多僻權要之臣避禍不暇邦之存亡無敢言者愚性剛介往往形于言然人無唱和者但舉六典之舊章書之粉壁補六經之闕文刻其印板其經緯大略者曽無所施沒字碑任圜為平章事初豆盧革韋說得罪執政議命相樞密使孔循不欲河朔人居相位圜欲相李琪而鄭注素與琪不協孔循亦惡琪謂安重誨曰李琪非無藝學但不廉爾朝論莫若崔協重誨然之因奏擇相明宗曰誰可以協對圜奏曰重誨被人欺賣如崔協者少識文字時人謂之沒字碑臣比不知書無才而進已為天下笑何容中書之內更益笑端中書之內更益笑端上求玉帶以一郡許之漢蘇逢吉為司徒平章事與蘇禹圭俱在中書逢吉尤貪黷貨財無所顧避求仕人稍有物力者即遣人微露風㫖許以美秩故鳳翔秦王從儼子永吉初至闕下逢吉謂王之裔必有重貨乃遣人求先人玉帶且以一郡許之永吉辭以素無此物縱有者不堪奉獻逢吉乃市一玉帶價數千緡使永吉償其直又前客省使王筠受晉命使於湖湘漢初復命逢吉重邀其賂許以名郡筠不得已分橐裝以奉然俱不能踐言其貪詐如此貪詐上負氣寡識楊邠為右僕射兼門下侍郎平章事常與三司使王章於御前論事隱帝曰事行之後勿俾有辭邠曰陛下但禁聲有臣等在左右聞者縮頸未幾滅族其負氣寡識多此類也對垂堂語周馮道初仕後唐明宗時平章事長興初帝御中興殿召對奏曰陛下宫中無事遊幸近郊則可矣然或御馬涉歷山險萬一馬足蹉跌則貽臣下之憂臣聞千金之子坐不垂堂百金之子立不倚衡彼千金百金之微細尚猶惜其身保其産而況富有四海貴為天子自輕於彼千金百金之子哉願陛下居安慮危動存戒慎上斂容謝之退令小黃門至中書敕道録所對垂堂語道因具録以聞人以為遲九國志南唐張延翰字德華元宗輔政大臣唯重延翰嘗謂左右曰張君凡所議論必盡公平咸有條理至於簿領無不明白吾將傾心以信之由是六司總領殆遍遷中書侍郎平章事人以為遲未幾病不許免相自以智略可以經營天下馮延已拜諫議大夫充翰林學士復結魏岑侵損時政與其弟延魯及陳覺查文微等更相推唱時人謂之五鬼保大四年遷中書侍郎平章事延巳好大言自以己之智略可以經營天下璟乃悉以庶政委之贈平章事韓熙載拜中書侍郎卒煜頗歎惜謂近臣曰吾訖不得熙載為相今將贈以平章前代有此比乎或對曰劉穆之嘗贈開府儀同三司即其比也乃手書贈之議公事但熟睡後蜀徐光溥拜中書侍郎兼禮部尚書平章事昶好度僧尼光溥以為無益請罷之頗為同列母昭裔李昊所嫉自是每與李同議公事光溥但熟睡而已願得傳國寶懷之以入唐軍後唐鄭珏初仕唐末帝時為平章事同光元年莊宗敗王彥章於中都長驅趨汴梁帝聞王師將至召宰相李振敬翔等號哭謀所向皆猶豫不決珏對曰臣有一䇿可以緩外冦不知陛下能行乎梁帝曰卿意如何珏曰願得陛下傳國寶懷之以入唐軍可以緩其師以俟救兵梁帝曰事急矣此物固可惜但卿此行得事了否卿更籌之珏俯首曰了則恐不了左右縮首竊笑翌日莊宗入汴州珏率百官馬前迎謁是日責授萊州司户食桃不康見李思戒唐長興四年帝對宰臣曰諸州鎮數上言有螟蝗民力尚貧將來何以得濟馮道奏曰天災流行古今常所不免自陛下臨御八年七年豐稔今嵗聖躬違豫嵗亦微災乃知九州四海民之消長繫一人之運也雖然嵗小饉不足煩聖慮所願玉體和平生民慶賴乞陛下寢膳之間動留調護道因指御果實曰如食桃不康見李思戒翌日而可也忘持園冊來道初為平章吏部侍郎劉嶽以道形神薄陋一旦為丞相士人多竊笑自月華門赴朝嶽與工部侍郎任贊偶語見道待而復顧贊曰新相回顧何也嶽曰定是忘持兔園冊來道之鄉人在朝者聞之告道因授嶽祕書監贊散騎常侍納禮錢國朝建隆二年詔今後宰相樞密使節度使帶平章事兼侍中中書令者作故事納禮錢宰相樞密使三百千蕃鎮五百千充中書門下公用仍於中書立石記授上年月已經納者後雖改官不在更納天下推為賢相王曽景祐元年拜右僕射平章事封沂國公天下推為賢相上嘗書忠亮忠厚字以賜之文案忠亮忠厚四字重疑有誤請親征戎虜寇凖景祐元年拜平章事初契丹寇瀆淵時大臣議宜戒嚴京城益兵圖西南之幸凖靣折之曰王欽若准南人也故請陛下幸金陵陳堯叟蜀人故請陛下幸成都皆淺議也力請親征大敗戎虜至今五十餘年諸和者凖之力居多與官長拂鬚寇凖拜中書侍郎平章事丁謂參知政事嘗㑹食於中書有羮汚凖鬚謂與拂之凖曰君為參預大臣而與長官拂鬚耶謂顧左右深愧恨之及其後貶竄皆謂所為也不憂邊事工部尚書李昉進位中書端拱初布衣翟馬周訟昉任宰相屬戎虜入寇不憂邊事但賦詩飲宴并奏女樂等數事上惡之召翰林學士賈黃中草制以昉為右僕射罷知政事令詔書切責黃中言僕射中臺師長舊日宰相之任今自工部尚書拜斯為美遷非除責之義當以文昌務簡均勞逸為詞上然之外撫四夷內和百姓王旦拜平章事外撫四夷內和百姓百司得職天下富庶祥符之間頌聲洋溢旦之力也如於野得死蝗不可賀榮王元儼宫火不當罪人執奏內臣劉守圭不當降節度使又辨朝臣與日者往還不當坐罪真宗皆納之兩府凡有議事真宗曰曾與王旦議否旦以為可即可其委任如此陜郊處士魏野以詩寄旦曰聖朝宰相年年出君在中書十四秋西祀東封俱禮畢好來相伴赤松遊旦感悟屢求退感悟求退上改陵天禧四年丁謂拜平章事後封晉國公即位結內官雷允恭將謀不軌命允恭搜行永宣陵移吉卜欲不利於上以幸咎禍之事事既敗附謂者奏言謂首被顧託建立陛下請以功議過王曾曰謂為顧命大臣而謀危社稷負先帝之委託辜陛下之眷注雖有大臣功亦不可免流於崖州初謂拜侍中有詩曰千金家富非良寶一品高官是強名及領翰林學士李維援其親為挽郎請於謂曰望相公陶鑄謂戲曰陶鑄復陶鑄省郎與挽郎維應聲曰自然堪下淚何必更斜陽未幾事敗籍沒其家皆詩之䜟也詩䜟上清白宰相慶厯四年杜衍拜平章事苞苴寶貨不敢到其門時號為清白宰相三日一至中書門下唐李靖字藥師見僕射門五日一入中書商量政事鄭覃以病乞去位有詔解太子太師許五日一入中書商量政事三五日一入中書平章政事杜佑拜司徒嵗餘乞致仕不聽詔三五日一入中書平章政事佑每進見天子尊禮之官而不名三日若五日一至中書裴度太和四年數引疾不任機重詔進司徒平章軍國事須疾已三日若五日一至中書置選部以進廉吏九國南漢志楊洞潜開平二年拜諫議大夫遷兵部侍郎與倪曙李殷趙光裔俱為平章事訪延俊彥開設學校置選部以進廉吏皆洞潜之助也堂貼筆談唐中書指揮事謂之堂貼豫曾見唐人堂貼宰相簽押略如今之堂劄也職官分紀卷三
