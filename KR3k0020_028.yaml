body:
  text: 職官分紀卷二十八宋孫逢吉撰太子左春坊左庶子中庶子附禮記燕義古者周天子之官有庶子官庶子官職諸侯卿大夫士之庶子之卒音悴掌其戒令與其教治庶子猶諸子也周禮諸子之官司馬之屬也前漢百官表太子太傅少傅屬官有庶子後漢百官志太子庶子四百石本注曰無員如三署中郎又太子中庶子一百石本注曰員五人職如侍中晉職官志中庶子四人職如侍中庶子四人職比散騎常侍及中書監令宋百官志中庶子四人漢東京員五人晉減為四人秩六百石沈約宋書中庶子漢置古者世禄卿大夫之子即為副倅謂之國子天子諸侯世子必有庶子官以掌教之隋百官志梁中庶子四人高功者一人為祭酒庶子掌侍從左右獻納得失高功者一人與高功舍人共掌其坊之禁令後齊門下坊中庶子四人又領殿内典膳藥藏齋師等局典書坊庶子四人又領典經坊洗馬八人守舍人二人門大夫門坊大夫主簿各一人并統於官西凉二部伶官清商二部隋門下坊置左庶子典書坊右庶子二人唐職官志左春坊左庶子二人正四品上龍朔二年改左庶子曰左中䕶改門下坊為左春坊咸亨復舊景雲二年復改左春坊唐官品志中庶子四人高功者一人為祭酒行則負璽前後部䕶駕庶子四人掌侍從左右獻納得失髙功者一人與髙功者舍人共掌其坊之禁令環濟要畧庶子主中宫并諸吏之適子及支庶在版籍者也行其秩序作其徒役授八次八舍之職以徼候六典太子左春坊左庶子二人正四品上秦置中庶子員漢太子太傅屬官有庶子王莽改曰中尚翼子後漢太子少傅屬官有太子中庶子員五人秩六百石庶子無員數秩四百石魏因之晉太子詹事有中庶子庶子各四人局擬散騎侍郎品第五班同三令四率在中書侍郎下絳朝服武冠平巾幘髙功中庶子與髙功中舍人共掌禁令糾正違闕侍從左右擯相威儀盡規獻納奏事文書皆典綜之釋奠中庶子扶左庶子扶右宋文帝元嘉初詔中庶子隨太子入直上宮十四年又詔還直東宫梁中庶子庶子各四人庶子髙功者一人為祭酒行則負璽前後部䕶駕班第十一從四品庶子班第九從五品陳因之後魏有太子中庶子員北齊有門下坊中庶子四人領之有典書坊庶子四人領之中庶子第四品上隋門下典書坊各置左右二人領之至是始改為左右矣左庶子正四品上右庶子正四品下皇朝因龍朔二年改門下坊為左春坊凡庶子為太子左中䕶咸亨元年復故左庶子之職掌侍從賛相禮儀校正啓奏監省封題中允為之貳凡皇太子從大祀及朝㑹出入則版奏外辦中嚴入則解嚴焉凡令書下左春坊則與中允司議郎等覆啓以畫諾及覆下以皇太子所畫留為案更寫令書印署注令諾送詹事府若皇太子監國事左尚書省如令書之法國朝至道元年八月詔皇太子判開封府有司言唐制皇太子處分論事之書并畫諾令左右庶子以下宣奉行望自今開封府上表皇太子親書其餘止本府判官等署名其斷案及處分公事並畫諾用左春坊印詔改諾為准餘依有司之請元祐官品令太子左右庶子從五品以肅敬見稱前漢王商字子威為太子中庶子以肅敬見稱通詩馮野王通詩以父任為太子中庶子授經歐陽地餘字長賔為中庶子授皇太子經有志行成帝以傅喜有志行為太子庶子正色不撓魏志鮑勛字叔業清白有髙節知名當世為中庶子在東宫正色不撓規諌得切磋之體蜀志後主立太子璿以霍弋為中庶子璿好騎射出入無度弋援引古義盡言規諌甚得切磋之體官最親密呉志孫登為太子時太傅張温言于孫權曰太子庶子官最親密切問近對宜用雋選于是乃用陳表等為中庶子後又以庶子禮拘復令整中侍坐獻侍臣箴晋温嶠為中庶子獻侍臣箴甚見補益官總門下不可不得其才王珣啓改桓謙為中庶子曰東宫之選中庶子官總門下尤不可不得其才沈靜履素守學好古晉起居注武帝咸寧元年詔男子皇甫謐沈靜履素守學好古與流俗異趣其以謐為太子中庶子有正始遺風宜為宫職齊書袁粲言于帝曰臣觀張緒有正始遺風宜為宫職後轉中庶子欲使太子有風法留瑒瑒辭領中庶子文帝謂冲曰所以久為承華正欲使太子微有瑒風法爾久留承華上儲選難其人陶氏家傳侃遷太子中庶子詔曰君少而好學善談𤣥理光明詩易以孝行聞于時儲選殊難其人特召君焉宫臣受命天朝王隱晉書鄭黙為中庶子朝廷以為太子官屬宜稱陪臣黙上言皇太子體皇極之尊宫臣皆受命天朝不可同之藩國事遂施行不奪其志咸寧元年詔男子皇甫士安為中庶子固辭篤疾皆見敦迫上恕其所執不奪其志僚屬莫與比晉中興書温嶠拜中庶子東宫時見嘉寵僚屬莫與比以孝行稱殷仲堪父病積年仲堪衣不解帯居䘮哀毁以孝行稱孝武聞其名召為太子中庶子甚相親愛二帝並親愛肅宗之在東宫孔衍領中庶子于時中興肇構庶事草創衍經學深博又練識舊典朝儀軌制多取正焉由是元明二帝並親愛之東宫顯職齊王攸與山濤書太子中庶子東宫顯職加以侍接左右誠宜得篤茂有行檢之人必允衆望宜得俊茂山公啟事中庶子缺宜得俊茂者以濟隂太守劉嚴城陽太守石崇參選識藝過臣逺甚惟飲酒不及臣梁謝舉字言揚覽之弟幼好學善清言與兄覽齊名嘗侍宴華林園武帝訪舉于覽覽對曰識藝過臣逺甚惟飲酒不及臣帝大悦轉太子中庶子非為殿下作弄臣隋劉行本為左庶子時左衛率長史夏侯福為太子所暱嘗于閣内與太子戲福大笑聲聞于外行本時在閣下聞之待其出行本數之曰殿下寛容賜汝顔色汝何物小人敢為褻慢因付執法者治之數日太子為福致請乃釋之太子嘗得良馬令夏侯福乗而觀之太子甚悦因欲令行本復乗之行本不從正色而進之曰至尊置臣于庶子之位者欲令輔導殿下以正道非為殿下作弄臣也太子慙而止時唐令則亦為左庶子太子暱狎之毎令以絃歌教内人行本責之曰庶子當陳皇太子以正道何有孌昵房惟之間哉令則甚慚行本卒後太子勇廢文帝曰若使劉行本在勇當不及于此獨秀江東見左右率文冠當時注宫卿奏琵琶歌武媚娘太子勇嘗以嵗首宴宫臣左庶子唐令則自請奏琵琶又歌武媚娘之曲太子洗馬李綱白勇曰令則身任宫卿職當調䕶乃于宴座自比倡優進滛聲惑視聽臣請正其罪勇曰我欲為樂耳君勿多事綱趨而去及勇廢文帝召東宫官屬切譲之無敢對者綱曰今日之事乃陛下之過非太子罪也勇器非上品性是常人若得賢明之士輔導之足堪繼嗣皇業方今多士盈朝當擇賢居任奈以絃歌鷹犬之才居其側致令及此辭氣懔然左右皆為之失色文帝曰令汝在彼豈非擇人綱曰臣在東宮非得言之官帝奇其對擢拜尚書右丞如去一臂唐薛元超永隆二年拜中書令兼太子左庶子髙宗幸東郡太子于京師監國因留元超以侍太子帝臨行謂元超曰朕之留卿如去一臂但吾子未閑庶務悉以委卿獨引罪涕泣李義琰授太子右庶子章懷太子之廢也髙宗慰勉宮寮盡捨罪令復其位庶子薛元超等皆舞蹈謝恩義琰獨引罪涕泣時論美之宜知委任輕重杜正倫為左庶子太宗謂曰國之儲副自古所重分擇善人為之輔佐今太子年幼冲志意未定朕若朝夕見之可得隨事誡約今既委以監國不在目前知卿志懷貞慤能執正道故輟卿為朕以匡太子宜知委任輕重也諌射獵呉兢為左庶子𤣥宗東封在路多射獵兢諌曰陛下爰自洛邑將告禪岱宗行經數州屢以畋獵為事誠荒亡之攸漸非致理之所急况登封告成禮容甚大伏願畋逰之事克修威儀又貞觀時太宗文皇凡在廵行則博選識達古今之士以在左右毎至前代興亡之地問其所由用為諫誡伏願陛下遵而行之則與夫騁奔馬于磵谷要狡獸于叢林不慎垂堂之危不思馭朽之變不可同日而論也前後四疏諌太子姚珽為太子詹事兼左庶子中宗太子秉性聰明年少未有師傅舉事或不法珽前後上四疏以諌云云中允宋百官志漢世太子五日一朝其非朝日即遣僕及中允旦入請問起居主車馬親族職如太僕宗正漢東京太子官屬有中允之職在中庶子下洗馬上疑若今中舍人矣唐百官志太子中允二人正五品下掌侍從賛相校正啓奏總司經典膳藥蔵内直典設宫門六局皇太子出則版奏外辦中嚴入則解嚴凡令書下則與司議郎等畫諾覆審留所畫以為案更寫印署注令諾送詹事府隋有内允武徳二年改曰中舍人𨽻門下坊貞觀初曰中允永徽三年避皇太子名復改中允曰内允太子廢復舊龍朔二年改中允曰左賛善大夫六典太子中允二人正五品下龍朔二年改曰左賛善大夫咸亨元年復為太子中允而左賛善大夫仍置太子中允職擬黄門侍郎父子同日賜章服國朝端拱二年賜太子中允陳省華及其子光禄寺丞直史館堯叟五品服先是堯叟舉進士中甲科上問宰相堯叟父在否吕蒙正曰堯叟父省華見任縣令遽令召至闕下擢授五品常參官未幾父子同日賜章服司議郎唐百官志司議郎二人正六品上掌待從規諌校正啓奏凡皇太子出入朝謁從祀釋奠講學監國之命可傳於史册者録為記注宮坊詳省官長除拜薨卒嵗终則録送史館貞觀十八年置司議郎龍朔二年分左右咸亨元年復舊其後諭徳廢而司議郎復分左右景雲二年改門下坊曰左春坊司議郎以比給事中又龍朔二年改典書坊曰右春坊舎人曰右司議郎妙選人望唐貞觀初置太子司議郎妙選人望以來濟為之仍兼集賢館直學恨不得居此官極為清望初置司議郎以敬播來濟為之此官極為清望馬周歎曰所恨資品望髙不得厯居此官儒宗王元感則天時為四門博士撰尚書糾謬十卷春秋振滯二十卷禮記繩愆三十卷并所注孝經史記藁草請官給紙筆寫上秘閣尋下詔曰王元感質性温敏博聞强記掎前達之失究先聖之㫖是謂儒宗不可多得可授太子司議郎兼崇賢館學士魏知古嘗稱其書曰信可謂五經之指南也論善箴韋承慶字任休遷太子司議郎儀鳳中詔皇太子賢監國時太子頗近聲色承慶上書諌之為諭善箴以獻太子太子善芝賜物甚厚宜以孝道輔弼中宗居春宫召拜元讓太子司議郎及謁見則天謂曰卿既能孝于家必能忠于國今授此職須知朕意宜以孝道輔弼尋卒百司闗啓多由之南唐國志鐘謨為禮部侍郎時太子異參總庶政謨求兼春坊不獲乃薦其所知閻武為司議郎百司闗啓多由之左諭徳唐百官志太子左諭徳一人正四品下龍朔二年置左右各一人其後諭徳廢景雲二年改門下坊曰左春坊復置諭徳以比散騎常侍六典太子左諭徳一人正四品下掌諭太子以道徳皇太子朝宫臣則列侍于左階出入則騎從於正道之左其内外庶政有可為規諷者隨事而賛諭焉國朝太子左諭徳正六品飲酒肆中歸田録仁宗在東宫魯宗道為諭徳其居家門外俗謂之浴堂巷側有酒肆號仁和洒公往往易衣微行飲于其中一日真宗急召公將有所問使者及門而公不在移時乃自肆中飲歸中使遽先入白乃與公約曰上若怪問來遲當託其事以對幸先見教始不異同公曰但以實告中使曰然則當得罪公曰飲酒人之常情欺君臣子之大罪也中使歎而去真宗果問使者具如公對真宗問公何故私入酒家去對曰臣家貧無器皿洒肆百物具備賔至如歸適有鄉親逺來遂與之飲然臣既易服市人亦無識臣者真宗笑曰卿為宫臣恐為御史所彈然自此奇公以為忠實可大用晚年每為章獻太后言後用之忠實可大用上左賛善大夫唐百官志左替善大夫五人正五品上掌傳令諷過失賛禮儀以經教授諸郡王六典左賛善大夫五人正五品下龍朔二年改太子中允為之咸亨元年後置中允而賛善大夫不廢又加置五人職擬諫議大夫掌翊賛太子以規諷也皇太子出入動靜茍非其徳義則必陳古以箴焉先諫官言事唐白居易授太子左賛善大夫七月盗殺宰相武元衡居易首上疏論其寃急請捕賊以雪國恥宰相以宫官非諌職不當先諫官言事㑹有素惡居易者掎摭居易言詞浮華無行貶江州司馬崇文館學士校書六典崇文館學士魏文帝招文儒之士始置崇文館王肅以散騎常侍領祭酒自後無聞貞觀中崇文館有學士直學士員不常置掌教授學生等業貞觀十三年置崇賢館上元二年改避太子名也掌刋正經籍圖書以教授諸生課試舉送如𢎞文館校書二人從九品下本置讐校開元七年改為校書乾元初以宰相為學士總館事貞元八年𨽻左春坊掌校理四庫書籍正其訛謬東宫學士唐禇亮幼聰敏好學善屬文博覽無所不至經目必記于心入隋為東宫學士貞觀中改𢎞文館學士後進模範毎有一文都下傳誦庾信字子山幼而俊邁聰敏絶倫博覽羣書父肩吾為梁太子中庶子掌管記東海徐陵父摛為左衛率陵及信並為抄撰學士父子東宫出入禁闥恩禮時莫與比陵信文並綺艶故世號為徐庾體當時後進競相模範毎有一文都下莫不傳誦見毁謝病見舍人門兼東宫學士注司經局洗馬前漢百官表太子太傅少傅屬官有洗馬後漢百官志太子洗馬比六百石本注曰舊注云員十六人職如謁者太子出則當直者前驅導威儀盖洗馬之義也晉職官志洗馬八人職如謁者秘書掌圖籍釋奠講經則掌其事出則直者前驅導威儀徐邈問王珉漢置洗馬冠髙山冠職如謁者中朝新制洗馬進賢冠出則在馬前清道故曰洗馬隋百官志梁典經局洗馬八人位視通直郎後齊典經坊洗馬八人隋司經局置洗馬四人六典司經局洗馬二人從五品下國語云夫差令勾踐洗馬晉太子詹事屬官有洗馬八人掌皇太子圖籍經書職如謁者局准秘書品第七班同舍人次中舍人下絳朝服進賢一梁冠黒介幘宋亦置八人齊一人梁八人班第六正七品陳因之北齊二人從五品上隋門下坊司經局置四人從五品下至大業中減二人皇朝因之龍朔二年改為太子司經大夫咸亨元年復舊神龍二年改司經局曰桂坊罷𨽻左春坊領崇賢館三年改司經大夫曰桂坊大夫糾正違失掌經史子集四庫圖籍刋緝之事立正本副本貯以備供進凡天下之圖書上於東宫者皆受而蔵之以嚴見憚前漢汲黯景帝時為太子洗馬以嚴見憚才學魏畧裴顔字文林以才學為太子洗馬殺夫差於姑蘇韓子勾踐入官于呉執干戈為呉王洗馬故能殺夫差於姑蘇清身潔巳王隱晉書解系兄弟叔連雅連各清身潔已雅連仕晉至洗馬同班共事晉傅咸感别賦序曰友人魯虎叔雅量宏濟思心䆳逺余自少與之相親相愛有如同生其後遷太子洗馬俄而謬蒙朝私猥忝茲職雖懼不稱而嘉與此子同班共事太子之遇未有若此周旋三載魯生遷尚書郎雖則不逺而情甚恨作兹賦云爾才不稱職傅咸申懷賦序曰余自以無施謬為衆論所許補太子洗馬才不稱職意常歉然章表奏議輒為同官所推文士傳江統字應元召補洗馬毎有疑滯大事章表奏議輒為同官所推常為之作草以五事諌江統為洗馬太子頗好遊宴或闕朝侍統以五事諌之累葉重光才經文雅弱冠登朝荀氏家傳䆳字道𤣥拜太子洗馬戴若思特見推重作詩誦之序曰洗馬荀道𤣥既累葉重光才經文雅所以弱冠登朝才地豈可遊外府見王府功曹門外府注入獄數宿鬚髪皆白宋劉撝字茂謙襲爵建昌公明帝立欲收物望以撝功臣之後自兼掌左戸郎中擢為太子洗馬撝資籍豪富厚自奉養供一身一月十萬宅宇山池妓妾姿藝皆窮上品才調流贍善納交遊愛妓陳玉珠明帝遣求不與逼奪之撝頗恨帝令有司誣奏將殺之撝入獄數宿鬚髪皆白免死繫尚方奪封與弟賁官以人而清梁庾於陵拜太子洗馬舊東宫官屬通為清選洗馬掌文翰尤其清者近代用人皆取甲族有才望者時於陵與周捨並擢充此職武帝曰官以人而清豈限以甲族時論美之不空有名襄陽耆舊傳李宻晉武徵為太子洗馬累詔郡縣逼遣宻上疏武帝覽其表曰宻不空有名嘉其誠宣賜奴婢二人郡縣供其祖母俸膳司經局長官唐常衮為相先是百官俸料寡衮與宰相楊綰奏請加之時韓滉判度支衮與滉各騁私懷所加俸料厚薄由已太子洗馬實司經局長官文學為之貳衮有親戚任文學者乃給十二千而給洗馬十千其輕重任情如此非得言之官見庶子門公卿奏琵琶注文學校書正字六典文學三人正六品魏置太子文學魏武為丞相命司馬宣王為文學掾甚為世子所信與呉質朱鑠陳羣為太子四友自晉之後不置至後周建徳三年置太子文學十人後廢皇朝明慶中始置校書四人正九品下宋孝建中太子洗馬有校書吏四人此後無聞至北齊有太子校書郎從九品上隋司經局置校書六人從九品上皇朝減置四人正字二人從九品下隋司經局置正字二人從九品下煬帝改為正書皇朝復為正字文學掌分知經籍侍奉文章總緝經籍繕寫裝染之功筆札給用之數皆料度之校書正字掌校理刋正經史子集四庫之書侍讀唐百官志太子侍讀無常員掌講導經學太宗時晉王府有侍讀及為太子亦置焉其後或置或否開元初十王宅引辭學工書者入教亦為侍讀國朝嘉祐八年五月以太常少卿李受兼侍讀元祐官品令太子侍讀正七品腰輿輿於内殿唐禇無量𤣥宗在春宫召拜國子司業兼皇太子侍讀嘗撰翌善記以進之皇太子降書嘉勞賚絹四十疋太極元年皇太子國學觀釋奠令無量講孝經禮記各隨端立義博而且辯觀者歎服既畢進授為銀青光禄大夫兼賜與章服并綵絹百叚𤣥宗即位遷郯王傅兼國子祭酒尋以師傅恩遷右散騎常侍仍兼國子祭酒封晉國公實封二百戶未幾丁憂觧職服闋召拜左散騎常侍復為侍讀以其年老毎隨仗出入特許緩行又為造腰輿令内給使輿於内殿無量頻上書陳時政得失多見納用進翼善記上進毛詩纂義許叔牙少精於毛詩禮記貞觀初累授晉王文學兼侍讀髙宗升春宮遷太子洗馬兼崇賢館學士仍兼侍讀嘗撰毛詩纂義十卷以進皇太子賜帛百段兼令寫本付司經局獻龍樓箴歸登有文學為東宫及諸王侍讀獻龍樓箴以諷五日一侍讀陳夷行充翰林學士兼充皇太子侍讀詔五日一入長生院侍太子讀經以嘲誚罷韋綬充太子諸王侍讀時穆宗在東宫方幼好戲綬講書之際雜以嘲誚悦之又綬無威儀以人間鄙説戲言以取悦太子太子因入侍道綬語憲宗不悦謂侍臣曰凡侍讀者當以經義輔導太子納之軌物而綬語及此予何望焉乃罷侍讀出為䖍州刺史穆宗即位以師友恩召為尚書右丞集賢院學士甚承恩顧乏財抵法張涉即徳宗在春宫侍讀也後為常侍臣承恩用事坐受財賂事露帝將以法繩之李忠臣奏曰陛下貴為天子而先生以乏財抵法以愚臣觀之非先生之遇也帝意觧但令歸田里問安西宫韋温兼太子侍諸毎晨至少陽院午見莊恪太子温曰殿下盛年宜早起學周文王為太子鷄鳴時問安西宫太子幼不能行其言遂稱疾書依字去旁人韋綬為太子侍讀憲宗召對綬奏曰太子學書至依字輒去傍人臣問之太子云君父以此字可天下奏事臣子不合全書上益嘉太子之賢賜綬錦綵輔弼之任自有賢薛放性端厚憲宗以儲皇好書求端士輔導經義選充皇太子侍讀及穆宗即位從容宴閒放多在左右宻察機命穆宗嘗謂放曰小子初承大寳懼不克荷先生宜為相以匡不逮放叩頭曰臣實庸淺獲侍冕旒固不足猥承大位輔弼之任自有賢能其言無矯飾皆此類也召居禁中詢訪朝典青宫之舊丁公著充皇太子及諸王侍讀著皇太子及諸王宫訓十巻穆宗即位未及聽政召居禁中詢訪朝典以宰相許之公著陳情詞意極切超授給事中未幾遷工部侍郎兼集賢殿學士寵青宫之舊也闕忠孝之良規劉訥言乾封中厯都水監主簿以漢書授沛王賢及賢為皇太子累遷太子洗馬兼充侍讀嘗撰詼諧集十五卷以進太子及賢廢髙宗見而怒之曰劉訥言自府入宫久淹嵗月朝遊夕處竟無匡賛闕忠孝之良規進詼諧之鄙説儲宫敗徳抑有所由配流振州而死以儒素見稱王紹宗轉秘書少監仍侍皇太子讀書紹宗性澹雅以儒素見稱當時朝廷文士咸敬慕之張易之兄弟亦加厚禮承兩宫恩徐岱字處仁充皇太子及舒王以下侍讀尋改司封郎中擢拜給事中加兼史館修撰並依舊侍讀承兩宫恩顧時無與比而謹慎過甚未嘗洩禁中語亦不談人之短時人以此稱之就嵩山以禮招聘孔述睿孤隱於嵩山徳宗踐阼以諌議大夫銀章朱綬𤣥纁束帛就嵩山以禮招聘述睿既至召對於别殿特賜第宅給以厩馬兼為皇太子侍讀借御書讀李敬𤣥博覽羣書髙宗在東宫馬周啓薦之召入崇賢館兼預侍讀仍借御書讀之敬𤣥雖風格髙峻有不可犯之色然勤于造請不避寒暑馬周及許敬宗皆推薦延譽之題詩太子笏以賜王起字舉之文宗時為皇太子侍讀帝題詩太子笏以賜詔畫象便殿號當世仲尼又使廣五位圖俾太子知古今治亂深見親敬𤣥宗在東宫張説與國子司業禇無量俱為侍讀深見親敬讜言直氣宜在左右吕元膺為同州刺史及中謝上問時政得失元膺論奏詞氣激切上嘉之翌日謂宰臣曰吕元膺有讜言直氣宜留在左右使言得失卿等以為何如李藩裴垍賀曰陛下納諌超冠百王乃宗社無疆之休臣等不能廣求端士又不能數進忠言孤負聖心當罪請留元膺給事左右仍兼皇太子侍讀侍講國朝元祐官品令太子侍講正七品數有匡正之辭以嚴見憚後漢張酺字孟侯顯宗為四姓小侯開學於南宫置五經師傅以尚書教授數講于御前以論難當意除為郎賜車馬衣裳遂令入授皇太子經酺為人質直守經義毎侍講之際數有匡正之辭以嚴見憚焉諌申韓刻薄晉庾亮字元規中興初拜中書郎領著作侍講東宫其所論釋多見稱述與温嶠俱為太子布衣之好時元帝方任刑法以韓子賜太子亮諌以申韓刻薄傷化不足以留心太子甚納焉授經講業唐蕭德言博涉經史尤精左氏春秋好屬文晚年尤篤志于學毎開五經必盥濯束帯危坐對之髙宗為晉王詔徳言授經講業及升春宮乃兼侍讀露門博士北史儒林傳下沈重字子厚天和六年授驃騎大將軍開府儀同三司露門博士乃於露門館為皇太子講論語復在露門教授皇子樂遜字遵賢保定二年以訓導有方遂遷為中大夫五年詔魯公斌畢公賢等俱以束脩之禮同受業焉天和五年上表致仕詔不許授湖州刺史秩滿還朝拜皇太子諌議復在露門教授皇太子遜初進爵崇業郡公又為露門博士伴讀説書國朝嘉祐中仁宗欲建儲貳乃以司封郎中李受為伴讀尚書屯田員外王獵為說書八年五月以右司諫王陶為尚書户部員外郎直史館充皇太子位伴讀尚書屯田員外郎周孟陽秘書丞孫思恭充皇太子位説書典膳郎丞六典典膳局典膳郎二人正六品上自漢以來並有太子食官北齊門下坊别置典膳局有監丞各二人監六品下隋改為正七品下皇朝因之龍朔二年改為太子典膳郎丞二人正八品上北齊丞二人正八品下隋正九品下皇朝升之郎掌進膳嘗食之事丞為之貳毎夕局官於㕑更直減膳唐邢文偉遷太子典膳丞時孝敬在東宫罕與宫臣接見文偉輒減膳上書曰竊見禮記曰太子既冠成人免于保傅之嚴則有司過之史徹膳之宰史之義不得不思過宰之義不得不徹膳今皇帝事稽前典妙簡英俊自庶子以下至諮議舍人及學士侍讀等使翼佐殿下以成聖徳近者以來未甚延納談議不狎謁見尚稀三朝之後俱與内人獨居何由發揮聖智使睿哲文明者乎今史雖闕官宰當奉職忝備所司不敢逃死謹守禮經輒申減膳太子答曰顧已庸虚早尚墳典毎欲研精政術極意書林但在幼年未閑將衛竭誠耽索因即損心比日以來風虚更積中奉恩㫖不許重勞所以屢闕坐朝時乖學緒公潜申朂戒式薦忠規敬尋來請良符宿志自非情思審諭義均弼諧豈能進此言行於簡黙撫躬三省感愧兼申文偉自此益知名藥蔵郎六典藥蔵局藥蔵郎二人正六品上北齊門下坊領藥蔵局有監丞各二人正六品下侍藥四人正七品隋門下坊領藥蔵局監丞二人侍藥四人監正七品下皇朝改監為太子藥蔵郎丞二人正八品上北齊二人正八品下隋正九品下皇朝升之郎掌和齊醫藥之事丞為之貳凡皇太子有疾命侍醫入診疾以議方藥應進藥命藥僮𢷬篩之侍醫和成之將進宫臣監嘗如尚藥局之職内直郎六典内直局内直郎二人從六品下齊職儀太子有内直兵局直兵史二人五品勲位梁有齋内主璽主衣扶持等局各置有司以承其事陳因之北齊門下坊領殿内局監二人正六品下隋門下坊領内直監二人品同北齊皇朝因之職擬尚輦奉御龍朔二年改曰太子内職郎丞二人正八品下北齊内直郎局有副監四人從六品下隋内職直局有副監二人品同北齊皇朝因改為丞郎掌符璽繖扇几案衣服之事丞為之貳典設郎六典典設局典設郎四人從六品下南齊有齋居局齋居庫丞一人梁有齋内局各置有司以承其事陳因之北齊門下坊有齋司局有太子齋帥司閣帥各二人太子齋帥正八品下隋門下坊領齋帥局有齋帥四人正七品下皇朝因之龍朔二年改為太子典設郎掌湯沐洒掃鋪陳之事凡大祭祀皇太子散齋三日於别殿致齋三日於正殿前一日設幄坐於正殿東序及室内俱西向又張幄於前楹下殿若無室則張帷若大禮應供者亦如之宫門郎門大夫六典宫門局宫門郎二人從六品下漢太子太傅屬官有太子門大夫後漢置二人秩六百石職比郎將魏因之晉太子門大夫局准公令班同中舍人主通逺近牋表宫門禁防宋品第六秩六百石從駕在詹事後齊梁陳因之皆置一人北齊門下坊置門大夫主簿各一人門大夫從六品上并統伶官西凉清商二部隋曰宫門局置大夫一人從六品上煬帝改為宫門監皇朝復為宫門大夫龍朔二年改官門郎比城門郎丞二人正八品下皇朝置掌内外宫門管鑰之事前漢書文帝時鼂錯為太子舎人轉太子門大夫三輔决録桓帝以平陵魯寛為太子門大夫太子右春坊右庶子唐職官志右春坊右庶子二人正四品下龍朔二年改右庶子曰右中䕶典書坊曰右春坊咸亨復景雲二年門下坊曰左春坊庶子以比侍中右春坊庶子以比中書令太子監國則庶子比尚書令唐官品志見左庶子門六典右庶子二人正四品下其説已具左庶子隋門下坊置左庶子二人以領之典書坊以右庶子二人領之右庶子正四品下皇朝因之至龍朔二年始改典書坊為右春坊右庶子為太子右中䕶咸亨元年復舊在東宫職擬中書令掌侍從左右獻納啓奏宣傳令㫖之政令中舍人為之貳國朝至道元年詔見左庶子門元祐官品令右庶子從五品太子書䟽制式貞觀中詔曰皇太子與百官書疏未有制式近代以來例皆名自無以别貴賤今凡處分論事之書皇太子並宜畫令右庶子以下各署名宣奉行其餘與諸親及師傅等書皆不在此限獻賦述儲貳事李百藥授右庶子時太子頗留意典墳然閒燕之後嬉戲過度百藥作賛道賦以諷焉辭多不載帝遣使謂百藥曰朕於皇太子處見卿獻賦悉述古儲貳事以誡太子甚是典要朕選卿以輔弼太子正為此事大稱所委但須善始令終耳因賜綵物五百段房杜隱太子以房𤣥齡杜如晦為太宗所親禮甚惡之遂譖之于髙宗由是並被驅斥隱太子有變也太宗令長孫无忌召𤣥齡及如晦令衣道服潜引入閣計事及太宗入春宫擢拜太子右庶子賜絹五千段端居守道閉關六年趙宗儒字秉文罷相為右庶子宗儒端居守道勤奉朝請而已德宗聞而嘉之二十年遷吏部侍郎召見勞之曰知卿閉闗六年故有此拜遣戶奴夜以馬撾擊之張𤣥素轉右庶子時承乾居春宫頗以遊畋廢學𤣥素諫不能納太宗知𤣥素在東宫頻有進諌擢授銀青光禄大夫行太子左庶子承乾嫉其數諌遣戶奴夜以馬撾擊之殆至死承乾又嘗于宫中擊對鼔聲聞于外𤣥素叩閣請見極言切諌承乾乃出宮鼓𤣥素毁之藥石相報髙季輔授太子右庶子上疏切諌時政得失特賜鍾乳一劑曰進藥石之言故以藥石相報撰諌苑于志寧為左庶子以承乾数虧禮度志在匡救撰諌苑二十卷諷之太宗賜黄金十斤中舎人魏畧張茂字彦林上便宜擢為太子舍人晉職官志中舍人四人咸寧四年置以舍人才學美者為之與中庶子共掌文翰職如黄門侍郎在中庶子下洗馬上宋百官志中舎人四人漢東京太子屬官有中允之職在中庶子下洗馬上疑若今中舍人矣南齊百官志東宫職僚有太子中舎人隋百官志梁中舍人四人功髙者一人與中庶子祭酒共掌其坊之禁令又有通事守舍人典法守舍人員後齊門下坊中庶子通舍人通事守舎人主事守舍人各四人隋門下坊置内舍人煬帝減内舍人二人六典太子右春坊太子中舎人二人正五品上本漢魏太子舎人也晉惠帝在儲宫以舎人四人有文學才美者與中庶子共理文書至咸寧二年齊王攸為太傅遂加名為中舍人位叙同尚書郎其後資髙漸擬黄門侍郎班同門大夫次尚書郎下髙功中舍人與髙功中庶子共掌禁令糾正違闕侍從左右儐相威儀盡規獻納奏事文書皆典綜之監盒嘗藥大小㑹二官舉案正直從大小駕一人前部䕶駕一人後部䕶駕同中庶子日月撿奏直臣名更直五日典文䟽如中書郎宋四人齊一人梁有四人髙功一人與中庶子祭酒共掌其坊之禁令班第八正六品陳因之後魏第五品上北齊門下坊有四人品同後魏隋改為太子内舎人四人正五品上煬帝減二人皇朝復為中舍人職擬中書侍郎職見右庶子唐百官志右春坊中舍人二人正五品中庶子掌侍從獻納啓奏中舎人為之貳皇太子監國下令則畫日至春坊則庶子宣𫝊中舎人奉行隋内舍人𨽻典書坊武徳初改曰中舍人永徽元年避太子名改中舍人曰内舍人龍朔二年改中舍人曰右賛善大夫國朝官品令太子中舎人從七品詣伏生受尚書前漢書文帝使鼂錯受尚書伏生所還拜太子舍人美麗自喜董賢為太子舍人哀帝即位為郎傳漏殿下賢為人美麗自喜上見而悦之五日洗沐交知皆天下名士漢雜事鄭當時為太子舍人每五日洗沐常置驛馬長安請謁賔客以夜繼日常恐不徧然其交知皆天下名士嚴而有威束觀漢記侯霸字君房為人嚴而有威為太子舍人置針氊中晉杜錫預之子為太子中舍人性亮直忠烈屢諌愍懷太子言辭懇切太子患之後置針于錫常所坐氊中刺之流血他日太子問之錫對以醉不知太子曰君喜責人何自作過也出則驂乗入侍左右茍悦漢記董賢少為太子舍人美麗自喜上即位見幸出則驂乗入侍左右舍人前漢百官表太子太傅少傅屬官有太子舍人後漢百官志太子舍人二百石本注曰無員更直宿衛如三署郎中漢官曰十三人選良家子孫凡初即位未有太子官屬皆罷為舎人不省領屬少府晉職官志舍人十六人職比散騎中書等侍郎宋百官志無員掌宿衛如三署郎中隋百官志梁舎人十六人掌文記後齊典書坊舎人二十人隋典書坊舎人八人煬帝改為太子舍人為管記舎人減置四人摯虞决疑要注太常弟子通三經補太子舍人晉置十六人掌表啓唐百官志右春坊太子舎人四人正六品上掌行令書表啓諸臣上皇太子大事以牋小事以啓其封題皆上右春坊通事舎人開封以進其事可施行者皆下於舍人與庶子參詳之然後進不可則否六典太子舎人四人正六品下漢成帝時太學弟子三千人王莽秉政嵗課一科二十人為太子舎人晉十六人品第七班同食官令坊在洗馬下掌表啓牋䟽髙功一人與髙功庶子共掌一禁令糾諸逋違從駕則正直從次直守妃出則次直從宋四人齊一人梁庶子下有太子舎人十六人職如晉氏班第三從八品陳因之後魏有太子舍人員北齊二十人從第六品隋八人皇朝四人龍朔二年改為太子右司議郎咸亨元年復為太子舍人掌侍從行令書令旨及表啓之事國朝元祐官品令太子舍人從七品名問晉書王衍以名問起為太子舍人機雲不及晉中興書顧榮字彦先時呉朝人士入洛者陸機陸雲及榮三人而已機雲雖有才藻清潔不及榮也選補呉王郎中令遷太子舍人經博有美於張華晉諸公讃張華博識多聞無物不知盧浮髙郎經博有美於張華起家為太子舍人舉為大臣以慰後聞之士山濤啓事臣近舉汜源為太子舍人源見稱有德素乆沈滯舉為大臣欲以慰後聞之士應對閒敏沈約宋書王僧達太保𢎞之少子也文帝聞其早慧召見徳陽殿應對閒敏上甚嘉之少好學善屬文為太子舍人正情過於沆文章不減溉梁到洽天監初與溉俱䝉擢用尤見賞識弟沆亦齊名髙祖問待詔丘遲曰到洽何如沆溉對曰正情過於沆文章不減溉加以清言殆將難及即召為太子舍人賦詩賜帛到洽為太子舎人御幸華光殿詔洽及沆蕭琛任昉侍醼賦二十韻詩以洽辭為工賜帛二十疋髙祖謂昉曰諸到可謂才子昉對曰臣嘗竊議宋得其武梁得其文出總庶政入為賔友後魏書崔𤣥伯少有雋才號曰冀州神童苻融冀州虚心禮敬拜陽平公管征東記室出總庶政入為賔友衆務修理處斷無滯苻堅聞而奇之召為太子舍人兼東宫學士隋李百藥開皇初為通事舍人遷太子舍人兼東宫學士或嫉其才而毁之乃謝病免來李唐李義府貞觀中以太子舍人加崇賢館學士與議郎來濟俱以文翰知名時人謂之來李諌召女樂𤣥宗在東宫盛擇宮寮拜賈曽為太子舍人時太子頻遣使訪召女樂曽啓諌並令禁斷太子手令答曰比嘗聞公直正信亦不虚許寡人近日頗尋典籍至于政化徧所留心女樂之徒亦已禁斷公之所言雅符本意黄逋村中何嘗有呉國志楊廷式憲臣舉明經為京官將除太常博士既而除太子舍人甚恚鄉人翁承賛聞之謂人曰吾進士及第宏辭登科求一直館學士尚未得廷式乃悟曰黄逋村中何嘗有太子舍人吾幸多矣乃就官右諭徳唐百官志右春坊右諭徳一人品如左春坊注見左諭徳六典右諭徳一人正四品下龍朔二年置職擬右散騎常侍掌如其左凡皇太子朝宮臣則列侍於右階之下出入則騎從於正道之右國朝元祐官品令太子右諭徳正六品右賛善大夫唐百官志右賛善大夫五人正五品上龍朔二年改中舍人曰右賛善大夫儀鳳四年置左右賛善大夫各十人以同姓為之景龍二年始兼用庶姓以比諌議大夫六典太子右賛善大夫五人正五品上龍朔二年改太子中允為右賛善大夫咸亨元年復為中允而賛善大夫不廢又加置五人職比諫議大夫掌如其左凡皇太子朝宫臣則列於右階之下侍直唐貞元十六年以山人崔芋為右賛善大夫侍直新名也通事舍人隋百官志梁通事舎人二人視南臺御史多以餘官兼職後齊門下坊通事守舍人四人隋典書坊通事舎人八人六典太子通事舎人八人正七品下齊職儀中庶子下有門下通事守舎人四人三品勲録叙武冠朱服又庶子下有内典書通事舍人品服同舎人擬中書通事舍人掌宣傳令㫖内外啓奏梁中庶子有通事舍人一人視南臺御史並一班從九品陳因之隋煬帝改太子通事舍人為宣令舍人皇朝復為通事舍人掌導引東宫諸臣辭見之禮及臣下勞問之事凡大朝謁及正冬百官與諸方之使者參見東宫亦如之若皇太子行先一日京文武官職事九品以上奉辭及還宫之明日參見亦如之國朝至道初夀王府内知客王繼英為左清道率府副率兼左春坊謁者謁者本内侍之職東宫無此名只有太子通事舍人今繼英以士為謁者之職天禧中亦承其故有司之失也長於政事梁殷不害長於政事兼飾以儒術為東宫通事舍人時朝政多委東宫不害與舍人庾肩吾直日奏事梁武帝謂肩吾曰卿是文學之士吏事非卿所長何不使殷不害來耶其見知如此太子内坊典内六典太子内坊典内二人從五品下晉有太子寺人監員又齊職儀太子三卿校各有寺人一人隋文帝始置太子内坊有典内等員皇朝因之開元二十七年内坊𨽻内侍省丞二人從七品下隋文帝置皇朝因之典直四人正九品下隋内坊置丞四人皇朝改曰典直典内掌東宫閤内之禁及宫人粮廩賜予之出入丞為之貳凡任典直以儀式導客主之儐序任閤帥以門戶任内閽以出入任給使以繖扇任内厩以車輿任典事以牛馬典内統而監主之凡皇太子妃之親内命婦母并郡主合乗車出入者亦監之凡宫人命婦亡葬之制皆率其屬而供其職太子内官六典太子内官漢書曰太子有妃有良娣又有孺子妾凡三等歴代因之至明帝更為太子置内職二等有寳林良娣齊建元中太子宫置三内職良娣比闗内侯寳林比五等侯才人駙馬都尉隋初始定制皇朝因之良娣二人良媛六人承徽十人昭訓十六人奉儀二十四人司閨掌正掌書掌筵司則掌嚴掌縫掌蔵司饌掌食掌醫掌園六典司閨從六品掌導引妃及宫人名簿以總掌正掌書掌筵知三司出内掌正從八品掌文書出入録目為記并閨閤管鑰糾察推罸女使流外三品掌典文簿而執行焉餘女使視此掌書從八品掌寳及符契經籍宣傳啓奏教學廩賜及紙筆監印掌筵從八品掌帷幄牀褥几案舉繖扇洒掃鋪設及賔客司則從六品掌禮儀參見以總掌嚴掌縫掌藏而領其事掌嚴從八品掌飾衣服巾櫛膏沐服玩仗衛掌縫從八品掌裁縫衣服織績掌蔵從八品掌金玉珠寳財貨錦繒縑綵出入司饌從六品掌膳羞進食先嘗以總掌食掌醫掌園而領其事掌食從八品掌膳羞酒醴燈燭柴炭及宫人食料器皿掌醫從八品掌醫藥伎樂掌園從八品掌園苑種植蔬菓職官分紀卷二十八
