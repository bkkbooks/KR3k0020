  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0020_WYG_004-1a, image: WYG0923/WYG0923-0070a.png}
body:
  text: 職官分紀卷四宋孫逢吉撰同中書門下平章事天宰而為一介使唐趙彦昭字奐然景龍中累遷中書侍郎同中書門下平章事金城公主嫁吐蕃始以紀處訥為使處訥辭乃授彦昭彦昭顧已處外恐權寵移不恱司農卿趙履溫曰天宰而為一介使不亦鄙乎彦昭問計安出履温乃為請安樂公主留之遂以將軍楊矩代典選納賂詮品無序崔湜字澄瀾景龍二年拜中書侍郎檢校吏部侍郎同中書門下平章事與鄭愔同典選納賂遺詮品無序為御史奏劾貶襄州刺史執政時年三十八湜執政時年三十八嘗暮出端門緩轡諷詩張說見之歎曰文與位固可致其年不可及也請子弟授外官蕭至忠授中書侍郎同中書門下平章事上疏陳時政曰貞觀故事宰相子弟多居外職非直抑强宗亦以擇賢才耳請自宰相及諸司長官子弟並授外官共寧百姓表裏相統帝不納言讒人謀動東宫張說字道濟或字說之進同中書門下平章事監修國史景雲二年帝謂侍臣曰術家言五日内有急兵入宫為我備之左右莫對説進曰此讒人謀動東宫耳陛下若以太子監國則名分定姦膽破蜚禍寒矣帝悟下制如説言明年皇太子即皇帝位太平公主以說不附己授尚書左丞罷政事前作后國㸙後為主邑丞竇懐貞字從一神龍中進左御史大夫兼檢校雍州長史㑹嵗除中宗夜宴近臣謂曰聞卿喪妻今欲繼室可乎懐貞唯唯俄而禁中寶扇障衛有衣翟衣出者已乃韋后乳媪玉所謂莒國夫人者故蠻婢也懐貞納之不辭又避后先諱而以字稱世謂媪婿為阿㸙懐貞每謁見奏請輙自署皇后阿㸙而人或謂國㸙斬然不慙以自媚於后景雲初以殿中監召閱月遷左御史大夫同中書門下平章事方太平公主干政懐貞傾已附離日視事退輙詣主第刺取所欲睿宗為金仙玉真二公主營觀費鉅萬諌者交疏不止惟懐貞勸成之躬䕶役作族弟維鍌諫曰公位上衮當思獻可替否輔天子而計較瓦木雜厠工匠間使治内何所瞻仰乎不答督營益急時語曰前作后國㸙後為主邑丞言事公主如邑官屬也𤣥宗受内禪進左僕射封魏國公與太平公主謀逆既敗投水死追戮其尸改姓毒氏陸公加於人一等陸象先景雲中進同中書門下平章事監修國史初太平公主謀引崔湜為宰相湜曰象先人望宜斡樞近若不者湜敢辭主不得已為言之遂參知政事然其性恬靜寡欲議論髙簡為時推尚湜嘗曰陸公加於人一等公主既擅權宰相争附之象先未嘗往謁及謀逆召宰相議曰寜王長不當廢嫡立庶象先曰帝得立何也主曰帝有一時功今失德安可不廢對曰立以功者廢必以罪今不聞天子過失安得廢主怒更與竇懐貞等謀卒誅死時象先與蕭至忠本義等坐為主所進將通誅𤣥宗遽召免之曰嵗寒然後知松柏之後彫也止内地置屯田李元紘字大綱拜中書侍郎同中書門下平章事元紘當國務峻涯檢抑奔競夸進者憚之五月五日宴武成殿賜羣臣襲衣特以紫服金魚錫元紘及蕭嵩羣臣無與比是時廢京司職田議者欲置屯田元紘曰軍國不同中外異制若人閒無役地棄不墾以開手耕棄地省饋運實軍粮於是有屯田其為益尚矣今百官所廢職田不一縣弗可聚也百姓私田皆力自耕不可取也若置屯即當公私相易調發丁夫調發則業廢於家免庸則賦闕於國内地為屯古未有也恐得不補失徒為煩費遂止特賜紫服金魚上再世宰相元紘再世宰相有清節其當國累年未嘗改治第宅僮馬敝弱得封物賙給親族宋璟嘗歎曰李公引宋遥之美黜劉晃之貪為國相家無留儲雖季文子之徳何以加之引宋遙之美黜劉晃之貪上遣中使迎謁杜暹開元十四年召同中書門下平章事遣中使往迎謁見賜絹二百馬一匹第一區執政數月天下定宇文融進黄門侍郎同中書門下平章事融曰使吾執政得數月已定天下矣乃薦宋璟為右丞相裴耀卿為户部侍郎許景先為工部侍郎當時推其知人而性卞急少所推下既居位日引賓客故人與酣飲然神用警敏應對如響雖天子不能屈罷議符命裴光廷拜中書侍郎同中書門下平章事有建言唐應為金徳者中書令蕭嵩請百官普議光廷議以唐符命表著天下久矣不可改亟奏罷之初知星者言上象變不利大臣請禳之光廷曰使禍可禳而去則福可祝而来也論者以為知命請先治程伯獻後美玉裴光廷卒帝勅蕭嵩舉所以代者嵩稱韓休為可遂拜黄門侍郎同中書門下平章事休直方不務趨進既為相天下翕然宜之萬年尉李美玉有罪帝将放嶺南休曰尉小官犯非大惡今朝廷有大姦請得先治金吾大將軍程伯獻恃恩而貪室宅輿馬僣法度臣請先治程伯獻後美玉帝不能奪也初嵩以休柔易故薦之休臨時或折正嵩嵩不能平宋璟聞之曰不意休能爾仁者之勇也嵩寛博多可休峭鯁時政所得失言之未嘗不盡帝嘗獵苑中或大張樂稍過差必視左右曰韓休知否已而疏輙至嘗引鑑黙然不樂左右曰自韓休入朝陛下無一日歡何自戚戚不逐去之帝曰吾雖瘦天下肥矣且蕭嵩毎啟事必順㫖我退而思天下不安寢韓休數陳治道多訐直我退而思天下寢必安吾用休社稷計耳敷陳治道多訐直上陳禄山反狀韋見素字㑹微天寶二載拜武部尚書同中書門下平章事集賢院學士知門下省事明年禄山表請蕃將三十二人代漢將帝許之見素不恱謂楊國忠曰禄山反狀暴天下今又以蕃將代漢將難將作矣國忠不應見素曰知禍之芽不能防見禍之形不能制焉用彼相明日當懇論之既入帝迎論曰卿等有疑禄山意邪國忠見素趨下流涕具陳禄山反狀甚明詔復位因以禄山表置帝前乃出帝令中官袁思藝傳詔曰此姑忍朕徐圖之由是奉詔然毎進見未嘗不為帝言之帝不入其語未㡬禄山反從帝入蜀一國忠死一國忠生房琯字次律天寶中帝狩蜀琯馳至普安上謁帝喜甚即拜文部尚書同中書門下平章事從至成都賜一子官俄與韋見素崔渙奉册靈武見肅宗且言上皇所以傳付意因道當時利病箝索虜情辭吐華暢帝為改容琯既有重名帝傾意待之凡機務與琯叅決諸將相莫敢望時第五琦言財利幸琯諌曰往楊國忠聚斂産怨天下今又寵琦是一國忠死卿國忠生無以示逺方帝曰六軍之命方急無財則散惡琦可也何所取財琯不能對琯之廢朝臣皆言琯謀包文武可復用琯方日引劉秩嚴武與宴語移病自如帝以琯虚言浮誕内鞅鞅挟黨背公非大臣體乾元元年出為邠州刺史逐秩武等髙談有餘而不切事琯有逺器好談老子浮屠法喜賓客髙談有餘而不切事時天下多故急於謀略攻取帝以吏事繩下而琯為相遽欲從容鎮静以輔治之又知人不明以取敗撓故功名隳損云知人不明以取敗撓上片言悟主而取宰相贊曰唐名儒多言琯徳器有王佐才而史載行事亦少貶矣一舉喪師訖不復振原琯以忠誼自奮片言悟主而取宰相必有以過人者用違所長遂無成功然盛名之下為難居矣夫名盛則責望備實不副則訾咎深使琯遭時承平從容幃幄不失為明宰而倉卒濟難事敗隙生陷於浮虚比周之罪名之為累也戒哉輔相必能致治成化裴冕字章甫肅宗即位進冕中書侍郎同中書門下平章事乃建言賣官度僧道士收資濟軍興時取償既賤衆不為宜肅宗至鳳翔罷冕政事大厯中郭子儀言於代宗曰冕首佐先帝馳驅靈武有社稷勲程元振忌其賢遂加誣搆海内寃之陛下宜還冕於朝復俾輔相必能致治成化時元載秉政冕早所甄引載徳之又貪其衰瘵且下已遂拜左僕射同中書門下平章事入見拜不能興載自扶之代為贊謝冕以忠勤自将然不知宰相大體性豪俠侈既素貴輿服食飲皆光麗珍豐櫪馬直數百金者常十數毎廣㑹賓客不能名其饌自製巾子工甚人争效之號僕射巾領使既衆吏白俸簿月二千緡冕顧視喜見顔間世訾其嗜利云視俸簿喜見顔間上抑才虞謗吾不忍為崔渙出為巴西太守𤣥宗西狩迎謁於道帝見占奏以為明治體恨得之晚房琯亦薦之即日拜門下侍郎同中書門下平章事肅宗立韋見素等同赴行在時京師未復舉選不至詔渙為江淮宣諭選補使收採遺逸不以親故自嫌常曰抑才虞謗吾不忍為然聽受不甚精罷職留總百司李麟𤣥宗入蜀麟走見帝再遷憲部尚書同中書門下平章事時宰相韋見素房琯崔渙崔圓踵赴肅宗行在獨麟以宗室留總百司諫内道塲張鎬字従用𤣥宗西狩鎬徒步扈從俄遣諸肅宗所拜中書侍郎同中書門下平章事時引内浮屠數百居禁中號内道塲諷唄外聞鎬諌曰天子之福要在飬人以一函㝢美風化未聞區區佛法而致太平願陛下以無為為心不以小乘撓聖慮帝然之鎬起布衣二期至宰相居身亷不殖貲産善待士性簡重論議有體在位雖淺而天下之人推為舊徳二期至宰相在位雖淺推為舊徳並上託鬼神致位將相王璵以中書侍郎同中書門下平章事時大兵後天下願治璵望輕無他才為士所議既驟得政中外悵駭乃奏置太一壇勸帝身見九宫祠帝由是專意他議不能奪帝嘗不豫太一建言祟在山川璵遣女巫乘傳分禱天下名山大川巫皆盛服中人䕶領所至干託州縣賂遺狼籍時有一巫美而蠱以惡少年數十自隨尤險狡不法馳入黄州刺史左震晨至館請事門鐍不啟震怒破鐍入取巫斬庭下悉誅所從少年籍其贓得十餘萬因遣還中人疏以聞璵不能詰始璵託鬼神致位將相當時以左道進者紛紛出焉言毛若虚希㫖用刑李峴乾元二年以中書侍郎同中書門下平章事於是呂諲李揆第五琦同輔政而峴位望最舊事多獨決諲等不平李輔國用權制詔或不出中書百司莫敢覆峴頓首帝前極言其惡帝悟稍加檢制輔國由是讓行軍司馬然深銜峴鳳翔七馬坊押官盜掠人天興令謝夷甫殺之輔國諷其妻使訴枉詔監察御史孫鎣鞫之直夷甫其妻又訴詔御史中丞崔伯陽刑部侍郎李曄大理卿權獻為三司訊之無異辭妻不承輔國助之乃令御史毛若虚覆按若虚委罪夷甫言御史用法不端伯陽怒欲質讓若虚馳入自歸帝帝留若虚簾中頃伯陽等至劾若虚傳中人失有罪帝怒叱之貶伯陽髙要尉權獻度陽尉逐李曄嶺南流鎣播州峴謂責太重入言於帝曰若虚希㫖用刑亂國法陛下信為輕重示無御史臺帝怒李揆不敢争出峴為蜀州刺史時右散騎常侍韓擇木入對帝曰峴欲專權耶乃云毛若虚示無御史臺朕今出之尚恨法太寛擇木曰峴言直不敢專權陛下寛之祗益盛徳爾還京復拜門地人物文學皆當世第一李揆字端卿拜中書侍郎同中書門下平章事修國史揆美風儀善奏對帝歎曰卿門地人物文學皆當世第一信朝廷羽儀乎故時稱三絶於是京師多盜至參衢殺人尸溝中吏褫氣李輔國方横請選羽林騎五百備徼捕揆曰漢以南北軍相統攝故周勃因南軍入北軍以安劉氏本朝置南北衙文武區别更相檢伺今以羽林代金吾忽有非常何以制之輔國議格揆決事明當然銳於進且近名兄揩有時稱滯冗官不得遷吕諲政事出揆甚逺以故宰相鎮荆南治聲尤髙揆懼復用遣吏至諲所搆抉過失諲訴諸朝帝怒貶揆袁州長史不三日以揩為司門員外郎三絶罷羽林騎徼捕並上拒李輔國求宰相蕭華上元初以中書侍郎同中書門下平章事李輔國用事求宰相華拒之輔國怒㑹肅宗大漸矯詔罷華為禮部尚書引元載以代方代宗諒闇載助輔國貶華為陜州司馬薦賢有来謝者以為恥裴遵慶字少良拜黄門侍郎同中書門下平章事嘗有族子病狂告以謀反帝識其謬置不問性惇正老而彌謹毎薦賢有来謝者以為恥至諌而見從即内益畏雖親近但記其削藁疏數而莫知所言初為郎時著王政記述今古治體識者知其有公輔器云請鑄乾元重寶錢第五琦字禹珪乾元二年進同中書門下平章事初琦請鑄乾元重寶錢以一代十既當國又鑄重規一代五十㑹物價騰踴飢饉相望議者以為非是貶忠州長史結中人刺密㫖元載字公輔李輔國用事輔國妻載宗女也因相締昵㑹京兆尹缺輔國白用載載意屬國柄固辭輔國曉之翌日拜同中書門下平章事代宗立輔國勢愈重數稱其才進拜中書侍郎盜殺李輔國載隂與其謀乃復結中人重秀厚啖以金使刺取密㫖帝有所屬必先知之探微揣端無不諧契故帝任不疑魚朝恩驕横與載不叶奏誅之載得意甚益矜肆時議奏文武官功狀多謬舛載虞有司駮正乃請别勅授六品以下官吏部兵部即附甲團奏不須檢勘欲示權出於已又與王縉請以河中為中都裒闗輔河東十州稅奉京師選兵五萬屯中都鎮禦四方杪秋行幸上春還可以避羌戎患載以議入即從前勅所由吏於河中經圖宫殿築私第帝聞惡之置其議載智畧開果久得君以為文武才略莫已若外委主書卓英倩李待榮内劫婦言縦諸子開通貨賄京師要司及方靣皆擠遣忠良進貪猥凡仕進干請不結子弟則謁主書城中開南北二第堂宇奢廣當時為冠大厯十三年收載及王縉賜載自盡請以河中為中都仕進不結子弟則謁主書並上奉佛不茹葷王縉字夏卿拜黄門侍郎同中書門下平章事進侍中時元載專朝天子栱手縉曲意附離無敢忤又恃才多所狎侮雖載亦疾其凌侮也京兆尹黎幹數有論執載惡之縉折幹曰尹南方孤生安曉朝廷事縉素奉佛不茹葷食肉晚節尤謹妻死以道政里第為佛祠諸道節度觀察使来朝必邀至其所諷令出財佐營作初代宗喜祠祀而未重浮屠法毎從容問所以然縉與元載盛陳福業報應帝意向之由是禁中祀佛諷唄齋薰號内道塲引内沙門日百餘饌供珍滋出入乘廏馬度支具廪給或夷狄入寇必合衆沙門誦䕶國仁王經為禳厭幸其去則横加錫與不知極胡人官至卿監封國公者著籍禁省勢傾公王羣居賴寵更相凌奪凡京畿上田美産多歸浮屠雖藏奸宿亂踵相逮而帝終不悟詔天下官司不得笞辱僧尼初五臺山祠鑄銅為瓦金塗之費億萬計縉給中書符遣浮屠數十輩行州縣斂丐資賄縉為上言國家慶祚靈長福報所憑雖時多難無足道者禄山思明毒亂方煽而皆有子禍僕固懐恩臨亂而踣西戎内寇未及撃輙去非人事也故帝信愈篤七月望日宫中造盂蘭盆綴飾鏐琲設髙祖以下七聖位幡節衣冠皆具各以帝號識其幡自禁内分詣道佛祠鐃吹鼓舞奔走相屬是日立仗百官班光順門奉御導從嵗以為常羣臣承風皆言生死報應故人事置而不修大厯政刑日以堙陵由縉與元載杜鴻漸倡之也性貪冒及敗上憫其耄貶括州刺史食千僧以為有報杜鴻漸字之巽代宗以為兵部侍郎同中書門下平章事自蜀還食千僧以為有報縉紳效之病甚令僧剔頂髪遺命依浮屠葬制下士相賀於朝楊綰字公權拜中書侍郎同中書門下平章事制下士相賀於朝綰素痼疾居旬日寖劇有詔就中書療治毎對延英殿許挟扶於時釐補穿敝唯綰是恃未㡬薨帝驚悼詔羣臣曰天不使朕致太平何奪綰之速耶即日贈司徒遣使者冊授欲及其未斂也諡曰文貞蘇端持異議帝貶巴州員外司馬猶賜諡文簡始輔政御史中丞崔寛本豪侈城南别墅池觀堂皇為當時第一即日遣人毁之京兆尹黎幹出入從騶馭百數省損才留十餘騎中書令郭子儀在邠州行營方大㑹除書至音樂散五之四他聞風靡然自化者不可勝紀世以比楊震山濤謝安云疾劇就中書療治上天奪綰之速聞風自化比楊震山濤謝安並上以清儉自賢元載死常衮拜門下侍郎同中書門下平章事與楊綰同執政綰長厚通可而衮苛細以清儉自賢帝内重綰而專任之禮遇信愛衮弗及也毎所恨忌㑹綰卒衮始當國先是百官俸寡獨議増給之時韓滉使度支與衮皆任情輕重滉惡國子司業張參衮惡太子少詹事趙惎皆少給之太子文學為洗馬副衮姻家任文學其給乃在洗馬上其騁私崇怨類此給百官俸任情輕重上罷内厨食故事日出内厨食賜宰相家可十人具衮奏罷之濌伯衮懲元載敗窒賣官之路然一切公議格之非文詞者皆擯不用故世謂之濌伯無賢不肖之辨云衮為相散官纔朝議而無封爵郭子儀言於帝遂加銀青光禄大夫封河内郡公徳宗即位衮奏貶崔祐甫為河南少尹帝怒使與祐甫換秩再貶潮州刺史為相散官纔朝議與崔祐甫換秩並上除吏八百員崔祐甫字貽孫拜門下侍郎同中書門下平章事自至徳乾元以来天下戰討啟丐填委故官賞繆戾永泰後稍稍平定而元載用事非賄謝不與官剗塞公路綱紀大壊載誅楊綰相未㡬卒衮當國懲其弊凡奏請悉杜絶之惟文詞入第乃得進然無所甄異賢愚冋滯焉及祐甫則薦舉惟其人不自疑畏推至公以行未踰年除吏㡬八百員莫不諧允帝嘗謂人言卿擬官多親舊何耶對曰陛下令臣進擬庶官夫進擬者必悉其才行如不與聞知何由得其實帝以為然神䇿軍使王駕鶴者典衛兵乆權震中外帝將代之懼其變以問祐甫祐甫曰是无足慮即詔駕鶴留語移時而代者已入軍中矣淄青李正已畏帝威斷表獻錢三十萬緡以觀朝廷帝意其詐未能答祐甫曰正已誠詐陛下不如因遣使勞其軍以所獻就賜將士若正巳奉承詔書是陛下恩洽士心若不用彼自斂怨軍且亂又使諸蕃不以朝廷為重賄帝曰善正已慚服時議者謂其謀謨為可復貞觀開元之治是嵗被疾詔肩輿至中書卧而承㫖若還第即遣使咨決薨贈太傅賜諡文貞故事門下侍郎未有贈三師者以其有大臣節寵異之召王駕鶴留語代神策軍使以李正已獻錢就賜將士上肩輿至中書卧而承㫖以有大臣節特贈三師並上興嶺表以單議悟天子楊炎字公南崔祐甫薦炎可器任即拜門下侍郎同中書門下平章事炎興嶺表以單議悟天子中外翕然屬望為賢相居數月崔祐甫疾不能事喬琳免炎獨當國遂多變祐甫之政滅薄䕶元陵功優人始不恱初炎矯飭志節頗得名既傅㑹元載抵罪俄而得政然忮害根中不能自止眦睚必仇果於用私終以此及禍自道州還也家人以緑袍木簡棄之炎止曰吾嶺上一逐吏超登上台可常哉且有非常之福者必有非常之禍安可棄是乎及還貶所服久之矯飭志節上諷帝以刑名繩天下盧杞字子良拜門下侍郎同中書門下平章事既得志險賊寖露賢者媢能者忌小忤已不傅死地不止將大樹威脅衆市權為自固者始帝即位以崔祐甫為相專以道徳導主意故建中初綱紀張設赫然有貞觀風及杞相諷帝以刑名繩天下亂敗踵及其隂害矯譎雖國患主辱猶謷然肆為之後雖斥然帝念之不衰文武兼資望重内外張鎰字季權一字公度建中二年拜中書侍郎同中書門下平章事明年以兩河用兵詔省薄御膳及皇太子食物鎰因奏減堂飱錢及百官廪俸三分之一以助用度盧杞忌鎰剛直欲去之時朱泚以盧龍卒戍鳳翔帝擇人以代杞即謬曰鳳翔將校班秩素髙非宰相信臣不可鎮撫臣宜行帝不許杞復曰陛下必以臣容貌蕞陋不為三軍所信恐後生變臣不敢自謀惟陛下擇之帝顧鎰曰文武兼資望重内外無易卿者其為朕撫盧龍士乃以中書侍郎為鳳翔隴右節度使鎰知為杞隂中然辭窮因再拜受詔盲宰相闗播字務元拜中書侍郎同中書門下平章事政一決於杞常論事帝前播意不可避坐欲有所言杞目禁輙止退譲播曰曰以君寡言故至此今欲開口爭事耶播即喑畏毋敢與争時李元平陶公達張愻劉承誡率輕薄子㳺播門下能侈言誕計以功名自喜播謂皆將相材欲請用之元平本宗室疏裔好論兵鄙天下士大夫無可者人人怨疾之李希烈叛帝以汝州據賊衝刺史疲軟不勝任播盛稱元平帝召見拜左補闕不數日檢校吏部郎中兼汝州别駕知州事元平始至募工築郭浚隍希烈隂使亡命應募凡内數百人而元平不悟賊遣將李克誠以精騎薄城募者内應縛元平馳見希烈遺矢於地希烈以其眇小無髯戯克誠曰使爾取元平乃以其子来耶因嫚罵曰盲宰相使汝當我何待我淺耶偽署御史中丞播聞詫曰元平事濟矣謂必覆賊而建功也左右笑之無何偽署為宰相有告其貳者平元斷一指自誓公達等以元平屈賊皆廢不用播從幸奉天盧杞白志貞已貶而播猶執政議者不平遂罷為刑部尚書韋倫等曰宰相不善謀使天子播越尚可尚書耶相與泣諸朝言監軍權望太重蕭復字履初扈狩奉天拜吏部尚書同中書門下平章事嘗言艱難以来始用宦者監軍權望太重是曹正可委宫掖事兵要政機勿使參領帝不聴又言陛下厥初清明自楊炎盧杞放命穢盛徳播越及兹今阽於危當懲艾前敗因述君臣大端即自言若使臣依阿偷免不敢當宰相杞對上或諂諛阿匿復厲言杞辭不正帝色眙謂左右曰復慢我因詔復充山南江淮湖南等道宣撫安慰使復望閥髙華厲名節不通狎流俗及為相臨事嚴方數咈帝意故居相位亟解然性孝友既貶晏然口未嘗言所累容身逺罪劉從一徳宗居奉天超拜刑部侍郎同中書門下平章事從幸梁州改中書侍郎帝遇之善然無他材容身逺罪而已言唐安公主宜儉葬姜公輔諫議大夫同中書門下平章事帝徙梁唐安公主道薨主性仁孝許下嫁韋宥以播遷未克也帝悼之甚詔厚其葬公輔諫曰即平賊主必歸葬今行道宜從儉以濟軍興帝怒謂翰林學士陸贄曰唐安之葬不欲事塋隴令累甓為浮圖費甚寡約不容宰相闗預茍欲指朕過爾贄曰公輔官諌議職宰相宰相獻替固其分本立輔臣朝夕納誨微而弼之乃其所也帝曰不然朕以公輔才不足以相又自求解朕既許之内知且罷故賣直售名爾遂下遷太子左庶子天生為社稷萬人李晟字良器帝狩梁州自行在遣晟將張少𢎞口詔進晟尚書左僕射同中書門下平章事晟受命拜且泣曰京師天下本若皆執羈靮誰將復之乃繕甲兵治陴隍以圖收復是時晟提孤軍横當寇鋒恐二盜合而軋之則卑詞厚幣偽致誠於懐光時敖廥單覂乃使張彧假京兆尹多署吏調畿内賦不淹旬芻米告具乃陳兵下令曰國家多難乘輿播遷見危死節自吾之分公等此時不誅元㓙取富貴非豪英也渭橋斷賊首尾吾欲與公戮力一心建不世之功可乎士皆雪泣曰惟公命晟破賊露布至梁帝感泣羣臣上壽且言晟蕩夷兇寇而市不易門里宗廟不震長安之人不識旗鼓雖三代用師不能加之帝曰天生晟為社稷萬人豈獨朕哉分錦示和解張延賞徳宗次梁倚劔蜀為根本即拜中書侍郎同中書門下平章事帝還詔入秉政初吐蕃寇劔南李晟總神䇿軍戍之及還以成都倡自隨延賞遣吏奪取故晟銜之至是鎮鳳翔帝所倚重表陳宿恨帝不得已罷延賞為尚書左僕射然雅意決用之以晟嘗為韓滉識擢命滉移書道意及俱入朝滉從容邀晟平恨且使薦延賞於帝於是復拜平章事既宴禁中帝出瑞錦一端分繫之以示和解晟因為子請婚延賞不許晟曰吾武夫雖有舊惡盃酒間可解儒者難犯外睦而内含怒今不許婚釁未忘也是年除吏千五百員當省者千餘道路訾謗浸淫聞於上延賞俱請詔州縣或考先滿或攝掌遇停限而官見乏者聽在所擇省員有幹譽者權補以才不以資而大臣馬燧白志貞韋倫表言省官太甚不可行㑹延賞疾困不能事宰相李泌一切奏復延賞當國飾情復怨不稱所望亦早不幸未及有所建明然帝待遇甚厚稱其奏議有宰相體專屬以吏事而以軍食委李泌刑法委栁渾時以為任職除吏千五百員當省者千餘奏議有宰相體並上衣裘茵衽十年一易韓滉字太沖貞元元年加檢校左僕射同中書門下平章事江淮轉運使一年入朝滉既宿齒先達頗簡倨接新進用事不能滿其意衆怨之滉宰相子性節儉衣裘茵衽十年一易甚暑不執扇居處陋薄取庇風雨門當列㦸以父時第門不忍壊乃不請堂先無夾廡弟洄稍増補之滉見即撤去曰先君容焉吾等奉之常恐失墜若摧圯繕之則已安敢改作以傷儉徳居重位清潔疾惡不為家人資産自始仕至將相乘五馬無不終櫪下不請門㦸即撤去堂廡並上廉抑畏慎劉滋貞元二年權左散騎常侍同中書門下平章事為相無所施設亷抑畏慎而已舉不適時崔造字𤣥宰貞元二年以給事中同中書門下平章事帝謂造敢言為能立事故不次用之造久在江左疾錢榖諸使韓滉方領轉運使有寵於帝朝廷仰其須是秋江淮米大集帝美滉功造辭位以憂愧卒議者謂造舉不適時方用之乏不能權濟大事雖據舊典奚能抗一切之制云諫帝避狄齊映貞元二年以舎人同中書門下平章事與崔造劉滋並輔政滋端重寡言映謙不肯事否可一顓於造㑹造疾映乃當國吐蕃數入寇闗輔震騷咸言帝欲避狄映入諫曰戎狄不懲臣之罪也然内外洶洶謂陛下具糗糧欲治行夫大幸不再奈何不與臣等計乎因俯伏流涕天子為感悟映微時張延賞遇之善及映相而延賞為左僕射數為映畫事又為所親求官映不答延賞恚既復用即劾映非宰相器貶䕫州刺史帝得人獨不賀栁渾字夷曠貞元三年以本官同中書門下平章事帝嘗親擇吏宰畿邑而政有狀召宰相語皆賀帝得人渾獨不賀曰此特京兆尹職耳陛下當擇臣輩以輔聖徳臣當選京兆尹承大化尹當求令長親細事代尹擇令非陛下所宜帝然之玉工為帝作帶誤毁一銙工私市他玉足之及獻帝識不類擿之工人狀罪帝怒其欺詔京兆府論死渾曰陛下遽殺之則已若委有司須詳讞乃可于法誤傷乘輿器服罪當杖請論如律由是工不死左丞田季羔從子伯强請賣私第募兵助討吐蕃渾曰季羔先朝號名臣由祖以来世孝謹表闕於門隋時舊第惟田一族爾討賊自有國計豈容不肖子毁門構徼一時倖損風教哉請薄責以示懲沮帝嘉納玉工毁帶請論如律責田伯强賣第助兵並上言韓滉省中榜吏韓滉自浙西入朝奏事或日晏他相取充位滉遂省中榜吏自若渾雖為滉所引惡其専質讓曰省闥非刑人地而榜吏至死公家先相國以狷察不滿嵗輙罷今公奈何蹈前非專立威福豈尊主卑臣義耶滉悔悟稍褫其威儒士知軍戎萬里情渾瑊與吐蕃㑹平涼是日帝與大臣以和戎息師之便馬燧賀曰今日已盟可百年無虜患栁渾跪曰五帝無誥誓三王無盟詛蓋盟詛之興皆在季末今盛明之朝反以季末事行於夷狄夫夷狄輾轉無常易以兵制難以信結臣竊憂之李晟曰誠如渾言帝變色曰渾儒生未達邊事而大臣亦當爾耶皆頓首謝夜半邠寧節度使韓游環飛奏吐蕃刼盟將校覆没帝大驚即以其表示渾明日慰之曰卿儒生乃知軍戎萬里情乎益禮異之頭可斷舌不可禁宰相張延賞怗權嫉渾守正遣親厚謂曰明公舊徳第慎言於朝則位可久渾曰為吾謝張公渾頭可斷而舌不可禁卒為所擠以右散騎常侍罷政事李勉盧翰真拘俗之人渾性清儉免後數日置酒召故人出游酣肆乃還曠然無黜免意時李勉盧翰皆以舊相闔門奉朝請歎曰吾等視栁宜城真拘俗之人哉諫廢太子李泌字長源貞元三年拜中書侍郎同中書門下平章事太子妃蕭母郜國公主也坐蠱媚幽禁中帝怒責太子太子不知所對泌入帝數稱舒王賢泌揣帝有廢立意執争數十意益堅帝悟太子乃得安送實封不納初興元後國用大屈封物皆三損一舊制堂封嵗三千六百縑後纔千二百至是帝使還舊封於是李晟馬燧渾瑊各食實封悉讓送泌泌不納而還勸不受私獻時方鎮私獻於帝嵗凡五十萬緡其後稍損至三十萬帝以用度乏問泌泌請天下供錢百萬給宫中勸不受私獻凡詔㫖須索即代兩稅則方鎮可以行法天下紓矣對帝不覺盧把姦帝常從容言盧杞清介敢言然少學不能廣朕以古道人皆指其姦而朕不覺也對曰陛下能覺杞之姦安至建中禍耶李揆和蕃顔真卿使希烈其害舊德多矣又楊炎罪不至死杞擠陷之而相闗播懐光立功逼使其叛此欺天也帝曰卿言誠有之然楊炎視朕如三尺童子有所論奏可則退不可則辭官非特杞惡之也且建中亂卿亦知桑道茂語乎乃命當然對曰夫命者已然之言主相造命不當言命言命則不復賞善罰惡矣紂曰我生不有命在天武王數紂曰謂已有天命君而言命則桀紂矣帝曰朕請不復言命學士加大泌加集賢殿崇文館大學士修國史學士加大始中宗時張説為之固辭乃以學士知院事至崔圓復為大學士亦引泌為讓而止四年八月月蝕東壁泌曰東壁圖書府大臣當有憂者吾以宰相兼學士當之矣昔燕國公張說由是以亡明年果卒當月蝕東壁上持黄老鬼神説泌好縱横大言時時讜論能悟移人主然常持黄老鬼神說故為人所譏切初肅宗重隂陽巫祝擢王璵執政大抵興造工役輙牽禁忌俗說而黎幹以左道位京兆尹嘗使禁工駢珠刺繡為乘輿服舉焚之以為禳禬德宗表不為然及嗣位罷内道塲除巫祝代宗将葬帝號送承天門而輼車行不中道問其故有司曰陛下本命在午故避之帝泣曰安有枉靈駕以謀身利命直午而行又宣政廊壊太卜言孟冬魁剛不可營繕帝曰春秋起塞從時何魁剛為亟詔葺之及桑道茂城奉天事騐始尚時日拘忌因進用泌泌亦自有所建明獨栁玭稱西京復泌謀居多其功乃大於魯連范蠡云功大於魯連范蠡上不能稽古立事惟樹親黨竇參字時中以中書侍郎同中書門下平章事領度攴毎延英對他相罷參必留以度支為言實專政也然參無學術不能稽古立事惟樹親黨多所詗察四方畏之於是滿青李納厚饋參外示嚴畏實賂帝親近為間故左右争毁短之㑹朝代宣詔董晉字渾成貞元五年以門下侍郎同中書門下平章事五月朔天子㑹朝公卿在廷侍中賛羣臣賀竇參攝中書令當傳詔疾作公卿相顧未有詔晉從容進曰攝中書令臣參病不能事臣請代參事南面宣致詔詞進退甚詳金吾將軍沈房有期喪公除常服入閤帝疑以問晉對曰故事朝官期以下喪服絁縵不復衣淺色南班亦如之又問冠冕之制對曰古者服冠冕以佩玉節步堂上接武堂下布武君前趨進而已今或奔走以致顛仆在式朝臣皆綾袍五品而上金玉帶所以盡飾以奉上故漢尚書郎含香老菜采服君父一也若然服絁縵亦非禮也帝然其言詔入閤官母趨走期以下喪不得以慘服㑹令羣臣衣本品綾袍金玉帶對喪服冠冕之制上獻審官六議趙璟字退翁進中書侍郎同中書門下平章事璟精治道常以固本在選賢節用薄賦斂寛刑罰懇懇為天子言之又陳前世損益當時之變獻審官六議帝皆從之請臺閣長官自薦其屬陸贄字敬輿以中書侍郎同中書門下平章事貞元後雖置宰相至除用庶官反覆參語乃得下及贄秉議始請臺閣長官得自薦其屬有不職坐舉者帝初許之或言諸司所引皆親黨招賂遺無實才復詔宰相自擇贄奏言齊桓公問管仲害霸對曰得賢不能任害霸也任使賢不能固害霸也固始而不終害霸也與賢人謀事而小人議之害霸也所謂小人者非謂悉懐險詖以覆邦家也葢趨向狹促以沮議為出衆自異為不羣趨小利昧逺圖効小信傷大道爾所謂臺省長官僕射尚書丞郎御史大夫中丞是也陛下擇輔相多出其言中行實不能頓殊也今乃謂不能進一二屬吏豈後位宰相則可擇天下材乎夫求才者貴廣考課者貴精武后收人心務拔擢非徒人得薦士亦許自舉其才豈不易哉然而課責嚴進退速故當世稱知人之明累朝賴多士之用陛下賞鑒獨任難於公舉有登延之路無練覈之方武后以易得人而陛下以精失士今擇宰相以重於庶品選長官以愈於下流及宰相獻言長史藨士則又納横議廢始謀是任以重者輕其言待以輕者重其事也帝雖嘉之然卒停薦士詔請以内外員三分之舊制吏部選以嵗集乾元後天下兵興率三年一調吏員稽壅則案牒叢淆偽冒䝉真吏縁以為姦廢置無綱至十年不被調者缺員或累嵗不補贄乃請以内外員三分之毎嵗計缺集人檢校吏姦天下便之旬一人秉筆當是時賈曉盧邁趙璟同輔政凡有司闗白三人者更相顧不肯判贄又請如故事旬一人秉筆所咨輙判言裴延齡躁妄不可用班宏判度支卒官贄藨李巽帝漫許之而自用裴延齡贄言延齡僻戾躁妄不可用不聴俄而延齡姦佞得君天下仇惡無敢言贄上言苦諫帝不懌竟以太子賓客罷贄本畏懼未嘗通賓客延齡揣帝意薄讒短百緒帝遂發怒欲誅贄賴陽城等交章論辨乃貶忠州别駕上不負天子下不負所學贄輔政不敢自顧重事有可否必言之所言皆剴拂帝短懇到深切或規其太過者對曰吾上不負天子下不負所學遑他恤乎既放流逺常闔户人不識其面又避謗不著書地苦瘴癘祗為今古集騐方五十篇示鄉人云避謗不著書上言方鎮帥缺當自天子命賈曉字敦詩貞元九年以尚書右僕射同中書門下平章事常以方鎮帥缺當自天子命之若謀之軍中則下有背向人固不安帝然之不用也安危大事無所發明曉嗜觀書老益勤尤悉地理至隂陽雜數罔不通其器恢然葢長者也不喜臧否人物為相十三年雖安危大事無所發明而檢身厲行自其所長毎歸第對賓客無少倦家人近習不見其喜愠世謂淳徳有常者治身循法無他過盧邁字子𤣥以本官同中書門下平章事進中書侍郎陸贄趙璟專大政邁居中治身循法無他過竊大任者八年崔損字至無貞元中同中書門下平章事過為恭遜接見便僻不止於容身而已自建中後宰相罕有久在位者數嵗罪黜損用此中上意竊大任者八年帝亦知物議鄙其持禄取容然憐而厚之以文學歴將相趙宗儒字秉文以給事中同中書門下平章事賜服金紫宗儒以文學歴將相位任崇劇然無儀矩以治生瑣碎失名以治生瑣碎失名上叱去主書滑渙鄭餘慶字居業貞元十四年拜中書侍郎同中書門下平章事時主書滑渙與宦人劉光琦相倚為姦毎宰相議為光琦沮變者令渙往請必得由是四方貲餉奔委之弟泳官至刺史杜佑鄭絪執政頗姑息而佑常行輩待不名也至餘慶議事渙傲然指畫諸宰相前餘慶叱去未㡬罷為太子賓客後渙以賍敗帝寖聞叱去事善之餘慶少砥礪行已完潔仕四朝其禄悉賙所親或濟人急而自奉粗狹至官府乃開肆廣大常語人曰禄不及親友而侈僕妾者吾竊鄙之奏議類用古言如仰給縣官馬萬蹄有司不曉何等語人訾其不適時與從父絪家昭國坊絪第在南餘慶第在北世謂南鄭相比鄭相云奏議用古言南鄭相北鄭相上三五日一入中書平章政事杜佑字君卿拜檢校司空同中書門下平章事嵗餘乞致仕詔三五日一入中書平章政事佑毎進見天子尊禮之官而不名後數年因乞骸骨方漢胡廣佑為人平易遜順與物不違忤人皆愛重之方漢胡廣然練達文采不及也朱坡樊川頗治亭觀林芿鑿山股泉與賓客置酒為樂子弟皆奉朝請貴盛為一時冠天性精於吏職為治不皦察數斡計賦相民利病上下之議者稱佑治行無缺惟晚年以妾為夫人有所蔽云治行無缺上循黙茍安髙郢字公楚貞元末權中書侍郎同中書門下平章事與鄭珣瑜同拜既王叔文用事珣瑜憂甚争不能得乃稱疾不出郢未有所建白俄而珣瑜免故議者賢珣瑜而咎郢賛謂其執退叔文輩其力不難顧循黙茍安所謂焉用彼相者矣珣瑜一忿卧第與郢佑固位二者亦不足相輕重云卧家七日不出罷鄭珣瑜順宗立遷吏部尚書同中書門下平章事王叔文起州吏為翰林學士鹽鐵副使内交閹人攘撓政機韋執誼為宰相居外奉行叔文一日至中書見執誼直吏白方宰相㑹食百官無見者叔文恚叱吏吏走入白執誼起就問與叔文語珣瑜與杜佑髙郢輙饔以待頃之吏白二公同飯矣珣瑜喟曰吾可復居此乎命左右取馬歸卧家不出七日罷為吏部尚書矣聞人足聲輙悸動韋執誼宗立以疾不親政叔文用事乃擢執誼為尚書左丞同中書門下平章事叔文與王伾居中竊命欲執誼據以奉行因用迷奪朝權執誼既為所引然外迫公議欲示天下非黨與者乃時時異論相可否而密謝叔文白不敢負約欲共濟國家事爾叔文數為所梗遂詬怒反成仇怨及憲宗受内禪流叔文伾分北支黨貶執誼為崖州司户參軍執誼已失形勢知禍且及雖尚在位而臨事奄奄無氣聞人足聲輙悸動至於敗奏罷中人監軍杜黄裳字遵素皇太子總軍國事擢門下侍郎同中書門下平章事於時夏綏銀節度使傅全義憸佞無功因其表朝白罷之俄而劉闢叛議者以闢恃險討之或生事唯黄裳固勸不赦因奏罷中人監軍而專委髙崇文凡兵進退黄裳自中指授無不切於機崇文素憚劉澭黄裳使人謂曰公不奮命者當以澭代崇文懼竭力縛賊以獻蜀平羣臣賀憲宗目黄裳曰時卿之功罷韓全義節鎮勸不赦劉闢以劉澭代髙崇文並上黙黙居位四年鄭絪字文明憲宗即位拜中書侍郎同中書門下平章事始盧從史隂與王承宗連和有詔歸路從史辭潞定粮請留軍山東李吉甫密譛絪漏言於從史帝怒坐浴堂殿召學士李絳語其故且曰若何而處絳曰誠如是罪當族然誰以聞陛下者曰吉甫為我言絳曰絪任宰相識名節不當如犬彘梟獍與姦臣外通恐吉甫勢軋内忌造為醜辭以怒陛下帝良久曰㡬誤我先是杜黄裳方為帝夷削節度彊王室建議裁可不闗決於絪絪常黙黙居位四年罷為太子賓客絪本以儒術進守道寡欲所居不為烜赫事以篤實稱善名理學世以耆徳推之世推耆徳上李錡入朝不許稱疾武元衡字伯蒼元和中拜門下侍郎同中書門下平章事浙西李錡求入覲既又稱疾帝問宰相鄭絪絪請聴之元衡曰不可錡自請入朝詔既許之而復不至是可否在錡陛下新即位天下屬耳目若奸臣得遂其私則威令去矣帝然之遽追錡而錡計窮果反帝稱長者李吉甫李絳數争事帝前不叶元衡獨持正無所違附帝稱為長者叱去王承宗白事者吉甫卒淮蔡用兵帝悉以機政委之王承宗上疏請赦呉元濟使人白事悖慢不恭元衡叱去承宗怨數上章誣詆未㡬入朝出靖安里第夜漏未盡賊乘暗呼曰滅燭射元衡中肩復擊其左股徒御格鬬不勝皆走遂害元衡言屬郡刺史得自為政李吉甫字𢎞憲元和二年擢中書侍郎同中書門下平章事吉甫連蹇外遷十餘年究知閭里疾苦常病方鎮彊恣至是為帝從容言使屬郡刺史得自為政則風化可成帝然之出郎吏十餘人為刺史自王叔文時選任猥冒吉甫始簿其員人得叙進官無留才度李錡非有鬬志討之必克又度李錡必反勸帝召之使者三往以病解而多持金啗權貴至為錡遊説者吉甫曰錡庸材而所畜乃亡命羣盜度李錡非有鬬志討之必克帝意決復言昔徐州亂常敗吳兵江南畏之若起其衆為先鋒可以絶除後患韓𢎞在汴州多憚其威誠召𢎞子弟率兵為犄角則賊不戰而潰從之詔下錡衆聞徐梁兵興果斬錡降以功封賛皇縣侯徙趙國公德宗以来姑息藩鎮有終身不易地者吉甫為相嵗餘易三十六鎮殿最分明易三十六鎮上新政事堂㑹食床初政事堂㑹食有巨床相傳徙者宰相輙罷不敢遷吉甫笑曰世俗禁忌何足疑耶撤而新之吉甫居安邑里時號安邑李丞相所論著甚多皆行於世殿中呼官而不名裴垍字𢎞中吉甫罷乃拜中書侍郎同中書門下平章事吐突承璀自東宫得侍恩顧親渥承間欲有開説帝憚垍誡使勿言帝在殿中呼垍官而不名不以中人罪藩臣嶺南節度使楊於陵為監軍許遂振所誣詔授冗官垍曰以一中人罪藩臣陛下之法安在更授美官賦法以公估準物先是天下賦法有三曰上供曰送使曰留州建中初釐定常賦而物重錢輕其後輕重相及民輸率一倍其初而所在以留州送使之入捨公估更實私直以自潤故賦益苛齊民重困垍奏禁之一以公估準物觀察使得用所治州租調至不足乃取支郡以贍故送使之財悉為上供自是起江淮而南民少息矣不以年少柄用為嫌垍為學士時引李絳崔羣與同列及相又擢韋貫之裴度知制誥李夷簡御史中丞皆踵攝為輔相號名臣自他選任罔不精明人無異言二大夫不以垍年少柄用為嫌故元和之治百度修舉朝無幸人對家給匱乏及祈禳之數字藩字叔翰裴垍白憲宗謂藩有宰相器拜門下侍郎同中書門下平章事藩忠謹好醜必言帝以為無隱嘗問前世所以家給或國匱乏者何致而然及祈禳之數藩具對儉則足用敦本則百姓富反是則匱又言孔子病止子路之禱漢文帝毎祭勅有司敬而不祈使神無知則不能降福有知固不可私己求媚而恱之也且義於人者和於神人乃神之主人安而福至帝悦曰當與公等上下相勗以保此言取筆滅宰相字河東節度使王鍔賂權近求兼宰相密詔中書門下曰鍔可兼宰相藩舉筆滅宰相字署其左曰不可還奏之宰相權德輿失色曰有不可應别為奏可以筆塗詔邪藩曰勢迫矣出今日便不可止既而事得寢材能不及韋貫之裴垍藩材能不及韋貫之裴垍然人物清整是其流亞云奏平章事非序進宜得權徳輿字載之拜禮部尚書同中書門下平章事王鍔由河中入朝求兼宰相李藩以為不可德輿亦奏平章事非序進宜得比方鎮帶宰相必有大忠若勲否則彊不制者不得已與之今鍔無功又非姑息時一假此名以開後人不可帝乃止帝嘗問政之寛猛孰先對曰唐家承隋苛虐以仁厚為先太宗皇帝見明堂圖始禁鞭背列聖所循皆尚德教故天寶大盜竊發俄而夷滅蓋本朝之化感人心之深也帝曰誠如公言縉紳羽儀是時帝切於治事巨細悉責宰相吉甫絳議諭不能無持異至帝前遽言亟辨徳輿從容不敢有所輕重坐是罷徳輿雖動止無外飾其醖藉風流自然可慕貞元元和間為縉紳羽儀云責御史還奏不實李絳字深之拜中書侍郎同中書門下平章事方江淮嵗儉有御史使還奏不為災帝以語絳答曰方隅皆陛下大臣奏孰不實而御史茍悦陛下爾凡君人者當任大臣無使小臣得以問願出其名顯責之李吉甫嘗盛賛天子威徳帝欣然絳獨曰陛下自視今日何如漢文帝時帝曰朕安敢望文帝對曰是時賈誼以為厝火積薪之下火末及燃因以為安其憂如此今法令所不及者五十餘州西戎内訌近以涇隴為鄙去京師逺不千里烽燧相接也如此水旱無年倉廩空虚誠陛下焦心銷志求濟時之略渠便髙枕而卧哉帝入謂左右曰絳言骨鯁真宰相也遣使者賜酴醿酒情故自嫌非責成意帝又言公等得無有姻故冗食者當為惜官吉甫權徳輿皆稱無有絳曰崔祐甫為宰相不半嵗除吏八百人徳宗曰多公姻故何耶祐甫曰所問當與不當爾非臣親舊孰知其才其不知者安敢與官時以為名言武后命官猥多而開元中有名者皆出其選古人言收十得五猶得其半若情故自嫌非聖言責成意帝曰誠然在至當而已對開元天寶治亂帝又問𤣥宗開元時致治天寶則亂何一君而相反耶絳曰治生於憂危亂生於放肆𤣥宗嘗歴試官守知人之艱難臨御初任用姚崇宋璟勵精聴納故左右前後皆正人也洎林甫國忠得君專引傾邪之人分總要劇於是上不聞直言嗜欲日滋内則盜臣勸以興利外則武夫誘以開邊天下騷動故禄山乘隙而奮此皆小人啟導從逸而驕繫時主所行無常治亦無常亂帝曰凡人舉事病不通於理追咎其失古人處此有道耶絳曰事或過差聖哲所不免天子有諫臣所以救過上下同體猶手足之於心膂交相為用但矜能䕶失常情所蔽聖人改過不吝願陛下以此處之三相張家張𢎞靖字元理刑部尚書同中書門下平章事少有令聞杜鴻漸杜佑皆器許歴臺閣顯級人以為有輔相才及居位簡黙自處無所規拂幽薊初効順不能因俗制變故范陽復亂家聚書畫侔秘府先第在東都思順里盛麗甲當時歴五世無所増葺時號三相張家云討蔡服鎮皆如策韋貫之拜中書侍郎同中書門下平章事討呉元濟也貫之請釋鎮州專力淮西且言陛下豈不知建中事乎始於蔡急而魏應也齊趙同起徳宗引天下兵誅之物力殫屈故朱泚乘以為亂此非他速於撲滅也今陛下獨不能少忍俟蔡平而誅鎮邪時帝業已討鎮不從終之蔡平鎮乃服初討蔡以宣武韓𢎞為都統又詔河陽烏重𦙍忠武李光顔合兵以進貫之諫諸將戰方力今若置都統又令二師連營則各持重養威未可嵗月下也亦不從後四年乃克蔡皆如貫之䇿云嚴身律下以正議裁物貫之沈厚寡言與人交終嵗無款曲不為偽辭以悦人為右丞時内僧造門曰君且相貫之命左右引出曰此妄人也居輔相嚴身律下以正議裁物室居無所改易裴均子持萬縑請撰先銘答曰吾寧餓死豈能為是哉生平未嘗通饋遺故家無羨財請還第與士大夫相見裴度字中立拜中書侍郎同中書門下平章事時尚徼伺中朝士相過金吾輙飛啟宰相至闔門謝賓客度以時多故宜延天下髦英咨籌策乃建請還第與士大夫相見詔可於時討蔡數不利羣臣争請罷兵錢徽蕭俛尤確苦度奏病在腹心不時去且為大患不然兩河亦將視此為逆順㑹唐鄧節度使髙霞㝢戰卻他相揣帝厭兵欲赦賊鉤上指帝曰一勝一負兵家常勢若師常利則古何憚用兵耶雖累聖亦不應留賊付朕今但論帥臣勇怯兵强弱處置何如耳渠一敗便沮成計乎於是左右不能容其間十二年宰相逢吉涯建言餉運煩匱宜休師唯度請身督戰帝獨目度留曰果為朕行乎度俯伏流涕曰臣誓不與賊偕存即拜門下侍郎平章事彰義軍節度淮西宣慰招討處置使淮西平度入朝復知政事程异皇甫鎛以言財賦幸俄得宰相度三上書極論不可帝不納自上印又不聴纎人始得乘罅請身督戰上對君子小人之徒帝嘗語臣事君當勸善奉公朕惡夫樹黨者度曰君子小人以類而聚未有無徒者君子之徒同徳小人之徒同惡外甚類中實逺在陛下觀所行則辨帝曰言者大抵若此朕豈易辨之度退喜曰上以為難辨則易以為易辨則難君子小人行判矣已而卒為异鎛所搆罷權佞側目議者交口請相度乃以本官兼中書侍郎平章事權佞側目功名震四夷度退然纔中人而神觀邁爽操守堅正善占對既有功名震四夷使外國者其長君必問度年今㡬狀貌孰似天子用否其威譽德業比郭汾陽而用不用常為天下重輕事四朝以全德始終及殁天下莫不思其風烈八闗十六子李逢吉字虚舟拜門下侍郎同中書門下平章事性忌刻險譎多端及得位務黨好惡裴度討淮西逢吉慮成功密圖沮止趣和議者請罷諸道兵憲宗知而惡之出為劔南東川節度使穆宗即位為門下侍郎平章事鄭注得幸於王守澄逢吉遣從子訓賂注結守澄為引援自是肆志無所憚其黨有張又新李續張權與劉栖楚李虞程昔範姜治及訓八人而傅㑹又八人皆任要劇故號八闗十六子有所求請先賂闗子後達於逢吉無不得所欲循黙不稱職王涯字廣津拜中書侍郎同中書門下平章事坐循黙不稱職罷涯質狀頎然長上短下動舉詳審性嗇儉不畜伎妾惡卜祝及他方伎别墅有佳木流泉居常書史自怡使客賀若夷鼔琴娛賓文宗惡俗侈靡詔涯懲革涯條上其制凡衣服室宇使略如古貴戚不便謗訕囂然議遂革然涯年過七十嗜權固位偷合訓等不能潔去就以至覆宗啟奏平恕崔羣字敦詩元和十二年以中書侍郎同中書門下平章事李師道既誅師古等妻子没入掖庭帝疑以問羣羣請釋之并還其奴婢資産鹽鐵院官權長孺坐罪抵死其母耄丐子以養帝奭然欲赦之以問宰相羣對曰陛下幸憐其母宜即遣使諭㫖若須出勅無及矣於是免死羣凡啟奏平恕如此對聴受之際帝常語宰相聴受之際不亦難乎比詔學士集前世為辨謗略以自警鑒其要云何羣對曰無情曲直辨之至易有情則欺難為審也故孔子有衆好衆惡浸潤膚受之說以其難辨也若陛下擇賢而任待之以誠糾之以法則人自歸正而不以欺帝韙其言言開元天寶事時皇甫鎛言利幸於帝隂藉左右求宰相羣數言其佞邪不可用既入對及開元天寶事羣因推言其極曰安危在出令存亡係所任𤣥宗以少歴屯險更民間疾苦故初得姚崇宋璟盧懐慎輔以道徳蘓頲李元紘孜孜守正則開元為治其後安於逸樂逺正士昵小人故宇文融以言利進李林甫楊國忠怙寵朋邪則天寶為亂願陛下以開元為法以天寳為戒社稷之福也又言世謂禄山反為治亂分時臣謂罷張九齡相林甫則治亂固已分矣左右為感動羣以是諷帝故鎛銜之帝卒自相鎛㑹羣臣上帝號鎛欲兼用孝德為號羣獨以為有睿聖孝德并見帝聞不樂㑹度支廩賜邊士不時物多敝惡李光顔憂甚至欲引佩刀自決中外皆恐鎛奏邊鄙無事乃羣鼔動欲以買直歸怨天子由是罷為湖南觀察使不喜由宦倖進李邡字建侯拜淮南節度使先是吐突承璀為監軍貴寵甚邡以剛嚴始相禮憚稍厚善承璀歸數稱薦之召拜門下侍郎同中書門下平章事邡不喜由宦倖進及出祖樂作泣下謂諸將曰吾安老外鎮宰相豈吾任乎至京師不肯視事引疾固辭改户部尚書朝廷輕重在輔相皇甫鎛同中書門下平章事猶領度支鎛以吏道進既由聚斂勾剥為宰相至雖市道皆嗤之崔羣裴度以聞帝怒不聴度乃表罷政事極論鎛奸邪苛刻天下怨之將食其肉且言天下安否係朝廷朝廷輕重在輔相今承宗削地程權赴闕韓𢎞輿疾討賊非力能制之顧朝廷處置能服其心也若相鎛則四方解矣請授以浙西觀察使其辭切至帝以天下略平亦崇臺沼宫觀自娛樂鎛與程异知帝意故數貢羨財隂佐所欲帝斥内帑所餘詔度支評直鎛貴售之以給邊兵故繒陳綵觸手輙壊士怨怒聚焚之裴度以其事聞鎛指所著靴曰此内庫所出牢韌可服彼言不可用詐也帝信之鎛銜度乃與李逢吉令狐楚合擠之出度太原又以崔羣有天下重望勁正敢言後議帝號乃譛羣抑損徽稱帝怒逐羣湖南鎛罷度支嘗與金吾將軍李道古共薦方士栁泌浮屠大通為長年藥帝惑之穆宗在東宫聞其姦妄始聴政集羣臣於月華門貶鎛崖州司户參軍死其所以錢穀奮而至宰相程异字師舉元和十三年以工部侍郎同中書門下平章事鎛得罪時謂楚縁鎛以進且嘗逐裴度天下所共疾㑹蕭俛輔政乃不敢言對兵法必勝蕭俛字思謙授中書侍郎同中書門下平章事吐蕃寇涇州調兵護邊帝因問兵法有必勝乎俛曰兵凶器聖人不得已用之故武不可玩玩則無震夫以仁討不仁以義討不義先招懐後掩襲故有不殺厲不擒二毛不犯田稼其救人如免水火此必勝術也若乃以小不忍輕任干戈師曲而敵怨非徒不勝又将自危是以聖王慎於兵帝重其言不撰王承宗先銘嘗詔俛撰王承宗先銘俛奏承宗比不臣迷而後復臣不忍稱道其先又辭成當有餉謝拒之則非朝廷撫納意受之臣誼不當取帝善而止侍母如褐衣時母韋賢明治家嚴俛雖宰相侍左右如褐衣時然其居位頗介謹持法重名器狹於用人毎除吏常憂不稱鮮有簡拔除吏常憂不稱上銷兵失河朔穆宗初兩河底定俛與段文昌當國謂四方無虞遂議太平事以為武不可黷勸帝偃革尚文乃密詔天下鎮兵嵗限十之一為逃死不補謂之銷兵既而籍卒逋亡無生業曹聚山林間為盜賊㑹朱奐融王廷凑亂燕趙一日悉收用之朝廷調兵不充乃招募市人烏合戰輙北遂復失河朔矣對貞觀開元治道崔植字公修長慶初中書侍郎同中書門下平章事穆宗問貞觀開元中治道最盛何致而然植曰太宗資上聖興民間知百姓疾苦故勵精思治又以房𤣥齡杜如晦魏徴王珪為之佐君明臣忠聖賢相維治致升平固其宜也𤣥宗在天后時身踐憂患既即位得姚崇宋璟此二人蚤夜孜孜納君於道璟嘗手寫尚書無逸為圖以獻勸帝出入觀省以自戒其後朽暗乃代以山水圖稍怠於勤左右不復箴規姦臣日用事以至於敗昔徳宗嘗問先臣祐甫開元天寶事先臣具道治亂所以然臣在童丱記其説今願陛下以無逸為元龜則天下幸甚願以無逸為元龜上對漢文帝太儉他日又問司馬遷言漢文帝惜十家産而罷露臺身衣弋綈履革舄集上書囊為殿帷信乎何太儉耶植曰良史非妄言漢承秦侈縱之餘海内彫窶文帝從代来知稼穡艱難是以躬厯儉約為天下守財景帝遵而不改故家給户足至武帝時錢朽貫穀紅腐乃能出師征伐威動四方然侈靡不節末年户口減半税及舟車人不聊生乃下哀痛之詔封丞相為富民侯然則帝王不可以不示儉而天下足帝曰卿言善患行之為難耳不閱嵗至宰相杜元穎以户部侍郎同中書門下平章事自帝即位不閱嵗至宰相縉紳駭異以錢穀進不甚與事王播字明㪚進中書侍郎同中書門下平章事時權倖競進播賴其力至宰相專務將迎居位無所禆益復失河北衆望不厭乃出鎮淮南太和元年入朝拜左僕射復輔政時韋處厚當國以獻替自任天子嚮之播專以錢穀進不甚與事居位纔三月罷元稹字微之同中書門下平章事朝野雜然輕笑稹思立奇節報天子以厭人心時王廷湊方圍牛元翼於深州稹所善于方言王昭于友明皆豪士雅㳺燕趙間能得賊要領可使反間而出元翼願以家貲辦行得兵部虚告二十以便宜募士稹然之李逢吉知其謀隂令李賞訹裴度曰于今為稹結客將刺公度隱不發神䇿軍中尉以聞詔韓臯鄭覃及逢吉雜治無刺度狀而方計莫聞遂與度偕罷宰相稹始言事峭直欲以立名中見斥廢十年信道不堅乃喪所守附宦貴得宰相居位纔三月罷晚節彌沮喪加亷節不飭云韓𢎞送錢十萬不納牛僧孺字思黯以户部侍郎同中書門下平章事始韓𢎞入朝其子公武用財賂權貴杜塞言者俄而𢎞公武卒孫弱不能事帝遣使者至其家悉收資簿計較出入所以餉中朝臣者皆在至僧孺獨注其左曰某月日韓𢎞送錢十萬不納帝善之謂左右曰吾不謬知人由是遂以相太平無象他日延英召見宰相曰公等有意於太平乎何道以治之僧孺曰臣待罪宰相不能康濟然太平亦無象今四夷不内擾百姓安生業私室無强家上不壅蔽下不怨讟雖未及至盛亦足為治矣更言太平非臣所及退謂他宰相曰上責成如是吾可久處此耶固請罷未嘗引用親黨竇易直字宗𤣥户部侍郎同中書門下平章事以公潔自喜方執政未嘗引用親黨斥出堂史相府肅然韋處厚字徳載進拜中書侍郎同中書門下平章事堂史湯鉥數招權納財賂處厚笑曰此半滑渙也斥出之相府肅然初貞元時宰相齊抗奏罷州别駕及當為别駕者引處之朝元和後兩河用兵禆將立功得補東宫王府官朱紫淆并授受不綱處厚乃置六雄十望十𦂳等州悉補别駕由是流品澄别置雄望等州補别駕上趨出復召問所欲言帝雖自力機政然驟信輕改揺於浮論處厚嘗獨對曰陛下不以臣不肖使待罪宰相凡所奏可中輙變易自上心出邪乃示臣不信得於横議邪即臣何名執政且裴度元勲舊徳輔四朝竇易直長厚忠實經事先帝陛下所宜親重委信之臣乃陛下自擢今言不見納宜先罷即趨下頓首帝瞿然曰何至是卿之忠力朕自知之安可遽辭以重吾不徳處厚趨出復召問所欲言乃對近君子逺小人始可為治諄復數百言又言裴度忠可久任帝嘉納之廷争不可回奪處厚姿狀如甚懦者居家亦循易至廷争嶷然不可回奪善保位路隋字南武文宗嗣位以中書侍郎同中書門下平章事賛稱輔政十年歴牛李訓注用事無所迎將善保位哉詆鄭覃為妖氣今自為妖李宗閔字損之太和中以吏部侍郎同中書門下平章事時德裕在浙西召欲以相而宗閔中助多先得進即引僧孺同秉政相唱和去異己者德裕所善皆逐之久之德裕為相與宗閔共當國德裕入謝文宗曰而知朝廷有朋黨乎徳裕曰今朝廷半為黨人雖後来者趨利而靡往往陷之陛下能用中立無私者案此條乃引唐書李宗閔傳文原本於此句下接寫仲對琴瑟笙竽云云與上文不相連屬葢中間誤脫一頁今無他本可以校補姑仍之者仲對琴瑟笙竽弋獵馳騁非害霸者唯知人不能舉舉不能任任而又雜以小人害霸也太𤣥德憲四宗皆盛朝其始臨御自視若堯舜寖久則不及初陛下知其然乎始一委輔相故賢者得盡心久則小人並進造黨與亂視聽故上疑而不專政去宰相則不治矣政在中書誠治本又言開元初輔相率三考輙去雖姚崇宋璟不能逾至李林甫秉權乃十九年遂及禍敗是知亟進罷宰相使政在中書誠治本也免楊嗣復等死帝常疑楊嗣復李珏顧望不忠遣使殺之徳裕知帝性剛而果於斷即率三宰相見延英嗚咽流涕曰昔太宗徳宗誅大臣未嘗不悔臣欲陛下全活之無異時恨使二人罪惡暴著天下共疾之帝不許徳裕伏不起帝曰為公等赦之德裕降拜升坐帝曰如令誎官論事雖千疏我不赦德裕重拜因追還使者嗣復等乃免死言人君動法於日時帝數出畋㳺暮夜乃還德裕上言人君動法於日故出而視朝入而宴息傳曰君就房有常節惟深察古誼毋繼以夜側聞五星失度恐天以是勤勤儆戒詩曰敬天之渝無敢馳驅願節畋逰承天意尋拜司空論比黨帝嘗從容謂宰相曰有人論孔子其徒三千亦為黨信乎徳裕曰昔劉向云孔子與顔回子貢更相稱譽不為朋黨禹稷與臯陶轉相汲引不為比周無邪心也臣嘗以共鯀驩兠與舜禹雜處堯朝共工驩兠則為黨舜禹不為黨小人相與比周迭為掩蔽也賢人君子不然忠於國則同心聞於義則同志退而各行其志不可交以私趙宣子隨㑹繼而納諫司馬侯叔向比而事君不為黨也公孫𢎞毎與汲黯請間黯先發之𢎞隨其後武帝所言皆聽黯𢎞雖並進然廷詰齊人少情譏其布被為詐則先發後繼不為黨也太宗與房𤣥齡圖事則曰非杜如晦莫能籌之及如晦在焉亦推𤣥齡之䇿則同心圖國不為黨也漢朱博陳咸相為腹心背公死黨周福房植各以其黨相傾議論相軋故朋黨始於甘陵二部及甚也謂之鉤黨繼受誅夷以王制言之非不幸也周之衰列國公子有信陵平原孟嘗春申㳺談者以四豪為稱首亦各有客三千務以譎詐勢利相髙仲尼之徒唯行仁義今議者欲以比之罔矣臣未知所謂黨為國乎為身乎誠為國邪隨㑹叔向汲黯房杜之道可行不必黨也今所謂黨者誣善蔽忠附下罔上車馬馳驅以趨權勢晝夜合謀美官要選悉引其黨為之否則拘壓以退仲尼之徒有是乎陛下以是察之則姦偽自見矣意欲朝廷尊臣下肅而政出宰相時韋𢎞質建言宰相不可兼治錢榖德裕奏言管仲明於治國其語曰國之重器莫重於令令重君尊君尊國安治人之本莫要於令故曰虧令者死益令者死不行令者死留令者死不從令者死王者無赦又曰令在上而論可否在下是主威下繫於人也太和後風俗寖弊令出於上非之在下此弊不止無以治國匡衡曰大臣者國家股肱萬姓所瞻仰明王所慎擇也傳曰下輕其上爵賤人圖柄臣則國家揺動而人不静今𢎞質為人所教而言是圖柄臣者也且蕭望之漢名儒為御史大夫奏云嵗首日月少光咎在臣等宣帝以望之意輕丞相下有司詰問貞觀中監察御史陳師合上言人之思慮有限一人不可總數職太宗曰此欲離間我君臣斥之嶺外臣謂宰相有奸謀隱慝則人人皆得上論至於制置職業人主之柄非小人所得千古者朝廷之士各守官業思不出位𢎞質賤臣豈特以非所宜言妄觸天聴是輕宰相陛下照其邪計從黨人中来當遏絶之德裕大意欲朝廷尊臣下肅政出宰相深疾朋黨故感憤言之罷郡縣吏二千餘員人常謂省事不如省官省官不如省吏能簡冗官誠治本也於是請罷郡縣吏凡二千餘員衣冠去者皆怨決策制勝威名獨重於時當國凡六年方用兵時決策制勝他相無與故威名獨重於時請詔書付宰相乃下先是韓全義敗於蔡杜叔良敗於深皆監軍宦人制其權將不得專進退詔書一日三四下宰相不預諸道統兵粟米皆監軍取以自隨毎督戰乘髙建旗自表師小不勝輙巻旗去大兵隨以北由是王師所向多負至討回鶻澤潞德裕建請詔書付宰相乃下監軍不得干軍要率兵百人取一以為衛自是號令明一將乃有功遽書警奏皆從容裁決元和後數用兵宰相不休沐或繼火乃得罷德裕在位雖遽書警奏皆從容裁決率午漏下還第休沐輙如令沛然若無事時其處報機急帝一切令德裕作詔德裕數辭帝曰學士不能盡吾意伐劉稹也詔王元逵何𢎞敬曰勿為子孫之謀存輔車之勢元逵等情得皆震恐思効已而三州降賊遂平帝毎稱魏博功則顧德裕道詔語咨其切於事能伐謀也三鎮毎奏事德裕引使者戒勅為忠義指意丁寧使歸各為其帥道之故河朔畏威不敢慢院號起草亭曰精思所居安邑里第有院號起草亭曰精思毎計大事多處其中為劉蕡考官畏避不敢聞賈餗字子美拜中書侍郎同中書門下平章事少與沈傅師善傅師前死嘗夢云君可休矣餗寤而祭諸寢復夢曰事已爾可奈何劉蕡以賢良方正對策指中人為禍亂根本而餗與馮宿龎嚴為考官畏避不敢聞竞罹其禍餗本中立不肯身犯顔排姦倖以及誅與王涯實不知謀人寃之用人之道隨所保任李固言字仲樞太和九年李訓欲自取宰相乃先以固言為門下侍郎同中書門下平章事羣臣請上徽號帝曰今治道猶鬰羣臣之請謂何比州縣多不治信乎固言因白鄧州刺史王堪隨州刺史鄭襄尤無狀帝曰貞元時御史獨王堪固言疑抵已即曰臣知堪故用刺史舉天下不職何獨二人帝識其意不主前語因稱詩曰濟濟多士文王以寧聞昔德宗時多闕官寧乏才耶固言曰用人之道隨所保任觀稱與否而升黜之無乏才矣帝曰宰相用人毋計親疏竇易直為宰相未嘗用姻戚使己才不足任天下重自宜引去茍公舉雖親何嫌用所長耳帝不欲大臣有黨故語兩與之固言吃接賓客頗謇緩言毎議論人主前乃更詳辨加禮舊臣外釣人譽舒元輿以刑部侍郎同中書門下平章事詭謀謬筭日與訓比敗天下事二人為之也然加禮舊臣外釣人譽先是裴度令狐楚鄭覃皆為當路所軋致閒處至是悉遷髙秩元輿為牡丹賦一篇時稱其工死後帝觀牡丹凭殿欄誦賦為泣下牡丹賦上起流人一嵗至宰相李訓字子垂以禮部侍郎同中書門下平章事賜金紫仍詔三曰一至翰林以終易義訓起流人一嵗至宰相謂遭時其志可行欲先誅宦䜿乃復河湟攘夷狄歸河朔諎鎮意果而謀淺天子以為然俄賜第勝業里賞賚旁午毎進見他宰相備位天子傾意宦官衛兵皆慴憚迎拜天下險怪士徼取富貴者皆慿以為資訓時時進賢才偉望以悦士心人皆惑之建廢進士科李訓誅帝召鄭覃視詔禁中遂拜同中書門下平章事不喜文辭病進士浮夸建廢其科曰南北朝所以不治文采勝質厚也士惟用才何必文辭又言文人多能薄帝曰淳薄以賦性之異奚特進士耶且設是科二百年渠可易乃止救世之敝先貴實帝嘗謂百司不可使一日弛惰因指香案爐曰此始華好用久則晦不治飭何由復新覃曰救世之敝在先貴實比皆不攝職事至慕王夷甫以不及為靳此本於治平人人無事安逸致然帝曰要在謹法度而已進門下侍郎𢎞文館大學士延英論詩帝坐延英論詩工否覃曰孔子所刪三百篇是已其非雅正者烏足為夫子道哉夫風大小雅皆下刺上之變非上化下為之故王者采詩以考風俗得失若陳後主隋煬帝時能詩之章解而不知王術卒歸於亂章什諓諓臣願陛下不取也因武帝以諌帝毎言順宗事不詳實史臣韓愈豈當時屈人耶昔司馬遷與任安書辭多怨懟故武帝本紀多失實覃曰武帝中年大發兵事邊生人耗瘁府庫殫竭遷所述非過言李石曰覃所陳因武帝以諌欲陛下終究盛德帝曰誠然靡不有初鮮克有終以宰相領祭酒覃既名儒故以宰相領祭酒請太學五經經置博士禄廩比王府官宦寺奪氣李石字中玉李訓誅石拜同中書門下平章事時宦寺氣盛陵暴朝廷毎對延英而仇士良等往往斥訓以折大臣石徐謂曰亂京者訓注也然其進孰為之先士良等瑟縮不得對氣益奪縉紳賴以為彊論太平之難他日紫宸殿及陛帝喟而歎石進曰陛下之歎臣固未諭敢問所從帝曰朕歎治之難也朕即位十年不能得治本故前嵗有疾今兹震擾皆自取之夫託億兆之上不能以美利及百姓焉得久而無事乎石曰陛下罪己當然然責治太早雖十年孜孜養德適成爾天下治不治要自今觀之且人之氣志雖聖賢猶有優劣故仲尼稱三十而立四十不惑陛下春秋少非起人間也而知人情偽今自視何如即位時帝曰有間矣石曰古之聖賢必觀書以考察往行然後成治功陛下積十年盛德日新然向所以疾戾震驚者天其固陛下之志乎誠務修將来之政視太宗致升平之期猶不為晚帝曰行之得至乎石曰今四海夷一唯登拔才良使小大各任其職愛人節用國有餘力下不加賦太平之術也於是大臣新族死嵗苦寒外情不安帝曰人心不安何也石曰刑教太甚則致隂沴比鄭注多募鳳翔兵至今誅索不已恐縁以生變請下詔慰安之帝曰善又問柰何致太平之難鄭覃曰欲治莫若恤人石即贊曰恤之得術尚何太平之難陛下節用度去冗食簿胥不得措其奸則百司治百司治天下安矣帝戚然曰我思貞觀開元時以視今日則氣拂吾膺石曰治道本於上而下罔敢不率帝曰不然張元昌為左街副使而用金唾壺比坐事誅之吾聞禁中有金鳥錦袍二昔𤣥宗幸温泉嘗與楊貴妃衣之今富人時時有之石曰毛玠以清德為魏尚書而人不敢鮮衣美食况天子獨不司為法乎鎮静中人自邊還走馬入金光門道路妄言兵且至京師讙走塵起百官或韈而騎臺省吏稍稍遁去鄭覃將出石曰事未可知宜坐須其定宰相走則亂矣若變出不虞逃將安適人之所瞻不可忽也益治簿書沛然如平時里閭羣無賴望南闕隂持兵俟變金吾大將軍陳君賞率衆立望仙門内使趣闔門君賞不從日入乃止當是時非石鎮静君賞有謀㡬亂也請内置勅令以時省覽帝曰朕務其實不欲事空文石以異時詔令天子多自諭之因請内置勅令一通以時省覽致治之道在得人言致治之道在得人德宗多猜貳仕進之塗塞奏請輙報罷東首閉闥累月南臺惟一御史故兩河諸侯競引豪英士之喜利者多趨之用為謀主故藩鎮日横天子為旰食元和間進用日廣陛下嗣位惟賢是咨士皆在朝廷彼疆宇甲兵如故而抵摧順屈者士不之助也帝曰天下之勢猶持衡然此首重則彼尾輕矣其為我傳選士朕且用之石奏咸陽令韓遼治興成渠渠當咸陽右十八里左直永豐倉秦漢故漕渠成起咸陽抵潼闗三百里無車輓勞則轅下牛盡可耕永利秦中矣李固言曰然恐役非其時奈何帝曰以隂陽拘畏乎茍利於人朕奚慮哉石用韓益判度支嘗以賍敗石曰臣本以益知財利不知其貪帝曰宰相任人知則用過則棄謂之至公他宰相所用强蔽其過此其私也命六軍衛士從宰相三年正月將朝騎至親仁里狙盜發射石傷馬逸盜邀斫之坊門絶馬尾乃得脫天子駭愕遣使者慰撫賜良藥始命六軍衛士二十人從宰相是日京師震動百官造朝纔十一石因卧家固辭位與楊嗣復面相觸陳夷行字周道工部侍郎貞元二年同中書門下平章事而楊嗣復李珏相次輔政夷行介特雅不與合毎議論天子前往往語相侵短夷行不能堪㑹以王彦威為忠武節度使史孝章領邠寧議皆出嗣復及夷行對延英帝問除二鎮當否對曰茍自堅擇無不當者嗣復曰若用人盡出上意而當固善如小不稱下安得嘿然夷行曰比姦臣數干權願陛下無倒持太阿以鐏授人嗣復曰古者任則不疑桓公器管仲於仇虜豈有倒持慮耶帝以其面相觸頗不悦論天寶政事帝嘗怪天寶政事不善問姚元崇宋璟於時在否李珏曰姚亡而宋罷珏因推言𤣥宗自謂未嘗殺一不辜而任李林甫種夷十數族不亦惑乎夷行曰陛下今亦宜戒以權屬人嗣復曰夷行失言昔太宗易暴亂為仁義用房𤣥齡十有六年任魏徴十有五年未嘗失道人主用忠良久益治用邪佞一日多矣時用郭薳為坊州刺史右拾遺宋邧論不可薳果坐賍敗帝欲賞邧夷行曰諌官論事是其職若一事善輙進官恐後不免有私夷行葢專詆嗣復又素善覃隂助其力以排折朋黨是時雖天子亦惡其太過恩禮遂衰罷為吏部尚書言符䜟楊嗣復字繼之俄與李珏並拜同中書門下平章事他日帝問符䜟可信乎何從而生嗣復曰漢光武以䜟決事隋文帝亦喜之故其書蔓天下班彪王命論有所引述特以止賊亂非重之也玨曰治亂宜直推人事爾帝曰然宰相所錄恐掩蔽聖徳時延英訪對史官不及知嗣復言故事正衙起居注在前便坐無所紀錄姚瑀趙憬皆請置時政記不能行臣請延英對宰相語闗道德刑政者委中書門下直日記錄月付史官他宰相議不同止久之帝又問延英政事孰當記之珏監修國史對曰臣之職也陳夷行曰宰相所錄恐掩蔽聖德自盜美名臣向言不欲威權在下者此也汰去粃滓菁華乃出建言使府官屬多宜省帝曰無乃滯才乎對曰才者自異汰去粃滓者菁華乃出帝曰昔蕭復秉政難言者必言卿其志之為國如治身李珏字待價開成中嗣復得君引珏同中書門下平章事帝常自謂臨天下十四年雖未至治然視今日承平亦希矣珏曰為國者如治身康寧調適以自助如恃安而忽則疾生天下當無事思所闕禍亂何至哉天下事皆先平章杜悰領度支有勞帝欲拜户部尚書以問宰相陳夷行答曰恩權予奪願陛下自斷珏曰祖宗倚宰相天下事皆先平章故官曰平章事君臣相須所以致太平也茍用一吏處一事皆決於上將焉用彼相哉隋文帝勞於小務以疑待下故二世而亡陛下嘗謂臣曰竇易直勸我任宰相啟擬五取三二取一彼宜勸我擇宰相不容勸我疑宰相帝曰易直此言殊可鄙論貞元初政事帝又語貞元初政事誠善珏曰德宗晚喜聚財方鎮以進奉市恩吏得賦外求索此其弊也帝曰人君輕所賦節所用可乎珏曰貞觀時房杜王魏為文皇帝謀因此耳帝頗向納稱道無逸篇以勸武宗武宗新即位珏數稱道無逸篇以勸請卻犬馬白鷹以示四方時潞州劉從諌獻犬馬滄州劉納獻白鷹珏請卻之以示四方鄭楊段薛灸手可熱崔鉉字台碩進門下侍郎同中書門下平章事鉉所善者鄭魯楊紹復段瓌薛蒙頗參議論時語曰鄭楊段薛灸手可熱欲得命通魯紹瓌蒙帝聞之題於扆是時魯為刑部侍郎紹欲引以相帝不許用為河南尹他日帝謂鉉曰魯去矣事由卿否鉉惶恐謝罪帝曰噫五年十三遷白敏中字用晦進門下侍郎同中書門下平章事自員外凡五年十三遷崔鉉輔政欲專任患敏中居右㑹党項數寇邊鉉言宜得大臣鎮撫天子嚮其言故敏中以司空平章事兼邠寧節度招撫制置使受馬元贄賜帶馬植字存之以刑部侍郎同中書門下平章事初左右軍中尉馬元贄最為帝寵信賜通天犀帶而植素與元贄善至通昭穆元贄以賜帶遺之他日對便殿帝識其帶以詰植植震恐具言狀於是罷為天平軍節度使削重定元和實録周樨字德木以中書侍郎同中書門下平章事建言故宰相德裕重定元和實録竄寄他事以廣父功凡人君尚不改史取必信也遂削新書以直言相亦以直言免吐蕃微弱以三州七縣自歸帝召宰相議河湟事樨對不合㫖罷為劔南東川節度使駙馬都尉鄭顯言於帝曰世謂樨以直言相亦以直言免帝加拜檢校尚書右僕射輔政十年令狐綯字子直兵部侍郎同中書門下平章事輔政十年言早以正人傅道東宫魏謩字中之同中書門下平章事建言今天下粗治惟東宫未立不早以正人傅道之非所以存副貳之重且泣下帝為感動請還詹毗國獻詹毗國獻象謩以為非土性不可畜請還其獻詔可議事天子前無所回畏謩為宰相議事天子前他相或委抑規諷惟謩讜切無所回畏宣宗嘗曰謩名臣綽有祖風朕心憚之然卒以剛正為令狐綯所忌䜛罷之有祖風烈賛曰唐栁芳稱徴死知不知莫不恨惜以為三代遺直諒哉謩論議挺挺有祖風烈詩所謂是以似之者歟請宰相人自為記付史官裴休字公美以兵部侍郎同中書門下平章事即奏宰相論政上前知印者次為政記所論非一詳已辭略他議事有所缺史氏莫得詳請宰相人自為記以付史官詔可嵗漕著新法十條太和後嵗漕江淮米四十萬斛至渭河倉者纔十三舟楫毁敗吏乘為奸冒沒百端劉晏之法盡廢休分遣官詢按其弊乃命在所令長兼董漕褒能者謫怠者由江抵渭舊嵗率雇緡二十八萬休悉歸諸史勅巡院不得輙侵牟著新法十條又立稅茶十二法人以為便立稅茶十二法上真儒者休為人醖藉進止雍閑宣宗嘗曰休真儒者質崔慎由請甄别流品劉瑑字子全以户部侍郎同中書門下平章事嘗與崔慎由議帝前慎由請甄别流品瑑質曰王夷甫相晉崇尚浮虚以還流品卒致淪夷今日不循名責實使百吏各稱職而先流品未知所以致治也慎由不得對由是罷相瑑以名節自將凡議論處事不私趨於當乃止未嘗以言色借貴近未嘗以言色借貴近上所得禄俸養䕶宗屬畢諴字存之以禮部尚書同中書門下平章事諴於吏術尤所長既貴所得禄俸養䕶宗屬之乏無間然金印朝天客楊收字藏之以中書侍郎同中書門下平章事收王鐸皆薛逢之同年也收作相逢有詩云須知金印朝天客同是沙堤避路人威鳳偶時皆瑞聖應龍無水漫通神收聞大銜之王鐸拜相又有詩云昨日鴻毛萬鈞重今朝山岳一毫輕鐸又怒之言優人不可假以官曹確字剛中懿宗咸通中以本官同中書門下平章事時帝昵寵優人李可及可及憑恩横甚人無敢斥擢可及為威衛將軍確曰太宗著令文武官六百四十三謂房𤣥齡曰朕設此待天下賢士工商雜流假使伎出等夷正當厚給以財不可假以官與賢者比肩立同坐食也文宗欲以樂工尉遲璋為王府率拾遺竇易直固争卒授光州長史今而位將軍不可帝不聴至僖宗立始貶死曹畢確居位六年進尚書右僕射始畢諴與確同宰相俱有雅望世謂曹畢云因其黨為牛頭阿旁路巖字魯瞻以兵部侍郎同中書門下平章事年三十六居位八嵗進至尚書左僕射於是王政秕僻宰相得用亊巖顧天子荒闇且以政委已乃通遺賂奢肆不法俄與韋保衡同當國二人勢動天下時目其黨為牛頭阿旁言如鬼隂惡可畏也俄與保衡還相惡恃恩據權以嫌愛自肆韋保衡字藴用以兵部侍郎同中書門下平章亊性浮淺既恃寵據權以嫌愛自肆所悦即擢不悦擠之百官候夫人起居趙隠字大隠咸通末同中書門下平章事既輔政他宰相及百官皆詣第升堂慶母嵗時公卿必參訊懿宗誕日宴慈恩殿隱侍母以安輿臨觀宰相方率百寮拜恩於廷即回班候夫人起居縉紳以為禮榮後崔彦昭張濬當國皆有母遂踵其退朝侍母膳崔彦昭字恩文僖宗立同中書門下平章事彦昭雖宰相退朝侍母膳與家人齒順色柔聲在左右無違士人多其孝不怨王凝彦昭與王凝外昆弟也凝大中初先顯而彦昭未仕嘗見凝凝倨不冠帶嫚言曰不若從明經舉彦昭為憾至是凝為兵部侍郎母聞彦昭相敕婢多制履襪曰王氏妹必與子皆逐吾將共行彦昭聞之泣且拜不敢為怨而凝竟免不肯處陳敬瑄下鄭畋字台文見使相門姿漏而語不正盧攜字子升同中書門下平章事姿漏而語不正與鄭畋俱李翺甥同位宰相然所處議多駁性不矜滿沈毅有謀識陸扆於後生數稱譽之後至宰相進止有禮法鄭從讜字正求僖宗立同中書門下平章事進止有禮法掖起王鐸蕭遘字得聖僖宗入蜀以兵部判度支次綿州拜同中書門下平章事始王鐸主貢舉而得遘及是與鐸並位鐸年老嘗入對踣殿中遘掖起之帝喜曰遘善事長大臣和予之幸也遘曰不止以長乃鐸門生帝笑曰鐸選士朕選宰相卿無負我遘頓首謝從還京師累拜司空楚國公遘負大節以王佐自任既當國風采峭整天子器之遘見柄任凡五期行完而材逢世多故召愎臣以濟亂身汚偽署不得其死人為哀之哭白麻李磎與韋昭度並拜中書門下平章事宣制日水部郎中知制誥劉崇魯掠其麻哭之奏云李磎奸邪挾附權幸以忝學士不合為宰相崔昭緯與昭度及磎素不相協密遣崇魯阻之止王行瑜加尚書令韋昭度字正紀僖宗西狩進同中書門下平章事王行瑜求為尚書令昭度建言太宗由是即位自後人臣無復拜者郭子儀有大功嘗授之固辭免况行瑜乎乃更號尚父行瑜怨㑹用李磎輔政而崔昭緯密語行瑜曰前公已為尚書令昭度持不可今又引李磎叶力此奸人務立黨與惑上聴恐事復有如杜太尉時行瑜乃與李茂貞數上書譏詆朝政昭度懼稱疾罷為太傅致仕行瑜茂貞韓建聨兵至闕下言昭度戍蜀失謀請貶之未及報而行瑜收昭度於都亭驛殺之矣致治之要在彊兵張濬字禹川再狩山南拜同中書門下平章事昭宗即位當時多言濬有方略善處大計乃復見委信嘗問致治之要對曰在彊兵兵彊天下服矣天子由是甘心於武功歇後鄭五作宰相鄭綮字藴武大順後王政微綮毎以詩謠託諷中人有誦之天子前者昭宗意其有所藴未盡因有司上班簿署其側曰可禮部侍郎同中書門下平章事綮本善詩其語多俳諧故使落調世共號鄭五歇後體至是省吏走其家上謁綮笑曰諸君誤矣人皆不識字宰相亦不及我吏言不妄俄聞制誥下歎曰萬一然笑殺天下人既視事宗戚詣慶搔首曰歇後鄭五作宰相事可知矣固讓不聴立朝偘然無復故態堂柱生槐枝韓偓字致光以户部侍郎同中書門下平章事始家堂柱生槐枝期而茂既而偓秉政偓性通簡不矯飾嘗曰士茍有行不必以己長形彼短已清彰彼濁毎對客奴童相詬曳仆諸前不之責曰若持怒心必即自撓矣光院錢陸扆改户部侍郎同中書門下平章事故亊三署除拜有光署錢以宴舊僚内署即無斯例扆輔政拜相之月送學士光院錢五百貫特舉新例内署榮之以素無聞人人大驚朱朴為人木彊無他能方是時天子失政思欲用特起士任之以中興而朴所善方士許巖士得幸言朴有經濟才帝召與語擢左諫議大夫同中書門下平章事以素無聞人人大驚俄判户部同鳳閣鸞臺平章事四時仕宦唐㳺藝傳載初初由合宫主簿再遷左補闕武后奪政即上書詭說符瑞勸后當革姓以明受命后恱擢給事中閱三月進同鳳閣鸞臺平章事嘗夢登湛露殿既寤以語所親有告其謀反者下獄自殺以五品禮葬之初㳺藝探后㫖誣殺宗室復請發六道使後卒用其言萬國俊等既出天下被其酷游藝起一嵗賜袍自青及紫人號四時仕宦然嵗中即敗前古少其比云不願知譛者狄仁傑字懐英天授二年以地官侍郎同鳳閣鸞臺平章事武后謂曰卿在汝南有善政然有譖卿者欲知之乎謝曰陛下以為過臣當改之以為無過臣之幸也譛者乃不願知后歎其長者對雙陸不勝張易之嘗從容問自安計仁傑曰惟勸迎廬陵王可以免禍后曰朕數夢雙陸不勝何也於是仁傑與王方慶俱在二人同辭對曰雙陸不勝無子也天其意者以儆陛下乎且太子天下本本一搖天下危矣文皇帝身蹈鋒鏑勤勞而有天下傳之子孫先帝寢疾詔陛下監國陛下掩神器而取之十有餘年又欲以三思為後且姑姪與母子孰親陛下立廬陵王則千秋萬嵗後常享宗廟三思立廟不袝姑后感悟即日遣徐彦博立廬陵王於房州王至后匿王帳中召見仁傑語廬陵事仁傑敷請切至涕下不能止后乃使王出曰還爾太子仁傑降拜頓首曰太子歸未有知者人言紛紛何所信后然之更令太子舎龍門具禮迎還中外大悦所薦皆中興名臣仁傑所薦若張柬之桓彦範敬暉姚崇等皆為中興名臣束帶終日不休偃崔元綜天授初以鸞臺侍郎同鳳閣鸞臺平章事性恪謹坐政事堂束帶終日不休偃尤䕶細槩外若謹厚而中刻薄毎受制鞫獄必澡垢索疵不入死不肯止人畏鄙之未㡬坐事流振州縉紳為慶規創文昌臺李昭德如意元年拜鳳閣侍郎同鳳閣鸞臺平章事武后營京都昭徳規創文昌臺及定鼎上東諸門標置華壯對后問天地與樂邢文偉載初元年為内史見中書令門撰時政記姚璹字令璋擢文昌左丞同鳳閣鸞臺平章事永徽後左右史唯對仗承㫖仗下謀議不得聞璹以帝王謨訓不可闕紀請仗下所言軍國政要責宰相自撰號時政記以授史官從之時政有記自璹始為田舎子所留婁師徳字宗仁萬嵗通天二年入為鳳閣侍郎同鳳閣鸞臺平章事師德長八尺方口博脣深沈有度量人有忤已輙遜以自免不見容色嘗與李昭德偕行師德素豐碩不能遽步昭德遲之恚曰乃為田舎子所留師德笑曰吾不田舎復在何人其弟守代州辭之官教之耐事弟曰人有唾面潔之乃已師德曰未也潔之是違其怒正使自乾耳墨汚選者在夏官注選者就按閱簿師德曰容我擇之可乎選者不去乃洒筆曰墨汚爾薦狄仁傑乃不知狄仁傑未輔政師徳薦之及同列數擠令外使武后覺問仁傑曰師德賢乎對曰為將謹守賢則不知也又問知人乎對曰臣嘗同僚未聞其知人也后曰朕用卿師德薦也誠知人矣出其奏仁傑慙已而歎曰婁公盛德我為所容乃不知吾不逮逺矣總邊要為將相者三十年恭勤樸忠心無適莫方酷吏殘􅋧人多不免師德獨能以功名始終與郝處俊相亞世之言長者稱婁郝世之言長者稱婁郝上委碎無大體韋巨源有吏幹武后時累遷夏官侍郎同鳳閣鸞臺平章事其治委碎無大體勾校省中遺隱下符斂克不少蠲雖收其利然下所怨苦民間碎事不聞陸元方字希仲拜鸞臺侍郎同鳳閣鸞臺平章事后嘗問外事對曰臣備位宰相大事當白奏民間碎務不敢以聞忤㫖下除太子右庶子進退羣臣必先訪問元方素清慎再執政毎進退羣臣后先詢問外秘莫知焚奏藁元方臨終取奏藁焚之曰吾隂德在人後當有興者又曰吾當壽但領選久耗傷吾神有一柙生平所緘鑰者没後家人發之乃前後詔勅知政十餘年未嘗有所薦達楊再思為鸞臺侍郎同鳳閣鸞臺平章事自歴事三朝知政十餘年未嘗有所薦達為人巧佞邪媚能得人主微㫖主意所不欲必因而毁之主意所欲必因而譽之然恭謹畏忌未嘗忤物或謂再思曰公名髙位重何為屈折如此再思曰世路艱難直者受禍茍不如此何以全其身哉季秋梨華杜景佺延載元年檢校鳳閣侍郎同鳳閣鸞臺平章事后嘗季秋出梨華示宰相衆賀景佺獨曰隂陽不相奪倫瀆即為災故曰冬無愆陽夏無伏隂春無凄風秋無苦雨今草木黄落而木復華瀆隂陽也竊恐陛下布徳施令有所虧紊臣位宰相助天治物治而不和臣之咎也頓首請罪后曰真宰相也真宰相上恥其君不如堯舜周允元字汝良拜檢校鳳閣侍郎同鳳閣鸞臺平章事武后宴宰相詔陳書傳善言允元曰恥其君不為堯舜武三思劾奏為指斥后曰聞其言足以誡安得為過倡立中宗吉頊聖厯二年進天官侍郎同鳳閣鸞臺平章事張易之兄弟以寵盛思自全問頊計安出頊曰公家以倖進非有大功於天下勢必危吾有不休䇿願效之非止保身且世世不絶祚易之流涕請頊曰天下思唐久矣廬陵斥外相王幽閉上春秋髙武諸王非海内屬意盍從容請相王廬陵以副人望易弔為賀之資也易之昌宗乘間如頊教后意乃定既而知頊與謀召見問狀頊對廬陵相王皆陛下子先帝顧託於陛下當速有所付乃還中宗明年頊坐弟冒偽官貶琰州尉中宗之立頊實倡之㑹得罪無知者折辱二張及武三思韋安石久視中以鸞臺侍郎同鳳閣鸞臺平章事時二張及武三思寵横安石數折辱之㑹侍宴中殿易之引蜀商宋霸子等博塞后前安石跪奏商等賤類不當戯殿上顧左右引出坐皆失色后以安石辭正改容慰勉鳳閣侍郎陸元方自以為不及退告人曰韋公真宰相陸元方自以為不及上止后趨疾道及帝御船后嘗幸興泰宫議趨疾道安石曰此道板築所成非自然之固千金子且誡垂堂況萬乘可輕乘危哉后為回輦加特進為侍中中宗與韋后以正月望夜幸其第賚賜不貲帝嘗幸安樂公主池請御船安石曰御輕舟乘不測非帝王事乃止免魏元忠張説死朱敬則字少連同鳳閣鸞臺平章事張易之搆魏元忠張說欲誅之無敢言者敬則獨奏元忠說秉心忠一而所坐無名乃得不死助宋璟劾張昌宗崔𤣥暉同鳳閣鸞臺平章事宋璟劾張昌宗不軌事𤣥暉頗助璟及有司正昌宗罪而𤣥暉弟昇為司刑少卿執論大辟兄弟守正如此后久疾宰相不召見者累月及少間𤣥暉奏言皇太子相王皆仁明孝友宜侍醫藥不宜引異姓出入禁闥后慰納之沈厚有謀能斷大事張柬之字孟將后詔舉外司可為相者姚崇曰張柬之沈厚有謀能斷大事其人老宜亟用之即日召見拜同鳳閣鸞臺平章事進鳳閣侍郎癡宰相楊再思延載初同鳳閣鸞臺平章事於是水沴閉坊門以禳再思入朝有車陷於濘叱牛不前恚曰癡宰相不能和隂陽而閉坊門遣我艱於行再思遣吏謂曰汝牛自弱不得獨責宰相巧諛無恥易之兄司禮少卿因休請公卿宴於其肆酒酣戯曰公面似髙麗再思欣欣剪穀綴巾上及被紫袍為髙麗舞舉動合節滿坐鄙笑昌宗以姿見幸再思毎曰人言六郎似蓮花非也正謂蓮花似六郎耳其巧諛無恥類如此同紫微黄門平章事伴食宰相唐盧懐慎開元元年進同紫微黄門平章事懐慎自以才不及姚崇故事皆推而不專時譏為伴食宰相遺言薦宋璟懐慎遺言薦宋璟李傑李朝隱盧從愿帝悼歎之清儉懐慎清儉不營産服器無金玉文綺之飾雖貴而妻子猶寒饑所得禄賜於故人親戚無所計惜隨散輙盡赴東都掌選奉身之具止一布囊既屬疾宋璟盧從愿候之見敝簀單籍門不施箔㑹風雨至舉席自幛日晏設食蒸豆兩器菜數杯而已臨别執二人手曰上求治切然享國久稍倦於勤將有憸人乘間而進矣公志之獻可替否事至即斷蘇頲字廷碩開元四年進同紫微黄門平章事修國史與宋璟同當國璟剛正多所裁決頲能推其長在帝前數奏璟有未及或少屈頲輙助成之有不㑹意頲申璟所執故帝未嘗不從二人相得甚歡璟嘗曰吾與蘇氏父子同為宰相僕射長厚自是國器若獻可替否事至即斷盡公不顧私則今丞相為過之同中書門下三品同三品自無忌始唐長孫無忌帝思所與共艱難賴無忌以免作威鳳賦以賜且況其功以無忌為太子太師同中書門下三品同三品自此始輙言𤣥齡輩朋黨蕭瑀字時文晉王為皇太子拜太子太保同中書門下三品帝曰三師以德導太子者也禮不尊則無所取法乃詔師入謁太子出門迎拜師答拜毎門讓乃入師坐然後坐書前後著名稱惶恐瑀素貴但中狹毎燕見輙言𤣥齡輩朋黨盜權若膠固然特未反爾帝曰知臣莫若君朕雖不明寧頓懵臧否因為瑀曉解瑀以帝有所偏信帝亦不平忠力可託大事李勣字懋功晉王為皇太子授詹事俄同中書門下三品帝曰吾兒方位東宫公舊長史以宫事相委勿以資屈為嫌也勣既忠力帝謂可託大事嘗暴疾醫曰用龍鬚灰可治帝乃自剪鬚以和藥及愈入謝頓首流血帝曰吾為社稷計何謝為後留宴顧曰朕思屬幼孤無易公者公昔不遺李密豈負朕哉勣感泣因嚙指流血俄大醉帝親解衣覆之分賜田與張行成髙季輔于志寧字仲謐拜尚書左僕射同中書門下三品嘗與右僕射張行成中書令髙季輔俱賜田志寧奏臣家自周魏来世居闗中貲業不墜今行成季輔始營産土願以臣有餘賜不足者帝嘉之分其田以與二人諫王后之廢韓瑗字伯玉同中書門下三品王后之廢瑗雪泣言曰皇后乃陛下在藩時先帝所娶今無罪輙廢非社稷計不納明日復諌曰王者立后配天地象日月匹夫匹婦尚知相擇況天子乎詩曰赫赫宗周褒姒滅之臣讀至此常輟巻太息不圖本朝親見此禍宗廟其不血食乎帝大怒詔引出久疾自言不任事崔敦禮字安上中書令兼檢校太子詹事以久疾自言不任事奉兩宫更拜太子少師同中書門下三品拒制劉禕之字希美權中書侍郎同中書門下三品方是時詔令叢繁禕之思致華敏裁可占授少選可待也司門貟外郎房先敏坐累貶衛州司馬訴於相府内史蹇味道曰太后㫖禕之曰乃上從有司所奏云后聞以味道歸非於上貶青州刺史加禕之大中大夫賜物百段后因曰君為元首臣為股肱以手足疾移於腹背為一體乎禕之引咎於己忠臣也納言王德真推順曰戴至德無異才惟能歸善於君為時所服后曰善私語鳳閣舎人賈太隠曰后能廢昏立明盍反政以安天下太隠表其言后怒曰禕之乃負我垂拱中或告禕之受歸誠州都督孫萬榮金與許敬宗妾私通太后遣肅州刺史王本立鞫治以勅示禕之禕之曰不經鳳閣鸞臺何謂之敕后以為拒制使賜死按獄希意中宗立楊再思同中書門下三品武三思誣陷王同皎再思與李嶠韋巨源按獄希意抵同皎死衆以為寃臺省要職多族屬姻家李敬𤣥改吏部同中書門下三品居選部久人多附嚮凡三娶皆山東舊族又與趙李氏合譜故臺省要職多族屬姻家髙宗知之不能善也任卿中書寜藉多人薛元超中書侍郎同中書門下三品帝嘗宴諸王召元超與從容謂曰任卿中書寜藉多人哉宅無正寢李義琰上元中進同中書門下三品帝毎顧問必鯁切不回宅無正寢弟義璡為市堂材送之義琰曰以吾為國相且自愧尚營美宇是速為禍豈愛我者耶義璡曰凡仕為丞尉且崇第舎兄位髙安可偪下哉答曰不然事唯全遂物不兩興既處貴仕又廣居宇非有令徳必受其殃卒不許後其木久腐乃棄之常乘欵段馬李懐逺字廣德同中書門下三品久貴益崇儉約不治居室常乘欵段馬僕射豆盧欽望謂曰公貴顯顧當然耶懐逺答曰吾幸其馴不願他駿安李之功賢於漢平勃袁恕己與誅二張又從相王統南衘兵備非常以功加銀青光禄大夫中書侍郎同中書門下三品將作少匠楊務亷者以工巧進恕己恐其復啟㳺娛侈麗之漸言於中宗曰務廉位九卿忠言嘉謀不聞而專事營搆以媚上不斥之亡以昭徳乃授陵州刺史贊曰五王提衛兵誅嬖臣中興唐室不淹辰日天下晏然其謀深矣至謂中宗為英主不盡誅諸武使天子藉以為威何其淺耶釁牙一啟為艶后豎兒所乘刼持戮辱若放豚然何哉無亦神奪其明厚韋毒以興先天之業乎不然安李之功賢於漢之勃平逺矣世號宗紀宗楚客字叔敖同中書門下三品韋后安樂公主親頼之與紀處訥為黨世號宗紀父子並為宰相韋嗣立景龍中拜兵部尚書門下三品嗣立與韋后屬疏帝持詔附屬籍顧待甚渥營别第驪山鸚鵡谷帝臨幸命從官賦詩制序冠篇賜既優備因封嗣立逍遥公名所居曰清虚原幽棲谷嗣立獻木杯藤盤數十物初嗣立代承慶為鳳閣舎人黄門侍郎承慶亦代為天官侍郎及知政事父子並為宰相世罕其比不敢燒尾蘇瓌字昌容同中書門下三品時大臣初拜官獻食天子名曰燒尾瓌獨不進及侍宴宗晉卿嘲之帝黙然瓌自解於帝曰宰相燮和隂陽代天治物今粒食踴貴百姓不足衞兵至三日不食臣誠不稱職不敢燒尾十事姚崇知帝大度鋭於治乃先設事以堅帝意即陽不謝帝怪之崇因跪奏臣願以十事聞陛下度不可行臣敢辭帝曰試為朕言之崇曰垂拱以来以峻法繩下臣願政先仁恕可乎朝廷覆師青海未有逺復之悔臣願不倖邊功可乎比来壬佞冒觸憲綱皆得以寵自解臣願法行自近可乎后氏臨朝喉舌之任出閹人之口臣願宦豎不與政可乎戚里貢獻以自媚干上公卿方鎮寖亦為之臣願租賦外一絶之可乎外戚貴主更相用事班序荒雜臣請戚屬不任臺省可乎先朝䙝狎大臣虧君臣之嚴臣願陛下接之以禮可乎燕欽融葉用將以忠被罪自是争臣沮抑臣願羣臣皆得批逆鱗犯忌諱可乎武后造福先寺上皇造金仙玉真二觀費鉅百萬臣請絶道佛營造可乎漢以鹿莽閻梁亂天下國家為甚臣願推此鑒戒為萬代法可乎帝曰朕能行之崇乃頓首謝翌日拜兵部尚書同中書門下三品三為宰相常兼兵部崇尤長吏道處決無淹思三為宰相常兼兵部故屯戍斥堠士馬儲械無不暗記𤣥宗初立賓禮大臣故老雅尊遇崇毎見便殿必為之興去輙臨軒以送他相莫如也時承權戚干政之後綱紀大壊先天末宰相至十七八人臺省要職不可數崇常先有司罷冗職修制度擇百官各當其材請毋廣釋道無數移吏由是天子責成於下而權歸於上矣宿中書者十四昔郭元振名震以字行以兵部尚書同中書門下三品𤣥宗誅太平公主也睿宗御承天門諸宰相走伏外省獨元振總兵扈帝事定宿中書者十四昔乃休仕至宰相而親具元振雖少雄邁及貴居處乃儉約手不置書莫見其喜愠建宅宣陽里未嘗一至諸院廏自朝還對親欣欣退就室儼如也距國初仕至宰相而親具者唯元振云請督羽林軍除太平公主黨與劉幽求先天元年為尚書右僕射同中書門下三品幽求自謂有勞於國在諸臣右意望未滿而竇懐貞為左僕射崔湜為中書令殊不平見於言面已而湜等附太平公主有逆計幽求與右羽林將軍張暐定計使暐說𤣥宗曰湜等皆太平黨與日夜隂計若不早圖且産大害臣等請督羽林兵除之帝許之未發也而暐漏言於侍御史鄧光賓帝懼即列其狀睿宗以幽求等屬吏劾奏以疎間親罪應死帝密申右之乃流幽求暐光賓明年太平公主誅即日召復舊官知軍國事願為三農祈穀張説拜兵部尚書同中書門下三品讓宋璟陸象先不許帝自東都將還京因幸并州説見帝曰太原王業所基陛下巡幸振耀威武以申永思由河東入京師有漢武雎上祠此禮廢濶歴代莫舉願為三農祈穀誠四海之福帝納其言過祠后上乃還請出二息補外以示自近始源乾曜為黄門侍郎同中書門下三品建言大臣子並求京職俊乂率任外官非平施之道臣二息俱任京師請出二息補外以示自近始詔可乃以子河南參軍弼為絳州司功太祝潔為鄭尉詔曰乾曜身率庶僚以譲既請外其子下遷傳不公乎范宣子譲其下皆讓晉國之人於是大和道之或行仁豈逺哉其令文武官父子昆弟三人在京師者分任於外由是公卿子弟皆出補外百司諮決輙曰如令式牛仙客以工部尚書同中書門下三品為相謹身無他與時浮沈唯唯恭愿前後錫與緘􅍥不敢用百司諮決無所處可輙曰如令式帝既用仙客知時議不歸乘間以問髙力士力士曰仙客本胥吏非宰相器帝忿然曰朕且用康辯葢恚言也有為辯言者辯以為實喜甚守正不阿順李麟上皇還京進同中書門下三品張皇后挾李輔國寖撓政苗晉卿崔圓等畏其權皆附麗取安獨麟守正不阿順同東西臺三品聽乘小馬至内省唐許敬宗字延族改右相辭疾拜太子少師同東西臺三品年老不任趨步特詔與司空李勣朝朔日聽乘小馬至内省大臣不可無學帝東封泰山以敬宗領使次濮陽帝問竇徳𤣥此謂帝丘何也徳𤣥不對敬宗儳曰臣能知之云云帝曰善敬宗退矜曰大臣不可無學向德𤣥之不對吾恥之徳𤣥聞之不屑曰人各有能不强所不知吾所能也李勣曰敬宗多聞美矣竇之不强不亦善乎上官體上官儀進西臺侍郎同東西臺三品儀工詩其詞綺錯婉媚及貴顯人多效之謂為上官體數月罷樂彦瑋以西臺侍郎同東西臺三品數月罷謙慎自守楊𢎞武乾封二年同東西臺三品𢎞武無他才特謙慎自守然居職以清簡稱父子繼為宰相戴至徳乾封中遷西臺侍郎同東西臺三品閱十數年父子繼為宰相世詫其榮髙宗嘗為飛白書賜侍臣賜至德曰況洪源俟舟楫郝處俊曰飛九霄假六翮李敬𤣥曰資啟沃罄丹誠崔知悌曰竭忠節賛皇猷皆見意於詞云諫造蓬萊上陽合璧等宫張文瓘乾封二年遷東臺侍郎同東西臺三品遂與勣同為宰相時髙宗造蓬萊上陽合璧等宫復征討四夷京師養廏馬萬匹帑廥寖虚文瓘諫曰王者養民逸則富以康勞則怨以叛秦漢廣事四夷造宫室至二世土崩武帝末年户口減半夫制治于未亂保邦于未危人罔常懐懐於有仁臣願撫之無使勞而生怨隋監未逺不可不察帝善其言父子皆至三品文瓘四子潜為魏州刺史沛同州刺史治衞尉卿涉殿中監父子皆至三品時謂萬石張家萬石張家上對秦法慢急郝處俊同東西臺三品咸亨初幸東都皇太子監國諸宰相皆留而處俊獨從帝常曰王者無外何為守禦而重門擊柝痛待不虞耶我嘗疑秦法為寛荆軻匹夫耳七首竊發羣臣皆荷戟侍莫敢拒豈非習慢使然處俊對曰此乃法急耳秦法輙引殿者夷三族人皆懼族安有敢拒耶魏曹操著令曰京城有變九卿各守其府後嚴才亂與徒數十人攻左掖門操登銅雀臺望之無敢救者時王修為奉常聞變召車騎未至領官屬步至宫門操曰彼来者必王修乎此由修察變識機故冒法赴難向若居常則遂成禍矣故王者設法不可急亦不可慢詩曰不懈於位民之攸塈仁也式遏寇虐無俾作慝刓也書曰髙明柔克沈潛剛克中道也帝曰善同鳳閣鸞臺三品請盡力行陣唐韋待價改天官尚書同鳳閣鸞臺三品踰年拜文昌右相同鳳閣鸞臺三品累表辭職不聽且請盡力行陣叱左右批薛懐義頰蘇良嗣遷文昌左相同鳳閣鸞臺三品遇薛懐義於朝懐義偃蹇叱左右批其頰曳去武后聞之戒曰第出入北門彼南衙宰相行来毋犯之毋犯南衙宰相上摸稜手蘇味道以鳳閣侍郎同鳳閣鸞臺三品味道練臺閣故事善占奏然其為相特具位未嘗有所發明脂韋自營而已謂人曰決事不欲明白誤則有悔摸稜持兩端可也故世號模稜手肩輿以朝聴子孫侍韋思謙垂拱初同鳳閣鸞臺三品辭疾不許詔肩輿以朝聽子孫侍練知邊事唐休璟拜夏官尚書同鳳閣鸞臺三品后誚楊再思李嶠姚元崇等曰休璟練知邊事卿輩十不當一改太子庶子誅二張首發其謀張柬之誅二張也首發其謀以功擢天官尚書同鳳閣鸞臺三品接舊故如布衣劉仁軌字正則改文昌左相同鳳閣鸞臺三品仁軌雖貴顯不自矜踞接舊故如布衣時然官由州縣至宰輔善致聲譽得吏下歡心紫微黄門三品聽言而授唐薛訥久處邊有戰功開元初契丹奚突連和數入邊訥建議請討監門將軍杜賓客定州刺史崔宣道與訥帥衆二萬出檀州賓客議方暑士負戈贏糧深討慮恐無功姚元崇亦持不可訥獨曰夏草薦茂羔犢方息不費饋饟因盜資振國威靈不可失也天子方欲夸威四夷喜奇功乃聽訥言而授紫微黄門三品以重之師至濼河與賊遇諸將不如約盡亡其軍訥脫身走而罪宣道及大將李思敬等八人有詔斬以徇盡奪訥官爵平章軍國重事豆盧欽望唐擢尚書左僕射平章軍國重事欽望居宰相積十餘年方易之三思等怙勢宣蒸窺間王室戮忠戚觖冀非常不能有所裁抑獨謹身諄諄自全竇懐貞以尚書右僕射兼御史大夫軍國重事宜共平章裴度太和四年數引疾不任機重願上政事帝擇上醫護治中人日勞問相躡乃詔進司徒平章軍國重事須疾已三日若五日一至中書知軍國大事劉幽求唐開元元年八月癸巳劉幽求為尚書左僕射知軍國大事同知軍國政事樂彦瑋孫處約唐麟徳元年十二月太子右中䕶樂彦瑋檢校西臺侍郎孫處約並同知軍國政事同東西臺三品參決軍國重事不限時日入預參決國朝崇禧元年王旦太尉兼侍中許五日一起居毎起居日入中書或遇軍國重事不限時日並令入預參決餘如故同議軍國大事與中書樞密院同議國朝慶厯三年三月召宰相呂夷簡毎有軍國大事與中書門下樞密院同議以聞以夷簡宿疾在告故優有是命夷簡懇請罷預議軍國大事從之職官分紀巻四
