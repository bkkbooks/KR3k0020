body:
  text: 職官分紀巻二十七宋孫逢吉撰太子六傅禮記文王世子凢三王教世子必以禮樂樂所以修内也禮所以修外也禮樂交錯於中發形於外是故其成也懌恭敬而温文立太傅少傅以養之欲其知父子君臣之道也太傅審父子君臣之道以示之少傅奉世子以觀太傅之徳行而審喻之太傅在前少傅在後入則有保出則有師是以教喻而德成也師也者教之以事而喻諸徳者也保也者慎其身以輔翼之而歸諸道者也大戴禮昔者周成王幼在襁抱之中太公為太師前漢百官表太子太傅少傅古官属官有太子門大夫庶子洗馬舎人後漢百官志太子太傅一人中二千石本注曰職掌輔導太子禮如師不領官屬少傅二千石本注曰亦以輔導為職悉主太子官屬魏故事太傅于太子不稱臣少傅稱臣晉職官志太子太傅少傅並古官也泰始三年武帝始建東宫各置一人尚未置詹事官事無大小皆由二傅並有功曹主簿五官太傅中二千石少傅二千石其訓導者太傅在前少傅在後皇太子先拜諸傅然後答之武帝後以儲副體尊遂命諸公居之以本位重故或行或領時侍中任愷武帝所親敬復使領之盖一時之制也咸寧元年以給事黄門侍郎楊珧為詹事掌宫事一傅復領官屬及楊珧為衛將軍領少傅省詹事遂崇廣傳訓命太尉賈充領太保司空齊王攸領太傅所置吏屬復如舊二傅進賢兩梁冠黒介幘五時朝服佩水蒼玉食俸日三斛太康二年始給春賜五十疋秋絹百疋綿百斤其後太尉洪南王亮車騎將軍楊駿司空衛瓘石鑒皆領傅保猶不置詹事以終武帝之世惠帝元康元年復置詹事二傅給菜田六頃騶田六人立夏後不及田者食俸一年置丞一人秩千石主簿五官掾功曹史主記門下史録事戸曹法曹倉曹賊曹功曹書佐門下亭長門下書佐省事各二人給亦取安車一乗及愍懷建宫乃置六傅三太三少以景帝諱師故改太師為太保通省尚書詹事文書闗由六傅然自元康之後諸傅或二或三或四或六及永康中不復置詹事自太安以來置詹事終孝懷之世渡江之後有太傅少傅不立師保周遷晉輿服志太子少傅銀印青綬兩梁冠絳朝服佩水蒼玉皆賜五時朝服二傅見太子則单衣介幘交拜今太子不拜少傅傅暢晉公卿禮秩太傅立草少傅書真以為儲訓張勃晉東宫舊事皇太子於二傅執弟子禮二傅入見太子至崇賢門迎太子為二傅拜各答拜入坐對坐王隱晉書惠帝以衛楷為太子少師懷帝以光禄劉著為太子少保晉諸公讃惠帝以吏部尚書和嶠為太子少保職官要録晉太子六傅各有丞一人三少舊視左僕射冠服同三太也宋百官志太子太傅一人丞一人太子少傅一人丞一人古官也漢髙帝九年以叔孫通為太子太傅位次太常漢并無丞魏世無東宫然則晉氏置丞也沈約宋書太子少師保並晉置隋百官志梁太子太傅一人位視尚書令少傅一人位視左僕射天監初又置東宫常侍皆散騎常侍為之後齊太子太傅太師太保是為三師掌師範訓導輔翊皇太子少師少傅少保是為三少各一人掌奉皇太子以觀三師之德出則三師在前三少在後隋太子置三太三少開皇初置詹事二年定令罷之唐百官志太子太師太傅太保各一員並從一品師傅古官南朝不置後魏北齊師傅品第二號東宫三太隋品亦第二武徳定令加為從一品太子少師少傅少保各一員並正二品三少亦古官厯代或置或省南朝不置後魏北齊置品第三號東宫三少皇朝定令正二品六典太子太師太傅太保各一人並從一品下史記秦孝公使商鞅設法而黥太子師傅則秦有其職也晉懷帝為太子又備六傅東晉明帝在儲宫置保傅而無二師皇朝太子出則乗輅備儀太子三師以道德輔教太子者也至於動靜起居言語視聴皆有以師焉太子少師少傅少保各一人並正二品隋氏降太師一等皇朝因之太子出入則乗輅備儀以為之後凡三師三少官不必備唯其人無其人則缺之國朝自太師至率更令皆沿舊制除授而無職司惟建儲闈即置三少賔客詹事庶子諭徳中舍人舍人並他官兼充其左右春坊並鑄印置吏員常時並省其常除宫官者不職本宫之務皆無定員分莅中外之任天禧四年以吏部尚書同中書門下平章事丁謂兼太子少師樞宻使吏部尚書同中書門下平章事馮拯兼太子少傅曹利用兼太子少保宰臣兼東宫官自謂始也元祐官品令太子太師太傅太保並從一品少師少傅少保並從二品天下端士大戴禮選天下端士孝悌博聞有道術者以輔翌之故太子目見正事耳聞正言身行正道左右前後皆正人也左右前後皆正人上明仁孝禮義以道習之前漢賈誼上疏曰古之王者太子乃生因舉以禮使士負之有司齊肅端冕見之南郊見於天也過闕則下過廟則趨孝子之道也故自為赤子而教固已行矣昔者成王幼在襁抱之中召公為保同公為傅太公為師保保其身體傅傅之徳義師導之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子燕者也故乃孩提有識三公三少因明仁孝禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翌之使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也夫習與正人居不能無正猶生長於齊不能不齊言也習與不正人居之不能無不正猶生長於楚之地不能不楚言也故擇其所嗜必先受業乃得嗜之擇其所樂必先有習乃得為之孔子曰少成若天性習貫如自然年少可久於事晉山濤啟事皇太子始之東宮四海屬目保傅不可不高盡天下之選羊枯秉徳義能克己復禮又年少尚可久於其事出入周旋令太子毎覩儀型方任雖重比此猶輕東宮少事養徳而已又可朝㑹與聞徳義生即置輔弼唐太宗謂庶子于志寧曰古者太子既生使士負之即置輔弼成王幼小周召為師是也五日一赴資善堂國朝宰臣丁謂等謂自今兼太子師傅十日一赴資善堂賓客以下雙日更互陪侍講學上甚悅命五日一赴資善堂太師亡一鏡唐貞觀十六年太子太師魏𤣥成薨帝追思不已謂侍臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常保此三鏡以防已過今𤣥成殂逝遂亡一鏡也遺表書之於笏魏𤣥成薨太宗謂侍臣曰𤣥成亡後朕遣人至宅冩其書函得表一紙革字皆難識唯前數行稍可分辨云天下之事有善有惡任善人則國安用惡人則國亂公卿之内有愛有憎憎者唯見其惡愛者唯見其善愛憎之間所宜詳慎若愛而知其惡憎而知其善去邪勿疑任賢勿二可以興矣其遺表如此然在朕思之恐不免斯事公卿侍臣可書之于笏知必諫也詹事府上事馮定為太子詹事時宰臣鄭覃兼太子太師欲為尚書省上事定奏曰據六典太師居詹事府不合於都省札上乃詔于本司上事人推美之太傅諌易太子前漢叔孫通為太子太傅髙帝欲以趙王如意易太子通諌曰昔者晉獻公以驪姬故廢太子立奚齊晉國亂數十年為天下笑秦以不早定扶蘇胡亥詐立自此滅祀此陛下所親見今太子仁孝天下皆聞之吕后與陛下攻苦食淡其可背哉陛下必欲廢適而立少臣願先伏誅以頭血汙地髙帝曰公罷矣吾特戲耳通曰太子天下本本一揺天下震動奈何以天下戲髙帝曰吾聽公父子並為師傅䟽廣字仲翁少好學明春秋徴為博士太中大夫地節三年立皇太子選丙吉為太傅廣為少傅數月吉遷御史大夫廣徙為太傅廣兄子受字公子亦以賢良舉為太子家令受好禮恭謹敏而有辭頃之拜受為少傅太子外祖父平恩侯許伯以為太子少迺使其弟中郎將舜監䕶太子家上以問廣廣對曰太子國儲副君師友必為天下英俊不宜獨親外家許氏也且太子自有太傅少傅官屬已備今復使舜䕶太子家非所以廣太子徳於天下也上善其言益見器重數受賞賜太子毎朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮其後父子俱移病上疏乞骸骨歸老故鄉上許之賜黄金二十斤皇太子贈以五十斤公卿大夫故人邑子設祖道供帳東都門外送者車數百輛辭決而去及道路觀者皆曰賢哉二大夫或且相與歎息為之下泣焉以論語禮服授太子蕭聖之自御史大夫左遷為太子太傅以論語禮服授皇太子是時周堪為少傅太子即位是為孝元帝望之堪本以師傅見重上即位數宴見言理辭直上甚納之其後望之以事下獄收前將軍印綬數月詔曰國之將興尊師而重傅故前將軍蕭望之傅朕八年道以經術厥功茂焉其賜望之爵闗内侯恭謹舉朝無與比萬石君石奮孝文時官至太中大夫無文學恭謹舉朝無與比太子太傅缺選可傅者皆推奮遂為太子太傅馴行孝謹石奮子慶馴行孝謹官至二千石元狩元年立太子選羣臣可傅者慶自沛守為太子太傅素服五日以報師傅之恩夏侯勝為太子太傅受詔撰尚書論語賜黄金百斤勝年九十卒于家賜冡塋葬平陵太后賜錢二百萬為素服五日以報師傅之恩儒者以為榮屏居藍田山景帝立太子以竇嬰為太傅十年太子廢嬰爭不能得謝病屏居藍田山下數月諸竇賔客辯士説莫能入梁人髙遂乃説嬰嬰然之遂起朝請如故先帝名臣後漢明帝以鄧禹先帝名臣拜太傅用天下之賢才後漢桓榮字春卿顯宗始立為太子選求明經乃擢榮弟子豫章何湯為虎賁中郎將以尚書授太子世祖從容問湯本師為誰對曰事沛國桓榮帝即召榮説尚書甚善之拜為議郎又使授太子世祖嘗大㑹百官詔問誰可傅太子者羣臣承望上意皆言太子舅執金吾原鹿侯隂識可博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕況太子乎即拜佚為太子太傅而以榮為少傅賜以輔車乗馬榮大㑹諸生陳其車馬印綬曰今日所䝉稽古之力也可不勉哉博選名儒後漢班彪字叔皮以東宫初建諸王國並開而官屬未備師保多闕上言曰昔成王之為孺子出則周公召公太公史佚入則太顛閎天南宫括散宜生左右前後禮無違者故成王一日即位天下曠然太平漢興太宗使晁錯導太子以法術賈誼教梁王以詩書及至中宗亦令劉向王褒蕭望之周堪之徒以文章儒術保訓東宫今宜博選名儒有威量明通政事者以為太子太傅琢磨玉質應劭漢官太子太傅日就月將琢磨玉質言太子有玉質琢磨以道也中東門君東觀漢記張堪字子孝為太子太傅及郭后廢因稱疾拜太中大夫病居中東門候舍故時人號中東門君帝數存問賞賜月朔入見太子魏志何䕫字叔龍為太子太傅毎月朔太傅入見太子太子正法服而禮焉明嫡庶之分呉志呉粲遷太子太傅遭二宫之變􅎨言執正明嫡庶之分欲使魯王出駐夏口遣楊竺不得令在都邑又數以消息與陸遜遜時駐武昌連表諫爭由此為竺等所譛害受詔輔太子孫權寢疾徴大將軍諸葛恪為太子太傅㑹稽太守滕淯為太常并受詔輔太子對賈誼過秦論闞澤拜太傅中書孫權常問書傳篇賦何者為美澤欲諷諭以明治亂因對賈誼過秦論最善權覽讀焉聞其名儒以禮召程秉字徳樞後事鄭𤣥避亂交州與劉熈考論大義遂博通五經士燮命為長史權聞其名儒以禮召既到拜太子太傅當今無軰張温少修節操容貌奇偉權聞之以問公卿曰温當今與誰為比大司農劉基曰可與全琮為軰太常顧雍曰基未詳其為人也温今無軰權曰如是張允不死也徵到延見文辭占對觀者傾竦權改容加禮罷出張昭執其手曰老夫託意君宜明之拜議郎選曹尚書徙太子太傅崇敬二傅徐廣晉記太尉茍顗領太傅侍中任顗領少傅制太子拜太傅少傅如弟子師之禮二傅不得上疏曲敬習鑿齒晉武帝時有司奏東宫二傅禮儀不同帝曰崇敬師傅所以尊教前世之令典也何論臣與不臣其令太子拜之獻箴晉齊王攸為太子太傅獻箴太子曰保相之材必擇賢明保相擇賢明上一時儒宗虞預晉書賀循為太子太傅時朝廷初建動有疑議宗廟制度皆循所定朝野諮詢一時儒宗矣躬訓儲宫晉中興書賀循字彦先為太子太傅詔曰循清真履道秉尚貞貴居身以沖約為本立徳以仁讓為行躬訓儲宫黙而成化别供一案唐太宗伐髙麗皇太子定州監國髙士㢘攝太子太傅仍典朝政皇太子下令曰攝太子太傅士㢘朝望國華儀刑攸屬寡人忝膺監守實資訓導此日聽政當屈同榻庶因諮白以祛蒙滯但據案奉對情所未安所司宜别以一案供太傅士㢘固諌不敢當賜宅于志寧遷太子太傅常與右僕射張行成中書令髙季輔俱蒙賜宅志寧奏曰臣居闗右代襲箕裘周魏以來基址不墜行成等新營莊宅尚少田園于臣有餘乞申私讓帝嘉其意乃分賜行成季輔病中吟詠不輟白居易授太子太傅進封馮翊縣開國侯四年冬得風疾伏枕者累月乃放諸妓女樊蠻等仍自為墓誌病中吟詠不輟太保開府加劉寔字子真以特開府加太子太保特進行懷帝以荀組為侍中特進行太子太保行領各隨其時賈充為太尉行太子太保以公為位重而為傅保行領各隨其時充性烈意在明才前後所㧞必欲終始直臣顯祖將禪位於京兆王子推隴西王源賀並固讓陸馥進言曰皇太子聖徳承基四海屬望不可横議干國之紀臣請刎頸殿廷有死無二久之帝意解詔曰馥直臣也其能保吾子乎遂以為太保分臺省班於東西國朝王溥乾徳二年罷為太子太保故事一品班于臺省之後太祖因見溥謂左右曰溥舊相當寵異之即令分臺省班于東西少師黄㼐後魏郭祚領太子少師祚曽從世宗幸東宫明帝幼弱祚持一黄㼐出奉之時應詔左右趙桃弓與御史中尉王顯迭相唇齒深為帝所信祚私事之時謗祚者號為桃弓僕射黄㼐少師太子引上殿親拜唐李綱拜太子少師之時綱有脚疾不堪踐履太宗特賜步輿令綱乗至閣下數引入禁中問以正道又令輿入東宫皇太子引上殿親拜之綱於是陳君臣父子之道問寢視膳之方理順詞直聽者忘倦古難其選貞觀十三年以右僕射房𤣥齡為太子少師𤣥齡上表遜位詔不許太宗因謂侍臣曰太子師保古難其選若成王幼小以周公為傅左右皆賢日聞雅訓自幼及長便為聖君秦之胡亥趙髙傅之教以刑法及其立也誅功臣殺親族慘酷不已旋踵而亡以此言之善惡由於習近也年力雖衰進取彌鋭唐休璟年力雖衰進取彌鋭時尚宫賀婁氏用事休璟乃為其子娶賀氏養女以為妻因以自達由是起為太子少師為時所譏乗小馬入内省許敬宗為太子少師乾徳初以年老不能行步特令與司空李勣每朝日各乗小馬入禁門至内省自卑損不敢修謁房𤣥齡拜太子少師時皇太子將行拜備儀以待之𤣥齡深自卑損不敢修謁遂歸于家有識者重其崇讓割仙韶院料錢王起遷太子少師判兵部事侍講如故以其家貧詔毎月割仙韶院料錢三百千添給起富於文學而理家無法俸料入門即為僕妾所有帝以師友之恩特加周給議者以與伶官分給咸為恥之少傅父子並為師傅前漢疏廣見太傅門彊起傅太子上謂張良曰子房雖疾彊起傅太子時叔孫通已為太傅良行少傅事上書陳便宜匡衡為太子少傅數以上書陳便宜又朝廷有政議即援經以對言多法義上以為可任公卿今日所蒙稽古之力見太傅門用天下之賢才注從學者萬人後漢張興字君上拜太子少傅顯宗數訪經術既而聲稱著聞弟子從學者且萬人以庶代宗先世之戒魏志邢顒初太子未定而臨菑侯植有寵丁儀等並賛翼其美太祖問顒顒對曰以庶代宗先世之戒也願陛下深重察之太祖識其意以為太子少傅遷太傅天下談士舉坐傾心晉山濤太子少傅在東宫以年七十疾病求退有詔不許尋講武於宣武塲時濤有疾詔乗步輦從因與盧欽講論用兵本意武帝欣然而言曰山少傅天下談士也舉坐傾心門下車騎數百而善應接王雅為太子少傅時朝望屬王珣珣亦頗以自許及中詔用雅衆遂赴雅焉將拜遇雨請以繖入王珣不許之因冒雨而拜雅既貴倖威權甚振門下車騎常數百而善應接傾心禮之三世傅東宫呉志薛綜為太子少傅子瑩孫皓時又為太子少傅晉平呉瑩子㢘元帝時亦為太子少傅自綜至㢘三世傅東宫崇敬二傅見太傅門内管銓衡外參傅訓晉中興書周顗字伯仁拜太子少傅上疏曰臣退自省學不通一經智不効一官也忘臣頑蔽乃欲使臣内管銓衡外參傅訓質輕蟬翼事重千鈞此之不可不待識者而明矣接以賔友禮南史王儉拜太子少傅舊太子敬二傅同至是朝議接少傅以賔友禮太子南面再拜陳書孝明帝在東宫宣武皇帝欲以崔光為太子師傅光固辭帝令太子南面再拜宫臣皆從太子拜光北面立不敢答拜唯西面拜謝而出乃授太子少傅箴傅立為太子少傅箴曰夫金本無常方圓應形亦有隱怙習與性成故近朱者赤近墨者黒聲和則響清形正則影直正人在側徳義盈堂鮑肆先入蘭臺不芳傅臣司訓敢告君王二傅不拜王隱晉書何曾議太子少傅當稱臣拜荀顗曰太之與少自二傅之名次爾非為天子有輕重也詔曰秦漢以來舊章廢滅隨時改作其舊不可依用宜為古義遂定二傅不拜蹇蹇正直東觀漢記王丹為太子少傅蹇蹇正直箴後魏蕭大圜為太子少傅以任當師傅調䕶是職乃作少傅箴曰惟王建國辨方正位左史記言右史書事莫不立太子為皇之貳是以易稱明夷禮云上嗣東庠養徳震方主器束髪就學宵雅便肄朝讀百篇乙夜乃寐愛日惜力寸隂無棄視膳再飯寢門三至小心翼翼大孝烝烝詢謀計慮問對疑丞安樂必敬無忘戰兢天道福謙人道惡盈漢嗣不絶乎馳道魏儲回環乎鄴城前史攸載後丗揚名三善既備百國以貞姬周長久實頼元良嬴秦短祚誠由少陽雖卜年七百有徳至厯而昌數世一萬無徳不及而亡敬之敬之天惟顯思光福皇極永問固洪基箴規諭教敢告職司太子見而悦之致書勞弗予鮑魚賈誼新書昔周文王使太公傅太子發嗜鮑魚而公弗予太公曰禮鮑魚不登於爼豈有非禮可以養太子哉忿爭降秩國朝詔吏部侍郎兼太子少傅同中書門下平章事李迪可戸部侍郎歸班初丁謂與迪各降秩一級謂知河南府迪知鄆州尋復留之不及宣制止命中書革詞行下以兵部侍郎叅知政事任中正等為賔客詹事俄以迪忿爭故太子議改詔書及謂等四制不下而中正等先進秩焉先是迪與冠凖同在中書事準甚謹準所挾姦不公迪不敢阻凖既得罪謂等頗輕之迪不能堪至是輔臣例兼宫官迪以當遷尚書又故事兩省侍郎無兼左右丞者盖謂深欲抑之故迪益忿又謂素善林特改為詹事明日待漏院又欲奏特為樞密副使仍領賔客迪曰特去嵗右丞今踰年改尚書入東宫皆非公選況奏除詹事不可改也因詬謂皆不答同列極力和解不聽遂力爭上前期必與謂俱罷已而上御承明殿召丁謂詢其紛競之故謂從容陳叙且言李迪自喧悖臣不當與之俱罷賜對久之於是遣入内都知張景宗副都知鄧守恩傳詔送謂赴中書令依舊視事仍命與馮拯曹利用俱進秩領宫官以迪知鄆州少保直士唐李綱拜禮部尚書兼太子詹事頻乞骸骨髙祖慢罵之曰卿為潘仁長史何乃羞為朕尚書且建成在東宫遣卿輔導何為屢欲辭乎綱頓首陳謝曰潘仁賊也誠好殺害毎諫便止所活極多為其長史故得無愧陛下功成業大頗自矜伐臣事太子所懷鄙見復不採納髙祖謝曰知公直士勉弼我兒於是擢拜太子少保換散秩長慶中以兼太常卿趙宗儒為太子太保太常有師子樂備五方之色非朝㑹聘享不作焉至是中人掌教坊之樂者移牒取之宗儒不敢違以牒白宰相宰相以為事在有司執守不令闗白而宗儒憂恐不已宰相以為懦怯故換以散秩手勅稱名李綱為太子少保髙祖以其隋氏名臣甚加優禮手勅未嘗不稱名其見重如此舉朝服其度量唐書李適之為右相孝林甫密奏其好酒頗妨政事𤣥宗惑焉乃除太子少保適之遽命親故歡㑹賦詩曰避賢初罷相樂聖且衘盃為問門前客今朝幾箇來舉朝服其度量品序非便國朝天禧四年以資政殿大學士太子少保王欽若為司空職如故欽若以輔臣兼領東宫三少品序非便表求換秩故有是命以輔臣兼領上賔客唐百官志太子賔客四員正三品古無此官皇朝顯慶始置此官也掌侍從規諌賛相禮儀晏㑹則上齒貞觀十八年以宰相兼賔客開元中定員四人六典太子賔客四人正三品漢書髙祖欲廢太子吕氏用張良計致商山四皓以為賔客又孝武皇帝為太子立博望苑使通賔客則其義也若有宴賜諸司掌宫太子賔則皆遇焉建中四年加二人興元元年又加四人貞元四年復舊四人國朝天禧四年十一月參知政事任中正樞密副使錢惟演參知政事王㑹並兼太子賔客執政官兼東宫官自中正始也元祐官品令太子賔客從三品賔友晉愍懷太子在東宫選大臣子弟有名稱者以為賔友東賔客愍懷太子始之東宫惠帝詔曰適嗣幼䝉始之東宫惟賴師傅羣賢之訓其遊處左右宜得正人能相長益者太保衛瓘司空隴西王泰太子太傅楊齊太子少師裴楷太子少傅華廣人皆徳業純茂逰道義之門有不肅之訓其令五更相往來與太子習處備賔友也其時雖非官而謂之東賔客皆選文義之士以侍儲皇陳邦國之大本唐書鄭蕭開元二年詔拜吏部侍郎帝以蕭嘗侍太子言論典正復令兼太子賔客為東宫授經既而太子失寵上不悦有廢斥意召蕭見深陳邦國之大本君臣父子之大義上乃改容深嘉之調䕶之地將作監王堪修奉太廟弛慢罰俸仍改為太子賔客制出李固言封還曰東宫調䕶之地不可令弛慢被罰之人處改為均王傅隱居不預其禍武攸緒少有志行天授中封安平郡王出為揚州大都督長史慶厯中棄官隱于嵩山以琴書藥餌為務中宗即位以安車召至都授太子賔客尋請歸山從之及三思延秀等搆逆諸武多坐誅戮惟攸緒以隱居不預其禍時論美之見太子如師傅之禮國朝至道元年尚書左丞李至禮部侍郎李沆並兼太子賔客見皇太子如師傅之禮上召謂至等曰朕以太子仁孝賢明尤所鍾愛今立為儲貳以為國本當須正人輔之卿等可盡心調䕶若動皆用禮必須賛成如事稍有未當不可隨順至於禮樂詩書之道可以禆益太子者皆卿等素習不假朕多訓也至等頓首稱謝賔客為宰相東齋記事李文定公為叅知政事時仁皇為太子文定兼賔客一日召對滋福殿欲相之固辭俄而太子出謝曰䝉恩以賔客為宰相真宗顧謂曰尚可辭耶乃拜吏部侍郎兼太子太傅同中書門下平章事久之與丁謂争事罷天下之人皆以亮直許之詹事府詹事前漢百官表詹事秦官也詹者給也掌皇后太子家有丞屬官有太子率更家令丞僕中盾衛率厨廐長丞漢書竇嬰太后兄子也景帝即位為詹事文帝以鄭當時為景帝詹事昭帝以韋賢為詹事後漢百官志長秋本注曰丞秦有詹事一人位長秋上亦有宦者主諸中官成帝省之以其職并長秋是後皇后當法駕出則中謁宦者職吏權兼詹事奏引訖罷應劭漢官儀詹事秦官秩二千石晉職官志見太子六𫝊門宋百官志太子詹事一人丞一人職比臺尚書今領軍將軍詹省也漢西京則太子門大夫庶子洗馬舍人屬二傅率更令僕衛率屬詹事皆秦官後漢省詹事太子官屬悉屬少傅而太傅不復領官屬晉初太子屬官通屬二傅咸寧元年復置詹事二傅不復領官屬詹事二千石齊職儀詹事品第三茂陵書詹事二千石銀章青綬局擬尚書令位視領䕶將軍隋百官志梁置詹事任總宫朝二傅及詹事各置丞功曹主簿五官後齊詹事總東宫内外衆務事無大小皆統之府置丞功曹五官主簿録事員領家令率更令僕等三寺左右衛二坊隋開皇初置詹事二年定令罷之唐百官志詹事一人正三品少詹事一人正四品上掌統三寺十率府之政少詹事為之貳皇太子書稱令庶子以下署名奉行書案畫日丞二人正六品上掌判府事知文武官簿假使凡勅令及尚書省二坊符牒下東宫諸司者皆發焉主簿一人正七品上録事二人正九品下六典太子詹事府詹事一人正三品晉以保傅位尊不宜親細務武帝咸寜初用黄門侍郎楊珧為詹事掌東宫之任珧遷為少傅後惠帝元康中復置永康中齊王冏輔政復省太安中復置懷帝又省江左復置晉令品第三銀章青綬絳朝服兩梁冠其後用人漸重或以令僕射領之梁定十八班班第十四陳因之後魏置左右二人其後惟置一人初第二品下太和末降第三品後周置太子宫正宫尹龍朔二年改端尹咸亨復舊天授中改為少尹神龍元年復舊少詹事一人正四品上皇朝置龍朔二年改為少尹咸亨復舊天授中復為少尹神龍元年復舊丞三人正六品上漢因秦置詹事丞秩六百石後漢省至魏晉皆隨詹事置省永康中省詹事特置丞一人文書闗六傅晉令詹事丞一人品第七銅印墨綬進賢一梁冠皂朝服局擬尚書左右丞過江多用員外郎及博士為之遷為尚書郎宋齊品服同晉氏梁陳品第八後魏初從三品中太和末第七品上北齊第七品下隋初置一人皇朝加至二人龍朔二年改為端尹丞咸亨元年復故天授中又改為宫尹丞神龍復故主簿一人從七品上晉始置主簿史闕其員品自宋至隋詹事府皆有正官功曹主簿史亦闕其員品皇朝置一人龍朔咸亨天授神龍並隨府改復國朝元祐官品令太子詹事從三品少詹事正六品正傳梁王前漢竇嬰字正遜景帝時為詹事帝弟梁孝王母竇太后愛之酒酣上曰千秋萬嵗後傳梁王太后歡嬰引酒巵進上曰天下者髙帝天下父子相傳漢之約也上何以得傳梁王太后由是憎嬰授皇太子經孔霸孔子之後也漢宣帝時為太中大夫以選授皇太子經遷給事椒房率更領其材漢武栢梁詩椒房率更領其材世稱裁斷晉書卞壺為詹事世稱裁斷切直敦實出於事上妙簡材賢武帝以王恭為丹陽尹領詹事恭讓表曰今日王儲始建四方是式總司之任崇賛所由宜妙簡材賢盡一時之務豈臣蕞庸所可叨忝彈肅一時王珉答徐邈書曰詹事彈肅一時如尚書令中丞矣非例不行俗説江夷為右僕射主上欲用領詹事語王淮卿可覔此例淮對曰臣當出外尋訪淮後見主上問近所道事卿已得例未淮曰謝琰表僕射領詹事琰即謝公之子恐夷非其例事遂不行戚貴西京風嘉東國齊孔稚珪讓詹事表皇太子霞褰青殿日晃春宮駕紫谷之英振洛笙之韻向非器上白雲韻同明月何以延芳芝苑押條竇嬰戚貴于西京陸曄風嘉于束國伊人之美方曰可居臣亦何斯而敢忝冒宫端梁江總自左戸尚書轉太子詹事總性寛和温裕尤工五七言詩溺于浮靡及為宫端與太子為長夜之飲輔弼非材陳後主在東宫欲以江總為太子詹事令管記陸瑜言于孔奐奐曰江總有潘陸之才而無園綺之實輔弼儲貳均謂非材後主深以為恨乃自言于宣帝將許之奐乃奏曰江總文華之人今皇太子文華不少無藉于總如臣愚見願選敦重之材以居輔導帝曰誰可奐曰都官尚書王廓代有懿德立性敦敏可以居之後主時在側乃曰廓王泰之子不可居太子詹事奐又曰宋朝范􅁮即范㤗之子亦為太子詹事後主固爭之帝遂以總為詹事選敦重之才以居輔導上儲端華重實異常司梁陸倕除詹事讓免表云儲端華重實異常司諫近閹官深加勉勞唐于志寧為太子詹事太子承乾令閹官多在左右上書諌之及承乾敗太宗謂志寧曰知公數有規諫深加勉勞以右庶子令狐徳棻等無諌者皆從貶責屈階資髙宗為皇太子轉李勣為太子詹事左衛率加位特進同中書門下三品太宗謂曰我兒新登儲貳卿舊長史今以宫事相委故有此授雖屈階資可勿怪也及太宗寢疾謂髙宗曰汝於李勣無恩今我將責出之我死之後汝當授以僕射即荷汝恩必能致其死力乃出勣疊州都督髙宗即位其月召拜洛州刺史尋又拜尚書左僕射太師上事見太師門員外詹事嚴挺之為李林甫所嫉及移守絳郡𤣥宗嘗謂林甫曰嚴挺之何在此人亦堪進用林甫乃召其弟損之至門叙故云當授子員外郎因謂之曰聖人視賢兄極深要須作一計入城對見當有大用令損之取絳郡一狀云有小風氣請入京就醫林甫將狀奏云挺之年髙近患風且須授門官就醫𤣥宗歎叱久之林甫奏授員外郎詹事便令東京養疾挺之至東京鬱鬱不得志成疾其年九月寢疾終于洛陽班位失序蘇午改太子詹事初入朝班位失序殿中侍御史鄒儒立對仗彈之午於金吾待罪數刻特釋放舊制太子詹事班次太常宗正卿之下貞元三年御史中丞竇參叙定班位移太子詹事在河南太守尹之下午乃引舊班制位臺官詰之仍紿云已白宰相諸依舊故為儒立彈之薦侍讀禇无量劉憲見侍讀門四上書諌姚珽遷詹事兼左庶子節愍太子稍失道珽凡四上書諫太子雖稱善不用其言及敗索宫中得珽諫書中宗嘉歎焉少詹事沿革見詹事門送公衣錦還鄉唐張行成轉太子少詹事太宗東征太子于定州監國即行成本邑太宗謂行成曰送公衣錦還鄉于是令有司祀其先人墓司直六典太子司直二人正七品上皇朝龍朔二年置桂坊比御史臺置令一人比御史大夫司直二人比御史職在彈劾以肅宮寮其後廢桂坊以司直𨽻詹事府掌彈劾宮寮糾舉職事凡皇太子朝宫臣則分知東西班凡諸司文武應參官毎月皆具可否以判正焉凡諸率府配兵于職掌者亦如之皆受而檢察其過犯者隨以彈啓若皇太子監國詹事及左右庶子為三司使則司直一人與司議舍人分日受啓狀詳其可否以申理之若皇太子出則於鹵簿分内以糾察職官分紀巻二十七
