body:
  text: 職官分紀卷十三宋孫逢吉撰三司五代職官志後唐莊宗同光中勅鹽鐵度支户部三司凡闕錢物並委租庸使管轄踵梁之舊制也長興元年罷租庸使額分鹽鐵度支户部為三司國朝三司凡二十四案曰兵刑胄鐵商稅茶課鹽末鹽設賞給錢帛發運百官斛㪷粮料騎夏稅秋稅東上供西上供修造竹木麴衣糧倉乾徳五年度支判官侯陟言其不均始令三部各分領八案焉咸平四年併夏秋稅為一曰户稅併東西上供併竹木歸修造倉案歸衣糧大中祥符七年别置常平案其後重定鹽鐵八案以判官三員分領曰兵刑胄鐵曰商稅茶曰課鹽末鹽設度支八案以判官三員分領曰賞給錢帛曰發運斛斗百官曰糧料常平騎户部五案以判官三員分領曰兩稅麴曰上供曰修造衣糧淳化四年詔自今只置三司使一員判官六員推官三員三部勾院只置判勾一員判官一員其三部屬吏並仍舊貫三司使尺書案檢外處符牒並令判官推官通書頒行冬十月以左諫議大夫判三司魏羽為三司左計使户部員外郎董儼為右諫議大夫三司右計使先是三司簿領堆積胥吏弛慢因而為奸居其任者不能發摘禁止至是用魏羽段惟一等議分天下為十道兩京為左右計各置判官領之置三司使二員魏羽主其左董儼主其右中分諸道以隸焉凡國用支費租調歲課以其簿上於總計司而經度之閏十月以給事中陳恕為工部侍郎三司總計使十一月辛未詔總計使陳恕判左右計事左右計使分十道事合干論議計度並令恕等㕘預焉咸平五年鹽鐵使王嗣宗言今三司奏事有可記者請令判使一人撰録送史館上曰三司務繁若日有著述必妨公務可令逐季録送使五代史後唐明宗長興元年以前許州節度使張延朗行兵部尚書充三司使班在宣徽使之下三司有使額自延朗始也唐制户部度支以本司郎中侍郎判其事而有鹽鐵轉運使天寶中楊慎矜王鉷楊國忠繼以聚貨之術媚上受寵雖然皆守户部度支本官帶使額亦無所改作下及劉晏第五琦亦如舊制自後亦以宰臣分判一司不置使額乾符後天下兵興隨處置租庸使以主調發兵罷則停梁時乃置租庸使專領天下泉貨莊宗中興秉政者不閑典故踵梁故事復置租庸使以魏博故吏孔謙專使務斂怨于下斵喪王室者實租庸之弊也明宗嗣位思革其弊未及下車乃詔削除使名但命重臣一人判其事曰判三司至是張延朗自許州入再掌國計白于樞宻使請置三司使名宣下中書議其事宰臣以舊制覆奏授延朗特進行工部尚書充諸道鹽鐵轉運等使兼判户部度支事從舊制也明宗不從竟以三司使為名焉國朝建隆元年以宣徽北院使李崇矩為右監門衛大將軍充三司使其後有權㸃檢權同判之名太平興國八年分置三部使淳化四年復置三司使一人十月置左右計使又置總計使判左右計事先是三司簿領堆積胥吏弛慢因而為奸不能發摘是後魏羽段惟一等議分天下郡縣為十道曰河東關西劔南淮南江南東道江南西道兩浙廣南東京為左計西京為右計各置判官領之置左司使二員中分諸道以𨽻焉五年詔罷諸道左右計使復置三司使咸平六年復以冦凖為兵部侍郎充三司使天聖四年以祠部員外郎知制誥程琳權發遣三司使公事凡權發遣者暫攝其事也慶厯三年以知永興軍葉清臣權三司使蓋官輕則為權使公事清臣再領三司云權使者中書誤也自此遂令權使與權使公事為兩等嘉祐元年七月制以武康節度使知相州韓琦除工部尚書三司使三司使當用舍人院制除今降麻宣制誤也九月翰林學士歐陽修權發遣三司使公事學士不輕而權發遣者亦暫攝其事不正也筆談予嘗購得後唐閔帝應順元年案檢一通乃除宰相劉昫兼判三司堂檢前有擬狀云具官劉昫右狀以劉昫經國才高正君心切方屬體元之運實資謀始之規宜注宸衷委司邦計漸期富庶永贊聖明臣等商量望授依前中書侍郎兼吏部尚書同中書門下平章事集賢殿大學士兼判三司散官勲封如故未審可否如蒙允許望付翰林降制處分謹録奏聞其後有制書曰宰臣劉昫可兼判三司公事宜令中書門下依此施行付中書門下准此四月十日用御前新鑄之印與今政府行遣稍異本朝要事對稟常事擬進入畫可然後施行謂之熟狀事速不及待報則先行下具制草奏知謂之進草熟狀白紙書宰相押字他執政具姓名進草即黄紙書宰臣執政皆于狀背押字堂檢宰執皆不押唯宰屬于檢背書曰堂吏書名用印此擬􅃺有詞宰相押檢不印此其為異也大率唐人風俗自朝廷下至郡縣决事皆有詞謂之判則書判科是也押檢二人乃馮道使案目録三司使後當有副使鹽鐵使副使度支使副三門此本皆佚去下文自弁始也一條又脫去標目越次而授一條乃度支副使門内事蓋抄録者有脫去頁數今無可考補姑仍之自弁始也承延齡之後以寛簡代煩虐人甚稱之越次而授國朝至道元年以殿中丞欒崇吉為度支員外郎度支副使崇吉以吏部令史稍遷至中書堂後官明習文法清白勤事故越次而授焉户部使副使六典漢成帝置尚書五人其三曰民曹主吏人上書事後漢以民曹兼主繕修功作魏置左民尚書晉初省之太康中又置惠帝時有左民尚書東晉及宋齊並置梁陳置左户尚書並掌户籍兼知工官之事後魏北齊有度支尚書亦左民左户之任也後周依周官置地官大司徒卿隋初曰度支尚書開皇三年改為民部皇朝因之貞觀二十三年改户部顯慶元年改為度支龍朔二年改司元太常伯咸亨元年復户部光宅改地官尚書神龍元年復故唐至徳以後鹽鐵始置使而户部度支本司郎中侍郎判其事後度支復置使而户部職事度支兼之或以本司官判度支版使唐韋中宗朝為京尹節操清正為時圭表宣皇甚器重之因次對面許判户部韋公堅辭以不曉錢穀獲免歸謂甥姪曰已讓版使矣衆曰時論三司中户部最清何為多讓也公曰事不由宰相必謂我由徑而得誰能家至户到分辨哉節操清正為時圭表上三司中户部最清上判官國朝開寶四年殿中侍御史劉汝礪分判度支公事五年以殿中侍御史分判度支齊明為度支員外郎充度支判官淳化四年詔三司只置判官六員推官三員其三部屬吏並依舊三司使止書案檢外處符牒並令判官推官通書頒行十月置左右計司為十道判官五年置總計司判官十二月勅司令三司判官主判官推官等見判使並同南省郎中員外郎見尚書丞郎之儀凡有公事並須取禀判使商量不得專輙聞奏其月罷左右計使復置三部使每部置判官推官共四員各領兩案公事咸平六年八月詔度支户部二案公事繁簡不均宜令三司使酌其閒劇命判官六員分掌之治平元年以尚書都官員外郎三司修造案勾當公事張徽權發遣三司户部判官公事尚書都官員外郎知開封東明縣皮公弼權發遣三司度支判官公事特用資淺人欲乆其任而責效也三司之職廢乆矣由官以次遷而任用不乆也凡大官不利盈虚出入雖能者居之未及究其本末而已用次遷他職矣故相習以養資假途為說而不事其職時議患之至是中書奏請擇其尤繁要者五員用資淺人乆任其餘以待諸路轉運使提㸃刑獄為出入之湏于是以鹽鐵稅案度支錢粟案度支發遣案户部修造案及開拆司選初任通判一年以上人權發遣候及二周年令再任與理知州資序兩任通判及六周年且令依舊與理初任提刑資序三任通判及七周年與理第二任提刑資序出外如差第三任通判一年以上人權發遣候及三周年令再任與理初任提刑資序兩任通判及六周年且令依舊與理第二任提刑資序二任通判及九周年與三司判官願出外者與轉運副使故有是命四年八月詔三司乆任權發遣官五員許于知州人内通選如已經知州人候到任及二年即令再任與理提刑資序參預邦計國朝乾徳三年詔三司鹽鐵度支户部判官等乃以參預邦計莫不慎選時才若不考課定其黜陟則于功過無以昭明慎選時才上豫買紬絹東齋記事太宗時馬元弓為三司判官建言方春民乏絶時豫給庫錢貸之夏秋令輸絹于官預買紬絹蓋始于此推官巡官國朝初承舊制三司每部置判官一員至乾徳四年詔各增置推官一員總斷逐司公事仍别給印太平興國三年以磁州軍事判官張仲容為右贊善大夫户部稅案推官大名府夏津縣令朱澤為右贊善大夫充胄案推官懐州軍事推官鄭居中為將作監丞充麴案巡官邢州司冦參軍王式為將作監丞充末鹽案巡官先是三部所掌凡二十四案吏千餘人太宗屢使督察有所不及而商稅胄麴末鹽最為繁劇故擢仲容等分領之推勘官國朝治平三年罷三司推勘官初三司舉京朝官一人專領推勘事至是三司奏以為不便罷之然議者不以罷之為便熙寧二年九月復置管勾推勘官一員仍舉京朝官或幕職州縣官充勾當公事官國朝康定元年詔三司舉係通判資序朝臣二人充三司勾當公事治平二年八月以尚書比部員外郎王荀龍屯田員外郎周革並勾當三司修造案是職自来一員至是以雨水壊軍營官舍特增一員三年六月罷管勾三司使㕔簿籍尋罷熙寧二年九月復置管勾官一員勾院國朝初三部各有勾院止本部判官主之至開寶五年以鹽鐵户部勾院為一院度支勾院為一院太平興國五年合三勾院為一雍熙三年復分三部勾院淳化三年復為都勾院五年復分置先是分三司左右計各置判勾一員又以一員檢判之至是罷左右計復分置焉至道二年復併三勾院為一三年復分為三咸平六年陳堯咨上言三部勾院可合為一仍願就領其職因命之大中祥符九年分勾院為三時議以三部勾院並為一司實為繁劇雖重官為之徒益事勢於勾稽則愈疎矣至是復分為三選才力幹敏者為之募商入粟以易鹽國朝李士衡判三司勾院時度支使梁鼎奏借民力轉粟塞下而轉鹽于邊官自鬻之嵗得鹽鐵三十萬士衡以為民力困請依舊募商入粟以易鹽真宗是其言都磨勘司主轄收支司拘收司附國朝開寶七年以司農丞桑塤為左拾遺兼㸃檢三司磨勘司端拱二年詔置三司都磨勘司至道中又置提㸃三司公事尋廢其帳籍並歸都磨勘司淳化三年置主轄收支司咸平四年置拘收司並以判都磨勘司官領之理欠司勾簿司附國朝雍熙二年詔三部各置理欠司舊曰徵欠司乾興元年改為蠲納司天聖三年復改今名咸平元年又置勾簿司景徳四年廢憑由司國朝雍熙四年以鹽鐵推官胡惟一度支推官朱賦户部推官崔維翰分判本部慿由司太宗以天下倉場庫務中發錢草其數浩大故惟一等專主之不簽書本職公事淳化二年合三司慿由司為一至道二年併都慿由司歸理欠司開拆司國朝三部舊名有開拆司止本部判官兼領開寶五年以鹽鐵户部開拆司為一度支開拆司為一太平興國三年别置推官一員領之雍熙四年以三司開拆司推官右拾遺直史館韓國華判三司開拆司至道三年復加一員主判咸平元年省一員遂為定制又有勾鑿司行文帳生事催驅司催促未了文帳生事發放三司諸案牒帖受事司受諸處送到罪人衙司掌軍大將差遣並開拆司主判官兼領内衙司仍以諸司使或内臣一員同勾當淳化二年又有帳籍司四年並歸開拆司兼領河渠司國朝皇祐三年三司請置河渠一司專提舉黄汴等河堤功料事九月詔三司河渠司汴河每年一開濬之至和二年以殿中丞李仲昌都大提舉河渠司以仲昌知水利害特任之嘉祐三年詔置都水監罷三司河渠司提舉帳勾磨勘司國朝熙寧五年右正言知制誥直學士院㸔詳中書條例曾布言伏以四方財賦其為名物豈可勝計凡給納斂散盈耗多寡非有簿書文籍以勾考之則乾沒差繆漫不可知故内自府庫外至州縣嵗㑹月計以上於三司紙札之須賄賂之賚逺近之人以為勞敝三司雖有審覆之名而三部胥史所行職事非一不得專意於其間近嵗以來因循不復省閱其為弊亦已甚矣臣比被㫖置司盡取三司所管帳籍刪去繁冗具為法式以施之天下然勾考之法如故則亦但為空文臣欲乞于三司選人吏二百人專置一司委以驅磨天下帳籍以至三部勾院亦皆選置官吏責以審覆其人吏各優給請受課以功限立定賞罰仍自朝廷選差強幹臣寮專切提舉所合措置條約乞下詳定帳籍所詳具以聞詔付詳定帳籍所六年八月中書門下言新差提舉帳勾司院磨勘司李承之請降申陳事件詔行遣以提舉帳勾磨勘司為名九年十一月詔减罷令提舉在京諸司庫務司兼提舉三部諸司屬吏國朝景德元年九月宫苑使劉承珪等言奉詔與三司使同選閱三部及諸司節給前後并裁定合留人數三部并諸司定留八百九十七人鹽鐵百五十六人度支百八十二人户部二百一十七人三勾院百人都磨勘司三十四人都主轄支收司二十三人拘收司四十人都慿由司四十九人都理欠司四十六人開拆司五十人先是真宗以計司吏人能否雜混令承珪與本司使副同加試驗頗有書計非精或嘗負罪犯帝念其祗役嵗乆量其事狀並補三班及借職焉仁宗時有三司鹽鐵都勾押官段正鹽鐵商稅案前行陳祚商稅案後行王文禧等奏天下商稅併增併虧各五周年者並取一年高者為額從之嘗謂三司使副曰財榖之事此軰雖是胥吏却知本末苟有所長亦須採用不可以其賤吏而不聽其言上之寛仁納言如此孔目院都監國朝太平興國原缺八字鹽鐵孔目院都監周證為度支孔目院都監李秘為户部孔目院都監列在推官之下淳化五年分三部都監簽書本部諸案公事立在判官之下推官之上咸平五年詔三司都監宜差内品二人勾當孔目官國朝開寶七年以光祿寺丞崔宏充鹽鐵孔目官太僕寺丞徐元充度支孔目官少府監丞張玘充户部孔目官至道元年上召三司孔目吏李溥等對崇政殿問以計中書使押送中書限五日委令條奏上謂宰臣曰李溥等各令陳所見頗有所長朕嘗謂陳恕等曰文章徳古此盛事也案文章徳古句疑有誤職官分紀卷十三
