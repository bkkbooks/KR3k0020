body:
  text: 職官分紀巻二十二宋孫逢吉撰少府監少監附前漢百官表少府秦官掌山海池澤之税以給供飬應劭曰名曰禁錢以給私飬自别為藏少者小也故稱少府師古曰大司農供軍國之用少府以飬天子也有六丞屬官有尚書符節太醫太官湯官導官樂府若盧考工室左弋居室甘泉居室左右司空東織西織東園匠十二官令丞如淳曰若盧官名也主藏兵器又胞人都水均官三長丞胞與庖同又上林中十池監未詳其數又中書謁者黄門鈎盾尚方御府永巷内者宦者七官令丞諸僕射署長中黄門皆屬焉武帝太初元年更名考工室為考工左弋為佽飛居室為保宫甘泉居室為昆臺永巷為掖庭佽飛掌弋射有九丞兩尉太官七丞昆臺五丞樂府三丞掖庭八丞宦者七丞鈎盾五丞兩尉成帝建始四年更名中書謁者令為中謁者令初置尚書員五人有四丞河平元年省東織更名西織為織室綏和二年哀帝省樂府王莽改少府曰共工後漢百官志少府卿一人中二千石掌中服御諸物衣服寳貨珍膳之屬丞一人比千石太官令一人六百石掌御膳食左丞甘丞湯官丞果丞各一人守宫令一人六百石主御紙筆墨及尚書財用諸物及封泥丞一人上林苑令一人六百石主苑中禽獸頗有民居皆主之捕得其獸送太官丞尉各一人侍中常侍給事黄門侍郎並見本門小黄門六百石宦者無員掌侍左右受書事上在内宫闗通中外及中宫以下衆事諸公主及王太妃等有疾苦則使問之黄門令一人六百石董巴曰禁門曰黄闕以中人主之故號曰黄門令本注曰宦者主省中諸宦者丞從丞各一人本注曰宦者從丞主出入從黄門署長畫室署長玉堂署長各一人丙署長士人皆四百石黄綬本注曰宦者各主中宫别處中黄門冗從僕射一人六百石本注曰宦者主中黄門冗從居則宿衛直守門戶出則騎從夾乘輿車中黄門比百石本注曰宦者無員後増比三百石掌給事禁中掖庭令一人六百石本注曰宦者掌後宫貴人采女事左右丞暴室丞各一人本注曰宦者暴室丞主宫中婦人疾病者就此室治其皇后貴人有罪亦就此室永巷令一人六百石本注曰宦者典官婢侍使丞一人本注曰宦者御府令一人六百石本注曰宦者典官婢作中衣服及補浣之屬丞織室丞各一人本注曰宦者祠祀令一人六百石本注曰典中諸小祠祀丞一人本注曰宦者鈎盾令一人六百石本注曰宦者典諸近池苑園遊觀之處丞永安丞各一人三百石本注曰宦者永安北宫東北别小宫名有園觀苑中丞果丞鴻池丞南園丞各一人二百石本注曰苑中丞主苑中離宫果丞主果園鴻池池名在雒陽東二十里南園在雒水南濯龍監直里監各一人四百石本注曰濯龍亦園名也在雒陽城西南中藏府令一人六百石本注曰掌中幣帛金銀諸貨物丞一人内者令一人六百石本注曰掌中布張諸衣物左右丞各一人尚方令一人六百石本注曰掌上手工作御刀劍諸好器物丞一人尚書令尚書僕射尚書左右丞侍郎各見本門符節令一人六百石本注曰為符節臺率主符節事凡遣使掌授節尚符璽郎中四人本注曰舊二人在中主璽及虎符竹符之半者符節令史二百石本注曰掌書御史中丞見本門右屬少府本注曰賦屬少府者自太醫上林凡四官自侍中至御史皆以文屬焉承秦凡山澤陂池之税名曰禁錢屬少府世祖改屬司農考上轉屬太僕都水屬郡國考武帝初置水衡都尉秩比二千石别主上林苑有離宫燕休之處世祖省之并其職於少府每立秋貙劉之日輙暫置水衡都尉事訖乃罷之少府每六丞省五又省湯官織室令置丞又省上林十池監胞人長丞宦者昆臺佽飛三令二十一丞又省水衡屬官令丞長尉二千餘章和以下中官稍廣加甞藥太官御者鈎盾尚方考工將作監皆六百石宦者為之轉為兼副或省故録本官應劭漢官已見前漢百官表注漢官宰尹少府言别為収藏故曰少府南齊百官志少府置丞一人領左右尚方令各一人丞二人鍜署令一人御府東冶南冶平凖上林令各一人丞一人晉職官志少府與太后少府卿皆為列卿各置丞功曹主簿五官等員少府統材官校尉中左右三尚方中黄左右藏左校甄官平凖奚官等令左校坊鄴中黄左右藏納官等丞及渡江哀帝省并丹陽尹孝武復置自渡江唯置一尚方又省御府隋百官志梁以少府為少府卿是為夏卿置丞及功曹主簿少府卿位視尚書左丞置材官將軍左中右尚方甄官平水中署南塘邸税庫東西冶中黄細作炭庫紙官染署等令丞陳少府卿中二千石後齊太府寺掌金帛府庫營造器物統左中右三尚方左藏司染諸冶東西道署黄藏右藏細作左校甄官等署令丞左尚方又别領别局樂器器作三局丞中尚方又别領别局涇州絲局雍州絲局定州紬綾局四局丞右尚方又别領别局丞司染署又别領京坊河東信都三局丞諸冶東道又别領滏口武安白澗三局丞諸冶西道又别領晉陽冶泉部大􅣵原仇四局丞甄官署又别領石窟隋太府寺統左藏左尚方内尚方右尚方司染右藏黄藏掌冶甄官等署各置令二人丞四人煬帝分太府寺為少府監而但管京都市五署及平凖左右藏等凡八署京師東市曰都㑹西市曰利人東都東市曰豐都南市曰大同北市曰通逺及改諸令為丞唯市署曰令少府監正監從三品少監從四品各一人丞從五品二人統左尚右尚内尚司織司染鎧甲弓弩掌冶等署復改監少監為令少令併司織司染為織染署廢鎧甲弓弩二署唐職官志武德九年分將作監為少府監龍朔二年改少府監為内府監咸亨復舊垂拱元年曰尚方監左右尚方二署除方字太極元年増置少監一員六典少府監一人從三品梁班第十一品從第四陳因之後魏少府宗正太僕池尉司農鴻臚為之次卿第二品上太和末改少府為太府北齊不置少府其左中右三尚方司染諸冶及細作甄官等署並𨽻太府寺至隋煬帝大業五年始分太府為少府監置監一人從三品少監一人從四品後又改監為令少監為少令皇朝因為監龍朔二年改為内府監咸亨元年復舊光宅元年改為尚方監神龍元年復舊開元初分甲鏙弓弩别置軍器監十二年省軍器監其作並歸少府等又於北都置軍器監少監二人從四品下隋煬帝置一人皇朝因置二人龍朔咸亨光宅神龍並随監改復監掌百工伎巧之政令摠中尚左尚右尚織染掌冶五署之官屬庀其工徒謹其繕作少監為之貳丞四人主簿二人録事二人府二十七人史七十人計史三人亭長八人掌固四人中尚署令一人從六品上漢少府屬官有尚方令丞後漢一人其後分為中左右魏因之晉過江唯置一人哀帝以𨽻丹陽尹孝武復舊晉代掌造軍器宋髙祖踐阼以相府部配臺謂之左尚方而本署謂之右尚方令丞各一人武帝改右尚方曰御府又置中署隸右尚方齊置左右尚方令丞一人梁置左中右三尚方令其丞令並從九品其後廢中尚方陳因之北齊太府寺管三尚方隋開皇有内左右三尚方猶屬太府寺内尚方令二人正八品下掌諸織作煬帝分屬少府皇朝因置二人省方字開元十八年省一人升為從六品上丞四人從八品下梁位在七班之下為三品勲位隋置丞四人正九品下皇朝因之開元中升其品監作四人從九品下令掌供郊祀之圭璧及嵗時乗輿器玩中宫服飾雕文錯綵珍麗之制皆供焉丞為之貳其所用金木齒革羽毛之屬任所出州土修以時供送焉左尚署令一人正七品下梁班從九品隋開皇中並屬太府寺左尚令三人掌造車輦繖扇弓箭弩㦸器仗刀鏃膠漆竹木骨角畫素刻鏤䗶燭等皇朝置一人開元十八年為正七品下丞五人從八品下梁選部左尚方丞為三品勲位隋左尚方丞八人正九品下皇朝置五人開元十八年為從八品下掌供天子之五輅五副七輦三轝十有二車大小方圓華盖一百五十有六諸翟尾扇及大小繖翰辨其名數而頒其制度丞為之貳凡皇太后皇后内命婦之重翟猒翟翟車安車四望金根等車皇太子之金輅軺車四望車王公以下象輅革輅木輅軺車公主王外命婦一品猒翟車二品三品犢車其制各有差右尚署令一人正七品下隋屬太府寺令三人正八品下煬帝改隸少府焉皇朝因置令二人掌造甲冑兵裝刀斧鉞及皮毛雜作膠漆墨紙筆薦席等事開元十八年省一人陞為正七品下丞四人從八品下隋六人皇朝置四人開元十八年為從八品下監作六人令掌供天子十有二閑馬之鞍轡及五品三部之帳備其材革而修其制度丞為之貳凡刀劔斧鉞甲胄紙筆茵蓆履舄之物靡不畢供織染署令一人正八品上周禮九職嬪婦化理絲枲考工記理絲麻而成之謂之婦功後周有司織下大夫一人掌凡機杼之工隋煬帝置司織署令丞後并為織染署周禮天官有梁人冬官有設色之工五謂畫繪鍾筐㡛也韋昭辨釋名云平凖令主染有常平之法故凖而的之兩漢並隸司農晉平凖令有監染吏六人初𨽻司農後屬少府宋順帝名凖始改曰染署令齊復為平凖令北齊太府寺有司染署長秋等有染局丞後周有染工上士一人又有司色下大夫一人隋初有司染署後魏太府煬帝分屬少府大業五年合司織司染為織染署令二人皇朝置一人丞二人正九品上隋四人皇朝為二人監作六人令掌供天子皇太子及羣臣之冠冕辨其制度以供其職務丞為之貳天子之冠二通天翼善冕六大裘衮鷩毳絺𤣥弁二武皮幘二黒介平巾帽一白紗太子之冠三三梁逺遊進徳冕二裘𤣥弁一皮幘一平巾臣之下冠五逺遊進賢獬豸髙山却非冕五衮鷩毳絺𤣥弁二爵武幘三介平巾平巾縁凡織紝之作有十布絹純紗綾羅錦綺綢褐組綬之作五紐綬縧䋲纓綢線之作四綢縁絃綱練染之作六青絳黄白皂紫凡染大扺以草木而成有以花葉有以莖實有以根皮出有方土採以時月皆率其屬而修其職掌冶署令一人正八品周禮冬官攻金之工六謂築冶鳬㮚段桃也秦漢郡國出鐵者置鐵官長丞晉衛尉屬官有冶令丞掌工徒鼓鑄過江省衛尉而冶令始隸少府宋有東冶令丞南冶令丞齊因之舊東冶重西冶輕然則梁之西冶盖宋齊南冶也陳因之北齊太府寺有令丞後周有冶工中士一人有鐡工中士一人隋太府寺有令二人煬帝改屬少府令從八品上皇朝因之省一人丞二人正九品上監作二人令掌鎔鑄銅錢器物之事丞為之貳諸冶監各一人正七品下秦漢内史及諸郡國出鐵者置鐵官長丞晉令諸冶官庫各置督監一人宋書云江南諸郡縣有鐵者或置冶令或丞皆吴時置也齊梁有梅根諸冶令北齊諸冶有局丞隋皆置監監中有上中下三等皇朝因之掌鑄兵農之器以給軍旅屯田居人焉丞一人從八品上監作四人諸鑄錢監監各一人周禮泉府上士四人掌市之征布又司市以商賈阜貨而行布以泉府同貨而斂布國㓙荒札䘮則市無征而作布漢食貨志太公為周立九府圜法錢圜函方輕重以銖故貨寳於金利於刀流於泉布於布束於帛周景王鑄大錢文曰寳貨肉好皆有周郭秦兼天下銅錢文曰半兩重如其文漢興以秦錢重難用令人鑄榆莢錢文帝以錢益輕更鑄四銖錢文為半兩除盗鑄錢令使民放鑄及武帝初鑄三銖錢重如其文禁人盗鑄有司言三銖錢輕更請郡國鑄五銖錢文曰五銖周郭其質又以人多姦鑄令京師鑄官赤仄一當五其後赤銅錢又廢於是悉令郡國毋鑄錢専令上林三官鑄錢自武帝元狩三年初鑄五銖錢至平帝元始中成錢三百八十億萬餘王莽變漢制始造大錢徑寸二分重十二銖文曰大錢五百後又以多所改作及公孫述於蜀鑄錢人不便之故謡曰黄牛白腹五銖當復後光武除王莽所造復五銖錢靈帝鑄四出錢魏初専以粟帛為貨明帝復立五銖錢至西晉不改吴孫權鑄大錢一當五百文又鑄一當十錢蜀劉備鑄一當百東晉沈充鑄小錢謂之沈郎錢宋文帝又鑄四銖錢體完厚孝武四銖形小薄少帝鑄二銖錢謂之萊子錢又有綖環錢貫之以縷入水不沈南齊又用四銖梁武帝鑄二種肉好周郭文曰五銖重如其文又除肉郭謂之女錢百姓私用古錢有直百五銖錢太平百錢定平一百五銖稚錢五銖對文等號輕重不一普通中議罷銅錢鑄鐵錢陳初有梁末兩柱及鵞眼錢時雜用之文帝改鑄五銖宣帝又鑄大貨六銖後魏太和十九年鑄錢文曰太和五銖永安二年改鑄文曰永安五銖東魏齊文襄以錢文五銖名須稱實秤二文重五銖計百錢重一斤四兩二十銖北齊文宣帝鑄常平五銖重如其文周武帝布泉錢以一當五以五銖並行建徳中復鑄五行大布一當十宣帝又鑄永通萬國以一當千隋髙祖以天下錢貨不等更鑄新錢背面肉好皆有周郭文曰五銖重如其文每一千重四斤除二兩自漢至隋雖時或輕重皆用五銖皇朝武徳中悉五銖更鑄開元通寳錢乾封初又鑄乾封泉寳錢尋廢開元中以錢濫惡江淮尤甚有詔禁斷令御史往江漢間収歛納官鎔之其求稍廣州縣恐其錢數不充隨以好錢繼之自是百姓錢幣耗損御史坐是左遷舊法每一千重六斤二兩近所鑄者多重七斤錢文本歐陽詢所書錢官漢武帝初屬少府後屬水衡後漢屬司農魏晉以下或屬少府或屬司農皇朝少府置十鑪諸州亦皆屬焉及少府罷鑄錢諸州遂别令絳州三十鑪揚宣鄂蔚各十鑪盖鄧郴各五鑪洋州三鑪定州一鑪開元二十年千錢以六斤四兩為率二十六年宣潤等州初置錢監其復又詔出銅所在置監鑄開元通寳京師庫蔵皆滿天下盗鑄益起兩京錢有鵞眼古文綖環之類每貫重不過三四斤而剪鐵而緡之天寳十一年天下鑪九十九綘州三十揚潤宣鄂蔚各十盖郴皆五洋州三定州一每鑪嵗鑄錢三千三百緡役丁匠三千費銅二萬一千二百斤鑞三千七百斤錫五百斤每千錢費錢七百五十天下嵗鑄二十萬七千緡肅宗乾元元年經費不給鑄錢使第五琦鑄乾元重寳徑一寸每緡重十斤與開元通寳參用以一當十亦號乾元當十錢第五琦為相復命絳州諸鑪鑄重輪乾元錢徑一寸二分其文亦曰乾元重寳背之外郭為重輪每緡重十二斤與開元通寳參用以一當五十是時民間行大錢三而重稜者亦號重稜錢上元元年减重輪錢以一當三十開元舊錢與乾元當十錢皆以一當十史思明據東都亦鑄得一元寳錢徑一寸四分以一當開元通寳之百既而惡得一非長祚之兆改其文曰順天元寳代宗即位乾元重寳以一當二重輪錢以一當三而又改大小錢皆以一當一人甚便之其後民間開元重輪二錢鑄為器不復出矣貞元二十年復置桂陽監以兩鑪日鑄錢二十萬天下嵗鑄錢十三萬五千緡元和四年京師用錢緡少民間墊陌有至七十者穆宗即位京師鬻金銀十兩亦墊一兩擢米監百錢墊七文太和八年河東鑄錢復起鹽鐡使王渥置飛狐鑄錢院於蔚州天下嵗鑄錢不及十萬緡文宗時天下銅坑五十嵗採銅二十六萬六千斤許諸道觀察使皆得置錢坊昭宗末京師用錢八百五十為貫每百纔八十五河南府以八十為百云諸鑄錢監監以所在州府都督刺史判之副監一人上佐判之丞一人判司判之監事一人參軍及縣尉知之録事府史土人為之諸交市監監各一人從六品下漢魏以降沿邊郡國皆有交市與外國交易致其物産也並郡縣主之而不别置官吏至隋沿邊州置交市監視從八品副監視正第九品皇朝因之乞各隸所管州府監如至從六品下改副監為丞品第八下光宅中改為通事監後復為舊交市丞一人正八品下隋置交易副監皇朝改為交市監丞監各掌諸蕃交易之事丞為之貳國朝少府監掌百工技巧之事元祐官品令少府監從七品少監從六品儒學前漢武帝建元六年公孫賀以儒為少府詩武帝柏梁詩少府曰乗輿御物主治之箴揚雄少府箴曰實實少府奉飬是供經紀九品臣子攸同海内幣帑祁祁如雲家有孝子官有忠臣民以不擾國以不煩誡子無受財物歐陽地餘字長寳為少府誡其子我死官屬即送我財物慎無受汝為九卿儒學子孫以亷著可以成名其子從之天子聞而嘉焉賜錢百萬才茂行潔漢雜事薛宣為少府谷永上書宣才茂行潔以為御史大夫朝賀求璧不得後漢東平王蒼為驃騎正月朔朝㑹蒼當入賀故事少府給璧時陰就為少府貴傲不奉法漏將盡求璧不得時蒼掾朱暉適見少府主簿持璧乃往紿曰試請觀之既得而持奉之就復得以他璧朝云學義精明王恭字子然學義精明遷少府諸生自逺方至著録數千言當世稱為大儒也世稱大儒上三輔聞之感動張璠漢記太常种拂與李儒戰而死子邵徴為少府鴻臚皆不受曰我父盡忠於朝而為時所妬父以身殉國為賊臣所害為臣子不能除賊何面目復事明主三輔開之為之感動守法魏志王觀徙少府大將軍曹爽使材官張逹斫家屋材及諸私用之物觀聞之皆録奪以􅃿官少府統三尚方御府内蔵玩㺯之寶爽等奢放多有干求憚觀守法乃徙為太僕以天下為己任楊阜字義山為少府卿侃然以天下為己任撾吏魏略常林為少府當官甚嚴少府丞與鴻臚對門時崔林為鴻臚數數聞林夜撾吏聲不勝痛呼明日崔乃嘲林曰聞卿為廷尉耶林曰不也曰不為廷尉昨夜何故考囚乎林大慙徐生得無逆詐耶吴志先主遣少府徐詳至魏魏太祖謂詳曰孤今者若越横江之津與孫將軍遊姑蘇之臺獵長洲之苑吾志足矣詳曰欲奉至尊以令諸侯若越横江而遊姑蘇是踵亡秦而蹈夫差恐天下事去矣太祖曰徐生得無逆詐耶雨非大事不應告廟减榮緒晉書陳聆過江為少府卿時大旱經久天興四年四月始雨有司奏報賽宗廟山川中宗詔曰報賽非奉尊上辭也吾意有疑聆以為舊山川有祈報故雨應賽雨非大事不應告廟子無要君親之道凟祭稱賽於義有違從之求堪為王府長史唐開元初邠王府寮史有犯法者令左右求堪為王府長史者太常卿姜皦薦源乾曜公清有吏幹因召見與語乾曜神氣清爽對荅皆有倫序上甚悦之乃拜少府少監兼邠王府長史神氣清爽對答有序上収苑中菓菜唐尚方監裴匪躬檢校京苑將鬻苑中果菜櫂其利蘇良嗣駮之曰昔公儀相魯猶能拔葵去織未聞萬乗之主鬻果菜與下人爭利也匪躬遂止丞沿革見少府監門六典少府監丞四人從六品下漢置六人皆千石後漢置一人以眀法補魏晉因之宋齊梁陳皆一人梁班第四後魏一人從五品中隋煬帝分太府寺置少府監置丞二人皇朝加至六人龍朔咸亨光宅神龍並随監改復開元二十三年减二人掌判監事凡五署所修之物須金石齒革羽毛竹木而成者則上尚書省下所由司以供給焉國朝元祐官品令少府監丞八品海内豪傑梁劉孝標曰聞管輅天才英偉圭璋特秀實海内之豪傑豈曰卜祝之流而官止少府丞年四十八天之報施何其寡與以弟服去職范􅁮後漢書譙𤣥巴郡閬中人也遷少府丞以弟服去職奪錦袍以賞南龍門令累轉尚方監丞右奉宸内供奉扈從遊宴則天幸洛唐宋之問從官賦詩左史東方虬詩先成則天以錦袍賜之及之問詩成則天稱其辭愈髙奪虬錦袍以賞之主簿沿革見少府監門六典少府監主簿二人從七品下晉令少府置主簿二人宋齊因之梁主簿七班之中第三隋煬帝置一人皇朝加至四人龍朔咸亨光宅神龍並随監改復開元二十三年减二人掌勾撿稽失凡財物之出納工人之繕造簿帳之除附各有程期不如期者舉而按之國朝元祐官品令主簿從八品尚方令沿革見少府監門煌煌古之玉府後漢崔寔尚方令箴曰煌煌尚方古之玉府九貢是鍾百珍是聚玉以饗神珠以捍禦岡阜三金寔飾器械上下有章不虞有戒精工堅密為後世法宦者蔡倫字敬仲為尚方令監作秘劔及諸器械莫不精工堅密為後世法符節令沿革見少監府門應劭漢官儀符節令兩梁冠千石位次御史中丞領尚符璽四人環濟要略符節令掌天子璽符及節麾幢有銅虎竹使符中分之留其半付受為信符臣司節崔瑗符節令箴曰在尊曰璽在卑曰印防不可不審制不可無常如姬竊印晉鄙受殃符臣同節敢告不剛將作監少監前漢百官表將作少府秦官掌治宫室有兩丞左右中候景帝中六年更名將作大匠屬官有石庫東園主章左右前後中校七令丞又主章長丞武帝太初元年更名東園主章為木工成帝陽朔三年省中候及左右前後中校五丞後漢百官志將作監大丞一人二千石光武中元二年省謁者領之章帝建初元年復置本注曰承秦曰將作少府景帝改為將作大匠掌修飾宗廟路寢宫室陵園木土之工并樹桐梓之類列於道側丞一人六百石左右校令各一人六百石本注曰掌左右工徒丞各一人安帝復應劭漢官儀世祖中興以謁者領其官晉職官志將作大丞有事則置無事則罷南齊百官志將作大丞不常置掌宫廟土木有事權置兼官畢乃省齊職儀左右甄官置掌磚瓦之任少昊鶅雉氏摶埴之工謂陶官也漢將作大匠屬官有前後中甄官令丞各一人後漢安帝建元三年置左校令丞後秩六百石主工徒令置東西陶官隋百官志梁改將作大匠為大丞卿置丞有功曹主簿大丞卿位視太僕掌木土之工統左右校諸署後齊將作寺掌諸宫建造大匠一人丞四人亦有功曹主簿録事員若有營作則立將副將長史司馬主簿録事等各一人又領軍士副幢主副等後周曰匠師中大夫隋將作寺大匠一人丞主簿録事各二人統左右校署令各二人丞左校四人右校三人各有監作左校十二人右校八人開皇二十年改將作寺為監以大匠為大監初加置副監煬帝改大監少監為大匠小匠丞加為從六品統左右校及甄官署五年又改大匠為大監正四品少匠為少監正五品十三年又改監少監為令少令加至從五品唐百官志將作監監一員從三品少監二人從四品下掌土木工匠之政總左校右校中校甄官等署百工等監大明興慶上陽宫中書門下六軍仗舎閑廐謂之内作郊廟城門省寺臺監十六衛東宫王府諸廨謂之外作自十月距二月休冶功自冬至距九月休土功凡治宫廟太常擇曰以聞六典將作監大匠一人從三品左傳曰少昊氏五雉為五工正周禮冬官掌百工之職晉江左及宋齊並不常置梁天監七年置十二卿改將作大匠為大匠卿是為秋卿班第十品正第五陳因之後魏太和初從二品下二十二年降為從三品北齊因之後周有匠師中大夫一人掌城郭宫室之制及諸器物度量又有司木中大夫一人掌木工之政令隋將作寺大匠一人從三品開皇二十年改為將作監以大匠為大監煬帝改正四品十三年又改大監為令皇朝改置大匠小匠丞主簿等員龍朔元年改為繕工監咸亨元年復舊光宅元年改營繕監神龍元年復舊天寳十一年改大匠曰大監少匠二人從四品下後周有少匠師下大夫一人隋初將作無少匠開皇二十年改寺為監大匠為大監始置副監一人煬帝改為少監大業三年改少匠五年又改少匠為少監正五品十三年又改少令皇朝改置少匠工人龍朔咸亨光宅神龍随監改復天寳十一年改曰少監大匠之職掌供邦國修建土木工匠之政令總四署三監百工之官屬以供其職事少匠貳焉左校署令二人從八品下周官有攻木之工七謂輪輿弓盧匠車梓也秦官有左右前後中校五令丞後漢唯置左右校令丞各一人令六百石又有材官校尉魏并左校於材官晉過江省將作大匠而左右校隸少府又改材官校尉為左將軍罷左校宋齊梁陳又有左校令丞别置材官將軍司馬北齊大府寺有左校署令丞後周有掌材上士隋匠作領左校署令二人皇朝因之丞四人正九品下漢成帝省左右前後中五校丞後漢置左右校丞各一人秩三百石魏因之束晉隷少府宋齊梁北齊皆有丞後周有掌材中士二人隋左校丞四人皇朝因之監作十人從九品下令掌供營構梓匠之事致其雜材差其曲直制其器用程其工巧丞為之貳凡宮室之制自天子至於士庶人各有等差凡樂縣簨簴兵仗器械及喪葬儀制諸司什物皆供焉右校署令二人從八品下後漢安帝置左校令右校丞其後又置右校令魏因之晉少府屬官有左校無右校其職盖并於左校矣宋齊梁陳皆然北齊太府寺管左校亦無右校隋置右校署令丞掌營構土作之事皇朝因之丞三人正九品下後漢至陳並置北齊省隋右校署令三人皇朝因之監作十人令掌供板築塗泥丹雘之事丞為之貳凡料物支供皆有由屬審其制度而經度之中校署令一人從八品下漢五校皆有令丞自後不置皇朝因之丞三人正九品下漢成帝省皇朝復置監事四人令掌供舟車兵仗廐牧雜作器用之事凡行幸陳設供三梁竿柱閑廐繫飼則供剉碓行槽鞍架禱祠祭祀供棘葛竹墼内外營造應供給者皆主守之丞為之貳甄官署令一人從八品下周禮摶埴之工二謂陶與甄也後漢將作大匠屬官有前後中甄官令丞晉少府領之宋齊有東西陶官瓦署督令各一人後周有陶工中士一人掌為鏄彛簠簋等器隋太府統甄官署令皇朝改屬將作丞二人正九品下後漢前後中三甄官丞後周有陶上下士一人隋甄官丞二人皇朝因之監作四人令掌供琢石陶土之事丞為之貳百工就谷斜谷太陰伊陽監各一人正七品副監一人從七品下丞一人正八品上周禮山虞林衡並掌斬伐林木之事歴代皆有其官皇朝取其義而並置之斜谷監在鄠縣就谷監在盭厔縣百工監在陳倉太隂監在陸渾縣伊陽監在伊陽縣録事各一人監作各四人百工等監掌採伐林木之事辨其名物而為之主守國朝將作監掌城壁宫室橋梁街道舟車凡營造之事元祐官品令將作監從四品少監從六品經構宫室前漢揚雄將作大匠箴曰開閉將作經構宫室墻以禦風宇以蔽日寒暑攸除鳥鼠攸去主有宫殿民有宅居昔在帝王茅茨土堦夏卑宫室在彼溝池吏皆懐恩力作倍功魏霸徴拜將作大匠明年和帝崩興作慎陵時盛冬地凍中使督促數罰掾吏以屬霸霸修已不責而反勞之曰今諸卿被辱大匠過也吏皆懐恩力作倍功廵行病徒自省醫藥續漢書曹褒遷將作大匠明年時有疾疫廵行病徒自省醫藥糜粥死者减少視事五年省費億萬續後漢書應慎字仲華為將作大匠發摘衆姦皆極其刑豪滑之吏累迹視事五年省費億萬也豪滑之吏累迹上受一大錢劉寵拜㑹稽太守徴為將作大匠有老叟五六人持百錢送寵寵為一人受一文大錢勤苦賜秩馬延為將作大匠成帝以勤苦賜秩中二千石坐請托免張奮為將作大匠坐請托免推賢貢士李固遷將作大匠常推賢貢士工無虚張之繕鄧豹字伯遲遷大匠工無虚張之繕徒無飢寒之色躬親作功為士卒先謝承後漢書陳球字伯真拜將作大匠桓帝崩營陵寢球躬親作功為士卒先百工畢力省息十億餘萬汝南先賢傳應慎遷大匠發摘姦伏除藻飾之無用割有損之浮費所省息十億餘萬發摘姦伏上上疏省宫人魏志楊阜字義山為將作大匠明帝時初治宫室發美女充後庭阜上疏欲省宫人諸不見幸者乃召御府吏問後宫人数吏守舊令對曰禁密不得宣露阜怒杖吏一百数之曰國家不與九卿為密乎帝聞之而愈敬憚營造勤勞何法盛晉春秋王彬字世儒為大匠以營創勤勞賜闗内侯遷尚書右僕射掘地得古尺晉書將作大匠陳勰掘地得古尺上書奏曰今尺長於古尺冝以古為正潘岳以為習用己久不宜復改云勤濟稱㫖唐書姜行本為將作大匠太宗修元成洛陽宫行本總領之以勤濟稱㫖賞賜甚厚有所遊幸未甞不從虚費功力竇璡字之推為將作大匠修葺洛陽宫璡於宫中鑿池起山崇飾雕麗虚費功力太宗怒遽令毁之修奉弛慢王堪見太子賔客門調護之地若言嘉謀無足可紀將作少監楊務亷素以功巧用中興初袁恕己恐其更唘遊娱侈靡之端言於中宗曰務亷致位九卿積有嵗年矣若言嘉謀無足可紀每宫室營構必務其侈若不棄之何以廣昭聖德由是左授陵州刺史丞沿革見將作監門六典將作監丞四人從六品下漢將作有丞二人秩本六百石後漢置一人魏晉因之東晉宋齊有事則置無事則罷梁置一人班第三陳因之後魏從五品中太和二十二年第七品下北齊丞四人從七品上後周匠師上士一人隋將作丞二人從六品大業十三年加至從五品皇朝加丞至四人從六品下掌判監事凡内外繕造百司供給大事則聽制敇小事則俟省符以諮大匠而下於署監以供其職國朝元祐官品令將作監丞從八品下賜金千斤札賜將上崩後有一人騎馬馬異常持尺一作大匠文曰汝績克成賜汝金千斤因忽不見札乃變為金稱之有千斤主簿六典將作監主簿二人從七品下晉置主簿員江左有事則置無事則省梁復置一員七品班第三北齊將作寺有功曹主簿員若有營作又别立長史司馬主簿各一員隋二人皇朝因之掌印勾檢稽失凡官吏之申請粮料俸食差遣假使必由之以發其事若諸司之應供四署三監之財物器用違闕随而舉焉國朝元祐官品令將作監主簿從八品職官分紀卷二十二
