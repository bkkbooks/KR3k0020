body:
  text: 職官分紀巻四十三宋孫逢吉撰都䕶前漢百官表西域都䕶宣帝地節二年初置以騎都尉諫大夫使䕶西域三十六國有副校尉秩比二千石丞一人司馬二人應劭漢官儀西域都䕶武帝始開通西域三十六國其後稍分至五十餘國置使者校尉以領䕶之三年改曰都䕶令戊己校尉領之沈約宋書初漢武帝置西域諸國光武建武初始有督軍諸使至獻帝建安中魏武為相遣大將督之始號都督曹袁張楊之徒雖以三公假節領州郡然無都督之號三國時亦有都䕶左右䕶將軍兼諸將軍猶是舊制也國朝有都䕶之名府進鎮戍並廢職歸州縣六典大都䕶府大都䕶一人從二品副大都䕶一人從三品副都䕶二人正四品上漢宣帝時鄭吉為西域都䕶始立幕府都䕶之名自吉始也至章帝時廢西域都䕶令戊己校尉領之魏晉之間有都䕶左右軍都䕶將軍之號遂廢都䕶之名皇朝永徽中始置安南安西大都䕶景雲二年又置單于都䕶開元初置北庭都䕶今有單于副都䕶長史一人正五品上漢宣帝置西域都䕶長史一人自後不絶今單于則不置司馬一人正五品下漢武帝置䕶烏桓校尉䕶羌校尉各司馬二人元帝置戊己校尉亦置司馬一人皆都䕶司馬之任也録事㕘軍一人正七品上録事二人從九品上功倉户兵法曹參軍各一人並正七品下參軍事三人正八品下單于惟有兵倉二人上都䕶府都䕶一人正三品副都䕶二人從四品上長史一人正五品上司馬一人正五品上録事參軍一人正七品下録事二人史三人功倉户兵曹參軍各一人並從七品上㕘軍事三人從八品上都䕶副都䕶之職掌撫慰諸蕃輯寧外寇覘俟姦譎征討攜離長史司馬貳焉諸曹如州府之職威震西域前漢宣帝時匈奴日逐王欲降漢使人與鄭吉發渠黎龜兹諸國五萬人迎王四萬三千人小王將十二人隨吉至河曲頗有亡者吉追斬之將詣京師漢封日逐王為歸德侯吉既破車師降日逐威震西域遂并䕶車師以西北道故號曰都䕶都䕶之置自吉始焉上嘉其功乃詔曰都䕶西域騎都尉鄭吉拊循外蠻宣明威信封吉為安逺侯漢之號令班於西域始自張騫成於鄭吉萬里之外以身為本段㑹宗為人好大節矜功名與谷永相友善永閔其老復逺出予書戒曰足下以柔逺之令德復典都䕶之重職甚願吾子因循舊貫無求竒功萬里之外以身為本願詳思愚言功大賞小元帝時甘延夀與陳湯出西域郅支單于數困辱漢使湯與延夀謀曰郅支所在絶逺無金城强弩之守如發屯田吏士敺從烏孫衆共攻之足以成功延夀欲奏之湯曰國家與公卿議大䇿凡非所見必不從㑹延壽病湯獨矯制發兵延壽聞之欲止湯怒按劍叱延壽曰大衆已集豎子欲沮衆耶延壽遂從之部勒行陣即日引軍分行遂斬郅支單于頭送京師延壽封茂成侯湯闗内侯功大賞小為石顯匡衡所抑也建二銅柱鑱著唐德唐書馬揔為安南都䕶亷清不撓用儒術教其俗政事嘉美獠夷安之建二銅柱於漢故處鑱著唐德以明伏波之裔鎮將鎮副六典上鎮將一人正六品下鎮副一人正七品下魏有四鎮將軍之名晉宋以後皆因之惰有鎮將鎮副皇朝因之每防五百人為上鎮三百人為中鎮不及者為下鎮録事一人史一人倉兵曹㕘軍事各一人從八品下倉曹職同諸州司倉倉督一人中鎮將一人正七品上鎮副一人從七品上録事一人兵曹㕘軍事一人正九品下倉督一人下鎮將一人正七品下鎮副一人從七品下録事一人兵曹㕘軍事一人從九品下倉督一人鎮將鎮副掌鎮捍防守總判鎮事五代皆補親隨與縣令抗禮公事專達於州梁開平四年諸州鎮使不以官秩高卑並在縣令之下國朝建隆二年置縣尉主鄉村賊盗鎮將所主郭内而已仍統於縣兼領都虞候又有典主文案所由供役使無定數戍主戍副六典上戍主一人正八品下戍副一人從八品下宋書云劉德願為逰擊將軍領石頭戍事宋檀道濟以䕶軍領石頭戍事宋齊以下至隋皆有其官皇朝因之中戍主一人從八品下下戍主一人正九品下毎五十人為上戍三十人為中戍不及者為下戍戍主戍副掌與諸鎮畧同魚軒左傳狄人滅衞齊侯使公子無虧歸公乘為飾馬祭服五稱歸夫人魚軒注云車以魚皮瓜時而往及瓜而代左傳齊侯使連稱管至父戍葵丘𤓰時而往曰及𤓰而代不至乃作亂也樂宅戍盛𢎞之荆州記襄陽范蠡祠南七十里有晉河南尹樂廣宅周四十餘畆􅇮井猶未湮塞置邏其中即名為樂宅戍出白日插雲間辛昆江賦爾乃南陵峻峭崟嵓高閉嶄出白日樓插雲間所謂天險難升地險丘山高安戍桓温表上春築縣之赭圻城在江東岸臨當濡湏口上二十里建康宮三百三十里南有聲里北有高安戍高安戍者是孫權征合肥往來屯兵處也權常大積未穀於此備魏濡湏口五岳四瀆官六典五岳四瀆令各一人正九品上古者神祠皆有祝及祭酒或有吏者令蓋皇朝所置祝史三人齋郎三人並皇朝所置廟令掌祭祀及判祠事祝史掌陳設讀祝行置文案齋郎掌執爼豆及灑掃之事興國中以令録州官老不給治者為廟令判司簿尉為主簿由是不置丞亦有專置者景德中澶州别置河瀆廟亦令頓丘縣令掌廟之政今多統於本縣令京朝知縣者云管勾廟事主典無定數闗令丞津吏六典上闗令一人從八品上按周禮有司闗上士二人又有尹喜為闗令漢有寗成為闗都尉皆其職也隋代立制皇朝因之丞三人從九品上皇朝置録事一人府二人史四人典事六人津吏八人中闗令一人正九品下丞一人從九品下録事一人府一人史二人典事四人津吏六人下闗令一人從九品下府一人史二人典事二人津吏四人四靣闗有驛道為上闗無驛道者為中闗餘為下闗永泰元年中闗置津吏六人下闗四人無津者不置五代梁開平元年以潼闗險阻乃置潼軍使命虎州刺史兼領之其月改虎牢闗為軍仍置使國朝諸津各置監官一員凡文武臣寮諸軍將校等如欲遣人力徃川廣及沿邊但經歴闗津合用公慿者於本州請領不得私給職官分紀卷四十三
