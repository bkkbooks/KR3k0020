忠信以寛矣故其民不偷至於庭庭甚清閒諸下用命此明察以斷故其政不擾以此觀之但三稱善庸盡其美乎邑多壯士難治子路治蒲請見於夫子曰由願受教於夫子子曰蒲其何如對曰邑多壯士又難治也子曰然吾與爾恭而敬可以懾勇寛而正可以懐彊愛而恕可以容衆温而斷可以抑姦如此而加之以潔則為政不難矣為水備子路為蒲宰為水備與其民修溝瀆以其民煩勞也人以一簞食一壺漿孔子聞之使子貢止之子路不悦徃見孔子曰夫子以仁教而禁行由不受也孔子曰爾以為人飢何不白于君發倉廩以賑給之而私以汝食遺之是爾明君之無惠而見已之德美也速已則可不已則汝之見罪必矣得失非我無憂喜之色莊子肩吾問於叔孫敖曰子三為令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨奈何孫叔敖曰吾何以過人哉吾以其來不可却也其去不可止也吾以為得失之非我也而無憂色而已矣我何以過人哉美錦不使人學製左傳鄭子皮使尹何為邑子産曰少未知可否子皮曰愿吾愛之不吾叛也使夫徃而學馬夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛于子子于鄭國棟也棟折榱崩僑將壓焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則獲禽若未嘗登車射御則敗績壓覆是懼何暇思獲子皮曰善哉虎不敏吾聞君子務知大者逺者小人務知小者近者衣服附在我身我知而慎之大官大邑所以庇身也我遠而慢之㣲子之言吾不知也譽辭賞晏子春秋晏子為阿宰三年毁聞于國景公不悦召免之晏子謝曰嬰知過矣請復治阿三年而譽聞于國公將賞之辭而不受公問其故對曰昔者嬰之所治當賞而今之所治當誅是故不敢治賞即墨烹阿大夫史記見諸侯王門乘朱輪華轂蒯通説武信君曰今范陽令乘朱輪華轂投巫魏文侯時西門豹為鄴令鄭之三老廷掾常嵗賦斂百姓為河伯娶婦巫行視人家女好者云是當為河伯婦即聘取洗沐為治齋宫河上張緹綘帷女居其中如嫁女牀席令女居其上浮之河中始浮行數十里乃沒人多持女逺逃其所從來乆逺矣俗言不為河伯娶婦水來漂溺其人民豹曰至期幸來告吾亦徃送女至時豹徃㑹之河上三老官屬豪長父老皆㑹其巫老女已年七十從弟子女十人豹曰呼河伯婦來視其好醜即將女出帷豹曰是女不好煩大巫嫗為入報河伯待更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何乆也弟子趣之復以弟子一人投之河中凡三弟子豹曰巫嫗弟子女子也不能白事煩三老為入白之復投三老河中西門豹簪筆磬折嚮河乆待良乆曰嫗三老不來柰之何復欲使廷掾及豪長趣之皆叩頭血流乆之皆罷去鄴之吏民大驚恐自後不復敢言鑿十二渠西門豹發民鑿十二渠引河水利民人以富至漢之世而長吏以為十二渠橋絶馳道相近不可欲合渠水且至馳道合三渠為一橋鄴之父老不肯聽長吏以為西門君所為也賢君法式不可更也長吏終聽置之決漳水溉田西門豹為鄴令有令名及至文侯曾孫襄王時與羣臣飲酒王為羣臣祝曰令吾臣皆如西門豹之為人臣也史起曰魏氏之行田也以百畆鄴獨二百畆是田惡也漳水在其旁西門豹不知用是不智也知之不興是不仁也於是以史起為鄴令引漳水溉鄴以富魏之河内民利於賦田之法歌曰鄴有賢令兮為史公决漳水兮灌鄴旁終古舄鹵兮生稻梁注云一夫百畆番君前漢吳芮秦時番陽令也甚得江湖間心號曰番君吏道以法令為師薛宣子惠為彭城令宣從臨淮至陳留過其縣橋梁鄉亭不修宣心知惠不能留彭城數日案行舍中處署什器觀視園菜終不問惠以吏事惠自知治縣不稱宣意遣門下掾送宣至陳留令掾進見自從其所問宣不教戒惠吏職之意宣曰吏道以法令為師可問而知及能與不能自有資才何可學也衆人以宣言為然辭疾歸里汲黯遷滎陽令辭疾歸里官屬願留焦延壽為外黄令愛飬吏人當遷三老官屬上書願留天子詔増秩留之治劇尹賞舉茂才為栗邑令右馮翊薛宣奏言賞能治劇遷滎陽令治果有名薛宣大將軍王鳯聞其能薦之為長安令其治果有名謁府趨歩遲緩周堪嘗為縣令謁府趨步遲緩亭長譴之堪便解官印綬去不之官復仕至光禄勲蕭朱結綬王貢彈冠蕭育為茂陵令與陳咸朱博為友著聞當世徃者有王陽貢公長安為之語曰蕭朱結綬王貢彈冠言其相薦達也健令後漢馮魴遷郟令後車駕西征隗囂潁川盗賊羣起郟賊延褒等三千餘人攻圍縣舍魴率吏卒七十餘人力戰連日弩矢盡城陷魴乃遁去帝聞其反即馳赴潁川魴詣行在所帝按行鬬處知魴力戰乃嘉之曰健令也卧虎董宣為洛陽令搏擊豪彊莫不震慄京師號卧虎不欲奪農時周規為臨湘令時長沙太守程徐二月行縣敕諸縣治道規以方春農民多劇務不欲奪其時復於督郵規即委官而去徐憮然有愧色遣功曹賫印綬檄書還規輙開倉廪蘇章安帝時舉賢良為議郎數陳得失言甚直為武原令時嵗飢輙開倉廩活三千餘户專以德化為治魯恭為中牟令專以德化為治不任刑罰民訟田争累年恭為平理積薪雨至戴封為西華令大旱封禱請無獲乃積薪坐其上以自焚火起而暴雨至逺近嘆嗟以郡守非其人棄官去檀敷靈帝即位黄瓊舉方正對䇿合去旨補蒙令以郡守非其人棄官職典理人蔡邕上封事曰墨綬長吏職典理人蝗不入縣界卓茂為宻令勞心諄諄視人如子舉善而教口無惡言吏人親愛而不忍欺初茂到縣有所發置吏人笑之隣城聞者皆􅅓其不能數年教化大行道不拾遺平帝時天下大蝗河南二十餘縣皆被其災獨不入宻縣界光武初即位先訪求茂茂詣河陽謁見乃下詔曰前宻令卓茂束身自修執節淳固誠能為人所不能為夫名冠天下當天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封褒德侯三異魯恭為中牟令亭長從人借牛而不還牛主訟于恭恭召亭長敕令歸牛者再三猶不從恭歎曰是教化不行也欲解印綬去掾吏泣涕共留之亭長乃慙悔還牛詣獄受罪恭貰不問于是吏人信服建初七年郡國螟傷稼犬牙縁界不入中牟河南尹袁桑安聞之疑其不實使掾肥親徃亷之恭隨行阡陌俱坐下有雉過止其旁旁有童兒親曰何不捕之兒言雉方將雛親瞿然而起與恭語曰所以來者欲察君之政耳今蝗不犯境此一異也化及鳥獸此二異也豎子有仁心三異也乆留徒擾賢者爾還府具以政白安是嵗嘉禾生恭便坐庭中因上書言狀注便坐於便側之處非正室也力行清潔孔奮守姑臧令長時天下擾亂河西獨安而姑臧稱為富邑通貨羌胡市日四合毎居縣者不盈數月輙致豐積奮在職四年財産無増時天下未定士多不修節操而奮力行清潔為衆人所笑或以為身處脂膏不能以自潤徒益辛苦爾隴西既平河西守令咸被徴召財貨連轂彌竟川澤唯奮無資單車就路姑臧吏民及羌胡更相謂曰孔君清亷仁賢舉縣䝉恩如何令去不共報徳遂相與賦斂車受也馬噐物千萬以上追送數百里奮謝之而已一無所伏臘放囚虞延為洛陽令每至嵗時伏臘輙休遣徒繫各歸家並感其恩德應期而還有囚于家被病自載詣獄既至而死延率掾吏殯于門外百姓感之勤行德化路不拾遺鄭𢎞為鄒令勤行德化部人王逢等得路遺寶物縣于道衢求主還之魯國當春大旱五榖不豐鄒獨致雨徧熟永平十五年蝗起泰山獨鄒界不集减為父報讎者死鍾離意除瑕丘令吏有檀建者盗竊縣内意屏人問狀建叩頭服罪不忍加刑遣令長休建父聞之為建設酒謂曰吾聞無道之君以刃殘人有道之君以義行誅子罪命也遂令建進藥而死二十五年遷堂邑令邑人防廣為父報讐繫獄其母病死廣哭泣不食意憐傷之乃聽廣歸家使得殯斂丞掾皆争意曰罪自我歸義不累下遂遣之廣斂母訖果還入獄意宻以狀聞竟得以减死得寛猛之宜王渙為洛陽令以平正居身得寛猛之宜其􅁈嫌乆訟歴政所不斷者莫不曲盡情偽厭塞羣疑又能譎數發擿姦伏京師以為渙有神算及卒百姓追思為之立祠後連詔三公特選洛陽令皆不稱職永平中以劇令渤海任峻補之擢用文武吏皆盡其能糾剔姦盗不得旋踵威風猛于渙而文理過之以郡守非其人辭疾去巴肅為慎令以郡守非其人辭疾去一時良能任峻字叔髙循吏傳曰王渙任峻之為洛陽令明發奸伏吏端禁止一時良能除蝗戴封為西華令時汝陰有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境竒之雙鳬王喬顯宗時為葉令喬有神術每月朔望常自縣詣臺帝恠其來數不見車騎宻令太史伺之言其臨至輙有雙鳬從東南飛來於是候鳬至舉羅張之但得一雙舄焉乃詔尚方診視則四年中所賜尚書官屬履也殺公主蒼頭董宣為洛陽令時河陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乘宣于夏門亭候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宫訴於帝帝大怒召宣欲箠殺之宣以頭擊楹流血被面帝令小黄門持之使宣謝主宣不從彊使頓之宣兩手據地終不肯俯帝敕彊項令出賜錢三十萬由是搏擊豪彊莫不震慄京師號卧虎歌之曰桴鼓不鳴董少平蝗不集壽張界謝夷吾為夀張令時蝗發泰山流徙郡國薦食五糓過夀張飛逝不集猶古諸侯左雄曰今之墨綬猶古之諸侯注曰墨綬謂令長即古子男之國也誅破姦猾祭肜遷襄賁令時天下郡國尚未悉平襄賁盗賊公行肜至誅破姦猾殄其支黨數年襄賁清政百姓攀車劉寛除平陵令訓之以禮每滿官去百姓攀車拒輪充塞道路何時復來劉駒駼為渙陽令政化大行以病去官童謡曰悒然不樂思我劉君何時復來安此下民其見思如此吏畏而愛之不忍欺卓茂為宻令吏畏而愛之不忍欺也撫視百姓如視赤子鍾離意遷堂邑令輕刑慎罰視百姓如視赤子境内清夷王渙字稚子除温令縣多姦猾積為人患渙以方畧討擊悉誅之境内清夷商人露宿於道其有放牛者輙云以屬稚子終無侵犯魏十五城獨繁陽異政陳球為繁陽令時魏郡太守諷縣求納貨賄球不與之太守怒而撾督郵欲令逐球督郵不肯曰魏郡十五城獨繁陽有異政今受命逐之將致議於天下矣太守乃止素桮食麥飯謝承後漢書宋度為定陵令素桮食麥飯解囚棄官去周躬為櫟陽令有異政功曹萬良為父報讐庭中自械詣獄躬謂曰見惡不報非孝子也逃死於家非忠臣也今良忠孝即立解械放良棄官而去觧囚棄官載俱去王渙建康中補宛陵令到官一月汝南謝𢎞為師報怨於縣市中詣獄自繫南陽太守疾𢎞下獄將殺之渙傷其義勇而當伏辜請𢎞夜釋械棄官載俱去𢎞遂免遇赦並出也父老攀車泣涕千人𡊮珍字伯仁除六合令政教大行受臨湘令民父老攀車泣涕千人虎豹鷹鸇皆出境袁珍為六合令教人書虎豹鷹鸇皆出境猛獸逺逝趙瑶字元圭為緱氏令縣素有猛獸瑶到乃逺逝死乃知貧東觀漢記董宣為洛陽令搏擊豪彊在縣五年七十四卒詔遣使者臨視唯布被覆屍妻子對哭家無餘財上嘆曰董宣死乃知貧鸞鳥集於學宫王阜為香泉令吏民向化鸞鳥集于學宫克身儉約周澤字稚都為澠池令克身儉約妻子自親釜竈縣内獨不雹韓稜為下邳令視事先期民愛慕時縣皆雹傷苖稼稜縣界獨不雹東海相以狀聞上召入為尚書外戚斂手虞延為洛陽令時陰氏有客馬成常為盗延收考之陰就乃訴帝譖延多所寃枉帝乃臨御道之館親録囚徒延陳獄狀可論者在東無理者在西成乃欲赴東延執之謂曰爾之巨蠧乆依城社不畏熏燒今考實未竟宜當盡法成大呼稱枉帝知延不私謂成曰汝犯王法身自取之後伏誅於是外戚斂手追賊與車駕中五千施陽為懐陰之官道遇賊抄刼盡物賊去後車駕中尚有五千陽遣追賊與之即還問姓名謝而還物陽亦不受因付亭長非其好不之官楊賜為陳倉令以非其好不之官位極太尉服逺不以城陸康除髙城令縣在邊陲先是長史新到輙先修城以威逺近康曰常聞以德服逺不聞以城罷遣之枉者更直濁者彊清劉永國為東城令民聞其名枉者更直濁者强清肅然無事以牛刀割宰小縣漢名臣奏杜篤奏竊見臣師豫州茂才臨汾令葛龔論才比德方之徃昔以為龔抑亦吳季札鄭公孫僑之誠倫也龔以牛刀宰割小縣使不覊之士駑驥同皁可愍傷舞不可轉轉則勝人魏志陶謙除舒令郡守張磐同郡先輩與謙父友意殊親之而謙耻為之屈嘗私還入與謙飲晏或拒不為留嘗以舞屬謙謙不為起因强之及舞舞又不轉磐曰不當轉耶曰不可轉轉則勝人治為三輔第一張暨舉茂才除新豐令治為三輔第一育男鄭為名鄭渾為臨邛令天下未定民皆不念産業其生子無以相活率皆不舉渾所在大集其魚獵之具課使耕種又兼治稻田重去子之法民初畏罪後稍充足有舉育男鄭為名吏畏而愛倉慈字表仁為長安令清約有方吏畏而愛單歩之官崔林字徳孺除鄔令貧無車馬單步之官去官留犢魏畧時苖壽春令始之官㹀牛生一犢及去謂主簿曰令來時本無此犢是淮南所生也起徒中楊沛為長社令時曹洪賔客在縣界豪横不敢加法沛至先撾折其脚遂殺之由是太祖以為能起徒中復為鄴令為一州諸城之首蜀志吕乂遷新都緜竹令乃心𨼆恤百姓稱之為一州諸城之首遺愛在民荀朂為安陽令遺愛在民生為立祠非百里才龎統字士元守耒陽令在縣不治魯肅遺先主書曰龎士元非百里才使處治中别駕方始展其驥足户口千倍晋書范廣為唐邑令時旱來貴廣散私穀賑飢人至數十斛逺近流寓歸投之户口千倍考滿之外量留二年夀張令張廣考滿之外量留二年縣有明君不能無慙心閻憲為剡縣令禮讓為首寛猛相濟其聴察甚簡吏職甚得人助有男子杜成夜得遺裝一囊開視有錦二十五疋及明詣吏曰縣有明君不能無慙心故也蝗不入茂陵楊球為茂陵令寛和多惠以至誠接下為民所愛比縣連嵗蝗災不入茂陵負才氣潘岳出為河陽令負才氣鬰鬰不得志有文武大才或謂孫秀曰李含有文武大才無以資入秀以為東陽令河陽一縣花潘岳為河陽令縣樹桃李花人號曰河陽一縣花朝野歎其屈夏侯湛為野陽令以䘏𨼆為急而緩於公請政清務閒優㳺多暇居邑累年朝野多歎其屈除中書侍郎課入踰常年劉超為句容令推誠於物為百姓所懷常年賦税主者常自内出結評百姓家資至超但作大函村别付之使各自書家産投函中訖送還縣百姓依實投上課輸所入有踰常年神君喬智明為隆慮令縣民愛之號為神君題閣道畨岳出為河陽令時尚書僕射山濤領吏部王濬裴楷等並為帝濟所親遇岳内非之乃題閣道為謡曰閣道東有大牛王鞅裴楷鞧和嶠刺促不得休五斗米折腰陶濳為鎮軍建威參軍事謂朋舊曰􅂓欲弦歌以為三徑之資可乎執事者聞之以為彭澤令在縣公田悉令種秫榖曰令吾常醉於酒足矣妻子固請種秔請二頃五十畆種秫五十畆種秔郡遣督郵至縣吏白應束帶見之潛歎曰吾不能為五斗米折腰於鄉里小兒乃解印去而賦歸去來辭配食縣社陸雲為浚儀令到官肅然下不能欺市無二價一縣稱為神明及去官百姓追思之圖其形像配食縣社吏人望柩設奠干寶晉記劉璠為江夏令及卒百姓如喪父母兄弟將歸家不受祭吏人徃徃相聚於道側望柩設奠以酧之百姓留於道路孔奕為全椒令治有惠化以母病休官慈親百姓留於道路及卒市中人若喪新嵗放囚臧榮緒晉書曹攄除臨淄令有重囚䧟大辟未及就戮嵗暮攄行獄見之悽然問有何親戚答曰有父母攄乃慨然曰新嵗人情所重豈不欲暫見家當如期還獄否衆囚皆泣涕曰若得持訣死且無恨攄於是開獄出之至日相率而還自言能治劇縣晉中興書華譚所友袁甫大安中甫入洛詣中領軍何朂自言能治劇縣朂曰君子法應多宜可以為格稻食中之好而不可以為韲是以孔子曰其使人也噐之茍非大才何能悉備於事朂無以難之而心不能平由是逰京輦無所得乆之除松滋令名父之子屈臨小縣王述補宛陵令頗受贈遺而修家具為州司所檢有一千三百條王導使人謂之曰名父之子屈臨小縣甚不宜爾述自是稍止時人未之達也及屢居州郡清潔絶倫禄賜皆散之親故宅宇舊物不革於昔始歎服之崇學敦教范甯為餘杭令興學校飬生徒㓗已修禮志行之士莫不宗之朞年之後風化大行中興以來崇學敦教未有如甯者也屈志百里李充嘗歎不過殷揚州知其家貧謂曰君能屈志百里不答曰北門之歎乆似上聞窮猿奔林豈能擇木遂就剡縣令發姦擿伏所在如神王隠晉書李慈為成都令發姦擿伏所在如神驗妻殺夫陸雲為浚儀令人有見殺者主名不立雲録其妻而無所問乃為遣出宻令人隨後謂曰其去不出十里當有男子候之與語便縛來既而果然問之其服云與此妻共殺其夫聞妻得出欲與語憚近縣故遠相要候於是一縣稱為神明稱為神明上婦殺夫首服吳録張舉為章句令有婦殺夫因焚屋言燒死其弟訟之舉開屍口視其灰令人取狗二頭殺一生一而俱焚之開視其口所殺者無灰生者有灰乃明夫殺死婦遂服焉發擿姦伏號曰神君宋書顧憲之為建康令時有盗牛者被主所認盗者亦稱已牛前後令莫能决憲之至覆其狀謂二家曰無為多言吾得之矣乃令觧牛任其所去牛逕還神明本主家盗者始伏其罪發擿姦伏多如此類號曰近世令長莫能及傅佐有吏才再為山陰令甚有能名近世令長莫能及也人肝代米沈巑之為丹徒令性踈直自以在縣清亷不事左右浸潤日至遂鏁繫尚方歎曰一見天子足矣上召問曰復何陳答曰臣坐清以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人為誰巑之雖危言上亦不責後知其無罪重除為丹徒令入縣界吏人候之謂曰我今重來當以人肝代氷不然清名不立不飲酒為第一䇿劉𤣥明為山陽令政為天下第一傅翊代𤣥明為令曰願以舊政告新尹𤣥明曰作縣令唯日食一升飯莫飲酒此第一䇿日食一升飯上按十嵗偷割稻者孔琇之有吏能為吳令有小兒年十嵗偷刈鄰家稻一束琇之付按罪或諌之琇之曰十嵗便能為盗長安所不為縣中皆震肅天才沈憲為山陰令政聲大著孔珪謂人曰沈令料事是天才清美顧憲之為建康令性清儉强力為政甚得人和故都下飲酒得醇㫖輙號為顧建康謂其清且美也晝日垂簾顧愷之為山陰令山陰劇邑三萬户前後官長晝夜不得休事猶不舉愷之御繁以約縣因無亊晝日垂簾門皆閉寂自宋世為山陰務簡而事理莫能尚也務簡事理上諸傅有治縣譜齊書傅琰為山陰令父僧祐亦為山陰令父子並著竒績世云諸傅有治縣譜子孫祖傳不以示人父子並著竒績上縣稱神明傅琰為山陰令有賣針賣糖老嫗争團絲來詣琰不辨乃縛絲於柱鞭之宻視有鐡屑乃罰賣糖者又二野父争雞琰各問何以食雞一人云粟一人云豆乃破雞得粟罪言豆者縣稱神明無復有盗也代貧民輸租何敬叔為長城令有能名在縣清亷不受私遺夏節至忽榜門受餉數日中得米二千餘斛他物稱是悉以代貧民輸租置獄丞建元三年以山陰大邑訟獄繁滋别置獄丞與建康為比焉留犢贈後人陳陰鏗罷故韋縣詩曰秩滿三秋暮舟虛一水濵漫漫遵歸道悽悽對别津晨風下散葉岐路起飛塵長岑舊知逺莱蕪本自貧囊橐憎俗吏征徭不累民唯有留一犢相持贈後人市人皆泣樂預為永安令卒官時有一嫗年六七十擔槲葉造市聞預亡嫗大哭棄其葉於溪中曰失樂令我軰孤獨老姥亦就死爾市人亦皆泣其化如此挂冠縣門梁蕭肺素為諸暨令到縣十餘日挂衣冠於縣門而去放囚還家過節復獄傅岐除始新令縣民有因鬬相毆而死者死家訴郡郡録其仇人考掠備至終不引咎郡乃移獄于縣岐即令脱械以和言問之便即首服法當償死㑹冬節至岐乃放其還家獄曹掾固争曰古者有此今不可行岐曰其若負信縣令當坐主者勿憂竟如期而至太守深相歎異遽以狀聞岐後去縣民無老少皆出境拜送啼號之聲聞於數十里决諸縣疑滯蕭景為永寕令永嘉太守榜門曰諸縣有疑滯可就永寕縣令夬之自縣令為近畿大郡何逺自武昌太守除名後起為武康令正身勵節除淫祀武帝聞其能擢為宣城太守自縣令為近㡬大郡近代未之有御煩以簡獄無繫囚孫謙為錢塘令御煩以簡獄無繫囚及去官百姓以謙在職不受餉遣追載縑帛以送之謙却而不受在縣不行鞭罰裴子野出為諸暨令在縣不行鞭罰民有訟者示之以理士庶駭怨沈瑀為餘姚令富吏鮮衣美服以自彰别瑀怒曰汝等下縣吏何因擬貴人即悉使著芒履麄布侍立終日足有蹉跌輙加榜捶瑀微時常至此鬻瓦噐為富人所辱故因以報焉由是士庶駭怨教民種桑柿梨栗沈瑶為建德令教民一丁種十五株桑四株柿及梨栗女半之人咸歡悦頃之成林猛獸渡江庾黔婁為編令治有異績先時縣多猛獸暴黔婁至猛獸皆渡臨沮界時以為化所感小縣遷大縣武帝毎選長吏務簡亷平皆見於前親朂政道小縣有能遷為大縣令大縣有能遷為二千石於是山陰令丘仲孚有異績以為長沙内史武康令何逺公清以為宣城郡守為吏者徃徃成風焉投幘卞延之弱冠為上虞令㑹稽太守孟覬以令長裁之延之憤不能容脱幘投地曰我所以下卿者正為此幘耳今已投之卿矣遂拂衣而去南獄武帝詔建康縣置三官與廷尉三官分掌獄事號建康為南獄廷尉為北獄設糗水待太守何逺為武康令太守王彬廵屬縣皆盛供帳以待焉至武康逺獨設糗水而已彬去逺送至境進斗酒雙鷄而别書鼓孫抱為延陵令廣陵髙爽詣之抱無故人之懷爽出從縣闕下過取筆書鼓曰身有八尺圍腹無一寸腸面皮如許厚受打未渠央二傅一丘丘仲孚為山陰令甚有聲稱百姓謡曰二傳沈劉不如一丘前世傅琰父子沈憲劉𤣥明相繼宰山陰並有政績言仲孚皆過之撥煩丘仲孚為山陰令長於撥煩善適權變吏人敬服號稱神明政為天下第一亷儉有幹用宋書禇玠山陰縣多豪猾前後令皆以贓汚免宣帝患之謂中書舍人蔡景歴曰稽陰大邑乆無良宰卿文士内試思其人景歴進曰褚玠亷儉有幹用未審堪其選否帝曰甚善卿言與朕意同乃除山陰令答書云髙晉陵廣陵髙爽博學多才劉奮為晉陵令爽經途之日了不相接爽甚銜之俄而爽代奮為縣遣迎贈甚厚受餉答書云髙晉陵人問其所以答云劉奮餉晉陵令爾何闗爽事政教清平為三河表胡紹為河南懷令三日一視事十日一詣倉以俸米炒作乾飯食之不設釜竈得一强盗問其黨與得數百人皆誅之政教清平為三河表威振京師後魏宋飜為河陰令慎陽公主家奴恃勢多不法飜將兵圍主宅執主婿馮穆步驅向縣時正炎署立之日中流汙霑地於是威振京師數日釋繫囚百餘人北齊書郎茂除衛國令時有繫囚二百茂親自究審數日釋免者百餘人歴年詞訟不詣州省魏州刺史元暉謂曰長史言衛國人不敢申訴者畏明府耳茂曰人猶水也法令為隄防隄防不固必致奔突茍無决溢使君何患暉無以應良令韓子晉君問趙武曰中牟三國之股肱邯鄲之肩髀也寡人欲其良令也令空誰可使者趙武曰邢伯可公曰伯子之仇也對曰私仇不入公門曰中牟之令空誰使而可曰臣子可故曰外舉不避讐内舉不避子内外舉不避上立官長以為官慎子立國君以為國也非立國以為君也夫以立官長以為官也非立官以為長也釣法説苑子賤為單父宰行過於楊畫曰亦有以送僕乎畫謂子賤曰吾少也賤不知法治民之術唯有釣道二焉請以送子夫落餌投綸迎而吸之者陽鱎也其魚肉薄而不美若存若亡若食若不食者魴也魚為肉厚而味美子賤曰善未至單父冠盖迎之者交接於道子賤曰驅之夫陽畫所謂陽鱎者至矣於是至單父請其耆老尊賢者而與之共治任人任力子賤為單父宰鳴琴不下堂單父治巫馬期為單父宰戴星出戴星入任力以身親之單父亦治子賤曰子之謂任力我之謂任人者固勞任人者固逸有善績子竒年十八齊使為東阿宰有善績必能治阿新序子竒年十八齊君使之治阿既行悔之使使追之未至阿還之已至勿還也使者及而不還君問其故對曰臣見所與共載者白首也夫以老者之智為少者之輔必能治阿矣是以不還慈君崔鴻十六國春秋北凉録張澤為和寧令政以德化為理不務威刑以孝經忠臣孝子傳以訓導之百姓愛之如父母號曰慈君治為百城最前凉録張璽字公瓛除福禄令太始末河西亂白骨散野璽收塟千餘人以仁化著聞遷姑臧相以私禄市牛三百頭散給貧民治為百城最政教嚴明後趙録王謨齆鼻言不清暢又短無威儀將拜曲陽令石勒短之問長史張賔賔曰請試可勒從之政教嚴明甘露降㕔事後趙録申録為廣昌令白鳥巢其庭樹甘露降其㕔事後為三公試以一縣三十國春秋王鸞身長九尺腰帶十圍燕王德見竒之賜之以食一進斛餘德驚曰向所噉如此非耕能飽但才貎不堪為貴人以一縣試之於是拜逢陵令甚有異績蝗不入濟陽寒朗字伯竒為濟陽陽令時縣多蝗不入濟豪右挫氣鍾岏良吏傳司馬雋補洛陽令豪右挫氣京師號曰卧虎襁負者五千餘家韓纂為廣昌令縣先荒旱吏民離散纂行恩澤遂遷縣城去險家即夷得民歡心不一月隣縣襁負至者五千餘臈節聼囚還家王長文為江源令臘月呼囚云教化不厚使汝等如此長吏之過也明日臘節聼囚還家吏争請乃遂本意俄有大赦莫不懷感去官百姓號哭戴昭字公超為延陵令恩威宣著以病去官百姓號哭如嬰兒失母以憂去職寒朗字伯竒為濟陽令以憂去職百姓思之百姓詣府乞留韓纂為廣昌令當代百姓詣府乞留政平化行第五訪字仲謀補新都令政平化行三年之間鄰縣歸之户口十倍遷張掖太守嵗臘合境祀韋順字叔文為平興令卒吏民為立廟縣城中嵗臘合境祀焉路不拾遺卧不閉門華陽國志王渙為河陽温令路不拾遺卧不閉門民歌之曰王稚子世未有平徭役百姓喜立文學景毅為髙陵令立文學以禮讓化民殞霜殺穀鄒獨無災㑹稽典録鄭𢎞為鄒令殞霜殺穀鄒獨無災政無雙徐𢎞字聖通為汝陰令縣俗剛强大姓兼并𢎞到官鉏姦桀豪右斂手商旅露宿道不拾遺童歌之曰徐聖通政無雙平刑罰姦宄空惜損一夫周規為臨湘令長沙太守丹陽徐杭二月行縣以道穢勒縣除之規以方農作時惜損一夫拒不肯除遂棄官而去邑贈送者萬人鍾離意為康邑令有詔徴公車縣人陳張送意到洛陽過潁陽太守問汝君與太守孰賢張曰明府之徴邑贈送者萬人男子攀車於路女人號哭於室以此觀之殆不及也置水投書魯國先賢傳孔翊為洛陽令置水庭前得囑託書皆投水中一無所發貴戚斂手楚國先賢傳祝良為洛陽令貴戚斂手枹鼓稀鳴百姓稱神明海内先賢傳公沙穆遷𢎞農令縣界有蝗食稼穆設壇謝曰百姓有過必在典掌罪穆之由請以身禱于是𤣥雲四集雨下滂沛自日中至晡不知蝗蟲所在百姓稱曰神明一縣稱平廣州先賢傳黄豪除外黄令約已節儉粗衣蔬食所得俸悉賜貧民當時鄰縣蝗為災獨外黄無之嵗皆豐熟一縣稱平政治清明號神君汝南先賢傳黄浮為昌盧長濮令同嵗子為都掾犯罪當死二郡望浮為之歌曰周公誅二弟石碏討其子今雖同嵗子浮所不能赦政治清明號為神君不仁不義焉可為君長陳畢除涇令民有遺腹子年十五為父報仇吏捕得之畢愍然曰嗟乎今殺遺腹之孤絶人之繼是不仁也法復讐之子是不義也不仁不義焉可以為人君長哉遂觧印綬將遂亡遇赦而出夜不閉門繋牛馬道旁羅衘字仲伯為萬年令誅鉏姦黨縣界肅然夜不閉門繫馬牛道旁曰付羅公暴身雨降長沙耆舊傳祝良為洛陽令亢旱天下祈雨不得良乃暴身階庭誠告引罪紫雲㳫起甘雨乃降積薪降雨桂陽先賢傳張意字季智為平陽令時大旱意積薪將自焚即降甘雨縛暴虎不用尺繩鍾離意别傳遷東平瑕丘令男子兒直勇悍有力三日一飯十觔肉五㪷米飯使弓弩飛射走獸百不脱一桀悖好犯長吏意到官公署捕賊掾勅謂之曰令當破三軍之衆不用尺兵當縛暴虎不用尺繩但以食詐偽之肉掾之風勢焉若也宜慎之因復直直子涉在門下將逰徼私出入寺門無所闗白收涉鞭之直走之寺門言無上下意勅為子屈者自縛謝令不便鞭殺其子直果自縳意告曰令前語汝當縛暴虎不用尺繩汝自視何如虎自縛耶勅械直父子結連頭對榜之將死掾入陳謝乃貰之由是相師為善所謂上德之政鷹化為鳩暴虎成貍也天降神明君崔氏家傳瑗為汲令開溝溉稻薄瘠之地皆為沃壤民賴其利長老歌之曰天降神明君錫我慈仁父臨民布德澤施恩於以序穿溝廣溉灌决渠作甘雨為政以德荀氏家傳藐字公然除太原榆次令為政以德民懷之時有鳯凰集其境内晉武帝下詔褒美民仰之如日月敬之如神明愛之如父母樂之如時雨䟽導原隰用致豐年殷氏家傳褒為滎陽令先多淫雨百姓飢饉褒乃穿渠入河三十餘里䟽導原隰用致豐年民賴其利號殷溝民頌之騎驢入市梁太清實録周𢎞正常為曲阿令騎驢入市髙祖以此薄之莅任明察人不能欺梁湘東王繹孝德傳劉虬為當陽令蒞任明察人不能欺大蝗經界飛去蕭廣濟孝子傳許武為湖陰令永平中大蝗經湖陰界飛去不入愛民如子許武為湖陰令愛民如子遇人如子劉矩字淑文除雍丘縣教其子弟時有訟民不加刑宻呼曉諭縣人各自勉勵境内大治競修操行咸相約束曰遇人如子何可犯之悉改從新煮桃偶人劉敬叔異苑萬亮為永康令嚴刻人憚之乃以桃木刻作亮身燒柴煮湯火熾桃人自鼎跳出飛蝗不集搜神記徐栩為小黄令時屬縣大蝗野無生草過小黄界飛過不集政為三輔最隋書蘇武薦房恭懿授新豐令政為三輔最上聞而嘉之賜物四百段非百里才陸令和弟為汧令以恪非百里才上表陳讓朝廷許之食艾食葱屈突通為車騎將軍奉公正直雖親戚犯法無所縱捨時通弟盖為長安令亦嚴整知名時人為之語曰寧食三斗艾不見屈突盖寧食三斗葱不見屈突通縛牛主張允濟大業中為武陽令元武縣與其隣接有人以㹀牛依其妻家八九年牛孳産至十餘頭及將異居妻家不與縣司累政不能决其人詣武陽質於允濟允濟遂令縛牛主以衫蒙其頭將詣妻家村中云捕盗牛賊召村中牛悉集各問所從來處妻家不知其故恐被連及指其訴牛曰此是女婿家牛也非我所知允濟遂發蒙謂其妻家人曰此即女婿可以牛歸之妻家叩頭服罪元武縣司聞之大慙路不拾遺張允濟為武陽令有行人候曉光發遺衫於路行數十里方覺或謂之曰我武陽境内路不拾遺但能回取物必當在如言果得逺近稱之慈父唐書房彦謙遷長葛令甚有惠化百姓號為慈父仁壽中上令持節使者廵行縣察長吏能不以彦謙為天下第一起授邵州司馬吏民號泣相謂曰房明府今去吾屬何用生為其後百姓思之立碑頌德百姓立碑頌德上母子相訟取孝經習讀韋景駿為肥鄉令縣有母子相訟景駿謂之曰吾少孤每見人飬親自痛終天無分汝幸在温凊之地何得如此錫類不行令之罪也因垂泣嗚咽乃取孝經付令習讀由是母子感悟各請改悔誠信化人元德秀為魯山令先是墮車傷足不任趨拜汝郡守以客禮待之部人為盗吏捕之繫獄㑹縣界適有猛獸為暴盗自陳曰願格殺猛獸以自贖德秀許之胥吏曰盗詭計茍免擅放官囚無乃累乎德秀曰吾不欲負約累則吾坐必請不及諸君即破械出之翌日格殺猛獸而還誠信化人大率如此秩滿南逰陸渾見佳山水杳然有長徃之志乃結廬山阿彈琴讀書怡然自得既卒門人相與諡為文行先生士大夫髙其行不名之謂之元魯山殺十牛解神并斬諸刼王敬則為暨陽令時軍荒後縣有一刼帥匿山中為人患敬則遣人致意刼帥使出首當申論郭下廟神甚酷烈百姓信之敬則引神為誓必不相負刼帥既出敬則于廟中設酒㑹於坐收縛曰吾啓神若負誓還神十牛今不得已違誓即殺十牛解神并斬諸刼百姓悦之職在字人大厯中秋霖害稼京兆尹奏畿縣多損田判度支韓滉執奏不實乃命御史覆之渭南令劉藻曲附滉言所部無損户部分廵御史覆檢與藻合代宗覧奏以為水旱咸均不宜渭南獨免申命御史朱敖再檢渭南損田三千餘頃上謂敖曰縣令職在字人不損猶宜稱損損而不聞豈有恤人之意耶卿之此行可謂稱職乃貶藻百姓號為神明馮元常為清漳令政有殊績百姓號為神明又歴浚儀始平二縣皆單騎赴職未常以妻子之官所乘馬午後則不與芻秣持躬儉約身及奴僕每日一食而已單騎赴職上均俸丞尉髙志周為貴縣令與丞尉均分俸錢政化大行人吏刋石以頌之四絶李韋為魯山令元德秀墓碑顔真卿書李陽冰篆額後人争模冩之號為四絶焉擇於臺省崔縱為監察御史詔擇令長於臺省除藍田令寛民勤幹德行大化縣人為之立碑頌徳也繕理廨宇房琯歴慈溪東城濟源令所在為政興利除害繕理廨宇頗著能名宦官請託命拽出李朝隠為長安令有宦官閻興貴詣縣請託朝隠命拽出之睿宗聞而嘉之乃下制曰不吐剛而諂上不茹柔而黯下君子之事也踐霤必繩登車無屈者正人之務也長安令李朝隠德義不回清强自延遂宦官入縣有乖儀式遂能責之以禮繩之以愆昔虞持皇后之客梅陶鞭太子之傅古稱遺直復見于今宜加一階用來剛烈神腴田韋景駿為肥鄉縣令北界暴水連年泛溢舊堤廹近水漕雖修不息而漂流相繼景駿審其地勢拓南數里髙築隄暴水至隄南以無水患而去隄北稱為神腴田拒大夫之命楊瑒為麟逰令時御史大夫竇懷貞檢校造金仙玉真二觀移牒近縣徴百姓所隠匿資財以充觀用楊拒而不受懷貞怒曰焉有縣令卑㣲敢拒大夫之命乎楊曰所論為人寃抑不知計位髙卑懷貞壯其對士衆得蔬飯見饋則足蔣沉乾元初歴陸渾盩厔咸陽髙陵四縣令當軍旅之後瘡痍未平沉竭心綏之所至安輯副元帥郭子儀每統兵由其縣必戒軍吏曰蔣沉令清而嚴幹供億故當有異士衆得蔬飯見饋則足無撓清政其為名人所知如此令人户勿顧賦限盧坦字保衡為壽安令時河南尹徴賦限窮而縣人訴以機織未就坦請延十日府不許坦令人户但織而輸勿顧賦限違之不過罰令俸爾既成而輸坦亦坐罰由是知名執刺史造常滿樽李元素有吏才初為武德令時懷州刺史李文暕將調率金銀造常滿樽以獻百姓甚弊乏官吏無敢異議者元素抗詞固執文暕乃損其制度以家財營之賦役平允李元紘為好畤令有聲績開元初三遷萬年縣令賦役平允不嚴而治去官縣人思詠裴耀卿開元初遷長安令長安舊有配户和市之法百姓苦之耀卿到一切令出儲畜之家預給其直遂無姦僦之弊公私為便在職二年寛猛得中及去官縣人甚思詠之著諭蒙十四篇馮伉遷尚書膳部員外郎充睦王以下侍讀澤潞節度使李抱真卒為弔贈使抱真男遺伉帛數百匹不納屬醴泉闕令宰臣進人名帝意不可謂曰前使澤潞不受財帛者此人必有清政可以授之遂授醴泉令縣民多猾為著諭蒙十四篇大畧指明忠孝仁義勸學務農每鄉給一卷俾其傳習造亭臺為美名楊炯為盈川令為政殘酷人吏動不如意輙榜殺之又所居府舍多造亭臺皆書牓額為之美名大為逺近所笑妻子不之官舍徐仁紀拜左補闕三上書不省乃詣執政求出俄授靈昌令妻子不之官舍唯衣履及書䟽而已餘無所畜寛猛得中韋抗為永昌令不務威刑而政令蕭然都輦繁劇前後為政寛猛得中無如抗者義倉本備水旱薛訥為藍田令有富商倪氏於御史臺理其私債中丞來俊臣受其貨財欲出義倉千石以給之訥曰義倉本備水旱以為儲畜安敢絶衆人之命以資一家之產竟報上不與賣所乘馬分給貧弱李大亮少有文武才幹為土門令屬百姓飢荒盗乘侵冦大亮賣所乘馬分給貧弱勸以懇田嵗因大稔躬捕冦盗所擊輙平太宗聞而嗟美下書勞之賜緋衣銀章王正雅為萬年令穆宗時京邑號為難理正雅抑强暴政甚有聲于時栁公綽受京兆尹上前保稱穆宗命賜緋衣銀章就縣賜之遷户部郎中伏叢薄中諫獵五代史晉何澤初任後唐同光中為洛陽令澤以莊宗出獵屢踐民田澤屏其從者伏於叢薄中截馬諫曰陛下未能一天下以休兵而暴斂疲民以給軍食今田將熟奈何恣佚㳺以害民稼使官何以集其征賦臣請賜死於此日以悟陛下莊宗慰而遣之勇而能謙必享富貴九國志吳秦裴行宻據廣陵以裴知揚子縣有虎入縣裴親殺以獻行宻詔褒之裴曰此衆共殺非能獨制也行宻歎曰勇而能謙必享富貴歴髙郵無錫令有能名健令後蜀李匡逺同光中董璋召為鹽亭令歴通泉射洪等令時西川連衡羣盗尤盛匡逺悉為擒捕當時號為健令邑客遺果不受閩賈郁遷仙㳺令有邑客遺果辭之客曰某家新果衆人未知郁曰君家有子弟否曰昆仲三人豚犬數輩郁曰古人畏四知今君兄知弟知子知􅂝來者知是倍於古人也客大慙而退不令按讞刑獄監筦倉庫國朝淳化五年詔令長之任風化所繇不下於堂而一境自治兩換其縣而善政大行所宜躬親於教人不可攖拂以他務應天下縣令自今轉運司及本州並不得輙令按讞刑獄監筦倉庫等事俾專厥職以副朕懷四任令宰至道二年前商州豐陽縣令喻瞻詣宰相自言江東人歸朝廷凡四任令宰年七十五吏部以當免望歸故鄉宰相以聞上憐之特授光州定城令赤縣最為要劇咸平二年上謂宰臣曰京師浩穰之地赤縣最為要劇官得其人則民事皆理宜擇有操守不畏權豪者任之鐵船渡海九國志閩賈郁性峭直不容人吏文過時為仙逰令王氏初霸閩越郡邑之政皆茍且都獨守正奉法吏頗畏之及受代有一吏醉郁怒曰吾當再典此邑以懲汝軰吏揚言公欲再作令須造鐵船渡海也郁聞之是嵗選集延鈞建號聞郁有治稱乃擢授贊善大夫復典舊邑時醉吏為庫史不數月盗官錢數萬下獄具伏批前牘尾曰竊銅鏹以潤家非伏因鼓鑄造鐵船而渡海不假鑪因因决杖徒之胥皆懾未幾移治福清考滿召為御史中丞夢印林紹圖少好學初事審知延鈞開國擢授户部郎中王氏之世郎官無俸月給禄米數斛而紹圖貧殆不能濟乃求宰長溪因營父兄之産時銓注已定一夕夢數吏擎大箱中有印二鈕紹圖取其一視之乃長溪縣印也有一吏前白曰公當置此取彼一鈕乃安昌縣印也紹圖執之而覺及領命米宰安昌秩滿而歸復求宰舊邑時宰選官皆紹圖親舊自以為必得一夕復夢吏如前以印二鈕示之紹圖方執一鈕吏正之曰此乃公昔年所置者不可復取但旁一鈕視之乃連江縣印既而數吏前白曰數年為君掌印今始獲免當别公去紹圖覺而異之翌日果受宰連江江南兵攻䧟建州延政降又攻福州李仁建閉壁自守紹圖自連江歸於江南至建安授幕職官而卒知縣事沿革見縣令門朝臣知縣自奚嶼始國朝建隆三年以大理正奚嶼知大名府館陶縣監察御史王祐知魏縣楊應夢知永濟縣屯田員外郎于繼徽知臨清縣朝臣知縣自奚嶼等始也三遮運使乞留淳化二年姚益恭知須城縣鞭朴不用境内大治民數千人三遮轉運使乞留相率如浮屠宇飯僧以徼福願益恭不代州以上聞賜璽書賞以粟帛吏部引疋對以著作佐郎知洪州南昌縣賜衣服銀帶絹五十以古文革崑體之弊尹洙知河南伊陽縣與穆修以古文革楊劉崑體之弊天下翕然宗之豪猾不敢過縣門祥符中張錫為太常博士知東明縣當下令曰富而恃貨刑而恃贖若此者先治之民之豪猾者以令簡而必行終錫之去不敢過縣門而犯法者鮮矣十竒嘉祐中京西轉運使陳希亮奏據河清縣僧道進士等狀奏舉留知縣著作郎王元規再任事本司體量得本官到任軍民歌詠有十竒第一竒民吏不識知縣兒第二竒塌却曹司舊肚皮第三竒買物價利不曽欺第四竒處斷明白盡絶私第五竒街裏不見兇頑兒第六竒蝗蟲不入境内飛第七竒不敢賭錢怕官知第八竒不孝不仁不敢為第九竒鄉村不被公人欺第十竒百姓納税不勾追如此之類甚得民情上令審官上簿記其姓名攝職官所入不取王鼎在臨邛轉運使令攝不取成都新繁縣事職田所入不以孔氏子弟知仙源治平元年詔今後勿以孔氏子弟知仙源縣其襲封人如無親屬在鄉里令常任近官不得逺去家廟初京東提㸃刑獄王綱乞不以孔氏子弟知仙源縣所以慎長民之官長沿革見縣令門視民如子前漢召信臣為上蔡長其治視民如子所居見稱述家人莫見喜愠色後漢仇覽為蒲亭長雖在宴居必以禮自整妻子有過輙免冠自責妻子庭謝候覽冠乃敢升堂家人莫見喜愠之色海内㑹葬者三萬人陳寔字仲弓為太丘長寔卒海内㑹葬者三萬人不捕刼盗而先按殺子者賈彪補新息長民困貧多不飬子彪為制與殺人同罪城南有盗刼害人者北有婦人殺子者彪出按發而掾吏欲出引南彪怒曰賊㓂害人此乃常理母子相殘逆天違道遂驅車北行案驗其罪城南賊聞之亦面縛自首數年間人飬子者千數僉曰賈父所長生男名賈子生女名賈女甑中生塵釜中生魚范冉字史雲冉或作丹桓帝時為莱蕪長遭母憂不到官後辟太尉府以狷急不能從俗常佩韋於時議者欲以為侍御史遁身逃命於梁沛之間徒行敝服賣卜於市遭黨人禁錮遂推鹿車載妻子捃拾自資或寓息客廬或依宿樹蔭如此十餘年乃結草室而居焉所止卑陋有時絶粒窮居自若閭里歌之曰甑中生塵范史雲釜中生魚范莱蕪潁川四長循吏傳潁川四長並以仁信篤誠使人不欺謂荀淑為當塗長韓韶為瀛長陳寔為太丘長鍾皓為林慮長淑等皆潁川人也殺死有寃虞詡有剛正之性終老不屈為尚書令以公事去官朝廷思其忠復徴之倉卒臨卒謂其子曰吾事君直道行已無愧所悔者為朝歌長時殺賊數百人其中何能不有寃者自此二十餘年家門不増一口斯獲罪於天也盤根錯節鄧隲以虞詡為朝歌長時賊數千人攻殺長吏欲以法中傷之故舊相弔詡笑曰不遇盤根錯節何以别利噐乎及到設解散三科以募求壯士乃為設伏兵殺賊數百人賊由是願寛轡䇿虞詡為朝歌長始到河内謁太守馬稜稜勉之曰君儒者當謀謨廟堂反在朝歌耶詡曰此不足憂也然賊衆新盛難與争鋒兵不厭權願寛假轡䇿勿令有拘闗而已詡果敗賊匈奴不犯塞華嶠後漢書孔奮字君魚守姑臧長治有異政以仁義折强扶弱好惡分明匈奴不犯塞坐無完席謝承後漢書薛惇字子禮為北海長家貧坐無完席妻子曰君無俸禄子孫復無完席耶惇以美完席與妻子自坐敗席兼治五縣東觀漢記公孫述補清水長父仁遣門下掾隨之官月餘掾辭歸白仁曰述非待教者也後太守以其能使兼治五縣政事修理姦盗不發郡史謂有神明諫獻龍眼荔枝和帝時唐羌為臨武長縣接南海獻龍眼荔枝十里一置五里一候奔騰險阻死者繼路羌乃上書諫帝下詔曰逺國珍羞本以薦奉宗廟茍有傷害豈愛民之本勅勿復獻教不孝子令改蔣崇為潯陽長民有母言子不孝曰今為汝教之不改乃殺後十日崇召不孝子謂曰令下車求不孝子欲治之言汝不孝又言汝能改故召見汝賜酒食教以事母之道子曰必能改遂為孝順崇之德化也越境求理寃結崔恢遷鄢陵長闗畿不閉道無拾遺比縣有寃抑者皆越求理焉安有國家長吏為賊叩頭魏志賈逵守綘邑長郭援攻河東所經城邑皆下逵守援攻之不救乃召單于併軍急攻之城將潰綘父老與援要不害逵綘潰援聞逵名欲使為將以兵刼之逵不動左右使叩頭逵叱之曰安有國家長吏為賊叩頭援怒將斬之綘吏民聞將殺皆乘城呼免曰負要殺我賢君寧俱死其左右義逵多為請遂得社稷之噐非百里才蜀志蔣琬除廣都長先主嘗至廣都琬衆事不治時又醉先主怒將加戮諸葛亮請曰琬社稷之噐非百里之才也乃免之二縣立祠楊仁遷南安長治民以父子情大見信愛及卒二縣立祠十年不絶獸南渡劉平為全椒長五日一聼事吏卒各就田業先時多獸每為人害平就事三日獸皆南渡蝗不入盧氏李孟元為盧氏長務行德化時縣悉蝗獨不入盧氏界神父陳弇為蘄長時一州旱蝗弇請雨即雨大降穰蝗即出境一縣徧熟號為神父以惠和為本鍾翼字叔華為長平長賦政息人以惠和為本百姓共為其碑文曰宰臨長平悦以飬民擅出穀受罪典畧韓攸為瀛長時民大飢而太守未至攸因發倉賑之吏白言太守垂至軍糧重事可須來攸言民命縣急令長擅出穀受罪含笑入地不以為恨後竟不坐吏民䝉濟者數千人丞沿革見縣令門亷吏前漢黄霸為潁川太守務在成就安全長吏許丞老病聾督郵白欲逐之霸曰許丞亷吏雖老尚能拜起送迎正頗重聼何傷且善助之公私費耗甚多皆當出於民所易新吏又未必賢或不如其故徒相為亂凡治道去其泰甚者爾清浄無欲後漢張𤣥建武中舉明經遷陳倉丞清浄無欲專心經書方其講問乃不食終日及有難輙為張數家之説令擇從所安諸儒皆服其多識歴佐三縣所在有稱吳志孫堅為下邳丞歴佐三縣所在有稱吏民親附鄉里知舊好事少年徃來者常數百人堅接撫待飬有若子弟令囚歸家耕種唐書唐臨為萬泉丞縣有輕囚十數人㑹春暮時雨臨白令請出之令不許臨曰明公若有所疑臨請自當其罪令許之乃召囚悉令歸家耕種與之約令歸繫所囚等皆感恩義至時畢集詣獄臨由是知名酌水而祭王義方坐與張亮交通貶為儋州吉安丞行至南海舟人將以酒脯致祭義方曰黍稷非馨在明德酌水而祭時當盛夏風濤蒸毒既而開霽南渡吉安蠻俗荒梗義方召諸首領集生徒親為講經行釋奠禮清歌吹籥而登降有序蠻酋大伏主簿證據縣令得免後漢書繆彤仕縣為主簿時縣令被章見考吏皆畏懼自誣而彤獨證據掠考五毒至乃體生蟲蛆轉換五獄踰涉四年令卒以得免詣闕訴縣令寧陽主簿詣闕訴其縣令積之七嵗不省乃復上書臣聞陛下為臣父臣為陛下子臣章百上終不見省臣豈可北詣單于以告寃乎帝大怒尚書劾以大逆虞謝駁之曰主簿所訴乃君父之惡百上不達是有司之過也枳棘非鸞鳯所棲仇覽字季智一名香考城令王渙署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志耶覽曰以為鷹鸇不若鸞鳯渙謝遣曰枳棘非鸞鳯所棲百里豈大賢之路今日太學曵長裾飛名譽皆主簿後耳以一月俸為資勉入太學無知名之援蘇林廣舊傳仇香字季智學通三經無知名之援鄉里舉之四十為縣主簿薦為麗正殿校理唐書徐浩以文學為張説所噐調授魯山主簿説薦為麗正殿校理三遷右拾遺仍校理擇佳壻楊於陵字達夫釋褐為句容主簿時韓滉節制金陵滉性剛嚴少所接與及於陵以屬吏謁謝滉甚竒之謂其妻栁氏曰夫人常擇佳壻吾閲人多矣無如楊主簿者竟以妻之後遷户部尚書處事敏速李㑹為泥水主簿處事敏速甚有聲稱雖村童厮飬一閲之後無不知替代姓名者累轉國子司業奔赴闕庭雪父寃穆賛字相明釋褐為濟南主簿時父寧為和州刺史以剛直不屈於亷使被誣奏貶於泉州司户賛奔赴闕庭號泣上訴詔御史覆問寧方得雪詔曰令子申父之寃憲臣奉君之命楚劒不衝於牛斗秦璧自洗於塵埃由是知名伏難死節蘇弁字元啓轉奉天主簿朱泚之亂德宗倉卒出幸縣令杜正元上府計事聞大駕至官吏惶恐皆欲奔竄山谷弁諭之曰君上避狄臣下當伏難死節昔肅宗幸靈武至新平安定二太守皆潜遁帝命斬之以徇諸尹知其事乎衆心乃安賊平拜監察御史虎不為害顧少連以㧞萃補登封主簿邑有虎孽民患之少連命塞䧟穽獨移文岳神虎不為害令舍得亡印人伏其量五代史許仲宣乾祐初舉進士觧褐為曹州濟陰主簿先是縣印令與簿掌時令有嬖妾與其室争寵令不能制妾欲䧟其主於罪竊取印藏之封緘如故仲宣受之翌日吏開將用印但空匣因逮捕縣吏數十人及令主簿僕厮家人繫獄驗問果得於令舍竈炭烟煤中初亡失印縣吏皆恐而仲宣晏然不為動既而果獲印皆伏其量短薄九國志閩蔡儼字仁崿為永春主簿秩滿就選試合各格未擬官而卒崿諸子中最少而俊爽人多惜之初仁崿之求試也有門僧善揣骨仁崿問之僧曰短薄仁崿大笑曰無選試及格不當復為縣佐短簿之呼何謬耶後數日果卒尉沿革見縣令門傳以為仙前漢梅福字子真為南昌尉去官一朝棄妻子去九江至今傳以為仙其後有見福於㑹稽者變姓為吳市門卒棄官還鄉里後漢喬𤣥按梁冀客陳相羊昌罪惡由是著名舉孝亷補洛陽左尉時梁不疑為河南尹𤣥以公事詣府受對耻為所辱棄官還鄉里大丈夫安能為人役逢萌少有節意抗厲家貧給事縣為亭長時尉行亭亭長候迎拜謁既而擲楯歎曰大丈夫安能為人役哉遂去之長安學不避豪强魏志曹瞞除洛陽北部尉初入尉廨繕治四門造五色棒縣左右各十餘棒有犯禁者不避豪强皆棒殺之京師斂跡莫敢犯出逰常歩行程堅字湛甫為比陽尉貧無車馬每出追逰常步行䑕竊狗盜魯國先賢傳二世時山東盜賊起二世問諸臣曰於公何如博士諸人三十餘人前曰人臣無將將則及罪至死無赦願陛下急發擊之二世怒叔孫通前曰諸生言皆非明主在上四方輻輳安有反者特羣盜䑕竊狗盜守令尉捕誅之何足憂二世喜告諸百姓為我立祠搜神記蔣子文嗜酒好色佻達無度自言清骨死當為神當漢末為秣陵尉遽死及吳先主之初其故吏見子文於道頭乘白馬執白扇侍從如平生吏見驚走子文進馬追之謂曰我當為此土地之神以輔爾下民可宣告諸百姓為我立祠不爾將有大禍化石荆州圖記澧陽縣西百三十里澧水之南岸有白石先是縣左尉與零陵縣共論疆界因相侵害化為此石即以為二縣界首年弱貎羸唐書顔師古隋仁壽中授安飬尉尚書左僕射楊素見師古年弱刀貎羸因謂曰安飬尉縣何以克當師古曰割雞馬用牛素竒其對後果以幹理聞䇿入四等白居易才識兼茂明於體用䇿入第四等授􅉦厔尉集賢校理轉拾遺栁芳自永寧尉直史館轉拾遺芳該博勤於記注撰唐厯四十卷開倉賑貧餒員半千上元初授武陟尉屬頻嵗旱飢勸縣令殷子良開倉以賑貧餒子良不從㑹子良赴州半千便發倉粟以給飢人刺史郭齊宗大驚因而按之時薛元超為存撫使謂齊宗曰公百姓不能救之而使惠歸一尉豈不愧也遂令釋之以清謹見稱蕭至忠為畿尉以清謹見稱嘗與友人期於路隅㑹風雨凍冽諸人皆奔避就宇下至忠曰寧有與人期而求安失信獨不去衆咸歎服吏能為畿邑之冠劉延祐弱冠補渭南尉刀筆吏能為畿邑當時之冠司空李勣嘗謂曰足下春秋甫爾便擅大名宜稍自貶抑無為獨出人右也後歴右司郎中屈宋作衙官杜審言初為隰城尉雅善五言詩工書翰有能名然恃人譽甚為時軰所嫉登封中蘇味道為天官侍郎審言預選試判訖謂人曰蘇味道必死人問其故審言曰見吾判則當羞死矣又謂人曰吾之文章合得屈宋作衙官吾之書跡合得義之北面其矜誕如此北京三傑富嘉謨轉晉陽尉與新安吳少㣲友善同官又谷倚為太原主簿皆以文詞著名人謂之北京三傑才望髙雅陸元方字子象先本名景初時吏部侍郎吉頊曰為官擇人至公之道陸景初才望髙雅非常流所及若不以吏部予之妄推薦也竟奏授之非好去位髙適補汴州封丘尉非其好也乃去位客逰河右節度使哥舒翰見而異之表為兵曹為翰府掌書記後從翰入朝翰為盛稱之於上前拜左拾遺轉監察御史明公坐蘇珣明經舉授鄠縣尉雍州長史李義琰召而謂曰鄠縣本多訴訟近日遂絶訪問果由明公為其疏理因顧指㕔事爾曰此座即明公坐也但恨非遲暮所見獻書闕下李揆字端卿開元末舉進士補陳留尉獻書闕下詔試文章乃擢拜右拾遺代同寮直官曹竇參字時中為萬年尉時同僚有直官曹者將夕聞親疾請參代之㑹有囚亡京兆尹按直簿將奏參遽請曰彼以不及狀謁參實代之宜當罪坐貶江夏尉人多義之持危矢石之間崔祐甫字貽孫舉進士歴壽安尉禄山䧟洛陽士庶奔迸祐甫獨持危矢石之間潜入私廟負木主以竄拜御史中丞著魯議髙郢字公楚天寶末盗據京邑父伯祥先為好畤縣尉抵賊禁將加極刑郢時年十五被髪解衣請代其父賊黨義之仍俱釋後舉進士擢第授華陰尉嘗以魯不合用天子禮樂乃引公羊傳著魯議見稱於時由是授咸陽尉擇堪為御史見録事參軍人倫之鍳下注廷折曲直李義琰少舉進士累補太原尉時李勣為并州都督吏僚皆風望慄懼義琰獨廷折曲直勣甚厚禮之春蘭秋菊裴子餘舉明經補鄠縣尉時同列李朝隠程行諶皆以文法著稱子餘獨以詞學知名或問雍州長史陳崇義子餘與朝隠行諶優劣崇義曰譬諸春蘭秋菊俱不可廢也後為監察御史此尉得罪公清之士何以勸見大理評事門請代韋重規役裴佶字𢎞正初授藍田尉時有詔命畿内諸縣城奉天時嚴郢為京兆政尚峻暴加以朝㫖甚廹尹正之命急如風電本曹尉韋重規其室方娠而疾畏郢之暴不敢以事故免佶因請代役無􅄽期當時義之求珍味饋從官崔日用為芮城尉大足中則天幸長安路次陜宗楚客時為刺史日用知供頓事廣求珍味稱楚客之命遍饋從官楚客知而大加賞歎盛稱薦之由是擢為新豐尉無幾拜監察御史以子孫相託婁師德弱冠進士擢第補江都尉揚州長史盧承業竒其才嘗謂之曰吾子台輔之噐當以子孫相託豈可以官屬常禮待也有擒姦擿伏之名李勉為開封尉昇平日乆見汴州水陸所凑邑居龎雜號為難理勉與聫尉盧成軌並有擒姦擿伏之名嵗飢飯不過一噐栁公綽為渭南尉性謹嚴動循理法屢屬嵗飢其家雖給而毎飯不過一噐嵗稔復初小官韓休拜黄門侍郎同中書門下平章事休性方直不務進取既為相天下翕然有萬年尉李美玉得罪帝將放嶺南休曰美玉犯非大惡今朝廷有大姦請得先治金吾大將軍程伯獻恃恩而貪宅室輿馬僣擬法度臣請先伯獻臣不敢奉詔帝不能奪應對如神唐新語盧莊道年十六授長安尉太宗將按録囚徒京宰以莊道㓜年懼不舉欲以他尉代之莊道不從但閒暇不之省時繫囚四百餘人令丞深以為懼翌日太宗召莊道評其輕重留繋日月應對如神太宗驚嘆之仕宦四十年未嘗見此魏奉古為雍丘尉時姚珽蒞汴州郡僚畢謁珽覧刺召奉古前持廐收令示奉古奉古一覽便諷千餘言珽驚起曰仕宦四十年未嘗見此不受黄連朱履霜好學明法律補山陰縣廵察使故人或遺以黄連數兩固辭不受曰不辭此歸恐母妻詰問從何而得不知所以對也遇盗留公文楊再思為𤣥武尉充使詣京師止於客舍㑹盗竊其囊裝再思邂逅遇之盗者伏罪再思謂曰足下苦貧乏至此無行速去勿作聲恐為他人所擒幸留公文餘財盡相遺盗者齎去上疏諷從禽𤣥宗聼政之暇彼禽自娛又於蓬莱宫側立教坊以習倡優曼衍之戯酸棗尉袁楚客以為天子春秋方壯宜節之以雅好從禽好鄭將蕩上心乃引由余太康之義上疏以諷之𤣥宗納焉賦詩留别鄭蜀賔頗善五言竟不聞達年老方授江左一尉親朋餞别於上東門蜀賔賦詩留别曰畏途方萬里生涯近百年不知將白首何處入黄泉酒醉自詠聲調哀感滿坐為之流涕竟卒於官屬舞不動手語林商則任廪丘尉為性亷謹縣令丞多貪濁因宴㑹以次舞令丞舞訖勸則則把手回身而已令問其故則曰長官動手賛府亦動手唯有一箇更動手百姓何容活耶人皆大笑嘲曰令丞但動手縣尉祗回身因貧為刺史得與屬貧人首該賞典國朝建隆四年以大名府經城縣尉張義𤣥為本府允城縣令賞捕盗之功也天下縣尉乆廢其任是嵗義𤣥首該賞典以激勸之處賤官有憂天下之心寶元初有明州慈谿縣尉裴明允者倜儻不羣雖處賤官有憂天下之心屢上書言亊後又詣闕上書陳可言者臣伏見漢成帝時梅福為南昌尉屢從縣道上書言災異事求假軺傳詣行在所條對執政輙報罷去其後又以王鳯專勢擅朝災異數見臣下莫敢正言福又上書其誠懇切雖不見用亦免罪累有此前事臣實慕之上善其言以示兩府手殺强盗五人劉平字士衡景德中釋褐常州無錫縣尉手殺强盜五人改大理評事知鄠陵縣令百姓食蝗至和中淮南有蝗上令州縣燒捕務絶其害時楚州山陽縣尉李宗嗔百姓邵崇等申報捕蝗皆抑令食之悉吐㵼成疾提㸃刑獄孫錫奏上怒曰縣尉亦親民之官謂其能尉安於民而不與民除害反傷民命削其官功曹沿革見縣令門以斧砍右手五指謝承後漢書梁國車章為縣功曹令黄奉為人所訴章證之當下筆章辭以斧砍右手五指閉口死獄中撥煩㑹稽縣録董昆字文通能撥煩縣長潘侯署功曹史嗇夫前漢百官表大率十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫㳺徼三老掌教化嗇夫職聼訟收賦税㳺徼循禁賊盗縣大率方百里其民稠則减稀則廣鄉亭亦如之皆秦制平徭賦理寃結東漢第五倫為鄉嗇夫平徭賦理􅁈結得民歡心自以為乆宦不達遂將家屬客河東變姓名自稱王伯齊號為道士容貎長者漢雜記事任先為鄉嗇夫漢兵至宛軍人見其冠服觧明欲殺之㑹安成侯劉賜適到見其容貎長者乃救免之為叔還錢㑹稽典録鄭𢎞為縣靈文嗇夫太守第五倫見𢎞問民得失深異之召署督郵有弟用兄錢者為嫂所責末還嫂詣𢎞訟之𢎞賣牛車為叔還錢兄聞之慚愧自繫於獄中逐其婦賫錢還𢎞𢎞不受代出口錢零陵先賢傳鄭産為白王嗇夫漢末多事國用不足産子一嵗輙出口錢民多不舉子産乃勑民勿出子口錢自當代出省徭賦賑困乏殷氏世傳勤年二十為鄉嗇夫故豫州從事王封知勤雅意好施遺其書曰君少孤不漸父兄師友之訓而無仁孝亷直之性是故古今耻功惠之不崇故雖執鞭猶不辭也朱邑所以列竹帛者功紀於桐鄉耳勤感之於是省徭賦賑困乏矜孤寡民大愛之亭長見嗇夫門風俗通謹按春秋國語有寓望謂今之亭長所安是也漢家因秦大率十里一亭亭留也今縣有亭長又亭待也蓋行旅宿食之所館也亭亦平也民有争訟吏留辨處勿失其政也為我謝趙君前漢趙廣漢為京兆尹嘗記召湖都亭長湖都亭長至界上界上亭長戯曰至府為我多謝問趙君亭長既至廣漢與問事畢謂曰界上亭長寄聲謝我何以不為致問亭長叩頭服實有之廣漢因曰還為我謝界上亭長勉思職事有以自効京兆不忘卿厚意其發姦擿伏如神皆此類也艤船待項羽烏江亭長艤船謂羽曰江東雖小地方千里衆數十萬亦足王也願大王急渡今獨臣有船漢軍至無以渡羽笑曰天之亡我何渡焉且藉與江東子弟八千人渡江而西今無一人還縱江東父老憐而王我我何面目見之哉縱彼不言藉獨不愧於心乎不為具食韓信從下鄉南昌亭長食亭長妻苦之乃晨炊暮食時信徃不為其食信亦知其意自絶去亷直顔異為濟南亭長以亷直稱遷大司農勿為盗賊自致續漢書馬武字子張帝與功臣讌語從容言曰諸卿不遭際㑹自度爵禄何所至乎鄧禹對曰臣少嘗學問長可郡文學上笑曰何以自謙卿鄧氏子志行修勤可以掾史功曹次至武曰臣以武勇可守尉督盗賊帝笑曰勿為盗賊自致亭長斯可矣埋骨樓下謝承後漢書蒼梧廣信女子蘇娥行宿髙安鵲巢亭為亭長龍壽所殺奪其物骨埋樓下交趾刺史周敞行宿亭舉壽奸罪奏之殺壽讓喪於正堂張璠漢記樊曄為天水太守之郡與喪㑹於隴亭亭長使移喪避􅁮􅁮讓喪於正堂躬自弔祀闗西稱之吏以二卵棄扞城之將孔叢子子思言茍變於魏侯曰其才可將五百乘公曰吾知其才然變嘗為吏賦於民而食人二雞子故弗用也子思曰聖人官人如大匠之用木取其長棄其所短今君以二卵棄扞城之將不可使開於隣國公曰謹受命醉嘔丞相車上前漢書丙吉為丞相馭吏嗜酒常從吉出醉嘔丞相車上西曹主吏斥之吉曰以醉飽之失去士使此人將復何所為西曹忍之此不過汗丞相茵耳遂不去也不樂為後漢鄭𤣥少為鄉嗇夫得休歸嘗請學官不樂為吏父數怒之不能禁遂造太學授業執法廉童恢少仕州郡吏司徒楊賜開其執法廉辟之楊被劾免掾屬悉投劾去恢獨詣闕争之及得理掾悉歸府恢䇿杖而退論者美之仕不過郡吏趙壹初袁逢使善相者相之云仕不過郡吏果如其言郭林宗一見嗟服後漢符融少為都官吏耻之委去逰太學師事少府李膺膺每見融輙絶他賔客融幅巾奮䄂談辭如雲膺捧手歎息郭林宗始入京師時人莫識融一見嗟服志行髙㓗東觀漢記南陽馮良字君卿出於㣲少作縣吏年三十為尉佐奉檄迎督郵即路慨然耻在厮役因壊車殺馬毁裂衣冠乃遁焉十許年乃還鄉里志行髙潔非禮不動對妻子如君臣選孤貧志行之人第五倫遷蜀郡太守蜀地肥饒人吏富貴吏皆以財貨自達倫悉簡其豐贍者遣還之更選孤貧志行之人以處曹任所舉多至九卿二千石時以為知人規度指畫營處魏志鄧艾以口吃不得作幹佐為稻田守業草吏同郡吏父憐其貧資給甚厚艾初不稱謝每見髙山大澤輙規度指畫營處時人多笑焉聞父號慟吳書朱濟仁為邑書吏少喪父其母撫之曰汝父臨終恨不見汝濟仁對曰相見何難於是號慟縣異之以狀言篤志好學徐廣晉記張華牧羊而篤志好學初為縣吏盧欽竒之劉敚以女妻焉感激讀書汝南先賢傳許嘉為吏有過叩頭流血請得免由是感激讀書焉母好食鐺底燋飯宗躬孝子傳陳遺少為吏母好食鐺底燋飯遺在役常帶囊每煮食録其燋貽母後孫恩亂與母相失帶囊自隨故得無餓死遺得活母晝夜泣憶遺目為失明耳為無聞遺還入拜號泣母豁明海岱清士郭子庾公為䕶軍屬桓廷尉為舉一佳吏乃經年桓後遇見徐寧致與庾公云是海岱清士伏節死難後漢孟嘗字伯周其先三世為郡吏皆伏節死難謹案如律之事王粲儒吏論彼刀筆之吏豈見而克察哉走於几案之下畏於官曹之間其朝夕所見者謹案如律之事也名昭逺近謝承後漢書馮吳字子高輕財尚義𢎞博愛士賔客四方雲集為州郡吏休假先存恤行喪孝子次贍疾病拜鄉里耆老先進雖居家名昭逺近幹門裏冩書謝承後漢書濟陽成良字子恭年十八為濟陽郡幹良儀容華麗太守諸葛禮使門裏冩書從者誣良與奴婢與良割出肝腸示禮赤心求紙筆作辭王隠叢書鄧攸為石勒所得值攸昔作殷中郎幹攸求紙筆作辭勒原其死挂冠府門虞預㑹稽典録盛吉少為郡幹佐學明春秋王莽誅更始署新太守劉君代前太守許君不肯去郡劉君因攻殺之郡中撓亂吉謂友人栁珫曰君道滅王綱絶矣不去禍將及因觧冠挂府門與珫俱去小吏與錢通史記張湯之客田甲雖賈人有賢操始湯為小吏時與錢通徐廣注曰以利交及湯為大吏甲多責湯行義過失有國士風有封侯骨前漢書翟方進字子威家世微賤父為郡文學方進十二三失父孤學給事太守府為小吏遲鈍不及事數為掾吏所詈辱方進自傷乃從汝南蔡父相問已能所置蔡父大竒其形貎謂小吏曰有封侯骨當以經術進方進西至京師授經母憐其㓜隨之長安織屨以給愛其恭敬萬石君奮年十五為小吏侍髙祖愛其恭敬習文法尹翁歸少與季父居為獄小吏習文法竊學問能史書王尊字子贛少歸諸父諸父使牧牛澤中尊竊學問能史書十三求為獄小吏數嵗給事太守竒之賤後漢書公孫瓚字伯珪家世二千石瓚以賤遂為小郡吏弩矢貫咽喉王清為縣小吏從令出逢賊力戰弩矢貫咽喉詔大醫治之示百寮忠謹清慎晉中興書劉超少為小吏以忠謹清慎為中宗所愛恤親侍左右以俱渡江入令被中寢光逸為博昌小吏縣令使逸送客冒寒舉體凍濕還值令不在逸解衣炙之入令被中寢令還治之逸曰家貧衣單霑濕無可代若不暫溫勢必凍死奈何惜一被而殺一人君子仁愛不為此故寢而不疑縣令竒之從而不問知賢三輔决録髙陵龎勃為郡小吏東平衞農為書生窮乏客鍛於勃家勃知賢禮待顧直過當去送十里妻以弟女鄭𤣥别傳故尚書左丞同縣張逸年十三為縣小吏𤣥謂之曰爾有賛道之賢玉雖美須琱琢而成噐能為書生以成爾志不對曰願之遂妻以弟女盗池中魚郭子王安期為東海太守小吏盗池中魚綱紀推之王曰文王之囿與衆共之池魚何必占也得鬼臂蝦蟆毛齊諧記武昌小吏吳翕得一浮石取置牀頭化成一女甚端正與翕為婦太守宋宻見翕婦收得之謂翕曰汝能得鬼臂蝦蟆毛當不殺汝翕歸告婦婦令請其家在水下取之府君乃赦翕箴張斡小吏箴翩翩周生婉孌㓜童十五之年如日之東爾容既妍爾報既鮮輕裙隨風飛雲流烟南金沙生良玉璞藏不採畏淪不雕無光窮達何限否泰何常無忘㣲賤過謝孫張卒變姓名前漢梅福居家以讀書飬性為事元始中王莽專政福一朝棄妻子去九江至今傳以為仙其後有見福於㑹稽者變姓名為吳市門卒懐道隠身謝承後漢書苑式為荆州刺史友人南陽孔嵩家貧親老乃變姓名傭為新野縣何里街卒式行郡到新野而縣選嵩為導騎迎式式見而識之呼嵩把臂謂曰非孔嵩耶對之歎息語及平生昔與子俱曵長裾逰惜乎嵩籍帝學吾䝉恩為牧伯而子懷道隠身處於卒伍不亦曰昔侯嬴長守於賤業晨門肆志於抱闗子欲居九夷未不患其陋貧者士之宜豈為鄙哉勅縣代嵩嵩以先傭竟不肯去非撾妻之人蜀志劉琰妻胡氏入賀太后太后特留胡氏經月乃胡氏有美色琰疑其與後主有私呼伍伯撾胡至於以履搏面而後棄遣胡具以告琰坐下獄有司議曰小卒非撾妻之人面非授履之地琰竟棄市自是大臣妻朝慶遂絶散置左右待以門人晉中興書賀循時㑹稽郡鈴下有楊方者字公回少好學有異才以門役在役下公事暇輙誦五經鄉邑未之别也内史諸葛恢聞方好學出為給使見而異之即觧使散置左右以門生待之賜俸錢五千襄陽耆舊傳襄陽縣卒張他學畫諷書歸侍父主簿以其還縣非時當行罰他大歎息且四五不止縣令陳君問其故曰孝經云資於事父以事君而敬同今主簿以吏敬父而推罰恐傷明府俸錢德化故重令明府更思爾陳君即回罪主簿賜他五千職官分紀巻四十二
