body:
  text: 職官分紀卷四十二宋孫逢吉撰縣令前漢百官表縣令長皆秦官掌治其縣萬户以上為令秩千石至六百石减萬户為長秩五百石至三百石皆有丞尉秩四百石至二百石是為長吏師古曰吏理也主理其縣内也百石以下有斗食佐史之秩師古曰漢官名秩簿云斗食月俸十一斛佐史月俸八斛一説斗食者嵗俸不滿百石計日而食一斗二升故云斗食也是為小吏列侯所食縣曰國皇太后皇后公主所食曰邑有蠻夷曰道凡吏秩比二千石以上皆銀印青綬師古曰漢舊儀云銀印皆龜鈕其文曰章謂刻某官之章也後漢百官志每縣邑道大者置令一人千石其次置長四百石小者置長三百石侯國之相秩次亦如之本注曰皆掌治民顯善勸義禁姦罰惡理訟平賊恤民時務秋冬集課上計於所屬郡國胡廣曰秋冬嵗盡各計縣户口墾田錢穀出入盜賊多少上其集簿尉以下嵗詣郡課校其功多尤為最者於庭慰勞勉之以報其功負多尤為殿者於後曹别責以糾怠慢凡縣蠻夷曰道公主所食湯沐曰國縣萬户以上為令不滿為長侯國為相皆秦制也丞各一人尉大縣二人小縣一人本注曰丞署文書典知倉獄尉主盗賊凡有賊發主名不立則推索行尋按察姦宄以起端緒應劭漢官儀曰大縣丞左右尉所謂命卿三人小縣一尉一丞命卿二人各署諸曹掾史本注曰諸曹略如郡員五官為廷掾監鄉五部春夏為勸農掾秋冬為制度掾晉職官志縣大者置令小者置長有主簿録事史主記室史門下書佐幹㳺徼議生循行功曹史小史廷掾功曹史小史書佐幹户曹掾史幹法曹門幹金倉賊曹掾史兵曹史吏曹史獄小史獄門亭長賊捕掾等員隋百官志梁縣為國曰相大縣為令小縣為長皆置丞尉郡縣置吏亦各准州法以大小而置員後齊上上縣令屬官有丞中正光初功曹光初主簿功曹主簿録事及西曹戸曹金曹租曹兵曹等掾市長等員合屬官佐史五十四人上中縣减上上縣五人上下縣减上中縣五人中上縣减上下縣六人中中縣减中上縣五人中下縣减中中縣一人下上縣减中下縣一人下中縣减下上縣一人下下縣减下中縣一人隋縣置令丞尉正光初功曹光初主簿功曹主簿西曹金户兵法士等曹佐及市令等員合九十九人上中縣减上上縣吏屬四人上下縣减上中縣五人中上縣减上下縣十人中中縣减中上縣五人中下縣减中中縣五人下上縣减中下縣十二人下中縣减下上縣六人下下縣减下中縣五人唐百官志縣令三代之制五等諸侯自理其人周衰諸侯相侵大國分置郡邑縣鄙以聚其人齊晉謂之大夫魯謂之宰楚謂之令尹秦制萬户以上為令秩千石至六百石减萬户為長秩五百石至三百石皆有丞尉秩四百石至二百石掌導揚風化撫字黎氓敦四人之業崇五土之利飬鰥寡恤孤窮審察寃屈躬親獄訟六典萬年長安河南洛陽奉先太原晉陽令一人正五品上商周以徃五等諸侯皆自理其人及周衰諸侯相并大國則别置邑縣鄙以君其人漢京兆尹統長安令後漢河南尹統洛陽令魏晉以後皆因之隋初兩京置四縣増秩為正五品皇朝因之不改天后時東都又置來庭水昌二縣以太原為北都尋亦罷開元十一年置北都以晉陽太原為京縣十七年廵陵又以奉先為京縣丞二人從七品上漢氏縣丞尉多以本郡人為之三輔縣則兼用他郡及隋氏革選用他郡之人漢以下皆一人皇朝置京縣丞三員北京太原晉陽各置一丞主簿二人從八品上自漢以來主簿皆令長辟除周隋長安縣令丞以下有功曹主簿西曹兵倉戸法士等曹主簿皇朝京縣置二人太原晉陽各一人録事二人從九品下隋長安縣置録事一人佐二人史二人尉六人從八品下漢氏長安有四尉分為左右部城東南置廣部尉是為左部城西北置明部尉是為右部並四百石黄綬大冠主追捕盗賊伺察奸非後漢洛陽置四尉皆孝亷作有東部南部西部北部尉魏氏因之晉洛陽置六部尉過江亦於建康置六尉宋齊梁陳並因之北齊鄴縣亦置三尉隋氏長安無尉有正焬帝復置尉皇朝武德初始置尉六人司功佐三人史六人司倉佐四人史八人司户佐五人史十人司兵佐三人史六人司法佐五人史十人司士佐四人史八人典獄十四人問事八人白直十八人博士一人助教一人學生五十人京兆河南太原諸縣令各一人正六品丞一人正八品上主簿一人正九品上隋九等縣丞尉以下皆有以本縣人為之髙宗始為品官令吏部選授尉二人正九品下後漢置尉大縣二人小縣一人主捕盗賊三國晉宋之後並因之隋氏九等縣則上縣二人中下縣一人焬帝時改為縣正又為書佐皇朝復為縣尉畿縣户不滿三千者亦置二人萬户以上置三人諸州上縣令從六品上丞一人從八品上主簿一人九品下尉一人從九品上中縣令一人七品上丞一人從八品上主簿一人從九品上尉一人從九品上縣滿四千户増置一人中下縣令一人從七品上丞一人九品上主簿一人從九品上尉一人從九品下縣令一人從九品下丞一人正九品下主簿一人從九品上尉一人從九品下丞一人正八品上注見上文主簿一人正九品上隋九等縣丞尉以下皆有光初功曹光初主簿功曹主簿西曹金户兵法士等曹佐及市令等員正九品下皆本縣人為之髙宗始為品官令吏部選授尉二人正九品下録事二人史三人司功佐三人史五人司倉佐四人史七人司户佐四人史七人帳史一人萬户以上増置佐二人史四人帳史一人司法佐四人史八人萬户以上増置佐二人史二人司士佐四人史八人典獄十人問事四人白直十人市令一人佐一人史一人帥二人經學博士一人助教一人學生四十人諸州上縣令從六品上丞一人從八品下主簿一人正九品下尉二人從九品下録事二人史三人司户佐四人史七