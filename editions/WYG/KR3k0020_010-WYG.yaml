body:
  text: 職官分紀卷十宋孫逢吉撰禮部尚書尚書舜典咨四岳有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗家語父子不親長㓜失序君臣上下乖離異志曰不和不和則飭宗伯後漢百官志成帝初置尚書四人分為四曹蔡質漢儀曰吏曹尚書典選舉齋祀屬三公曹南齊百官志祠部尚書左僕射通職不俱置隋百官志隋禮部尚書統禮部祠部侍郎各一人主客膳部侍郎各二人唐職官志禮部尚書一員正三品侍郎一員正四品下掌天下禮儀祭饗貢舉之政令其屬有四一曰禮部二曰祠部三曰膳部四曰主客摠其職務而行其制命凡中外百司之事由於所屬皆質正焉六典禮部尚書一人正三品周之春官卿也漢成帝置尚書四人其四曰客曹主外國夷狄事光武分六曹禮部曹主選舉齋祀事然則夷狄齋祀皆今禮部之職東晉置祠部尚書常典右僕射通職若右僕射闕則以祠部尚書知右事宋齊梁陳皆號祠部尚書後魏稱儀曹尚書北齊亦為祠部尚書掌祠祭醫藥死喪贈賻等事後周依周官置春官府大宗伯卿一人隋為禮部尚書皇朝因之龍朔二年改司禮大常伯咸亨元年復為禮部光宅元年為春官尚書神龍元年復故侍郎一人正四品下周之春官小宗伯中大夫也漢以來尚書侍郎今郎中之任後周依周官隋煬帝置禮部侍郎皇朝因之龍朔二年改司禮少常伯咸亨光宅神龍隨曹改復掌同唐職官志凡舉試之制毎嵗仲冬率與計偕其科有六一曰秀才試方畧䇿五條此科取人稍峻貞觀以後遂絶二曰明經三曰進士四曰明法五曰書六曰算凡此六科求人之本必取精究理實而升為第其博綜兼學須加甄奬不得限以常科國朝禮部掌貢舉齋戒祠祀宴饗舉授儀式制度器服印記門㦸表疏祥瑞圖書册寶禮命冠婚喪葬賻贈之事官品令禮部尚書從二品管攝二曹後魏書孝文車駕征馬圏留宋弁以本官兼祠部尚書攝七兵事及行執手曰國之大事在祀與戎故令卿管攝二曹弁頓首謝文武兼資授二職唐裴行儉擒都支遮匐還高宗廷勞之㝷又賜宴謂行儉曰卿文武兼資今故授卿以二職即日拜禮部尚書兼檢校右衛大將軍荅讜言陳叔達字子聰太宗時拜禮部尚書建成元吉疾害太宗隂行譖毁高祖惑其言將有貶責叔達固諫乃止至是太宗勞之曰武徳時災難屢搆知公讜言今之此拜有以相荅也禮部侍郎隋百官志唐職官志六典並見尚書門官品令禮部侍郎從三品絶請託唐高郢為禮部侍郎時應進士舉者多務朋遊馳騁聲名每嵗冬州府薦送後唯追陪讌集罕肄其業郢性剛正尤嫉其風既領職拒絶請託雖同列通熟無敢言者志在經藝專考程試几掌貢部三嵗進幽獨抑浮華朋濫之風翕然一變抑浮華韋貫之為禮部侍郎凡二年所選士大扺抑浮華先行實由是趨競者稍息别頭舉人故事禮部侍郎掌貢舉其親故即試于考功謂之别頭舉人齊抗奏罷之怯懦詭隨劉太真善屬文性怯懦詭隨為禮部侍郎知貢舉等執姻族方鎮子弟先収擢之太真尤長于詩句每出一篇人皆諷誦徳宗文思俊㧞因重陽日賜宴曲江亭御製詩并敘令百僚皆和上自考其詩以太真及李舒等四人為上等得人多至公卿賈餗為中書舍人太和四年權知禮部貢舉五年榜出後即擢禮部侍郎凡典禮闈三嵗所選士七十五人得其名人多至公卿段文昌李紳怒薦託不行而錢徽獲貶錢徽為禮部侍郎時宰相段文昌出鎮蜀川文昌好學尤喜圖書故刑部侍郎楊慿兄弟以文學知名家多書畫鍾王張鄭之蹟在書斷畫品者兼而冇之憑子渾之求進盡以家藏書畫獻文昌求致進士笫文昌將發面託徽繼以私書保薦翰林學士李紳亦託舉子周漢賔于徽及榜出渾之漢賔皆不中選李宗閔與元稹素相厚善初稹以直道譴逐乆之及得還朝大改前志由逕以徼進達宗閔亦急于進取二人遂有嫌隙楊汝士與徽有舊是嵗宗閔子婿蘇朝及汝士季弟殷士俱及第故文昌李紳大怒文昌赴鎮辭日内殿面奏言徽所放進士鄭郎等十四人皆子弟藝薄不當在選穆宗以其事訪於元稹李紳二人對與文昌同遂命中書舍人王起主客郎中知制誥白居易於内廷重試内出題目孤竹管賦鳥散餘花落詩十人不中選貶徽為江州刺史中書舍人李宗閔劔州刺史右補闕楊汝士開江令初議貶徽曰不然茍無愧心得喪一致修身慎行安可以私書相證耶令子弟焚之人士稱徽長者穆宗尋亦知其朋比之端留心貢舉宣宗時禮部侍郎魏秩奏曰臣今年放進士二十三人其封彦卿崔琢鄭廷休等三人實有詞藝為時所稱皆以其父兄見居重任不敢令中選詔令翰林學士承㫖韋宗等重考覆勅曰彦卿等所試文字並合度程可放及第今後但依常例放榜不得别有奏聞帝雅好儒士留心貢舉有時微行人間採聽輿論以觀選士之得實又勅自今進士放榜後杏園任依舊宴集有司不得禁止武宗好巡遊故曲江亭禁人宴聚見放三十人文宗開成中高鍇為禮部侍郎掌貢部三年毎嵗四十人登第後勅曰進士毎嵗四十人其數過多則乖于精選官途填委要窒其源宜改每年限放三十人如不登其數亦聽然鍇選擢雖多頗得實才抑豪華擢孤進至今稱之取瑞栁為賦題吕渭字君載授禮部侍郎中書省有栁樹建中末始死興元元年車駕還京後其樹再榮人謂之瑞栁渭試進士取瑞栁為賦題上聞而嘉之所擢者無非名士崔郾轉禮部侍郎東都試舉人凡兩嵗貢士平心閱賞藝能所擢者無非名士至大中咸通之代為輔相名卿者十人請諸生謁先師劉允章咸通中為禮部侍郎請諸生及進士第並謁先師衣青衿命幘以還古制避是非失貢職王起代錢徽為禮部侍郎先是貢舉猥濫勢門子弟交相酧酢寒門俊造十棄六七及元稹李紳在翰林故有覆試之科及起考進士奏先送中書令宰臣視可否然後下當司放牓從之議者以為起雖避是非失其貢職者也姦人令狐峘為禮部侍郎宰相楊炎以杜封者求補𢎞文生託封於峘峘謂使者曰相公誠憐封欲成一名乞署封名下一字峘得以致之炎不意峘計即署名峘以炎所署奏論言宰相迫臣以私徳宗出疏問炎炎具言所以徳宗怒曰此姦人也欲决杖流之炎苦救解貶衡州别駕以梯登墻賀知章遷禮部侍郎屬㑹立太子薨有詔禮部選挽郎賀知章取舍非允門䕃子弟諠訴盈庭知章乃以梯登墻首出决事時人咸咄之由是以授工部侍郎先責舊文韋陟為禮部侍郎陟好接後軰尤鑒于文雖詞人後生靡不諳練曩者主司取與皆以一塲之著登其科目不盡其方陟先責舊文仍令舉人自通所上詩筆先試一日知其所長㓜後依常式考覈片善無遺美聲盈路奏請兩都試舉人賈至為禮部侍郎是嵗至以嵗歉舉人赴省者奏請兩都分試從之兩都試舉人自至始也不迎送門生五代後唐同光初裴皥拜禮部侍郎前後三知貢舉晉高祖時宰相桑維翰亦成名于皥榜下嘗謁皥於私第皥不迎不送或問之荅曰皥見維翰于中書則庶寮也維翰見皥于私館則門生也何送之有人亦重其耿介禮部郎中隋百官志煬帝諸曹侍郎並改為郎又改禮部為儀曹郎唐職官志禮部郎中一員從五品上員外郎一員從六品上掌貳尚書侍郎舉其儀制而辨其名數六典郎中一人從五品上周官大宗伯屬官下大夫蓋郎中之任也魏晉宋齊梁陳後魏北齊有殿中郎儀曹郎而殿中掌表疏儀曹掌吉凶禮制皆禮部之職也後周依周官置禮部曹監侍郎一人煬帝除侍字又改儀曹皇朝因之稱郎中武徳三年復為禮部龍朔二年改司禮大夫光宅神龍隨曹改復員外郎一人從六品上周官大宗伯屬官有上士後周依焉蓋員外郎之任也隋開皇六年置禮部員外郎煬帝改儀曹承務郎武徳初改禮部員外郎龍朔二年改司禮員外郎咸亨光宅神龍隨曹改復掌同唐職官志凡五禮之儀一百五十有二一曰吉禮其儀五十有五二曰賔禮其儀有六三曰軍禮其儀二十有三四曰嘉禮其儀五十五曰凶禮其儀一十八國朝官品令諸司郎中從六品不忝厥職南史孔易好典故學為齊臺尚書儀曹郎屢箴闕禮多見信納上謂王儉曰孔易真所謂儀曹不忝厥職也臺閣六儀劉杳字士深博綜羣書沈約任昉以下每有遺忘皆訪問焉累遷尚書儀曹郎僕射徐勉以臺閣六儀專委杳焉識見清通詳練故事梁武帝問吏部尚書徐勉求一有學藝解朝儀者為尚書儀曹郎勉曰孔休源識見清通詳練故事自晉宋起居注誦畧上口武帝亦素聞之即日除尚書儀曹郎時多所改作毎建議訪問前事休源即以所誦記隨機斷决曾無疑滯吏部任昉常謂之孔獨誦孔獨誦上南宫舍人見員外郎門碎廢印注禮部員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令諸司員外郎正七品撰定儀注唐韋叔夏授春官員外郎則天將拜洛及享明堂别受制與當時大儒祝欽明郭山輝撰定儀注衆咸推服之不許公主之子補𢎞文館諸生許孟容字公範為濠州刺史徳宗知其才召為禮部員外郎有公主之子請補𢎞文館諸生孟容舉令式不許公主訴於上命中使問狀孟容執奏竟得遷本部郎中碎廢印退朝錄余治平初同判尚書禮部本部掌諸處納到廢印故多率皆無用按唐舊規禮部郎中掌省中文翰謂之南宫舍人百日内須知制誥故王元之與宋給事論云須知百日掌絲綸又謂員外郎為瑞錦窠員外郎㕔前有六石諸州府納到廢印皆於石上碎之又圖寫祥瑞亦員外㕔所掌令狐楚元和初任禮部員外郎有詩云移石幾囘敲廢印開廂何處送新圖是也今之廢印宜准故事碎之瑞錦窠上貢院國朝主判官一人以朝官充若遣官知貢舉即立判官罷舉事畢復别遣官主判掌授諸州解送九經五經進士通禮三禮毛詩尚書學究明法之名籍及家保狀文卷考驗户貫舉數年紀而藏之太平興國三年九月甲申上御講武殿親試禮部合格進士得胡旦以下七十四人並賜及第先是去年諸州已薦士遽詔罷貢舉上恐塲屋間有留滯者復下詔令郡國除三禮三傳學究外悉令今年八月至闕下及是上親試而特放焉故事惟春放牓至是秋試非常例也既而盡賜綠袍手板大中祥符初詔禮部貢院諸貢舉人雖初舉而藝業可取者與其進塲第上因謂王旦等今嵗舉人頗以糊名考校為懼然有藝者皆喜於盡公且諸路發解拘限條置慮遺才俊當稍寛之馮拯曰進士以詩賦進退不考文論且江浙舉人專業詞賦以取科名今嵗望令於詩賦合格人内兼考策論上曰大凡文論可見其才識南人喜誦詩賦及就公試或攘剽舊詩主司能辨之乎旦曰古人警句非後進所及茍竊用之無難辨也五年上親試禮部奏名進士於崇政殿前一日殿之廊廡分列位次署其名氏仍揭於牓使無得移易内出鑄鼎象物賦天險不可升詩以人占天論題摹印以賜官給紙起草印題給紙自此始也慶厯五年詔禮部貢院增天下解額是月詔禮部進士所試詞賦諸科所對經義並如舊制考校之先是復行宋祁等所定科塲新制既而上封者言其非便也治平二年詔貢院如南省放牓故事合格者以名聞俟勅下乃放牓熙寧三年詔貢院聽期喪三月者應舉時因文臣言應制舉陳知彦以朞喪不起既特召試因降是㫖權知貢舉牓出正拜侍郎見侍郎門得人多至公卿注不為時力所揺唐衛次公禮部貢舉斥浮華進真實不為時力所揺真拜中書舍人四典貢部王起權知禮部貢舉前後四典貢部所選皆當代詞藝之士有名于時人皆賞其精鑒徇公也精鑒徇公上號為得人權徳輿貞元十年冬以本官知禮部貢舉來年真拜侍郎凡三嵗掌貢士至今號為得人撤棘五代後唐和凝為翰林學士權知貢舉貢院舊例放榜日設棘于門及閉院門以防不第不逞者凝撤棘啓門是日寂無諠者所放多才能知士時議以為得人明宗益加貴重焉傳衣鉢范質年二十鄉貢進士是嵗翰林學士和凝權知貢舉凝平生常以宰輔自期而登第之嵗姓名在第十三及司貢部覽質之文卷知非常人也洎放牓亦以質為第十三人場屋間謂之傳衣鉢言若禪宗之相付受也其後凝既登庸不十載間質亦大拜至今搢紳之士以為美談選擢寒畯精求藝實真宗咸平元年以翰林學士給事中知制誥楊礪兵部郎中知制誥李若拙大司諫直史館梁顥秘書丞直史館朱台符權知禮部貢舉礪等請對上詔而語之曰貢舉重任當務選擢寒畯精求藝以副朕意奏復夜試竇至固遷禮部尚書知貢舉舊制進士夜試以三燭為限長慶二年改令晝試至固以短晷難成文不盡意失取士之道奏復夜試擇士平允時論稱之南省解一百依除殿前放五十省陌歸田録用錢之法自五代以來以七十七為百謂之省陌今市井交易又尅其五謂之依除咸平五年陳恕知貢舉選士最精所解七十二人王沂公曾為第一御試又落其半而及第者三十八沂公又為第一故京師為之語曰南省解一百依除殿前放五十省陌是也是嵗取人雖少而得士最多宰相三人乃沂公與王公隨章公得象參知政事一人韓公億侍讀學士一人李仲容御史中丞一人王臻知制誥一人陳知㣲而汪白青陽楷雖不達而皆以學知名當世奏乞特收試東齊記事景徳中李迪賈邊皆舉進士有名當時及就省試主文咸欲取之而二人皆不與取其卷視之迪以落韻邊以當仁不讓於師論以師為衆與疏注異說乃為奏且述所以乞特收試時文正為相議迪雖犯不考然出於不意其過可恕如邊特立異說此漸不可啓將令後生務為穿鑿破壞科塲舊格遂收迪即出邊祠部郎中隋百官志見禮部尚書門唐職官志祠部郎中一員從五品上員外郎一員從六品上六典祠部郎中一人從五品上東晉置歴宋齊梁陳後魏北齊皆有祠部郎後周春官府有典祠中大夫一人隋有祠部郎皇朝稱郎中龍朔二年改司禋大夫咸亨九年復故員外郎一人從六品上隋文帝置煬帝改承務郎皇朝復為祠部員外郎龍朔咸亨隨曹改復掌祠祀享祭天文漏刻國忌廟諱卜筮醫藥道佛之事凡祭祀之名有四一曰祀天神二曰祭地祇三曰享人鬼四曰釋奠于先聖先師其差有三若昊天上帝五方帝皇地祇神州宗廟為大祀日月星辰社稷先代帝王岳鎮海瀆帝社先蠶孔宣父齊太公諸太子廟為中祀司中司命風師雨師衆星山林川澤五龍祠等及州縣社稷釋奠為小祀國朝祠部掌祠祀國忌廟諱醫藥道佛祠廟之事官品令尚書諸司郎中從六品冰㕔因話録祠部呼為冰㕔言其清且冷也三世為祠部郎南史賀徳基世傳禮學祖文發父逵至徳基三世為尚書祠部郎徳基于禮記稱為精明禮儀損益周捨博學尤精義理善誦詩書吏部尚書范雲重其才器言之梁武帝召拜尚書祠部郎禮儀損益多自捨出也祀天地不用宫懸八佾姚察為尚書祠部侍郎舊為王肅奏祀天地設宫懸之樂八佾之舞乃因循不革至梁武帝定為事人禮縟事神禮簡古無宫懸之文陳初承用莫有損益宣帝欲設備樂付有司立議以梁武為非時碩學名儒咸希㫖察乃博引經籍獨違羣議據梁樂為是當時莫不慙服僕射徐陵因改同察議其不順時隨俗如此祠部員外郎隋百官志見禮部尚書門唐職官志六典並見郎中門國朝官品令諸司員外郎正七品當官正色未嘗撓沮唐崔沔選祠部員外郎沔為人舒緩訥於造次當官正色未嘗撓沮主客郎中後漢百官志成帝初置主客尚書主外國夷狄世祖分客曹為南主客曹北主客曹晉職官志魏尚書郎有南主客及晉受命武帝置左右主客北主客南主客隋百官志後齊祠部尚書統主客隋禮部尚書統主客膳部侍郎各一人煬帝即位改主客郎為司蕃郎唐職官志主客郎中一員從五品上員外郎一員從六品上六典主客郎中一人從五品上漢舊儀云尚書郎四人其一主匈奴單于蕃部蓋主客之任也魏武有南主客晉氏分左右南北東晉省宋置主客齊梁陳皆因之後魏職品令太和中吏部管南主客北主客祠部管右主客左主客北齊河清令改左主客為主爵南主客為主客郎掌諸蕃雜客事隋開皇為主客郎大業五年改司蕃郎皇朝為主客郎郎中龍朔二年為司蕃大夫咸亨元年復故員外郎一人從六品上隋文帝置煬帝為承務郎皇朝為主客員外郎龍朔咸亨隨曹改復掌二王後及諸蕃朝聘之事其朝貢之儀享宴之數高下之等往來之命皆載於鴻臚之職國朝主客掌契丹諸蕃國朝貢及契丹國信禮物并封襲祭享之事稱職後魏李繗為尚書南主客前後接對凡十八人頗為稱職案此篇所引故實原本祗有此一條其前後俱已缺佚此下一行又有秋匈奴使李道固至詔使主客郎范岫等接對道固等美其醖藉共二十五字注語而失其標目及上下文無可附麗今姑識於此主客員外郎隋百官志見吏部員外郎門唐職官志見郎中門國朝官品令諸司員外郎正七品膳部郎中隋百官志後齊都官統膳部隋禮部尚書統膳部侍郎一人煬帝即位侍郎改為郎唐職官志膳部郎中一人從五品上員外郎一人從六品上掌邦之祭器牲豆酒膳辨其品數及藏冰食料之事六典膳部郎中一人從五品上後魏職品令太和中改定百官都官尚書管左士郎齊河清令改左士郎為膳部郎隋亦號膳部郎皇朝為郎中龍朔為司膳大夫咸亨復故員外郎一人從六品上隋文帝置煬帝改承務郎皇朝復為膳部員外郎龍朔咸亨隨曹改復掌邦之牲豆酒膳辨其品數凡郊祀天地日月星辰岳瀆享祀宗廟百神在京都者用牛羊豕滌養之數省閱之儀皆載於廪犧之職焉若諸州祭岳鎮海瀆先代帝王以太牢州縣釋奠於孔宣父及祭社稷以少牢其祈禜則以特牛凡郊祀天地日月星辰岳瀆及享宗廟百神在京都者所用籩豆簠簋鈃㽅俎之數魚脯醯醢之味石鹽菜菓之羞並載於太官之職焉諸州祭岳鎮海瀆及先代帝王籩豆各十簠簋各二俎三州縣祭社稷釋奠每座籩豆各八簠簋俎如上其所實之物如京都之制凡祀享六罇所實之制並載於良醖之職焉凡天下之珍羞供進之物多少之制封檢之宜並載於尚食之職焉國朝膳部掌牲酒飲膳藏冰食料之事官品令諸司郎中從六品膳部員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令諸司員外郎正七品南宫散郎唐元稹貶江陵府士曹參軍量移通州司馬虢州長史徵還為膳部員外郎稹在荆州日監軍崔潭峻甚禮待之嘗愛其詩什諷誦長慶初潭峻歸朝出稹連昌宫詞等百餘篇奏御穆宗大恱問稹何在對曰今為南官散郎即日轉祠部郎中知制誥大材特薦韋安石應明經舉累授乾佑尉蘇良嗣甚禮之永昌元年三遷雍州司兵良嗣時為文昌左相謂安石曰大材須大用何為役勞於州縣也特薦於則天拜膳司員外郎兵部尚書南齊百官志五兵尚書領中兵外兵十一曹隋百官志後齊尚書分統列曹五兵統左中兵右中兵左外兵右外兵都兵五曹隋兵部尚書統兵部職方侍郎各二人駕部庫部侍郎各一人唐職官志兵部尚書一員正三品侍郎二員正四品下掌天下武官選授及地圖輿馬甲仗之政令六典兵部尚書一人正三品周官夏官卿也漢置五曹未有主兵之任至魏始置五兵尚書謂中兵外兵騎兵别兵都兵也晉太始中有五兵尚書太康中又置七兵以舊五兵尚書中兵外兵分為左右東晉及宋又為五兵孝武大明二年省順帝㫒明元年復置歴齊梁陳後魏北齊皆置五兵尚書後周依周官置大司馬卿一人隋改兵部尚書皇朝因之龍朔元年改司戎太常伯咸亨元年復為兵部尚書光宅元年改夏官尚書神龍元年復故天寳十一載改武部至徳二年復故侍郎二人正四品下周官夏官小司馬中大夫也漢以來尚書侍郎今郎中之任也後周依周官隋煬帝置兵部侍郎皇朝因之龍朔二年改司戎少常伯咸亨元年復為兵部侍郎總章元年増置一員光宅神龍隨曹改復尚書侍郎掌天下軍衛武官選授之政令凡軍師卒戍之籍山川要害之圖廐牧甲仗之數悉以咨之其屬有四一曰兵部二曰職方三曰駕部四曰庫部尚書侍郎捴其職務而奉行其制命凡中外百司之事由於所屬咸質正焉凡選授之制每嵗孟冬以三旬㑹其人去王城五百里集於上旬千里之内集於中旬千里之外集於下旬以三銓領其事一曰尚書銓二曰東銓三曰西銓尚書為中銓兩侍郎分為東西銓以五等閱其人一曰射長垜二曰馬射三曰馬槍四曰歩射五曰應對以三竒抜其異一曰驍勇二曰材藝三曰可為統領之用其尤異者登而仕之否則量以退焉然後據其狀以覈之考其能以進之所以録深功抜竒藝備軍國總勲賢也五品以上皆奏聞而制授焉六品以下則量資注擬其在軍政要籍不得起選委節度使試其等第以申焉其三竒五等之選有殊尤者得令宿衛其宿衛皆帶本官以充其選人有自文資入者取少壯六尺以上材藝超絶考試不堪還送吏部凡官階注擬團甲進甲皆如吏部之制凡大選終於季春之月所以審名實之銓綜備戎仗之物數以戒軍令而振國容焉國朝兵部掌民兵廂軍蕃兵剰員武舉投試武藝金吾街司人兵及大將出征告廟破賊露布鹵簿宇圖及蕃夷屬户授官封襲之事天聖七年詔置武舉應三班使臣諸色選人文武子弟實有軍謀武藝並許兵部投狀乞應投軍機䇿論三卷每卷三道仍召命官三人委保主判官先詳所業閱視人才審驗行止先試一石力弓步射七斗力弓馬射與詔試同第一道合格即御試明年放武舉進士十三人治平元年九月詔復置武舉初天聖七年置至皇祐元年詔罷至是樞宻院奏以為文武二選所關治亂不可闕焉其任用不學無術之人臨時不知應變以撓師律不若素習韜畧頗聞義訓之人緩急驅䇿可以折衝圖勲况今朝廷所用武人稍有聲稱者多由武舉而得則此舉不可廢罷故有是詔仍令兩制詳議所習及取人推恩之數其後兩制議請隨進士等科開設許在京管軍及正任横行使副三司副使知雜及三班院御史諫官府界提㸃獄三路之軍州及路分總管鈐轄各許奏舉一人䇿及武藝優者與殿直次三班奉職借殿侍三班差使䇿不中而武藝絶倫者取㫖學士賈黯又奏請如明經之制於太公略韜孫吳司馬諸兵法又經史言兵事者設為問目以能用已意或用前人注釋義理明暢及因所問自陳方畧可施行者為通從之而令每開舉則兵部至嵗終具所舉人名數以聞至明年二月命館職二人與判兵部同試䇿一道又命馬軍司試弓馬及武藝絶倫具所試等第籍送試䇿官參較合格以名聞至八月則命官與判兵部同試䇿于秘閣命直學士以正任横行使一人與軍頭司試弓馬武藝以所試第等籍送秘閣試官参較合格以名聞官品令兵部尚書從二品講武失軍器唐𤣥宗初即位十一月講武於􅌐山兵部尚書郭元振坐虧失軍器將斬以徇張說於馬前諫曰元振有功於社稷雖軍令不可加刑配流新州方鎮參辭令狐楚奏諸道新授節度使等執弓弩帶器仗就尚書省兵部參辭以軍國異容古今定制事不由舊斯為改常未聞省閤之門忽納弓刀之器鄭注外蒙恩寵内畜兇狂首創奸謀將興亂逆致王璠郭行瑜之軰敢驅將吏直詣闕庭震驚乗輿騷動京國雖既往不咎而其源尚開㐲乞速令停罷如須參謝即具公服從之乆居榮名彌尚簡率李懐逺除兵部尚書雖乆居榮名而彌尚簡率園林宅室無所改作常乗欵段馬左僕射盧欽望謂曰公榮貴如此何不買駿馬乗之荅曰此馬幸免驚蹶無假别求聞者歎美改名順宗冊廣林王純為皇太子兵部尚書王純請改名時議非之皆云皇太子亦人臣也東宫之臣改之宜也非其屬而改之諂也人指樹而懐之吳凑為京兆尹以能政兼兵部尚書官衘樹缺所司植榆以補之凑曰榆非九衢之玩亟命易之以槐及槐隂成而凑卒人指樹而懐之兵部侍郎隋百官志唐職官志六典並見尚書門國朝官品令兵部侍郎從三品辭以越局唐盧豕慶遷民部侍郎太宗尋令檢校兵部侍郎仍知五品選事承慶辭曰選事職在尚書臣今掌之便是越局太宗不許曰朕今信卿何不自信也二人同直無不召見韋澳遷兵部侍郎與同察蕭寘深為宣宗所遇每二人同直無不召見詢訪時事有邦國刑政大夫中使傳宣㫖詞澳心欲論諫即曰此一事須降御札方敢施行遲留至旦必請其可否上㫖多從之勲在王府豈限常格衛次公為兵部侍郎選人李勣徐有功之孫名在黜中次公召而謂曰子之祖先勲在王府豈限常格並優秩而遣之有文武材楊𢎞禮太宗有事遼東以𢎞禮有文武材擢拜兵部侍郎専兵機𢎞禮每入參謀議出則統衆力戰駐蹕之後領馬步二十四軍出其不意以擊之所向摧破太宗見𢎞禮所統之衆人皆盡力謂許敬宗等曰越公兒郎故有家風矣有家風上父子同為南省副貳崔湜為兵部侍郎父挹為禮部侍郎父子同為南省副貳有唐以來未之有也不以死諫先聖韋處厚為翰林學士遷兵部侍郎於思政殿中謝恩諫畋遊及宴起曰臣有大罪願隕首于陛下前帝曰何處厚對曰臣不以死諫先聖縱先聖好畋及色以至不壽今當誅戮然所以不死諫者為陛下在春宫年已十五今知陛下皇子始一嵗矣臣安得更避死亡之誅帝深感其言賜錦綵一百疋銀器四事百口保無反者見宰相門兵部郎中隋百官志後齊五兵統左中兵右中兵左外兵右外兵都兵隋煬帝諸曹侍郎改為郎又改兵部為兵曹郎唐職官志兵部郎中二員從五品上一員掌判帳及天下武官之階品衛府之名數一員掌判簿以摠軍戎差遣之名數六典郎中二人從五品上周官大司馬屬官有軍司馬下大夫蓋郎中之任也魏有五兵郎曹皆置郎中晉有七兵皆置郎中宋有中兵外兵騎兵元嘉以後省騎兵齊因之梁陳有左右中兵左右外兵騎兵郎曹皆置侍郎亦郎中任也後魏北齊有左右中兵都兵郎曹外兵都兵並置郎中後周依周官隋初始置兵部郎曹置侍郎一人煬帝除侍字又改兵部郎武徳初依隋三年改兵部郎中龍朔改司戎咸亨光宅神龍隨曹改復一人掌考武官之勲祿品命以二十有九階承而敘焉從一品曰驃騎大將軍正二品曰輔國大將軍從二品曰鎮軍大將軍正三品曰冠軍大將軍懐化大將軍從三品曰雲麾將軍歸徳將軍正四品上曰忠武將軍正四品下曰壯武將軍從四品上曰宣威將軍從四品下曰明威將軍正五品上曰定逺將軍正五品下曰寧逺將軍從五品上曰游騎將軍從五品下曰游擊將軍正六品上曰昭武校尉下曰昭武副尉從六品上曰振武校尉下曰振武副尉正七品上曰致果校尉下曰致果副尉從七品上曰翊麾校尉下曰翊麾副尉正八品上曰宣節校尉下曰宣節副尉從八品上曰禦侮校尉下曰禦侮副尉正九品上曰仁勇校尉下曰仁勇副尉從九品上曰陪戎校尉下曰陪戎副尉凡敘階之法一如文散官之制凡天下之府五百九十有四上中下並載於諸衛之職一人掌判簿以總軍戎差遣之名數凡天下之節度使有八關内朔方河東河北幽州河西隴右劔南磧西嶺南凡親王摠戎則曰元帥文武官總統則曰總管以奉使言之則曰節度使有大使焉有副大使焉有副使焉有判官焉國朝官品令諸司郎中從六品公務修整唐裴光庭授司門郎中嵗餘轉兵部郎中光庭沈静少言寡交遊既歴清要時人初未之許及在職公務修整衆皆歎服焉有當官之稱李憕驟歴兵吏部郎中給事中憕有吏幹明於几案甚有當官之稱所歴有聲奕盧懷慎少子與其兄奐齊名開元中任京兆司録叅軍天寶初為鄠縣令兵部郎中所歴有聲皆如奐之所治也掌告身印五代史蕭愿梁宰相頃之子性敦謹承事父母未嘗不束帶而見性嗜酒無節職事弛慢為兵部郎中日掌告身印覃恩之次頗息職事父頃為吏部尚書代愿視印篆其散率如此兵部員外郎隋百官志見吏部員外郎門唐職官志兵部員外郎二人從六品上一人掌貢舉及雜請之事一人掌判南曹六典兵部員外郎二人從六品上周官大司馬屬官有司輿司馬上士後周依焉蓋員外郎之任也隋開皇六年置兵部員外郎煬帝改兵曹承務郎皇朝改為兵部員外郎龍朔二年改為司戎員外郎咸亨光宅神龍隨曹改復一人掌貢舉及雜請之事凡應舉之人有謀畧才藝平射筒射皆待命以舉非有常也若州府嵗貢皆孟冬隨朝集使以至省勘責文狀而引試焉亦與計偕有二科一曰平射二曰武舉其試用有七一曰射長垜二曰騎射三曰馬鎗四曰歩射草人五曰材貌六曰言語七曰舉重皆試其高第者以奏聞其科第之優劣勲獲之等級皆審其實而授敘焉一人掌選院謂之南曹毎嵗選人有解狀簿書資歴考課必由之以覈其實乃上三銓進甲則署焉國朝官品令諸司員外郎正七品古今難匹唐杜正倫遷齊州總管府録事參軍太宗聞其名令直秦王府文學館尚書左丞魏徵表薦正倫以古今難匹遂擢授兵部員外郎太宗謂曰朕今令舉行能之人非朕獨私于行能者以其益於百姓也職方郎中周禮夏官職方氏掌天下之地圖主四方之職貢隋百官志兵部掌書掌職方侍郎二人唐職官志職方郎中一員從五品上員外郎一人正六品上六典職方郎中一人從五品上後周依周官隋開皇初始制職方侍郎一人煬帝去侍字武徳三年加中字龍朔二年改司城大夫咸亨元年復故員外郎一人從六品上隋開皇六年置煬帝改承務郎皇朝為職方員外郎龍朔咸亨隨曹改復掌天下之地圖及城隍鎮戍烽候之數辨其邦國都鄙之逺近及四夷之歸化者凡地圖委州府三年一造與版籍偕上省其外夷每有蕃客到京委鴻臚訊其人本國山川風土為國圖以奏焉副上於省其五方之區域都鄙之廢置疆埸之争訟者舉而正之凡天下之上鎮二十中鎮九十下鎮一百三十有五上戍十有一中戍八十有六下戍二百三十有五凡􅇏候所置大率相去三十里國朝職方掌天下地圖以周知方域之廣袤及城隍堡寨􅇏候之數蕃夷歸朝内附之事官品令諸司郎中從六品觀圖唐韋執誼為郎掌諸職方觀圖至嶺南輙瞑目命左右令撤去及為相所坐堂有圖不閱省既易旬試觀之崖州圖也果貶死閏年圖國朝真宗咸平四年職方員外郎秘閣校理吳椒上言諸路府納閏年圖當在職方以掌違者並納儀鸞司伏以天下山川險要皆王室之秘奥國家之急務故周禮職方氏掌天下圖籍又詔土訓以夾王車漢祖入關蕭何獨收秦由是周知天下險要豈可忽而不顧哉今閏年所納並上職方又諸州郡地里犬牙相入向者圖畫一州地圖形則何以𫝊合他邦乞令諸路轉運司依向來諸州畫例毎十年各畫本路諸州圖一本上職方所冀天下險要不窺牖而可知九州廣輪如指掌而斯在從之職方員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令諸司員外郎正七品銓擇清流唐姚朂知河隂縣嘗雪寃獄崔珙奏加酬奨乃令權職方員外郎韋温奏曰國朝以來都官最為清選不可以賞能吏翌日帝謂楊嗣復曰韋温不欲姚朂入省有故事否嗣復對曰韋溫志在銓擇清流上素重温亦不奪其操檢校郎官見尚書郎門駕部郎中隋百官志後齊殿中統駕部唐職官志駕部郎中一員從五品上員外郎一員從六品上六典駕部郎中一人從五品上周禮夏官有司馬之職蓋駕部之任也魏氏始置駕部郎曹歴晉宋齊後魏北齊並有駕部郎中梁陳為駕部侍郎後周夏官府有駕部中大夫一人隋文帝改駕部侍郎煬帝去侍字宋齊左民尚書領駕部梁齊左户尚書領之後魏北齊殿中尚書領之隋則兵部領焉皇朝因之武徳三年加中字龍朔二年改司輿大夫咸亨元年復故員外郎一人從六品上周禮夏官卿有司輿司馬上士後周夏官府有駕部上士一人蓋駕部員外郎之任也隋開皇六年置一人焬帝改承務郎皇朝為駕部員外郎掌邦國輿輦車乗及天下之傳驛廐牧官私馬牛雜畜之簿辨其出入闌逸之政凡三十里一驛天下凡一千六百三十九所而監牧六十有五焉皆分使而統之國朝駕部掌輦路乗廐牧雜畜乗具傳驛之政令辨其出入之數官品令諸司郎中從六品闇對無有遺失北齊馮子琮為駕部郎中攝庫部孝昭帝曾閱部領試令口陳子琮闇對無有遺失奉國竭心隋辛公義為駕部郎中勾撿馬牧所獲十餘萬疋帝曰唯我公義奉國竭心駕部員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令諸司員外郎正七品拊牀唐李靖為駕部員外郎左僕射楊素吏部尚書𢎞皆善之素嘗拊其牀謂靖曰卿終當此坐立意自比王侯王澣為通事舍人遷駕部員外郎櫪多名馬家有妓樂澣發言立意自比王侯上儕類人多嫉之庫部郎中隋百官志後齊度支統庫部隋兵部尚書統庫部侍郎一人煬帝改為郎唐職官志庫部郎中一員從五品上員外郎一人從六品上掌邦國軍州之戎器儀仗及冬至元正之陳設并祠祭喪葬所供之物皆辨其出入之數量其繕造之功以分給焉六典庫部郎中一人從五品上周禮夏官有司甲下大夫為司戎盾弓矢之長各辨其物以待軍事今庫部郎中之任也魏氏始置庫部郎曹歴晉宋齊後魏北齊並有庫部郎中梁陳為侍郎後周夏官府有武藏中大夫一人隋文帝為庫部侍郎焬帝去侍字齊梁陳並都官尚書領庫部後魏北齊度支尚書領隋則兵部尚書領焉武徳三年加中字龍朔二年改司庫大夫咸亨復改員外郎一人從六品周禮夏官卿有司兵中士周有卜武藏下大夫一人蓋員外郎之任也隋開皇六年置煬帝改承務郎皇朝為庫部員外郎龍朔咸亨隨曹復改掌同唐職官志國朝庫部掌軍器儀仗鹵簿法式隨軍防城什物及凡供帳之事官品令諸司郎中從六品詭對仗數宋文帝宴㑹有荒外歸化人在坐帝問尚書庫部郎中顧琛曰庫内仗有幾許琛詭對曰有十萬人仗舊武庫仗多秘不言帝既問悔失言及琛詭對善之固辭不拜江智深元嘉末除庫部郎中時高流官序不為臺郎智深門孤援寡獨有此選意甚不恱固辭不拜置止水於座右唐史孔若思明經學遷庫部郎中若思嘗謂人曰仕至郎中足矣至是置一石滿水於座右以示有止足之意皆有美譽陸象先弟景倩景融景獻景裔歴河南令庫部郎中皆有美譽僧一行少時與象先兄弟相善嘗謂人曰陸氏兄弟皆有才行古之荀陳無以加也甚為當世所稱庫部員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令諸司員外郎正七品遵奉母教唐崔𤣥暉為庫部員外郎其母盧氏嘗誡之曰吾見姨兄屯田郎中辛𤣥馭云兒子從宦者有人來云貧乏不能存此是好消息若貲貨充足衣輕肥此是惡消息吾嘗重此言以為確論汝今坐食祿俸榮幸已多若不能忠清何以戴天履地孔子云雖日致三牲之養猶為不孝又曰父母惟其疾之憂持家修身潔已勿失吾此意也𤣥暉遵奉母氏教誡以清謹見稱論皇甫鎛剝下希㫖李渤為庫部員外郎時皇甫鎛作相剥下以希㫖㑹陳許節度使七美卒令渤充予祭使路次陜西上疏云云後為江州刺史又上疏云云詔所奏實為懇誠若更抑焉必難勝濟所訴逋欠宜令特放止水示足見郎中門職官分紀卷十
