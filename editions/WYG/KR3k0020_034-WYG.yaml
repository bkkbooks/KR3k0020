body:
  text: 職官分紀卷三十四宋孫逢吉撰雜號將軍後漢百官志明帝初置度遼將軍以衛南單于衆新降有二心者後數有不安遂置為常守應劭漢官儀曰度遼將軍孝武帝初用范明友明帝十八年行度遼將軍事安帝元初元年置員銀印青綬秩二千石長史司馬六百石東觀書曰司馬二人晉職官志驍騎將軍遊擊將軍並漢雜號將軍也魏置為中軍及晉以領䕶左右衛驍騎遊擊為六軍宋百官志漢末奮威將軍晉江右伏波輔國將軍並加大而儀同三司沈約宋書吳置輔吳將軍班亞三司南齊百官志冠軍輔國寧朔寧遠龍驤凡諸小號亦有置府者驍騎遊擊晉世以來謂領䕶至驍遊為六軍積射彊弩殿中員外殿中武衛將軍謂之西省鎮蠻安遠䕶軍晉世雜號多為郡領之隋百官志梁天監初武帝命更加釐定於是有司奏置一百二十五號將軍以鎮衛驃騎車騎為二十四班内外通用四征東西南北止施外四中軍衛撫䕶止施内為二十三班八鎮東南西北止施在外左右前後止施在内為二十二班八安同上為二十一班四平東南西北四翊左右前後為二十班凡三十五號為一品是為重號將軍忠武軍師為十九班武臣爪牙龍騎雲麾為十八班代舊前後左右四將軍鎮兵翊師宣惠宣毅為十七班代舊四中郎十號為一品智威仁威勇威信威嚴威為十六班代舊征虜智武仁武勇武信武嚴武為十五班代舊冠軍十號為一品所謂五徳將軍者也輕車征遠鎮朔武旅貞毅為十班代舊輔國凡將軍加大者唯至貞毅而已通進一階優者方得比加位從八凡督府置長史司馬諮議諸曹有錄事記室等卜八曹天監七年更置中錄事中記室巾直兵㕘軍各一人寧逺明逺威逺電耀威耀為十三班代舊寧朔十號為一品武威武騎武猛壯武飈武為十二班電威馳鋭近鋒羽騎突騎為十一班號為一品折衝冠武和戎安壘猛烈為十班掃狄雄信掃虜武鋭摧鋒為九班十號為一品畧遠貞威決勝開遠光野為八班厲鋒輕鋭討狄蕩虜蕩夷為七班十號為一品武毅鐵騎樓船宣猛樹功為六班克狄平虜討夷平狄威戎為五班十號為一品伏波雄㦸長劔衝寇雕騎為四班佽飛安夷克戎綏狄威虜為三班十號為一品前鋒武毅開邊招遠金威為二班綏虜蕩㓂殄虜横野馳射為一班十號為一品凡十品二十四班亦以班多為貴其制品十取其盈數班二十四以法氣序制簿悉以大號居後以為選法自小遷大也前史所記以位得從公故將軍之名次于台槐之下至是備其班品叙于百司之外其不登二品應須軍號有牙門代舊建威為八班候騎代舊振威熊渠代舊振武為七班中監代舊奮威典戎代舊奮武為六班戈船代舊揚威繡衣代舊揚武為五班執訊代舊廣威行陣代舊廣武為四班鷹揚為三班陵江為二班偏將軍禆將軍為一班凡十四號别為公班以象八風所施甚輕又有武安鎮遠雄義擬車騎為二十四班四撫東南西北為四征為二十三班四寧東西南北擬四征為二十二班四威東西南北擬四安為二十一班四綏東西南北擬四平為二十班凡十九號為一品安遠安邊擬忠武軍師為十九班輔義安沙衛海撫河擬武臣等四號為十八班平遠撫朔寧沙航海擬鎮兵為等四號十七班凡十號為一品翊海朔野拓遠威河龍幕擬智威等五號為十六班威隴安漠綏邊寧㓂梯山擬智武等五號為十五班凡十號為一品寧境綏河明信明義威漠擬輕車等五號為十四班安隴向義宣節振朔候律擬寧遠等五號為十三班凡十號為一品平㓂定遠陵海寧隴振漠擬武威等五號為十二班馳義横朔明節執信懷徳擬電威等五號為十一班凡十號為一品撫邊定隴綏關立信奉義擬折衝等五號為十班綏隴寧邊定朔立節懷威擬掃狄等五號為九班十號為一品懷關靜朔掃㓂寧河安朔擬畧遠等五號為八班揚化超隴執義來化度嶂擬厲鋒等五號為七班凡十號為一品平河振隴雄邊横沙寧關擬武毅等五號為六班懷信宣義𢎞節浮遼鑿空擬克狄等五號為五班凡十號為一品横海欵塞歸義陵河明信擬伏波等五號為四班奉忠守義𢎞信仰化立義擬佽飛等五號為三班凡十號為一品綏方奉正承化浮海度河擬先鋒等五號為二班懷義奉信歸誠懷澤仗義擬綏虜等五號為一班凡十號為一品大凡一百九號將軍亦為十品二十四班正施於外國及大通三年有司奏自天監七年改定將軍之名有因有革普通六年又置百號將軍更加刋正雜號之中微有異同大通二年奏移寧遠班中明威將軍進輕車班中以輕車班中征遠度入寧遠班中又置安遠將軍代真武宣遠代明烈其戎夷之號亦加附擬選序則依此承用遂以定制轉則進一班黜則退一班班即階也同班以優劣為前後有鎮衛驃騎車騎同班四中四征同班八鎮同班八安同班四平四翊同班中武軍師同班武臣爪牙龍騎雲麾冠軍同班鎮兵翊師宣惠宣毅四將軍東南西北四中郎將同班智威仁威勇威信威嚴威同班智武仁武勇武信武嚴武同班謂為五徳將軍輕車振朔武旅貞毅明威同班寧遠安遠振遠宣遠同班威雄威猛威烈威振威信威勝威畧威風威力威光同班武猛武畧武勝武力武毅武健武烈武威武鋭武勇同班猛毅猛烈猛威猛鋭猛震猛進猛智猛威猛勝猛駿同班壯武壯勇壯烈壯猛壯鋭壯盛壯毅壯志壯意壯力同班驍雄驍桀驍猛驍烈驍武驍勇驍鋭驍名驍勝驍迅同班雄猛雄威雄明雄烈雄信雄武雄勇雄毅雄壯雄健同班忠勇忠烈忠猛忠鋭忠壯忠毅忠捍忠信忠義忠勝同班明智明畧明遠明勇明烈明威明勝明進明鋭明毅同班光烈光明光英光遠光勝光鋭光命光勇光戎光野同班飈勇飈猛飈烈飈鋭飈奇飈決飈起飈畧飈勝飈出同班龍驤武視雲旗風烈電威雷音馳鋭追鋭羽騎突騎同班折衝武毅和戎安壘超猛英果掃虜掃狄武鋭摧鋒同班開遠畧遠真威決勝清野堅鋭輕鋭拔山雲勇振旅同班超武鐵騎樓船宣猛樹功克狄平虜稜威昭威威戎同班伏波雄㦸長劒衝寇雕騎佽飛勇騎破敵威敵威虜同班前鋒武毅開邊招遠金威破陣蕩㓂殄虜横野馳射同班牙門期門同班候騎熊渠同班中堅典式同班執訊行陣同班伏武懷奇同班偏裨將軍同班凡二百四十號為四十四班又雍州置寧蠻校尉廣州置平越中郎將北涼南秦置西戎校尉南秦梁州置平戎校尉寧州置鎮蠻校尉西陽南新蔡晉熙廬江等郡置鎮蠻䕶軍武陵郡置安遠䕶軍巴陵郡置度支校尉皆立府隨府主號輕重而不為定其將軍施於外國者雄義鎮遠武安同班擬鎮衛等三號四撫同班擬四征四威同班擬忠武等號撫河衛海安沙輔義同班擬武臣等號航海寧沙輔朔平遠同班擬鎮兵等號龍幕威河和戎招遠朔野翊海同班擬智威等號梯山寧㓂綏邊安漠威隴五號同班擬智武等號威漠明義昭信綏河寧境同班擬輕車等號候律振朔宣節向義安隴同班擬寧遠等號振漠寧隴陵海安遠平㓂同班擬威雄等號懷徳執信明節横朔馳義同班擬武猛等號安朔寧河掃寇靜朔懷關同班擬驍雄等號度障奉化康義超隴揚化同班擬猛烈等號寧關横沙雄邊振隴平河同班擬忠勇等號鑿空浮遼𢎞節宣義懷信同班擬明智等號明信陵河歸義欵塞捍海同班擬光烈等號立義仰化𢎞信守義奉忠同班擬飈勇等號奉誠立誠建誠顯誠義誠同班擬龍驤等號尉遼寧渤綏嶺威塞通候同班擬折衝等號掃荒明英遠勝鋭命勇戎野等十光飈勇烈猛鋭奇決起勝畧出等十飈將軍平鉞中郎廣梁南秦南梁寧等州小府西戎平戎鎮蠻三校尉等擬官一百四號品第六並千石龍驤武視雲旂風烈電威雷音馳鋭追鋭羽騎突騎折衝冠武和戎安壘超猛英果掃虜掃狄武鋭摧鋒開遠畧遠貞威決勝清野堅鋭輕車拔山雲勇振旅等將擬官三十號品第七並六百石超武鐵騎樓船宣猛樹功克狄平虜稜威戎昭威戎伏波雄㦸長劔衝寇雕騎佽飛勇騎破敵克敵威虜等將軍鎮蠻䕶軍西陽南新蔡晉熙廬江郡小府鎮蠻安遠䕶軍度支校尉隨府主號輕重若单作則減太守内史相一階若有將軍減將軍一階安遠䕶軍度支校尉巴陵郡丞等擬官二十三號品第八並六百石前鋒武毅開邊招遠金威破陣蕩㓂殄虜横野馳射等將軍擬官十號品第九並四百石諸將軍起自六品以下板則無秩其雖除不領兵領兵不滿百人拜除此官而為州郡縣者皆依本條減秩石二千石減為千石千石減為六百石自四百不降而無秩其州郡縣自各依本秩論凡板將軍皆降除一品諸依此減降品秩後齊中鎮撫軍將軍二將軍武職罷任者為之領軍䕶軍翊軍將從二品冠軍領左右武衛輔國龍驤從三品鎮遠安遠武騎雲騎驍騎游擊建忠建節四品中堅中壘左前右後振威奮武直閤從四品廣徳𢎞義折衝制勝五品伏波陵江輕車樓船從五品勁武昭勇明威顯信六品度遼横海踰岷越障從六品戎昭武毅積武積射雄烈恢猛七品揚麾曜鋒彊弩蕩邊開域從七品靜漠綏戎殿中平越殄夷八品飛騎隼擊武牙武奮員外從八品清野横野九品偏裨從九品後周中鎮撫等將軍八命冠軍輔國七命鎮遠建忠正六命中堅寧朔正八命寧遠揚烈八命伏波輕車正七命宣威明威七命襄威厲威正六命威烈討㓂正八命蕩㓂蕩難八命殄㓂殄難正七命掃㓂掃難七命曠野横野正六命武威武牙一命後周中鎮撫等八命至武牙一命其詳載在盧辯傳隋高祖採後周之制六品以下置翊軍等四十三號將軍品凡十六等為散號將軍以加汎授翊軍翊師四征東西南北三將軍内鎮撫為正六品四平東西南北四將軍前後左右冠軍輔國為從六品鎮遠安遠建威寧朔為正七品寧遠鎮威伏波輕車為從七品宣威明威襄威厲威為正八品威戎討㓂盪㓂盪難為從八品殄㓂殄難掃㓂掃難為正九品曠野横野偏裨為從九品輔國將軍王隠晉書王濬為輔國大將軍送皷蓋晉王導為輔國大將軍上牋曰昔魏武達政之主也荀文若功臣之最也封不過亭侯倉舒愛子之寵贈不過别部司馬以此格萬物得不局跡乎今者臨郡不問賢愚豪賤皆加重號輒有皷蓋時有不得者或為耻辱天官混雜朝望頹毁導忝荷重任不能崇浚山海而開創亂源饕竊名位取紊彛典謹送皷蓋加崇之物請從導始庻令雅俗區别羣望無惑開府羊秀贈輔國大將軍開府儀同百褌梁吉土膽少時常于南蠻國中擲博無褌褰露為儕輩所侮及平魯休烈軍得絹三萬疋仍作百褌其外並賜軍士不以入室以軍功除輔國將軍步兵校尉冠軍將軍卿子史記楚義帝以宋義為卿子冠軍功冠三軍前漢武帝以霍去病征匈奴功冠三軍封冠軍侯揮劔截蛟鄧遐為冠軍將軍勇力絶人氣蓋當時時人方之樊噲數從桓温征伐襄陽城北沔水中有蛟常為人害遐遽拔劔入水蛟龍繞其足遐揮劔截蛟數段而出威畧之聲著于方外晉起居注武帝泰始七年議郎胡奮開爽忠亮有文武材幹歴位外内明于戎事威畧之聲著于方外以為冠軍將軍與卿盡布衣之適齊書劉悛嘗從駕登蔣山上數嘆曰貧賤之交不可忘糟糠之妻不下堂顧謂俊曰此況卿也言世冨貴好改其素情吾雖有四海今日與卿盡布衣之適悛起謝拜為冠軍將軍奏課聯最梁任昉齊竟陵文宣王以奏課聯最號為冠軍將軍遊擊將軍漢書太初元年蘓建韓說皆為之不喜得遼東喜得卿唐書太宗征遼東薛仁貴應募從行仁貴自恃驍勇欲立奇功乃異其服色著白衣握㦸腰鞬張弓大呼先入所向無前賊盡披靡却走大軍乘之賊乃大潰太宗遙望見之遣馳問先鋒白衣者為誰特引見擢授遊擊將軍及軍還太宗謂曰朕舊將皆老不堪授閫外之寄毎欲抽擢驍雄莫如卿者朕不喜得遼東喜得卿也攻彭寵袁宏漢記建武二年以鄧隆為遊擊將軍陰助朱浮軍以攻彭寵領兵未欲出山濤啟事遊擊將軍諸葛沖精果有武擬補兖州詔荅曰沖領兵未欲出之龍驤將軍白衣領職晉陶侃為龍驤將軍擊杜弢破之遣㕘軍王貢告捷于王敦貢還至竟陵矯侃命以杜曽為前鋒大督䕶擊賊王沖斬之悉降其衆侃召曽不到貢又恐矯命獲罪與曽舉兵反擊侃賊鉤侃所乘艦侃窘走入小船僅而獲免坐是免官王敦表侃以白衣領職侃復進軍擊杜弢大破之王敦於是奏復侃官山南之事一以委卿晉載記苻堅入宼以姚萇為龍驤將軍益梁州諸軍事謂萇曰朕本以龍驤建業龍驤之號未曽假人今特以相授山南之事一以委卿堅左將軍竇衝進曰王者無戲言此不祥之徴也惟陛下察之堅黙然童謠羊祜别傳先時吳有童謠曰阿童復阿童銜刀浮渡江不畏岸上獸但畏水中龍祜聞之曰此必水軍有力即表王璿為龍驤將軍謀伐之璿小字阿童也夢天神車頻秦書苻堅與苻健西入關堅時年十二未有軍號健夢天神遣使者朱衣赤冠拜堅為龍驤將軍驍騎將軍匈奴不入界前漢李廣為驍騎將軍在北平郡匈奴號曰漢飛將軍避之數嵗不入界飛將上攻中山東觀漢記光武以劉植為驍騎將軍攻中山擊涿郡建武九年以劉喜為驍騎將軍擊涿郡與計事魏志董卓立獻帝表太祖為驍騎將軍與計事太祖乃變姓黄鬚魏畧任城威王彰性湧而鬚黄為驍騎將軍北出塞為㓂所要彰獨與麾下數百騎突湧太祖聞之曰我黄鬚兒真可用也及劉備使劉封挑戰太祖罵曰賣履舍兒長使假子拒汝公乎待呼我黄鬚來令擊之重登禮閣兼掌六軍齊書江斆為侍中轉都官尚書領驍騎將軍王晏啟武帝曰江斆今重登禮閣兼掌六軍慈渥所覃實有優忝但語其事任殆同閒輩天㫖既欲升其名位愚謂以侍中領驍騎望實清顕殆有殊納言上曰斆常啟吾為其鼻中惡今既以何𦙍王瑩還門下故有此回換爾建威將軍攻洛陽東觀漢記光武以耿弇為建威將軍從攻洛陽破吕範魏志賈逵黄初中破吕範於洞浦加建威將軍奮威將軍儀比三司魏志吕布殺董卓王允以布為奮威將軍假節儀比三司説袁紹沮授少有大志説袁紹紹表為奮威將軍沮音俎誓江晉元帝既拓定江南乃以祖逖為奮威將軍豫州刺史逖度江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江振威將軍伐蜀有功魏志牽招字子經次子𢎞任毅有父風伐蜀有功為振威將軍振武將軍乘長風破萬里浪宋史宗慤年少時叔父少文問其所志慤曰願乘長風破萬里浪後為振武將軍曵牛尾却行數步三十國春秋振武將軍劉陽驍猛甚有勇力曵牛尾却行數步奮武將軍討平豫章賊吳志賀齊豫章東部民彭材李玉王海等起為賊亂衆萬餘人齊討平之誅其首惡餘皆降復揀其精健為兵次為縣户遷奮武將軍揚威將軍臧霸止張遼魏志臧覇從太祖討孫權於濡須口與張遼為前鋒行遇霖雨大軍先及水遂長賊船稍進將士皆不安遼欲去霸止之曰公明於利鈍寧肯捐吾等邪明日果有令遼至以語太祖太祖喜之拜為揚威將軍建武將軍姿才容觀蜀志劉封傳文帝善孟達姿才容觀以為建武將軍伏波將軍東觀漢記光武以馬援為伏波將軍王隠晉書武帝以孫秀為伏波將軍環濟要畧伏波者船涉江海欲使波浪伏息也伐南越前漢武帝以路博徳為伏波將軍伐南越出入卧内魏志夏侯惇為伏波將軍領河南尹使得以便宜從事太祖常與同載特見親重出入卧内諸將莫得比也矍鑠後漢馬援少有大志交趾女子徵側徵貳反升援伏波將軍南擊交趾斬徵側徵貳傳首洛陽振旅還京師後武威將軍劉尚擊武陵五溪蠻夷深入軍没援因復請行時年六十二帝愍其老未許之援自請曰臣尚能被甲上馬帝令試之援據鞍顧眄以示可用帝笑曰矍鑠哉是翁也虎威將軍假節鎮江陵吳志朱然從孫權討關羽别與潘璋到臨沮禽羽選昭武將軍虎威將軍吕䝉病篤權問曰卿如不起誰可代者䝉對曰朱然膽守有餘愚以為可任䝉卒權假然節鎮江陵使卿門世不乏齊書柳世隆元景弟子也出為虎威將軍上庸太守帝謂元景曰卿昔以虎威之號為隨郡今復以授世隆使卿門世不乏公也才任大將魏于禁字文則將軍王朗異之薦禁材任大將軍太祖召見與語拜軍司馬後拜虎威將軍破虜將軍持節後漢更始遣光武以破虜將軍行大司馬事持節北渡河不與諸將爭功魏志李典字夢成為破虜將軍好學問貴儒雅不與諸將爭功敬賢士大夫恂恂若不及軍中稱其長者揚武將軍發四郡兵擊李憲後漢馬成以揚武將軍發㑹稽丹陽九江六安四郡兵擊李憲進圍憲於舒令諸軍各深溝高壘憲數挑戰成堅壁不出嵗餘至六年春城中食盡乃攻之遂屠舒斬李憲征虜將軍憂國奉公東觀漢記祭遵為征虜將軍亷潔奉公光武歎曰安得憂國奉公如祭征虜者乎醉罷魏志太祖以臨菑侯植行征虜將軍欲遣叔曹仁呼有所勅戒而植醉於是罷之金紫將軍沈約宋書征虜將軍世號金紫將軍輔漢將軍後漢光武以鄧奉為輔漢將軍厲威將軍魏志太祖征荆州還留滿寵行厲威將軍按滿寵傳行奮威將軍盪魏將軍取船備害吴志吕據太元元年大風江水溢流漸淹城門權使視水獨見據使人取大船以備害權喜之拜盪魏將軍盪㓂將軍慷慨壯烈士人貴之蜀志張嶷自越巂徵詣成都夷民戀慕扶轂泣涕過旄牛邑邑君襁負來迎及追尋至蜀郡界其督相率隨嶷朝貢者百餘人嶷至拜盪㓂將軍慷慨壯烈士人咸多貴之鷹揚將軍假赤幢皷吹晉郭奕咸寧初遷雍州刺史鷹揚將軍尋假赤幢曲葢皷吹牙門將軍數有戰功蜀志魏延以部曲將隨先主入蜀數冇戰功遷牙門將軍破羌將軍與將士同君後漢段紀明為破羌將軍行軍仁愛士卒疾病者親自瞻省為裹創在邊十餘年未嘗一日蓐寢與將士同苦故皆樂為死戰材官將軍屯馬邑前漢武帝以李息為材官將軍屯馬邑折衝將軍魏志太祖以樂進為折衝將軍虎牙將軍伐匈奴前漢宣帝以雲中守田順為虎牙將軍伐匈奴從平河北後漢葢延長八尺與吴漢同歸光武從平河北光武即位拜虎牙將軍戈船將軍置戈船下漢書歸義侯越嚴為戈船將軍越人於水中負人船又有蛟龍為害故置戈於船下因以為名度遼將軍匈奴懷其恩信後漢耿秉建初元年拜度遼將軍視事七年匈奴懷其恩信匈奴聞秉卒舉國號哭至梨面流血梨即􅋇字􅋇割也無文武之才忝鷹揚之任陳龜桓帝時為度遼將軍臨行上疏云臣頑駑之器無鉛刀一割之用臣聞三辰不軌擢士為相蠻夷不恭拔卒為將臣無文武之材而忝鷹揚之任上慙聖朝下懼素餐下瀨將軍下瀨船前漢武帝紀甲為下瀨將軍下蒼梧甲故越人歸漢者也瀨湍也吴越謂之瀨中國謂之磧伍子胥書有下瀨船横野將軍與諸將絶席後漢王常拜横野大將軍位次與諸將絶席大樹將軍獨屏大樹下後漢諸將論功馮異獨屏大樹下軍中號曰大樹將軍漢忠將軍與諸將絶席東觀漢記光武於大㑹中指王常謂羣臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日以常為漢忠將軍位次與諸將絶席討虜將軍擊賈覽東漢光武以王霸為討虜將軍擊賈覽寧朔將軍容貌魁壯有雄豪風北齊書爾朱渾元父買奴容貌魁壯有雄豪風拜寧朔將軍建義將軍攻朱鮪東觀漢記光武以朱祐為建義大將軍攻朱鮪刺姦將軍後漢光武以軍市令祭遵為刺姦將軍授以常所持節東觀漢記岑彭從光武拜為刺姦大將軍使督察衆營授以常所持節輔威將軍東觀漢記光武拜臧宫為輔威將軍揚化將軍東觀漢記光武拜堅譚為揚化將軍都䕶將軍累從征伐魏志曹洪累從征伐拜都䕶將軍立義將軍驍勇魏志龎徳字令明太祖定漢中徳隨衆降太祖素聞其驍勇拜立義將軍中堅將軍魏志太祖以許禇為中堅將軍又以張遼行中堅將軍討逆將軍吳志曹公表孫策為討逆將軍封吳侯輔吳將軍吳志孫權以張昭為輔吳將軍積射將軍晉太康中立積射積弩營二千五百人並以將軍領之稱鄧艾之忠世語積射將軍樊震對武帝稱鄧艾之忠詣闕陳停軍之狀後周于謹除積射將軍又隨廣陽王元深征鮮于修禮停軍中山侍中元晏宣言於靈太后曰廣陽王以宗室之重受律専征乃今盤桓不進坐圖非望又有于謹者智畧過人為其謀主恐非陛下純臣靈太后詔於尚書省門外立牓募能獲謹者許以重賞謹聞之乃謂廣陽曰今女主臨朝取信讒佞脱不明白殿下素心便恐禍至謹請竦身詣闕歸罪披露心腹元深許之謹遂到牓下曰吾知此人衆共誌之謹曰我即是也有司以聞靈太后乃引見之大怒謹備述廣陽忠欵兼陳停軍之狀太后遂捨之積弩將軍晉書見積射將軍門東漢傅俊從世祖破王尋等拜積弩將軍沈約宋書積弩將軍晉官也齊職儀積弩將軍品第四銀章青綬武冠綘朝服佩水蒼玉彊弩將軍前漢太初二年以路博徳為彊弩將軍神爵二年以許延壽為之伐匈奴前漢元狩元年以李阻為彊弩將軍伐匈奴殿中將軍持斧殺牛𤣥中記漢桓帝時游河上忽有一青牛從河中出直走盪桓帝邊人皆走太尉何公時為殿中將軍為人勇力輒走往逆之牛見公往乃反走還河未至河公及牛仍以手抜牛左足以右手持斧破牛頭殺之此青牛乃萬木精也用才學士以廣視聴語林庾公被代王公先書與郄公曰老賊轉欲漸張殿中將軍舊用才學士以廣視聴而顧悉内面牆人是欲蔽王之明決欲勒數州之衆以除君側之惡今年立舉蔑不濟矣禁省八載不請休息徐爰宋書申括字通敏恬淡少懷貞裕志業介然拜殿中將軍禁省八載不請休息時輩莫之及也撤去御坐晉紀瞻見丞相祭酒門員外將軍魏氏官志員外將軍從第八品隋百官志同朱衣直閤魏志元文景大司農卿康之次子除員外郎冠軍將軍朱衣直閤直閤將軍後魏書楊曄性雅厚頗有文學起家奉朝請稍遷直閤將軍夢騎五色獅子蕭子顯齊書王敬則生時胞衣紫色年長而兩腋下生乳各長數寸夢騎五色獅子明帝即位擢為直閣將軍布衣蔬食齊劉善明直閤將軍魏克青州善明母在為移置代都善明布衣蔬食哀戚如持喪明帝毎見為之嘆息藴藉改名齊春秋魚復侯子響為荆州刺史直閤將軍董蠻粗有氣力子響要與同行蠻曰殿下癲如雷敢相逐耶子響笑曰敢出此語亦復甚癲上聞而不悦曰人名蠻復何容得藴藉乃改名為仲舒直寢朴直少言後魏于忠弱冠拜侍御中散文明太后臨朝刑政頗峻忠朴直少言終無過誤除左中郎將領直寢直後説降田流蕭子顯齊書臨海亡命田流自號東王逃竄㑹稽鄧縣邊海山谷中立屯營兵不能討明帝遣直後聞人襲説降美形貌後魏元天穆性和厚美形貎年二十嵗起家員外郎直後直齋後魏官志太和九年十月初置直齋職官分紀卷三十四
