body:
  text: 職官分紀卷十七宋孫逢吉撰太史局周禮太史頒告朔於邦國禮記月令孟春乃命太史守典奉法司天日月星辰之行宿離不貸毋失經紀史記厯書太史公曰神農以前尚矣葢黄帝考定星厯建立五行起消息正閏餘於是有天地神祇物類之官是謂五官各司其序不相亂也少皥氏之衰也九黎亂徳顓頊乃命南正重司天以屬神命火正黎司地以屬民其後三苗服九黎之徳故二官咸廢所職而閏餘乖次孟陬殄滅攝提無紀厯數失序堯遂復重黎之後不忌舊章使復典之而立羲和之官明時正度前漢百官表少昊鳥官張晏曰少昊之立鳯鳥適至因以名官鳯鳥氏為厯正奉常秦官屬官有太史後漢百官志太常太史令一人六百石本注曰掌天時星厯漢官儀曰太史待詔三十七人其六人治厯三人龜卜三人廬宅四人曰時二人易筮二人典禳九人籍氏計氏典昌氏各三人嘉法請雨解事各二人醫二人丞一人明堂及靈臺丞一人二百石本注曰二丞掌守明堂靈臺靈臺掌候日月星氣皆屬太史漢官曰靈臺待詔四十二人其十四人候星二人候日三人候風十二人候氣三人候晷景七人候鍾律一人舍人晉百官志太常有太史太史又别置靈臺丞隋百官志梁太常有太史太史别有靈臺丞後齊太常有太史太史兼領靈臺太卜二局丞靈臺掌天大觀候太卜掌諸卜筮隋高祖太史置令丞各二人司厯二人監候四人其厯天文漏刻視祲各有博士及生員煬帝秘書省改太史局為監造令階為従五品又減丞為一人置司辰師八人増置監候為十人唐百官志司天臺監一人正三品少監二人正四品上丞一人正六品上主簿二人正七品上主事一人正八品下監掌察天文稽厯數凡日月星辰風雲氣色之異率其屬而占有通𤣥院以藝學召至京師者居之凡天文圖書器物非其任不得與焉每季録祥眚送門下中書省紀于起居注嵗終上送史館嵗頒厯于天下武徳四年改太史監曰太史局𨽻秘書省七年廢監候龍朔二年改太史局曰秘書閣局令曰秘書閣郎中武后光宅元年改太史局曰渾天監不𨽻麟臺俄改曰渾儀監置副監及丞主簿改司辰師曰司辰長安二年渾儀監復曰太史局廢副監及丞𨽻麟臺如故改天文博士曰靈臺郎厯博士曰保章正景龍二年改太史局曰太史監不𨽻秘書省復置丞景雲元年又為局𨽻秘書省踰月為監嵗終復為局二年改曰渾儀監開元二年復曰太史監改令為監置少監十四年太史監復為局以監為令而廢少監天寳元年太史局復為監自是不𨽻秘書省乾元元年曰司天臺藝術人韓穎劉烜建議改令為監置通𤣥院及主簿置五官監候及五官禮生十五人掌布諸壇神位五官楷書手五人掌冩御書有令史五人天文觀生九十人天文生五十人文厯生五十五人初有天文博士二人正八品下厯博士一人従八品上司辰師五人正九品下装書厯生掌候天文掌教習天文氣色及掌冩御厯其後皆省焉六典太史局令二人従五品下左傳曰天子有日官即太史也晉太史令品第七秩六百石銅印墨綬進賢一梁冠絳朝服江左高瑩以侍中陳卓以義熈守具道欣以殿中侍御史兼太史宋齊梁陳並同後魏北齊因之後周春官府置太史巾大夫一人掌厯家之法隋秘書省太史曹置太史令二人従七品上煬帝改曹為監進令階為従五品皇朝因之改監為局龍朔二年改為秘書閣局令改為秘閣郎中咸亨元年復舊久視元年改為渾天監不𨽻麟臺其令監置一人加至第五品上因加副監及丞主簿府史等員其年又改為渾儀監長安二年復為局還𨽻麟臺縁監置官及府史等並廢其監依舊為令置二人景龍二年改局為監令名不改不𨽻秘書開元二年又改令為監三年加従第四品下其一員改為少監十四年又改為局復為太史令二員𨽻秘書乾元元年改為監升従三品加秘書品秩丞二人従七品下司馬彪續漢書志云太史丞一人秩二百石魏晉宋齊皆同梁陳三品勲位隋置二人正九品上煬帝减一人皇朝不置丞久視改渾儀監使置丞二人従七品上長安二年又省景龍二年復置乾元升為監與諸司少監同品令史二人書令史四人其屬有司厯靈臺郎挈壺正司厯二人従九品上漢官儀太史局有理厯六人至晉有典厯四人歴宋齊梁陳後魏北齊皆有典厯並史闕其員品至隋改典厯為司厯置三人従九品下取左傳司厯為名皇朝為従九品上乾元加五官之名矣掌國之厯法造厯以頒於四方有戊寅厯武徳初東都道士傅仁均所造拜太史令麟徳厯麟徳中太史令李淳風造神龍厯神龍中太史令南宫說所造大衍厯開元十四年嵩山僧一行承制㫖考定最為詳宻今見行五紀厯寳應元年司天臺郭獻之造正元厯建中四年司天徐承嗣等造觀象厯元和二年司天徐昂造宣明厯長慶二年穆宗詔百官改造崇𤣥厯景福元年太子詹事邉崗等撰凡天下測影之處分至表凖其詳可載故參考星度稽騐晷影各有典常國朝因梁曰司天監或以他官兼判又有同判之名以朝官充掌察天文祥異鐘鼓刻漏稽定厯數供諸壇祠祀神名位版畫日每年預造厯以頒于四方有應天厯建隆二年以周顯徳二年王朴所撰歛天厯差繆四年司天少監王處訥所定建隆應天厯凡六卷乾元厯太平興國七年司天冬正呉昭素造儀天厯咸平四年翰林天文太子洗馬呉序等造崇天厯元聖元年司天監造監従三品監闕則以五官正二人判監事又有測騐渾儀官同知筭造及三式之名少監従四品下至道元年以殿中丞判司天監苗守信權知司天監判監事立于本品之下丞正七品上主簿従七品下治平二年詔司天臺官自今不差監諸倉門明天厯國朝治平元年賜新厯名曰明天命翰林學士星承㫖王珪序之初上即位司天監奏崇天厯五之行及諸節氣有差詔權判司天監周琮七人同造新厯成而冬官正舒易簡監生李道各獻其所造厯經詔翰林學士范鎮諸王府侍講孫思恭國子監直講劉攽詳定琮等所造最宻乃用其厯遷琮等各兩官然厯後不可用而琮等奪所得官令前漢後漢晉隋唐並見太史局門賈誼新書不知日月之不時節不知先王之諱與國之大忌不知風雨電雹之生目凡此其屬太史之任也見傳職連語沈約宋書太史掌厯數南齊百官志太常太史令一人環濟要略太史令取善紀述者使記時事天子圖書典籍皆付焉國朝元祐官品令太史局令従七品執簡以往左傳太史書崔杼弑其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以往聞既書已乃還聘魯觀書晉韓宣子聘魯觀書于太史氏見易象與魯春秋曰周禮盡在魯矣史伯國語鄭桓公為司徒問于史伯曰王室多故余懼及馬史伯周太史也載其圖法呂氏春秋太史令終古見夏桀惑亂載其圖法而泣出奔商商太史高勢見紂之迷亂載其圖法出奔周晉太史令屠東見晉之亂載其圖法歸周典天官事漢書司馬喜生談談郎為太史公遷生仕為中奉使西征巴蜀江南略卭筰昆明還報命是嵗太子始建漢家之封而太史公留滯周南不得與従事發憤且卒而子遷適反見父于河雒之間太史公執遷手而泣曰予先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絶於予乎汝復為太史則續吾祖矣今天子接千嵗之統封泰山而予不得従行是命也夫命也夫予死爾必為太史為太史毋忌吾所欲論著矣遷俯首流涕曰小子不敏請悉論先人所次舊聞不敢闕卒三嵗而遷為太史令博學章秦太史令胡母敬作博學章博通古今東觀漢記隂猛以博通古今為太史令天道深逺幸勿多言張璠漢記曰初王師敗於曹陽欲浮河東下持中天津熒太史令王立曰自去春太白現鎮星于牛斗過惑又過行守北河不可犯也由是天子遂不北渡河將自近関東出立又謂宗正劉艾曰前太白守天関與熒惑㑹金火交㑹革命之象也漢祚終矣晉魏必有興者立後數言于帝曰天命有去就五行不常盛代火者土也承漢魏也能安天下者曹姓也惟委任曹姓而已曹公聞之使人語立曰知公忠于朝廷天道深逺幸勿多言也乗傳行天下求古史記漢舊儀成周史官至武帝置太史公司馬遷父談世為太史遷年十三便乘傳行天下求古諸侯之史記箴揚雄太史令箴曰昔在泰古肇初受記天地之紀重黎是司降及唐虞乃命羲和欽若吴天百政攸宜夏帝不順羲和不令廢時亂日帝旅爰征庶僚至殷天為難諶夏氏黯徳神明不蠲黄龍見其國當有王者魏志黄龍見譙橋𤣥問太史令單颺曰其國當有王者對崇華殿災高堂隆為侍中領太史令崇華殿災文帝問隆此何咎于禮寧有祈禳之義乎隆對曰夫災變之發皆所以明教誡也惟率禮修徳可以勝之易傳曰上不儉下不節孽火燒其室又曰君高為臺天火為災此人君務餙宫室不知百姓空竭故天應之以旱火従高殿起也上天降鍳故譴告陛下陛下冝増崇人道以答天意乃遂復崇華殿時郡國有九龍見故改曰九龍殿凌宵闕始搆有鵲巢其上帝以問隆對曰詩云惟鵲有巢惟鳩居之今興宫室起凌宵闕而鵲巢之是宫室未成而身不得居之象也天意若曰宫室未成將有它姓制御之斯乃上天之戒也與吏爭肉隆以侍中領太史令隆集上事曰太史令許芝所典諸祀逺不度于古近不儀於今每祭與吏爭肉自取百斤猶恨其少占驗明審呉志呉範字文則占驗明審權以為騎都尉領太史令數従訪問欲知其訣範秘惜其術不以至要語權權由是恨之撰呉書韋曜孫亮即位諸葛恪輔政韋曜為太史令撰呉書作渾天儀後漢張衡善機巧尤致思于天文隂陽歴筭安帝雅聞衡善術學公車特徵拜郎中再遷為太史令遂乃研覈隂陽妙盡璇璣之正作渾天儀著靈憲筭綱論言甚詳明兩眼看天唐美師見刺史門一心穿地注正國朝元祐官品令太史局正正八品五官正厯渾儀唐職官志乾元三年置春官夏官秋官冬官中官正各一人正五品上副正各一人正六品上掌司四時各司其方之變異冠加一星珠以應五緯衣従其方色元日冬至朔望朝㑹及大禮各奏方事而服以朝見國朝至道元年詔五官正磨勘非次改官至殿中丞止以後只加檢校官乾興元年詔自今不得依京朝官例差監庫務見監當者候滿日差替治平三年詔司天臺官自今不差監諸倉門元祐官品令五官正正八品造厯精宻國朝太平興國四年司天冬官正呉昭素及主簿劉内真苗守信造新厯成凡經紀律度為二巻晨昏為一本一卷曰躔隂陽經星一一巻日出入刻一卷晝夜刻入一卷作分五更中本共九卷以獻上命衛尉少卿元象宗與明厯者同校定賜號乾元厯丄自製序先是以應天厯小差因詔重定昭素所造頗為精宻渾儀制度九事至道元年十二月新鑄渾儀成先是秋官正韓顯符請造渾儀官給册度使顯符規度至是鑄成于司天監築臺置之賜雜綵五十段顯符自言新鑄渾儀制度九事定天經雙規各長六尺一寸三分周圍一丈八尺三寸九分面濶四寸五分厚五分上均賦三百六十五度南北並立與平凖支合半在地上出平凖三十五度安其金釧乃北極出地之度四迴迴屬十二度屬紫微宫計星三十七座一百七十五星十度四迴二百二四時常見謂之上規其中一百一十度屬黄赤道内外官星二百四十六座一千二百八十九星近日而既逺曰而見謂之中規於地盤平凖之下繞南極四週七十二度除老人星外四時常隠謂之下規一定遊規直經五尺二寸周圍一丈五尺六寸濶一寸二分厚四分均賦三百六十五度用規釭釧安雙規巔軸之上令得左右轉運夾其規管量衆星隨天周徧無所不至兩一定直矩二片長四尺八寸闊一寸二分厚四分于衡之間用夾規管中置軸令得周旋隨其遊規用轉規管以候辰宿内一定規管長四尺八寸闊一寸二分軸在直矩之謂之旋樞使人即規望于下衡即運動於上用逺近齊日月五星進退贏縮所至度量衆星互相之數一定地盤平凖輪直經六尺一寸三分周圍一丈八尺三寸九分上分八卦十千十二辰二十四氣七十二候中定四維日辰時正晝夜一百刻分一定赤道鐶直徑五尺三寸五分周圍一丈六尺五闊一寸厚五分均賦三百六十五度于雙規内去兩極各九十一度强令東西出于夘酉乃春分秋分日行赤道度隂陽之所支晝夜平暄凉等七曜之行中道也西一定黄道鐶與赤道等南北各去赤道二十四度東交于夘酉及日行盈縮月行九道之限也自冬至日行極南之道去北極一百一十五度去南極六十七度在赤道南二十四度晝四十刻夜六十刻影長而寒夏至日行極北之道去北極六十七度去南極一百一十五度在赤道北二十四度晝六十刻夜四十刻影短而暑月有九道之行嵗十有二月正交中交出入黄道逺不過六度五星順留伏逆理厯之常數也能一於地盤平凖下立龍柱四條各高五尺五寸為龍變化以御天體易之時乘六龍以御天又云天地乘氣而立龍能雲行雨施主宰造化遞行隂陽故以雲龍附掌天地成其法象也顯符自言如此増六十甲子至道二年十一月司天冬官正楊文鑑上言請于新厯六十甲子外更増六十年據不可事下有司判司天監苗守信等議以為無所依行用上日支干相承雖止于六十倘兩周甲子共成上夀之數使期頋之人得見所生之嵗不亦善乎因詔有司新厯以一百二十甲子為限校定新厯踈宻見丞門獻新厯注丞直長沿革見太史局門附厯渾儀六典太史局丞二人従七品上司馬彪續漢志太史丞一人秩二百石魏晉宋齊皆同漢國朝治平三年詔司天監丞以下月俸皆給見錢常以九員給事河東等路總官及麟府車馬司二嵗一代又嵗差一員押賜衣襖元祐官品令太史局丞直長従八品獻新厯國朝至道元年九月司天監丞王春獻新厯詔夏官正鄭昭晏重校定踈宻造渾儀式太平興國四年正月以司天監冬生張司訓為渾儀丞先是司訓自言能為渾儀因造其式以獻上召南方正官於禁中如其式造之踰年而成機思精至詔置于文明殿東南隅漏室中因有是命思訓自叙制度云渾儀者法天象地數有三層下有地軸地輪地足亦有横輪側輪針輪定身闗中闗小闗天柱七直人左撼鈴右扣鍾中擊鼓以定刻數其七直一晝夜方定二時是日月土水火金木中有天道大足十二神設十刻數定晝夜短長其五有天預天牙天聞天指天拓斗天束天條三百六十五度紫微宫及周天列宿并建黄道赤道以日既多寒行度定寒暑進退又古之制作運動以水踈畧暑無凖今以水銀代水運動不差且冬至之日日在黄道赤道表去北極最逺謂之寒晝短夜長夏至之日日在去北極最近謂之暑晝長夜短春秋二分日在兩交春和秋凉晝夜復等寒暑進退皆由于此舊制日月晝夜行度皆以手運今所制取其自然思訓自叙如此令渾儀自東漢張衡始造至唐開元中詔僧一行與梁瓉及諸術士造渾天儀鑄銅為日月圍天之象上具列星赤道及天度數注水激輪令其自轉一日一夜天轉一周又别立二輪絡在天外綴以日月令得運行每天西轉一匝日東行一度月行十三度十九分度之七凡二十九轉有餘而日月㑹三百六十五轉而日行匝仍置木櫃以為地平令儀半在地上半在地下晦明朔望遲速有凖又立二本人于地平之上前置鐘鼓以候辰刻每一刻則自然撃鼓每一辰則自然撞鐘皆櫃中各施軸鈎支錯闗鏁相持既與天道合因命曰水運渾天俯視後銅鉄澁不能自轉不復行用今思訓所作起為樓閣之狀數層高丈餘又以木偶人為七直神揺鈴撞鐘擊鼓又作十二神各直一時至其時節自執木牌循環而出并著日月星辰皆須仰視其機轉之用俱隠隠于樓中頗為精妙得開元之遺制靈臺郎沿革見太史局門新唐百官志五官靈臺郎各一人正七品下掌候天文之變乾元元年加五官之名六典靈臺郎二人正八品下掌習知天文周文王受命作邑于豐立靈臺所以觀祲象察氣之妖祥也詩云經始靈臺鄭𤣥云靈臺言文王化行似神之精明故以名也春秋傳曰公既視朔遂登觀臺以望而書雲物亦其制也其在周官則馮相氏世登高臺以掌其事漢則雜候上林清臺後漢又作靈臺掌候日月氣而屬太史太史有二丞其一在靈臺漢官云靈臺員吏十三人待詔四十二人魏太史有靈臺丞主候望頒厯晉宋齊梁陳太史皆有丞隋太史置天文博士掌教習天文氣色皇朝因隋置天文博士二人正第八品下長安四年省天文博士置靈臺郎以當之天文生六十人隋置皇朝因之年深者轉補天文觀生靈臺郎掌觀天文之變而占候之凡二十八宿分為十二次寅為析木燕之分自尾十度至斗十一度夘為大火宋之分自氐五度至尾九度辰為夀星鄭之分自軫十二度至氐四度已為鶉尾楚之分自張十五度至軫十一度午為鶉火周之分自栁九度至張十六度未為鶉首秦之分自井十六度至栁八度申為實沈魏之分自畢十二度至井十五度酉為大梁晉之分自胃七度至畢十一度戍為降婁魯之分自奎五度至胃六度亥為娵訾衞之分自危十六度至奎四度子為𤣥枵齊之分自女八度至危十五度丑為星紀呉越之分自斗十二度至女七度所以辨日月之躔次正星辰之分野凡占天文變異日月薄蝕五星陵犯有石氏甘氏巫咸三家中外官占凡瑞星祅星瑞氣祅氣有諸家雜占凡測候晷度則以遊儀為其凖國朝慶厯五年詔靈臺郎自今十年一遷官元祐官品令靈臺郎従八品保章正監候新唐百官志五官保章正二人従七品上五官監候三人正八品下司厯二人従八品上掌厯法及測景分至表凖六典保章正一人従八品上周禮春官太史屬有保章氏掌天星以至星辰日月之變動辨其吉凶秦漢以來無其職至後周春官府置太史其屬有保章上士中士之職即其任也至隋置厯博士一人正九品上皇朝因之長安四年省厯愽士置保章正以掌教厯生乾元元年加五官之名厯生三十六人隋置掌習厯皇朝因之用流外八考入流乾元元年置五十五人裝書厯生五人皇朝置厯生同監候五人従九品下魏晉太史令吏員有望候郎二十人候部吏十五人掌候天文並其任也隋初置四人従九品下煬帝三年増為十五人皇朝因隋置五人天文觀生隋置掌晝夜在靈臺伺候天文氣色皇朝所置従天文生轉補八考入品國朝慶厯五年詔保章正自今十年一遷官元祐官品令保章正従八品挈壺正唐百官志五官挈壺正二人正八品上五官司辰八人正九品上漏刻博士六人従九品下掌知漏刻凡孔壺為漏浮箭為刻以考中星昏明更以擊鼓為節㸃以擊鐘為節武后長安二年置挈壺正乾元元年加五官之名有刻漏生四十人典鐘典鼓三百五十人初有刻漏視品刻漏典事掌知刻漏檢校刻漏後皆省六典挈壺正二人従八品下掌知漏刻周禮有夏官挈壺氏秋官司寤氏春官鷄人氏凡三職咸掌其事自漢以後太史掌之皇朝長安四年始置乾元元年加五官之名司辰十九人正九品下掌漏刻事隋置二人従九品下煬帝改為司辰師本屬武候府大業三年𨽻于太史局皇朝因之乆視元年除師字漏刻典事十六人皇朝置掌司漏刻之節漏刻博士六人隋置有品秩掌教漏刻生皇朝降為流外乾元元年置二十人漏刻生三百六十人隋置掌習漏刻之節以時唱治皇朝因之皆以中小男為之轉補為典鐘典鼔典鐘二百八十人皇朝置掌擊漏鐘乾元元年置三百五十人視品十人典鼔一百六十人皇朝置掌撃漏鼓乾元元年置三百五十人挈壺正司辰掌知漏刻孔壺為漏浮箭為刻以考中星昏明之候焉箭有四十八晝夜共百刻冬夏之間有長短冬至日南為發去極一百一十五度晝漏四十刻夜漏六十刻夏至日北為斂去極六十七度晝漏六十刻夜漏四十刻春秋二分發斂中去極九十一度晝夜各五十刻秋分以後減晝益夜九日加一刻春分以後減夜益晝九日減一刻二至前後則加減遲用日多二分之間則加減速用日少凡候夜漏以為更㸃之節每夜分為五更每更分為五㸃更以擊鼓為節㸃以擊鐘為節國朝挈壺正掌知漏刻司天之屬有挈壺正掌司辰刻置署文徳殿門内之東漏設鼓樓鐘樓於殿廷左右漏刻之法有水稗以木為衡衡上刻䟽文曰天河其廣長容水箭箭有四木為之長三尺五寸著時刻更㸃納于天河中晝夜更周之自夘至午易一箭自午至酉易一箭自酉至子易一箭自子至夘易一箭衡右端有銅鍰連鈎為銅覆荷形荷下銅索三條以係銅壺又為髹漆大奩曰水樻中安銅盆曰水海奩有葢上刻白兎一為飾曰水拍銅盆隅有銅刻烏一引水下注壺中衡左端有大銅鍰貫衡鍰下大銅索連銅權權為立象形又有鐡竿高五尺權于鐡連附中屈上端為方鍰形曰鷄竿每移改時刻司辰者以衡尾納方鍰中以組繩挽權上大銅鍰進退之抨之所係以大木雙樞有跗如鐘簴之制畫五彩金龍為飾上有鐡胡門大鐵鈎鍰以係之其制度精巧未知作者為誰葢唐及五代用之乆矣漏刻每遇添減辰刻必移報門司及皇城司與鏁門使臣常以夘正後一刻為禁門開鑰之節每一時八刻二十分每刻一擊鼔八鼓後進時牌五鼓為時正它辰並同餘二十分為鷄喝唱絶擊一十唯午時擊八鼓後鷄唱絶擊百五十鼓乃為午時正初夜放鼔雄契出禁門百鼓為第乃擊衙鼓為發更時鷄唱絶擊一㑹鼕鼕又鷄唱擊百鼓為第二㑹鼕鼕絶擊百鐘又鷄唱擊一鼓一鐘為一更一㸃每更㸃随次増之遇轉更必鷄唱至五更三㸃止鼔雌契出禁門聲衙鼔合雌雄契入内藏之于鐘鼓樓至五更五㸃擊百鐘後鷄唱擊百鼓為第一㑹鼕鼕又鷄唱擊百鼓為第二㑹鼕鼕乃攅㸃昧明有待旦一刻旦明下水定晝漏時刻至八刻後為夘時正四時皆用此法禁中又有更㸃在長春殿門之外至于宗廟陵寢及玉清昭應景靈宫㑹靈觀祥源觀皆置焉更以鼓㸃以鉦元祐官品令挈壺正正九品職官分紀巻十七
