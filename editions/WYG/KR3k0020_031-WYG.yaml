body:
  text: 職官分紀卷三十一宋孫逢吉撰諸侯王前漢百官表諸侯王高帝初置金璽盭綬掌治其國景帝中五年令諸侯王不得治國天子為置吏後漢百官志皇子封王其郡為國蔡邕獨斷漢制皇太子封為王其實諸侯也周宋諸侯或稱王而漢天子自以皇帝為稱故王號加之總名諸侯晋職官志咸寧三年楊珧與荀朂以齊王攸有時望懼惠帝有後難因追故司空裴秀立五等封建之㫖從容共陳時冝于武帝以為古者建侯所以藩衛王室今呉㓂未殄方岳任大而諸王為帥都督封國既各不臣其統内於事重非宜又異姓諸將居邉冝參以親戚而諸王公皆在京師非扞城之義萬世之固帝初未之察於是下詔議其制有司奏從諸王公吏制户邑皆中尉領兵制度既行奏遣就國而諸公皆戀京師涕泣而去及呉平後齊王攸遂之國賞即墨烹阿大夫而人不敢飾非史記齊威王即位委政卿大夫九年之間諸侯並伐國人不治于是威王召即墨大夫而語之曰自子居即墨也毁言日至然吾使人視即墨田野闢人民給官無留事東方以寜是子不事吾左右以求毁也封之萬家召阿大夫語之曰自子之守阿譽言日聞然吾間使人視阿田野不闢人民貧苦是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者皆烹之於是齊國震懼人人不敢飾非務盡其誠齊國大治諸侯聞之莫敢致兵於齊虎而冦齊哀王襄悼惠王子高祖孫太尉周勃諸吕大臣欲立齊王琅邪王澤曰齊王母家駟鈞惡戾虎而冦者也方以吕氏幾亂天下今又立齊王以復為吕氏假王前漢韓信既早齊使人言漢王曰齊夸詐多變反覆之國南邉于楚不為假王以鎮之其執不定今權輕不足以安之臣請自立為假王當是時楚方急圍漢王于滎陽漢王發書大怒曰吾困于此旦暮望而来佐我乃欲自立為王張良陳平躡漢王足附耳語日漢方不利寧能禁信之自王不如因善遇之使自為守不然變生漢王亦悟因復曰大丈夫定諸侯即為真王何以假為乃遣張良立信為齊王徴其兵使擊楚刑白馬而盟高后欲立諸吕為王問王陵陵曰高皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王吕氏非約也非劉氏不王高帝誓曰非劉氏不王非軍功不侯磐石之宗文紀曰高皇帝王子弟地犬牙相制所謂磐石之宗也師古曰犬牙言地形如犬牙交相入也異姓王高帝定天下功臣異姓而王者八國食七十餘城齊悼惠王肥高帝子食七十餘城諸侯王皆莫及常侍上出入卧内楚元王交高帝即位交與盧綰常侍上出入卧内傳語言諸内事密謀好詩楚元王交好詩諸子皆讀詩申公始為詩傳號魯詩元王亦次為詩傳號曰元王詩世或有之設醴元王敬禮申公等穆生不嗜酒元王毎置酒嘗為穆生設醴及王戊即位常設醴後㤀設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我于市遂謝病去初元王薨子逞客嗣是為夷王夷王立四年薨子戊嗣稍滛暴削地遂應呉王反呉敗戊自殺狀有反相呉王濞高祖兄仲之子高祖封濞為呉王王三郡五十三城已拜受印高祖乃召濞相之曰汝狀有反相因拊其背曰漢後五十年東南亂豈汝耶然一家同姓慎無反鑄錢煑海呉有豫章郡銅山濞即招致天下亡命者盗鑄錢東煑海水為鹽以故無賦于民國用饒足當刑而王黥布姓英氏少時客相之當刑而王及壯坐法黥布欣然笑曰人相我當刑而王其是乎其後在楚封九江王歸漢為淮南王初布之歸漢漢王方踞牀洗足布入見大怒悔來欲自殺出就舍帳御食飲從官如漢王居又大喜過望盧綰與高祖同日而生盧綰與高祖同里綰父與太上皇相愛及生男高祖綰同日而生里中持羊酒賀两家及高祖綰壯俱學書又相愛也綰從高祖征伐常出入卧内賞賜親幸雖蕭曹莫及後封侯從擊燕王臧荼破之高祖巳定天下諸侯封劉氏而王者七人上欲王綰為羣臣觖望及虜臧荼乃封綰為燕王諸侯得幸莫如燕王者誅諸吕劉章齊悼惠王之子初入漢宿衛封朱虚侯高后以吕禄女妻之時諸吕擅權用事章年二十有氣力常忿劉氏不得職嘗入侍燕飲高后令章為酒吏章因請曰臣將種也請得以軍法行酒高后曰可酒酣章進飲歌舞已而曰請為太后歌耕田高后笑曰頋而父知田耳若生為王子安知田乎章曰臣能知之太后曰試為我言田意章曰深耕概種立苖欲䟽非其種者鋤而去之太后黙然頃之諸吕有一人醉亡酒章㧞劎追斬之而還報曰有亡酒一人臣謹行法斬之後謀誅諸吕章首先斬吕産太尉勃等乃盡誅諸吕及文帝立聞朱虚侯初欲立齊王故黜其功後因王諸子乃割齊郡王之引博局提殺吳太子孝文時呉太子入見得侍皇太子飲博呉太子傅皆楚人輕悍又素驕博争道不恭皇太子引博局提呉太子殺之削地景帝立􅏯錯説上曰昔高帝初定天下昆弟少諸子弱大封同姓故孽子悼惠王王齊七十二城庶孽分天下半今呉王前有太子之隙詐稱病不朝於古法當誅丈帝不忍因賜几杖德至厚也不改過自新乃益驕恣公即山鑄錢煑海誘天下亡人謀作亂逆今削之亦反不削亦反削之其反亟禍小不削之其反遲禍大于是楚趙膠西皆有罪削地方議削矣呉王恐乃發謀舉事與膠西膠東甾川濟南楚趙同反斬鼂錯初吳楚反書聞兵未發上召袁盎問計盎曰吳楚相遺書曰高帝王子弟各有分地今賊臣鼂錯擅謫諸侯削奪之地故以反為名西共誅錯復故地而罷方今計獨斬錯發使赦七國復其故地則兵可罷上遂斬錯東帝上既誅鼂錯以袁盎為太常使呉呉楚兵已攻梁壁矣宗正以親故先入見諭呉王使拜受詔呉王笑曰我已為東帝不肯見盎破呉楚呉楚七國反先擊梁棘壁梁孝王使韓安國張羽等為將軍以拒呉楚呉楚以梁為限不敢過而西與太尉亞夫等相距三月呉楚破而梁殺虜略與漢中分平臺複道梁孝王于漢最親有功又為大國居天下膏腴地孝王太后子愛之賞賜不可勝道于是孝王築東苑方三百餘里廣雅陽城七十里大治官室為複道自宫連属于平臺三十餘里賜天子旌旗梁孝王得賜天子旌旗出從千乗萬騎出警入䟆儗于天子招延四方豪傑自山東游説之士莫不至焉傳梁王初梁王入朝景帝未立太子與孝王宴飲從容曰千秋萬嵗後傳于王王辭謝雖知非至言然心内喜太后亦然同輦梁孝王入朝上以太后親故王入則侍景帝同輦出則同車遊獵上林中梁之侍中郎謁者著籍引出入天子殿門與漢宦官無異刺殺袁盎上廢栗太子太后心欲以梁王為嗣大臣及袁盎等有所闗説于帝太后義難格乃辭歸國梁王怨袁盎陰使人刺殺袁盎及他議臣十餘人賊未得也于是天子意梁逐賊果梁使之遣使冠盖相望于道覆案梁事梁王恐乃使韓安國因長公主謝罪太后然後得釋上怒稍觧分梁為五國梁孝王歸國以病薨竇太后泣極哀不食曰帝果殺吾子帝哀懼與長公主計乃分梁為五國盡立孝王男五人為王女五人皆令食湯沭邑太后悦乃為帝加一飡焉尺布斗粟之歌淮南厲王居處無度為黄屋盖擬天子擅為令不用漢法詔赦死罪遂不食死檻車中民有歌曰一尺布尚可縫一斗粟尚可舂兄弟二人不相客力扛鼎淮南厲王裒金椎殺辟陽侯淮南厲王其母故趙王張敖美人高祖過趙趙王獻之幸有娠趙王不敢内宫為築外宫舍之及趙王有罪厲王母亦係告吏以聞上方怒趙未及理之厲王母弟趙兼因辟陽侯言吕后吕后妬不肯白辟陽侯不强争厲王母恚即自殺孝文時厲王入朝乃徃請辟陽侯辟陽侯出見之即自裒金椎椎之命從者刑之馳詣闕下肉袒而謝曰臣謹為天下誅賊報母之仇伏闕下請罪文帝傷其志為親故不治赦之招致賔客淮南王安好書鼓琴不喜弋獵狗馬馳騁亦欲行隂德拊循百姓湏名譽招致賔客方術之士數千人作内書二十二篇外書甚衆又中篇八卷言神仙黄白之術僅二十餘萬言枕中書劉向為諫議大夫宣帝復興神仙方術之士而淮南有枕中鴻寳苑秘書言神仙使鬼物為金之術及鄒衍重道延命方世人莫見而向之父徳武帝時治淮南獄得其書向自幼而誦讀以為竒獻之言黄金可成上令典向方鑄作事費甚多不騐上乃下向吏吏劾向鑄偽黄金繫當死得减死論視草賜書武帝方好藝文以淮南王安善為文辭甚尊重之毎為報書及賜書常召司馬相如等視草乃遣好書河間獻王徳脩學好古實事是求從民得善書必為好冩與之留其真加金帛睗以招之繇是四方道術之人不遠千里或有先祖舊書多奉以獻王故得書多與漢朝等是時淮南王安亦好書所招致率多浮辨獻王所得書皆古丈先秦舊書得書多與漢朝等見上獻雅樂河間獻王修禮樂被服儒術造次必於儒者山東諸儒多從而遊武帝時獻王來朝獻雅樂對三雍宫年十五上書請擊呉江都易王非以孝景前二年立為汝南王呉楚反時非年十五有材氣上書自請擊呉景帝賜非將軍印擊呉呉已破徙王江都治故呉國以軍功賜予甚厚聞樂而泣武帝初大詔懲呉楚七國行事議者多寃鼂錯之䇿皆以諸侯連城數十太强欲稍侵削數奏暴其過惡諸侯王自以主親先帝所以廣封建成犬牙相錯者為磐石宗也今或無罪為臣下所侵辱有司吹毛求疵笞服其臣使證其君多自以侵寃建元三年中山靖王勝來朝天子置酒勝聞樂而泣問其故勝具以吏所侵聞上乃厚諸侯之禮加親親之恩焉諸侯得以地分子弟武帝時主父偃説上曰古者諸侯城不過百里强弱之形易制今或連城數十地方千里緩則驕奢易為滛亂則阻其强而合從以逆京師今以法割削則逆節萌起前日鼂錯是也今諸侯子弟或數十而適嗣代立餘雖骨血無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以德施實分其國而稍弱矣于是上從其計卓爾不羣漢興至于孝平諸侯王以百數率多驕滛失道唯大雅卓爾不羣河間獻王近之矣劉氏安鼂氏危鼂錯既説上削諸侯諸侯讙譁錯父聞之從潁川來語錯曰公為政用事侵削諸侯䟽人骨肉何也鍇曰不如此天子不尊宗廟不安父曰劉氏安矣鼂氏危遂飲藥而死曰吾不忍見禍逮身後十餘日呉楚七國果反斬錯東市錯已死謁者僕射鄧公擊呉楚還言軍事上問曰聞錯死呉楚罷不鄧公曰呉為反數十嵗矣發怒削地以誅錯為名其意不在錯也且臣恐天下之士拑口不復言矣于是景帝太息曰公言善吾亦恨之國小地狹景帝時諸王來朝有詔更前為壽歌舞長沙定王發但張裒小舉手左右笑其拙上怪問之對曰臣國小地狹不足以回旋帝乃以武陵零陵桂陽益焉壊壁得古文經傳景帝程姬生魯恭王餘二年立為淮陽王吳楚反破後徙王魯好治宫室苑囿狗馬好音樂口吃難言初壞孔子舊宅于壁中得古今經傳佯醉齊悼惠王肥其母高帝㣲時外婦也孝惠時入朝帝與燕飲太后前帝以齊王兄置上坐如家人禮太后怒令人酌兩巵鴆酒前令齊王為夀齊王起帝亦起欲俱為壽太后恐乃自起泛其巵齊王怪之不敢飲佯醉而去知其鴆也幾䧟無道淮陽憲王欽宣帝子元帝弟元帝即位遣憲王之國其舅張慱至淮陽而王賜之少慱辭去令弟光恐方欲上書王乃遣人持黄金五十斤送慱慱喜還書謝焉諂語盛稱譽王因言今萬姓咸歸望于大王大王奈何恬然不求入朝乎王不納後復遺王書云數進愚䇿未見省察聞齊齊駟先生者善為司馬兵法又聞北海之濵有賢人焉得此二人而薦之功亦不細王得書喜説報慱書云雖亦不敏敢不諭意及事泄慱兄弟三人並弃市上不忍置法王于遣諫大夫駿賜欽璽書責讓令悔過而已賛曰淮陽憲王于諸侯為聰察張慱誘之幾䧟無道詩云貪人敗𩔖古今一也真我子欽好經書法律聰逹有材帝甚愛之教嗟嘆曰真我子也作左官之律設附益之法武帝時有淮南衡山之謀作左官之律設附益之法乗牛車漢初以海内初定故大封同姓以鎮天下自呉楚誅後稍奪諸侯權惟得食租税貧者或牛車憚汲黯淮南王謀反憚汲黯好直諌守節死義時黯列於九卿矣去就有禮後漢書東海恭王疆光武長子也建安二年立為皇太子十七年而母后癈疆不自安數請願備藩國光武不忍遲回數嵗乃許焉十九年封東海王就國帝以疆廢不以過去就有禮故優以大封兼食魯郡合二十九縣賜虎賁旄頭宫殿設鐘虡挺于乗輿初魯㳟王好宫室起靈光殿甚壯麗是時猶存故詔疆都魯中茅車瓦噐而葬東海王疆既薨天子慟又追惟疆深執謙儉不欲厚葬以違其意特詔中常侍杜岑及東海傅相曰王㳟謙好禮以德自終遣送之物務從省約衣足斂形茅車瓦噐物減於以彰王卓爾獨行之志沛王通論沛王輔矜嚴有法度好經書善説京氏易孝經論語傳及圖䜟作五經論時號之曰沛王通論在國謹節終始如一稱為賢王弩射十發十中陳王善能弩射十發十中永平中黄巾賊起州縣棄城走龍有强弩數十張出陳都亭國人素聞善射不敢反叛故城獨得完百姓歸之者衆十萬餘人講論白虎殿陳王善慱渉經書有威嚴與諸儒講論于白虎殿喜黄老浮屠楚王英以少好遊俠交通賔客晚節更喜黄老學為浮屠齋戒祭祀八年詔令天下死罪皆入縑贖英遣即中令奉黄縑白䊵三十匹詣國相曰託在藩輔過惡累積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黄老之㣲言尚浮屠之仁信絜齊二月與神為誓何嫌何疑當有悔吝其還贖以􅂇伊蒲塞桑門之盛饌英後大交通方士作金龜玉鶴刻文字為符瑞及燕廣告英有逆謀下案騐有司奏誅乃廢徙丹陽自殺東西録見尚書省録尚書門腰𢃄八圍東平王蒼少好經書雅有智略為人美鬚髯腰𢃄八圍顯宗甚愛重之及即位拜驃騎將軍置長史掾史員四十人位在三公之上議定禮樂東平王蒼以中興三十餘年四方無虞天下化平冝修禮樂乃與公卿共議定南北郊冠冕車服制度及光武廟登歌八佾數語在禮樂輿服志諫獵顯宗將校獵河内東平王蒼上書諫帝覧奏即還宫上印綬蒼在朝數載多所隆益而自以至親輔政聲望日重意不自安上䟽歸職曰自漢興以來宗室子弟無得左公卿位者唯陛下遵承舊典終卒後惠乞上驃騎將軍印綬退就藩國願䝉哀憐帝優詔不允使復其位送列侯印十九枚詔遺東平王蒼送列侯印十九枚諸王子年五嵗以上能趨拜者皆𢃄之長夜之飲㑹稽王道子為長夜之飲政事决于元顯詐偽書廣陵王荆性刻急𨼆害有才能而喜文法光武崩大行在前殿荆哭不哀而作飛書封以方底令蒼顯詐稱東海王疆舅大鴻臚郭況書與疆曰太子星色黒至辰日輙變赤黒為病赤為兵亡努力卒事高祖起亭長陛下興白水何況于王陛下長子故副主哉疆得書惶怖即執其使封書上之顯宗知荆母弟秘其事祭祀祝詛廣陵王荆之國復呼相者謂曰我貎類先帝先帝少得天下我今亦三十可起兵未相者詣吏告之帝復加恩不考極其事荆猶不改又使巫祭祀祝詛有司舉奏請誅荆自殺好禮論曰孔子稱富而無驕未若富而好禮者若東平王蒼所謂好禮者也車騎鞍勒皆純黒明徳馬后詔書流布咸稱至德王主諸侯不敢犯禁廣平鉅鹿樂成王在邸入問起居帝望見車騎鞍勒皆純黒無金銀綵錦馬不踰六尺子是以白太后而賜錢各五百萬上詩賦頌德琅邪孝王京建武十七年進爵為王京性恭孝好經學顯宗尤愛幸賞賜恩寵殊異莫與為比光烈皇后崩帝悉以太后遺金財賜京都莒治宫室窮伎巧皆飾以金銀上詩賦頌德帝嘉美諸子畢王而天下安賈誼書高皇帝分天下以有功之臣反者如蝟毛而起高皇帝以為不可是故去不義諸侯空其國擇良日立諸子諸子畢王而天下乃安願為將魏志任城王彰少善射御膂力過人手格猛獸不避險阻數從征伐志意慷慨太祖常抑之曰汝不念讀書聖道而好乗汗馬擊劍此一夫之用何足貴也彰謂左右曰丈夫當為衛霍將十萬騎馳沙漠驅戎狄立功建號耳何能作慱士耶太祖曰為將奈何對曰披堅執鋭臨難不顧為士卒先賞必行罰必信可以為將矣太祖大笑北征大破虜代郡烏丸反時王彰為鄢陵侯乃拜北中郎將騎驍將軍臨發太祖戒彰曰居家為父子受事為君臣動以王法從事爾其戒之彰北征大破虜北方悉平為賦立成陳思王植字子建年十嵗餘誦讀詩論及辭賦數十萬言善属文太祖嘗視其文謂曰汝倩人耶植曰言出為論下筆成章願當靣試奈何倩人時鄴銅爵臺成魏太祖悉將諸子登臺使各為賦植援筆立成太祖甚異之行馳道中開司馬門出植既以才見異太祖狐疑幾為太子者數矣而植任性而行不自雕飾飲酒不節文帝御之以術矯情自節宫人左右並為之説遂定為嗣植嘗乗車行馳道中開司馬門出太祖大怒公車令坐死由是重諸侯科禁而植寵日衰魏武故事載令曰始者謂子建兒中最可定大事又令曰自臨菑侯植私出開司馬門至金門令吾異目視此兒矣誅楊脩植既寵日衰太祖既慮終始之變以楊脩頗有才䇿而又袁氏之甥也於是以罪誅脩植内不自安脩與丁廙等王之羽翼以廢簏内呉質謀事初楊修與丁儀兄弟皆欲以植為嗣太子患之以車載廢簏内朝歌長呉質與謀修以白太祖未及推騐太子懼告質曰何患明日復以簏受絹車内以惑之修必重白重白必推而無騐則彼受罪矣世子從之修果白而無人太祖由是疑焉醉不能受命曹仁為闗公所圍太祖以植為南中郎將行征虜將軍欲追救仁呼有勅戒植醉不能受命于是悔而罷之又魏氏春秋曰植將行太子飲焉偪而醉之王召植植醉不能受命故王怒之大船秤象鄧哀王冲字倉舒少聰察岐嶷生五六嵗智意所及有成人之志時孫權貢巨象太祖欲知其斤重訪之羣下咸莫能出其理冲曰置象大船之上而刻其水痕所至秤物以載之則校可知矣太祖大悦䑕齧鞍太祖時軍國多事用刑嚴重太祖馬鞍在庫而為䑕所齧庫吏懼必死議欲靣縛首罪猶懼不免鄧哀王冲年五六嵗謂曰待三日中然後自歸冲於是以刀穿單衣如䑕齧者謬為失意貌有愁色太祖問之冲對曰世俗以為䑕齧衣者為主不吉今單衣見齧是以憂戚太祖曰此妄言耳俄而庫吏以齧鞍聞太祖笑曰兒衣在側尚齧況鞍縣柱乎竟不問少亡倉舒太祖數對羣臣稱述有欲傳後意年十三有疾太祖親為請命及亡哀甚文帝寛諭太祖太祖曰此我之不幸汝曹之幸上䟽求試陳思王植常自憤怨抱利噐而無所施上䟽求自試曰若陛下出不世之詔効臣錐刀之用使之西属大將軍當一校之隊若東属大司馬統扁舟之任必乗危蹈險突觸刄鋒為士卒先七歩成詩文帝心忌陳思王植乃令七歩成詩詩不成必當加刑子建應命詩曰煑豆燃豆箕裂豉取其汁箕在竈下燃豆向釡中泣本是同根生相煎何太急遂不害八達晋書安平獻王孚字叔達宣帝次弟也初孚長兄朗字伯達宣帝子仲達孚弟馗字季達恂字顯達進字惠達通字雅達敏字幼達俱知名故時號為八達一門三世世祖受禪孚為太宰一門三世同時十人封王二人世子父子位極人臣子孫咸居大官出則旌旗節鉞入則貂蟬衮冕自公族之寵者未始有也宗室儀表髙密文獻王泰性亷静不近聲色雖為宰輔食大國之租服飾肴饍如布衣寒士仕真簡率毎朝㑹不識者不知其王公也事親恭謹居喪哀戚謙虚下物為宗室儀表奏劾桓温敬王恬少拜散騎常侍黄門郎御史中丞值海西廢簡文登阼未解嚴大司馬桓温屯中堂吹警角怙遂奏劾温大不敬請科罪温視奏歎曰此児乃敢彈我真可畏也恬忠正有幹局在朝憚之宗室儁望扶風王駿幼聰慧年五六嵗能書䟽誦經籍見者竒之及長清正守道宗室之中最為儁望重八百斤宗室司馬保體質豐偉常自稱重八百斤喜睡痿疾不能御婦人無子保有文又好述作位至相國年二十七薨宗藩追䇿齊王冏文略曰昔以宗藩穆𦙍紹世緒于東國不通桓伊忠敬王遵父武陵王晞為桓温所忌奏請免晞官以王歸藩卒遵初襲封年十二受拜流涕哀戚于時將軍栢伊詣遵遵曰何為通桓氏左右曰伊與桓温䟽索相見無嫌遵曰我聞人姓木邉便欲殺況諸桓乎由是少稱聰惠清澹㑹稽王道子少清澹為謝安所稱開東第築山穿池道子以嬖人趙牙為驃騎諮議叅軍牙為道子開東第築山穿池列樹竹木用鉅萬為長夜之飲帝嘗幸其第謂道子曰府内有山因得逰瞩甚善也然脩飾太過非示天下以儉道子無以對左右侍臣莫敢有言帝還官道子謂牙曰上若知山是板築所作爾必死矣牙曰公在牙何敢死掌朝政王亮宣帝第四子武帝時兼太尉録尚書事武帝寢疾為楊駿所排以亮為侍中大司馬假黄鉞督豫州諸軍事出鎮許昌未發帝大漸詔留亮委以後事楊駿欲討亮亮知之夜馳赴許昌得免及駿誅為太宰與大保衛瓘對掌朝政楚王瑋有勲亮憚之欲奪其兵權瑋承賈后㫖誣亮與瓘有廢立之謀矯詔夜以兵圍之遂見害素庸下無智䇿趙王倫宣帝第九子謟事中宫大為賈后所親信求録事尚書張華裴頠固執不可左衛司馬督説倫嬖人孫秀曰中宫凶妬與賈謐共廢太子大臣將起大事而公奉事中宫與賈郭親善太子廢皆豫知一朝事起禍必先及何不先謀之乎秀許諾言于倫倫納焉秀又以太子聪明若還東宫以已必不得志又説緩其事賈后必害太子然後廢后為太子報仇足以立功倫秀因勸謐早害太子以絶衆望太子既遇害倫秀之謀益甚乃矯詔曰中寧與賈謐等殺吾太子夜開門遣齊王冏迎帝幸東堂遂廢賈后于金墉執張華裴頠等于殿前殺之倫尋矯詔自為使持節大都督督中外諸軍事百官總已聼于倫倫素庸下無智䇿復受制于秀秀之威權振于朝廷石崇潘岳皆有嫌于秀井見誅于是淮南王允齊王冏以倫秀矯僣内懷不平乃出冏鎮許奪允軍允發憤起兵討倫允既敗滅倫加九錫又矯作禪讓之詔百官以法駕迎倫廢惠帝于金墉城倫乃即帝位大赦改元時齊王冏河問王顒成都王穎並擁兵各據一方俄而三王起兵討倫檄至倫秀始大懼召東平王懋督諸軍拒義師王輿反攻孫秀斬以徇倫為詔曰吾為孫秀所誤以怒三王今已誅秀其迎太上復位吾歸老于農畆黄門將倫出歸第以甲迎天子于金墉梁王肜表倫凶逆冝伏誅詔賜倫死飲以金屑藥酒倫慚以巾覆靣曰孫秀誤我徇首六軍齊王冏献王攸之子也冏起軍遣使造成都河間常山新野四王移檄天下以討倫及王輿廢倫惠帝反正冏率衆入洛頓軍通章署天子就拜大司馬加九錫輔政于是大築第館沉于酒色不入朝見坐拜百官符勅三台選舉不均唯寵親昵于是長沙王乂徑入宫發兵攻冏令黄門王湖悉盜騶虔幡唱云長沙王矯詔又稱大司馬謀反助者誅三族是夕城内大戰火光燭天帝幸上東門矢集御前明日冏敗乂擒冏至殿帝惻然欲活之乂叱左右促牽出遂斬于閭閬門外徇首六軍諸黨皆夷三族寃痛之聲達于左右長沙王乂武帝第六子河間王顒將誅冏傳檄以乂為内主冏遣將襲乂乂將左右百餘騎赴宫奉天子與冏相攻連戰三日冏敗斬之顒本以乂弱冏强冀乂為冏所擒然後以乂為辭討之因襲帝立成都王已為宰相専制天下既而乂殺冏其計不果乃潜使侍中馬蓀等襲乂乂並誅之顒遂與穎同伐京師穎遣俠客圖乂時長沙國左常侍王矩侍直見客色動遂殺之詔以為大都督以距顒乂前後破穎軍斬獲六七萬人戰乆粮乏城中饑雖曰疲弊將士同心皆願効死而乂奉上之禮未有虧失張方以為未可尅欲還長安而東海王越慮事不濟潜與殿中將謀收乂送金墉城殿中左右恨功垂成而敗謀刼出之越懼難作遂就金墉城收乂至營炙殺之寃痛之聲達于左右三軍莫不為之流涕時年二十八殺生自已成都王穎武帝第十六子齊王冏舉義穎發兵應之穎過河乗勝長驅左將軍王輿殺孫秀幽趙王倫迎天子反正及穎入京都誅倫遂歸鄴懸執朝政事無巨細皆就鄴諮之恃功驕奢百度廢弛甚于冏時而憚長沙王乂在内遂與河間王顒表請誅后父羊𤣥之等檄乂使就第乃與顒將張方伐京都以平原内史陸機為前鋒檄戰敗穎收斬之夷三族乃進攻京城時王輿合衆襲頴㑹乂被執其黨斬輿降穎既入京師復旋鎮于鄴拜丞相河間王顒表穎冝為儲副遂廢太子單立穎為皇太弟丞相如故制度一依魏武故事乗輿服御皆遷于鄴永興初左衛將軍陳眕等奉大駕討穎眕二弟自鄴赴王師云中皆已離散由是不甚設備頴將石超奄至王師敗績矢及乗與侍中嵇紹死于帝側左右皆奔散超乃奉帝幸鄴穎遂改元建武置百官殺生自已立號于鄴南平北將軍王浚等與烏丸羯朱襲穎穎遣石越等拒浚戰敗鄴中大震頴懼將帳下數十騎擁天子單車而走五日至洛張方乃挾帝擁穎及豫章王歸于長安顒廢穎以豫章王為皇太弟穎既廢河北思之鄴中故將起兵迎穎顒復拜穎鎮軍大將軍都督河北諸軍事鎮鄴時所在鋒起穎以北方盛彊懼不可進自洛陽奔闗中值大駕還洛帝遣收捕穎于是棄母妻單車渡河頓兵太守馮嵩執穎送鄴范陽王虓幽之而無它意属虓暴薨長史劉與見穎為鄴都所服慮為後患秘不發喪偽令人為臺使稱詔賜穎死遂縊之濟義王顒太原烈王之子初冏檄至顒執其使送之于倫倫召兵于顒顒遣張方赴之聞二王兵盛乃追方軍迴以應二王及天子反正冏論功雖怒顒初不同而終能濟我進位侍中戎服入見東海王越高密王恭之子初惠帝北征鄴以越為大都督六軍敗越奔還東海成都王頴以越宗室之美下寛令招之越不應命遂起兵而河間王顒挾天子發詔罷越等皆令就國越唱義奉迎大駕還復舊都闗中大懼顒斬送張方首求和尋變計拒越率諸侯迎惠帝返洛陽越以太傅録尚書事及懐帝即位交政于越而帝始親萬幾留心庶事越不悦求出藩遂鎮許昌越又以頃興事多由殿省乃奏宿衛有侯爵者皆罷之由是大失衆望而多有猜嫌越既不自安乃戎服入見請討石勒羽檄徴召四方兵皆不至而越不臣之迹四海所知州縣擕貳上下崩離遂憂懼成疾而薨八王史臣曰自惠皇失政難起蕭墻骨肉相殘黎元塗炭戰塵驚而天地閉戎兵接而宫廟隳支属肇其禍端戎羯乗其間隙悲夫詩所謂誰生厲階至今為梗其八王之謂歟殺害近十萬人趙王倫之敗百官是倫所用者皆斥免之臺省府衛僅有存者自兵興六十餘日所殺害近十萬人忠心可破示天下汝南王亮之被執也歎曰我之忠心可破示天下也如何無道枉殺不辜是時大熱兵人坐亮于車下時人憐之為之交扇將及日中無敢害者瑋出令曰能斬亮者賞布千疋遂為亂兵所害戚藩賛曰惠懐不競戚藩力争自相誅滅祖逖曰晋室之為亂非上無道而下怨叛也由藩王争權自相誅滅遂使戎狄乗隙毒流中原出租秩加賦賑國人齊王攸好學不倦借人書皆為治䕶時有水旱則出租秩加賦以賑國人須豐年乃收入木直借書為治䕶上鉛刀一割晋中興書譙王承作湘州刺史至武昌釋戎備見王敦敦因宴集謂承曰大王雅素佳士非將帥才也承曰公未見知耳安知鉛刀不能一割承以敦欲測其情故發此言敦果謂錢鳯曰彼不知懼而學壯語此之不武何能為聴承之鎮猪王宋書始安王休仁文帝之子前廢帝無道誅害羣公忌憚諸父聚之殿内毆捶陵曵無復人理休仁及明帝正陽王休祐形體並肥帝乃以籠盛稱之明帝尤肥號為猪王休仁為殺王休祐為賊王以三王年長尤所忌憚故常録以自近東海王禕尤劣號之驢王桂陽王休範巴陵王若年少故得從容嘗以木槽盛飲和以雜食掘地為坑實之泥水倮明帝内坑中以槽食置前令口就食之用為歡笑欲害明帝及休仁休祐前後以數十休仁以計數毎以笑調佞諛悦之故得推遷嘗于休仁前使左右滛逼休仁母楊太后左右並不得已順命唯右衛將軍劉道隆奉㫖盡諸醜狀時廷尉劉冢妾孕臨月帝迎入後宫兾生男欲立為太子明帝嘗忤㫖帝怒乃倮縳其手足以杖貫手足内使擔赴太宫即日屠之休仁笑謂帝曰未應死問其故依仁曰待皇太子生殺猪取肝肺帝意解曰且付廷評一宿出之帝將南逰荆湖明日欲殺諸父便發其夕被弑于華林園休仁即使執臣禮于明帝以休仁為侍中司徒尚書令太始初四方逆命休仁親當矢后犬勲克建任總百揆親寄甚隆帝末年多忌及疾篤召休仁入室宿尚書下省夜遣人齎藥賜休仁死帝疾甚見休仁為祟叫曰司徒少寛我尋崩驢王上願後身不復生王家始平王子鸞孝武之子母殷淑儀寵傾後宫子鸞愛冠諸子前廢帝素疾子鸞有寵及即位乃遣使賜子鸞死時年十嵗子鸞臨死謂左右曰願後身不復生于王家似驢封廬陵王廬陵王禕文帝子初封東海王明帝踐阼封廬陵王初廢帝因禕似驢以為號上以斯言故改此封文帝諸子禕尤凡劣諸兄弟嗤鄙之勢傾天下彭城王義康性好吏職鋭意文案糺剔是非凢所奏入無所不可方伯並委義康授用由是朝野輻奏勢傾天下義康亦自强不息無有懈倦腰𢃄十圍南都王義宣為荆州刺史白晳羙鬚眉長七尺五寸腰𢃄十圍多畜嬪妾後房千餘妃媪數百男女四十人崇飾綺筵費用殷廣鬼目粽江夏王義恭奢侈無度前廢帝狂悖無道義恭元景等謀欲廢立永光元年八月廢帝親率羽林兵于第害之并其四子斷析義恭支體分割膓胃桃取眼睛以宻漬之謂為鬼目粽使餘人書啓事衡陽王義李為荆州刺史素拙書上聽使餘人書啓事唯自書名而已二十一年徴為都督南徐兖青兾幽六州軍征北大將軍開府儀同三司南兖州刺史持節常侍如故發州之日帳帷噐服諸應隨刺史者悉留之荆楚以為美談職高他國一階建平王宏字休度文帝第七子少而閑素篤好文籍文帝寵愛殊常為立第于雞籠山盡山水之美建平國職高他國一階生便富貴桂陽王休範進司空素凡近少知解不為諸兄所齒遇明帝嘗指左右人謂王景文曰休範人才不及此以我弟故生便富貴釋氏願生王家良有以也益州忽生小洲知有貴王齊書宋泰始中益州市橋忽生小洲道士邵碩見之曰當有貴王臨州及宋滅齊武帝不復用諸將為益州始以鑑為刺史督二州事加鼓吹一部雖尊貴都如素士始興王鑑性甚清在蜀積年未嘗有所營造資用一嵗不滿三萬王儉嘗歎云始興王雖尊貴而行履都如素士巾箱五經衡陽王鈞性好學善屬文嘗親手細書五經都為一卷置于巾箱中以備遺忘侍讀賀玠問曰殿下家有墳索復何湏蝇頭細書别藏巾箱中答曰巾箱中有五經于檢閲既易且一更手自書冩則永不㤀矣諸王聞之争效為巾箱五經與山人交㑹稽孔珪家起園字植桐桞多構山泉殆窮其趣衡陽王鈞徃遊之珪曰殿下處朱門遊紫聞詎得與山人交耶荅曰身處朱門而情遊江海形入紫闥而意在青雲珪大美之吴郡張融清抗絶俗雖王公貴人視之傲如也唯雅重鈞謂從兄緒曰衡陽王飄飄有凌雲氣其風情素韻彌足可懐融與之遊不知老之將至也烏紗帽侍宴豫章王嶷高帝第二子寛仁𢎞稚有大成之量為帝鍾愛焉初為宋順帝驃騎從事郎中詣袁粲粲謂人曰後來佳噐也建元中武帝以事失㫖高帝頗有代嫡之意而嶷事武帝恭悌盡禮未嘗違忤顔色故武帝友愛亦深宋元嘉中諸王入齋閣白服裙帽見人主唯出太極西廂乃備朝衣自此以來斯事一斷武帝與嶷同生相友時宫内曲宴許依元嘉之服嶷固辭唯車駕幸第乃白服烏紗帽以侍宴王子封千户武帝將封豫章王嶷諸子舊例王子封千户嶷欲五子俱封啓减毎人五百户至孝豫章王至孝高帝崩哭泣過度眼耳皆血出不為賈人求利臨川王映嘗致錢還都賈物有獻計者于江陵買貨至都回換可得微有所増映笑曰我是客賈耶乃復求利㧞矟長沙王晃便弓馬武帝出逰晃適從駕以馬矟刺道邉枯栢上令左右數人引之而矟不出乃令晃馳馬㧞之應手而去齋中錢不滿萬武陵王􅁮輕財厚義有古人風罷㑹稽還都齋中錢不滿萬俸禄所入皆參佐實僚共之常曰兄作天子何畏我無錢鄱桂鄱陽王鏘桂陽王鑠皆高帝子鏘好文章鑠好名理人稱為鄱桂學鳯尾諾江夏王鋒高帝子母張氏有容德宋蒼梧王逼取之又欲害鋒高弟甚懼不敢使居舊宅匿于張氏舍時年四嵗性方整好學書張家無紙札乃倚井欄為書書滿則洗之復書如此者累月又晨不肯拂忩塵先畫塵上學書為字五嵗高帝使學鳯尾諾一學即工高帝大悦以玉麒麟賜之曰麒麟賞鳯尾矣賜玉麒麟上見猨悲鳴思子響魚復侯子響字雲音武帝第四子初封巴東王子響勇力絶人開弓四斛少學武𢃄伏左右六十人皆有胆幹數在内齋殺牛置酒與之聚樂長史劉寅等密啓上聞及臺使至子響召寅等殺之上怒遣衛尉胡諧之將軍尹略中書茹法亮領羽林三千人討之諧之等至江津築城燕尾洲子響白服登城求單舸還闕尹略獨不許之子響乃率黨渡洲攻壘斬略而諧之等單艇奔逸上又遣蕭順之領兵斷之子響即日將白衣左右三十人乗舴艋中流下都欲自申明順之不許于射堂縊之他日上出景陽山見一猿跳躑悲鳴問後堂丞此猿何意答曰猿子日前堕崖致死其母求之不見故爾上思子響欷歔良乆不自勝順之慚懼感子響病遂以憂卒追封子響為魚復侯典籖髙帝武帝為諸王置典籖帥一方之事悉以委之每至覲接輙留心頋問刺史行事之美惡係于典籖之口莫不折節奉之常慮弗及於是威行州部權重藩屏南海王子䍐戍琅邪欲暫遊東堂典籖姜秀不許而止還泣謂母曰児欲移五歩亦不得與囚何異秀復輙取子䍐屐繖飲噐等供其私用武帝知之鞭二百係尚方然而擅命不改邵陵王子貞嘗求熊白厨人答曰典籖不在不敢與巴東王子響反帝以問羣臣戴僧静曰諸王自應反豈惟巴東武帝問其故答曰諸王無罪而一時被囚取一挺藕一杯漿皆諮籖帥不在則竟日忍渇諸州唯聞有籖帥不聞有刺史及明帝誅異已者諸王見害悉典籖所殺竟無一人相抗孔珪聞之流涕曰濟北衡陽江夏最有意而復害之若不立籖帥故不至于此射甘蔗十發十中冝都王鑑高帝子善射常以射的太濶曰終日射侯何難之有乃取甘蔗插地百歩射之十發十中錢愚梁臨川王宏文帝子宏以介弟之貴無佗量能恣意聚斂庫室有百間在内堂之後闗鑰甚嚴有疑是鎧仗者密以聞武帝帝于宏友于甚厚殊不悦宏愛妾江氏寢膳不能暫離上他日送盛饌與江曰當來就汝懽宴乃擕布衣之舊射聲校尉丘某往與宏及江大飲半醉謂宏曰我今欲履行汝後房更呼後閣輿徑徃屋所宏恐上見其賄貨顔色怖懼上意彌信是仗屋檢視之有錢百萬一聚黄榜標千萬一庫懸一紫標如此三千餘間帝與從者屈指計之見錢三億萬餘屋貯布絹雜貨但見滿庫不知多少始知非仗也大悦更劇飲至夜而還兄弟情方更敦睦晋時有錢神論豫章王綜以宏貪吝遂為錢愚論我之任城廬陵威王續武帝第五子少英果膂力絶人馳射應發命中武帝歎曰此我之任城也嘗馳射于帝前續中兩麞冠諸人帝大悦不慧廬陵王續之次子應不慧王薨至内庫閲珍物見金鋌問左右曰此可食否答曰不可應曰既不可食並將乞汝他皆類此辟陶濳之後安城王秀文帝子也為江州刺史取徴士陶潜曽孫為里師歎曰陶潜之徳豈不及後裔即日辟為西曹二安諸王並下士建安安城二王尤好人物世以二安重士方之四豪撰類苑安城王秀精意學術招學士劉孝標使撰類苑書未及畢而已行于世四碑並建安城王秀薨佐史夏侯亶等表立墓碑誌詔許之當世高才遊王門者東海王僧孺吴郡陸倕彭城劉孝綽河東子野製其文欲擇用之而咸稱實録遂四碑並建七月而生豫章王綜武帝第二子初綜母吴淑媛在齊東昏宫有寵及得幸武帝七月而生綜宫中多疑之及綜年十四五常夢一少年肥壯自挈其首對綜如此非一乃密問淑媛淑媛問夢中形狀類東昏因密報之令勿泄綜毎别室祠齊氏七廟㣲行曲阿拜齊明帝陵然猶無以自信聞俗説以生者血瀝死者骨滲即為父子綜私發東昏墓出其骨瀝血試之既有徴矣在西州生次男月餘日潜殺之既瘞夜遣人發其骨又試之其酷忍如此後奔魏追服東昏斬衰魏太后羣臣並弔之吞䱇邵陵王綸嘗南權徐州事性􅆭虐輕險嘗問賣䱇者曰刺史何如對曰􅆭虐綸怒令吞䱇而死棺貯司馬邵陵王嘗作新棺木貯司馬崔㑹意以轜車挽歌為送葬之法使嫗乘車悲號㑹意不堪輕騎還都聞之奪孝服著之卲陵王又嘗逢喪車奪孝服著之匍匐號叫籖帥密以聞帝始嚴責綸不能改于是遣代綸悖慢踰甚乃揀一老公短瘦類帝者加以衮冕置之高座朝以為君自陳無罪使就坐剥褫捶之於庭書問不通元帝與廬陵王續少相狎又相謗二王書問不通及續薨元帝時為江州聞之至入閤而躍屨為之破加禮命至五千户陳江左承西晋諸王開國並以户數相差為大小三品大國置上中下三將軍中國置中下將軍小國置下將軍一人餘官亦准此為差陳武帝受命自永定迄于禎明唯衡陽王昌加禮命至五千户自餘大國不過二千小國則千户一覧便誦衛陽王昌武帝子也性聰辨明習政事帝遣吴郡杜之偉授昌經昌讀一覧便誦告廟鄱陽王伯山字静之文帝子也偉客儀舉止閒雅喜愠不形于色武帝時天下草創諸王受封儀注多闕及伯山受封文帝欲重其事天嘉元年七月丙辰尚書入座奏封鄱陽郡王乃遣度支尚書蕭眘持節兼太宰告于太廟又遣五兵尚書王質持節兼太宰告于太社其年十月上臨軒䇿命訖令王公以下並宴于王第加戎號置佐史始興王伯茂文帝子也舊制諸王受封未加戎號者不置佐史于是尚書八座奏加伯茂寧逺將軍置佐史書得右軍之法陳時軍人於丹徒盗發晋郄曇墓大獲晋右將軍王羲之書及晋名賢遺迹事覺其書並没縣官藏于秘府文帝以始興王伯茂好古多以賜之由是伯茂大工章隷書甚得右軍之法愍窮乏梁南平元㐮王偉性多恩惠尤愍窮乏常遣瞻䘏宗傑後魏史論曰文宣貞固俊逸欝為宗傑妃號宗室嘗為宗正卿奏王親及始藩二藩王妻悉有妃號而三藩以下皆謂之妻上不得同為妃名而下不及五品以上有命婦之號詔曰夫貴於朝妻榮於室婦女無定升降從夫三藩既啓王封妃名亦宜同等可從妃例自是三藩王妻名號始定金床玉几咸陽王禧謀反事露走渡洛水至栢塢俄而被擒賜死其宫人為之歌曰可憐咸陽王奈何作事誤金床玉几不得眠夜踏霜與露洛水湛湛彌岸長行人那得渡其歌流至江表北人之在南者雖富貴聞弦歌奏之莫不洒泣驢王咸陽王坦為冀州刺史性好畋漁無日不獵又其從叔汝豐王延明毎切責之曰昔宋有東海王性凡劣時人號驢王我觀汝所作亦恐不免驢號當時聞者號曰驢王不營聲譽高陽王雍少俶儻不常孝文曰吾亦未測此児之深淺然觀其任真率素或大噐晚成初封潁川王或説雍待士營聲譽雍曰吾文帝之子位為諸王用聲名何為刋一字孝文帝嘗令黄門侍郎崔光讀暮春羣臣應制諸詩至彭城王勰詩帝乃為改一字勰曰陛下賜刋一字足以價等連城十歩賦詩彭城王勰從幸代都次于上黨之銅鞮山路旁有大松樹千數根帝住而賦詩令人示勰曰吾作詩雖不能七歩亦不至逺汝可作之比至吾所令就也時勰去帝十歩遂且行且作未至帝所而就詩曰問松林松林經幾冬山川何如昔風雲與古同帝大笑曰汝此調責吾耳三曹才名相忌孝文帝南討漢陽假彭城王勰中軍大將軍加鼓吹一部勰以寵授頻煩乃靣陳曰陳思求而不允愚臣不請而得豈但今古云殊遇否大異帝大笑執勰手曰三曹才名相忌吾與汝以道德相親縁此而言無慚前烈才力絶人常山王道子陵年十七從太武獵逐一猛獸陵遂空手搏之以獻帝曰汝才力絶人當為國立功立事勿如此也即拜内行阿干又平涼州沮渠蒙遜令一驍將與陵相擊两槊皆折陵抽箭射之墜馬陵恐其救至未及㧞劍以刀子戾其頸使身首異處帝壮之即日拜都幢將黒頭三公臨淮王彧字文若少有才學時譽甚美侍中崔光見彧追而謂曰黒頭三公良牧北齊趙郡王叡出為定州刺史六州大都督閑習政事稱為良牧時年十七與軍人同勞苦叡六月領兵監築長城途中屏盖扇親與軍人同勞苦定州先嘗藏氷長史宋欽道倍道送氷叡歎曰三軍皆飲温水吾何義獨進寒氷遂令消液之趙郡王泉叡都督北朔州刺史撫慰新遷量置鋒戍無水處禱而掘井泉源湧出至今號曰趙郡王泉鐡籠地牢文宣帝末年多酒永安王浚頻諌帝衘之詔徴浚浚懼禍謝疾不朝上怒馳驛收浚至盛以鐡籠與王常王渙俱寘北城地牢浚與渙皆有雄畧為諸王所傾服帝恐為害乃自刺渙又使壯士劉桃枝就籠亂刺槊毎下浚渙以手拉折之號哭呼天于是以火燒殺之天下為之痛心博士教筆迹彭城王浟初拜通直散騎常侍封長樂郡公慱士韓毅教浟書見浟筆迹未工􅃧曰五郎書畫如此怱為常侍開國今日後更宜用心浟正色曰昔甘羅為相未聞能書凡人惟論才具何如豈必勤勤筆迹慱士當今能者何為不作三公時年八嵗嚴察如神明浟為滄州刺史為政嚴察都内肅然守令叅佐下及胥吏行逰徃來皆自齎粮食浟纎介知人間事有隰沷縣主簿張達嘗詣州夜投人舍食雞羮浟察知之時守令畢集浟對衆曰食雞羮何不還價直也達即伏罪合境號為神明又有老母姓王孤獨種菜三畆數被人偷浟乃令人密徃書菜葉二字明日市中看菜葉獲賊自後境内無盗政化為當時第一政化為當時第一上食一口浟自滄州召為侍中人吏送别悲號有老翁數百人相率具饌日自殿下至來五載人不識吏吏不欺人百姓有識以來始逢令化殿下唯飲此鄉水未食百姓食聊獻蔬薄浟重其意為食一口選從事浟轉司州牧選從事皆取文才明斷者當時皆稱美選州舊案五百餘浟未嘗朞月悉斷盡千里駒馮翊王潤神武之子幼時神武曰此吾家千里之駒也讀書十行俱下河南王孝瑜讀書十行俱下覆棊不失一道覆棊不失一道上蘭陵王入陣曲蘭陵武王長恭丈襄之子累遷井州刺史突厥入晋陽長恭盡力擊之芒山之敗長恭為中軍率五百騎再入周軍遂至金墉之下被圍甚急城上人弗識長恭免胄示之靣乃下弩手救之于是大㨗武士共歌之為蘭陵王入陣曲深入陣芒山之㨗也人或謂蘭陵王長恭曰入陣太深失利悔無所及對曰家事親初不覺遂然一𤓰共食長恭為將躬勤細事毎得一𤓰必與將士共食侍講金華㕘遊銅雀北齊邢子才廣平王碑文云侍講金華參遊銅雀出陪芝盖入奉桂室半嶽摧峯中河墜月南齊王融豫章文獻王墓誌銘云領袖傾淪紀綱旋没半嶽摧峯中河墜月春然曉隧如何夜䑓鯨驂惋暮葆吹徘徊千秋萬祀頋有餘哀龍纛夕儼葆挽晨鏘海陵王墓銘曰景祚云及多難攸啓載驅鈴轄高闕代邸西光已謝東鼂又良龍纛夕儼葆挽晨鏘風揺草色月照松光春秋非我曉夜何長對䇿雲䑓觀書麟閣梁簡文安成藩王墓銘曰許氏徇龍荀家鳴鶴豈如宗子分聨茟萼對䇿雲臺觀書麟閣官美登朝文高入洛得意琴書忘言丘壑間平文雅北齊史論文襄諸子咸有風骨雖文雅之道有謝間平然武藝英姿多堪禦侮縱覆欺有徴若使蘭陵獲全未可量也間平謂漢河間王東平王也傾意賔客蕭子顯齊書竟王陵子良字雲英少有清尚禮才好士居不疑之地傾意賔客天下才學皆遊集焉左右馳射後周東平公神舉文帝族子膂力絶人彎弓數十斤兼能左右馳射嚴而秉法魏安定王休車駕南伐領大司馬孝文親行諸軍􅂈休以三人盜徇六軍將斬之有詔赦之休執曰陛下親御六師䟦渉野次軍行始爾已有奸竊如其不斬何以息盜請行刑以肅奸慝詔曰大司馬執憲誠應如是可特原之休乃奉詔帝謂司徒馮誕曰大司馬嚴而秉法諸軍不可不慎始知廣陵之明了廣陵王羽有斷獄之稱領廷尉孝文幸羽第與諸弟言曰朕昨新受民訟始知廣陵之明了咸陽王禧對曰臣年為廣陵凡廣陵為弟高祖曰我為汝兄汝為羽昆汝復何恨墳栢隋文帝有四弟居武允之憂率諸弟負土為墳人植一栢四根欝茂西北一根獨黄後因風雨并根壞之乃蔡王整所植及從武帝伐齊整力戰而死果終不吉踈屬降爵唐高祖受禪廣宗室以威天下從弟及姪年始孩童者皆封郡王太宗即位因舉宗正属籍問侍臣曰遍封宗室于天下便乎尚書左僕射封德􅉓對曰歴觀徃古封王者今最為多兩漢以降唯封帝子及親兄弟又宗室踈遠者非有大功如周之郇滕漢之賈澤亦不濫封所以别親踈也先朝敦睦九族一切封王爵命既隆多給力役盖以天下為私殊非至公馭物之道太宗曰朕理天下本為百姓非欲勞百姓以養已親于是宗族踈属悉降爵為郡公水化為血飲之以安衆河間王孝恭高祖從兄子時公祐據江東反命孝恭為行軍元帥擊之將發與諸將宴命取水忽變為血在座者皆失色孝恭舉止自若徐諭之曰禍福無門惟人所召無負于物諸公何見憂之深公祐惡積禍盈今承廟筭以致討盆中之血公祐授首之徴遂盡飲之時人服其識度而能安衆果擒公祐不以賊遣君父太宗討高䴡江夏王道宗與李靖為先鋒濟遼水尅牟城逢賊兵大至軍中僉欲深溝保險待太宗至道宗曰昔耿弇不以賊遺君父我既職在前軍當湏清道以待輿駕乃與靖合戰擊大破之河間江夏當代所重道宗晚年頗好學敬慕賢士不以地勢凌人宗室中唯道宗及河間王孝恭最為當代所重房遺愛伏誅長孫無忌褚遂良素與道宗不恊上言道宗與遺愛交結配流象州一時之傑史臣曰道宗軍謀武勇好學下賢于羣從之中稱一時之傑無忌遂良衘不恊之素致千載之寃永㣲中無忌遂良忠而獲罪人皆哀之不知誣䧟劉洎呉王恪于前枉害道宗于後天網不漏不得其死宜哉千載之寃上以名望見誅吴王恪太宗第三子有文武才太宗嘗稱類巳既名望素高甚為物情所尚長孫無忌輔立高宗深所忌嫉㑹房遺愛謀反遂因事誅恪以絶衆望海内寃之尊嫡卑庶魏王泰有美質太宗重愛之新出閣毎月給料物踰于皇太子諫議大夫褚遂良上䟽諫曰昔聖人制禮尊嫡卑庶謂之儲君料物翻少魏王朝野見聞不以為是太宗又令泰移居武德殿侍中魏徵又諫太宗並納其言時太子承乾有足疾泰潜有奪嫡之心遂與承乾俱見廢黜離間父子遽為豺狼史臣曰太宗諸子呉王恪濮王泰最賢皆以才高辨悟為長孫無忌所嫉離間父子遽為豺狼而無忌破家非陰禍之報歟也濮王即魏王不如禽獸鐡石蜀王愔太宗子數為非法太宗怒曰禽獸調伏可以馴擾于人鐵石鐫鍊可為方圓之噐至如愔者曽不如禽獸鐵石乎乃削封邑及國官之半率兵先至淮安王神通高祖從父弟隋末在京師舉兵以應義師後太宗謂諸功臣曰朕叙公等勲效量定封邑恐不能盡當各自言神通曰義旗初起臣率兵先至今房𤣥齡杜如晦等刀筆之人功居第一臣且不服上曰叔父雖率兵先至未嘗親行陣𤣥齡等有籌謀帷幄定社稷功所以漢之蕭何雖無汗馬指蹤推轂故功居第一叔父于國至親誠無所愛必不可縁私濫與勲臣同賞耳淮陽小兒淮陽王道𤣥高祖從父無子劉黑闥引突厥㓂河北壽山東道將軍總管師次下慱與賊軍遇道𤣥帥騎先登命副將史萬寳將軍繼進萬寳與之不恊及道𤣥深入而擁兵不進謂所親曰吾奉手詔討賊淮陽小児雖名為將軍軍之進止皆委于吾今其輕脱越濘交戰大軍若動䧟泥淖莫如結陣以待之道𤣥遂為賊所擒貪婪江夏王道宗坐贓下獄太宗謂侍臣曰朕富有四海士馬如林欲使轍迹周宇内逰觀無休息絶域探竒玩海外訪珍羞豈不得耶勞萬姓而樂一人朕所不取也人心無厭惟當以禮制之道宗奉料宴賜不少足有餘財而貪婪如此使人嗟捥豈不鄙乎遂免官擅殺盜馬者長樂王㓜良高祖從父弟時人有盜其馬㓜良獲盜者擅殺之高祖怒曰昔人賜盜馬者酒終獲其報爾輙行戮何無古風乃遣禮部尚書李綱于朝堂集宗室王公而撻之百後累遷涼州都督多侵暴市厪行旅苦之太宗按其事遂縊殺之朝夕絃歌自娯隴西王慱乂高祖兄子慱乂有妓妾數百人皆衣羅綺食必梁肉朝夕絃歌自娯驕侈無比與其弟渤海王奉慈俱為高祖所鄙帝謂曰我怨仇有善猶擢以不次況于親戚而不委任閬汝等惟昵近小人好為不軌先王墳典不聞學習分賜絹二百疋可買經史習讀務為善事賜絹買經史上寧三日不食不能一日不獵巢王元吉高祖第四子元吉性好畋獵載網罟三千餘兩言我寧三日不食不能一日不獵又縱其左右攘奪百姓境内犬畜因之殆盡五十年為王淮南王茂徐王元禮之子茂險薄無行元禮姬趙氏有美色及元禮遇疾茂遂逼之元禮知而切加責讓茂乃屏斥元禮侍衛斷其藥膳仍云既得五十年為王更何煩藥服竟以餒終上元中事洩配流振州而死閨門修整有類寒素韓王元嘉高祖第十一子元嘉少好學聚書至萬巻又採碑文古迹多得異本閨門修整有類寒素士大夫與其弟靈䕫甚相友愛兄弟集見如布衣之禮其修身潔已内外如一當代諸王莫能及者唯霍王元軌抑其次焉斷獄平允鄭王元懿高祖第十三子累授絳州刺史數斷大獄甚有平允之譽高祖嘉之降璽書褒美閉閤讀書霍王元軌高祖第十四子少多才藝高祖甚竒之除夀州刺史高祖崩去職毁瘠􅂈禮自後常衣布示有終身之戚毎至忌辰輙數日不食改封霍王尋轉徐州刺史元軌前後為刺史至州唯閉閤讀書吏事責成於長史司馬謹慎自守與物無忤為人不妄在徐州唯與處士劉𤣥平為布衣之交人或問𤣥平王之長𤣥平答曰無長問者怪而復問之𤣥平曰夫人有短所以見其長至于霍王無所不備吾何以稱之哉特令就府别置文學館濮王泰太宗第四子以泰好事愛文學特令就府别置文學置館任自引召學士又以泰腰腹洪大起拜頗難復令乗小輿以出入焉五王宅初𤣥宗兄弟出閤列第于東都積善坊五人分院同居號五王宅大足元平從幸西京賜宅於興慶坊亦號五王宅及先天之後興慶是龍潜舊邸因以為宫别賜寧王申王岐山薛王宅邸第相望環於宮側𤣥宗于興慶宫西南置樓西靣題曰花萼相輝之樓南面題日勤政務本之樓𤣥宗時登樓聞諸王音樂之聲咸召升樓同榻宴飲或便幸其第賜金分帛厚其歡賞諸王毎日于側門朝見歸宅之後即奏樂縱飲擊毬闘雞或近郊從禽或别墅追賞不絶于嵗月遊踐之所中使相望以為太子友悌近古無比故人無間然𤣥宗既篤於昆弟雖有䜛言交構其間友愛如初十王宅𤣥宗諸子于安國寺東附苑城同為大宅分院居為十王宅後鄂光得罪忠維大統天寳中慶棣又殁唯榮儀等十四王居院諸孫成長于十宅外置百孫院百孫院上真王禄山反𤣥宗幸蜀除潁王璬蜀郡大都督劍南節度大使令先赴本郡璬之藩卒遽不遑受節綿州司馬史貴進説曰王帝子也且為節度使今之藩而不持節軍騎徑進人何所瞻請建大槊䝉之油囊為旌節狀先驅道路足以威衆璬笑曰但有真王何用假旌節乎之藩不持節上履中厭魅棣王琰𤣥宗第四子琰妃韋氏有過琰怒不敢奏聞乃斥于别室寵二孺人又不相恊孺人乃密求巫者書符置琰履中厭魅聖躬𤣥宗使人掩其履而獲之大怒引琰詰責之琰頓首曰臣之罪合死矣請一言以就鼎鑊然臣與新婦情義絶者二年于兹臣有二孺人又皆争長臣實不知有符恐此三人所為也唯聖君辨其罪人及推問之竟孺人也𤣥宗猶疑琰知情怒未解太子以下皆為請命囚於鷹犬坊中絶朝請憂懼而死黄臺𤓰辭禄山之亂𤣥宗幸蜀肅宗第三子建寧郡王倓衛從肅宗至靈武毎蒼黄顛沛之際血戰在前肅宗既即位廣平為元子未􅁽立授天下兵馬元帥倓典親軍時張良娣有寵倓性忠謇屢言良娣頗自恣與李䕶國連結内外欲傾動皇嗣自是日為良娣䕶國所構云建寧恨不得兵權頗蓄異志肅宗怒賜死既而省悟悔之明年冬廣平王收復兩京遣判官李泌入朝獻㨗泌與上有東宫之舊從容謂泌日倓于艱難時實得氣力無故為下人之所間欲圖害其兄朕以社稷大計割愛而為之所也泌對曰爾時臣在河西豈不知其故廣平兄弟天倫駕睦至今廣平言及建寧則嗚咽不已陛下之言出于䜛口帝因泣下曰事已及此無如之何泌奏曰臣幼稚時念得黄臺𤓰辭陛下嘗聞其説乎高宗有子八人睿宗最幼天后所生三子自為行第故睿宗第四長曰孝敬皇帝為太子監國而仁明孝悌天后方圖臨朝乃鴆殺孝敬立雍王賢為太子賢毎日憂惕知不保全與三弟同侍于父母之側無由敢言乃作黄䑓瓜辭令樂工歌之冀天后聞之省悟即生哀愍辭云種𤓰黄䑓下𤓰熟子離離一摘使𤓰好再摘令𤓰稀三摘猶尚可四摘抱蔓歸而太子賢終為天后所逐死于黔中陛下有今日之事己立摘矣慎無再摘上愕然曰公安得有是言時廣平王大功亦為張皇后所忌潜構流言泌因事諷動之及代宗即位深思建寧之寃追贈齊王六宅史臣曰自天寳以降内宫握禁旅中闈纂繼皆出其心故手纔􅄃于萬幾目已睨於六宅防閑禁錮不近人情不起墳德宗子肅王詳四嵗薨性聰慧追念無已不令起墳墓詔如西域法層甎造塔禮儀判官司門郎中李召上言曰墳墓之義經典有常層甎起塔起于天竺肅王名位尊崇喪𦵏之儀存乎簡冊舉而不法垂訓非經乃令準令仍為起墳兵圍十六宅昭宗在華州韓建矯制發兵圍十六宅又殺通王以下十一王投屍九曲池蔣𤣥暉既受朱全忠之命遂弑昭宗又殺德王以下六王投屍于九曲池二錯九國志西楚莊宗除高季興荆南節度使檢校太師守中書令渤海王詔都堂擇日禮遣上賜内宴時議多請留季興莊宗詔歸鎮季興始悟朝廷本欲圖已甚憂懼兼程而行夜至㐮陽斬闗而出江陵父老軍吏皆至荆門迎賔徐謂梁震曰始吾不聼公言幾不脱虎口爾因飲既酣又曰吾以此有二錯來朝一錯放回二錯也不領徼外諸侯國朝至道二年以左衛上將軍徐國公元偓領洪州都督府鎮南軍節度使右衛上將軍涇國公元偁領鄂州都督武昌軍節度使先是上謂宰相等曰元偓等可與一徼外藩鎮若内郡國則本郡遣吏來賀益為勞擾爾吕端等奏曰故事太子不合領徼外諸侯但可下詔本道不得遣人上京從之出閤封王咸平五年以皇太子元佑為光禄大夫檢校太保左衛上將軍兼御史大夫上柱國信國公時宰相上言皇子出閤封王盖舊典也上謙遜不許而有是命當為統軍楚王元位為左羽林軍上將軍唐徳宗朝六軍置統軍秩從二品羽林龍武神武是也十六衛置上將軍與統軍同左右衛驍衛武衛威衛領軍金吾監門千牛衛是也今楚王當為統軍而乃以為上將軍按儀制金吾在統軍上將軍之上今之改秩盖有司失于檢閲也屬辭用事當詢僚佐大中祥符五年上以諸王所和金華殿觀麥歌示輔臣因曰諸王好學朕常誨以屬辭用事當詢于僚佐則免疑誤也興慶花萼故事無得而比是年上獨以中官從幸元偁元宫又宴元偓宫如家人禮夜二鼔而罷先是上謂宰相曰朕毎戒宗室令誦書作詩習學筆札射藝如聞頗能精至朕將親觀焉議者以為聖上友愛之至禮法之舉雖唐明皇興慶花萼故事無得而比焉後世愈昌熾景祐元年尚書令曹彬贈兾王彬事太祖太宗屢總大兵收復四方未嘗枉戮一人其後子孫益熾世為將相出皇后且三世為將道家所忌而兾王後世愈更昌熾豈非陰德所致乎眞濮王慶厯中燕王元儼薨大臣以用度未足欲緩𦵏事右正言孫甫上䟽日燕王上之親叔萬禾之主有四海之大不能備禮于叔乎由是從之燕王有盛名于天下中外皆以八王呼之幽燕間皆呼之以止童児之啼敵使入朝常問館伴日誰是八王館伴指以示之敵使目逆觀瞻見其堂堂乃言曰真濮王也本國聞其名頗畏之上至孝毎于内殿事以家人之禮中外呼八王幽燕呼之止兒啼上以夜為晝歸田録華原郡王允良燕王子也性好睡毎自旦酣寢至暮始興盥潄衣冠而出燃燭治家事飲食宴樂達旦而罷則復寢以終日無日不如此由是一宫之人皆晝睡夕興允良不甚喜聲色亦不為他驕恣惟以夜為晝亦其性之異前世所未有也親王兼太傅皇子顥拜東陽郡王除婺州節度使檢校太傅翰林學士賈黯上言太傅天子師臣也子為父師于體不順中書檢勘自唐以來親王無兼師傅官者盖自國朝命官只以差遣為職事三師三公以降皆是虚名故失於因循爾議者皆以職官分紀卷三十一
