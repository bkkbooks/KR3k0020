body:
  text: 職官分紀卷三十宋孫逢吉撰太子左右衛府率副率前漢百官表詹事秦官掌皇后太子家属官有衛率後漢百官志太子衛率一人四百石本注曰主門衛徼巡衛士晋職官志左右衛率案惠帝建東宫置衛率初曰中衛率泰始五年分為左右各領一軍太元中以國子博士呉隠之為太子右衛率凡太子出前衛率導在前黄麾外左右二率從挾導輿車後衛率從在烏皮外並𢃄㦸執刀其服並視左右衛將軍晋中興書徐邈建元中為太子前衛率晋起居注建元十四年以太子中舍人郄儉為太子後衛率沈約宋書元嘉中以王球謝𢎞微為太子右衛率宋起居注永初元年以徐佩為太子後衛率隋百官志梁左右衛率各一人位視御史中丞各有丞左率統果毅統遠立忠建寧陵鋒夷冦祚徳等七營右率領崇榮永吉崇和細射等四營後齊左右衛坊率各領騎官備身正副都督騎官備身五職騎官備身員隋左右衛各置率一人副率二人掌宫中禁衛各置長史司馬及録事功曹倉兵騎兵等曹參軍事法曹鎧曹行參軍事員唐職官志左右衛率府秦漢有太子衛率主門衛晋分左右中前四衛率後代因置左右率北齊為衛率坊隋初始分置左右衛率府左右宗衛率左右虞侯左右内率左右監門率十府以備儲闈武衛之職煬帝改為左右侍率國家復為衛率龍朔改為左右典戍衛咸亨復率各一人正四品上副率各一人從四品上掌東宫兵仗羽衛之政令總諸曹之事凡親勲翊府及廣濟等五府属焉凡正至太子朝宫臣率其属儀仗為左右廂之周衛出入如鹵簿之法六典太子左右衛率府率各一人正四品上晋初為中衛率太始五年分左右恵帝為太子加置前衛率愍懐在東宫又加後衛率故元康中凡四衛率咸都王穎為太弟又置中衛率是為五率各丞一人服視左右衛將軍品第五位同中庶子過江省前後至孝陵復置宋又省齊左右衛率武冠絳朝服品第五秩千石後魏太和二十二年左右率從三品後周東宫有司成司武司衛之類至隋文帝始分置凡十府煬帝改衛率為侍率皇朝復龍朔改典戍衛咸亨復掌統東宫三寺十率府之事舉其網紀而修其職務焉副率各二人從四品上隋文帝置煬帝改為侍副率皇朝復龍朔咸亨隨衛改復掌同職官志國朝元祐官品令太子諸率府率從七品副率從八品下同文冠當時南史徐陵父摛為左衛率又袁淑為太子左衛率謝莊為太子中庶子時平南王獻赤鸚鵡普詔羣臣為賦淑文冠當時作畢示莊及見莊賦歎江東無我卿當獨秀我若無卿亦一時之傑遞隠其賦以才藝堪幹立名晋中興書禇翌字謀逺幼失父以才藝堪幹立名肅宗即位徴拜屯騎校尉遷太子左衛率風神魁梧郄儉為太子右衛率身長八尺美鬚髯風神魁梧烈宗異之並為名士孫約兾州記裴康弟楷並為名士至大子左衛率謀廢賈后晋劉卞為愍懷太子左率知賈后必害太子乃問張華茟曰君欲如何卞日東宫雋又如林四率精兵萬人公居阿衡之任若得公命皇太子因朝使録尚書事廢賈后于金墉兩黄門力耳茟曰廢立大事又非所能賈后㣲聞遷為雍州刺史卞恐誅乃飲藥卒忠讜有文武清正著信義山公啟事太子左率缺冝得其才無疾患者城陽太守石崇忠讜篤信有文武河東太平焦勝清正著信義皆其選也直侍衛之美者荀氏家傳車騎將軍悝守茂中山濤舉之為太子右衛率稱清和理正從容頋問動可觀采真侍衛之美者進品為第三隋宇文述每與晋王謀事及晋王為皇太子乃以述為左衛率舊令率官第四品以述素貴遂進率品為第三其見重如此憚其在東宫高祖以太子勇知時政欲重宫官之資故以大臣領其職蘇孝慈自兵部尚書拜右衛率尚書如故上將廢太子憚其在東宫出為沂州刺史貽書責田遊巖唐蔣儼除太子右衛副率時徴隠士田逰􅑐為太子洗馬在宫無所補儼貽書責曰足下負巢由之峻節傲唐虞之聖主養烟霞之逸氣守林壑之遁情主上屈萬秉之重申三頋之榮遇子以商山之客待子以不臣之禮將輔導儲貳漸染芝蘭爾皇太子春秋鼎盛聖道未周足下受調䕶之寄是可言之秋唯唯而無一談悠悠以卒年嵗遊巖不能答身居三職李大亮拜左衛大將軍十七年晋王為皇太子東宫寮属皆盛選重臣以大亮兼太子右衛率俄兼工部尚書身居三職宿衛兩宫甚為親信大亮毎當直必通宵假寐太宗勞之曰當公宿直我便安卧長史六典長史各一人正七品上隋置皇朝因之掌判諸曹及三府五府之事凡府事大事則從其長小事則専達季秋以其属官之狀上於率而為之考課録事參軍事倉曹兵曹胄曹六典録事參軍事一人從八品上倉曹參軍事一人從八品下兵曹參軍事一人從八品下並隋置皇朝因之胄曹參軍事一人從八品下隋置為鎧曹皇朝因之長安中改胄曹神龍初復太極中又有胄曹録事參軍掌監印發付勾稽倉曹掌親勲翊三府廣濟等五府文官之簿書凡勲階考課假使禄賜及公廨財物田園食料皆典之兵曹掌親勲翊三府廣濟等五府武官親勲翊衛衛士之名簿及其畨上差遣之法式凡上畨者受其名簿而咨配于率知公私馬及雜畜之簿帳胄曹掌親勲翊三府廣濟等五府噐械諸公廨繕造之物事凡大朝㑹及行役應請戎仗者則具其名數受之於主司既事而歸之左右率府親府勲府翊府中郎將左右郎將六典左右率府親府勲府翊府中郎將各一人從四品上中郎將之説見左右衛梁左衛率領七營右衛率領四營二率各領殿中將軍十人買外將軍十人又有正員司馬員外司馬屯騎歩兵翊軍三校尉謂之三校旅賁中郎將兄從僕射謂之二將又有左右積弩將軍各一人北齊太子左右衛坊率各領騎官備身員又有内直備身備身正副都督備身三職等員又有直閣直前直後員又有旅騎屯衛諸軍等校尉各二人騎都尉三十人隋左右衛率下有直閣四人直寢八人直前直後各十人皇朝左右衛率各置親勲翊三府毎府中郎將二人郎將二人掌其府校尉旅帥及親勲翊衛之属以宿衛左右郎將各一人正五品下皇朝置中郎將郎將掌其府校尉旅帥及親勲翊衛之属以宿衛而總其府事太子左右司禦率府率副率隋百官志隋置左右宗衛制官如左右衛各掌以宗人侍衛加置行參軍二人唐職官志左右司禦率府本號左右宗衛府龍朔改為司禦率府率各一人正四品上副率各二人從四品上掌同左右率六典太子左右司禦率府率各一人正四品上隋文帝置煬帝改左右武侍率皇朝改為左右宗衛龍朔二年改今名神龍初又為宗衛開元初復舊副率各二人從四品上隋文帝置皇朝因之其後改復皆隨于府率掌同左右衛副率為之貳郊城等三府之旅賁應畨上者各配于所職國朝元祐官品令見左右衛長史六典長史各一人正七品上掌判諸曹及郊城等三府之貳餘皆如左右率府録事參軍事倉曹兵曹胄曹六典録事參軍事各一人從八品上隋置左右虞候開府初無録事有長史及四曹參軍至煬帝改為率府始置録事皇朝因之餘具上説太子左右清道率府率副率隋百官志隋有左右虞候各置開府一人掌斥候伺非長史以下如左右衛而無録事參軍員唐職官志左右清道率府隋文置左右虞候府一人掌斥候國初亦為左右虞候龍朔改為清道率府神龍改為虞侯開元復為清道率各一人正四品上副率各二人從四品上掌宫内外晝夜廵警之法六典太子清道率府率各一人正四品上隋置非達職擬金吾將軍副率各二人從四品上隋煬帝置皇朝因之龍朔開元隨府改復率掌東宫内外晝夜廵警之法以戒不虞凡絳邑等三府皆属焉副率為之貳凡皇太子出入則領其属以清游隊為之先以後拒隊為之殿其餘依鹵簿之法以從凡仗衛之出入置細引以導之兼為之糺正毎月絳邑等府直盪之應畨上者配于所職國朝元祐官品令同上長史六典長史各一人正七品上隋置掌判諸曹及絳邑等三府之貳餘如左右率府録事參軍事倉曹兵曹胄曹六典録事參軍事各一人從八品上倉曹參軍事各一人從八品下兵曹參軍事各一人從八品下胄曺參軍事各一人從八品下隋置左右監門率府率副率隋百官志左右監門率各一人副率二人掌諸門禁煬帝即位改率為宫門候降為正五品唐職官志左右監門率府隋置皇朝因之率各一人正四品上副率各一人從四品上掌東宫禁衛之法六典太子左右監門率府率各一人正四品上隋文帝置擬左右監門將軍各有直長十人龍朔二年改左右崇掖衛咸亨復舊垂拱改鶴禁衛神龍復舊副率各二人從四品上隋文帝置龍朔開元隨府改復率掌東宫諸門禁衛之法副率為之貳凡東宫諸司應以籍入子宫殿者皆本司具其官爵姓名牒門司門司送于監門監門之主與判曹印署送于門司門司㑹之同則聽入凡東宫内外門之守者並司其出入凡財物噐用之出入于宫禁者皆以籍傍為據左右監門以出入之若皇太子出入則依鹵簿之法率其屬於牙門之左右以為捍守國朝元祐官品令同上長史六典長史各一人從七品上隋置左右監門率有長史以下等員掌判諸門禁衛之貳録事參軍事兵曹冑曹六典録事參軍事各一人正九品上兵曹參軍事各一人正九品下胄曹參軍事各一人正九品下隋無倉曹以兵曹兼之皇朝因之兵曹兼倉曹之職餘皆如左右率府胄曹掌噐械及公私馬驢雜畜土木繕造之事左右内率府率副率隋百官志左右内率府率各一人掌領禁内侍衛供奉兵仗煬帝降率為正五品唐職官志左右内率府隋初置擬上臺千牛衛龍朔初為奉裕率咸亨復率各一人正四品上副率各一人從四品上率掌東宫千牛備身侍奉之事而立其兵仗縂其府事六典太子左右内率府率各一人正四品上隋文帝置擬千牛將軍其備身有千牛備身八人掌執千牛刀備身左右十六人掌供奉弓箭備身二十人掌宿衛侍從煬帝降率為正五品皇朝加至四品上龍朔改奉裕率神龍初復舊副率各一人從四品上隋置龍朔神龍隨府改復率掌東宫千牛備身侍奉之事而主其兵仗總其府事副率為之貳以千牛執細刀弓箭以備身宿衛侍從以主仗守戎服噐物凡皇太子坐朝則領千牛備身之属升殿若射于射宫則率領其属以從位定千牛備身奉細弓及矢立於東階上西靣率奉弓及决拾北靣張弓左執弣右執簫以進副率以巾拂矢而進進訖各退位於位及射左右内率啓其矢中及不中既事受亦如之國朝元祐官品令同上止當守職唐王及善高宗時遷左奉裕率孝敬居春官有因宴集命宮官擲倒次至及善辭曰殿下自樂官臣止當守職此非臣之任也臣茍奉令恐非殿下羽翼之美太子辭而遣之羽翼之美上長史六典長史各一人從七品上隋置左右内率府有長史以下等員掌判諸曹官吏及千牛備身之貳餘如左右率府孝悌殊異唐元讓弱冠明經擢第以母疾不仕永淳中巡察使薦讓孝悌殊異擢拜太子右内率府長史嵗滿還鄉鄉人争訟不詣州縣皆就讓决焉鄉人争訟就决上録事參軍事兵曹胄曹六典録事參軍事各一人正九品上兵曹參軍事各一人正九品下胄曹參軍事各一人正九品下隋置無倉曹皇朝因之録事參軍事掌印兼勾簿書及其勲階考課稽失兵曹掌文武官及千牛備身之簿書及其勲階考課假使禄俸之事胄曹掌細引仗及羽儀之物自千牛以下各分而典之方雅清素唐李善方雅清素有君子之風高宗顯慶中累補太子内率府録事參軍崇賢館學士兼沛王侍讀嘗注觧文選分六十卷表上之詔藏秘閣太孫官属唐永淳元年三月立皇孫重照為太孫將置府寮高宗召吏部郎中王方慶問曰前代故事如何方慶對曰臣按周禮有嫡子無嫡孫漢魏以來皇太子在亦不立太孫晋惠帝永寧元年立愍懐太子第三子㐮陽王尚為皇太孫太子官属即轉為太孫官属南齊永明十年立文惠太子長子南郡王昭業為皇太孫使居東宫今皇太子在而立太孫旁求載籍未有前例上曰自我作古可乎對曰五帝不相沿襲茍不失上下之序不虧政理之道亦何事而不可詩曰貽厥孫謀以燕翼子禮曰君子抱孫不抱子孫可以為王父尸以其昭穆同也今陛下肇建皇孫創斯盛典所以彰子孫千億之盛福祚靈長之應也上悦使方慶詳求典故官属員品乃奏太孫府置師傅友文學祭酒及長史曹掾主簿管記司録以下六曹從事等各加王府一級上後頗以為疑竟不補授而止職官分紀卷三十
