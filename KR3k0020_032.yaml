body:
  text: 職官分紀巻三十二宋孫逢吉撰諸王府僚属前漢百官志後漢百官志並見諸侯王門漢舊儀帝子為王王國置太傅相中尉各一人秩二千石續漢書王子封王者其郡為國毎國各置郎中令一人秩千石掌王夫人郎中宿衛官也晋中興書謝尚司徒左西屬為㑹稽王友晋咸寧起居注諸王國大國三卿左右常侍侍郎隋百官志梁皇弟皇子府置師長史司馬從事中郎諮議㕘軍及掾属中録事中記室中兵等㕘軍功曹史録事記事中兵等㕘軍文學主簿正㕘軍行㕘軍長兼行㕘軍等員嗣王府則减皇弟皇子府師友文學長兼行㕘軍蕃王府則又减嗣王從事中郎諮議㕘軍掾属録事記室中兵㕘軍等員後齊王位列大司馬上置師一人餘官大抵與梁不異隋親王置師友各一人文學二人長史司馬諮議㕘軍事掾属各一人主簿二人録事功曹記室户倉兵等曹騎兵城局等㕘軍事東西閤祭酒各一人㕘軍事四人法田水鎧士等曹行㕘軍各一人行㕘軍六人長兼行㕘軍八人典籖二人唐職官志王府官属親王府傅一人諮議㕘軍一人友一人文學二人東閤祭酒西閤祭酒各一人六典親王府傅一人從三品漢高祖初置諸侯王有太傅輔導王後漢書傅秩二千石魏晋因之宋齊梁陳皆為師後魏始藩王二藩王三藩王各有師傅北齊唯置師隋皇叔昆弟皇子為親王者置師皇朝因之開元改為傅掌傅相訓導匡其過失國朝有其官而無定員正三品諮議參軍事一人正五品上晋氏公府置諮議㕘軍事盖取諮詢謀議軍事也宋齊因之梁陳諸王公府及位從公開府者及皇弟皇子庻子府各有諮議參軍員隋三公府及諸王府各有一人正五品上皇朝因之國朝太平興國中始置諮議正五品上其後不置唯升王府復置諮議㕘軍以常㕘官充掌訏謀左右參議庶事友一人從五品下漢東平憲王為驃騎將軍辟杜撫為西曹掾尋以為師友魏晋諸王置友一人宋齊因之品第六進賢一梁冠絳朝服梁皇弟皇子府友各一人班第八正六品陳因之後魏諸王友從四品下北齊皇子置友一人第五品上隋為從五品下皇朝因之掌陪侍遊居規諷道義國朝有其官而無定員從五品下升王府始置友文學二人從六品上漢氏公府州郡並有文學魏氏諸王始有文學員晋宋齊梁陳皆因之班第五從七品後魏大和末六品上北齊因之隋親王府有文學二人從六品上皇朝因之掌讎校典籍侍從文章東閤西閤祭酒各一人從七品上晋初位從公以上並置東閤西閤祭酒宋齊梁陳後魏北齊皆相因親王嗣王上柱國府各有東閤西閤祭酒各一人從七品上皇朝因之掌接對賢良導引賔客長史一人從四品上漢相國丞相有兩長史秩千石後漢三公府各有長史一員魏太祖呉長沙桓王府因之宋齊諸王領藩鎮者有一人品第六秩千石銅印墨綬進賢兩梁冠絳朝服梁陳公府並有一人後魏北齊亦同隋親王嗣王郡王各有長史皇朝因之嗣王郡王則不置司馬一人從四品下司馬主兵官宋齊諸王領鎮者各有一人梁陳後魏北齊隋並與長史同置皇朝因之長史司馬掌統理府寮紀綱職務國朝有其官而無定員掾一人正六品上漢氏三公大將軍御史大夫並有掾属員西漢辟召皆上言之故東西曹掾比四百石餘曹比三百石其属並二百石後漢皆自辟除不復上言故通降為百石品秩雖下優禮甚宏三公盖天子之股肱掾属則三公之喉舌故三府掾乃言行之本禍福之主及其遷除或周月而長州郡或數年而至公卿魏晋皆相因置多者或至數十人江左以來諸公置掾二人其加崇者置四人掾属常敦明教義肅清風俗非禮不言非法不行以訓羣吏宋齊梁陳後魏北齊公府皆有掾隋三公三師不開府國王嗣王郡王府有掾属一人皇朝因之掌通判功曹户曹倉曹事属一人正六品上漢魏以來與掾同置過江之後則為曹名諸公置户曹属一人其加崇者置倉曹掾属一人梁陳諸公皇子皇弟府並有属後魏北齊三師三公府各有掾隋親王府有属一人皇朝因之掌通判兵曹法曹士曹事主簿一人從六品上漢三公府有黄閤主簿省録衆事魏晋以下皆有之梁陳諸公皇子皇弟府各有主簿後魏皇子主簿從六品北齊諸王皆有主簿隋親王府二人皇朝置一人掌覆省王教史二人皇朝因隋置餘史並同記室參軍事二人從六品上漢三公及大將軍皆有記室令史主上章表奏報書記魏太祖輔漢以陳琳阮瑀管記室軍國書檄多二人所作晋氏諸公及位從公以上並有參軍員宋諸公府有記室參軍梁陳公府及王府皆有記室參軍北齊因之隋親王嗣王府有記室㕘軍皇朝因之掌表啟書䟽録事參軍事一人從六品上晋元帝初為鎮東大將軍有録事參軍一人梁陳王府有中録事㕘軍及録事各一人後魏北齊因之隋親王嗣王府有録事參軍一人皇朝因之掌府事勾稽省署抄目録事一人從九品下掌受事發差兼勾稽失功曹參軍一人正七品上漢魏晋宋齊梁陳後周州郡縣並有功曹員從魏太和末諸王府並有功曹員隋氏親王嗣王府有功曹參軍煬帝改為功曹書佐皇朝復為功曹參軍掌文官簿書考課陳設儀式等事倉曹參軍事一人正七品上後魏諸王府有倉曹參軍隋親王嗣王府有倉曹參軍煬帝改倉曹書佐皇朝復為倉曹參軍掌廪禄請給財物市易等事户曹參軍事二人正七品上後魏隋氏與倉曹同置掌封户田宅僮僕弋獵等事兵曹參軍事一人正七品上梁陳王府有中兵曹參軍事中直兵曹參軍各一人後魏有皇子府中兵曹㕘軍始藩王二藩王有兵曹㕘軍北齊皇子府有中兵外兵參軍隋親王嗣王府有兵曹參軍煬帝改為兵曹書佐皇朝復為兵曹參軍掌武官簿書考課儀衛假使等事騎曹參軍事一人正七品上隋親王嗣王府有騎曹參軍一人煬帝改為騎曹書佐皇朝復故掌厩牧騎乗文物噐械等事法曹參軍事一人正七品上梁陳後魏諸王府隋親王嗣王府並有法曹行參軍煬帝改為法曹行書佐皇朝復故掌推按欺隠决罰刑獄等事士曹參軍事一人正七品上後魏諸王府隋親王府皆有士曹行參軍煬帝改為士曹行書佐皇朝復故掌公𪠘舍宇繕造工徒等事參軍事二人正八品下漢末三公府有參軍事如孫堅㕘騎軍事荀彧參丞相軍事是也魏武帝征荆州請邯鄲淳㕘軍事自晋宋以來代有其任梁選簿皇弟皇子府有正㕘軍後魏有皇子參軍北齊因之隋親王嗣王府有參軍六人長兼行參軍八人煬帝改為行書佐皇朝復為參軍四人仐减二人六曹以下官吏三府並同其雜使又有執刀十五人典獄十八人問事十二人白直二十四人掌出使及雜檢校事行參軍四人從八品上晋氏加置以自辟召故曰行也宋齊梁陳皆有之梁選簿嗣王府行參軍降正王府一階隋親王嗣王府並有長兼行參軍煬帝改為長兼行書佐皇朝改為行參軍典籖二人從八品下齊職儀云諸公領兵局有典籖二人隋親王府嗣王府上柱國柱國府上將軍將軍府各有二人皇朝因之掌宣𫝊教令事親王國國令一人從七品下隋置皇朝因之大農二人從八品下漢諸侯王國置大農晋諸王國置大司農與郎中令中尉為三卿宋齊梁陳北齊王國並有大農隋置一人皇朝因之國令大農掌通判國司事尉二人正九品下漢諸王國有王尉魏晋宋齊梁陳北齊並有中尉隋因為尉皇朝因之掌分判國司事丞一人從九品下録事一人府五人史十人並皇朝置掌府事勾稽省署抄目監印給紙筆事典衛八人漢諸王國有衛士長主衛士侍衛晋諸王國有典衛令宋齊梁陳北齊並有隋王國有典衛八人皇朝因之掌守衛居宅事舍人四人陳北齊王國皆有舍人隋王國有舍人四人皇朝因之掌供引納驅䇿事學官長一人晋宋齊梁陳王國並有學官令隋有學官長皇朝因之掌教授内人事食官長一人丞一人宋齊梁陳北齊王國並有食官長隋親王國有食官長丞各一人皇朝因之掌營造膳食事廐牧長二人丞二人漢諸王國有太僕武帝改曰僕晋宋王國置牧長後魏北齊為廐牧長隋置長丞各一人皇朝因之掌畜牧牛馬事典府長二人丞二人晋氏王國有典府丞梁陳北齊亦因之隋置長丞各一人皇朝因之總僚佐與諸生遊前漢司馬相如為郎景帝不好辭賦是時梁孝王來朝從遊説之士齊人鄒陽淮陰枚乘吴莊忌之徒相如見而説之因病免遊梁得與諸人逰曳長裙吴王濞陰有邪謀鄒陽上書諫之曰臣何王之門不可曵長裙乎掃門魏勃少時欲求見齊相曹參家貧無以自通乃常早夜持帚掃齊相舍人門外舍人恠之以為物而伺之得勃勃曰願見相君無因故為子掃於是舍人引勃見參以為舍人壹為參御嘗言事參賢之言於悼惠王王召見拜内史左右狗冠昌邑王見狗冠龔遂曰王之左右皆狗而冠羽翼魏志楊脩等為陳思王羽翼綱佐見長史門凡為上眄遇莫不入府宋武帝時殷淑儀寵傾後宫子始平王子鸞愛冠諸子允為上眄遇者莫不入子鸞府殺僚佐齊巴東王子響殺僚佐武帝召戴僧静使領軍向江陵僧静面啟曰巴東王年少長史司馬促之太急忿不思難故爾天子兒過誤殺人有何大罪今急遣軍西上人情惶懼無所不至臣不敢奉敕上不答而心善之玳瑁筵劉楨𤓰賦序曰在曹植座厨人進𤓰植命為賦其辭曰布象牙之席重玳瑁之筵憑彫玉之几酌繚碧之樽師以三百五篇諫昌邑王前漢王式為昌邑王師昭帝崩昌邑王嗣立以滛亂廢昌邑羣臣皆下獄誅唯中尉王吉郎中令龔遂以數諫減死論式繫獄當死治事使者問曰師何以亡諫書式對曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未嘗不為王反覆誦之至於危亡失道之君未嘗不流涕為王深陳之臣以詩三百五篇諫是以亡諫書使者以聞亦得减死高選晋劉寔博通古今清身潔己行無瑕玷為國子祭酒愍懐太子初封廣陵王高選師友以寔為師領東海王師阮孚為吏部尚書領東海王師求宿士為師表陳虞寄善属文性冲静少篤行造次必於仁厚陳文帝謂到仲舉曰衡陽王出閤湏得一人旦夕遊處兼掌書記冝求宿士有行業者仲舉未知所對帝曰吾自得之矣乃以手敕用寄寄入謝帝曰所以蹔屈卿㳺藩非止以文翰相煩乃令以師表相事蹔屈游藩上傅有召必至後漢書皇太子疆求乞自退封東海王故重選官属以杜林為傅從駕南廵狩時諸王傅數被引命或多交逰不得應詔惟林守慎有召必至餘人雖不見譴而林特受賞賜又辭不敢受帝益重之盡忠規諫吴志是儀字子羽南魯二宫初立儀以本職領魯王傅儀嫌二宫相近乃上䟽臣竊以魯王天挺懿德兼資文武當今之宜宜鎮四方為國藩輔宣揚德美廣耀威靈乃國家之良規海内所瞻望但臣言辭鄙野不能究盡其意愚以二宫宜有降殺正上下之序明教化之本書三四上為傅盡忠動輙規諫事上勤與人恭不治産業不受施惠為屋舍才足自容鄰家有起大宅者權出望見間起大室者誰左右對日似是儀家權曰儀儉必非也問果他家撰三國要略唐丘悦富學業景龍中為相王府掾與文學韋利噐典籖裴耀卿俱為王府直學士睿宗在藩甚重之官至岐王府開元初卒撰三國要略三十卷行於時相國相燕政大治韓詩外傳田饒事魯哀公而不見察饒謂哀公曰臣將去君黄鵠舉矣哀公曰何謂也饒曰君猶不見雞乎雖有五德君猶曰瀹而食之者何以其所從來者近也夫黄鵠一舉千里止君園池食君魚鱉啄君捈梁無此五德猶貴之以其所從來者遠臣將去君黄鵠舉矣哀公曰止吾將書子之言也饒曰臣聞食其食者不毁其噐䕃其樹者不折其枝有臣不用何書其言遂去之燕燕使為相之三年燕政大治哀公喟然太息為之避寢辭不若夷吾者五國語桓公使鮑叔為宰辭曰臣之所不若夷吾者五寛惠柔民弗若也治國家不失其柄弗若也忠信可結於百姓弗若也制禮義可法於四方弗若也執桓鼔立於軍門使百姓皆加勇焉弗若也桓公乃使請諸魯嚴公加其縛以予齊使齊使受之而退比至三釁三浴之桓公親迎之于郊而與之坐問日昔吾先君㐮公田狩射弋不聴國政卑聖侮士而唯女是崇九妃六嬪陳妾數百食必梁肉衣必文繡戎車待遊車之貳戎士待陳妾之餘優倡在前賢材在後是以國家不日引不月長恐宗廟之不掃除社稷之不血食敢問為此若何杜子對曰定民之居成民之事慎用六柄生殺貧富貴賤也操竿下釣孔叢子魯人有公儀潛砥節礪行樂道好古澹於榮利子思與之友穆公因欲以為相謂子思曰公儀子必輔寡人三分魯與之一子其言之子思對曰如公之言則公儀愈所不至也君若饑渇待賢納用其議雖蔬食飲水潛亦願在下風今徒以高貴富厚釣餌君子公儀子智如魚鳥可也不然則彼終身不躡君之庭矣且臣不佞不任為君操竿下釣以傷守節之士猶飛鴻有翼管子君有霸王之心夷吾非霸王之臣公日寡人之有仲父猶飛鴻之有翼也聖相晏子春秋仲尼相魯景公患之謂晏子曰鄰國有聖人國之憂也今孔丘相魯為之若何對曰君其勿憂彼魯君弱主也孔子聖相也君不如陰重孔子許以相齊孔子强諫而不聴必矯而有齊君弗納也夫絶於魯無主於齊孔子困矣居朞年孔子去魯之齊景公不納故困於陳蔡之間矣一國之相墨子世俗之君子使之為犬豕之宰不能則亂之使為一國之相不能而為之豈不悖哉志合言從列子管仲之相齊齊君滛亦滛君奢亦奢志合言從道行國霸死之後管氏而已田氏相齊君盈則已降君斂則已施民皆歸之以有齊國三相楚而心益卑孫卿子曽子之楚入見楚相孫叔敖曰吾聞之也處官乆者士妬之禄厚者民怨之位尊者民恨之今相國有此三者不得罪於楚之士民何也孫叔敖曰吾三相楚而心益卑每益禄而施愈博位尊而體愈恭是以不得罪於楚之士民也萬乘之相韓子如耳説衛嗣君説之而太息左右曰公何為不相也公曰馬似鹿者而題千金然而有百金之馬而無一金之鹿不為人用也今如子萬乘之相也然有大邦之意其心不在衛雖辨智亦不為寡人用吾是以不相大官吕氏春秋夫相大官也不類小智以弗治治之淮南子蘧伯玉為相子貢徃觀之曰何以治國曰以弗治治之閉心説苑公儀休相魯君死左右請閉門公儀休曰池淵吾不税䝉山吾不賦竒令吾不布吾已閉心矣何閉於門哉安國家全社稷梁相死惠子欲之梁渡河而遽墮水中船人救之曰子何欲而遽也曰梁無相吾欲徃相之船人曰子居船檝之而溺無我則子死矣何能相梁乎惠子曰居廣艘長檝之間我則不如子至於安國家全社稷子之比我䝉䝉如未視之狗矣妾不衣帛馬不食粟國語季丈子相宣公成公無衣帛之妾無食粟之馬仲孫他諫曰子為魯上卿相二君矣妾不衣帛馬不食粟人其以為愛且不華國乎丈子曰吾亦願之然吾觀國人其父兄之食麄而衣惡者多矣吾是以不敢令人之父兄食麄衣惡而我美妾與馬無乃非相人乎且吾聞之以德榮為國華不聞以妾與七馬文子以告孟獻子囚之七日自是子服之妾衣不過升之布馬餼不過稂莠治鄭二十六年史記鄭以子産為相一年豎子不戲狎班白不提挈童子不犁畔二年市不豫賈三年門不夜閉道不拾遺四年田噐不歸五年無尺籍䘮期不令而治治鄭二十六年而死丁壯號哭老人兒啼曰子産去我死乎民將安歸遺魚不受公儀休為魯相客有遺魚者不受相曰以嗜魚故不受今為相自給魚今受魚而免誰復給我魚者吾故不受也食茹而美㧞其圍葵而棄之見其家織布布好而出其家婦燔其機云欲令農工安所售其貨乎自刎而死石奢楚昭王相也堅直亷正無所阿避行縣道有殺人者相追之其父也縱其父而還自繫焉使人言於王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪子其治事矣奢曰不私其父非孝也不奉主法非忠也王赦其罪上惠也伏誅而死臣職也遂不受令自刎而死勞不坐乘暑不張盖五羖大夫之相秦也勞不坐乘暑不張盖行國中不驅車乘不操干戈功名藏於府庫德行施於後世五羖大夫死國中男女流涕童子不歌謡舂者不相杵子無立錐之地孫叔敖相楚及死子無立錐之地發起姦伏後漢王吉為沛相曉達政事發起姦伏相兩國輙事驕王董仲舒為江都相事易王易王帝兄素驕好勇仲舒以禮誼匡正王敬重焉仲舒為人廉直是時方外攘四夷公孫𢎞治春秋不如仲舒而𢎞希世用事位至公卿仲舒以𢎞為從䛕𢎞嫉之膠西王亦上兄也尤縱恣數害吏二千石乃言於上曰獨董仲舒可使相膠西王膠西王素聞董生有行亦善待之仲舒恐乆獲罪病免仲舒凡相兩國輙事驕王數上䟽諫争教令國中所居而治及去位居家終不治産業以修學著書為事相齊元朔中主父偃言齊王有滛佚之行上拜偃為齊相偃既至齊使人以王與姊姦事動王王以為終不得脱恐效燕王論死遂自殺偃始為布衣時嘗㳺燕趙及其貴發燕事趙王恐其為國患欲上書言其陰事為居内不敢發及其為齊相出闗即使人上書告偃受諸侯金以故諸侯子多以得封者及齊王以自殺聞上大怒以為偃刼其王令自殺迺下吏治責偃服受諸侯之金實不刼齊王令自殺上欲勿誅公孫𢎞争曰齊王自殺無後國除為郡入漢偃本首惡非誅偃無以謝天下乃遂族之絶昆弟賔客偃為齊相徧召昆弟賔客散五百金予之數日始吾貧時昆弟不我衣食賔客不我内門今吾相齊諸君迎我千里吾與諸君絶矣母復入偃之門不能取容朝廷王尊為東平王相王以至親驕奢不奉法度傅相連坐及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舍食已乃還致詔後謁見王太傅在前説相䑕之詩尊曰母持布鼔過雷門王怒起入後宫尊朝王延請登堂謂王曰尊來為相人皆弔尊也以尊不能取容朝廷故見使相王爾天下皆言王勇頋但負貴安能勇如尊乃勇耳王變色視尊意欲格殺之即謂尊欲觀相君佩刀尊舉掖頋謂傍侍郎前引佩刀王欲誣相㧞刀嚮王耶王久雅聞尊高名大為屈酌酒具食相對極驩避正堂舍盖公高祖長子肥為齊王以曺參為相國齊國七十餘城天下初定悼惠王富於春秋參盡召長老諸先生問所以安集百姓齊之諸儒百數言人人殊參未知所定聞膠西有盖公善治黄老言使人厚幣請之既見盖公為言治道貴清静而民自定參於是避正堂舍盖公其治要用黄老術故相齊九年齊國安集大稱賢相蕭何薨果召參代為相國溉田數百頃後漢張禹為下邳相徐縣北界有蒲揚坡旁多良田而堙廢莫修禹為開水門通引灌溉遂成熟田數百頃勸率吏民假與種粮親自勉勞遂大收穀實鄰郡貧者歸之千餘户室廬相属其下成市至墾千餘頃民用温給過界不見必為天下笑後漢趙咨應召復拜東海相之官道經滎陽令敦煌曹暠咨之故孝亷也迎路謁候咨不為留暠送至亭次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即棄印綬追至東海謁咨畢辭歸家其為時人所貴若此政惟仁簡以身率物東觀漢記吴楊字季英遷膠東相政惟仁簡以身率物民有相争訴者輙閉閤自責然後斷其所訟以道譬之或身到閭里重相和觧自是之後争陳省息吏民不欺五經復興魯叔陵魯丕字叔陵拜趙相為政尚寛惠禮譲雖居官不廢教授門人常有數百闕東號曰五經復興魯叔陵計日受俸謝承後漢書趙咨拜東海相計日受俸不使有餘炊單歩入界高𢎞字伯武為琅邪相負笈單歩入界妻子不厯官舍政尚清静司馬彪續漢書吴祐遷膠東侯相政尚清静以身率下褒賢勸善為務生子不養斬其父母華嶠後漢書王吉為沛相曉達政事令曰若生子不養斬其父母合土棘埋之以儉化俗東郡趙咨為東海相人遺其雙魚噉之二嵗不盡以儉化俗自請治劇郡前漢張敞字子高拜膠東相辭之官自請治劇郡非賞罰無以勸善懲惡吏追捕有功效者願得臺切比三輔尤異天子許之敞到膠東明設購賞令盜相捕由是盜賊觧散國中遂平孝於其親者忠於君魏志初曹公為兖州以東平畢諶為别駕張邈之叛也邈刼諶母弟妻子公謝遣之曰卿老母在彼可去諶頓首無二心公嘉之為之流涕既出遂亡歸及邈敗生得諶衆為諶懼公曰夫人孝於其親者豈不亦忠於其君乎吾所求也以為魯相奸宄逃竄郡界蕭然太祖光和末黄巾起拜騎都尉討潁川賊遷為濟南相國有十餘縣長史多阿附貴戚賊汚狼籍於是奏免其人禁斷滛祀奸宄逃竄郡界肅然客不忍刺蜀志劉備為平原相郡民劉平素輕先主耻為之下使客刺之客不忍刺其得人心如此乘驢到郡晋武帝輔魏政阮籍嘗言於帝曰平生曾遊東平縣樂其風土遂拜為東平相籍乘驢到郡壊府舍屏障使内外相通法令清簡二千石皆如是朕何憂阮种遷平原相時㐮邑衛京自南而陽太守遷於河内與种俱拜帝望歎曰二千石皆如是朕何憂乎妻子不入官舍晋中興書刁曜為魯相妻子不入官舍一朝殺五部督郵九州春秋孔融為北海相一朝殺五部督郵生男女以駱為名㑹稽駱俊靈帝櫂拜陳相汝南葛陂盜賊兼起陳與接境四靣受敵俊勵吏民為之保鄣出倉見穀以贍貧民鄰郡士庶或徃歸之身損俸禄給其衣食民有產子常勑主者厚致米肉生男女者輙以駱為名大蝗侵境一尺皆死鍾岏良史傳趙喜遷平原相青州大蝗齊平原界侵境一尺皆死還書不發㑹稽典録張濟字季南為中山相是時大將軍梁兾常有書與濟属舉孝亷濟知兾必有私焉還書不發由是見怨朝朔徒歩未嘗登車夏方字文正為常山王相魯王傅朝朔徒歩未嘗登車道不拾遺前漢郅都拜濟南相至則誅􅗎氏首惡餘皆股粟居嵗餘郡中道不拾遺庭掾憚嚴明東觀漢記周䊸遷邵陵相庭掾憚䊸之嚴明欲損其威乃晨取死人斷手足立寺門䊸聞使徃至死人邉若與死人共語状陰察視口眼有稻芒乃密問守門人曰誰載藁入城者對唯有廷掾爾䊸乃收問自後不敢有欺者行不茍合義不取容朱建嘗為淮南王黥布相布反建諫不聼既誅布聞建諫之高祖賜建號平原君為人辯有口刻亷剛直行不茍合義不取容召對合㫖范曄後漢書宋意少傅父業顯宗時舉孝亷以召對合㫖拜河陽相食乾糒謝承後漢書沈景為河間相恒食乾糒十日一炊刁曜作魯相受俸粟以作乾飯十日一炊外温柔内能斷魏志袁煥字耀卿遷梁相外温柔而内能斷以病去官百姓思之詣闕請留者數千人鍾岏良吏傳宋均遷東海相及徴還東海思之作歌頌詣闕請留者數千人上二郡印綬徐璆字孟本遷東海相邅漢末大亂猶﨑嶇還都上二郡印綬司徒趙温曰君遭難猶存此也璆日昔蘇武困且不隠七尺之節況方寸之内其可㤀乎賔友八公漢淮南王安為人好書招賔客數千人八公之徒咸慕其德各竭材智著述篇章各分其辭賦以類相次或稱大山小山猶詩有大雅小雅也早有令譽南史齊始興王鑑高帝之子性聰警初封廣興郡王袁彖時為秘書丞早有令譽高帝重鑑乃以彖為友文學之舉必極有德殷浩列傳㑹稽王少著名譽文學之舉必極有德以浩為友誠冝得有益者山公啓事近啓脩武令劉訥補南陽王友詔曰友誠宜得有益者然以訥長吏民不宜屢易為疑令散令散邪又啟今散職中誠自有人然劉訥才志外内所稱臣以為冝䝉此者是以啓及不審固可不詔可爾東西二絶宣城王為揚州刺史頋野王王褒並為賔客王愛其才野王善丹青王于東府起齋令野王畫古賢命王褒書賛時人稱為二絶對作史北史蕭大圜除滕王迴友嘗問大圜曰吾聞湘東王作梁史有之乎隠則非實記則攘羊對曰言之妄也如使有之亦不足怪昔漢明作世祖紀章帝為顯宗紀殷鍳不遠足為成例且君子之過如日月之蝕彰于四海安得而隠之如有不彰亦安得不隠子為父隠直在其中諱國之惡即有禮也㢠乃大笑擇耆德方正有學術者國朝大中祥符九年以工部郎中張士遜為户部郎中直昭文館左司諫直史館崔遵度為户部員外郎依前直史館並充壽春郡王友賜龍犀𢃄緡錢上作七言詩寵之又賜遵度金紫時王將受經命中書擇耆德方正有學術者為府官士遜時為河北轉運使以其雅素清謹歴外任著治聲遵度力學存士行搢紳目為長者即召士遜等赴闕而並命馬初宰相欲以士遜等為翊善記室上曰翊善記室府属也王皆受拜朕以郡王年少欲令尊禮師友相見答拜故以王友命之長史醉勝醒南史孔覬為安陸王後軍長史江夏内史性使酒仗氣毎醉彌日不醒僚類間多所陵忽不能曲意權幸莫不畏而疾之居常貧罄未嘗闗懐為府長史典籖諮事不呼前不敢前不令去不敢去雖醉日居多而明曉政事醒時判决未嘗有壅衆咸云孔公一月二十九日醉勝世人二十九日醒也孝武毎欲引見先遣人覘其醉醒性真素不尚矯餙遇得寳玩服用不疑而他物麄敗終不改易參知西邸抄書司徒竟陵王子良西邸抄書令徒司右長史陸慧曉參知其事别榻孔休源為晋安王府長史南郡太守行荆州府事帝謂曰荆州總上流衝要義同分陜今以十嵗児委卿善輔翼之休源累佐名藩甚得人譽王深相倚仗常於中齋别施一榻曰此是孔長史坐人莫得預焉其見敬如此帝常謂王曰休源人倫儀表汝年尚幼當毎事師之天下第一人齊武第三子盧陵王子卿為南豫州刺史帝稱其小名謂司徒竟陵王子良曰烏熊痴如熊不得天下第一人為行事無以壓一州既而曰吾思得賢人矣乃以陸慧曉為長史慧曉清介正立不雜交遊廬江何㸃稱慧曉心如照鏡遇形觸物無不朗然不與典籖坐江革為晋安王長史潯陽太守行江州府事以清嚴為属城所憚時少王行事多傾意於籖帥革以正直自居不與典籖趙道智坐道智因還都啓事言革墮事好酒以王曇代之言論必以詩書武帝以武陵王紀在東州頗驕縱以臧盾性弱不能規正乃以江革為武陵王長史㑹稽郡丞行府事革至鎮不受餉遺唯資公俸人安吏畏百城震恐山隂令王騫贓貨狼籍望風自觧府王憚之毎侍讌言論必以詩書王因此耽學好文典籖以王所制詩呈武帝帝謂僕射徐勉曰革果稱職以石實船江革自武陵王長史㑹稽郡丞召拜都官尚書唯乗䑓所給一舸舫艚偏欹將濟江或請徙重物以迮輕艚革無物乃於西陵岸取石十餘片以實之必取正人唐太宗以子弟成長慮乖法度長史司馬必取正人庶人祐太宗第五子初封齊王授齊州都督祐溺情羣小尤好弋獵長史薜大鼎屢諫不聼太宗以大鼎輔導無方竟坐免權萬紀前為呉玉恪長史有正直節迺以萬紀為祐長史萬紀見祐非法常犯顔切諫太宗慮其不能悔過數以書責祐萬紀恐并獲罪勸祐飭躬引過祐附表謝罪因萬紀入朝言之太宗意稍觧賜萬紀而諭之仍以祐前過勅書誥之祐聞萬紀勞勉而獨𬒳責以為賣已意甚不平萬紀性又褊隘專以嚴惠維持之城門外不許祐出鷹犬並令觧放祐與符君譽等謀殺萬紀事泄萬紀悉收繫獄奏之詔追祐入京萬紀奉詔先行祐遣人在路射殺之遂起兵反俄而兵曹杜行敏率兵圍祐擒之送京師貶為庶人綱佐晋琅邪王鎮廣陵髙史選綱佐以阮孚為長司馬司驢南史謝超宗為黄門郎以失儀出為南郡王中軍司馬人問日承有朝命定是何府超宗怨望答曰不知是司馬為是司驢既是驢府正應為司驢有司奏以怨望免禁錮十年方外司馬北史後魏王晞為常山王司馬在并州雖戎馬填閭未嘗以世務為累良辰美景嘯咏遨逰登山臨水以談讌為事士人謂之方外司馬必取正人見長史門文學受詔察王舉措魏志中山恭王衮毎讀書文學左右常恐以精力為病數諫止之然性所樂不能廢也文學防輔相與言受詔察王舉措有過當奏及有善亦冝以聞不可匿其美也遂共表稱陳衮美衮聞之大驚責讓文學曰修身自守常人之行耳而諸君乃以上聞適増其負累也精選賔友晋鄭衮魏武帝初封諸子為侯精選賔友衮與徐幹俱為臨菑文學八嵗聰明善詩賦晋諸公賛扶風王子年八嵗聰明善詩賦中表竒之魏烈祖以為齊王芳文學欲得竒士求之於文學長沙耆舊傳太尉李公時為荆州刺史下辟書曰夫採名珠求之於蚌欲得竒士求之于文學或剖萬蚌不得一珠不可捨蚌求之于魚或為文學不出竒士亦不可捨文學求之于斗筲也由是言之蚌乃珠之所藏文學亦士之塲也不取貴遊子弟南史齊衡陽王好學善属文武帝謂王儉日衡陽王湏文學當使華實相稱不得止取貴逰子弟而已乃以太子舍人蕭敷為文學西邸竟陵王子良開西邸招文學牛僧孺虞羲丘國賔蕭文琰丘令楷江洪劉孝孫並以善辭藻㳺焉功曹才地豈可游外府南史王勱美風儀慱渉書史恬然清簡未嘗以利欲干懐仕梁為河東王功曹史王出鎮京口勱將隨之藩范陽張纉時典選舉勱造纉言别纉嘉其風采乃日王生才地豈可遊外府乎奏為太子洗馬寄詩西府謝朓文章清麗為齊隨王子隆鎮西功曹子隆在荆州好辭賦朓尤被賞不捨日夕長史王秀之以朓年少相動欲以啟聞朓知之因事求還道中為詩寄西府曰常恐鷹隼擊時菊委嚴霜寄言罻羅者寥廓已高翔郎中令靣刺王過前漢龔遂字少卿以明經為官至昌邑郎中令事王賀賀動作多不正遂為人忠厚剛毅有大節内諫争於王外責𫝊相於經義陳禍福至於涕泣謇諤亾已靣刺王過王至掩耳起走曰郎中令善媿人及國中皆畏憚焉王嘗乆與騶奴宰人㳺戲飲食賞賜無度遂入見王涕泣膝行左右侍御皆出涕王曰郎中令何為哭遂曰臣痛社稷危也行殿中周勃等共誅諸吕迎代王郎中令張武等議皆日不可信願稱疾無徃以觀其變中尉宋昌進日羣臣之議皆非願大王勿疑代王遣太后弟簿昭見勃勃等具言所以迎立王者昭還報信矣代王笑謂曰果如公言乃令宋昌驂乗張武等乗六乗傳詣長安羣臣奉法駕迎代邸皇帝即夕入末央宫夜拜宋昌為衛將軍頤南北軍張武為郎中令行殿中賜糓二千斛魏志袁渙為魏國郎中令及卒太祖為之流涕賜糓二千斛一教以太倉糓千石賜郎中令之家一教以垣下糓千斛與曜卿家外不觧其意教曰以太倉糓者官法也以垣下糓者親舊也南方秀望晋中興書頋榮時在洛者惟陸機雲及榮三人而已機雲雖有才藻不及榮也以南方秀望補吴王郎中令吾得其人沈約宋書宋國初建當置郎中令武帝難其人謂傅亮日今用郎中令不可减袁曜卿既而曰吾得其人矣乃以王惠居之謝子木誣朱弼續搜神記㑹稽朱弼為王國郎中令營丘茅舍未成而卒同郡謝子木代其事以弼死亡乃定簿書多張功費長百餘萬以其贓誣弼而實入子木子木夜寝忽聞有人道弼姓字者俄頃而到當子木前立謂之曰卿以枯骨腐肉可得誣耶當以某日夜更相盡言忽然不見清塗陸機集機為吴王郎中令潘岳賦詩云逸人謂國宦清塗攸失吾子洗然澹退自衣弊補衣漢周仁以醫見景帝遷為郎中令仁為人隂重不泄常衣弊補衣溺袴期為不潔以是得幸入卧内抽引遠人陸機表詣吴王曰臣本吴人靖居海隅朝廷抽引逺人綏慰遐外故太傅聽辭殿下東到淮南發詔以臣為郎中令中尉治官皆有亷節史記魯申公弟子為慱士十餘人孔安國至臨淮太守徐偃為膠西中尉其治官皆有亷節稱其好學號公孫將軍前漢梁孝王招延四方豪傑齊人公孫詭多竒計初見日賜千金官至中尉號公孫將軍論五經同異於石渠閣三輔决録淮陽王宣帝愛子噐異其子欲以嗣王恃寵自驕乃用韋𤣥成為中尉以輔導之受詔與蕭望之等論五經同異於石渠閣思邵中尉言使人毛竪邵氏家傳𢎞字德裕時景帝為琅邪王請君為中尉君為體素方嚴儀容甚偉雖私門接對悉有禮法使者潜至君舍令使者進曰王有令君徐理鬢冠履俯伏盡禮然後讀之王與使者羣立瞻聼為之太息曰古人稱不愧于屋漏其邵中尉乎吾乃逆詐以試長者豈不陋哉王虚心受納忻宴言話盡夜無休君乃上書諫王讀書三四瞿然失色復謂左右曰思邵中尉之言使人于今毛竪常侍隨王歸國漢龔舍少好學明經楚王入朝聞舍高名聘為常侍不得已隨王歸國察孝亷晋陽秋甘卓字季思察孝亷為呉王晏常侍日下無雙南史到洽除晋安王國右常侍不就遂築室巖阿幽居積嵗樂安任昉有知人之鍳與洽兄溉善嘗訪洽於田舍見之歎曰此子日下無雙遂申拜見之禮國侍郎王隠晋書孫秀琅邪國書佐為趙王倫國侍郎能鼓雅琴召見温室桓譚新論宣帝元康神爵之間丞相奏能鼔雅琴者勅海趙定梁國龍徳召見温室拜國侍郎上將軍虎嘯江濆陸機集答吴王上將軍顧處㣲四言詩曰仁勇同宅文武相紛王謂御事誰將士軍于時飜飛虎嘯江濆翊善國朝舊有王府親事帳内員皇朝之制唯置諮議記室及别置翊善侍講等官各一員並以常㕘官充或不備置官量補三師三公以下各以本司公人為常從本司無人者即左右金吾司及京府或兵人内量給太平興國四年别置翊善一人元祐官品令親王府翊善侍讀侍講從七品兩位供職國朝治平二年以三司度支判官太常慱士集賢校理邵元為直館潁王府翊善同判司農寺令于兩位供職三年以尚書度支郎中王稷臣直集賢院充潁王府翊善令于皇于兩位供職記室餘沿革已見前總僚属門五代後唐長興四年以前襄州觀察使魚崇遠為秦王府記室㕘軍事國朝太平興國中别置記室參軍事諸王府侍講兼以本官充其後多不置諮議而翊善記室止一員記室或不稱參軍升王府始置參軍事以常參官充元祐官品令諸王府記室參軍從八品侍讀唐開成元年宰相李石奏太子有侍讀諸王亦有侍讀無降殺之禮今後冝改奉諸王講讀德業優深隋楊汪字元度勤學專精左氏傳通三禮解褐為周兾王侍讀王甚重之毎曰楊侍讀德業優深孤之穆生也朱門閉影梁陶𢎞景十嵗得葛洪神仙傳晝夜研尋便有養生之志讀書萬巻一事不知以為深耻未弱冠齊高帝作相引為諸王侍讀除奉朝請雖在朱門閉影不交外物唯以披閲為務既而脱朝服挂神武門上表辭禄詔許之及發公卿祖之供帳甚盛乃止于句曲山自號華陽陶隠居士梁武帝早與之遊及即位恩禮愈篤手敕招之不出國家每有吉㓙征討大事無不咨詢時人謂之山中宰相有仲宣之才徐摛字士秀晋安王綱出戍石頭梁武帝謂周捨曰我求一文學俱長兼有行者吾欲令與晋安逰處捨曰臣外弟徐摛形質陋小若不勝衣而堪此選帝曰必有仲宣之才亦不簡其容貌乃以擒為侍讀形質陋小若不勝衣上想卿節義之風故有斯贈唐姚思亷初為代王侍讀㑹義師尅京城時府寮駭散唯思亷侍王不離其側兵將昇殿思亷謂之曰唐公舉兵本匡王室卿等不宜無禮于王衆服其言於是布列階下高祖聞而義之許其扶王至順陽下泣拜而去觀者咸歎曰忠烈之士也仁者有勇此之謂乎太宗居藩引為文學及親征徐圓朗思亷時在洛陽太宗嘗從容言及隋亡之事慨然歎日姚思亷不懼兵刄以明大節求諸古人亦何以加也因寄物三百段遺之其書日想卿節義之風故有斯贈撻諸子必極楚痛九國志後蜀劉保義遷户部郎中充諸王侍讀賜金紫孟昶問以經義稱㫖轉給事中保義魯質性復嚴急毎捶昶諸子必極楚痛號泣而後止諸乳母密遣人語保義曰王侯家子弟何過撻辱之保義怒曰膏梁之不訓則豚犬爾汝婦人何知耶俄罷侍讀而卒侍講國朝太平興國四年别置以常參官充又置侍讀以常參官充元祐官品令與侍讀並見翊善伴讀國朝有皇孫教授南北宅伴讀説書皆無定員説書國朝無定員天聖三年以嘉州録事參軍國子監説書張惟翰充蔡州團練使允弼宅教授上曰諸宫院教授非止講習經㫖亦須選擇履行端慤者中書門下奏曰惟翰元自銓曹選入國學進士及第必有行止欲送入内侍省依例引見因命之十一月惟翰為著作教授國朝至道元年以司門員外郎孫蠙充皇姪皇孫教授時中書言案唐文宗朝宰臣李石奏太子有侍讀諸王亦有侍讀無降殺之禮改為奉諸王講讀今皇姪皇孫官是環衛之職請以教授為名從之治平元年詔子弟不率教俾教授官本位尊長具名申大宗正司量行戒責教授官不職不能勉勵大宗正司察訪以聞初上以宗室自率府副率以上八百餘人其奉朝請者四百餘人而教學之官六員而已因命増置凡皇族年三十以上者一百三十人置講書四員年十五以上者三百九人増置教授五員年十四以下者别置小學教授十二員并舊六員為二十七員以分教之上謂韓琦等曰凡事之行患於漸乆而怠廢況為學之道尤戒中止諸宗室之幼者仍須本位尊長常加率勵庻不懈墮可召舍人諭此意作詔戒勉之二年七月詔睦親廣親宅小學教授選歴任及供職通滿七考其未供職七考者供職及一年與轉官又供職三年及許外任自今有闕令國子監舉其出身京官或選人年四十以上者侍教國朝咸平四年以前知洺州永年縣劉士元為大理寺丞南宫侍教大中祥符三年詔南宫北宅大將軍以下各赴書院與侍教伴讀等講讀經史應諸院十嵗以上並須入學毎日受經書學至午後乃罷仍委侍教等勤心誘勸無令廢墜公主邑司官令丞録事六典公主邑司令一人從七品下漢書百官表宗正属官有公主家令公主所食曰邑晋太康中為長山長公主置家令一人宋齊以後時有其職隋氏復置皇朝因之神龍初公主府並同王府置官属景雲初罷丞一人從八品下晋起居注云太康十一年詔曰南郡公主家令丞缺何以不補隋有其職皇朝因之録事一人從九品下皇朝因隋置各掌主家財貨出入田園徴封之事其制度皆𨽻宗正焉國朝公主宅惟置中使一人管勾大宗正司知宗正司事司同知宗正司事同勾管宗正事國朝慶厯初置此以允讓允弼同領使相承擇宗室任之掌治宗室治平元年増置同知大宗正事一員擢宗惠為之詔以為宗室數倍于前而宗正司事亦滋多乃増置馬至和二年以皇兄汝南郡王子右領軍衛大將軍宗師為康州刺史北海郡王允弼子右監門衛將軍宗喬為右領軍衛大將軍皆以其父領大宗正司乆因乾元節推恩特遷之後毋得為例今知大宗正司毎嵗有與减磨勘恩例乃縁其制也熈寧元年以皇伯吉州團練使宗惠權同管勾大宗正司事候允弼服闋依舊予嘗修玉牒知國家慶緒之繁衍治平中宗室四千餘人男女相半存亡亦然親王置翊善侍講記室餘則逐宫院置都講教授嵗時有喜慶則燕崇政殿或太清樓命之則課其書禮或賦頌歌詩擇其能者而推賜噐幣以旌勸之景祐三年始置大宗正司以濮王及彰化軍留後守節同領其事凡有所奏請不得専達必宗正司詳酌而後以所以勉進其敦睦而糾正其愆違也其後増置講書官四員列置小學教授十二員又増同知大宗正一員而置官益多其踈属又聽其出外官則自厲而向學者彌衆矣丞國朝熈寧三年大宗正司置丞二員命都官員外郎張稚圭知丞事繼以光禄事丞李德芻同知丞事詔于芳林園内置司職官分紀卷三十二
