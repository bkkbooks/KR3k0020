body:
  text: 職官分紀卷二十三宋孫逢吉撰軍器監少監附隋百官志後周武帝四年初置軍器監唐職官志軍器監正四品上武徳初為正三品七年省八年復置九年又省十年復置北都軍器監唐百官志軍器監監一人正四品上丞一人正七品上掌繕甲弩以時輸武庫總署二一曰弩坊二曰甲坊主簿一人正八品下録事一人從九品下武徳初有武器監一人正八品下掌兵仗廐牧少監一人丞二人主簿一人七年廢軍器監八年復置九年又廢貞觀六年置軍器監開元以前軍器皆出右尚署三年置軍器監有府八人史十二人亭長二人掌固四人六典軍器監監一人正四品上開元初分少府監至十六年移向北都少監一人正五品上監掌繕造甲弩之屬辨其名物審其制度以時納于武庫少監為之貳甲坊署令一人正八品下周禮考工記曰函人為甲犀甲七屬兕甲六屬合甲五屬凡為甲必先為容然後置革權其上旅與其下旅而重若一隋少府有甲鎧署皇朝改焉丞一人正九品下監作二人從九品下弩坊署令一人正八品下周禮司弓矢掌四弩凡弩夾庾利攻唐大利軍戰野戰考工記弓人攻六材必以其時幹也者以為逺角也者以為疾筋也者以為深膠也者以為和絲也者以為固漆也者以為受霜露凡取幹之道有七柘為上檍次之檿桑次之橘次之木瓜次之荆次之竹為下隋有弓弩者皇朝改馬丞一人正九品下監作二人從九品下令各掌其所修之物督其繕造辨其麤良丞為之貳凡財物之出納庫藏之儲備必謹而守之國朝軍器監掌造軍器及什物之事元祐官品令軍器監正六品少監從六品熈寧六年六月置監使専其任以兩制二人領焉總内外軍器之政仍罷三司曺案以西作坊置監十一月遣著作佐郎朱伯虎等齎積利軍器付逐州軍為式製造初軍器四庫𨽻三司在京及諸路造作悉多雜惡又河北久不用兵其弊尤甚初命置監專領其事至是以様付諸路仍遣官分往諭之丞六典軍器監丞二人正五品掌判監事及材革出入之數工徒衆寡之役皆督課焉國朝元祐官品令軍器監丞從八品主簿沿革見監門六典軍器監主簿一人正八品上掌印及勾檢稽失國朝元祐官品令軍器主簿從八品都水使者前漢百官表水衡都尉應劭曰古山林之官曰衡掌諸池苑故稱水衡張晏曰主都水及上林苑故曰水衡主諸官故曰都有卒徒武事故曰尉師古曰衡平也主平稅入武帝元鼎二年初置掌上林苑有五丞屬官有上林均輸御羞禁圃輯濯鍾官技巧六廐辨銅九官令丞如淳曰御羞地名在藍田揚雄謂之御宿三輔黄圖御羞地名輯音集濯直孝反船官鍾官主鑄錢辨銅主分别銅之種類也師古曰御宿即今長安城南御宿川也不在藍田羞宿聲相近故或云御羞或云御宿耳羞者珍羞所出宿者止宿之義漢舊儀天子六廐馬皆萬匹據此表太僕屬官以有大廐未央輅軨騎馬騊駼承華而水衡又云大廐技巧官是則技巧之徒供六廐者其官别屬水衡又衡官水司空都水農倉又甘泉上林都水七官長丞皆屬焉上林有八丞十二尉均輸四丞御羞兩丞都水三丞禁圃兩尉甘泉上林四丞成帝建始三年省技巧六廐官王莽改水衡都尉曰予虞初御羞上林衡官及鑄錢皆屬少府後漢百官志世祖改都水屬郡國孝武帝初置水衡都尉秩比二千石職主上林苑有離宮燕休之處世祖省之并其職於少府每立秋貙劉之日輒暫置水衡都尉事訖乃罷又省水衡屬官令長丞尉二十餘人魏略水衡都尉舊主上林苑魏朝主天下水軍舟船器械晉職官志渡江後哀帝省都水長孝武復置都水使者漢水衡之職也漢又有都水長丞主陂池灌溉保守河渠屬太常漢東京省都水置河隄謁者魏因之及武帝省水衡置都水使者一人以河隄謁者為都水官屬及江左省河隄謁者置謁者六人宋百官志都水使者一人掌舟船及運部魏世主天下水軍舟船器械晉武省水衡置都水使者而河隄為都水官屬有參軍二人謁者一人令史减置無常員晉西朝有參軍而無謁者則江左置也懐帝永嘉六年胡入洛陽都水使者爰濬先出督運得免然則武帝置職便掌運矣江左省河隄隋百官志梁以都水使者為太舟卿是為冬卿置丞及功曺主簿太舟卿梁初置水臺使者一人參軍事二人河隄謁者八人七年改焉位視中書郎列卿之最末者也主舟航隄渠陳太舟卿中二千石後齊都水臺管諸津橋使者二人參軍十人又領都尉合昌坊城等三局尉皆分司諸津梁隋都水臺使者及丞各二人參軍三十人河隄謁者六十人録事二人領掌船局都水尉二人又領諸津上津每尉一人丞二人中津每尉丞各一人下津每典作一人津長四人開皇三年廢都水臺十三年復置仁夀元年改臺為監更名使者為監十二年都水監改為使者增為正五品丞為従七品統舟檝河渠二署舟檝署每津置尉一人五年又改使者為監四品加置少監為五品後又改監為令從三品少監為少令從四品唐職官志都水監龍朔二年改都水為司津監咸亨元年復舊垂拱元年改都水監為水衡監水都監使者二人正五品上掌川澤津梁之政令總舟檝河渠二署之官屬凡虞衡之採捕渠堰陂池之壊决水田斗門之灌漑皆行其政令丞二人主簿二人録事一人府五人史十人掌固三人六典都水使者二人正五品上夲周官川衡之職漢太常大司農少府内史主主爵中尉其屬官各有都水長丞至成帝以都水官多置左右使者各一人則劉向䕶左都水使者是也至哀帝罷之晉置都水臺都水使者一人掌舟檝之事官品第四又有左右前後中五水衡晉起居注及元康百官表陳慎戴熊俱以都水使者領水衡都尉宋孝武帝省都水臺置水衡令齋氏復置都水臺使者一人梁天監七年改太舟卿為冬卿班第九吏員依晉又加當闗四人陳因之後魏亦二官並置建都水使者正第四品中氷衡都尉從五品中太和二十二年都水使者従五品而省水衡北齊都水臺使者二人後周有司水中大夫一人隋開皇三年省都水入司農十三年復置仁夀改為都水監煬帝復為使者正五品大業五年又改使者為監加至四品又置少監五品後改監為令從三品少監為少令從四品皇朝改為都水署𨽻將作令從七品下貞觀中復為都水使者從五品上龍朔二年改為司津監咸亨元年復為都水使者光宅元年改水衡都尉神龍元年復舊掌同唐職官志舟檝署令一人正八品下漢中尉屬官有都船令丞水衡都尉有輯濯令晉水衡令各有船曹吏齊職儀有船官典軍一人後周有舟上中士一人隋都水使者領掌地局都尉二人煬帝改為舟檝署令一人皇朝因之丞二人正九品下漢有都船丞輯濯丞隋煬帝置舟檝署丞二人皇朝因之令長公私舟船及運漕之事丞為之貳諸州運至京都者則經其往來理其隱失使監漕監之河渠署令一人正八品下秦及兩漢都水衡屬官有河隄謁者則河渠之職也隋煬帝取史記河渠書之義以名署令一人皇朝因之丞一人正九品上令掌供川澤魚醢之事丞為之貳諸津令一人正九品上列女傳有趙津吏女自後無聞晉令都津渡二十四所各置監津吏一人北齊三局尉皆分司諸津橋之事後周有掌津中士一人掌津渡川瀆之制而為之橋梁隋都領諸津上津每尉一人丞二人中津尉一人丞一人下津尉一人每津典作一人津長四人皇朝改置令丞丞一人從九品下皇朝因隋置諸津在京兆河南界者𨽻都水監在外者𨽻當界州諸津令各掌其津濟渡舟梁之事丞為之貳國朝初欲修水官故専置都水監以代三司河渠司事欲重其任以御史知雜判監事後亦不常其官嘉祐八年以龍圖閣直學士吏部郎中知審官院韓贄兼判都水監初置都水監以知雜御史判至是知雜趙抃辭以不知水事故命贄焉都水監掌内外河渠修完隄堰䟽導水勢及判水運之事元祐官品令都水使者正六品有巧思晉諸公讃陳勰字太和殿中將軍有巧思遷都水使者楊佺期洛陽記云千金堤勰所起起千金堤上獻甫知死唐尚獻甫善于天文則天時為渾儀監長安三年獻甫奏曰臣夲命納音在金令熒惑犯士諸侯太史之位熒惑火也火能尅金是將死之兆則天曰朕為卿無憂矣其秋獻甫為水衡都尉謂曰水能生金令又去太史之位卿無憂其秋獻甫卒修狹河岸扼束水勢國朝治平二年賞狹河官吏初嘉祐六年以汴河久不浚命都水監與江淮兩浙荆湖制置發運使李肅之相度利害都水監奏汴河自西以上至南京道直流駛不須浚治自南京水道至汴河口水濶散漫以故多淺欲乞自南京至都門三百里修狹河木岸扼束水勢令深駛為之可足詔從之而岸木不足又募民出雜稍度以為僧凡用梢椿竹索三百八十四萬四千為岸二萬一千四百步自祖宗時固以嘗狭河其後不復狭方興是役議者以為罕見閧然以為不利及成人皆便之丞沿革見監門六典丞二人從七品上前漢都水衡皆有丞後漢省晉初置都水使者有㕘事二人盖丞之職也宋因之孝武帝都水臺置水衡令亦無丞梁天監七年置大舟卿始置丞一人班第一陳氏因之後魏有參事六人北齊有㕘事一人并丞之任也隋初置都水臺有丞二人正第八品上大業三年加從七品皇朝為都水置丞從八品下貞觀中改為使者以署為監加丞秩至從七品上掌判監事凡京畿諸水禁人因灌漑而有費者及引水不利而穿鑿者其應入内諸水有餘則任諸王公公主百官家節而用之國朝嘉祐三年孫琳王叔夏並知監丞公事熙寜四年宫苑使帶御器械程助為都大提舉黄御河同簽書外都水監丞公事元祐官品令都水監從八品主簿六典主簿一人從八品下晉令水衡都尉置主簿一人左右前後中五水衡皆有主簿梁天監七年大舟主簿七班之中第三與宗正主簿同後魏北齊並不置大業中置主簿一人皇朝因之掌印勾檢稽失凡運及漁捕之有程者㑹其月日而為之糾舉國朝元祐官品令都水監主簿從八品職官分紀卷二十三
