body:
  text: 職官分紀巻二十四宋孫逢吉撰殿中省漢儀注省中有五尚即尚食尚冠尚衣尚帳尚席或云秦置六尚謂尚衣尚冠尚食尚沐尚席尚書若今殿中之任南齊百官志内外殿中監各一人隋百官志後齊殿中局殿中監四人掌駕前奏引行事制請修補春耕則進耒耜𨽻門下省隋髙祖門下省統殿中局監二人直長四人煬帝取殿内監名以為殿内省置監正四品少監從四品丞從五品各一人掌諸供奉又有奉車都尉十二人掌進御輿馬統尚食尚藥尚衣尚舍尚乘尚輦等六局各置奉御二人正五品皆置直長以貳之正七品尚食直長六人又有食醫員尚藥直長四人又有侍御醫司醫醫佐員尚衣即舊御府也改名之有直長四人尚舍即舊殿中局也改名之有直長八人𨽻門下省唐百官志殿中省監一人從三品少監二人從四品上丞二人從五品上監掌天子服御之事其屬有六局曰尚食尚藥尚衣尚乘尚舍尚輦少監為之貳六典殿中省監一人從三品魏氏初置殿中監品第七晉宋因之齊有内殿中監八人外殿中監八人梁初位不登七班者别署藴位勲位殿中外監為三品藴位内監為三品勲位陳因之然其官甚微後魏殿中監從五品下北齊門下省屬官有殿中監四人隋外為殿内局監二人品正第六下大業三年分門下省尚食尚藥御府殿内等八局太僕寺車府驊騮等署置殿内省監正四品少監從四品丞從五品各一人掌諸供奉又有奉車都尉十二人掌進御輿馬統六局皇朝因改曰殿中省龍朔二年殿中監改中御府監為中御大監咸亨復舊掌乘輿服御之政令總尚食尚藥尚衣尚舍尚乘尚輦六局之官屬舊屬官又有天藏府開元二十三年省備其禮物而供其職事少監為之貳凡聽朝則率其屬執繖扇以列於左右凡大祭祀則進大珪鎮珪於壝門之外既事而藏之凡行幸則侍奉於仗内若逰燕田獵則驂乘以從焉今内别置閑廐使其務多分殿中及太僕之事至於輿輦車馬則使掌其内監知其外逰燕侍奉皆不與焉若元正冬至夫朝㑹則跪而進爵若和合御藥則監視而甞之尚食局奉御二人正五品下周禮有膳夫内饔秦置六尚有尚食之名如淳以為主天子物曰尚漢因之後遂省并騣於太官至北齊門下省統六局尚食局有典御二人丞監各四人又有集書省統三局有中尚食局典御二人監四人品與尚食同後周有内膳上士二人中士四人凡進食必先嘗之至隋開皇初門下省統尚食局有典御二人直長四人食醫四人大業三年分屬殿内改典御為奉御員二人正五品上皇朝因之龍朔二年改為奉膳大夫咸亨復故直長五人正七品上隋開皇初置四人從七品下大業三年加置六人増品為正第七上皇朝因之減置五人食醫八人正九品下周禮有食醫中士二人掌和王之六食六飲六膳百饈百醤八珍之齊隋尚食局有食醫皇朝加置八人後周置主食主膳皇朝因之主食十六人後周内膳有主食十二人奉御掌供天子之常膳随四時之禁適五味之宜當進食必先嘗凡天下諸州進甘滋珍異皆辨其名數而謹其儲供直長為之貳尚藥局奉御二人正五品下自陳梁後魏已往皆太醫兼其職北齊門下省統尚藥局有典御二人侍御師四人尚藥監四人總御藥之事又集書省統三局有中尚藥局典御二人丞二人中謁者僕射二人總知中宫醫藥之事隋門下省統尚藥局典御二人正五品下侍御醫四人正七品上直長四人正七品下醫師四十人大業三年分屬殿内改為奉御皇朝因之龍朔二年改為奉醫大夫咸亨元年復故直長四人正七品上隋置正七品下煬帝加為正七品上皇朝因之侍醫四人從六品上北齊上藥局有侍御師四人隋有侍御醫四人皇朝因之主藥十二人藥童三十人漢有藥丞主簿後周有主藥六人隋有四人藥童二十四人司醫四人正八品下隋大業中置皇朝因之醫佐八人正九品下隋大業中置皇朝因之貞元十五年司醫加置一人醫佐加置兩人仍留受翰林醫官所司不得主擬奉御掌合和御藥及診候之事直長為之貳凡藥有上中下之三品上藥為君養命以應天中藥為臣養性以應人下藥為佐以應地逓相宣攝以為用凡合藥宜用一君三臣九佐方家之大經也必辨其五味三性七情然後為和劑之節五味謂酸鹹甘苦辛酸屬肝鹹屬腎甘屬脾苦屬心辛屬肺三性謂寒温平七情謂有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者其用又有四焉曰湯丸酒散視其病之深淺所在而服之診脉辨寸闗尺之三部以調四時沈浮滑澁之節而知病之所在在胸鬲者先食而後服藥在心腹者先服藥而後食凡合和御藥與殿中監視其分劑藥成先嘗而進焉合藥供御門下中書司别長一人并當大將軍衛别一人與殿中監尚藥奉御等監視藥成醫佐以上先嘗然後封印冩夲方方後具注年月日監藥者偏署姓名俱奏餌藥之日尚藥奉御先嘗次殿中監嘗次皇太子嘗然後進御侍御醫掌診候調和司醫醫佐掌分療衆疾尚衣局奉御二人從五品上周禮有司服中士二人掌王之吉凶衣服辨其名物與其用事戰國有尚衣尚冠之職秦漢少府屬官有御府令丞掌供御服後漢有掌冠者典官婢作中衣服及補浣之事魏因之晉屬光禄勲東晉宋大明中改尚方曰左右御府各置令丞一人後廢帝初省御府署中置𨽻右尚方其後又置至齊髙祖省文帝置初宋氏用五品勲位明帝改用二品淮南䑓御史掌金銀紙帛足諸造作以供奉及妃主六宫梁陳無御府其職𨽻左尚方後魏有掌服郎從六品上北齊門下省統主衣局都統各二人大周有司服之士二人中士二人隋門下省有御府局監二人大業三年分屬殿内省其後又改為尚衣局皇朝因之龍朔二年改為奉冕大夫咸亨復舊直長四人正七品下隋改御府為尚衣局始置直長領主衣皇朝因之主衣十六人隋置皇朝因之尚衣奉御掌供天子衣服詳其制度辨其名數而供其進御直長為之貳凡天子之冕服十有三一曰大裘冕二曰衮冕三曰鷩冕四曰毳冕五曰絺冕六曰𤣥冕七曰通天冠八曰武弁九曰弁服十曰黒介幘十一曰白紗帽十二曰平巾幘十三曰翼善冠凡天子之大圭曰珽長三尺鎮圭長尺有二寸有事于郊廟社稷則出之于内將享至于中壝門則奉鎮圭于監而進既事復受而藏之凡大朝㑹則設案朝畢而撤焉尚舍局奉御二人從五品上周禮有掌舍掌行所觧止之處帷幕幄帟之事漢少府屬官有守宫令丞掌宫殿陳設魏殿中監掌帳設監䕶之事晉宋以下其職並在殿中監隋煬帝置殿内監改殿内局為尚舍局置奉御二人正五品皇朝因之龍朔二年改奉宸大夫咸亨復舊直長六人正七品下隋煬帝置八人皇朝减二人幕士八十人皇朝置掌供御及殿中雜張設之事奉御掌供殿張設供具湯沐而潔其洒掃直長為之貳凡大駕行幸預設三部帳幕有古帳大帳次帳小次帳小帳凡五等之帳各三是為三部其外置排城以為蔽捍尚乘局奉御四人從五品上自秦漢以來其職皆在太僕北齊大僕驊騮署有奉乗十人管十二閑馬隋煬帝改之置尚乘局皇朝因之増置奉御四人一人掌左六閑馬一人掌右六閑馬一人掌粟草飼飬請受配給及勾勘出入破用之事一人掌鞍韉轡勒供馬調度及療馬醫藥料度之事龍朔二年改奉駕大夫咸亨元年復故開元二十二年减二人先是别置閑廐使十二閑𨽻焉猶屬殿中直長十人正七品下隋煬帝置十四人皇朝開元减四人奉乘十八人正九品下後漢有奉乘郎從五品下後周左右廐各有奉乘二十人隋煬置尚乘局有奉乘十人皇朝加置二十四人每閑二人開元二十三年减六人習馭五百人後周左右廐各有馭夫一百二十人皇朝加置習馭五百掌調習六閑之馬掌閑五千人皇朝置掌分飼飬六閑之馬司庫一人司廪二人典事五人獸醫七十人奉御掌内外閑廐之馬辨其麤良而率其習馭直長為之貳六閑一曰飛黄二曰吉良三曰龍媒四曰騊駼五曰駃騠六曰天苑左右凡十有二閑分為二廐一曰祥麟二曰鳯苑以繫飼馬今仗内有飛龍祥麟鳳苑鵷鸞吉良六羣等六廐奔星内駒等兩閑仗外有左飛右飛左萬右萬等四閑東南内西南内等兩廐凡外牧進良馬印以三花飛風之字而為誌焉細馬次馬送尚乘局於尾側依左右閑印以三花其餘雜馬送尚乘者以風字印印右膊以飛字印印左膊奉乘掌率習馭掌閑駕士及秣飼之法凡馭馬必視其齒歴勞逸而調習之馬四年而兩齒五年而四齒六年而六齒成矣七年而右一齒齨八年而上下兩邊各二齒缺九年而右上下盡缺十年而下兩齒齨十一年而下四齒齨十二年而盡十三年下兩齒平十四年下四齒平十五年下盡平十六年上兩齒齨十七年上四齒齨十八年上盡齨十九年上兩齒平二十年上盡平獸醫掌療馬病凡馬病灌而行之觀其病之所發療馬病有五勞久歩則生筋勞久立則生骨勞久汗不乾則生皮勞汗未差乾燥而飼飲之則生氣勞驅馳無節則生血勞有傷寒者有傷熱者有瘍者咸據經方以療焉尚輦局奉御二人從五品上周禮小司徒中大夫二人掌六畜車輦又巾車下大夫二人掌王后之五輅輦車組輓有翣羽盖故古人謂牽為輦春秋宋萬以乘車輦其母秦始皇乃去其輪而輿之漢代遂為人君之乘後漢有乘輿六輦魏晉小出則乘之及過江而亡太元中謝安率意而作及破苻堅得之形制無差大小如一時人嗟其黙識朱武執慕容超獲金鉦輦古之輦輿大率以尺為度齊武帝造大小二輦雕餙甚工下欄轅軛悉金花銀獸梁大輦中方八尺左右開四望金鸞棲軛隋有六輦大禮皆乘之秦漢魏晉並太僕屬官車府令掌之東晉省太僕遂𨽻尚書駕部宋齊梁陳車府丞乘黄令丞掌之後魏北齊則乘黄車府令兼長之後周則司車輅主之隋又乘黄車府令兼掌之煬帝置殿内省尚輦局奉御二人正五品皇朝因之為從五品上龍朔二年改為奉轝大夫咸亨元年復舊直長四人正七品下隋煬帝置皇朝因之又置掌扇掌翰等員掌執扇及紙筆硯雜供奉之事掌輦二人正九品皇朝初置四人開元二十三年减二人又置主輦奉輿等員掌率主輦以供其事主輦四十二人皇朝置凡七輦輦六人奉轝十五人皇朝置之尚輦奉御掌輿輦繖扇之事分其次叙而辨其名數直長為之貳凡大朝㑹則陳於庭大祭祀則陳於廟輦有七一曰大鳯二曰大芳三曰仙逰四曰小輕五曰芳亭六曰大王七曰小王轝有三一曰五色二曰常平其用如七輦之儀三曰腰輿則常御凡大朝㑹及祭祀則出之於内旣事復進而藏之凡繖扇大朝㑹則繖二扇一陳之于庭孔雀扇一百五十有六分居左右舊翟尾扇開元初改為繡孔雀以從省若常聽朝皆去扇左右各留其三以備常儀崔豹古今注云華蓋黄帝所作也與蚩尤戰于涿鹿之野常有五色雲氣金枝玉葉止于帝上有花葩之象故因作華蓋也通俗文曰張帛辟雨謂之繖蓋也古今注曰雀尾扇起於殷代髙宗有雊雉之祥服章多用翟羽周制以為皇后夫人之車服輦有翣即緝翟羽為扇翣以障蔽風麈也國朝元祐官品令尚食尚藥尚醖尚衣尚舍尚輦奉御從七品監沿革見殿中省國朝元祐官品令殿中監正四品少監沿革見殿中省六典殿中少監二人從四品上隋煬帝置一人從四品皇朝加置二人龍朔咸亨随省改復國朝元祐官品令殿中少監從五品丞已見殿中省六典殿中省丞二人從五品上隋煬帝置一人從五品皇朝加置二人龍朔二年改中御大夫咸亨元年復舊國朝元祐官品令殿中丞從七品尚衣奉御沿革見殿中省門造衮冕依典式唐立徳隋殿内少監毗之子也毗初以藝知名立徳與弟立夲早傳家業武徳中累除尚衣奉御立徳所造衮冕大裘等六服并腰輿傘扇咸依典式時人稱之職官分紀卷二十四
