body:
  text: 職官分紀卷三十六宋孫逢吉撰三署郎尉前漢百官表郎中令屬官有大夫郎謁者皆秦官又期門羽林皆屬焉郎掌守門户出充車騎有議郎中郎侍郎郎中皆無員多至千人議郎中郎秩比六百石侍郎比四百石郎中比三百石中郎有五官左右三將秩皆比二千石郎中有車户騎三將秩皆比千石後漢百官志五官中郎將一人比二千石本注曰主五官郎五官中郎比六百石本注曰無員五官侍郎比四百石本注曰無員五官郎中比三百石本注曰無員凡郎官皆主更直執戟宿衛諸殿門出充車騎唯議郎不在直中又屬光祿勳和帝元興元年引三署郎召見禁中選除七十五人補謁者長相漢官儀三署謂五官署左右署也各置中郎將以司之郡國舉孝亷以補三署郎年五十以上屬五官其次分在左右署凡有中郎議郎侍郎郎中四等無員禁中者門户有禁非侍御者不得入故謂禁中應劭漢官儀五官中郎將秦官也秩比二千石三署郎屬焉宋百官志左中郎將右中郎將秦官漢因之置五官中郎將領三署郎魏無三署郎猶置其職晉武帝省宋世祖大明中又置南齊百官志左右二中郎謂之西省通典按近代皆謂郎官上應列宿出宰百里為尚書郎故事且天文有武賁郎位等星皆在太微帝座之後為翊衛之象則應劭楊秉所言三署郎是也而世人謂之尚書郎則誤矣徵其失也蓋自梁陶彥藻職官要録以漢三署郎故事通尚書郎循名失實疑誤後代隋百官志梁有左右中郎將以分司丹禁侍衛左右後齊左右中郎將各五人唐百官志左右翊中郎將府中郎將掌供奉侍衛凡千牛及備身左右以御刀仗升殿供奉者皆上將軍領之中郎將佐其職有口敕通事舍人承傳聲不下聞者中郎將宣告六典親府勳一府勳二府翊一府翊二府等五府中郎將各一人正四品下秦漢有五官中郎將左右中郎將並皆二千石掌領三署郎侍衛也又有虎賁中郎將漢平帝置比二千石後漢因之建安十六年魏公子丕為五官中郎將置官屬以副相國位在諸侯王上晉代不置宋齊梁陳並有左右中郎將後魏北齊亦有之各五人隋氏左右親衛左右勳衛左右翊衛各置開府一人以統之有長史司馬倉兵法等參軍員皇朝因之武德七年改開府各置中郎將一人左右郎將各一人謂之左右親勳翊衛中郎將府左右郎將各一人正五品上自漢以來並曰中郎將至隋備身府置左右郎將以統之又置左右雄武府雄武郎將武勇郎將以統之皇朝左右親勳翊衛因其名置左右郎將中郎將掌領其府校尉旅帥親衛勳衛翊衛之屬以宿衛而總其府事左右郎將二焉兵曹參軍事一人正九品上議郎對䇿高第後漢蘇章少博學安帝時舉賢良方正對䇿高第為議郎對䇿為天下第一劉淑字仲承少學明五經桓帝時赴洛陽對䇿為天下第一拜議郎䇿在高第續漢書建初元年詔舉賢良方正大司農劉寬舉魯丕時對策者百餘人惟丕在高第除為議郎奏將軍後漢陳翔拜侍御史時正旦朝賀大將軍梁冀威儀不整奏冀恃貴不敬請收案罪時人奇之遷定襄太守徵拜議郎負太守東觀漢記劉茂字子衛為郡門下掾赤眉攻太原茂負太守孫福踰牆出藏城西門下空穴中擔穀給福妻子百餘口福表為議郎不復考試東平王蒼上疏薦吏丘良上以章示公卿曰蕭何舉韓信設壇而拜不復考試以良拜為議郎有王霸之相魏略太祖為議郎嘗見橋玄玄善相人謂曰卿有王霸之相然老不及也後過吾墓無忘斗酒隻雞方正張承字公先以方正拜議郎遷伊闕都尉承弟昭亦為議郎以死自誓田疇好讀書善擊劔隋太祖軍出盧龍軍還入塞論功行封封疇亭侯疇上疏陳讓以死自誓太祖喟然知其不可屈乃拜議郎佯狂不受晉爵樊國先賢傳石偉事吳吳平詔為議郎加二千石秩終厥身偉遂佯狂不受晉爵歎美其文梁書陸雲曽製太伯廟碑吳興太守張纘罷郡經途讀其文歎美之至都言於武帝召拜尚書議郎西域國事口陳狀手畫形謝承後漢書臧昊有清才達於從政討賊有功拜議郎還京師見太尉袁逢逢問西域諸國事土地風俗人數種類具答悉口陳狀手畫形逢奇其才歎息云班固作西域傳何以過此校書東觀東漢蔡雍建寧中校書東觀遷議郎中郎何自為郎前漢馮唐以孝著為郎中署長事文帝帝輦過問唐曰父老何自為郎家安在具以實言之奏賦為郎揚雄奏羽獵賦除為郎然郎官皆執戟也官不過中郎漢遣張良立韓信為齊王使擊楚項王恐使盱眙人武涉往説信令反漢與楚信謝曰臣仕項王官不過中郎位不過執戟言不聽畫䇿不用故背楚歸漢漢王授我上將軍印言聽計用夫人深信我背之不祥幸為信謝項王位不過執戟上三署服其慎見尚書郎門為郎牧羊卜式為中郎初式不願為郎上曰吾有羊在上林中欲令子牧之式既為郎而牧羊嵗餘羊肥息上善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去毋令敗羣上奇其言三代不遇漢武帝故事上嘗輦至署見一郎髸皓白上問公何時郎也何其老也對曰姓顔名駟以文帝時為郎上問何不遇曰文帝好文而臣好武景帝好美而臣又醜陛下好壯而臣已老是以三代不遇上感其言用為會稽都尉晝夜讀書廣州先賢傳疏原為户曹書佐性亷靜詣中部督郵張顧會客謝不與相見原歸家耻之寂息不食母問其故具對狀母曰大器晚成但當勉之原于是晝夜讀書舉孝亷拜中郎侍郎官不過侍郎前漢東方朔著客難曰今子大夫修先王之術慕聖人之義悉力盡忠以事聖帝曠日持久官不過侍郎位不過執戟意者尚有遺行耶郎中令見光祿卿門中郎將使西域前漢武帝拜張騫為中郎將使西域年七嵗宣帝即位詔曰朕微眇時故掖庭令張賀輔導朕躬賀有孤孫霸年七嵗拜為中郎將山郎宣帝時楊惲為中郎將郎官故事令郎出錢市財用給文書乃得出名曰山郎惲罷山郎皆以法令從事郎謁者有罪過輒奏免郎官化之莫不自厲注山郎以資財為郎也山財用之所出故取名焉建節司馬相如為中郎將建節往使西南夷至蜀太守以下郊迎縣令負弩矢前導參乘衛綰遷中郎將醇謹無他景帝幸上林詔中郎將參乘還而問曰君知所以得參乘乎綰曰臣代戲車士幸得功次遷待罪中郎將不知也口對兵事畫地成圖張安世長子千秋與霍光子禹俱為中郎將將兵隨度遼將軍范明友擊烏桓還謁大將軍霍光光問千秋戰鬭方略山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹不能記曰皆有文書光由是賢千秋而以禹為不才歎曰霍氏衰張氏興矣後霍禹誅滅而安世子孫相繼為侍中中常侍諸曹散騎列侯校尉者凡十餘人竈下飬東觀漢記更始入長安多用羣小時人為之語曰竈下飬中郎將東漢傳云所授官爵皆膳夫庖人長安為之語曰云云委文武之事吳志孫䇿命張昭為撫軍中郎將升堂拜母如比肩之舊文武之事一以委昭五郎將九國志東漢蘇章以功遷團練使章子五人俱為中郎將豪俠任氣當世號為五郎將五官中郎將虎賁扶持東漢江革字次翁遷五官中郎將每朝會帝常使虎賁扶持及進拜恆目禮焉注獨視之也時有疾不會輒遣大官送醪膳恩寵莫比一日數四引見後漢書張純遷五官中郎將純在朝歷世明習故事建武初舊章多闕每有疑義輒以訪純自郊廟婚冠喪記禮儀多所正定帝甚重之數被引見一日或至數四訪疑義上備禮召拜謝承後漢書樊英順帝時備禮召拜五官中郎將數月英以疾避位而歸左中郎將前漢書辛慶忌從光祿大夫遷左曹中郎將後漢書楊秉以勸講蔡雍以侍中並為左中郎將漢舊儀左中郎將秩比二千石主謁者學行高明後漢鍾興少從少府丁恭受嚴氏春秋恭薦興學高明光武召見問以經義應對甚明拜郎中稍遷左中郎將單于遣使求見續漢書承宫遷左中郎將數進諫論議守正明習世務朝臣憚其節名稱聞于胸奴單于遣使來貢求見宫詔勑宫自整飾宫曰外國眩名非識實者也聞臣虛稱故欲見臣臣醜陋形寢見必輕賤不如選長大有威容者乃以大鴻臚魏應示之教授不倦樓望字次子少習嚴氏春秋後為左中郎將教授不倦世稱儒宗右中郎將前漢書段會宗為右中郎將漢舊儀右中郎將秩比二千石主常侍郎持節討賊東漢書朱巂為右中郎將持節討潁順汶南陳國諸賊使吳蜀志宗預為右中郎將將命使吳虎賁中郎將尚書牧誓戎車三百兩虎賁三百人與受戰於牧野周禮虎賁氏掌先後王而趨以卒伍軍旅會同亦如之舍則守王間漢百官表期門僕射秩比千石平帝元始元年更名虎賁郎置中郎將秩比二千石續漢書虎賁中郎將秩比二千石本注曰主虎賁宿衛左右僕射左右陛長各一人僕射主虎賁郎將陛長主直虎賁朝會在殿之下東漢作殿中又曰虎賁武騎皆鶡冠虎文單衣襄邑嵗獻虎文云鶡者勇雉也其鬭死乃止又曰虎賁中郎將秩比二千石虎賁中郎比六百石虎賁侍郎比四百石虎賁郎中比三百石節從虎賁比二百石皆無員數掌宿衛侍從東漢觀記馬援從隴西太守入為虎賁中郎將又馬廖任隗皆從羽林左監遷虎賁中郎將應劭漢官儀虎賁中郎將古官也書稱武王伐紂戎車三百兩虎賁至八百人禽紂於牧之野言其猛怒如虎奔赴平帝元始元年更名虎賁郎古有勇者孟賁改奔為賁中郎將冠兩鶡冠鶡􅋧鳥中之異徑者也每所搜撮應爪摧碎鶡尾上黨所貢漢官職典虎賁中郎將主虎賁千五百人郎多至千人漢舊儀期門騎者隴西工射獵人及能用五兵材力三百人王莽以為虎賁郎天文録郎將星若今之左右郎將也故星讚曰郎將一星主閲具為武備環濟要略漢武帝好微行因置期門郎與之期於殿門平帝改虎賁中郎將周書古有虎賁士千人封事削去草東觀漢記張純常為虎賁中郎將純素重慎周密時封事輒削去草束修自守訖永平世不轉後漢明德馬皇后不以私家干朝廷兄為虎賁中郎將訖永平世不轉位在中臣宿衛禁門明德太后姊子夏夀等私呼虎賁中郎將張鴻與戲爭鬭上特詔曰爾虎賁將軍蒙國厚恩位在中臣宿衛禁門當進人不避仇讐舉罰不避親戚今者反於殿中交通輕薄虎賁蘭內至令欲相殺于殿恣縱故不逐捕此皆生于不學之門所致也拜中候三日東漢書孔融拜北軍中候在職三日遷虎賁中郎將前後備虎賁漢名臣奏丞相薛宣奏漢興以來深考古義推萬吏之備於是制宣室出入之儀正輕重之罰故司馬殿省闕至五六里周衛擊刁斗禁門自近臣侍側尚未得著劍入防未然也陛下聖德純備海內晏然此國家之明制必前後備虎賁也收案洛陽令建武十八年夏旱公卿皆暴露請禱洛陽令著車蓋出門候何湯將衛士鈎令車收案有詔免令官拜湯虎賁中郎將上常歎曰糾糾武夫公侯干城何湯之謂也寓直散騎省劉謙之晉紀桓玄欲復虎賁中郎將疑應直與不訪之僚佐咸莫比定參軍劉蘭之對曰昔潘嶽為秋興賦序云兼虎賁中郎將寓直于散騎之省以此言之直官也直官上大風持幢不傾倒後魏書韓茂膂力絶人尤善騎射明元曽親征丁零翟猛茂為中軍執幢時大風諸軍旌旗皆偃仆茂於馬上持幢初不傾倒帝異而問之謂左右曰記之尋徵詣行在所試以騎射明元深奇之以茂為武賁郎將只畏榮公第六郎隋書來整為武賁郎將尤驍勇善撫士衆討擊羣盜所向皆捷諸賊甚憚之作為歌曰山頭百戰場十十五五把長槍不畏官軍千萬衆只畏榮公第六郎整乃榮國公護兒之第六子也南北東西中郎將魏志鄢陵侯彰為北中郎將臨災侯植為南中郎將沈約宋書南北東西中郎將復漢號也征黃巾續漢書盧植為北中郎將征黃巾志節慷慨魏志蔣濟文帝即位為東中郎將濟請留詔曰高祖歌曰安得猛士守四方天下未寧要須良臣以鎮邊境如其無事乃還鳴玉未為後也後曹仁薨復以濟為東中郎將代領其兵詔曰卿兼資文武志節慷慨當有超越江湖吞吳之志故復授將率之任居家為父子受事為君臣代郡烏桓反以曹彰為北中郎將臨發太祖誡之曰居家為父子受事為君臣名著海內學為儒宗太祖北征柳城過涿郡告守令曰故北中郎將盧植名著海內學為儒宗士之楷模國之楨幹也孤到此地嘉其餘風春秋之義賢者之後有異于人遣丞掾修墳墓並致薄酹以彰厥德士之楷模上守鄴王隱晉書山濤為北中郎將守鄴督鄴城守事晉起居注武帝泰始二年詔鄴城守事宜速得人又當得親賢有文武器任者其以高陽王圭督鄴城守事北中郎將年二十八晉中興書荀羡除北中郎將徐州刺史時年二十八以武官顯郭泰别傳王叔優問才之所宜泰曰當以武官顯叔優後至北中郎將吾為王家破賊梁後略前南中郎將永安侯確字仲正司空論之第三子少而尚武亦有文才每在第中常習弓馬後庭戲聚必法軍陳時人皆以為狂謂為無實用左右聞者咸以告焉確曰吾為王家破賊當使爾等知之雜中郎將胸奴典農司金武衛涼州三明續漢書張奐字然明與段紀明皇甫威明俱顯京師號為涼州三明並為胸奴中郎將在職七年魏略河北始開冶遂以王修為司金中郎將修奏記曰修聞枳棘之林無梁柱之資涓流之水無決波之勢是以在職七年忠讜不昭于朝功業未見于事力少任重不堪而懼所在積粟魏志任峻為典農中郎將數年中所在積粟倉廩皆滿上疏論治宫室母丘儉為洛陽典農中郎將時取農民以治宫室儉上疏曰臣愚以為天下所急除者二賊所急務者衣食誠使二賊不減士民飢凍雖崇美宫室猶無益也所在著稱魏略上以徐邈為穎川典農中郎將所在著稱虎侯安在魏志許禇從太祖討韓遂馬超于潼關其後太祖與遂超等軍馬會語左右皆不從唯將禇超負其力陰欲前突太祖素聞禇勇疑從騎是禇乃問太祖曰公有虎侯者安在太祖顧指禇禇瞋目盻之不敢動乃各罷後數日會戰大破超等禇身斬首級遷武衛中郎將武衛之號自此始也軍中以禇力如虎而癡故號曰虎癡又以超問虎侯至今天下稱焉皆謂其姓名也禇性謹慎奉法質重少言虎癡上身自捍衛後漢袁紹傳魏郡兵反賊有陶升者自號平漢將軍獨反諸賊將部衆踰西城入閉府門具車重載紹家及諸衣冠在州內者身自捍衛送到斥丘紹還因屯斥丘以陶升為建義中郎將三都尉前漢百官表奉車都衛掌御乘輿車駙馬都尉掌駙馬皆武帝初置秩比二千石後漢百官志奉車都尉比二千石本注曰無員掌御乘輿車駙馬都尉比二千石本注曰無員掌駙馬騎都尉比二千石本注曰無員本監羽林騎又屬光祿勳韋昭辨釋名奉車都尉奉天子乘輿辨云主乘輿車尊不敢言晉職官志奉朝請本不為官無員漢東京罷三公外戚宗室諸侯多奉朝請武帝又以宗室外戚為奉車駙馬騎三都尉而奉朝請焉元帝為晉王以參軍為奉車都尉掾屬為駙馬都尉行參軍舍人為騎都尉皆奉朝請後罷奉車騎二都尉唯留駙馬都尉奉朝請諸尚公主者劉惔桓溫皆為之隋百官志後齊左右衛府步兵越騎射聲屯騎長水等校尉奉車都尉等各十人騎都尉六十人隋左右衛奉車都尉六人掌馭副車煬帝廢奉車駙馬都尉唐職官志武官左右衛奉車都尉五人從五品下通典宋武帝永初以來尚主者唯拜駙馬都尉齊駙馬都尉集書省職梁三都尉並無員秩其奉車駙馬皆武冠絳朝服銀章青綬梁陳駙馬皆尚公主者為之後魏駙馬都尉亦為尚公主官雖位高卿尹而此職不去奉車二十人騎都尉六十人北齊駙馬與後魏同大唐駙馬都尉從五品皆尚主者為之開元三年勑駙馬都尉從五品階宜依令式仍借紫金魚袋天寶以前悉以儀貌修麗者充選奉車都尉五員掌馭副車不常置若大備陳設則以餘官攝行屬左右衛也歸田録官制廢久矣今其名稱訛謬者多雖士大夫皆從俗不以為怪皇女為公主其夫必拜駙馬都尉故謂之駙馬宗室女封郡主者謂其夫為郡馬縣主者謂其夫為縣馬不知何義也奉車都尉出入禁闥二十餘年前漢書霍光武帝時為奉車都尉出則奉車入則侍左右出入禁闥二十餘年小心謹慎未嘗有過甚見親信啖炙肉後漢書竇固為奉車都尉出屯梁州在邊數年羌胡服其恩信羌胡見客炙肉未熟人人長跪前割之血流染指進之于固固輒為啖不穢賊是以愛之如父母駙馬都尉出常驂乘前漢書元帝即位史丹為駙馬都尉侍中出常驂乘甚有寵親近未嘗有過金日磾為侍中駙馬都尉光祿大夫磾既親近未嘗有過失上甚信愛之選尚晉王儉集序初拜祕書丞遷太子舍人選尚公主婦翁與女壻唐張垍為翰林學士嘗以所賜珍玩示其兄均均戲謂垍曰此婦翁與女壻非天子賜學士也墓不稱陵安樂公主壻武崇訓為節愍太子所殺時追封為魯王令司農少卿趙履溫監議葬事履溫諷公主奏請依永泰公主故事為崇訓造陵詔從其請給事中盧粲駮奏曰伏尋陵寢之稱謂本屬皇王及儲宫等自皇家以來諸王及公主子墓無稱陵者唯永泰公主承恩時葬事越常塗不合引以為名臣歷檢貞觀以來駙馬墓無得稱陵者帝竟依粲所奏幽私第王士平以父勳選尚義陽公主同正駙馬都尉時公主縱恣不法士平與之爭分憲宗怒幽公主于禁士平幽于私第後釋之出為安州時輕薄文士蔡南史獨孤申叔為義陽公主歌詞言其遊處離異之狀往往歌于酒席憲宗聞而惡之得南史貶之由是稍止弱冠尚主梁書何敬容字國禮弱冠尚齊武帝女長城公主拜駙馬都尉請願重責僕人國朝真宗景德二年駙馬都尉石保吉言僕人張居簡掌私財有所侵盜願賜重責上曰所司自有常典豈可以卿故法外加刑保吉又請於私第決罰亦不許先是秦國長公主以染人有所逋欠納其女為質上聞之即時令還其父母出於貴戚如布素之士慶厯中上崇章懿位號以生不得盡其養死不得盡其哀故於元舅之家尤極寵榮之子璋珣瑋及諸孫雖在襁褓皆授以美官後又使瑋尚主雖出于貴戚然尤醇謹好學如布素之士深好孟子兖國公主上之愛女故以降瑋以瑋為沂州防禦使駙馬都尉嘉祐二年八月四日下降以瑋與公主不和落駙馬都尉授利州防禦使知衛州主除岐國至八年秋召還瑋依前授駙馬都尉而復合焉父子業進士治平三年以尚書屯田員外郎王克臣子孝莊為金紫光祿大夫檢校司空右衛將軍兼御史大夫上柱國駙馬都尉賜名師約以尚公主故也初上數稱唐公主下嫁多名人及是選尚主得師約故駙馬都尉承衍曽孫而父子皆業進士令至宰相第試以詩而并以其所業賦一編進御至召見又諭以無廢學又出經籍及紙筆硯墨賜之騎都尉討賊有功魏志徐晃字公明為郡吏從車騎將軍楊奉討賊有功遂拜為騎都尉之職膂力過人後漢吕郁以驍武給并州刺史丁原為騎都尉便弓馬膂力過人號為飛將軍使魏吳孫權遣騎都尉趙咨使魏魏帝問曰吳王何等主也咨對曰聰明仁智雄略之主也帝問其狀咨曰納魯肅于凡品是其聰也拔吕蒙于行陳是其明也獲于禁而不害是其仁也取荆州而兵不血刃是其智也據三州而虎視天下是其雄也屈身於陛下是其略也相見過於所聞顧承字子直嘉禾中與舅陸瑁俱以禮徵權賜丞相雍書曰貴孫子直令問休休至與相見過于所聞為君嘉之拜騎都尉弱冠諸葛恪瑾長子也少知名弱冠拜騎都尉老病乞身後漢朱暉字文季遷尚書令以老病乞身拜騎都尉沈毅有謀有父風魏鮑信少有大節寬厚愛人沈毅有謀有父風太祖嘉之拜騎都尉使侍從殺丁原并其兵革范曄後漢書董卓誘吕布殺丁原而并其兵以布為騎都尉誓為父子名播吳越魏略季豐字安國年十七駙馬都尉禁臠晉書謝混字叔源少有美譽善屬文初孝武帝為晉陵公主求壻謂王珣曰主壻但如劉真長王子敬便足珣對曰謝混雖不及真長不減子敬帝曰如此便足未幾帝崩袁嵩乂欲以女妻之珣曰卿莫近禁臠初元帝始鎮建業公私窘罄每得一豚以為珍膳項上一臠尤美輒以薦帝羣下未嘗敢食于時呼為禁臠故珣因以為戲混竟尚主犀如意擊主梁殷鈞睿之子也梁武帝與睿少故舊以女永興公主妻鈞拜駙馬都尉自宋齊以來公主多驕淫無行永興主加以險虐鈞形貌短小為主所憎每被召入先滿壁為殷睿字鈞流涕以言于帝以犀如意擊主碎于背然猶恨主先亡不加贈駙馬陳初陳武帝永嗣公主先適陳留太守錢盛生子屺主及屺并卒于梁時武帝受命有司請議加贈駙馬都尉并贈屺官都官尚書袁樞博學明悉舊章議曰今公主早亡伉儷已絶既無禮數致疑何須駙馬之授按杜預尚宣帝第二女晉武踐阼而主已亡泰始中追贈公主元凱無復駙馬之號梁文帝女新安公主早亡天監初王氏無追拜之事遠近二例足以較明無勞此授今宜追贈亭侯時議以為當主壻不任黃散陳宣帝謂吏部侍郎蔡凝曰我欲用義興公主壻錢肅為黃門侍郎如何凝正色曰帝鄉舊戚思由聖旨則無所問若格以僉議黃散之職須人門兼美帝默然而止肅聞而不平義興公主日譛之尋免官遷交趾頃之召還纍代尚主後魏書河南穆氏宜都王觀子夀夀子平平子國國子休休子羆五代尚公主又宜都王觀弟亮子韶亦四代尚公主又亮弟真真子泰泰子伯知三代尚公主擅決百姓唐書敬宗時韋讓為駙馬都尉寶厯元年以擅決百姓罰兩月俸料夾羅巾文帝時韋彪入為駙馬都尉嘗入見戴夾羅巾以進文宗曰本慕卿門户清素故俯從選尚如此巾服從他諸戚為之卿不須為也以公主衣服踰制罰賜錢竇浣尚延安公主為駙馬都尉太和四年勑以公主衣服踰制從夫之義過有所歸宜罷浣兩月賜錢門下十才子郭曖尚升平公主有才思尤善詩大厯中李端等十才子多出入門下宴集賦詩先成者贈之百縑文雅之士可居清列文宗拜權德輿為相翰林學士獨孤郁以女壻故辭內職上歎賞之由是公主出降選尚文雅之士可居清列者初于文學後進中選皆辭疾不應唯杜悰願焉乃尚岐陽公主服紀杜悰拜工部尚書判度支屬岐陽公主薨久而未謝文宗怪之問左右户部侍郎李珏對曰近日駙馬為公主服斬衰三年所以士族之家不願為國戚者為此也杜悰未謝拘此服紀上愕然曰豫初不知乃下詔令周年為通制不合與要官往來李德裕上疏曰國朝故事駙馬緣是親密不合與朝廷要官往來玄宗開元巾禁止尤切伏望宣示宰臣其駙馬諸親有公事即于中書見宰相不令謁私第穆宗然之為賊所害于琮尚廣德公主拜駙馬都尉乾符中同平章事黃寇犯京師僖宗出幸琮病不能從既僣號起琮為相琮以疾辭迫脅不已琮曰吾病亟矣死在旦夕加以唐室親姻義不受命死即甘心竟為賊所害而赦公主主親于琮受禍謂賊曰妾李氏女也義不獨生願與于公并命賊不許公主入室自縊死廣德閨門有禮咸通乾符中譽在人口禁中置內宅張垍尚寧親公主玄宗時最深恩寵許于禁中置內宅奉朝請續漢書前漢列侯奉朝請在長安次三公漢武時宣帝為皇曽孫令奉朝請後漢書和帝永元三年正月甲子皇帝加元服賜諸侯王公將軍特進中二干石列侯宗室子孫在京師奉朝請者黃金漢律曰春曰朝秋曰請晉職官志見三都尉門宋百官志永初以來以奉朝請選雜其尚主者唯拜駙馬都尉三都尉並漢武帝置孝建初奉朝請駙馬都尉三都尉比二千石漢官解詁三輔職如郡守獨奉朝請成帝丞相張禹遜位特進奉朝請又以關內侯蕭望之奉朝請奉朝請之號即非官也東觀漢記建武中鄧禹失司徒以特進奉朝請晉起居注康寧三年詔前相國掾屬主薄雖奉朝請並從容間預若大縣缺宜以治民杜門謝疾前漢王陵為太傅杜門謝疾竟不朝請除門籍不得朝請竇太后憎嬰除嬰門籍不得朝請處於不競之地沈約宋書王敬𢎞子恢之被詔為祕書郎敬𢎞求為奉朝請與恢之書曰彼祕書有限故有競奉朝請無限故無競吾欲使汝處於不競之地文帝嘉而許之脫朝服挂神武門陶𢎞景弱冠齊高帝作相引為諸王侍讀除奉朝請雖在朱門閉影不交外物唯以披閲為務朝儀故事多所取焉家貧求宰縣不遂永明十年脫朝服挂神武門上表辭祿讓官於弟後魏崔光韶事親以孝聞初除奉朝請光韶與弟光伯孿生操業相侔特相友愛遂經禮部尚書李沖讓官於光伯辭色懇至沖為奏聞孝文嘉而許之家貧傭書自給梁景伯少喪父以孝聞家貧傭書自給養母甚謹尚書盧淵稱之於季沖時典選狀為奉朝請大樂大苦北齊書王紘為奉朝請頗為文宣所知時帝嘗與左右飲酒曰快哉大樂紘對曰亦有大苦帝曰何苦紘曰長夜荒飲不悟亡國破家身死名滅所謂大苦帝默然試以一官祖鴻勳為州主薄僕射臨淮王彧表薦鴻勳有文學宜試以一官勑除奉朝請人謂曰臨淮舉卿便以得調竟不相謝恐非鴻勳曰為國舉才臨淮之務祖鴻勳何事從而謝之彧聞而喜曰吾得其人矣在丁傳之右前漢給事中董賢親屬皆侍中諸曹奉朝請寵在丁傅之右昆弟外孫霍光昆弟諸壻外孫皆奉朝請篤素有志行何法盛晉中興書譙愍王承字士敬篤素有志行少拜駙馬都尉奉朝請弱冠徐廣晉紀桓溫弱冠奉朝請侍從左右與太子遊晉起居注孝武詔隴西王世子越駙馬都尉楊選並可奉朝請侍從左右與太子遊諸王宜兼三公太常劉實奏郊廟諸王見在奉朝請者宜兼三公諸都尉漢官解詁都尉將兵副佐太守備盜賊也氣如合抱之榆黃帝占軍氣訣都尉氣如合抱之榆主爵都尉前漢書主爵中尉秦官掌列侯景帝中六年更名都尉武帝太初元年更名右扶風治內史右地與左馮翊京兆尹是為三輔皆有兩丞引大體不拘文法前漢汲黯為東海太守嵗餘大治上聞名召為主爵都尉治務在於無為而已引大體不拘文法嚴酷楊業以嚴酷為主爵都尉天子以為能奉事請間公孫𢎞奏事有所不可不肯廷辨常與主爵都尉汲黯請間黯先發之𢎞推其後上常説郡都尉屬國附漢百官表郡尉秦官也掌佐守典武職甲卒秩比二千石景帝中二年更名都尉屬國都尉武帝置司馬彪續漢官志建武七年省諸郡尉唯屬國都尉稍有頒分縣治皆置諸曹掾臨海記漢元鼎五年六郡尉府於侯官以鎮撫二越所謂東南一尉者也誅滅甚多史記尹齊為淮揚都尉所誅滅甚多及死仇家欲焚其尸齊子言之歸葬焉一笥餌得都尉東觀漢記樊曄與世祖於新野坐文書事被拘時曄與市史餽餌一笥上德之後拜為河東都尉臨發之官引見雲臺賜御食衣被上調曄曰一笥餌得都尉何如曄曰小臣蒙恩特見拔擢陛下不忘往舊臣得竭死自效迎吏見甚少皆驚任延拜會稽都尉時年十九迎吏見甚少皆驚及到靜泊無為下車遣史以中牢具祠延陵季子時天下新定道路未通諸避世江南者皆未還中土會稽頗稱多士延到皆禮之聘請高行如董子陵等敬待以師友之禮行縣所到輒使勞問孝子崇禮高年建武初上書言臣贊拜不由王廷願乞骸骨詔書徵延吏民攀車持轂涕泣吏民攀車上齊趙之間盜不敢近前漢義縱遷廣平都尉齊趙之間盜不敢近仁而愛人爰盎為陜西都尉仁而愛人士卒皆樂為致死奏事稱意武帝時田叔子仁以壯勇為衛將軍舍人衛青使刺三河還奏事稱意拜京輔都尉天下少雙吾丘壽王為東都都尉是嵗不熟多盜賊詔賜璽書曰子在朕前之時智略輻湊以為天下少雙推財産與昆弟後漢劉敞父卒盡推父時金寶財産與昆弟荆州刺史上其義行拜廬江都尉吏民乞留者數千人蜀志董和字幼宰益州牧劉璋轉和為巴東屬國都尉吏民老弱相擕乞留和者數千人璋聽留二年老母出懷中金丹以授晉巾興書何比干為南陽都尉有陰德棄官歸家常獨處天雨一老母詣比干衣不濡比干怪而敬焉臨去出懷中金丹九十枚以授比干曰子孫佩印綬如丹數言畢不見關都尉漢官解詁關都尉秦官如狼牧羊史記寧成居家上欲以為郡守御史大夫公孫𢎞曰臣居山東為小吏時寧成為濟南都尉其治如狼牧羊成不可令治民上乃拜成關都尉寧見乳虎無值寧成之怒寧成為關都尉嵗餘鄰國出入關者語曰寧見乳虎無值寧成之怒聲甚於寧成尹齊為關都尉聲甚於寧成上以為能拜中尉邊都尉典戎吳中書郎胡廣邊都尉針曰巍巍上聖光被八垠矧惟人面罔不來賓季末陵遲王澤壅隔戎狄作難鬼方騷逖桓桓猛將是攘是闢殷宗周宣用顯其光大漢龍興念存洛陽平平蕩蕩率土來同守撫其民尉典其戎五材並用文武程功積弩都尉魏略積弩都尉秩比二千石後更為典弩都尉又有典鎧都尉秩與典弩同皆屬積弩治粟都尉司農有沿革農都尉附韓信前漢韓信數以䇿干項羽羽弗用亡楚歸漢未得知名為連敖坐法當斬至信信仰視滕公曰上不欲就天下乎而斬壯士滕公奇壯之與語大悅言於漢王漢王以為治粟都尉李奇曰連敖楚官名司金都尉班亞九卿魏志韓暨為監治謁者在職七年器用充實制書褒歎就加司金都尉班亞九卿撫軍都尉二人主刺舉魏略撫軍都尉秩比二千石本校事官時太祖欲廣耳目使盧洪趙達二人主刺舉洪達多所陷入故于時軍中為之語曰盧洪尚可趙達殺我後達竟為人所殺廣耳目上武衛都尉以秀才入侍帷幄周昭新論散騎侍郎武衛都尉孫奇年十七以秀才入侍帷幄余作詩一篇美而諷之恂恂周公美妙無已誕姿既豐世胄有紀平南之孫奮威之子職官分紀卷三十六
