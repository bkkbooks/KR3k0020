body:
  text: 職官分紀卷十九宋孫逢吉撰衛尉前漢百官表衛尉秦官掌宫門衛屯兵寺在宫內有丞景帝初更名中大夫令後元年復為衛尉屬官有公車司馬衛士旅賁三令丞衛士三丞又諸屯衛候司馬二十二官皆屬焉長樂建章甘泉衛尉皆掌其宫職略同不常置後漢百官志衛尉卿一人中二千石丞一人比千石公車司馬令一人六百石本注曰掌宫南闕門凡吏民上章四方貢獻及徴詣公車者丞尉各一人本注曰丞選曉諱掌知非法尉主闕門兵禁戒非常南宫衛士令一人六百石本注曰掌南宫衛士丞一人北宫衛士令一人六百石本注曰掌北宫衛士丞一人左右都候各一人六百石周禮司寤氏有夜士干寶注曰今都候之屬本注曰主劍㦸士徼巡宫及天子有所收考丞各一人宫掖門每門司馬一人比千石本注曰南宫南屯司馬主中城門北宫門蒼龍司馬主東門𤣥武司馬主𤣥武門北屯司馬主北門北宫朱爵司馬主南掖門東門司馬主東門朔平司馬主北門凡七門右屬衛尉本注曰中興省旅賁令衛士一人丞漢官解詁衛尉主宫闕之內衛士於垣下為廬各有員部凡居宫中者皆施籍於門按其姓名若醫巫僦人當入者本官長吏為封啓傳審其印信然後內之人有籍者皆復有符用木長二寸以所居官兩字為鐵印分符當出入者按籍畢復齒符乃引內之也其有官位得出入者令執御者名官傳呼前後以相通從昏至晨分部行夜夜有行者輒前曰誰若此不解終歲更始所以重慎宿衛也漢舊儀衛尉寺在宫內胡廣云宫闕之內衛士於周垣下為廬者若令之伏宿屋矣東觀漢記光武二十三年太尉鮑昱兼衛尉永元三年司徒丁鴻兼衛尉魏志建初二十二年六月始置衛尉官晉職官志衛尉統武庫公車衛士諸冶等令左右都候南北東西督冶掾及渡江省衛尉宋百官志衛尉一人丞二人晉江右掌冶鑄領冶令三十九戶五千三百五十冶皆在江北而江南惟有梅根及冶塘二冶皆屬揚州不屬衛尉江左不置宋世祖孝建元年復置舊一丞世祖增置一人南齊百官志衛尉府置丞一人張衡曰衛尉八屯警夜巡晝宫城諸屯敵樓上本施鼓持夜者以應更唱太祖以鼓多警眠以鐡磬隋百官志梁衛尉統武庫令公車司馬令又有𢎞訓衛尉亦置屬官後齊衛尉寺掌禁衛甲兵統城門寺置校尉二人以司其職又領公車武庫衛士等署令武庫又有修故局丞隋高祖衛尉寺置卿少卿各一人丞二人主簿二人録事二人寺統公車武庫守宫等署各置令丞等官三年廢衛尉入太常尚書省十二年復置唐職官志衛尉寺龍朔改司衛寺咸亨復卿一員少卿二人丞二人主簿二人録事一人府六人史十一人亭長四人掌固六人武庫令兩京各二人丞二人府二人史六人監事一人典事二人掌固五人令掌藏邦國之兵仗器械辨其名數以備國用丞為之二凡有赦則先建金雞兼置鼓於宫城門之右視大理及府縣囚徒至則撾其鼓武器署令一人丞二人府二人史六人監事一人典事二人掌固四人令掌在外戎器辨其名物㑹其出入丞為之二凡大祭祀大朝㑹及巡幸則納於武庫供其鹵簿若王公百官婚葬之禮應給鹵簿亦供之守宮署令一人丞二人府二人史四人監事二人掌設六人幕一千六百人令掌邦國供帳之屬辨其名物㑹其出入丞為之二國朝衛尉寺掌供軍衛器仗什物及供帳之事交㦸漢官解詁衛尉掌宫闕周廬殿陳屯夾道當兵交㦸胡廣云宫闕之內周廬殿名陳屯夾道當兵以示威武交㦸以遮妄出入者鈎陳班固西都賦周以鈎陳之位衛以嚴更之署千列又周廬千列徼道綺錯八營張衡西京賦衛尉八屯警夜巡晝徼道外周千廬內附注謂長水中壘屯騎虎賁越騎步兵射聲胡騎八營言衛尉皆掌之植鎩懸􅀈用戒不虞鎩音所拜切兵仗也􅀈音代打更木也八屯李善注云衛尉帥吏士周宫外於四方四角立八屯也詩漢武柏梁詩衛尉曰周衛交㦸禁不時針揚雄衛尉針門非其人戶廢其職卿少卿後漢百官志衛尉卿一人中二千石本注曰掌宫門衛士宫中巡徼事宋書晉氏以來置城門校尉官宋武帝欲重城禁故復置衛尉卿以江夏王義恭之子恢為侍中領衛尉卿後魏職令衛尉少卿第四品上第二請用謙約謹正兼識古事者隋百官志梁衛尉卿視侍中掌宫門屯兵卿每月丞每旬行宫徼糾察不法統武庫令公車司馬令隋高祖衛尉寺置卿少卿各一人唐職官志衛尉卿一人從三品古曰衛尉梁加卿字隋品第二龍朔改司衛正卿咸亨復舊少卿二人從四品上卿之職掌邦國器械文物之事總武庫武器守宫三署之官屬少卿為之二凡天下兵器入京師者皆籍其名數而藏之凡大祭祀大朝㑹則供其羽儀節鉞金鼓帷帟茵席之屬其應供宿衛者每歲二時閲之其有損弊者移於少府監及金吾修之唐官品志衛尉卿視侍中掌宫門屯兵卿每月丞每旬行宫徼糾察不法統武庫公車司馬令六典衛尉寺卿一人從三品荀綽百官表衛尉品第三銀章青綬五時朝服武冠佩水蒼玉過江省宋復置齊因之梁天監置十二卿衛尉與廷尉太匠為秋卿班第十二後魏衛尉卿從第一品下太和二十二年降為第三品北齊因之煬帝降為從三品皇朝因之少卿二人從四品上從魏太和十五年初置第三品上二十年降正四品上隋煬帝降為從四品上皇朝因之貞觀置二人五代職官志後唐同光元年諸寺各只置大卿一員國朝元祐官品令衛尉卿從四品少卿正六品憂國愛主後漢䤵期字次况拜衛尉卿期重於信義憂國愛主其或不得於心犯顔諫諍謹敕小心周密畏慎續漢書馬光為衛尉卿上以光謹敕小心特親異之兩宫宿衛見重當時竇固字孟孫為衛尉卿兩宫宿衛見重當時仁厚謙恭甚有名稱遣使釋服趙熹字伯陽為衛尉盡心事上夙夜匪懈母殁上疏乞身行服不許遣使釋服諫修宫舍魏志辛毗為衛尉卿帝方修宫舍毗諫曰詩云民亦勞止汔可小康憂國忘私不營産業辛毗為衛尉清平與徐邈胡質皆以憂國忘私不營産業賜榖二千斛錢三十萬布告天下才行清茂晉起居注太元九年詔九列位重吾所欲崇河南府尹裴揖才行淸茂轉衛尉降車路左望塵而拜晉書石崇拜衛尉與潘嶽諂事賈謐與之親善號曰二十四友廣成君每出崇降車路左望塵而拜其佞如此婆娑九列崇為衛尉卿作思歸引詩序云復見牽羈婆娑于九列困于人間煩黷常思歸而永歎輔導太子後漢隂興拜衛尉亦輔導皇太子行司徒事魏志董昭為衛尉行司徒事獻南郊賦唐徐彥伯除衛尉卿兼昭文館學士景龍三年中宗親郊彥伯作南郊賦以獻詞甚典美丞前漢百官表衛尉秦官有丞後漢百官志衛尉丞一人比千石南齊百官志衛尉府置丞一人掌宫城管鑰隋百官志見衛尉門唐職官志衛尉丞二人從六品上掌判寺事凡器械出納之數大事則承制敕小事則由省司六典丞二人從六品上秦漢一人魏晉同宋孝建元年增置一人梁陳各一人梁選簿列卿丞班第三後魏從五品中泰和二十三年第七品上北齊一人從六品下隋二人品同北齊大業五年復從五品皇朝改從六品上掌同唐職官志國朝元祐官品令衛尉丞正八品主簿漢鹵簿之制衛尉駕四馬主簿前車八乘晉職官志衛尉置主簿員隋百官志隋高祖衛尉寺置主簿二人唐職官志衛尉寺主簿二人從七品上掌印勾檢稽失六典主簿二人從七品上晉令衛尉主簿二人宋齊並有梁天監七年十二卿各置主簿位三班陳因之北齊亦有主簿員隋二人皇朝武德中置二人正八品貞觀中減置一人從七品上後又置二人國朝元祐官品令衛尉主簿從八品公車令沿革更見衛尉門漢書張釋之為公車令續漢書公車司馬令常居宫南闕門吏民上書四方貢獻及徴詣公車者皆掌之應劭漢官儀公車司馬令周官也秩六百石冠一梁掌殿司馬門徼夜宫中天下事及闕下凡所徴召皆總領之入為侍中李劭别集劭以公車司馬令入為侍中不畏强禦見怨幸臣周垂拜侍御史公車司馬令不畏强禦以是見怨於幸臣守宫令沿革更見衛尉門續漢書少府屬官有守宫令主御墨紙筆封泥董巴漢東宫傳守宫禁內署令秩千石在省內用中人省外用士人齊職儀守宫周掌舍之職主行為帷宫即其任也六典守宫署令一人正八品上漢少府屬官有守宫令梁陳大匠卿屬官有守宫令北齊光祿寺統守宫令丞掌凡張設之事隋衛尉寺宫署令二人皇朝減一人丞二人正九品下隋守宫丞四人皇朝減置二人令掌邦國供帳之屬辨其名物㑹其出入丞為之二凡大祭祀大朝㑹大駕巡幸則設王公百官位於正殿南門外若吏部禮部兵部考功試人則供帳幕之屬若王公婚禮亦供其張具舉孝亷魏志荀或永平元年舉孝亷為守宫令太僕前漢百官表太僕秦官周穆王所置掌輿馬有兩丞屬官有大廏未央家馬三令各五丞一尉又車府路軨騎馬駿馬四令丞又龍馬間駒橐泉騊駼承華五監長丞又邊郡六牧師菀令各三丞又牧橐昆蹄令丞皆屬焉中太僕掌皇太后輿馬不常置司虞令一人丞二人後漢百官志太僕卿一人丞一人比千石考工令一人車府令一人未央廏令一人長樂廏丞一人右屬太僕晉職官志太僕統典農都尉典虞丞左右中典牧都尉車府典牧乘黃廏驊騮廏等令典牧又别置羊牧丞太僕自元帝渡江之後或省或置太僕省故驊騮為門下之職宋百官志太僕掌輿馬周官校人掌馬巾車掌車及置太僕兼其任也晉江左或置或省宋以來不置郊祀則權置太僕執轡事畢即省後齊九寺置卿少卿丞各一人各有功曹五官主簿録事等員隋百官志九寺並置卿少卿各一人各置丞主簿録事等員又太僕寺有獸醫博士員統驊騮乘黃龍廏車府典牧牛羊等署各署令丞等員唐百官志太僕寺梁置寺龍朔改司馭寺光宅為司僕寺神龍復卿一員少卿二人丞四人主簿二人録事二人府十七人史三十四人獸醫六百人獸醫博士四人學生一百人亭長四人掌固六人六典太僕寺梁太僕統南牧左右牧龍廏陳因之北齊太僕寺統驊騮左右龍廏左右駝牛羊司乘黃車府典牧牛羊等署煬帝減驊騮署入殿內省尚乘局改龍廏曰典廏署又有左右駮皂二廏加置主乘司庫司廩官罷牛羊署皇朝因之而省駮皂等諸官龍朔二年改司馭寺咸亨中復舊光宅元年改司僕寺神龍復國朝太僕寺掌輦輿車輅乘黃廏牧雜畜之事車輅之職行于本寺餘職歸騏驥院諸方監四署並廢卿少卿尚書冏命曰穆王命伯冏為太僕正作冏命曰昔在文武聰明齊聖小大之臣咸懷忠良今豫命汝作大正正于羣僕侍御之臣前漢百官表太僕秦官後漢百官志太僕卿一人中二千石本注曰掌車馬天子每出奉駕上鹵簿用大駕則執馭晉百官志太僕銀章青綬五時朝服兩梁冠佩水蒼玉隋百官志梁太僕卿位視黃門侍郎後齊九寺置卿少卿丞各一人隋九寺置卿少卿各一人後魏職令太僕少卿第四品上第三請用堅強敏捷識事者唐百官志太僕寺卿一員從三品上古有太僕正卿其名也後無正字惟名太僕梁始為列卿隋品第三龍朔為司馭正卿光宅為司僕卿神龍復少卿二人從四品上卿之職掌邦國廏牧車輿之政令總乘黃典廏典牧車府四署及諸監牧之官屬少卿為之二凡國有大禮及大駕行幸則供其五輅屬車之屬六典太僕寺卿一人從三品周禮有太僕下大夫二人漢官儀云天子駕出太僕御屬車八十一乘梁天監七年置十二卿太僕與太府為夏卿班第十陳因之後魏太僕卿第二品上又置少卿太和二十二年九卿並第三品後周依周官隋煬帝降為從三品皇朝因之少卿二人從四品上後魏太和十五年九卿各置少卿一人品第三上二十二年降為正四品上北齊因之隋加置二人煬帝降為從四品上皇朝因之龍朔咸亨光宅神龍隨寺改復國朝元祐官品令太僕寺卿從四品少卿正六品奉車前漢夏侯嬰高祖為沛公以嬰為太僕常奉車從公左右沛公為漢王賜嬰爵列侯復為太僕從擊項籍至彭城漢王不利馳去見孝惠魯元載之漢王急馬疲虜在後常蹳兩兒弃之嬰常取載行靣雍樹馳漢王怒欲斬嬰者十餘乃得脫後王至平城為胡所為圍七日不得通高帝使使厚遺閼氏冒頓乃開其圍一角高帝出欲馳嬰固徐行弩皆持滿外鄉卒以得脫嬰自上初起沛常為太僕竟高祖崩以太常事惠帝惠帝崩以太僕事高后后崩代王之末嬰以太僕與東牟侯入清宫廢少帝以天子法駕迎代王與大臣共立文帝復為太僕數馬石慶為太僕御出上問車中幾馬慶以䇿數馬畢舉手曰六馬慶於兄弟最為簡易矣然猶如此奉轡子虛賦云孫叔奉轡衛公參乘注云孫叔者太僕公孫賀字孫叔大駕則太僕卿御賂遺貴戚傾家自盡陳萬年字幼公遷太僕卿萬年亷平善事人賂遺貴戚傾家自盡安慰天下後漢趙岐字臺卿為太僕卿安慰天下吾之禦侮祭彤字次孫幼有志節建武中拜遼東太守彤有旅力能貫三百斤弓虜每犯塞常為士卒鋒數破走之後徴為太僕彤在遼東三十年衣無兼副顯宗既嘉其功又美彤清約後從東巡狩過魯坐孔子講堂顧指子路室謂左右曰此太僕之室太僕吾之禦侮也僕臣司駕揚雄太僕針肅肅太僕車馬是供鏘鏘和鑾駕彼時龍昔在上帝巡狩四宅王用三驅前禽是射紂作不令武王征殷檀車孔夏四騵孔昕僕夫執鞗載騂載駰我輿云安我馬云間雖馳雖驅匪逸匪愆廏多肥馬野有餓殍僕臣司駕敢告執皂肅肅上布衣蔬食魏志國淵為太僕居列位布衣蔬食造乘輿針潘尼字正叔侍中為太僕造乘輿針廏馬充足晉諸公讃郭展為太僕留心于養畜是以廏馬充足其後伐吳得以濟事還鄉賜錦袍唐書張暐為殿中監太僕卿天寶初暐還鄉拜掃特賜錦袍繒綵御賜詩以寵異之乘傳來往敕郡縣供擬暐鬢髮華皓在輿中子弟車馬連接數里衣冠榮之司僕正卿位居九列劉士經以駙馬交通列位穆宗用為太僕卿韋𢎞景與給事薛存慶封還詔書論士經伏以司僕正卿位居九列在周之命伯冏其人所以推服舊勳素所稱重今士經戚里常人班叙散秩名聲不在于士林行義無聞于朝野忽長卿寺有瀆官常以親則人物未賢以勳則寵待常厚令叨顯任誠謂謬官其劉士經新除太僕卿敕未敢行下穆宗遣宰臣宣諭𢎞景等固執如前改衛尉卿封還詔書上丞前漢百官表太僕有兩丞秦官後漢百官志太僕丞一人比千石隋百官志後齊九寺丞各一人隋九寺丞各一人唐百官志太僕四人從六品上掌判寺事六典太僕丞四人從六品上魏晉因漢東晉或省或置宋齊省梁天監七年十二卿各有丞列卿丞通朝請班第三陳因之後魏列卿丞從五品中太和末降為七品上北齊從六品下隋太僕丞三人品同北齊大業五年加為從五品皇朝為從六品上武德中減置二人永徽中加一人開元初又加一人領獸醫學生博士等掌判寺事凡補獸醫生皆以庶人之子考試其業成者補為獸醫業優長進為博士國朝元祐官品令太僕寺丞正八品主簿隋百官志後齊隋九寺各置主簿等員唐百官志太僕寺主簿二人從七品上掌印勾檢稽失省署抄目六典主簿二人從七品上梁天監七年十二卿各置主簿一人位不登十八班者别署七班主簿班第三陳因之北齊一人隋二人皇朝因之武德中品正第八貞觀中加至從七品上國朝元祐官品令太僕寺主簿從八品乘黃令沈約宋書乘黃令晉官也主乘輿金根車及安車追鋒諸車馬齊職儀乘黃廏因獸名也龍翼馬身黃帝乘之而仙後人以名廏六典乘黃署令一人從七品下乘黃古神馬名亦曰飛黃皆有角日行萬里六韜云乘黃震死淮南子曰天下有道飛黃伏皂然車馬職同後漢有未央廏令長樂廏丞至魏改乘黃廏晉因之宋太常屬官有乘黃令一人掌乘輿金根車及安車追鋒諸車馬齊品第七秩四百石銅印墨綬進賢一梁冠降朝服梁太常屬官有乘黃令丞三品勳位陳因之後魏有令丞北齊掌諸輦輅隋太僕寺統乘黃署令丞皇朝因之領駕士羊車小吏等丞一人從八品下魏有乘黃丞晉因之宋齊並有令無丞梁陳後魏北齊隋並有丞皇朝因之令掌天子車輅辨其名數與馴馭之法丞為之二凡乘輿五輅周禮巾車氏掌王五輅有玉金象革木之制至秦惟乘金根車漢承秦制以為乘輿晉武帝時始備五輅令掌為天子法車宋齊梁陳因而不改後魏五輅各依五色並加五馬後周設六官置司輅之職皇帝之輅十有二等一曰蒼輅二曰青輅三曰朱輅四曰黃輅五曰白輅六曰𤣥輅七曰玉輅八曰碧輅九曰金輅十曰象輅十一曰革輅十二曰木輅後閲視武庫得魏舊物有乾象輦駕二十四馬又有大樓輦車駕二十牛又有象輦初駕二象後以六駁代之皆魏天興中所制也宣帝以來皆服御之兼以賜皇后隋開皇元年以魏周輿輦非古之制皆廢毁改造五輅也一曰玉輅祭祀納后則乘之二曰金輅饗射郊征還飲至則乘之三曰象輅行道則乘之四曰革輅巡守臨兵事則乘之五曰木輅田獵則乘之玉輅青質以玉飾諸末駕六蒼龍金輅赤質以金飾諸末駕六赤駁象輅黃質以黃飾諸末駕六黃騮革輅白質鞔之以革駕六白輅木輅黑質漆之駕六黑騮國朝玉輅之制箱上置平盤黃屋四柱皆油畫刻鏤左青龍右白虎龜文金鳯翅雜花龍鳯金塗銀裝間以玉飾頂輪三層各施銀耀葉輪衣小帶絡帶並青羅繡雲龍周綴綬帶羅文佩銀穗毬小鈴平盤上布黃褥四角勾欄設圓鑑翟羽諸飾內貼銀鏤香罨軾匱銀龍二銜香囊銀香爐香寶錦帶下有鄣塵青畫輪轅銀轂采葉三轅銀龍頭橫木上有銀鳯十二左造青旗十有二旒皆繡升龍右載闒㦸繡黻文並青采色又設青繡門簾緑飾梯一托又二推竿一銀踏頭銀裝行馬青䌌裹索駕六騎馬馬有金面插雕羽鞶纓攀胸鈴拂青繡鞍錦結尾又設馬二在輅前飾同駕馬餘輅及副輅皆有之駕士六十四人金輅色以赤駕六赤馬駕士六十四人象輅色以淺黃駕六赭白馬駕士四十二人革輅色以黃駕六騮馬駕士四十人木輅色以黑駕六黑騮馬駕士四十人自金輅而下皆同玉輅惟無玉飾五輅皆有副車按蔡雍獨斷云五輅之外復設五色安車立車各一乘皆駕四馬是為五時副車故張良擊始皇中副車魏志云天子命太祖駕金根六馬設五時副車江左乃闕至梁始備隋開皇十四年始造五輅及副皇朝因之國朝並駕六馬駕士四十人當用銀飾者皆以銅餘制同玉輅又有指南車崔豹古今注云舊說周公所作也周公理致太平越裳氏重譯來獻使者迷其歸路周公錫以軿車五乘皆為司南之制使越裳氏載之周年而至其國故常為先導示服逺人而正四方也秦漢無聞後漢張衡始復創造漢末喪亂其法不存沈約宋書云魏明帝始令博士馬鈞造之晉亂又亡石虎使飛解姚興使令狐生又造宋武帝平關中得之其制如鼓車設木人於車上舉手指南車驟回轉所指微差至齊祖冲之又造之歷梁陳隋無所變改皇朝因之駕四馬正道先啓而行匠一人駕士十四人國朝赤質兩箱畫青龍白虎四靣畫花鳥重臺勾欄鏤拱四角埀香囊上有仙人車雖轉而手首常南指一轅鳯首駕四馬駕士舊十八人雍熙四年乃增為三十人服繡孔雀天聖五年定王府記室參軍工部郎中直昭文館燕肅言按指南車天子出常為先導示服逺人而正四方也自五代至於皇朝但設其車以備法駕而不聞得其制者臣今創意成之其車獨轅車箱外籠上有重構立木仙人於上引臂南指用大小輪九隻合齒百二十腳輪二隻高六尺圍一丈八尺附腳立於輪二隻徑二尺四寸圍七尺二寸出齒各二十四齒間相去二寸轅端橫木下立小輪二隻徑三寸鐡軸貫之左小平輪一隻徑一尺二寸出齒十二右小平輪徑一尺二寸出齒十二中心太平輪一隻徑四尺八寸圍一丈四尺四寸出齒四十八齒間相去三寸中立貫心軸一條高八尺徑三寸上載木仙人其車行而木人南指若折而東擁轅右旋附右腳子輪須轉十二齒繫右小平輪二匝觸中心太平輪右旋四分之一轉十二齒車東行木人交而南指若折而西擁轅左旋附左腳子輪隨轅須轉十二齒車正西行木人立而南指若欲北行或東或西轉亦如之詔有司製造仍付史館記里鼓車崔豹古今注云車上為二層皆有木人執木捶行一里下一層擊鼓行十里上一層擊鐲亦名大章車所以識道里也國朝赤質四靣畫花鳥重臺勾欄鏤拱行一里則上層木人擊鼓行十里則次層木人擊鐲一轅鳯首駕四馬駕士十八人雍熙四年增為三十人服繡對鵝天聖九年內侍盧道隆言創記里鼓車其車獨轅雙輪箱上為兩層各安木人手執木捶腳輪各徑六尺圍一丈八尺腳輪一周而行地三步古法六尺為一步三百步為里今法五尺為步三百六十步為里立輪一隻附於左腳徑一尺三寸八分圍四尺一寸四分出齒十八齒間相去二寸三分下平輪一隻徑四尺一寸四分圍一丈二尺四寸二分出齒五十四齒間相去與附立輪同立貫心軸一條上安銅旋風輪一枚出齒三齒間相去一寸二分中平輪一隻徑四尺圍一丈二尺出齒百齒間相去與旋風輪第次安小平輪一隻徑三寸少半寸圍一丈出齒十齒間相去一寸上平輪一隻徑三尺少半尺圍一丈出齒百齒間相去與少小平輪同其中平輪轉一周車行一里下層木人擊鼓上平輪轉一周車行十里上一層木人擊鐲都用大小輪八隻共二百八十五齒遞相鈎鎖木牙相制周而復始亦詔有司依此製造白鷺車隋志名鼓吹車上施層樓上有翔鷺國朝赤質周施花板上有朱柱貫五輪相重輪衣以緋皂頃及緋絡帶並繡飛鷺柱杪刻木為鷺銜鵝毛翎紅綬帶一轅駕四馬駕士十八人服繡翔鷺鸞旗車晉志云鸞旗車先輅所載也析羽毛編之十二旒列繫幢旁國朝赤質曲壁一轅上載赤旗繡鸞鳥駕四馬駕士十八人服繡瑞鸞辟惡車崔豹古今注云秦制也桃弓葦矢所以禳祓不祥太卜令一人在車執弓箭平巾幘緋兩襠大口袴國朝乾德元年改名崇德車赤質周施花板四角刻辟惡獸中載黃旗亦繡此獸太卜令一人在車執旗駕四馬駕士十八人服繡辟邪皮軒車晉志以獸皮為軒左金吾衛隊正一人在車執弩服同太卜令自指南車皆駕四馬正道匠一人駕士十四人國朝漢制前驅車也取曲禮前有士師則載虎皮之義赤質曲壁上有柱貫五輪相重畫虎文駕四馬駕士十八人服繡虎安車晉輿服志云坐乘謂之安車倚乘謂之立車各一乘名五時車俗謂之五帝車駕四馬駕士二十四人國朝乾德元年改進賢車赤質兩壁紗窗擎耳虛匱一轅緋帳衣絡帶門簾皆繡鳯紅絲網中設朱漆床香案紫綾案衣緋繒裹挽索朱漆行馬駕四馬駕士二十四人服繡瑞麟四望車晉志云陽遂四望繐􅙘皂輪小形車駕牛晉中朝大駕鹵簿日御四望車駕牛中道皇朝駕四馬國朝乾德元年改為明逺車仍駕四馬赤質制如屋重門勾欄上有金龍四角垂銅鐸上層四靣垂簾下層周以花板三轅駕士四十人服繡對鳯耕根車晉志云建赤旗十有二旒天子親耕所乘也一名芝車一名二蓋車置耒耜於軾上駕六馬駕士三十二人國朝制如五輅之副駕士四十人服繡鳯銜嘉禾羊車周遷輿服雜事曰羊車一名輦車其上如軺伏兔箱漆畫輪軛小兒衣青布袴褶紫碧襻青耳屩五辮髻數人引之今代名為羊車小史而漢代或以人牽或以駕果下馬晉志曰武帝乘羊車於後宫恣意所之宫女挂竹葉楊條候羊之來也國朝古輦車也亦為畫輪車駕以牛隋駕以果下馬今亦駕以二小馬赤質兩壁畫龜文金鳯翅繡緋幰衣絡帶門簾皆繡瑞羊童子十八人服繡瑞羊黃鉞車崔豹古今注云黃鉞三代通用以斷斬今以黃鉞為乘輿之飾武王以黃鉞斬紂故王者以為戒駕二馬左武衛隊正一人在車執武辨朱衣革帶駕士十二人國朝漢制乘輿建之在大駕後晉鹵簿有黃鉞車唐初無之貞觀後始加赤質曲壁中設金鉞錦囊綢杠左武衛隊正一人在車下執鉞駕兩馬駕士十五人服對繡鵝豹尾車崔豹古今注云周制也所以象君子豹變尾言謙也古車正建之今惟乘輿得建焉漢書曰成帝以幸姬趙飛燕置屬車問豹尾中駕二馬左武衛隊正一人在車執武辨朱衣革帶駕士十二人國朝漢制最後車一乘豹尾以前即用禁中唐貞觀後始加此車於鹵簿內制同黃鉞車上載朱漆竿首綴豹尾右衛隊正一人執之駕兩馬駕士十五人服繡立豹屬車十有二一曰副車一曰二車一曰佐車漢因秦制大駕屬車八十一乘行則中央左右分之法駕屬車四十六乘最後車懸豹尾皆皂蓋朱裏蔡雍獨斷曰古者諸侯二車九乘漢武祠太一甘泉皆盡用之明帝上原陵又用之法駕三十六乘小駕十二乘大業初備八十一乘三年帝嫌其多問閻毗毗曰此起於秦遂為後式宋孝建時議准旗旒之數設十二乘今憲章往古大駕依秦法駕依漢小駕依宋帝曰大駕宜三十六乘法駕宜用十二小乘駕除之可也皇朝因之用十二乘駕牛駕士各八人自指南車駕士皆平巾幘緋衫大口袴唯耕根車青衫羊車服則殊也國朝因唐大駕唯用十二乘黑質兩箱舉裝前有曲欄金銅飾上施紫通幰絡帶門簾皆繡雲鶴紫絲網帉錔每乘駕三牛駕士十人服繡雲鶴大駕則用之若法駕則減五副輅白鷺辟惡安車四望車四分屬車之一􅀈同大駕若小駕又減象革木輅指南車記里鼓車鸞旗皮軒耕根羊車屬車黃鉞豹尾等車餘同法駕若有大禮則以所御之輅進內既事則受而藏之凡將有事先期四十日尚乘供馬馬如輅也率駕士預調習指南等車亦如之典廏令漢百官表太僕屬官有太廏未央家馬三令各五丞一尉又車府輅軨騎馬駿馬四令丞應劭漢官儀六廏各主馬萬匹又龍馬間駒橐泉如淳曰在橐泉宫下騊駼承華五監長丞又牧橐昆蹄令丞應劭曰橐駝昆蹄好馬名如淳曰因以名廏武帝太初元年更名家馬為挏馬應劭曰主乳馬取其汁和酪之味酢可飲因以為名也漢書蘇武為栘中監栘中監名音移齊職儀諸廏同圉師牧人養馬之官校人掌王之馬政六典典廏令二人從七品下後漢太僕屬官有未央廏主乘輿及宫中諸馬其後置左駿廏令别主乘輿御馬魏有驊騮廏令晉太僕統乘黃驊騮龍馬等廏令過江之後或省或置哀帝省驊騮為門下之職宋齊因之梁太僕統龍廏內外廏陳因之後周有左右廏各上士一人北齊太僕寺統驊騮左右龍廏等署隋太僕寺統龍廏署皇朝改為典廏署令領執馭駕士等丞二人從八品下隋有龍廏丞皇朝改為典廏丞令掌繫飼馬牛給養雜畜之事丞為之二上以為忠漢上官桀為羽林期門郎從上甘泉大風車不得進解蓋授桀桀奉蓋雖風常屬車兩下蓋輒御上竒其材力遷朱央廏令上體不安及愈見馬多瘦上怒曰令以我不復見耶桀曰聖體不安日夜憂懼意誠不在馬言未卒泣數行下上以為忠馬瘦上車府令史記趙高為秦車府令漢書百官表太僕屬官有車府令一人六百石丞二人齊職儀車府署周有巾車掌五輅之職辨五輅之制六典車府署令一人正八品下後漢主乘輿諸車魏晉因之宋齊梁陳並尚書駕部領後魏闕文北齊太僕寺領車府令丞與乘黃令分職隋因之皇朝因隋丞一人正九品下秦漢以來並有丞一人隋二人皇朝省置一人令掌王公以下車輅辨其名數及馴馭之法丞為之二執法守正永平中車駕出信陽侯干突車騎鹵簿車府令齊國徐匡就車收奴下獄詔譴匡匡自繫不出吳良上書信陽侯驕漫干突車騎無人臣禮大不敬匡令掌王公而下獄臣恐陛下政化由是隳矣於是詔出匡遷太丘長羣牧司六典上牧監一人從五品下漢書儀太僕牧師諸苑三十六所分布北邊西邊以郎為苑監官婢奴三萬人分養馬三十萬頭擇取教習給六廏中羊無數以給犧牲中興省漢陽有牧馬苑令羽林郎監領魏置牧官都尉晉因之宋齊闕文梁太僕統南牧左右牧等丞陳因之後魏闕文北齊太僕寺統左右牧駝牛司羊等署令丞後周有典牡典牝上士一人中士一人又有典駝典牛典羊各有中士一人隋太僕寺統典牧署牛羊署等令丞皇朝因分為牧監副監二人正六品下丞二人正八品上主簿一人正九品下中牧監一人正六品下副監一人從六品下丞一人從八品上主簿一人從九品上下牧監一人從六品下副監一人正七品下丞一人正九品上主簿一人從九品下諸牧監掌羣牧孳課之事凡馬五千匹為上監三千匹以上為中監以下為下監凡馬牛之羣以百二十駝騾驢之羣以七十羊之羣以六百三十羣有牧長牧尉凡馬有左右監以别其粗良以數記為名而著其簿籍細馬之監稱左粗馬之監稱右凡馬各以年名籍之每歲季夏造至孟秋羣牧使以諸監之籍合為一諸羣牧别南北東西以分統常以仲秋上於寺凡在牧之馬皆印國朝舊制國馬之政皆騏驥二院監官專之咸平二年置羣牧司領內外廏牧之政自騏驥而下皆聽命焉三年令諸州有監牧處知州通判兼管內羣牧事六年令河北轉運使兼羣牧事羣牧制置使國朝嘉祐二年詔以奉寧軍留後檢校太保同知樞密副使以下充羣牧使屢罷而復置蓋明道二年嘗罷而復置寶元二年又嘗罷而復置四年九月兵部侍郎知樞密院事陳堯叟兼羣牧制置使時內侍省副都知閻承翰為都監真宗以堯叟事陳居近密之職而與承翰聯事合避輿議帝曰國馬戎事之本宜得大臣總領不可辭也自是以樞臣領之同羣牧制置使國朝不常置曾歷中書樞密及使相宣徽使節度使為之至和元年差龍圖閣直學士吕公弼同羣牧制置使後不得為例羣牧使唐貞觀十五年尚乘奉御張萬歲除太僕少卿勾當羣牧不入銜至麟德三年太僕少卿鮮于正裕檢校隴右諸牧監雖入銜未置使儀鳳三年太僕少卿李思文檢校隴右諸牧監使自兹始有使號後又有樓煩監牧使龍陂監牧使元和十四年置臨海監牧命淮南節度使兼之至太和二年廢又於襄州穀城縣置臨漢監牧使以牧馬仍令山南東道節度使兼充監牧使太和七年廢國朝咸平三年九月以樞密直學士主客郎中陳堯叟為制置羣牧使凡內外廏牧之事皆領焉堯叟同知樞密院事以禮部郎中知制誥薛映充使景德四年復命堯叟為羣牧制置使因以制置羣牧使大中祥符四年知制誥朱巽兼使職出知江陵府五年巽以擅牒給馹馬被劾解使職自是不復有外任兼領者咸平三年制置羣牧使陳堯叟請令諸州有監牧處知州通判兼管勾羣牧使從之熙寧元年詔今後羣牧使副各置一員都監兩員並專管勾本司更不兼釐他務仍並任九年詔今後樞密都承㫖兼羣牧使副都承㫖兼羣牧副使更不兼别差遣同羣牧使國朝不常置待制以上為之皇祐元年以翰林學士梁適為同羣牧使羣牧使舊止一員學士彭乘已為使此特置之羣牧副使更見羣牧使門國朝景德三年以內侍省右班副都知閻承翰為之天禧元年以樞密都承㫖楊崇勳為之羣牧都監更見羣牧使門國朝大中祥符三年以入內內侍省副都知張繼能為之熙寧元年九月詔已分置河北河南監牧使統領外監其羣牧使省都監一員治平二年詔見判官門羣牧判官國朝景德二年以著作郎王曉為之四年增置一員以太子中舍田穀充是後每歲更出諸州巡坊監印鞍馬天聖七年詔羣牧制置使今後不得自舉判官只候朝廷差人皇祐三年詔羣牧判官自今以朝臣歷一任知州館職一任通判者為之即不得干托保薦及有陳乞治平二年詔羣牧都監判官在羣牧路分轉運使之下同羣牧事知軍州外郎之上與提㸃刑獄相序以官上羣牧故事六卷景德二年羣牧判官王曉上羣牧故事六卷上嘉其詳博詔奬之上馬政熙寧三年羣牧判官王誨上馬政條貫行之左右騏驥院唐有小馬坊飛龍院之號五代後唐長興元年分飛龍院為左右以小馬坊為右飛龍院國朝太平興國五年改飛龍為天廏院雍熙元年改左右騏驥院各領天駟二監天廏一坊大中祥符二年詔左右騏驥院及諸坊監馬數目令旬奏月比以省日奏之繁五年羣牧制置使言左右騏驥院六坊監見飼馬萬七千匹所費芻粟四百萬自今請止留馬二千餘悉遣就淳澤監放牧或官有急用可信宿而至歲省芻粟三百餘萬從之左右天駟監唐馬有左右監國朝太平興國四年置養馬務五年作四廏詔以為天駟監左右各有二焉熙寧三年以天駟監併作左右兩監左右天廏坊國朝雍熙二年置咸平元年併北務遂分為左右二坊熙寧八年詔權廢罷左右天廏坊牧養上下監國朝景德二年以鄭州養馬務病馬於京城置坊養飼大中祥符四年羣牧制置使奏請於在京諸務監及諸軍病馬就京城西開逺門外草地分兩監量彼草料牧放詔以為牧養上下監馬病重送下監輕者上監諸州監務唐凡馬有左右監仍以土地為名國朝景德三年改諸州牧龍坊以本州軍土地為名先是諸坊借用奉使印今各鑄印給用河南府洛陽監國朝舊曰飛龍院太平興國五年改為牧龍坊景德四年陳堯叟奏請以東京右養馬務人員兵士送河南府牧龍坊牧養在京送去少嫩馬仍改為洛陽監大中祥符六年陳堯叟言洛陽監秣馬五千匹頗費芻粟已令裁減二千五百上曰大都馬數及十萬可止王旦曰聽民間任便畜養官有所須以本直市之猶外廏也所費芻秣皆出兩稅少損馬粟用資軍儲亦當世切務也天聖六年廢景祐二年復置大名府大名三監國朝太平興國三年置養馬務改牧龍坊景德二年五月分為二坊七月改為大名第一第二監大中祥符二年又置第三監於洺州境洺州廣平二監國朝建隆二年置養馬務改牧龍坊景德二年改廣平監大中祥符三年羣牧制置使言河北孳生馬多可更於邢洺趙州境標地萬頃以廣牧放因詔增置第二監景祐二年廢其一衛州淇水二監五代周顯德中置牧馬監國朝建隆初增葺後改東西牧龍坊景德二年改淇水監後又分為第一第二監熙寧七年合為一鄭州武原監國朝舊曰馬務建隆初增葺後改牧龍坊景德二年分為第一第二牧監又改為廣武監大中祥符二年改原武監仍合為一熙寧四年廢併分擘羣馬與洛陽單鎮兩監牧放同州沙苑二監六典沙苑監監一人從六品下副監一人正七品下丞一人正九品上主簿二人從九品下監掌牧養隴右諸牧牛羊以供其宴㑹祭祀及尚食所用每歲與典牧分月以供之丞為之二若有司應供者則以時皆供之凡羊毛及雜畜皮角皆具數申送所由焉一本太僕屬官有沙苑監開元二十三年省國朝建隆初葺故地為監後改牧龍坊景德二年改沙苑咸平六年分二監每監牧馬凡四千五百匹相州安陽監五代周顯德中置馬坊國朝建隆初增葺後改牧龍坊景德二年改今名澶州鎮寧監國朝建隆初濮州置養馬務開寶八年徙於澶州後改牧龍坊景德二年改鎮寧監乾興元年廢滑州靈昌監國朝舊置馬監後改牧龍坊景德二年改為靈昌監天禧三年河决羣牧司請以監馬送大名淇水五監牧放候水落别為規畫後廢邢州安國監國朝大中祥符二年河北諸監言邢趙草地甚廣宜置監牧遣羣牧判官括視閒田得萬餘頃可牧馬萬匹其八月置養馬景德二年廢後給充天慶觀莊田鄆州東平監國朝大中祥符元年置天聖五年廢羣牧司請以監馬分配諸處其地募民分佃之熙寧七年廢中牟縣淳澤監國朝大中祥符四年置乾興元年廢許州單鎮監國朝大中祥符六年羣牧制置使言單鎮有牧地詔置監天聖五年凡再置而廢同州病馬務國朝景德元年置初以沙苑監官兼主之别養本監及諸處病馬天聖二年别差使臣勾當估馬司國朝咸平元年置在建隆坊勾當官二人以諸司使副充掌諸州所市馬估直驗記牧養乳酪院國朝舊有南北兩院有監官景德二年合為一以騏驥院監官專副兼充掌供御厨乳酪酥大理廷尉前漢百官表廷尉秦官掌刑辟有正左右監秩皆千石景帝中六年更名大理武帝建元四年復為廷尉宣帝地節三年初置左右平秩皆六百石哀帝元壽二年復為大理王莽改作士後漢百官志廷尉卿一人中二千石掌平刑罰韋昭辨釋名廷尉古官也以尉尉人心也凡掌賊及司察之官皆曰尉尉罰也言以罪罰姦也猶刺史刺舉不法也晉職官志廷尉主刑法獄訟屬官有正監評并有律博士員宋百官志廷尉一人丞一人掌刑辟凡獄必質之朝廷與衆共之之義兵獄同制故曰廷尉舜攝帝位咎繇作士即其任也周大司寇為秋官掌邦刑秦為廷尉漢景帝中六年更名大理武帝建元四年復為廷尉哀帝元壽二年復為大理漢東京初復為廷尉廷尉正一人廷尉監一人正監並秦官本有左右監漢光武省右猶云左監魏晉以來直云監廷尉評一人漢宣帝地節二年初置左右評漢光武省右猶云左評魏晉以來直云評正監評並以下官禮敬廷尉卿正監秩千石評六百石廷尉律博士一人魏武初為大理後復為廷尉置律博士隋百官志後魏置少卿司直後齊九寺置卿少卿丞各一人各有功曹五官主簿録事等員又大理寺掌决正刑獄正監評各一人律博士四人明法掾二十四人檻車督二人掾二人獄丞掾各二人司直明法各十人隋九寺置卿少卿各一人各置丞主簿録事等員大理寺不統署又有正監評各一人司直十人律博士八人明法二十人獄掾八人唐百官志大理寺古謂掌刑為士又曰理漢景帝加大字取天官貴人之牢曰大理之義後漢復改為廷尉魏為大理南朝又名廷尉梁改名秋卿北齊隋為大理加寺字龍朔改為詳刑寺光祿為司刑神龍復故卿一員正二人丞六人主簿二人府二十八人史五十六人獄丞四人獄史六人亭長四人掌固八人問事一百四十八人司直六人評事十二人六典大理寺卿一人從三品尚書云帝曰咎繇汝作士五刑有服孔安國注云士理官也周官為司冦韓詩外傳云晉文公使李離為理理謂察理刑獄也兩漢卿秩中二千石魏晉宋齊梁陳俱為第三品後魏第二品上太和以後降為第三品隋正三品皇朝降為從三品少卿二人從四品上後魏置為第三品上太和以後降為第四品上北齊為四品隋因之皇朝置二人降從四品上國朝大理寺掌鞫獄定刑斷內外六品以下官并諸軍將校罪犯及諸州軍應奏公案詳决疑議之事凡職務左斷刑則評事司直按法評斷丞議正審右治獄則丞專推劾主簿掌案籍少卿分領其事而卿總焉貴人之牢史天官書斗魁四星貴人之牢曰大理廷尉古文尚書咎繇作士正五刑士獄之長也春秋元命苞王者置廷尉讞疑刑者官之平下之信也尉者尉民心撫其實也安立字士垂一人誥屈折者為廷示戴尸首以寸者為言寸度治法數之分示帷尸稽於寸合則法有分故為尉示與尸寸宋均注曰士事也垂係也尸人死也人死不可無乃戴之者示天下不可無死也前漢百官表後漢百官志並見大理門漢官宰尹下古者聽獄於棘木之下因言兵獄同制故稱廷尉晉職官志宋百官志並見大理門隋百官志梁廷尉卿梁國初建曰大理天監元年復改為廷尉有正監平三人元㑹廷尉三官與建康三官皆法官𤣥衣朝服以監東西中華門手執方木長三尺方一寸謂之執方四年置胄子律博士位視員外郎後魏職令廷尉少卿第四品上用恩理平斷明識刑法者天下之平前漢張釋之為廷尉文帝出嘗有人從渭橋下走乘輿馬驚於是捕之屬廷尉釋之奏其犯蹕當罰金上怒釋之曰法者所與天下共也且方其時使立誅之則已今既下廷尉廷尉天下之平也今因一事而天下用法皆為之輕重人安所措其手足乎後又有盜高廟座前玉環者文帝欲族之釋之奏當棄市上大怒釋之曰法如是也今盜宗廟器而族之假令愚人取長陵一杯土陛下何如以加其法乎持議平釋之為廷尉時條侯周亞夫與山都侯王恢咸見釋之持議平乃結為親友張廷尉由此天下稱之不循三尺法杜周為人少言為廷尉其治大抵倣張湯而善伺候上所欲客有讓周曰君為天下决平不循三尺法專以人主意㫖為獄獄者固如是乎周曰三尺安出哉前主所是者著為律後主所是者疏為令當時為是何古之法乎至周為廷尉詔獄亦益多矣二千石繫者新故相因不減百餘人諸郡吏大府舉之廷尉一歲至千餘章其大者連逮證案數百小者數十人逺者數千里近者數百里一歲千餘章上舞文巧詆張湯為廷尉為人多詐舞智以御人上意所欲罪豫監吏深刻者即上意所欲釋豫監吏輕平者所治即豪必舞文巧詆即下戶贏弱時口言雖文致法上裁察於是往往釋湯所言正卿湯以更定律令為廷尉汲黯數責湯於上前曰公為正卿上不能褒先帝之功業下不能抑天下之邪心安國富民使囹圄空虛何乃空取高皇帝約束紛更之為而公以此無種矣張湯以倪寬為奏讞掾寬善屬文然懦於言口弗能發明也時張湯為廷尉廷尉府盡用法律之吏而寬以儒生在其間見謂不習事不署為從史之北地視畜數年還至府上畜簿㑹廷尉時有疑奏已再見却矣掾吏莫知所為寬為言其意掾吏因使寬為奏成讀之皆服以白廷尉湯湯大驚召寬與語乃竒其才及上寬所奏即時得可異日湯見上問曰前奏非俗吏所及誰為之者湯曰倪寬上曰吾固聞之久矣湯由是以寬為奏讞掾以古法義决疑獄甚重之民自以為不寃于定國字曼倩少學法於父及為廷尉其决疑平法務在哀鰥寡罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以為不寃天下無寃民上請讞精明定國飲酒至數石不亂冬月治獄請讞益精明高門始定國父于公其閭門壞父老方共治于公謂曰可高大其門令容駟馬高蓋車我治獄多隂德子孫必有興者至定國為丞相于公東海人也為郡曹决獄稱平治天下第一文帝初立河南守吳公治天下第一故與李斯同邑乃徴吳公為廷尉賔客填門下邽翟公為廷尉賔客填門及去位門可設雀羅後復為廷尉客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見丹筆盛吉為廷尉每至冬節罪囚當斷夜省刑狀其妻執燭吉執丹筆夫妻相向垂泪多所生全後漢郭躬字仲孫父為郡决曹掾斷獄至三十年用法平郡內比之東海于公躬少傳父業講授徒衆常數百人後為廷尉躬家世掌法務在寬平及典理官决獄斷刑多依矜恕乃條諸重文可從輕者四十一事奏之事皆施行著于令躬奏讞法科多所生全七人郭氏自𢎞後數世傳法律子孫至公者一人廷尉七人侯者三人刺史二千石侍中郎將二十餘人侍御史正監平者衆即郭躬之家也三世河南吳雄字季高順帝時為廷尉以明法律斷獄平起自孤寒致位司徒雄少時家貧喪母營人所不封土者擇葬其中喪事輒辦不問時日醫巫皆言當族滅而雄不顧及子欣孫恭三世為廷尉以法名家以法名家上人賴其平陳寵字昭公代郭躬為廷尉性任矜及為理官數議疑獄常親自為奏每附于輕典務從寬恕帝輒從之濟活者甚衆其深文刻敝于此少哀故本傳贊曰陳郭主刑人賴其平手筆作議寵為廷尉有疑獄輒手筆作議所活甚多讞平天下獄朱博字子元遷廷尉職典决獄當讞平天下獄博恐為官屬所誣視事召見正監典法掾吏謂曰廷尉本起於武吏不通法律幸有衆賢亦何憂然廷尉治郡斷獄且二十年亦獨耳剽日久三尺律令人事出其中掾吏試與正監共條前世决事吏議難知者數十事持以問廷尉為諸君覆意之正監以為博茍强意未必能然即共條白焉博皆召掾吏並坐而問為平處其輕重十中八九官屬咸服博之疏略材過人每所到輒出竒譎以明示下為不可欺者結襪前漢王生者善黃老言嘗召居廷中公卿盡㑹立王生老人曰吾襪解顧謂釋之為我結襪釋之前跪而進之既退或讓王生獨奈何廷辱張廷尉如此王生曰廷尉方為天下名臣吾故聊使結襪以重之諸公聞之賢王生而重釋之治獄之吏應劭漢官儀宣帝元鳯中路溫舒為廷尉吏上言臣聞秦有十失其一尚存治獄之吏是也夫獄天下之命也今治獄吏以刻為明深者獲功名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死俗語曰畫地為獄勢不可入刻木為吏議不可對此皆疾吏之風悲痛之辭也唯陛下除誹謗之罪招切直之言開天下之目廣針諫之路掃亡秦之失尊文武之業上善其言世非法家後漢楊賜為尚書令數日出為廷尉賜自以世非法家上言曰三后成功惟殷于民臯陶不與焉蓋吝之也遂固辭達法理有張釋之風謝承後漢書張禹少作九府吏給廷尉為北曹吏每斷法决處事執平為京師所稱明帝以其達法理有張釋之之風起拜廷尉垂念寃結傅賢字仲舒遷廷尉常垂念寃結務從輕刑賢素亷正每至斷獄遲回流涕在位治獄稱平治獄稱平上决三男娶一妻生四子謝承後漢書范延夀宣帝時為廷尉時燕趙之間有三男共娶一妻生四子長各求離别爭財分子至聞於縣縣不能决斷至於廷尉於是延夀决之以為悖逆人倫比之禽獸生子屬其母以子並付母尸三男於市奏免郡太守長等無師化之道天子可其言牆面充伍風俗通頃廷尉率皆牆靣茍充兹伍而已不以喜怒毁法魏志高柔字文惠為廷尉時獵法甚峻真陽典農劉龜於禁內射兔其功曹張京詣校事言之帝匿京各以龜付獄柔表請告者名帝大怒柔曰廷尉天下平也安得以至尊喜怒而毁法乎重奏帝乃下京名即還訊各當其罪臣子得為理謗建安中鍾繇為大理遷相國魏文踐阼復改廷尉聽君父已殁臣子得為理謗及士為侯其妻不復改嫁育所創也務在寬恕王殷為大理務在寬恕與鍾育以治獄見稱一朝决數年囚司馬岐為陳留相梁郡有囚數年不决請移獄於岐囚至詰之皆莫敢詐匿一朝决竟遂超為廷尉材不為三公晉書袁甫曰聖王使人必先以器廷尉之材不為三公自昔然也法合人情王隱晉書孔坦遷廷尉多所平正當法合人情而時勢要自以愛憎為斷坦意不得皆行也施一恩開萬怨苑堅為廷尉奏主典吏部邵廣盜官布四十匹依律棄市廣息雲宗二人自沒為官奴婢以贖父尚書議可堅駮之曰此為施一恩於今聞萬怨於後顯宗從之正廣刑清正有法理臧榮緒晉書咸亨五年詔劉頌貞固清正有法理鑒識其以頌為議郎守廷尉卿張釋之以來復見斯事晉中興書王彪之遷廷尉時揚州刺史殷浩劾永嘉太守謝毅付廷尉彪之執法不受誥遂發詔彪之又上疏執據時人云張釋之以來復見斯事天下稱其有恩盛吉拜廷尉卿性多仁恩務在哀矜每冬月罪囚當斷夜省刑狀其妻執燭吉手持丹筆夫妻相對垂泣妻嘗謂吉曰君為天下執法不可使一人濫罪令殃流子孫所當平决若無繼嗣者令其妻妾得入經營使有遺類視事十二年天下稱其有恩靣决當時之事㑹稽後賢孔坦遷廷尉獄多囚繫坦到官躬執辭狀口辨曲直小大以情不加楚撻每臺司録獄無所顧問皆靣决當時之事不為宣武曲筆齊游肇為廷尉卿肇儒者動存名教準繩所舉莫非傷風敗俗持法以平斷獄務於仁恕齊宣武帝常敕肇有所降恕執而不從曰陛下自能恕之豈足令臣曲筆平星執法正于綱紀天文録平星主廷平注平天下之獄事若今廷尉之象故星讃曰平星執法正于綱紀孟秋之月祀臯陶摯虞新禮議故事祀臯陶于廷尉寺日以社新禮改以孟秋之月以應秋令針揚雄廷尉針殷以刑顛秦以酷敗獄臣司理敢告執謁詩伯梁詩廷尉曰平理請讞决嫌疑寺中二絶北史宋世軌為廷尉少卿洺州人衆結欲劫吏捕案之世軌判其事唯殺魁首餘從坐悉舍焉大理正蘇珍之亦以平幹知名寺中語曰决定嫌疑蘇珍之視表見裏宋世軌時人以為寺中二絶大理卿判事前漢百官表廷尉秦官景帝中六年更名大理隋百官志梁廷尉卿梁國初建曰大理天監九年復為廷尉有正監平三人元㑹廷尉三官與建康三官皆法冠𤣥衣朝服以監東西中華門手執方板長三尺方一寸謂之執方後齊九寺置卿少卿丞各一員隋置卿少卿各一人唐百官志大理寺卿一員從三品少卿二員從四品上卿之職掌邦國折獄詳刑之事少卿為之二六典卿一人從三品少卿二人從四品上見大理門以五聽察其情一曰氣聽二曰色聽三曰視聽四曰聲聽五曰詞聽以三慮盡其理一曰明慎以讞疑獄二曰哀矜以雪寃獄三曰公平以鞫庶獄國朝建隆三年以竇儀兼判大理寺事故事臺省長官兼判他司得言判某官事如晉左丞崔祝兼判太常卿事是也若止言寺事則少卿正丞之事皆兼之矣周顯德中翰林學士中書舍人竇儼兼判太常寺事至是儀又兼判大理寺非舊典也元祐官品令大理寺卿從三品天下無虐刑文子昔臯陶嘗為大理天下無虐刑有貴乎不言也釋令尹族說苑楚令尹子文之族有干法者廷理拘之聞其令尹之族釋之子文召廷理而責之遂致其族人於廷理曰不是刑也吾將死廷理􅘨遂刑其族人成王聞之不及履而至於子文之室曰寡人幼少置廷理失其人以失子之意於是黜廷理而尊子文使及內政刎頭而死於廷新序楚昭王有士曰石奢者公正好義王使為大理於是廷有殺人者奢追之即其父也遂反於廷曰殺人者父也以父成政不孝不行君法不忠弛罪廢法而伏其辜僕之所守也伏斧鑕命在君君曰追而不及庸有罪乎子其治事矣石奢曰不私其父非孝也不行君法非忠也以死罪生非亷也君舍之上之惠也臣不敢失法下之行也遂不離斧鑕刎頭而死於廷過聽殺人請死晉文公使李離為大理過聽殺不辜自繫曰臣之罪當死文公令之曰官有上下罰有輕重是下吏之罪也非子之過也離曰臣居官為美不與下吏讓位受爵為多不與下吏分利今過聽殺無罪臣之罪當死遂伏劍而死孔子善子羔家語子羔為衛士師刖人之足俄而衛有亂子羔逃刖也者守門謂羔曰彼有缺羔曰君子不踰又曰彼有竇羔曰君子不隧又曰於此室乃入焉既罷羔問曰吾親刖子之足而子逃我何也刖者曰曩者君理人以法令先君後臣欲臣之免也臣知之臨當論刑君愀然不樂見於顔色臣又知之君豈私臣哉天生君子其道故然此臣之所以說君也孔子聞之曰善哉為吏其用法一思仁恕則樹德加嚴暴則樹怨公以行之其子羔乎曲盡事情一無遺誤隋楊注守大理卿視事二日帝將親省囚徒將繫囚二百餘人注通宵究審詰朝而奏曲盡事情一無遺誤帝甚嘉之所斷非寃濫唐唐臨為大理卿高宗嘗親録死囚前卿所斷者悉號叫稱寃臨所入者獨無言帝怪問狀囚曰唐卿所斷既非寃濫所以絶意爾旬日决遣疑事四百餘條張文瓘為大理卿至官旬日决遣疑事四百餘條人無怨言文瓘嘗有疾繫囚相與齊禱願其視事當時咸稱其執法平恕比戴胄焉拜侍中大理諸囚一時慟哭其感人心如此失出獲大罪劉德威為大理卿太宗嘗問德威曰近來刑網稍密其過安在德威奏言誠在主上不由臣下人主好寬則寬好急則急律云失入減三等失出減五等失入則反是無辜失出則便獲大罪所以吏各自愛競執深文非有教使之然畏罪之所致耳陛下但捨所急則寧失不經復行於今日矣太宗深然之異筆斷斬李朝隱授大理丞神龍中功臣敬暉桓彥範為武三思所搆諷侍御史奏請誅之敇大理結其罪朝隱以暉等不經推窮未可即正刑名時裴談為大理卿異筆斷斬朝隱由是忤㫖中宗令貶嶺南李嶠奏曰朝隱素稱清正斷獄亦甚當事一朝逺徙嶺表恐天下疑其罪中宗意解出為聞喜令因已之泰利人之否張道源拜大理卿時何稠士澄得罪家口籍沒仍以賜之道源歎曰人有否泰蓋亦是常安可因已之泰利人之否取其子女以為僕妾豈近仁者之心乎皆捨之一無所取保所長棄所短貞觀八年上謂大理卿竇誕曰法官卿為之長也武德之時為息隱王所囑使回改文案茍事曲從此卿之短也朕以至公臨天下法之所行無捨親昵卿當保所長而棄所短無阿朕意以虧憲典疇日相委故授卿此任高祖嘗問大理唐臨獄繫囚之數臨對曰見囚五十餘人惟二人合死上囚數不多怡然形於顔色謂臨曰昔東宫卿已事朕朕登大位卿又居近職以疇日相委故授卿此任然為國之要在於刑法刑急則人殘法寬則失罪務令折中稱朕意焉繫囚悲歌大理卿袁仁敬暴卒繫囚閒之皆慟哭繫囚曰天不恤若人兮何奪我慈親兮有理無申兮雖有理痛我安訴陳兮不能茍容於宰相國朝至道二年大判理寺先是人不小罪者詔多貸其死配固奏事上謂佖近有貸命流與死無異對曰先王立法蓋為小人君子固不犯矣上默然曰卿言是也令鞫陳廷山謀叛獄具大理正李潤之斷廷山謀叛未行發覺當絞中書刑房吏李文方用事潤之附㑹之佖掌廷尉不預議法又不見案牘文方遣小吏就取印行用佖初付之因不甘上疏言其事上大怒召宰相吕蒙正責讓蒙正稱文方所定為允佖以為廷山謀反當斬與謀反未上有異因言曰臣祗能盡心於陛下不能茍容於宰相以曲法爾在廷尉四十年用法平允劇可久拜大理卿建隆三年致仕卒可久仁性沈毅方正在廷尉四十年用法平允以恕稱對奴從良賜主姓東齊記事太祖時雷德驤判大理寺因奏事問以律奴從良賜主姓如何或以為文誤是否對曰不然蓋慮後世或通婚姻故也太祖拱手莊色曰是也乃詔異日如衩衣不得奏事號為明習法令仁宗時陳太素中進士第為大理詳斷官審刑詳議官權大理少卿又判大理寺號為明習法令少卿沿革並見卿門撼大木隋趙綽性質剛毅為大理少卿時有刑部侍郎辛亶嘗衣緋裩俗云利官上以為厭蠱將斬之綽曰據罪不當死臣不當奉詔上怒甚曰卿惜辛亶不自惜也命左僕射高熲將斬之綽曰陛下寧可殺臣不可殺辛亶至朝堂解衣將斬上使人謂綽竟如何對曰執法一心不可惜死上拂衣入良久乃釋之明日謝綽勞之賜物三百段時上禁行惡錢有二人在市以惡錢易者武候執以聞上令悉斬之綽曰此人當杖殺之非法上曰不關卿事綽曰陛下不以臣愚暗置在法司欲妄殺人豈得不關臣事上又曰撼大木不動者當退對曰臣望感天心何論動木復曰啜羮者熱則置之天子之威欲敢挫耶綽拜而益前訶之不肯退上遂入侍御史栁彧復上奏切諫上乃止據律奏衛士當徒源師煬帝即位拜大理少卿帝在顯仁宫敕衛士不得輒離所守有一主帥私令衛士出外帝付大理師據律當徒帝令斬之師奏曰此人罪誠難恕若陛下初便殺之自可不關文墨既付有司義歸常典脫宿衛近侍者更有此犯將何以加之帝乃止免校尉死唐戴胄遷大理少卿時吏部尚書長孫無忌嘗被召不解佩刀入東上閣門右僕射封德彛議以監門校尉不覺罪當死無忌誤帶入罰銅二十斤上從之胄駮曰校尉不覺與無忌帶入為誤爾臣子至於尊極不得稱誤陛下若録其功非憲司所决校尉緣無忌以致罪於法當輕若止論其誤則為情一也而生死頓殊敢以固請上嘉之竟免校尉死犯顔執法胄為少卿犯顔執法甚多隨方指謫言如泉湧胄所論刑獄皆事無寃濫隨方指謫言如泉湧事無寃濫上不能順㫖詭辭以求茍安徐有功遷司刑少卿謂所親曰今身為大理人命所懸必不能順㫖詭辭以求茍免故前後為獄官以諌奏枉誅者三經斷死而執志不渝酷吏由是少衰時人比漢之于張焉或曰若獄官皆然刑措何逺比漢于張上方于定國有功為少卿時周興來俊臣等羅告天下衣冠遇族者數千百家有功司刑平反者不可勝紀時人方于定國定律令韓瑗父仲良武德初為大理少卿受詔與郎楚之等掌定律令仲良言於高祖曰周代之律其屬三千秦漢以來約為五百若逺依周制繁紊更多且官吏至公自當奉法茍若徇已豈顧刑名請崇寬簡以允維新之望高祖然之於是採定開皇律行之時以為便用心存法無過戴胄者唐新語太宗嘗謂侍臣曰大理之職人命所懸當須妙選正人用心存法無過戴胄者乃以為大理少卿正禮記成獄辭史以獄成告于正正聽之鄭𤣥注云于周禮鄉師之屬今漢有正平丞秦所置也前漢百官表廷尉有正秩千石後漢百官志廷尉正一人魏志廷尉三官通視南臺侍書舊尚書郎下遷晉職官志廷尉屬官有正隋百官志梁天監元年廷尉有正監評三人煬帝增為六人判獄事後齊大理寺正一人唐百官志大理寺正二人從五品下掌參議刑辟詳正科條之事凡六丞斷罪不當則以法正之六典大理正二人從五品下秦置廷尉正一人漢因之與監及平謂之廷尉三官秩千石魏氏第六品晉置二人宋齊梁陳並一人品同魏氏後魏第六品上北齊及隋並正第六品煬帝增置六人皇朝置二人龍朔二年改為詳刑大夫咸興元年改大理正光宅年改司刑正神龍初復舊掌同唐志國朝元祐官品令大理正從七品持法平前漢宣帝在民間時知百姓疾苦吏急聞黃霸持法平召以為廷尉正數决疑獄稱平允濟活千數後漢何敞六世祖比干學尚書于朝錯武帝時為廷尉正與張湯同時湯持法深而比干務仁恕數與湯爭雖不能盡得然所濟活者以千數何氏家傳云祖父比干字少卿經明行修兼通法律為汝隂縣獄吏决曹掾平活數千人後為丹陽郡尉獄無寃囚淮汝號曰何公征和三年三月天大隂雨比干在家夢貴客車騎滿門覺以語妻語未已而門有老姥可八十餘頭白來寄辟雨雨甚而衣履不沾漬雨止送至門乃謂比干曰公有隂德今天錫君策以廣公之子因出懷中符䇿狀如簡長九寸凡九百九十板以授比干子孫佩印授者當如此算比干年五十八有六男又生三子本始元年自汝隂徙平陵代為名族明律令陳琳橋𤣥表琳明律令徴拜廷尉正宥所疑以隆易從之義魏志司馬芝字子華遷大理正有盜官絹置諸厠上者吏疑女工收以付獄芝曰刑罪之失失在苛暴今贓物先得而後訊其辭若不勝掠或至誣服誣取之情不可以折獄且簡而易從大人之化也不失有罪庸世之治耳今宥所疑以隆易從之義不亦可乎太祖從其議南土秀望晉中興書顧榮字彥先入洛以南土秀望纍遷廷尉正冬服單薄南史顧協初為廷尉正冬服單薄寺卿蔡法度欲解襦與之憚其清嚴不敢發口寺署臺按北史蘇瓊為廷尉正時畢義雲為御史中丞以猛暴任職理官忌憚莫敢有違瓊推察務在得情雪者甚衆寺署臺按始自於瓊也上應正論唐王志愔為大理正嘗奏言法令者人之隄防不立則人無所禁竊見大理官員多不奉法以縱罪為寬恕以守文為苛刻遂表上應正論以見正寺中二絶見廷尉門監前漢百官表廷尉有左右監秩皆千石後漢百官志廷尉左監一人魏志見正門晉職官志見正門隋百官志見正門後齊大理寺監一人六典見正門治巫蠱前漢邴吉字少卿稍遷廷尉監治巫蠱多所全活謝承後漢書陳咸為廷尉監執獄多恩議入常從輕比多所全活皆稱其恩增築訊堂晉起居注廷尉監陸鸞上表求增築訊堂圖畫先賢象詔許之丞隋百官志後齊九寺置丞各一人各有功曹五官主簿録事等員煬帝即位多所改革大理寺丞改為勾檢官增正員為六人判獄事唐百官志大理丞六人從六品上掌分判寺事六典丞六人從六品上晉武帝咸寧中曹志上書請廷尉置丞自此始也宋齊梁各一人第七品陳第八品後魏第七品大業三年改丞為勾檢皇朝置六人增為從六品國朝元祐官品令大理丞正八品大寶針唐張藴古太宗初即位上大寶針太宗嘉之賜以束帛除大理寺丞初河內人李好德素有風疾而語涉妄妖藴古究其獄稱好德癲病有徵法不當坐御史權萬紀劾藴古情在阿縱奏事不實太宗大怒曰小子乃敢亂吾法耶令斬於東市太宗尋悔因發制凡决死皆命所司五覆奏自藴古始歲斷獄萬七千人無寃訴者狄仁傑字懷英儀鳯中為大理丞周歲斷滯獄一萬七千人無寃訴者時武衛大將軍權善才坐誤斫昭陵柏樹仁傑奏罪當免職髙宗即令誅之仁傑曰陛下必欲變法請從今日為始臣不敢奉制殺善才陷陛下於不道帝意稍解善才因而免遇徐杜必生遇來侯必死杜景佺徐有功為司刑丞與來俊臣侯思止同理獄人稱之曰遇徐杜必生遇來侯必死寬平無寃濫李日知天授中纍遷司刑丞時用法嚴急日知獨寬平無寃濫嘗免一死囚少卿胡元禮請斷殺之與日知往復至於數四元禮怒曰元禮不離刑曹死囚終無生理答曰日知不離刑曹此囚終無死法竟以兩狀列上日知果直上十策陳邊事自契丹通和而天下弛武備邊候不謹天聖中大理寺丞石延年上書陳十策乞選練兵級言西夏必叛朝廷不以為然及元昊反上思其言召見稍用乞奉使河東籍兵回稱㫖上曰朕知卿有才久矣但聞卿好飲酒醉恐不能了事所以未用卿延年奏曰臣非好飲不得志而以自釋爾然臣雖醉其於臨事愈於不醉之人上喜其言賜五品服言太后不當聽政延年遷大理寺丞上書言天子春秋已盛太后不當聽政及奉使河東回得祕閣校勘司直六典司直六人從六品上後魏永安三年御史中尉髙穆奏置司直十人視五品𨽻廷尉位在正監上不署曹事唯覆理御史檢劾事北齊及隋因之並置十人從第五品下皇朝置六人降為從第六品上司直評事掌出使推按凡承制而出推長吏據狀合停務及禁錮者先請魚書以往據所受之狀鞫而畫之若詞有反覆不能首實者則依法拷之凡大理斷獄皆連署焉國朝元祐官品令大理司直正八品評事前漢百官表宣帝地節三年初置左右評四人秩皆六百石後漢百官志左平一人六百石本注曰掌評决詔獄缺祿薄其為缺員四人其務平之涿郡太守鄭昌上言聖王之法明刑者非以為理救衰亂之起也今明主躬垂明聽不置廷評獄將自正若開後嗣不若刪定律令律令一定愚人之所避就姦吏無所弄今不正其本而置廷評以理其末政衰德怠則廷評將招權而為亂首矣宣帝置左右評而三輔决録注云何比干漢武時為尉右評謬矣晉職官志廷尉屬官有評隋百官志梁廷尉有評後齊評一人隋大理寺右評一人唐百官志大理評事十二人從八品下六典評事十二人正八品下隋改曰評事皇朝因之天寶九載敕大理評事今後朝要子弟及至親中有未歷畿望縣者不得注授元和十五年敕減二人以增六丞之俸掌同司直國朝元祐官品令大理評事正八品獄無寃民三輔决録茂陵何比干漢武帝時丞相公孫𢎞舉為廷尉平獄無寃民號曰何公行能髙潔前漢馬宫字游卿行能髙潔遷廷尉平濟者甚衆晉中興書顧榮遷廷尉平時趙王倫欲誅淮南王元允官屬下廷尉議罪榮具明刑理不宜廣濫倫意解賴榮濟者甚衆上便宜十事臧榮緒晉書何攀字惠興上便宜十事除廷尉評諸葛冲見攀改蜀之志心有不悅及决斷疑獄冲乃服同惡相濟共為羅織唐則天時左臺御史中丞來俊臣司刑評事康晬衛遂忠等同惡相濟令人告事共為羅織公清之士何以勸杜暹授鄭尉以清節見知華州司馬楊孚公直士也深賞重之尋而孚遷大理正暹坐公事下法司結罪孚謂人曰若此尉得罪公清之士何以勸矣特薦之於執政由是擢拜大理評事反覆詰對執政無以奪唐新語敬昭道為大理評事時沂州有反者詿誤坐者四百餘人將𨽻於司寇未即路繫在州獄昭道授赦文判而免之時宰相責大理奈何免反人家口大理郡官失色引昭道以見執政怒而責之昭道曰赦云見禁囚徒反者家口繫在州獄缺執也反覆詰對至於五六政無以奪詿誤者悉免言語缺主簿隋百官志見丞門唐百官志大理寺主簿二人從七品上掌印省署抄目勾檢稽失六典主簿二人從七品上晉魏宋齊梁陳大理皆有主簿晉至陳俱二人正七品上皇朝因而降之職官分紀卷十九
