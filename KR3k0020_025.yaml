body:
  text: 職官分紀卷二十五宋孫逢吉撰内官前漢外戚傳漢興因秦之稱號帝母稱皇太后帝祖母稱太皇太后適稱皇后妾皆稱夫人又有美人良人八子七子長使少使之號至武帝制媫妤娙娥容華充衣各有爵位而元帝加昭儀之號凡十四等云昭儀位視丞相爵比諸侯王媫妤視上卿比列侯娙娥視中二千石比闗内侯容華視正二千石比大上造美人視二千石比少上造八子視千石比中更充衣視千石比左更七子視八百石比右庻長良人視八百石比左庻長長使視六百石比五大夫少使視四百石比公乗五官視三百石順常視二百石無㳙言無所不絜共和娯靈保林良使夜者皆視百石上家人子視有秩斗食云採擇良家子以入宫未有職號但稱家人子也斗食為佐使言一嵗不滿百石日食一斗二升後漢皇后紀論曰夏殷以上后妃之制其文略矣周禮王者立后三夫人九嬪二十七世婦八十一御妻以備内職焉后正位宫闈同體天王三夫人坐論婦禮九嬪掌教四徳世婦主知䘮祭賔客女御序于王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環佩之響所以能述宣隂化修成内則閨房肅雍險謁不行者也故康王晩朝闗雎作諷宣王晏起姜氏待罪齊桓有如夫人六人漢光武中興六宫稱號唯皇后貴人貴人金印紫綬奉不過粟數十斛又置美人宫人采女三等並無爵秩嵗時賞賜充給而已漢法常因八月筭人筭賦遣中大夫與掖庭丞及相工於洛陽鄉中閲視良家童女年十三以上二十以下姿色端麗合法相者載還後宫擇視可否乃用登御所以明慎聘納詳求淑哲明帝聿遵先㫖宫教頗修登建嬪后必先令徳内無出閫之言權無私溺之授可謂矯其弊矣向使因設外戚之禁編著甲令改正后妃之制貽厥方來豈不休哉晉后妃列傳夏商以上六宫之制其詳靡得而聞焉姬劉以降五翟之規其事可略而言矣周禮天子立一后三夫人九嬪二十七世婦八十一御妻以聽王者内政南史后妃傳六宫位號前史不同晉武帝采漢魏之制置貴嬪夫人貴人是為三夫人位視三公淑妃淑媛淑儀修華修容修儀媫妤容華充華是為九嬪位視九卿其餘有美人才人中才人爵視千石以下宋武帝省二才人其餘用晉制按貴嬪魏文帝所制夫人武帝初建魏國所制貴人漢光武所制淑妃魏明帝所制淑媛魏文帝所制淑儀修華晉武帝所制修容魏文帝所制修儀魏明帝所制媫妤容華前漢舊號充華晉武帝所制美人漢光武所制及孝武孝建三年省夫人置貴妃位比相國進貴嬪比丞相貴人比三司以為三夫人又置昭儀昭容昭華以代修華修容修儀又置中才人充衣以為散位按昭儀漢元帝所制昭容孝武所制昭華魏明帝所制中才人晉武帝所制充衣前漢舊制及明帝泰始二年省淑妃昭華中才人充復置脩華脩儀脩容才人良人三年又省貴人置貴姬以備三夫人之數又置昭華増淑容承徽列榮以淑媛淑儀淑容昭華昭儀昭容脩華脩儀脩容為九嬪媫妤容華充華承徽列榮凡五職亞九嬪美人才人良人三職為散役其後帝留心後房擬百官備置内職焉及齊高帝建元元年有司奏置貴嬪夫人貴人為三夫人脩華脩儀脩容淑妃淑媛淑儀媫妤容華充華為九嬪美人中才人為散職三年太子宫置三内職良娣比開國侯寶林比五等侯才人比駙馬都尉及永明元年有司奏貴妃淑妃並加金章紫綬佩于填玉淑妃舊擬九棘以淑為温恭之稱妃為亞后之名進同貴妃以比三司夫人之號不殊蕃國降淑媛以比九卿七年復昭容位在九嬪焉梁武撥亂反正深鍳奢逸配徳早終長秋曠位定令制貴妃貴嬪貴姬為三夫人淑媛淑儀淑容昭華昭容昭儀脩華脩儀脩容為九嬪媫妤容華充華承徽列榮為五職美人才人良人為三職東宫置良娣寶林分為二職及簡文元帝出自儲蕃或廹在拘置或逼于㓂亂且妃並先殂更不建椒閫陳武光膺天厯以朴素自居故後宫員位其數多闕文帝天嘉之後詔官職備員其所制立無改梁舊編之令文以為法然帝性恭儉而嬪嬙不備宣帝後主無所改作今總綴緝以立此篇云北史后妃列傳後魏漢孝文改定内官左右昭儀位視大司馬三夫人視三公三嬪視三卿六嬪視六卿世婦視中大夫御女視元士後置女職以典司視尚書令僕作司大監女侍中三官視二品監女尚書美人女史女賢人女書史書女小書女五官視三品中才人供人中使女生才人恭使宫人視四品青衣女酒女饗女食奚官女奴視五品及齊神武文襄俱未踐尊極神武嫡妻稱妃其所聘茹茹女稱為茹茹公主文襄既尚魏朝公主故無别號兩宫自餘姬侍並稱娘而已文宣一後庭雖有夫人嬪御之稱然未具貟數孝昭内職甚少唯楊嬪才貎兼美復是貴家襄城王母桑氏有徳行並蒙恩禮其餘無聞焉河清新令内婦依古制有三夫人九嬪二十七世婦八十一御女又凖漢制置昭儀有左右二人比丞相其𢎞徳正徳崇徳為三夫人比三公光猷昭訓隆徽為上嬪比三卿宣徽凝暉宣明順華凝華光訓為下嬪比六卿正華令則脩訓曜儀明淑芳華敬婉昭華光正昭寜貞範𢎞徽和徳𢎞猷茂光明信靜訓曜徳廣訓暉範敬訓芳猷婉華明範艷儀暉則敬信為二十世婦比從三七品穆光茂徳貞懿曜光貞凝光範令儀内範穆閨婉徳明婉艶婉妙範暉章敬茂靜肅章穆華慎妙儀懿明崇明麗則婉儀彭媛脩閑脩靜𢎞慎艶光漪容徽淑秀儀芳婉貞慎明艶真穆脩範肅容茂儀英淑𢎞艷正信凝婉英範懐順脩媛良則瑶章訓成潤儀寜訓淑懿柔則穆儀脩禮昭慎貞媛肅閨敬順柔華昭順敬寜明訓𢎞儀崇敬脩敬承閑昭容麗儀閑華思柔媛光懐徳良媛淑猗茂範良信艶華徽娥肅儀妙則為八十一御女比正四品武成好内並具其員自外又置才人采女以為散號後主既立二后昭儀以下皆倍其數又置左右娥英比左右丞相降昭儀比二大夫尋又置淑妃一人比相國後周氏率由姬制内職有序文帝創基脩衽席以儉約武皇嗣厯節情欲於矯枉宣皇外行其志内逞其欲溪壑難滿采擇無厭人厭苛政弊事實多文帝之祀忽諸特由於此隋文思革前弊唯皇后當室傍無私寵婦官位號未詳備焉開皇二年著内官之式略依周禮省减其數嬪三員掌教四徳視正三品世婦九員掌賔客祭祀視正五品女御三十八員掌女功絲枲視正七品又采漢晉舊儀置六尚六司六典逓相統攝以掌宫掖之政一曰尚宫掌導引皇后及閨閤廪賜管司令三人掌圖籍法式糺察宣奏典琮三人掌琮璽器玩二曰尚儀掌禮儀教學管司樂三人掌音律之事典賛三人掌導引内外命婦朝見三曰尚服掌服章寳藏管司飾三人掌簪珥花奩典櫛三人掌巾櫛膏沐四曰尚食掌進膳先嘗管司醫三人掌方藥卜筮典器三人掌彛器皿五曰尚寢掌帳帷牀褥管司筵三人掌鋪設洒掃典執三人掌傘扇燈燭六曰尚工掌營造百役管司制三人掌衣服裁縫典㑹三人掌財帛出入六尚各三員視從九品六司視勲品六典視外二品初文獻劉皇后功參歴試外預朝政内擅宫闈懐嫉妬之心虚嬪妾之位不設三妃防其上通自嬪以下置六十員時又抑損服章降其品秩至文獻崩後始置貴人三人増嬪至九員世婦二十七員御女八十一員貴人等闗掌宫闈之務六尚以下皆分隸焉煬帝時后嬪妃御無釐婦職唯端容麗飾陪從宴逰而已帝又參詳典故自製佳名著之於令貴妃淑妃徳妃為三夫人品正第一順儀順容順華修儀修容修華充儀充容充華是為九嬪品正第二媫妤一十二員品第三美人才人一十五員品正第四是為世婦寶林二十四員品正第五御女二十四員品正第六采女三十七員品正第七是為女御總一百二十以叙於宴寢又有承衣刀人皆趨侍左右並無員數視六品以下時又増置女官凖尚書省以六局管二十四司一曰尚宫局管司言掌宣𫝊奏啓司簿掌名録計度司正掌格式推罰司闈掌門閤管籥二曰尚儀局管司籍掌經史教學紙筆几案司樂掌音律司賔掌賔客司賛掌禮儀賛相導引三曰尚服局管司璽掌琮璽符節司衣掌衣服司飾掌湯沐巾櫛玩㺯司仗掌仗衛戎器四曰尚食局管司膳掌膳羞司醖掌酒醴醯醢司藥掌醫藥巫劑司膳掌廪餼柴炭五曰尚寢局管司設掌牀席帷帳鋪設洒掃司輿掌輿輦傘扇執持羽儀司苑掌園籞種植蔬菜𤓰果司燈掌火燭六曰尚工局管司製掌營造裁縫司寳掌金玉珠璣錢貨司綵掌繒帛司織掌織染六尚二十二司員各二人唯司樂膳貟各四人每司又置典及掌以貳其職六尚十人品從第五司二十八人品從第六典二十八人品從第七掌二十八人品從第九女史流外量局閒劇多者十人以下無定員數聨事分職各有司存焉唐書后妃𫝊唐因隋制皇后之下有貴妃淑妃徳妃賢妃各一人為夫人正一品昭儀昭容昭媛脩儀脩容脩媛充儀充容充媛各一人為九嬪正二品媫妤九人正三品美人九人正四品才人九人正五品寶林二十七人正六品御女二十七人正七品采女二十七人正八品其餘六尚諸司分典乗輿服御龍朔二年宫名改易内職皆更舊號咸亨二年復開元中舊𤣥宗以皇后之下立四妃法帝嚳也而后妃四星一為正后今既立正后復四妃非典法也乃於皇后之下立惠妃麗妃華妃等三人之位以代三夫人為正一品又置六儀六人為正二品美人四人為正三品才人七人為正四品尚宫尚儀尚服各二人為正五品自六品至九品即諸司諸典職員品第而序之後亦用前號新唐書后妃傳開元時以后下復有四妃非是乃置惠麗華三妃六儀四美人七才人而尚宫尚儀尚服各二人參合前號大抵踵周官相損益云六典内官春秋傳曰不腆先君之嫡以備内官又曰内官不及同姓杜預曰謂嬪御也周官有夫人九嬪世婦女御之位聽天下之内治漢晉以來雖有位號多不盡備隋氏法周官而悉置焉則夫人嬪媫妤美人才人寳林御女采女等充百二十位宫中有六尚以備衆職謂之宫官皇朝因之今上天徳溥施猶防女寵故首内官將以垂範而六尚仍舊妃三人正一品惠妃麗妃華妃婦徳婦容婦言婦功可以坐而論禮者則進無則闕焉其後復置貴妃夫人佐后坐而論婦禮者也其于内則無所不統故不以一務名焉六儀六人正二品周官九嬪之位也夏后氏因三夫人増以三三而九列九嬪之位漢初無聞至武帝始制媫妤娙娥容華充衣數不至九其位在嬪後魏孝文改定内官隋氏依周官盡定其名秩皇朝初因之今上制六儀之位以備其職焉掌教九御四徳其屬以賛導后之禮儀一淑儀二徳儀三賢儀四順儀五婉儀六芳儀美人四人正三品周官二十七世婦之位也殷人因九之嬪増以三九二十七列二十七世婦位也其制度増損累代不同漢十四等後漢貴人才人雖列位號不依世婦之職隋氏依周官制媫妤等二十七人皇朝初因之今復改制美人之位以備其職掌率女官修祭祀賔客之事才人七人正四品周官八十一女御之位也周人因二十七世婦増以三九二十七列八十一女御之位舊制沿革略同于上注隋氏依周官制寳林御女采女等皇朝初因之今上制改才人之位以備其職掌序燕寢理絲枲以獻嵗功焉國朝太祖始用五代之制置司簿掌宫中簿書出納之事又置司賔並封縣君又置樂使主宫中聲伎並賜裙帔太宗置尚宫及太監並知内省事充内宣徽南院使兼承㫖並司夲部或封國夫人郡夫人又署寳省尚食封縣君又置司寳司儀司給或授縣君郡君又樂使之下増置副使又改内省為尚書内省令尚宫太監並號尚書司給司簿同掌宫籍及司出給改祗候人為御侍衣服為司衣梳箆為司飾枕被為司寢湯藥為司藥樂使為仙韶使副使弟子呼供奉又置直筆書省主事改茶器為翰林局掌御閤為直閤掌宫門為直門掌燈火從物為直仗針線院為裁縫院又令司簿兼掌八寳司言兼監班司儀兼承宣掌寳司儀及仙韶使副使仍封縣君又司記知尚書省内公事而皆賜以裙帔真宗増置淑儀淑容順儀順容婉儀婉容並從一品在昭儀上又置貴儀在淑儀之上又置司宫在正四品尚宫之上辭輦前漢成帝逰于後庭嘗欲班媫妤同輦載媫妤辭曰觀古圖畫賢聖之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班媫妤注曰楚王好田樊姬為不食禽獸之内當熊孝元馮昭儀元帝即位二年選入後宫數至美人後五年就月館生男拜為媫妤建昭中上幸虎圏鬭獸後宫皆坐熊佚出圏攀檻欲上殿左右貴人等皆驚走馮媫妤直前當熊而立右左格殺熊上問人情驚懼何故當前熊媫妤對曰猛獸得人而止妾恐熊直至御座故以身當之元帝嗟嘆以此倍敬重焉傅昭儀等皆慙明年馮媫妤男立為信都王尊媫妤為昭儀作賦自悼班媫妤作賦自悼略云奉共飬于東宫兮託長信之末流共洒掃于帷幄兮永終無以為期媫妤為趙飛燕之譛求共飬太后于長信宫上許之作此賦貴傾後宫孝成趙皇后夲長安宫人初生時父母不舉三日不死廼収飬之及壯屬陽阿主家學歌舞號日飛燕成帝嘗微行出過陽阿主作樂上見飛燕而説之召入宫大幸有女弟復召入俱為媫妤貴傾後宫也封其父為侯廢許皇后欲立趙媫妤皇太后以出微甚難之乃立封其父臨為成陽侯後月餘竟立為皇后德冠後宫後漢明徳馬皇后馬援之小女初選入太子宫顯宗即位以為貴人常以皇嗣未廣毎懐憂歎薦達左右唯恐不及後宫有進見者每加慰納若素所寵引輙増隆遇永平三年春有司奏立長秋宫帝未有啓言皇太后曰馬貴人徳冠后宫即其人也遂立為皇后六劉之寵傾後宫三十國春秋劉聪納其太保劉殷女為后非禮夫禮者所以定親踈决嫌疑未聞娶不避宗無禮已甚無禮不亂未之見也于是使兼大鴻臚李𢎞更拜殷二女為左右貴嬪位在昭儀之上又納殷孫女四人為貴人位次貴妃之下于是六劉之寵傾後宫日角偃月之相順烈梁皇后年十三選掖庭相工見之驚日此日角偃月之相相之極貴後果然正位坤極有司奏立長秋宫以梁貴人冝配天祚正位坤極帝從之探籌順帝欲立皇后而貴人有寵者四人莫知所建議欲探籌以神定胡廣與尚書郭䖍史敞上䟽諫上從之帝卒不置后博選良家晉武帝博選良家女以充後宫先下書禁天下嫁娶使宦者乗使車給騶騎馳傳州郡召充選者使楊皇后揀擇后性妬惟取潔白長大其端正美麗者並不見留時卞藩女有美色帝掩扇謂后曰卞氏女佳后曰藩三世后族其女不可枉以卑位帝乃止司徒李𦙍鎮軍大將軍胡奮廷尉諸葛冲太僕臧權侍中馮蓀秘書郎左思及世族子女並充三夫人九嬪之列司冀兖豫四州二千石將吏家補良人以下名家盛族子女多敗衣瘁貎以避之乗羊車武帝多内寵呉平之後復納孫皓宫人數千自此掖廷殆將萬人而寵幸者甚衆帝莫知所適嘗乗羊車恣其所之至便宴寢宫人乃取竹葉挿户以鹽汁洒地而引帝車絳紗繫臂武帝多選良家子女以充内職自擇其美者絳紗繫臂謝莊為哀䇿都下紙貴宋武帝殷淑妃薨謝莊為哀䇿文奏之帝卧覧起坐流涕曰不謂當今有此才都下傳冩紙墨為之貴置鐘景陽樓舊顯陽昭陽二殿太后皇后所居永明中無太后皇后羊貴嬪居昭陽殿西范嬪居昭陽殿東寵姬荀昭華居鳯華栢殿中御居所夀昌畫殿南閤置白鷺皷吹二部乾光殿東西頭置鐘磬両廂皆宴樂處也上數逰幸諸苑囿載宫人從以内深隱不聞端門皷漏聲置鐘于景陽樓上應五皷宫人聞皷聲則早起粧飾碧絹蚊㡡崔祖思啓陳政事曰宋武節儉過人張妃房惟碧絹蚊㡡不立石誌齊武帝裴皇后建元元年為皇子妃二年薨諡穆妃塟休安陵時議欲立石誌王儉曰石誌不出禮起宋元嘉中顔延之為王球石誌素族無名䇿故以記行自爾以來共相祖習儲妃之重禮絶常例故有哀䇿不煩石誌從之半靣粧梁元帝徐妃以無容質不見禮帝三二年一入房妃以帝眇一目每知帝將至必為半靣粧以俟帝見大怒而出疣誌並㓕武帝丁貴妃生于樊城初産有神光之異紫氣滿室故以光為名相者云當大貴少時與鄰女月下紡績諸女並患蚊蚋而貴妃弗之覺郷人魏益徳將聘之未及成而武帝鎮樊城登樓望見漢濵五采如龍下有女子擘絖則貴妃也又丁氏因人以相者言聞之于帝帝贈以金環納之時年十四貴妃生而有赤誌在左臂療之不㓕又體多疣子至是無何並失所在以皇儲加敬丁貴妃及太子定位有司奏曰皇太子副貳宸極率土咸執吏禮既盡禮皇儲則所生不容無敬王侯妃主常得通信問者及六宫三夫人雖與貴嬪同列並應以敬皇太子之禮敬貴嬪宋元嘉媛中始與武陵國臣並以吏敬敬王所生潘淑妃路淑貴嬪于宫人雖非小君其義不異與宋泰豫朝議百官以吏敬敬帝所生事議正同謂宫僚施敬冝同吏禮請神獸門奉牋致謁年節稱慶亦同如此與儲作配率由盛則以婦踰姑彌乖從序謂貴嬪典章一與太子不異于是貴嬪備典章禮數同乎太子言則稱令貴嬪性仁恕及居宫接馭自下皆得其歡心不好華飾器服無珍麗未嘗為親戚私謁薨後簡文帝即位追崇同太后善候人主顔色陳後主張貴妃名麗華性聪慧才辨疆記善候人主顔色薦諸宫女後宫咸徳之又工獻媚之術以惑上後主怠于政事百司啓奏並因宦者進請後主置貴妃于膝上共决之因参訪外事人間一言一事貴妃必先知白之由是益加貴寵言無不行内外交納貨賄公行及隋軍尅臺城貴妃與後主俱入井隋軍出之晉主廣斬之于清溪中三閣陳張貴妃寵冠後廷後主乃于光昭殿前起臨春結綺望仙三閣髙數十丈並數十間其窓牖壁帶縣楣欄檻之類皆以沉檀香木為之又飾以金玉間以珠翠外施珠簾内有寳牀寳帳其服玩之屬瑰麗皆近古未有每微風暫至香聞數里朝日初照光映後廷其下積石為山引水為池植以竒樹雜以花藥後主自居臨春閣張貴妃居結綺閣龔孔二貴嬪居望仙閣並複道交相往來又有王季二美人張薛二淑媛袁昭儀何媫妤江脩容等七人並有寵逓代以逰其上以宫人有文學者袁大舍等為女學士後主每引賔客對貴妃等逰宴則使諸貴人及女學士與狎客共賦新詩互相贈答採其尤艷麗者以為曲調被之新聲選宫人有美色者以千百數令習而歌之分部迭進時以相樂其曲有玉樹後廷花臨春樂等其略云璧月夜夜滿瓊樹朝朝新大抵所歸皆美張貴妃孔貴嬪之容色張貴妃髪長七尺鬒黒如漆其光可鑑特聪慧有神采進止閒華容色端麗每瞻視眄睞光采溢目照映左右嘗于閣上靚粧畢臨軒倚檻宫中遥望飄若神仙不以八百萬市珠隋文獻獨孤皇后突厥嘗與中國交市有珠一篋價直八百萬幽州總管隂夀白后市之后曰非我所須也當令戎狄止冦將士罷勞未若以八百萬分賞有功者百寮閒而畢賀願為貓扼䑕喉唐初武后随太宗嬪御居感業寺髙宗復召入宫飬為昭儀有寵與王皇后蕭良娣逓相譛毁永徽中廢王皇后及蕭良娣皆為庻人囚之别院武昭儀令人皆縊殺之遂立昭儀為皇后尋追改王姓蟒氏蕭良娣為梟氏良娣初被囚大罵曰願阿武為老䑕吾作貓兒生扼其喉武后怒自是宫中不畜貓截手足投酒甕中王皇后蕭良娣既被囚武后令人杖之各一百並截去手足投于酒甕中曰今此二嫗骨醉骨醉上諫立宸妃高宗欲立昭儀武氏為宸妃來濟密表立諫曰宸妃古無此號事將不可武后既濟等懼不自安后乃抗表稱濟忠鯁請加賞慰而心實惡之揮翰立成太宗徐賢妃生五月而能言四嵗誦論語毛詩八嵗好屬文太宗聞之納為才人其所屬文揮翰立成詞華綺贍俄拜媫妤上䟽請封禪徐賢妃名惠妃上䟽曰昔漢武守文之常主猶登刻玉之符齊桓小國之庸君尚圖泥金之事望陛下推功損已讓徳不居億兆傾心猶闕告成之禮云亭佇謁未展升中之儀此之功徳足以咀嚼百王網羅千代者矣獻髪𤣥宗楊貴妃天寳九年妃忤旨送歸外第時吉温與中貴人善温入奏曰婦人智識不逺有忤聖情然貴妃久承恩顧何惜宫中一席之地上即令中使張韜光賜御饌妃附韜光回奏曰妾忤聖顔罪當萬死衣服之外皆聖恩所賜唯髪膚是父母所有乃引刀剪髪一繚附獻𤣥宗見之驚惋即使力士召還圖其形于别殿楊貴妃死𤣥宗乃令圖其形于别殿朝夕視之六宫師其徳行徳宗韋賢妃初為良娣貞元四年為賢妃上深重之六宫師其徳行太真𤣥宗武惠妃薨後宫數無可意者或奏楊𤣥琰女姿色冠代冝蒙召見時妃衣道服號曰太真既進見𤣥宗大悦貴妃有娣三人皆有才貎𤣥宗並封國夫人之號長曰大姨封韓國三姨封虢國八姨封秦國並承恩澤出入宫掖勢傾天下與冄從兄銛錡等娣妹昆仲五家甲第洞開僣擬宫掖每構一堂費踰千萬計𤣥宗每年幸華清宫國忠娣妹五家扈從每家為一隊貴妃父祖立私廟𤣥宗御製家廟碑文并書及禄山叛露檄數國忠之罪從幸至馬嵬誅國忠而六軍不散曰賊尚在蓋指貴妃也帝不獲已與妃訣遂縊死于佛堂國忠乃貴妃之從祖兄也宫官沿革見内官門六典宫官周禮宗伯世婦每公卿二人下大夫四人中士八人女府二人女史二人鄭𤣥云世婦后宫官也王后六宫女府女史女奴之有才智者魏明帝逰宴在内選女子知書可付信者為女尚書省奏事晉令有崇徳殿大監尚衣尚食大監並銀章艾綬二千石崇華殿大監元華食監都監上監銅印墨綬千石女史賢人恭人中使大使碧綸綬宋明帝留心後房擬外百官備置其職而齊梁陳不見後魏後周亦擬外官置内職隋文帝置六尚六書司六典以掌宫官之職六尚視從九品六司視勲品六典視流外二品煬帝改置六尚局職掌略同皆加其品秩一尚宫局管司言掌宣傳啓奏司簿主録計度司正主格式推罰司闈主門閤管鑰二尚儀局管司籍主經史教學司樂掌音律司賔主賔客司賛主賛相𨗳引三尚服局管司璽主琮璽符節司衣掌衣服司飾主湯沐巾櫛玩㺯司仗主仗衞戎器四尚食局管司膳主膳羞司醖主酒醴醯醢司藥主醫巫藥劑司饎主廪餼柴炭五尚寝局管司設主牀席帷帳鋪設洒掃司輿主輿輦傘扇執持羽儀司苑主園圃種梢蔬菜𤓰果司燈主燈火六尚功局管司製主營造六裁縫司寳主金玉錢貨司綵主繒帛司織主織主染尚十二人從五品六司二十八人從七品掌二十八人從九品女史流外量事而置多者十人皇朝内職多依隋制尚宫局尚宫二人正五品司記二人正六品典記二人正七品掌記二人正八品司言二人正六品典言二人正七品掌言二人正八品司簿二人正六品典簿二人正七品掌簿二人正八品司闈二人正六品典闈二人正七品掌闈二人正八品尚宫掌導引中宫總司記司言司簿司闈四司之官屬凡六尚事物出納文簿皆印署之司記掌印凡宫内諸司簿書出入録目審而付行焉典記掌記佐之餘司二佐准此女史掌執文書餘女史准此司言掌宣傳啓奏之事司簿掌宫人名簿禀賜之事司闈掌宫闈管籥之事尚儀局尚儀二人正五品司籍二人正六品典籍二人正七品掌籍二人正八品司樂二人正六品典樂四人正七品掌樂四人正八品司賛二人正六品典賛二人正七品掌賛二人正八品彤史二人正六品石氏星經女史一星婦人之微者周禮女史掌王后之禮職以詔后理内政統内官書令后之事