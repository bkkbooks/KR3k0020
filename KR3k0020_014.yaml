body:
  text: 職官分紀卷十四宋孫逢吉撰御史臺案此門之首原缺三行漢官解詁注云西京謂為御史府亦謂御史原缺四字京謂之御史臺亦謂之蘭臺寺而應劭原缺五字按原缺上御史臺此則當是廷尉呼為御史臺非原缺四字名也隋百官志梁國初建御史臺置大夫天監元年復曰中丞置一人屬官治書侍御史二人侍御史九人殿中御史四人又有符節令史員北齊御史臺掌察糾彈劾中丞一人治書御史二人御史八人殿中侍御史檢校御史各十二人録事四人領符節署令一人符璽郎中四人後周以為司憲府隋高祖置御史臺大夫一人治書侍御史二人侍御史八人殿中侍御史監察御史各十二人録事二人後魏延昌中王顯有寵於宣武為御史中尉請革選御史此後踵其事每一中尉則更置御史自開皇以後始自吏部選用仍依舊入直禁中煬帝增置謁者司𨽻二臺并御史為三臺開皇中御史直宿禁中至是罷其制又置主簿録事員各二人唐職官志御史臺秦漢曰御史府後漢改曰憲臺魏晉宋改曰蘭臺梁陳北朝咸曰御史臺武德因之龍朔二年改憲臺咸亨復光宅元年分臺為左右號左右肅政臺左臺專知京百司右臺按察諸州神龍復為左右御史臺延和中廢右臺光天二年復十月又廢大夫一員中丞二人侍御史四人主簿一人録事二人主事二人令史十七人書令史二十三人殿中侍御史六員令史八人書令史十八人監察御史十員殿中監一員少監三員丞二人主事二人令史四人書令史十二人亭長掌固各八人唐百官志御史臺大夫一人中丞二人侍御史六人殿中侍御史九人監察御史十五人光宅元年分左臺右臺左臺專知百司監軍旅右臺察州縣省風俗尋命左臺兼察州縣兩臺歲再發使八人春曰風俗秋日廉察兩臺御史有假有檢校有員外有試神龍初皆廢景雲四年以兩臺望齊糾舉苛察百僚厭其煩乃廢右臺延和元年復置歲中以尚書省𨽻左臺月餘而左臺復廢至德後諸道使府參佐皆以御史為之謂之外臺復有檢校裏行內供奉或兼或攝諸使下官亦如之㑹昌初升大夫中丞品東都留臺有中丞一人侍御史一人殿中侍御史二人監察御史三人元和後不置中丞以侍御史殿中御史監察御史主留臺務而三院御史亦不常備通典舊例御史臺不受訴訟有通辭狀者即於臺門候御史御史徑往門外收採知可彈者略其姓名皆云風聞訪知永徽中崔義𤣥為大夫始定受事御史人知一日劾狀題告人姓名國朝治平元年閏五月詔御史臺閣門十日一具文武細書班簿以進自今大書為册月上之周歷三臺後漢蔡雍以侍御史轉治書侍御史遷尚書三日之間周歷三臺三臺謝靈運晋書尚書為中臺御史為憲臺謁者為外臺是謂三臺其門北開北齊楊楞伽鄴都故事云御史臺在宮門西南其門北開取冬殺之義斯事久矣今東都臺門所以不北何者蓋欲變古之制或建造者不習故事耳龍朔中改司經局為柱房為東宫之憲府亦開北門以象御史臺其例明矣或云隋初移長安城造御史臺時以兵部尚書李員通檢校御史大夫欲於尚書省近故開北門非也籠架北省控制南司北魏崔暹為中尉尚書後牒索御史監選不與及暹架為僕射還索御史宋遊道判云崔僕射昔在憲司籠北省今居禮閣控制南司遂不與大夫前漢百官表御史大夫秦官應劭曰侍御史之率故稱大夫云臣瓉曰茂陵書御史大夫秋中二千石位上卿銀印青綬掌副丞相有兩丞秩千石一曰中丞亦謂中丞為御史中執法中丞在殿中蘭臺掌圖籍祕書外督部刺史內領侍御史十五員受公卿奏事舉劾按章成帝綏和元年更名大司空金印紫綬祿比丞相置長史如中丞官職如故哀帝建平二年復為御史大夫元壽二年復為大司空後漢百官志御史中丞一人千石本注曰御史大夫之丞也舊制監御史在殿中密舉非法及御史大夫轉為司空因别留中為御史臺率魏志建安置御史大夫不領中丞置長史一人隋百官志秦置御史大夫以二於相光武中興丞相與御史俱為三公梁御史臺置大夫隋煬帝降大夫階為正四品唐職官志御史臺大夫一員正三品秦漢之制御史大夫副丞相為三公之官魏晋之後多不置大夫以中丞為臺主隋魏中復大夫降為正四品武德令改從三品龍朔改為大司憲咸亨復為大夫光宅中分為左右臺大夫及廢右臺去左右字本從三品㑹昌二年十二月敕大夫秦為正卿漢為副相漢末改為大司空與丞相俱為三公掌邦國刑憲肅正朝廷其任既重品秩宜峻准六尚書例升為正三品著之於令唐百官志御史臺大夫一員正三品掌以刑法典章糾正百官之罪惡中丞為之二其屬有三院一曰臺院侍御史𨽻焉二曰殿院殿中侍御史𨽻焉三曰察院監察御史𨽻焉凡天下之人有稱寃而無告者與三司詰之三司謂御史大夫中書門下也大事奏裁小事專達凡有彈劾御史以白大夫大事以方幅小事署名而已有制覆囚則與刑部尚書平關行幸乘輅車馬為導朝㑹則率其屬正百官之班序遲明列於兩觀監察御史二人押班侍御史專舉不如法者文武官職九品以上及二王後朝朔望文官五品以上及兩省供奉官監察御史貟外太常博士日參號常參官武官三品以上三日一朝號九參官五品以上及衝當畨者五日一朝號六參官𢎞文崇文館國子監學生四時參凡諸生入朝及以恩追至者日參九品以上自十月至二月袴褶以朝五品以上有珂蕃官及四品非清官則否凡朝位以官職事同者先爵爵同以齒致仕官居上職事與散官勳官合班則文散官居職事之下武散官次之勳官又次之官同者異姓為後親王嗣王任文武官者從其班官卑者從王品郡王任三品以下職事者居同階品之上非任文武官者嗣王居太子太保之下郡王次之國公居三品之下郡公居從三品之下縣公居四品之下侯居從四品之下伯居五品之下子居從五品之上男居從五品之下以前官召見者居本品見任之上以理解者居同品之下本司參集者以職事為上下文武三品非職事官者朝參名簿皆稱曰諸公凡出不踰四面關則不辭見都督刺史都護既辭候㫖於側門左右僕射侍中中書令初拜以表讓中書門下三品以上及諸司長官謝於正衙復進狀謝於側門兩班三品以朔望朝就食廊下殿中侍御史二人為使涖之六典御史大夫一人從三品後周北齊並不置大夫而以中丞為臺主隋諱中依秦漢置御史大夫從三品大夫之職掌邦國刑憲典章之政令以肅正朝列中丞為之二凡天下之人有稱寃而無告者與三司詰之五代百官志御史大夫從三品㑹昌六年升為正三品九國志吳世家武善元年改御史大夫為御史大憲國朝官品令御史大夫正二品上誠知人前漢倪寬為御史大夫初梁相褚大通五經為博士時寬為弟子及御史大夫缺徴禇大自以得御史大夫至洛陽聞寬為之禇大笑及至與寬議封禪於上前大不能及退而服曰上誠知人寬為御史大夫以稱意任職故久無所用諫於上諫御樓船薛廣德為御史大夫直言諫諍上酎祭宗廟出便門欲御樓船廣德當乘輿免冠諫曰宜從橋陛下不聽臣言臣自刎以血汚車輪上不說張猛曰臣聞主聖臣直御史大夫言可聽上曰曉人不當如是耶乃從橋弄印高帝以御史大夫周昌為趙王相上持御史大夫印弄之曰誰可為御史大夫者孰視趙堯曰無以易堯遂拜之奏事日旰忘食張易為御史大夫每朝奏日旰天子忘食丞相但充位而已黑白分明薛宣以明習文法詔補御史中丞是時成帝初即位宣為中丞執法殿中外揔部刺史數言政事舉奏部刺史郡國二千石所貶退稱進白黑分明由是知名出為臨淮陳留二太守入中左馮翊遷少府月餘御史大夫子永卒谷永上疏曰御史大夫內承本朝之風化外佐丞相統理天下任重職大非庸材所能堪今當選於羣卿以充其闕竊見少府薛宣才茂行潔達於從政前為御史中丞執憲轂下不吐剛茹柔臣是用越職陳宣行能唯陛下留神考察上然之遂以宣為大夫內承風化佐統理才茂行潔達於政並上官府不敢當舊位杜延年字幼公周之子亦明法律為御史處大夫居父官府不敢當舊位坐卧皆易其論議無所拂于定國為丞相陳萬年為御史大夫與定國並位八年論議無所拂後貢禹代為御史大夫數駁議定國明習政事率常丞相議可長者張歐為御史大夫歐為吏未嘗言按人專以誠長者處官官屬以為長者亦不敢大欺上其獄事有可却却之不可不得已為涕泣面而封之其愛人也如此燕入奏事周昌為御史大夫嘗燕入奏事髙帝方擁戚姬昌還走髙帝逐得昌騎項問曰我何如主也昌曰陛下即桀紂主也於是上笑之然尤憚昌不好立名直不疑為御史大夫惟恐人之知其為吏迹不好立名亦為長者布被汲黯謂上曰公孫𢎞位在三公俸祿甚多然為布被此詐也上問𢎞𢎞謂曰有之夫九卿與臣善者無過黯然今日廷詰𢎞誠中𢎞之病夫以三公為布被者飾詐欲以釣名今臣𢎞位為御史大夫為布被自九卿以下至於小吏無差誠如黯言且無黯陛下安聞此言上以為有讓益賢之朝夕烏朱博為御史大夫府百餘區井水俱竭又其府中列柏樹常野烏數千棲宿其上晨去暮來號曰朝夕烏後去不來者數月長老異之注云史言此者著御史大夫之職當廢也召諸尚書問事哀帝以趙元為御史大夫召諸尚書問事質直貢禹為御史大夫列於三公自禹在位數言得失書數十上天子下其議雖未盡從然喜其質直焉宰相之副貢禹為大夫而華隂守丞嘉師古云守華隂縣丞者其人名嘉上封事言治道在於得賢御史官宰相之副九卿之右不可不選平陵朱雲兼資文武中正有知略可使以百官石秩試皆御史大夫以盡其能為三長史所譛張湯為御史大夫為三長史朱買臣等所譛帝使趙禹責湯禹至鎮湯曰今人言君皆有狀天子重致君獄欲令君自為計何多對為湯乃上言謝曰譛臣者三長史也帝追惜湯於是悉誅三長史為百寮率哀帝建平五年朱博奏請罷大司空以御史大夫為百寮率從之請削諸侯之地朝錯遷御史大夫請諸侯之罪過削其地奏上上令公卿列寮宗室集議莫敢難錯獨竇嬰爭之由此與嬰有隙去副封以防壅蔽漢雜記故事上書為二封其一曰副領尚書省者先發之有不善屏去不奏及魏相為御史大夫奏去副封以防壅蔽刀筆之吏臣執之漢武帝集武帝作柏梁臺詔羣臣二千石有能為七言詩者乃得上座御史曰刀筆之吏臣執之競為官政唐貞觀中李乾祐為御史大夫别置臺獄有所鞠訊使輒繫之由是自中丞侍御史以下各自禁入牢扉常滿開元中崔𨼆甫為御史大夫引故事奏以為不便逮掘去之帝謂曰卿為御史海內咸云稱職甚副朕之所委又憲司故事大夫以下監察御史競為官政略無承稟隱甫一切督責事無大小悉令咨决稍有忤意者便列上其罪前後貶出殆半羣寮側目羣寮側目上臺中無長官御史大夫李承嘉常召諸御史責之曰近日御史彈事不詰大夫禮乎衆不敢對監察御史蕭正忠進曰故事臺中無長官御史人君耳目比肩事主得自彈事不相關白若先白大夫而許則彈大夫不知白誰也承嘉默然朝彈暮黜薛謙光拜御史大夫時僧惠範恃太平公主權勢逼奪百姓店肆州縣不能理謙光特加彈奏或請寢之謙光曰憲臺理寃滯何所回避朝彈暮黜亦可矣清勤嚴猛李懷光為朔方軍都虞侯兼御史大夫性清勤嚴猛而敢誅殺雖親戚犯法皆不撓避獨朕意耳韋挺拜御史大夫太宗嘗謂挺曰卿之任御史大夫獨朕意耳左右大臣無為卿者卿勉之哉挺謝曰臣駑下不足以辱陛下髙位且臣非勳舊而超處藩邸故寮之上臣願後之以勸立功者太宗不許嘗大夫糞御史大夫魏元忠卧疾諸御史盡省之郭霸獨居後請視元忠便液以驗疾之輕重元忠驚悚霸曰大夫糞味甘或不瘳今味苦當即愈矣元忠剛直殊惡之以其事露朝士見侍御史坐不起韋挺為御史大夫見侍御史坐不起時馬周為監察韋恃性使氣略於知人馬以才幹特達志於善事韋猶作常人相處及韋為太常卿馬纍遷中書舍人太宗嘗欲復用韋在門下馬密陳其傲狠非宰相器遂寢十九年征遼擇人運糧馬云韋挺中粗使上然之竟以此敗馮几不起韋絲為御史大夫自以宿望兼重備歷臺職每中丞以下拜謁韋馮几不起在塗致禮曽不降乘而寮屬亦無以間焉耳目官固當特立韋思謙進御史大夫性謇諤顔色莊重不可犯見王公未嘗屈禮或以為譏答曰耳目官固當特立鵬鶚鷹鸇豈衆禽之偶奈何屈以押之兄弟並拜肅宗幸靈武李峴應召至行在拜扶風太守既收京師拜戶部尚書中京兆尹兼御史大夫時峴兄峘為武部侍郎成都尹兼御史大夫乾元初𤣥宗還京自蜀至又兼御史大夫兄弟俱判臺事自國初以來兄弟並拜大夫未見其比時長安士庶皆美之以名望召拜中外聳聽李光素微拜御史大夫自貞元中位缺久難其人至是光素以名望拜中外聳聽及居位亦無修舉但規求作相久之寖不得志見客必曰無以某官散踈也見屬官必先拜脂韋在列大失人望上書言不可使外戚强盛李景讓為御史大夫正色立朝時𤣥宗舅鄭光卒詔罷朝三日景讓上書言不可使外戚强盛乃罷朝兩日辟車要秩專席雄班中宗授楊再思檢校左臺大夫曰辟車要秩非德靡升專席雄班惟賢是屬烏臺峻秩蒼佩崇班蘇珦授右臺大夫制曰烏臺峻秩望揔鐵冠蒼佩崇班威髙石室誠副相之榮級實資卿之通任前岐州蘇珦詞吞楚澤量湛黃陂既光大厦之才堪入巨川之用西京展驥道掩題輿右輔憑熊風超露冕朱帷霧散初停州縣之勞白簡霜凝直屏權豪之氣迭為宰相通典漢御史大夫副丞相事若今日之同平章及參知機務之類所以漢書云薛貢韋匡迭為宰相薛宣韋賢匡衡皆至丞相而貢禹但為御史大夫中丞前漢百官表見御史大夫門後漢百官志御史中丞一人千石本注曰御史大夫之丞也周禮掌建邦之官刑以主治王官之政令干寶注曰若御史中丞漢儀曰丞相二千石為之或選侍御史高第執憲中司朝㑹獨坐內掌蘭臺督諸州刺史糾察百寮出為二千石漢官典職御史中丞三人故二千石為之朝㑹獨坐掌蘭臺諸州刺史糾察百寮韋昭辨釋名釋云御史中丞居中丞相者也辨云此中丞自御史中丞有二其人别居殿中舉不法故曰中丞漢舊儀御史中丞督司𨽻司𨽻督司直司直督刺史刺史督二千石以下漢官解詁注建武以來省御史原缺八字蘭臺十有五人特置中丞一人原缺十一字次尚書環濟要略御史中丞一人有石室以藏祕書圗䜟之屬以其居殿中故曰中丞晉職官志御史中丞本秦官也秦時御史有二丞其一御史丞其一為中丞中丞外督部刺史內領侍御史受公卿奏事舉劾按章漢因之及成帝綏和元年更名御史大夫為大司空置長史而中丞官職如故哀帝建平二年復為御史大夫元壽二年又為大司空而中丞出外為御史臺主歷東京至晉因其制以中丞為臺主宋百官志漢東京御史中丞遇尚書丞郎則中丞止車執板揖而丞郎坐車舉手禮之而已不知此制時省中丞每月二十五日繞行宮垣白壁史臣按漢志執金吾每月三繞行宫城疑是省金吾以此事並中丞中丞秩二千石南齊百官志御史中丞一人晉江左中丞司𨽻分督百僚傅咸所云行馬內外是也令中丞則職無所不察專道而行騶輻禁呵加以聲色武將相逢輒致侵犯若有鹵簿至相歐擊宋孝建二年制中丞與尚書令分道雖丞郎下朝相值亦得斷之餘內外衆官皆受停駐隋百官志梁國初建御史臺置大夫天監元年復曰中丞置一人掌督司百僚皇太子以下其在宫門行馬內違法者皆糾彈之雖在行馬外而監司不糾亦得糾之專道而行逢尚書丞郎亦得停駐其尚書令僕御史中丞各給威儀十人其八人武冠絳韝執壽儀囊在前題云宜官告以受辭訴一人緗衣執鞭杖依列行七人唱呼入殿引喤至階一人執儀囊不喤後齊中丞一人唐職官志御史臺中丞二員正四品下漢御史臺有二丞掌殿中祕書謂之丞漢末改為御史長史後漢復為中丞後魏改為中尉宫正北齊復曰中丞後周曰司憲中大夫隋諱中改為治書御史為從五品武德因之貞觀末避高宗名改為中丞置二員龍朔改為司憲大夫咸亨復為中丞本正五品上㑹昌三年十二月敕中丞為大夫秩崇官不常置中丞為憲臺長令九寺少卿考諸州國子司業京兆少尹并府寺省監之二皆為五品下唯中丞官重品秩未崇可升為四品下與丞郎出入迭用著之令唐百官志御史臺中丞二人正四品下大夫掌以刑法典章糾正百官之罪惡中丞為之二餘見大夫門六典中丞二人正五品上晋宋齊梁陳並以中丞為臺主品第四梁制十八班中丞班第十一後魏改中尉正三品太祖中為從三品北齊復曰中丞正三品後周秋官置司憲中大夫二人掌丞司冦之法以左右刑法蓋比御史中丞之職也隋省中丞官置御史大夫為臺主以治書侍御史二人代中丞之任歷代品秩並同惟北齊為從五品隋因之大業六年加至正五品八年又為從五品皇朝因之自後漢以來御史中丞皆一人皇朝因之五代史百官志㑹昌二年御史中丞正五品亦與大夫同特升為正品晉天福五年二月以御史中丞為清選正四品按唐典御史中丞五品上今始升之國朝咸平五年三月癸卯以右諫議大夫宋太初權管勾御史臺事甲辰御史臺上言右諫議大夫王化基先權中丞正衙常參立中丞磚位內殿起居日立本官班今宋太初以右諫議大夫權臺事請定立班制詔如王化基例官品令御史中丞正三品微文深詆史記臧宜為御史中丞幾二十年以微文深詆殺者甚衆稱為敢决執法殿中漢書陳咸為中丞總領州郡奏事課第諸刺史執法殿中公卿以下皆敬憚之百寮震栗東觀漢記樊凖字幼陵為中丞舉正非法百寮震栗三獨坐宣秉建武元年拜御史中丞上特詔與司𨽻校尉尚書令㑹同並専席而坐京師號曰三獨坐執憲奉法多所糾正謝承後漢書陳謙拜御史中丞執法奉憲多所糾正百寮所敬奉法按舉無回避續漢書馬嚴拜御史中丞賜冠幘衣服車馬嚴舉劾按掌申明舊典之奉法按舉無所回避百寮憚百寮嚴憚魏志黃初四年尚書令陳羣僕射司馬宣王並舉絶勛為宮正即御史中丞也帝不得已而用之百寮嚴憚罔不肅然勛以宫正忤上㫖左遷持書執法入為中丞魏略牛允字士宗世為宦族出為郡守入為御史中丞得直司之體魏鄭鮮之遷御史中丞明憲直繩甚得直司之體外王劉毅權重當時朝廷莫不歸附鮮之盡心高祖特不屈意於毅毅甚恨焉立朝正色宋荀伯子為中丞蒞職勤修有匪躬之稱立朝正色內外憚之凡所奏劾莫不深相呵毁或延祖稱其言切直又頗雜嘲戲故士人以此非之不阿權戚蕭惠開為中丞百寮畏憚之八年入為侍中其年詔曰惠開前憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞執法中司傅賢拜御史中丞執法中司百寮敬服與洛陽令分路魏氏春秋云故事御史中丞與洛陽令相遇則分路而行以土主多逐捕不欲稽留也正繩直筆晋周處字子隱為中丞奏征虜將軍石崇大將軍梁王䑣等正繩直筆權豪聚肅真可畏宗室敬王司馬恬字元愈為御史中丞值海西公廢太宗即位未解嚴大司馬桓溫屯中當夜吹警角恬奏劾溫大不敬請科罪明日溫見奏事歎曰此兒乃敢彈我真可畏也明法直繩內外震肅𫝊宣為御史中丞明法直繩內外震肅甚有威風忠亮至徑可謂王臣熊逺字孝文遷御史中丞中宗每歎其公忠謂逺曰卿在朝正色不茹柔吐剛忠亮至徑可謂王臣奏免尚書僕射十餘人劉暾兼中丞奏免尚書僕射等十真餘人朝廷嘉之遂以即請免刁協官晋中興熊逺遷御史中丞尚書郎盧綝入直遇尚書刁協大司馬門外協醉使綝避之綝以當直不肯回協令威儀牽綝隨馬至協車前而後釋逺奏上請免協官詔令白衣領職百官避路江左拜御史中丞不得役入尚書省中丞鹵簿至百官避路隘浡排擠溝中但得鹵簿者雖皆清道而中丞尤嚴白簡南史沈約為御史中丞彈奏王源文云源官品應黃紙輒奉白簡以聞又任昉為中丞彈曹景宗文亦云謹奉白簡以聞青箱王凖之自曾祖彪之傳聞多練悉朝儀自家世相傳並譄江左舊事緘之青箱世謂之王氏青箱學御史中丞為百寮所憚自彪之至凖之四世居此職四世居此職上朝士畏其筆端劉瑀恃性使氣上人為御史中丞甚得志彈蕭惠開云非才非望非勳非德彈王僧達云䕃籍高華人品沈末朝士莫不畏其筆端南司梁陸杲為御史中丞性鯁直無所顧望時山隂令虞眉在任賊汚百萬杲奏收劾之中書舍人黃睦之以眉事託杲杲不答梁武帝聞之以問杲杲曰有之帝曰識睦之否答曰不識其人睦之在御側上指示曰此人是也杲謂曰君小人何敢以罪人屬南司睦之失色奏劾尚書令宋孔琳之為御史中丞明憲直法無所屈撓劾尚書令徐羡之虧違典憲時羡之領揚州刺史琳之弟璩之為治中使璩之解釋於琳之使寢其事琳之不許曰觸忤宰相正當罪止一身汝必不應從坐何須勸我耶自是百寮震肅莫敢觸禁百寮震肅上近世獨步江淹為御史中丞明帝作相謂淹曰君昔在尚書非公事不妄行今為南司足以震肅百寮也淹於是中書令謝朏等及二千石大縣官長多被奏劾內外肅然明帝謂曰自宋以來不復有嚴明中丞君今日可謂近世獨步服章嚴肅若不可犯梁徐陵為御史中丞時安成王頊為司空以帝弟之尊權傾朝野直兵鮑僧睿假王威風抑塞詞訟大臣莫敢言陵乃奏彈之文帝見陵服章嚴肅若不可犯為斂容正坐陵進讀奏狀時安成王頊殿上侍立仰視文帝流涕失色陵遣殿中郎引王下殿自是朝廷肅然簮裾輻凑號龍門之逰任昉為御史中丞簮裾輻凑預其宴者殷藝到溉劉孺劉顯劉孝綽陸倕而已號曰龍門之遊雖貴公子孫不得預也清憲沈約辭中丞表云竊服清憲寒暑淹積公平無所阿附徐儉陵子有志操為御史中丞儉公平無所阿附尚書令江總望重一時為儉所劾後主深委任焉四葉居職王凖之為御史中丞為百寮所憚凖之及父納之並為中丞自彪之至凖之四葉居此職凖之常作五言詩范泰嘲之曰卿惟解彈事耳凖之正色答曰猶差卿世戴雄狐以廉介賜田五頃王恱之字少明宋明帝泰始中為黃門郎御史中丞上以其廉介賜良田五頃以為侍中白衣領職南齊陸澄為御史中丞齊建元二年驃騎沈憲等家奴客為劫子弟被劾憲等晏然左丞任遐奏澄不糾請免澄官澄上表自理言舊例無左丞糾中丞之義詔外詳議尚書令褚彥回檢宋以來左丞糾正而中丞不糾免官者甚衆奏澄謏聞庸見貽撓後昆上掩皇明下聾朝儀請以見事免所居官詔澄以白衣領職烏衣郎王僧䖍為御史中丞甲族由來多不居憲臺王氏分枝居烏衣者位微减僧䖍為此官乃曰此是烏衣諸郎坐處亦可試為爾三兒皆作沈仲興兄弟三人並歷御史臺中丞被憲者多結怨鄰家失火仲興母孔氏疑為人所焚大呼曰我三兒皆作中丞與人豈有善者得入車輻梁樂藹發江陵於船得入車輻如中丞健步辟道者至是果遷焉老虎晉崔鴻十國春秋前趙録段凱驍勇善射好讀書為御史中丞明筆直繩無所阿避號曰老虎權換廨宇陳睦繕拜中丞以父之所終固辭不許乃權換廨宇徙居之優而不尅王隱晋書庾峻為御史中丞優而不尅清直之人後漢髙恭之字道穆為御史中丞帝妹夀陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深以為恨訴於帝帝謂公主曰高尉清直之人彼所執者公事豈可以私懷責之也道穆後見帝帝曰一日家妹行路相犯極以為愧道穆免冠謝曰臣䝉陛下恩奉陛下法不敢獨於公主虧朝廷典章李生猶漢汲黯李彪遷御史中尉逺近畏之豪右屏迹髙祖常呼為李生又從容謂羣臣曰吾之有李生猶漢之有汲黯不揖省郎後魏宗室子思性剛暴恆以忠烈自許為御史中尉奏曰按御史令曰中尉督司百寮治書侍御史糾察禁內又云中尉出行王公百辟避路肅宗之世為臨洮舉哀故兼尚書左僕射元順不肯與名又不送簿故中尉臣酈道元舉而奏之而順復啓云尚書百揆之本令僕納言之責不宜下隸中尉送名御史臺尋亦䝉敕聽如其奏臣去月朔旦臺移尚書索應朝命帳而省稽留不送尋復移催忽為尚書郎中裴獻伯後注云按舊事御史中尉逢臺郎於後道中尉下車執板郎中車上舉手禮之以此而言明非敵體臣既見此深為怪愕即遣移問事何所依又獲尚書郎中王元旭執出蔡氏漢官似非穿鑿始知裴王亦規壞典謨臣按漢書宣秉為御史中丞典司𨽻校尉尚書令俱㑹殿廷並專席而坐京師號為三獨坐又尋魏書崔琰傳晋文陽傅嘏皆云既為中丞百寮震栗以此而言則中丞不揖臺郎蓋已久矣憲臺不屬都堂亦非今日又尋職令云朝㑹失時即加彈糾則官簿帳應送上臺灼然明矣又皇太子以下違犯憲制皆得糾察則令僕朝名宜付御史又亦彰矣詔從其奏仍為元天穆所停赤棒北齊皇宗琅琊王儼武成第二子初封陳平王拜開府御史中書監京畿大都督領軍大將軍領御史中丞遷大司徒尚書令大將軍録尚書事大司馬魏氏舊制中丞出清道與皇太子分路行王公皆遙駐車去牛頓軛於地以待中丞過或遲違則赤棒棒之自都鄴後魏此儀浸絶武成欲推寵儼乃使一依舊制儼初從北宮出將上中丞凡京畿步騎領軍之官屬中丞之威儀司憲之鹵簿莫不畢備帝與后在華林園東門外張幕隔清紗步障觀之遣中貴驟馬趣仗不得入自言奉敕赤棒應聲碎其鞍馬驚人墜帝大笑以為善更敕令駐車傳語良久觀者傾京色當使天下肅然齊王高澄用崔暹為中尉宋逰道為尚書左丞謂之曰卿一人處南臺一人處北省當使天下肅然歷五院唐尚書故事云臺儀自大夫以下至監察通謂之五院御史國朝歷踐五院者共三人李尚隱張延賞溫造也籠街喝道溫造為御史中丞左拾遺舒元褒上疏論之曰臣聞元和長慶中中丞行李不過半坊今乃逺至兩坊謂之籠街喝道但以崇高自大不思僣擬之嫌國朝政事供奉官街中除宰相外無所回避蔑朝廷典禮虞陛下侍臣中丞雖高法吏官也侍臣見陵是不敬法何以持繩時溫造遇左補闕李虞於街怒其不避捕祗承人决脊故元褒上疏論之自避三院憲府政事三院御史臺中大夫中丞自辟請命於朝獨孤朗為御史中丞時崔冕鄭居中不由憲長而陳授皆丞相之寮舊也敕命雖行朗拒而不納冕改太常博士居中分司東臺宰相銜之有所陳必於紫宸殿韓臯為御史中丞常有所陳必於紫宸殿對百寮而請未嘗詣便殿上謂之曰我與卿言於此不盡可來延英當與卿從容或無遺事親友咸謂臯曰自乾元以來羣臣啓事皆詣延英方得詳盡公何獨於外庭對衆官以陳之無失於慎密乎韓曰御史天下之持平也摧剛直枉唯在公共所言之事貴人知之奈何求請便殿避人切語以私國家之法且延英之置也肅宗以苗晋卿年老難步故語之耳後來臣寮得請便殿多以私自售希求恩寵欲正其身奈何以此為望哉守法賜金紫牛僧孺為中丞時宿州刺史李直臣坐贓當死直臣賂中貴人為之申理僧孺堅執不回穆宗面謂之曰直臣事雖僣失然此人有經度才可委之邊任朕欲貸其法僧孺對曰凡人不才止於持祿取容爾帝王立法束縛姦雄正為才多者祿山朱泚以才過人濁亂天下李直臣小才又何屈法哉上嘉其守法面賜金章紫綬兩罷李逢吉教人告􅐃隂事罷相逢吉欲用僧孺懼紳與德裕阻於禁中於是出德裕為浙西觀察使乃用僧孺為平章事以李紳為御史中丞兾離內職易掎托而逐之以吏部侍郎韓愈為京兆尹兼御史大夫放臺參知紳剛褊必與韓愈忿爭制出紳果移牒往來論臺府事愈復性訐言詞不遜大喧物論遂兩罷之愈改兵部侍郎出紳江西觀察使穆宗待紳素厚不悟逢吉嫁禍謂其心希外任令中使就第宣勞賜帶紳對中使訴且言為逢吉所排戀闕之情無已及中謝日面自陳訴帝方省悟乃改授戶部侍郎羅織經則天時酷吏來俊臣遷為左臺御史中丞朝廷纍息無交言者道路以目與侍史侯思止司刑評事康曄等同惡相濟招集無賴數百人各令其告事共為羅織千里響應又與其黨朱南山輩造告密羅織經一卷皆有條貫文節布置事狀由緒執奏不奉詔意薛存誠為御史中丞僧鑒虛者交結權幸招懷賂遺恃中人為城社存誠因事按鞫得姦贓數十萬上欲赦之存誠執奏不奉詔竟笞殺之不宜與泉貨吏雜處魏謨遷中丞兼戶部侍郎判李司事謨奏曰御史臺紀綱之地不宜與泉貨吏雜處乞罷中司專綜戶部公事從之裴度用崔從自代裴度為中丞奏崔從為侍御史度作相用從自代為中丞從氣貌孤峻正色立朝彈奏不避權幸事關臺閣或付仗內者必抗章論列請歸有司官屬選用宜得實才高元裕字景圭開成中改中丞風望峻整上言曰御史府紀綱之地官屬選用宜得實才其不稱者臣請出之監察御史魏中庸高𢎞簡並以不稱出為府縣之職奏進羡餘錢歸融兼御史中丞湖南觀察使盧周仁違敕進羡餘錢十萬貫融奏曰天下一家何非君上中外財賦皆陛下府庫也周仁輒陳小利妄說異端入財貨以希恩待朝廷而何淺臣恐天下放效以羡餘為名因緣刻剝生人受弊請行重責以例列蕃中外不繩而自肅孔緯字化文為御史中丞緯器志方雅疾惡如仇既總憲綱中外不繩而自肅纍負謗鑠魏元中聖厯元年為中丞前曽三被流放時人多稱其無罪則天嘗謂曰卿纍負謗鑠何也對曰臣猶鹿也羅織之徒有如獵者茍須臣肉作羮爾此輩殺臣以求達臣復何辜擢拜鳯閣侍郎真宰相武元衡遷御史中丞嘗因延英對罷德宗目送之指示左右曰元衡真宰相也持無私綱條悉舉人甚稱重臺綱正則朝廷理狄仁傑孫兼謨遷中丞謝日文宗謂之曰御史臺朝廷綱紀臺綱正則朝廷理朝廷正則天下理凡執法者大抵以畏忌顧望為心職業由兹不舉卿梁公之後自有家法其復為常人之心哉兼謨謝曰朝法或未得中臣固悉心彈奏父子三人清節不易盧奕懷慎之少子與兄奐齊名天寶十一年為中丞始懷慎及奐並為此官父子三人為中丞清節不易時人美之鸞鳯與鷹隼事異文宗謂宰臣曰丁居晦作中丞如何因悉數大臣而品第之歎曰宋申錫堪任此官惜哉又曰牛僧孺可為大夫宰臣鄭覃曰項為中丞未嘗摶擊恐無風望上曰不然鸞鳯與鷹隼事異上又曰居晦此官朕曽以時諺謂李白輩為四絶問居晦居晦曰此非君上要知之事常以此記得居晦今所以擢為中丞請僕射退位盧垣為中丞裴均為僕射在班躋位垣請退之均不受垣曰姚南仲為僕射例如此均曰南仲何人垣曰是正直而不交權幸者尋罷為右庶子時人歸咎於均兄弟並𨗳騶兩塗三國典略梁張綰字孝卿為中丞兄績為僕射元日朝㑹及百司就列兄弟並𨗳騶兩塗前世所未有時人莫不榮之糾太子不糾尚書傅咸奏司𨽻中丞得糾太子而不得糾尚書臣所未喻朝廷無以易之以法鞭皇太子傅梅陶叙余居中丞曽以法鞭皇太子傅親友莫不致誎余笑而應云堂高由陛皇太子所以崇於上由吾奉王者法吾豈枉道曲媚後皇太子特見延請賜以清宴禮之持憲平直九國志南唐江文蔚保大初遷御史中丞持憲平直無所阿枉宰相馮延已弟延魯與魏岑陳覺竊弄威權文蔚上疏彈之云云居風憲之地不宜持節藩邸後蜀范仁恕拜御史中丞時封建諸王以仁恕為䕫王册使仁恕以中丞居風憲之地不宜持節藩邸因請免時議韙之雍容端坐國朝太平興國九年詔御史府憲命所繫獄訟攸歸凡在官聨皆為要劇所宜謹恪以承重任豈可因循恣成縱弛如聞臺中鞫獄多事委之有司御史從容端坐養高自重而已故令羣吏為姦無所不至豈所謂徇公求理欽恤惟重之意乎今後凡有刑獄當批御史並須躬親訊問研究詞情不得信任胥吏仍令中丞及知雜御史常切糾舉振舉故事朝儀整肅滕中正權御史中丞頗振舉故事朝儀整肅搢紳以稱職許之親臨鞫問淳化四年詔獄無大小自中丞以下皆親臨鞫問不得專責所司謹畏孔道輔為中丞自兖州至京師凡二千里日具公裳幞頭席帽乘馬其謹畏如此及論廢郭后事天下聳聞風采天下聳聞其風采上愚民欽信道輔再為中丞初劉平戰沒言者以平降於賊上怒其家將族之平家人就闕訴寃道逢中丞騶唱遂攔其馬叫寃兩街賣飯人皆曰徒勞爾此中丞非孔中丞也其為愚民欽信如此朴謹非糾繩才皇祐中孫抃以右諫議大夫權御史中丞制下諫官論奏抃朴謹非糾繩才不合居此官抃手疏曰臣觀方今士人趨進者多謙讓者少以善求事為精神以能訐人為風采捷給若嗇夫謂之有議論刻深若酷吏謂之有政事諫官所謂才者豈謂是乎仁宗察其言趨視事面折林瑀賈昌朝為中丞侍講林瑀者用天子即位年月日傅㑹易卦以推吉凶昌朝因面折之退又疏瑀所推不經不宜侍上左右仁宗為罷瑀疏言浮華險薄王疇以右諫議大夫權御史中丞時諌官御史唐介等坐彈奏陳升之罷絀議者謂介等為小人逰談所誤疇疏言浮華險薄之徒往來諌官御史家持托人罪浸以成俗請出詔戒勵從之不肯以恩意假人杜衍為中丞自宰相而下畏之曰是不以恩意假人者也宰相而下皆畏上無如吾同姓上嘗言臺諌官須厚重知治體者方可選用御史中丞為紀綱之首須選老成者為之朕弄印久矣無如吾同姓槩及為中丞事不該理體者不言故止重之不大用以知制誥王疇文章雅正立朝嚴介擢為中丞以代槩厚重知治體上贈詩梁江總贈孔中丞詩曰我行五嶺表辭鄉二十年聞鶯欲動詠披霧即依然疇昔同寮寀今隨年代改借問藏書處唯君故人在故人名宦高清簡肅權豪誰知懷九歎徒然見二毛作針傅咸御史中丞針叙曰百官之針以針王闕余承先君之蹤初位憲臺懼有忝纍垂翼之責且造斯針以自朂勵不云自針而云御史中丞針者凡為御史中丞欲通以針之也詞曰煌煌天文宿星是環爰立執法其輝有煥執憲之綱秉國之憲鷹揚虎視肅清違慢蹇蹇匪躬是曰王臣既直其道奚顧其身身之不顧視有弗震邦國若否山甫是明焉用彼相莫扶其傾淮南搆逆實憚汲生赫赫有國可無忠貞憂責有在繩亦必直良農耘穢勿使能植無禮是逐安惜翅翼嗟爾庶寮各敬乃職無為罰先無怙厥力怨及朋友無慙於色得罪天子內省有恧是用作針惟以自敕此人不敢不憚王隱晉書敬王恬為御史中丞值海西廢太宗即位大司馬溫屯中堂警角恬劾大不敬請治罪明旦溫見奏歎曰此人不敢不憚辨禮法之過國朝蔡齊為中丞初明肅上仙議尊楊太妃為太后垂簾聽政議决召百寮賀御史中丞蔡齊謂臺吏曰若無御史中丞則可追班既有御史中丞誰敢追班乃前白宰相以辨失禮亂法之過執政不得已為損其禮上聞而嘉之執憲轂下不吐剛茹柔前漢谷永薦薛宣材茂行潔達於從政前為御史中丞執憲轂下不吐剛茹柔舉錯時當御史有言不先白中丞歸田録御史臺故事三院御史言事必先白中丞自中山劉子儀為中丞始榜臺中今後御史有言不須先白中丞至今如此留班廷爭東齊記事王安簡公為御史中丞嘗留百官班以廷爭張堯佐仁皇急遣使正之為罷堯佐宣徽景靈二使焉治書侍御史前漢百官表其治書尚符璽者有印綬比二千石以上皆銅印黃綬後漢百官志治書侍御史二人秩六百石本注曰常選用明法律者為之凡天下諸讞疑事掌以法律當其是非蔡質漢儀曰選御史高第者為之胡廣曰宣帝感路溫舒言秋季後請讞時帝宣室齊居而决事令侍御史二人治書治書御史起此後因别置冠法冠秩百石有印綬與符節郎共平廷尉奏事罪當輕重荀綽晉百官表注曰惠帝以後無所平治備位而已晉職官志按宣帝幸宣室齊居决事令侍御史二人治書侍側後因别置謂之治書侍御史蓋其任也及魏又置治書執法掌奏劾而治書侍御史掌律令二官俱置及晉惟治書侍御史四員泰始四年又置黃沙獄治書侍御史一人秩與中丞同掌詔獄及廷尉不當者皆治之後并河南遂省黃沙治書侍御史及太康中又省宋百官志治書侍御史掌舉劾官品第六以上魏晉以來則分掌侍御史所掌諸曹若尚書二丞也南齊百官志治書侍御史一人後魏百官志孝文帝太和八年治書御史第五品上在著作郎下尚書郎郎中上二十八年後次職今改為第六品上班在謁者僕射下隋百官志梁治書侍御史二人掌舉劾官品第六以下分統侍御史齊二人隋因之開皇官品令有治書侍御史一人為大夫之二從五品下班在尚書郎下大業三年官品正五品在著作郎下都水使者上五年又减為從五品在都水丞下臺中簿領皆主之即今之御史中丞六典唐貞觀中避髙宗諱省治書侍御史依前代置御史中丞縣官漫漫寃死者半風俗通項者廷尉多墻面而茍充兹位治書侍御史不復議讞里語曰縣官漫漫寃死者半三日周遷三臺後漢蔡雍以侍御史遷治書御史入遷尚書三日之間周遷三臺典行臺獄魏志王觀字傳臺明帝幸許昌召觀為治書侍御史典行臺獄時多倉卒喜怒而觀不稍為阿意順㫖協律令以備顧問郭演魏職品令云乘輿臨朝堂及諸處視事則治書侍御史協律令於階側以備顧問典詔晋高光少習家法明練刑理武帝置黃沙獄以典詔因以光歷世明法用為黃沙御史秩與中丞同歷世明法上手詔用之杜預為鎮南入辭口啓陳壽史才通博宜補黃散上曰壽可作治書否預對曰惟在聖詔即手詔用之執盛印青囊南史何思澄自廷尉遷治書侍御史宋齊以來此職甚輕天監初始重其選車前依尚書二丞給三騶執盛印青囊舊事糾彈印綬在前南奔謝幾卿梁天監中自尚書三公郎為治書侍御史舊郎官轉理為此職者謂之南奔幾卿頗失志多陳疾臺事略不復正已當官不憚强禦後魏高道恱拜治書侍御史正已當官不憚强禦奏舉任城王澄等免官高祖詔褒美之稱職隋梁毗字景和性剛蹇有學術開皇初置御史官朝廷以毗鯁正拜治書侍御史名為稱職當朝正色百寮敬憚栁彧字約文為治書侍御史當朝正色為百寮所敬憚上嘉其直謂彧曰大丈夫當立名於世無容容而已賜錢十萬米百石端笏整容左僕射楊素當塗貴重百寮懾憚無敢忤者嘗以小譴敕送南臺素恃貴重坐侍御史栁彧自外來於階下端笏整容謂素曰奉敕理公之罪素遽下彧據案而坐立素於廷辨詰事狀素由是銜之是歲持節巡省河北五十二州奏免長吏贓汚不稱者三百餘人州縣為之肅然百寮震栗榮毗陸知命並拜治書侍御史在朝侃然正色為百寮所憚時齊王􅀈頗驕縱昵近小人知命奏劾百寮震栗賜朝服一襲遊元字楚客兼治書侍御史宇文述軍敗帝令元理其獄述時貴幸勢傾朝廷遣家僮造元有所請屬元不之見也它日數述曰公地屬親賢腹心是寄當咎身責已以勸事君乃遣人相告欲何所道持之愈急仍以狀劾之帝嘉其公正於是賜朝服一襲出衆人意表劉子翊擢治書侍御史每朝廷疑議子翊為之辨析多出衆人意表時人稱其有量唐孫伏伽為治書侍御史先被內㫖而制未出歸卧其家無喜色頃之御史造門子弟驚白伏伽徐起見之時人稱其有量以比顧雍云侍御史前漢百官表御史大夫領侍御史員十五人哀帝元壽二年侍御史有繡衣直指師古曰衣以繡者尊寵之也出討姦猾治大獄武帝所制不常置後漢百官志侍御史十五人秩六百石以公府掾屬高第補之或牧守議郎郎中為之本注曰掌察舉非法受公卿羣吏奏事有違失舉劾之凡郊廟之祠及大朝㑹大封拜則一人監威儀有違失則劾奏蔡質漢儀曰其二人者更直執法省中者皆糾察百官督州郡法公府掾屬高第補之初稱守滿歲拜真出治劇為刺史二千石平遷補令見中丞執板揖應劭漢官儀侍御史周官也為柱下史冠法冠一名柱後以鐡為柱言其審固不撓也或說古有獬豸獸主觸不直故執憲者以其角形為冠爾余覽秦事云始皇滅楚以其君冠賜御史漢興襲秦因而不改漢舊儀御史員四十五人皆六百石其十五人衣絳給事殿中為侍御史宿廬在石渠門外餘三十人留寺理官事也晉職官志侍御史按二漢所掌凡有五曹一曰令曹掌律令二曰印曹掌刻印三曰供曹掌齊祀四曰尉馬曹掌廄馬五曰乘曹掌護駕豹尾之內便為禁省魏置八人及晉置九人品同治書而有十三曹吏曹課第曹直事曹印曹中都督曹外都督曹媒曹符節曹水曹中壘曹營軍曹法曹算曹及江左初省課第曹置庫曹掌廄牧牛馬市租後分庫曹置外左庫內左庫二曹宋百官志侍御史於周為柱下史周官有御史掌治令亦其任也秦置侍御史漢因之宋太祖元嘉中省外左庫而內左庫直云左庫世祖大明中復置順帝初省營軍併水曹省算曹併法曹吏曹不置御史凡十御史焉南齊百官志侍御史十人蘭臺置諸曹內外督令以下沈約宋書繡衣御史光武省順帝復置魏罷隋百官志梁侍御史九人居曹掌知其事糾察不法後齊侍御史八人隋因之煬帝增侍御史為正七品十三州志侍御史周柱下史秩六百石掌注記言行糾諸不法員十五人出有所按則稱使唐職官志侍御史四員從六品下御史之名周官有之亦名柱下史秦改為侍御史後周曰司憲中士隋有侍御史品第七武德品第六唐百官志侍御史六人從六品下掌糾察百寮及入閣承詔知推彈雜事凡三司理事與給事中中書舍人更直朝堂若三司所按而非其長官則與刑部郎中員外郎大理寺直評事往訊彈劾則大夫中丞押奏大事法冠朱衣纁裳白紗中單小事常服久次者一人知雜事謂之雜端殿中監察職掌進名遷改及令史考第臺內事顓決亦號臺端次一人知公廨次一人知彈分京城諸司及諸州為東西次一人知西推贓贖三司受事號副端次一人知東推理匭等有不糾舉者罰之以殿中侍御史第一人同知東推蒞太倉出納第二人同知西推蒞左藏出納號四推御史隻日臺院受事雙日殿院受事侍御史一人司東郡臺院凡御史以下遇長官於路去戴下馬長官斂轡止之出入行止殿中以下視以為法先後有罰入朝則與殿中侍御史隨仗分入東則居侍中黃門侍郎給事中之次西則居中書令侍郎舍人之次各居中丞大夫之下每一人東嚮承詔五日有㫖召御史不呼名則承詔者出樂彥瑋為大夫以嘗召兩御史乃加副承詔一人闕則殿中承乏監察御史分日直朝堂入自側門非奏事不至殿庭正門無籍天授中詔側門置籍得至殿庭開元七年又詔隨仗入閣分左右巡糾察違失左巡知京城內右巡知京城外盡雍洛二州之境月一代將晦即巡刑部大理東西徒坊金吾縣獄搜狩則監圍察斷絶失禽者其後以殿中掌左右巡尋以務劇選用京畿縣尉又置御史裏行使殿中裏行使監察裏行使以未為正官無員數唐法殿中侍御史遷拜及職事與侍御史均開元以降權屬侍御史而殿中兼知庫藏宫門內事故事御史臺不受訟有訴可聞者略其姓名託以風聞其後御史嫉惡者少通狀壅絶十四年乃定受事御史一人知其日劾狀題告事人姓名其後宰相以御史權重建議彈奏先白中丞大夫復通狀中書門下然後得奏自是御史之任輕矣建中元年以侍御史分掌公𪠘推彈自是雜端之任輕矣元和八年命四推御史受事周而復始罷東西分日之限主簿一人從七品下掌印及受事發辰核臺務主公𪠘及戶奴婢勳散官之職録事二人從九品下有主事二人臺院有令史七十八人書令史二十五人亭長六人掌固十二人六典侍御史四人從六品下周禮宗伯屬官有御史掌邦國都鄙及萬民之治令以贊冡宰凡治之者有法令焉以其在殿柱下間亦謂之柱下史皇朝置四人加從六品下又治內供奉員不過本數其遷改與正官資望亦齊舊制庶僕五分减一其崔隱甫為大夫俱奉裏行並月正給案令隔品致敬比者因循侍御史以下皆與大夫抗禮開元中八年敕重申明猶未之改李適之為大夫皆受拜時議是之掌糾舉百寮推鞫獄訟其職有六一曰奏彈二曰三司三曰西推四曰東推五曰贓贖六曰理匭凡有制敕付臺推者則按其實狀以奏之若尋常之獄推訖斷於大理五代史百官志晉天福三年三月御史臺奏按六典御史掌糾舉百寮推鞫訟獄居上者判臺知公𪠘雜事次知西推贓贖三司受事次知東推理匭敕宜依舊制遂以駕部員外郎兼侍御史知雜事劉皥為河南尹自是無省郎知雜者開運二年八月敕御史臺准前朝故事以郎中員外郎一人兼侍御史知雜事近年停罷獨委年深御史知雜振舉之紀剛未峻宜遵舊事廣叶通規宜復于郎署中選清慎强幹者兼侍御史知雜事國朝大中祥符四年詔自今御史須文學優長政事尤異者特加擢拜遇慶恩不得以它官轉入五年詔三院御史除出差外任及在京涖它局之外定以六員為制九年詔三院御史舊三年為滿者自今在臺供職並止二年若曾糾彈公事顯是修職候滿日特升陟如無振舉者當議比類對換别官外任差遣仍令本臺勘㑹在職事狀及有無公過指實以聞天禧二年三院御史並給御寶印紙厯録彈奏事慶厯五年殿中侍御史梅摯監察御史李京並為言事御史唐制御史不專言職故天禧中始置言事御史六員其後久不除至是始除之今御史臺中丞㕔之南有諌官御史㕔蓋御史得兼諌職也皇祐中仁宗宣諭宰臣曰諌官御史必用忠厚淳直通世務明法體之人以革浮華之弊自是詔舉御史必載帝語降敕官品令侍御史從六品論定律令史記趙禹武帝即位以刀筆吏積勞遷為侍御史與張湯論定律令作大篆程邈為獄吏得罪始皇幽繫雲陽獄十年從獄中作大篆少者增益多者損减方者使圎圎者使方秦始皇善之出為御史威振州郡前漢武帝末郡國賊盜羣起暴勝之為直指使者衣繡持斧逐捕盜賊督課郡國誅不從命威振州郡明習天下圖書張蒼為柱下御史明習天下圗書劾霍光專廢立嚴延年為御史大夫掾遷侍御史劾光專廢立亡人臣禮不道奏雖寢然朝廷肅焉敬憚戒子孫議法當依輕後漢陳寵曽祖父咸哀平間以明律為侍御史王莽篡位父子遂相將歸鄉里閉門不出乃以家中律令書藏之以俟聖主咸常敕戒子孫為人議法當依輕雖有百金之利無與人重安集洛陽杜詩為御史安集洛陽時將軍蕭廣放縱兵士暴橫民間百姓惶擾詩敕曉不改遂格殺廣還以狀聞世祖召見賜棨㦸驄馬桓典字公雅拜侍御史是時宦官秉權典執正無所回避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史埋輪張綱為御史時遣八使巡風俗皆耆儒知名多歷顯位唯綱年少官次最微餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸遂奏曰大將軍兾河南尹不疑蒙外戚之援荷國厚恩而專為封豕長蛇肆其貪心誠天威所不赦大辟所宜加也以頭軔乘輿車輪東觀漢記申屠剛字巨卿建武初拜侍御史遷尚書令蹇蹇多直無所屈撓隴蜀未平上嘗欲近出剛止不聽剛以頭軔乘輿車輪馬不得前持節使幽州李恂拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圗寫山川屯田聚落百餘卷悉封奏上肅宗嘉之察視之官鄭據字平卿建初五年辟司空府拜侍御史上疏曰臣據斗筲小吏擢在察視之官分當刺邪矯枉唯明詔端其前微臣謹其後昧死先以聞詔書示官府曰據剛正盡莭亦何陵遲之有其賜素六十匹由是顯名召見問以經書光武聞杜林選三輔乃召拜侍御史召見問以經書故舊及西周事甚悅之賜以車馬衣被奏請李大將軍罪陳翊拜侍御史元日朝賀大將軍梁兾威儀不整翊奏請收兾理罪時人竒之京畿稱宰相之才楊秉拜侍御史京畿咸稱其宰相之才觀覽風俗譙立為繡衣使者持節分於天下觀覽風俗所至専行誅賞與中丞趨舍不同華嶠後漢書何進辟孔融舉高第為侍御史與中丞趨舍不同託疾歸家橫劔當車續漢書种皓拜侍御史監護太子承光宫中常侍高梵受敕迎太子不齎詔書以衣車載太子欲出太子太傅高褒不知所以力不能止開門臨去皓至橫劔當車曰御史受詔監護太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾奸邪今日之事有死而已梵不敢爭刀筆吏漢雜事趙堯以刀筆吏遷侍御史白筆魏大㑹殿中御史簮白筆側殿而坐帝問此何官辛毗曰此謂御史舊時簮茟以奏不法當如今者直備位但毦筆耳注音餌視事畨直職品令侍御史無曹别所主唯參署臺內文案與殿中侍御史晝則分臺視事夜則畨直在臺斷長安大獄王𨼆晉書庾峻為祕書丞遍觀古今聞見益優長安大獄久不决轉為侍御史斷之朝野稱之用心厲正傅暢晉書劉毅子皎亦遵其家業用心厲正為侍御史正直有父風晉書劉毅子皎正直有父風為御史武庫失火尚書郭彰率百人自衛而不救皎正色詰之彰怒曰我能截卿角也皎勃然謂彰曰君何敢恃寵作威作福天子法冠而欲截角乎命紙筆奏之彰伏不敢言衆人解釋遂止姿貌威儀魏袁紹字本初有姿貌威儀能折莭下士士多附之太祖少與交以大將軍掾為侍御史督察萬里糾劾百寮北齊司馬子瑞為中丞選御史云周興鐡柱漢制繡衣簮白筆以繩違馭總馬而明目故能出則督察萬里入則糾劾百寮揚榷而言惟賢是寄必須名高河朔價重漢南諤諤清風翩翩妙技心焉匪石直也如絃有兼此者實所饑渴處法平當隋骨儀性剛鯁有不可奪之志開皇初為侍御史處法平當不為勢所回國之龜寶栁彧為侍御史當朝正色百寮敬憚上嘉之曰栁彧正直之士國之龜寶獨搖不須風栁調為御史僕射楊素嘗於朝堂見調因獨言曰栁調通體弱獨搖不須風調斂版正色曰信無取者公不當以為侍御史信有可取不應發此言公當具瞻之秩樞機不可輕發素甚竒之白鹿馴擾其廬陳孝慈以貞介知名為御史丁父憂去職喪居過禮有白鹿馴擾其廬時人以為孝感之應獬豸冠按禮圖曰法冠也一曰柱後惠文如淳注漢書云獬豸冠高五寸秦制也法冠服之按董巴注云獬豸神羊也蔡雍曰如麟應劭曰此獸主觸不直故執憲者為冠以象之秦滅楚以其君冠賜御史舉鞭聳揖唐御史遭長官戢轡辭而止焉乾封中王本立為御史意氣頗高塗遇長官端揖而已自是諸人或降而立或一足至地或側鞭弛鐙輕重無常開元以來但舉鞭聳揖而已尹避臺官王播為侍御史貞元末幸臣李實為京兆尹恃恩頗橫嘗遇播於塗不避故事尹避臺官播移文詰之烘堂凡上堂絶言笑有不可皆忍者雜端大笑則闔坐笑謂之烘堂烘堂不罰監奏御史大朝㑹則監察押班常參則殿中分班入閣則御史監奏蓋含元殿最逺用八品宣政其次用七品紫宸最近用六品白兔御史酷吏王𢎞義為左臺侍御史𢎞義常於鄉里求旁舍瓜主吝之𢎞義乃狀言瓜園中有白兔命人捕逐斯須園苗盡矣內史李昭德曰昔聞蒼鷹獄吏今見白御史膽落溫造字簡輿為侍御史李祐自夏州入拜金吾違制馬一百五十匹造正衙彈奏祐膽戰汗流謂人曰吾夜踰蔡州城擒吳元濟未嘗心動今日膽落於溫御史吁可畏哉獬豸不識字則天將不利於王室羅織之徒已興矣侯思止者雍州醴泉人告舒王及裴貞反周興按之並族滅授思止遊擊將軍高元禮呼之為侯大曰國家用人不次若言侯大不識字即奏云獬豸獸亦不識字而能觸邪則天果如其問思止以獬豸對之則天天授三年乃拜左臺侍御史皂鵰王忠愔為左臺侍御史執法剛正百寮畏憚時人呼為皂鵰言其顧瞻之吏皆如鵰鶚之視燕雀也前後坐族千餘家來俊臣則天時為侍御史按制獄素小不合意者必引之前後坐族千餘家清要李素立武德初為監察御史時有犯法者不至死高祖特令殺之素立諫止官之自是纍承恩顧尋丁憂高祖令奪情授一七品清要所司擬雍州司户參軍上曰此官要而不清又擬祕書即上曰此官清而不要遂擢授侍御史不樂搏擊之任御史中丞桓範舉楊嶠為御史嶠不樂搏擊之史任範曰為官擇人豈待情願遂引為左臺侍御碎首玉階王義方在職劾李義府曰碎首玉階素明臣節御史臺固可廢楊𤾉開元初遷侍御史時崔日知為京兆尹貪暴犯法暘與御史大夫李傑將糾劾之傑反為日知所搆暘奏曰糾彈之司若遭附㑹以成姦人之謀御史臺固可廢矣上以其言切直遂令傑依舊視事貶日知歙縣丞不能去姦邪於雙闕之前侍御史王義方廷奏義府犯狀帝怒出義方為萊州司戶而不問義府姦濫之罪義府云王御史妄相彈奏得無愧乎義方對云仲尼為魯司寇七日誅少正卯於兩觀之下義方任御史旬有六日不能去姦邪於雙闕之前實以為愧逺近聞授職欣然相賀徐有功為左臺侍御史則天褒異之時逺近聞有功授職皆欣然相賀後澗州刺史竇孝諶妻龎氏奴誣告給事薛季祖斷其罪當死有功獨明其無罪而李旭等反陷有功黨援惡遂奏付法當棄市則天覽奏召有功語之曰卿比斷獄失出何多對曰失出臣下之小過好生聖人之大德則天默然由是龎氏减死有功除名為庶人尋起為左司郎中廷劾李義府王義方遷侍御史時李義府執權用事婦人淳于氏有美色坐事繫大理義府悅之託大理丞畢正義枉法出之高宗重按其事正義自縊高宗特原義府之罪義方以義府姦蠧害政將加彈奏以問其母母曰昔王陵母伏劔成子之義汝能盡忠立名吾之願也義方乃廷劾義府高宗以義方毁辱大臣言詞不遜遷萊州司戶主聖臣直桞範為侍御史吳王恪好畋逰損居人田苗範奏彈之太宗謂侍臣曰權萬紀不能輔𨗳恪罪死範進曰房𤣥齡事陛下猶不能諌止畋獵豈宜獨罪萬紀帝怒拂衣起頃之召謂曰何廷折我範謝曰主聖則臣直陛下仁明臣敢不盡愚帝乃解動搖山嶽震懾州縣乾封中韋仁約除侍御史與公卿相見未嘗行拜禮或勉之對曰鵰鶚鷹鸇豈衆禽之偶奈何設拜以狎之且耳目之官故當特立乃曰御史銜命出使不能動搖山嶽震懾州縣誠曠職耳耳目之官上奉使陳遼東可平之狀賈言忠為侍御史時朝廷有事遼東言忠奉使住支軍糧及還高宗問以軍事言忠畫其山川地勢且陳遼東可平之狀高宗大恱又問諸將優劣言忠曰李績先朝舊臣聖鑒所悉龎同善雖非鬪將而特軍嚴整薛仁貴勇冠三軍名可振敵高侃儉素自處忠果有謀契苾何力沈毅持重有統御之才然頗有忌前之癖諸將夙夜小心忘身憂國莫逮李績者高宗深然之壞鄭注白麻李甘見宰相門㕔前兩株柏御史臺侍御史㕔前有兩株柏總章年李𤣥同張仁禕為侍御史所植也杜易簡為之贊云爰有貞柏來徙植清臺麝條霜徑蠶葉風開始逢鵲喜終見烏奏尉遲寶琳抑人為妾劉藏器為侍御史時衛尉卿尉遲帝寶琳抑人為妾藏器請還其父母既可其奏寶琳私奏乞之帝從之藏器復執奏帝又可之寶琳又請如是再三藏器進言曰法者海內之懸衡上下之所共若刑罰不中則人無所措手足陛下若用舍恣情愛憎由已則國之刑憲何所施陳今寶琳請陛下從之臣所執奏陛下亦從之今日從之明日又改之欲令下人何以遵奉夫人無信不立匹夫匹婦尚不可失信况為天子安可戲言今陛下二三其言處分不定臣恐四海之內無所適從帝竟從藏器所奏熒惑御史之象黃石公隂謀祕法熒惑火之精御史之象主禁令刑罰收補糾正南牀通典食坐之南設橫榻謂之南牀殿中監不得坐亦謂之癡牀言處其上者皆驕敖自得使人如癡又曰凡侍御史之例不得出纍月則遷登南省故號為南牀癡牀上名望素高九國志吳楊廷式為侍御史知雜事廷式强立忠直名望素高及為憲職人皆屬望雖功臣武將亦嚴憚之徐知誥輔政漸革貪弊張崇為廬州刺史好聚斂㑹廬江民訟其縣令掊刻者時議以崇難制使廷式往按之廷式謂知誥曰雜端推事其威至重職業不可不行也知誥曰君將若何廷式曰將械繫張崇使使往金陵簿責都統知誥曰所劾者縣令爾何至於是廷式曰縣令卑官也今取於民皆張崇使為之轉以獻都統爾豈可捨其大而詰其細乎知誥俯首謝之曰吾知小事不足仰煩乃止遷大理司直權貴為之斂手南唐髙越從子逺知雜事馮延已陳覺専國逺立朝清介權貴為之斂手言靈駕起發乞不拆民居國朝真宗永定靈駕將發山陵使自京至缺謝濤上言先帝毁之太后以為然御史知雜當有司造晉法駕行幸尚不壞民廬舍今遺詔從儉葬而象物侈大反欲壞民屋舍非先帝意也宜各裁減太后不從上時與太后坐閣中乃言曰城門靈駕所過卑者當毁民居不當毁太后然之案此注內原本共缺十七字禁絶拆磚皇祐中侍御史徐宗况奏頃年真州長蘆江口建佛剎時轉運使希當塗之㫖上言天長六合城壁皆五代設險之地請拆磚以修寺今後乞降朝㫖禁絶拆磚上曰城池設險雖亦故事然朕方恃德不恃險設或有大寇盜一小邑雖有城池亦不足禦卿為臺官為朕言取國家大事未幾出知潁州然亦依其所奏上之斷國體也如此宋羅江時又有侍御史宋禧上言乞宫中養羅江狗以備不虞上曰養兵百萬威制夷狄尚慮不可備不虞卿令宫中養狗無謂也㑹曹𨽻叔言朝言不及犬馬而禧被黜於是有宋羅江之號言事不尚沽激何郯天性鯁直歷三院御史言事不尚沽激頗有大體朝廷重之趣令就職治平元年新除侍御史知雜事吕誨以嘗言承㫖賈黯過失辭職黯奏曰諫官御史本為人主耳目一時公言非有嫌怨且誨初得御史乃臣與孫抃五人薦舉臣知其為人方正謹厚今兹擢用甚允衆望臣得與之共事必能協濟伏望趣令就職詔以喻誨遂就職奏對鄙俚席平為侍御史彈奏夏竦不當為樞密使及奏對鄙俚人皆以為笑辭兼判大理寺二年知雜吕誨奏風憲糾繩百司刑名出入當舉劾若令判大理寺則於體有妨望許辭免從之納敕中書二年知制誥韓維奏准敕舉御史緣臣近纍論奏乞追書復吕誨等所有御史未敢受詔閣門納敕中在言職少所建白二年尚書禮部郎中兼侍御史知雜事龔鼎臣為集賢殿修撰知應天府兼南京留守司鼎臣為宰相韓琦善翰林學士吳奎欲舉御史賈黯不肯奎爭不能得乃止既而以尚書都官員外郎受起居舍人知諌院未幾􅋟知雜事在言職少所建白其後上欲以王廣淵為諌官曰近歲諫官御史多不稱職如龔鼎臣乃未嘗言事至是出之光誨言事尤多上自即位委政大臣諫官御史言事者有司馬光吕誨傅堯俞趙鼎范純仁吕大防而光誨言事尤多嘗言王廣淵姦邪不可以直集賢院吕誨嘗論奏宰相韓琦五罪以為當罷去皆弗聽臺官用稀姓歸田録景祐中有郎官皮仲容者偶出街衢為一輕薄子所虧遽前賀云聞君有臺憲之命仲容立馬愧謝久之徐問何以知之對曰朝廷所制臺官必用稀姓者故以君姓知之爾蓋是時三院御史乃仲簡論程掌禹錫也聞者傳以為笑殿中侍御史晉職官志魏蘭臺遣二御史居殿中伺察非法即其始也晉置員四人江左置二人隋梁有四人掌殿中禁衛內事隋置殿內侍御史十二人煬帝省殿內侍御史員唐百官志殿中侍御史九人從七品下掌殿廷供奉之儀京畿諸司兵皆隸焉正班列於閣門之外糾離班語不肅者元日冬至朝㑹則乘馬具服戴黑豸升殿巡幸則往來門旗之內檢校文物虧失者一人同知東推監太倉出納一人同知西推監左藏出納二人為廊下食使二人分知左右巡三人內供奉隋末廢殿內侍御史義寧元年丞相府置察非掾二人武德元年改殿中侍御史武后文明元年置殿中裏行後專以裏行名官長安三年置內供奉六典殿中侍御史六人從七品上晉置四人東晉省二人梁陳不載品秩後魏初從五品太和末為從八品上北齊置十二人正八品隋開皇改為殿中侍御史置十二人正八品下煬帝三年省武德五年置四人正八品下貞觀二十三年加員品文明元年又置殿中裏行以楊啓王待徴為之國朝官品令殿中侍御史正七品久習內事山濤啓事以中書通事內使孫綝限滿久習內事宜補殿中侍御史詔可之則劣於侍御史也監燒鴆鳥晉中興書穆帝使殿中侍御史監燒鴆鳥括丁倍於本帳三國典略宋世良魏孝莊時為殿中侍御史詣河北括戶大獲遊隋至汲郡旁見有骸骨移書之至夜其雨滂沱孝莊勞之曰知卿所括得丁倍於本帳若官人皆如此是更生出於天下也糾劾不避威權唐張行成少師事河間劉炫勤學不倦炫謂門人曰張子體局方正廊廟才也為雍州富平縣主簿理有能名秩滿補殿中侍御史糾劾不避威權太宗以為能謂房𤣥齡曰觀古今用人必因媒介若行成者朕自舉之無先容也大臣不宜輕易王無競遷監察御史轉殿中舊例每日更直於殿前正班時宰相宗楚客楊再思常離班偶語無競前曰朝禮至敬公等大臣不宜輕易楚客等大怒轉無競太子舍人劾趙彥昭左道郭震在職劾刑部尚書趙彥昭等曰以女巫左道亂常託為諸妬以踐台階驅車造門著婦人之衣携妻就謁中孤子之禮請下獄四其御史郭霸為左臺殿中侍御史則天召見霸自陳忠鯁云往年征徐敬業臣願抽其筋食其肉飲其血絶其髓則天恱故拜為左臺侍御史時人號為四其御史接武夔龍簉羽鵷鷺上官儀進西臺侍郎同東西臺三品時以雍州司士參軍韋絢為殿中侍御史或疑非遷儀曰此野人語耳御史供奉赤墀下接武夔龍簉羽鵷鷺豈雍州判佐比乎時以為清言小事不足介意唐臨初為殿中侍御中大夫孫雲韋挺以朝列不整責臨臨曰此為小事不足介意請今之後革之明日江夏王道宗自以貴戚共韋挺對立語臨趨至曰王亂班臨彈王江夏答曰共公大夫語何至於是臨曰大夫亦自亂班韋失色而退諸人莫不悚動治獄至仁恕崔仁師貞觀初改殿中侍御史時賈州有男子謀逆有司捕支黨纍係填獄詔仁師按覆及至悉去囚械為具食飲湯沐以情訊之止坐魁惡十餘人他悉原縱大理少卿孫伏伽謂曰原雪諸家誰肯讓死就决而事變奈何仁師曰治獄主仁恕故諺稱殺人刖足亦皆有禮豈有知枉不申為身謀哉使吾以一介易十囚命故吾願也及劔使覆訊諸囚皆叩頭曰崔公仁恕必無枉者舉無異辭由是知名綴供奉班出入後唐天成中御史臺奏每遇入閣舊例只一員侍御史在龍墀邉祗候彈奏公事或南班失儀㸃校不及今欲依常例差殿中侍御史二員押鐘鼓位乃各綴供奉班出入識面臺官國朝皇祐中詔委御史中丞孫抃舉御史抃舉太常博士吳中復或云撲平生不識中復何由知之抃曰聞中復知犍為縣廢淫祠以禁民之非開河灘以通民之利又嘉州舊産紫什桶榴癭木等任於蜀者競探之以為器民甚苦之中復作嘉陽四詠詩以悼之及替還舟中並不載嘉陽一物其愛民廉謹如此使之立朝必不中茍且昔人恥為呈身御史今我豈薦識面臺官遂除殿侍御史言宰臣劉沆之過出知他州召還為侍御史內出姓名英宗治平二年以江東轉運判官尚書屯田員外郎范純仁為殿中侍御史太常博士權發遣三司鹽鐡判官吕大防為監察御史裏行近制御史有闕則命翰林學士與御史中丞知雜事迭舉二人而上自擇取一人至是闕兩員舉者未上內出純仁大防姓名而命之監察御史監察御史裏行檢校御史附前漢百官表秦有監御史掌監部漢省秩六百石漢舊儀惠帝六年相國奏遣御史監三部監者二嵗更常以十一月奏事十二月還監其後州置監御史宣帝時遣御史察計簿不實者監察之名兼取於此徐邈晉紀孝武帝太元中置檢校御史吳混之為之專掌行馬外事宋百官志右司隸知行屬外事晉江左置司隸之官故置檢校御史掌行馬外百官階次云檢校御史劣於殿中今置其職沈約宋書秦監御史古牧伯也與今不同齊職儀晉宋時有限外御史冠服同正員而無局任今裏行內供奉之類是也明慶年王本立余衡皆監察裏行自此始有其號後魏職品令太和末置檢校御史十二人宿直外臺不得入宿內省第九品上在律博士校書郎下北齊職品令檢校御史十二人從八品上員同殿中在尚書都令史太樂令上隋開皇官品令文帝開皇三年改檢校御史為監察御史十二員從八品上在尚書都事下大業三年改為正八品增置十六員八年進階從七品掌侍從出使檢校班在國之助教上唐職官志監察御史十員正八品上貞觀初馬周以布衣進用太宗令於監察御史裏行自此因置裏行之名龍朔元年以王本立為監察裏行唐百官志監察御史十五人正八品下掌察百僚巡按州縣獄訟軍戎祭事營作太府丞納皆蒞焉知朝廷左右廂及百司綱目凡十道巡按以判官二人為佐務繁則有支使其一察官人善惡其二察戶口流散籍帳隱沒贓役不均其三察農桑不勤倉廩减耗其四察妖猾盜賊不事生業為私蠧害其五察德行孝悌茂才異等藏器晦迹應時用者其六察黠吏豪宗兼并縱暴貧弱寃苦不能自伸者凡戰伐大克獲則數俘馘審功賞然後奏之屯田鑄錢嶺南黔府選補亦視功過糾察决囚徒則與中書舍人金吾將軍蒞之國忌齊則與殿中侍御史分察寺觀蒞宴財習射及大祠中祠視不如儀者以聞初開元中兼巡傳驛至二十五年以監察御史檢校兩京館驛大厯十四年兩京以御史一人知驛號館驛使監察御史分察尚書省六司繇下第一人為始出使亦然興元元年以第一人察吏部禮部兼監察使第二人察兵部工部兼館驛使第三人察戶部刑部嵗終議殿最元和中以新人不出使無以觀能否乃命顓察尚書省號曰六察官開元十九年以監察御史二人蒞太倉左藏庫三院御史皆領繁劇外府推事其後以殿中侍御史上一人為監太倉使第二人為監左藏庫使凡諸使下三院御史內供奉其班居正臺監察御史之上察院有計史三十四人令史十人掌固十三人六典監察御史十人正八品上蓋取秦監郡御史以名官後周秋官府有司憲府族下士八人隋煬帝大業八年又置御史百員從九品尋省蓋更卑於監察矣餘同唐志國朝咸平四年以太常博士張異為監察御史先是三院御史多出外任風憲之職用他官領之遂詔本司自薦屬官俾正名而舉職也嘉祐四年御史中丞韓絳舉御史而限次任屢舉不應格於是絳請舉裏行從之初以王陶為御史裏行熙寧三年除秀州軍事推官李定權監察御史裏行用選人為御史自定始也知制誥宋敏求當撰詞頭奏御史之官國朝以來其任頗重舊志領太常博士經兩任通判方許奏舉入臺去嵗驟用京官今又幕職官便升朝著峻處糾繩之地臣竊恐弗循官制之舊而未厭羣議所有詞頭未敢具草又以疾乞解職詔罷知制誥令送别官令草焉元祐官品令監察御史從七品御史雨唐顔真卿為監察御史充河西隴右軍試覆屯交兵使五原有寃獄久不决真卿至立辨之時天旱獄决乃雨郡人呼為御史雨三尺之法與天下共李素立武德初為監察御史時有犯法不至死髙祖特令殺之素立諌曰三尺之法與天下共之一法動搖則人便棄刑書臣忝法司不敢奉㫖高祖乃從之使還稱㫖陸元方為監察御史則天革命使元方安輯嶺外將涉時風濤甚狂舟人莫敢舉帆元方曰我受命無私神其害我遽命濟而風濤果息使還稱㫖稱職齊浣少以詞學稱中書令姚崇用為監察御史彈劾違犯光於風教當時以為稱職監祀舒元輿為監察御史天寶初𤣥宗祀九宮壇次郊壇行事御署祝板元輿監祀事以為太重奏曰臣伏見祀九宫貴神祝板九片陛下親署御名及稱臣伏以天子之尊除祭天太廟之外無合稱臣者父天母地兄日姊月其貴神九宫為目是宜分方而守其神位數其名號太一天一招搖軒轅咸池青龍太隂天符攝提也此九神於天地猶子男也於日月猶侯伯也陛下為天子豈可反臣於天地之子男邪臣竊以為過縱隂陽者流言其合祀則合稱皇帝遣某官致祭於九宮之神不宜稱臣與名臣雖愚瞽未知其可乞下禮官詳議從之事長如事端監察院長與同院禮隔語曰事長如事端送楊臨賀不顧犯難徐晦進士及第登直皆言極諌科授櫟陽尉自楊憑所薦及憑得罪貶臨賀尉交親無敢祖送者獨晦送至藍田與憑言别時宰相權德輿與晦交分最深知晦之行因謂晦曰今送臨賀誠為厚矣無乃為纍乎晦曰自布衣受楊公之眷方兹流播爭忍無言而别如此他日相公為姦邪所譛失意於外晦安得與相公輕别德輿嘉其直遂大稱之於朝不數日御史中丞李夷簡請為監察晦曰平生不踐公門何見奬拔夷簡曰聞君送楊臨賀不顧犯難肯負國乎由是知名劾來俊臣五罪紀履忠在職劾中丞來俊臣五罪一專擅國權二誅害忠良三贓賄貪濁四失禮教五淫昏狼戾請下獄兄弟並居憲府楊假楊收並遺直之子假自浙西觀察判官入為監察御史收亦白西川入為監察足弟並居憲府時為新例究理詳細趙㳙永泰初為監察御史時禁中失火與東宮稍近代宗深疑之涓周歷壖囿按據迹狀乃上直中官遺火所致也德宗時在東宮常感涓之詳細及刺衢州年考既深與韓滉不相得滉奏免㳙官德宗見其名謂宰臣曰豈非永泰初御史趙㳙乎對曰然即拜尚書左丞察長忿其踈縱栁渾為監察御史性放曠不甚檢束察長忿其踈縱渾不樂乞外任執政惜其才奏為左補闕越次請往案覆李尚𨼆景龍中為左臺監察御史時睦州刺史馮昭泰誣奏桐廬令李師等二石余家稱其妖逆詔御史按覆諸御史憚昭泰剛愎皆稱病不敢往尚𨼆歎曰豈可使良善陷枉刑而不為申明哉遂越次請往按覆競推雪李師等免之卷簾與語張嘉貞長去中侍御史張循憲為河東採訪事薦嘉貞材堪憲官請以已之官秩授之則天召見垂簾與之言嘉貞奏日以臣草芥而得入謁九重是千載一遇咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遂令卷簾與語大悅擢拜監察御史固請為僧王守慎有美名垂拱中為監察御史時羅織事起守慎舅侍即張知黯推詔獄奏守慎同知其事守慎以疾辭固請為僧則天初甚怪之守慎陳請詞理甚高則天欣然從之賜號法成識鑒高雅為時賢所重以壽終明目張膽韋思謙云大丈夫當正色之地必明目張膽以報國恩終不能為碌碌之臣保妻子耳埋金郭䖍􅗕在職舉史獻吏執事詔杜暹按之獻遺金於暹暹受之埋於幕下及去乃移牒收取之剛正蕭至忠為宰相蘇味道贓汚御史大夫李承嘉嘗召諸御史責之曰近日彈事不咨大夫禮乎衆不敢對至忠進曰故事臺中無長官御史人君耳目比肩事主得各自彈不相關若先白大夫而許彈事如彈大夫不知白誰也承嘉默然而憚其剛正奏宗楚客崔琬為監察御史彈奏宰相宗楚客紀處訥等驕恣跋扈請收劾之舊制大臣有被御史彈者皆俯僂趨出待罪朝堂楚客瞋目作色稱以忠鯁被誣中宗令琬與楚客約為兄弟時人竊歎焉有李勉始知朝廷尊李勉將監察御史屬朝廷左武勳臣恃寵多不知禮大將管崇嗣於行在朝堂背闕而坐言笑自若勉劾之拘于有司肅宗特原之歎曰吾有李勉始知朝廷尊矣切諫盤逰穆宗即位監察御史楊虞卿以帝頻出盤逰上疏切諌疏奏令中使宣付宰臣云虞卿所上議切直可覽後宰臣令狐楚蕭俯段文昌延英奏事因以納諌為賀上疏言營建佛像張廷圭為監察御史則天幸興泰宫欲於白司馬坂營建佛像廷圭上疏曰佛者以覺知為義因心而成不可以諸相見故經云若以色見我以音聲求我是人行邪道不能見如來以明如來之果不可外求也陛下信心歸依發宏誓願壯其塔廟廣其尊容已遍放天下久矣蓋有住於相而行布施非最上第一之法何以言之經云若人滿三千大千世界之寶以用布施其福甚多若人於此經手受誦讀乃至四句偈等為人演說其福勝彼如佛所說陛下傾四海之財殫萬人之力窮山之木以為塔極冶之金以為像雖勞則甚矣費則多矣而所獲福緣不愈於禪房之匹夫沙門之末學受持精進端坐思惟理亦明矣臣竊為陛下小之今陛下廣𣗳熏修又置精舍則經云菩薩作福不應貪著蓋有為之法不足高也况以營建事諸土木或開發盤礴峻築基陛或塞川澗通轉採斫輾壓土蟻動盈巨億豈佛標坐夏之義愍蠢動而不忍害其生哉又役鬼不可惟人畏營校計工匠率多貧窶朝驅暮役勞筋苦骨蕇食瓢飲晨炊星飯饑渴所致疾疫交集豈佛標徒行之義愍畜獸而不忍殘其力哉又營築之資僧尼是稅雖乞丐所致而貧闕猶多郡縣科斂逼迫星火或謀計靡所或鬻賣以充怨聲溢路和氣未洽豈佛標隨喜之義愍愚䝉而不忍奪其産哉且邊朔未寧軍裝日給天下虛竭海內勞弊竊惟陛下慎之重之思菩薩之行為利益一切衆生應如來布施則所謂不住色布施不住聲香味觸法布施故其福德若東南西北四維上下虛空不可思量矣何為勤於住相凋蒼生之業崇不急之務乎臣以時政論之宜先邉境蓄府庫養人才臣以釋教論之則宜救苦厄滅諸相崇無為伏望陛下察臣之愚行佛之意務以理為尚不以人廢言幸甚則天從其言即停作諫造奉天宮李善感為監察御史裏行永淳初造奉天宮於嵩陽縣又於藍田造萬全宮善感諌曰自古帝王莫不以登封告成為盛事天皇已封泰山告太平致祥瑞則與三皇五帝比隆矣但數年以來菽粟不稔百姓餓死道路相望兼四夷交侵日有調發天皇宜恭默思道以禳災譴方更營造宮室勞役不已天下聞之莫不失望臣聞不矜細行終纍大德臣忝在御史是國家耳目竊以此為憂帝雖優容之竟不納其奏善感頗涉經學承平日久諌諍殁絶善感既進諌時人以此稱職分路檢察李憕字文融為御史括田戶奏知名之士崔舉逸咸廙業宇文順于孺卿李宙及憕為判官攝監察御史分路檢察以課並遷監察御史有至行國朝天聖中以太常丞桑慥為監察御史慥有至行朝廷聞其名而特命之內出姓名見殿中侍御史門真御史工部侍即薦張錫為御史言丁謂不當從內地昭應災不當以罪人京師之人皆曰張御史貌柔和而心剛正真御史也貌柔和而心剛正上督軍御史晉職官志光武建武初征伐四方始權置督軍御史事竟罷東晉孝武太元六年復置隋煬帝時有監軍御史符節御史前漢百官表其治書符璽者有印綬比二百石以上皆銅印黃綬漢官儀尚璽四人據史趙堯為符璽御史蓋尚璽者也晉職官志符節御史秦符璽令之職也漢因之任次御史中丞掌綬節銅武符竹使符及泰始中武帝省併蘭臺置符節御史掌其事焉防禁御史晉職官志按魏晉官品令又有防禁御史第七品蘭臺之職也主簿六典主簿一人從七品下漢書張忠為御史大夫署孫寶為主簿魏晉以下無聞隋大業三年始置御史臺主薄二員皇朝省一員掌印及受事發辰勾檢稽失兼知官厨及黃卷通典大唐置一員掌付事勾稽省署抄目監印給紙筆其俸祿與殿中御史同武德末杜淹為大夫以吏部主事林懷信為之貞觀中自張𢎞濟為此官之後遂為美職管轄臺中雜務公𪠘厨庫檢督令史奴婢配勳散官職事每食則執黃卷書其譴罰推直官推勘官國朝侍御史殿中侍御史監察御史共六員或闕及蒞中外之任則以常參官為推直官內二員為左右巡使掌期㑹常參分糾違失及文武常參班簿祿料假告凡文官違失右巡主之武官違失左巡主之舊以臺史巡察咸平四年始令左右巡使分其職又有監察使掌祠祭受誓戒致齊檢視彈糾左右巡監祭之外又有廊下使入閣監食使監香使掌國忌行香二使臨時充通謂之五使其推直有四曰臺一推臺二推殿一推殿二推凡京師外推則左右巡使左臺鞫劾及出則皆推直御史三院闕則他官權充推直官淳化初嘗置推勘官二十員分讞天下大獄咸平元年以十員為額後罷三京留司御史臺唐制自中丞以下元額七員中丞侍御史各一員殿中侍御史二員監察御史三員元和十三年後但以侍御史殿中侍御史監察御史共主留務三院御史亦不常備焉國朝西京於分司官內差一員權闕即差官權掌判南京上令留守通判權掌後北京置臺專差官領今則三京皆有正官領之大中祥符七年詔西京留守司御史臺今後行香拜表不以官班高下止以知府兼留守為首天禧四年以翰林學士承㫖兵部侍郎知制誥朝迥為主部尚書集賢院學士判西京留司御史臺他官止云權而迥云判以三品故也熙寧二年詔三京留司御史臺添權判或管勾官一員理檢使國朝淳化三年罷院在宣德門外西北廊鼓院之西令登聞鼓司進狀人有稱寃濫沈屈者即引送理檢院審問至三年廢天聖七年置理檢使以御使中丞充匭匣為檢匣詔於鼓檢院側近别置理檢院登聞鼓院國朝鼓在宣德門南街之西廊院在外門西之北廊舊曰鼓司景德四年五月改今名凡文武臣僚閣門無例通進文字者諸色人進狀並先經登聞鼓院除告軍機密事及論訴在京臣寮即依例實封如進入後審狀有異同虛妄及夾帶他事並科遣置之罪所論事重依格敕施行仍令進狀人别寫劄子節略要切事件連粘於所進其餘所進文字並先拆開看詳定奪或有原本文字照證速牒合屬司分取索若事合施行及所進利濟有可觀採便通進若顯有違礙不可施行即當日內告示本人知委不識字者許陳白紙據所論事件判院官當面抄劄詣實口詞仍當日據收接到所進文狀都數逐件開坐行與不行因依具單狀聞奏若進狀并遇白紙人稱鼓院看詳不盡情理即許經登聞檢院進狀披訴仰檢院詳酌事理若鼓院所定不行為當即具不具為當緣由判押審狀與進狀人收執如鼓院所定不當即具不當事件並元進狀繳連進呈其收接所進大狀亦於當日內具都數開坐行與不行因依單狀聞奏其披訴人即時判審狀給付即許於御史臺陳訴其登聞鼓院檢院委實行遣不當者方得接駕及繳所判審狀披訴當付所勘鞫如披訴得實判鼓檢院官必行朝典如是虛妄本人科上書不實之罪未經鼓院進狀檢院不得收接未經檢院不得接駕進狀違者依法科罪判院官二人舊以內臣勾當至道三年改用朝臣而未有主判之名景德四年始命左正言知制誥周起太常丞直史館路振同判以內品為監門不得關預公事監鼓內侍二人令史一人登聞檢院唐置匭國朝太平興國九年改匭為檢東延恩曰崇仁南招諫曰思諌西申寃曰申明北道𤣥曰招賢改匭院為登聞院院在宣德門東廊之北景德四年五月改為登聞檢院是月敕如急速文字畫時進入常程文字一例每五日一次於檢內通進天聖七年上因讀唐史見匭函達下民寃枉之事乃謂左右曰天下九州之大豈無寃枉之人若至京師檢院鼓院雪者必是州縣官吏提㸃刑獄轉運使不能理雪又若不為申理則赤子無告矣乃置匭函仍專命御史中丞為理檢使應諸色人陳竒巧法術邪妄干正道事不得上言及常程公事自原缺人來體式令逐出官司并鼓院收接外如有指陳原缺三字事朝政得失大段寃枉纍經訴理未獲辨明或事干機密並許詣匭函投進內委是急速文字晝時進入其餘並每五日於檢內進納如無亦具單狀聞奏如檢院進狀人稱寃濫沈屈者晝時引送理檢使審問判院官一人舊止舍人兼掌淳化二年始命他官判之以方嚴見憚唐孔戣為諌議上疏以事四條陳諷後有李涉投匭上言吐突承璀公忠戣為匭使覽副狀大怒逐之因上疏苦諌遂貶涉幸臣聞之側目人皆為危之高步公卿以方嚴見憚職官分紀卷十四
