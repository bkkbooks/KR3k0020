body:
  text: 職官分紀卷二十一宋孫逢吉撰國子監晉職官志晉武帝初立國子學定置國子祭酒博士各一人助教十五人以教生徒孝武太元十一年减助教員為十人南齊百官志太始元年以國學廢初置緫明觀𤣥儒文史四科科置學士各十人正令史一人書令史二人幹一人門吏一人典觀吏二人建元中掌治五禮永明三年國學建省隋百官志梁國子學生限以貴賤帝欲招來後進五館生皆引寒門儁才不限人數後齊國子寺掌訓教胄子祭酒一人亦置功曹五官主簿録事等員隋國子寺元𨽻太常祭酒一人屬官有主簿録事各一人統國子太學四門書算各置博士國子太學四門各五人書算各二人助教國子太學四門各五人書算各二人學生國子百四十人太學四門各三百六十人書四十人算八十人等員開皇十三年罷𨽻太常又改寺為學仁夀元年罷國子學唯立太學一所煬帝改國子學為國子監依舊置祭酒加置司業一人從四品丞三人加為從六品并置主簿録事各一人國子學置博士唐職官志貞觀元年改國子學為國子監龍朔二年改國子監為司成館咸亨元年復舊垂拱元年改國子監為成均監神龍復舊唐百官志國子監祭酒一人從三品司業二人從四品下掌儒學訓導之政縂國子太學廣文四門律書算凡七學天子視學皇太子齒胄則講義釋奠執經論議奏請京文武七品以上觀禮凡授經以周易尚書周禮儀禮禮記毛詩春秋左氏傳公羊傳榖梁傳各為一經兼孝經論語老子嵗終考學官訓導多少為殿最丞一人從六品下掌判監事每嵗七學生業成與司業祭酒􅊩試登第者上於禮部主簿一人從七品下掌印勾督監事七學生不率教者舉而免之録事一人從九品下武德初以國子監曰國子學隸太常寺貞觀二年復曰監龍朔二年改國子監曰司成館祭酒曰大司成司業曰少司成咸亨元年復曰監垂拱元年改國子監曰成均監有府七人史十三人亭長六人掌固八人國朝國子監掌國子太學武學算學五學之政凡訓導之事更修黌宇後漢安帝薄於藝文博士倚席不講學舍頽敝鞠為園蔬牧兒芻豎至於薪刈順帝感翟酺之言更修黌宇畫三禮圖國朝至道二年遣畫工二人赴國子監畫三禮圖於壁待詔一人督其事繪像三年國子監言畫三禮圖訖詔文宣王十哲七十二賢像宜繪飾建閣藏書大中祥符五年就文宣王殿建藏書閣藏太宗御書及以皇帝御製样瑞諭勤政論俗吏辨刻石祭酒前漢王莽置六經祭酒每經各一人蘇竟以明易為博士講書祭酒後漢百官志博士祭酒一人六百石本僕射中興轉為祭酒胡廣曰凡官名祭酒皆位之元長者也古禮賔客得主人饌則老者一人舉酒以祭於地舊説以為示有先漢百官表注博士祭酒一人掌國子學皇朝服進賢兩梁冠佩水蒼玉續漢書百官表建武初置五經博士太常差以有聰明威重者一人為祭酒總領綱紀韋昭辨釋名祭酒者謂祭六神以酒酹之也辨云凡㑹同饗醼必尊長先用酒以祭先故曰祭酒漢時呉王年長以為劉氏祭酒是也應劭漢官儀禮飲酒必祭先示有先也故稱祭酒飲酒時唯尊長以酒沃酹也晉職官志武帝初立國子學定置國子祭酒永嘉中又置儒林祭酒以杜夷為之宋百官志祭酒晉官也漢吴王濞為劉氏祭酒大祭祀以酒為本尊者主之故以祭酒為稱漢之侍中魏之散騎常侍髙功者並為祭酒用其義公府有祭酒盖因其名也沈約宋書博士秦官也掌通古今員多至數十人有僕射光武増為十五人盖一經有數家之學故也皆教弟子光武改僕射為祭酒祭酒者一位之尤長也南齊百官志國子祭酒一人建元四年有司奏置國子學祭酒准諸曹尚書總明觀祭酒一人隋百官志梁國學有祭酒一人陳國子祭酒中二千石後齊國子寺祭酒一人隋國子祭酒一人仁夀元年省煬帝國子監復置唐職官志龍朔二年改國子祭酒為大司成咸亨二年復舊國子監祭酒一員從二品掌邦國儒學訓導之政令有六學國子太學四門律書算凡春秋二分之月上丁釋奠於孔宣父祭以太牢樂用登歌軒懸祭酒為初獻司業為亞獻博士為終獻凡教授之經以周易尚書周禮儀禮禮記春秋左氏傳公羊傳榖梁各為一經孝經論語兼習之每嵗終考其學官訓導分業之多少為之殿最六典國子監祭酒一人從三品周禮師氏以三徳三行教國子凡國之貴遊子弟學焉又保氏飬國子以道教之六藝晉令曰祭酒博士當為訓範總統學中衆事傅暢諸公讃云裴頠為國子祭酒奏立國子太學起講堂築門闕刻石寫五經梁置國子祭酒一人班第十三比列曹尚書陳國子祭酒秩中二千石品第三後魏初品第四上太和二十二年増為從第三品北齊改國子祭酒一人從三品後周闕光宅元年改成均監祭酒神龍元年復舊五代職官志後唐同光元年置一員國朝元祐官品令國子祭酒從四品三為祭酒史記荀卿年五十始來遊學於齊襄王時荀卿最為老師齊尚修列大夫之缺而荀卿三為祭酒焉明習故事前漢張安世薦蘇武明習故事奉使不辱命宣帝以武著節名臣令朝朔望號稱祭酒甚優寵之年老不朝迎以安車師友蜀志先主既定益州廣漢太守夏侯綦請秦宓為師友祭酒皇太子執經問義晉中興書杜夷以儒學稱中宗以為丞相祭酒中興初皇太子凡三至夷舍執經問義上疏求備學徒晉書袁環為國子祭酒時䘮亂之後禮教凌遲環上疏云若得給其宅地備其學徒帝從之國學之興自環始也令司徒辭祭酒以授張緒齊書司徒竟陵王子良領國子祭酒武帝敇王晏曰吾欲令司徒辭祭酒以授張緒物議以為云何子良竟不拜以緒領焉舉自代人以為榮吴均齊春秋謝曇濟字彦均王備為國子祭酒講孝經未畢舉曇濟自代時人以為榮朱服南齊何𦙍為國子祭酒與太子中庶子王瑩並為侍中時𦙍單作祭酒疑所服陸澄博古多該亦不能據遂以𤣥服臨試爾後羣議乃用朱服祭酒朱服自此始也三世為國學師梁書王承好儒業轉國子祭酒承祖儉父陳皆為此職三世為國學師前代未之有當時以為榮恃貴縱辯陳書太建中國子祭酒徐孝充開講恃貴縱辯衆莫敢當陸徳明始弱冠往參焉便與抗對合朝賞歎輕薄祭酒齊春秋孔廣字淹源美容止善吐納王儉張緒咸美之儉常云廣來便使我薄止不須來則莫聽去緒數巾車詣之歎嗟曰孔廣使吾成輕薄祭酒庠均義重師資道尊王融為王儉讓國子祭酒表曰竊以庠均義重振古所從師資道尊由來攸尚匪曰蘭茝疇變入室之情不自朱藍何遷素絲之質率百僚親臨講論崔鴻十六國春秋前秦録建元七年髙平蘇通長樂劉祥並以研學耆儒尤精二禮以通為禮記祭酒居於東庠祥為儀禮祭酒處於南序每月朔旦率百僚親臨講論也儒宗學府後周書盧誕夲名恭祖拜給事黄門侍郎魏帝曰經師易求人師難得朕諸兒轉長欲命卿為師於是以誕儒宗學府乃敇自今晉王以下皆拜之於帝前因賜名誕為當世所推乃拜國子祭酒經師易求人師難得上論難鋒起不能屈隋書楊汪字元度為國子祭酒帝令百僚就學與汪講論天下通儒碩學多萃焉論難鋒起皆不能屈帝令御史書其問荅奏之省而大悦賜良馬一匹敷陳義理兼之諷諫元善賜爵江陽縣公後遷國子祭酒上常親臨釋奠命善講孝經於是敷陳義理兼之諷諫上大悦曰聞江陽之説更起朕心學行可師唐賀德仁少與從兄徳基俱為國子祭酒周𢎞正咸以詞學見稱時人語曰學行可師賀德基文質彬彬賀德仁文質彬彬上卿今日從朕求官許後徹常侍太宗講後為睦州刺史因入朝乞骸骨太宗召問曰朕與卿刺史資以自飬何為致仕後徹曰年老筋力不逮望在私第時見闕廷太宗曰卿氣力猶强欲何官也後徹陳謝不敢太宗曰朕昔從卿讀書今日從朕求官但有所欲不相違也時國子祭酒缺乃言之因授焉請琢去碑額偽號馮審為國子祭酒國子監有孔子碑睿宗篆額加大周兩字盖武后時刻審請琢去偽號復大唐二字從之上疏論南海進蚶菜孔戣字君嚴元和年改國子祭酒嶺南節度使崔詠卒三軍諸帥宰相奏擬皆不稱㫖因入對上謂裴度嘗有上疏論南海進蚶菜者詞甚忠正此人何在卿求之度退訪之或曰祭酒孔戣嘗論此事度徴䟽進之即日授嶺南節度使判祥瑞案三道則天稱制以權臨下不恡官爵取悦當時其國子祭酒多授諸王駙馬都尉唯貞觀故事祭酒孔穎逹等赴上日皆講五經題至是諸助王與駙馬都尉赴上唯判祥瑞案三道而已至於博士教雖有學官之名多非儒雅之實腐儒祝欽明為國子祭酒景龍三年中宗將親祀南郊欽明與郭山惲希㫖奏言皇后亦合助祭景雲初侍御史倪若水劾奏曰欽眀等本自腐儒素無操行崇班列爵實為叨忝而涓塵莫効諂佞為能遂使曲臺之禮圜丘之制百王故事一朝墜失所謂亂常改作希㫖病君人之不才遂至於此臣等並従黜放以肅周行於是欽眀左授饒州刺史隨問酬悉舌無留語趙𢎞智永徽中為陳三師講孝經百福殿諸儒更詰辨随問酬悉舌無留語髙宗喜曰試為我陳經之要以補不逮對曰天子有爭臣七人雖無道不失其天下願以此獻帝悦賜絹三百疋終國子祭酒官不擇才桓彦範為侍中俄墨敕以方士葉靜能為國子祭酒彦範執不可帝曰要已用之不可止彦範曰陛下始復位制詔軍國皆用故事貞觀時以魏徴虞世南顔師古為監以孔頴逹為祭酒如靜能方伎猥下安足繼蹤前列臣恐物議謂陛下官不擇才以天秩加私愛不從以宰相領祭酒鄭覃見同中書門下平章事輸光學錢劉允章為國子祭酒建言羣臣輸光學錢治庠序宰相五萬節度四萬刺史一萬詔可願兼領侍郎國朝孔維見司業門司業隋百官志煬帝大業三年國子監初置司業一人從四品唐職官志龍朔二年改為少司成咸亨元年復舊垂拱元年増置一員所掌同祭酒六典司業二人從四品下禮記曰樂正司業父師司成秦漢以來無聞五代職官志後唐同光二年置一員國朝元祐官品今國子司業正六品改國學及官名歸崇敬授國子司業時皇太子欲於國學行齒胄之禮崇敬以國學及官名不稱上言司業義在禮記樂正司業正長也言樂官之長司主此業爾雅云大板曰業按詩周頌設業設簴崇牙樹羽則業乃懸鐘磬之簨簴也今太學既不敬老於義則無所取請改國子監為辟雍請改祭酒為太師氏請改司業一為左師一為右師詔下尚書集百僚定議以聞議者以為省者禁也非外司所宜名周禮代掌其職者曰氏其學非代官不宜曰氏其餘大抵以習俗既久重難之非其事不行請誦古詩兩篇郭山惲景龍中累遷國子司業時中宗數引近臣及修文學士與之宴集甞令各効伎藝以為笑樂張錫為談客娘舞宗晉卿舞渾脱張洽舞黄杜元談為婆羅門呪李行言唱車駕西河盧藏用効道士上章山惲獨奏曰臣旡所解請誦古詩兩篇於是誦鹿鳴蟋蟀之詩奏未畢李嶠以其有好樂無荒之語恐忤㫖遽止之刋定儀注韋叔夏遷成均司業久視元年時下制曰吉㓙禮儀周家所重司禮博士未甚詳明成均司業韋叔夏祝欽明等博涉禮經委以叅掌冀𢎞典式自今所修禮儀注委叔夏等刋定訖然後奏聞自以通經求為司業國朝淳化元年以國子祭酒孔維兼工部侍郎從其請也維開寳中任開封東明簿為上即位以舊吏累遷至主客員外郎自以通經求為司業即以授之雍熈初使髙麗先是奉使外國例借服紫復命即服舊服㑹髙麗使至維自恥衣緋因求見上詭言髙麗使者問臣獲何罪降服臣無以對因泣上憐之即賜金紫至是擢拜祭酒又上言祭酒官久廢少知者故親書尺與臣多以祭酒郎中呼焉又引五代時田敏任祭酒兼侍郎願兼領是官上從之丞隋百官志隋大業三年國子監置丞三人加為從六品唐六典丞一人從六品下掌監事凡六學生每嵗有業成上於監者以其業與司業祭酒試之明經帖經口試策經義進士帖一中經試雜文策時務徴事其明法明書算亦各試所習業登第者白祭酒上於尚書禮部國朝元祐官品令國子監丞正八品國子博士太學博士五經博士四門博士前漢百官表博士秦官也掌通古今秩比六百石員多至數十人武帝建元五年初置五經博士宣帝黄龍元年稍増員十二人後漢百官志博士十四人比六百石夲注曰易四施孟梁丘京氏尚書三歐陽大小夏侯氏詩三魯齊韓氏禮二大小戴氏春秋二公羊嚴顔氏掌教弟子國有疑事掌承問對本四百石宣帝増秩漢舊儀武帝初置博士取學通行修博識多藝曉古文爾雅能屬文章為髙第朝賀位次中都官師稱先生弟子稱門人又曰孝文時博士七十餘人朝服𤣥端章甫冠應劭漢官儀博士秦官也博者博通古今士者辨於然否魏文帝黄初五年太學置五經課試之法置春秋榖梁博士明帝太和二年詔曰尊儒貴學五教之本也自頃儒官或非其人將何以宣明聖道其髙選博士才任侍中常侍者敇郡國貢士以經學為先吳志詔曰古者建國教學為先所以道世治性為時飬器也自建興以來時事多故吏民頗以目前趨務去本就末不循古道夫所尚不淳則傷化敗俗其按古置學官立五經博士核取應選加其寵禄科見吏之中及將吏子弟有志好學者各令就業一嵗課試差其品第加以位賞使見之者樂其榮聞之者美其譽以敦王化以隆風俗後魏書劉芳表云太和二十年立四門博士於四門置學按禮記云天子設四學鄭𤣥注云四學謂周四郊之虞庠也今以其遼逺故置四門請移與太學同處從之摠知學士至是太學博士降為從六品晉職官志晉初承魏制置博士十五人以教生徒博士皆取履行清淳通明典義者若散騎常侍中書侍郎太子中庻子以上乃得召試及江左初减為九人元帝末増儀禮春秋公羊博士各一人後又増為十六人不復分掌五經而謂之太學博士也南齊百官志國子博士二人建元四年有司奏置博士准中書郎助教准南臺御史隋百官志梁國學有博士二人助教十人太學博士八人又有限外博士員天監四年置五經博士各一人大同七年國子祭酒劉溉等又表立正言博士一人位視國子博士置助教二人陳國子博士千石五經太學博士六百石後齊國子寺領博士五人助教十人學生七十二人太學博士十人助教二十人太學生二百人四門博士二十人助教二十人學生三百人隋國子寺統國子太學四門書算學各置博士仁夀元年罷國子學立太學置博士五人從五品煬帝國子學置博士正四品助教從七品員各一學生無常員太學博士助教各二人學生五百人先是仁夀元年置國子博士五員為從五品唐職官志龍朔二年改博士為宣業咸享元年復舊唐百官志國子學博士五人正五品上掌教三品以上及國公子孫從二品以上曽孫為生者六典國子博士三人正五品上司馬彪百官志云博士十四人魏以太常統博士祭酒晉初置博士十九人咸亨四年立國子學置國子博士一人晉官品第六介幘兩梁冠服佩同祭酒宋齊無所改作梁置國子博士二人為九班陳品第四秩千石後魏初國子博士從第五品上太和二十二年増為第五品北齊置國子寺有博士五人品第五隋初國子學太常置博士五人大業三年置國子監博士一人正五品皇朝増置二人龍朔二年改博士曰宣業掌教文武官三品以上及國公子孫從二品以上曽孫之為生者五分其經以為之業習周禮儀禮禮記毛詩春秋左氏傳每經各六十人餘經亦兼習之習孝經論語限一年業成尚書春秋公羊榖梁各一年半周易毛詩周禮儀禮各二年禮記左氏春秋各三年其生初入置束帛一篚酒一壺脩一案號為束脩之禮其習經有暇者命習𨽻書并國語説文字林三蒼爾雅每旬前一日則試其所習業每嵗其生有能通兩經以上求出仕者則上於監堪秀才進士者亦如之太學博士三人正六品上東晉元帝増置國子博士十六人謂之太學博士品服同國子博士梁置太學博士八人班第二陳品第八秩六百石後魏初置第六品中太和二十二年從七品北齊國子寺有太學博士十人從第七品周置太學博士下大夫六人班第四隋初置太學博士五人仁夀元年罷國子惟立太學置博士五人從五品大業三年减置二人降為從六品皇朝増置三人掌教文武官五品以上及郡縣公子孫從三品曽孫之為生者五分其經以為之業每經各百人其束脩之禮督課試舉如國子博士之法四門博士三人正七品上後魏書劉芳表云太和二十年立四門博士於四門置學按禮記云天子設四學鄭𤣥注周四郊之虞庠也今以其遼逺故置於四門請移與太學同處從之後魏百官志四門博士第九品北齊置二十人正九品上後周闕隋置五人從八品上皇朝减置三人加正七品上掌教文武官七品以上及侯伯子男子之為生者若庻人子為俊士生者禮記王制曰命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士隋志舊時國子生限以貴賤梁武帝欲招來後進五館生皆引寒門俊才不限人數即今之俊士也分經同太學其束脩之禮督課試舉如國子博士之法五經博士各二人正五品上掌以其經之學教國子周易尚書毛詩左氏春秋禮記為五經論語孝經爾雅不立學官附中經而已舊無五經學科自貞元五年二月敕特置三禮開元禮科長慶二年二月始置三傳三史科復又置五經博士五代職官志後唐同光元年博士只置兩員國朝元祐官品令國子博士正八品太學武學律學博士從八品録寃獄行風俗前漢成帝初即位孔光為博士數使録寃獄行風俗賑贍流民奉使稱㫖由是知名以髙第為尚書儒林之官成帝時闗東大水遣諫議大夫博士分行視奉使不稱詔曰古之立太學將以傳先王之業流化於天下也儒林之官四海淵源宜皆明於古今溫故知新通逹國體故謂之博士否則學者無述焉為下所輕非所以尊道德也丞相御史其與中二千石二千石舉可充博士位者使卓然可觀年二十餘最為少賈誼文帝召為博士時年二十餘最為少每詔令議下諸老先生不能言誼盡為之對人人各如其意所出諸生於是以為能文帝悦之超遷一嵗至太中大夫下帷講誦董仲舒少治春秋孝景時為博士下帷講誦弟子傳以久次相授業或莫見其面盖三年仲舒不窺於舍園其精如此進退容止非禮不行學士皆師尊之説詩解人頥匡衡好學家貧傭作以供資用尤精力過絶人諸儒為之語曰無説詩匡鼎來匡説詩解人頥元帝時為博士治尚書世為博士孔子之後孔忠生武及安國武生延年延年生霸安國延年皆以治尚書為武帝博士霸以治尚書事太傅夏侯勝昭帝末年為博士霸經學尤明成帝初即位舉為博士官至丞相鄒魯大儒韋賢為人質朴少欲篤志於學兼通理尚書以詩教授號稱鄒魯大儒徴為博士給事中昭帝時稍遷光禄大夫後位至丞相衣博士衣而不冠王式為昌邑王師昌邑廢式繫獄當死曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未甞不為王反覆誦之也至於危亡失道之君未甞不流涕深陳之也使者以聞得减死論後徴為博士式徴來衣博士衣而不冠曰刑餘之人何宜復充禮官竟謝病歸魯詩宗博士江公世為魯詩宗治詩轅固生以治詩為孝景博士禮有大戴小戴慶氏之學孟卿東海人也事蕭奮以授后蒼魯閭丘卿蒼説禮數百言號曰后氏曲臺記授沛聞人道漢子方梁戴德延君戴聖次君師慶普孝公德號大戴嘗為太傅聖號小戴以博士論石渠由是禮有大戴小戴慶氏之學待詔金馬門公孫弘對策時有百餘人太常奏𢎞第居下天子擢為第一名召入見容貌甚麗拜為博士待詔金馬門韓氏詩韓嬰燕人也孝文時為博士景帝時為常山王太傅嬰推詩人之意而作外傳數萬言其語頗與齊魯間殊然其歸一也而燕趙間言詩者由韓生韓生亦以易授人推易意而為之𫝊燕趙好詩故其易㣲惟韓氏自𫝊之孝宣時涿郡韓生其後也以易徵待詔殿中曰所授易先太傅所𫝊也嘗受韓詩不如韓氏易深大傅其專傳之毛公治詩毛公治詩為河間獻王博士授費長卿卿授解延年延年授徐敖敖授陳侠為王莽講學大夫由是言毛詩者本之論石渠施讐字長卿沛人也沛與碭相近讐為童子從田王孫受易後讐徙長陵田王孫為博士復從卒業詔拜博士甘露中與五經諸儒雜論同異於石渠閣初丁寛從田何受易時寛授田王孫田王孫授施讐孟喜梁丘賀繇是易有施孟梁丘之學初孟喜從田王孫受易喜好自稱譽得易家候陰陽災變之書詐言師田生死時忱喜膝獨𫝊喜諸儒以此耀之同門梁丘賀疏通證明之曰田生絶於施讐手中時喜歸東海安得此事又歐陽髙為博士髙孫地餘為太子中庻子以尚書授太子後為博士論石渠張山柎字長賔事小夏侯建為博士論石渠周堪字少卿齊人也與孔霸俱事大夏侯霸為博士堪譯官令論於石渠精習有師法張禹甘露中諸儒薦之有詔太子太傅蕭望之問禹禹對易及論語大義望之奏禹精習有師法久之乃試為博士善説禮服夏侯勝少孤好學從始昌受尚書及洪範五行傅説災異又善説禮服徴為博士光禄大夫㑹昭帝崩昌邑王嗣立数出勝諌以天久雨臣下有謀上者霍光召問勝言在洪範皇之不極厥罰常隂時則有伐上者惡察察言故曰臣下有謀光大驚以此益重經術士注云禮服謂禮之䘮服折角朱雲受易頗有師道是時少府五鹿充宗貴幸為梁丘易自宣帝時善梁丘氏説元帝好之欲考其異同令充宗與諸易家論充宗乗貴辯口諸儒莫能與抗皆稱疾不敢㑹有薦雲者召入攝齊升堂抗首而談音動左右既論難連拄五鹿口故諸儒語曰五鹿岳岳朱雲折其角由是為博士公羊春秋有嚴顔之學嚴彭祖與顔安樂俱事睦孟孟曰春秋之意在二子矣孟死彭祖安樂各顓門教授由是公羊春秋有嚴顔之學彭祖為宣帝博士顓門教授上易有京氏之學京房受易梁人焦延夀房授東海殷喜河東姚平河南𢎞乗皆為郎博士由是易有京氏之學𫝊業者寖盛自武帝立五經博士置弟子貟設科射策勸以官禄訖於元始百有餘年𫝊業者寖盛初書惟有歐陽禮后蒼易春秋公羊而已至孝宣時復立大小夏侯尚書大小戴禮施孟梁丘易榖梁春秋至元帝世復立京氏易平帝時又立左氏春秋毛詩逸禮古文尚書所以綱羅遺失為詩最精魯國先賢𫝊漢文帝時申公為詩最精以為博士申公為詩𫝊號曰魯詩也使行風俗矯制使膠東前漢元鼎中徐􅟠為博士使行風俗􅟠矯制使膠東魯國鼓鑄鹽鉄還奏亊張湯劾􅟠矯制法死􅟠以為春秋之義大夫出疆有可以安社稷利萬民可専也湯不能屈經行宜充本朝薛廣徳以魯詩教授楚國龔勝師事焉蕭望之為御史大夫徐廣徳為屬數與論議器之薦廣徳經行宜充本朝以為博士論石渠得生幾晩後漢桓榮少習歐陽尚書年六十餘始辟大司徒府時世祖召令説尚書甚善之拜為議郎每朝㑹輙令榮於公卿前敷奏經書帝稱善曰得生幾晚㑹歐陽博士缺因拜榮焉溫恭有醞藉桓榮拜博士車駕幸太學博士論難于前榮被服儒衣溫恭有醞藉每以禮讓相厭不以辭采勝人儒者莫之及三家皆立博士後漢儒林傳曰前書云濟南伏生𫝊尚書授濟南張生及千乘歐陽生生授同郡倪寛寛授歐陽生之子世世相傳至曽孫歐陽髙為尚書歐陽氏學張生授夏侯都尉都尉授族子始昌始昌𫝊族子勝為大夏侯氏學勝𫝊從兄子建建别為小夏侯氏學三家皆立博士八世博士歐陽歙自歐陽生𫝊伏生尚書至歙八世皆為博士爭立左氏學初欲立左氏學博士范升以為左氏淺末不冝立陳元聞之乃詣闕上疏爭之更相對辨凡十餘上帝卒立左氏學當世稱通儒董均永平初為博士時草創五郊祭祀及宗廟禮樂威儀章服輙令均㕘議多見從用當世稱通儒不得就席戴憑習京氏易年十六郡舉明經徴試博士拜郎時憑對曰博士説經皆不如臣而坐居上是以不得就席帝即召上殿令與諸儒難説多所解釋帝善之拜為侍中後正旦朝賀百僚畢集帝令羣臣能説經者更相詰難義有不通輙奪其席以益通者憑遂重坐五十餘席京師語曰解經不窮戴侍中重坐五十餘席上解經不窮戴侍中上天下宗師朱浮以國學既興宜廣博士之選上書曰博士之官為天下宗師使孔聖之言傳而不絶夜定奮説死於燈下王充論衡王莽之時有五經章句博士弟子郭略夜定奮説死於燈下痩羊博士東觀漢記甄宇拜博士每臘詔賜博士人一羊有小大肥瘦時議欲殺羊分肉宇欲化其争因取痩者自是不復爭後召㑹詔問瘦羊博士所在京師因以為號五經並授魏志樂祗字文少好學黄初中徴拜博士十餘人文多偏辟不敢親教備員而已唯文少五經業並授質疑滯晉中興書謝沈閒居色飬不交人事時有論難學者請業康帝即位朝議七廟迭毁於是以太學博士徴之用質疑滯親詣省病拜於床下晉書載記姚泓受經於博士淳于岐岐病親詣省病拜於牀下自是公侯見師傅皆拜賜席至八九重殷氏世傳殷亮建武中徵拜博士遷講學大夫諸儒論勝者賜席至八九重帝用嘉之曰學不當如是耶注小戴大戴後周盧辯字景宣為太子博士以大戴禮未有解詁辯乃注之其兄景裕為當時碩儒謂辯曰昔時中注小戴今又注大戴庶纂前修矣掃門熊安生初仕北齊為國子博士武帝入鄴安生遂令掃門家人恠而問之安生曰周帝重道尊儒必將見我矣俄而帝幸其家詔不聽拜親執其手引與同坐謂曰朕未能去兵以此為愧安生曰黄帝尚有阪泉之戰况陛下恭行天罰乎帝又曰齊氏賦役繁興竭民財力朕救焚拯溺思革其弊欲以府庫及三䑓雜物散之百姓公以為何如安生曰昔武王克商散鹿䑓之財發鉅槁之粟陛下此詔異代同美又曰朕何如武王安生曰武王伐紂懸首白旗陛下平齊兵不血刃愚謂聖略為優帝大悦賜帛三百疋米三百石宅一區并賜象笏及九環金𢃄自餘他物稱是六儒隋書馬光開皇初髙祖徴山東文學之士光與張仲讓孔彪竇仕榮張買奴劉祖仁等俱至并授太學博士時人號曰六儒剖析疑滯馬光為太學博士嘗因釋奠髙祖親幸國子學王公以下畢集光升坐講禮啟發彰明已而諸儒生以次論難者十餘人皆當時碩學光剖析疑滯雖辭非俊辨而理義𢎞贍論者莫測其淺深咸共推服上嘉而勞焉詞義鋒起王頗授著作佐郎尋令於國子講授㑹髙祖親臨釋奠國子祭酒元善講孝經頗國與之論難詞義鋒起元善往往見屈高祖大奇之起授子博士駮立后數何妥授太學博士帝初欲立五后以問儒者辛彦之對曰后與天子匹體齊尊不宜有五妥曰帝嚳四妃舜又二妃亦何常數帝由是封妥襄城縣男考定學生攬筆便下房暉逺為國子博士㑹上令國子生通一經并悉薦舉將擢用之既䇿問訖博士不能時定臧否祭酒元善怪問之暉逺曰河南河北義例不同博士不能徧涉學生皆持其所短稱己所長博士各各自疑所以久而不决也祭酒令暉逺考定之暉逺攬筆便下初無疑滯或有不服者暉逺問其所傳義疏輙為始末講之然後斥其所短自是無敢飾非者所試四五百人数日便决儒者莫不推其通釋一時之最大業初禮部侍郎許善心舉徐文逺與包愷禇徽陸徳明魯達為學館遂擢授文逺國子博士愷等並為太學博士時人稱文逺之左氏禇徽之禮魯逹之詩陸徳明之易皆為一時之最無他才伎唐書朱朴乾寧中為國子博士虧儒木彊無他才伎道士許巖士出入禁中嘗依朴姦利從容上前薦朴有經濟才昭宗召對以經義甚悦即日拜諌議大夫平章事在中書與名公齒筆札議論動為笑端数日巖士事敗俱為韓建所殺發揚風雅盖文懿武德初歴國子助教時髙祖引於祕書省學教授王公之子特以文懿為博士文懿甞開講發毛詩題公卿咸萃更相問難文懿發揚風雅甚得人之致敬燭下看書不寐王元感天授中直𢎞文館是後則天親祠南郊及享明堂封嵩岳元感皆受詔與諸儒撰定儀注凡所立議衆咸推服之轉四門博士時雖年老猶能燭下看書通宵不寐多非儒雅之實見祭酒判祥瑞案注國子四門助教六典國子助教二人從六品上晉武帝初立國子學置助教十五人官品視南臺御史服同博士東晉孝武損為十宋齊並同梁班第二陳品第八秩六百石後魏第七品北齊置十人品同後魏隋初置國子助教五人從七品下大業三年咸置一人皇朝増置二人掌佐博士分經以教授焉太學助教三人從七品上後魏置太學助教第八品中北齊國子寺有太學助教二十人從第九品下後周置太學助教上士六人北齊國子寺有二十人隋初五人從九品下皇朝因置三人並掌同國子别與一官唐李徳裕太和中為平章事時文宗欲李訓為諫官徳裕諫曰李訓小人不可在陛下左右頃年惡迹天下皆知故用必駭視聽文宗曰人誰無過俟其後改朕以逢吉所託不忍負言徳裕曰聖人有改過之義訓天性姦邪旡悛改之理帝召顧王涯商量别與一官乃授四門教授正直純厚有儒者之風北齊書劉執思渤海人也遷國子助教以經入授皇太子正直純厚有儒者之風左右言其能詩國朝至道元年布衣潘閬對於崇政殿賜進士及第授國子四門助教閬賣藥京師好交結上左右有言其能詩者因召見而有是命未幾復追還詔書一夕而卒黄晞字景徴閩人久客京師學術深厚著聱隅書十卷其辭類法言天下之人皆呼為聱隅先生授助教一夕而卒一聞助教而死二醫筆談予婣家朝散郎王九齡常言其祖貽永侍中有女子嫁諸司使夏偕因病危甚服朱嚴藥遂差貂蟬甚喜置酒慶之女子於坐求為朱嚴奏官貂蟬難之曰今嵗恩例已許門醫劉公才當候明年女子乃哭而起竟不可留貂蝉追許之召公才諭以女子之意輟是嵗恩命以授朱嚴制下之日嚴死公才召嘱王公曰朱嚴未命而死法容冄奏公然之自為公才請及制下公才之尉氏縣使人召之公才方飲酒聞官大喜遂暴卒一聞助教而死二醫一官不可妄得况其大者乎直講六典直講掌佐博士助教之職專以經術講授而已唐六典直講四人初唐置無員数長安四年始定為四員大成十人唐置取貢舉及第人簡聰明者試書日誦得千言并口試策所習業等十條通七然後補充仍散官禄俸賜㑹同直官例給武后長安中省而置直講定為四員國朝置國子監直講以掌教授至道二年邢昺張雍林鎬孫奭於京朝幕職州縣官中薦儒術該博士行端良堪充國子監直講者十人太子洗馬張𨽻等試經義于學士院而命之皇祐四年詔今後須選舉通明經義德行純至有老成之器年四十以上可與胄子為儀範者充熈寧四年詔主判官外直講以十員為額每二員共講一經委中書選差或主判官奏舉以三年為任選人到監五年與京官或教導有方或職事不修者並委主判官奏陳當議升黜講說甚精國朝咸平元年因訪明達經義者㕘知政事李至以國子監直講崔頤正為對上曰朕宮中無事頗思講說因詔頤正於後殿講尚書大禹謨賜正五品服他日對名輔臣曰頤正講說甚精卿等更於班行中訪經明行修之人具以聞作慶厯聖徳詩慶厯三年三月天下所謂賢士大夫者畢用於兩府侍從臺諫之官物議以為宋之用人於茲為盛太學直講太子中允石介作慶厯聖徳詩其字云云後為時權所記㑹徐州孔直温判搜其家得介書坐貶而卒時以詐死欲剖其棺而驗之也近臣言介實死乃得免歐陽修有詩哭之曰以埋猶不信僅免斫其棺噫介之才識謀慮國之淵藪經術文學世之冠冕天若假之以年使之復位當乎國之司直其蕭望之之流乎然訐以為直君子有不敢取焉講易賜服慶厯五年春上幸國子監命直講孫復講乾卦言王者當法乾剛以攬威權漢元帝優游不斷失乾剛之道也上嘉之賜五品服講釋極聖人之意邵必為國子監直講學者翕然宗師之太學直講凡数人至必講釋皆極聖人之意學者傾聽聳服其餘但讀注䟽而已上嘉之改大理寺丞守道甚篤治平二年以三班差使崔公度為和州防禦推官充國子監直講以宰臣韓琦言其守道甚篤文章雄竒贍逸故也説書國朝大中祥符七年以三班奉職鄭檢為襄州鄧城縣主簿國子監説書檢明經善誦朝士以其名聞試於國學而命焉慶厯三年補説書官以四人為額主簿六典主簿一人從七品下北齊國子寺置主簿員隋置一人皇朝因之掌印勾檢監事凡六學生有不率師教者則舉而免之其頻三年下第九年在學及律生六年無成者亦如之假違程限及作樂雜戯亦同唯彈琴習射不禁國朝元祐官品令國子監主簿從八品武學博士國朝元祐官品令武學博士從八品律學博士六典律學博士一人從八品下晉百官志廷尉官屬有律博士員東晉宋齊並同梁天監四年廷尉官屬置胄子律博士位視員外郎第三班陳六百石品第八後魏初律博士第六品太和二十二年為九品上北齊大理寺官屬有律博士四人第九品上隋大理寺官屬有律博士八人正九品上皇朝省置一人移屬國學掌文武八品以下及庻人子之為生者以律令為專業格式法例亦兼習之其束脩之禮督課試舉如三館博士之法國朝元祐官品令律學博士從八品轉相教授晉刑法志衛顗奏請置律學博士轉相教授書學博士六典書學博士二人從九品下世本蒼頡作書周禮保氏教以六藝其五曰六書鄭司農云象形㑹意轉注指事假借諧聲也古謂之小學漢食貨志曰八嵗入小學學六甲五方書計之事晉衛恒書勢曰昔黄帝有沮誦蒼頡始作書契盖覩鳥曰跡以興思也秦壊古文制八體一曰大篆二曰小篆三刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書王莽時甄豐挍文字復有六書一曰古文二曰竒字三曰篆書四曰佐書五曰繆篆六曰鳥書自漢以來不見其職隋置書學博士一人從九品下皇朝加置二人掌教文武官八品以下及庻人子之為生者以石經説文字林為専業餘字書亦兼習之石經三體書限三年業成説文二年字林一年其束修之禮督課試舉如三館博士之法算學博士六典算學博士二人從九品下世本𨽻首作算周禮保氏教以六藝其六曰九數即九章也一曰方田二曰粟米三曰差分四曰少廣五曰商功六曰均輸七曰方程八曰贏不足九曰旁要漢律厯志曰數者一十百千萬所以算數事物也小學是列職在太史羲和掌之魏晉以來多在史官不列於國學隋置筭學博士一人從九品下皇朝増置二人掌教文武官八品以下及庻人子之為生者二分其經以為之業習九章海島孫子五曹張丘建夏侯陽周髀十有五人習綴術緝古十有五人其記遺三等數亦兼習之孫子五曹共限一年業成九章海島共三年張丘建夏侯陽各一年周髀五經算共一年綴術四年緝古三年其束脩之禮督課試舉如三館博士之法都講明章句善問難後漢書丁鴻好尚書三年而參從桓榮受歐陽尚書三年而明章句善問難為都講遂篤志精鋭布衣荷擔不逺千里諸生咸重之郭丹買符函谷闗既到京師常為都講諸生咸重之誤持曲禮巻上座祖榮字元珍十二為中書學生博士張天龍講尚書選為都講生徒悉集榮夜讀書不覺天曉催講既切遂誤持曲禮卷上座博士嚴毅不敢復還仍致禮座講尚書三篇不遺一字篤志詩書續漢書侯霸字君房為人矜嚴有威容篤志詩書師事望之常為都講貧無資前漢倪寛詣博士受業孔安國貧無資因常為都講送一難衆皆抃舞世説支道林許詢諸人共在㑹稽王齋之為法師都講支通一義四座莫不厭心許送一難衆皆抃舞但共嗟歎二家之美不解其理留車與語㑹稽典録鄭𢎞常出一書生羸服知必異人留車與語果是京師都講祭酒𢎞下車賔禮請以還家明禮北齊鮑季祥渤海人甚明禮少時常為李寳鼎都講後亦有徒衆講於士林館陳書沈洙好方雅正直不妄交逰吳郡朱忌㑹稽謝琛甚加重之琛於士林館講常使洙為都講焉職官分紀巻二十一
