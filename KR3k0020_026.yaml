body:
  text: 職官分紀卷二十六宋孫逢吉撰內侍省前漢百官表少府秦官屬官有中書謁者黃門鈎盾尚方御府永巷內者宦者七官令丞諸僕射署掌中黃門皆屬焉成帝省詹事掌皇太后官景帝中元六年更名長信少府平帝元始四年更名長樂少府將行秦官景帝中元六年更名大長秋或用中人或用士人後漢百官表中常侍千石本注曰宦者無貟後增秩比二千石掌侍左右從入內宫贊𨗳內衆事顧問應對給事黃門侍郎六百石本注曰無貟掌侍從左右給事中關通中外及諸王朝見于殿上引王就坐獻帝起居注曰帝初即位初置侍中給事黃門侍郎貟各六人出入禁中近侍帷幄省尚書事改給事黃門侍郎為侍中侍郎去給事黃門之號旋復故舊侍中黃門侍郎以在中宫者不與近密交政誅黃門後侍中侍郎出入禁闥機事頗露由是王允乃奏比尚書不得出入不通賔客自此始也又曰諸閹人官悉以議郎郎中稱秩如故諸署令兩梁冠陛殿上得召都官從事以下小黃門六百石宦者無貟掌侍左右受尚書事上在內宫關通中外及中宫以下衆事諸公主及王太妃等有疾若則使問之黃門令一人六百石董巴曰黃闥以中人主之故號黃門令本注曰宦者主省中諸宦者丞從丞各一人本注曰宦者從丞主出入從黃門署長畫室署長玉堂署長各一人內署長七人皆四百石黃綬本注曰宦者各主中宫别處中黃門冗從僕射一人六百石本注曰宦者主中黃門冗從居則宿衛直守門戶出則騎從夾乘輿車中黃門比百石本注曰宦者無貟後增比三百石掌給事禁中掖庭令一人六百石本注曰宦者掌後宫貴人采女事左右丞暴室丞各一人本注曰宦者暴室丞主中婦人疾病者就此室治其皇后貴人有罪亦就此室永巷令一人六百石本注曰宦者典官婢侍使丞一人本注曰宦者御府令一人六百石本注曰宦者典官婢作中衣服及補浣之屬丞織室丞各一人本注曰宦者祠祀令一人六百石本注曰典中諸小祠祀丞一人本注曰宦者鈎盾令一人六百石本注曰宦者典諸近池苑囿遊觀之處丞永安丞各一人三百石本注曰宦者大長秋一人二千石本注曰承秦將行宦者景帝更名大長秋或用士人中興常用宦者職掌奉宣中宫命凡給賜宗親及宗親當謁見者關通之中宫出則從丞一人六百石本注曰宦者中宫僕一人千石本注曰宦者主馭本注曰太僕秩二千石中興省汰減千石以屬長秋中宫謁者令一人六百石本注曰宦者中宫謁者三人四百石本注曰宦者主報中章中宫尚書五人六百石本注曰宦者主中文書中宫私府令一人六百石本注曰宦者主中藏幣帛諸物裁衣被補浣者皆主之丞一人本注曰宦者中宫永巷令一人六百石本注曰宦者主宫人丞一人本注曰宦者中宫黃門冗從僕射一人六百石本注曰宦者主中黃門冗從中宫署令一人六百石本注曰宦者主中宫諸署文字數女騎六人丞復道丞各一人本注曰宦者復道丞主中閣道中宫藥長一人四百石本注曰宦者右屬大長秋本注曰丞秦有詹事一人位在長秋上亦宦者主中諸官成帝省之以其職并長秋是後皇后當法駕出則中謁者宦者職吏權兼詹事奏引訖寵宦者誅後尚書選兼職吏一人奉引云其中長信長樂官者置少府一人職如長秋及餘吏皆以官名為號貟數秩次如中宫本注曰帝祖母稱長信官故有長信少府長樂少府位在長秋上及職吏皆宦者秩次如中宫長樂又有衛尉僕為太僕皆二千石在少府上其闕則省不常置後漢宦者傳論易曰天垂象聖人則之宦者四星在皇位之側故周禮置官亦備其數閽者守中門之禁寺門掌女宫之戒又云王之正內者五人月令仲冬命閽尹申宫令審門閭謹房室詩之小雅亦有巷伯刺讒之篇然宦人之在王朝者其來舊矣將以其體非全氣情志專良通關中人易以役養乎然而後世因之才任稍廣其能者則勃貂管蘇有功于楚晉景監繆賢著庸於秦趙及其敝也則豎刁亂齊伊戾禍宋漢興仍襲秦制置中常侍官然亦引用士人以參其選皆銀璫左貂給事殿省及髙后稱制乃以張釋卿為大謁者出入卧內受宣詔命文帝時有趙談北宫伯子頗見親幸至于孝武亦愛李延年帝數幸後庭或潛遊離館故請奏機事多以宦人主之至元帝之世史遊為黃門令勤心納忠有所補益其後𢎞恭石顯以佞險自進卒有蕭周之禍損穢帝德焉中興之初宦官悉用閹人不復雜調他士至永平中始置員數中常侍四人小黃門十人和帝即阼幼弱而竇憲兄弟專總權威內外臣僚莫由親接所與居者惟閹宦而已遂享分土之封超登宮卿之位宫卿位大長秋於是中官始盛自明帝以後迄於延平委用漸大而其員稍增中常侍有十人小黃門二十人改以金璫右貂兼領卿署之職鄧后以女主臨政而萬幾殷逺朝臣國議無由參斷帷幄稱制下令不出房闈之間不得不委用刑人寄之國命手握王爵口含天憲非復掖庭永巷之職閨牖房闥之任也其後孫程定立順之功曹騰參建桓之䇿續以五侯合謀梁兾受鉞迹因公正恩固主心故中外服從上下屏氣或稱伊霍之勳無謝于往載或謂良平之畫復興于當今雖時有公忠而竟見排斥舉動回山海呼吸變霜露阿旨曲求則光寵三族直情忤意則參夷五宗漢之綱紀大亂矣若夫髙冠長劍紆朱懷金者布滿宫闈苴茅分虎南面臣人者蓋以千數府署第館棊列于都鄙子弟支附過半於州國南金和寶氷紈霧縠之積盈仭珍藏嬙媛侍兒歌童舞女之玩充備綺室狗馬飾雕文土木被緹繡皆剝割萌黎競恣奢欲搆害明賢專樹黨類其有更相援引希附權強者皆腐身熏子以自衒達同敝相濟故其徒實繁敗國蠧政之事不可殫書所以海內嗟毒志士窮棲冦劇緣間搖亂區夏雖忠良懷憤時或奮發而言出禍從旋見孥戮因復大考鈎黨轉相誣染凡稱善士莫不罹被災毒竇武何進位崇戚近乘九服之囂怨協羣英之勢力而以疑留不斷至於殄敗斯亦運之極乎雖袁紹龔行芟夷無餘然以暴易亂亦何云及自曹騰説梁兾竟立昏弱桓帝魏武因之遂遷龜鼎所謂君以此始必以此終信乎其然矣又曰自古喪大業絶宗禋者其所漸有由矣三世以嬖色取禍夏妹喜殷妲己周褒姒嬴氏以奢虐致災西京自外戚失祚東都緣閹伊傾國成敗之來先史商之久矣至於釁起宦者夫其略尤或可言何者刑餘之醜理謝全生聲榮無暉於門閥肌膚莫傅於來體推情未鑒其敝即事易以取信加漸染朝事頗識典物故少主憑謹舊之庸女君資出內之命顧訪無猜憚之心恩狎有可説之色詐利既滋朋從日廣易曰履霜堅氷至云所從來者漸矣續漢書謁者僕射一人比千石為謁者臺主率諸謁者天子出奉引應劭漢官儀謁者僕射秦官也古重武事故設主射以督課之秩六百石冠髙山言其矜莊髙故以髙山為號晉職官志中書監及令案漢武帝遊宴後庭始使宦者典事尚書謂之中書謁者置令僕射成帝改中書謁者令曰中謁者令罷僕射漢東京省中謁者令有中官謁者令非其職也隋內侍省內侍內長侍各二人內給事四人內謁者監六人內寺伯二人內謁者十二人寺人六人伺非八人並用宦者領內尚食掖庭宫闈奚官內僕內府等局開皇十六年內侍省加置內主事員十二人以承門閣煬帝改內侍省為長秋監置令一人正四品少令一人從五品丞二人正七品並用士人改內常侍為內承奉置二人正五品給事為內承直四人從五品並用宦者罷內謁者官領掖庭宫闈奚官三署並參用士人後又置內謁者員唐職官志內侍省星經有宦者四星在天市垣帝座之西周官有巷伯寺人之職皆內官也前漢宫官多用士人後漢始用宦者晉置大長秋卿為後宫官以宦者為之隋為內侍省煬帝改長秋監武德復為內侍省龍朔改為內侍監光宅改為司宫臺神龍復為內侍省也內侍二人從四品上漢魏曰長秋卿梁曰大長秋北齊曰中侍中後周曰司內上士隋曰內侍置二人煬帝曰長秋令正四品武德復為中侍中中官之貴極于此矣若有殊勳懋績則有拜大將軍者仍兼內侍之官德宗置左右神䇿威逺等禁兵命中官掌之每軍置中尉一人宦者為之自李輔國魚朝恩之後京師兵柄歸于內官號左右軍中尉將兵于外者謂之觀軍容使而天下軍鎮節度使皆內官一人監之事具宦者傳也內常侍六人正五品下漢代謂之中常侍內侍之職常在內侍奉出入宫掖宣傳之事總掖庭宫闈奚官內僕內府五局之官屬內常侍為之二凡皇后祭先蠶則相儀后出則為夾引內給事八人從五品下掌判省事凡元正冬至羣臣朝賀中宫則出入宣傳凡宫人衣服費用則具其品秩計其多少春秋二時宣送中書主事二人令史八人書令史十六人內謁者監六人正六品下內謁者十二人從八品下內侍伯二人正七品下內謁者監掌內宣傳凡諸親命婦朝會所司籍其人數送內侍省內謁者掌諸親命婦朝集班位內侍伯掌糾察宫內不法之事嵗大儺則監其出入掖庭局令二人從七品下丞三人掌宫禁女工之事凡宫人名籍司其除附公桑養蠶會其課業丞掌判局事宫傅博士二人從九品下掌教習宫人書算衆藝監作四人從九品下掌監當雜作令史四人計史二人書令史八人宮闈局令二人從九品下丞二人從八品掌侍奉宮闈出入管鑰凡大享太廟帥其屬詣于室出皇后神主置于輿而登座焉既事納之凡宫人無官品者稱內給使若有官及經解免應敘選者得令掌上其小給使學生五十人皆總其名籍以給其糧廩丞掌判局事書令史三人書吏六人內閽人二人入內掌扇十六人內給使無常員奚官局令二人正八品下氶二人正九品下掌奚隸二役宫官品命丞為之二凡宫人有疾病則供其醫藥死亡則供其衣服各視其品命仍于隨近寺觀為之修福雖無品亦如之凡內命婦五品以上亡無親戚于墓側三年內取同姓中男一人以時主祭無同姓則所司春秋以少牢祭之書令史二人書吏六人藥童四人內僕局令二人正八品下丞二人正九品下掌宫中車乘出入導引丞為之二凡宫中有出入則令居左丞居右而夾引之凡皇后之車有六書令史二人書吏四人駕士二百人內府局令二人正八品下丞二人正九品下掌中藏寶貨給納名數丞為之二凡朝會五品以上賜絹帛金銀器于殿庭者並供之諸將有功并蕃酋辭還亦如之書令史二人書吏四人宦者傳唐制有內侍省官有內侍四內常侍六內謁者監六內給事各十謁者十二典引十八寺伯寺人各六人又有五局一曰掖庭主宫嬪簿最二曰宫闈扈門闌三曰奚官治宫中疾病死喪四曰內僕主供帳燈燭五曰內府主中藏給納局有令丞皆宦者為之太宗詔內侍省不立三品以內侍為之長階第四不任以事惟門閣守禦廷內掃除稟食而已武后時稍增其人至中宗黃衣乃二千員七品以上員外置千員然衣朱紫者尚少玄宗承平財用富足遂至侈奢不愛惜賞賜爵位開元天寶中宫嬪大率至四萬宦官黃衣以上三千員衣朱衣千餘人其稱旨者輒拜三品將軍列戟于門其在殿頭供奉委任華重持節傳命光熖殷殷四方所至郡縣奔走獻遺至萬計修功德市禽鳥一為之使猶且數干緡監軍持權節度反出其下于是甲舍名園上腴之田為中人所占者半京畿矣肅代庸弱倚為扞衛故輔國以尚父顯元振以援立奮朝恩以軍容重然猶未得常主兵也德宗懲艾泚賊故以左右神䇿天威等軍委宦者主之置護軍中尉護軍分提禁兵是以威柄下遷政在宦人舉手伸縮便有輕重慓士奇材則養以為子巨鎮強藩則爭出我門小人之情猥險無顧藉又日夕侍天子狎則無威習則不疑故昏君蔽于所昵英主生于所忽玄宗以遷崩憲敬以弒殞文以憂僨至昭而天下亡矣禍始開元極于天祐凶愎參會黨類殱滅王室從而潰喪譬猶灼火攻蠧蠧盡木焚渠不哀哉迹其殘氣不剛柔情易遷褻則無上怖則生怨借之權則專為禍則迫而近緩相攻急相一此小人常勢也噫梟狐不神天與之昏末如亂何故取中葉以來宦人之大者萃之篇六典同唐職官志五代史宦者傳嗚呼自古宦女之禍深矣明者未形而知懼暗者患及而猶安焉至于亂亡而不可悔也雖然不可以不戒作宦者傳五代文章陋矣而史官之職廢于喪亂傳記小説多失其傳故其事迹終始不完而雜以訛謬至于英豪奮起戰爭勝敗國家興廢之際豈無謀臣之略辨士之談而文字不足以發之遂使泯然無傳于後世然獨張承業事卓卓在人耳目至今故老猶能道之其論議可謂傑然歟殆非宦者之言也自古宦者亂人之國其源深于女禍女色而已宦者之害非一端也蓋其用事也近而習其為心也專而忍能以小善中人之意小信固人之心使人主必信而親之待其已信然後懼以禍福而把持之雖有忠臣碩士列于朝廷而人主以為去已疏逺不若起居飲食前後左右之親為可恃也故前後左右者日益親則忠臣碩士日益疏而人主之勢日益孤勢孤則懼禍之心日益切而把持者日益牢安危出其喜怒禍患伏于帷闥則向之所謂可恃者乃所以為患也患已深而覺之欲與踈逺之臣圖左右之親近緩之則養禍而益深急之則挾人主以為質雖有聖智不能與謀謀之而不可為為之而不可成至其甚則俱傷而兩敗故其大者亡國其次亡身而使姦豪得借以為資而起至抉其種類盡殺以快天下之心而後巳此前史所載宦者之禍常如此者非一世也夫為人主者非欲養禍于內而疏忠臣碩士于外蓋其漸積而勢使之然也夫女色之惑不幸而不悟則禍斯及矣使其一悟捽而去之可也宦者之為禍雖欲悔悟而勢有不得而去也唐昭宗之事是也故曰深于女禍者謂此也可不戒哉昭宗信狎宦者由是有東宫之幽既出而與崔胤圖之胤為宰相顧力不足為乃召兵于梁梁兵且至而患宦者挾天子走之岐梁兵圍之三年昭宗既出而唐亡矣初昭宗之出也梁王悉誅唐宦者第五可範等七百餘人其在外者悉詔天下捕殺之而宦者多為諸鎮所藏匿而不殺是時方鎮僣擬悉以宦官給事而吳越最多及莊宗立詔天下訪求故唐時宦者悉送京師得數百人宦者遂復用事以至于亡此何異求已覆之車躬駕而履其轍也可為悲夫莊宗未滅梁時承業已死其後君翰雖為樞密使而不用事有孫宣徽使馬紹宏者嘗賜姓李頗見信用然誣殺大臣黷貨賂專威福以取怨于天下者左右狎昵黃門內養之徒也是時明宗自鎮州入覲奉朝請于京師莊宗頗疑其有異志隂遣紹宏伺其動靜紹宏反以情告明宗明宗自魏而反天下皆知禍起於魏孰知其啓明宗之二心者自紹宏始也郭崇韜已破蜀莊宗信宦者言而疑之然崇韜之死莊宗不知皆宦者為之也當此之時舉唐之精兵皆在蜀使崇韜不死明宗入洛豈無西顧之患其能晏然取唐而代之耶及明宗入立又詔天下悉捕宦者而殺之宦者亡竄山谷多削髮為浮屠其亡至太原者七十餘人悉捕而殺之都亭驛流血盈庭明宗晚而多病王淑妃專內以干政宦者孟漢瓊因以用事秦王入視明宗疾巳革既出而聞哭聲以為帝崩矣乃謀以兵入宫者懼不得立也大臣朱𢎞昭等方圖其事議未決漢瓊遽入見明宗言秦王反即以兵誅之陷秦王大惡而明宗以此飲恨而終後愍帝奔于衛州漢瓊西迎廢帝于路廢帝惡而殺之嗚呼人情處安樂自非聖哲不能久而無驕怠宦女之禍非一日必伺人之驕怠而浸入之明宗非佚君而猶若此者蓋其在位差久也其餘多武人崛起及其嗣續世數短而年不永故宦者莫暇施為其為大害者略可見矣獨承業之論偉然可愛而居翰更一字以活千人君子之于人也茍有善焉無所不取吾于斯二人者有所取焉取其善而戒其惡所謂愛而知其惡憎而知其善也故并述其禍敗之所以然者著于篇職官志後唐同光元年以左監門衛將軍判內侍省李紹宏兼內勾天下錢榖入內內侍省都都知國朝入內內侍省國初有內中髙品班院淳化五年改入內內班院又改入內黃門班院又改內侍省入內內侍班院景德三年其東門取索司可并𨽻內東門司餘入內都知司內東門都知司內侍省入內內侍班院可立為入內內侍省以諸司𨽻之遂定管勾事凡三司及憑由等處據諸處支遣過物取索同否非泛行遣公事出劄子赴逐處在內庫務及造作所合係本司除破物色具帳典勘印書除破諸王宫院及公主郡縣主宅奏乞物色皇城六指揮及翰林儀鸞司御厨御輦院宣給特支皇親下財出室迎娶女降尚書內省劄子取物入內供奉官以下勾當公事諸班勾當及出外監當收補入內供奉官以下及料錢衣糧請受月奏宿直并私身係名內侍季帳定諸色人恩賜及身亡孝贈應宣命奉聖旨合係本班勾當公事皆著宣命指揮都都知都知元祐令從五品皇祐五年以入內內侍省都都知延福宫使武信軍節度觀察等使任守忠為入內內侍省內侍都都知兩省都都知國朝未嘗除也御史俞希孟乞令後更不除前後殿都都知乃詔自守忠後更不差除熙寧中入內內侍省內侍省都知押班遂省各以轉入先後相壓永為定式其入內內侍省都知押班只以四員為定更不非次添員副都知元祐令正六品初止有內中髙品都知押班後隨省院改易景德三年置都都知副都知以諸司使副使以上充押班元祐令正六品初止兼他職他或加檢校官淳化後始以崇班以上充又有上御藥自押班以上領省事內常侍內東西頭供奉官殿頭髙班黃門太平興國四年置入內殿頭髙班髙品小底三等雍熙三年置入內供奉官入內髙班內品大中祥符二年詔改定入內內侍省東西頭班供奉官殿頭髙品髙班黃門凡六等罷小底之門黃門初補止曰小黃門經恩遷補即為內侍黃門掌入禁中及奉使之事祗候殿頭祗候髙品祗候髙班內品祗候小內品貼祗候內品入內內品把門內品後苑內品後苑散內品皆畨宿給使其東頭供奉官以上並同內侍省內侍省左右班都都知內侍省後唐同光元年以左監門衛將軍判內侍省李紹宏兼內侍據紹宏始莊宗潛龍日為中門使及即位命潞州監軍張君翰與郭崇韜為樞密使以紹宏為宣徽使心常不足崇韜知之乃置內勾之名凡天下錢糧榖簿書悉委裁決州縣供帳煩費議者非之天成元年廢內勾司國朝初有內班院淳化五年八月改內班為黃門九月改黃門為內侍黃門院為內侍省景德三年上名內侍省所領舊有監少監內侍內常侍內給事內謁者內侍伯宫教博士掖廷宫闈奚官內僕內府五局令丞其內府局丞以上為加官自小黃門以上皆有加官至內常侍止內侍以上不常置亦有時為內常侍以檢校官為之在內東西頭供奉上舊令官名悉存而五局並廢唯置宫闈令二員𨽻宗正寺左右班都都知左右班都知副都知元祐令並從六品並景德三年置詔以諸司使副使以上充雍熙三年以內中髙品都知王仁睿為洛苑副使仍舊都知諸司副使領都知自仁睿始也淳化五年以竇神興充莊宅使兼黃門左班都知諸司使領都知自神興始也熙寧六年以內侍押班蘇利涉為內侍省左班都知仍自入內侍省內侍省押班五周年無遺闕並除副都知押班元祐令置六品押班以上領省事東西頭供奉官元祐令從八品殿頭髙品髙班黃門元祐令從九品凡六等掌分畨入直宿出使之事行幸給事大中祥符八年廢黃門改髙班內品為前殿祗候髙班內品皇祐四年詔內省自今內侍供奉官至黃門以一百八十人為額元祐二年以一百人為額祗候髙班內品祗候內品貼祗候內品又有後苑內品後苑勾當事內班北班內品散內品後苑散內品寄班供奉侍禁殿直奉職熙寧中定寄班祗候以一十五人為額書吏六人本省三人西班城北班城西班各一人咸平五年十一月以內侍髙品張仁恭為內侍省內侍殿直仁恭晉國長公主以職當遷殿頭髙品而給事主第其名非便故置是職景德三年五月內侍省班院言準淳化五年勑內班院改為內侍省內侍班院入內黃門班院改為內侍省入內內侍班院今尚稱入內內侍班院以上稱入內內侍省本班亦請稱內侍及賜新印從之大中祥符元年詔定入內內侍省官俸料供奉官月俸錢七千五百殿頭四千髙品三千髙班二千五百黃門一千五百供奉官殿直米三石髙品官班黃門二石五斗供奉官至髙班春衣絹五匹黃門四匹供奉官冬衣加二十匹其餘十五匹嘉祐八年四月以崇儀使康州刺史內侍省押班盧昭序管勾皇子位後以昭序疾復以皇城使端州刺史內侍省副都知石全育代之五月管勾皇子位昭宣使端州刺史內侍省右班副都知石全育領康州團練使充入內內侍省副都知故事都知止四人至是并全育而五詔後有闕即勿補以勾當皇子位入內西頭供奉官蘇利涉為入內內東頭供奉官內侍省內侍殿頭張允誠為入內內西頭供奉官並兼扶侍宣慶使入內侍省都知任守忠提舉管勾皇子位熙寧五年詔內省省內臣不係禁中祗應及入內省人數寖多今後前後省內臣轉至承制崇班內常侍許進一子與下班殿侍三班差使內侍省東西頭供奉官殿頭許進一子與下班殿侍諸班內品更不許進入內內侍省所管諸班內品每年通許進五人餘悉仍舊內供奉官以下至黃門如願進外官者比內侍省遞加一等推恩其內臣諸司使副合例奏兒男充前班者今後更不奏內臣時上諭樞密院曰方今宦者數已多而𨽻省者又不入內空絶人之世仁政所不取且獨不可用三班使臣以代其職事乎吳充對曰此曹盛衰前代或繫興亡聖朝固無兹慮然人君重絶人繼嗣此盛德之舉也臣等敢不奉行元豐八年諸兩省內臣諸級入內省內侍省內常侍視內殿崇班內東頭供奉官並視東頭供奉官內西頭供奉官並視西頭供奉官殿頭並視左侍禁髙品祗候殿頭應敘官者敘內侍省殿頭高品並視右侍禁髙班祗候髙品髙品並視左班殿直黃門祗侯髙品內品黃門並視右班殿直祗候內品祗候髙班內品並視奉職祗候小內品祗候內品並視借職貼祗候內品貼祗候內品並視差使入內內品內品並視借差把門內品後苑內品並視下班殿侍後苑內品後苑勾當事內品並視將軍後苑散內品北班內品並視守闕將軍散內品後苑散內品此二等雖無所比應敘降者並依兩等官法元祐官品令入內內侍省都都知至內侍省內品為內侍官總中官共六尺輿前漢宦者趙談以數幸嘗害袁盎盎患之盎兄子種説盎曰君與鬬廷辱之使其毁不用孝文帝出趙談驂乘盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載于是上笑下趙談談泣下車公卿畏之重足一迹石顯𢎞恭皆少坐法腐刑為中黃門以選為中尚書宣帝時任中書官恭明習法令故事善為請奏能稱其職恭為令顯為僕射元帝即位數年恭死顯代為中書令是時元帝被疾不視政事方隆好于音樂以顯久典事中人無外黨精專可信任遂委以政事無小大並顯自決貴幸傾朝百寮皆敬及蕭望之周堪劉更生言宜罷中書宦官應古不近刑人元帝不聽由是大與顯忤後皆害言者望之自殺堪更生廢錮不得復進用後張猛京房陳咸賈捐之皆嘗奏對事或召見言顯短顯求索其罪京房捐之棄市猛自殺于公車咸抵罪髠為城旦及鄭令蘇建得顯私書奏之後以他事論死自是公卿以下畏顯重足一迹與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位民歌之曰牢耶石耶五鹿客耶印何纍纍綬若若耶言其兼官據勢也巷職參天機宦者傳贊曰況乃巷職逺參天機並起第宅擬宫室靈帝時宦者得志無所畏憚並起第宅擬於宫室帝嘗登永安候臺宦者等恐其望見居處乃使趙忠等諌曰天子不當登髙登髙則百姓離散自是不敢復升臺榭譏呵豎官以蔡雍為戒後漢宦者吕強為人清忠奉公靈帝時上疏陳事云前召議郎蔡雍對問于金馬門雍切言極對毁刺貴臣譏呵豎官陛下不密其言至令宣露陛下回文誹謗致雍刑罪今羣臣皆以為戒上畏不測之難下懼劍客之害聚謀西鍾下後漢宦者傳孫程王康等十八人聚謀于西鍾下迎濟隂王立之是為順帝後孫程等有罪將徙逺縣周舉曰朝廷在西鍾下時非孫程等豈立乎朝廷謂順帝也五侯單超徐璜具瑗左悺唐衡同受桓帝命定議誅梁冀並封侯賞賜五人同日封故世謂之五侯自是五侯宗族賓客遍天下左回天左悺具瑗徐璜唐衡並封侯貴寵天下為之語曰左回天具獨坐徐卧虎唐兩墮兩墮謂隨意所為不定也今人謂持兩端而任意為兩墮貝獨坐徐卧虎唐兩墮上養子襲封漢順帝陽熹四年初聽中官得以養子為後襲封爵無鬚誤死袁紹閉北宫門勒兵捕宦者無少長皆殺之或有無鬚而誤死者至自發露乃得免自古無以中官為將帥唐穆質性強直自補闕至給事中時政得失未嘗不先論諌憲宗以王承宗叛用內官吐突承瓘為招討使質率同列仗論奏言自古無以中官為將帥者上雖改其名心頗不悅北司劉蕡博學善屬文好談王霸大略耿介嫉惡言及世務慨然有澄清之志自元和末閽寺權威握兵宫闈橫制天下天子廢立由其可否干撓庶政當時因為南北司愛惡相攻有同水火蕡草澤中居常憤惋文宗即位恭儉求理太和二年䇿試賢良蕡對以官者五帝三王之所建也法者髙宗太宗之所制也法宜畫一官宜正名今又分外官中官之名立南司北司之局或禁犯于南則亡命于北或正刑于外則破律于中法出多門人無所措陛下何不以聽朝之餘時御便殿召當時賢相與舊德老臣訪持變扶危之謀求定傾救亂之術塞隂邪之路屏褻狎之臣制侵凌追脅之心復門戶掃除之役時考䇿官馮宿賈餗龎嚴三人者皆時之文士也覩蕡條對歎服嗟悒時登科者二十二人而中官當途考官不敢留蕡在籍中物論不平凌轢南司唐太和中京師變故之後宦官氣盛凌轢南司延英議事中貴語必訐訓注以折文臣宰相李石鄭覃嘗謂之曰京師之亂始自訓注而訓注之始起自何人仇士良等不能對其勢稍抑縉紳賴之南北司相傾昭宗時鳯翔節度使李茂貞邠州王行瑜華州韓建稱兵入朝極言南北司相傾深蠧時政請誅其太甚者于是殺宰相韋昭度李溪等并內侍數人千餘人則天中宗增置宦者千餘人然衣朱紫者尚寡門施􅙶戟玄宗時中官稍稱旨者即授三品左右監門將軍得門施􅙶戟品官黃衣三千人開元天寶中長安大內大明興慶三宫皇子十宅院皇孫百孫院東都大內上陽兩宫大率宫女四萬人品官黃衣以上三千人衣朱紫者千餘人三公封王爵李輔國從幸靈武程元振翼衛代宗怙寵邀君乃至守三公封王爵干預國政亦未全握兵權也典兵德宗避涇師之亂幸山南實竇文埸霍仙鳴擁從賊兵之後不欲武臣典重兵自是親兵之權全歸于宦者矣倚為爪牙楊思朂少給事內侍省從玄宗討內難擢左監門衛將軍帝倚為爪牙開元初安南蠻渠梅叔鸞叛號黑帝舉三十二州之衆外結林邑思朂請行繇馬援故道出不意賊駭𣅿不暇謀遂大敗封尸為京觀而還鷙忍敢殺戮思朂鷙忍敢殺戮所得俘囚必剝面𠢐凌之初剝出腦褫髮皮以示人將士以下懾服莫敢視以是能立功四方秦請先省後進髙力士馮盎曽孫也以髙延福奏為子故冒其姓韋氏平擢內給事先天中以誅蕭岑等功為右監門衛將軍知內侍省事于是四方奏請皆先省後進小事即専決雖洗沐未嘗出眠息殿帷中徼幸者願一見如天人然帝曰力士當上我寢內安當是時宇文融李林甫蓋嘉運韋堅楊慎矜王鉷楊國忠安祿山安思順髙仙芝等雖以才寵進然皆結力士故能踵至將相自餘承風附會不可計皆得所欲徼幸者願見如天人上不名而呼將軍肅宗在東宫兄事力士諸王公主皆呼為阿翁戚里諸家尊曰父子帝或不名而呼將軍定儲位初太子瑛廢武惠妃方嬖李林甫等方屬夀王帝以肅宗長意未決居忽忽不食力士曰大家不食亦膳羞不具耶帝曰爾我家老揣我何為而然力士曰嗣君未定也推長而立孰敢爭帝曰爾言是也儲位遂定生平無顯顯大過力士善揣時事勢候伺上下雖親昵至當覆敗不肯為救力故生平無顯顯大過議者頗恨宇文融以來權利相賊皆天下之禍雖有補益弗相除去權震天下程元振少以宦人直內侍省與李輔國助討難立太子是為代宗拜右監門衛將軍知內侍省事元振叛元帥行軍司馬盡總禁兵不踰嵗權震天下在輔國右凶決又過之軍中呼十郎斬首馳告天下廣德初吐蕃黨項內侵詔天下兵無一士奔命者虜寇便橋帝倉皇出居陜京師陷賊剽府庫焚閭弄蕭然為空太常博士栁伉上疏云必欲存宗廟社稷獨斬元振首馳告天下悉去內使𨽻諸州獨留朝恩備左右乃下詔盡削元振官爵放歸田里三宫檢責使魚朝恩天寶末以品官給事黃門內隂善宣納詔令至德初為三宫檢責使觀軍容使九節度圍賊相州以朝恩為觀軍容宣慰處置使觀軍容使自朝恩始也毁郭子儀子儀有定天下功居人臣第一心媢之乘相州敗醜為詆毁肅宗不內其語然猶罷子儀兵留京師代宗立與程元振一口加毁帝未及寤子儀憂甚俄而吐蕃陷京師卒用其力王室再安故朝恩內慙才兼文武朝恩好引輕浮後生處門下講五經文義作文章謂才兼文武徼伺恩寵權震朝廷竇文場霍仙鳴者始並𨽻東宫未有名自魚朝恩死宦人不復典兵及京師亂帝召所衛無一人至者惟文場等率宦官至帝遂以左右軍付文場主之帝自山南還兩軍復完而詔文場仙鳴分總之廢天威軍左右神䇿是時竇霍權震朝廷諸方節度大將多出其軍臺省要官走門下丏援引者足相躡以忠謹稱唐書中人以忠謹稱者唯馬存亮西門季玄嚴遵美三人而已聽老夫語仇士良統左右軍以疾辭罷為內侍監知省事固請老詔可士良之老中人舉送還第謝曰諸君善事天子能聽老夫語乎衆唯唯士良曰天子不可令間暇暇必觀書見儒臣則必納諫智深慮逺減玩好省遊幸吾屬恩且薄而權輕矣為諸君計莫若殖財貨盛鷹馬日以毬獵聲色蠱其心極侈靡便悅不知息則必斥經術暗外事萬幾在我恩澤權力欲焉往哉衆再拜士良殺二王一妃四宰相貪酷二十餘年亦有術自將恩禮不衰云貪酷二十餘年上歷階面數帝過失始自良𢎞志憤文宗與李訓謀屢欲廢帝崔慎由為翰林學士直夜未半有中使召入至祕殿見士良等坐堂上帷帳周密謂慎由曰上不豫已久自即位政令多荒闕皇太后有制更正嗣君學士當作詔慎由驚曰上髙明之德在天下安可輕議慎由親族中表千人兄弟羣從且三百何可與覆族事雖死不承命士良等默然久乃啓後户引至小殿帝在焉士良等歷階數帝過失帝俯首既而士良指帝曰不為學士不得更坐此乃送慎由出戒曰毋泄禍及爾宗五父李輔國肅宗任以股膂事貴幸不敢斥常呼五郎李揆當國以子姪事之號五父移上皇居西內初太上皇每置酒長慶樓南俯大道因徘徊觀覽或父老過之皆拜舞乃去輔國因妄言于帝曰太上皇居近市交通外人陳玄禮髙力士等將不利陛下願徙太上皇入禁中帝不寤上皇謂力士曰吾兒用輔國謀不得終孝矣會帝屬疾輔國即詐言皇帝請太上皇按行中宫至睿武門射生官五百遮道太上皇驚幾墜馬問何為者輔國以甲騎數十馳奏陛下以興慶宫湫狹奉迎乘輿還宫中力士厲聲曰五十年太平天子輔國欲何事叱使下馬輔國失轡罵力士曰翁不解事斬一從者力士呼曰太上皇問將士各好在否將士納刀呼萬嵗皆再拜力士復曰輔國可御太上皇馬輔國鞾而走與力士對執轡還西內居甘露殿侍衛才數十皆尫老太上皇執力士手曰微將軍朕且為兵死鬼左右皆流涕而已求為宰相李輔國拜兵部尚書求為宰相帝重違曰卿勳力何任不可但羣望未一如何輔國遂諷宰相裴冕使聨表薦已帝密擲蕭華使喻止冕張皇后數疾其顓帝寢疾太子監國后召太子將誅輔國及程元振太子不從更召越王兖王圖之元振告輔國即伏兵凌霄門迎太子伺變是夜捕二王及中人朱暉充馬英俊等囚之而殺后他殿代宗立輔國等以定䇿功愈跋扈至謂帝曰大家第坐宫中外事聽老奴處決帝矍然欲剪除而憚其握兵因尊為尚父事無大小率關白羣臣出入皆先詣輔國頗自安又進册司空兼中書令尊為尚父上中外聞其失勢舉相賀輔國罷判元帥行軍司馬賜大第于外中外聞其失勢舉相賀輔國乞解官詔進封博陵郡王輔國欲入中書作謝表閽者不內曰尚父罷宰相不可入輔國氣塞久乃曰老奴死罪事郎君不了請也下事先帝矣輔國自徙太上皇天下疾之帝在東宫積不平既嗣位不欲顯戮遣俠者夜刺殺之年五十九抵其首溷中殊右臂告泰陵然猶祕其事刻木代首以葬刻木代首以葬上天下威勢舉歸其門楊復恭以諸子為州刺史號外宅郎君又養子六百人監諸道軍天下威勢舉歸其門肩輿至前殿復恭常肩輿抵太極殿宰相對延英論叛臣事孔緯曰陛下左右有將反者帝矍然緯顧復恭復恭曰臣豈負陛下者緯曰復恭陛下家奴而肩輿至前殿廣樹不逞皆姓楊非反乎復恭曰欲收士心輔天子帝曰誠欲收士心胡不假姓李乎復恭無以對會緯出守江陵乃使劫之長樂坡斬其旌節資貯皆盡緯僅免定䇿國老李茂貞上復恭為與守亮書曰承天門者隋家舊業也兒但積粟訓兵何進奉為吾披荆榛立天子既得位乃廢定䇿國老奈負心門生何門生謂天子也其不臣類此大長秋所進達皆海內名人後漢曹騰以定䇿立桓帝功封費亭侯遷大長秋加位特進騰用事省闥三十餘年歷事四帝未嘗有過其所進達皆海內名人固辭舉薦梁賀位為大長秋清儉退讓陽嘉中詔九卿舉武猛獨無所舉薦帝引問其故對曰臣生自草茅長于宫掖既無知人之明又未嘗交知士類昔衛鞅因景監以見有識知其不終今得臣舉匪榮伊辱固辭之矯詔誅武蕃等曹節字漢豐靈帝即位以定䇿封長安鄉侯時竇太后臨朝后父大將軍武與太傅陳蕃謀誅中官節與長樂五官史朱瑀等矯詔誅武蕃等節遷長樂衛尉尋轉大長秋中尉玉山軍使唐昭宗賜左軍中尉楊復恭几杖以大將軍致仕復恭既失勢居第近玉山營假子守信為玉山軍使或誣告其謀亂詔李順守率禁兵討之守信以兵拒之列戰于昌化里昭宗登延喜樓陳兵自衛以伺變相持至晚不戰而退是夜守信乃擁其兵衛復恭而出且戰行出通化門至興元府楊守亮納之于是鳳翔李茂貞等出兵討焉楊守亮與復恭等突圍而遁華州節度使韓建于路擊敗之並斬首送京師分統禁旅德宗避京師之亂既還京頗忌宿將凡握兵多者悉罷之其軍旅命竇文場霍仙鳴分統焉貞元十三年立護軍中尉兩員中護軍兩員以率禁軍乃以文場為左神䇿護軍中尉仙鳴為右神䇿護軍中尉右神䇿軍使張尚進為左神䇿中護軍中尉護軍自文場等始也權震天下時竇霍之權震于天下蕃鎮大將多出其軍臺省清要伺候門下以扣杖畫地責帝劉季述衛皇太子至紫延院左右軍及十道邸宫俞潭程嚴等皆急叩門請對士皆呼萬嵗入思政殿遇者輒殺帝方坐乞巧樓見兵入驚墜于床將走季述仲先持帝坐以所持扣杖畫地責帝曰某日某事爾不從我罪一也至數十未止皇后出遍拜曰護宅家勿使怖若有罪惟軍容議季述出百官奏曰陛下瞀倦于勤願奉太子監國陛下自頥東宫帝曰昨與而等飲甚樂何至于此后曰陛下如軍容語宫監掖帝出思政殿后昌言曰軍容一心輔持請上養疾帝亦曰朕久疾令太子監國程嚴等皆呼萬嵗后以傳國寶授季述就帝輦左右十餘人因入少陽院季述液金以完鐍謁者發倉粟以賑貧民前漢汲黯武帝即位為謁者東粵相攻上使黯往視之至吳而還報曰粵人相攻固其俗不足以當天子使者臣過河內河內貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河內倉米以賑貧民請歸節伏矯詔罪上賢而釋之異其才終軍少年以博辨能聞屬文聞于郡中太守其異才召見軍奇之與交結揖太守而去長安上書言事武帝異其才拜謁者贊拜殿中聲動左右東觀漢記何熙身長八尺體貌魁梧與人絶異和帝偉其貌特拜謁者熙能為威容贊拜殿中聲動左右博達有才魏書裴茂字巨先黃門郎中遷謁者僕射張顯揚言曰謁者僕射博達有才多識前代格言冗從僕射精勤舊吏魏書冗從僕射畢軌表尚書僕射王思精勤舊吏忠亮計略不及辛毗宜以代思有識見才幹晉起居注武帝詔缺以為冗從子瑋貞固和羣有識見才幹僕射性沉壯傅暢晉諸公讃司馬騰字元邁文獻王泰之第三子也性沉壯起家為冗從僕射騰欲棄官以自顯出為郡守職官分紀卷二十六
