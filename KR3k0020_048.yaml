body:
  text: 職官分紀卷四十八宋孫逢吉撰特進前漢諸侯功德優盛朝廷所敬異者賜位特進位在三公下故曰特進成都侯王商以特進領城門兵置幕府得舉吏如將軍是也後漢皇后父兄率為特進侯朝會位次三公光武以鄧禹列侯就第特進奉朝請是特引見之稱無官定體也而竇篤進位特進得舉吏見禮依三公晉百官表特進官品第二漢制皇后之父率為此官晉職官志特進漢官也二漢及晉位以為加官從本官車服無吏卒太僕羊琇遜位拜特進加散騎常侍無餘官故給吏卒車服其餘加特進者唯食其祿賜列其班位而已不别給特進吏卒車服晉惠帝元康中定令特進品秩第二位次諸公在開府驃騎上冠進賢兩梁黑介幘五時朝服佩水蒼玉無章綬食俸日四斛太康三年始賜春絹五十匹綿一百五十斤元康元年給菜田八頃田騶八人立夏後不給田者食俸一年置主簿功曹門吏亭長門下書佐各一人給安車黑耳駕御一人輅車施耳後車一乘沈約宋書特進魏世驃騎將軍劉放衡將軍孫資等遜位以侯就第蓋位特進其諸官加特者從本官供給特進但為班位而已不别有吏卒車服齊職官志特進位從公齊職儀特進以功德特進見也隋百官志梁特進舊位從公後魏北齊特進用人俱以舊德就間者居之隋高祖採後周之制有特進為散官以加文武官之德齊者並不理事煬帝即位廢唐職官志特進正二品國朝元祐令特進從一品特進至承務郎為寄祿官賜安車駟馬後漢梁商以女為皇后妹為貴人加位特進更增國土賜安車駟馬進逹皆海內名士曹勝加位特進其所進逹皆海內名士居家為天子師張禹雖居家以特進為天子師國家每有大政必與定議寢則布衣瓦器而食謝承後漢書趙典尊為國師位特進七為列卿寢則布衣瓦器而食賔客語不及國事司馬彪後漢書隂識拜金吾位特進入則極言正諫與賔客語不及國事慕仲山甫匪躬之節所用掾吏皆得天下俊哲掾吏皆天下俊哲上以高年得見優禮後魏書刁雍拜特進與隴西王梁賀及中書監唐允等並以高年特見優禮賜几杖劔履上殿日致羞焉金紫光祿大夫銀青光祿大夫光祿大夫前漢百官表大夫掌論議有中大夫武帝太初元年更名光祿大夫秩比二千石光祿大夫無師古曰無印綬後漢百官志光祿大夫比二千石注曰無員漢官三人凡大夫皆掌顧問應對無掌事唯詔命所使凡諸國嗣之喪則光祿大夫掌弔光祿勳屬官有中大夫掌議後漢武帝太初元年更名為光祿大夫秩比二千石無印綬光祿勳門外特施行馬以旌别之無掌事唯備顧問待詔命晉置左右光祿大夫光祿三大夫皆銀章青綬其重者詔加金章紫綬則謂之金紫光祿大夫以其重者既有金紫之號故謂本光祿為銀青光祿大夫晉職官志左右光祿大夫加金章紫綬光祿大夫加金章紫綬者秩第二祿賜班位冠幘車服佩玉置吏卒羽林皆賜給與特進同其以為加官者唯加章祿綬賜班位而已不别給車吏卒也又曰光祿大夫假銀章青綬者品秩第三位在金紫將軍下諸卿上漢時所置無定員多以為拜假賵贈之使及監護喪事魏氏以來轉復優重不復以為使命其諸公告老者皆家拜此位及在朝顯職復用加之及晉受命仍舊不改以為優崇之例而諸公遜位不復加之或更拜上公或以本封食公祿其諸卿尹中朝大官年老致事者及內外之職加此者前後甚衆由是或因得開封或進加金章紫綬又復以為禮贈之官泰始中唯太子詹事楊珧加給事中光祿大夫加兵之制諸所供給依三品將軍其餘自如舊制終武惠孝懷三世又曰光祿大夫與卿同秩中二千石著進賢兩梁冠黑介幘五時朝服佩水蒼玉食俸日三斛太康二年始給賜春絹五十匹綿百斤惠帝元康元年始給菜田二頃田騶六人置主簿功曹門吏亭長門下書佐各一人漢官解詁武帝以中大夫為光祿大夫世祖中興以諫議大夫又為中散大夫此四等於古禮蓋為天子之下大夫視列國之上卿者也與博士皆以儒雅之選異官通職周禮所謂官人者也溫故知新率由舊章皆能發明古今遵由經典辨章舊聞者也晉職官要録左右光祿大夫魏志云孫資為光祿加開劉府儀同三司王隱晉書云實以右光祿大夫開府荀朂以左光祿開府裴秀荀朂王戎皆為之劉毅追贈之悉開府宋百官志左光祿右光祿二大夫晉初置光祿大夫秦時為中大夫漢武太初元年更名光祿大夫如故南齊百官志左右光祿大夫位從公開府置佐史如公光祿大夫皆銀章青綬詔加金章紫綬者為金紫光祿大夫隋職官志梁左右光祿大夫並無員以養老疾陳紫金光祿大夫中二千石後齊光祿大夫金紫銀青用人俱以舊德者居之隋高祖左右光祿大夫金紫銀青光祿大夫並散官以加文武官之德齊者並不理事煬帝置光祿從一品左右光祿左正二品右從二品金紫正三品銀青從三品唐職官志左右光祿大夫左從一品右從二品為文散官武德十一年改光祿大夫為從二品金紫為三品銀青從三品元祐官品令金紫光祿大夫正二品銀青光祿大夫從二品光祿大夫正三品紹聖二年四月二日敕寄祿官分左右除正議大夫銀青光祿大夫左右外仍朝散大夫中散大夫依舊存留左右字以分雜出身及無出身人依舊作兩資選轉餘並廢罷金紫光祿大夫地望可國婚晉尚書王藴字叔仁修弟也烈宗時納后訪于公卿僕射謝安云王藴地望可國婚定后既立徴拜金紫光祿大夫乞一片金南齊樂安任遐為光祿就王晏乞一片金晏乃啓轉為金紫不行銀青光祿大夫吾家千里駒見光祿大夫門特加五階唐崔瓘見刺史門光祿大夫厠之爭臣之末前漢谷永為大將軍王鳯擢為光祿大夫永奏謝鳳曰永斗筲之材質薄學朽無一日之雅左右之介將軍悅其言擢之皂衣之吏厠之爭臣之末親近未嘗有過金日碑為光祿大夫親近未嘗有過上為愛之自念無報厚德貢禹上書貧老家費不滿萬錢拜光祿大夫賜益富厚自念無報厚德日夜慙懼召見説詩蔡義上疏臣山東草萊之人行能無所取容貌不及衆然而不棄人倫者以聞道於先師也願賜清間夫之燕得盡精思於前上召見説詩甚悅擢為光祿大論議深博師丹字仲公琅琊東武人也建始中州舉茂材補博士出為東平王太傅丞相方進舉丹論議深博亷正守道徴入為光祿大夫出則奉車入侍左右霍光為奉車都尉光祿大夫出則奉車入侍左右出入禁闥二十餘年小心謹慎未嘗有過甚見親烏孫盜其印綬常惠少時家貧自奮應募隨中監蘇武使胸奴并見拘留十餘年昭帝時乃還漢嘉其功勞拜為光祿大夫宣帝世使烏孫烏孫盜其印綬惠恐誅天子以其奉使克獲封長羅侯善説禮服夏侯勝字長公善説禮服徴為光祿大夫會昭帝崩昌邑王嗣立數出勝當乘輿前諫曰天久隂而不雨陛下出欲何之王怒謂為妖言縛以屬吏吏乃白大將軍霍光祕不舉發是時光與車騎將軍謀欲廢昌邑王光讓安世以為泄語安世實不言乃召勝勝對言在洪範下人有伐上者天隂而不雨光與安世大驚以此益重經術之士臨朝勿令預到樊宏為光祿大夫為人謙柔畏慎每朝會迎朝先到伏俯待事時至則起帝聞之勑勿令預到白馬生東觀漢記張湛字子孝為光祿大夫數見諫王威儀不如法度者湛常乘白馬帝每見湛輒言白馬生且復諫矣出入蒼頭盧兒傳呼杜令王仲翁為光祿大夫出入蒼頭盧兒傳呼時為尊寵故舊平生為勸華嶠後漢書鄧晨拜光祿大夫數見故舊平生為勸引見著布單衣魏文帝受禪欲以楊彪為太尉先遣使示旨彪辭曰彪備漢三公遭代傾亂不能有所益老年被病豈可贊惟新之朝遂固辭乃授光祿大夫賜以几杖朝會引見令著布單衣鹿皮冠入待以賓客之禮據經對大義蜀譙周遷光祿大夫位亞九列雖不與事以儒行見禮事訪大義據經以對而後生好事者亦咨問所疑拔佩刀以斷車鞅汝南先賢傳郭憲字子橫為光祿大夫上欲巡三輔憲諫曰天下未定車駕未可以巡上遂行憲當車拔佩刀以斷車鞅上不止到𢎞農兵起潁川上曰朕悔不從光祿之言乃還委榮辭祿不降其節樊英别傳詔書告南陽太守曰五官中郎將樊英委榮辭祿不降其節志不可奪今以英為光祿賜家所在縣給榖千斛常以八月存問高年給羊一頭酒三斛告老致仕王隱晉書劉毅字仲雄年老致仕以光祿大夫門施行馬賜錢百萬疾病失明鄭褒疾病失明屢乞骸骨不允拜光祿大夫少持操行能清言晉祖訥字士言少持操行能清言遷右光祿大夫王夷甫見而稱之荀組字大章弱冠太尉王夷甫見而稱之為光祿夫王濟甚相器重茍嵩字景猷組族子也弱冠太原王濟甚器重拜光祿大夫吾家千里駒顧和字君季二嵗失父總角便有清操弱冠知名族父榮器之曰此吾家千里駒也興吾家者必此子矣康帝即位為尚書僕射又拜銀青光祿大夫又遷光祿大夫以風疾遜位晉諸公贊位加光祿以風疾遜大夫議省官吏晉紀茍勗為光祿大夫晉武議省州縣吏以趨農功勗以省吏不如省事省官不如清心昔蕭曹相漢載其清靜畫一之歌此清心之本也漢文之世垂拱無為幾致刑措此省事也漢光武時并合吏員縣官國邑裁置什一此省官也魏太和中遣王人四出減天下吏員正始中亦并合郡縣以減吏員此省吏也今必欲求之於本量宜以省事為先設官分職委任責成心競而不力爭事能受任思不出位官無異業政典不姦則事省矣食大夫祿還第後魏書李茂為光祿大夫性謙慎以弟仲寵盛懼於盈滿遂托以老疾因請位高祖從之聽食大夫祿還私第引入卧內崔浩為左光祿大夫帝每幸其第多問以異事或倉卒不及束帶奉進疏食不暇精膳帝為食或立而旋其見寵愛如此自後引入卧內飛翠鳴玉升降禁門南史丘遲為僕射讓光祿大夫表云飛翠鳴王升降禁門獻尚書以諷帝隋蘇威為光祿大夫從煬帝幸鴈門回屬五月五日百寮上供多以珍玩威獻尚書一部以諷帝刻石為人馬以象拔箭之狀唐丘行恭善騎射勇力絶倫為光祿大夫從太宗討王世充會戰于邙衆山太宗欲知其虛實強弱乃與數十騎衝之直出其後皆披靡莫敢當其鋒殺傷甚衆既而陷以長隄與諸騎相失惟行恭獨從尋有勒騎數人追及太宗矢中御馬行恭回騎射之發無不中餘賊不敢復前然後下馬拔箭以其所乘馬進太宗行恭自御馬前步執長刀呼斬數人突陳而出貞觀中有詔刻石為人馬以象行恭拔箭之狀立於昭陵闕前正議大夫通議大夫太中大夫中大夫中散大夫朝議大夫朝請大夫朝散大夫朝奉大夫前漢百官表大夫掌論議有太中大夫中大夫諫大夫皆無員多至數十人武帝元狩五年初置諫大夫秩八百石太初元年更名中大夫為光祿大夫秩比二千石太中大夫秩比千石如故後漢百官志太中大夫千石本注曰無員漢官曰二十人秩比二千石中散大夫六百石本注曰無員漢官曰二十人秩比二千石韋昭辨釋名中大夫在中散上高大也宋百官志中散大夫王莽所置後漢因之前後大夫皆無員掌論議後漢光祿大夫三人中大夫二十人中散大夫三十人魏以來復無員自左光祿大夫以下飬老疾無職事中散六百石南齊百官志太中諸大夫皆處舊齒年老重者加親信二十人隋百官志梁太中中大夫並無員以飬老疾陳太中大夫千石隋高祖朝議朝散大夫並為散官加以文武官之德齊者並不領事煬帝置正議正四品通議從五品大夫唐職官志太中大夫正四品中大夫從四品上中散大夫正五品並為文散官武德十一年改正議大夫為正四品上通議大夫為正四品下太中大夫為從四品上中大夫為從四品下中散大夫為正五品上朝議大夫為正五品下朝請大夫為從五品上朝散大夫為從五品下九國志吳世家武觀元年改文散官為大卿國朝元祐令正議大夫從三品通議大夫正四品太中大夫從四品中大夫正五品中散大夫從五品朝議大夫正六品朝請朝散朝奉大夫從六品正議大夫通典正議通議大夫皆隋置散官蓋取秦大夫掌議論之義通議大夫通典見正議大夫太中大夫説尉他稱臣前漢陸賈以客從高祖定天下名有口辨居左右常使諸侯時中國初定尉他平南越因王之使賈賜他印為南越王賈説他令稱臣奉漢約歸報髙祖大悅拜賈太中大夫謹文法程不識孝景時以數直諫為太中大夫為人亷謹於文法議明堂事申公魯人也以詩經弟子自逺方來受業者千餘人武帝時使使加璧安車以蒲輪事迎之申公已八十餘即時拜太中大夫議明堂諸生以為能賈誼年十八以能誦詩書屬文帝詔為博士誼年二十餘最為少每詔令議下諸老先生未能言誼盡為之對人人各如其意所出諸生以為能文帝悅之詔遷太中大夫直言切諫東方朔拜太中大夫觀察顔色直言切諫上常用之賜宅一區後漢郭伋為太中大夫賜宅一區及錢榖以充其家輒散與宗親九族無所遺餘中東門君張湛稱疾不朝拜太中大夫居中東門候舍故時人號曰中東門君王者之器隗囂將議自立為王納鄭興之説而止遂廣置職位以自尊高興復止之曰夫中郎將太中大夫使持節官皆王者之器非人臣所當制也惟器與名不可以假人無益於實有損於名非尊上之意也行青州賣卜薑肱字伯淮再聘不就即拜太中大夫詔至門報云久疾就醫遂行青州賣卜以自給代王梁為司空後漢宋𢎞自太中大夫代王梁為司空守道彌固魏志韓暨字公明詔太中大夫暨澡身浴德志節高潔年八十守道彌固可謂純篤老而益勗者以為司徒固辭不受黃初四年詔公卿舉獨行君子司徒華歆薦管寧為太中大夫固辭不受祿賜與卿同晉王覽拜太中大夫祿賜與卿同並平尚書事前漢張敞為太中大夫子定國並平尚書事以正直忤霍光少有學行吳志裴云少有學行官至太中大夫召見宣室對得失王嘉字公仲平陵人也鴻嘉中舉敦朴能直言召見宣室對政事得失遷太中大夫使行風俗蓋寬饒為太中大夫使行風俗多所稱舉貶黜奉使稱意言春秋楚詞朱買臣言春秋楚詞帝悅之拜太中大夫言法令遵舊典司馬彪續漢書梁統字仲寧為太中大夫在朝上便冝言法令須遵舊典下三公議云隆行峻法非明主急務遂寢今日得氣鄭興為太中大夫數上便宜多見納朝廷大議訪興興據經守正侃侃而陳一時議者皆服其辨莫之能屈或謂興曰鄭大夫今日得氣矣杜令薦興堪侍帷幄講華光之內劉寬字聞饒拜太中大夫講華光之內明習故事東觀漢記張純明習故事時舊典多夫闕皆待純以決拜太中大詣闕還官牟長字君高遭父喪以太中大夫歸行喪服竟詣闕還官待以師傅之禮謝承後漢陳囂拜侍中又帝拜太中大夫年七十每朝常待以師傅之禮賜几杖入朝不趨贊事不名以病乞骸骨以大夫位終失勢而賔客滿門張璠漢記孔融恃才狎侮太祖太祖禁酒融書與之云紂天有酒旗之星地有酒泉之郡堯不千鍾無以成聖桀以色亡國今令不禁婚姻何也太祖外寬內忌使御史郗憲以法免之後拜太中大夫雖失勢賔客日滿其門愛才樂酒常歎曰坐上客常滿樽中酒不空有老成之美王隱晉書華表自表退太常以為太中大夫詔褒表有老成之美優遊自得班彪為太中大夫嘗云陸如賈董仲舒東方朔司馬相吾丘壽王王吉貢禹劉向楊雄皆以漢大夫優遊自得不易公卿也纍年宰郡資無擔石梁書顧憲之風病求還吳天監二年授太中大夫纍年宰郡資無擔石及歸環堵不免飢寒中大夫力戰前漢灌嬰雖年少數力戰拜中大夫嬰本睢陵販繒對策最高朝錯對䇿者百餘人惟錯最高為中大夫問尚書一篇倪寬以御史見上語經學從問尚書一篇擢為中大夫有口辨田蚡貴幸為中大夫有口辨學盤盂諸書應劭曰黃帝使孔甲所作也凡二十九篇書盤盂所以為法戒也孟康曰孔甲盤盂二十六篇雜家書兼儒墨名法者也數切諫汲黯為中大夫以數切諫不得久留遷東海太守中散大夫道藝深明續漢書魯平字叔陵侍郎賈逵薦云道藝深明帝使與尚書令黃香相問難上嘉平説特賜冠履遷中散大夫能説易春秋譙玄字君黃少好學能説易春秋遷中散大夫選使八人班化風俗分行天下為繡衣使者専行誅賞諸生著録前後萬人東觀漢記牟長字君高少篤學習歐陽尚書諸生著録前後萬人建武十六年後為中散大夫有欒布之節見太常太醫令門分行天下王莽遣中散大夫謁者各四十五人分行天下彈琴鬼歎語林嵇中散夜彈琴忽有一鬼械長歎舉其手袂曰君一絃一調中散與琴彈之聲清泠遙問不對疑是蔡雍雍死之時身著桎梏為時儒宗宋書中散大夫徐曠篤於學問為時儒宗年過八十自講五經世皆取法焉朝議大夫通典朝議大夫隋置散官以取諸漢大夫上奉朝議為名唐因之朝請大夫通典隋置散大夫取漢將軍公卿年高德重者以列侯就第特進奉朝請之義唐因之朝散大夫品秩貴唐兵部郎中知制誥馮宿等授朝散大夫制云凡品秩之制有九自五以上謂之貴其所以為貴者蔭及子命及妻腰白金服赤紱從大夫之後而已白居易詞遣使就拜曹憲每聚徒教授諸生數百人當時公卿以下亦多從之受業貞觀中揚州長史李襲譽表薦之太宗召為𢎞文館學士以年老不赴乃遣使就家拜朝散大夫學者榮之幸其家視飲食甄權嘗以母病與弟立言專醫方得其旨趣年一百三歲太宗幸其家視飲食訪以藥性授朝散大夫賜几杖衣服朝奉大夫朝請郎朝散郎朝奉郎承議郎奉議郎通直郎宣德郎宣義郎承事郎承奉郎承務郎隋文帝於吏部置朝議通議朝請朝散給事承奉儒林文林等八郎武騎屯騎驍騎遊騎飛騎旅騎雲騎羽騎等八尉其品正六品下九品上上階為郎下階為尉煬帝罷八郎八尉置散騎郎從五品宣議郎從七品各四十人徴事郎正六品將仕郎從八品常從郎正九品奉信郎從九品各五十人是為正員並得祿當品又各有散員郎無員無祿尋改常從為登仕奉信為散從唐職官志朝議郎承議郎正六品通議郎通直郎從六品朝請郎宣德郎正七品朝散郎宣議郎從七品給事郎徴事郎正八品承奉郎承務郎從八品儒林郎登仕郎正九品文林郎將仕郎從九品並為文散官武德十一年改通議郎為奉議郎國朝元祐令朝請郎朝散郎朝奉郎正七品承議郎從七品奉議郎正八品通直郎正八品宣德郎宣義郎從八品承事郎承奉郎正九品理親民資序者從八品承務郎準此承務郎從九品通直郎以上為升朝官朝請郎通典朝請郎隋置散官蓋採晉宋齊梁陳並有朝請員為名唐因之朝散郎通典隋置散官唐因之朝奉郎缺承議郎缺奉議郎通典通議郎隋置唐改通議為奉議郎通直郎通典通直郎隋置蓋採晉宋以來諸官皆有通直謂官高下而通為宿直者也因此為名唐因之宣德郎缺宣義郎通典遊騎尉隋置散官唐改為宣義郎蓋取梁宣義將軍之名承事郎缺承奉郎通典隋散官唐因之承務郎通典承務郎唐蓋因隋尚書省二十四司承務郎之名也職官分紀卷四十八
