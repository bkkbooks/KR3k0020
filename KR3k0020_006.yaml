body:
  text: 職官分紀卷六宋孫逢吉撰門下省隋百官志門下省置侍中給事黄門侍郎各四人掌侍從左右擯相威儀盡規獻納糾正違闕監合嘗御藥封璽書侍案隋志以前歴代沿革原本並缺郎中髙功者在職一年詔加侍中祭酒與侍郎髙功者一人對掌禁令公車太官太醫等令驊騮厩後丞齊門下省掌獻納諫正及司進御之職侍中給事黄門侍郎各六人錄事四人通事令史主事令使各八人統局六領左右局領左右各二人左右直長四人尚食局典御二人丞監各四人尚藥局典御及丞各二人侍郎師尚藥監各四人主衣局都統子統各二人齊師四人殿中局殿中監四人隋門下省納言二人給事黄門侍郎四人錄事通事令史各六人又有散騎常侍通直散騎常侍各四人諫議大夫七人散騎侍郎四人員外散騎常侍六人通直散騎侍郎四人並掌部從朝直又有給事二十人員外散騎侍郎二十人奉朝四十人並掌同散騎常侍等兼出使勞問統城門尚食尚藥符璽御府殿内等六局城門局校二人直長四人食醫四人尚藥局典御二人侍醫直長各四人醫師四十人符璽御府殿内局監各二人直長四人煬帝分門下太僕二司取殿内監名以為殿内省并尚書門下内史秘書以為五省門下省减給事黄門侍郎員置二人去給事之名移吏部給事郎名為門下之職位次黄門下置員四人從五品省讀奏案廢散騎常侍諫議大夫散騎侍郎等常員改符璽監為郎置二員為從六品加錄事階為正八品以城門殿内尚食尚藥御府等五局𨽻殿内省十二年又改納言為内侍唐百官志門下省侍中二人正二品龍朔二年改門下省曰東臺垂拱元年改門下省曰鸞臺開元元年曰黄門省門下侍郎二人正三品下左散騎常侍二人正三品左諫議大夫四人正四品下給事中四人正五品上左補闕六人從七品上左拾遺六人從八品上符寳郎四人從六品上典儀二人從九品下城門郎四人從六品上符寳郎四人從六品上門下省有錄事四人從七品上主事四人從八品下有令史二十二人書令吏四十三人甲庫今十三人能書一人博書二人亭長六人掌固十四人修補制勅匠五人裝演一人起居郎三人賛者六人職官志初秦漢置侍中曹無臺省之名自晉始置門下省南北朝皆因之舊制宰相常於門下省議事謂之政事堂永淳二年七月中書令裴炎以中書執政事筆遂移政事堂於中書門下其印改為中書門下之印六典初秦漢置侍中曹無臺省之名自晉始有門下省歴宋齊梁陳後魏北齊隋國初皆曰門下省龍朔二年改東臺咸亨元年復舊光宅元年改為鸞臺神龍元年復嶲開元元年改黄門監五年復曰門下省國朝門下省掌讀省審覆奏駮正行御史所糺諸司不法考察吏部擬差職事官奏斷獄案受發通進表狀進寳印差行事官給逓馬劵賜旌節及命婦冠帔僧道紫衣師號應有法式所上之事侍中納言前漢百官表侍中秦官也侍中加列侯將軍卿大夫將都尉尚書太醫太官令至郎中無員多至數十人侍中得入禁中後漢百官志侍中比二千石漢官秩云千石周禮太僕干寳注曰若漢侍中本注曰無員常侍左右賛導衆事頋問應對法駕出則多識者一人参乗餘皆騎在乘輿車後本有僕射一人中興轉為祭酒或置或否蔡質漢儀曰侍中常伯選舊儒髙徳博學淵懿仰覘俯視切問近對喻㫖公卿上殿稱制参乘佩璽秉劍員本八人陪見舊在尚書令僕射下尚書正令官出入禁中武帝時侍中莽何羅挾刄謀逆由是侍中出禁外有事乃入畢即出王莽秉政侍中復入與中官共上章帝元和中侍中郭舉與後宫通㧞佩刀驚上舉伏誅由是侍中復出外後漢輿服志武冠一曰武弁大冠諸武官冠之侍中加黄金璫附蟬為文貂尾為飾謂之趙惠文冠漢舊儀侍中無員或列侯將軍衞尉光禄大夫為之得舉非法又曰侍中左右近臣見皇后如見帝見婕妤行則對壁坐則伏茵環濟要畧侍中古官也或曰風后為黄帝侍中周時為常伯常者言其道徳可常遵也秦始皇復故冠貂蟬漢因而不改侍帷幄受頋問拾遺於左右出則負璽以從秩二千石應劭漢官儀侍中周官也金貂蟬左金取堅剛百錬不撓蟬取居髙食潔口在腋下貂内勁悍而外温潤侍中便左右與帝升降論思近對拾遺補闕百僚之中莫密於兹又曰侍中秩千石黄門有盡宣署玉堂署各有長一人晉職官志侍中按黄帝時風后為侍中於周為常伯之任秦取古名置侍中漢因之秦漢俱無定員以功髙者一人為僕射魏晉以來置四人别加官者則非數掌導賛威儀大駕出則次直侍中䕶駕正直侍中負璽陪乘不帶劍餘皆騎從御坐殿與散騎常侍對扶侍中居左常侍居右備切問近對拾遺補闕及江左哀帝興寜四年桓温奏省二人後復舊宋百官志侍中四人掌奏事直侍左右應對獻替法駕出則正直一人負璽陪乘殿内門下衆事皆掌之周公戒成王立政之篇所云常伯即其任也侍中本秦丞相史也使五人徃來殿内東廂奏事故謂之侍中漢西京無員多至數十人入侍禁中分掌乘輿服物下䙝器虎子之属武帝世孔安國為侍中以其儒者特聽掌御唾壺朝廷榮之久次者為僕射漢東京又属少府猶無員掌侍左右賛導祠事顧問應荅法駕出則多識一人負傳國璽操斬白蛇劍参乗餘皆騎在乘輿車後光武世改僕射為祭酒漢世與中官俱止禁中武帝時出禁外有事乃入事畢則出王莽秉政復入與中官俱止魏晉以來置四人别加官不在數秩比二千石南齊百官志侍中漢世為親近之職魏選用稍増華重而大意不異齊世朝㑹多以美姿容者兼官永元三年東昏南郊不欲親朝士以主璽陪前代未嘗有也侍中呼為門下亦置令史陳侍中舎有八區論者或言員本八人後魏書侍中魏末置成軌王温平李封津並為中侍中隋百官志侍中四人掌侍從左右擯相威儀盡規獻納糾正違闕後齊侍中六人後周初有御伯中大夫二人掌出入侍從属天官府保定四年改為納言二人煬帝改為侍内唐百官志侍中二人正二品掌出納帝命相禮儀凡國家之務與中書令參摠而顓判省事下之通上其制有六一曰奏鈔謂祭祀之度國用授六品下官斷流以下罪及除免官當者二曰奏彈謂御史糾劾百司不法之事三曰露布謂諸軍破賊申尚書兵部而開奏焉四曰議謂朝廷之疑事下公卿議理異同奏而裁之五曰表六曰狀蔡邕獨斷凡羣臣上書通於天子者四品一曰章二曰奏三曰表四曰駮議章者稱稽首上以聞謝恩陳事詣闕通者也奏者上言稽首言下言稽首以聞其中有所請若罪法劾案公府通送御史臺卿校送謁者臺通者也表者上言臣某言下言臣某誠惶誠恐頓首頓首死罪死罪左右下附曰某官某甲上以詣尚書通者也公卿校尉諸將不言姓大夫以下皆言姓報章曰聞報奏曰可其表由尚書報所由云已奏如書凡章表以啟封其官宻事得皂囊其有疑事公卿百官㑹議而執異議者曰校議曰某官主議以為如是下言愚戅異議其合於上意者文報曰某官某甲可漢承秦法羣臣上書皆言昧死言王莽慕古改昧死曰稽首光武因而不改章表制度自漢以後多相因循隋令有奏鈔奏彈露布等皇朝因之其駮議表狀等至今常行其奏鈔露布侍中審自餘不審以上乃審其餘覆奏畫制可而授尚書省行幸則負寳以從版奏中嚴外辦還宫則請降輅解嚴皇帝齋則請就齋室升殿則奉玉幣盥則奉匜取盤酌罍水賛洗酌泛齊受虗爵進福酒皆左右其儀饗宗廟進瓉而賛酌欝酒既祼賛酌醴齊耤田則奉耒四夷朝見則承詔勞問臨軒命使冊皇太后皇太子則奉詔降宣命慰問聘召則涖封題發驛遣使則給魚符凡官爵廢置刑政損益授之史官既書覆涖其記涖職事官六品以下進擬則審其稱否而進退之武徳元年改侍内曰納言三年曰侍中龍朔二年曰左相武后光宅元年曰納言開元元年改侍中曰監天寳元年曰左相至徳二年曰侍中唐官品志侍中髙功者在職一年詔加侍中祭酒與侍郎髙功者一人掌禁令六典侍中二人正三品晉令侍中品第三武冠絳朝服佩水蒼玉東晉桓温奏省二人後復舊梁氏秩二千石品第三後班第十二陳氏依梁魏侍中六人加官無數初從一品太和中革令正第三品北齊因之隋氏諱忠改納言置二人正第三品唐大厯二年陞為正二品五代史百官志北齊侍中因後魏置六人掌獻納諌正及進御之職参預諸公論國政國朝元祐令侍中正一品出則参乘入侍左右前漢金日磾為侍中光禄大夫既親近未嘗有過失帝甚信重之賞賜累千金出則驂乘入侍左右貴戚多竊怨曰陛下妄得一胡而反貴重之帝聞之愈厚焉冠鵕䴊傅脂粉惠帝時侍中皆冠鵕䴊具帶傅脂粉年十二桑𢎞羊雒陽賈人子以心計年十二為侍中年十五張良子辟疆中年十五為侍年十八霍去病以皇后姊子年十八為侍中善騎射封侯参乘張彭祖宣帝時為侍中少與帝同親硯席以舊恩封侯出則参乘九男為侍中史丹元帝世為侍中帝出陪乘甚有寵九男皆以丹任為侍中學先王之道知君臣之義谷永對云昔龍筦納言而帝命惟允四輔既備成王靡有過事勅正左右齊栗之臣戴金貂之飾執常伯之職者皆使學先王之道知君臣之義濟濟謹孚旡敖戲驕恣之道則左右肅乂羣僚仰法也師古曰常伯侍中也伯長也常使長事者也一曰帝任使之人此為長也子孫為侍中張安世自宣元以来子孫為侍中帝以為忠上官桀為中廐令上嘗疾及愈見馬多瘦怒曰汝以我不復見馬耶桀頓首曰臣聞聖體不安日夜憂懼意不在馬言未卒泣數行下帝以為忠親近之以為侍中宜寵異之班伯為侍中後上朝東宫太后泣曰聞帝顔色疲黒班侍中本大將軍所舉宜寵異之益求其比以輔聖徳宜遣冨平侯且就國許商為少府師丹為光禄勲伯遷水衡都尉與兩師並侍中皆秩中二千石毎朝東宫常從有及大政俱使諭指於公卿上亦稍厭遊賞而復經書之業太后甚悦内輔参聽斷後漢和帝紀皇太后詔守文之際必有内輔以参聴斷侍中憲朕之元兄行能兼備忠孝尤篤先帝所器親受遺詔當以舊典輔斯職焉敬受侍中言以為後戒謝承後漢書劉陵為侍中車駕祠南郊陵参乘上起早升輿眠恭跪接覺曰陛下萬乘之主宜正立上有悦色曰敬受侍中言以為後戒更自整頓諫止開鴻池趙典再遷為侍中時帝欲廣開鴻池典諫曰鴻池汎濫已且百頃猶復増而深之非所以崇唐虞之約己遵孝文之愛人也帝納其言而止強項真楊震子孫楊震孫竒靈帝時為侍中帝從容問竒曰朕何如桓帝對目陛下之於桓帝猶虞帝之於唐堯帝不悦曰卿強項真楊震子孫博選耆儒宿徳朱穆因進見復陳奏臣聞漢家舊學置侍中常侍各一人省尚書事黄門侍郎一人𫝊發書奏皆用姓族自和熹太后以女子稱制不接公卿乃以閹人為常侍小黄門通命兩宫自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿徳與参政事帝怒不應穆伏不肯起左右𫝊出良久乃趨而去面稱朕違爰延為侍中帝遊上林苑從容問延曰朕何如主陳也對曰陛下如漢中主帝曰何以言之曰尚書令蕃任事則治中常侍黄門豫政則亂是以知陛下可與為善亦可與為非此中主之謂也帝曰昔朱雲廷争折檻今侍中面稱朕違敬聞命矣著楚辭王逸字叔師順帝時為侍中著楚辭章句行於代其賦誄書論及雜文凢二十一篇又作漢書三百二十三篇諸皆少年李固字子堅諫帝云臣一日在朝㑹見諸侍中皆年少無一宿儒可顧問者乃進楊厚黄瓊伏青蒲上史丹為侍中元帝寢疾丹以親密近臣得親疾候上閒獨時丹直入卧内頓首伏青蒲上親密近臣上進見問得失謝承後漢書公孫暉拜博士侍中國有疑事常使進見問其得失所陳皆據經依義補益國家深見省納據經依義補益國家上疑事密問劉淑為侍中朝夕見議竭忠於朝補政二百餘事皆著為篇章朝廷有疑事密諮問焉八俊周舉字宣光順帝時詔遣八使廵行風俗皆選有威名者乃奏舉為侍中與杜喬周栩馮羡欒巴張綱郭遵太尉長史劉班分行天下使同日而拜號曰八俊解經不窮東觀漢記戴馮為侍中正旦朝㑹百寮畢㑹帝令羣臣能說經者更相問難義有不通輙奪其席以益通者馮遂重坐五十餘席故京師為之語曰解經不窮戴侍中重坐五十餘席上含雞舌香侍中廼存年耆口臭上出雞舌使含之雞舌香頗小辛螫不敢咀咽自嫌有過賜毒藥歸舍辭訣欲就便宜家人哀泣不知賴僚友請問其愆失求眎其藥及口香共笑之更為含食其意遂解存鄙儒蔽於此耳其餘闒茸不可稱三代侍中馮魴字孝孫父子兄弟並帯青紫三代侍中綠車載送衞尉府衛尉金敞疾甚成帝拜子涉為侍中送衞尉府載以皇孫車寵之引在帷幄張衡為侍中帝引在帷幄諷議左右常侍問衡天下所疾苦者問舊事輙對李直字元春為侍中章帝西謁園陵直陪乘問舊事輒對由是見重彤管貂璫魏應璩詩彤管弭納言貂璫衣武弁出入承明廬車服一何煥對求徑寸珠蘇則字文師帝問曰前破酒泉張掖西域通使燉煌獻徑寸之珠可復求市益得則對曰若陛下化洽小國徳流沙漠即不求自至求而得之不足為貴也帝嘿然膝非佞人枕則拜侍中與董昭同寮昭嘗枕則膝臥則推之曰蘇則之膝非佞人枕也在職三年多所駮易盧毓為侍中是時散騎常侍劉劭受詔定律未就毓上論古今律制之意髙堂隆數以宫室事切諌帝不悦毓以君明臣直古之聖王恐不聞其過故有敢諫之鼓近臣盡規此乃臣等所不及隆諸生名為狂直陛下宜容之毓在職三年多所駮易在朝畧不交接劉曄字子陽為侍中在朝畧不交接時人或問其故曄荅曰魏室即祚尚新智者知命俗或未咸僕在漢為支葉於魏備腹心寡偶少徒於宜未失也引裾辛毗遷侍中時帝以徙兾州户十萬實於河南毗曰陛下不以臣不肖置之左右安得不與臣議帝不荅起入内毗隨而引其裾帝奮衣不還領丞相東西曹掾陳羣為侍中領丞相東西曹掾戴蟬珥貂王粲為侍中文帝贈詩曰戴蟬珥貂朱衣皓帶入侍帷幄出擁華盖入侍帷幄出擁華葢上執虎子魏畧舊儀曰侍中親省起居俗因謂之執虎子始蘇則為侍中有與則同隱居者是時仕甫歴縣令適京師見則謂之曰仕進名止執虎子則笑曰我誠不能效汝蹇蹇驅鹿車也強識博聞魏國既建杜襲為侍中與王粲和洽並用粲強識博聞太祖遊觀多得骖乘至見敬不及洽襲嘗獨見至夜半粲性躁競起坐曰不知公對杜襲道何等也洽笑曰天下事豈有盡耶卿晝視可矣於此欲兼之乎弱冠蜀志關興字安少有令聞丞相諸葛亮深器異之弱冠為侍中招納蠻戎馬良字季長先主稱尊號以良為侍中及東征呉遣良入武陵招納五谿蠻戎渠帥皆受號印咸如意焉服不精細食不重膳呉志大帝時是儀為侍中服不精細食不重膳貧困家無儲蓄聞之幸儀舍求視䟽飯親嘗之對之歎息即増俸賜益田宅儀累辭讓以恩為戚掌御唾壺孔氏連叢孔臧與子琳書曰侍中安國時見崇禮不供䙝事獨得掌御唾壺朝廷之士莫不榮之此汝親見在朝稱為儒宗益部耆舊傳董秩少從師學大將軍何進表薦資游夏之徳述孔氏之風宜勅公車待詔以異禮諮謀竒䇿靈帝徵拜侍中在朝稱為儒宗甚見器待七車張寛漢武帝時為侍中從祀甘泉至渭水橋有女子浴於渭水乳長七尺怪其異遣問之荅曰帝之後第七車知我所以來寛在第七車對曰天星主祭祀者齋戒不嚴則女人現耳七世三輔故事金日磾忠勤守節金氏七世為侍中從容諷議拾遺左右文士傳張衡為侍中嘗居帷幄從容諷議拾遺左右興一代之志魏志昔文帝陳王以公子之尊博好文采同聲相應才士並出惟王粲等六人最見名而粲時處常伯之官興一代之志其不可勝紀識舊玉佩摯虞决疑要注曰漢末䘮亂絶無佩玉魏侍中識漢舊始復作之今之玉佩受法於粲也以能書留補韋誕以能書留補侍中魏氏寳器銘題皆誕書也官失其任得者亦不足貴安平王孚為魏太子中庻子魏文帝即位選侍中常侍等官太子左右舊人頗諷諭主者便欲就用不調餘人孚曰雖有堯舜必有稷契今嗣王新立當進用海内英賢猶患不得如何欲因際㑹自相薦舉官失其任得者亦不足貴有經國之幹晉任愷字元褒為侍中有經國之幹萬幾大小愷多管之愷性忠正以社稷為己任貂蟬盈坐趙王倫僣即帝位同謀者皆超階越次不可勝紀至於奴卒厮役亦皆命以爵位每朝㑹貂蟬盈坐時人為之語曰貂不足狗尾續假還本鄉葬妻魏舒代山濤為侍中舒三娶妻皆亡於是自表假還本鄉葬妻上賜地一頃錢五十萬恂恂濟濟王濟自武子為侍中與侍中孔恂楊濟同列一時秀彥武帝常㑹公卿藩牧於乾武殿頋濟恂而謂諸公曰朕左右可謂恂恂濟濟矣血濺御服嵇紹為侍中天子承詔馳詣行在所值王師敗績於蕩隂百官及侍衞莫不潰散唯紹儼然端冕以身扞衞兵交御輦飛箭兩集紹被害於帝側血濺御服及事定左右欲浣衣帝曰此嵇侍中血問貂璫不知所出桓帝末侍中蟬参乘問貂璫何法不知所出又問地震云不為史還宫左遷議郎改詔王坦之為侍中簡文帝疾詔大司馬温周公居攝政事坦之自持詔入於帝前毁之帝曰天下儻來之運卿何所嫌坦之曰天下宣元之天下陛下何得專之帝乃使坦之改詔焉領衞優重沈演之為侍中衞將軍文帝謂之曰侍中領衞俱為優重此盖宰相便坐卿其勉之也宰相便坐上所辟皆寒素有行之士陸玩遷侍中玩雖登公輔謙不辟掾属成帝聞而勸之玩不得已而從命所辟皆寒素有行之士玩翼亮累世常以𢎞厚為人主所貴加性通雅不以名位格物誘納後進若布衣由是縉紳之徒莫不䕃其徳宇位未及扶醉未及亂語林晉孝武與虞嘯父飲酒不醉不出復臨出拜殆不能復起帝因呼人上殿扶虞侍中嘯父荅曰臣位未及扶非分之賜所不當當時美之勅左右疏其語對旄頭之義摯虞决疑要注曰晉武帝時彭權為侍中帝問侍臣旄頭之義何謂耶權對曰秦紀秦國竒怪觸山截水無不崩潰唯畏旄頭故使武士冠之以衞至尊也宜侍帷幄盡規左右七賢傳山濤為侍中詔曰濤清風淳履思心通逺宜侍帷幄盡規左右廊廟之望喉舌機要顔含别傳含字君道儀狀嚴整風貌端美大司馬桓公歎曰顔侍中廊廟之望喉舌機要也老公授藥續捜神傳程咸字延休其母懐姙咸老公授藥與之服此當生貴子晉武帝時歴位至侍中有名於世貂拂帝手宋文帝元嘉中王嘉王曇首殷景仁等並為侍中情任親宻與帝接膝共語貂拂帝手㧞貂置案上語畢復手挿之朕反陪卿孝武時侍中何偃南郊陪乘鑾輅過白門閫偃將匐帝乃接之曰朕反陪卿方之金張三族陸慧曉晉太尉玩之𤣥孫也自玩至慧曉祖萬嵗世為侍中皆有名行慧曉伯父仲元為侍中時人方之金張三族諫射雉蔡興宗拜侍中毎正言得失無所頋憚宋孝武新年拜陵寢興宗負璽陪乘及上欲因以射雉興宗正色曰今致䖍園陵情敬俱重從禽猶有餘日請待他辰上大怒遣令下車以形短小而止陸慧曉為吏部郎明帝欲用為侍中以形短小而止後為右將軍出監南徐州朝議又欲以為侍中王亮曰濟河須人今且就朝廷備之以鎮南兖州王瑩王志皆曰侍中彌須英華方鎮猶應有選者亮曰較其二者貂蟬緩拒㓂切當今朝廷甚弱宜從其切者乃以慧曉為輔國將軍南兖州刺史直是我家衰王曇首為侍中卒文帝為之慟中書舍人周﨣侍側曰王家欲衰賢者先隕帝曰直是我家衰管機凝務端朝賛契宋孝武故侍中司徒建安王宏墓銘云管機凝務端朝賛契四賢一時之秀劉湛為侍中時王華王曇首殷景仁並為侍中文帝於六合殿與四人飲甚悦華等出帝目送良久歎曰此四賢一時之秀也同管喉舌恐後難繼也謙虚自退王僧綽為侍中任以機密時年二十九始興王濬嘗問其年僧綽自嫌早達良久乃荅其謙虚自退若此風力獨幹冠冕一時殷景仁與王華王曇首劉湛四人並為侍中以風力獨幹冠冕一時同升之美近代莫及觧璽南史齊謝朏宋朝為侍中及齊受禪朏當日在直百寮陪位侍中當觧璽朏佯不知曰有何公事傳詔云觧璽授齊王朏曰齊自應有侍中乃引枕臥傳詔懼乃令稱疾欲取兼人朏曰我無疾何所道遂朝服步出東掖門乃得車仍還宅是日遂以王儉為侍中觧璽既而武帝請誅朏髙帝曰殺之則成其名正應容之度外冠貂投地張敬兒為南齊侍中領軍將軍又遷散騎常侍車騎將軍及臨誅脱冠貂投地曰用此物誤我敬兒有軍功感邪夢為謡言跡覬覦以至殱亡亦理也蟬冕所映彌有華采庾杲之字景行美姿質善言笑嘗兼侍中栁世隆在御座謂齊武帝曰庾杲之為蟬冕所映彌有華采陛下固當與其即真上甚悦王儉曰國家以杲之清美所以許其假職若以其即真當在胡諧之後以清美假職上燭燒貂梁隆雲公見侍郎門採薪得貂蟬江淹年十二時孤貧採薪以養因得貂蟬一具其母曰此固汝之休徵也汝行若此豈長貧賤耶可留待得侍中着之後果拜侍中四官皆珥貂朱异居權要三十餘年善承上㫖故特被武帝寵任歴官負外散騎常侍至侍中四官皆珥貂自右衞率至領軍四職並驅鹵簿近世未有也貪財冒賄异為侍中貪財冒賄欺罔視聴以伺候人主意不肯進賢黙惡四方饋餉曽無推拒逺近莫不忿疾財賄充積性吝嗇未嘗有所散施厨下珍羞常腐爛毎月常棄十數車雖諸子别房亦不分贍侯景鎮夀春累啟請與魏絶和及致書與异餉金二百兩异取其金而不停北使景遂反以討异為名景至城下又射啟言誅异等則臣按异轡北歸帝登南樓望賊顧謂异曰四郊多壘誰之罪歟流汗不能對慚忿發病而卒樹為侍中折羊侃入南朝授太子左衛率侍中車駕幸樂遊苑侃預晏時少府奏新造兩刃矟成長二丈四尺三寸帝因賜侃河南國紫騮馬分試之侃執矟上馬左右撃劍特盡其妙觀者登樹帝曰此樹必為侍中折矣既而果折因號此矟為折樹稍門中久無此職蕭芥為侍中闕選司舉王均等四人並不稱㫖髙祖曰我門中久無此職宜用蕭芥為之芥博物強識應對左右多所匡正髙祖甚重之王訓無謝彥囘王訓為侍中武帝問何敬容曰謝彥囘幾為宰相對曰少過三十帝曰今之王訓無謝彥囘彥回宋明帝時為侍中斂諸門鑰付栁侍中栁度逺為侍中嘗失大禁中鑰驚懼帝悉斂諸鑰問侍中何在至即悉付之喻㫖公卿對問帷扆王筠為侯元讓侍中表日至如元勲舊儒之胄積徳累仁之家九世七葉之華相朝仕漢之貴不然子駿之學洞古今平子之恩侔造化仲宣之辨識無滯次仲之觧經不窮然後可以喻㫖公卿對問帷扆陪六尺之輿通四方之意求之㣲臣此途隕絶樞機規獻實在得人丘遲為范衞年讓梁臺侍中表懐鉛早歲不以隕穫累心躡屨晚年豈以充詘在念葢樞機規獻實在得人况在庸㣲何用膺荷六尺之内陪接天光任昉為王思逺讓侍中表行則六尺之内陪接天光語則服璽申命誠信區宇獻可替否出納惟幾敷奏於金華之上進讓於玉堂之下金遷七貴之茂王粲二公之孫云云職思近切任掌摠綸陸倕張侍中啟爰降曲慈復叨清顯職司近切任掌摠綸魏選異才漢承髙徳異才髙徳上二賢相得傅咸集曰朗陵公何敬祖咸之從内兄國子祭酒王武子咸從姑之外孫何公既登侍中武子俄而亦作二賢相得甚欣咸亦慶之乃賦詩以申懐曰吾兄既鳯翔王子亦龍飛雙鸞游蘭渚二離揚清輝主喉舌魏志應璩雜詩曰侍中主喉舌萬物無不亂七葉珥漢貂晉左思詩云金張藉舊業七葉珥漢貂金張之家七葉為漢侍中也為服三年喪者四十餘人蕭方三十國春秋曰丁未王師敗績於蕩隂侍中嵇紹以身捍上因遇害紹既死之後為服三年喪者四十餘人通理有才義虞預晉書河間成都王舉兵向朝廷北討徵嵇紹為侍中天子䝉塵其右將軍裴楷通理有才義僉論以為侍中大奴故自得鳯毛世說王敬以倫美姿容父作侍中公服從門入桓公望之曰大奴故自得鳳毛也大奴王劭也亦見中興書帝思其言華陽國志譙陸為上林令武帝欲廣上林苑陸言堯舜至治廣徳不務林苑帝思其言徵為侍中監典後宫出入臥内後魏羅吉世祖初遷侍中外都大官總三十六曹事年一百七歳精爽不衰世祖以其忠慤甚見信待監典後宫出入臥内攜杖出入甄理為侍中以其衰老詔賜御府杖得攜杖出入貂鼲映首日月在躬北齊邢子才為彭城王奏讓侍中表曰貂鼲映首日月在躬冠盖庶僚跨躡多士雖智慚量力明闕自知在梁之譏無待諠譁之議素飡之責豈須噂􅊱之口云云金蟬質絹李忠拜侍中後以年漸遲暮言於執政乞在閒職以養餘年乃除驃騎大將軍儀同三司復以本官領衛尉卿卒有米三石酒數斛書籍藥物充滿篋架未及得斂至以金蟬質絹乃得斂焉飛蟬集冠見散騎常侍門五貴隋蘇威為納言與左翊衞將軍宇文述黄門侍郎裴紘御史大夫裴藴内史侍郎虞世基参掌朝政時人稱之為五貴惡人異己威治身清儉以㢘慎見稱毎至公議惡人異己雖或小事必固争之時人以為無大臣之體諫髙祖與貴臣同坐唐髙祖即位言則稱名與貴臣同榻而坐納言劉文靜進曰昔晉元帝與朝臣共坐王導奏曰若太陽俯同萬物欲使蒼生將何仰照今至尊過自卑屈羣下何以自安乖乾坤之定位願陛下改之占奏搢紳属目陳叔達字子聰武徳初授黄門侍郎判納言封江國公叔達明辨善為容每占奏搢紳属目頡利懼而走楊恭仁授黄門侍郎尋為凉州摠管就加納言突厥頡利率衆數萬獵其境恭仁應機設拒張疑屯虗幟示之頡利懼而走就加上言賣果蔬與人争利蘇良輔垂拱初遷冬官尚書拜納言留守西京尚方監裴匪躬案諸苑建言鬻果蔬儲利佐公上良輔曰儀休一諸侯相拔葵去織未聞天子賣果蔬與人争利遂止諫以金塗九鼎九鼎成則天令以黄金千兩塗之納言姚璹誎曰鼎者神器貴在質樸豈待金色方為炫燿從之請率先百寮出任刺史長安中則天嘗與宰相譏及州縣官吏納言李嶠等奏臣等謬膺大任不能使兵革止息倉庫殷盈户口尚有逋逃官人未免貪濁夙夜慚惶不知啟處伏思當今要務莫過富國安人富國安人之方在擇刺史竊見朝廷物議奠不重内官輕外職毎除授牧伯皆再三被訴比来所遣外官多是貶累之人風俗不澄實由於此今望於臺閣寺監妙簡賢良分典大州共康庶績臣等請輟近侍率先具寮則天曰卿等誰為此行鳳閣侍郎平章事韋嗣立先對曰臣以庸愚謬膺奬擢承乏外臺庶當盡職於是嗣立帯本官兼檢校汴州刺史韋公真宰相韋安石遷文昌右丞尋知納言事時二張武三思寵横安石数折辱之㑹侍宴殿中易之引蜀商宋覇子等博塞后前安石跪奏啇等賤類不當戲殿上頋左右引出坐皆失色后以安石辭正改容慰勉鳳閣侍郎陸元方自以為不及退告人曰此真宰相非吾等所及也言知惡而不去王珪遷侍中它日進見有美人侍側本廬江王瑗姬也帝指之曰廬江不道賊其夫而納其室何有不亡乎珪避席曰陛下以廬江為是邪非邪帝曰殺人而娶其妻乃問朕是非何也對曰臣聞齊桓公之郭問父老曰郭何故亡對曰以其善善而惡惡也公曰若子之言賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡今陛下知廬江之亡其姬尚在竊謂陛下以為是審知其非所謂知惡而不去也帝嘆美其言陛下負臣臣不負陛下帝使太常少卿祖孝孫以樂律授宫中久之伎不進數被讓珪與温彥博進曰孝孫謹修事陛下使教女樂又責譙之天下其以士為輕乎帝怒曰卿皆我腹心乃附下㒺上為人遊說耶彥博懼謝罪珪不謝曰臣本是前官罪當死陛下矜其性命别置樞密責以忠效今乃疑臣以私是陛下負臣臣不負陛下帝黙慚遂罷言房𤣥齡等材自謂孰賢明日語房𤣥齡曰武王不用夷齊宣王殺杜伯自古帝王納諌固難矣朕夙夜庶幾於前聖昨責珪等痛自悔公等勿懲是不進諌也時珪與𤣥齡李靖溫彦博戴胄魏徵同輔政帝以珪善人物且知言因謂曰卿標鍳通悟為朕言𤣥齡等材自謂執賢珪對曰孜孜奉國知無不為臣不如𤣥齡兼資文武出入將相臣不如靖敷奏詳明出納惟允臣不如彥博濟繁治劇衆務必舉臣不如胄以諌諍為心恥君不及堯舜臣不如徵至激濁揚清疾惡好善臣於數子有一日之長帝稱善而𤣥齡等亦以為盡己所長謂之確論進封郡公處事以情魏徵為侍中尚書省滯訟不决者詔徴平治徴不素習法但存大體處事以情人人悦服上書戒中宗中宗復位以桓彦範為侍中上書戒帝曰伏見陛下臨朝視政皇后必施帷殿上預聞政事臣愚謂古王者謀及婦人皆破國亡身傾輈繼路且以隂乗陽違天也以婦凌夫違人也違天不祥違人不義故書曰牝雞之晨惟家之索易曰無攸遂在中饋言婦人不得預外政也伏願上以社稷為重令皇后無居正殿於外朝深居宫掖修隂教以輔佐天子云軍國事委裁可魏元忠進侍中武后崩帝居䘮軍國事委裁可挺直安樂公主館第成中宗臨幸燕從官賦詩御史大夫知政事李日知卒章獨以規戒睿宗他日謂曰向時雖朕亦不敢諫非公挺直何能且即拜侍中后父中宗既立欲以后父韋𤣥貞為侍中宰臣裴炎固争以為不可中宗不悦謂左右曰我讓國與𤣥貞豈不得何為惜侍中耶炎懼乃與則天定策廢立之禇遂良譖殺劉洎太宗征遼東初發定州在道不康侍中劉洎與中書令馬周入謁洎周出禇遂良傳問起居洎泣曰聖體患臃極可憂懼遂良誣奏之曰洎云國家不足慮正當傳少主行伊霍故事大臣有異志者誅之自然定矣太宗疾愈詔問其故洎以實對又引馬周以自明太宗問周對與洎所陳不異遂良又執証不已乃賜洎自盡初征遼東時太宗命洎兼太子左庶子輔太子於定州賜宸扆台衡二銘馬燧以河中平詔書褒美遷光禄大夫兼侍中宴賜畢還太原是行也徳宗賜宸扆台衡二銘燧至太原乃勒二銘於起義堂西偏帝為題額其崇寵如此嚴正未嘗囘容張文瓘拜侍中性嚴正未嘗回容請諸司奏議悉心糾駮故帝委之或時移疾他宰相奏事必問與文瓘議未若不者曰徃共籌之或曰已議即皆報可請息兵修徳以懷異俗新羅叛欲議出兵討之時文瓘病卧家自力請見曰土蕃未安屯兵不解新羅復叛議欲出師二虜俱事臣恐人不堪敝請息兵修徳以懐異俗詔可不節堂饌初堂饌豐餘欲少損文瓘曰此天子所以重樞務待賢才也吾等若不任職當自引避不宜節賦以自取名衆乃止對地震張行成髙宗即位遷侍中監修國史時晉州地震不息帝問之對曰天陽也君象地隂也臣象君宜動臣宜靜今靜者頋動恐女謁用事大臣隂謀又諸王公主参乘起居或伺間陳請冝明設防閉且晉陛下本封應不虚發伏願深思以杜未萌帝然之詔五品以上極言得失降諸武王爵敬暉字仲曄以誅二張功加金紫光禄大夫為侍中暉表請武王悉降爵由是皆為公三思憤俄罷政事言道不治罪二臣宋璟兼侍中帝幸東都次崤谷馳道隘稽擁車騎帝命黜河南尹李朝隱知頓使王怡等官璟曰陛下富春秋今始廵守以道不治而罪二臣由此相飭後有受其蔽者帝遽命捨之璟曰陛下向以怒責之今以臣言免之是過歸於上而恩在下姑聴待罪於朝然後詔還其職進退得矣帝善之言日食修徳㑹日食帝素服俟變録囚多所貸遣賑恤灾患罷不急之務璟曰陛下降徳音恤人隠寛宥輕繫惟流死不免此古所以慎赦也恐議者直以月蝕修則日食修徳或言分野地重兾有揣合臣以為君子道長小人道消止女謁放纔夫此所謂修徳也囹圄不擾兵甲不潰官不苛治軍不輕進此所謂修刑也陛下常以為念雖有虧食將轉而為福又何患乎願動天以誠無俟空文帝嘉納之焚藁髙儉字士㢘進止詳華凡有獻替搢紳皆属目奏議未嘗不焚藁家人無見者進止詳華上甚得大臣體郝處俊為侍中處俊性儉素土木形骸自参綜朝政毎與上言議必引經籍以應對多有匡益甚得大臣體應對必引經籍上前作后國㸙後為主邑丞竇懐貞遷侍中方太平公主干政懐貞傾已附離日視事退輙詣主第刺取所欲中宗為金仙玉貞二公主營觀費鉅萬諌者交疏不止唯懐貞勸成之躬䕶役作族弟維鍌諌曰公位上衮當思獻可替否輔天子而計益校瓦木雜厮役工匠間使海内何所瞻仰乎不荅督繕急時語曰前作后國㸙後為主邑丞言事公主如邑官属也在位半歲無所事帝引見承天切責之俄與李田知郭元振張説皆罷免十死罪劉幽求為侍中降璽書曰使夫髙岸為谷長河如帯子子孫孫傳國無絶人以卿忘軀殄難宜有恩榮故特免十死罪書諸金鐵俾傳於後卿其保兹功業豈不美與獻詩諫獵魏知古為侍中先天元年冬上畋於渭川知古獻詩以諷曰嘗聞夏太康五弟訓禽荒我后來冬狩三驅盛禮張順時鷹隼擊講事武功揚奔走未及去翾飛定翺翔非熊從渭水瑞翟想陳倉此欲誡難縱兹逰不可常子雲陳羽獵僖伯諌漁棠得失鍳齊楚仁恩念禹湯雍熈諒在宥亭毒匪多傷辛甲今為史虞箴遂孔彰手詔褒之得蒲萄不食陳叔達字子聰武徳中拜侍中叔達明辨善容止毎有敷奏搢紳莫不属目嘗賜食於御前得蒲萄執而不食髙祖問其故對曰臣母患口乾求之不能致欲歸以遺母髙祖喟然流涕曰卿母可遺因賜物百段未嘗漏洩内事楊師道太宗時為侍中性周慎謹密未嘗漏洩内事親友或問禁中之言乃更對以他語嘗曰吾少窺内史至孔光不言温室之樹毎欽其餘風所庶㡬也師道退朝後必引當時英㑓宴集園池而文㑹之盛當時莫比請出二息補外源乾曜見同中書門下三品門獻瑶山徃則維城前軌二篇裴光庭見𢎞文館學士門賊不敢害苗晉卿為侍中代宗即位晉卿年已衰暮廣徳初吐蕃㓂長安晉卿時病臥於私第蕃賊聞之輿入脅之噤不肯語賊不敢害以辯說參帷幄侍中魏徴自以無功於國徒以辯說遂參帷幄深懼滿盈後以目疾頻表遜位諫王后之廢韓瑗進侍中兼太子賓客王后之廢瑗雪泣言曰皇后乃陛下在藩時先帝所娶今無罪輙廢非社稷計不納明日復諫曰王者立后配天地象日月匹夫匹婦尚知相擇况天子乎詩云赫赫宗周褒姒滅之臣讀至此尚輟卷太息不圖本朝親見此禍宗廟其不血食乎帝大怒詔引出禇遂良貶潭州都督明年瑗上言遂良受先帝頋托一徳無二向日論事至誠懇切詎肯令陛下後堯舜塵史册哉願寛無辜以順衆心帝曰遂良之憤朕知之矣其悖戾好犯上朕責之詎有過耶瑗曰遂良社稷臣蒼蠅㸃白傅致有罪昔㣲子既出辛殷以亡張華不死晉不及亂陛下富有四海安於清泰忽驅逐舊臣遂不省察乎帝愈不聴瑗憂憤自表歸田里不報韓瑗救褚遂良上清儉不營産業黄門盧懐慎清儉不營産業器用服飾無金玉綺文之麗所得俸禄皆隨時分散而家無餘蓄妻子匱乏而於故人親威㪚施甚厚為黄門侍郎徃來東都掌選奉身之具纔一布囊耳奉身纔一布囊上權傾中外歸田錄曹侍中利用以勲舊自處權傾中外雖宰執亦嚴憚之但呼侍中而不名凡内降恩澤皆執不行然以其所執既多故有三執而内降出者則不得已而行之乆之為小人所測凢有求而三降不行者必又請之太后曰侍中已不行矣請者徐啟曰臣已告侍中宅妳婆或其親信為言之許矣於是又降出曹莫知其然但以三執不得已僶俛行之於是太后大怒自此切齒遂及曹芮之禍乃知大臣功髙而權盛禍患之來非智慮所能防也兼侍中笏頭帶出於特恩侍中賜毬路金帶俗謂之笏頭帶自非二府文臣不得賜者唯張耆為樞密使李用和以有舊勲髙貽永為駙馬都尉李昭亮亦以戚里四人者皆兼侍中出於特恩也門下侍郎前漢百官表有侍郎無員多至十人比四百石後漢百官志給事黄門侍郎六百石本注曰無員常侍從左右漢舊儀曰黃門郎属黄門令日暮入對青瑣門拜名曰夕郎獻帝起居注曰帝初即位置侍中給事黄門侍郎員各六人出入禁中近侍帷幄省尚書事改給事黄門侍郎為侍中侍郎去給事黄門之號旋復故舊侍中黄門侍郎以省中宫故不與近密交政誅黄門後侍中侍郎出入禁中機事多露由是王允乃奏比尚書不得出入不通賓客自此始也漢官儀給事黄門侍郎次侍中侍從左右門通内外給事於中故曰給事中黄門侍郎後漢輿服志禁門曰黄闥以中人主之故號曰黄門令然則黄門即給事黄闥之内故曰黄門郎本既無員於此各置六人晉職官志給事黄門侍郎秦官也漢以後並因之與侍中俱管門下衆事無員及晉置員四人宋百官志給事黄門侍郎四人與侍中俱掌衆事郊廟臨軒則一人執麾史官按劉向與子歆書曰黄門郎顯處也然則前漢世已為黄門侍郎矣董巴漢書曰禁門曰黄闥之内故曰黄門郎魏晉以來員四人秩六百石南齊百官志給事黄門侍郎亦管知詔令世呼為小門下齊職儀給事黄門侍郎四人秩六百石武冠絳朝服漢中有黄門給事黄門位從諸大夫秦制也與侍中掌奏文案賛相威儀典書其事隋百官志給事黄門侍郎四人掌侍從左右擯相威儀盡規獻納糾正遺闕侍郎中髙功者在職一年詔加侍中祭酒與侍郎髙功一人對掌禁令後齊六人隋四人煬帝减置二人去給事之名丹墀前漢尚書奏事明光殿省中以丹朱漆地故曰丹墀尚書郎黄門侍郎對揖正君臣篇字劉向七畧曰孝宣申不害君臣篇使黄門郎張子喬校正其字得志自樂傅子曰王黎為黄門郎軒軒然得志煦煦然自樂恥與毛曽並坐魏志夏侯𤣥弱冠為散騎常侍郎常見與皇后弟毛曽並坐𤣥恥之俄遷羽林監在朝不結交杜恕為散騎黄門侍郎恕推誠以質不沾飾在朝不結交毎政有得失常引綱維以正言於是侍中辛毗等器重之毎直省閤威儀矜嚴杜恕拜黄門侍郎毎直省閤威儀矜嚴有籌畫智略夏侯尚字伯仁文帝與之親友有籌畫智略太祖定冀州遷黄門侍郎諫西征鍾毓年十四為散騎侍郎機㨗談笑有父風太和初蜀相諸葛亮圍祁山明帝欲親西征毓上疏曰夫䇿貴廟勝功尚帷幄不下殿堂之上而决勝千里之外車駕冝鎮守中土以威四方今者盛暑行師詩人所重實非至尊慎動之時也遷黄門侍郎旦夕侍講魏畧董遇字季真獻帝時為黄門侍郎旦夕侍講為天子所愛名播呉越李豐字安國年十七在鄴名為清白識别人物明帝時得呉降人問江東名士為誰曰聞有安國是時黄門侍郎上曰豐名乃播呉越耶後轉都尉給事中諸葛亮命費禕同載蜀志費褘為黄門侍郎丞相亮南征還羣僚於數十里逢迎年位多在禕右而獨命褘同載由是衆莫不易觀用侍郎當如孫承顧榮呉志孫承好學為黄門侍郎與顧榮俱為侍臣歸命時内侍多得罪唯榮承獨免常使二人記事承荅顧問乃下詔曰自今用侍郎當如孫承顧榮也侍立終日為司過之吏孫皓毎宴羣臣無不咸令沉醉置黄門郎十人時不與酒侍立終日為司過之吏宴罷之後各令奏其闕失迕視之咎謬言之愆㒺有不舉大者即加威刑小者减以為罪有大才令望晉書顧榮仕呉弱冠為黄門侍郎當時後進盡相推謝為稱榮有大才令望不阿比凶族嵇紹為給事黄門侍郎侍中賈謐以外戚之寵年少居位潘岳杜斌等皆附託焉謐求交於紹紹拒而不荅謐誅紹時在省以不阿比凶族封弋陽子以天下是非為己任晉載記秦黄門侍郎古成詵風韻秀舉確然不羣毎以天下是非為己任時京兆韋高慕阮籍之為人居母喪彈琴飲酒詵聞而泣曰吾當手刄斬之以崇風教遂持劍求髙髙懼逃匿終身不敢見詵千門萬户畫田即成王隠晉書泰始三年詔中書侍郎張華博學有文理器幹其以華為黄門侍郎華博覧圖籍四海之内若指諸掌世祖問華千門萬户畫田即成年十六英雄記曹純好學問敬愛博士由是逺近所稱年十六為黄門郎毎納忠言輒壞其本任嘏别傳嘏字似先魏文以為黄門郎毎納忠言輒壞其本自在禁省歸書不封帝嘉其淑慎子無褌桓階别傳階為尚書令文帝見諸子無衣上搏手曰長者也是日拜三子為黄門郎人門兼美陳宣帝謂吏部侍郎蔡凝曰我欲用義興主壻錢蕭為黄門侍郎卿意何如凝正色曰黄散之職須人門兼美帝黙然而止從容論議参賛大政後魏書翟光為黄門侍郎未嘗留心文案唯從容論議参賛大政而已當時壯其忠謇陽平王之子匡為黄門侍郎茹皓始有寵百寮敬憚之世宗曽於山陵還詔匡陪乘又命皓登車皓將上匡諫止世宗推之命下皓恨匡失色當時壯其忠謇遷授不謝謁任城王之子順除給事黄門侍郎領軍元義威刑尤盛凢有遷授莫不造門謝謁順拜表而已曾不詣義義謂順曰卿何不見我順正色曰天子富於春秋委政宗輔叔父宜以至公為心舉士報國如何賣恩責人私謝豈所望也晉王以下拜於帝前盧誕拜給事黄門侍郎魏帝詔曰經典易求人師難得朕諸兒稍長欲令卿為師於是詣晉王第勅晉王以下拜於帝前兄弟五人相代北齊書給事黄門侍郎河南陸朗弟駿杳騫彦師兄弟五人相代為黄門侍郎其吏部郎今侍郎也事亦見路敬淳古今人物卓絶譜置笏於地隋書劉行本為黄門侍郎文帝嘗怒一郎於殿前笞之行本進諌帝不顧行本乃正當上前曰陛下不以臣不肖置臣左右豈得輕臣而不顧乃置笏於地而退上謝之而原所笞者兄弟對居近侍唐書温大雅遷黄門侍郎弟大有為中書侍郎對居近侍議者榮之髙祖從容謂曰我起義晉陽為卿一門爾奉身纔一布囊見侍中門束帶至晚未嘗休偃崔元綜長夀中遷鸞臺侍郎勤於政事毎在中書必束帶至晚未嘗休偃諌修蓬萊宫張文瓘為東臺侍郎龍朔三年蓬萊宫成百官奉賀文瓘諫曰人力不可不惜百姓不可不養養之逸則富以康使之勞則怨以叛秦皇漢武廣事四夷多造宫室使土崩瓦觧户口鍳減半臣聞制治於未亂保邦於未危其弊必搆禍難殷不逺近在勝朝臣願稍安撫之無使生怨帝深納其言士可殺不可辱張廷珪遷黄門侍郎時監察御史蔣以監决杖刑稍輕勅朝廷杖之廷珪奏曰御史憲司清望耳目之官有犯當殺即殺當流即流不可决杖士可殺不可辱也議者以為是獨存規誡李日知遷黄門侍郎時安樂公主新成池館中宗親徃臨幸從官皆預宴賦詩日知獨有規誡於其末章曰所願暫思居者逸莫使時稱作者勞論者多之竟終喪制張說丁母憂去職起復授黄門侍郎累表固辭言甚切至優詔方許是時風教頽紊多以起復為榮而説固節懇辭竟終喪制識者美之給事中前漢百官表給事中亦加官所加或大夫博士議郎掌顧問應對次位中常侍中黄門有給事黄門位從諫大夫皆秦制漢儀注給事中日上朝謁平尚書奏事分為左右以有事殿中故曰給事中多名儒國親為之掌左右顧問後漢百官志給事中闗通中外及諸王朝見於殿上引諸王就坐晉職官志給事中秦官也所加或大夫博士議郎掌顧問應對位次中常侍漢東京省魏世復置至晉不改在散騎常侍下給事黄門侍郎上無員隋百官志梁集書省有給事中掌侍從左右獻納得失後齊集書省給事中六十人中侍中省給事中四人後周天官之属有給事中士六十人掌理六經給事左右其後别置給事中在六官之外隋門下省有給事中二十人開皇六年始於吏部置給事郎名為門下之職位黄門下置員四人從五品省讀奏案唐百官志給事四人正五品上掌侍左右分判省事察𢎞文館繕冩讎校之課凡百司奏抄侍中既審則駮正違失詔敕不便者塗竄而奏還謂之塗歸嵗終奏駮正之目凡大事覆奏小事署而頒之三司詳决失中則裁其輕重發驛遣使則與侍郎審其事宜六品以下奏擬則校功狀殿最行藝非其人則白侍中而更焉與御史中書舎人聽天下寃滯而申理之武徳三年改給事郎曰給事中龍朔二年改給事中為東臺舎人咸亨初復舊六典給事中四人正五品上晉令云品第五武冠絳朝服梁陳秩六百石品第七後魏史闕其員初從第三品上太初末從第六品上北齊從第六品上五代史百官志唐同光元年給事中置一半國朝淳化四年以給事中封駮𨽻銀臺通進司應詔勅並令樞密直學士向敏中張詠詳酌可否然後行下官品令給事中正四品傅朕八年前漢元帝詔書蕭望之傅朕八年可賜爵闗内侯給事中呼其小字阿蘇魏志秦朗字元明時帝即位授以内官為給事中毎車駕出入朗常隨從時明帝喜發舉隠匿数有以輕㣲而致大辟者朗終不能有所諫止亦未嘗進一善人帝亦以是親愛毎顧問之多呼其小字阿蘇立徳邈然晉書任熈字伯逹立徳邈然拜給事中宜在中朝晉起居注武帝詔曰郎中張逵忠䔍履素為江表士大夫所稱宜在中朝以逵為給事中俊才荀綽兖州記袁凖字孝尼有俊才太始中拜給事中有古之風呉均齊春秋太子竊於東宮遣徐文景造乘輿御物陶仁為給事中謂文景曰汝面當滅門仍移家避之後太子薨事泄文景賜死陶仁不哭時謂仁有古之風宜在左右以敦儒訓晉武帝詔燕王陳劭清貞㢘潔博通六籍宜在左右以敦儒訓可給事中帝室茂親貴遊子弟束晳集貟外侍郎及給事冗從皆是帝室茂親或貴遊子弟若悉從髙品則非本意若精鄉議則必有降損父有言則治臣有言而不治梁湘東王繹孝子傳陳紀父寔紀子羣魏使持節給事中文帝曰卿何如祖父羣曰臣父有言則治臣有言而不治犯宰執之怒唐于敖為給事中昭愍初即位李逢吉用事與翰林學士李紳素不叶遂誣紳以不測之罪逐於嶺外紳同職知制誥龐嚴蔣防坐黨左遷信汀䓁州刺史及詔下敖封還詔書時人以為與嚴相善訴其非罪皆曰于給事犯宰執之怒仲龐嚴蔣防屈不亦仁乎及駮奏出乃是論嚴貶黜太輕中外無不大噱而逢吉由是奬之尋遷工部侍郎列其枉狀李嶠遷給事中時酷吏來俊臣搆䧟狄仁傑李嗣真裴宣禮等雖知其枉懼之則天使嶠與大理少卿張徳裕等覆其獄徳裕䓁雖知其枉懼罪並從俊臣所奏嶠曰豈有知其枉濫不為申明哉乃與徳裕䓁列其枉狀由是忤㫖出為潤州司馬諫以萬乘至尊共臣下争功張行成累遷給事中太宗嘗臨軒謂侍臣曰朕所以不能恣情欲取樂當年而勵節苦心卑宫菲食者正為蒼生耳我為人主兼行將相之事豈不是奪公䓁名行成退而上書諌曰陛下聖徳含光規模𢎞逺雖文武之列實無將相可用臨軒對衆與之較量損萬乗至尊共臣下爭功哉太宗深納之宜在瑣闥郭承嘏字復卿轉給事中出為華州刺史詔下西省送詣中書求承嘏出麾之由給事中盧載封還詔書奏曰承嘏自居此官繼有封駁能奉其職宜在瑣闥牧守之中易為推擇文宗謂宰臣曰承嘏久在黄扉欲優其俸禄暫令亷問近闗而諫列拜章惜其稱職甚美事也乃復為給事中時稱舉職崔植字公修為給事中時稱奉職時皇甫鎛請减内外官俸禄植封還勅書極諫而止鎛復奏諸州府鹽院兩稅𣙜酒鹽利四段䓁加估定數植疏論奏物議罪鎛而美植不擇時奏對李遜為給事中以舊制隻日視事對羣臣遜奏論曰事君之義有犯無隠陳誠啟沃不必擇辰今羣臣敷奏乃候隻日是畢嵗臣下覩天顔獻可替否能幾何憲宗嘉之乃許不擇時奏對批敕有夕郎之風李藩字叔翰遷給事中制勅冇不可就敕尾㘩卻之吏曰宜别白連紙藩曰别聫紙是牒豈曰勅耶裴垍言於帝以為有宰相器遂拜相故史臣曰批勅有夕郎之風執詞頭謁宰相袁髙為給事中徳宗將起盧把為饒州刺史髙當草詔見宰相盧翰劉從一曰把當國矯誣隂賊斥忠誼傲明徳反易天常使宗祏失守天下疣瘠朝廷不寘以法才示貶黜今還授大州天下其謂之何宰相不悦命舎人草之詔出髙執之不下乃奏論之以身為犧牲閻朝隠為給事中則天不豫令朝隠徃少室山祈禱朝隠曲申悦媚以身為犧牲請代上所苦及將康復賜絹綵百匹金器十事俄改麟臺少監凝碧詩王維字摩詰天寳末為給事中禄山䧟两都𤣥宗出幸維扈從不及為賊所得禄山宴其徒於凝碧池其樂工皆梨園弟子教坊工人聞之悲惻潜為詩曰萬户傷心生野烟百官何日再朝天秋槐花落空宫裏凝碧池頭奏管弦賊平䧟賊官三等定罪維以詩聞肅宗乃特宥之有廻天之力張𤣥素遷給事中太宗詔發卒修治洛陽宫乾陽殿以備上廵幸𤣥素上書諫之太宗嘆曰張公論事有廻天之力可謂仁人之言其利溥哉未十年髭鬂盡白國朝至道中以給事中魏羽知潭州上曰魏羽雅有心計通明吏道但無執守易遷徙耳朕自任使以來未十年髭鬢盡白亦可憐也左散騎常侍通直散騎常侍貟外散騎常侍散騎侍郎通直散騎侍郎貟外散騎侍郎前漢百官表散騎中常侍皆加官魏文帝令散騎中常侍為散騎常侍所加或列侯將軍卿大夫將都尉尚書太醫太官令至郎中無員如淳曰將謂郎將以下也自列侯下至郎中皆得有散騎及中常侍加官是散騎及常侍各自一官無員也多至數十人侍中常侍得入禁中諸曹受尚書事諸吏得舉法散騎騎馬並乗輿車並步浪反騎而散從無職也後漢百官志中常侍千石本注曰宦者無員後増秩皆二千石掌侍左右從入宫内贊導衆事顧問應對應劭漢官秦置中常侍入禁中常侍左右光武中常侍用宦者又曰秦及前漢置散騎及中常侍各一人散騎騎馬並乘輿車獻可替否魏志文帝延康中置散騎常侍為一官省中置四人與侍中同掌規諫不用宦者為官不過署令魏畧黄初中始置四常侍入侍從與上談議不典事故遂以為加官又散騎常侍比侍中貂璫挿右環濟要畧散騎常侍騎而散從侍郎入侍左右出則侍事於廊廡之下晉職官志散騎常侍本秦官也秦置散騎又置中常侍散騎騎從乘輿車後中常侍得入禁中皆無員亦以為加官漢東京初省散騎而中常侍用宦者魏文帝黄初初置散騎合之於中同掌規諫不典事貂璫挿右騎而散從至于晉晉不改及元康中惠帝始以宦者董猛為中常侍後遂止常為顯職通直散騎常侍案魏末散騎常侍又有在員外者泰始十年武帝使二人與散騎常侍通員直故謂之通直散騎常侍江左置四人員外散騎常侍魏末置無員散騎侍郎四人魏初與散騎常侍同置自魏至晉散騎常侍侍郎與侍中黄門侍郎共平尚書奏事江左乃罷通直散騎侍郎四人初武帝置員外散騎侍郎及太興元年元帝使二人與散騎侍郎通員直故謂之通直散騎侍郎後増為四人員外散騎侍郎武帝置無員陶氏職官要錄案漢初有騎郎常侍有貲者得為騎郎貲滿五百石為常侍郎張釋之以貲為常侍郎葢此官也南齊百官志散騎常侍通直散騎常侍員外散騎常侍舊典侍中通官其通直員外用衰老人士故其官漸替宋大明年中雖革選比侍中而人情久習終不見重尋復如初散騎侍郎通直散騎侍郎員外散騎侍郎集書省職置正書令史朝散用衣冠之餘人數猥積隋百官志梁集書省置散騎常侍通直散騎侍郎各四人員外散騎常侍無員散騎侍郎通直散騎侍郎各四人又有員外散騎侍郎常侍髙功者一人為祭酒與侍郎髙功者一人對掌禁令糾諸逋違散騎常侍通直員外舊並為顯職與侍中通官宋代以來或輕或雜其官漸替天監六年革選詔曰昔晉初仰惟盛化常侍侍中並奏帷幄員外常侍特為清顯陸始名公之𦙍位居納言典䝉優禮方有斯授可分門下二局委散騎常侍尚書案奏分曹入集書通直常侍本為顯爵員外之選宜參舊准人數依正直格自是散騎視侍中通直視中丞員外視黄門郎陳因梁制北齊集書省散騎通直常侍各六人散騎侍郎六人員外散騎常侍二十人通直散騎常侍通直散騎侍郎六人員外散騎侍郎一百二十人又領起居省散騎常侍通直散騎常侍通直散騎侍郎各一人隋門下省有散騎常侍六人通直散騎侍郎四人並掌部從朝直又有員外散騎侍郎二十人並掌同散騎常侍等六年罷門下省員外散騎常侍武騎尉等員煬帝廢散騎常侍通直散騎常侍散騎侍郎等常員唐百官志門下省左散騎常侍二人正三品下掌規諷過失侍從顧問武徳初以為加官貞觀初置常侍二人𨽻門下省顯慶二年又置二員𨽻中書省始有左右之名並金蟬珥貂左常侍與侍中左貂右常侍與中書令右貂謂之八貂龍朔二年為左右侍極咸亨復廣徳二年升為正三品加置四員興元元年正月左右各加一員貞元四年正月勅省舊四員中書省右散騎常侍二人等如門下省六典左散騎常侍二人從三品晉置四人典章表詔命優文䇿文等雖𨽻門下别為一省潘岳云寓直散騎之省是也晉代此官選望甚重時與黄門侍郎謂之黄散晉令云散騎常侍品第三武冠右貂金蟬絳服佩水蒼玉梁加秩中二千石後班第十二後魏品第二下太和末從三品隋從三品掌陪從朝直寶應二年勅左右散騎常侍各置參官兩人令自揀擇聞奏參典亦置兩人後省五代百官志後唐同光元年左右散騎常侍置一半國朝官品令左右散騎常侍正三品中常侍召取衣冠臨拜復止前漢大將軍王鳳用事上遂謙讓無所専左右嘗薦光禄大夫劉向少子歆通逹有竒異材上召見歆誦讀詩賦甚悦之欲以為中常侍召取衣冠臨拜左右皆曰未曉大將軍上曰此小事何須闗大將軍左右叩頭争之上於是語鳳鳳以為不可乃止不拜其見憚如此我翁我母續漢書靈帝以張讓趙忠段貴等十二人皆為中常侍封侯貴寵帝嘗曰張常侍是我翁趙常侍是我母休沐閉門絶賓東觀漢記蔡倫字敬仲為中常侍有才學盡忠重慎每至休沐閉門絶賓閹人為常侍朱穆諌曰臣聞漢家舊典置侍中常侍各一人省尚書中黄門侍郎一人傳發書奏皆用姓族自和熹太后以女主稱制不接公卿乃以閹人為常侍小黄門通命兩宫自此以来權傾人主宜皆罷遣博選耆儒宿徳參預政事帝怒不應穆伏不肯起左右傳出良久乃趨而去假貂璫之飾處常伯之任穆拜尚書既深疾宦官及在臺閣旦夕共事悉欲除之乃上疏曰案漢故事中常侍參選士人建武以後乃悉用宦者自延平以来寖益貴盛假貂璫之飾處常伯之任十常侍靈帝時宦者張讓趙忠等凡一十人皆為中侍封侯貴寵黄巾既作盜賊麋沸郎中張鈞上書曰竊惟張角所以能興兵作亂而萬人所以樂附之者其源皆由十常侍多放父子兄弟婚親賓客典據州郡酤𣙜財利侵掠百姓百姓之寃無所告訴故謀議不軌聚為盜賊宜斬十常侍頭懸南郊以謝百姓帝怒御史承讓等㫖遂誣鈞學黄巾道掠死獄中章重上不報詔使廷尉侍御史考為張角道者一心王室不事豪黨鄭衆字季産為人謹敏有心機永平中初給事太子家肅宗即位拜小黄門遷中常侍和帝初竇太后秉政兄大將軍憲等並竊威權朝臣上下莫不附之而衆獨一心王室不事豪黨帝親信焉及憲兄弟圗作不軌衆首謀誅之以功遷大長秋處朝忠謇陸凱上疏曰中常侍王審黄中通理知天知物處朝忠謇斯社稷之重鎮今大晉之龍逢也散騎常侍通直散騎常侍員外散騎常侍忠直前漢劉更生遷散騎元帝初即位太傅蕭望之為前將軍少傅周堪為光禄大夫皆領尚書事甚見尊任更生年少於望之堪然二人重之薦更生宗室忠直明經有行擢為散騎宗正給事中與侍中金敞拾遺於左右四人同心輔政朝夕進規獻魏志應璩雜詩云散騎帝師友朝夕進規獻為散騎侍郎遷常侍文章叙云璩博學好属文善為書記歴散騎侍郎上萬幾論蔣濟字子通上萬幾論文帝善之入為散騎常侍時有詔征南將軍夏侯尚曰卿腹心重將特當使恩施足死惠愛可懷作威作福殺人活人尚以示濟濟既至帝問曰卿所聞見天下風教何如濟對曰未有他善但見亡國之語耳帝忿然作色而問其故濟具以荅因曰夫作威作福尚書之明誡天子無戲言古人所慎惟陛下察之於是帝意解遣追取前詔稱揚漢美衞臻丞相户曹遷散騎常侍文帝踐阼時羣臣並頌魏徳多抑損前朝臻獨明禪授之議稱揚漢美帝數目臻曰天下之珍當與山陽共之凌波而前徐宣遷散騎常侍從至廣陵六軍乗舟浪暴起帝船廻倒宣病在後凌波而前羣僚無至者帝壮之故師魏畧髙堂隆為平原王師明帝立以隆故師拜散騎常侍甚見禮敬行步頋景何晏字平叔有才能曹爽以為散騎常侍美姿儀人疑其傅粉行步頋景姿才容貌蜀志孟達字子度降魏魏文帝善達之姿才容貌為散騎常侍推為顔淵晉梁益士傳云文立字廣休師事譙周門人共推立為顔淵陳夀李宓為子夏立在晉為太子中庶子遷散騎常侍在員内在員内上常媿有累清談鄭黙字思元為散騎常侍世祖出南郊侍中當參乗詔曰使鄭常侍謂黙曰卿知其何以得參乗昔州内舉卿相輩常媿有累清談對政事黙為散騎常侍武帝問以政事對曰勤穡務農為國之基選人得才濟世之道居官久職政事之宜明慎黜陟勸阻之由崇尚儒素化導之本如此而已帝善之金貂換酒阮孚字遙集散騎常侍以金貂換酒為所司糾彈帝宥之選望重輕初晉安帝時散騎常侍望重以與侍中不異其後職任閒散用人漸輕宋孝建三年武帝欲重其選於是史部尚書顔峻奏以孔顗及司徒左長史王景文應舉帝不欲威權在下其後分吏部尚書置二人以輕其任侍中蔡興宗謂人曰選曹望重常侍閒淡改之以名而不以實雖主意欲為輕重人心豈可變耶既而常侍之選與吏部俱貴寓直潘岳秋興賦序云余春秋三十有二始見二毛以太尉掾兼虎賁中郎將寓直於散騎之省髙閣連雲陽景罕曜珥蟬冕而襲紈綺之士此焉遊處岳時任中郎將即騎省官故曰直班同中書華嶠加散騎常侍班同中書寺為内臺中書散騎著作治禮音律天文術數南省文書門下撰集皆典之也以道清粹重於朝廷程咸博學洽通文藻清敏其以為散騎常侍程案以道清粹重於朝廷句下原本脱去注語其注中咸云云乃王隠晉書之文當别為一條而失其標目今無可校補姑仍之俱掌直諫傅𤣥字休奕為散騎常侍晉受禪進爵加駙馬都督與皇甫陶俱掌直諫𤣥志在拾遺多所匡救宜綜國史晉中興書庾闌有文章才識議者以為宜綜國史於是召為散騎常侍才藝簡亮宜居獻替謝萬昇平五年詔曰前中郎將萬才藝簡亮宜居獻替以為散騎常侍博學有才氣顧愷之字長康為散騎常侍博學有才氣而名士多與遊又善畫妙於時為人鈍而傲頗自矜尚故世愛其才藝而輕其傲忽數以為笑又文章志云世謂長康有三絶文章絶畫絶痴絶有三絶上有夙望荀㽔字令逺儀􅍾有望太宗深器之尚書左丞轉散騎常侍機管要任不可久曠晉起居注紀長兼侍中関内侯侃所疾非日月可愈機管要任不可久曠今轉為通直常侍給騶兵賜錢二十萬牀帳一具太康七年詔尚書馮純忠亮在公厯職内外勤恪匪懈而疾苦未差屢求放退其以純為散騎常侍賜錢二十萬牀帳一具拾遺左右泰始元年詔給事黄門侍郎王珣理識通原篤志好學不殞先業宜在左右之列給事中何遵公亮貞烈有才幹器任久歴朝位試用自效各宜甄敘拾遺左右者也其以珣遵並為散騎常侍使分典内省事更讀文書八嵗侍講晉諸公讃司馬駿五六嵗能書數魏王為帝駿年八歲為散騎常侍躭翫典藝博物洽聞干寳晉紀詔騎都尉譙周閒居守道不仕危國蜀亡之際勸劉禪歸命有忠主濟民之謀及躭翫典藝博物洽聞朕甚嘉之其以為散騎常侍與中書參典著作華嶠集詔曰散騎以從容侍從承荅顧問掌賛詔令平處文籍故前是多用言語文學之士議郎華嶠有論議著述之才其以嶠為散騎常侍兼與中書參典著作事嶠表謝云非臣典筆申辭所能陳謝敏於應對陶氏家傳濬遷散騎常侍博洽書傳善属文敏於應對兼美姿容毎朝讃導同僚常推君子焉才志器局當為黄散山公啟事郄詵才志器局當為黄散謂黄門侍郎及散騎常侍也又曰散騎常侍缺當取素行者補之遂用郄詵素行上非其好竹林七賢傳阮籍字嗣宗髙貴鄉公立以為散騎常侍非其好也處已以廉郭子曰鍾雅自左右丞桓彝從吏部為常侍常怏恨之獨處已以㢘八座三蟬宋何戢為太子詹事上欲轉戢領選尚書令欲加戢散騎常侍褚彦回曰領選職方皆小選不容頓加常侍聖㫖毎以蟬冕不宜過多臣與王儉既已在珥若復加戢則八座便有三蟬若秩以驍游亦不為少廼以戢吏部尚書驍騎將軍貂蟬從兠鍪中出南齊周盤龍拒魏有軍功年老求觧職為散騎常侍武帝戲之曰卿著貂蟬何如兠鍪盤龍曰此貂蟬從兠鍪中出飛蟬集冠梁朱异除中書郎時秋日始拜有飛蟬止集异武冠上時咸謂蟬貂之兆後遷散騎常侍第三清後魏明亮為常侍加武勇將軍進曰臣本官常侍是第三清今授武勇其號至薄誤授官禄髙祖以李彪為散騎常侍郭祚因入見髙祖謂祚曰朕誤授一人官祚對曰豈容聖詔一行而有差異髙祖沉吟曰此自應有讓因讓朕欲别授一官湏㬰彪有啟云伯石辭卿子産所惡臣欲之已久不敢讓髙祖歎謂祚曰卿之忠諌李彪不辭使朕遲囘不能復决遂不換彪官也王言遺滯髙祖謂散騎常侍元景曰卿等自在集書閣省逋惰致使王言遺滯起居不修位在中書之右宋弁為散騎常侍尋遷右將軍領黄門弁屡自陳讓髙祖曰散騎位在中書之右常侍者黄門之庶兄領軍者三衛之假攝不足空存推讓以棄大美其被知遇如此今日誰相對三國典畧齊遣散騎常侍崔瞻聘於陳瞻辭韻温雅南人欽服乃謂之曰常侍前朝何竟不來今日誰相對者上殿不下有賀雅梁賀琛為散騎常侍梁主與語常移晷刻故省中語曰上殿不下有賀雅琛容止詳雅故人呼之答問處當皆有條理呉志薛榮既至洛陽為散騎常侍荅問處當皆有條理臥鎮六軍晉中興記紀瞻轉領軍累乞退不許及王敦之逆詔上殿參定謀䇿復加散騎常侍以病辭帝曰今日之事正當頼先帝社稷之忠臣豈得如君之所論但為朕臥鎮六軍則所益不少瞻奉詔便出申將軍令衞左右甚有清才王讃晉惠帝時為散騎常侍衛左右甚有清才南郊奉乘西省文辭陳徐陵讓表云南郊奉乗當求鄭黙之才西省文辭應用羅含之學此吾任城梁散騎常侍廬陵王讀膂力絶人馳射遊獵發便命中髙祖常曰此吾任城也舞胡致位五品唐髙祖拜舞人安叱奴為散騎常侍李綱上疏諫曰謹按周禮均工樂胥不得預仕伍今新定天下開太平之基起義功臣行賞未徧髙才碩學猶滯草莱而先令舞胡致位五品鳴玉曳組趨馳廊廟故非創業垂統貽厥子孫之道也言雖激切而髙祖不見聽納登牀劉洎性疎俊敢言太宗工王羲之書尤善飛白嘗宴三品以上於𤣥武門帝操筆作飛白字賜羣臣或乘酒争取於帝前帝笑曰昔聞婕妤辭輦今見常侍登牀以納諫為對師登改左散騎常侍因中謝憲宗問時所切登以納諫為對朝廷推其名望崔𤣥亮朝廷推其名望遷散騎常侍詣延英請對宋申錫為鄭注所搆獄自内起散騎常侍崔𤣥亮率諌官十四人詣延英請對言訖嗚咽文宗為之感悟近密非賢不可居苖晉卿字元輔肅宗欲以李輔國為常侍奏曰常侍近密非賢不可居豈宜任等輩罷之章表詔命六典東晉併中書入散騎省故庾亮讓中書牋曰方今併省不多官徃年以中書事并付散騎此事宜也方今喉舌之要則任在門下章表詔命則取之散騎殊無事復之中書也望南宫侍郎如仰霄漢案此條注文原缺通直散騎常侍宜在機近規納善言晉起居注惠帝永寜元年詔散騎常侍王睿性識明徹日新匪懈宜在機近規納善言機管要任不可久曠紀長兼侍中関内侯所疾非日月可愈機管要任不可久曠今轉為通直散騎常侍歴任左右劬勞内侍臧榮緒晉書泰始十年詔程咸忠誠直正幹理貞固博學洽通文藻清敏歴任左右劬勞内侍乃心在公夙夜不懈其以咸為散騎常侍左通直郎通直殿中陶氏職官要錄泰始十年詔東平王懋為員外常侍通直殿中與散騎常侍通直通直之號自此始也鮑通直復是何許人梁鮑泉嘗乘髙幰車從數十左右繖盖服玩甚精道逢國子祭酒王承承疑非舊貴遣訪之泉從者荅曰鮑通直衆怪焉復欲辱之遣通車問鮑通直復是何許人而得如此都下少年遂為口實見南華人相戲曰鮑通直復何許人而得如此以為笑謔唯取梁元帝素琴一張後周裴尼為通直散騎常侍從於比陵所獲軍實恣諸將校取之餘人皆競取珍玩尼惟取梁元帝素琴一張而已宿衞不宜曠朱鳳晉書左軍陳與騫之子以父老求去職宿衞不宜曠詔侍以為通直常御筆除通直字北齊張景仁除通直散騎常侍及奏御筆㸃除通直字遂為正常侍員外散騎常侍閒任外位晉諸公賛任城王陵齊王攸皆為魏員外散騎常侍于時公族務在閒任外位才幹學義王隠晉書吏部李重啟東兖太守曹嘉之皆才幹學義先代之後可補員外散騎常侍給本俸以終餘年咸康八年員外散騎常侍孫朝年八十告老遜位司徒王導表朝恩優泰聴其順養弃身茨宇絶榮仕禄宜給本俸以終餘年在員外臧榮緒晉書張天錫字公純降氐為符融征南司馬謝𤣥等大破氐軍於陣歸國以為散騎常侍在員外擢登常伯之列飾以貂璫之輝顧凱之拜員外散騎常侍表云不悟陛下聖恩所加擢登常伯之列飾以貂璫之輝貌類太宗檀道鸞續晉陽秋呉隠之為員外散騎常侍領大著作初議以為黄門侍郎而隠之貌類太宗上不忍視故改焉並驅鹵簿梁朱异為員外常侍侍中領軍中書舎人四職並驅鹵簿近代未之有也尚書南座無貂賀琛字國寳遷員外散騎常侍舊尚書南座無貂自琛始也散騎常侍割肉歸遺細君前漢東方朔為常侍郎伏日詔賜從官肉大官丞日晏不来朔獨拔劍割肉謂其同官曰伏當早歸請受賜即懷肉去大官奏之朔入上曰昨賜肉不待詔以劍割肉而去之何也朔免冠謝上曰先生起自責也朔再拜曰朔来受賜不待詔何無禮也拔劍割肉一何壯也割之不多又何亷也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君宗室謹重魏志曹爽字伯昭以宗室謹重明帝在東宫甚見親愛及即位為散騎常侍機㨗談笑有父風鍾毓字雅叔年十四為散騎侍郎機㨗談笑有父繇風太和初蜀相諸葛亮圍祁山明帝欲親征毓上疏諫止集羣書作皇覽劉劭字孔才為散騎侍郎集羣書作皇覽阿九魏畧孟康以郭后外属恩寵特踰於常遂轉散騎侍郎是時散騎皆多貴子弟或以髙才儒英充其選而康獨縁嬪嬙雜在其間故時皆輕之不復呼其姓字謂之阿九選親舊文武之才桓氏家傳延康元年初置散騎之官皆選親舊文武之才以為賓宴之臣賓宴之臣上少有名望呉錄顧昺少有名望為散騎侍郎俱有美稱王洽導諸子中最知名與潁川荀羡俱有美稱弱冠除散騎侍郎俶儻髙雋籠葢當時郄超字景興少而卓犖不羈有曠世之度俶儻髙雋籠盖當世除散騎侍郎撰正音訓徐邈字先民遷散騎侍郎居西省嘗撰正音訓前後十年多所補益使不辱命晉陽秋王彼使不辱命擢拜散騎侍郎紀案彼字疑有悞張華請觀馮恢干寳晉紀處士馮恢至行過人以為散騎侍郎恢至上謂張華定何人也華曰臣請觀之若不見臣上也見而有傲世之容次也敬為賓客者固俗士也及華至恢待之以恭時論確然少之視酒罏雖近邈若山河臧榮緒晉書向秀為散騎侍郎公使乗軺車經昔與嵇阮共遊酒罏前過乃嘆曰吾昔與嵇康阮籍屡遊此罏自嵇生及阮公没吾便為時所羈紲今日視此雖近邈若山河也與尚書共論華嶠譜叙華歆有三子表字偉容年二十餘為散騎侍郎時同寮諸郎共平尚書事年少並勵鋒氣要名譽尚書事至或有不便故遺漏不視及傳書者即深文論駮唯表不然事有不便輙與尚書共論盡其意生者固執不得已然後共奏通直散騎侍郎年三十起家晉中興書郄曇年三十起家拜通直散騎侍郎三儁共掌帝儀李瑾美容貌有文才遷通直散騎侍郎與黄門王遵業尚書郎盧觀典修儀注臨淮王彧謂瑾等三儁共掌帝儀可謂舅甥之國王盧瑾外兄員外散騎侍郎在員外晉起居注大興四年詔令以前司空從事中郎盧諶為散騎侍郎在員外簡其才晉中興書苻堅青州刺史苻朗降烈宗詔曰朗洞明逆順望風歸化既嘉此識亦簡其才可員外散騎侍郎置無員清華所不為郅撝永明元年為御史中丞車駕幸丹陽郡宴飲撝恃舊酒後狎侮同列謂庾杲之曰蠢爾荆蠻其俗鄙復謂虞悰曰㫁髪文身其風陋王晏既貴雅步從容又問曰王散騎復何故爾晏先為國常侍轉員外散騎侍郎此二職清華所不為故以此嘲之忠誠義烈晉起居注載建武元年令曰前堂邑内史魏文忠誠義烈其以為貟外散騎侍郎侍東宫永昌元年詔以新立世子王悦為員外散騎侍郎侍東宫顯侍帷幄謝安表云有案此下原本缺左諫議大夫前漢百官表郎中令秦官属官有大夫大夫掌論議有太中大夫諫大夫皆無員多至數十人武帝元狩五年初置諫大夫秩比八百石後漢百官志諫議大夫六百石本注曰無員胡廣曰光禄大夫本為中大夫武帝元狩五年置諫大夫為光禄大夫世祖中興以為諫議大夫又有太中大夫中散大夫此四䒭於古皆為天子之下大夫視列國之上卿漢官曰三十人後魏亦置諫議大夫隋百官志後齊集書省有諫議大夫七人後周地官府有保民下大夫規諫於天子葢此其任也武成三年初置太子諫議大夫四員隋門下省有諫議大夫七人煬帝廢之唐百官志門下省左諫議大夫四人正四品下掌諌諭得失侍從賛相武后垂拱二年有魚保宗者上書請置匭以受四方之書乃鑄銅匭四塗以方色列於朝堂青匭曰延恩在東告養人勸農之事者投之丹匭曰詔諫在南論時政得失者投之白匭曰申寃在西陳抑屈者投之黒匭曰通𤣥在北告人祕謀者投之以諫議大夫補闕拾遺一人充使知匭亊御史中丞侍御史一人為理匭使其後同為一匭天寶九載𤣥宗以匭聲近鬼改理匭使為獻納使至徳元年復舊寳應元年命中書門下擇正直清白官一人知匭以給事中中書舍人為理匭使建中二年以御史中丞一人議大夫一人為知匭使投匭者先驗副本開成三年知匭使李中敏以為非所以廣聰明而慮幽枉也乃奏罷驗副封武徳元年置諫議大夫龍朔二年曰正諫議大夫貞元四年分左右中書省右諫議大夫四人掌如門下省貞觀初以給事中諫議大夫兼知起居注或知起居事六典諫議大夫四人正五品上貞元四年置八人四人𨽻門下為左㑹昌元年中書奏隋於門下省置諫議大夫七員從四品下今正五品上自大厯二年門下中書省侍郎升為正三品兩省遂闕四官其諫議大夫望升為四品下分為左右以備两省四品之闕掌侍從賛相規諫諷諭凡有五一曰諷諫風之以言二曰順諫謂知其有所不可不敢逆而諌之則順其君之所欲以㣲動之三曰規諫陳其規諫而正其事四曰致諫致物以明其意五曰直諫直言君之過失五代百官志周顯徳五年六月勅諫議大夫置依舊正五品上仍班在給事中之下按唐六典諫議大夫四員正五品上皆𨽻門下省班在給事中之下至㑹昌二年中書門下奏升為正四品下仍分為左右以備兩省四品之闕故班亦升在給事中之上近朝自諫議大夫拜給事中者官雖叙遷位則降等至是以其遷次不備故改正焉國朝大中祥符元年令右諫議大夫知制誥錢惟演立位在孫僅之下知制誥班序以先後不得以官至是以諌議大夫班在中書舍人上故申明之給事中以下皆無員不專職本省之務分任之中外為位元祐令左右諫議大夫從四品為聖主得賢臣頌前漢王褒字子淵益州刺史王㐮欲宣風化於衆庶聞褒有㑓才請與相見使褒作中和樂職宣布詩選好事者令依鹿鳴之聲習而武歌之時何武為童子選在歌中武歌于太學宣帝召見曰此盛徳之事吾何足以當之益州刺史因奏言褒有軼才上乃徵褒既至詔褒為聖主得賢臣頌擢為諌議大夫娱侍朝夕褒為諫議大夫始上頗好神仙褒從遊獵所幸宫館輙為歌頌議者多以為滛靡不急上曰不有博奕者乎為之猶賢乎已權拜諫議大夫太子不安忽忽善忘詔褒等徃太子宫娯侍朝夕誦讀竒文及所自造太子喜褒甘泉洞簫頌令左右誦之上以其言迂濶不甚寵異王吉字子贑為諌議大夫時宣帝頗修武帝故事宫室車服盛於昭帝時外戚許氏王氏貴寵而上躬親政事任用能吏吉上疏言得失上以其言迂濶不甚寵異吉遂謝病歸虚己問政事貢禹字少翁元帝徵為諌議大夫數虚己問政事時嵗不登郡國多困禹奏言宫室有制宜從儉從之秩八百石禹上書曰陛下過意徵臣拜為諌議大夫秩八百石奉月九千二百廪食太官又䝉賜賞四時雜繒絮衣服酒食諸果物徳甚厚捕繫掖庭秘獄劉輔以美才推為諫大夫㑹成帝欲立趙飛燕為后輔上書曰陛下乃觸情縱欲傾以卑賤以毋天下乎里語曰腐木不可以為柱卑人不可以為主臣自念得以同姓拔擢尸禄不忠汚辱諌諍之官不敢不盡死書奏捕繋掖庭秘獄於是左將軍辛慶忌䓁俱上書曰竊見諫大夫劉輔前以縣令見擢為大夫其言必有切至當聖心者故得拔至於此旬日之間收下秘獄行慘急之誅摧諫議之官震羣下失忠直心於是减死罪一等論為鬼薪病終于家舉止方正孔光字子文經學尤明舉止方正為諌大夫賢良方正何武字君公太僕王音舉武賢良方正召對策拜諌大夫耆老久次揚雄奏羽獵賦除為郎給事黄門以耆老久次轉為大夫好古學道甄豐父子劉棻為莽所誅雄時校書天禄閣使者欲收雄雄投閣垂死詔勿問京師之語曰惟寂惟寞自投於閣以病免復召為大夫家貧嗜酒人希至其門有好事者載酒與肴從遊學賢者宜駕两龔皆楚人也勝字君賓舎字君倩二人相並著名節故世謂之楚兩龔少皆好學明經勝為郡吏三舉孝㢘哀帝時大司空何武執金吾閻崇薦勝徵為諌大夫引見勝薦龔舍及寗夀人侯嘉有詔皆徵勝曰竊見國家徵醫巫尚為駕徵賢者宜駕上曰大夫乘私車来耶勝曰唯有詔為駕上書言七亡七死鮑宣為諫大夫哀帝時丁傅子弟並進董賢貴幸宣上書諫曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷亡有大儒骨鯁白首耆艾魁壘之士論議通古今喟然動衆心憂國如飢渇者臣未見也敦外親小童及幸臣董賢䓁在公門省户下羣小日進國家空虚用度不足民流亡去城郭賊盜並起吏為殘賊嵗増於前凡民有七亡隂陽不和水旱為灾一亡也縣官重責更賦租税二亡也貪吏並公受取不遺三亡也豪強大姓蚕食無厭四亡也苛吏繇役失農桑時五亡也部落鼓鳴男女遮迣六亡也盜賊刦掠取民財物七亡也七亡尚可又有七死酷吏毆殺一死也治獄深刻二死也寃陷無辜三死也盜賊横發四死也怨讟相殘五死也嵗惡饑餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿宰相貪殘成化之所致耶羣臣幸得專官食重禄豈有肯加惻隠于細民助陛下流教化者耶志俱在營私家稱賓客為奸利而已以茍容曲從為賢以拱黙尸禄為知謂如臣宣等為愚陛下擢以岩穴誠兾有益毫毛豈徒欲使臣美食大官重髙門之地哉今貧民菜食不厭衣又穿空父子夫婦不能相保誠可酸鼻陛下不救將安所歸命乎奈何獨私養外親於幸臣董賢及汝昌侯傅商亡功而封方陽侯孫寵宜陵侯息夫躬辯足以移衆強可用獨立姦人之雄惑世尤劇者也宜以時罷退急徵大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左將軍彭宣位皆歴三公可大委任者也上以宣名儒優容之乃徴光免孫寵息夫躬罷侍中諸黄門郎十餘人其言少文多實宣復為諌大夫毎居位常上書諌諍其言少文多實雅意在本朝蕭望之累遷諌議大夫時選博士諌議大夫通政事者補郡國守相以望之潙平原太守望之雅意在本朝乃上疏曰陛下哀念百姓悉出諌官以補郡吏所謂憂其末而忘其本者也朝無争臣則不知過國無達士則不知善願陛下選明經術通於幾㣲謀慮之士以為内臣輿參政事諸侯聞之則知國家納諌憂政亡有闕遺書聞徴入守少府上書求見龔勝為諌議大夫居諌官數上書求見言百姓貧賤吏多不良風俗漸薄制度太奢刑罰太深賦歛太重宜以儉約先下其言祖述王吉貢禹之意以行修飾劉更生既冠以行修飾擢為諫大夫通才謇正後漢韋彪字孟達上議曰諫議之職應用公直之士通才謇正有補益於朝者令或従徵試輩為大夫數有忠言王良字仲子拜諌議大夫數有忠言以禮進止朝廷敬之諫西夷獻幻人謝承後漢書陳禪字紀山拜諫議大夫永寜中西夷獻幻人能吐火易牛馬頭自支解其身元日作之禪離席諌之云云數陳讜言傅翻轉諌大夫數陳讜言上嘉之犯顔諫諍虞永字叔朗拜諫議大夫雅性忠譽犯顔諌諍以俸禄賑諸生賜歸天子思之江革轉諌議大夫賜歸天子思之革與母居至孝為母炊不委妻子常輓鹿車載母母卒哭不絶聲服竟不脱太守遣掾釋除之詔齊相曰諌大夫江革以病臨賜穀千石長吏八月存問致羊酒以終其身乘髙車出闗郭丹少從學長安入函谷関慨然曰丹不乘使者車終不出関既至京師甞為都講諌議大夫持節賜歸南陽去家十三年乗髙車出関引弟子升堂執經華嶠後漢書桓榮遷諫議大夫毎大射養老禮畢帝輒命榮及弟子升堂執經自為辨說恨不列稷契伊周之徒袁崧漢書劉陶諫大夫靈帝時上疏言天下亂由宦豎宦豎共䜛之詔收黄門北寺獄陶知必死乃曰臣恨不列稷契伊周之徒而與比干龍逢為儔事敗乃悔時何及閉氣而死言絶水退楚國先賢傳陳宣拜諌議大夫建武十年洛水溢出城門校尉欲築塞之宣曰周公卜洛為萬世基水必不入城門如有灾異人主觧謝塞之何益况朝廷中興聖主天下攸歸水必不入言絶而水退也十日不炊三輔决録第五頡字子陵為諌議大夫洛陽無主人鄉里無田宅寄止靈臺中或十日不炊有揚雄之才華陽國志丸字伯仁侍中賈逵薦丸有揚雄之才明帝召作東辟雍徳陽諸觀銘拜諌議大夫與夏侯尚並掌軍計魏賈逵自為兒童戲常設部伍祖父甞異之曰汝大必為將帥也口授兵法數萬言為丞相主簿太祖善之拜諌議大夫與夏侯尚並掌軍計不喜君得諫議惟喜諫議得君後魏張普惠為諌議大夫任城王澄謂普惠曰不喜君得諌議惟喜諫議得君置笏於地隋劉行本為諫議大夫文帝常怒一郎於殿前笞之行本進曰此人素清其過又小不顧行本正當上前曰陛下不以臣不肖令臣在左右臣言若是陛下安得不聽臣言若非當致之於理安得輕臣不顧所言非私因置笏於地而退上斂容謝之原所笞者處不諱之朝唐太宗甞謂侍臣曰朕雖不明幸諸公數相匡救諫議大夫王珪曰臣處不諱之朝實願罄其狂瞽太宗稱善勅自今後中書門下及三品以上入問必諌官隨之欲其與聞政事有所開說諫獵蘇世長為諫議大夫從幸涇陽校獵大獲禽獸顧謂朝臣曰今日樂乎世長進曰陛下遊獵薄廢萬幾不滿十旬未為大樂髙祖變色既而笑曰狂態發耶世長曰為臣私計則狂為陛下國計則為忠矣能以瓦為衣必不漏谷耶律為諌議大夫嘗從太宗出獵在途遇雨因問曰油衣若為得不漏耶律曰能以瓦為衣必不漏太宗大悦賜帛三百段諍臣諫其漸褚遂良遷諫議大夫太宗問舜作漆器間彫其俎當是時諌者十有餘人食器之間苦諌何也遂良曰彫琢害農事纂組妨女工首創奢淫危亡之漸漆器不已必金為之金器不已必玉為之所以諍臣諌其漸及其盈滿無所復諌上然之真諫議蕭鈞為諌議大夫時有左武候别駕盧文􅍾踰垣盜左蔵庫物髙宗命有司殺之鈞諌曰文操所犯情實難原恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物不敢不奏帝謂曰卿職在司諌能盡忠規遂特免死罪謂侍臣曰真諫議也仗下言得失宋璟吏部侍郎時𤣥宗嘉其正直令兼諌議大夫内侍供奉仗下後力言朝廷得失真諫官李景伯為諌議大夫中宗嘗宴侍臣及朝集使令酒酣各為廻文詞衆皆諂言至景伯曰廻波爾時酒巵㣲臣職在箴規侍宴既過三爵諠譁竊恐非儀中宗不悦中書令蕭至忠稱之曰此真諌官也職在箴規上有諫臣體孔戣元和初改諌議大夫侃然忠讜有諌臣體上疏論時政四條帝意嘉納上疏論興元監軍孔敏行元和元年拜諌議大夫上疏言興元監軍楊叔元隂募卒為亂殺節度使李絳人不敢發其事敏行上表極諌諍之故叔元得罪論朝政得失張薦擢諌議大夫方裴延齡用事中傷俊良連白無不當帝意薦將疏其惡延齡知之言於帝曰諌議論朝政得失史官書人善惡二者不可兼改秘書少監朝廷有直臣陽城為諌議大夫徳宗時裴延齡以姦佞用事時大臣陸贄䓁咸遭譖毁城乃伏闕上疏與拾遺王仲舒共論延齡姦佞䞇等無罪金吾將軍張萬福年八十聞之徃延英門大言賀曰朝廷有直臣天下必太平矣萬福自此名重天下凌蔑公卿大臣李景儉字寛中遷諌議大夫性既矜誕寵擢之後凌蔑公卿大臣使酒既甚貶建州刺史未㡬召還復為諌議大夫景儉朝退與知制誥馮宿楊嗣復舍人温造員外郎李肇王鎰等同謁史官獨孤朗乃於史館飲酒景儉乗醉詣中書謁丞相呼王播崔植杜元頴名面疏其失貶漳州刺史是日同飲於史館者皆貶逐之乗醉謁宰相上諫免崔發死張仲方為諌議大夫時鄠縣令崔發因辱小黄門敬宗赫怒付臺推鞫及元日大赦獨發不得宥仲方上疏其畧曰鴻恩將布於天下而不行御前霈澤始被於昆蟲而獨遺崔發由是發得不死時論美之人皆想望風采陽城隠於中條山徳宗召之乃衣褐赴京遷諌議大夫初未至京師人皆想望風采及為諫官紛紛言事天子益厭苦之請先出閤待罪李渤長慶初為諌議大夫敬宗即位坐朝甞晚一日入閤坐不久羣臣候立紫宸門外渤出次白宰相曰昨日拜疏陳論今坐益晚是諌官不能廻人主之意渤之罪也請先出閤待罪於金吾仗語次换仗乃止當以能可否朝政者為之張宿布衣諸生也憲宗為廣陵王時出入邸第洎監撫之際擢授左拾遺後上欲以為諌議大夫李逢吉奏曰諌議取要重當以能可否朝政者為之宿細人不足以汚賢者位上不悦出逢吉為劍南節度延英相見鄭覃為諌議大夫穆宗不恤政事喜遊宴覃與同職廷奏諌之帝不懌顧宰相蕭俛曰是皆何人俛對曰諌官帝意稍觧乃曰朕之闕下能盡規忠也因詔覃曰閣中奏事殊不從容今後有事面陳朕與卿延英相見時久無閤中奏事覃等抗論人皆相賀讜言直氣吕元膺字景大遷諌議大夫規駮諌議大舉其職出為同州刺史及中謝上問時政得失元膺論奏辭氣激切上喜之翌日謂宰相曰吕元膺有讜言直氣宜留在左右使言得失留為給事左右尋兼太子侍讀伏延英淮南節度使王播厚賂貴要求領鹽鐵使諌議大夫獨孤朗等伏延英疏論之不敢異論李讓夷字達心拜諌議大夫時起居舎人李褒有痼疾請罷官宰臣李石奏闕官上曰卿可盡言今諌議大夫姓名遂奏李讓夷馮定孫簡蕭俶帝曰讓夷可也李因欲言用崔球張次宗鄭覃曰崔球逰宗閔之門赤節下秉筆記注為千古法不可用朋黨如裴中孺李讓夷臣不敢有異論其為人主大臣知重如此清慎髙亮後漢書周舉梁商表為從事中郎商病甚帝問遺言對曰從事中郎周舉清慎髙亮可任諌議大夫論事有諍臣之風唐文宗嘗於便殿召栁公權論事切直忤㫖周墀為之惕慄公權詞氣益堅上徐謂之曰朕知舍人不合却作諌議以卿論事有諍臣之風今擢卿諌議大夫閤内論校獵武宗幸涇陽校獵白鹿原諌議大夫髙少逸鄭朗䓁於閤内諭陛下校獵太頻出城稍逺方用兵師且宜停止帝優勞之諌官出謂宰相曰諌議官要朕時聞其言庶幾減過舁櫬詣朝堂極諌九國志䦨王延羲立不恤國事好戈獵誅丞相及宗室勲舊左右懼禍諌議大夫黄峻舁櫬詣朝堂極諌延羲曰老輩風狂不足怪貶漳州司户諫朝士杖決鄭元弼延羲襲位授右諌議大夫時延羲女下嫁百官不賀延羲怒朝士决杖者十有二人元弼為之力諌延羲曰卿仰魏徵何如人乃諌不止也元弼曰陛下幸似唐太宗臣方魏徵可矣延羲解怒朕之汲黯國朝田錫資骨鯁學士承㫖宋白舉直言極諌公對事奏經史中治體之要十三篇真宗手詔褒奬常自謂曰田錫朕之汲黯也不歴郎中員外春明退朝錄近世鄭文肅劉丞相張尚書方平王宣徽拱辰滕侍讀甫吕給事卿鄧中丞潤文皆不歴郎中員外而使為諌議大夫帶墜筆談諌議班在制誥上若帯代制則在知制誥下從職也戲語謂之帶墜起居郎後漢馬皇后撰起居注後魏始置起居令史每行幸宴㑹則御左右記錄帝言及賓客酬答後别置起居注二人以它官領之隋百官志北齊有起居省散騎常侍通直散騎常侍散騎侍郎通直散騎侍郎各一人校書郎各二人後周有外史掌書王言動作之事以為國志即起居之職又有著作二人掌綴國錄則起居著作之任自此分矣隋初以吏部散官及校書正字有叙述之才者掌起居之職以納言統之煬帝内史省加置起居舍人二人從六品次舍人下唐百官志門下省起居郎二人從六品下掌錄天子起居法度天子御正殿則郎居左舍人居右有命俯陛下以聽退而書之季終以授史官貞觀中以給事中諫議大夫兼知起居注或知起居事每仗下議事起居郎一人執筆記錄於前史官隨之其後復置起居舍人分侍左右秉筆隨宰相入殿若仗在紫宸内閣則夾香案分立殿下直第二螭首和墨濡筆皆即㘭處時號螭頭髙宗臨朝不决事有司所奏唯辭見而已許敬宗李義府為相奏請多畏人之知也命起居舍人對仗承㫖仗下與百官皆出不復聞機務矣長壽中宰相姚璹建議仗下後宰相一人錄軍國政要為時政記月送史館率推美讓善事非其實未幾易置而起居郎猶因舊制勅稍筆削以廣國史之闕起居舍人居記言之職唯編詔書不及他事開元初復詔修史官非供奉者皆隨仗而入位於起居郎舍人之次及李林甫專權又廢太和九年詔入閣日起居郎舍人具紙筆立螭頭下復貞觀故事有令三人賛者六人貞觀三年置起居郎二人廢舍人龍朔二年曰左史天壽元年如之六典起居郎二人從六品上起居郎因起居注以為名起居注者記錄人君動止之事春秋傳曰君舉必書禮云動則左史書之言則右史書之皆其事也宋衷世本云沮誦倉頡為黄帝左右史周書穆王時有左史戎夫書前代存亡之誡諸侯之國亦立之漢武帝有禁中起居注後漢明徳皇后撰明帝起居注然則漢時起居注似在宫中為女史之職魏晉以來皆中書著作兼修國史及北齊集書省領起居注令史之從七品上後周春官府置外史掌書言及動作以為國志盖其任也令史三人先置楷書手令改為令史起居郎掌錄天子之動作法度以修記事之史凡記事之制以事繫日以日繫月以月繫時以時繫年必時書其朔日甲乙以紀厯數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季終則授之於國史焉漢獻帝及西晉以後諸帝皆有起居注皆史官所錄自隋置為職員列為侍臣專掌其事毎季為卷以送付史舘焉五代百官志後唐同光元年起居郎起居舍人各置一半國朝官品令起居郎從六品記善惡以為鑒誡唐太宗謂諌議大夫褚遂良曰卿知起居注錄何事大抵人君觀之否對曰今之起居古左史右史也書人君言事且記善惡以為鑒誡庶㡬人主不為非法不聞帝王親自觀史上曰朕有不善卿必書之耶遂良曰守道不如守官臣職當載筆君舉必記召令侍書遂良秘書郎遷起居郎尤工𨽻書太宗嘗謂侍中魏徵曰虞世南死後無人可以論書徴曰遂良下筆遒勁甚得王逸少體太宗即日召令侍書罷封禪遂良為起居郎貞觀中詔有事於泰山先幸洛陽有星孛於太陽㣲犯郎位遂良言於太宗曰陛下撥亂反正功超前烈將告成東岳天下幸甚而行至洛陽彗星輙見此或有所未允合者也且漢武優柔數年始行大禮臣愚伏願詳擇太宗然之下詔罷封禪之事職當修注杜正倫知起居注太宗嘗謂侍臣曰朕毎日坐朝欲出一言即思此言於百姓有利益否所以不能多言正倫進曰君舉必書言存於左右史臣職當修起居注不敢不盡愚直陛下若一言乖於道理則千載累於聖徳非直當今損於百姓願陛下慎之太宗大悦不敢不盡上執筆所記名為史鄭朗字有融為起居郎初太和末風俗稍奢文宗恭勤節儉兾革其風謂宰臣曰朕聞前日内庫唯二錦袍飾以金烏一袍𤣥宗幸温陽時御之一與貴妃當時貴重如此如今奢靡豈復貴之料今富家徃徃皆有左衞副使張元昌用金唾壺昨因申訓已誅之矣時郎執筆螭頭下宰臣退上謂郎曰適所議論卿記録未吾試觀之朗對曰臣執筆所記名為史伏惟故事帝王不敢取觀昔太宗欲覽國史諌議大夫朱子奢云史官所述不隠善惡或主非上智飾非䕶失見之則生怨所以義不可觀帝曰適來所記無可否臧見亦何爽乃宣謂宰臣曰鄭朗引故事不欲朕見起居注夫人君之言善惡必書朕恐平常閒語不関理體垂諸將來竊以為耻異日臨朝庶幾稍改何妨一見以誡醜言朗遂進之人瑞鄭仁表為起居郎文章俊拔然恃才傲物人士薄之自謂門地人物文章具美甞曰天瑞有五色雲人瑞有鄭仁表以婦公辭内職獨孤郁遷起居郎權徳輿作相郁以婦公辭内職憲宗曰徳輿乃有此佳壻因詔宰相須氏族之家選尚公主者隨宰臣記事馮定請許左右史隨宰臣延英記事宰臣不樂純用科名人國朝唐詢江東轉運使因辭得上殿言執政純用科名人修起居注非故事未幾修注闕仁宗遂用詢左司諫唐百官志門下省左補闕六人從七品上掌供奉諷諫大事廷議小則上封事職官志左補闕二員從七品上古無此官天后垂拱元年勅記言書事毎切於旁求補闕拾遺未𢎞於歴選瞻言共理為藉衆才寄以登賢期之進善宜置左右補闕各二員左右拾遺各二員掌供奉諷諌行立次左右史之下六典左補闕二人從七品上皇朝所置言國家有過闕則補正之故以名官焉詩云衮職有闕惟仲山甫補之盖取此義後漢伏湛出入禁闈拾遺補闕魏志文帝勅侍臣曰公卿等宜拾朕之遺補朕之闕晉武帝詔曰公卿䒭宜補闕拾遺獻可替否晋職官志御登殿侍中居左散騎常侍居右備切問近對拾遺補闕後魏孝文帝令侍中李冲補闕左右垂拱中因其義而創立四員左右各二員天授初左右各三員通前為十員神龍初依舊各置二員其才可則登不拘陞叙又置供奉無數左補闕拾遺掌供奉諷諫扈從乗輿凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之五代百官志後唐同光元年補闕拾遺各置一半國朝雍熈五年詔改左右補闕為左右司諫元祐官品令左右司諫七品職在諫曹唐權徳輿為左補闕時裴延齡以巧倖判度支徳輿上疏切諫云臣職左諫曹令採羣議敢瀝肝血伏待刑書不甚檢束栁渾天寳初拜監察御史臺中執法之地動限儀矩渾性疎放曠不甚檢束寮長拘局忿其疎縦渾不樂乞求外任執政惜其才奏為左補闕握筆草狀劉寛夫為左補闕疏陳岵進注維摩綬得濠州詔岵不因僧得郡諌官安得此言湏推排首末来寛夫曰昨論陳岵之時不記發言前後唯握筆草狀即是㣲忱若尋究推排恐傷事體帝嘉其引過釋之諫公主出降行五禮施敬本為左補闕開元十二年唐昌公主出降行五禮敬本與張烜李鋭等上疏竊以紫宸殿者漢之前殿周之路寢陛下所以負黼扆下黄屋饗萬國朝諸侯人臣致敬之所猶北極可見不可得而升也昔周女出降於齊以魯侯為主但有外館之法而無路寢之制今欲紫宸殿行禮即當人臣攝行馬入於庭醴升於牖主人授几逡廵紫座之間賓使就筵登降赤墀之地又據主人辭稱寡君子有事於主人之室言詞僣越事理乖張既凟威靈深虧典制其問名納采等並請權於别所𤣥宗納其言移於光順門外設次行禮孜孜獻納獨孤郁李正辭嚴休復自拾遺轉補闕及參謝之際宰相裴垍廷語曰獨孤與李二補闕孜孜獻納今之遷轉可謂酬勞無媿矣嚴補闕官業或異於斯時者進擬不無疑緩休復悚恐而退賞一逸人可勸天下國朝真宗咸平五年終南山處士种放對於便殿上親撫勞命坐語久之館於都亭驛尋授左司諫直昭文館上謂宰臣曰放召對来詢以民事則曰徐而化之問以邉事則不對但言愛民而已久之言所有獻納俟形於章疏然亦有就禄之意且曰跡孤朕喻以俟升班列必見朝廷清肅排擯之事無敢為者賞一逸人可勸天下出自宸選明道中執政除其親舊二人為正言司諫上謂曰祖宗法制臺諫官須出自宸選今不可壊他祖宗法度若臺諌官是大臣自除則大臣過失無敢言者執政惶恐稱死罪悸汗浹背父為宰相子為諫官唐元和元年杜從郁徙為左補闕韋貫之與崔羣奏論尋降為左拾遺遺補雖資品不同皆是諌官父為宰相子為諌官若政有得失不可使子論父改為秘書丞詔中書為之辭文宗以魏謩為補闕上甞言於宰相曰太宗得徵參禆闕失弼成聖政我今得謩於疑似之間必能極諌雖不敢希及貞觀之政庻幾處於無過之地命授謩左補闕於狀内備述諌疏激切侍臣舒元褒曰遺補官秩雖卑下侍臣也車載見拾遺門斗量注下左拾遺唐百官志左拾遺六人從八品上掌同補闕職官志左拾遺二員從八品上見補闕五代史見補闕六典左拾遺二人從八品上皇朝所置言國家有遺事拾而論之漢汲黯願為中郎署長出入禁闥補闕拾遺元帝初立給事中劉向侍中金敞拾遺於左右續漢書張衡為侍中從容諷議拾遺左右後魏初置内侍長主拾遺應對又孝文帝命侍中丘惟拾遺左右創立四員國朝雍熈五年改左右拾遺為左右正言元祐令左右正言從七品秩卑選重唐白居易上疏云䝉恩授臣左拾遺依前翰林學士謹按六典云云其選甚重其秩甚卑所以然者抑有由也大凡人之情位髙則惜其位身貴則愛其身惜位則偷合而不言愛身則茍容而不諌此必然之理也故拾遺之置所以卑秩者使位未足惜身未足愛也所以重其選者使下不忍負心上不忍負恩也位未足惜身未足愛然後能有闕必規有違必諌朝廷得失無不察天下利病無不言此國朝置拾遺之本意也身是諌官月請諌紙居易與元稹書云僕在翰林日身是諌官月請諌紙啟奏之外有可以濟救人病禆補時闕難於摘言輙歌詠之欲稍聞於上志未就而悔已生言未聞而謗已成矣詩人命蹇又書云古人云名者公器不可以多取僕是何者竊時之名已多既竊時之名义欲竊時之富貴使已為造物者肯兼與之乎况詩人命蹇如陳子昻杜甫各授一拾遺屯剥至死額叩龍墀劉栖楚為拾遺敬宗即位畋遊稍多坐朝常晚栖楚出班以額叩龍墀苦諫云臣忝諫官致陛下有此請碎首以謝遂以額叩龍墀久之不已宰臣李逢吉出位宣曰劉栖楚休叩頭候進止栖楚捧首而起因更陳論搕頭見血上為動容以袖連揮令出栖楚又云不可臣奏臣即碎首死牛僧孺復宣示而出敬宗為之動容無何遷起居郎擢自草澤竇羣隠居毗陵以節槩聞著書三十四巻號史記名臣疏貞元中蘇州刺史韋夏卿以園丘茂異薦兼獻其書不報復薦羣召拜左抬遺遷侍御史充入蕃使判官羣因入對奏曰陛下即位二十年始自草澤擢臣為拾遺是難其進也今陛下以二十年難進之臣用為和蕃判官一何易也徳宗異其言留之復為侍御史諫沉香亭子李漢為左拾遺敬宗始治宫室波斯賈人李鱗沙獻沉香亭子漢乃上疏論之曰若以沉香為亭子即與瑶臺瓊室事同义奏近日除授不由中書擬議多是宣出施行臣恐自此紀綱大壞姦邪恣行願陛下各勅有司稍存典故坐言忤出為從事諫觀酺樂嚴挺之為左拾遺先天二年睿宗詔三日三夜御安福門觀酺樂挺之上疏四不可云云伏望晝則歡娯暮令休息要令兼夜恐無益聖朝乃止諫除授不由中書薛廷老寳厯初與舒元褒李漢俱為拾遺在閣内言臣伏見近日除授徃徃不由中書進擬或是宣出臣恐自此紀綱浸壊姦邪恣行乞聖恩詳察帝厲聲曰更有何事元褒進曰陛下近日修造太多帝色變曰何處修造元褒俯首不能對廷老奏曰臣䓁是諌官有所聞即合奏論亦豈知陛下修造之所但見般運瓦木絶多即知修造不已伏乞稍留聖慮帝曰如所奏然後各復位論中丞温造凌供奉官太和三年左拾遺舒元褒䓁論中丞温造凌供奉官事今月四日左補闕李虞仲與温造街中相逢造怒不廻避遂擒拿虞仲祇人笞其背者臣謹按國朝政事供奉官街中除宰相外無所廻避今温造蔑朝廷故典凌陛下近臣恣行胸臆曽無畏避伏以事有雖小而関理分者即不可失也理分既失亂由之生拾遺補闕官秩雖卑乃陛下近臣也中丞雖髙乃法吏也侍臣見凌是不廣敬法吏壊法何以持䋲前時中書舍人李虞仲與造相逢造乃曳立引馬知制誥崔咸與造相逢又捉其從人當時罷不上聞所以強暴益甚臣䓁又聞元和長慶中中丞行李不過半坊今乃逺至兩坊謂之籠街喝道但以尊祟自處不思僣擬之嫌陛下若不因此特有懲革伏恐從此供奉官輩便湏廻避中丞累朝制度失自陛下臣䓁官忝諌列實為陛下惜之又聞近日以来應合有導從官手力多者街衢之中行禮太過自今傳呼前後不得過三百步獻大像閤賦許景先神龍初為夏陽尉東都起聖善寺報慈閤景先詣闕獻大像閤賦詞甚美麗擢左拾遺不數年出將入相蕭嵩為左拾遺常與布衣張鎬為友館而禮之表薦鎬曰如鎬者用之則為王者師不用則幽谷一叟耳𤣥宗擢鎬拾遺不數年出將入相堪為諫諍之官李邕少知名長安初内史李嶠御史張廷珪並薦邕詞髙行直堪為諌諍之官由是召拜為左拾遺三諫不聽徐仁紀拜左拾遺三上書論得失不納謂人曰三諌不聽可去矣遂托疾歸鄉里柳篋子栁璨遷左拾遺公卿朝野托為箋奏時譽日洽以其博奥目為栁箧子斗量天授三年舉人無賢愚咸加擢用頗為濫雜謡誦曰補闕連車載拾遺平斗量把推侍御史椀脱校書郎諫迎軒轅先生宣宗大中十一年右補闕葉嘏左拾遺王譜右拾遺薛廷傑上疏諌遣中使徃羅浮山迎軒轅先生詔云云卿䓁位當列職論在諌司閲示来章深納誠意團句把麻通事舍人宣詔舊令拾遺團句把麻者盖謁者不知書多失句度故用拾遺低聲摘句以取及吕温為拾遺被喚把麻不肯去遂成故事拾遺不把麻自吕始也時栁宗元戲言云幸識一文半字何不與他把也即日上疏論諫職元稹自校書郎應制舉才識兼茂明於體用登科第者十八人稹第一制下除左拾遺稹性鋒鋭見事風生既居諌垣不欲碌碌自滯事無不言即日上疏論諌職諫營興泰宫盧蔵用為左拾遺則天將營興泰宫於萬安山蔵用諌曰竊讀書見自古帝王之迹矣聞土階三尺茆茨不剪者唐堯之徳也卑宫室菲飲食盡力於溝洫者大禹之行也惜中人十家之産而罷露臺之制者漢文之明也並能垂名無疆為帝王之烈今陛下崇臺䆳宇離宫别館亦已多矣更窮人力以事土木臣恐議者以陛下為不愛人務奉己者諌為公主廣第宅辛替否為左拾遺景龍中安樂公主府所補官属多非其才中宗為公主廣第宅替否諫曰臣聞王者牧黎庶建百官莫不慎器與名畏怨重禍不激詭以求進不貨賄以求榮公侯伯子男五等各以功為先後卿大夫士九品各以徳為次第伏惟陛下倍百行賞倍十増官金銀不供其仰束帛不充於錫何愧於無用之臣何慚於無力之士於公府補授罕存推擇臣聞祸生有胎福生有基伏惟公主陛下之愛女選賢良以嫁之設官職以補之傾府庫以賜之壯宅第以居之廣池臺以嬉之可謂至憐也然而用不合於古義行不根於人心將恐變貴成憎翻福為禍何所恃乎文價益重五代史王祐文傲唐同光初與桑維翰同年登第拜左拾遺維翰入相祐文以同門生裁書自陳維翰竒之禮待甚厚自是文價益重書命有元和之風案此條原本缺注諫院國朝舊常以省官二員判院事其員有左右諌議大夫司諫正言天禧元年詔别置院慶厯三年知制誥田况言有唐兩省自諫議大夫至拾遺補闕共二十人毎宰相奏事諫官隨而入有所闕失即時規正其實皆中書門下之属官也今諫議大夫無復職業自司諫正言知諫院皆遺補之任而朝廷責其言如大夫之職而地勢不親位序不正在朝廷間則與衆人同進退非所以顯而異其分也今筦庫冗散之吏尚赴内朝豈諌諍之臣不得日奉朝請臣在諫院毎聞一事皆取諸采問比及論列或至後時今若令諫官得奉内朝則可以日聞朝廷之事矣兼王素歐陽修蔡襄皆以它官知諫院居兩省之職而不得預其列於體未便欲乞令後綴小兩省班次所貴名體相稱副陛下選求之意詔今後比直龍圗閤及修起居注例令毎日赴内朝四年詔自今諫官毋得用見任輔臣所薦之人十一月詔始如先朝置諫官六員至和二年詔臺官不許相率上殿熈寧八年同知諫院范百禄言近令諫官綴左右兩班序立仗續准御史臺関報令臣歸本官班序立仗謀其政者必在其位今修起居注行起居舍人起居郎事直舍人院行中書舍人事同知諫院行司諫正言事者也國朝兩省官不必正員茍行其事必立其班所以明職分而勤官守也今修起居注直舍人院則綴小兩省班同知諫院則絀而不與非明職分勤官守之意詔特令綴小兩省班置印唐文宗太和年置諫院印相惜諌官以章疏之故憂患畧同臺中則務糾彈舉省中多士㫖趣不一故言遺補相惜御史相憎郎官相輕减郎位進奉恩澤國朝嘉祐八年知諌院司馬光奏諸路進賀登極表至京師朝廷一例推恩乃至班行幕職權知州軍或所遣之人非親人者除齋郎及差遣使殿侍此盖國初承五代姑息藩鎮之弊後来因循不能釐正國家爵禄本待天下賢才及有功效之人今使此䓁無故受官誠為太濫况近年官吏繁冗十倍於國初之時若五服内親者或乞䓁第授一官其無服属並量賜金帛弗聴奏事近侍立兩廡治平元年以同知諌院吕誨奏先帝朝兩府及臺諌官奏對即左右近侍皆引避於兩廡故得從容論議事無泄於外者臣請登對時近侍皆引避從之起居院國朝初置但関勅送史館不復撰集淳化五年諫議大夫史館修撰張泌言乞置起居院復左右史之職修集記錄以為起居注毎月與時政記同送史館遂徙置院於禁中自後授者為同修起居注増置楷書二人月給公用錢十千表紙五百畨凡宣徽院客省四方館閤門御前忠佐引見司制置進貢辭謝游幸宴㑹賜賚恩澤之事五日一報翰林麻制徳音詔書勅榜該沿革制置者門下中書省封冊誥命進奏院四方官吏風俗善惡祥瑞孝子順孫義夫節婦殊異之事禮賓院諸畨職貢宴勞賜賚之事並十日一報吏部文臣除拜銓選沿革兵部武臣除授司封封建考功諡議行狀户部土貢旌表州縣廢置刑部法令沿革禮部祥瑞貢舉祠部祭祀奏日道釋條制太常雅樂沿改禮院禮儀制撰吉㓙儀注司天風雲氣候祥異證驗宗正皇属封建出降宗廟祭享制度大理寺刑律起請並一月一報内外鹽鐵金穀増耗度支經費出納户部版圗升降嵗終一報内外臣寮上章利害詞采可賞事理可行者中書具章表封下毎季編達史館以起居舍人史館修撰梁周翰掌起居郎事秘書丞直昭文館李宗諤掌起居舍人事四月梁周翰等上言謹按記曰天子動則左史書之言則右史書之又曰左史記事右史記言春秋傳曰君舉必書言者尚書是也事者春秋是也漢武帝有禁中起居注自魏至晉起居之職歸於著作其後亦命近臣主掌其事至後魏始置起居令史每行幸宴㑹則在御座左右記錄帝言及賓客酬荅之語後又别置起居注二人北齊有起居省隋置起居舍人二人以掌内史唐起居之官𨽻門下顯慶中郎與舍人分属兩省每皇帝御殿左右史夾香案分於殿下螭頭之側和墨濡翰皆就螭首之㘭處有命則臨陛俯聽對而書之凡典禮文物冊命啟奏臣寮薨免懲惡勸善之事悉載於起居注季終則授於史官以俟筆削長夀中宰相姚璹以為帝王謨訓不可使無紀述若不宣白宰相史官無由而書遂表請仗下所言軍國政要命宰相一人專知撰録季終撰授於史官即今修時政記是也元和十二年詔毎遇坐日如事有可備勸戒合記日者委其日承㫖宰相宣示左右起居令其記録仍依舊例季終送史館太和九年詔郎舍人准故事入閣日賚紙筆立於螭頭以記言動伏乞今後應有祟徳長春殿毎皇帝宣諭之言侍臣論列之事依舊中書編為時政記月終送史館其樞密院事関機密亦乞命本院逐月具合書事件實封送史館自餘百司凡干封拜除改沿革制置之事並乞依臣等所請特降勅命具條件関報起居院每月具所編錄封送史館從之仍令郎舍人下直於崇政殿以記言動别為起居注以付史官周翰等又言每月起居注願先以進御後付史館起居注進御自周翰等始也至道二年李昉拜平章事加監修國史建議復時政記故事時政記月終送史館昉以進御而後付有司時政記進御自昉始也大中祥符八年移院於右掖門外之西廊時禁城火故徙於外元祐三年復徙右掖門之内至和元年知制誥賈黯言毎邇英閤召侍臣講讀經史其咨訪之際動闗政體而史臣不得預聞臣竊惜之欲乞令修起居注入侍閤中事有可書隨即記録從之治平二年以實錄院檢討官集賢校理宋敏求諸王府記室參軍直集賢院韓維並同修起居注初修注直闕中書進敏求及集賢校理楊繪英宗問修起居注選何䓁人宰臣對曰例以制科進士髙等與館職有才望者兼用楊繪皇祐五年第二人進士今以次當補帝曰修起居注即知制誥豈宜以次補乃命易之熈寧四年詔諫官兼修起居注者因後殿侍立亦許奏事從張琥之請也浮薄治平三年以同修起居注章衡知汝州以諌官御史薛家劉庠莫申等言其浮薄故黜之典儀贊者唐六典典儀二人從九品下周禮秋官有司儀盖其任也齊職儀云東宮殿中將軍属官有導客局置典儀録事一人掌朝㑹之事史闕其品秩梁有典儀之職未詳何曹之官掌唱警唱奏之事宋服武冠陳亦有之後魏置典儀監從第五品史闕其員及所掌皇朝置典儀二人𨽻門下省初用人皆輕至貞觀末李義府為之自後常用士人領賛者以知賛唱之節賛者十二人隋太常寺有賛者十六人鴻臚寺有十二人皇朝因之𨽻門下省掌賛唱為行事之節分畨上下亦謂之畨官典儀掌殿上賛唱之節及設殿庭版位之次若元正冬至凡大朝㑹王公升殿既坐酒至而起皆傳賛唱而為之節若國有大禮侍中行事及進中嚴外辦之版皆賛相焉國朝大朝㑹則遣官攝事城門郎門僕唐六典城門郎四人從六品下周禮地官有司門下大夫二人上士四人盖城門郎之任也初漢置城門校尉員一人秩二千石掌城門屯兵有司馬及丞各一人十二城門候各一人出從緹騎一百二十人盖兼監門將軍之職魏因之晉氏品第四秩二千石銀章青綬絳朝服武冠佩水蒼玉元帝省之宋齊但以衞尉掌宫城屯兵及管鑰之事梁陳二代依秦漢以光禄卿掌宫殿門户亦無城門之職後魏置城門校尉三品下太和末第四品上北齊衞尉寺統城門寺置城門校尉二人第四品上掌宫殿城門并諸倉庫管鑰之事後周地官府置宫門中士一人下士一人掌皇城五門之禁令又置城門中士一人下士一人掌皇城十二門之禁令皆其任也隋氏門下省統城門局校尉二人從四品下煬帝三年又𨽻殿内省十二年又减一人降為正五品後又改校尉為城門郎置四人從六品又𨽻門下省皇朝因之門僕八百人按晉光禄勲左中郎將有祟禮等門僕各二人隋有太廟郊社門僕皇朝城門郎置門僕分番上下掌送管鑰城門郎掌京城皇城宫殿諸門開闔之節奉其管鑰而出納之明徳䓁門為京城門朱雀䓁門為皇城門承天等門為宫城門嘉徳等門為宫門太極䓁門為殿門通内等門並同上閤門東都諸門准此開則先外而後内闔則先内而後外所以重中禁尊皇居也候其晨昏擊鼓之節而啟閉之承天門擊曉鼓聽擊鐘後一刻鼓聲絶皇城門開第一鼕鼕聲絶宫城門及左右延明乾化門開第二鼕鼕聲絶宫殿門開夜第一鼕鼕聲絶宫殿門閉第二鼕鼕聲絶宫殿門及左右延明門皇城門閉其京城開閉與皇城門同初承天門擊鼓皆聽漏刻契至乃擊待漏刻所牌到鼓聲乃絶凡皇城宫城闔門之鑰先酉而出後戌而入開門之鑰後丑而出夜盡而入京城闔門之鑰後申而出先子而入開門之鑰後子而出先卯而入若非其時而出有命啟閉則詣閤覆奉奉㫖合符而開闔之凡車駕廵幸所詣之所計其應啟閉者先發而請其管鑰及至即開闔如京城之制國朝大朝㑹則城門即遷官攝事符寶郎主寶主符主節唐六符典寶郎四人從六品上周禮地官有司掌節春官又有典瑞并其任也自漢以来唯旌節稱節餘皆號符焉寳即璽也秦為符璽令史記云始皇出遊㑹稽丞相李斯中車府令趙髙從趙兼行符璽令事是也漢因秦置符節令丞属少府漢官云秩四百石漢書云昭帝㓜冲霍光秉政殿中夜驚光召符璽郎取璽郎不與光奪之郎按劍曰臣頭可得璽不可得光壯之増秩二䓁後漢别為一臺亦属少府置符璽令一人為臺率主符節事凡遣使掌授節領尚符璽郎中四人兩漢皆傳秦六璽及傳國璽魏符節令位次御史丞晉武太始元年省并蘭臺置符節御史宋因之齊置主璽令史於蘭臺以侍書御史領之梁陳御史臺并置符節令史後魏御史臺置符節令領符丞郎中初從第四品中太和末從六品上北齊御史臺領符節署令一人領符節郎中四人後周天官府置主璽下士四人分掌神璽傳國璽與六璽之蔵隋初門下省統六局符璽局置監二人正第六品上直長四人從七品上焬帝三年改為郎從第六品皇朝因之置符璽郎四人則天更名符寳郎受命及神璽等八璽文并瑑為寳字神龍初復為符璽郎開元初改為符寳郎從璽文也主寳六人寳即璽也周書曰湯放桀大㑹諸侯取天子之璽置天子之座右者印璽二名尊卑共之諸侯大夫印亦稱璽春秋左傳曰季武子使季冶問璽書追而與之是也主寳掌之分畨上下亦謂之畨官主符三十人漢文帝初與郡守為竹使符第一至第五以代周之鎮圭徵兵為銅獸符第一至第五以代周之牙璋各分半右留京師左以與之皆符合為信六國時魏公子無忌竊兵符矯命殺晉鄙則六國亦有之後漢太守都尉初除與璽書及發兵亦與璽書或與詔書奸偽刻造無由騐知至順帝以此制煩擾但召符節令發銅獸竹使符璽歴魏晉宋齊梁趙陳皆用之後魏有傳符歴北齊隋皆用之武徳初為銀莵符後改為魚符又有傳符主符掌之分畨下上亦謂之畨官主節十八人掌守旛節並分畨上下謂之畨官符寶郎掌天子之八寳及國之符節辨其所用有事則請於内既事則奉而藏之八寳一曰神寳所以承百王鎮萬國二曰受命寳所以修封禮禪神祇徐令言王璽記曰玉璽者傳國璽也秦始皇取藍田玉刻而為之其文李斯所製面文曰受命於天既夀永昌璽上隐起為盤龍文文曰受天之命皇帝夀昌秦㓕傳漢歴王莽為元后投之於地遂一角缺莽既滅校尉公賓就収璽綬詣更始於宛更始敗以璽歸劉盆子盆子降面縛上璽綬光武光武祠於髙廟受傳國璽至靈帝崩少帝失位掌璽者投於井中為孫堅所得袁術拘其妻而奪之術死荆州刺史徐繆得其璽還許上之漢滅傳魏至晉懐帝璽没於劉聰聰死劉曜得之又傳於石勒石季龍冉閔石季龍磨其隐起之文又刻其傍為文曰天命石氏後冉閔敗其將蔣幹求救於晉遂以璽送建業永和八年也歴東晉宋齊梁侯景竊位為景所得景敗偽將侯子監盜璽走江東侯追兵至投諸佛寺為栖霞寺僧永得之陳永定二年僧永死弟子普智奉獻陳亡璽傳於隋其璽方六寸厚一寸七分髙四寸六分蟠龍隐起文字巧妙一與𫝊國璽同形自晉至梁相傳謂之鏤璽及侯景敗送於齊文宣齊亡入周周傳於隋文帝初亦謂之𫝊國璽開皇二年改為受命璽至開皇九年江南得真𫝊國璽乃改前所得者名神璽三曰皇帝行寳荅疏於王公則用之四曰皇帝之寳旁采勲賢則用之五曰皇帝信寳徵召臣下則用之六曰天子行寳荅四夷書則用之七曰天子之寳慰撫蠻夷則用之八曰天子信寳發蕃國兵則用之漢舊儀曰天子有六璽皆白玉螭獸紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽虞喜志林曰所封事異故文字不同漢儀又云以皇帝行璽為凡雜以皇帝之璽賜諸侯王書以皇帝信璽發兵其徵大臣以天子行璽外國事以天子之璽鬼神事以天子信璽皆以武都紫泥封者布囊白素裹兩端縫尺一版中約署有事及發外國兵用天子信璽封拜外國及徵召用天子行璽賜匃奴單于外國王書用天子之璽下竹使符徵召大事行州郡國者用皇帝信璽諸下同獸符發郡國兵用皇帝之璽封拜王公以下遣使就授皆用皇帝行璽若車駕行幸以直侍中佩信璽行璽以從天子之信古曰璽今曰寳其用以玉其封以泥皇后及太子之信曰寳其用以金也凡大朝㑹則奉寳以進於御前車駕行幸則奉寳以從於黄鉞之内今无正朝㑹則進神寳及受命寳若行幸則合八寶為五輦函籙封盛以從行在凡國有大事則出納符節辨其左右之異藏其左以頒其右以合中外之契焉一曰銅魚符所以起軍旅易守長两京留守若諸州軍折衝府諸處提兵鎮守之所及宫總監皆給銅魚符也二曰𫝊符所以給郵驛通制命两京留守及諸州若行軍所並給𫝊符諸應給魚符及𫝊符者皆長官執其長官若被告謀反大逆其魚符以付次官無次官付受告之司三曰隨身魚符所以明貴賤徵召親王及二品以上散官京官文武職官王公以上都督刺史及火都督長史司馬諸都䕶並給隨身魚符四曰木契所以重鎮守慎出納車駕巡幸皇太子監國有兵馬受處分者為木契若王公以下两京留守及諸州有兵馬受處分并行軍所及鎮兵五百人以上馬五百疋以上征討亦各給木契其在内在外及行用法式並准魚符五曰旌節周禮掌節職曰凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也又云道路用旌節注云今漢使所擁是也漢書曰戾太子遭巫蠱事懼不自明取使節發兵與丞相劉屈氂戰初漢節純赤以太子符亦赤故更為黄旄加以相别蘇武在匃奴執漢節毛落並其事也所以委良能假賞罰魚符之制王畿之内左三右一王畿之外左五右一左者在内右者在外用之日從第一為首後事湏用以次發之周而復始大事兼勅書晉代留守將軍及軍發後更添兵為新授都督御史及改替追喚别使若禁推請假勅許及别勅觧任者皆須得勅書小事但降符函封遣使合而符之應用魚符行下者尚書符録勅牒門下省奏請仍預遣官典就門下省對封封内連冩勅符與魚左同函封上用門下省印若追右符函威封印亦若此傳符之制太子監國曰雙龍之符左右各十京都留守曰麟符左二十其右一十有九東方曰青龍之符西方曰騶虞之符南方曰朱雀之符北方曰𤣥武之符左四右三左者進内右者付外應執符文其兩京留守符並進内若車駕廵幸留守右符付留守隨身魚符之制左二右一太子以玉親王以金官庶以銅皆題云某位姓名其官共有一員者不須著姓名即以官名其曹司同者雖一員亦著姓名隨身者仍著姓名並以袋盛其袋三品以上飾以金五品以上飾以銀六品以下者飾以銅守五品以上者不佩魚若非時出使别勅召檢校領兵在外不别給符契若須廻改處分者勘符同然後承用佩以為飾刻姓名者去官而納焉不刻者傳而佩之若傳佩魚皆須逓相付十日之内申報禮部木契之制太子監國則王畿之内左右各三王畿之外左右各五庶官鎮守則左右各十旌節之制命大將帥及遣使於四方則請而假之旌以專賞節以專殺五代後唐同光中製寳一座文曰皇帝受命之寳晉天福三年製皇帝受命寳以受天明命惟徳允昌為文刻四年製皇帝神寳周廣順三年内同製國寳二用白玉方六寸螭虎紐詔馮道書寳文其一以皇帝承天命為文其一以皇帝神寳為文國朝傳其二寳太宗别製承天永命之寳寳用玉篆文廣四寸九分厚二寸三分填以金盤龍紐係以暈錦大綬赤小綬連玉環玉檢髙七寸廣二寸四分玉斗方二寸四分厚一寸二分皆飾以金裹以紅錦加紅羅泥金夾帊納於小盝盝裝以金覆以麻暈褥飾以雜色玻璃碧鈿石珊瑚金精石馬腦文盝二重皆装以金覆以紅羅繡帊載以輿及行馬並飾以金又有方匙灰匙大筯燭臺燭刀皆以金為之朝㑹則陳於御坐前大禮則别於仗衞中毎上尊號有司製金寳以尊號為文雍熈三年以天下合同之印為天下合同之寳中書奏覆狀流内銓歴任三代狀用之御前之印為御前之寳樞密院宣命諸司奏狀用之書詔之寳翰林詔勅引録勅牒牓用之至道三年皇帝受命寳以皇帝恭膺天命之寳為文符寳郎大朝㑹則遣官攝事頭可得璽不可得前漢昭帝㓜冲霍光秉政殿中夜驚光召符璽郎不與璽光奪之郎按劍曰臣頭可得璽不可得光壯之増秩二等職官分紀卷六
