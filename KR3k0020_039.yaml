body:
  text: 職官分紀卷三十九宋孫逢吉撰都督府晉職官志驃騎以下及諸大將軍不開府非持節都督者品秩第二其假節為都督者所置與四征鎮加大將軍不開府為都督者同置參佐吏卒幕府兵騎如常都督制唯朝會祿賜從二品將軍之例然則持節都督無定員前漢遣使始有持節光武建武初征伐四方權時置督軍御史事竟則罷建安中魏武為相始遣大將軍督之二十一年征孫權還使夏侯惇都督二十六軍是也魏文帝黃初三年始置都督諸軍州事或領刺史又置田曹參軍事兵曹參軍事法曹參軍事士曹參軍事各一人正七品下參軍事五人正八品下市令一人從九品上文學一人正八品下醫學博士一人從八品上中都督府都督一人正三品别駕一人正四品下長史一人正五品上司馬一人正五品下録事參軍事一人正七品下録事二人從九品上功曹參軍事倉曹參軍事户曹參軍事田曹參軍事兵曹參軍事法曹參軍事士曹參軍事各一人從七品上參軍事四人從八品上市令一人從九品上文學一人從八品上醫學博士一人正九品上下都督府都督一人從三品别駕一人從四品下長史一人從五品上司馬一人從五品下録事參軍一人從七品上録事二人從九品上功曹參軍事倉曹參軍事户曹參軍事田曹參軍事兵曹參軍事法曹參軍事士曹參軍事各一人從七品下參軍事三人從八品下文學一人從八品下醫學博士一人正九品上都督掌督諸州兵馬甲械城隍鎮戍糧廩上軍大將軍曹真都督中外諸軍事假黃鉞則總統內外諸軍矣明帝太和四年秋晉宣帝征蜀加號大都督髙貴鄉公正元二年文帝都督中外諸軍尋加大都督及晉受禪都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之使節為下使持節得殺二千石以下持節殺無官位人若軍事得與使持節同假節唯軍事得殺犯軍令者及伐吳之役以賈充為使持節假黃鉞大都督總統六師太康中都督諸軍事刺史理人各用人也惠帝末乃并任非要州則單為刺史庾翼都督征討諸軍事鎮襄陽綏懷招納立客館舍置典賔參軍江左以來都督中外尤重惟王導等權重者乃居之宋書人臣無居者唯江夏王義恭得假黃鉞假黃鉞則專戮節將非人臣常器又有都督諸州諸軍事者為常職舊曰監某州諸軍事文帝即位改監為都督後魏有都督中外諸軍事永安以後逺近多事使都督總攝六軍立府置佐後周改都督諸軍事為總管隋百官志髙祖採後周之制置大都督帥都督以酬勤勞煬帝改大都督為校尉帥都督為隊正文帝以并揚益荆四州置大總管其餘總管府置於諸州列位上中下三等加使持節煬帝悉罷之唐百官志大都督府都督一人從二品長史一人從三品司馬二人從四品下録事參軍事一人正七品上録事二人從九品上功曹參軍事倉曹參軍事户曹參軍事田曹參軍事兵曹參軍事法曹參軍事士曹參軍事各一人從七品下總判府事武德初邉要之地置總管以統軍加號使持節蓋漢置刺史之任有行臺有大行臺其員有尚書省令一人正二品掌管內兵民總判省事有僕射二人從二品掌二令事自左右丞以下諸司郎中略如京省又有食貨監一人丞二人掌膳羞財物賔客張具音樂醫藥有農圃監一人丞四人掌倉廩園圃薪炭芻藁運漕有武器監一人丞二人掌兵械廄牧有百工監一人丞四人掌舟車營作監皆正八品下丞正九品下七年改總管曰都督總十州者為大都督貞觀二年去大字凡都督府有刺史以下如故然大都督又兼刺史而不檢校州事其後都督加使持節則為將諸將亦通以都督稱唯朔方猶稱總管邉州别置經略使沃衍有屯田之州則置營田使武后聖厯元年以夏州都督領鹽州防禦使及安祿山反諸郡當賊衝者皆置防禦守捉使乾元元年置團練守捉使都團練守捉使大者領州十餘小者二三州代宗即位廢防禦使唯山南西道如故元載秉政思結人心刺史皆得兼團練守捉使楊綰為相罷團練守捉使灃朗陜興鳯如故建中後行營亦置節度使防禦使都團練使大率節度觀察防禦團練皆兼所治州刺史都督府則領長史都護或亦别置都督府其下有掾有屬有記室參軍事有典籖武德中省六典大都督府都督一人從二品貞觀中分為上中下都督府長史一人從三品秦漢邉郡有長史魏晉以來諸州皆有别駕治中至北齊八命七命六命州刺史各有長史隋九等州亦有長史開皇三年改雍州别駕為長史煬帝罷州置郡又改為别駕唯都督府置長史永徽中始改别駕為長史大都督府長史仍舊正四品下開元初始增其秩司馬二人從四品下北齊及隋九等州各有司馬開皇二年改雍州贊治為司馬皇朝改郡為州各置治中一人共都督府則置司馬永徽中改治中為司馬録事參軍事録事六曹參軍事參軍事人品同唐百官志執刀十五人中下府同典獄十六人中府十四人下府十二人問事十人中府八人下府六人白直二十二人中府二十人下府十六人市令一人從九品上漢代諸郡國皆有市長晉宋以後皆因之隋始有市令皇朝初又加市丞户四萬以上者省補市令貞觀十七年廢垂拱元年復丞一人佐一人史二人帥三人倉督二人史二人北齊九等州縣各有倉督員隋因之經學博士一人從八品上中下府從八品下助教二人中府同下府一人學生六十人中府同下府五十人醫學博士一人八品下中府下府同正九品下助教一人中下府同學生十五人若中下府户滿四萬人以上者官員同此唯減司馬一人下都督户滿二千户以上者同中府下府十二人中都督府都督一人正三品别駕一人正四品下漢司𨽻校尉有别駕從事校尉一人行部則奉引主録衆事舊解以為别乘傳車故曰别駕諸州刺史亦有之元帝時條州大小為設吏員别駕治中諸部從事秩皆百石後漢改曰别駕從事史三國因之晉代諸州各置别駕治中從事史一人宋齊梁陳後魏周隋因而不改皇朝因之永徽中改别駕為長史垂拱初又置别駕員多以皇家宗枝為之神龍中罷開元初復置始通用庶姓天寶八載諸郡廢别駕下郡置長史一員上元二年諸州復置别駕德宗時復省元和長慶之際兩河用兵禆將有功者補東宫王府官久次當進及受代居京師者常數十人訴宰相以求官文宗世宰相韋處厚建議復置兩輔六雄十望十緊州别駕長史一人正五品上司馬一人正五品下録事參軍事一人正七品下録事二人從九品上史四人六曹參軍事參軍事人品同唐百官志惟兵曹二人下都督府都督一人從三品户不滿二萬為下都督别駕一人從四品下長史一人從五品上司馬一人從五品下録事參軍事録事功倉户兵法曹參軍事人品同唐百官志州營户不滿萬者不置功曹其事𨽻入倉曹法曹兼掌士曹事參軍事三人管户不滿一萬者省一人都督長史附後世無叛由杜公晉書杜預為都督荆州諸軍事南土美而謡之曰後世無叛由杜公孰識智力與勇功士庶蒙濟賴陶侃為都督荆雍益梁四州諸軍事是時荆州大飢百姓餓死侃至秋熟輒糴至飢復發之士庶歡悅咸蒙濟賴吳人悅服稱為羊公羊祜都督荆州諸軍事招擕以禮懷逺以德吳人悅服稱為羊公出鎮南夏得江漢之心晉帝將有滅吳之志以羊祜為都督荆州祜率兵出鎮南夏開設庠序綏逺懷近甚得江漢之心夢司馬與鎧陳協為陶侃廣州長史侃夢有司馬以鎧與侃協以為司馬國姓鎧者捍國之器節下當進位果都督交州制度規模出於人庾翼都督江荆益三州刺史制度規模每出于人數年之中軍國充實人情翕然稱其才明由是自河以南皆懷歸附乘月登樓清嘯劉琨為大將軍都督并州諸軍事在晉陽常為胡騎所圍數重城中窘迫無計乃乘月登樓清嘯賊聞之皆慘然長歎中夜奏胡笳賊又流涕歔欷有懷土之心向晚復吹之賊并棄圍而走慕針誦之言以補不逮張實都督涼州下令曰忝繼前蹤庶幾刑政不為百姓之患而比年飢旱殆由庶事有闕竊慕針誦之言以補不逺自今有靣刺孤罪者酬以束帛翰墨陳孤過者答以筐篚謗言于市者報以羊米留語盡日石苞都督揚州諸軍事苞因入朝當還辭髙貴鄉公留語盡日既去白文帝曰非常主也數日而有成濟之事非方伯才劉胤代溫嶠都督江州諸軍事領江州刺史假節胤位任轉髙矜豪日甚縱酒耽樂不恤政事大殖財貨商販百萬胤之代溫嶠也逺近皆謂非選陶侃郗鑒咸云胤非方伯才朝廷不從不受鎮北之號王恭為都督兖青冀幽并徐州晉陵諸軍事平北將軍假節鎮京口初都督以北為號者纍有不祥故桓沖王坦之刁彛之徒不受鎮北之號恭表讓軍號以超授為辭而實惡其名乃改前將軍相當為八州都督晉中興書陶侃少住雷澤夢生八翅飛至天門而不入相者師圭曰君當八十位登上公都督引弓射子心同鐵石南史羊侃自魏入梁為侍中侯景反以侃副宣城主都督城內諸軍事是時梁興四十七年境內無事公卿在位及閭里士大夫莫見兵甲賊至卒迫公私震駭時宿將已盡後進少年並在城外其軍旅指揮一決于侃侃膽力俱壯帝深仗之加軍帥將軍初侃長子為景所獲執來城下示侃侃曰我傾宗報國猶恨不足寧復計此一子幸早殺之數持來侃謂其子日吾久以女為死猶在耶吾一身許國誓死於陳終不以爾而生進退因引弓射之賊以其忠義亦弗之害史臣曰羊侃臨危不撓古人所謂心同鐵石此之謂乎收藏骸骨即日降雨北史賀蘭祥除都督荆州刺史見有發掘古塜暴骸骨乃謂守令曰此豈仁者為政也命所在收藏時夏亢陽即日降兩也著翅魏末韓果為帥都督從大軍破稽胡于北山胡地險阻人迹罕至果進兵窮討散其種落稽胡􅘨果徑健號為著翅太祖聞之笑曰著翅之名寧減飛騎也趙郡王泉北齊書趙郡王琛都督北燕北尉北恆三州諸軍事內防外禦有無水之處禱而掘井鑿鍤才下飛泉涌出今號趙郡王泉關西男子必不為降將軍後周韋孝寬晉州刺史移鎮玉壁進授大都督時齊神武傾山東之衆志圖西入以玉壁衝要先命攻之連營數十里至于城下乃于城南起土山欲乘之以入當其山處城上先有兩髙樓孝寬更縳木接之令極髙峻多積戰具以禦之齊神武使謂城中曰縱爾縳樓至天我會穿城取爾遂于城南鑿地道又于城北起土山攻具晝夜不息孝寬復掘長塹要其地道仍簡戰士屯塹城外每穿至塹戰士即擒殺之于塹外仍積薪貯火敵人有在地道內者便下柴火以皮排吹之火氣一衝咸即灼爛外城又造攻車車之所及莫不摧毁雖有排楯莫之能抗孝寬乃縫布為幔隨其所向則張設之布懸于空中其車竟不能壞城外又縳松于竿灌油加火規以燒布并欲焚樓孝寬復長作鐵鈎利其鋒刃大竿每來以鈎遙割之松麻俱落又于城外四靣穿地作二十一道分為四路于其中各施梁柱作訖以油灌柱放火燒之柱折城并摧壞孝寬又隨壞處𥪡木柵以扞之敵不得入城外盡其攻擊之術孝寬咸拒破之神武無如之何乃遣倉曹參軍祖孝正謂曰未聞救兵何不降也孝寬報云我城地嚴固兵食有餘攻者自勞守者常逸豈有旬朔之間己須救援適憂至衆有不返之危孝寬關西男子必不為降將軍也俄而孝正復謂城中人曰韋城主受彼榮祿或復可爾自外軍士何事相隨入湯火中即乃射募格于城中云能斬城主降者拜太尉封開國郡公邑萬户賞帛萬匹孝寬手題書背反射城外云若有斬髙歡者一依此賞孝寬弟子遷先在山東又鎖至城下臨以白刃云若不早降便行大戮孝寬慷慨激揚略無顧意士卒莫不感勵人有赴難之心神武苦戰六旬傷及病死者十有四五智力俱困因而發疾夜遁去名止兒啼燉煌實録宋質直西破虜有威名兒啼恐之則止虜相志曰使汝行逢宋都督賜胡瓶漢紀唐書李大亮出為涼州都督嘗有臺使到州見有鷹諷大亮獻之大亮密表曰陛下久絶畋獵而使者求鷹若是陛下之意深乖昔旨如是其自檀便是使非其人太宗下書曰以卿兼資文武志懷貞確故委藩牧當兹重寄使遣獻鷹遂不曲順論今引古逺獻直言有臣若此朕復何憂古人稱一言之重侔于千金卿之此言深足貴矣今胡瓶一枚雖無千鎰之重是朕自用之物又賜荀悅漢紀一部下詔書曰此書敘致既明議論深博極為治之體盡君臣之義今以賜卿宜加尋閲州人刻石以紀其事開元十五年吐藩陷瓜州以瓜州為都督府以張守圭為都督瓜州地砂磧不宜稼穡每年少兩以雪水溉田至是渠堰盡為賊所毁既地少材木難為修葺守圭設祭祈禱經宿而山水暴至大漂材木塞澗而流直至城下守圭使取充堰于是水道復舊州人刻石以紀其事立碑紀政宋璟為廣州都督舊俗皆以竹茅為屋屢有大災璟教人燒瓦改造店肆自是無復燒延之患人皆懷惠立碑以紀其政哭不避辰日褒州都督張公謹卒太宗聞而嗟悼出次發哀有司奏言陰陽書曰在辰不可哭泣又為流俗所忌帝曰君臣之義同于父子情發于中安避辰日遂哭不營産業馮立拜廣州都督前後作牧者多以黷貨為蠻夷患由是怨叛立到不營産業衣食取給而已嘗至貪衆歎曰此吳隱所酌之泉也飲一杯水何足道哉吾當汲而為食豈止一杯即安能易吾性乎遂畢飲而在職纍年甚有惠政牛羊蔽野路不拾遺郭元振大定中遷涼州都督元振風神偉壯善于撫禦在涼州五年夷夏畏慕令行禁止牛羊被野路不拾遺勝築長城李績為并州大都督府長史太宗曰隋煬帝不能精選賢良安撫邉境唯解築長城以備突厥朕今委任李績于并州遂使突厥畏威遁走塞垣安靜豈不勝于長城耶造人耕之法王方翼為夏州都督屬牛疫無以營農方翼造人耕之法施關鍵使人推之百姓賴焉為政嚴肅張嘉貞睿宗時出為涼州都督為政嚴肅將士以下皆斂足股栗州人詣闕請留王晙為桂州都督桂州有屯兵常運衡永等州糧以饋之晙始築羅郭奏罷屯兵及轉運又堰江水開屯田數千頃百姓賴之尋又上疏請歸鄉拜墓州人詣闕請留乃下勑曰宜須政成安此黎庶晙在州又一年州人立碑以頌其政洛陽要重古難其人楊恭仁遷洛州都督太宗曰洛陽要重古難其人朕之子弟多矣恐非所任特以委公恭仁性虛淡必以禮度自居謙恭下士未嘗忤物時人方之石慶焉賜瑞錦以彰善政王方慶則天臨朝拜廣州都督方慶在任數載秋毫不犯境內清肅當時議者以為有唐以來治廣州者無出方慶之右有制褒之賜雜綵六十段并瑞錦等物以彰善政節度使後漢書劉虞為幽州牧就拜大司馬公孫瓉討烏桓詔令授節度魏志十九年權住陸口為諸軍節度晉書將伐吳詔使益州刺史王濬至建平受杜預節度至秣陵受王渾節度唐職官志節度使天寶中緣邉禦戎之地置八節度使受命之日賜之旌節謂之節度使得以專制軍事行則建節符樹六纛外任之重無比焉至德以後天下用兵中原刺史亦循其例受節度使之號節度使一人副使一人行軍司馬一人判官二人掌書記一人參謀無員隨軍四人皆天寶後置檢討未見品秩凡天下節度使有八若諸州在節度內者皆受節度焉其福州經略使登州平海軍則不在節度之內節度名與所管軍鎮名亦見地理志凡親王總戎曰元帥文武官總統者則曰總管以奉使言之則曰節度使有大使副使判官若大使加旌節以統軍置木契以行唐百官志節度使副大使知節度事行軍司馬副使判官支使掌書記推官巡官衙推各一人同節度副使十人館驛巡官四人府院法直官要籍逐要親事各一人隨軍四人節度使封郡王則有奏記一人兼觀察使又有判官支使推官巡官衙推各一人又兼安撫使則有副使判官各一人兼度支營田招討經略使則有副使判官各一人支度使復有遣運判官巡官各一人武德元年因隋舊呼為大總管其年諸州總加號使持節至七年改為大都督貞觀三年以後行軍即稱總管本道即稱都督永徽以後除都督帶使持節即節度使也景雲二年賀拔延嗣除涼州都督充河西節度節度之名始于此至今不改焉節度使掌總軍旅顓誅殺初授具帑抹兵仗詣兵部辭見觀察使亦如之辭日賜雙旌雙節行則建節樹六纛中官祖送一次驛輒上聞入境州縣築節樓迎以鼓角衙仗居前旌幢居中大將鳴珂金鉦鼓角居後州縣齎印迎于道左視事之日設禮案髙尺有二寸方八尺判三案節度使判宰相觀察使判節度使團練使判觀察使三日洗印視其刓闕嵗以八月考其治否銷兵為上考足食為中考邉功為下考觀察使以豐稔為上考省刑為中考辦稅為下考團練使以安民為上考懲姦為中考得情為下考防禦使以無虞為上考清苦為中考政成為下考經略使以計度為上考集事為中考修造為下考罷秩則交廳以節度使印自隨留觀察使營田等印以郎官主之鎖節樓節堂以節院使主之祭奠以時入朝未見不入私第京兆河南牧大都督大都護皆親王遙領兩府之政以尹主之大都督府之政以長史主之大都護之政以副大都護主之副大都護則兼王府長史其後有持節為節度副大使知節度事者正節度也諸王拜節度大使者皆留京師開元四年剡王嗣直除安北大都護充安撫河東關內隴右諸蕃部落大使親王遙領節度自此始也十五年兵部尚書河西節度副大使知節度事蕭嵩除同中書門下平章事節度如故宰相遙領節度自此始也兵志髙宗永徽之後都督帶使持節者始謂之節度使然猶未以名官景雲二年以賀拔延嗣為涼州都督河西節度使自此以後接乎開元朔方隴右河東河西諸鎮皆置節度使五代職官志後唐天成元年十一月詔雄武軍節度銜內宜兼押蕃落使二年詔頃因本朝親王遙領其在鎮者遂云副大使知節度事但年代已深相沿未改今天下侯伯并正節旄惟東西兩川未落副大使字宜令今後只言節度使國朝節度使並兼管內觀察處置等使以本州刺史長史為節度觀察等使不臨本部者以它官知判州府事防禦團練使刺史不赴本任亦如之乾德五年正月朔乾元殿受朝賀置節度使班在龍墀內金吾將軍上故事節度使下帶使者位在卿監之下至是時升之開寶三年以同州節度使趙文度為華州節度使不宣制誥牒與節制同淳化五年皇子益王元傑改封吳王行揚州潤州大都督府長史領淮南鎮江兩軍節度翰林學士張洎上疏以為帶長史非便太宗令俟異日除授并改正之咸平二年十月詔自今親王節度使如授大都督府更不帶長史成德軍兼真定尹永興軍兼京兆尹鳯翔兼鳯翔尹護國軍兼河中尹荆南兼江陵尹劍南西川兼成都尹山南西道兼橋道使興元尹建康軍兼江寧尹以上兼尹天雄軍兼河堤大名尹徐州武寧軍兖州泰寧軍周廣順二年降為防禦州以慕容彥超叛命初平故也國朝改泰寧軍陜州保平軍梁開平二年改鎮國後唐同光元年為保義國朝改保平潞州昭德軍梁龍德三年改正義軍節度以李繼韜歸順故也後唐同光元年復為安義軍長興元年復舊名昭義國朝改為昭德軍揚州淮南兼營田使福州威武軍兼三司發運使以上六州兼大都督長史杭州寧海軍兼堤堰橋道使越州鎮東軍兼堤堰橋道使上二州并兼大都督安州安逺軍後唐同光元年改為安逺軍節度至晉天福五年降為防禦使所管申州割𨽻許州以李金全叛命初平故也漢天福十二年復為安逺軍節度至周顯德元年十月又降為防禦使國朝復舊延州彰武軍洪州鎮南軍鄂州武昌軍夔州寧江軍廣州清海軍夏州定難軍兼押蕃落使以上七州并兼都督青州鎮海軍晉開運元年降防禦州與登州萊淄三州并屬京以楊光逺判命初平故也漢天福十二年復為平盧軍節度國朝改鎮海軍兼押新羅渤海兩蕃使鄆州天平軍兼河堤使曹州彰信軍晉開運二年升為威信軍節度漢天福十二年降為刺史周廣順二年復升彰信軍節度以單州𨽻之國朝因其名密州安化軍陳州鎮安軍晉開運二年升鎮安軍節度漢天福十二年降為刺史周廣順元年升為防禦州二年升為鎮安節度以潁州𨽻之國朝因其名許州忠武軍梁開平元年改正國軍後唐元年十月復改忠武軍國朝因之孟州河陽三城兼河堤使襄州山南東道晉天福七年降為防禦州直屬京所管均房二州割𨽻鄧州以安從進叛命初平故也漢天福十二年復舊為河陽三城節度使國朝因之兼橋道使鄧州武勝軍梁開平三年升為宣化軍節度割泌隨復郢四州𨽻之與襄州分江心為界後唐同光元年改為威勝軍周廣順二年改武勝軍改諱也國朝因之滑州武成軍唐光啓二年改宣義軍節度唐同光元年復為義成軍國朝改武成軍兼河堤使熙寧中廢為郡今復為軍房州保康軍鄭州泰寧軍兼河堤使金州昭化軍晉天福四年升為懷德軍節度天福十二年復降為防禦州國朝又改為昭化軍蔡州淮康軍澶州鎮寧軍晉天福三年初升為防禦𨽻相州移理所於德勝渡九年升為節度號鎮寧軍以濮州𨽻之國朝因之定州定武軍相州彰德軍梁貞明元年魏博節度楊師厚薨乃制相州建節尋軍亂以地歸後唐莊宗復為屬郡𨽻魏州晉天福三年復升為彰德軍節度以澶魏二州𨽻之滄州橫海軍梁乾化二年改為順化軍節度以張萬進歸順故也後唐同光元年復改為橫海軍國朝因之貝州永清軍晉天福三年升為永清軍節度以博冀二州𨽻之周顯德元年降為防禦國朝復舊今降刺史邢州安國軍梁開平二年建為保義節度使割洛恩二州𨽻之後唐同光元年改為安國軍晉州建雄軍梁開平四年升為定昌軍節度以絳泌二州𨽻之後唐同光元年改建雄軍國朝因之撫州永安軍麟州鎮西軍同州定國軍華州鎮潼軍初名感化後唐同光元年改鎮國周顯德元年降為刺史直屬京國朝改為鎮潼軍耀州感德軍梁正明元年改崇州升為靜勝軍節度後唐同光元年改順義軍二年降團練州周顯德二年升為刺史屬京國朝復舊邠州靜難軍國朝兼押藩落使涇州彰化軍兼押藩落使鄜州保大軍秦州雄武軍兼押藩落使廬州保信軍夀州忠信軍後唐天成三年升為忠信軍節度國朝因之亳州集慶軍兼河堤使宣州寧國軍虔州昭信軍後唐長興二年升為昭信軍節度國朝因之蘇州平江軍兼堤堰橋道使潤州鎮江軍兼堤堰橋道使明州奉國軍湖州昭慶軍婺州保寧軍潭州武安軍泉州平海軍建州建寧軍梓州劍南東川舊曰安靜國朝兼營田使遂州武信軍國朝兼橋道使利州寧武軍國朝兼橋道使閬州安德軍後唐天成四年升為保寧軍節度國朝改為安德洋州武康軍黔州武泰軍桂州靜江軍雍州建寧軍舊曰建武容州寧逺軍凡化外諸鎮節度使並兼觀察處置等使應州彰國軍後唐天成元年升為節度以興唐軍為應州以𨽻之國朝因其名豐州天德軍雲州大同軍後唐同光二年復為大同軍節度以應𨽻之國朝因其名靈州朔方軍大都督洮州保順軍後唐長興四年升為保順軍節度國朝因其名沙州歸義軍梁州河西軍兼押藩落使朔州振武軍兼押舊落營田使勝州振武軍以上十州并塞外安北天德軍大都督談苑五代以來節帥牧專多遣親吏往諸道往來販易所過不收算率以致富養馬至千匹僕厮至一千餘人國初大功臣十數人猶襲舊風太祖患之未革其弊大平興國初遂下詔禁之侯伯但給其俸及鹽酒商稅課利分數錢後又罷之定嵗給公用自三萬貫及千貫自此藩鎮量入為用無復嚮之毫侈太平興國初右拾遺李幹上言諸道藩鎮所管支郡多遣親吏掌其市征留滯商賈不便詔邠寧涇原渭鄜坊延丹陜虢襄均房復鄧唐澶濮宋亳鄆濟曹單青淄兖沂貝冀滑衛鎮深趙定祁等支郡並直屬京師不𨽻節鎮元祐官品令節度使從三品節度使為正任春明退朝録外臣除節度使景德以前正舍人院作制楊文公外制集載潘羅支厮鐸督朔方軍節度使制是也其後遂學士院降麻如大禮加恩在將相後數日方下然不鎖院不宣麻近年遂同將相例鎖院告廷矣以本軍東討唐書郭子儀為朔方節度使祿山反詔子儀以本軍東討與河東節度使李光弼率師與賊將史思明戰大敗之于是河北十餘郡皆斬賊守者以迎王師當閫寄李光弼幼持節行善騎射能讀班氏漢書少從戎嚴毅有大略河西節度王忠嗣補為兵馬使邉上稱為名將祿山之亂命郭子儀為朔方節度使攻河西玄宗求良將委以河北河東之事問子儀子儀薦光弼堪當閫寄恩信及戎朔方節度使僕固懷恩誘吐蕃回紇黨項羌山賊任敷等三十餘萬衆入冦京師天子親征以禁軍屯苑內京師震恐急召子儀自河中至屯于涇陽而冦圍之數重子儀率甲騎二千出沒于左右前後冦見而問曰此誰也報曰郭令公也回紇曰令公存乎僕固懷恩曰天可汗已棄四海令公亦謝世中國無主故從其來今令公存可汗存乎報曰今皇帝萬夀無疆回紇皆曰懷恩欺我令公誠存安得見之子儀即以數十騎徐出免胄而勞之回紇皆捨兵下馬齊拜曰果吾父也乃召其首領各飲之酒與之羅錦歡好如初改賜衣物朱克融賊泚之從孫也少嘗為幽州軍校事節度使劉總總將歸朝慮其有變籍軍中素有異志者薦之闕下時克融亦在籍中宰相崔植杜元頴不知兵且無逺略謂兩河無虞遂奏勒歸鎮長慶初幽州軍亂囚其帥張𢎞靖軍中推克融統軍務焉朝廷尋授以符節寶厯二年遣使送方鎮及三軍時服克融怒所賜疏弱執中使以闢上持優容别命中使宣謝仍改賜衣物留其使楊文端等克融後為本州亂軍所殺其子延嗣竊襲父位不遵朝旨虐用其人都知兵馬使李載義殺之數其罪上聞敬宗嘉之拜載義檢校户部尚書封武威郡王幽州盧龍等軍節度副大使爪牙之用不計于逆順楊志誠太和五年為幽州後院副兵馬使事李載義因筵中使擊鞠志誠遂于鞠場呌喚謀亂載義奔易州志誠乃為本道都知兵馬使文宗聞之驚急召宰臣牛僧孺先至上曰幽州之事奈何對曰此不足煩聖慮上曰何也僧孺曰陛下以范陽得失繫國家休戚耶且自安史後范陽非國家所有前時劉總向化以土地歸闕朝廷約用錢八十萬貫而未嘗得范陽尺地斗粟則今日志誠之得猶前日載義之得也陛下因而撫之亦宜也且范陽國家所賴者以其北捍突厥不令南冦今若假志誠節鉞借其土地必自為力耳則爪牙之用固不計于逆順上大喜曰如卿之言朕冼然矣即以志誠為觀察留後收復京師德宗在奉天詔神䇿將季晟赴難晟自定州率師赴關輔詔加檢校工部尚書神䇿行營節度使壁東渭橋以逼朱泚時朔方節度使李懷光亦自何北赴難軍于咸陽不欲晟獨當一靣以分已功乃奏請與晟合兵乃詔晟移軍合懷光軍晟每將戰必自異衣錦裘繡帽前行親自指導懷光望見惡之乃謂晟曰將帥當持重豈宜自表飾以啖賊也晟曰晟久在涇原軍士頗相畏服故欲令其先識以奪其志爾懷光益不悅陰冇異志遷延不進懷光屯咸陽八十餘日不肯出軍德宗憂之屢降中使促以收復之計因朱泚交通其迹漸露晟􅘨為所併合會有中使過晟乃宣令云奉詔徒屯渭橋乃結陳而行去渭橋不數日懷光果劫李建徽楊惠元而併其兵是時朱泚盜據京師懷光圖為反噬河朔僣偽者三李納虎視于河南希烈鴟張於汴鄭晟內無貨財外無轉輸以孤軍而抗劇賊而鋭氣不衰徒以忠義感人心故英豪歸向德宗之幸山南既入駱谷謂渾瑊曰渭橋在賊腹內兵勢懸隔李晟可辦事乎瑊對曰李晟秉義執志臨事不可奪破賊必矣帝意始安時帝幸西川晟上表請駐蹕梁漢以繫億兆之心若規小捨大作都岷峨即人心失望既而移書渾瑊諸將尅期進軍城下乘勝大破賊泚遁去晟勒兵屯于含元殿前號令諸軍告喻百姓居人安堵秋毫無犯晟露布至梁州上覽之感泣羣臣無不隕涕囚上夀稱萬嵗奏曰自古樹勳勞復都邑者往往有之至于不驚宗廟不易市肆長安人不識旗鼓安堵如初自三代以來未之有也上曰天生李晟為社稷萬人非為朕也五日不通家信神䇿軍家族多陷于朱泚李晟家亦百口在賊中左右或有言及家者晟因泣下曰乘輿何在而敢恤家乎入京城號令諸軍曰晟與公等各有家離别數年今已成功相見未晚五日內不得輒通家信違命者斬倚朔方軍為根本肅宗南趣關輔至彭原郡宰相房琯請兵討賊為賊所敗時方事討除軍士半殪唯倚郭子儀朔方軍為根本平河中德宗還京詔太原節度使馬燧與渾瑊等同討河中時天下蝗旱京師言事者多請捨懷光上意未決燧以懷光逆節尤甚河中密邇京邑反覆不可保信燧乃捨軍以數百騎朝于京師召見曰臣雖不武得芻糧一月足以平河中上許之時懷光將徐庭光守長春宫燧挺身直至城下呼庭光諭之令降且曰爾以吾言為不誠乎今相去不逺數步爾當射我心披襟示之庭光感泣遂出降燧以數騎徑入城處之不疑莫不畏服渾瑊私謂參佐曰豫嘗謂馬公用兵與豫不相逺但驚怪纍敗田悅今觀其行兵料敵吾不逮逺矣燧率諸軍濟河兵八萬陳于城下是曰賊將牛居俊斬懷光首以城降燧自京師還行營凡二十七日而河中平詔書褒美上表請入覲朱泚為幽州節度使自天寶末諸鎮逆亂泚率先上表請入覲詔修甲第以待之至京又表請留從之巡撫諸軍士皆賈勇吳少誠幽州人為申光蔡州節度使善為治勤儉無私曰完聚不奉朝令貞元三年詔削奪少誠官爵分遣十六道兵馬進討而王師纍挫潰少誠引兵退蔡州遂下詔洗雪復其官爵吳少陽者本滄州人與少誠父朔相善及少誠知淮西留後乃以堂弟署為軍職及少誠死少陽密害其子自為留後少陽據蔡州凡五年不朝覲及卒少陽長子元濟主兵陰計既成乃屠舞陽焚葉縣掠黃山襄城汝許人多逃山谷殺傷驅剽者千餘里關東大恐詔削元濟官爵加兵進討聚兵淮右四年度支供給不逮諸將玩冦詔進裴度門下侍郎同中書門下平章事蔡州刺史充彰義軍節度使淮右用兵之事一以委之度至堰城巡撫諸軍士皆賈勇唐鄧節度使李訴襲破懸瓠城擒吳元濟度建彰義軍節繼進李訴具櫜鞬以軍禮迎度拜之軍右度既視事蔡人大悅入蔡州取吳元濟李訴西平郡王贈太師晟之子也有籌略善騎射元和十一年用兵討吳元濟訴請軍前自效授唐鄧節度使嘗獲賊將丁士良召入與語辭氣不撓訴異之因釋縛立為捉生將士良感之曰賊將吳秀琳不可遽破者用陳光治之謀也士良能擒光治以致秀琳訴許之果擒光治而降秀琳又署秀琳為衙將秀琳感恩謂訴曰若欲破賊須得李祐訴命其將田進誠以騎三百擒祐而還官軍嘗苦祐皆請殺之訴不聽解縳而客禮之署為散兵馬使令佩刀巡警出入帳中略無猜間又改為六院兵馬使舊軍令有舍賊諜者屠其家訴除其令因使厚之諜者反以情告訴訴益知賊中虛實陳許節度使李光顔勇冠諸軍賊悉以精卒抗光顔由是訴乘其無備遂襲蔡使告期于裴度夜以李祐率訴自將中軍田進誠以後軍三千殿而行時陰晦而雪大風裂旗斾士卒苦寒諸將請所之訴曰入蔡州取吳元濟也諸將失色監軍使哭而言曰果落李祐計中訴不聽促令進軍比至懸瓠城夜半雪愈甚賊恃其房朗山之固晏然無一人知之李祐李中義坎墉而先登敢鋭者從之盡殺守門卒而發其門留擊柝者黎明雪亦止訴入止元濟外宅蔡吏告元濟曰城已陷矣田進誠焚于城南門元濟城上請罪進誠梯而下之檻送京師父子皆建大勳李晟克復京師市不改肆及訴平淮蔡復踵其美父子仍建大勳兄弟藉父勳寵率以僕馬第宅相髙惟訴六遷大鎮所處先人舊宅一院而已六遷大鎮上門立戟李晟立大勳諸子猶無官宰相奏德宗即日召晟子願授銀青光祿大夫太子賔客上柱國舊制勳至上柱國賜門立戟即令賜願乃與父並列棨戟於門斬朱泚使韋臯為營田判官權知隴州留後事來泚既僣遂令家僮蘇玉使于臯又遣劉海賔授臯鳯翔節度使臯俱斬以徇于是詔臯為御史大夫隴州刺史置奉義軍節度使以旌之通南詔破吐蕃韋臯拜劍南西川節度使初雲南蠻吐蕃和好蕃人入冦必以蠻為前鋒臯遣判官崔佑時入南詔説令向化南蠻自嶲州陷沒臣屬吐蕃絶朝貢者二十年至是復通臯又遣將大破吐蕃數年之內終復嶲州又招撫西山羌等八國酋長入貢闕庭以功加統押近界諸蠻西山八國兼雲南安撫使然在蜀二十一年重賦斂時論非之方鎮以大忠大勳帶宰相河中節度使王鍔來朝貴幸多譽鍔者上將加平章事于是宰相權德輿奏曰夫平章事者非序進而得國朝方鎮帶宰相者蓋有大忠大勳大厯已來又有跋扈難制者不得已而與之今王鍔無大忠勳又非姑息之時欲假此名實恐不可上從之二鄭僖宗時黃巢犯長安河東節度使鄭從讜遣朱岐率兵赴難時鄭畋以宰相鎮鳳翔與從讜宗人同年登進士第畋亦舉兵遏賊由是國威復振以宰相鎮鳳翔上五盜朱滔田悅王武俊三盜既相推奬王號又遣使于李納納稱齊王四盜共推淮西李希烈為天下兵馬元帥太尉建興王皆偽署官號如國初行臺之制五盜合從圖傾社稷兩河鼎沸冦盜橫行馬燧等雖志在勤王意莫能驅􅜙患難俄而涇師犯關帝幸奉天遂引軍還太原不取公厨烏梅懿宗朝宰相蕭倣纍至司空𢎞文館大學士時盜起河南內官握兵王室濁亂倣氣徑論直同列忌之罷知政事出為廣州刺史嶺南節度使倣惟公廉南海雖富珍竒月俸之外不入門家人疾病醫工治藥須烏梅左右于公厨取之倣知而命還之買于市父子鎮淮南李德裕父吉甫年五十一出鎮淮南五十四復相及德裕鎮淮南復入相一如父之年也就第賜旌節至德以來除授必遣中使領旌節就第賜之皆厚以金帛遺之求媚者惟恐其數不廣故王人一來有獲錢數百萬者鄭餘慶每受方任天子必誡其使曰餘慶家貧不得妄有求取也政出監軍憲宗時楊於陵為嶺南節度使與監軍許遂振不和遂振誣奏憲宗令追與漫官宰相裴垍曰以遂振故罪一藩不可請授吏部侍郎嚴綬在太原其政事一出監軍李輔光綬但拱手而已垍具奏其事請以李鄘代之臨江大閲互相䀻賚韓滉自蘇州刺史為浙江東西都團練觀察使潤州刺史鎮海軍節度使滉安輯百姓境內稱理涇師之亂德宗出幸河汴騷然李希烈既陷汴州滉乃遣禆將李長榮等與宣武滉軍節度劉玄佐為犄角計襲解寧陵之圍復河汴之路功居多然自關中多難滉即于所部閉關梁築石頭五城自京口至五山禁馬牛出境造樓船戰艦三十餘艘以舟師五千人由海門楊威武至申浦而還毁撒上元縣佛寺道觀四十餘所修塢起建業抵京峴樓雉相屬以佛殿材于石頭城繕置館第數十時滉以國家多難恐有永嘉渡江之事豫備以迎鑾亦申警自守也時陳少遊鎮揚州以甲士三千臨江大閲滉亦以兵三千人臨金山與少遊相應樓船于江中以金銀繒綵互相聘賚而自德宗出居及歸京師軍用既繁道路又阻關中飢饉加之災蝗江南兩浙轉輸粟帛府無虛月朝廷獲賴焉知祿山有叛相張九齡為相范陽節度使張守圭以禆將安祿山討奚契丹敗衄執送京師請行朝典九齡奏劾不宜免死上特捨之九齡奏曰祿山狼子野心面有叛相臣請因罪戮之冀絶後患上曰卿勿以王夷甫知石勒故事誤害忠良遂放歸藩後九齡死上皇在蜀思九齡之先覺詔褒贈有先覺合于蓍䇿之言先覺合於蓍䇿上稱兵入朝不由奏請昭宗乾寧二年河中節度使王重榮卒三軍立重榮子珂知留後事太原節度使李克用亦上言重榮有功于國其子珂宜賜節鉞邠州王行瑜鳯翔李茂貞華州韓建各上言王珂螟蛉不宜綴襲請以王珙為河中嗣子昭宗為先允克用之奏久之不下于是李茂貞王行瑜韓建等各率精甲數十人入覲京師大恐人皆亡竄昭宗臨軒自諭之曰卿等藩侯宜存臣節稱兵入朝不由奏請意在何也茂貞行瑜汗流浹背不能對惟韓建敘入覲之由上并召升樓賜之巵酒宴之于大同殿茂貞行瑜極言南北司相傾深蠧時政請誅其太甚者乃貶宰相韋昭度李溪尋殺之于都亭驛及殺內官數人而去時三帥同謀廢昭宗立吉王聞太原起軍遂留兵宿衛而還諸盜所有之地自大厯中李正已有淄青十五州之地李寶臣有定易七州之地田承嗣有魏博七州之地梁崇義有襄鄧六州之地各聚兵數萬始因叛亂得位雖朝廷寵待加恩心猶疑二乃連衡盤結以自固如朝廷增一城浚一池便飛語有辭而諸盜完城繕甲略無寧日懷恩不反為左右所誤懷恩鐵勒部落僕骨歌濫枝延之曾孫語訛謂之僕固貞觀中鐵勒九姓首領來降歌濫枝延授右武衛大將軍金微都督以禦邉懷恩世襲都督善格鬬逹諸蕃情有統御材祿山反從郭子儀討賊其功居多又從子儀赴靈武行在自是纍破賊收兩京皆立殊功進封太寧郡王朔方行營節度使懷恩為人雄毅寡言而剛決犯上始居偏裨之中意有不合雖主將必詬怒之子儀每事優容行師用兵倚以輯事代宗即位中官劉清潭請兵于回紇登里可汗登里已為史朝義誘傾國入塞先肅宗以公主下嫁毗伽闕可汗可汗又以少子請婚肅宗以懷恩女妻之其可汗請與懷恩及母相見詔從之令相見于太原可汗大悅遂許助討朝義朝義既死詔懷恩統可汗還蕃出太原之北懷恩初至太原辛雲京以可汗是其子壻疑其召戎閉關不納且告􅘨可汗相襲不敢犒軍及還亦如之懷恩父子宣力王室一舉滅史朝義復燕趙韓魏之地功無與讓又為辛雲京所拒懷恩怒上表列其狀頓軍汾水會中使駱奉仙使雲京言懷恩與可汗為約逆狀已露乃與奉仙厚相詰歡奉仙回至懷恩所母讓奉仙曰爾等與我兒約為兄弟今又親雲京何兩靣乎雖然前事勿論自今母子兄弟如初酒醉懷恩起舞奉仙贈纒頭綵懷恩將酬其貺奉仙遂告發懷恩曰明日端午請宿為令節奉仙固辭懷恩苦邀之命藏其馬奉仙中夕謂其從者曰向者責吾又收吾馬是將害我也遂踰垣而走懷恩驚遽令追還其馬奉仙回奏其反狀懷恩遂有二于我懷恩以冦難來一門之內死王事者四十六人女嫁絶城再收兩京皆導引回紇摧滅強敵而為人媒蘖蕃姓獷戾怏怏不已乃上書自敘功伐且云回邪在側不敢入朝上令黃門侍郎裴遵度使汾州喻旨且察其去就懷恩抱遵度足號泣而請遵度因諷令入朝懷恩許諾其副將范志誠説之不可又許令一子入朝志誠亦不可遵度復命懷恩令子瑒率衆攻雲京瑒大敗而旋上遣郭子儀代之喻以逆順子儀至河中僕固瑒已為張如嶽斬之獻首闕下懷恩聞之率麾下數百騎棄母渡河北走靈武餘衆束甲歸子儀懷恩至靈武亡命衆復振至秋誘吐蕃十萬人冦涇邠子儀拒之而退永泰中紏合諸蕃號二十萬南犯京師大駭下詔親征懷恩至鳴沙縣遇疾舁歸死于靈武自懷恩逆命三年上為隱惡下制未嘗言反狀懷恩死上為之憫然曰懷恩不反為左右所誤也奄有襄漢七州之地梁崇義長安人有膂力為羽林射生從來瑱于襄陽瑱朝京師被誅衆推崇義為帥朝廷因授以節鉞以襄州為洊履兵禍屈法含容遂與田承嗣李正已李寶臣為輔車之勢奄有襄漢七州之地帶甲二萬連結根固未嘗朝覲淮西節度李希烈數請興討朝廷仗信以來之加平章事賜鐵劵誓以手詔微之不至乃徵四方兵使希烈統而擊之崇義拒戰而敗降其二將希烈使統本兵入襄號令以安百姓崇義領親兵閉壁將守者斬關而出不可止崇義與妻投井而死募兵千人赴蜀李絳為興元尹山南西道節度使時南蠻冦西蜀詔徵兵赴援絳于本道募兵千人赴蜀及中路蠻軍已退所募皆還興元兵額數定募卒悉合罷歸監軍使楊叔元怨絳不奉已因募卒來辭以言激之乃譟聚趣府劫庫兵入使銜降方與賔僚宴不及設備聞亂北走登陴牙將王景延力戰不能禦絳遂為亂軍所害從事趙從約薛齊俱死斬亂者首祭李絳李絳既為亂軍所害文宗授溫造興元尹山南西道節度使造下車置宴所司供帳于廳事造曰此隘狹不足以饗士卒移之牙門坐定牙兵圍之賊千餘人皆斬首于地流血四注其親刃絳者斬一百段餘並斬者內一百首祭李絳三十首祭王景延等餘投尸於江債帥太和初忠武軍節度使王沛卒物議以陳許軍四征有功必自擇帥或以禁軍之將得之宰相裴度韋處厚議以高瑀深況方雅曽剌史陳蔡人懷良政又熟忠武軍情欲請用瑀事未及聞陳許表果至請瑀為帥自大厯以來節制之除拜多出禁軍中尉凡命一帥必廣輸重賂禁軍將校當為帥者自無家財必取資于人得鎮之後則膏血疲民以償之及瑀之拜以內外公議搢紳相慶曰韋公作相債帥鮮矣誅舞文吏栁公綽為山南東道節度使贓行部至鄧縣有二吏犯法一絹一舞文縣令以公綽守法必殺賊吏獄具公綽判之曰賊吏犯法法在姦吏壞法法亡誅舞文者以戎服見牛僧孺栁公綽使山南時牛僧孺罷相鎮江夏公綽具戎服于郵舍待之軍吏以漢上地髙于鄂禮太過公綽曰竒章才離台席方鎮重宰相是尊朝廷也竟以戎容見之父子僣逆安祿山胡人也為范陽節度使玄宗寵之祿山請為貴妃養子晚年益肥壯垂手過膝玄宗前作胡旋舞疾如風焉楊國忠屢奏必反而上益親厚之及歸疾行出關倍道而至范陽人或言其必反玄宗皆怒縛送與之玄宗再召託病不至遂反于范陽矯詔以兵討楊國忠時天下承平日久人不知戰朝廷震驚禁衛皆市商洛陽既陷祿山僣號潼關不守玄宗幸蜀祿山造逆之後眼漸暗至不見物尤躁急動用斧鉞嚴莊者祿山之謀主亦被捶撻莊夜將刀領豎子李豬兒同入祿山帳內令豬兒以大刀刺其腹祿山眼無所見但撼帳幄大呼曰是家賊也腸數斗流床下言訖氣絶嚴莊宣言祿山傳位于晉王慶緒導祿山為太上皇繼而郭子儀敗賊于陜西曲沃慶緒奔河北嚴莊來歸順肅宗遣子儀等九節度率步騎二十萬攻之子儀固圍自十月至二月慶緒城中人相食者七萬餘人鼠一頭直數千慶緒求救于史思明言禪讓之事思明引兵至與子儀戰我師敗解圍而去思明營于鄴南慶緒收子儀等營中糧得六七萬石與諸將謀欲拒思明諸將曰今日安可背史王乎時思明已偽稱燕王俄聞之誘慶緒至軍責之曰爾為人子殺爾父以求其位吾為太上皇討賊即牽出并其四弟皆􅀈殺之祿山父子僣逆三年而滅史思明與祿山同鄉里相校一日而生思明除日祿山嵗旦及長相善俱以驍勇聞與祿山同為互市郎事張守圭頻立戰功祿山奏為平盧軍都知兵馬使祿山反命思明討饒陽等諸郡陷之祿山死慶緒令歸范陽始祿山陷兩京常以駝運兩京御府珍寶于范陽不知紀極由是資其逆謀判官耿仁智忠諒之士勸思明歸順遂奉表以所管兵八萬人來降肅宗大悅封歸義王范陽長史河北節度使朝義以下並為列卿後肅宗使烏承恩為副使候伺其隟承恩從京來宣恩命思明留承恩且在館中令愇其所寢牀伏二人于下承恩有小男先留范陽思明令省其父夜後私于其子曰吾受命除此逆胡便授吾節度使矣牀下二人呌呼出以告思明令執承恩搜其衣囊得朝廷所與郡史那承慶鐵劵及李光弼與承恩牒云承慶事了即付鐵劵思明集將吏百姓向西大哭曰臣以十三州之地十萬衆之兵降國家赤心不負陛下何至殺臣因榜殺承恩父子又于魏州殺安慶緒并有其衆遂僭稱大號思明軍益振遂再陷洛陽李光弼相拒于邙山下官軍不利思明至陜州為官軍所拒追歸永寧築三角城約一日內畢朝義築城畢未泥思明至詬之曰汝惜部下兵違我處分待收陜州斬却此賊朝義恐遂與其將駱悅等謀殺思明而朝義僣偽位朝義思明之孽子也與官軍戰于邙山下敗績走河北偽范陽節度李懷仙生擒來獻梟首闕下刺史失職烏重胤為鎮海軍節度使既至鎮上言曰臣以河朔能拒朝命者蓋刺史失其職反使鎮將領兵事若刺史各得職分又有鎮兵則節將雖有祿山思明之姦豈能據一州為叛哉所以河朔六十年能拒朝命者只以奪刺史縣令權職自作威福故臣所管德棣景三州已舉公牒各還刺史職事訖應在州兵并令刺史收管詔從之由是法制修立各歸名分進錢李正已畏􅘨德宗威德乃表獻錢三十萬貫上欲納其奏慮正已末可誠信欲以計逗遛止之未有其辭延問宰相崔祐甫對曰正已姦詐誠知聖慮臣請因使往淄青便令宣慰將士以正已所獻錢賚軍人使荷聖德又令外藩皆知朝廷不重財貨上悅從之正已大慙而心畏服焉古之良將無加烏重胤為河陽節度使淮西吳元濟軍人李端者過激水來降其妻為賊束縛于樹臠肉食至死呌謂其夫曰善事烏僕射觀者義之重胤自行問為將帥赤心奉上能與下同甘苦所至周密曲盡禮敬故當時名士咸願依焉長慶三年再領天平及病牙將王贄饋以股肉殁後數日有軍士二十餘人皆割股肉祭之古之良將無加也肩輿于三軍之中張𢎞靖宰相延賞之子嘉貞之孫憲宗時自宰相出太原節度使遷宣武節度使俄以劉總纍求歸闕且請𢎞靖代已授幽州盧龍節度使𢎞靖入幽州薊人皆夾道觀之河朔軍帥冒寒暑多與士卒同無張蓋安輿之别𢎞靖久富貴入燕之時肩輿于三軍之中薊人頗駭之𢎞靖以祿山思明之亂始自幽州欲于事初盡革其俗乃發祿山墓毁其棺柩人尤失望從事有韋雍張宗厚數輩復輕肆嗜酒常夜飲醉歸燭火滿街前後呵叱薊人所不習之事又雍等語責吏卒多以反虜名之謂軍士曰今天下無事汝輩挽得兩石弓者不如識得一丁字軍中深恨之劉總歸朝以錢一百萬貫賜軍士𢎞靖留二十萬貫充軍府雜用薊人不勝其憤遂相率以叛囚𢎞靖于薊門館執韋雍張宗厚數人皆殺之明日吏卒稍稍自悔悉詣館𢎞𢎞靖為帥𢎞靖不對軍人乃謂曰相公無言是不赦吾曹矣軍中豈可一日無帥遂取朱洄為兵馬留後洄自以老病推其子克融統軍務朝廷乃除克融為幽州節度使貶𢎞靖為撫州刺史濕稍李希烈叛攻陷汴州節度使李勉潛師潰圍南奔宋州希烈性慘毒其攻汴州驅百姓令運土木築壘塹猶怒其未就乃驅以填之謂之濕稍既入汴州于是僣號曰楚年曰武成立宰相署百官以汴州為大梁府既而諸軍進討希烈遁歸蔡因食牛肉遇疾其將陳仙竒令醫人置藥毒而死妻子兄弟共七十餘人並誅之田承嗣屈膝于郭子儀承嗣方跋扈魏州傲狠無禮郭子儀嘗遣使去承嗣西望拜之指膝謂使者曰兹膝不屈于人若干嵗矣今日為公拜李靈曜據十州公私財賦一皆遏絶獨子儀封幣經其境莫收留之必持兵衛送其為材能所服如此佩四將印王忠嗣天寶中為河西右節度使尋又權知朔方河東節度使佩四將印專控萬里國初以乖未之有不聽樂飲酒段秀實拜涇原鄭州節度使三四年間吐蕃不敢犯塞清約率易逺近稱之非公會不聽樂飲酒私室無妓媵無贏財退公之後端若靖慮而已劈木契分授之李巨玄宗時祿山陷東京授河南節度使巨奏曰方今艱難恐為賊所詐如忽召臣不知何以取信兼宗劈木契分授之遂以巨為統嶺南節度使一弓一箭必書其名王忠嗣居節將以持重安邉為務每軍出即各召本將付其兵器令給士卒雖一弓一箭必書其名姓于上以記之軍罷即納若遺失即驗其名罪故人人自勸甲伏充牣華蠻詣闕請立生祠盧釣字子和開成元年為廣州刺史嶺南節度使南海有蠻舶之利珍貨輻湊舊帥作法興利以致富凡為南海者靡不捆載而還鈞性仁恕為政亷潔請監軍領市舶使已一不干預衣冠得罪流放嶺表而物故者鈞減俸錢為營槥櫝孤兒稚女為之婚嫁凡數百家由是山越之俗服其德義三年將代華蠻數千人詣闕請立生祠焉亡馬李願晟之子元和元年夏綏銀宥等州節度使威令簡肅甚得綏懷之術客有亡馬者以狀告願願以狀榜于路懸金以購之不三日所繫之榜下仍置書一緘曰馬逸失羣不時告罪當死敢以良馬一匹贖罪并亡馬請納于願付客亡馬而縱其良馬境內嚴肅帥臣鑿凶門而出李聽為邠寧節度使邠州衙􅈦相傳不利葺修以致隳聽曰帥臣鑿凶門而出豈有拘于巫祝而致隳公署耶遽命葺之卒無變異軍中有折旅店之匕箸者斬之髙崇文憲宗元和初為右神策行營節度使統諸鎮兵討西川劉闢至興元軍中有折旅店之匕箸者斬以徇初闢擒東川節度使李康及崇文克棣州而歸康求雪已罪崇文以康戰軍失守遂斬之八戰皆捷髙崇文為長武城使乖貞元年冬劉闢阻兵朝議討伐宰相杜黃裳以為獨任崇文可以成功元和元年春充左神䇿行營節度使以討闢時宿將專征者甚衆人人自謂當選及詔出大驚崇文在長武城練卒五千常若冦至及是中使至長武卯時宣命而辰時出師五千器用無闕者八戰皆捷出俸錢贖賣子朱忠亮本名士明憲宗即位加御史大夫築臨涇城有勞特加檢校工部尚書涇原四鎮節度使涇土舊俗多賣子忠亮以俸錢贖而還其親者約二百人卒贈僕射造烏蘭橋王似元和中靈鹽節度使先是吐蕃欲成烏蘭橋先貯材于河堧朔方節度使常潛委材河流終莫能成蕃人知似貪而無謀先厚遺之後併役成橋築月城以守自是朔方禦冦不暇至今為恨焚匿名書王鍔字昆吾代杜佑充淮南副節度使鍔明習簿領善小數以持下吏嘗聽理有遺匿名書于前者左右取以投鍔鍔內之鞾中鞾中先有它書以雜之及吏退鍔探取它書焚之人信其匿名書亦焚也既歸省所告異日以它微事連其所告者禁窮按驗之以譎衆下吏以為神明賜古器牛僧孺為襄州刺史山南東道節度使辭日賜觚散樽杓等金銀古器令中使喻之曰以卿正人也身率軍士與同勞逸李元諒德宗時加隴右節度度支營田觀察臨洮軍等使移鎮良原古城多摧圮隴東要地敵入冦常牧馬休兵于此元諒逺烽候培城補堞身率軍士與同勞逸芟林剃草斬荆榛俟乾盡焚之方數十里皆為美田勸軍士樹藝嵗收菽粟數十萬斛生殖之業陶冶必備敵無冦掠涇隴乂寧父子俱擁節旄田布𢎞正第三子𢎞正移鎮成德軍以布為河陽三城節度使父子俱擁節旄同日拜命時韓𢎞亦與子公武俱為節度使然以忠勤多田氏未嘗問百姓間事郭英乂為劍南節度使顔恣狂蕩聚女人騎驢擊毬制鈿驢鞍及諸服用皆侈靡裝飾日費數萬以為笑樂未嘗問百姓間事顔怨之兵馬使崔旰因人心為亂殺英乂烏集為候栁仲郢為太平軍節度使卒于鎮自拜諫議後每遷官羣烏大集于升平里第庭樹戟架皆滿凡五日而散詔下家人以為候除太平烏不集好方士李抱真德宗貞元中為昭義軍節度使晚節好方士以求長生有孫季長者為抱真鍊金丹紿抱真曰服之當升仙遂署為賔僚數謂恭佐曰此丹秦皇漢武皆不能得惟我遇之他年朝上清不復偶公輩矣復夢駕鶴沖天寤而刻木鶴衣道士衣以習乘之凡服丹二萬丸腹堅不食將死不知人者數日矣道士牛洞玄以豬肪穀漆下之殆盡病少季長復曰垂上仙何自棄也益服三千餘丸頃之卒牙軍廢置主帥五代羅紹威魏州人襲父𢎞信旄鉞昭宗時進封鄴王至德中田承嗣盜據相魏澶博衛貝等六州募軍中子弟置之部下號曰牙軍皆豐給厚賜不勝驕寵年代寖逺父子相襲親黨膠固其凶戾者強賈豪奪踰法犯令長吏不能禁變易主帥有同兒戲自田氏以後垂二百年主帥廢置出于其手紹威懲其往弊雖以貨賂姑息之心銜之紹威見唐祚哀陵羣雄交亂梁太祖兵強天下必有禪代之志故傾心附結每慮牙軍變易心不自安乃遣使告梁太祖求為援梁太祖許之遣李思安會魏博軍再冦滄州先是安陽公主薨于魏太祖因之遣長直軍校馬嗣勳選兵千人實兵仗于巨槖中肩舁以入魏州言助汝葬事天祐三年正月五日梁太祖親率大軍濟河聲言視行營于滄景牙軍頗疑其事是月十日夜紹威率兵馬與嗣勳同攻之時宿于牙城千餘人遲明盡誅凡八千家皆赤其族紹威雖除其禍然尋有自弱之悔聚書萬卷紹威鎮魏十七年薨紹威形貌魁偉有英傑氣伏膺儒術明達吏理好招延文士聚書萬卷每宴會與賔佐賦詩江東羅隱者佐錢鏐軍幕有詩名紹威遣使賂之敘南巷之敬東西川皆有雄據意後唐天成中詔曰頃因本朝親王遙領方鎮遂有副大使知節度事年深相沿未改其東西令後落副大使只云節度使時孟知祥為西川董璋為東川皆有雄據之意置私廟哀帝三年勑魏博節度使羅紹威宜許于本鎮置三代私廟劫陵溫韜少為羣盜背李茂貞歸于梁歷耀許州節度使在耀七年唐帝諸陵發掘殆遍取其金寶惟乾陵以風雨屢作終不能發莊宗時韜自許州入魏覲後賫金帛賂遺權重及納賄中宫獲免得歸藩頃之授代歸闕久留京師親黨或憂其闕乏其子揚言日使一祼體黃漢足了一年之費蓋謂劫陵得金偶人佛子張筠初仕後唐為永興軍節度使性好施每出值貧民于路則給以口食衣物境內除省賦之外未嘗聚斂遂致百姓不撓十年小康秦民懷惠呼為佛子後權領河南尹俄鎮興元所治之地咸用前政上下安之獲蝗一斗給祿粟一斗五代趙瑩為晉昌軍節度使時天下大蝗境內捕蝗者獲一斗給祿粟一斗使飢者獲濟逺近嘉之名振北狄安重誨為成德軍節度使嘗與北來蕃使並轡而行指飛鳥射之應弦而落觀者萬衆無不快抃蕃使因輟所乘馬以慶之由是名振北狄自謂天下可以一箭而定天下可一箭定上佞佛周宋彥筠初仕晉為同州節度使溺于釋氏後為邠州節度使嘗謂人曰吾前後供僧一千餘萬造佛室九十餘所又嘗召僧讀畢生經日課若干卷至瞑目乃已令不負所課如嬰疾不能開讀隨即填補立劵設呪每曽給二十緡僧至者甚衆乃減緡一半未幾止給三嵗緡其無行貪猥之僧利其緡投劵者填咽彥筠患之乃止初彥筠一旦與其主母有微忿遂擊殺之自後常冇所睹彥筠心不安乃修浮圗法以禳之因而溺志于釋氏其後每嵗至佛入涅槃之日常衣斬哀號慟于像前其侫佛如此家有婢妾數十人皆令削髮披緇以侍左右為當時所誚旄節有聲王峻相州人其父為本郡樂營使峻善歌歷事張筠趙巖張延朗皆以善歌親愛及延朗誅資産盡入漢祖峻在籍中漢祖踐阼授客省使隱帝時周太祖鎮鄴峻為監軍太祖赴闕綢繆幃幄贊成大事既而踐樞相之位貪權恃寵無禮于君太祖以佐軍之故每優容之無何邀求兼鎮青州太祖不得已而授之既而貶商州司馬死于貶所初峻降制除青州有司造旄節以備迎授前一夕其旄節有聲甚異聞者駭之主者曰昔安重誨授河中節亦有此異聲一時良將九國志吳柴再用纍歷藩鎮敦尚素儉車馬導從不過十人亦一時之良將也取與有節南唐姚景鍾為夀春節度使夀春大郡每節使上供億甚厚廳事階間置大匱數具納金曰滿其中輒易之及景鍾至命去匱取與皆有節郡人便之去金匱上邉和尚邉鎬柔儒好釋氏初從查文徽平建州凡所克獲唯以全活為務建人德之號曰邉佛子及克定長沙市不易肆潭人益喜謂之邉菩薩及鎮湖南政出多門絶無威斷楚人失望謂之邉和尚貪冒財貨前蜀王宗裕為武德軍節度使貪冒財貨以白金百兩作鋌鐫記年月每五鋌為一束以生牛革裹之其子諫曰牛革著物堅確後難可開宗裕叱之曰何更開也自監擁護節旄後蜀李奉虔遷右金吾衛大將軍為昭武軍都監屬夏秋多雨嘉陵江溢出浸城奉虔置堰開湍二十餘處泄其畜水築堤以護之城池克完人被其利授昭武軍節度自監擁護節旄自奉虔始人皆榮之納禮錢國朝建隆三年詔見宰相門節度軍州有三印大中祥符九年上覽河南節度使知許州石普奏狀用許州觀察印以問宰相王旦對曰節度軍州有三印節度印隨本使用則納有司觀察印則州長史主之州印晝則付録事恭軍掌用暮則納于長史凡節度在本鎮兵仗則節度判官掌書記推官署狀用節度印田職則觀察判官犬使推官署狀用觀察印符刺屬縣則大使判署用州印印之故命帥必曰某軍節度某州管內觀察等使某州刺史言軍則專制其兵旅言管內則總察其風俗言刺史則蒞其州事石普獨署奏章當用河南節度使印願世世奉藩退朝録尚父錢忠懿王自太祖開國貢獻不絶帝以其恭順待之甚厚及討江南命為升州東南面行營招撫制置使屢獻戎捷及拔常州拜守太師依尚書令兼中書令吳越國王乂親赴行營帝益加之詔令歸國江南平亟請入覲許之既至會太祖幸洛陽禋郊西駕有日矣詔促其還忠懿臨别面敘感戀願子孫世世奉藩太祖謂曰盡吾一生盡汝一生令汝享有二浙也忠懿以帝賜重約既得歸喜甚以為永保其國矣是嵗永昌鼎成後二年來朝遂舉版籍王府焉兄弟同領鎮五代符彥卿晉天福初授同州節度使兄彥饒亦鎮滑臺兄弟同領鎮人皆榮之節度觀察留後唐節度有留後長慶四年留後改為知院官從王涯請也寶厯初復為留後大中十一年成德軍節度使王紹鼎卒以御史中丞王紹懿為成德軍節度留後留後之名自此始也國朝大中祥符六年景德殿使新州觀察使劉承規為安逺軍節度觀察留後任兩使留後非致仕之官以承規逮事三朝有勤效特以授之元祐官品令節度觀察留後正四品節度觀察留後至刺史兼領他官為遙郡觀察使唐職官志觀察使副使支使掌諸書記推官巡官衙推隨軍要籍進奏官各一人貞觀初遣大使十三人省天下諸州水旱則遣使有巡察安撫之名神龍三年以五品以上二十人為十道巡察使舉州縣再周而代景雲三年置十道按察使道各一人開元二年曰十道按察採訪處置使二十年曰採訪處置使分十五道天寶末又兼黜陟使乾元元年改曰觀察處置使唐百官志觀察置使掌察所部善惡舉大綱凡奏請皆屬于州國朝凡諸衛將軍及使遙領者其資品並止復本官敘防禦團練使刺史亦同大中祥符七年詔觀察使並帶刺史元祐官品令觀察使正五品自節度觀察留後至刺史兼領它官者為遙郡不以戎服謁唐故事刺史始見觀察使皆戎服趨庭致禮令狐峘為吉州刺史齊映亷察江西行部過吉州映雖曽為宰相然驟達後進峘自恃前輩有以遇映不欲以戎服謁入告其妻韋氏恥抹首趨庭謂峘曰卿何如人白頭走小生前卿如不以此禮見映雖黜死我亦無恨峘曰諾即以客禮謁之映雖不言深以為憾映至州奏峘糾前政過失鞫之無狀不宜按部臨人蘭亭絶唱元稹為浙東觀察使會稽佳山水稹所辟幕職官皆當時文士而鏡湖秦望之遊月三四焉副使竇鞏海內詩名與稹酬唱最多至今稱蘭亭絶唱除淫祠李德裕為浙西觀察使凡舊俗之害民者悉革其弊除淫祠一千一十所罷進繚綾德裕在浙西詔進長幅盤條繚綾一千匹德裕奏論之云凡諸天馬繚綾盤條文采珍竒只為聖躬自服今織千匹費用頗多在臣愚誠所未喻優詔報之罷進奏罷泗州戒壇徐州節度使王智興聚貨無厭以敬宗誕月于泗州置僧壇度人凡髮夫到者人納二緡給䐑而回落髮者無算人意在于規庇徭産浙西觀察使李德裕令蒜山渡數其過者日百餘人惟十四舊沙彌餘悉蘇常之民德裕並勒還本貫奏云若不禁止至誕節則江淮南計失六萬丁壯即日詔罷獻丹扆針敬宗荒僻日甚遊幸無度疏逺賢能昵比羣小朝坐月不二三大臣罕得進言海內憂危浙西觀察使李德裕身居亷鎮乃心王室遣使獻丹扆針六首宵衣諷坐朝希晚也正服諷御服乖異也罷獻諷斂求怪珍也納誨諷侮棄忠言也辨邪諷信任羣小也防微諷輕出遊幸也帝雖不能盡用其言命學士韋處厚殷勤答詔頗嘉納其心焉以所蒞之郡租賦自給裴垍相憲宗先是百姓輸賦于州有三一曰上供二曰送使三曰留州建中初定兩稅時貨重錢輕是後貨輕錢重齊人所出固已倍其初征其留州送使所在長吏又降省估使就室估人以自封殖重賦于人及垍奏諸天下留州送使物一切令依省估其所在觀察使乃以其所蒞之郡租賦自給若不足然後許取于支郡其諸州送使名額悉令上供故江淮稍息焉知權制變栁公綽為鄂嶽觀察使王師討吳元濟詔公綽以鄂嶽兵五千𨽻安州刺史李聽率赴行營公綽曰朝廷以吾儒生不知兵也因奏願自征行許之公綽至安州李聽以亷使禮事之公綽謂曰公所以屬鞬負弩豈非為兵事耶若去戎容被公服兩郡守何所統攝乎以公名家曉兵若吾不足指麾則當赴闕不然吾且署公職名以兵家從事矣聽曰惟公所命即署聽鄂嶽都知兵馬使中軍先鋒行營兵馬都虞侯乃選卒六千屬聽戒其部校曰行營之事一決于都將聽感恩畏威如出麾下而公綽軍中動靜悉用聽謀故鄂軍戰必克捷軍聲遂振其知權制變為當時所稱進銀瓶髙八尺齊映為江西觀察使常以頃為輔相無大過而罷冀其復入用乃倍斂貢奉及為大金銀器以希旨先是銀瓶髙者五尺餘李兼為江西觀察使乃進六尺者至是因帝誕日端午映為瓶髙八尺以獻視公蓄如私藏莵傳正為宣歙觀察使頗事奢侈厚以財貨賂遺權貴視公蓄如私藏幸而不至甚敗因代還京師憲宗聞其治第過侈薄之還拜光祿卿讓憲官德宗即位福建觀察使鮑防胡南觀察使蕭復讓憲官從之自兵興以來方鎮重任必兼臺省長官以至外府僚佐亦帶臺省銜至是除韓滉蘇州刺史杜亞河中少尹鎮都團練觀察使不帶臺省兼官自是諸道非節度而兼憲官者咸讓之停詔免王晬死李勉遷梁州都督山南西道觀察使勉以故吏前密縣尉王晬勤幹俾攝南鄭令俄有詔處死勉問其故乃為權幸所誣勉詢將吏上方藉牧宰為人父母豈以譛言而殺不辜乎即停詔飛上聞晬遂獲免為木偶人署名位李勉為江西觀察使部人有父病以蠱道為木偶人署勉名位瘞于其隴或以告勉勉曰為父禳災亦可矜也不恤人疾苦崔蕘字野夫乾符中出為陜州觀察使以器韻自髙不屑細故權移僕下河南冦盜蜂起朝綱不振而蕘自恃清貴不恤人之疾苦百姓訴旱蕘指庭樹曰此尚有葉何旱之有乃笞之吏民仇怨既為軍人所逐飢渴甚投民舍求水民以溺飲之初為軍人所俘剪其髭鬚拜而獲免以失守貶端州司馬賜鞭以表忠節張建封字本立貞元四年為徐州刺史徐泗濠節度度支營田觀察使十三年冬入覲德宗禮遇加等及還鎮特賜詩又令中使賫常所執鞭賜曰卿忠正節義嵗寒不移此鞭朕久執用故以賜卿以表忠節也還鎮賜詩上聖水寶厯年亳州言出聖水飲之者愈疾李德裕奏略曰臣訪聞此水本因妖僧誑惑狡計丐錢數月以來江南之人奔走塞路其水斗價三千而取者益之它水緣路轉以示人老疾飲之多至危篤昔吳時有聖火事皆妖妄古人所非乞下本道觀察使令狐楚速令填塞以絶妖源乃從之代貧户輸稅王仲舒為江南西道觀察使江西前例榷酒私釀法深仲舒至鎮則奏罷之又出官錢二萬貫代貧户輸稅胥吏以為神人崔咸字重易遷陜州大都督府長史陜􅉑觀察使自旦至暮與賔僚痛飲恆醉不醒簿領堆積咸夜分省覽剖決判斷無毫釐之差胥吏以為神人夢鄭處誨族父朗為定州節度使時處誨為工部侍郎因早朝假寐于待漏院忽夢已為浙東觀察使經過汴州而朗為汴州帥留飲餞仰視屋棟皆飾以黃土賔從皆所識明年朗果自定州鎮宣武辟韋重為掌書記重將行處誨告以所夢明年處誨授浙東觀察使行及潼關朗遣從事迎勞仍致手書乃先疏所夢比至宴于清署亭賔佐悉符夢中朗仰視屋棟曰此亦黃土也四座感歎移時勤儉清苦貝湊為福建觀察使為政勤儉清苦有美譽宰相竇參以私怨惡之數加譛毁又言湊風病不任趨馳及德宗召湊至京對于别殿令殿上走行以驗其病否由是悟參之誣尋以湊為陜州大都督府長史三州九國志吳越錢倬傳太平興國初俶表薦倬及其弟儼于朝詔以倬為慎端師儼為新媯儒三州觀察使蓋倬儼皆嘗為僧倬復好睡執政者以戲之也特繫金魚國朝陳堯咨自龍圗閣學士換觀察使及陛謝自陳本儒生習爼豆一旦蒙陛下易以武辨所惜者腰下無金魚袋命特繫金魚以示優恩好坐木馬歸田録故觀察使劉從廣燕王壻也嘗與余燕王好坐木馬子坐則不下或飢則就其上飲食往往乘興奏欒于前酣飲終日亦其性之異也兼領刺史大中祥符七年三月翰林學士陳彭年言檢討唐以來故事觀察使並合帶刺史詔自今除觀察使可兼領之防禦團練使唐職官志防禦團練使至德後中原置節度使又大都要害之地置防禦使以冶軍事刺史兼之不賜旌節上元後改防禦使為團練守捉使又與團練兼署防禦使名前使各有副使判官皆天寶後未見品秩唐百官志團練使副使判官推官巡官衙推各一人防禦使副使判官推官巡官各一人國朝元祐官品令防禦團練使從五品更見節度使門使名不廢唐書代宗即位諸州防禦使並停明年授田承嗣魏博等州都防禦使俄還節度使蓋防禦使之名不廢也其團練使都團練使亦不輟授焉若李勉魏少遊相繼為江西都團練觀察使之類腹心代宗永泰二年曰諸道節度觀察防禦使朕之腹心清淨為理丁公著授浙江西道都團練觀察使二年授河南尹皆以清淨為理監練栁芳唐厯鄖謀欲上封事輿櫬席泥首哭于都市上召見因獻三十字每一字論一事內監練二字云監軍團練使不合帶銜大厯十二年詔刺史官銜有持節諸軍事不合更帶團練使等銜宜便令主當州兵事削之其使司馬同副使例專押案其判官便令司兵判兵馬司倉判軍糧案司士判甲仗案節度及都團練使不在限故團練使不廢文武官拜送于路九國志吳楊濛字志龍行密第三子天祐中領廬州團練使渭襲位封廬江郡公持節册徐溫大丞相溫見之謂左右曰此兒瞻顧特異恐難其下因請為楚州團練使渭親餞之文武官拜送于路觀者美之知物態徐知諫溫第五子武義初授潤州刺史充本州團練使庖人請酒二斗淹蟹知諌笑謂曰螃蟹小户給五升醉矣自是州人以為知物態皆憚之立碑賜文國朝初李漢超為齊州防禦使兼關南兵馬都監漢超牧齊既久郡人愛之求為立德政碑太祖嘉其請詔太子率更令除玄撰文以賜之無檢操不宜任承流至道二年工部侍郎錢昱為郢州團練使昱秦國王俶之子也歸朝領白州刺史上表自陳嘗習文藝求改職除祕書監遷工部侍郎連知宋宿泗等州無善政至是郊祀中外官進秩上謂宰相曰昱貴家子無檢操不宜任承流故有是命天下稱為楊無敵楊畋字延昭真宗時為防禦使屢有邉功天下稱為楊無敵外冦皆畫其像而事之云以禦鬼疾畫像以禦鬼疾上備豫有素冦不能犯薛可言少帝即位遷澶州防禦使時冦至魏博遊騎晨夕至河上可言備豫有素寇不能犯治郡寬簡民皆便之李瓊世宗時為安州刺史本州防禦使治郡寬簡民皆便之吏民數百人詣監軍馮守規請立碑頌德詔中書舍人竇儀撰文賜之以俸錢分施飢民郭瓊世宗時為齊州防禦使嵗不登以俸錢分施飢民自鄰境來者亦均給之人懷其惠相率詣闕頌其德政許立碑節度行軍司馬五代史後唐天成四年勑諸道行軍司馬名位雖髙或帥臣不在其軍州事節度副使權知國朝元祐官品令節度副使行軍司馬防禦團練使為散官節度行軍司馬從八品盡理針規唐劉悟節制鄭滑奏賈直言置幕中後遷于潞亦與之俱行悟纎微乖失直言必盡理針規以是美譽日聞于朝穆宗以諫議大夫微之悟拜章乞留復授檢校右庶子依前充行軍司馬簡自上意自兵興以來方鎮少徵入换代者皆死亡乃命焉故行軍司馬盡簡自上意吟嘯杯酒自適至道中李昉知衡州受代歸闕翰林學士承旨陶榖適掌選誣奏昉嘗薦親黨求為東畿令太祖怒之吏部尚書張昭面質其事昭老儒氣直于上前投冠于地抗聲論列云榖罔上太祖終疑之昉亦不自辨出為彰武軍司馬在延州每以吟嘯杯酒自適召還拜中書舍人節度防禦團練副使唐天寶後有副使判官五代後唐同光二年諸道除節度副使兩使判官除授外其餘職員并諸州軍事判官等并本道本州各當辟舉判官仍不在奏官之限長興二年二月中書門下奏準天成二年六月勑行軍副使兩使職官防禦判官等元未定月限勑行軍副使兩使判官以下賔僚及防禦團練使判官推官軍事判官並宜以三十月為限如是隨府不在此限國朝元祐令見行軍司馬門節度防禦團練副使從八品幕職官唐見前副使門五代後唐長興二年詔兩使判官罷任一年書記支使防禦團練判官二年推官巡官防禦團練推官軍事判官等並三年後與比擬仍改轉官資職次其有績效尤異若文學超邁或為衆所推或知已察舉並加擢任不復限年清泰三年五月詔兩使判官畿赤令取郎中員外郎補闕拾遺三丞五博少列官寮選擇任使俾藩方侯伯參佐得才朝列具寮中外迭處更見前副使門國朝兩使各置判官推官一人節度掌書記觀察置支使餘州置判官推官各一人事簡者不具設元祐令京府判官至軍監判官為幕職官武昌多士晉陶侃鎮武昌軍殷浩庾翼等皆為佐吏時武昌號為多士李紳不受李錡書幣唐李紳登第後東歸金陵觀察使李錡愛其才辟為從士紳以錡所為專恣不受其書幣錡怒欲殺紳紳遁而獲免錡誅朝廷嘉之召拜右拾遺畢諴三佐杜悰杜悰鎮許昌辟畢諴為從事悰領度支諴為巡官悰鎮揚州又從之悰入相諴為侍御史武宗朝宰相李德裕專政出悰為東川節度悰之吏莫敢餞送問訊唯諴無所顧慮問遺不絶德裕怒出諴為磁州刺史杜甫見嚴武不冠嚴武鎮成都奏前拾遺杜甫為恭謀檢校尚書工部員外郎武與甫有世舊待遇甚隆甫性褊躁放恣常醉謁登武牀瞪視武曰嚴挻之乃有此兒武雖急暴不以為忤甫于浣花里種竹植樹結廬枕江縱酒笑咏與田畯野老相狎蕩無拘檢嚴武過之有時不冠其傲誕如此善于割斷裴寬以文詞進騎射彈棊投壺特妙景雲中為潤州恭軍刺史韋銑引為判官清幹善于割斷銑重其才以女妻之賔筵間多忽略趙博宣文章俊拔性率使酒陳許節度使曲環辟為從事賔筵間多所忽略環不能容誣奏扇惑軍情詔令環決杖四十流于唐州人皆以為枉李景略斷張光殺妻李景略以蔭補幽州功曹李懷光為朔方節度使署為巡官五原將張光殺其妻以資市獄前後不能斷景略訊其實光竟伏法既亭午有女厲聲被髮血身膝行前謝而去左右有識者曰光妻也因授大理司直謙謙李藩字叔輪少恬淡修檢雅容儀好學張建封在徐州辟為從事居幕中謙謙未嘗論細微後建封死濠州刺史杜兼誣奏藩建封死時搖動軍中德宗大怒密詔杜佑往殺之佑素重藩懷詔旬日不忍發藩覽之無動色佑曰吾已密論特以百口保君矣德宗聽佑解怒亦釋亟追藩赴闕及召見望其儀形曰此豈作惡耶釋之除祕書郎陰察祿山權德輿父臯字士諒安祿山充河北按察使假其才名表為從事臯陰察祿山且叛欲潛去慮禍及老母祿山使臯獻戎俘自京師回過昌福縣尉仲謨臯從父妹壻也密以計約之比至河陽詐以疾亟召謨謨至臯示已喑瞪謨而暝謨乃勉哀而哭手自含襲訖送臯葬其棺人無知者祿山不疑其詐死許其母歸及渡江祿山已反矣由是名聞天下凝然握管劉三復長于章奏李德裕尤竒待之德裕鎮浙西及遷秩皆恭佐賔筵軍政之餘與之吟詠終日在長安私第别搆起草院院有精思亭每朝廷用兵詔令制置每獨處亭中凝然握管左右侍者無能預之參佐賔筵上獨加禮敬崔衍遷宣歙池觀察使政務簡便人頗懷之其所擇從事多得名流時有土者待賔僚率輕傲衍獨加禮敬幕中之士後多顯逹幕中之士多顯達上詩如師友崔咸字重易元和二年擢進士第鄭餘慶李餘簡辟為賔佐待如師友及登朝歷踐臺閣獨行守正時望甚重纍邀方至府第崔覲梁州人為儒不欒仕進山南東道節度使鄭餘慶髙其行辟為節度𠫭謀纍邀方至府第為吏無方略苦不達人事餘慶以長者優容之積習名教栁公綽子仲郢字諭蒙牛僧孺鎮江夏辟為從事仲郢有父風動修禮法僧孺歎曰非積習名教安能及比入為監察御史和凝報賀瓌五代史和凝十九登進士第滑帥賀瓌知其名辟至幕下凝善射時瓌與唐莊宗相拒于河上戰于湖栁坡瓌軍敗而北唯凝隨之瓌顧曰子匆相隨當自努力凝對曰大丈夫受人知有難不救非素志也但恨未有死所旋有一騎士來逐凝叱之不止遂引弓射之應弦而斃瓌獲免遂以女妻之由此聲望益隆先奏後聘唐桂管觀察使使王拱聞令孤楚之才欲以禮聘召擢楚不從乃先聞奏而後䀻楚以父掾太原有庭闈之戀又感拱厚意登第後徑往桂謝拱不預逰宴乞歸奉養即還太原人皆義之奏辟舊僚宰相徐商領鹽鐵奏王徽為𠫭佐及徽拜拾遺商罷相鎮江陵以徽舊僚欲以奏辟而不敢言徽探知其旨即席言曰僕在進士中荷公重顧公佩印臨戎下官安得不從商喜甚奏授殿中侍御史賜緋充荆南節度判官輕脫筆談盛文肅為右丞知揚州時夏有章自建州司户授鄭州推官過揚州文肅驟稱其才雅明日置酒召之人謂有章曰盛公未嘗燕過客其器重者方召一飲有章荷其意别日為一詩謝之至客次先使人持詩以入公得詩不發封而還之使人謝有章度已衰老無用此詩不復得見有章殊不意往見通判刁繹具言所以繹亦不喻其由曰府公性多忤詩中得無激觸否有章曰未曽發封又曰無乃筆札不嚴曰有章自書極嚴謹曰必是將命者所忤爾乃往見文肅而問之夏有章今日獻詩何如公曰不曽讀已還之繹新曰何也曰始見其氣韻清修謂必逺器今封詩乃自稱莆田從事得一幕官遂爾輕脫君但觀之必止于此官志已滿矣切記之賈文元時為𠫭知政事與有章有舊乃薦為館職有詔候到任一年召試明年除館閣校勘御史發其舊事遂寢改充國子監主簿仍帶鄭州推官未幾卒文肅閲人物多如此不復挾它術張亢體肥大王琪瘦骨立歸田録晏元獻延賔客一時名士多出其門罷樞副為西京留守時年三十八幕下王琪張亢最為上客亢體肥大琪目為牛琪瘦骨立亢目為猴二人自譏詯琪嘗嘲亢曰張亢觸墻成八字亢應聲曰王琪望月叫三聲一座為之大笑節度觀察判官唐天寶後有判官未見品秩五代後唐長興二年詔兩使判官罷任一年書記支使防禦團練判官二年推官巡官防禦團練推官軍事判官等並三年後與比擬仍改轉官資職次其有績效尤異若文學超邁或為衆所推或知已察舉並加擢任不復限年餘見前幕職門國朝元祐令節度觀察判官從八品才思俊麗唐令狐楚善屬文進士登第李説嚴綬鄭儋相繼鎮太原髙其行義辟為從事自書記至節度判官歷使府侍御史楚才思俊麗德宗好文每太原奏至能辨楚之所為頗善之太原奏至上奏辟舊僚已見幕門異席資事浙西觀察使李栖筠有重望虛心下士幕府咸選才彥觀察判官許鴻兼有學識栖筠嘗異席資事拂衣而去李瓊鎮桂管奏栁璧為觀察判官軍政不愜璧極言不納拂衣而去桂府尋亂減員楊綰請減觀察判官之員數判官之肉其足食乎九國志閩潘承祐為大理少卿王延政鎮建州辟為節度判官延政與福州構怨日尋干戈承佑上書諫曰兄弟天倫也古稱外禦今以一朝之忿而忘大義滅孔懷之性傷人倫之本欲邦國之化不可得也延政不納嘗因福州使至延政大兵甲以誇示之其言益悖承佑長跪固諫延政怒顧謂衛士曰判官之肉其足食乎承佑聲氣益厲久之乃解及延政建號以為吏書節度掌書記沿革見幕職官門國朝元祐令節度掌書記從八品檄愈頭風書成馬上魏志陳琳字孔璋阮瑀字元瑜少受學于蔡雍建安中都護曹洪欲使掌書記瑀終不為屈魏太祖並以琳瑀為司空軍謀祭酒管書記室軍國書檄多琳瑀所作又典略曰琳作書及檄草成呈太祖太祖先苦頭風是日疾發卧讀琳所作頭風頓愈又書與韓遂時太祖適近出瑀隨從因于馬上具草書成呈之太祖覽畢欲有所定竟不能損章表殊健書記翩翩魏文帝與吳質書曰孔璋章表殊健微為繁富元瑜書記翩翩致足樂也文房南史趙知禮蔡景歷屬陳武帝經綸之日居文房書記之任占授軍書下筆便就趙知禮涉獵文史善書翰陳武帝討元景仲也或薦之引為書記知禮為文贍速每占授軍書下筆便就草遺詔于白刃之中唐鄭儋鎮太原在鎮暴卒不及處分後事軍中喧譁將有急變中夜忽數十騎持刃迫令孤楚至軍門諸將環之令草遺表楚在白刃中搦管即成讀示軍士無不感泣軍情乃安自是聲名益重為露布上行在干公異龍文章後拔為李招討府掌書記晟收復京師公異為露布上行在云臣已肅清宫禁祗奉寢園鐘虡不移廟貌如故德宗覽之泣下不勝自左右為之嗚咽既而曰不知誰為之對曰干公異為之詞上稱善久之下筆不能自休李商隱能為古文不喜偶對從事令孤楚能章奏遂以其事授商隱自是始為今體章奏博學強記下筆不能自休檄髙麗元萬頃善屬文從李績征髙麗為遼東道管記績令萬頃作文檄髙麗其語有不知守鴨緑之險莫離支報云謹聞命矣遂移兵固守鴨緑官軍不得入萬頃坐是流于嶺外翰動如飛李巨川字下已乾符中屬天下亂以刀筆從諸侯府王重榮鎮河中辟為掌書記時車駕在蜀賊據京師重榮糾合諸藩協力誅冦單書奏請堆積案几巨川文思敏速翰動如飛傳之藩鄰無不悚動重榮收復功巨川之助也諸侯章奏語太浮華文宗謂侍臣曰近日諸侯章奏語太浮華有乖典實宜罰掌書以誡其流李石曰古人因事為文今人以文害事懲弊抑末實在盛時乃以髙錯為禮部侍郎以舊人待之馮延已遷駕部郎中充元帥府掌書記與陳覺友善自結於宋齊丘璟愛其多能時以舊人待之及升卒璟即位延已喜形於色璟未聽政延已屢入白事璟不悅曰書記自有常職何為煩也自有常職上在幕中十餘年未嘗趨附府公喬公舜遷屯田員外郎齊丘鎮豫章公舜為掌書記性簡率在幕中十餘年未嘗趨附府公但重其文章以進用觀察支使沿革見幕職門國朝元祐令觀察支使從八品器局有聲唐韋元甫初任滑州白馬尉本道採訪使韋陟深器之奏充支使與同幕判官員錫齊名元甫精於簡牘錫詳於訊覆陟推誠待之時謂員推韋狀元甫有器局所蒞有聲纍遷刺史員推韋狀上節度觀察推官國朝元祐令節度觀察推官從八品言行剛直唐狄仁傑孫兼謨元和末解褐襄陽推官言行剛直使府知名軍書填委削藳立就九國志前蜀王鍇天復中朝廷遣裴贄使蜀册建為蜀王贄舉鍇為判官建一見重之辟為觀察推官建圖霸之始軍書填委削藳立就詞理精當防禦團練判官沿革見幕職門國朝元祐令防禦團練判官從八品軍事判官沿革見幕職門國朝元祐令軍事判官從八品防禦團練軍事推官五代史周顯德二年防禦團練刺史州各置軍事推官一人國朝元祐令防禦團練軍事推官從八品軍監判官沿革見幕職門國朝元祐令軍監判官從八品職官分紀卷三十九
