body:
  text: 職官分紀卷四十六宋孫逢吉撰元帥後周大象元年以上柱國韋孝寛爲行軍元帥徇地淮南宣帝以上柱國河陽搃管滕王逌爲行軍元帥伐陳隋開皇十八年以􅀈王諒爲行軍元帥水陸三十萬伐髙麗唐職官志凡親王揔戎曰元帥文武官揔統則曰揔管唐百官志天下兵馬元帥副元帥都統副都統行軍長史行軍司馬行軍左司馬行軍右司馬判官掌書記行軍參謀前軍兵馬使中軍兵馬使後軍兵馬使中軍都虞候各一人元帥都統招討使掌征伐兵罷則省都統揔諸道兵馬不賜旌節髙祖起兵置左右領軍大都督各搃三軍及定京師置左右元帥太原道行軍元帥西討元帥皆親王領之天寳末置天下兵馬元帥都統朔方河北河東平盧節度使招討都統之名始於此大厯八年罷天下兵馬元帥建中四年以李希烈反置諸軍行營兵馬都元帥興元元年置副都統㑹昌中置靈夏六道元帥黄巢之難置諸道行營馬都統天復二年置諸道兵馬元帥尋復改曰天下兵元帥行軍司馬掌弼戎政居則習蒐狩有役則申戰守之法器械粮備軍籍賜予皆專馬武徳元年改賛治曰治中髙祖即位曰司馬下州亦置焉顕慶二年置洛州司馬武后大足元年東都北都雍荆揚益州置左右司馬神龍二年省太極元年雍洛四大都督府人增司馬一掌書記掌朝覲聘問慰薦祭祀祈祝之文號令升絀之事行軍㕘謀闗豫軍中機宻景龍元年置掌書記開元十二年罷行軍㕘謀尋復置五代後唐長興四年以秦王從榮爲天下兵馬大元帥九月中書門下奏秦王加天下兵馬大元帥自歴朝以來並無天下兵馬大元帥公事儀注或專一靣之權或揔諸道之帥其儀注規程公事條目載詳故實未見明文臣等謹沿近事伏見招討使揔管兼授副使以下櫜鞬禮庭今望令諸道節度使以下凡𢃄兵權者見元帥階下具軍禮參見皆申公狀其使相者初見亦以軍禮一次以後客禮相見應天下諸軍務公事元帥府行指揮其判六軍諸衛事則公牒徃來其元帥所置官属補授軍職則委元帥奏請從之錢俶在漢朝爲東南靣兵馬都元帥周廣順初授諸道兵馬元帥二年加天下兵馬元帥世宗初授天下兵馬都元帥國朝建隆元年錢俶加天下兵馬大元帥賞其知人陳宣帝時朝議北侵命舉元帥衆議在淳于量徐陵獨曰不然呉明徹家在淮右悉彼風俗將畧人才當今無者於是争論數日不能决尚書都官裴忌曰臣同徐僕射陵應聲曰非但明徹良將忌即良副也是日詔明徹爲大都督令忌監軍遂尅淮南數十州地宣帝因置酒舉杯属陵曰賞卿知人清河即江神隋楊素爲行軍元帥伐陳素率水軍東下舟艫蔽江旌甲耀日素生平乗大船容貌雄偉陳人望之曰清河公即江神也水忽化爲血唐河間王孝恭髙祖従父兄之子輔公祐據江東反命孝恭爲行軍元帥擊之將發宴諸将取水忽化爲血在坐失色孝恭飲之曰此公祐授首之徵也果擒公祐儲貳更爲元帥肅宗討賊以廣平王爲天下兵馬元帥又以大臣郭子儀李光弼副之號爲副元帥祿山作亂𤣥宗幸蜀晋肅宗討賊建寕王倓肅宗第三子也倓英毅有才畧善騎射肅宗既北上渡渭一日百戰倓自選驍騎數百衛從毎血戰在前上尤憐之軍士属目歸於倓至靈武肅宗即位廣平王既爲元子欲以倓爲天下兵馬元帥侍臣曰廣平王家嗣有人君之量上曰廣平地當儲貳何假更爲元帥左右曰廣平今未册立艱難時人猶属望元帥况太子從曰撫軍守曰監國今之元帥撫軍也廣平爲冝遂以廣平王爲元帥倓典親軍李讓國爲元帥府司馬圖形于凌烟閣徳宗代宗長子宗也奉節郡王代即位之年拜天下兵馬元帥改封魯王時史朝義據東都遣徳宗㑹諸軍大舉破賊於洛陽進收東都河南平朝義定河北分命諸將追之俄而賊將斬朝義首以獻河北以元帥功拜尚書令與郭子儀等八人圖形於凌烟閣上所賜詔書代宗立程元振忌宿將難制離搆百計因罷子教儀副元帥子儀懼讒乃盡裒肅宗以來所賜詔千餘篇上之因自明詔曰朕不徳不明貽大臣憂疑朕甚自愧樓上行朝見之禮子儀自涇陽入朝帝御安福門待之命子儀樓上行朝見之禮宴賜隆厚别創一閣以表殊勲昭宗末年中書奏西京舊自有凌煙閣圖畫功臣今遷都洛陽合議修建副元帥梁王勲庸冠世仍請凌煙閣之側别創一閣以表殊勲從之改諸道爲天下哀帝天祐二年勅朕以國史所書元帥之任並以天下爲名爰自近年改爲諸道既非舊制須在正名宜追制改爲天下兵馬元帥以朱全忠故也玉册金印五代後唐同光中以錢鏐爲天下兵馬都元帥尚父尚書令呉越國王賜玉册金印詔下有司詳議羣臣咸言玉簡金宇惟至尊一人所以别等威也錢鏐人臣不可而樞宻承㫖段回曲爲鏐陳請於樞宻使郭崇韜崇韜僶俛從之元帥尚父與使相名殊詔曰朝廷毎有將相恩命准徃例列銜於勅牒後側書使字今兩浙節度錢鏐是元帥尚父與使相名殊承前列銜乆未改正湖南節度使馬殷先兼中書令之時理冝齒於相位今守太師尚書令是南省官不合列署勅尾今後毎署將相勅牒宜落下錢鏐馬殷官銜仍永爲定式置府寮九國志呉越正明三年詔授鏐諸道兵馬元帥四年置元帥府寮属賜金印清㤗二年詔授元瓘爲呉越王天下兵馬元帥賜金印元瓘鏐第五子恤隣錢𢎞佐元瓘第六子開運三年詔授東南兵馬都元帥李孺贇之求救也將皆不欲行𢎞佐因召文武官集議果言山水險惡不可興兵𢎞佐變色曰脣亡齒寒古人之明戒吾爲天下元帥豈不能恤隣若有異議者斬衆皆懾伏乃遣將誓師辭令明肅果有成功三十五年國朝錢俶爲年元帥三十五都統唐職官志都統乾元中始置或搃五道或搃三道上元末省大中後討徐州以康承訓討黄巢以荆王鐸皆爲都統唐百官志都統天寳末置始有都統之名興元元年置副都統黄巢之亂署諸道行營都統率諸鎮之師唐上元元年以郭子儀爲兵馬都統令率諸鎮之師徑抵范陽詔下旬日爲朝恩所間竟不行永㤗元年以郭子儀都統河南節度使行營出鎮河中節制徊翔之地徳宗幸梁洋回初廢天威軍左右神策軍舉西漢謁者隨何下淮南功拜爲中尉故事命神䇿監軍爲中尉又以功臣數或有秩至司空僕射罷鎮入朝無官序相當乃置六軍統軍秩視六尚書爲節制徊翔之地竇文場爲中尉將寵擅權謂中尉之重不可以統軍爲比且皆當麻制一旦文場加官潜搆宰相進内狀請付翰林准統軍例草制及翰林進白麻學士鄭絪有宻疏云比者封王命相即降白麻付中書門下宣告近者聖意罷節除統軍亦降麻制今中尉加官降白麻宣示中外未知出自權宜爲復以此爲例上覧䟽留中取白麻焚之翌日召絪謂曰文場竊僣宰臣不能拒之幸卿有䟽朕方覺悟自此罷鎮除都統亦不降麻賜都統不除麻上賜金一篋太宗引尉遲敬徳爲右率府統軍右僕射屈突通言敬徳初歸國家情志未附請殺之太宗曰寡人所見有異遽命釋之引入卧内賜與金寶謂曰丈夫以意氣相期勿以疑介意寡人斷不聽讒言以害忠良今以此物相資表一時共事之情也是日因從獵於榆窠遇王世充領歩騎數萬來戰世充驍將單雄信領騎直趨太宗敬徳躍馬大呼横刺雄信墜馬敬徳翼太宗以出賊圍太宗謂敬徳功最居多比衆人證公必叛天誘我意獨保明之福善有徵何相報之速也特賜金銀一篋恩眄日隆賜黄金瓶泰叔寳事秦王府拜馬軍總管戰美良川破尉遲徵何功多帝賜以黄金瓶勞曰卿不䘏妻子而來歸我且又立功使朕肉可食當割以啖爾况子女玉帛乎監軍東觀漢記光武使來歙監諸將沈約宋書監軍葢諸將出征大將監領之斬莊賈史記穰苴將兵扞燕晉之師苴曰臣素卑賤君擢之閭伍之中加之大夫之上願得君之寵臣國之所尊以監軍景公使莊賈往苴與賈約日中㑹於軍門苴先驅至軍立表下漏賈素驕貴夕時乃至苴遂斬賈以徇三軍之士皆震懾服白劾矯詔之罪後漢宋均為監軍時將軍馬援征漢南臨水軍士多病均懼衆疾疫矯詔廹降之諸將莫應均乃勒兵團賊詐為詔而降之為置長吏而歸自劾矯詔之罪帝善之遊軍魏志司馬文王征壽春使監軍石苞簡銳卒為遊軍忠素質直晉武帝起居注豫州刺史闗威威忠橐質直思謀深逺以威為監軍刺史故也權望太重唐蕭復為相嘗言艱難以來始用宦者監軍權望太重是曹正可委宮掖事兵要政機詎宜參領帝不聽不得干軍要李徳裕為相先是韓全義敗於蔡杜叔良敗於陳皆監軍宦人制其權將不得專進退詔書一日三四下宰相不與又諸道銳兵慓士皆監軍取以自隨毎督戰乘高建旗自表小不勝輙巻旗去大兵隨以北由是王師所向多敗至討回鶻澤潞徳裕奏請詔書付宰司乃下監軍不得干軍要率軍百人取一以為衛自是號全分明一將乃有功觀軍容使魚朝恩毁郭子儀同上養子六百人監道軍楊復恭並見内常侍門不以公物為私禮五代後唐張承業為太原監軍武皇屬以後事曰吾兒孤弱羣庻縱横後事公善籌之承業奉遺詔以立嗣王平内艱策畧居多莊宗感其意兄事之親幸承業私第時韓徳妃伊淑妃諸宅王之貴介弟在晉陽宫或不以其道承業悉不聴踰法禁者必懲由是貴戚斂手民俗丕變或有中傷承業於莊宗者言專弄威柄廣納賂遺莊宗歳時還晉陽宫省太后須錢蒱愽給伶人嘗置酒於泉府莊宗酒酣命興聖宫使繼岌為承業起舞承業出寳幣馬奉之莊宗指錢積謂承業曰和哥無錢使七哥與此一積寳馬非殊惠也承業謝曰郎君歌舞承業自出已俸錢此錢是大王庫物准擬支贍三軍不敢以公物為私禮也天奪孤之子布張承業為太原監軍常從征討王師既退汴營大將周徳威慮其奔衝堅請退舍帝怒垂帳而寢諸將咸詣監軍詣白承業遽至牙門褰帳而入撫帝曰此非安寢時周徳威老將洞識兵勢姑務萬全言不可忽帝蹶然而興曰予方思之其夕遂收軍帝初獲玉璽諸將勸帝復唐正朔承業自太原急趨謁帝從容言曰云云今元兇未殄軍賊不克願大王受人推大凡舉事量力而行悠悠之談無益實事因泣下沾襟帝曰予非所願奈諸將何承業自是多病日加危篤卒於營凶問至帝悲慟連日輟食言曰天奪孤之子布也招討使副使唐職官志招討使貞元時置自後隨用兵權置兵罷則停唐百官志節度兼度支營田招討經畧使則有副使判官各一人兼魏博等四州唐徳宗初即位建中二年田恱圍邢州次臨汾詔河東節度使馬燧與昭義節度使李抱真神䇿將李晟合兵救臨汾恱兵大敗邢州圍亦解以功加右僕射尋又加燧魏愽招討使三年又敗恱於洹水詔加魏州大督都府長史兼魏愽等四州節度觀察招討使讓招討使名裴度受淮西宣慰招討處置使詔出度以韓𢎞為淮西行營都統不欲更為招討請秪稱宣慰處置使從之古無中官為將帥憲宗時以王承宗叛詔吐突承瓘為招討使諌官伏閤上章者皆言自古無以中官為將帥者白居易亦靣論之來嚼鐵來瑱為潁川郡太守充招討使肅宗以瑱武畧尤加委任遷兼御史大夫北收河洛屢挫賊鋒頻來攻皆為瑱所敗賊等懼之號為來嚼鐵平蜀被誅五代後唐客省使李嚴西川回言王衍可圖之狀莊宗與郭崇韜謀討伐之計時明宗為諸道兵馬總管當行崇韜自以宦者相傾欲立大功以制之乃奏曰魏王繼岌徳望日崇大功未著宜依故事以親王為元帥莊宗曰小兒㓜稚安能獨行卿當擇其副崇韜未奏莊宗曰無踰於卿乃以繼岌為都統崇韜為招討使率親軍六萬進討西川籌盡皆出崇韜繼岌承命而已莊宗令内官李崇襲等為都統府紀綱見崇韜幕府繁重將吏輻凑降人爭先遺賂其都統府牙門索然大以為耻及成都降崇韜居正王衍之弟宗弼遷王衍妓妾珍玩以奉崇韜永為蜀帥内官等謂繼岌曰郭公收蜀部人情意甚難測王宜自備由是兩相猜察莊宗聞破蜀乃遣向延嗣賫詔入蜀促班師詔使至崇韜不郊迎李崇襲從而謵之延嗣使還具奏皇后告莊宗乞保繼岌莊宗復閲蜀簿曰人言蜀中珠玉金銀不知其數何如是之微也延嗣奏曰臣得西川人言蜀中寳貨名馬金銀犀玉王衍愛妓盡入崇韜之門魏王府蜀人賂遺不過匹馬而已莊宗初聞崇韜欲留蜀心已不平又聞全有蜀之妓樂珍玩即令中官馬彦珪馳入蜀視崇韜去就如班師即已如遲留則令繼岌圗之彦珪見皇后曰禍機之發間不容髪何能數千里外復禀聖㫖哉皇后乃自為教與繼岌謀殺崇韜時蜀土初平山林多盜馬彦珪未至崇韜令任等分道招致歸期稍緩正月六日馬彦珪至大軍決於十二日發成都彦珪如皇后教以示繼岌繼岌曰大將軍發他無釁端安得為此負心事公軰勿復言崇襲等巧作事端以間之繼岌既無英斷僶俛從之乃以繼岌命召崇韜計事繼岌登樓避之崇韜入左右遂殺之崇韜服勤盡節佐佑王家草昧經創論功無與比西平巴蜀復振皇威身死之日夷夏寃之崇韜有五子並誅以無功求解邉事國朝夏竦為奉寧軍節度使知永興又移涇州經畧邉事竦上言乞加兵臺諫官言竦怯於戰若萬一失利則以少為解竦上言乞解都招討石介著文一篇名責臣竦觀介文大恨之尋移永興時遣翰林學士王堯臣等充陜西體量安撫竦與堯臣詩曰兩朝西掖舊詞臣蘗苦氷寒四十春白雪滿頭塵滿靣自愁重見玉堂人時竦議添兵臺官言竦之意若出而敗必以兵少為解及言竦姦詐不可任以大事竦人以詩寄吕丞相曰黄閣有賢圖國討皂囊無黨害邉功河源飲馬非難事一㸃胡塵在目中其後竟以無功懇求解邉事移知河中府專以范仲淹韓琦經畧西事詔下中外相慶龍圖公為長城范仲淹知慶州兼經畧招討使未幾賊兵三萬叩城仲淹麾兵血戰賊奔北遂戒諸將無追奔既而果有伏兵又奪馬為大順城及築細腰胡蘆等寨招明珠㓕臧二強族萬餘人及命環州种世衡招千餘人帳自是屬羌皆用乆之王師再喪於定川仲淹晝夜領兵為援初闗輔人心動揺及見仲淹耀兵號令嚴明威震戎落人心遂安第相賀曰邉上自有龍圖公為長城吾屬何憂慕郭代公功業慶厯三年以鄭戩代仲淹為四路都招討置府於涇嘗慨然慕郭代公功業元昊擁衆臨黒山戩勒兵廵邉抵鎮戎趨蓮花堡置酒高會旗幟絡野鐃鼔喧天虜衆十萬相顧不敢動元昊謂其下曰我已遣使稱臣朝廷何為復用此公其畏如此經畧使副使判官唐百官志見招討使門五代不常置國朝自寶元以來陜西縁邊大將皆兼經畧使名康定元年以經畧司止有判官三員乞令兼㕘詳都總管軍士從之輕財愛士唐劉雍為隴右經畧使輕財愛士得人之使力詣闕議攻守之策國朝尹洙知名元昊元昊反夏竦為經畧招討洙為經畧判官上意必欲誅元昊詔遣近臣督戰令宰相韓琦為招討副使與洙詣闕議攻守之策上詔曰用攻策洙恐葛懷敏寡謀而輕賊自請㕘其行營事未報聞賊寇涇源洙移文慶州率步軍劉平將兵赴鎮戎軍以援之或白元帥洙曰失火家豈暇白大人而後救竦奏洙擅舉兵移濠川通判宣撫使副使判官唐元和十四年誅李師道淄青兖鄆等十二州平詔户部侍郎楊於陵以本官充淄青等州宣撫使國朝咸平三年詔兵部侍郎參知政事向敏中充河北東路縁邉宣撫大使樞宻直學士馮拯陳堯叟充副大使按廵郡國存問官吏將校僧道耆老百姓等真宗御長春殿置宴以遣之熙寧三年參知政事韓絳充陜西路宣撫使以直舍人院吕大防為宣撫判官館閣校勘李清臣掌機宜文字續命絳兼河東路絳就拜相乞淮南發運使薛向為副使上以宰相充使則大防為知制誥向為待制可並充判官安撫使副使都監管勾官唐貞觀初遣大使十三人廵省天下諸州水旱則有廵察安撫存撫之名節度使兼之則有副使天授二年廢十道存撫使國朝凡諸路災傷或邉境用師皆特遣使安撫事已則罷其河北河東别置司景徳三年置河北縁邉安撫使以雄州知州充又有副使以諸司副使以上充不常置都監以閤門祗候以上充並北掌邉戎及交聘之事副使都監迭廵所部慶厯六年置湖南安撫使八年置河北四路安撫使大中祥符元年置河東安撫使管勾官二人一以代州知州充一以閤門祇候以上充熙寧五年罷諸路經畧安撫使勾當公事觀省風俗尤難其人國朝咸平三年以翰林學士王欽若為西川安撫使國子愽士袁及甫副之閤門祗候李成象同勾當安撫事知制誥梁顥為陜西路安撫使秘書丞李易直副之所至録間繫因真宗復諭欽若曰觀省風俗尤難其人數日思之無易卿等各宜宣布徳澤使知朕勤恤之意馳騎而往四年以兵部尚書張齊賢充涇源儀滑汾寧環慶鄘延州保安鎮戌清逺軍安撫經畧使知制誥梁顥副之帝以邉將玩冦朔方糧道艱阻故命齊賢等使焉即命發曰馳騎而往仍命軍徴南院使周瑩祖於瓊林苑取死囚斬河上景徳中丁謂充鄆濟濮安撫使時契丹稍南民奔楊劉坡舟人邀利不時濟人謂取死囚斬於河上詭言取民錢者舟人大恐旦夕不敢停濟廵撫使副使國朝淳化四年遣使於諸道廵撫及咸平三年江南兩浙各遣廵撫使副使問民疾苦䟽理滯獄景徳三年益利梓夔福建等州各遣使廵撫自是以後因事則遣人察訪使國朝熙寧三年遣使察訪淮南兩浙常平及農田水利差役事其後諸路皆命官察訪焉採訪使廵察唐神龍二年以五品以上二十人為十道廵察使按舉州縣再周而代景雲二年置都督二十四人察刺史以下善惡時以為權重難制罷唯存四大都督府又置十道按察使開元二年初置十道按察採訪處置使至四年罷八年復置十道按察使秋冬廵視州縣十年又罷十七年復置十道京師兩畿按察使二十年改曰採訪使分十五道二十五年命諸道採訪使考課官吏善績三年一奏永為常式天寳末又兼黜陟使乾元元年改曰觀察處置使國朝開寳五年遣常參官四人分詣諸處京東京西京南京北路相度田土苗稼㸃檢採訪公事九年遣和峴江南道採訪恣為威虐九國志吴越董昌中和二年平漢劉宏以功授越州節度加開封儀同三司同中書門下平章事封隴西郡王京師喪亂之後墳籍散落僖宗常下詔購求遺書越州有裴氏家聚書數千卷昌虐悉取之以獻乃授諸道採訪圖籍使既得志遽恣為威勸農使國朝至道二年以太常愽士直史館陳靖為勸農使按行陳潁蔡襄鄧唐汝等州勸民墾田以大理寺丞皇甫選光禄寺丞何亮副之尋罷景徳三年詔諸道轉運使副使開封府知府及諸道知州刺史少卿監以上並兼勸農使其餘知州知軍通判等並兼勸農事仍令今後除授依此施行天禧四年正月改諸路提㸃刑獄為勸農使副兼提㸃刑獄公事各賜農田敕一部四月利州路轉運使李昉請雕印四時纂要齊民要術付諸路勸農使十一月令勸農使兼提舉刑獄官自今以提㸃刑獄勸農使副為稱天聖四年令逐路轉運司自今勸農一司更不置司行遣取索文字馳行天下唐宇文融開元中為覆田勸農使乃奏慕容琦等二十九人為勸農判官按州縣括正丘畝招徠户口而分業之又兼租地安輯户口使於是諸道收沒户八十萬田亦稱是嵗終羨錢數百萬緡帝悅拜御史中丞然吏下希望融旨不能無擾初議者以生事沮告百端而帝意向之宰相源乾擢等佐其舉公卿雷同不敢異惟楊瑒以為籍外取稅百姓困弊生左遷融乃自請馳行天下事無巨細先上勸農使勾剥財物融與楊慎矜父子以勾剥財物爭行進奉而致恩堅顧職官分紀卷四十六
