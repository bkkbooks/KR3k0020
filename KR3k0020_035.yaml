官皆出涕因上壽稱萬嵗曰晟䖍奉聖謨盪滌兇醜然古之樹勲力復都邑者往往有之至於不驚宗廟不易市肆長安人不識旗鼔安堵如初三代以來末之有也帝笑曰天生李晟為社稷萬人非為朕也百官再拜而退甲辰幽州健將韓旻梁庭芬朱惟孝等於寧州彭原縣西斬逆賊朱泚傳首來獻天䇿上將軍唐高祖以秦王功殊今古自昔位號不足以為稱乃特置天䇿上將軍拜之位在三公上及升儲宫遂廢天䇿府國朝大中祥符八年二月皇兄元佐授天䇿上將軍唐初止為天䇿上將軍後唐命馬商為天䇿上將軍并開府時以元佐久疾特加褒號仍結銜在功臣上不開府慶厯四年正月皇叔荆王元儼贈天䇿上將軍侍衞親軍司都指揮使副都指揮使都虞候國朝侍衛親軍司兼總步騎二軍之政令都指揮使副都指揮使都虞候國朝初並置自後多闕雍熙以來田重進傅潛王超繼為都虞候潛後遷復副都指揮使自超罷職無復任者其屬有孔目勾押押司開拆官前後行通引官客司主獄等侍衞親軍馬軍司都指揮使副都指揮使都虞候國朝侍衛親軍馬軍司周廣順元年改侍衛馬軍司曰龍捷左右軍國朝改為侍衛親軍馬軍司掌騎兵之名籍及訓練之政令都指揮使副都指揮使都虞候都指揮使闕則以副都指揮使領其事若副都指揮使又闕或在外則殿前步軍司兼領之若具員在京則凡公事都虞候以上逓申其長然後謄奏行下殿前步軍司亦准此屬吏同親軍司侍衞親軍步軍司都指揮使副都指揮使都虞候國朝侍衛親軍步軍司周廣順元年改侍衛親軍步軍司曰虎㨗左右軍國朝改為侍衛親軍步軍司掌步兵之名籍及訓練之事都指揮使副都指揮使都虞候吏屬如侍衛親軍之制言合孫吳以名將稱之國朝元昊既叛劉平遷副都指揮使靜江軍觀察留後遂上攻守之䇿極論遼及夏人利害時以其言合孫吴以名將稱之殿前司都指揮使副都指揮使都虞候國朝殿前司周顯徳元年詔募天下豪傑躬親試閲選武藝超絶又有身手者分署焉殿前諸班因有散員散指揮使内殿直散都頭鐵騎控鶴之號國朝因之掌殿前諸班直及步騎諸指揮之名籍及訓練之政令都指揮使國朝初有都㸃檢副都㸃檢之名在都指揮使之上後不復置其屬吏之名並如侍衛親軍司而副都指揮使都虞候三局吏人有差歸田錄寶元康定之間余自貶所還過京師見王景貺初作舎人自契丹使歸余時在坐見都知押班殿前馬步軍聯騎立門外呈牓子稱不敢求見舎人遣謝之而去至慶厯三年余作舎人此禮已廢然三衙管軍臣寮於道路相逢望見舎人呵引者即斂馬駐立前呵者傳聲太尉立馬急遣人謝之比舎人馬過然後敢行後余官於外十年而還遂入翰林為學士見三衙呵引甚雄不復如當時與學士相逢分道而過更無斂避之禮葢兩制漸輕而三衙漸重舊制侍衛親軍與殿前分為兩司自侍衛司不置馬步軍都指揮使以來侍衛一司自分為二故與殿前司列為三衛也五代軍制已無典法而今又非其舊制多矣東齋記事殿前馬歩軍軍司謂之上四軍各左右廂廂各三軍毎軍五指揮各有都指揮使一員都虞候副之又有第四軍以處所退年高者無都指揮使止有都虞候殿前司又有神勇宣武驍騎各上中軍軍十指揮又有寧朔驍勝各十指揮虎翼左右各三軍軍各十指揮並有都指揮使都虞候馬軍司有雲騎武騎各十指揮步軍司有虎翼左右各三軍軍十指揮毎軍各有都指揮使一員都虞候副之遇轉員各以次遷補凡遷至軍都指揮使遙領團練員溢即從上落軍職為正刺史之本任其老疾若有過為御前忠佐馬步軍都軍頭副都軍頭𨽻軍頭司甚者黜為外州軍馬步軍都指揮據座受舉人拜筆談許懷徳為殿帥有一舉人因老姥求為門客懷徳許之舉人拜於庭下懷徳據座受之人謂懷徳武人不知事體密謂之曰舉人無投階之禮宜少降接也懷徳應之曰我得打乳姥關節秀才只消得如此待之御前忠佐軍頭引見司勾當官國朝初曰軍頭引見司端拱元年改軍頭司為御前忠佐軍頭司引見司為御前忠佐引見司其官有内外馬步軍都軍頭副都軍頭並有領團練使以上者五代有内外馬步軍都軍頭蕃漢都引進使國朝去引進之名後隨司加御前忠佐又有馬步軍都軍頭副都軍頭並有領刺史者又有馬軍都軍頭副都軍頭步軍都軍頭副都軍頭之名祥符二年詔置軍頭司祗候指揮使副指揮使都軍頭副兵馬使副都頭之名自今如遇赦叙理降配軍兵依此安排毎後殿起居於軍頭司祗候軍員後别行立勾當官或三人或二人以都軍頭及諸司使副使内侍都知押班充其屬有押司官前後行軍頭司掌崇政殿供奉官及諸州駐泊捕捉權管之事引見司掌軍頭之名籍諸軍揀閲引見分配領散員一班馬直步彊壯軍員三指揮又掌後殿起居軍員之政令及諸司引見之事不令禁衛飲酒國朝章聖以二月十九日上升時大雪極寒太后令中官各以酒分賜禁衛之士時總兵者令諸班極飲王徳用管御前忠佐引見司所轄地分禁衛皆不得飲酒既而中官入奏其事太后垂簾召而問曰大雪苦寒軍班坐甲不易何故不令飲酒徳用泣曰此輩被大行皇帝恩徳久矣今大行上升率土山崩為人臣子何忍飲酒況宫中大事未定忽有一夫酗酒高呼恐社稷危爾太后嗟咨感泣曰大行皇帝嘗言爾可委寄信不虚矣自是上與太后有意於大用後不次擢用簽書樞密院公事乃至為使相馬步軍總管副總管兵馬總管副總管沿革更見都督府六典注國朝馬步軍都總管以節度使充副總管以觀察使以上充有止一州者有數州為一路者有帶兩路三路者或文臣知州則管勾軍馬事舊相重臣亦為都總管有禁兵駐泊其地者冠以駐泊之名鈐轄以上准此咸平四年三路都總管及排陣使並廢景徳二年詔鎮定兩路併為一路諸路並去行營之名止為駐泊總管大中祥符二年詔合鎮定兩路總管併為一慶厯二年詔近分陜西緣邊為四路各置經畧安撫招討等使自今路分總管鈐轄以上許與都總管司同議軍事路分都監以下並聴都總管等節制違者以軍法論四年詔罷陜西四路緣邊都總管司以鄜延環慶涇原秦鳳依舊分為四路七年析河北為四路各置都副總管一員鈐轄二員都監四員如無事止以安撫使總制諸路或有警即於北京置四路行營都總管擇嘗任兩府者為之八年諸州部署並改總管兵馬總管副總管以横行諸司使及刺史或兩省五品以上充或一州或一路至二三路者有之馬步軍總管副總管鈐轄都監准此咸平五年詔西北面總管司兵馬機宜公事於隨行使臣内擇一人専掌之勿復以親隨主其事初鎮定兵馬各置總管大中祥符二年合為一令王能領之奏事立雪中待報後周長孫儉初為荆州總管後轉陜州總管嘗詣闕奏事時大雪遂立於雪中待報自旦達暮竟無惰容其謹慤如此饋羊以私帛報之赫連達遷大將軍夏州總管三州五坊諸軍事達雖非文吏然性素質直遵奉法度輕於鞭撻而重慎死罪性又亷儉邊境胡人或饋以羊者達欲招納異類報以繒帛主司請用官物達曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕焉乘舊馬以歸韋孝寛為延州總管兄夐至州與孝寛相見將還孝寛以所乘馬及轡勒與夐夐以其華飾心弗欲之謂孝寛曰昔人不棄遺簪墜履者葢惡其與之同出而不與之同歸吾之操行雖不逮前烈然捨舊錄新亦非吾志也於是乘舊馬以歸三罪隋書元褒為原州總管有商人為賊所刼其人疑同宿者而執之褒察其色寛而辭正遂捨之商人詣闕訟褒受金縱賊上遣使窮治之使者簿責褒曰何故利金而捨盜也褒便即引咎初無異詞使者與褒俱詣京師遂坐免官其盜尋發於他所上謂褒曰公朝廷舊人位望隆重受金捨盜非善事何至自誣也對曰臣受委一州不能息盜賊臣之罪一也州民為人所謗不付法司懸即放免臣之罪二也牽率愚誠無顧形迹不持文書約束至令為物所疑臣之罪三也臣有三罪何所逃責臣又不言受賂使者復將有所窮究然則縲紲横及良善重臣之罪是以自誣上歎異之稱為長者法令明肅盜賊屛迹元景山為亳州總管先是州民王迴路張季貞等聚結亡命毎為刼盜前後牧守不能制景山下車遂捕之迴路季貞挺身奔江南擒其黨與數百人皆斬之法令明肅盜賊屏迹稱為大治卧治一隅韋世康拜吏部尚書嘗因侍宴再拜陳讓曰臣無尺寸之功位亞台鉉今犬馬齒耄不益明時恐先朝露無以塞責願乞骸骨退避賢能上曰朕夙夜庻幾求賢若渴冀與公共治天下以致太平今之所請深乖本望縱令筋力衰謝猶屈公卧治一隅於是出拜荆州總管時天下帷置荆并揚益四大總管并揚益三州並親王臨統唯荆州委於世康時論以為美世康為政簡靜百姓愛悦合境無私獨坐滿榻蕃人畏懼韋藝遷營州總管容貌瓌偉毎夷狄㕘謁必整儀衛盛服以見之獨坐滿一榻蕃人畏懼莫敢仰視爾之去朕如斷一臂薛道衡聲名藉甚無競一時仁壽中楊素専掌朝政道衡既與素善上不欲道衡久知機密因出檢校襄州總管道衡久䝉驅䇿一旦遣離不勝悲戀言之哽咽高祖愴然改容謂曰爾光陰晩景侍奉誠勞朕欲令爾將攝兼撫甿俗今爾之去朕如斷一臂於是賚物三百段九環金帶并時服一襲馬十疋慰勉遣之奏嶺南地圖樊子葢轉循州總管許以便宜從事十八年入朝奏嶺南地圖賜以良馬雜物華夷咸敬稱為大化令狐熙拜桂州總管十七州諸軍事許以便宜從事凡刺史以下官得承制補授給帳内五百人賜帛五百疋發傳送其家累改封武康郡公熙至部大𢎞恩信其溪洞渠帥更相謂曰前時總管皆以兵威相脅今者乃以手教相諭我軰其可違乎於是相率歸附先是州縣生梗長吏多不得之官寄政於總管府熙悉遣之為建城邑開設學校華夷咸敬稱為大化率衆先鋒大破陳師李安為行軍總管率蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊船必輕我而無備以夜襲之賊可破也諸將以為然安率衆先鋒大破陳師聞弓聲為霹靂長孫晟為秦州道行軍總管取晉王廣節度出討突厥達頭晟追之斬首千餘級有突厥達官来降言突厥之敗大畏長孫總管聞其弓聲謂為霹靂見其走馬稱為閃電晉王笑曰將軍震怒威行域外威行域外上突厥不敢仰視韓擒虎有文武才用夙著威名於是拜為廬州總管委以平陳之任甚為敵人所憚陳平之後突厥來朝上謂之曰汝聞江南有陳國天子乎對曰聞之上命左右引突厥詣擒虎前曰此是執得陳國天子者擒虎厲然顧之突厥惶恐不敢仰視其有威容如此卧鎮無勞躬親獨孤楷字脩則煬帝即位轉并州總管遇疾喪明上奏乞骸骨帝曰公先朝舊臣固卧以鎮之無勞躬親簿領以其長子凌雲監省郡事其見重如此驅牛驢擊破鍾葵軍楊義臣仁壽末為朔州總管煬帝即位漢王諒作亂并州時代州總管李景為漢王將喬鍾葵所圍詔義臣救之義臣自以兵少悉取軍中牛驢得數千頭復令兵數百人人持一鼔潜驅之澗谷間出其不意義臣晡後復與鍾葵戰兵初合命驅牛驢者疾進一時鳴鼓塵埃漲天鍾葵不知所以以為伏兵發因而大潰遂擊破之傅藥唐契苾何力為右驍衛大將軍太宗征遼東何力為前軍總管軍次白崖城為賊所圍被矟中腰疾甚太宗自為傅藥割左耳以明志不可奪契苾何力為葱山道副大總管討平高昌時何力母姑臧夫人及母弟賀蘭州都督沙門並在涼府何力覲省其母兼巡撫部落時薛延陁彊盛契苾部落皆願從之於是衆兵執何力至延陁所置於可汗牙前何力箕踞而坐㧞佩刀東向大呼曰豈有大唐烈士受辱蕃庭耶天地日月願知我心又割左耳以明志不可奪也可汗怒欲殺之為妻所抑而止或言於太宗曰人心各樂其土何力今入延陁猶魚之得水也太宗曰不然此人心如鐵石必不背我㑹有使自延陁至具言其狀太宗泣謂羣臣曰契苾何力竟如何遽令兵部侍郎崔敦禮持節入延陁許降公主求何力由是得還白事者無疎遠皆至卧内田留安拜魏州總管劉闢之亂也來攻州城於時山東豪猾多殺長吏以應賊百姓兇人各懷異志凡諸守皆以心腹自衛由是上下情隔然叛者多歸留安留安獨撫治所部示無疑阻但有白事者無疎遠皆至卧内謂人曰吾與卿輩為國守自宜一心無為疑惑必欲棄同即異背順歸逆亦在卿輩斬吾頭而去可矣城中父老相誡厲子弟曰田公以赤心相付何得負之由是人情遂固州人苑竹林者劉闢之黨也初有異圖留安陰知之而不發其事因引置左右委以關鑰竹林感其意遂歸心焉卒以其力用之也善為經畧劉世讓拜廣州總管將之任高祖問以備邊之䇿世讓答曰突厥比數南㓂者徒以馬邑為其中路爾如臣計請於崞城置一智勇之將多儲金帛有來降者厚賞賜之數出其兵畧其城下芟踐禾稼敗其生業不出嵗餘彼當無食馬邑不足圖也高祖曰非公無可任者可馳驛至彼善為經畧世讓於是以兵臨馬邑高滿政以其地來降突厥患之遣曹粲陁來詣中國言世讓與可汗通謀將為亂由是得罪籍没其家及突厥來降者言世讓初無逆謀始原其妻子御札數幅授以方畧國朝淳化五年以㕘知政事趙昌言為川陜兩路兵馬都總管自王繼忠以下皆聴其節度太宗以蜀㓂雖平尚有殘孽因命昌言安撫招討之仍御札數幅丁寧授以方畧焉委任雄盛至道元年以趙昌言知鳳翔府事罷㕘知政事及總管初昌言以近臣領兵經畧西蜀辭於便殿曲宴以餞焉并賜精良馬白金五千兩行裝服用稱是委任雄盛近代儒臣無以比也後旬日仍詔宰臣等後苑門宣諭曰昨令昌言入蜀賊小㓂昌言大臣未易令前進且宜軍於鳳翔屯駐止令衛士欽齎朕手書指揮軍事亦可濟矣及追詔方下昌言已至鳳翔留候館殆百餘日洎賊平分屯將士故昌言有是命焉熟識機宜行事果斷景徳元年以㕘知政事王欽若判天雄軍府兼都總管都大提舉河北轉運司及巡檢兵甲事初帝曰北面戎事皆有成謀至於城隍悉已完具帷天雄軍最為重鎮思得熟識機宜行事果斷者涖之欲於大臣中輟人往彼於是欽若請行帝怡然從之中人就賜黄金一器天聖七年劉平授忻州團練使屬上封事言趙元昊連姻耶律必為邊患授邠寧環慶副總管遣中人就賜黄金一器錢百萬平車騎入軍賊聞而遁去朕之關張狄青字漢臣汾州人世本農家𨽻縣為鄉書手移易税賦事發遂逃走至京師投拱聖為兵遷散職為延州指揮使㑹元昊叛屢將兵出戰四年間大小三十五陣八中流矢西戎及砦下以至京師之人皆呼為狄天使上嘉其材勇七遷秦州刺史涇原路兵馬副總管上欲一見之詔令入朝㑹㓂逼平涼乃令仍往涇原俾圖象以進上觀其儀表曰朕之關張也於是有狄萬人之稱以敵萬人也有狄萬人之稱上累有戰功熙寧四年上宣諭涇原路副都總管張玉鄜延劉永年並令再任玉可與一子官永年止與支賜樞密使文彥博言兩人同是再任而推恩不同上曰玉累有戰功永年但以久熟鄜延未有代者若一概推恩無以激勸都鈐轄鈐轄國朝以朝官及諸司使以上充或一州或一路或兩路三路亦有無都字者大中祥符中涇原路駐泊都鈐轄兼知渭州曹瑋奏乞依舊例别差人知渭州臣乞一面管勾鈐轄司事帝宣示王欽若等曰邊防軍馬所屯之地若别置知州即各生事體可降詔諭以此意嘉祐二年詔内臣為鈐轄都監者逐路止置一員治平二年路分都監鈐轄等如有員闕即與正差不得陳乞理為資序將官國朝自河北通和以來兵不分將領訓練不精慮涉生事重於剙置上特令分將領置官遂於陜西河東京東西開封府界等處並置以統領所部兵熙寧六年以京東武衛等六十二指揮𨽻屬諸路分畨勾抽因此并其餘軍馬並差主兵官分擘管勾訓練八年諸將官毎二十隊差押隊一名諸將㕘謀更不差次秦鳳路軍馬列為四將以環慶路管軍馬分為四將涇原路屯泊就糧上下畨正兵弓箭手畨兵分為五將及别置熙河䇿應將都監監押國朝以閤門祗候以上充三班為之名監押諸州軍府監皆有之領本城及屯駐兵馬掌屯戌邊防訓練之令以肅清所署部有至二員者或為同監押禁兵駐泊則増置一員不領本城兵邊州有至三員者亦有一路兩路三路者其關城縣鎮寨津堡亦有置者縣即知縣兼充朝官為都監京官幕職為監押畿縣則云簽書兵馬司公事國初諸州郡都監或雜用文臣其後止用武臣景徳元年詔西路緣邊有郡監監押處罷駐泊都監四年詔川陜節度州及衝要兵多處監押用侍禁以上為之天聖四年定監押職位在寨主之下慶厯七年詔陳留雍丘襄邑尉氏中牟陽武等六縣兵馬都監自今令開封府及府界提㸃司更舉閤門祗候以上曽經外任者為之嘉祐二年詔内臣為鈐轄都監者逐路止置一員三年詔開封府陳留襄邑尉氏縣兵馬都監自今差諸司副使以上三年一代之與減磨勘一年治平二年路分都監鈐轄等如有員闕即與正差不得陳乞理為資序熙寧三年増開封府陳留縣兵馬監押一員四年詔府界諸縣兵馬都監今後樞密院選人䕶戎之任咸平六年長樂郡主為其弟處約求兵馬監押真宗曰䕶戎之任實司軍旅處約未歴事不可從也趙虎頭治平元年西京左藏庫副使緣界河巡檢都監趙用有才武果敢而熟邊事遼人以鹽船犯邊禁者用使執而訊之遼畏用以其常乘虎頭船謂之趙虎頭都巡檢使巡檢使巡檢國朝以閤門祗候以上至諸司使將軍或内侍充自兩州至十州及緣邊寨或路當險要者亦因其地為名亦有同都巡檢使若供奉官以下為之者即不云使緣邊又有巡檢都監之名巡檢使自一州至九州軍有或從道路便宜不限境土亦有同巡檢使三班為之者亦不去使自二縣至七縣開封府諸縣有巡檢一員二縣至三縣有駐泊巡檢各一員府界東西路都巡檢各一員京城四面各一員緣海有刁魚船戰櫂巡檢緣江河淮海亦有捉賊巡檢又有駐泊捉賊及巡馬遞鋪巡河巡捉私茶鹽之名景徳三年置京東五路巡檢司以應天府曹濮州廣濟軍為一路濟鄆兖州為一路淄齊青州為一路登萊濰密州為一路沂徐州淮揚軍為一路大中祥符五年詔三班院揮使臣為諸州都同巡檢七年詔選寄班四員充京城四面巡檢慶厯三年置開封府諸縣巡檢各一員又分東西二路置提舉捉賊各一員嘉祐元年權置京城裏外巡檢以晝夜大雨尋罷舊城裏所増巡檢三年詔諸路毎一州軍巡檢有至三五員者又兩三州至八九州有都同巡檢或駐泊捉賊員數過多非唯軍馬勢分兼遇驚刼罕能獲賊惟逐縣弓手習知賊所匿藏而捕獲之其一州軍止留巡檢一員數州留都同巡檢一員其緣邊緣海及河汴江湖險僻之地舊有巡檢處並留之人之勇怯豈拘南北國朝景祐三年上疏者言諸處巡檢務在武勇心力彊明者乞不以福建荆湖江浙川陜及衙前省職文資出身人領其事真宗謂樞密使王欽若曰人之勇怯豈拘南北若此區别非任人之道請賞誣告者歸田錄太祖時郭進為西山巡檢有告其陰通河東劉繼元將有異志者太祖大怒以其誣害忠臣命縛其人予進使自處置進得而不殺謂曰爾能為我取繼元一城一寨不止贖爾死請賞爾一官嵗餘其人誘其一城來降進具其事送之於朝請賞以官太祖曰爾誣害忠良此纔可贖死爾賞不可得也命以其人還進進復請曰使臣失信則不能用人矣太祖於是賞以一官君臣之間葢如此賜銀百兩太祖時李漢超為關南巡檢使漢超武人所為多不法久之關南百姓詣闕訟漢超貸民錢不還及掠其女以為妾太祖召百姓入見便殿賜以酒食徐問曰自漢超在關南契丹入㓂者幾百姓曰無也太祖曰往時契丹入㓂邊將不能禦河北之民嵗遭刼虜汝於此時能保其資財婦女乎今漢超所取孰與契丹之多又問訟女者曰汝家幾女所嫁何人百姓具以對太祖曰然則所嫁皆村夫也若漢超者吾之貴臣也以愛汝女故取之則將必不使失所與其嫁村夫孰若處漢超家富貴於是百姓皆感悦而去太祖使人語漢超曰汝須錢何不告我而取於民乎乃賜以銀數百兩曰汝自還之使其感汝也漢超感泣誓以死報提舉兵甲巡檢公事國朝知兖州提舉鄆濮等五州軍兵甲巡檢公事知青州提舉青濰等八州軍兵馬衣甲巡檢公事知徐州兼提舉徐宿等七州軍兵甲巡檢公事京東諸州軍都提舉都巡檢使鄆博等六州都大巡河兼提舉捉賊徐州駐泊都監兼提舉徐州等七州軍兵甲巡檢公事知單州提舉曹單徐兖州應天府淮陽廣濟軍利國萊蕪監巡檢捉賊知定州同管勾真定府州等路駐泊知博州濱棣徳博等州緣河兩岸水陸巡檢使兼提舉鄆齊淄濮濟等七州巡檢捉賊公事知永興府兼提舉乾耀商華坊丹等州軍巡檢兵甲事知鳳翔府兼管勾鳳翔隴州一路巡檢駐泊軍馬公事知陜府提轄陜府河中府虢解絳州巡檢兵甲公事知秦州兼秦隴鳳階成路駐泊馬步軍副都總管提舉本州管界兼諸寨巡檢公事陜府兵馬鈐轄兼提舉陜府河中府虢解絳州巡檢兵甲盜賊華州陜府西京路陜府河中府同華虢解丹等州提舉巡檢捉賊其廨宇在華州西京陜府駐泊捉賊兼提舉緣黄河兩岸至絳州界六寨公事知并州兼同管勾并代州軍馬提舉巡檢事知潞州提舉澤潞晉絳慈隰州威勝軍一路屯駐駐泊就糧本城兵馬巡檢公事潞州駐泊兵馬鈐轄兼提舉澤潞晉絳慈隰州北威勝軍一路屯駐駐泊就糧本城兵馬公事知揚州提舉揚楚泗通泰海真州高郵漣水軍兵馬衣甲巡檢公事知廬州兼提舉廬壽蘄黄光舒濠州無為軍兵甲器械事江淮兩浙都大提舉捉賊兩員一在潤州一在洪州知杭州提舉杭蘇一路兵甲巡檢公事知越州兼提舉温台明越衢婺處等州一路兵甲巡檢事知洪州兼提舉江南西路一十州軍巡檢兵甲事知荆南荆湖北路兵馬都鈐轄管勾䕫施州一路巡檢兵馬公事知潭州管勾潭州并全邵等州一路巡檢公事知辰州提舉辰州新興等四寨兵甲知福州兼提舉福建劍汀州邵武軍一路兵甲巡檢公事知泉州兼提舉泉漳州興化軍都同巡檢公事福州駐泊兵馬都監兼提舉福汀建劔州邵武軍一路巡檢兵甲公事知益州充本城兵馬鈐轄提舉益州路諸州軍兵馬巡檢公事益州路屯駐駐泊本城兵馬鈐轄同提舉益州路諸州軍巡檢公事二員知利州提舉兵甲巡檢公事知文州同提舉利州路巡檢公事知䕫州兼梓䕫州路兵馬都監提舉兩路州軍巡檢兵甲公事知容州提舉容瓊路諸州兵馬都同巡檢公事邕州提舉邕貴欽亷兩路巡檢充管界緣邊溪洞都巡檢使兼駐泊事諸州軍及緣邊又有管勾一州或一路二路兵甲巡檢者慶厯六年置京東兩路提舉巡檢捉賊各一員以沂密州淮陽軍為一路登萊淄青濰州為一路皇祐三年詔江寧府揚州廬州洪州福州並帶提轄本路兵甲賊盜公事益屯禁兵仍令分淮南為兩路揚州為東路廬州為西路走馬承受公事國朝河北河東陜西川峽皆有之以三班或内侍二人或三人充至道三年五月詔諸路承受公事朝臣使臣歸闕真宗聴政之初務從簡易故也大中祥符元年正月詔諸路承受使臣多令諸州牒報事宜謄錄入奏頗為煩擾自今禁止之五年六月權知開封府劉綜言諸路走馬承受使臣到闕皆直造便坐自今請先於前殿見訖乃詣後殿奏事從之慶厯三年詔諸路走馬承受非本職不得輒言他事五年遣入内供奉官庫徳明為河東路經畧司走馬承受河東舊無内臣為承受判并州夏竦特請之皇祐元年復置麟府路走馬承受内臣一員熙寧五年詔鑄諸路走馬承受印舊例皆曰某路都總管司走馬承受公事居是職者惡有所𨽻屬去總管司字冀擅其權因循已久至是上命正其名仍鑄朱記給之職官分紀卷三十五
