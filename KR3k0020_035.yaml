body:
  text: 職官分紀卷三十五宋孫逢吉撰諸衛將軍隋以前沿革並見衛將軍門隋百官志煬帝即位改左右衛為左右翊衛左右備身為左右騎衛左右武衛依舊名改領軍為左右屯衛加置左右禦改左右武候為左右候衛是為十二衛又改領左右府為左右備身府左右監門依舊名凡十六府其朝之班序以品之高卑為列品同則以省府為前後省府同則以局署為前後十二衛各置大將軍一人將軍二人總府事并統諸鷹揚府改驃騎為鷹揚郎將正五品車騎為鷹揚副郎將從五品大都督為校尉帥都督為旅帥副都督為隊正増置隊副以貳之改三衛為三侍以武候府司辰師員𨽻為太史局官其軍士左右衛所領名為驍騎左右驍衛所領名豹騎左右武衛所領名熊渠左右屯衛所領名羽林左右禦衛所領名射聲左右候衛所領名佽飛而摠號衛士毎衛置䕶軍四人掌副貳將軍將軍無則一人攝尋改䕶軍為武賁郎將正四品而置武牙郎將六人副焉從四品諸衛皆置長史從五品又有錄事㕘軍司倉兵騎鎧等員翊衛又加有親侍鷹揚府毎府置鷹揚郎將一人正五品副鷹揚郎將一人從五品各有司馬及兵倉兩司其府領親勲武三侍非翊衛府皆無三侍鷹揚毎府置越騎校尉二人掌騎士步兵校尉二人領步兵並正六品外軍鷹揚官並同左右候衛増置察非掾二人専糾彈之事五年又改副郎將並為鷹揚郎將唐百官志六典並各見本門國朝元祐令諸衛上將軍從三品諸衛大將軍正四品諸衛將軍從四品左右衛將軍事實已具衛將軍沈約宋書左右衛將軍晉文建國所置唐職官志武官左右衛周制軍萬二千五百人天子六軍大國三軍小國一軍軍將皆命卿至秦漢始置衛將軍後漢魏因之晉武帝始置左右中三衛將軍至隋始置左右衛左右候左右武候左右領軍左右率府各有大將軍一人謂十二衛大將軍也國朝因之大將軍各一員正三品六典左右衞大將軍各一人正三品晉文帝置臺又置中衛將軍武帝受命分中衞為左右二衞各大將軍一人品第四銀章青綬武冠綘朝服佩水蒼玉宋齊因之建元二年詔二衛將軍日暮常一人宿永初元年詔二衛儀從増至九十人又左衞領營五十人司馬二十五人右衛領營四十人司馬二十人梁班第十二陳秩二千石後魏從二品太和二十二年降第三品北齊因之隋十二衛各有大將軍一人然自兩漢至北齊大將軍位視三公至隋十二衛大將軍直為武職位左右省臺之下與古大將軍但名號同而統務别至開皇末罷煬帝復置改左右衛為左右翊衛其領名為驍騎皇朝復左右衛府官屬與隋令畧同龍朔二年除府字貞元二年初置十六衛有上將軍將軍各二人從三品後魏永光元年始増置各二人從二品上太和二十二年降第三品北齊左右衛府各將軍一人各武衛將軍二人皆有司馬功曹主簿錄事等員隋左右衛將軍各三人皇朝因之左右衛大將軍將軍之職掌統領宫庭警衛之法令以督其屬之隊仗而總諸曹之職務凡親勲翊五中郎將府及折衝府所𨽻者皆總制焉有長史各一人從六品上晉武帝置左右衛各有長史司馬員過江罷長史歴宋齊梁陳後魏北齊唯有司馬無長史至隋各置長史一人皇朝因之掌判諸曹親勲翊五府及武安武成等五十府之事以閲兵仗羽儀車馬凡文簿典職廩料請給卒伍軍團之名數器械糧儲之主守大事則從其長小事則専達季秋則以庻官之狀贊大將軍考課而升降焉錄事㕘軍事各一人正八品上晉元帝初為鎮東大將軍置錄事㕘軍一人梁皇弟皇子府有中錄事㕘軍及錄事㕘軍各一人後魏二大二公府及第二第三品將軍府及始蕃王二蕃王三蕃王府各有錄事㕘軍員北齊因之隋左右衛府各有一人皇朝因之掌印及受諸曹五府及外府百司所由之事以發付勾檢稽失倉曹㕘軍事各二人正八品下晉元帝為鎮東大將軍有倉曹㕘軍一人宋高祖相府亦置後魏與錄事㕘軍同置北齊因之隋左右衛府各有倉曹㕘軍一人皇朝因之置二人掌五府外府之文官職員凡勲階考課假使祿俸及公廨財物田園食料之事皆掌制之兵曹㕘軍事各二人正八品下晉代與倉曹同置騎曹㕘軍事各一人正八品下魏司馬景王為大將軍有騎兵掾一人宋高祖為相有騎兵㕘軍一人隋左右衛府有騎兵曹㕘軍一人皇朝因之後改為騎曹掌外府馬及雜畜之簿帳凡府馬之外直者以近及遠分為七番月一替胄曹㕘軍事各一人正八品下晉元帝為鎮東大將軍有鎧曹㕘軍宋高祖為相亦有之齊職儀云左右鎧曹一人隋左右衛府有鎧曹行㕘軍一人皇朝因之長安中改為冑曹神龍初復為鎧曹開元初復為胄曹司階各二人正六品上中候各三人正七品下司戈各五人正八品下執㦸各五人正九品下天授二年置諸衛司階中候司戈執㦸謂之四色官奉車都尉各五人從五品下國朝元祐官品令左右衛上將軍從二品歸田錄唐制三衛有司階司戈執干執㦸謂之四色官今三衛廢無官屬惟金吾有一人毎日於正衙候朝謁不坐直謂之四色官尤可笑也左右驍衛將軍唐職官志左右驍衛古曰驍衛隋改左右備身為左右驍衛所領名豹騎國朝去騎字曰驍衛府龍朔去府字改為左右武威神龍復為驍衛大將軍各一員正三品將軍各二員從三品掌如左右衛六典左右驍騎大將軍各一人正三品漢武帝以李廣為驍騎將軍後省之光武改屯騎為驍騎晉文王立晉臺以為宿衛之官歴宋齊梁陳後魏北齊並有驍騎將軍之職後周有左右驍騎率上士三人至隋煬帝改左右備身為左右驍衛尋以左右驍衛所領名豹騎而又别置備身皇朝置左右驍衛府龍朔二年除府字光宅元年改為左右武威衛神龍元年復為左右驍衛將軍各二人從三品隋煬帝置皇朝因之掌如左右衛置長史各一人從六品上掌判諸曹翊府及永固等四十九府之事以閲兵仗車馬餘如左右衛錄事㕘軍事各一人正八品上倉曹㕘軍事各二人正八品下兵曹㕘軍事各二人正八品下騎曹㕘軍事各一人正八品下胄曹㕘軍事各一人正八品下隋煬帝改置驍衛府有長史從五品有錄事㕘軍倉曹兵曹騎兵鎧曹行㕘軍員皇朝降長史為從六品改騎兵為騎曹鎧曹為胄曹而衛除府字所掌如左右衛司階各二人正六品上中候各三人正七品下司戈各五人正八品下執㦸各五人正九品下賜物令上冡宴父老隋來䕶兒煬帝即位遷右驍衛將軍帝甚親重之大業六年從駕江都賜物二千段令上先人冡宴鄉里父老朝野榮之使長孫晟在不令匈奴至此長孫晟煬帝時為右驍衛將軍卒帝深悼惜之贈賜甚厚後突厥圍鴈門帝歎曰向使長孫晟在不令匈奴至此遣人彈胡琵琶唐柴紹為右驍衛大將軍武徳中吐谷渾與党項俱來㓂邊命紹討之敵據高臨下射紹軍中矢下如雨紹乃遣人彈胡琵琶二女子對舞敵異之駐弓矢而相與聚觀紹見敵陣不整密使精騎自後擊之敵大潰斬首五百餘級左右武衛將軍唐職官志左右武衛魏武為丞相有武衛營隋採其名置左右武衛府有大將軍光宅改為左右鷹揚衛龍朔復大將軍各一員正三品將軍各二員從三品掌如左右衛六典左右武衛大將軍各一人正三品隋置左右武衛府有大將軍一人將軍二人皇朝因之將軍各二人從三品掌如左右衛長史各一人從六品上掌判諸曹翊府及鳳亭等四十九府之貳錄事㕘軍事各一人正八品上倉曹㕘軍事各二人正八品上兵曹㕘軍事各二人正八品上騎曹㕘軍事各一人正八品下胄曹㕘軍事各一人正八品下隋左右武衛府有長史一人煬帝陞為從九品又有錄事㕘軍倉曹㕘軍煬帝改為司倉兵曹㕘軍煬帝改為司兵皇朝改司倉為倉曹司兵為兵曹騎曹為胄曹司階中候司戈執㦸人品數並同左右衛武衛之號自此始魏許禇從太祖戰大破馬超等乃遷武衛中郎將武衛之號自此始也文帝即位遷武衛將軍轉自散騎常侍曹爽自散騎常侍轉武衛將軍爽秉政又以弟訓為武衛將軍吮血唐李思摩為右武衛將軍從征遼東為流矢所中太宗親為吮血其見顧遇如此未幾卒于京師贈兵部尚書解金帶以緩追騎皇甫無逸字仁儉轉右武衛將軍帝幸江都以無逸留守洛陽王世充難作無逸棄老母妻子斬關而走追騎且至無逸曰吾死而後已終不能同爾為逆因解所服金帶投之于地曰以此贈卿無為相迫也追騎競往取帶由是得免經二百餘陣秦叔寳從誅建成元吉事寧拜左武衛大將軍其後毎多疾病因謂人曰吾少長戎馬間所經二百餘陣屢中重創計吾前後出血亦數斛矣安得不病乎内宴作酒令各言小名李君羡太宗即位累遷華州刺史封武連郡公時太白頻晝見太史占曰女主昌又有謠言當有女武為王者太宗惡之時君羨為左武衛將軍在𤣥武門太宗因武官内宴作酒令各言小名君羨自稱五娘子太宗愕然因大笑曰何物女子如此勇猛又以君羨封邑及屬縣皆武字深慮之㑹御史奏君羨與妖人員道信潜相謀結將為不軌遂下詔誅之寧食三㪷葱屈突通為左武衛將軍蒞官勁正有犯法者雖親無所回縱其弟盖為長安令亦以方嚴顯時為語曰寧食三㪷艾不見屈突葢寧食三㪷葱不見屈突通見亦作逢左右威衛將軍屯衛唐職官志左右威衛隋為左右屯衛龍朔改為威衛光宅改為左右豹韜衛神龍復為威衛大將軍各一員正三品將軍各二員從三品六典左右威衛大將軍各一人正三品隋初置左右領軍府煬帝改為左右屯衛皇朝因之至龍朔二年改為威衛别置左右屯衛亦有大將軍等官光宅元年改為左右豹韜衛神龍元年復舊將軍各二人從三品隋煬帝改領軍為屯衛府置將軍皇朝因之龍朔光宅神龍隨衛改復掌如左右衛長史各一人從六品上掌判諸曹之事以閲兵仗羽儀車馬及宜陽五十府餘如左右衛錄事倉兵曹騎曹胄曹㕘軍事人品並如左右衛妾以毒藥置酒中唐楊思訓顯慶中歴左屯衛將軍時右衛大將軍慕容寳節冇愛妾置于别宅嘗邀思訓就之宴樂思訓深責寳節與其妻隔絶妾等怒密以毒藥置酒中思訓飲盡便死寶節坐是配流嶺表思訓妻又稱寃制遣使就斬之以伶官為之咸通中以伶官李可及為左威衛將軍曹確執奏曰臣覽貞觀故事太宗初定官品令文武官共六百四十三員顧謂房𤣥齡曰朕設此官以待天下賢士工商雜色之流假令術踰儕類止可厚給財物太和中文宗欲以樂官尉遲璋為王府率拾遺竇洵宜極諫乃改授光州長史伏乞以兩朝故事别授可及之官不聴哀悼為五言詩姜確為左屯衛將軍高昌之役以為行軍副總管貞觀十七年太宗將征高麗確諫以為師未可動太宗不從確從至盖牟城中流矢而卒時年五十一太宗甚哀悼之為五言詩曰鑿門初奉衛仗節始臨戎振鱗方躍浪騁驥正趨風未展六奇術先虧一簣功防身不足智徇命有餘忠悲驂嘶白露哀笳咽遠空淒涼大樹下深悼滿宸衷時人榮之子暕嗣以確死王事拜朝散大夫同日授官見領軍衙門左右領軍衛將軍中領軍北軍中候唐職官志左右領軍衛注同六典大將軍各一員正三品將軍各二員從三品六典左右領軍衛大將軍各一人正三品漢建安十四年魏武為丞相相府始置中領軍既收漢中還長安以曹休為之主五校中壘武衛等營魏文帝為魏王又置領軍而領軍差勝中領微劣晉因之領軍與中領三將軍並置領軍品第三金章紫綬中領軍將軍品第四銀章青綬武冠綘朝服佩水蒼玉泰始元年武帝省領軍北軍中候中領軍將軍羊祜統二衛前後左右驍騎等七軍營兵宋齊領軍中領軍將軍掌内禁兵大駕出則御軍在前住則守舊制輿駕出行則與䕶