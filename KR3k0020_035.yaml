率武候率各下大夫二人至隋置左右武候府各大將軍一人將軍三人大業改為左右武候衛四年各増置察非掾二人專糾彈之事皇朝因之龍朔二年改為左右金吾衛將軍各二人從三品上皇朝因隋置二人貞觀中増置三人掌宫中及京城晝夜巡警之法以執禦非違凡翊府及同軌等五十府皆屬焉長史各一人從六品上掌判諸曹翊府及同軌寶圖等五十府之事閲其儀仗兵馬凡文簿典職廩料請給畨第上下皆審其事而總制之錄事㕘軍事各一人正八品上掌所受翊府外府及諸衛百司之事以發付勾檢倉曹㕘軍事各二人正八品下掌翊府外府文官職員兵曹㕘軍事各二人正八品下掌翊府外府武官職員騎曹㕘軍事各一人正八品下掌外府兵馬雜畜帳及牧養之事胄曹㕘軍事各一人正八品下掌諸曹翊府及外府軍戎器械及其公廨興造決罰之事翊府中郎將各一人正四品下左右郎將各一人正五品上中郎將掌領府屬以督京城内左右六衛晝夜巡警之事左右郎將貳焉國朝元祐令左右金吾衛上將軍從六品與諸衞將軍同為衞軍金吾伺察城中細事唐書徳宗時金吾大將軍李幹好伺察城中細事時為聞奏冀求恩寵人畏而避之張建封亦奏之乃下詔曰比來朝官或諸處過從金吾皆有上聞其間如素是親故或曽同寮友伏臘嵗序時有還往亦是常禮人情所通起今以後金吾不須聞奏絲毫越法無不立發田仁㑹為右金吾將軍所得俸給外有餘輒以納官時人頗譏其邀名而仁㑹彊力疾惡晝夜巡警自宮城至於衢路絲毫越法無不立發毎日廷引百餘人躬自閲罰畧無寛者京城貴賤咸憚之君賞禦侮見宰相李石鎮靜注連呼太平張萬福為金吾將軍裴延齡讒譛陸贄等坐貶徳宗怒未解諫議大夫陽城率拾遺王仲舒等詣延英門疏論萬福聞諫官伏閣諫往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍揖城等曰諸諫議能如此言事天下安得不太平已而連呼太平太平萬福武人年八十餘自此名重天下名重天下上勝數萬衆李嗣業為左金吾大將軍祿山反兩京陷上在靈武詔嗣業赴行在謁見上曰今日得卿勝數萬衆事之濟否實在卿也發郭子儀細過裴諝為右金吾將軍建中初上以刑名理天下百吏震悚時十月禁屠殺以甫近山陵禁嚴尚父汾陽王郭子儀𨽻人殺羊以入門者覺之諝列奏狀上以為不畏彊禦累遣宣諭或謂諝曰郭公有社稷功豈不為葢之諝笑曰非爾所解且郭公威權太盛主新即位必謂黨附者衆今發其細過以明不㺯權爾吾上以盡事君之道下以安大臣不亦宜乎集賢院待制臧希讓為金吾大將軍好談時政詔令集賢院待制希譲無學術乃處近地從容公卿間彊引文言以自賢而所聞知多道途得之發必差謬頗為士子所笑彊引文言以自賢上持法平正王宗壽性方正為金吾上將軍持法平正院吏周郃受賍鬻獄宗壽捕鞫得其實郃以重貨求救於大閹為解之宗壽不聴竟棄郃市置皷樓以警昏曉退朝錄京師街衢置皷於小樓之上以警昏曉太宗時張公洎製坊名列牌於樓上按唐馬周始建議置􅕣􅕣皷唯兩京有之後北都亦有鼕鼕鼓是則京師之制也二紀以來不聞街鼔之聲金吾職廢矣中尉蒼鷹前漢郅都為中尉丞相條侯至貴倨也而都揖丞相是時民樸畏罪自重而都獨先嚴酷行法不避貴戚列侯宗室見都側目而視號曰蒼鷹行法不避貴戚上朝士瞻望魏書崔琰遷中尉聲音高暢眉目疎朗鬚長四尺甚有威重朝士瞻望而太祖亦嚴憚焉執金吾奉武庫兵器前漢母將隆執金吾時侍中董賢方貴上使中黄門發武庫兵前後十輩送賢及上乳母王阿舎隆奏武庫兵器天下公用國家武備繕治造作皆度大司農錢大司農錢自乘輿不以給供養供養勞賜壹出少府葢不以本藏給末用不以民力供浮費别公私示正路也矜嚴公正東觀漢記馬防拜執金吾性矜嚴公正上每事論議多見用仕宦當作初光武適新野聞陰后美心悦之後至長安見執金吾車騎甚盛因歎曰仕宦當作執金吾娶妻當得陰麗華所用掾吏皆俊哲續漢書陰識拜執金吾位特進入則極言正諫至與賔客語不及國事嘗慕仲山甫匪躬之節所用掾吏皆得天下俊哲虞延傅賢等是也切諫二千石長吏不堪任朱浮為執金吾帝以二千石長吏不堪任時有纎微之過者必見斥罷交易分授百姓不寧六年有日食之異浮因上疏切諫自是州牧奏長吏二千石長吏不任位者事皆先下三公三公遣掾吏按驗然後黜退請擊郾華嶠後漢書賈復為執金吾更始中郾王尹尊及諸將反上召諸將議以檄叩地曰郾最彊宛為次誰當擊之復率爾對曰臣請擊郾上笑曰執金吾擊郾吾復何憂耶領宿衛耿秉為人威重有謀畧拜執金吾毎行幸秉恒領宿衛託疾不朝謝承後漢書梁冀為執金吾嵗朝託疾不朝司𨽻揚雄治之詔以三月俸贖罪咨訪軍事魏志臧霸與曹休討吴賊破吕範於洞浦徵為執金吾毎有軍事帝常咨訪焉明畧威重任國柱石漢雜事辛慶忌明畧威重任國柱石拜執金吾左右武候唐高祖以徐勣為右武候大將軍不改父廨宇唐趙道興貞觀初歴遷左武候中郎將周旋宿衛號為稱職太宗嘗謂之曰卿父為隋武候將軍甚有當官之譽卿今克傳弓冶可謂不墜家聲因授右武候將軍其父時廨宇仍舊不改時人以為榮抗直不容人之非尉遲敬徳貞觀中為右武候大將軍素抗直不能容人之非毎見房𤣥齡杜如晦等短長必靣折廷辯由是與執政不平乃出為襄州都督武庫令漢書百官表執金吾屬官有武庫令置二丞武庫令一人昔武王伐紂散牛放馬倒載干戈韜以虎皮而藏諸武庫其職由來尚矣續漢書武庫令一人秩六百石主兵器職閒無事前漢杜欽為大將軍武庫令職閒無事歛所好也終當逺到王隠晉書樂廣㑹四方後進武庫令黄慶進陶侃曰此人終當逺到左右監門衛將軍唐百官志左右監門衛上將軍各一人大將軍各一人將軍各二人掌諸門禁衛及門籍文武官九品以上毎月送籍於引駕仗及監門衛衛以帳報内門六典左右監門衛大將軍各一人正三品漢魏以來城門校尉之職也隋置左右監門府各將軍一人有郎將二人校尉直各三十人煬帝改左右監門衛將軍為郎將皇朝置大將軍郎將等員龍朔二年改為監衛將軍各二人從三品中郎將各四人正四品下隋左右監門府郎將二人煬帝置一人皇朝置四人掌諸門禁衛門籍之法凡京司應以籍入宫殿門者皆本司具其官爵姓名以移牒其官門司送於監門勘同然後聴入中郎將掌監諸門及巡警之法長史各一人從六品上掌判諸曹及諸禁門之事以省其出入巡檢而司其籍牓餘如左右衛錄事㕘軍事各一人正八品上掌印發勾檢稽失兵曹㕘軍事各一人正八品下掌本衛文武官之職簿胄曹㕘軍事各一人正八品下掌軍戎器械非殿庭皆乘蜀馬唐書高祖以李粲為左監門衛大將軍禮高年也初高祖問粲年幾對曰八十高祖曰公清辨之譽聞於隋世今年齒雖邁筋力未衰但監門之職非公莫可意欲相委如何粲以年老辭讓高祖曰藉公處分爾豈欲煩公筋力耶于是詔粲自非殿庭皆乘蜀馬論者榮之左右千牛衛將軍隋百官志左右領左右府各大將軍一人將軍二人掌侍衛左右供御兵仗領千牛備身十二人掌執千牛刀備身左右十二人掌供御弓箭備身六十人掌宿衛侍從各置長史司馬錄事及倉兵二曹㕘軍事鎧曹行㕘軍各一人等員煬帝即位左右領左右府改為左右備身府統千牛左右司射左右各十六人並正六品千牛掌執千牛刀宿衛司射掌供御弓箭十三年改千牛備身為司仗左右員八人唐百官志左右千牛衛上將軍各一人大將軍各一人將軍各二人掌侍衛及供御兵仗六典左右千牛衛大將軍各一人正三品謝綽宋拾遺錄有千牛刀即人主防身刀也後魏有千牛衛備身本掌乘輿御刀葢取莊子庖丁為惠文君解牛十九年所割者數千牛而刀刃若新發于硎石言此刀可以備身因以名官後魏書奚康生有勇力以其子難為千牛備身又楊保𢎞農人為千牛備身北齊領左右府有左右領將軍亦統千牛備身第六品下隋見前唐改為左右千牛府龍朔二年改為左右奉宸衛神龍元年改為千牛衛將軍各一人從三品北齊領左右府有領左右將軍一人隋有將軍二人皇朝減一人中郎將各二人正四品下北齊有左右備身正副都督並四品上隋煬帝置備身郎將一人皇朝置中郎將左右各二人大將軍將軍掌宫殿侍衛及供御之儀仗而總其曹務凡千牛備身備身左右執弓箭以宿衛主仗守戎服器物凡受朝之日則領備身左右升殿而侍列於御座之左右若親射於射宫則大將軍將軍率其屬以從凡千牛備身左右考課賜賚及祿秩之升降同京職事官之制中郎將掌供奉侍衛以貳將軍及諸曹之務凡千牛備身備身左右以御刀仗升殿供奉者皆大將軍將軍率而領之而中郎將佐其職凡侍奉禁横過座前者禁對語及傾身與階下人語者禁搖頭舉手以相招召者若有口勑通事舎人承受𫝊聲於階下不聞者則中郎將宣吿之長史各一人從六品上掌判諸曹官吏之衆務事錄事㕘軍事各一人正八品上掌印發勾檢稽失兵曹㕘軍事各一人正八品下掌文武官及千牛備身備身左右之薄書及其勲階考課假使祿俸事胄曹㕘軍事各一人正八品下隋煬帝以兵曹為司兵胄曹為司鎧皇朝改之掌甲仗之事千牛備身各十二人備身左右各十二人備身一百人主仗一百五十人唐改千牛左右曰千牛備身初置備身主仗佩大横刀唐書王及善除右千牛衛將軍高宗曰朕以卿忠謹故與卿三品要職卿佩大横刀在朕側如此官貴否三品要職上六軍諸衞左右羽林軍前漢百官表武帝太初元年光祿勲期門羽林皆屬焉服䖍曰典期門本以微行後遂以名官師古曰羽林亦宿衛之官言其如羽之疾如林之多也一説羽所以為王者羽翼也武帝太初元年初置名曰建章營騎後更名羽林騎又取從軍死事之子孫養羽林官教以五兵號羽林孤兒師古曰五兵謂弓矢殳矛戈㦸羽林有令丞宣帝令中郎將騎都尉監羽林秩比二千石續漢書羽林左右監皆冠鶡冠順帝紀光武中興以征戰之士勞苦者為之故曰羽林士應劭漢官儀羽林者言其為國羽翼如林盛也一名為嚴郎言其禦侮嚴厲其後復簡取五營高材别為左右監監羽林左右騎其羽林士死子繼與虎賁同宋百官志漢東京置羽林左右監魏世不改晉罷羽林中郎將又省一監自虎賁至羽林是為三將哀帝省宋高祖永初初復置江右領營兵江左無復營兵羽林監六百石唐百官志左右羽林軍大將軍各一人正三品將軍各三人從三品掌統北衙禁兵督攝左右廂飛騎儀仗大朝㑹則同衛階陛巡幸則夾馳道為内仗六典左右羽林軍大將軍各一人正三品漢置南北軍掌衛京師南軍若今諸衛也北軍若今左右羽林也吕后崩周勃以北軍兵誅諸吕至武帝置羽林掌送從以次期門名曰建章營騎屬光祿勲置令丞以領之後更名羽林騎葢象天有羽林星主車騎也又云為國羽翼如林之盛以隴西漢陽安定北地河西上郡良家子便弓馬者為之取將軍死事之子孫養羽林官教以五兵號為羽林孤兒宣帝令中郎將騎都尉監羽林秩比二千石光武以征伐之士勞苦者及六郡良家子充之父死子代又簡五營高材别為左右監秩比六百石魏羽林監品第五晉光祿勲屬官有羽林郎將羽林左右監品第五銅印黒綬武冠綘朝服其侍陛殿著鶡尾冠紗縠单衣哀帝時桓温執政省羽林中郎將唯置一監宋高祖復置初江右領營兵及過江無復營兵齊梁陳並有羽林監後魏羽林監第六品下北齊