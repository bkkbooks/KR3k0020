body:
  text: 職官分紀卷十二宋孫逢吉撰樞密使五代史唐朝擇申官一人為樞密院使與兩軍中尉謂之四貴天祐元年廢梁開平元年改樞密院為崇政院命敬翔領使仍置判官一人自後不置判官而置副使一人二年置崇政殿直學士二員後又改為直崇政院後唐同光二年復為樞密院亦置一人凡東西院二員晉天福四年宣徽使劉處讓兼樞密使每有奏議多不稱㫖㑹處讓丁內憂乃命以樞密院印付中書門下廢樞密院開運元年復置以宰臣桑維翰兼樞密使新五代史郭崇韜安重誨傳嗚呼官失其職久矣豫讀梁宣底見敬翔李振為崇政院使凡承上之㫖宣文宰相而奉行之宰相有非其見時而事當上决者與其被㫖而有所復請者則具記事而入記事若今學士院咨報今士大夫間以文字往來謂之簡帖俚語猶謂之記事也因崇政使以聞得㫖則復宣而出之梁之崇政使乃唐樞密之職蓋出納之任也唐常以宦者為之至梁戒其禍始更用士人其備顧問參謀議于中則有之未始專行事于外也至崇韜重誨為之始復唐樞密之名然權侔于宰相矣後世因之遂分為二文事任宰相武事任樞密樞密之任既重而宰相自此失其職也國朝以樞密院與中書對持文武二柄號為二府禮遇略同今亦有東西二院印但行東院印置使副使或置知院同知院然使與知院不並置又置簽書院事同簽書院事治平元年詔樞密院季一進班簿亦令為册録春明朝退録樞密院問降宣故事具典故申院案有梁朝宣底二卷朱梁貞明三年四年事每事下有月日云臣李振宣或降官差官或宣事於方鎮等處其間有云宣頭宣命宣㫖者梁朝以樞密院為崇政院始置使以大臣領任以政事貞明年是李振為使當是以宣傳上㫖故名之曰宣而樞密所出文字之名也似欲與中書敕並行雖無所明見疑降宣始自朱梁之時晉天福五年改樞密院承㫖為承宣亦似相合其底乃底本也繫日月姓名者乃所以為底聞今仍舊名新制樞密院掌邊防機密兵符軍籍差除路分都監以上及將官諸班直內外禁軍之事筆談豫為史館檢討時樞密院劄子問宣頭所起豫按唐故事中書舍人職掌誥詔皆寫四本一本為底一本為宣此宣謂行出耳未以名書也晚唐樞密使自禁中受㫖出付中書即謂之宣中書承受録之于籍謂之宣底今史館中尚有梁宣底三卷如今之聖語簿也梁朝初置崇政殿專行密命至後唐莊宗復樞密使使郭崇韜安重誨為之始分領政事不關白中書直行下者謂之宣如中書之敕小事則發頭子擬堂帖也至今樞密院用宣及頭子本朝樞密院亦用劄子但中書劄子宰相押字在下副二以次向上以此為别頭子唯給驛馬之類則用之使唐劉季述傳初延英宰相奏事帝平可否樞密院使立侍得與聞及出或矯上㫖謂未然數改易撓權至是詔如大中故事對延英兩中尉先降樞密使候㫖殿西宰相奏事已畢案前受事李師䖍請於屏風後録宰相所奏帝以為侵官不許五代史後唐同光元年中門使郭崇韜昭義監軍張居翰為樞密使唐以宦者為之其職甚微至此始參用士人與宰相權任均矣晉天福四年廢樞密使開運元年復置用顯德末魏仁浦吳廷祚為樞密使國朝建隆三年以樞密副使兵部侍郎趙普為檢校太保充樞密使不帶正官自普始開寶九年以曹彬為樞密使領忠武軍節度使帶節度自此始太平興國六年以樞密副使刑部侍郎石熙載為户部尚書充樞密使以文資正官充使自此始大中祥符中以吏部尚書知樞密院事王欽若户部尚書知樞密院事陳堯叟並依前守本官檢校太傅同中書門下平章事充樞密使儒臣充樞密使兼使相自欽若等始天禧五年樞密使檢校太師同平章事曹利用加僕射時天章閣成丁謂馮拯並進秩利用止加開府階邑千户實封四百户翌日貼麻加正官慶厯二年七月以宰臣吕夷簡判樞密院事章得象兼樞密使晏殊充樞密使以宰臣兼其任也九月改吕夷簡兼樞密使時議者以二府體均判總之名本重故改之歸田録嘉祐二年樞密使田况罷為尚書左丞觀文殿學士兼翰林侍讀學士罷樞密使當降麻而止以制除蓋往時高若訥罷樞密使所除官職正與田公同亦不降麻遂以為故事春明朝退録文臣為樞密使皆帶檢校太尉太傅兼本官乾興元年錢文僖以兵部尚書為樞密使不帶檢校官有司之失也漢乾興中除樞密使始降麻如將相之制本朝循之石元懿罷為僕射亦降麻高文莊田宣簡吕寶臣罷止舍人院出告皇祐五年五月以樞密使高若訥為尚書左丞觀文殿學士兼翰林侍讀學士同羣牧制置使故事罷樞密使當學士院降麻及若訥罷但令舍人院草制遂以為例續翰林志舊體樞密使未帶使相者不宣麻至周太祖初潛歷試是任乃宣麻於公朝令宣麻自此始也朝服侍上唐昭宗初即位有事于圜丘宿齊于武德殿時兩中尉兩樞密皆朝服侍上事具內侍省門負氣寡識五代史楊邠魏州冠氏人少以吏給事使府後唐租庸使孔謙領度支補兵勾押官漢高祖鎮鄴以為都押衙高祖鎮太原益加親信漢國建遂以邠權樞密使隱帝即位加邠中書侍郎兼吏部尚書同平章事仍兼樞密使凡南衙奏事中書除命如不出邠意至于一簿一掾亦不聽從時侍衛親軍都指揮史𢎞肇恣行慘酷邠稱𢎞肇之善邠嘗與三司使王章於御前論事隱帝曰事行之後勿俾有詞邠曰陛下但禁聲有臣等在左右聞者縮頭其負氣寡識如此乾祐三年邠與史𢎞肇王章入朝同坐廣政殿東廡下俄有甲士數十人自內而出害𢎞肇與邠及王章於門內並夷其族指改詔書救千人濫死張居翰掖庭令張從政之養子同光中為樞密使僞蜀王衍既降詔遷其族於洛陽行及秦川時關東已亂莊宗慮衍為變遣中官馳騎賫詔毅之詔云王衍一行並宜殺戮其詔已經印書時居翰在密地覆視其詔乃揩去行字改為家字及衍就戮於秦川驛止族其近屬而已其僞官及從行者尚千餘人皆免其枉濫居翰之力也賜劵恕死莊宗入汴拜郭崇韜為侍中監修國史兼樞密使及郊祀畢以崇韜兼領鎮冀節度使進封郡公賜鐡劵恕十死收奬人士悉獻家財崇韜既位極人臣權兼內外謀猷獻納必盡忠規士族朝論頗亦收奬人物內外翕然稱之初收汴洛稍通賂遺親友或規之崇韜曰余備位將相祿賜巨萬但僞梁之日遺賂成風今西方藩侯多梁之舊將皆吾射鈎斬袪之人也一旦革面化為吾人堅拒其賄得無懼乎藏余私室無異公帑及禋郊崇韜悉獻家財以助賞給卧帳中召問計崇韜初事武皇為典謁莊宗嗣位尤器重之莊宗即位於魏州以崇韜為樞密院使是時魏州陷於梁澶相之間寇盜日至民流地削軍儲不給羣情洶洶以為霸業終不能濟崇韜寢不安席莊宗計無所出崇韜身先督衆四面拒戰有急即應莊宗憂之問進取之䇿李紹宏請棄鄆州與汴人盟以河為界莊宗不恱獨卧帳中召崇韜問計崇韜曰汴之精兵盡在段凝麾下冦鄆境據河壖謂我不能南渡志在收復汶陽此汴人之計也陛下親御大軍長驅倍道直指大梁汴城兵望風自潰既若僞王授首賊將自然倒戈半月之間天下必定莊宗蹶然而興曰正合吾意莊宗入汴皆崇韜之謀也市不改肆崇韜為樞密使從魏王平蜀大軍入西川城戒諸軍剽掠令法嚴峻掠一錢必論之以法市不改肆奏不按問匿名文字長興三年邢州汝州戍兵還見訖於殿庭遺下匿名文字書論本指揮元霸率斂人錢物帝令侍衛指揮使張從賔按問樞密使范廷光奏曰匿名文字准格不治禁訟端也不宜按問乃止出玉帶與覘者安重誨為樞密使兼侍中户部尚書李鏻曰安重誨欲為宰相人望非允鏻乃引楊溥諜者見重誨曰楊溥欲歸國久矣若朝廷遣諭之可以召也重誨信之因出玉帶與覘者令歸王估其值數千緡經嵗無所聞竟成虛語不曉文義明宗本案此下原闕副使五代史梁崇政院置副使一人周末闕國朝建隆元年始以樞密直學士趙普為兵部侍郎樞密副使三月以宣徽北院使李處耘為南院使兼樞密副使自五代以來凡樞密院皆參用文武大中祥符七年以王嗣宗曹利用並為檢校太保充樞密院副使不帶正官任數好詐非廊廟器國朝王沔臨事明察有通時之用頗苛碎深刻不以至誠待人能阿意希㫖以自圖祿位與張齊賢同任樞密副使頗不協及齊賢參政沔心不自安㑹王禹稱上言中書本㕔不得接見賔客須於政事堂同見沔心喜即可下其事有謝泌上疏極論事遂止上益知沔任數好詐非廊廟器詔書切責遂罷之沔捧詔求見上涕泣不願離左右及歸私第不數夕鬢鬚盡白俄詔同修京朝官考課吐蕃進馬請厚遺曹利用拜樞密副使時吐蕃丘遵進馬輔臣以丘遵貪貨請納所貢給之利用曰既不足以抑僥幸而徒失懷逺之意不若厚遺時論多之士大夫酌酒相賀慶厯初朝廷方議委韓琦范仲淹四路入討元昊大懼上表稱藩上謂大臣曰朕非不能以天下力誅此小戎然朕為天下豈與區區較曲直哉昔三聖之不輕治其務息兵以安吾民遂召琦仲淹為樞密副使琦等凡五上表堅辭上曰吳賊納欵皆仲淹之力况已曽令內臣陳舜封傳宣候邊事寧息用在兩府不可從其所請仲淹等表答詔不允遂入二樞極天下聞之欣然士大夫皆酌酒相賀曰上用韓琦范仲淹非惟社稷之福乃天下生民之幸也王疇資望輕淺治平三年王疇為樞密副使於是知制誥錢公輔言疇資望輕淺在臺素餐不可任大用疇既為韓琦歐陽修所左右而上又愛信疇故公輔坐黜為團練副使疇在位五十五日卒上甚悼惜之知院事同知院事五代史晉天福元年掌書記桑維翰翰林學士尚書禮部侍郎知樞密院事周顯德六年命司徒平章事范質禮部尚書平章事王濤並參知樞密院事國朝元祐令知樞密院事同知樞密院事為執政官正二品淳化二年樞密使王顯出鎮隨州副使宣徽北院使張士遜知院事副使右諫議大夫溫仲舒寇凖同知院事同知院之名自此始也士遜等並自舊帶副使自後或以次正官或檢校官為之秩與副使同置樞密使副或置知院同知院然使與知院不並置大中祥符三年七月以溫仲舒為諫議大夫樞密副使㑹張士遜知樞密院即以為同知院事蓋使則置副知院則置同知院熙寧元年文潞公吕宣徽為使而陳丞相自越州召為知院前一嵗陳丞相為副使位在吕公之上故也就翊洪樞國朝元祐四年六月趙瞻拜同知院事詔贊一人之休必資耆德握萬兵之本爰賴舊臣蓋知其要者可以應務而不窮久于事者可以臨事而無惑云云宜須故老就翊洪樞簽書院事同簽書院事國朝太平興國四年以兵部員外郎石熙載為樞密直學士簽書樞密院事簽書之名自此始也天禧四年以華州觀察使曹瑋為宣徽北院使鎮軍國留後簽書樞密院事簽書兼藩鎮自此始也春明退朝録太平興國四年石元懿始以樞密直學士簽書院事八年張司空齊賢王公沔並以諫議大夫同簽書樞密院事景德三年馬正惠以檢校太傅韓公崇訓以檢校太保並簽書樞密院事治平二年令郭宣徽為同簽書院事權發遣院事五代史唐天祐元年廢樞密院其公事令王商權知後唐若樞密皆罷即命官權掌焉國朝咸平三年兵部侍郎參知政事向敏中權發遣樞密宣徽院公事時王欽若陳堯叟馬知節皆罷冦凖未謝故也都承㫖承㫖㫖副承副都承㫖㫖諸房副承五代有承㫖副承㫖以諸衛將軍充國朝樞密院承㫖司有樞密都承㫖又有樞密院副承㫖諸房副承㫖之名皆不備置常以一二員通掌諸房公事每崇政殿臨决庶務則侍立殿前侍衛司奏事則受而讀之太平興國七年四月以翰林副使管勾供奉官殿直三班承㫖公事楊守一為西上閣門使充樞密院都承㫖樞密承㫖加都字自守一始也熙寧三年九月詔近復以士人為樞密院都承㫖歷年不除樞密院接遇及所領職事都無可考驗可令史院檢尋如無即令中書詳定以聞五年七月以尚書比部員外郎集賢校理同修起居注曾孝寬為起居舍人充史館修撰兼樞密都承㫖舊以本院久吏遞遷或用士人亦止於右職中選用文館兼領自孝寬始也元祐官品令樞密都承㫖從五品承㫖副都承㫖正六品副承㫖正七品諸房副承㫖正八品易詔激將士心國朝魏仁溥傳周祖鎮鄴乾祐末隱帝用武德使李業等謀誅大臣楊邠史𢎞肇等密詔澶帥李洪義殺騎將王商令郭崇殺周祖洪義知事不克與商合謀密遣副使陳先德賫詔于周祖周祖得之懼計無所出召仁溥入畫堂中示以詔謂之曰朝廷將殺我我不懼死念麾下將士始終從我我若引决則渠輩將安往乎仁溥曰侍中有大功於朝廷握強兵臨重鎮一旦君上信讒圖害勳臣雖欲剖心自明不可得也時事如此豈可坐以待死今詔始至外無知者莫若易其詔以盡誅將士為名用激其心豈獨自免非辜亦可以雪楊史之寃周祖納其䇿倒用留守印易詔書以示諸軍衆心懷怒遂長驅渡河即位以仁溥為樞密副承㫖周祖嘗問諸州屯兵之數及將校名氏令取簿參視之仁溥曰臣悉能記之遂口占而疏於紙舉籍以校一無差誤逐房副承㫖國朝兵房副承㫖二人吏房一人户房一人禮房一人淳化四年六月以禮房副承㫖段延禧為威勝軍節度行軍司馬先是諸房主事嵗久多授雄望上佐其勒留但賦祿而已延禧以老病出為藩鎮上佐優之也官品令樞密院逐房副承㫖從八品主事令史書令史國朝主事以上並帶諸衛將軍同正主事以下初命者𨽻銀臺司主事五人令史二十四人書令史三十二人兵房掌兵馬名籍及卒校遷補修築城壘防戍戰守之事主事二人令史十三人書令史二十人分掌吏房掌閣門以上遷補之名籍王公將帥迎授恩命及盜賊之事主事一人令史三人書令史五人分掌户房掌金榖芻糧出納之事主事一人令史史各五人分掌案書令令史下原闕二字禮房掌禮儀國信之事主事一人令史三人書令史二人分掌元祐官品令樞密院主事令史書令史從八品能記用兵之數魏仁浦傳漢祖起太原次鞏縣仁浦迎謁道左即補樞密院令史時周祖掌樞密引仁浦問以用兵之數仁浦悉能記之手疏得六萬人周祖喜曰天下無足憂也遷兵房主事制置兵馬司國朝擇副承㫖主事以下專掌之檢詳官國朝熙寧四年十月詔以編修經武要略官王存等四人檢詳樞密院諸房文字除存已升朝外陳侗劉奉世係京官與換太子中允選人蘇液改著作佐郎禮遇添給白直人從看謁之禁視中書檢正官帶館職及本院編修文字依舊外餘差遣並罷存檢詳兵房侗奉世仍不隔磨勘存辭以母老乃改差祕書丞朱明之五年四月詔罷樞密院檢用官杜絃歸編敕所諸房條例皆檢詳官檢用七年十月詔檢詳官除已有兼領差遣外劄與中書依檢正例與主判差遣後檢正罷兼領檢詳亦罷編修條例國朝慶厯四年二月命天章閣侍講史館檢討王洙樞密都承㫖車士寧編修例册嘉祐二年八月詔編集樞密院機要文字命樞密副使程勘提舉編集尚書都官員外郎楊構刑部詳覆官大理寺丞周革樞密院諸房副承㫖元仁政內殿承制于可久户房主事段承圭㸃檢編排自建隆以來至六年編成計一千一百六十二册三年十二月樞密院上端拱以來宣敕劄子六十卷目録二册治平元年閏五月詔樞密院班簿季一進者今為册録二年五月樞密院編機要文字九百八十一册以進賞執事有差熙寧二年五月樞密院乞將祖宗以來法制所宜施於逺者並刪取大㫖著為畫一及聖政釐革條章以次紀録或有條理未備更詳核所說冀得以考求其事目曰兵制凡招陳屯戍訓練之類皆附焉曰馬政曰邊防曰夷狄曰屬國曰守城曰器械曰捕盜曰選材曰責效各以其事類相從一如兵制候編成册仍於逐門各留空紙以備書載將來處置事件詔以經武要略為名三年十一月命著作佐郎館閣校勘王存陳侗大理寺丞館閣校勘顧臨並差編修樞密院經武要略刪定諸房例册以樞密院副承㫖李綬管勾至九年秋修畢上之宣徽使南院使北院使五代唐置宣徽使始以宦者為之故楊復恭自河陽監軍入為宣徽使天祐元年留宣徽使南北院等九使餘並停二年廢樞密院及宣徽南北院其樞密院公事令王殷權知兩院人吏並勒歸中書其諸司諸道人並不得到宣徽院凡有公事並於中書論請梁復以王殷為宣徽使省南北院使而有副使後唐復南北院使省副使晉漢周皆因之國朝舊制二使通掌院事共院異㕔止用南院印以檢校官為之或領節度兩使留後南院資望比北院頗優或兼樞密亦掌本院事開寶九年二月以山南東道節度使潘美為檢校太傅依前山南東道節度使充宣徽北院使節度領宣徽自此始八月以樞密副使楚昭輔權宣徽南院使以右衛大將軍判三司王仁瞻權宣徽北院使景德四年十二月承天節百官上壽於崇德殿宣徽使當宣答時知樞密院王欽若權宣徽使事欽若在病假樞密院陳堯叟復以故不入宰臣議以參知政事權宣答真宗曰宣徽使三司使皆不坐可令丁謂攝事是日欽若徑入朝謂雖承敕不復攝事至道元年出宣徽北院使知樞密院柴禹錫為鎮寧軍節度使太宗謂之曰舊制自宣徽出不過防禦使朕今委爾節旄亦可謂優恩也三年以內客省使周瑩為北院使先是班位在樞密副使之上瑩復白中書請居其下宰相為言之真宗從之後以為例慶厯八年三月以殿前副都指揮使寧武軍節度使李昭亮為宣徽北院使自殿前司遷此國家恩例也皇祐二年九月詔今後宣徽使不得過二員至和元年十月殿中侍御史趙抃言近非次除宣徽使節度使頗為煩數竊以二者使額在唐季則付與容易欲乞今後文臣須曾歷中書樞密院任用加之德望為人推服武臣曾經邊鄙建立功業者方許除拜兼宣徽使元額只是二員至如使相之任體貌尤重更當慎惜望以臣言付兩府議定執守施行九年六月詔宣徽使今後遇以職事侍殿上或值中書樞密院合班問聖體及非次慶賀並特許叙二府班從宣徽北院使王拱辰之請也空使宅以待春明退朝録夏鄭公為宣徽使忠武軍節度使自河中府徙判蔡州道經許昌時李邯鄲為守乃徙居他所空使宅以待之夏公以為知體編修條例國朝熙寧九年五月宣徽北院使王拱辰言本院前後所降宣劄條例文字及逐旋聖㫖指揮不可遺墜乞行編録所貴朝廷故事永久可備檢用從之六月拱辰辟著作佐郎何洵直充編修官就本院置局十年八月編成條例并目二十五册上之十二月罷局洵直减一年磨勘職官分紀卷十二
