body:
  text: 職官分紀卷十六宋孫逢吉撰祕書省後漢桓帝延熹二年置祕書監官晉職官志祕書監案漢桓帝延熹二年置祕書監後省魏武為魏王置祕書令丞及文帝黃初初置中書令典尚書奏事而祕書改令為監後以何禎為祕書丞而祕書先自有丞乃以禎為祕書右丞及晉受命武帝以祕書并中書其祕書著作之局不廢惠帝永平中復置祕書監其屬官有丞有郎并統著作省沈約宋書百官志祕書監丞各一人魏武帝建國有祕書令左右丞黃初中分祕書立中書而祕書之局不廢昔漢武帝建藏書之策置寫書之官於是天下文籍悉在天祿石渠延閣廣內祕府之室謂之祕書至成哀世使劉向父子以本官典其事至於後漢則圖籍在東觀有校書郎又有著作郎傅毅馬融之徒多為校書郎又蔡雍從尚書郎選入東觀著作雍既已為尚書郎而入東觀著作復拜議郎知是著作郎又碩學達官往往典校祕書如向歆故事故但校書東觀或有兼撰漢記也王肅論祕書不應屬少府表曰魏之祕書即漢之東觀郡國諸書悉云上東觀且自大魏分祕書而為中書以來傳緒相繼於今二監未有言屬於少府者也今欲使臣編名於騶從言事于外府不亦隳朝制而辱國典乎太和中蘭臺祕書爭儀三府奏議祕書司先王之載籍掌制書之典與中書相亞與中書為官聫隋百官志梁祕書省置監丞各一人郎四人掌國之典籍圖書著作郎一人佐郎八人後齊祕書省典司經籍監丞各一人郎中四人校書郎十二人正字四人又領著作省郎二人佐郎八人校書二人隋祕書省監丞各一人郎四人校書郎十二人正字四人録事二人領著作太史二曹唐職官志祕書省監一員從三品監之名後漢桓帝置魏晉不改後周謂之外史下大夫隋後為祕書監從第一品煬帝改為祕書令武德復為監龍朔改為蘭臺太史天授改為麟臺監神龍復為祕書監少監二員從四品上少監隋煬帝置龍朔改為蘭臺侍郎天授為麟臺少監神龍復為祕書少監比置一員太極初增置一員六典祕書省監一人從三品周禮春官太史掌建邦之六典又小史掌邦國之志定繫代又外史掌四方之志三王五帝之書並祕書之任也秦則博士官所職禁人藏書漢氏除挾書之律開獻書之路置寫書之官又令謁者陳農求遺書於天下故文籍往往而出並藏之書府在外則有太常太史博士掌之內則有延閣廣內石渠之藏又御史中丞在殿中掌蘭臺祕書圖籍又未央宫中有麒麟閣天祿閣亦藏書劉向揚雄典校皆在禁中謂之中書猶今言內庫書也後漢則藏之東觀亦禁中也桓帝延熹二年始置祕書監屬太常掌禁中圖書祕記故曰祕書漢官云祕書監一人秩六百石魏武為魏王置祕書令典尚書奏事即中書之任也兼掌圖書祕記文帝黃初中分祕書立中書因置監令乃以散騎常侍王象領祕書監撰皇覽魏氏蘭臺亦藏書御史掌焉魏略薛夏六蘭臺為外臺祕書為內閣是也魏初祕書屬少府及王肅為監以為祕書之職即漢東觀之任安可復屬少府自此之後不復屬焉至晉武又以祕書并入中書惠帝永平元年詔祕書典綜經籍考校古今中書自有職務逺相統攝于事不専冝令復别置祕書寺掌中外三閣圖書自是祕書寺始外置焉晉令六品第五絳朝服銅印墨綬進賢兩梁冠佩水蒼玉宋齊同晉氏梁改為省與尚書中書門下集書為五省祕書監增秩中二千石品第三後制十八班祕書監班第十一陳依梁後魏亦以祕書為五省之數監初從第二品中太和末正第三品北齊依魏後周春官府置外史下大夫掌書籍此祕書監之任也隋祕書與尚書門下內史殿中為五省祕書監正三品煬帝降為從三品後改為令武德初改為監龍朔二年改為蘭臺其監曰蘭臺太史咸亨元年復舊天授初改為麟臺監神龍元年復舊少監二人隋煬帝三年置一人從四品掌二祕書監之職其後改為少令皇朝因隋為少監餘同唐百官志祕書監之職掌邦國經籍圖書之事有二一曰著作二曰太史皆率其屬而修其職凡四部之書必立三本曰正本副本貯本以供進內及賜人凡敕賜人書無本皆别寫以給之少監為之二國朝舊有太史局歸於司天監淳化元年詔祕閣次三館祕書省仍𨽻京百司監丞郎校書郎正字著作郎佐郎官名皆仍其舊惟無定員及不専職本省之務分蒞中外之任監闕即以朝官判祕閣官兼充大中祥符九年詔祕書監楊億判閣兼祕書省事億為正監不當更言判省閣有司誤也元祐四年七月祕書省官三年為一任依舊法關升不用舉主御史為鄰漢初御史中丞掌蘭臺祕書圖籍之事至魏晉其制猶存故歷代營都邑置府寺必以祕書省及御史臺為鄰麒麟殿三輔黃圖未央宫東麒麟殿藏祕書即揚雄校書之所也羣玉之山穆天子傳穆天子西登崑崙見西王母又曰登已至於羣玉之山先王所謂策府也東壁石氏星經東壁之星主文籍藝臺魚豢典略藝香辟紙魚蠧故藏書臺稱藝臺又曰蘭臺也用祕書署璽藏室華嶠後漢書學者稱東觀為老氏藏室道家蓬萊山王融曲水詩序云記言事于仙室謂藏室也蓬山仙室上監後漢以下沿革并見祕書省門國朝元祐官品令祕書監正四品正官書晉書張華嘗徙居載書三十乘祕書監摯虞撰定官書皆資華本以取正不願為侍臣王𨼆晉書羊祜為黃門郎陳留王立以少帝不願為侍臣徙為祕書監著魏書王沉為祕書監著魏書多為時諱而善序事撰次汲冢書晉諸公讃荀勗領祕書監太康二年汲郡冢中得竹書朂躬自撰次注寫以為中經列於祕書經傳闕文多所證明幽譛符命庾峻自司空長史轉祕書監幽讃符命天文地理因有述焉掌祕奧宣明史籍溫嶠舉荀嵩為祕書監曰夫國史之興將以明得失之迹謂之實録使一代之典煥然可觀散騎常侍嵩文質彬彬思義通博歷任先朝蒞事以穆宜掌祕奧宣明史籍蘭臺之官王充論衡蘭臺之官監國得失簡嚴能檢下魏王肅表曰青龍之末王者所選祕書監詔祕書騶史以上三百餘人非但學問又當簡威嚴能檢下者詔肅以常侍領焉自負宿名意每怏怏栁粲晉記華談為祕書監自負宿名意每怏怏嘗從容謂上曰臣已老矣將待死祕閣汲黯之言復存于今帝不悅著三國陽秋晉中興書孫盛為祕書監篤尚好學自少及長手不釋卷既居史官乃著三國陽秋按本傳著魏氏春秋晉陽秋晉陽秋詞直而理正咸稱良史焉有良史之志華嶠集詔曰尚書嶠體素𢎞簡文雅該通歷覽古今博文多識著書實録有良史之志轉為祕書監其加散騎常侍班同中書寺為內臺使中書散騎著作及治體音律天文數術南省文章門下撰集皆典領之嶠表伏見詔書以臣為祕書監加位常伯昔劉向父子世典史籍馬融通博三入東觀非臣膚淺所敢投迹云云劉向世典史籍上馬融三入東觀上天閣寶祕南史何憲字子思博涉該通羣籍畢覽天閣寶祕人間散逸無遺漏焉任昉劉渢共執祕閣四部書試問其所知自甲至丁書說一事并叙𫐠作之體連日纍夜莫見其所遺渢音馮人間散逸無遺漏上手自讎校梁任昉字彥升為祕書監自齊永元以來祕閣四部篇卷紛雜昉手自讎校由是篇目定焉中祕二省多諸文士後魏世祖欲拜伊馛為尚書兼郡公馛辭曰尚書務殷公爵至重非臣年少愚近所冝倚任請收過恩世祖周其所欲馛曰中祕二省多諸文士若恩矜不已請參其次世祖賢之遂拜為中護將軍祕書監馛音跋書有五厄隋書開皇初祕書監牛𢎞以典籍遺逸上表請開獻書之路曰昔周德既衰舊經紊棄孔子以天聖之才開素王之業憲章祖𫐠制禮刋詩正五始而修春秋闡十翼而𢎞易道及秦皇馭㝢吞滅諸侯先王墳籍掃地皆盡此則書之一厄也漢興建藏書之策置校書之官至孝成之世遣謁者陳農求遺書於天下詔劉向父子讎校篇籍漢之典文於斯為盛及王莽之末並從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅肅宗親臨講肄和帝數幸書林其蘭臺石室鴻都東觀祕書填委更倍於前及孝獻移都吏民擾亂圖書絲綿皆取為帷囊所收而西裁七千餘卷屬西凉大亂一時燔蕩此則書之三厄也魏文代漢更集經典皆藏祕書內外三閣遣祕書郎鄭默刪定舊文時之論者美其朱紫有别晉氏乘之文集尤廣晉祕書監荀朂定魏內經更著新簿屬劉石憑凌從而失墜此則書之四厄也永嘉之後寇竊競興其建國立家雖傳名號憲章禮樂寂滅無聞劉裕平姚收其圖籍五經子史才四千卷皆赤軸青紙文字古拙并歸江左宋祕書丞王儉依劉氏七略撰為七志梁人阮孝緒亦為七録總其書數三千餘卷及侯景渡江破滅梁室祕省經籍雖從兵火其文德殿內書史宛然猶存蕭繹據有江陵遣將破平侯景收文德之書及公私典籍重本七萬餘卷悉送荆州及周師入郢繹悉焚之於外城所收十才一二比則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基關右軍車未息保定之始書止八千後加收集方盈萬卷高氏據有山東初亦採訪驗其本目殘闕彌多及東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御書單本合一萬五千餘卷部帙之間仍有殘闕比梁之舊目止有一半至于隂陽河洛之篇醫方圖譜之說稱復為少臣以經書自仲尼迄仐數遭五厄興集之期屬膺聖代今祕藉見書亦足披覽但一時載籍須令大備不可王府所無私家乃有若猥發明詔兼開購賞則異典必致館閣斯積上納之於是下詔獻書一卷賚絹一匹一二年閫篇集稍備刻木偶置之於座栁誓煬帝嗣位拜祕書監退朝之後便命入閣言晏諷讀終日而罷帝每與嬪后對酒時逢興㑹輒遣命之至與同榻共席恩若友朋帝猶恨不能夜召于是命刻木偶人施關機能坐起拜伏以象于誓帝每月下對酒輒令宫人置之于座與相酬酢而為歡笑按隋書作栁𧦬未詳𧦬音辨校定四部書唐魏徴遷祕書監奏引學者校定四部書自是祕府圖籍粲然畢備參預朝政徵為祕書監參預朝政博識虞世南為祕書監太宗重其博識每幾務之隙引之談論共觀經史每論及古先帝王為政得失必存規諷竒書難字顔師古拜祕書少監専典刋正所有竒書難字衆所共惑者隨疑剖晰曲盡其原稱祕書外監祕書監賀知章性放曠晚年尤加縱誕自號四明狂客又稱祕書外監遨逰里巷醉後屬辭動成卷軸文不加㸃皆有可觀天寶三載知章上疏請度為道士求還鄉里仍捨本鄉宅為觀上許之御製詩以贈行三教談論白居易自蘇州召拜祕書監賜金紫文宗誕日召居易與僧惟澄道士趙常盈對御講論于麟德殿居易論難鋒起辭辨泉注上所罕覯深嗟異之詠石榴詩孔紹安大業末為監察御史時高祖為隋討賊於河東詔紹安監高祖之軍深見接遇及高祖受禪紹安自洛陽間行來奔高祖見之甚悅拜內史舍人時夏侯端亦嘗為御史監高祖軍先歸朝授祕書監紹安因侍宴應詔詠石榴詩曰祗為時來晚開花不及春時人稱之祕府無事國朝至道中賈黃中自澶州受代赴闕先豐碩雄壯自是頓羸瘵鬱若枯藤上憐之拜禮部侍郎兼祕書監以黃中素嗜文籍而祕府無事擾之也疾愈求朝謁大中祥符七年祕書監分司西京楊億以疾愈求朝謁上因曰億文學鮮偕然或言其好切議朝政王旦曰億受國深恩非土木類或談謔過當則有之訕讟之事恐不為也諌戲作艷詩唐虞世南為祕書監太宗謂侍臣曰朕因暇日每與虞世南商略今古朕有一言之善虞世南未嘗不悅有一言之失未嘗不恨悵朕嘗戲作艷詩虞世南便進曰聖作雖工體制非雅上之所好下必隨之此文一行恐致風靡輕薄成俗非為國之利賜令繼和輒申狂簡而今之後更有斯文繼以死請不敢奉詔其懇誠若此朕用嘉焉羣臣皆若虞世南天下何憂不治因顧謂虞世南曰朕更有此詩卿能死否虞世南對曰臣聞詩者動天地感鬼神上以風化下下以風刺上故季札聽詩而知國之興廢盛衰之道實繫於兹臣雖愚談願不奉詔太宗大悅賜絹五十匹少監沿革見祕書省門國朝元祐官品令祕書少監從五品卧振高風唐蕭德言以年老請致仕太宗不許詔曰頃年以來天下無事方欲建禮作樂偃武修文卿年齒已衰教將何恃所兾才德兼茂卧振高風使濟南伏生復在於兹日關西孔子故顯於當今拜祕書少監兩宫禮賜甚厚與父並命趙宗儒字秉文拜右拾遺翰林學士時父曄祕書少監與父並命出於一日當時榮之參預政事周思茂自右史轉太子舍人典履永在禁中最䝉親遇至于政事損益多所參預纍遷麟臺少監崇文館學士垂拱四年下獄死以儒素見稱王紹宗為祕書少監仍侍皇太子讀書紹宗性淡雅以儒素見稱當時朝廷之士咸敬慕之張易之兄弟亦加厚禮易之伏誅紹宗坐廢領史職者不宜為諫官德宗以左諫議大夫史館修撰張薦為祕書少監修撰如故時裴延齡貴欲異同宰府乃言於上曰諫議大夫論朝廷得失之官史館修撰書朝廷得失之事則領史職者不宜為諫官故有是命丞魏志武帝置祕書左右丞以劉放為左丞孫資為右丞王肅表陛下垂意於稽古留神於墳典故轉臺郎公府茂才以左右丞若自今後詔郎皆依丞選見㑹威儀使有常秩則人樂祕書之職矣建安二十三年祕書丞郎比侍御史下節度比蘭臺令史此為丞郎宜亞侍御史而今位在符節郎下符節郎秩三百石祕書丞秩四百石高秩在下違賤貴之宜符節郎在上失內外之叙臣愚以為祕書職於三臺為近密中書郎在尚書丞郎上祕書丞郎冝次尚書郎下不然則冝次侍御史下祕書丞郎俱四百石遷冝比尚書郎出亦宜為郡此陛下崇儒術之盛事也晉職官志見祕書省門齊職儀祕書丞銅印墨綬按通典晉後署祕書丞銅印墨綬進賢一梁冠絳朝服宋為黃綬餘與晉同齊梁尤重陳隋印綬與齊同歷代皆有隋百官志見祕書省門新唐百官志祕書丞一人從五品上六典祕書丞一人從五品漢獻帝建安中魏武為魏王置祕書令及二丞與尚書奏事並中書之任也魏志劉劭建安末自祕書郎轉祕書丞是也魏文黃初中分祕書立中書以祕書左丞劉放為中書監祕書右丞孫資為中書令而祕書丞一人秩四百石魏志云何禎文帝時上許都賦帝異之公車徴到為祕書郎後月餘禎關事帝問外吾本用禎為丞何故為郎案主者罪遂改為丞時祕書丞尚未轉遂以禎為右丞晉武并祕書入中書謂之中書祕書丞惠帝又置祕書丞二人晉令祕書丞品第六銅印墨綬進賢一梁冠絳朝服晉書稱桓石綏為祕書丞啓校四部圖書宋齊並一人品服同晉氏梁增品第五秩六百石銅印黃綬陳依梁後魏祕書丞一人正第五品上北齊因之後周春官府有小外史上士之職蓋比祕書丞之任也隋氏祕書丞一人正五品龍朔曰大夫掌判省事國朝元祐官品令從七品分領著作事後魏李彪字道固遷祕書丞分領著作事自文成帝己未至於太和崔浩高允著述圖書編年叙録為春秋體遺落時事彪與祕書令高祐始奏從事遷固體創為紀傳表志之目焉按本傳但云奏著作事無分領文職近日月魏王肅論祕書表云青龍中議祕書丞郎與博士議郎同職近日月宜在三臺上祕書丞郎宜比尚書丞郎數奏文賦魏略嚴苞黃初中以高才入為祕書丞數奏文賦帝異之天水薛宣聲薛夏字宣聲天水人也博學有才天水舊有姜閻任趙四姓常推於郡中而夏為單家不為降屈四姓欲共治之夏乃逰逸東詣京師太祖宿聞其名甚禮遇之文帝又嘉其才黃初中為祕書丞帝每與夏摧論書傳未嘗不終日也每呼之不名而謂之薛君夏居甚貧帝又顧其衣薄解所御衣袍賜之其後征東將軍曹休來朝時帝方與夏有所咨論而外啓休到帝引入坐定帝顧夏言之于休曰此君祕書丞天水薛宣聲也宜共談其見遇如此遍觀古今王隱晉書庾峻字山甫少好學有才思轉祕書丞遍觀古今聞見益廣平簡溫敏有文思山濤啓事選祕書丞宜如聖㫖此局有數百吏雖各有課限聞不能齊整梁韓足正法禁諸郎皆悉學士是以舉嵇紹平簡溫敏有文思帝曰紹如此便可為丞不足復郎也咨出處袁彥伯名士傳山濤舉嵇紹為祕書丞紹語出處于濤曰為君思之久矣天地四時猶有消息况於人乎移書蘭臺魏略薛夏為祕書丞常以公事移蘭臺蘭臺自以臺也而祕書署耳謂夏為不得儀也推使當有坐者夏報之曰蘭臺為外臺祕書為內閣臺閣一也何不相移之有蘭臺屈無以折遷中書郎晉中興書桓𦙍少知名初拜祕書丞遷中書郎多書之家分局採借晉陽秋王謐為祕書丞乃表前尚書殷兖中書郎張敞太子衛率郗儉之故太常相石秀多書之家請祕書郎分局採借右丞自何禎始虞預晉書何禎字元幹為尚書郎時詔參祕書丞祕書本有一丞于是遂以禎為右丞右丞之置自何禎始也此職宜得才人魏明帝用何禎為祕書丞敕六此職宜得才人每卒問近對者以何禎處也卒問近對上繆以為郎文士傳何禎為許都賦封上帝異之下公車特徴到用為尚書郎詔用為祕書丞主者繆以為郎後月餘禎關事上問曰吾本用禎為丞何故為郎案主者罪遂為丞若野鶴之在雞羣晉嵇紹中散大夫康之子也山濤領選啓為祕書郎武帝謂濤曰如卿所言乃堪為丞何但郎也乃發詔徴之起家為祕書丞紹始入洛或謂王戎曰昨於稠人中始見嵇紹昂昂然若野鶴之在雞羣文翰勤慎魏志涿郡劉放字子棄太原孫資字彥龍資幼而岐嶷謁業太學博覽傳記同郡王允一見而竒之友人河東賈逵謂資曰足下抱逸羣之才應太祖辟署功曹舉計吏尚書令荀彧見資歎曰北州承喪亂已久謂其賢智零落今日乃復見孫計君乎云云魏國既建與劉放俱為祕書郎文帝即位放資轉為左右丞放為祕書左丞資為祕書右丞數月放徙為令黃初初改祕書為中書以放為監以資為令評曰劉放文翰孫資勤慎並管喉舌權聞當時依七略撰七志齊書王儉字仲寶為祕書丞上表求校墳籍依七略撰七志四十卷獻之第一官梁劉孝綽除祕書丞武帝曰第一官當與第一人天下清官張率字士簡遷祕書丞武帝謂曰祕書丞天下清官東南望胄未有為之者今以相處為卿定名譽著晉諸公讃世語傅暢字世道為祕書丞沒在胡中著晉諸公讃及晉公卿禮秩故事學行當今無比隋姚察江左人仕至尚書陳士入隋為祕書丞别敕成梁陳二史文帝指謂朝臣曰聞姚察學行當今無比我平陳惟得此一人惟得此一人上郎晉職官志惠帝永平中復置祕書監其屬官有郎晉令祕書郎掌中外三閣經書覆校殘闕正定脫誤沈約宋書梁祕書郎四人後漢校書郎也隋百官志梁祕書郎四人掌國之典籍圖書餘見祕書省門新唐百官志祕書郎三人從六品上掌四部圖書以甲乙丙丁為部皆有三本一曰正二曰副三曰貯凡課寫功程皆分判六典祕書郎四人從六品上魏武置祕書郎秩四百石魏起居注青龍中議祕書丞即職近日月宜居三臺上亞尚書丞郎晉令祕書郎中品第六進賢一梁冠絳朝服晉起居注云武帝遣祕書圖書分為甲乙丙丁四部使祕書郎中四人各掌其一宋氏除中字梁秩六百石江左多任貴逰年少而梁代尤甚當時諺言上車不落作著作體中何如作祕書陳著令令僕射子起家為之後魏亦置四人正第七品上北齊又增中字正第七品下隋除中字正第七品上煬帝三年加為從五品皇朝為從六品上龍朔天授神龍並隨省改復開元二十八年減一人祕書郎掌四部之圖籍分庫以藏之以甲乙景丁為之部目甲部為經其類有十一曰易以紀隂陽變化二曰書以紀帝王遺範三曰詩以紀興衰誦嘆四曰禮以紀文物體制五曰樂以紀聲容律度六曰春秋以紀行事褒貶七曰孝經以紀天經地義八曰論語以紀先聖微言九曰圖緯以紀六經䜟候十曰小學以紀字體聲類乙部為史其類一十有三一曰正史以紀紀傳表志二曰古史以紀編年繫事三曰雜史以紀異體雜紀四曰霸史以紀僞朝國史五曰起居注以紀人君動止六曰舊事以紀朝廷政令七曰職官以紀班叙品秩八曰儀注以紀吉凶行事九曰刑法以紀律令格式十曰雜傳以紀先賢人物十一曰地理以紀山川郡國十二曰譜系以紀氏族繼序十三曰略録以紀史策條目景部為子其類一十有四一曰儒家以紀仁義教化二曰道家以紀清靜無為三曰法家以紀刑法典制四曰名家以紀循名責實五曰墨家以紀强本節用六曰從橫家以紀辨說譎詐七曰雜家以紀兼叙衆說八曰農家以紀播植種藝九曰小說家以紀芻辭輿誦十曰兵法以紀權謀制度十一曰天文以紀星辰象緯十二曰厯數以紀推步氣朔十三曰五行以紀卜筮占候十四曰醫方以紀藥餌針灸丁部為集其類有三一曰楚詞以紀騷人怨刺二曰别集以紀詞賦雜論三曰總集以紀類分文章國朝元祐官品令祕書郎正八品元祐四年四月祕書郎並除升朝官知縣以上資序入任滿除集賢校理典校祕書後漢馬融字季長有俊才博通經籍為校書郎中詣東觀典校祕書是時鄧太后臨朝鄧隲兄弟輔政而俗儒世士以為文德可興武功宜廢遂寢搜狩之禮戰陳之法融上廣成頌以諷諫忤鄧氏滯于東觀十年不得調後為南郡太守免官徒朔方收還復拜議郎重在東觀著述融才尚博洽為世通儒乘鹿車魏志魏武建國署祕書郎王肅表云尚書郎侍御史皆乘犢車而祕書丞郎獨乘鹿車不得朝服恐非陛下轉臺郎以為祕書丞之本意也祕閣之吏王基字伯輿黃初中察孝廉除中書郎時青土初定刺史王凌特表請基為别駕後詔為祕書郎凌復請還頃之司徒王朗辟基凌不遣朗書劾州曰凡家臣之良則升于公輔公臣之良則入于王職是故古者侯伯有貢士之禮今州取宿衛之臣留祕閣之吏所希聞也觀其眸子足以知人鍾㑹字士季少敏惠夙成中護軍蔣濟著論觀其眸子足以知人㑹年五嵗見濟濟大竒之正始中以為祕書郎淡于榮利耽意文章蜀志郤正字令先弱冠能屬文入為祕書吏轉為令史遷祕書郎性淡于榮利尤耽意文章自司馬王楊班傅張蔡之儔遺文篇賦及當世美書善論益部有者則鑽鑿推求略皆寓目該覽學籍魏劉劭為祕書郎該覽學籍文質周洽朱紫别矣王隱晉書鄭默字思元為祕書郎删省煩文除其浮穢時陳留虞松為中書令謂默曰而今而後朱紫别矣自以所見不博左思字太冲専思三都賦杜絶人事自以所見不博求為祕書郎美譽晉中興書王謐弱冠有美譽與桓𦙍王緩齊名除祕書郎専精學問虞預晉書司馬彪少篤學不惓然好色薄行為父陸所責不得為嗣彪由此不交人事專精學問泰始中為祕書郎又轉為丞意趣不同沈約宋書蕭惠開家雖貴戚而車服簡素初為祕書郎祕書著作並名家年少惠開意趣與之多不同比肩或三年不共語有限故有競宋王敬𢎞子恢之召為祕書郎敬𢎞求為奉朝請與恢之書曰祕書有限故有競朝請無限故無競吾欲處汝無競之地文帝許之製千字詩袁朗勤學好屬文在陳釋褐為祕書郎嘗製千字詩當時以為盛作陳後主聞召入禁中使為月賦朗染翰立成後主曰觀此賦謝希逸不能獨美於前矣又使為芝草嘉蓮二頌深見賞重清而不要見侍御史門請假還鄉世說張敷為宋臺祕書郎請假還東于時相國符一參軍督餉亦請假武帝遣傳令語敷云亦欲還鄉去可載之答曰臣性不雜遂不載也體中何如見沿革固求不遷欲遍觀圖籍梁書張纘字伯緒為祕書郎固求不