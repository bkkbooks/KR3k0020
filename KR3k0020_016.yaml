許鑄錢曖曰此愈工也起等始服年十三張九齡字子夀幼聰敏善屬文年十三應舉登乙第拜校書即勅改所居為復禮鄉徐岱字慶仁好學六籍諸子悉所探究大厯中轉運使劉晏薦之授校書郎浙西觀察使李柄筠厚遇之勅改所居為復禮鄉秘閣書籍校閲皆遍段成式字柯古以䕃入官為校書郎研稽苦學秘閣書籍披閱皆遍聰敏博學楊炯幼聰敏博學善屬文舉神童拜校書郎為崇文館學士非急務後漢盧植在江東校轉中秘書帝以非急務為侍中正字隋百官志後齊秘書省典司經籍正字四人隋秘書省正字四人六典正字四人正九品下掌詳定典籍正其文字前代才學之士多以他官兼其任者齊秘書省有正書葢是正字之任北齊秘書省始置正字四人從九品上隋因之皇朝為正九品下貞元八年分兩人屬集賢院掌同校書郎國朝元祐官品令秘書省正字従八品元祐四年七月勅正字四年除秘閣校理朋字未正唐劉晏以神童為秘書省正字方年十嵗形肰獰劣而慧悟過人上召入樓中簾下貴妃置於膝上為施粉黛與之巾櫛上問晏曰汝為正字正得㡬字對曰餘字皆正唯朋字未正出明皇雜録見詩話總龜麟臺正字陳子昂性善屬文為麟臺正字數嵗解屬文裴耀卿少聰敏數嵗解屬文應童子舉弱冠拜秘書正字神童釋褐吴通𤣥父道瓘為諸王太子授經而通𤣥兄弟出入禁掖常侍太子遊通𤣥與兄通徵俱博學善屬文文采綺麗通𤣥㓜應神童舉釋褐秘書正字著作郎晉職官志著作郎周左史之任也漢東京圖籍在東觀故使名儒著作東觀有其名尚未有官魏明帝太和中詔置著作郎於此始有其官𨽻中書省及晉受命武帝以繆徴為中書著作郎元康二年詔曰著作舊屬中書而秘書既典文籍今改中書著作為秘書著作於是改𨽻秘書省後别自置省而猶𨽻秘書著作郎一人謂之大著作郎専掌史任又置佐著作郎八人著作郎始到職必撰名臣傳一人沈約宋書著作郎後漢官後漢以秦太史但掌天文律厯而其國紀撰述悉在著作江左王導表著作為史書是也後漢著作東觀有著作郎隋百官志梁秘書著作郎一人佐郎八八掌國史集注起居著作郎謂之大著作梁初周捨裴子野皆以佗官領之後齊秘書又領著作省郎二人佐郎八人隋秘書省領著作曹郎二人佐郎八人校書郎正字各二人唐百官志著作郎二人従五品上佐郎四人従六品上掌修撰碑志祝文祭文與佐郎分判局事武徳四年改著作曹曰局龍朔二年曰司文局咸亨復六典著作郎二人従五品上續漢書稱班固傅毅以蘭臺令史陳宗以洛陽令尹敏以長陵令孟冀以司𨽻校尉並著作東觀然皆他官兼著作之名而未立其官魏太平中置著作即𨽻中書省晋惠帝改中書著作為秘書著作後又别自名省曰著作省而猶𨽻秘書晉令著作郎品第六進賢一梁冠絳朝服荀朂以中書監干寳虞預徐廣以散騎常侍孫綽以給事中伏滔以遊擊將軍孫盛以秘書并兼領著作又陳羣王隠後詔著作单衣介幘朝朔望于著作省亦其任也著作秩六百石品第六後魏五品上北齊従五品後周春官府置著作上士二人即其職也隋従五品上煬帝增為正五品其後又降為従第五品皇朝秘書省領著作局置著作郎二人龍朔二年改司文郎中咸亨元年復舊掌同唐百官志國朝元祐官品令著作郎正七品綴集所聞以為漢書後漢班固詔詣秘書與前洛陽令陳宗長陵令尹敏司𨽻従事孟冀共成世祖本紀遷為郎典校秘書採摭前紀綴集所聞以為漢書史稱固有良史之才著作東觀楊彪字文先少傅家學熹平中以愽習舊聞公事徵拜議郎華嶠書曰與馬日磾盧植蔡邕等著作東觀承明金馬著作之庭班固西都賦云又有承明金馬著作之庭大雅宏達于茲為羣元元本本殫見洽聞啟發篇章校理秘文撰集漢記張衡傳謁者僕射劉珍校書郎劉騊駼等著作東觀撰集漢記因定漢家禮儀上言請衡㕘論其事㑹其卒而衡嘗歎息欲終成之及為侍中上疏請得専事裒觀収檢遺文畢力補綴五葉三世晉應亨集讓著作表曰自司𨽻校尉奉至臣五葉著作不絶鄉族以為美談崔駰三世相繼其後無聞若乃談遷接武彪固踵跡亦各一世之良文士之冠孫綽為廷卿領著作綽少以文才垂稱于時文士綽為其冠温王郄庾諸公之薨必須綽為碑文然後刋石分四部臧榮緒晉書李充為大著作于時典籍混亂充刪除煩重以類相従分作四部有史才謝沉為祠部郎何充庾氷以沉有史才遷大著作領著作張華為司空猶領著作又孫盛為散騎常侍領大著作應難篇王隠晉書張瞻字仲應作應難篇司空張華晚見稱善命為著作郎南郊賦郭璞作南郊賦中宗見之嘉其才以為著作佐郎呼為妳母沈約宋書何承天除著作郎撰國史承天時已老而諸佐郎並名家年少潁川荀伯嘲之常呼為妳母焉承天曰卿當云鳯凰將九子妳母何言耶父祖名播四海晉書陸士衡以文學為太子洗馬著作郎范陽盧志於衆中問機曰陸遜陸抗於君近逺機曰如君與盧毓盧班志黙然既起雲謂機曰殊邦遐逺容不相悉何至於此機曰我父祖名播四海寧不知耶善史漢王隠晉書何薈善史漢為著作作益部耆舊傳陳封作益部耆舊傳武帝善之命為著作郎劍閣銘張載作劍閣銘世以為能除著作郎造乗輿箴臧榮緒晉書潘尼岳子也少有清才文辭典雅屬綴之功與岳齊名性淡退不競唯以著述為事轉著作造乗輿箴及趙王倫簒位孫秀専政忠臣被害遇士濫酷尼雖形留秘閣而神遊方外遂託疾篤輙曠假拜掃坟栢料秘閣四部書續晉陽秋孝武帝好覧文藝勅著作郎徐廣料秘閣四部見書凡三萬六千巻造晉書草創紀志束晳傳惠帝元康四年晩應司空府辟八月餘即除著作西觀造晉書草創三帝紀及十志甚有清才王讃字正長義陽人也晉惠帝時為散騎常侍著作郎甚有清才助撰晉史宋書茍伯子少好學博覧經傳符廣重其才學舉伯子及王韶之並為佐郎同撰晉史及著桓𤣥等傳遷尚書祠部郎按本傳無助撰文宜居史職王韶之性穎敏父禕之少有志尚當世詔命表奏輙手自書冩泰元隆安時事大小悉撰録韶之得父舊書因私撰晉安帝陽秋既成時人謂宜居史職即除著作佐郎使續後事訖義熈九年善叙事辭論可觀為後世佳史遷尚書祠部郎作濛汜池賦張隲文士傳張載作濛汜賦太僕𫝊𤣥見賦嘆息稱善以車迎載由此知名起家徴為著作佐郎才謝呂望尊過西伯北史程駿拜著作郎後魏顯祖獻文帝屢引駿與論易老之義顧謂羣臣曰朕與此人言意甚開暢又問駿曰卿年㡬何對曰臣六十有一顯祖曰昔太公既老而遭文王今卿遇朕豈非早耶駿曰臣雖才謝呂望而陛下尊過西伯覬天假餘年竭六韜之妙求文學之能必推崔孝伯北史韓顯宗太和初舉秀才對䇿甲科除著作佐郎後魏高祖孝文帝曽謂顯宗等曰著作之任國書是司卿等之文朕自委悉中省之品卿等所聞若欲取況古人班馬之徒固自遼闊若求之當代文學之能卿等應推崔孝伯求歸於呉唐顧況蘓州人能為歌詩性詼諧栁渾輔政以校書郎徵復遇李泌繼入自謂知己秉樞要當得達官乆之方遷著作郎況心不樂求歸于吳而班列辟官咸有侮玩之目皆惡嫉之其實去權崔沔檢校御史當至徳時監察御史宋宣逺恃盧懷慎之親頗違犯沔舉劾之又姚崇之子光禄少卿彛廣納賄賂沔又將按檢其事姚盧時在政事薦沔有史才轉為著作郎其實去權也上明堂賦劉允濟埀拱四年明堂初成允濟奏上明堂賦以諷則天甚嘉嘆之手制褒美拜著作郎撰東都記鄧隆為著作郎修史成尋卒撰東都記三十卷為學者所美後進文章無可意者白居易傳顧況為著作郎況能文而性浮薄後進文章無可意者覧居易文不覺迎門禮遇曰吾謂斯文遂絶復得吾子矣著作佐郎晉職官志隋百官志並見郎門六典著作佐郎四人従六品上著作佐郎修國史宋百官春秋云常道鄉公咸熈百官名有著作佐郎二人晉定員八人哀帝興寧二年大司馬桓温表省四人孝武帝寧康元年復舊八人晉令品第六進賢一梁冠絳朝服孝武太元四年詔秘書監自選著作佐郎今並無監使吏部選有監復舊焉宋齊並同晉制著作佐郎始到職必撰名臣傳一人宋氏之初國朝始建未有合撰者此制遂替矣梁秩四百石品第七陳令僕子起家為之品制同梁魏正第七品上北齊正第七品下後周春官府置著作中士四人即著作佐郎之任也隋置八人正第七品上煬帝置十二人増品従第六皇朝初置四人龍朔二年改為司文郎咸亨元年復故開元二十六年減置二人掌見郎門國朝元祐官品令著作佐郎正八品元祐四年七月勅著作佐郎任滿除集賢校理不拜尹丞張華年四十授河南尹丞不拜便轉佐郎車迎晉書張載字孟陽作濛汜賦傅𤣥見而嗟嘆以車迎之言談盡日為之延譽遂知名起家佐著作郎南郊賦郭璞見郎門有史才晉陵朱鳯吳郡吳震白首衡門華譚為監知有史才薦之並稱職按華譚本傳云並學行清修老而未調譚皆薦為著作佐郎無有史才文西觀束晳晚應司空府辟八月餘除佐郎西觀撰晉書草創三帝紀十志不能復為今世吏王隠晉書武帝欲以郭琦為著作佐郎問尚書郭璋璋憎琦不附已荅云不識帝曰若如卿言烏九家兒能事卿即堪郎矣及趙王倫簒又欲用琦琦曰我已為武帝吏不能復為今世吏終於家卒成十典華嶠漢書十典未成秘書繆徵奏嶠少子暢為佐郎卒成十典見陳夀所作壞已書張華别傳陳夀好學善著述除佐郎當時夏侯湛等作魏書見陳夀所作壞已書也年三十方作沈約宋書謝裕字景仁㑹稽王世子元顯嬖人張法順權傾一時内外無不造門唯景仁不至年三十而方為著作佐郎以他官領其職梁周捨裴于野皆以他官領其職此職閒晉閻纉字續伯祭酒鄒湛以纉才堪佐著薦于秘書監華嶠嶠曰此職閒廩重貴勢多争之不暇求其才遂不能用賜名後魏宋弁字義和為佐郎後魏高祖孝文帝曽因朝㑹歴訪治道弁年少官徵自下而對聲姿清亮進止可觀高祖稱善者乆之由是大被知遇賜名為卞意取卞和獻玉楚王不知寳之理一為史官十年不調後周儒林傳黎景熈字季明正定古今文字於東閣大統末拜佐郎于時倫輩皆位兼常伯車服華盛唯季明獨以貧素居之而無愧色又勤于職著述不怠然性尤専固不合於時是以一為史官遂十年不調極文學之清選唐王義方曰臣去嵗冬初雲陽下縣丞耳今春及夏陛下擢臣著作佐郎極文學之清選未㡬又拜臣侍郎史滥朝廷之權職山名駐蹕敬播遷佐郎兼修國史太宗之破高麗名所戰之山為駐蹕播謂人曰聖人者與天地合徳山名駐蹕此葢以鑾輿不復更來矣卒如所言與許敬宗等撰西成圖歴諫議大夫給事中免逺官國朝嘉祐八年詔以秘書省著作佐郎安燾嘗中進士第三人與免逺官今後以為例矣職官分紀巻十六
