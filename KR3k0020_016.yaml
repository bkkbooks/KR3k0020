body:
  text: 職官分紀巻十六宋孫逢吉撰秘書省後漢桓帝延熹二年置秘書監官晉職官志秘書監案漢桓帝延熹二年置秘書監後省魏武為魏王置秘書令丞及文帝黄初初置中書令典尚書奏事而秘書改令為監後以何禎為秘書丞而秘書先自有丞乃以禎為秘書右丞及晉受命武帝以秘書并中書其秘書著作之局不廢惠帝永平中復置秘書監其屬官有丞有郎并統著作省沈約宋書百官志秘書監丞各一人魏武帝建國有秘書令左右丞黄初中分秘書立中書而秘書之局不廢昔漢武帝建藏書之策置冩書之官於是天下文籍悉在天禄石渠延閣廣内秘府之室謂之秘書至成哀世使劉向父子以本官典其事至於後漢則圖籍在東觀有校書郎又有著作郎傅毅馬融之徒多為校書郎又蔡邕従尚書郎選入東觀著作邕既已為尚書郎而入東觀著作復拜議郎知是著作郎又碩學達官往往典校秘書如向歆故事故但校書東觀或有兼撰漢記也王肅論秘書不應屬少府表曰魏之秘書即漢之東觀郡國諸書悉云上東觀且自大魏分秘書而為中書以來傳緒相繼於今二監未有言屬於少府者也今欲使臣編名於騶従言事于外府不亦隳朝制而辱國典乎太和中蘭臺秘書爭儀三府奏議秘書司先王之載籍掌制書之典與中書相亞與中書為官聫隋百官志梁秘書省置監丞各一人郎四人掌國之典籍圖書著作郎一人佐郎八人後齊秘書省典司經籍監丞各一人郎中四人校書郎十二人正字四人又領著作省郎二人佐郎八人校書二人隋秘書省監丞各一人郎四人校書郎十二人正字四人録事二人領著作太史二曹唐職官志秘書省監一員従三品監之名後漢桓帝置魏晉不改後周謂之外史下大夫隋後為秘書監従第一品煬帝改為秘書令武徳復為監龍朔改為蘭臺太史天授改為麟臺監神龍復為秘書監少監二員従四品上少監隋煬帝置龍朔改為蘭臺侍郎天授為麟臺少監神龍復為秘書少監比置一員太極初増置一員六典秘書省監一人従三品周禮春官太史掌建邦之六典又小史掌邦國之志定繫代又外史掌四方之志三王五帝之書並秘書之任也秦則博士官所職禁人藏書漢氏除挾書之律開獻書之路置冩書之官又令謁者陳農求遺書於天下故文籍往往而出並蔵之書府在外則有太常太史博士掌之内則有延閣廣内石渠之藏又御史中丞在殿中掌蘭臺秘書圖籍又未央宫中有麒麟閣天禄閣亦藏書劉向揚雄典校皆在禁中謂之中書猶今言内庫書也後漢則藏之東觀亦禁中也桓帝延熹二年始置秘書監屬太常掌禁中圖書秘記故曰秘書漢官云秘書監一人秩六百石魏武為魏王置秘書令典尚書奏事即中書之任也兼掌圖書秘記文帝黄初中分秘書立中書因置監令乃以散騎常侍王象領秘書監撰皇覽魏氏蘭臺亦藏書御史掌焉魏畧薛夏六蘭臺為外臺秘書為内閣是也魏初秘書屬少府及王肅為監以為秘書之職即漢東觀之任安可復屬少府自此之後不復屬焉至晉武又以秘書并入中書惠帝永平元年詔秘書典綜經籍考校古今中書自有職務逺相統攝于事不専冝令復别置秘書寺掌中外三閣圖書自是秘書寺始外置焉晉令六品第五絳朝服銅印墨綬進賢兩梁冠佩水蒼玉宋齊同晉氏梁改為省與尚書中書門下集書為五省秘書監増秩中二千石品第三後制十八班秘書監班第十一陳依梁後魏亦以秘書為五省之數監初従第二品中太和末正第三品北齊依魏後周春官府置外史下大夫掌書籍此秘書監之任也隋秘書與尚書門下内史殿中為五省秘書監正三品煬帝降為從三品後改為令武徳初改為監龍朔二年改為蘭臺其監曰蘭臺太史咸亨元年復舊天授初改為麟臺監神龍元年復舊少監二人隋煬帝三年置一人従四品掌貳秘書監之職其後改為少令皇朝因隋為少監餘同唐百官志秘書監之職掌邦國經籍圖書之事有二一曰著作二曰太史皆率其屬而修其職凡四部之書必立三本曰正本副本貯本以供進内及賜人凡敕賜人書無本皆别冩以給之少監為之貳國朝舊有太史局歸於司天監淳化元年詔秘閣次三館秘書省仍𨽻京百司監丞郎校書郎正字著作郎佐郎官名皆仍其舊惟無定員及不専職本省之務分莅中外之任監闕即以朝官判秘閣官兼充大中祥符九年詔秘書監楊億判閣兼秘書省事億為正監不當更言判省閣有司誤也元祐四年七月秘書省官三年為一任依舊法闗陞不用舉主御史為隣漢初御史中丞掌蘭臺秘書圖籍之事至魏晉其制猶存故歴代營都邑置府寺必以秘書省及御史臺為隣麒麟殿三輔黄圖未央宫東麒麟殿藏秘書即揚雄校書之所也羣玉之山穆天子傳穆天子西登崑崙見西王母又曰登已至於羣玉之山先王所謂策府也東壁石氏星經東壁之星主文籍芸臺魚豢典畧芸香辟紙魚蠧故藏書臺稱芸臺又曰蘭臺也用秘書署璽藏室華嶠後漢書學者稱東觀為老氏藏室道家蓬萊山王融曲水詩序云記言事于仙室謂藏室也蓬山仙室上監後漢以下沿革并見秘書省門國朝元祐官品令秘書監正四品正官書晉書張華嘗徙居載書三十乘秘書監摯虞撰定官書皆資華本以取正不願為侍臣王𨼆晉書羊祜為黄門郎陳留王立以少帝不願為侍臣徙為秘書監著魏書王沉為秘書監著魏書多為時諱而善序事撰次汲冢書晉諸公讃荀勗領秘書監太康二年汲郡冢中得竹書朂躬自撰次注冩以為中經列於秘書經傳闕文多所證明幽譛符命庾峻自司空長史轉秘書監幽讃符命天文地理因有述焉掌秘奥宣明史籍温嶠舉荀崧為秘書監曰夫國史之興將以明得失之迹謂之實録使一代之典煥然可觀散騎常侍崧文質彬彬思義通博歴任先朝蒞事以穆宜掌秘奥宣明史籍蘭臺之官王充論衡蘭臺之官監國得失簡嚴能檢下魏王肅表曰青龍之末王者所選秘書監詔秘書騶史以上三百餘人非但學問又當簡威嚴能檢下者詔肅以常侍領焉自負宿名意每怏怏栁粲晉記華譚為秘書監自負宿名意毎怏怏嘗從容謂上曰臣已老矣將待死秘閣汲黯之言復存于今帝不悦著三國陽秋晉中興書孫盛為秘書監篤尚好學自少及長手不釋卷既居史官乃著三國陽秋按本傳著魏氏春秋晉陽秋晉陽秋詞直而理正咸稱良史焉有良史之志華嶠集詔曰尚書嶠體素𢎞簡文雅該通歴覽古今博文多識著書實録有良史之志轉為秘書監其加散騎常侍班同中書寺為内臺使中書散騎著作及治體音律天文數術南省文章門下撰集皆典領之嶠表伏見詔書以臣為秘書監加位常伯昔劉向父子世典史籍馬融通博三入東觀非臣膚淺所敢投迹云云劉向世典史籍上馬融三入東觀上天閣寳秘南史何憲字子思博涉該通羣籍畢覧天閣寳秘人間散逸無遺漏焉任昉劉渢共執秘閣四部書試問其所知自甲至丁書説一事并叙𫐠作之體連日累夜莫見其所遺渢音馮人間散逸無遺漏上手自讎校梁任昉字彦昇為秘書監自齊永元以來秘閣四部篇巻紛雜昉手自讎校由是篇目定焉中秘二省多諸文士後魏世祖欲拜伊馛為尚書兼郡公馛辭曰尚書務殷公爵至重非臣年少愚近所冝倚任請収過恩世祖周其所欲馛曰中秘二省多諸文士若恩矜不已請㕘其次世祖賢之遂拜為中䕶將軍秘書監馛音䟦書有五厄隋書開皇初秘書監牛𢎞以典籍遺逸上表請開獻書之路曰昔周徳既衰舊經紊棄孔子以天聖之才開素王之業憲章祖𫐠制禮刋詩正五始而修春秋闡十翼而𢎞易道及秦皇馭㝢吞滅諸侯先王墳籍掃地皆盡此則書之一厄也漢興建藏書之策置校書之官至孝成之世遣謁者陳農求遺書於天下詔劉向父子讎校篇籍漢之典文於斯為盛及王莽之末並從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅肅宗親臨講肄和帝數幸書林其蘭臺石室鴻都東觀秘書填委更倍於前及孝獻移都吏民擾亂圖書絲綿皆取為帷囊所収而西裁七千餘卷屬西凉大亂一時燔蕩此則書之三厄也魏文代漢更集經典皆藏秘書内外三閣遣秘書郎鄭黙刪定舊文時之論者美其朱紫有别晉氏乗之文集尤廣晉秘書監荀朂定魏内經更著新簿屬劉石凴凌従而失墜此則書之四厄也永嘉之後㓂竊競興其建國立家雖傳名號憲章禮樂寂滅無聞劉裕平姚収其圖籍五經子史纔四千巻皆赤軸青紙文字古拙并歸江左宋祕書丞王儉依劉氏七畧撰為七志梁人阮孝緒亦為七録總其書數三千餘卷及侯景渡江破滅梁室秘省經籍雖従兵火其文徳殿内書史宛然猶存蕭繹據有江陵遣將破平侯景収文徳之書及公私典籍重本七萬餘卷悉送荆州及周師入郢繹悉焚之於外城所収十纔一二比則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基闗右軍車未息保定之始書止八千後加収集方盈萬卷高氏據有山東初亦採訪驗其本目殘闕彌多及東夏初平獲其經史四部重雜三萬餘巻所益舊書五千而已今御書单本合一萬五千餘巻部帙之間仍有殘闕比梁之舊目止有一半至于隂陽河洛之篇醫方圖譜之説稱復為少臣以經書自仲尼迄仐數遭五厄興集之期屬膺聖代今秘藉見書亦足披覧但一時載籍須令大備不可王府所無私家乃有若猥發明詔兼開購賞則異典必致館閣斯積上納之於是下詔獻書一卷賚絹一疋一二年閫篇集稍備刻木偶置之於座栁誓煬帝嗣位拜秘書監退朝之後便命入閣言晏諷讀終日而罷帝每與嬪后對酒時逢興㑹輙遣命之至與同榻共席恩若友朋帝猶恨不能夜召于是命刻木偶人施闗機能坐起拜伏以象于誓帝每月下對酒輙令宫人置之于座與相酬酢而為歡笑按隋書作栁𧦬未詳𧦬音辨校定四部書唐魏徴遷秘書監奏引學者校定四部書自是秘府圖籍粲然畢備㕘預朝政徵為秘書監㕘預朝政博識虞世南為秘書監太宗重其博識每幾務之隙引之談論共觀經史每論及古先帝王為政得失必存規諷竒書難字顔師古拜秘書少監専典刋正所有竒書難字衆所共惑者隨疑剖晰曲盡其原稱秘書外監秘書監賀知章性放曠晚年尤加縦誕自號四明狂客又稱秘書外監遨逰里巷醉後屬辭動成巻軸文不加㸃皆有可觀天寳三載知章上疏請度為道士求還鄉里仍捨本鄉宅為觀上許之御製詩以贈行三教談論白居易自蘓州召拜秘書監賜金紫文宗誕日召居易與僧惟澄道士趙常盈對御講論于麟徳殿居易論難鋒起辭辯泉注上所罕覯深嗟異之詠石榴詩孔紹安大業末為監察御史時高祖為隋討賊於河東詔紹安監高祖之軍深見接遇及高祖受禅紹安自洛陽間行來奔高祖見之甚悦拜内史舍人時夏侯端亦嘗為御史監高祖軍先歸朝授秘書監紹安因侍宴應詔詠石榴詩曰祗為時來晚開花不及春時人稱之秘府無事國朝至道中賈黄中自澶州受代赴闕先豐碩雄壮自是頓羸瘵欝若枯藤上憐之拜禮部侍郎兼秘書監以黄中素嗜文籍而秘府無事擾之也疾愈求朝謁大中祥符七年秘書監分司西京楊億以疾愈求朝謁上因曰億文學鮮偕然或言其好切議朝政王旦曰億受國深恩非土木類或談謔過當則有之訕讟之事恐不為也諌戯作艶詩唐虞世南為秘書監太宗謂侍臣曰朕因暇日每與虞世南商畧今古朕有一言之善虞世南未嘗不悦有一言之失未嘗不恨悵朕嘗戯作艷詩虞世南便進曰聖作雖工體制非雅上之所好下必隨之此文一行恐致風靡輕薄成俗非為國之利賜令繼和輙申狂簡而今之後更有斯文繼以死請不敢奉詔其懇誠若此朕用嘉焉羣臣皆若虞世南天下何憂不治因顧謂虞世南曰朕更有此詩卿能死否虞世南對曰臣聞詩者動天地感鬼神上以風化下下以風刺上故季札聴詩而知國之興廢盛衰之道實繫於兹臣雖愚談願不奉詔太宗大悦賜絹五十疋少監沿革見秘書省門國朝元祐官品令秘書少監従五品卧振高風唐蕭徳言以年老請致仕太宗不許詔曰頃年以來天下無事方欲建禮作樂偃武修文卿年齒已衰教將何恃所兾才徳兼茂卧振高風使濟南伏生復在於兹日闗西孔子故顯於當今拜秘書少監兩宫禮賜甚厚與父並命趙宗儒字秉文拜右拾遺翰林學士時父曄秘書少監與父並命出於一日當時榮之㕘預政事周思茂自右史轉太子舍人典履永在禁中最䝉親遇至于政事損益多所㕘預累遷麟臺少監崇文館學士垂拱四年下獄死以儒素見稱王紹宗為秘書少監仍侍皇太子讀書紹宗性澹雅以儒素見稱當時朝廷之士咸敬慕之張易之兄弟亦加厚禮易之伏誅紹宗坐廢領史職者不宜為諫官徳宗以左諫議大夫史館修撰張薦為秘書少監修撰如故時裴延齡貴欲異同宰府乃言於上曰諫議大夫論朝廷得失之官史館修撰書朝廷得失之事則領史職者不宜為諫官故有是命丞魏志武帝置秘書左右丞以劉放為左丞孫資為右丞王肅表陛下垂意於稽古留神於墳典故轉臺郎公府茂才以左右丞若自今後詔郎皆依丞選見㑹威儀使有常秩則人樂秘書之職矣建安二十三年秘書丞郎比侍御史下節度比蘭臺令史此為丞郎宜亞侍御史而今位在符節郎下符節郎秩三百石秘書丞秩四百石高秩在下違賤貴之宜符節郎在上失内外之叙臣愚以為秘書職於三臺為近宻中書郎在尚書丞郎上秘書丞郎冝次尚書郎下不然則冝次侍御史下秘書丞郎俱四百石遷冝比尚書郎出亦宜為郡此陛下崇儒術之盛事也晉職官志見秘書省門齊職儀秘書丞銅印墨綬按通典晉後署秘書丞銅印墨綬進賢一梁冠絳朝服宋為黄綬餘與晉同齊梁尤重陳隋印綬與齊同歴代皆有隋百官志見秘書省門新唐百官志秘書丞一人従五品上六典秘書丞一人従五品漢獻帝建安中魏武為魏王置秘書令及二丞與尚書奏事並中書之任也魏志劉劭建安末自秘書郎轉秘書丞是也魏文黄初中分秘書立中書以秘書左丞劉放為中書監秘書右丞孫資為中書令而秘書丞一人秩四百石魏志云何禎文帝時上許都賦帝異之公車徴到為秘書郎後月餘禎關事帝問外吾本用禎為丞何故為郎案主者罪遂改為丞時秘書丞尚未轉遂以禎為右丞晉武并秘書入中書謂之中書秘書丞惠帝又置秘書丞二人晉令秘書丞品第六銅印墨綬進賢一梁冠絳朝服晉書稱桓石綏為秘書丞啟校四部圖書宋齊並一人品服同晉氏梁増品第五秩六百石銅印黄綬陳依梁後魏秘書丞一人正第五品上北齊因之後周春官府有小外史上士之職葢比秘書丞之任也隋氏秘書丞一人正五品龍朔曰大夫掌判省事國朝元祐官品令従七品分領著作事後魏李彪字道固遷秘書丞分領著作事自文成帝己未至於太和崔浩高允著述圖書編年叙録為春秋體遺落時事彪與秘書令高祐始奏従事遷固體創為紀傳表志之目焉按本傳但云奏著作事無分領文職近日月魏王肅論秘書表云青龍中議秘書丞郎與博士議郎同職近日月宜在三臺上秘書丞郎宜比尚書丞郎數奏文賦魏畧嚴苞黄初中以高才入為秘書丞數奏文賦帝異之天水薛宣聲薛夏字宣聲天水人也博學有才天水舊有姜閻任趙四姓常推於郡中而夏為单家不為降屈四姓欲共治之夏乃逰逸東詣京師太祖宿聞其名甚禮遇之文帝又嘉其才黄初中為秘書丞帝每與夏摧論書傳未嘗不終日也每呼之不名而謂之薛君夏居甚貧帝又顧其衣薄解所御衣袍賜之其後征東將軍曹休來朝時帝方與夏有所咨論而外啟休到帝引入坐定帝顧夏言之于休曰此君秘書丞天水薛宣聲也宜共談其見遇如此遍觀古今王隠晉書庾峻字山甫少好學有才思轉秘書丞遍觀古今聞見益廣平簡温敏有文思山濤啟事選秘書丞宜如聖㫖此局有數百吏雖各有課限聞不能齊整梁韓足正法禁諸郎皆悉學士是以舉嵇紹平簡温敏有文思帝曰紹如此便可為丞不足復郎也諮出處袁彦伯名士傳山濤舉嵇紹為秘書丞紹語出處于濤曰為君思之乆矣天地四時猶有消息况於人乎移書蘭臺魏畧薛夏為秘書丞常以公事移蘭臺蘭臺自以臺也而秘書署耳謂夏為不得儀也推使當有坐者夏報之曰蘭臺為外臺秘書為内閣臺閣一也何不相移之有蘭臺屈無以折遷中書郎晉中興書桓𦙍少知名初拜秘書丞遷中書郎多書之家分局採借晉陽秋王謐為秘書丞乃表前尚書殷兖中書郎張敞太子衛率郗儉之故太常相石秀多書之家請秘書郎分局採借右丞自何禎始虞預晉書何禎字元幹為尚書郎時詔㕘秘書丞秘書本有一丞于是遂以禎為右丞右丞之置自何禎始也此職宜得才人魏明帝用何禎為秘書丞勅六此職宜得才人每卒問近對者以何禎處也卒問近對上繆以為郎文士傳何禎為許都賦封上帝異之下公車特徴到用為尚書郎詔用為秘書丞主者繆以為郎後月餘禎闗事上問曰吾本用禎為丞何故為郎案主者罪遂為丞若野鶴之在鷄羣晉嵇紹中散大夫康之子也山濤領選啟為秘書郎武帝謂濤曰如卿所言乃堪為丞何但郎也乃發詔徴之起家為秘書丞紹始入洛或謂王戎曰昨於稠人中始見嵇紹昂昂然若野鶴之在鷄羣文翰勤慎魏志涿郡劉放字子棄太原孫資字彦龍資幼而岐嶷謁業太學博覧傳記同郡王允一見而竒之友人河東賈逵謂資曰足下抱逸羣之才應太祖辟署功曹舉計吏尚書令荀彧見資歎曰北州承䘮亂已乆謂其賢智零落今日乃復見孫計君乎云云魏國既建與劉放俱為秘書郎文帝即位放資轉為左右丞放為秘書左丞資為秘書右丞數月放徙為令黄初初改秘書為中書以放為監以資為令評曰劉放文翰孫資勤慎並管喉舌權聞當時依七畧撰七志齊書王儉字仲寶為秘書丞上表求校墳籍依七畧撰七志四十卷獻之第一官梁劉孝綽除秘書丞武帝曰第一官當與第一人天下清官張率字士簡遷秘書丞武帝謂曰秘書丞天下清官東南望胄未有為之者今以相處為卿定名譽著晉諸公讃世語傅暢字世道為秘書丞沒在胡中著晉諸公讃及晉公卿禮秩故事學行當今無比隋姚察江左人仕至尚書陳士入隋為秘書丞别勅成梁陳二史文帝指謂朝臣曰聞姚察學行當今無比我平陳惟得此一人惟得此一人上郎晉職官志惠帝永平中復置秘書監其屬官有郎晉令秘書郎掌中外三閣經書覆校殘闕正定脫誤沈約宋書梁秘書郎四人後漢校書郎也隋百官志梁秘書郎四人掌國之典籍圖書餘見秘書省門新唐百官志秘書郎三人従六品上掌四部圖書以甲乙丙丁為部皆有三本一曰正二曰副三曰貯凡課冩功程皆分判六典秘書郎四人従六品上魏武置秘書郎秩四百石魏起居注青龍中議秘書丞即職近日月宜居三臺上亞尚書丞郎晉令秘書郎中品第六進賢一梁冠絳朝服晉起居注云武帝遣秘書圖書分為甲乙丙丁四部使秘書郎中四人各掌其一宋氏除中字梁秩六百石江左多任貴逰年少而梁代尤甚當時諺言上車不落作著作體中何如作秘書陳著令令僕射子起家為之後魏亦置四人正第七品上北齊又増中字正第七品下隋除中字正第七品上煬帝三年加為従五品皇朝為従六品上龍朔天授神龍並隨省改復開元二十八年減一人秘書郎掌四部之圖籍分庫以藏之以甲乙景丁為之部目甲部為經其類有十一曰易以紀隂陽變化二曰書以紀帝王遺範三曰詩以紀興衰誦嘆四曰禮以紀文物體制五曰樂以紀聲容律度六曰春秋以紀行事褒貶七曰孝經以紀天經地義八曰論語以紀先聖微言九曰圖緯以紀六經䜟候十曰小學以紀字體聲類乙部為史其類一十有三一曰正史以紀紀傳表志二曰古史以紀編年繫事三曰雜史以紀異體雜紀四曰霸史以紀偽朝國史五曰起居注以紀人君動止六曰舊事以紀朝廷政令七曰職官以紀班叙品秩八曰儀注以紀吉凶行事九曰刑法以紀律令格式十曰雜傳以紀先賢人物十一曰地理以紀山川郡國十二曰譜系以紀氏族繼序十三曰畧録以紀史策條目景部為子其類一十有四一曰儒家以紀仁義教化二曰道家以紀清静無為三曰法家以紀刑法典制四曰名家以紀循名責實五曰墨家以紀强本節用六曰従横家以紀辯說譎詐七曰雜家以紀兼叙衆說八曰農家以紀播植種藝九曰小說家以紀芻辭輿誦十曰兵法以紀權謀制度十一曰天文以紀星辰象緯十二曰厯數以紀推步氣朔十三曰五行以紀卜筮占候十四曰醫方以紀藥餌鍼灸丁部為集其類有三一曰楚詞以紀騷人怨刺二曰别集以紀詞賦雜論三曰總集以紀類分文章國朝元祐官品令秘書郎正八品元祐四年四月秘書郎並除陞朝官知縣以上資序入任滿除集賢校理典校秘書後漢馬融字季長有俊才博通經籍為校書郎中詣東觀典校秘書是時鄧太后臨朝鄧隲兄弟輔政而俗儒世士以為文徳可興武功宜廢遂寝蒐狩之禮戰陣之法融上廣成頌以諷諫忤鄧氏滯于東觀十年不得調後為南郡太守免官徒朔方収還復拜議郎重在東觀著述融才尚博洽為世通儒乗鹿車魏志魏武建國署秘書郎王肅表云尚書郎侍御史皆乗犢車而秘書丞郎獨乘鹿車不得朝服恐非陛下轉臺郎以為秘書丞之本意也秘閣之吏王基字伯輿黄初中察孝廉除中書郎時青土初定刺史王凌特表請基為别駕後詔為秘書郎凌復請還頃之司徒王朗辟基凌不遣朗書劾州曰凡家臣之良則升于公輔公臣之良則入于王職是故古者侯伯有貢士之禮今州取宿衛之臣留秘閣之吏所希聞也觀其眸子足以知人鍾㑹字士季少敏惠夙成中䕶軍蔣濟著論觀其眸子足以知人㑹年五嵗見濟濟大竒之正始中以為秘書郎澹于榮利耽意文章蜀志郤正字令先弱冠能屬文入為秘書吏轉為令史遷秘書郎性澹于榮利尤耽意文章自司馬王楊班傅張蔡之儔遺文篇賦及當世美書善論益部有者則鑽鑿推求畧皆寓目該覽學籍魏劉劭為秘書郎該覧學籍文質周洽朱紫别矣王隠晉書鄭黙字思元為秘書郎删省煩文除其浮穢時陳留虞松為中書令謂黙曰而今而後朱紫别矣自以所見不博左思字太冲専思三都賦杜絶人事自以所見不博求為秘書郎美譽晉中興書王謐弱冠有美譽與桓𦙍王緩齊名除秘書郎専精學問虞預晉書司馬彪少篤學不惓然好色薄行為父陸所責不得為嗣彪由此不交人事專精學問泰始中為秘書郎又轉為丞意趣不同沈約宋書蕭惠開家雖貴戚而車服簡素初為秘書郎秘書著作並名家年少惠開意趣與之多不同比肩或三年不共語有限故有競宋王敬𢎞子恢之召為秘書郎敬𢎞求為奉朝請與恢之書曰秘書有限故有競朝請無限故無競吾欲處汝無競之地文帝許之製千字詩袁朗勤學好屬文在陳釋褐為秘書郎嘗製千字詩當時以為盛作陳後主聞召入禁中使為月賦朗染翰立成後主曰觀此賦謝希逸不能獨美於前矣又使為芝草嘉蓮二頌深見賞重清而不要見侍御史門請假還鄉世說張敷為宋臺秘書郎請假還東于時相國符一㕘軍督饟亦請假武帝遣傳令語敷云亦欲還鄉去可載之答曰臣性不雜遂不載也體中何如見沿革固求不遷欲遍觀圖籍梁書張纉字伯緒為秘書郎固求不