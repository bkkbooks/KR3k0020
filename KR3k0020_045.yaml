body:
  text: 職官分紀卷四十五宋孫逢吉撰大禮五使大禮鹵簿禮儀頓儀仗橋道遞唐元和以前史籍不載開元九年國子司業韋韜知太常禮儀事而未有使名天寶九載始置禮使大厯五年停事歸太常七年復置建中元年停自後不置每有南郊大禮權置太常卿為之又有大禮使中丞為之哀帝時中丞為儀仗使而不載大禮使五代梁有以河南尹為大禮使餘二使如舊又有儀仗法物二使以武將為之後唐明宗以宰相為大禮兵部尚書為禮儀使御史中丞為儀仗使兵部侍郎為鹵簿使開封尹為頓遞使周制亦然惟以禮儀為太常國朝大禮頓遞用宰相京尹充使如舊制太常中丞兵部尚書或闕則以學士及他尚書丞郎為之而頓遞又增橋道之名唐有禮儀使判官五代有大禮副使判官國朝並不置後唐又有修裝法物使今多以內臣與本司修飾焉其職掌用禮院御史臺兵部吏人如故儀衛衣物鹵簿皆掌儀仗使無專掌但令憲司督促諸司而已今有中丞換使額非舊制者若敘使司次第則橋道頓遞最在下京尹有親王為之者先朝屢舉大禮以非常禮皆用輔臣向敏中次當禮儀贊導以年老不任磬折改命王欽若以敏中領禮儀使則是不用次敘之例自是始變焉其胥吏交換頗為非便自後不復改至大中祥符元年乙未以尚書左丞知樞密院使王欽若右諫議大夫參知政事趙安仁為泰山封禪經度制置使先朝亦置大禮禮儀儀仗鹵簿等使唯不置橋道頓遞使六年以宰相王旦為遞奉聖像大禮使向敏中為禮儀使樞密使王欽若為儀仗使陳堯叟為鹵簿使參知政事丁謂為橋道頓遞使其年又以宰臣王旦為奉祀大禮使向敏中為儀仗使樞密使同平章事王欽若為禮儀使陳堯叟為鹵簿使參知政事丁謂為橋道頓遞使又以王旦為天書儀仗使丁謂為副使兵部侍郎趙安仁為扶侍使入內副都知張繼能為扶侍郎都監焉七年詔摹刻天書奉安於玉清昭應宫宰臣王旦為天書刻玉使樞密使同平章事王欽若為同刻玉使參知政事丁謂為刻玉副使兵部侍郎趙安仁翰林學士陳彭年為同刻玉副使入內押班周懷政為都監以吏部尚書王欽若為同中書儀衛刻玉使其年又以司空兼門下侍郎平章事王旦為奏告大禮使中書侍郎兼刑部尚書平章事向敏中為儀仗使樞密使兵部尚書平章事冦凖為鹵簿使工部尚書參知政事丁謂為禮儀使樞密副使檢校太保王嗣宗為橋道頓遞使禮儀使為四使之首贊導行事敏中以衰疾故讓謂以便於陟降也丙申以工部尚書平章事王旦為封禪大禮使尚書左丞知樞密院事王欽若為禮儀使兵部侍郎參知政事馮拯為儀仗使兵部侍郎知樞密院事陳堯叟為鹵簿使右諫議大夫參知政事趙安仁為橋道頓遞使其禮儀橋道頓遞使事令拯洎堯叟分掌以欽若安仁先赴泰山故也先是王旦言封禪當命五使郊禋舊制以宰臣充大禮使以學士中丞尚書丞郎知開封府分領禮儀等使上升中大禮宜重其事五使之職當於中書樞密院班次命之馮拯曰臣等叨居重位復忝使名慮未為允望仍舊貫上曰大臣為之蓋重祀事也天禧三年右僕射兼門下侍郎平章事向敏中為天書儀衛使南郊大禮使中書侍郎兼吏部尚書平章事冦凖為天書儀衛使吏部尚書參知政事丁謂為儀衛副使給事中參知政事李迪為扶侍使翰林承旨刑部侍郎知制誥朝迥為南郊禮儀使翰林學士給事中知制誥錢惟演為儀仗使樞密直學士右諫議大夫兼太子賔客王曙為鹵簿使給事中權知開封府馬元方為橋道頓遞使左騏驥使英州團練使入內副都知周懷政為天書扶侍郎都監自封禪以來時命輔臣兼五使之職及是始復舊制皇祐二年九月二十七日辛亥有事於明堂取齋戒自新之義以宰臣文彥博為大禮使宋庠為禮儀使樞密使王貽永為儀仗使龎籍為鹵簿使參政髙若訥為橋道頓遞使以樞密副使梁適攝太尉告天地於南郊舊制大禮使以宰臣一員充自禮儀仗使以下以太常卿中丞兵部尚書開封尹充今並用兩府近臣蓋重其事也治平二年以御史中丞南郊鹵簿使賈黯為儀仗使以翰林學士南郊儀仗使范鎮為鹵簿使故事南郊以御史中丞為儀仗使天聖二年乃誤用中丞薛奎領鹵簿使而以翰林學士晏殊為儀仗使是用仁宗郊天故事黯言其誤故改之春明退朝録每南郊大禮循唐制命五使宰相為大禮使學士為禮儀使鹵簿使御史中丞為儀仗使知開封府為橋道頓遞使而禮儀使本太常卿事尚書兵部主字圖鹵簿使是其職也儀仗使排列之而鹵簿使督攝之其職事頗相通真宗時東封西祀奉祀皆輔臣為五使南郊則用學士而下仁宗籍田恭謝大饗明堂祫饗上大饗並循真廟之制定南郊行禮圖國朝乾德初上將有事圜丘以范質為大禮使質與鹵簿使路昭禮儀使劉溫叟討閲禮故事補其闕漏上之上甚嘉奬譯經潤文使春明退朝録太平興國中始置譯經院於太平興國寺延梵學僧翻譯新經始以光録卿湯公悅兵部員外郎張公洎潤色之後趙文定楊文公朝文莊李尚書維皆為譯經潤文官天祐中宰相丁晉公始為使天聖三年又以宰相王冀公為使自後每宰相繼領之然降麻不入銜又以參政樞密為潤文其事寖重每嵗節必進新經前兩月二府皆集以觀翻譯謂之開堂亦謂之清流堂慶厯三年吕許公罷相以司徒為譯經潤文使明年致仕章郇公代之自後乃降麻入銜宫觀使判官管勾都監提點提舉唐開元八年同州刺史薑師度兼管內長壽宫使其後或以御史中丞或以殿中監帶使至大厯九年後惟以同州刺史充五代梁開平元年罷後唐同光元年復置天福四年停使額國朝玉清昭應宫景靈宫會靈宫祥源觀皆置使有副使判官又有都監管勾之名或以宰相或翰林學士或知制誥為之都監以諸司使副使或中官管勾或權或同或異或曰都大不常其名熙寧六年昭應宫觀差遣係大卿監及諸司并本州知州自來帶管勾者並充提舉餘官管勾春明退朝録唐置宰相四人首相為太清宫使祖宗朝使相節度使未嘗有領京師官局者明道中錢相始為景靈宫使治平中武康節李端願始為醴泉觀使不拜命國朝王曽遷諫議大夫參知政事真皇好神仙築昭應景靈宫用大臣領使以曽為景靈使不拜命忤旨罷知政事出知天雄軍遷官處間局熙寧六年以莊宅使帶御器械知鎮戎軍張繡為騏驥使提點鳯翔府太平宫繡有戰功以病請退故遷官以間局處之間職難仍舊官八年以皇城使忠州團練使馬儞管局仙源縣景靈故也宫太極觀公事尋除儞大將軍間職難仍舊官用父恩九年以殿中丞曽孝純同管勾西京崇福宫從父公亮所乞也孝純兼當資序得管勾宫觀用父恩也奉使詩皇皇者華君遣使臣也送之以禮樂言逺而有光華也周禮凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也大行人之職時聘以結諸侯之好間問以諭諸侯之志掌大賔之禮及大客之儀以親諸侯九州之外謂之蕃國世一見小行人之職凡四方之使者大客則擯小客則受其幣而聽其辭象胥掌蠻夷閩貉戎狄之國使凡國大喪詔相國客之禮儀而正其位儀禮上公之使者七介侯伯之使者五介子男之使者三介君命者宰執書授使者書授上介使者及境張􅎶誓乃謁關人謁告也使者若過邦至于境使次介假道輕幣重使左傳云叔齊之子為季武子介以會自是晉人輕魯幣而益敬其使觀周樂吳季札來聘請觀於周樂魯以周公故有天子禮樂客使晉士文伯讓子産曰以敝邑政刑之不修冦盜充斥是以令吏人完客所館髙其閈閎厚其墻垣以無憂客使以尸行事楚伐吳陳侯使公孫貞子弔焉及良而卒將以尸入使吳太宰嚭勞且辭焉上介芋尹蓋對曰寡君聞楚為不道洊伐吳國使蓋備使弔君之下吏無祿使人大命隕墜君命逆使人曰無以尸造于門是我寡君之命委於草芥也且臣聞之事死以生禮也於是有朝聘而終以尸將事之禮又有朝聘而遭喪之禮若不以尸將命是遭喪而還無乃不可乎備使奉尸將命茍我寡君之命達於君所雖隕於深淵則天命也吳人內之不假道而殺使楚子使申舟聘于齊曰無假道於宋亦使公子馮聘於晉不假道於鄭申舟曰不假必殺我王曰殺汝我伐之見犀而行及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劍及於寢門之外車及於蒲胥之市遂伐宋也行人何罪鄭使良霄石㲋如楚告將服於晉楚人執之石㲋言於子囊曰楚實不競行人何罪楚人歸之一介行李鄭及楚平使王子伯駢告於晉晉使行人子貟對曰君有楚命亦不使一介行李告於寡君寡君將帥諸侯以見于城下惟君圖之出疆春秋之義大夫出疆有可以安社稷存萬民顓之可也王人序諸侯之上公羊傳八年公會王人齊侯宋公鄭侯許男曹伯盟于洮王人者何微者也曷序乎諸侯之上先王命也聞喪徐行公子遂如齊至黃乃復譏之大夫以君命出聞喪徐行而不反兵交使在其間晉伐鄭鄭人使伯蠲行城晉人殺之非禮也古者兵交使在其間可也使舉上客而不稱介穀梁文十八年魯公子遂叔孫得臣如齊使舉上客而不稱介不正其同倫而相介故列而數之白珩國語楚王孫圉聘於晉趙簡子鳴玉問圉曰楚之白珩猶在乎其寶也幾何矣曰未嘗為寶楚人有觀射父能作訓辭以行事於諸侯又有左史倚相能道訓典以序百物此楚國之寶也若夫白珩先王之所玩也何寶焉秦觀楚寶劉向新序秦欲伐楚遣使往觀楚之寶器物昭奚恤乃為壇使客東面自居西面之壇稱曰理百姓實倉廩子西在此奉圭璋使諸侯子方在此守封疆謹境界葉公子髙在此理師旅正軍戎司馬子反在此懷霸王之餘義獵治亂之遺風昭奚恤在此惟大國所觀使反言秦君曰楚多賢臣未可謀也輶軒風俗通周秦常以嵗八月遣輶軒之使採異方言還奏之藏于祕室窮河源史記禹本紀言河出崑崙髙二千五百餘里日月所相避隱為光也自張騫使大夏之後窮河源惡覩所謂崑崙者乎故言九州山川尚書近之矣禹本紀山海經所有怪物余不敢言之也斷髮文身越使諸發使於魏諸發斷髮文身為飾既就館魏王有令客若衣冠則以禮見若不衣冠則不見諸發答曰大國若遣使至敝邑亦須剪髮文身以見敝邑之君不然願從其俗魏王慙其言乃出見之還趙璧趙得楚和氏璧秦昭王請以十五城易璧趙長秦強不可違使藺相如奉璧於秦王坐章臺相如奉其璧視秦王見禮甚倨相如乃前曰璧有瑕請指之王授璧相如持璧睨柱怒髮上衝冠謂王曰臣竊觀大王得璧傳之美人以戲弄臣無意償趙城邑大王必欲急臣頭與璧俱碎於柱矣且趙王齋戒五日使臣奉璧今大王亦宜齋戒五日臣乃敢上璧秦王許之齋戒五日相如授從者衣褐裹璧從徑道歸趙秦王齋戒畢引趙使受璧相如云臣恐見欺王而負趙已令人持歸間至趙矣左右欲之引相如去秦王曰今殺相如終不得璧因厚遇而歸一出五國有變齊田常欲伐魯孔子聞之謂門弟子曰魯墳墓之國有二三子何為莫出子路子張子右請行俱不許子貢請行許之子貢至齊説田常且請使吳至而説吳王以救魯伐齊吳王惡越之有報吾心子貢又請使越説勾踐越王發卒佐吳臣請北見晉令共攻吳則其鋭兵盡於齊重甲困於晉而王制其弊此滅吳必矣越王從其計吳遂伐齊子貢去而之晉説晉君修兵卒以待之矣既行以待臨晉越王聞之涉江襲吳滅之故子貢出存魯亂齊破吳強晉霸越十年之中五國有變繆賢薦藺相如藺相如為趙宦者令繆賢舍人趙求人可使報秦者未得繆賢曰舍人藺相如可使也獻空籠魏文侯使蔡無澤獻鵠於齊侯行路失之獻其空籠謂齊侯曰寡人使臣獻鵠路而食之乃中天而去非不能買鵠不敢易君幣非不能逃亡惡絶兩君之好非不能自殺惡貴鵠鵠矣賤人是以獻空籠唯君裁之齊侯曰得子之言勝得得言勝得鵠上行人之官前漢藝文志從橫家者流蓋出於行人之官孔子曰誦詩三百使於四方不能專對雖多亦奚以為又曰使乎言其當權事制宜受命不受辭此其所長也及邪人為之則上詐諼而棄其信縣令負弩先驅司馬相如建節往使蜀太守以下郊迎縣令負弩先驅建節出關終軍初步入關關吏豫繻軍棄繻而去及為謁者使行郡國建節出關關吏識之曰此使者乃前棄繻生也請長纓羈南越終軍自請願受長纓必羈南越王而致之關下乃遣軍往説越王請舉國內屬天子大悅令使者留鎮撫之越相吕嘉不欲內屬發兵攻殺其王及漢使者軍死時年二十餘故世謂之終童矯制發倉粟賑貧民武帝時河內失火遣汲黯往視之還報曰家人失火屋比延燒不足憂臣過河內貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河內倉粟以賑貧民請歸節伏矯制罪上賢而釋之馮軾下齊七十餘城漢王定天下酈食其嘗為説客馳使諸侯又請奉詔説齊王使稱東藩上曰善於是使食其説齊田廣以為然罷其歷下兵守戰備與食其日縱酒韓信聞食其馮軾下齊七十餘城乃夜度兵襲齊廣聞漢兵至以食其賣已乃烹食其引兵走賜橐中裝陸賈以客從髙祖定天下名有口辨時中國初定尉他平南越因王之髙祖使賈賜他印為南越王賈至説他令稱臣奉漢約他賜賈橐中裝直千金至孝文時賈又使南越令尉他去黃屋稱臣直指使者暴勝之為直指使者衣繡衣持斧逐捕郡國盜賊自請治行鄭當時為九卿門下客至亡貴賤禮之聞人之善言進之武帝使視決河自請治行五日上曰吾聞鄭莊行千里不賫糧治行何也丁年奉使皓首而歸李陵與蘇武書曰足下以單車之使適萬乘之虜丁年奉使皓首而歸老母終堂生妻去帷此天下所稀聞也河梁蘇武將使胸奴李陵贈詩曰攜手上河梁遊子暮何之徘徊蹊路側悢悢不能辭齧雪與旃毛蘇武使胸奴單于置武于大窖中絶不與飲食天雨雪武卧齧雪與旃毛并咽之數日不死徙北海上無人處使牧羝羊鴈足書昭帝時胸奴與漢和親漢求蘇武等胸奴詭言武死後漢使復至胸奴武夜見使者教之為單于言天子射上林中獲鴈足有係帛書言武在某澤中使者以讓單于單于謝漢使遣武歸白髮而還武留胸奴凡十九嵗始以強壯出及還鬢髮盡白節毛盡落武在北海上牧羊卧起操持節毛盡落不失漢節張騫以郎應募使月氏胸奴得之留騫十餘嵗持漢節不失因與其屬亡既至月氏還復為胸奴所得留嵗餘單于死國內亂騫與妻俱亡歸漢拜太中大夫見邛竹杖蜀布騫所至者大宛大月氏大夏康居初騫見行十三人惟二人得還騫言在大夏時卭竹杖蜀布問安得此大夏國人曰吾賈人往市之身毒國大夏去漢萬二千里居西南身毒人居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從羌中險為少北則為胸所得從蜀冝往又無寇天子欣欣以騫言然乃令自蜀犍為發間使數道並出終莫能通後復從大將軍擊胸奴知水草處軍得以不乏乃封騫為慱望侯堂堂漢使蘇武使胸奴單于脅武令拜武不從胸奴以刃臨之武曰堂堂漢使安能屈於四夷哉拔佩刀自刺胸奴大驚疾醫之得愈斬樓蘭王傅介子使大宛還過龜兹言胸奴使從烏孫還在此介子率其吏士共誅斬胸奴使者還因請往刺樓蘭龜兹王以威諸國於是遣介子至樓蘭樓蘭王不親介子陽引去至其西界使譯謂因曰漢使者持金幣行賜諸國王不來受我去之西國矣其王果貪漢物求見使介子與飲酒醉使壯士刺殺之持其首述詔曰樓蘭王常為胸奴間候遮殺漢使者傅介子持使節誅斬樓蘭王首懸之北闕不煩師衆其封介子為義陽侯奉使不稱成帝陽朔二年關東大水遣諌大夫博士分行視以奉使不稱詔丞相御史與二千石雜舉可充博士者注不稱謂不副上意使者旁午昌邑王受璽以來二十七日使者旁午持節詔諸官署徴發凡一千一百二十七事如淳曰旁午分布也師古曰一從一橫為旁午言交橫也使絶域武帝詔州郡察吏民有茂材異等可為將相及使絶域者臨遣元帝詔臨遣光祿大夫褒等十二人循行天下存問耆老鰥孤困乏失職之民延登賢俊招顯側陋奉使稱意孔光成帝時為博士數決録寃獄行風俗振贍流民奉使稱意由是知名諭巴蜀檄唐蒙使略通夜郎發卒轉漕巴蜀民大恐上聞之乃遣司馬相如往責唐蒙等并告諭巴蜀民以非上意相如為檄文告巴蜀太守得職自二師將軍伐大宛之後西域震懼多遣使來貢獻漢使西域者益得職留漢使單于初立長年少號為兒單于是嵗元封六年也漢使兩使一人弔單于一人右賢王欲以乖其國單于怒而悉留漢使前後留胸奴者十餘人而胸奴使來漢亦留相當去節黯靣入穹廬胸奴法漢使不去節不以墨黯靣不得入穹廬漢使王鳥北地人習胡俗去其節黯靣入廬單于愛之因降胸奴漢使宦者中行説送公主妻胸奴説不肯行漢強使之説既至乃降胸奴而以漢事言之見大夫無可使者成帝時山陽亡徒蘇令等起為盜欲遣大夫使逐問狀時見大夫無可使者召盩厔令尹逢拜諫大夫遣之哀帝時王嘉疏曰今諸大夫有材能者甚少冝豫畜飬可成就者則士赴難不愛其死臨事倉卒乃求非所以明朝廷也不用婁敬言以困平城漢使入胸奴胸奴匿壯土肥牛馬徒見其老弱及羸畜使者十輩來皆言胸奴易擊上使婁敬復往使胸奴還報曰兩國相擊此宜夸矜其所長今臣往見羸胔老弱此欲伏竒兵以爭利愚以為胸奴不可擊是時漢兵已踰胸奴三十餘萬衆上怒械繫敬廣武遂至平城胸奴果出竒兵圍髙帝白登七日然後解帝至廣武赦敬曰吾不用公言以困平城吾已斬先將十輩言可擊者二使星後漢李郃善河洛風星人莫之識縣召署幕門候吏和帝即位分遣使者皆微服單行各至州縣觀採風謡使者二人當到益部投郃候舍時夏夕露坐郃因仰觀問曰二君發京師時寧知朝廷遣二使耶二人默然驚相視曰不聞也問何以知之郃指星示云有二使星向益州分野故知之耳醉不能揖人使英宗治平二年侍御史范純仁等奏錢明逸勞梁州使班荆館飲酒醉至不能揖人使乞付有司治罪詔勿治國信使國朝契丹自石晉後強盛太祖平海內勢始衰弱開寶七年中使為涿州刺史耶律琮以書遺雄州孫全興願講好於朝廷八年乃遣𣢾附奉書來聘自是乃通使矣凡命使普取旨選差今著為令景德二年詔接伴使副李宗諤等逐日入朝起居令於北朝人使前先起居於東靣立令人使起居差開封府官祖送人使條制應上德橋祖送人差開封府判官郎中以下並借朝散大夫檢校祕書少監守開封少尹輕車都尉食邑三百户賜紫金魚袋見任或曽借少卿者即借檢校祕書監守開封少尹并階勳食邑金紫如見係朝散大夫及已有勳封食邑金紫郎更不借差開封府官接伴人使條制應陳橋接拌差開封府推官員外郎以下並借朝散大夫工部郎中輕車都尉郎中借一官已係前行只升階借名曹如階勳已髙即不借其權發遣公事並落下只稱推官差文武臣充館判國信接伴使等借官不借官者并合乞借官者條制文臣如諫議以上更借官待制以上及省副知雜未係朝散大夫或未有勳及食邑並借朝散大夫右諫議大夫騎都尉食邑五百户內階勳食邑已髙者仍舊少卿借祕書監郎中以下並借太常少卿朝散大夫騎都尉食邑三百户賜紫金魚袋已有勳及食邑者不借見帶館職并省府主判遣等並落下如曽借官後來待制以上每及六年郎中以下四年更加借一官或加職若於上件年內更曽遇恩已加階勳食邑食實封亦與比附加借其都亭驛班荆館押賜御筵及開封府當國信路知州軍迎送公牒往還并轉運副使轉當押伴御筵乞借官者並準此武臣充副使如係正任遙邵并橫行皇城使更不借官其餘諸司使並借使額五資橫行及諸司副使並使正使閣門祗候及制崇班並借供備庫使內閣門祗候仍兼閣門通使舍人如不在閭門祗候更不帶通使舍人未有食邑借三百户已有者不借如已及二千户以上借食實封一百户職官分紀卷四十五
