body:
  text: 職官分紀卷十五宋孫逢吉撰翰林學士院唐韋執誼翰林故事翰林院者在右銀臺門內麟德殿西重廊之後蓋天下以藝能伎術見召者之所處也學士院者開元二十六年之所置在翰林院之南别戶向東考視前代即無舊名貞觀中祕書監虞世南等一十八人或秦府故寮或當時才彥皆以𢎞文館學士㑹於禁中內參謀猷延引講習出侍輿輦入陪宴私十數年間多至公輔當時號為十八學士其後永徽中黃門侍郎顧琮復有麗正之稱開元初中書令張說等又有集賢之目皆用討論親侍一無親侍二字未有典司𤣥宗以四隩大同萬樞委積詔勑文誥悉由中書或慮當劇而不周務速而將一作時字滯宜有偏掌列一官中承導邇言以通密命由是始選朝官有詞藝學識者當入居翰林供奉别㫖於是中書舍人吕向諫議大夫尹愔首充焉雖有密近之殊然亦未定名制至於書勑猶或分在集賢時中書舍人張九齡中書侍郎徐安貞等迭居其職皆被恩遇至二十六年始以翰林供奉改稱學士由是遂别建學士院俾専內命於是太常少卿張垍起居舍人劉光謙等首居之而集賢所掌於此悉罷自後給事中張淑中書舍人張漸竇華等相繼而入焉其外又有韓翃閻伯璵孟匡朝陳兼蔣鎮李白等在舊翰林院中但假其名並無所職至德以後軍國務殷其入直者並以文詞共掌詔勑自此北翰林院始兼學士之名其後又置東翰林院於金鑾殿之西隨上所在而遷取其便近大學士者或一二人或三四人或五六人出於所命蓋無定數亦有鴻生碩學經術優長訪古質疑主之所禮者頗列其中崇儒也初自德宗建置以來秩序未立庭覲之際各趨本列暨貞元冬始有别勑令朝服班序一本作明預班列與諸司官知制誥例同一本作同列故事中書用黃白二麻為綸命重輕之辨近者所出獨得用黃麻其白麻皆在北院自非國之重事拜授將相德音赦宥則不得由於斯稽夫發揮大猷藻飾上命隻簡片削可以動乎人神風行四方萬里如覩非制誥之謂歟蓋人君深拱端默於穆清之中茫茫九區視聽不及雖堯德舜智湯明禹哲不能庭策以朝告不能家閲以户臻必欲忘典謨掩訓誓隂諭於天下密符於胸襟鴻荒以還所蔑聞也故議定於內而事修於外言發於上而㫖敷於下微乎斯文百度闕矣况北院之置尤為切近左接寢殿右瞻彤樓晨趨瑣闥夕宿嚴衛密之至也驂鑣得御廄之駿出入有內司之導豐肴潔膳取給大官衾裯服御資於中庫恩之厚也備待顧問辨疑釋非典持縑牘受遣羣務一得一失動為臧否職之重也非夫恪謹而有立秉貞而通理俾乂樞要簡乎宸心言不及溫樹之名慎不遺轅馬之數處其職者不亦難乎至於强學修詞刀筆應用或久洽通儒之望或驟升文墨之科雖必有之乃餘事也自立此院以還五紀於兹連飛繼鳴數逾三十而屋壁之間寂無其文遺草間存於折編求名時得於舊老溫故之義於斯闕如羣公以執誼入院之時最原缺十一字遺補亡敢有多讓其先後嵗月訪而未詳獨以官秩名氏之次述為故事庶後至者編紀有倫貞元二年冬十月紀李肇翰林志故事駕在大內則於明福門內置院駕在興慶宫則於金明門內置院今在右銀臺門之北第一門東向榜曰翰林之門其制髙大重復四扇一本無四扇字號為朝門入門直西為學士院即開元二十六年之所置也引鈴於外雖宣事不敢入雖宣事不敢入一本作惟宣事入其北為翰林院又北為少陽院東臺三殿東臺三殿一作東屋三院西廂之結麟樓南西并禁軍營署有高品使二人知院事每日曉暮曉暮一只作一晚字執事於思政殿退而傳㫖小使衣緑黃青者元無青字逮至十人更畨守曹南㕔五間本學士駙馬都尉張垍飾為公主之堂今東二間前架高品使居之中架為藏書南庫西三間前二架洞豁設榻為受㫖封印書詔二時㑹食之所西壁列制敕條例名數其中使置博局一印匱中間為北一戶架東西各二間學士居之出北門橫屋六間一間一無一間二字當北㕔通廊東西二間為藏書北庫其二庫書各有録約八千卷小使主之西三間書官居之號曰待詔一本作待制北㕔五間東一間是承㫖閣子次一間相傳有惡物不居次二間為西閣子並學士雜處之題記名氏存於壁者自呂向始建中之後年月遷受乃為詳悉南北二㕔皆有懸鈴以呼召前庭之南橫屋七間小使居之分主參牘詔草紙筆之類又西而北為高品使之馬廄北為灶庫灶庫一作竇庫灶庫之北小板廊抵於北㕔㕔西舍之南一間待詔戴小平小一作少嘗處其中死而復生因敞為南向之宇畫山水樹石號為畫堂次北二間貯逺嵗詔草及制舉詞策又北曲回而東並待詔居之又東盡於東垣為典主堂待詔之職執筆硯以俟書寫多至五六員其選以能不以他故未嘗用士人自王伾得志優給頗厚率三嵗一轉官有至四品登朝者虛廊曲壁多畫怪石松鶴北㕔之西南小樓王涯率人為之院內古槐松玉蘂花藥樹柿林一作子木瓜菴羅植山桃李杏櫻桃紫薔薇辛夷竹蔔萄冬青玫瑰凌霄牡丹山丹芍藥石竹紫花蕪菁青菊當陛茙葵葷草紫苑薯藥學士至者皆雜植其間殆至繁隘楊巨翰林舊規儤宿例諸行尚書入三十五直左右丞侍郎入四十直常侍諫議給事舍人入四十五直諸官知制誥入五十直如諫議知節四十五直太常少卿諸行郎中入五十五直起居侍御史諸行員外入六十直殿中補闕入六十五直拾遺監察太常博士入七十五直四赤令并諸雜入一百直未升一百二十直白身一百四十直五代晉高祖天福五年詔翰林學士院於事並歸中書舍人至少帝開運元年勑翰林學士與中書舍人分為兩制各置六員偶自近年權停內署况司詔命必在深嚴將使從宜却仍舊貫宜復翰林學士院五年一本作六年國朝蘇易簡續翰林志李肇翰林志載禁庭之事詳矣至其引宋昌之言曰所言公則公言之所言私則王者無私翰林制置任用非王者之私識者以為知言自唐氏之制駕在大內則於明福門內置院駕在興慶宫則於金明門內置院德宗時移院於金鑾坡上迄咸鎬為墟以梁苑為東都今二京學士院之制並在樞密宣徽院之北蓋表其深嚴宥密焉其學士立班常朝暨聖節行香并大忌進名並隨樞密使坐次及行幸大宴在參知政事之後從北為首每三元張燈及賜酺上御乾元樓臨軒觀樂􅑀欄設次坐在上將軍之上郊祀籍田青城之內設幕次於殿門東偏别設穹廬穹廬一作氈宮以為寢所蓋備密命焉元作蓋邇丞相之次也管編録至和三年詔學士院從下兩員常専一管勾編録國朝以來所撰制誥文字鈴有聲申文炳續翰林故事唐李德裕鎮蜀時謂幕賔韋絢云翰林院有懸鈴以備夜直警急文書出入皆引之以代傳呼也長慶中豫為學士時河北用兵一夜鈴有聲如人引其索者使視之則無人後往往如此使人持棒潜視於下終無所覩而數數鳴動不已院中諸公私共怪其鳴時皆應用兵處耗聲則急緩亦如之曽莫之差衆咸異之元相詩云神撼引鈴索復置鈴索蘇耆次續翰林志有唐學士院深嚴非本院人不可遽入雖中使宣事及有文書必先動鈴索立於門外俟本院小判官出授授訖授院使院使授學士自五代以來其制久廢公因召對言之上可其奏自是院內復置鈴索玉堂之署先帝以玉署之設其來尚矣但虛傳其號而無正名乃於紅綃上御書飛白四字題曰玉堂之署以賜焉鈿軸晶瑩降從天上御香馥郁傳到人間遂捧歸私第以慶耀其親時祖母太夫人具命服焚香設拜而觀之喜歎之聲動乎鄰里即命置於本院中擇日懸掛仍具扁鑰於玉堂之上自待詔院吏而下咸列賀於庭公曰自唐置學士來幾三百年今日方知貴矣即日詔宰輔暨兩制詞臣就院設宴供帳之盛無如是時仍各賦長韻詩一章以紀其事其詩目曰禁林宴㑹集賜飛白四字上建二書闕先是內院逼近禁闈地復狹窄前後書詔繁萃積於房廊多所損壞公乃於玉堂後廡建二書閣東西交映藻繪間飾自是文藉有所附焉閣之上下悉命江僧巨然畫烟嵐曉景以布之筆迹野逸效李成之作而又自成一家之妙賜金印蘇易簡續翰林志晉開運中賜本院書詔金印一面玉堂上日許正坐筆談學士院玉堂太宗皇帝曽親幸至今惟學士上日許正坐他日皆不敢獨坐故事堂中設視草臺每草制具衣冠據臺而坐今不復如此但存空臺而已槐㕔學士院第三㕔學士閣子當前有一巨槐素號槐㕔舊傳居此閣者多至入相學士爭槐㕔至有抵徹前人行李而强據之者豫為學士時目覩此事敕設不用女優京師百官上日惟翰林學士敕設用樂他雖宰相亦無此禮優取自開封府燕集陳和叔除學士時和叔知開封府遂不用女優學士院敕設不用女優自和叔始翰林學士承㫖翰林學士唐百官志學士之職本以文學言語被顧問出入侍從因得參謀議納諌諍其禮尤寵而翰林院者待詔之所也唐制乘輿所在必有文詞經學之士下差卜醫伎術之流皆直於别院以備燕見而文書詔令則中書舍人掌之自太宗時名儒學士時時詔以草制然猶未有名號乾封以後始召文士元萬頃范履氷等草諸文辭常於北門候進止時人謂北門學士𤣥宗初置翰林待詔以張說陸堅張九齡等為之掌四方表疏批答應和文章既而又以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢院學士分掌制詔書敕開元二十六年又改翰林供奉為學士院專掌內命凡拜免將相號令征伐皆用白麻其後選用益重而禮遇益親至號為內相又以為天子私人凡充其職者無定員自諸曹尚書下至校書郎皆得與選入院一嵗則遷知制誥未知制誥者不作文書班次各以其官內宴則居宰相之下一品之上憲宗時又置學士承㫖唐之學士𢎞文集賢分隸中書門下省而翰林學士獨兼所屬李肇翰林志昔宋昌有言曰所言公公言之所言私王者無私夫翰林為樞機宥密之地其所慎者事之微也若制置任用則非王者之私漢制尚書郎主作文書起草更直於建禮門內臺給青緑白綾或以錦被帷帳氈褥畫通中枕大官供食湯官供餅餌五熟果五日一美食下天子一等建禮門內得神仙門神仙門內得明光殿神仙殿內得省中內得省中一本作自門下省中書省蓋與今翰林之制略同而所掌輕也漢武帝時嚴助朱買臣吾丘壽王司馬相如東方朔枚臯之徒皆在左右是時朝廷多事中外論難大臣數詘亦其事也唐興太宗始於秦府開文學館擢房𤣥齡杜如晦等一十八人皆以本官兼學士給五品珍膳分為三畨更直宿於閣下詩論賔興時人號為登瀛洲貞觀初置𢎞文館學士聽朝之際引入內殿講論文義商較時政或夜分而罷至𤣥宗朝置麗正殿學士名儒大臣皆在其中後改為集仙一無集仙二字集賢殿亦草書詔至翰林置學士集賢書詔乃罷初國朝循梁陳故事有中書舍人六員專掌詔誥雖曰禁省猶非密切故溫大雅魏徴李百藥岑文本禇遂良許敬宗上官儀時召草制未有名號乾封以後始曰北門學士劉懿之劉禕之周思茂元萬頃范履氷為之則天朝則蘇味道韋承慶其後上官昭容獨掌其事睿宗朝則薛稷賈厯福崔湜𤣥宗朝初改為翰林待詔張說陸堅張九齡徐安貞相繼為之又改為翰林供奉開元二十六年劉光謙張垍乃為學士始别建學士院于翰林院之南又有韓紘前作翃閻伯璵一本作輿孟匡朝陳兼李白蔣鎮在舊翰林院雖有其名而不職其事至德之後翰林院始兼學士之名代宗初李泌為學士而今壁記不列名氏蓋以不職事故也德宗雅尚文學注意是選乘輿每幸學士院顧問錫賚無所不至御饌珍羞輟而賜之又嘗詔對於浴堂門移院於金鑾殿對御起草賦詩唱和或旬日不出吳通微兄弟同時擢用與陸贄爭恩甚於水火天下醜之貞元末寄任尤重時人謂之內相而上多疑忌動必拘防有守官十三考而不遷者故當時言內職者多榮滯相半及順宗不懌儲位未立王叔文起於非類竊學士之名內連牛美人李忠言外結奸黨取兵柄弄權天下震駭是時鄭絪為內庭之老首定大計今上即位授絪中書侍郎平章事適與裴垍同直垍草吉甫制而吉甫草武元衡制垂簾揮翰兩不相知及暮吉甫有嘆惋之聲垍終不言書麻尾之後乃相慶賀禮絶之敬生於座中黎明院內使學士送至銀臺門而相府官吏候於門外禁署之盛未有也凡學士無定員皆以他官充下至校書郎上至諸曹尚書皆得為之既入與班行絶迹不拘本司不繫朝謁常參守官二周為滿嵗則遷知制詔一周嵗為遷官則奏就本司判記上月日北省官宰相送上南省官給舍丞郎送上興元元年敕翰林學士朝服班序宜准諸司官知制誥例凡初遷者中書門下召令右銀臺門候㫖其日入院試制書批答共三道詩一首自張仲素後加賦一首試畢封進可者翌日受宣乃定事下中書門下於麟德殿候對本院賜宴營幕使宿設帳幄圗褥尚食使供珍饌酒坊使供美酒是為敕設序立拜恩訖然後然後一作候字就宴又賜衣一副絹三十匹飛龍司借馬一匹旬日又進舊文章一本一本作旬日又進文一軸內庫給青綺錦被錦一作綿青綺無綿被綿元作錦一本無此五字青綺方裕青綾單帕漆通中枕銅鏡漆奩象箆大小銅胔碗胔一作觜象梳漆箱銅挲羅一本銅胔碗在此下紫絲履白布手巾衣架畫木牀一本作畫木牀無衣字爐爐一本作爐銅二字案席氈裀之類畢備內諸司供膳飲之物主膳四人掌之又內園官一户三人以供使令其所乘馬迎送於檘仗門內橫門之西度支月給手力資四人人錢三千五百四品以上加一人每嵗內賜春服物三十匹暑服物二十匹寒服物三十匹綿十屯寒食節絹絹一作料字三十匹酒飴杏酪粥屑肉啖清明新火二社蒸餅環餅端午衣一幅金花銀器一事百索一軸青團銀竹大扇一柄角粽三伏麨蜜重陽酒糖粉糕葉冬至嵗酒兔野雞其餘時果新茗水瓜新厯是為經制直日就院頒授下直就第賜之凡內宴坐次於宰相坐居一品班之上别賜酒食珍果與宰相同賜錦二十匹錦一本作帛金花銀器一事貞元四年敕每晦日上已重陽三節百寮宴樂翰林學士每節賜錢一百繩其日奏出選勝逰㑹賜酒脯茶果明年廢晦日置中和節宴樂如之非凶旱兵革則每嵗為常凡元正冬至不受朝俱進名奉賀大忌進名奉慰其日尚食供素饌賜茶十串凡郊廟大禮乘輿行幸皆設幕次於御幄之側侍從親近人臣第二御含元殿丹鳯樓則二人於宮中乘輿隨隨一本作引駕出殿門徐出就班次凡當直之法法一作次自給舍丞郎入者三直無儤自起居侍御郎官入五直一儤自御史補闕拾遺入者七直一儤其餘雜入者十直一儤新遷官一直服假各於准式之中一本作服假各於次之中减半著為别條例題于北㕔之西閣一無别字㕔一作壁凡交直俟內朝之退不過辰巳入者先之出者後之疏數視人之衆寡事之勞逸隨時之動靜凡節國忌授衣二分旬假之令不霑有不時而集併夜而宿者五代職官志後唐明帝天成三年八月敕掌綸之任擢才以居或自初命而升或自顯秩而授蓋重厥職靡繫其官雖事分皆同而行綴或異誠由往日未有定規議官位則上下不常論職次則後先為當宜行顯命以正近班今後翰林學士入院並以先後為定唯承㫖一員出自朕意不計官資先後在學士之上仍編入翰林志其年十一月敕新除翰林學士張昭逺早踐綸闈久司史筆曽居憲府纍陟二卿今既擢在禁林所宜别宣班序其立位宜次崔梲晉天福五年詔曰六典云中書舍人掌侍奉進奏參議表章凡詔㫖制敕璽書䇿命皆案故事起草進畫既下則署而行之其禁有四一曰漏泄二曰稽緩三曰違失四曰忘誤所以重王命也古昔以來典實斯在爰從近代别創新名今運屬興王事從師古俾仍舊貫以耀前規其翰林學士院公事宜並歸中書舍人從宰相馮道之奏也自是舍人晝直者當中書制夜直者當內制至開運元年復詔曰翰林學士與中書舍人分為兩制各制六員偶自近年擢停內署况司詔命必在深嚴將使從宜却仍舊貫宜復置學士院蓋宰臣桑維翰秉政將戾於道故乃復焉自是班秩再有倫矣周顯德五年詔翰林學士職係禁廷地居親近與班行而既異在朝請以宜殊起今後當直下直學士並宜令逐日起居其當直學士仍赴晚朝舊制翰林院學士與常參官五日一度起居時世宗欲令朝夕謁見訪以時事故有是詔已上三件并見蘇易簡續翰林志蘇易簡續翰林志凡儤直之數上自諸將尚書三十五直下至白身一百四十直必須圎融其直先五直舊學士一㸃次三直一㸃又次二直一㸃此三等隨日多少令其均勻永為定式晉開運中楊昭儉直綸閣酌其從來儤直之數等第除减條為定式申中書門下仍刻石在壁員外郎入舊八十直改為五十直郎中入舊六十直今改為四十直地官入舊一百直改為八十直自員外郎知制誥轉正郎仍舊知先六十直改為三十直正拜舍人舊四十直今為二十直自常侍諫議給事拜舍人舊四十直今為二十直應舊官再入約前任减半今附於此貴存舊章其內制儤直及吉凶疾病諸假則例具翰林舊規學士起復之制周朝以前未聞其例周世宗時故內翰王著今揆相李公昉俱遭內艱屬世宗北伐並起復隨駕書詔繁委之際即不遑叙合儤直與不儤直迄皇朝端拱元年閏五月蘇易簡遭家艱奉詔抑奪遂與翰長以下商議依鳯閣壁記禮例同舊官再入約計前直減半是時儤復直二十五直矣至皇朝今揆相李公獨直禁林奉㫖令每雙日夜直隻日下直可以永為通式也四禁之中漏泄為最故草制之夕遲明必闔門之雙扉堂制學士坐於玉堂上止吏人之出入者候宣制訖方啓户焉文翰之職優待之異者太祖英武聖文神德皇帝因置酒於紫雲樓下命兩制侍宴歡甚因命中書舍人來晨宜輟一本作內制起居今為通式仍各賜書千卷以備檢閲舊體每逰宴止學士得赴召暨皇上留心儒術旌賞文翰時綸閣之士始召赴曲宴或令和御詩舍人從逰宴自此始也厥後立春􅍢飾銀彩幡勝之物亦及之其或觀稼於南薰門賞花於含芳園春晝嚴蹕百司景從幸國西之金明池下雕輦登龍舟都人駕肩百樂具舉憩瓊林苑由復道御層樓臨軒置酒以閲繁盛兩制必侍從焉至上林春融千花萬卉妍麗冠絶上必曲宴宰衡勳舊召兩制詞臣俯龍池垂金鈎舉觴賦詩終日而罷上嘗謂宰執近臣曰詞臣實神仙之職也翊日凡所進詩悉回御毫屬和以賜焉雍熙三年十月敕曰兩制詞臣公朝精選典司綸誥親近冕旒宜於俸祿之間特示優異起今後兩制俸料並以見緡充上聽政之暇搜訪鍾王之迹以資閲玩焉御毫飛動神機妙思出其軌制乃召書學之有恪性者置於便殿躬自省閲仍授以筆法既覩其有成者錫以銀章象笏令入院充待詔者八人自是書詔四出寰海之內咸識禁中之墨妙焉舊體學士凡詔入院止賜白成􅀈都反了口銀鞍勒馬暨今上即位優待特異金渡銀裝鞍勒馬對衣荔枝金帶郊禮禮畢賜對衣牯犀帶金魚副之朝士自唐末久闕佩魚者迄今方復之十月朔舊賜對衣紅錦袍上特以細花熟錦袍代之淳元二年冬代以細花盤雕錦袍其制下丞相一等自是逺方之珍果天府之法釀龍鳯之茗荈伏臘之餅餌以時而賜悉加等焉玉堂之東壁延袤數丈悉畫水以布之風濤浩渺蓋擬瀛洲之象也待詔董羽之筆修篁皓鶴悉圗廊廡奇花異木羅植軒砌每外喧已寂內務不至風傳禁漏月色滿庭真人世之仙境也每學士拜命先閣門受制書於常朝殿門階上拜伏跪受訖於便殿對揚陳述寵用遭值之由謂之告謝上必從容賜坐錫以茶藥而退選日謝恩前一日待詔一人就宅宣召預於庭設裀褥堂設酒醴待詔稱有敕望皇居拜伏聽命其辭皆奬飾嚴召之意又舞蹈訖升堂飲饌以謝恩奏狀伏跪授之來日待詔迎於待漏院與新學士偕行引至閣門而退閣門舍人始引入中謝賜對衣金帶金塗鞍勒馬近例就院轉言惟承㫖得賜分物敕設如初拜之禮餘不得比入本院上事宣徽院告報敕設儀鸞宿陳帟幕大官備珍饌設上尊酒茗果畢至赴是設者止鳯閣舍人餘不得預坐舊體禁中宴元無樂前代或有令伎藝人弄獮猴藏珠之戲者玉堂之上惟上事受吏入賀禮始得正坐餘雖承㫖亦須坐於東廂其副翰坐西廂餘依雙隻對坐居是職者人物之選亦已極矣儒墨之榮亦已至矣茍能節用以安貧杜門以省事探真如之㫖養浩然之氣來者瞻望其出處時君優假其顔色逍遙卒嵗非神仙而何每上直一依舊制入者先之出者後之或㑹食日旰之後同列出院當其日直學士茍已禠巾笏則可紗帽靸履送至玉堂之簾下蓋同列相恕其坦率也或禁直垂簾人靜之際則有中使忽降持御詩宣令屬和則必尋拜謝狀後信宿方和進如聲韻奇險難以賡載者必拜章瀝懇陳述寡和之意優詔多免焉每餳賜謝恩奏狀必當直草或郊禋行慶制命填委必聚㕔以分草之其餘書詔辭祝頃刻之間雖繽紛而至必獨當之或數直有不草一詞者自可探賾往誥研窮理體以備顧問焉李肇翰林志曰凡將相告身並用金花五色綾紙唐乾寧二年李鋌自黔南節相授京兆尹兩次咨報中書用白綾紙今親王將相告身並用金花五色色背綾紙皇后貴主用金花五色色背羅紙不帶使相者用金花五色白背綾紙觀察使及參知政事樞密副使簽署樞密院公事並五色綾紙無金花諸蕃酋長蠻王鬼主宫告中書省草詞送學士院寫皆五色綾白背紙皆新例也例一作制舊體樞密使未帶使相者不宣麻至周太祖初潜歷是任乃宣制於公朝今之宣麻自周太祖始也蘇耆次續翰林志唐制學士每有除拜他職必納光院錢以為公用自丞相而下各有等差五代以還其儀久闕公振舉而復之國朝新制有殿前承㫖頗甚繁雜及公拜翰林承㫖上以其稱呼不别又惡其與清貴混淆詔改為三班奉職以避其稱也草麻潤筆自隋唐以來皆有之鄭譯隋文時自隆州刺史復國公爵令李德林作詔髙熲戲之曰筆頭乾譯答曰出為方伯䇿杖而歸不得一錢何以潤筆近朝武臣移鎮及大僚除拜因循多不送遺先帝以公久在內庭慮經費有闕特定草麻例物朝謝日命閣門督之既得仍以書進呈自是無敢有闕者迄今以為定制國朝淳化二年命翰林學士賈黃中蘇易簡同勾當差遣院李沆同判吏部流內銓學士領外司自此始也至和元年翰林學士楊察為承㫖知制誥召􅀈王洙並為翰林學士故事學士六員今洙為第七員蓋宰相過除也宰相一作相承元祐官品令翰林學士承㫖翰林學士正三品翰林學士承㫖召見詢訪時事唐韋澳大中年為翰林學士承㫖與同寮蕭置深為宣帝所遇二人同直無不召見詢訪時事每有邦國刑政大事中使傳宣草詔澳心欲論諫即曰此一事須降御札方敢施行遲留至旦必論其可否帝多從之居位在東第一閣元稹翰林學士承㫖記曰舊制學士無得以承㫖為名者應對顧問參㑹班第旅次以官為上下憲宗以永貞元年即大位始命鄭絪為承㫖學士位在諸學士上居東第一閣乘輿奉郊廟輒得乘廄馬自浴殿由內朝以從揭雞竿布大澤得升丹鳯之西南隅外賔客進見於麟德則止直禁中以俟凡大詔令大廢置丞相之密畫內外之密奏上之所甚注意者莫不專受專對他人無得而參也賜功臣五代後唐同光中賜承㫖學士盧質論思翊佐功臣旋授節制河中馮德玉送之詩云視草北來唐學士擁旄西去漢將軍時人榮之軋同列周陶榖自以官居欲八座位至承㫖且軋同列之官卑者乃起請令今後學士合班儀在諸行侍郎之下如官至丞郎者即在常侍之上官至尚書者依今班迄今以為准獻續翰林志國朝淳化二年翰林學士承㫖蘇易簡獻續翰林志二卷詔藏於史館仍賜御詩二章以寵之批云賜詩之意因卿進續翰林志美卿居清華之地也上又書玉堂之署四字以賜易簡因謂宰相曰易簡就朕求此數字卿可召至中書授之他日為翰林中美事擬大言賦淳化四年上草書宋玉大言賦賜蘇易簡易簡因肖宋玉作大言賦以獻其詞曰皇帝書白龍箋作大言賦賜玉堂臣易簡御筆煌煌雄詞洋洋瓌瑋博達不可備詳詔易簡升殿躬指其理且嘆宋玉之奇怪也因伏而奏曰恨宋玉不與陛下同時帝曰噫何代無人焉卿為朕言之易簡曰聖人興兮告成功登崑崙兮展升中芳席地文明也兮饗祖宗天籟起也執兮調笙鏞日烏月兔耀參旗井鉞嚴武衛北斗兮奠𤣥酒也削西華兮為石䃭也飛雲湧霞騰膰膫三激也刳鯨臘鵬代鶼鰈也迅雷三殿山神呼也流電爟火舉也禮册獻年載兮淳風還君百拜兮天神歡四時一周兮萬八千太山融兮溟海乾圓蓋穴兮弓輿穿君王壽兮無疆喜賞焉時殿上皆呼萬嵗上覽之賜手詔以褒之挾邪無迹治平三年以端明殿學士兼龍圗閣學士知徐州張方平為翰林學士承㫖方初上謂執政曰學士獨王圭能為詔餘多不稱職因問平文學如何歐陽修對曰方平亦有文學但挾邪不直曽公亮以為不聞其挾邪趙槩又以為無迹故至是命之宫嬪引燭入忩格筆談玉堂東承㫖閣子忩格上有火然太宗嘗夜幸玉堂蘇易簡為學士已寢遽起無燭具衣冠宫嬪自忩格引燭入照之至今不欲更易以為玉堂一盛事翰林學士三俊唐李紳字公垂能歌詩諷誦多在人口穆宗詔為翰林學士與李德裕元稹俱在禁署時稱三俊情意相善大手筆李德裕吉甫之子穆宗即位召入翰林為學士帝在東宫素聞吉甫之名既見德裕尤重之禁中書詔之大手筆多召德裕草之內相德宗在東宫素知陸贄名乃召為翰林學士承㫖德宗異顧歌詩戲狎朝夕陪逰及出居艱阻之中雖有宰臣而謀猷參决多出於贄故當時目為內相分宰相之權劉禕之與元萬頃等皆召入禁中共撰列女傳臣執百寮新誡樂書凡千餘卷時又密令參决以分宰相之權請廢吳通𤣥充翰林學士遷起居舍人知制誥與贄吉中孚韋執誼等同視草陸贄富詞藻特承德宗重顧經歷艱難通𤣥兄弟又以東宫侍上由是爭寵頗相嫌恨贄性褊急屢於上前短通𤣥又言承平時上藝書畫之徒待詔翰林比無學士祗自至德後天子召集賢學士於禁中草書詔因在翰林院待進止遂以為名奔播之時道途或預除改權令草制今四方無事百揆時序制書職分宜歸中書舍人學士之名理須停寢贄以通𤣥援引朋黨於禁中協力排已故請廢之德宗不許金鑾作賦命學士和陸扆字祥文充翰林學士又拜中書舍人天子顧待特異嘗金鑾作賦命學士和扆先成帝覽而嗟挹之曰朕聞貞元時有陸贄吳通𤣥兄弟能作內庭文書後來絶不相繼今吾得卿斯文不墜矣和賦先成上進狀連署崔羣為翰林學士羣在內職常以讜言正論於是憲宗嘉賞降宣㫖云自今學士進狀並取崔羣連署方與進來羣以禁密之司動為故事自爾學士或惡直醜正則其下學士無由上言羣堅不奉詔三疏論奏方允豈以公事接私財路隨自南式為中書舍人翰林學士有以金帛謝除制者必叱而却之曰吾豈以公事接私財耶書詔印元和初别置書詔印學士院主之凡赦書德音立后建儲大誅討拜免三公宰相命將曰制書並用白麻紙不用印雙日起草候閣門鑰入而後進書單日百寮立班於宣政殿樞密使引案自東上閣門出若拜免宰相則付通事舍人矩步而宣之機務要速亦用雙日甚者雖休暇退朝亦出之顧問錫賚無所不至德宗雅尚文學注意是選乘輿每幸學士院顧問錫賚無所不至御饌珍肴輟而賜之又嘗召對於浴堂門移院於金鑾殿對御起草賦詩唱和或旬日不出三昧或內務不至外喧已寂可以探窮理性飬浩然之氣故前輩傳楞伽經一本函在屋壁每下直出門相謔謂之小三昧出銀臺乘馬謂之大三昧如釋氏之去纒縛而自在也八甎北㕔前階有花甎道冬中以日影及五甎為入直之候李程性懶好晚入恆過八甎乃至衆呼為八甎學士除中書侍郎李吉甫除中書侍郎平章事適與裴垍同直垍草吉甫制吉甫草武元衡制垂簾揮翰兩不相知至暮吉甫有歎息之聲垍終不言盡紙尾之後垍乃相慶賀禮絶之敬生於座中及明日院中使學士送至銀臺門而相府官吏候於門外禁署之盛未之有也垂簾草制兩不相知上賜金蓮花燭令狐趙公大中初在內庭恩澤無二常便殿召對夜久方罷宣賜金蓮花燭送歸院使以下謂是駕來皆鞠躬階下俄傳呼曰學士歸院莫不驚異金蓮花燭柄耳惟至尊方有之令高力士脫靴李白字太白少有逸才初客逰㑹稽與道士吳筠隱於􅗄中既而𤣥宗詔筠赴京師筠薦之於朝遣使召之與筠俱待詔翰林白既嗜酒日與飲徒醉於酒肆𤣥宗度曲欲造樂府新詞亟詔白白已卧酒肆矣召入以水灑面沉醉殿上引足令髙力士脫靴由是斥去乃浪迹江湖終日沉醉時侍御史崔宗之謫官金陵與白詩酒唱和嘗月夜乘舟自采石達金陵白衣宫錦袍於舟中顧瞻笑傲旁若無人初賀知章見白賞之日此天上謫仙人也天上謫仙人上禁中頗牧畢諴為翰林學士党項羌屢擾河西宣示召學士對邊事諴即援引古今論列破羌之狀上悅曰吾方擇帥安集河西不期頗牧在吾禁中即用諴為邠寧節度河西供軍安撫等使諴至軍遣使告諭諸羌率化又開置屯田嵗收榖三十萬石省度支錢數百萬詔書嘉之宣宗舊史作懿宗小心兢謙鄭絪為翰林知制誥在內職十三年小心兢謙上遇之頗厚以正諌為己任李絳字深之為翰林學士孜孜以正諫為己任嘗因浴堂北廊奏對極論中宫縱恣方鎮進獻之事憲宗怒厲聲曰卿所論奏何太過耶絳前論不已曰臣所諫論於臣無利是國家之利憲宗見其誠切改容慰論之思如泉注陸贄為翰林學士朱泚之亂從駕幸奉天時天下叛亂機務填委徴發指踪千端萬緒一日之內詔書數百贄揮翰起草思如泉注初若不經思慮既成之後莫不曲盡事情中於機㑹胥吏簡札不暇同舍皆伏其能嘗啓德宗曰今盜遍天下輿駕播遷陛下宜痛自引過以感動人心陛下誠能不吝改過以言謝天下使書詔無所忌臣雖愚陋可以仰副聖情庶令反側之徒革心向化德宗然之故奉天所下書詔雖武夫悍卒無不揮涕感激多贄所為也三五日一入翰林王叔文本以棊待詔德宗令直束宫順宗即位召入翰林為學士叔文欲用事專國政遂引韋執誼為相應之於外已自專於內叔文在翰林俄兼充度支鹽鐡副使數月轉尚書户部侍郎領使學士如故內官俱文珍惡其弄權乃削去學士之職制出叔文大駭謂人曰叔文須時至此商量公事若不帶此職無由入內王伾為之論請乃許三五日一入翰林竟削內職求兼府掾姜公輔自左拾遺召入翰林為學士嵗滿當改官公輔上書自陳以母老家貧府掾俸給稍優乃求兼京兆府戶曹參軍非次拔擢白居易應才識兼茂明於體用科授盩厔縣尉集賢校理所著詩歌皆意存諷諫針時之病補政之缺往往流聞禁中武宗納諫思理渴聞讜言召入翰林為學士居易自以逢好文之主非次拔擢事無巨細必言或面論詞情切至多見聽納既而當改官上謂崔羣曰居易官卑俸薄拘於資地不能超等其官可聽自便奏來白居易奏曰臣聞姜公輔為內職求為京府判司為奉親也臣有老母家貧養薄乞如公輔例於是除京兆府户曹參軍草制不合㫖令狐楚為翰林學士時裴度自宰相兼彰義軍節度淮西招撫宣慰處置便宜宰相李逢吉與度不協與楚相善楚草度淮西招撫使制不合度㫖度請改制內三數句語憲宗方責度用兵乃罷逢吉相任亦罷楚內職太白之精李白翰林禁序云驚姜之夕長庚入夢故生而名白以太白字之世稱太白之精得之矣七寶牀又序云明皇下詔徴就金馬降輦步迎如是綺皓以七寶牀賜食御手調羮以飯之謂曰卿是布衣名為朕知非素蓄道義何以及此置之金鑾殿出入翰林中問以國政潜草詔誥人無知者醜正同列害能成謗格言不入帝用疏之言詩德宗善為文尤長於篇詠每與學士言詩於浴堂院夜分不寐不置詩學士文宗好五言詩御製品格多與代宗肅宗同而古調清峻齊梁之體不足為比延英問宰相曰要置詩學士員相國貞穆李公奏曰陛下所為慕在堯舜之上今起置詩學士名稍不佳况詩人多輕薄之士昧於識理若承顧問恐撓聖聰今翰林學士皆文詞精於鍳裁陛下若覽古今作者篇什足可怡悅聖情乃止以兄在相位解內職哀帝時敕翰林學士楊注是宰相楊涉親弟兄既秉於樞衡弟固難居宥密可罷內職榮滯相半貞元末其任益重而上多忌動必拘防有守官十三考而不遷者故當時言內職者榮滯相半天子私人陸贄曰頃來物議尤所不平皆云翰林學士是天子私人侵欺綱紀使聖朝虧至公之體宰相有備位之名爭恩吳通微昆季與陸贄爭恩甚於水火天下醜之寫真白居易寫真詩序云元和中豫為翰林學士詔寫真於集賢殿御書院書詔雲委杜讓能以員外判度支黃巢犯京師奔赴行在拜禮部郎中史館修撰尋召充翰林學士六飛在蜀關東用兵徴發招懷書詔雲委讓能詞才敏達筆無㸃竄動中事機僖宗嘉之東頭學士熊望者登進士第粗有文詞而性險薄有口辨劉栖楚以不次驟居清貴望出入栖楚之門有同密戚隂計密畫人無知者昭愍嬉遊之隙學為歌詩以翰林學士崇重不可䙝狎乃議别置東頭學士以備曲宴賜詩令採卑官才堪任學士者為之栖楚以望名薦送事未行而昭愍崩文宗即位韋處厚輔政大去奸黨流章州司戶崇重上召對燭栁公權充翰林書詔學士每浴堂召對繼燭見跋語猶未竟不欲取燭宫人以蠟淚揉紙繼之從幸未央宫苑中上駐輦謂公權曰我有一喜事邊上衣賜久不及時今年二月給春衣訖公權前奉賀上曰單賀未了卿可賀我以詩宫人迫其口進公權應聲曰去嵗雖無戰今年未得歸皇恩何以報春日得春衣上悅激賞久之元才子穆宗在東宮有妃嬪常誦元稹歌詩以為樂曲者知稹所為宫中呼為元才子荆南監軍崔潭峻甚禮接稹不以掾吏遇之潭峻歸朝出稹連昌宫詩詞等百餘篇奏御穆宗大悅即日拜祠部郎中知制誥朝廷以書命不由相府甚鄙之然辭誥所出敻然與古為侔不宜專取辭藝德宗以段文昌張仲素為翰林學士韋貫之謂學士所以備顧問不宜專取辭藝奏罷之備顧問上草賜陳傷邊將詔封敖為翰林學士武宗深重之嘗草賜陳傷邊將詔警句曰傷居爾體痛在朕躬武宗覽而善之賜以宫錦奏送郭􅌈二女歸其家帝於麟德殿召翰林學士栁公權丁居晦對因而授居晦御史中丞翌日制下是日帝問公權近日外議如何公權對曰昨陛下除郭􅌈邠寧節度使而外人情頗生異論帝曰郭􅌈是尚父之姪太皇太后之叔在官無過犯自執金吾大將授邠寧小鎮有何議論公權曰陛下數日前取郭􅌈二女入內有之乎帝曰然入參太后公權曰外議論云郭􅌈二女選入侍遂領藩方不言郭􅌈有他能而蒙聖奬帝俯首良久謂公權曰為之奈何公權曰昔廬江王妃入侍太宗王圭切諫太宗遂還其本家今陛下若令自南內送歸郭􅌈之家內外必信非陛下所納郭􅌈之授邠寧自無異論是日太皇太后遣南宫留後張日華送二女歸其家各與錦彩五十匹􅌈眉巾切舊書作肢字又作􅌈字山池曲宴屬和詩什唐宣宗雅好儒術每山池曲宴與學士屬和詩什時論以為有貞觀之風非廊廟之器續翰林故事李白常出入宫中恩禮殊厚竟以疏縱乞歸上亦以非廊廟之器優詔罷遣後以不羈流落江外又以永王招纍謫於夜郎賜姓董丞相晉自前明經釋褐受祕校便充翰林學士賜姓李其子溪亦擢明經尚主張垍與兄均皆充學士垍尚主或恩錫珍異意欲衒之謂均曰此是婦翁與女壻不是天子賜學士賜寒衣德宗幸金鑾院問學士鄭餘慶曰近有衣否餘慶云往時賜衣不煩更作上曰乃常例耳遂特賜繒纊令為寒衣作明河篇以見志宋之問天后朝求北門學士不許作明河篇以見志其詩末云明河可望不可親願得乘槎一問津更將織女支機石還訪成都賣卜人則天見其詩謂崔融曰非不知宋之問有奇才但恨有口過耳宋終身慚忿口過謂口臭也奇才有口過上草立儲制書立嫡以長四字順宗風噤不能言時太子未立學士王叔文起於非類內連年美人有異志中外洶懼鄭絪為內庭之老上召絪於內殿令草立儲制絪搦管便書立嫡以長四字跪而上呈順宗泫然乃定憲宗絪之力也即位拜平章事放歸田里德宗出左散騎常侍翰林學士張涉放歸田里以妻父在中書解職太常卿權德輿入相女壻翰林學士獨孤郁以妻父在中書解職守本官起居郎避嫌也以草詔漏叙功勳落職神䇿普潤鎮使蘇光榮為涇州刺使四鎮北庭行軍涇原節度使時學士韋𢎞景以草光榮詔漏叙功勳落職守本官司門員外郎行涇原節度使辨謗略憲宗謂宰臣曰聽受之間大是盡難事推誠遷任所謂要寄必合心及至所行臨事不無偏黨朕臨御以來嵗月斯久雖不明不敏然漸見物情每於行為務欲詳審比令學士草前代昧政之事為辨謗略欲披閲以為鍳誡耳崔羣對曰無情曲直辨之至易稍懷欺詐審之實難故孔子有衆好衆惡之論浸潤膚受之說蓋以曖昧難辨故也行若擇賢而知之待之以誠糾之以法則人歸公正孰敢僞陛下詳觀載籍以廣聰明實天下幸甚召對賜金紫穆宗即位是日召翰林學士段文昌杜元頴沈博師李肇對於思政殿並賜金紫論事稱㫖賜金紫穆宗召翰林學士龎嚴侍對論事稱㫖面賜金紫論不量移李紳敬宗立羣臣上尊號大赦時李紳貶端州司馬宰相李逢吉惡紳乃赦書內不言未量移者與量移但言先降官已量移者宜與量移近處翰林學士韋處厚上疏論列云不可為李紳一人與逢吉相惡遂令近年流貶官皆不得量移如此則全非曠達之道上遽命追赦文添改之奏言有裴度不能用故山南東道節度使牛元翼家屬悉為王庭湊所害敬宗惜其寃枉因嘆宰執非才縱奸臣跋扈學士韋處厚奏曰理亂之本非有他術順人則治逆人則亂陛下當食發嘆恨無曹蕭今有一裴度尚不能用此馮唐感悟漢文雖有頗牧不能用上嘉納其言園亭賜宴中宗景龍三年春正月宴侍臣及近親於梨園亭秋七月幸梨園亭宴侍臣學士八月幸長樂公主山亭宴侍臣學士賜繒帛有差又幸九曲亭子宴侍臣學士四年春二月庚戌令中書門下供奉官五品以上文武三品以上并諸學士等自芳林門入集於梨園毬場分朋枝河上帝與皇后公主親往觀之三月甲寅幸歸渭亭修禊飲賜羣臣栁棬以下內樣巾子夏避惡丙辰逰宴桃花園壬戍賜宰臣四月丁亥上逰櫻桃園引中書門下五品以上諸司長官學士等入芳林園嘗櫻桃便令馬上口摘置酒為樂乙未幸隆慶池結綵為樓宴侍臣泛舟戲象賜內樣巾子上山池曲宴屬和詩什宣宗雅好儒士每山池曲宴與學士屬和詩什每公卿出鎮亦賦詩餞行時論以大中之政有貞觀之風不離內庭至公輔翰林內志云睿聖登極段文昌杜元頴不離內庭便至公輔及寶厯以後韋處厚恩深授選亦自翰林由是稍為故事或不至拜者以為深恥與門生對草綸誥封舜卿唐武士宗朝翰林學敖之子舜卿登進士第纍遷中書舍人入梁為禮部侍郎知貢舉開平中與門生鄭致雍同受命入翰林致雍有俊才舜卿思拙澀每對草綸誥不勝困敝託致雍秉筆當時識者以為座主辱門生自緑衣賜紫莊宗即位鄴宫除馮道為賔郎充翰林學士自緑衣賜紫五鬼九國志唐璟即位馮延已喜形於色璟未聽政延已屢入白事璟不悅曰書記自有常職何為煩也俄拜諫議大夫充翰林學士復結魏岑侵損時政與其弟延魯及陳覺查文徽等更相推唱時人謂之五鬼徴引謬誤徐鍇傳湯悅為翰林學士作軍書徴引謬誤鍇詳以議之悅怒還奏鍇漏泄機密坐貶烏江尉嵗餘召深嚴之地當以宿儒處之國朝乾德元年以工部尚書竇儀為翰林學士時學士王著以酒失扈蒙以請求皆貶官太祖謂宰相曰深嚴之地當以宿儒處之范質對曰竇儀清介重厚然頃自翰林遷端明帝曰禁中非此人不可卿當諭以朕意勉令就職清切貴重非他官可比淳元四年以右諌議大夫史館修撰張洎屯田員外郎知制誥錢若水並為翰林學士洎等赴上帝曰學士之職清切貴重非他官可比朕嘗重此官故事學士赴上有敕設之制其事當令設之仍詔樞密直學士及知制誥預坐侍立御榻之側給事中參知政事蘇易簡言故事皇帝御樓肆赦翰林學士得升丹鳯之西南隅自今上御樓覃恩望令與樞密使侍立御榻之側從之渴欲見卿不及朝服王曽為翰林學士直日真宗首召之燕衣坐便殿謂渴欲見卿因不及朝服毋謂朕嫚近臣獻玉堂記求備職五年范杲以工部郎中知制誥㑹翰林學士宋白遷鄜州賈黃中李沆參知政事蘇易簡轉承㫖杲白以合得學士月餘制命未行乃併日連致書於相府請置此職又以范質嘗授與制誥一編以示宰相李昉云范公常許杲可當學士之任不敢失墜昉屢開釋之㑹上飛白書玉堂額以示翰林又獻翰林玉堂記願刻石上以杲躁競終不許改諌議大夫知濠州為卿潤色丁丑詔川陜兩路軍人百姓云云先是上詔翰林學士錢若水草詔既成以進上笑曰朕欲為卿潤色可乎若水頓首謝因命筆親竄數字引咎深切尤為精當眸子眊然不可居近侍太祖以和㠓宰相子能業文甚寵待之欲召入翰林謂近臣曰㠓眸子眊然胸中必不正不可以居近侍其命遂寢職當書詔賈黃中在翰林日上首召見訪以時政得失黃中但言臣職當書詔思不出其位至於外事臣何由知上益重之以為謹厚真拜學士在多遜之上李昉開寶中自延州徴還拜中書舍人未幾入直翰林先是盧多遜巳任學士因重陽宴近臣於講武殿太祖見昉在多遜下問其故宰相對曰昉以本官直學士院未即真拜真拜學士在多遜之上講武殿一本作宴文明殿書詔之外思不出位李昉自遷左太常少卿不踰年復拜中書舍人翰林學士㑹宰相趙普為盧多遜所搆數以其短聞於太祖太祖惑之因訪昉對曰臣書詔之外思不出位趙普行事臣何由知太祖默然既而普出勞役致疾李昉素病心悸每數嵗一發常語諸子曰我典誥命三十年勞役思慮而致是疾爾曹當戒之典誥命三十年上特受眷遇蘇易簡由知制誥入為學士年未三十屬文初不達體要及掌誥命頗自刻勵在翰林七八年特受眷遇敻絶倫等果以酒敗易簡性嗜酒在翰林日上嘗以詩戒之易簡恐懼每入直不敢復飲酒或休假在私第賔客俟之嘗醉以至其死上曰易簡果以酒敗可惜也多知典故張垍以中書舍人充翰林學士性便佞能伺候人主意博涉經史多知典故每上有所著述及賜近臣詩什垍必上廣徴引以將順其美奏內供奉為學士洎尤善事黃門官在翰林日引唐故事奏內供奉官藍敏貞為翰林學士使內侍裴愈副之上覽奏謂曰此唐室敝政疑二大臣遽以中人監之朕方循復古道安肯踵此覆轍卿言過也垍慚而退草制遺誤罰俸咸平五年學士宋白梁周翰罰俸坐草制遺誤也下詔當令中外易曉大中祥符三年帝謂宰臣曰昨日學士草賜陳堯叟詔述臣誡所傳真文乃云轍迹雖有所出流俗聞之非便又嘗草詔述老子乃云洪惟柱史卿宜諭㫖每詔下當令巾外易曉又嘗見敕書有以永安為洛汭者帝曰永安在洛水南言汭非也令改之近職不可居外也六年以翰林學士楊億為太常寺少卿分司西京仍令陽翟飬疾俟損日赴任億以母在陽翟被疾請告省侍不待報即就路上遣中使齎御封藥酒金帛賜之因謂輔臣曰億侍從官安得如此自便王旦曰億本寒士先帝賞其詞學置在館殿陛下拔擢至此倘以公議責之誠為罪也今當罷之故有是命有宰相器王旦為翰林學士中外以為有宰相器常奏事下殿真宗目送之曰興朕太平必斯人也咸平中拜參政下殿目送上命學士賜歌詩上作歌一首賜新授翰林學士兼龍圗閣罕學士陳彭年因謂向敏中等曰頃命學士曾賜歌詩因曰彭年詞學優長擢居清近久益慎密多聞好學鮮有偕者平居寫萬餘䇿復精詳典禮深明法令又或請益應答如流皆有依據常令檢討典故質正文義每一事具載經史子籍所出備而後已自非强記何由至此敏中曰彭年全才也豈止於文雅雍容侍從而已至如參酌時務詳求物理皆出人意表上然之因曰詳定所事無大小皆俟彭年裁制而後定此一句不可廢也往者參酌典禮雖遍歷攸同而所見皆出胥吏今已為式詞學優長擢居清近上復召入翰林天禧元年以工部侍郎錢惟演為翰林學士上謂輔臣曰惟演文甚典雅在審官數年聞其公正况前所罷職且非其過可復召入翰林故有此命乞楊億居上三年惟演上言以楊億景德中曽為學士今來官位並是丞郎乞億居上從之言兩府與羣臣不可見太后初宰相丁謂樞密使曹利用各面見太后奏事無敢定其議翰林學士晏殊奏凡兩府與羣臣不可見太后凡有奏事宜垂簾聽之庶幾不示私於天下從之外人不知奏藁晏殊為翰林學士凡有奏藁外人皆不知之真宗類之得八十卷草制得體嘉祐七年學士王圭當草立皇子制圭對於崇政有殿曰天下久望立太子然此議不出自陛下後必動搖動搖則禍亂之萌未可知也帝諭曰朕思宗廟之重夙夜不敢安今立皇子之議决自朕懷圭曰陛下誠能為宗廟計則天下之福也於是再拜殿上退而草詔以進先是中書召學士草詔圭曰此大事也必面稟得㫖於是求對議者以為得體數入翰林春明退朝録學士三入李文正劉中山子儀中山三入玉堂集云三入翰林皆待詔楊昭度宣召入院其舉自代皆宣獻公又宋景文范景仁四入李邯鄲五入而一不拜賜金帶并三品服李西樞憲成為知制誥尚衣緋出守荆南召為學士開門舉例賜金帶而不可加於賜緋乃并示三品之服誥引用霍光不當英宗治平二年翰林學士范鎮草韓琦等制誥稱引用霍光上以為不當欲出之執政以喻鎮令自請遂出知徐州其後上於制誥多親閲有不中理必使改嘗謂執政如此人君謨訓豈可褒貶失處獨能為詔見承㫖門挾邪無迹下五鳯齊飛歸田録太宗時宋白賈黃中李至呂蒙正蘇易簡五人皆同時拜翰林學士承㫖扈蒙贈之以詩云五鳯齊飛入翰林其後吕蒙正至宰相賈黃中李至蘇易簡皆至參知政事宋白官至尚書老於承㫖皆為名臣侍宴衣緑李浣為翰林學士常升殿侍宴浣衣緑左右揖令退浣叱之遂賜緋與座主和凝同任學士㑹凝入相浣當草制命開凝閣盡取器玩圗書以歸其縱率如此㑹廢學士院出為吏部員外郎遷禮部郎中知制誥復置翰林遷中書舍人再為學士時浣在西掖縉紳榮之與座主同任學士上知內外制趙上交晉初㑹廢翰林學士以上交為中書舍人同任學士見宰相不具靴笏繫鞋往時學士循唐故事見宰相不具靴笏繫鞋坐玉堂上遣院吏計㑹堂頭直省官學士將至宰相出迎近時學士始具靴笏至中書與常參官雜坐於客位有移時不得見者學士日益自卑丞相禮亦漸薄蓋習見已久恬然不復為怪也地勢清切不兼他務筆談舊翰林學士地勢清切皆不兼他務文館職任自校理以上皆有職錢唯內外制不給楊大年久為學士家貧請外表辭千餘言其間兩聨云虛忝甘泉之從臣終作莫敖之餒鬼從者之病莫興方朔之僟欲死甘泉從臣上夢兄弟數人同在禁林元厚之少時曽夢人告之異日當為翰林學士須兄弟數人同在禁林厚之自思素無兄弟疑此夢為不然熙寧中厚之除學士同時相先後入院為學士者一韓持國維一徐和叔繹一鄧文約綰一楊元素繪并厚之名絳五人名皆從糸始悟兄弟之說歎老卒梅詢為翰林學士一日書詔頗多搆思甚苦推觚循階而行忽見老卒卧於日中缺申甚適梅忽嘆曰暢哉徐問之曰識字乎曰不識梅曰更快活也徑剛寡合為人所譛歸田録楊文公億以文章擅天下然性徑剛寡合有惡之者以事譛之大年在學士院忽夜召見於一小閣深在禁中既見賜茶從容顧問久之出文稿數篋以示大年云卿識朕書蹟乎皆朕自起草未嘗命臣下大年惶恐不知所對頓首再拜而出乃知必為人所譛矣由是佯狂奔於陽翟真宗好文初待大年眷顧無比晚年恩禮漸衰亦由此也袍帶見陶榖陶尚書榖為學士嘗召對太祖御便殿榖至望見上將前見復却者數四左右催宣甚急榖終倣徨不進太祖笑曰此措大素事分顧左右取袍帶來上已束帶榖遽趨進作文書不稱職求解楊億為學士時草答契丹書云鄰壤交歡草既進真宗自注其側曰朽壤糞壤億遂改為鄰境明旦引唐故事學士作文書有所為不稱職當罷因亟求解職真宗語宰相曰楊億不通商量真有性氣不通商量上朱衣吏一人前引故事學士在內中院吏朱衣雙引太祖朝李昉為學士太祖在南衙朱衣吏一人前引而已昉因亦去其一人至今如此往時學士劄子不著姓但云學士臣某先朝盛度丁度並為學士遂著姓以别之其後遂皆著姓入劄子著姓上上元御筵四人在席嘉祐八年上元夜賜中書樞密院御筵於相國寺羅漢院國朝之制嵗時賜宴多矣自兩制以上皆與惟上元一夕祗賜中書樞密院雖前兩府見仕使相皆不得與也是嵗昭文韓公集賢曽公樞密張太尉皆在假不赴惟余與西㕔趙侍郎暨副樞胡諫議宿吳諫議奎四人在席酒行相顧四人者皆同時翰林學士相繼登二府前此未有也因相與道玉堂舊事為笑樂遂皆引滿劇飲亦一時之盛事也直學士院國朝開寶二年以中書舍人李昉知制誥盧多遜並直學士院九年以太子詹事湯悅率更令徐鉉並直學士院熙寧四年命知制誥王益柔陳繹兼直學士院候除學士罷直草高麗回答詔非工熙寧四年十月王益柔罷直學士院以草高麗回答詔非工以右正言知制誥檢正中書五房公事曽布兼直學士院四公皆江南文士退朝録開寶二年李文正以中書舍人盧相以知制誥並命直學士院太平興國元年湯率更悅徐騎省鉉直學士院王梓州克正張侍郎洎直舍人院四公皆江南文士也至熙寧二年復制舊官直翰林院國朝開寶六年以知制誥張瞻權直翰林院時盧多遜使江南使還如舊翰林侍讀學士翰林侍講學士唐百官志開元十三年改麗正修書院為集賢殿書院𤣥宗嘗選耆儒日一人侍讀以質史籍疑義至是置集賢院侍讀學士侍讀直學士國朝咸平二年以兵部侍郎兼祕書監楊徽之戶部侍郎夏侯嶠並為翰林侍讀學士國子祭酒邢昺為侍講學士翰林侍讀兵部兵一作戶員外郎呂文仲為工部郎中充侍讀一作講學士先是侍講名秩未崇真宗首置此職擇耆儒舊學以充其選班秩次翰林學士祿賜如之設直廬於祕閣侍讀更直侍講長上日給尚食珍膳夜則迭宿令監館閣書籍中使劉崇超日具當直官於內東門進入是時多詔對訪問或至中夕申謝日賜與與翰林學士同景德四年以翰林侍講學士工部尚書邢昺知曹州班在翰林學士之上從尚書班例侍講學士外使自昺始也天禧三年以工部侍郎參知政事張知白為刑部侍郎充翰林院侍讀學士知天雄軍府侍讀學士外使自知白始也乾興元年仁宗御崇政殿西廡召侍讀學士李維晏除侍講學士孫奭侍講馮元等講一有易字論語帝嘗語近臣以方親庶政聽斷之暇欲召名儒講習經典宰臣馮拯等曰今奉降詔每於雙日召侍臣講讀以當奉行前詔故也天禧舊制凡侍臣皆賜坐講者别設本於前别坐而聽乾興後每說書自侍臣皆先就坐賜茶訖徹席立講講訖復坐賜酒自後又取工部元有侍字郎中馬宗元直龍圗閣亦令講書凡說論語孝經禮記尚書春秋老子道德經侍讀初無所職但侍立而已自宋綬夏竦為侍讀始令日讀唐書一傳參釋義理每講書日帝親書古賢詩或取經書要言書一二紙其後遂罷又令侍講一本作侍讀讀真宗正說經史文字涉凶事惡亦須預設無所規鍳即不講一本作讀或召中書樞密院聽書即於侍官前設坐著寫宣十卷唐王起長於博洽文宗時為翰林學士起侍講時或僻字疑義令中使口宣即以榜子對故起著寫宣十卷復召鄭覃文宗朝為左散騎常侍充翰林侍讀學士覃長於經學稽古守正帝尤重之奏以經籍訛謬請召宿儒校定六籍准後漢故事勒石於太學從之及李宗閔輔政以覃與李德裕善奏為工部尚書罷侍講學士文宗好經義心頗思之復召為侍講學士入院日賜宴李訓因鄭注王守澄得見文宗薦訓知易道遷國子周易博士充翰林侍講學士入院日賜宴宣法曲弟子二十人就院奏法曲以寵之內省諌官伏閣切諫言訓奸邪海內聞之不宜令侍宸極上終不聽學有師法韋處厚通五經博覽史籍而文思贍逸為戶部郎中知制誥穆宗以其學有師法召為翰林為侍講學士授諌議大夫改中書舍人侍講三侍學士文宗召兵部尚書王起禮部尚書許康佐為侍講學士中書舍人栁公權為書學士上每有疑義即召學士入便殿顧問討論率以為常謂之三侍學士恩寵異等分講詩書韋處厚為戶部侍郎知制誥穆宗即位與司勳員外郎史館修撰路隋並充翰林侍講學士召入太掖亭命分講毛詩關雎尚書洪範等篇訪以理體處厚等演經義以廣規諷之道從容開納賜果酒而罷演經義以廣規諷上抄撮六經崔郾轉給事中昭愍即位遷侍講學士轉中書舍人入思政殿謝恩奏曰陛下用臣為侍講半嵗有餘未嘗問臣經義今蒙轉改實慙尸素有愧厚恩帝曰朕機務稍閒即當請益郾退與同列高重抄撮六經嘉言要道區分事類凡十卷名曰諸經纂要兾人主易於省覽上嘉之賜綵二百匹兄弟迭處禁密高元裕為中丞弟少逸遷諫議大夫代元裕為侍講學士兄弟迭處禁密時人榮之清慎介潔宋申錫字慶臣寶厯二年轉禮部貟外郎尋充侍讀學士申錫始自策名及在朝列清慎介潔不趨黨與當長慶寶厯之間時風囂薄朋比大扇及申錫被用時論以為激勸請置李程字表臣作相奏請置侍講學士數陳經義程辨給多智算能移人主之意履行純謹立身清約國朝皇祐中翰林侍讀學士給事中郭勸表乞致仕帝以勸履行純謹立身清約特降詔不允示優恩也旋閲經史以備顧問夏竦之子安期除侍讀學士經術不甚深而登進經筵日夕旋閲經史以備顧問自厭之乃懇求外補帥延州敷暢經㫖議論該洽上嘗詔翰林侍讀學士張錫講書禁中錫敷暢經㫖議論該洽上嗟賞久之錫時年六十七鬢髮皓然上曰卿老矣記問不衰乃以飛白書博學字賜之及因訪以治道錫曰節欲者治身之本也慎刑賞者治國之本也時貴妃被幸故以此諷之上改容曰卿言甚嘉朕恨用卿晚矣賜飛白博學字上賜錢五十萬至和元年賜翰林侍讀學士楊安國錢五十萬仍聽大寒暑毋入謁時安國言衰憊不任侍經席願乞骸骨以歸故賜及之帶知大名府東齊記事故事侍讀學士無帶出外者張知白罷參知政事授此職知大名府然非歷二府而出者不得與寶元中梅詢始帶知鄭州改許州自後兩制遂為例也翰林侍讀翰林侍講國朝太宗聽政之暇日閲經史患顧問闕人太平興國八年始用著作佐郎吕文仲為侍讀尋又為翰林侍讀賜緋魚袋寓直御書院立本官班嘗出經史召文仲讀之真宗咸平元年又訪通經義者於時參知政事李至薦國子直講崔頥正召於後園令說尚書大禹謨面賜五品服然未𨽻𨽻一作建學士之職一本作然自楊徽之始建學士之職其後馮元為翰林侍講亦不帶學士之名又有馬宗元為侍講高訥為侍讀不加别名但供職而已東齊記事崇政殿之西有延義閣南向迎陽門之北有邇英閣東向皆講讀之所也仁宗皇帝新即位多御延義每初講讀或講讀終篇則宣二府大臣同聽賜飛白書或遂賜宴其後不復御延義專御邇英春以二月中至端午罷秋以八月中至冬至罷講讀官謻門上賜食俟後殿公事退繫鞋以入宣坐賜茶就南壁下以賜坐復以次起講讀又宣坐賜湯其禮數恩渥雖執政大臣亦莫得與也仁宗朝講讀官侍邇英者皆立每問事則衆人齊對頗紛紛乃詔皆坐唯當講讀者以次立而記注亦坐石昌言奏記注官當立侍密邇德音以詳記録不可坐遂令立侍耆儒博碩唐𤣥宗開元三年制曰朕聽政之暇嘗覽史書但聞理道實所留心中有闕疑時須咨問宜選耆儒博碩一人每日入內侍讀公卿薦光祿寺卿馬懷素因拜左散騎常侍與右散騎常侍禇無量更入侍讀更入上師資馬懷素為祕書監兼昭文館學士謙恭謹慎深為𤣥宗所私令與右散騎常侍禇無量同為侍讀每至閣門則令乘肩輿以進上居别館以路逺則命宫中乘馬或親自送迎以申師資之禮入閣白履忠嘗隱居大梁城景雲中徴拜校書郎棄官而歸開元中刑部尚書王志愔表薦履忠隱居讀書貞苦守操堪代禇無量馬懷素入閣侍讀顧待甚厚禇無量與馬懷素俱為侍讀顧待甚厚及無量等卒後祕書少監康子元國子博士侯行果等又入侍講雖加恩賜而禮遇不逮禇馬禮遇不逮禇馬上諫正有史魚之風後漢張酺肅宗即位擢為侍中虎賁中郎將數月出為東郡太守自酺出後帝每見諸王師傅常言張酺前入侍講屢有諫正誾誾侍側出於誠心可謂有史魚之風矣元和二年東巡狩幸東都引酺及門生并郡縣掾史並㑹庭中帝先備弟子之儀使酺講尚書一篇然後修君臣之禮賞賜殊特莫不沾洽侍言帝幕酺傳贊云孟侯經博侍言帝幕勸講帷幄楊秉字叔節桓帝即位以明尚書徴入勸講拜太中大夫選侍郎尚書帝時微行私過幸河南尹梁徹府舍秉上疏諫略曰臣奕世受恩得備納言又以薄學充在講勸特蒙哀識見照日月恩重命輕義使士死敢憚摧折略陳其餘帝不納秉以病乞退出為右扶風太尉黃瓊惜其去朝廷上言秉勸講帷幄不宜外遷留拜光祿大夫侍勸講猶講侍講華光楊賜字伯獻靈帝嘗受學詔太傅三公選通尚書桓君章句宿有重名者三公舉賜乃侍講於華光殿中後為太尉去位後帝徙南宫閲録故事得賜所上黃巾賊張角奏及前侍講注籍乃感悟下詔封賜臨晉侯邑一千五百戶初賜與太尉劉寬司空張濟並入侍中講自以不宜獨受封賞上疏願分戶邑於寬濟帝嘉嘆封寬及濟子賜衣一襲劉寬字文饒靈帝初徴拜太中大夫侍講華光殿遷侍中賜衣一襲華光殿在華林園內侍講禁中獻帝頗好文學荀悅與彧及少府孔融侍講禁中旦夕談論講詩國朝仁宗嘗命侍臣講毛詩而諌官余靖上疏曰竊聞今嵗講說毛詩將踰浹旬臣愚以天子之學與臣下不同惟當撮前經之樞要復先王之軌範簡而不煩為得其術且周南召南王化之本正始夫婦不可棄也豳風陳農夫卒嵗之事可以知王業之艱難王風痛周室衰微足以鍳戒前古至於雅有正變知廢興之由頌之褒贊見太平之始皆王者之事宜稱說於前也其餘弼鄘而下列國變風悉諸侯失德之詩墻有茨中冓不可道之言不可以為訓宜皆略去不足為陛下陳之若有難臣者云春秋亦載諸侯戰爭之事臣將應之曰孔子作春秋垂一王之法以寄褒貶非同新臺雄狐惑亂之刺也伏乞早降指揮上曰朕宫中無事玩心經典今靖所言正欲明其大要此誠知治體也自後命侍臣講讀凡經書有該治亂及教化者周悉講論六經載監戒何必諱歸田録仁宗退朝常命侍臣講讀於邇英閣賈侍中昌朝時為侍講講春秋左氏傳每至諸侯淫亂事則略而不說上問其故賈以實對上曰六經載此所以為後王監戒何必諱翰林侍書唐有侍書學士五代無聞國朝太平興國七年以著作佐郎翰林祗候王著為著作郎翰林侍書隸御書院卒不復置著成都人歸朝為隆平主簿善能正書行草筆跡甚媚太宗以字書訛舛欲令刪定即日召著入授衛尉寺丞史館祗應詳定急就章遂為侍書纍至殿中侍御史三侍學士唐栁公權見翰林侍講學士翰林待詔國朝初翰林待詔六人寫書詔舊制月俸九千春冬給衣又有隸書待詔六人寫簽頭封角月俸止六千謂之東頭待詔雍熙四年廢隸書增置翰林待詔十人續翰林志上聽政之暇搜訪鍾王之跡以資閲玩焉御毫飛動神機妙思出其軌制乃召書學之有格性者置於便殿躬自省閲仍授以筆法既覩其有成各錫以銀章象笏令入院充待詔者八人自是書詔賜出寰海之內咸識禁中之墨妙焉端明殿學士自後唐明宗開成始本朝後隨殿名改為文明又改紫宸又改觀文至明道初遂别改承明殿為端明殿置端明殿學士在資政殿學士之下與文明之職並存而無所掌又文明殿學士之初後唐明宗置端明殿學士二員位翰林學士上專備顧問太平興國五年緣殿名而改此職益重也始端明置大學士自賈魏公也五代史後唐天成元年因唐室侍讀之號置端明殿學士命翰林學士尚書户部侍郎知制誥馮道翰林學士中書舍人趙鳯俱以本官充時明宗初即位四方書奏命樞密使安重誨進讀懵於文義孔循獻議始置端明殿學士首命道等充職二年敕班在翰林學士之上今後如有改轉止於翰林學士內選任初如三館例職在官下趙鳯轉侍郎諷任圜特移職在官上後遂為故事晉天福五年廢端明殿學士開運元年桑維翰為樞密使復奏置學士退朝録後唐明宗以樞密使安重誨不通文義置端明殿學士以翰林學士馮道趙鳯為之班樞密使之右食於其院端明殿即西京正衙殿也本朝程侍郎羽為之後隨殿名改為文明殿學士李司空昉為之慶厯中以同永定諡號改為紫宸殿學士丁文簡罷參知政事為之何右丞郯為御史言紫宸非人臣所稱又改為觀文殿學士未幾賈魏公以使相換僕射因置大學士處之仍詔非歷宰相不除明道中改承明殿為端明殿先公自南都召歸特置學士班翰林資政之下與舊職名同而立位異矣歸田録丁文簡公度罷參知政事為紫宸殿學士即文明殿學士也文明本有大學士為宰相兼職又有學士為諸學士之首後以文明者真宗諡號也遂更曰紫宸近世學士皆以殿名為官稱如端明資政是也丁既受命遂稱曰丁紫宸議者又謂紫宸之號非人臣之所宜稱遽更曰觀文觀文乃隋煬帝殿名理宜避之蓋當時不知然則朝廷之事不可以不學也端明殿學士五代後唐時置國朝尤以為貴多以翰林學士兼之其不以翰苑兼職及換職者百年間才兩人特拜程戡王素是也東齊記事後唐置端明殿學士太平興國中改端明殿為文明以程羽為文明殿學士位樞密副使之下明道元年改承明殿為端明殿二年除宋宣獻公為學士與文明之職並存而降其班序是嵗又改殿曰延和慶厯七年以真宗諡改文明為紫宸丁文簡公為紫宸殿學士既而言者以為紫宸非臣下所稱乃以延恩殿為觀文殿而以丁文簡公為觀文殿學士相繼以賈文元公為大學士乃詔自今非嘗為宰相勿除殿前學士只有兩人後唐天成元年命馮道趙鳯充端明殿學士非舊號也馮道笏記云天下儒生僅餘萬數殿前學士只有兩人時輩榮之見續翰林志拜相謝於本殿劉昫為兵部侍郎端明殿學士明宗重其風儀愛其溫厚拜為中書侍郎兼刑部尚書平章事昫入謝遇大祠明宗不御中興殿閣門曰舊禮宰相謝恩須於正殿通喚請俟來日樞密使趙延對曰命相之制下已數日中謝無宜後時因即奏之遂謝於端明殿昫自端明學士拜相謝於本殿士子榮之輪修日厯送史館明宗朝命端明殿及樞密直學士皆輪修日厯旋送史館而受國朝治平三年幸天章寶文閣命兩府觀翰林學士兼侍讀學士王圭所業仁宗御書詩刻石召圭而受兼端明殿學士觀文殿大學士學士自本朝慶厯七年始改觀文殿即舊日延恩殿也即元所謂紫宸殿學士也端明殿即西京正衙殿也後隨殿名改為文明慶厯七年自文明改紫宸以紫宸人不可稱乃以延恩改觀文置學士皇祐元年又置大學士亦自賈魏公始國朝觀文殿即舊延恩殿也慶厯七年以文明學士稱號同真宗諡乃改名紫宸殿以冠學士之職又以紫宸非人臣所可稱乃改名以延恩殿更名觀文殿置學士皇祐元年詔特置大學士寵待舊相今後須嘗任宰相乃得除授班列俸給臨時取㫖賈昌朝由使相右僕射觀文殿大學士自昌朝始也三年閣門言請觀文殿大學士起居儀式詔令在觀文殿學士之前作一行立班其閣門儀制合班圗內髙下相壓並右位觀文殿大學士六曹尚書之上元祐令觀文殿大學士至寶文閣待制為侍從官退朝録歸田録東齊記事並見端明殿學士門官品令觀文殿大學士從二品學士正三品樞密直學士自後唐莊宗同光始初梁置崇政判官又改直崇政殿後唐同光中置樞密直學士一人國朝大中祥符五年八月詔日宥密之地出處深嚴論思之臣踐揚清要雖素由於慎簡尚未立於定員矧侍從材難軒墀望峻在選賢之攸重宜著位之有常樞密直學士自今以六員為定國朝初無定員班次翰林學士是嵗工部侍郎薛映知并州得對自陳援張詠張秉例得預近職真宗以員數問宰臣王旦旦曰近朝止置兩員今已九員帝曰映但授此職自此常為定限也續翰林志梁開平元年改樞密院為崇政院命敬翔為院使二年置崇政院直學士兩員選有正術文學者為之始以尚書吏部郎中吳藹兵部郎中李珽充選又改為直崇政院後唐同光中依舊為樞密院亦置樞密直學士一人班次在翰林學士之下國朝無定員班次翰林學士與文明殿學士並掌侍從備顧問崇政殿朝則升次侍立大中祥符五年詔樞密直學士自今以六員為定元祐官品令樞密直學士正三品輪修日厯後唐見端明殿學士夢宣召賜對東齊記事蔡子直識英宗皇帝於藩邸為最舊既即位久之以樞密直學士知秦州英宗上仙不及見一日夢宣召賜對又賜茶既而辭出因留之曰只住此更毋得去寤而記憶乃靈駕發引日因大慟哭遂得疾日中而卒其幽冥之感有如此焉屨見庶僚晉少帝時馮玉為樞密使殷鵬為本院學士每有庶僚秉鞟謁玉故事宰相以屨見之朕自知卿非它人薦顔術以檢校右庶子知州事父疾侍養晉祖召為工部侍郎樞密直學士遣使促召之闕辭曰臣本書生無他才術恐不稱其職未知何人誤有推薦望放臣還遂其私養足矣晉祖曰朕自知卿非他人薦也資政殿大學士學士置資政殿學士與大學士皆自王欽若始國朝殿在龍圖閣之東序景德四年一本作二年工部侍郎參知政事王欽若求罷政特置資政殿學士以寵之在翰林學士之下侍讀學士之上餘依學士例先是欽若再表求罷政繼以面請故特置是職以寵之十二月以欽若為兵部侍郎資政殿大學士班在文明殿學士之下翰林學士承㫖之上欽若以自求罷免恥在翰林學士之下真宗為除大學士以優之歸田録王冀公欽若罷參知政事真宗眷遇之意未衰特置資政殿學士以寵之時冦萊公在中書定其班位依雜學士在翰林學士下冀公因訴於上曰臣自學士拜參知政事今無罪而罷班反在下是貶也真宗為特置大學士班在翰林學士上其寵遇如此康定二年右正言梁適言資政殿大學士之職比來除授太濫請遵先朝故事定以員數詔自今大學士置兩員學士三員不得近臣陳乞元祐官品令資政殿大學士學士正三品請鑄印不許退朝録真宗優待王冀公景德中罷參知政事始置資政殿學士以命之宰相寇萊公頗抑之令班在翰林之下及命為大學士冀公請鑄印不許遂領尚書省自有印也龍圖閣自大中祥符始建以專藏太宗御製御書文集及書帖等也國朝大中祥符初建閣在㑹慶池一作殿西偏北一作比連禁中閣東曰資政殿西曰述古殿閣上藏太宗御一作製書及典籍圖畫寶瑞之物內侍三人掌之太宗御製御書文集總五千一百一十五卷軸册又有御書紈扇數十其下立六閣閣一本並作閣經典閣五千三百四十一卷史傳閣七千三百一作二百五十八卷子書閣八千四百八十九卷文集閣七千一百八卷天文閣二千六百一作五百六十一卷圗書總七百一軸卷册瑞物閣奇瑞三十三瑞本六十衆瑞一百三十雜寶五百九十五咸平四年真宗御龍圖閣召近臣觀太宗御書及古今名畫自是多召近臣觀書是閣嘗語近臣曰先帝留意詞翰朕孜孜綴緝片幅寸紙不敢失墜因念古今圗籍多所散逸購求甚難朕在東宫時惟以聚書為急一本作意多方購求亦甚有所得王維英備見其事今已類成正本除三館祕閣所藏之外又於後苑及龍圗閣並留正本各及三萬餘卷朕以深資政理莫如經術故機務之暇惟以觀書為樂焉大中祥符二年又嘗召向敏中陳從易劉筠對命坐帝曰從易輩屢進文字可令賦瑞雪歌祀汾隂詩皆即席援筆成篇既進帝尤稱筠美贍並賜魚袋咸平五年召近臣觀書於龍圗閣閣之四壁設五經圖閣上藏太宗書帖三千七百五十卷又幸崇和殿之後閣悉藏本朝名臣文集又幸資政殿壁有唐相如政惡論上作七言詩侍臣皆和六年對輔臣於龍圖閣觀种放山居圖放别墅在終南山聚徒講學性嗜酒嘗種秫自釀林泉之景頗為幽勝上遣使携畫工圖之而觀焉景德二年御製龍圗閣贊遍賜近臣帝曰龍圖閣書屢經讎校最為精詳已復傳寫一本置後苑太清樓朕自居藩邸以至臨御凡亡缺之書購求備至每於藏書之家借本必令置籍出納傳寫既畢隨便給還靡有損失故奇書祕籍悉無隱焉學士直學士待制直閣國朝大中祥符三年杜鎬為龍圖閣學士班在樞密直學士之上六年詔龍圖閣學士直學士給銜在本官之上景德四年詔直學士班在樞密直學士之下仍少退待制在知制誥之下並赴內殿起居景德元年以虞部郎中直祕閣杜鎬為都官郎中太常丞祕閣校理戚綸為右正言並依舊充職充龍圖閣待制大中祥符二年詔班視知制誥列其下大中祥符九年以大理評事崇文院檢討馮元為太子中允直龍圖閣賜紫令預內殿起居班在本官之首自學士以下並寓直於祕閣每五日一員遞宿令直閣與館職輪宿元祐官品令學士正三品直學士從三品待制從四品直閣正七品千首之詩豈如一言國朝孔道輔論廢后事天下聳聞其風采近臣有獻詩千首執政請以為龍圖閣學士上曰千首之詩豈如孔道輔一言乃拜為龍圗學士久侍經筵慶厯四年尚書金部員外郎天章閣侍講楊安國為直龍圗閣賜三品服宗正丞崇文院檢討崇政殿說書趙師民為天章閣侍講賜五品服初仁宗謂輔臣曰安國師民久侍經筵其行義淳質乃先朝崔遵度之比因以褒擢之天章閣自天禧始建以專藏真宗御製御書文籍等天禧四年初建至五年二月修天章閣工畢令兩街道具威儀教坊作樂奉真宗御集御書自玉清昭應宫安於天章閣國朝天禧四年建閣在㑹慶殿西龍圖閣之北以藏真宗御集御書閣東曰羣玉殿西曰蘂珠殿北曰壽昌閣一本作殿壽昌東曰嘉德殿西曰延康殿殿即流杯之所皆以桃花文石為之環以清渠植以松檜壘石為山莊麗巧妙悉臻於極勢焉俄詔近臣館閣三司京府官觀御籍御書於閣下遂宴於羣玉殿時輔臣集御製三百卷凡頌銘碑文十八卷贊八卷詩三十七卷賜中宫歌詩手書七卷賜皇太子歌詩針述五卷龍圖閣歌詩四卷西凉殿水殿歌詩一卷清景殿書事詩三卷宜聖殿四園一作圍歌詩二卷三教詩九卷讀經史詩四卷維城集三卷奉道詩十卷嵗時新咏五卷歌十五卷詞四卷樂章一卷樂府集三卷樂府新詞二卷論述十卷序八卷針七一有卷字疑多條各一卷記六卷文三卷祭文挽詞一卷書十卷正說十卷承華要略二十卷靜居集三卷法音集七卷玉宸集五卷春秋要言五卷試進士題目一卷密表密辭六十九卷以上三百五卷又有玉京集三十卷授時要録二十四卷又取至道元年四月訖大中祥符嵗中書樞密院時政記史館日厯起居注善美之事録為聖政記凡一百五十卷並命工鏤板又以御書石本為九十編一本作篇學士直學士待制侍講國朝慶厯七年詔特置天章閣學士直學士在龍圖閣學士直學士之下詔曰欽惟聖考濬發宸文百篇森布於寶函三襲肇興於華閣肆於纂紹之始務闡師儒之隆遂延講勸之臣欽佇論思之益掩玉府藏書之盛處金門待詔之才今宜廣侍從之員抑亦副遹追之念特置天章閣學士直學士云云天聖八年置天章閣待制寓直於祕閣與龍圗閣遞宿置待制詔曰真宗皇帝烜赫景炎丕隆寶搆允資禮樂之用積成辰象之文俯近紫楹創崇層構榜以天章之美冠於䇿府之名宜建官聫並置材彥可特置天章閣待制景祐四年以崇政殿說書賈昌朝趙希言王宗道並為天章閣侍講比直龍圖閣預內殿起居班在本官之上遞直侍講於邇英延藝二閣在崇政殿廡下元祐官品令天章閣學士正三品直學士從三品待制從四品久侍經筵見直龍圖閣門崇政殿說書自本朝景祐始置國朝景祐元年置仍每日輪二員於本殿門祗候四年改為天章閣侍講慶厯二年以著作佐郎趙師民預講官復為崇政殿說書誦說明白景祐元年始置從政殿說書以賈昌朝為之誦說明白為仁宗所喜於是仁宗多所質問昌朝請悉記録嵗終以付史館引經稱㫖熙寧二年以著作佐郎吕惠卿為太子中允崇政殿說書惠卿召見奏對引經稱㫖經術能世其學四年以前宣州旌德縣尉王雱為太子中允崇政殿說書雱宰相安石子上聞其經術能世其學故召對而擢用之寶文閣自慶厯初置嘉祐八年以藏仁宗御書國朝天章閣東西序羣玉蘂珠二殿次北即寶文閣舊曰夀昌慶厯初改今名嘉祐八年詔以仁宗御書藏於寶文閣命翰林學士王圭撰記立名學士直學士待制國朝治平四年六月詔寶文閣學士中謝並依龍圗閣學士直學士例又詔寶文閣置學士直學士待制著於令元祐官品令寶文閣學士正三品直學士從三品待制從四品崇文院三館隸昭文館館並崇文院史館朝集賢院昭凡三國從唐制文館集賢殿置大學士史館有監修國史皆宰相兼領昭文館集賢又置學士直學士史館集賢修撰史館有直館檢討以集賢有直院校理學崇文院有檢討校書皆他官領昭文集賢士史館修撰取最上一員判館院事今亦以他官分判矣初昭文館隸門下者史館寓於集賢後合為一增入國朝太平興國二年太宗幸三館顧左右曰是豈足以待天下之賢俊耶即日詔有司度左升龍門東北車府地為三館命內侍督工徒晨夜兼作其棟宇之制皆帝所親授自舉役車駕凡再臨幸三年二月有司奏功畢乃下詔曰國家聿新崇構大集羣書宜錫嘉名以光䇿府其三館新修書院宜為崇文院按唐昭文館隸門下省史館寓集賢尚未合為一自梁遷都於汴舊制未備至貞明中始以左長慶門東北小屋數十間為三館其後俗謂之西館湫隘卑陋僅庇風雨周廬徹道出於其旁衛士騶卒朝夕喧雜每授詔撰述皆移它所至是改置焉院既成遷西館之書分為兩廊貯之以東廊為昭文書庫南廊為集賢書庫西廊分經史子集四部為史館書庫凡六庫書籍正副本八萬卷大中祥符八年翰林學士陳彭年言檢討唐制中書門下兩省宫城之內有內省宫城之外有外省今欲據祕閣舊日屋宇間數重修奉安太宗聖容及御書頓置供奉書籍天文禁書一無禁書二字圖畫其四廊並充書庫及史館日厯庫應館閣直館校理宿直校勘及抄寫書籍雕造印板並就外院其外院即於左右掖門外近便處修蓋仍别置三館書籍庫至於三館書籍名目候將來分擘正副本取便宜置從之時宫城中嚴火禁甚峻臣寮寓宿寒沍食飲非便因命有司檢討故事而改之增入天禧元年詔崇文外院以三館為額天聖九年詔徙三館於崇文院舊在左掖門內右升龍門外前列三館後搆祕閣分藏羣書自大中祥符四年宫城延燔以寫録編籍權徙右掖門外道北至是仁宗以逼近市囂非多士討論之所命還舊所焉時大臣有以表賀者亦優詔答之筆談選人為館職如歐陽永叔黃鑑輩皆自左掖門下馬入館當時謂之步行學士嘉祐中於崇父院置編校局校官皆許乘馬至院門其後中書五房置習學公事官亦緣例乘馬赴局筆談前世藏書分隸數處蓋防水火散亡也今三館祕閣凡四處藏書然同在崇文院其問官書多為人盜竊士大夫家往往得之嘉祐中乃置編校八員雜讎四館書給書史百人悉以黃紙為大册寫之自此私家不敢輒藏校讎纍年僅能終昭文一館之書而罷退朝録唐兩京皆有主館而各為之所所以逐館命修撰文字而本朝三館合為一並在崇文院中景祐中命修總目則在崇文院餘各置局他所蓋避衆人所見太宗實録在諸王賜食㕔真宗實録在元符觀祥符中修册府元龜王文穆為樞密使領其事乃就宣徽南院使㕔以便其事自是遂修國史㑹要名曰編修院又修仁宗實録而英宗實録同時並修遂在慶寧宫史館領厯日局置修撰二員宰相為監修自置編修院以修撰一人主之而日厯等書皆析歸編修院檢討校書修唐書東齊記事劉羲叟字仲更澤州人以修唐書授崇文院檢討未及謝病發背而卒國朝崇文院有檢討校書皆以他官領之熙寧二年詔應選舉到可試用人並令崇文院校書以備朝廷訪問差遣候二年取㫖或除館職或升擢資任或只與合人差遣時初除前河南府永安主簿邢恕為校書三年五月十六日詔崇文院校書邢恕與堂除近地試銜知縣恕以祕書丞集賢校理同知諌院胡宗愈言崇文院校書如未歷外官及不滿任者不得選舉上以恕未曽任官故有是命昭文館即𢎞文館也唐亦改為昭文館開元復改𢎞文館至本朝建隆遂改為昭文館唐職官志𢎞文館後漢有東觀魏有崇文館宋有𤣥史二館南齊有總文館梁有士林館北齊有文林館後周有崇文館皆著撰文史鳩聚學徒之所也武德初置修文館後改為𢎞文館後避太子諱改曰昭文館開元七年復為𢎞文館隸門下省新唐志𢎞文館武德四年置修文館於門下省九年改曰𢎞文館貞觀元年詔京官職事三品以上子嗜書者二十四人隸館習書出禁中書法以授之其後又置講經博士儀鳯中置詳正學士校理圖籍武德後五品以上曰學士六品以上曰直學士又有文學直館皆他官領之神龍元年改𢎞文館曰昭文館以避孝敬皇帝之名二年改修文館景雲中復為昭文館開元七年曰𢎞文館大學士學士直館唐職官志學士無員數自武德以來皆妙簡賢良為學士故事五品以上稱學士六品以上為直學士又有文學直館學士不定員數館中有四部書及圖籍自垂拱以後皆宰相兼領之號為館主常令給事中一人判館事學生三十人校書郎二人從九品上令史二人楷書手三十人典書二人搨書手三人筆匠三人熟紙裝潢匠九人亭長二人掌固四人𢎞文館學士掌詳正圖籍教授生徒凡朝廷有制度沿革禮儀輕重得參議焉新唐志景龍二年置大學士四人以象四時學士八人以象八節直學士十二人以象十二時景雲中減員數置元置校書郎又有校理辨校錯誤等官長慶三年與詳正學士講經博士皆罷專以五品以上曰學士六品以上曰直學士未登朝為直館國朝建隆元年改𢎞文館為昭文館置大學士宰相兼領又置學士取最上一員判館事淳化元年以起居舍人直史館吕祐之左司諫直史館趙昂金部員外郎直史館安德裕虞部員外郎直史館勾中正並直昭文館先是但有直史館至是始命祐之等分直昭文館以備三館之職退朝録唐制宰相四人首相為太清宫使次三相皆帶館職𢎞文館大學士監修國史集賢殿大學士以此為次序本朝置二相昭文修史首相領焉集賢次相領焉三館職唯修史有職事而頗以昭文為重自次相遷首相乃得之趙令初拜止獨相領集賢殿大學士續兼監修國史久之遷昭文館薛文惠與沈恭惠並相薛自參政領監修拜相仍舊而沈領集賢畢文簡與冦忠愍並相而畢領監修寇領集賢王太尉獨相亦止領集賢近時王文惠龎莊敏初拜及獨相悉兼昭文修史二職非舊制也精選天下賢良唐太宗即位封功臣畢於𢎞文館殿聚四部羣書二十餘萬卷於殿側置𢎞文館精選天下賢良文學虞世南禇亮等以本官兼署學士令更日宿直聽朝之隙引入內殿講論前載夜商議武事分方罷更宿直上十八學士初太宗為秦王時既太平乃鋭意經籍於宫城之西開文學館以待四方之士於是以杜如晦房𤣥齡等並以本官兼𢎞文圖其形狀且顯爵土命禇亮為像贊藏之書府號十八學士給五品珍膳分為三畨更宿直於閣下預閣者時人謂之登瀛洲登瀛洲上暗寫列女屏風虞世南授𢎞文館直學士與房𤣥齡對掌文翰太宗嘗命寫列女傳以裝屏風於時無本世南暗疏之不失一字上官體上官儀太宗時授𢎞文館直學士本以詞彩自達工於五言詩好以綺錯婉媚為本儀既貴顯故當時多有斆其體者時人謂之上官體儀頗恃才任勢故為當代所嫉晚年篤學蕭德言貞觀中除著作郎兼𢎞文館學士晚年尤篤志於學自曉達夜略無休倦每欲開五經必束帶盥濯危坐對之妻子候間請曰終日如是無乃勞乎德言曰敬先聖之言豈憚如此棄官而歸髙子貢為𢎞文館直學士鬱鬱不得志棄官而歸屬徐敬業作亂子貢率鄉兵數百人拒之以功擢授朝散大夫拜成均助教塵影二賦謝偃上封事極言得失太宗稱善引為𢎞文館直學士偃常為塵影二賦甚工太宗聞而召見自制賦序言區宇乂安功德茂盛令其為賦偃奉詔撰成名曰述聖賦特置一員王彥威纍轉司封郎中𢎞文館舊不置學士文宗特置一員以待彥威號為館主自貞觀初禇亮檢校館務學士號為館主諫幸九成宫姚思廉為𢎞文館學士太宗將幸九成宫思廉進諫曰此秦皇漢武之事非堯舜禹湯之所為也言甚切至太宗諭曰朕有氣疾熱便煩劇固非情好逰賞也因賜帛五十匹撰瑶山往則維城前軌二篇新唐書裴光庭拜侍中兼吏部尚書𢎞文館學士撰瑶山往則維城前軌二篇獻之手制褒美詔皇太子諸王於順光門見光廷謝以規諷意光廷又引壽安丞李融拾遺張琪著作佐郎司馬利賔直𢎞文館撰續春秋經傳自戰國迄隋表請天子修經光廷等作傳書久不就時有建言唐應為金德者中書令蕭嵩請百官普議光廷以唐符命表著天下久矣不可改罷之瑶舊唐作搖撰續春秋經傳上奏罷議金德上賞花預宴國朝淳化三年以右初襄王司諫韓國華左正言潘太府翊善起居郎夏侯嶠越王府記室參軍左司諌宋泌並兼直昭文館國華太初為三司判官因對自陳雖諌官省職不得從逰宴故並有是命告謝之日適值後苑賞花便令預宴皆出特恩也舊例三司帶職者不兼直館至是國華等皆以判官兼充之從新制也總史官尚書酒誥太史友內史友太史內史掌國典法所賓友者韓詩外傳據法守職而不敢為非者太史也毛詩序國史明乎得失之迹傷人倫之廢哀刑政之苛周禮春官太史掌建邦之六典小史外史內史禮記曲禮天子建天官先六太曰太史玉藻動則左史書之言則右史書之春秋元命苞詘中挾而起者為史史之言記也天度之法以此起也大戴禮太子既冠成人免於師傅則有司過之史前漢藝文志古之王者世有史官君舉必書所以慎言行昭法式也又青史子五十七篇古史官記事也又孔甲盤盂篇黃帝史官又史籕周宣王太史作大篆師古曰籕音胄漢舊儀丞周史官至武帝置太史公司馬遷父談世為太史遷年十三使乘傳行天下求古諸侯之史記晉灼曰百官表無太史公在丞相上衛宏所說多不實未可以為正荀悅申鑒古者天子諸侯有事必告於廟廟有二史左史記言右史書事事為春秋言為尚書君舉必記善惡成敗無不存焉下及士庶茍有茂異咸在載籍或欲顯而不得或欲隱而名章得失一朝榮辱千載善人勸焉淫人懼焉宜於今者備置史官掌其典文記其行事每於歲盡舉之尚書以助賞罰以𢎞法教帝覽而善之晉職官志著作郎周左史之任也梁初周捨裴子野皆以他官領著作又有撰史學士亦知史書世本沮誦蒼頡作書宋衷注曰誦頡黃帝之史帝王世記黃帝史蒼頡取像鳥迹始作文字之篆史官之作蓋自此始記其言行第而藏之後魏崔浩誅史官遂廢至文成帝時復置隋文林郎二十人掌撰録文史書法不隱左傳宣公二年晉靈公飲趙盾酒伏甲將攻之盾遂出奔趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弒其君以示於朝宣子曰不然對曰子為正卿亡不越境反不討賊非子而誰孔子曰董狐古之良史也書法不隱宣子古之良大夫也為法受惡惜也越境乃免執簡以往襄二十五年太史書崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以往聞既書矣乃還藏之名山前漢司馬遷報任安書曰僕竊不遜近自託於無能之詞網羅天下放失舊聞考之行事稽其成敗興壞之理凡百三十篇亦欲以究天人之際通古今之變成一家之言草創未就適㑹此禍惜其不成是以就極刑而無愠色僕誠已著此書藏之名山云云實録前漢遷贊曰司馬遷論大道則先黃老而後六經序逰俠則退處士而進奸雄述貨殖則崇勢利而羞賤貧此其所蔽也然自劉向揚雄博極羣書皆稱遷有良史之才服其善序事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實録遷固有良史之才後漢論司馬遷班固父子其言史官載籍之作大義粲然著矣議者咸稱二子有良史之才潛精積思班彪字叔皮才高而好述作遂專心史籍之間武帝時司馬遷著史記自太初以後闕而不録後好事者頗或綴集時事然多鄙俗不足以踵繼其書彪乃繼採前史遺事作後傳數十篇彪卒子固以彪所續前史未詳乃潜精研思欲就其業既而人有上書顯宗告固私改作國史者有詔下郡收固繫獄盡取其家書固弟超馳詣闕上書得召見具言固所著述意而郡亦上書顯宗甚奇之召詣校書郎除蘭臺令史乃復使終成前所著書固自永平中始受詔潜精積思二十餘年至建初中乃成當世甚重其書莫不諷誦焉尚書給筆札獻帝常以班固漢書文繁難省乃令荀悅依左氏傳體以為漢紀三十篇詔尚書給筆札辭約事詳論辨多美紀言書事荀恱作申鑒五篇其大略曰古者天子諸侯有事必告於廟廟有二史左史記言右史書事事為春秋言為尚書君舉必記善惡成敗無不存焉云云已見前荀悅申鑒下乞黥首刖足繼成漠史蔡雍為郎中校書東觀時妖異數見特詔問雍宜以皂囊封上雍表言小人在位依阻城社又為奸邪靈帝覽而歎息因起更衣曹節於後竊視之悉宣語左右事遂漏露其為雍所裁黜者皆側目思報遂為中常侍程璜等使人飛章言雍私事詔下尚書召雍詰狀有詔减死一等徙朔方會明年赦得還將就還路又為五原太守王智密告雍謗訕朝廷雍慮卒不免乃亡命江海十二年靈帝崩董卓聞雍名高辟之三日之間周歷三臺及卓被誅雍在司徒王允坐殊不意言之而歎有動於色允勃然叱之曰董卓國之大賊幾傾漢室君為王臣所宜同忿而懷其私遇以忘大節今天誅有罪而反相傷痛豈不共為逆哉即收付廷尉治罪雍陳辭謝乞黥首刖足繼成漢史士大夫多矜救之不能得太尉馬日磾馳往謂允曰伯喈曠世逸才多識漢事當續成後史為一代大典且忠孝素著而所坐無名誅之無乃失人望乎允曰昔武帝不殺司馬遷使作謗書流於後世方今國祚中衰神器不固不可令佞臣執筆在幼主左右既無益聖德復使吾黨受其訕議雍遂死獄中縉紳諸儒莫不流涕北海鄭𤣥聞而歎曰漢世之事誰與正之語小人在位非史元十意雍在東觀與盧植等撰補後漢記㑹遣事流離不及得成因上書自陳奏其所著十意者猶前書十志覔千斛米作佳傳晉陳壽除著作郎撰魏吳蜀三國志凡六十五篇時人稱其善叙事有良史才夏曰侯湛時著魏書見夀所作便壞己書張華深善之謂燾當以晋書相付耳其為時所重如此或云丁儀丁􅛫有盛名於魏謂其子曰可覔千斛未見與當為尊公作佳傳丁不與之竟不為立傳壽父為馬謖參軍謖為諸葛亮所誅夀父亦坐被髠諸葛瞻又輕壽壽為亮立傳云亮將略非長無應敵之才言瞻惟工書名過其實識者以此少之叙事有良史之才上私撰齊春秋南史文學傳吳均待詔著作纍遷奉朝請先是均將著史以自名欲撰齊書求借齊起居注及羣臣行狀武帝不許遂私撰齊春秋奏之書稱帝為齊明帝佐命帝惡其實録以其書不實使中書舍人劉之遂詰問數十條竟支離無對敕付省焚之坐免職均有俊才又體清拔有古氣好事者或斆之謂之吳均體吳均體上諱惡沈約撰宋書多載孝武明帝諸褻黷事齊武帝遣左右語約曰孝武事迹不容頓爾我昔經事宋明帝卿可思諱惡之義於是多所省除撰晉書約少時嘗以晉氏一代竟無全書年二十許便有撰述之意宋泰始初征西將軍蔡興宗為啓明帝有敕許焉自此踰二十年所撰之書方就凡百餘卷條流雖舉而採綴未周永明初遇盜失第三帙年二十有撰述之意上撰史學士陳傳縡好學能述文陳文帝時為撰史學士至後立時為中書通事舍人人君所懼北史魏孝文帝嘗從容謂史官曰直書時事無諱國惡人君威福自己史復不書將何所懼直書時事無諱國惡上立石銘北史魏司徒崔浩及弟覽高讜節頴簧輔等共參著作叙成國書三十卷著作令史閔堪等素諂事浩乃請立石銘載國書以彰直筆遂營於天郊書三里方百步用功三百萬浩書國事備而不典而石銘顯在衢路北人咸悉忿毒相與憎浩太武帝大怒按浩誅之凡清河崔氏無逺近及范陽盧氏太原郭氏河東栁氏皆浩之姻親盡夷其族其祕書郎史以下盡死浩非毁佛法而妻郭氏敬好釋典時時讀誦浩怒取而焚之捐灰厠中及浩幽置被執檻內送於城南使衛士數十人溲其上呼聲嗷嗷聞於行路自宰司之被戮辱未有如浩者世皆以為報應之驗可惜可哀後魏帝紀太武帝人有犯法無所寬假雅長聽察瞬息之間下無以措其姦隱然果於誅戮後多悔之司􅑫崔浩死後帝北伐時宣城公李孝伯疾篤傳者以為卒帝聞而悼之謂左右曰李宣城可惜又曰朕向失言崔司徒可惜李宣城可哀褒貶雅意皆此類也直筆東觀北齊天保二年詔中書令兼著作郎魏收撰後魏史初帝令羣臣各言志收曰臣願得直筆東觀早出魏書故帝使收專其任誅史官宣帝敕收曰好直筆我終不作魏太武誅史官非史才收所引史官恐其凌逼惟取其平素相依附者與之共事辛元植眭仲讓雖夙涉朝位并非史才刁柔裴昂之以儒業見知全不堪編輯高孝幹以左道來進修史諸人祖父姻戚多被書録飾以美言作佳傳初收在齊神武時修國史得陽休之助因謝休之曰無以謝德當為卿作佳傳休之父固為北平太守以貪贓獲罪載在魏起居注收乃書固為北平甚有惠政坐公事免受金爾朱榮于魏為賊收納榮子金故減其惡而增其善論云若修德義之風則韓彭伊霍夫何足數著史不平時論既言收著史不平又宣帝詔收于尚書省與諸家子孫共加論討前後投訴百有餘人謗史獲罪時有盧裴李庶皆譏議魏收史書不直收性急不勝其憤啓誣其欲加屠害帝大怒親自詰責裴曰臣父仕魏位至儀同功業聞天下收不為立傳博陵崔緯仕至本部功曺更無事迹是收外親乃為傳首收無以對戰栗而已帝先重收才不欲加罪時有王松年者亦謗史及裴庶並獲罪各被鞭配甲坊或因以致死然猶以羣口沸騰敕魏史且勿施行穢史收撰魏史衆口譁然號為穢史柱史記過晉志極東一星曰桂下史主紀過古者有左右史此之象也書事明鑒誡魏謨詔遣中使取謨起居注欲觀之謨執奏曰自古置史官書事以明鑒誡陛下但為善事勿畏臣下書如陛下所行錯忤臣縱不書天下之人書之螭頭記言事文帝詔略曰敕左右省起居賫筆硯及紙於螭頭下記言記事起居修記事之史職官志起居郎二人揩書手二人起居郎掌起居注録天子之言動法度以修記事之史凡記事之制以事繫日以日繫月以月繫時以時繫年必書其朔日甲乙以紀厯數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季終則授之國史馬史館監修國史自此下後各分門修撰直館監修而下亦附此總見勘書編修校勘檢討祗候勘書以下於此並無所附新唐百官志史館修撰四人掌修國史貞觀三年置史館於門下省以他官兼領或卑位有才者亦以直館稱以宰相涖修撰又於中書省置祕書省內省修五代史開元二十年李林甫以宰相監修國史建議以為中書切密之地史官記事隸門下省疏逺於是諌議大夫史館修撰尹愔奏徙於中書省天寶後他官兼史職者曰史館修撰初入為直館元和六年宰相裴垍建議登朝官領史職者為修撰以官髙一人判館事未登朝皆為直館大中八年廢史館直館一員增修撰四人分掌四季貞觀初復下議正事起居郎一人執筆記録于前史官隨之國朝從唐制史館有監修國史皆宰相兼領故事宰相兼職皆內降制處分乾德二年以趙普兼監修國史止用敕非舊典也至道三年修太宗實録時宰相吕端雖帶監國史而不預焉其後重修太祖實録遂召宰相吕端與錢若水等同修端罷相李沆繼成焉四年詔修兩朝國史宰臣王旦為監修國史亦不宣制國史成旦遂領監修如故乾興元年命司徒兼侍中監修國史馮拯專切提舉監修真宗實録拯卒王欽若為相又命提舉監修天聖五年宰臣王曾提舉監修真宗實録修兩朝史時王旦未領監修故特授詔曽己監修而無再授敕為提舉蓋一時之制也慶厯三年吕夷簡罷相而帶監修國史優延老臣也九月以宰相章得象監修國史初得象止除昭文館大學士至夷簡致仕得象始領之至和二年以宰相集賢殿大學士劉沆監修國史初除文彥博為昭文館學士富弼監修國史弼乃在舊劉沆之上成平四年故事呂蒙正為昭文館大學士李沆監修國史向敏中集賢殿大學士今所除蓋學士承㫖揚察之誤尋帖麻改正之嘉祐元年宰臣文彥博監修國史初除彥博為昭文館大學士上兼譯經潤文使以劉沆為監修國史至是沆罷彥博領之治平元年以宰臣韓琦提舉修仁宗實録熙寧元年以宰臣曾公亮提舉修英宗實録十年以宰臣吳充監修仁宗英宗兩朝國史餘更見集賢院退朝録唐制宰相四人首相為太清宫使次三相皆帶館職𢎞文館大學士監修國史集賢殿大學士以此為次序本朝置二相昭文修史首相領焉集賢次相領焉二館職為修史有職事而頗以昭文為重自次相遷首相乃得之云餘並見前昭文館門時政記太平興國中右補闕直史館胡旦上言五代自唐以來中書樞密院皆置時政記中書即委末付史廳宰相修撰樞密院即直學士編修每月每季送館憲宗嘗御延英問時政記記何事時李吉甫監修國史對曰是宰相記天子事以授史館之實録也古者左史記言今起居舍人是右史記事今起居郎是永徽中宰相姚璹監修國史造膝之言或不下聞因請隨奏對而記於仗下以授於史官今時政記是也上曰聞或不修何也曰面奉德音未及施行總為機密故不可書以送史館其間有謀議出於臣下者又不可自書以付史官及已行者制令昭然天下皆得聞知即史官之記不待書以授也且臣觀時政記者姚璹修之於長壽及璹罷而事寢賈耽抗又修之於貞元及耽抗罷而事廢然則關時政化者不虛美不𨼆惡謂之良史開寶七年史館修撰判館事扈蒙言竊見唐文宗時每開延英召大臣論事必命起居郎起居舍人執筆螭頭以記時政故文宗一朝實録文字稍備後唐明宗時亦命端明殿學士及樞密院直學士輪修日厯旋送史館近朝以來此事都廢每季雖有內廷日厯樞密院録送史館然其中所記不過對見辭謝而已帝王言動莫得而書蓋宰相以漏泄為虞無由盡說史官以踈逺是隔何由得聞欲望今後凡事經聖斷可書簡䇿者並委宰臣及恭知致事每日輪知抄録送付史館以憑修撰日厯從之仍命恭知政事盧多遜録其事多遜受詔而未嘗成書今史館書目有是年時政記草一卷後亦失之御太平興國八年李昉言所修撰時政記每月先以奏後付所司從之雖有時政記之名但題云送史館事件昉未幾拜相仍舊編録又蘇易簡為恭知政事始令代之自是中書皆恭知政事一員編録惟吕蒙正嘗以宰相領其事後或恭知政事兩員録之至景德元年始題云時政事官端拱以後樞密院事皆送中書同修為一書而授史焉皆副使或知院一二員同掌之大中祥符五年詔樞密院所修時政記日送史館先是樞密院日録送中書及王欽若陳堯叟始乞别撰不關中書當直送史館日厯按此條無注語疑有闕文監修國史總監北齊詔魏收撰魏史又詔平原王高隆之總監之書名而已三長唐劉子𤣥掌知國史首尾二十餘年多所撰述甚為當時所稱禮部尚書鄭惟忠嘗問子𤣥曰自古以來文士多而史才少何也對曰史才須有三長世無其人故才少也三長謂才也學也識也在家修史李元綋為相先是左庶子吳兢舊任史官撰唐書一百卷唐春秋三十卷其書未成以丁憂罷職至是上書續終其餘功有詔特令就集賢院修成其書及張說致仕又令在家修史元綋奏曰國史者記人君善惡國政損益一字褒貶千載稱之且太宗别置史館於禁中所以重其職而祕其事也望敕說等就史館參詳撰録詔從之荀袁政駿劉子𤣥本名知幾景龍初轉太子中允依舊修國史時侍中韋巨源紀處納楊再思宗楚客蕭至忠並監修國史知幾以監修者多甚為國史之弊於是求罷史任奏記于至忠曰古之國史皆出自一家如魯漢之丘明子長晉齊之董狐南史咸能立言不朽藏諸名山未聞藉以衆功方云紀筆惟後漢東觀大集羣儒而著述無主條章靡立由是伯度譏其不實公然以為可焚張蔡二子紀之于當代傅范兩家嗤之于後葉今史司取士有倍東京人自以為荀袁家自稱為政駿每欲記一事載一言皆閣筆相視含毫不斷故首白可期而汗青無日其不可一也云云抱國史藏於南山韋述居史職二十年嗜學著書手不釋卷及祿山之亂兩京陷賊𤣥宗幸蜀述抱國史藏于南山述陷于賊庭流於渝州而卒後蕭直上疏理述于倉皇之際能存國史乃贈左散騎常侍撰姓族系録柳沖景龍中纍遷左散騎常侍國史初貞觀中太宗命學者撰氏族志百卷以甄别士庶至是向百年而諸姓互有興替沖乃上表請改修世族至先天初沖始與侍中魏知古中書侍郎陸象先及徐堅劉子𤣥吳兢等撰成姓族系録二百卷奏上對都咸陽幾君開昆明池何年許敬宗拜侍中監修國史高宗常幸故長安城按驛裴回視古區處問侍臣秦漢以來幾君都此敬宗曰秦居咸陽漢惠帝始城之其後符堅姚萇宇文周居之帝復問漢武開昆明池實何年對曰元狩三年將伐昆明實為此池以肄戰士帝乃詔與𢎞文學士討論古宮室故區其條以聞對地震張行成見侍中門獻太祖記淳化二年翰林學士張洎等獻重修太祖記一卷以朱墨離書凡係聖問及史官採托之事即朱以别之南宫事迹咸平元年昭宣使王延德上太宗南宫事迹三卷付修實録院上太宗實録工部侍郎集賢殿學士錢若水等上所修太宗實録八十卷上親覽涕泗命若水等坐從容勞問時若水判集賢院因用院印史館無所預才九月而畢上甚歎其速以書入禁中再修太祖實録上命重修太祖實録錢若水再表陳讓復求對便殿懇辭上曰以卿前修太宗實録五十卷備而太祖朝事多所漏落故再命卿修撰無至固讓上重修太祖實録以刑部侍郎知制誥王禹稱起居舍人直昭文館李宗諤右司監直史館梁皓右正言直集賢院趙安仁等同修太祖實録從吕端錢若水之請二年六月修國史户部侍郎平章事李沆等上重修太祖實録五十卷并事目二卷上覽之稱善謂沆等曰向來史臣不能詳盡聞張洎修國史止成一卷今兹可謂詳備矣仍賜詔褒諭史館修撰唐百官志史館修撰四人見史館門國朝從唐制史館有修撰以它官領取最上一員判館事故事史館每月撰日厯皆判館與修撰官直館官分季撰録藏於本館國初循舊制皆修撰官分修纂後止修撰官及判館撰次焉太平興國中直史館趙鄰幾吕蒙正范杲皆曽修撰自後以直館員多遂止修撰官編纂淳化四年翰林學士宋湜上𢃄修國史亦嘗修日厯大中祥符二年以刑部郎中髙紳為史館修撰紳即樞密使王欽若所引不令修纂止命權判吏部銓未幾紳表外郡尋授直昭文館自是領修撰者須兩省五品以上方掌修撰天聖元年石中立以户部郎中充史館修撰有司引紳例亦不修日厯皇祐三年詔新知亳州翰林侍讀學士兼龍圖閣學士給事中宋祁授集賢殿修撰以故事史館修撰不分外領故易之也仍就任刋定新編修唐史秉筆史館唐李翺字習之元和初轉史館修撰翺以史館記事不實奏狀曰臣謬得秉筆史館以記注為職夫勸善懲惡正言直筆記聖朝功德述忠賢事業載奸臣醜行以傳無窮者史官之任也凡人事迹非大善大惡則衆人無由得知舊例皆訪於人又取行狀諡議以為一據今之作行狀者多是其門生故吏莫不虛加仁義禮智妄言忠肅惠和此不惟處其心不實茍欲虛美於虛恩之地耳蓋為文者又非游夏遷雄之例務于華而忘其實溺于文而棄其理故為文則大乖六經之古風紀事則非史遷之實録臣今請作行狀者但指事實直載事功假如作魏徵傳但紀其諌諍之辭足以為正直段秀實但紀其倒用司農印以追逆兵以象笏擊朱泚足以為忠烈若考功視行狀不依此者不得受依此則考功下太常牒史館然後定論伏乞以臣此奏下考功從之誣桑魏公白金之數五代周賈緯充史館修撰以筆削為己任然而褒貶之際憎愛任情晉相桑維翰執政日薄緯之為人不甚見禮緯深銜之及叙維翰傳稱維翰身沒之後有白金八千鋌他物稱是翰林學士徐台符緯邑人也與緯相善謂緯曰竊聞吾友叙桑魏公白金之數不亦多乎但以十目所覩不可厚誣緯不得已改為白金數百鋌緯長於記注應用文章未能過人而議論剛強儕類不平目之為賈鐡嘴賈鐡嘴上有良史之材國朝淳化元年以右司諌梁周翰為史館修撰從翰林學士宋白等薦其有良史之材也置之館殿正得其宜二年右諫議大夫史館修撰楊徽之次對上言方今之士雖多而通經者鮮有願精選五經博士增其員數各專業以教胄子此風化之本上顧謂宰相曰徽之操履無玷真儒雅之士出理州郡非其所長置之館殿正得其宜善惡必書四年太宗問宰臣今館中修撰是誰參知政事蘇易簡對曰楊徽之張祕梁周翰帝曰史才甚難在乎善惡必書務托實而去憎愛斯為良史矣務托實而去憎愛上實録中多有漏略五年四月以吏部侍郎兼祕書監李至翰林學士中書侍郎張洎右諫議大夫史館修撰張祕范杲同修國史先是上語宰相曰太祖朝事耳目相接今實録中多有漏略可集史官重加修撰蘇易簡對曰近代李學士扈蒙修史蒙性選懦逼於權勢多所諱避甚非直筆上曰史官之職固在善惡必書無所隱諱昔唐𤣥宗欲焚武后史左史以為不可欲後代以為鑒戒爾因言及太祖受命之際固非謀慮所及自昔受禪者如曺操司馬仲逹皆數十年窺伺神器先邀九錫至於易世方有傳禪之事太祖之事周朝也盡力王室中外所知至於大寶非有意也無何邊吏言契丹侵軼太祖方醉卧傳舍中朕與趙普李處耘並在左右無何衆憤洶洶擐甲露刃者雲集請登天位以副人望此蓋厯數所鍾且非人力能效也當時之事史冊有所闕宜令至等數人重加綴集故有是命踈俊卞急真宗至道三年以工部郎中史館修撰梁周翰為駕部郎中修撰如故周翰素有才名而踈俊卞急臨事過于嚴恭以是不為時用殆三十年上在東宫嘗求其文以觀之嘗加賞歎詞多溢美貶工部郎中知制誥史館修撰胡旦為安遠軍節度行軍司馬旦草行度詞頗恣胸臆多所溢美語復訕上故也上書自陳以直昭文館李若拙為史館修撰若拙上書自陳乃命學士院試制誥三道因有是命白衣充修撰丁謂初與孫何齊名翰林學士王禹稱延譽于帝曰謂與何可使白衣充修撰由此聲名籍甚禹稱嘗與詩曰三百年來文不振直從韓栁到孫丁而今便合教修史二子之才似六經修撰仁宗實録英宗嘉祐八年十二月以翰林學士王圭賈黯范鎮修撰仁宗實録集賢校理知亳州宋敏求尚書祠部員外郎直祕閣吕夏卿太常丞祕閣校理韓維兼充實録院檢討官入內侍省都知任守中管勾實録院下治平元年二月以門下侍郎兼兵部尚書同中書門平章事韓琦提舉修撰仁宗實録治平三年翰林學士馮京提舉之赴院修撰治平元年權御史中丞賈黯奏以實録藁就臺修撰有議事即三五日一就赴院上詔令五日一就赴院修撰秉直筆成大典范杲知壽州上言家世史官願得秉直筆成國史大典召為史館修撰直史館唐百官志見史館國朝雍熙五年以殿中侍御史柴成務為户部員外郎直史館監察御史宋鎬為右拾遺直史館館職無𢃄臺官者皆换之叙事簡要唐吳兢博通經史魏元忠朱敬則深器重之及居輔相薦兢有史才堪居近侍因令直史館居職殆三十年叙事簡要人同稱之文詞雅正天下推之國朝吳育字春卿天聖中登進士甲科又應賢良方正䇿入髙等授著作郎直史館文詞雅正天下推之祕閣下試六論晏元獻曰以六論分為六州當為六州解元其為時賢推重如此上祥符超古頌祥符三年直史館陳靖上祥符超古頌因對言今三館學士皆年少俊邁恐見而貽誚上謂宰臣曰自古為之風格隨時而變今之詞人志尚體要有古雅之風王旦曰館閣中英翹所聚雖有聲稱者亦罕能之史館勘書史館編修國朝太平興國八年七月以新及第進士吳鉉為大理評事史館勘書八月以國子監主簿楊文舉為國子監丞史館編修神情冲淡刻意篇什國朝天聖中修國史王安簡謝陽夏李邯鄲黃唐卿為編修官安簡神情冲淡唐卿刻意篇什謝嘗戲為句曰王貌閒如鶴黃吟苦似猿史館校勘史館檢討國朝雍熙四年以著作佐郎宋炎為史館校勘淳化二年以殿中丞郭延澤太子右贊善大夫董元亨並為史館檢討至和二年詔今後檢討更不得舉試館職對義如㫖國朝郭延澤等以門䕃好學帝聞其名詔宰臣問以經史大義對皆如㫖史館祗候國朝太平興國三年以趙州隆平縣主簿王著為衛尉寺丞史館祗候著善史書小學至是帝以字書訛舛欲令學士刪定少能通者左右或薦著故令隸史館且俾刋正切韻遂有是命集賢院唐開元十三年始置新唐百官志集賢殿書院學士直學士修撰官掌刋緝經籍凡圖書遺逸賢才隱滯則承㫖以求之謀慮可施於時著述可行於世者考其學術以聞凡承㫖撰集文章校理經籍月終則進課於內歲終則考最於外開元五年乾元殿寫四部書置乾元院使有刋正官四人以一人判事押院中使一人掌出入宣奏領中官監守院門知書官八人分掌四庫書六年乾元院更號麗正修書院置使及檢校官改修書官為麗正殿直學士八年加文學直又加修撰校理刋正校勘官十一年置麗正院修書學士光順門外亦置書院十二年東都明福門外亦置麗正書院十三年改麗正修書院為集賢殿書院五品以上為學士六品以下為直學士宰相一人為學士知院事常侍一人為副知院事又置判院一人押院中使一人𤣥宗嘗選耆儒日一人侍讀以質史籍疑義至是置集賢院侍講學士侍讀直學士其後又增修撰官校理官待制官留院官知檢討官文學直之員募能書者為書直及寫御書人其後亦以前資常選三衛散官五品以上子孫為之又置畫直十九年以書直畫直捐書有官者為直院至德二年置大學士員貞元初置編録官四年罷大學士八年罷校理置校書四人正字二人元和二年復置集賢校理罷校書正字四年集賢御書院學士直學士皆用五品如開元故事以學士一人年髙者判院事惟登朝官者為校理餘皆罷初大宗即位命京官五品以上更宿中書門下兩省以備訪問永徽中命𢎞文館學士一人日待制于武德殿西門文明元年詔京官五品以上更直日一人待制于章善明福門先天末又命朝集使六品以上二人隨仗待制永泰時勳臣罷節制無職事皆待制于集賢門凡十三人崔祐甫為相建議文官一品以上更置待制其後著令正衙待制官日二人校書四人正九品下正字二人從九品上韋述集賢記注開元五年始有制于東京乾元殿之東廊排寫四庫書右散騎常侍崇文館學士舒國公禇無量充使檢校六年制令中書門下及文武百官入乾元殿就東廊觀書其冬車駕入京其乾元殿書籍始令於京大內東宫之麗正殿安置祕書官並為修書學士麗正殿檢校官以麗正殿直學士為名八年褚常侍代知麗正殿事始取祕書學士入麗正校勘通前二十人自此祕書事罷兩處學士合而為一十年春車駕幸東都始移書院於明福門外中書省之北仍以麗正為名九月詔張燕公都知麗正殿修書十一年春車駕北巡便祠后土歸京師始於大明宫光順門外創造書院依舊謂之麗正書院十二年冬車駕入都始於明福門外别置院亦以麗正書院為號十三年詔改集仙殿為集賢殿改麗正書院為集賢書院以中書令張說右散騎常侍徐堅並為集賢學士說知院事自餘並以舊官為學士及侍講學士等集賢院學士之名始於此矣十九年二月詔中書令蕭嵩為集賢院學士知院事修國史三月詔桂州刺史張九齡為祕書少監集賢院學士副知院事原缺二十一字京大明宫集賢院在光順門水大街之西南鄰命婦院北接宫垣東隔街則諸王待制院東史館西即將作監內作木場院內東西八十步南北六十九步中院中㕔三間六架知院學士所居堂東序開閣曲入小院內㕔三間四架㕔西軒廊三間接書閣㕔西四部書閣及紙筆雜庫十間六架東廊七間四架諸學士等分居之東北院小堂三間五架兩厦北院北行十間十架屋西學士厨院西行三間兩厦東行兩間偏􅦟音剌偏􅦟舍也篇訓云下屋也西院西行二十間四架東行十間四架院北面書手厨屋六間兩厦院內有雜果百餘株外西院自中間而西長廊道北十間道北南六間院內正屋三間四架一行師所居院中有仰觀臺即一行占候之所院北有小園一所興慶宫集賢院在和風門橫街之南東隔水巷鄰中書省西接上舍內局南隔巷即𢎞文館北街殿中省繖扇院并有廊後官厨院內東西二十三步南北三十三步知院事學士正㕔五間五架㕔東俠室兩間三架判院學士居之東行四間五架學士居之西行四間五架院內雜庫及內史居之南行十間兩掾分為厨庫及書抄寫食所院內雜樹十餘株兼有假山叢竹清凉䕃映中門之外道西步廊兩門門前東西有長廊即是中書西和風門每日初曉宰相入省及仗下後百寮有向中書就執政咨决事者皆由于此華清宫集賢院在宫北橫街之南鄰羽林仗院北隔街金吾湯院東接驃騎大將軍髙力士宅西鄰衛尉寺院內東西四十八步南北五十步當中知院學士正㕔三間五架東㕔三間四架內史居之西㕔三間四架學士分居之東㕔之北東行三間四架西㕔之北東行三間四架北行九間兩厦中門一間門西屏內精舍徘徊一門東院北行三間兩厦東行三間兩厦東西兩院隔南北長院出當大門東京集賢院在明福門外大街之西院東隔街對武成