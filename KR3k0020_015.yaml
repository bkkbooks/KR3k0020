趙冬曦張九齡戚業韋述為詩序學士等賦詩編成篇軸以進上上每嘉賞焉賜錢充食本又賜錢一千貫文以充食本時院內供擬稍厚中書舍人陸堅亦充翰林供奉每日入院堅以學士或非其人而所司祗供優厚將為糜費嘗謂人曰此何益國家空致如此費損將建議請一切罷之燕公明之曰吾聞自古帝王功成理定則有奢縱之戒或造池臺或耽聲色豈如今日聖上崇儒重道親自講諷刋校圖書詳延學者今日之舉是聖主也禮樂之司永代楷模不易之道也所費者細所益者大陸子之言未為逹也上聞其言堅之恩眷漸減初也因獻詩賜贊褒美張燕公等因獻賦詩上各賜贊以褒美之敕曰得所進詩甚有佳妙風雅之道斯為可觀並據才能略為贊述具如别紙宜各領之上自以五色箋八分書之賫付院散付學士校張說德重和鼎功踰濟川詞林秀逸翰苑光鮮徐堅史天祿論經上庠華詞宛麗雄辨抑揚冬賀知章禮樂之司文章之苑學優藝博才髙思逺趙曦白簡端嚴青史良直清詞雅韻博覽强識行康子元才識清逺言談幽祕四科文學六書仁義侯果洪鐘佇叩明鏡不疲搜彖繫象動中威儀真韋述職參山甫業纂𤣥成六藝述作四始飛英敬㑹名乃㑹真迹惟契道摳衣講習臨筵振藻方趙𤣥默才比丘明學兼儒墨叙述微婉講論道德子東皓地遊天祿門嗣滑稽三冬足用六藝斯齊李釗干木流度指樹貽芳諷諌遺闕啓發篇章熊才方班馬考理篇籍抑揚風雅毋焸吕向族茂飛軒轅之任諌諍之職聞詩聞禮有才有識􅛫陸去秦才光於晉價重於張州縣斯屈文翰尤長戚業郁郁高文英英博識持我行憲式是諒直良余欽文章兩瞻才術兼美思在窮經專學舊史孫季蓬山之秀藝閣之英雄詞卓傑雅思縱橫於尋敕善寫真人貌學士等欲畫像書替舍象亭屬車駕東行竟不果酒酣賦詩十三年三月因奏封禪儀注敕學士等賜宴於集仙殿上制詩序羣臣賦詩上于坐上口詔改為集賢殿時預宴者宰臣源侍中㑹張燕公學士徐堅賀知章康子元趙冬曦侯行果敬趙𤣥默韋述李子釗陸去秦吕向咸􅛫業毋焸余欽孫季良馮朝隱等時新進櫻桃上令遍於席上散布各令諸官拾取之飲以醇醪清酤之酒酒酣簾內出彩箋令燕公賦宫韻羣臣賦詩并出彩羅令擲雙六頭子得重彩者分之宴訖錫銀盤雜彩有差文儒美稱褚常侍奏以學士為稱相承並即入御張燕公嘗謂人曰學士者文儒之美稱皆須詔敕特授豈合因循自名至是承恩然後列名詔後時賀知章從太常少卿遷禮部侍郎兼授學士一日併謝訖謁宰臣源侍中曰賀公文著盛名今日一時加二榮命並為學士之光輝雖然學士與侍郎二者孰為美燕公曰侍郎自皇朝以來為衣冠之華選自非履歷清要望實具美者無以居之雖然終是具員之吏又非往賢所慕學士者懷先王之道為縉紳軌儀藴揚班之彩兼游夏之文學始可以處之無愧二美之中此為愈也一時加二榮命為縉紳軌儀上去幕上榜十四年駕至東都百官於天津橋南酺宴集賢院幕次在中書門下次尚書省之上時燕公欲尊崇儒學令檢校御史及衛尉依張設集賢院官設大榜懸於幕上徐常侍晨入遂令去之謂諸學士曰君子欲晦其美不欲多上人也書院權制非百司之列徒以朝廷尚儒宰相為使遂得列於諸司之上當自挹退不宜光耀以損儒風及百僚列坐郎官竊議不伏角觚既動郎中員外盡來入院幕下學士頻失其位次擅一時文詞之美十六年張燕公拜右丞相依舊學士知院事燕公與徐常侍聖厯年同為珠英學士每相推重至是舊學士死亡並盡唯二人在燕分嘗手寫同時諸人名與觀之悲歡良久徐曰諸公昔年皆擅一時文詞之美敢問孰為先後燕公曰李嶠崔融薛稷宋之問之文皆如良金美玉無施不可富嘉謨之文如孤峯絶岸壁立萬仭叢雲鬱興震電俱發誠可畏也若施於廊廟則為駭矣閻朝隱之文如麗服靚糚衣之綺繡燕歌趙舞觀者忘憂然類之雅頌則為罪矣徐又曰今之後進文詞孰賢公曰韓休之文如太羮𤣥酒雖雅有典則而薄于滋味許景先之文如豐肌膩理雖濃華可愛而乏于風骨張九齡之文如輕縑素練雖濟時適用而窘于邊幅王翰之文如瓊杯玉斚雖炫然可觀濟其而多玷闕若數子者各能針其所闕所長亦一時之秀可繼于前賢爾三殿侍講命學士劉希烈等於三殿侍講行宫侍講駕發東都北巡祭太行山至福喜須召學士舍人陳希烈等於行宮侍講賜衣兩襲專揔院務十九年張九齡起復中書侍郎同中書門下平章事集賢院學士副知院事時雜御副使居相位專總院務素儒緩無吏幹烏利貞開元八年補修書直學士其年因選授濟川山莊令自講出院素儒緩無吏幹到任無幾為吏人所詐遂免官上表請歸鄉里榮之賀知章拜集賢院學士後以年老上表請度為道士歸鄉里詔許之上親製詩序令所司供帳百司餞送賦詩序别仍拜其子典設郎曽子為朝散大夫本郡㑹稽司馬以申侍養知章時以羸㾀昏耄輿而往到㑹稽無幾老終鄉里榮之舊史單名曽無子字稽古之力王回質開元十年拜集賢院學士仍侍讀回質山東宿儒褐布詔拜既入侍讀仍令侍皇太子讀書及壽王通孝經賜回質束帛酒饌及床褥衣被等令回質坐床上坐側羅列所賜物金吾奉歸其家里巷觀者如牆家人迎門歡譟皆歎曰稽古之力信不虗也父子相次為學士徐嶠授集賢院直學士即散騎常侍堅之子父子相次為學士十八學士唐張說前後三入相三十餘年掌文學之任為儒臣宗上嘗為文引于禁中令說視草說亦善用已長引文儒侍從之臣以左右王化天子始以經術之道開集賢院殿置十八學士以修太宗之政當時紹文之士始尚古風上之好文自說始也修開元禮𤣥宗二十年秋召集賢院學士等修大唐開元禮一百五十卷集賢有人貞元中集賢學士甚衆㑹召問神䇿軍建置之由相府討求不知所出諸學士悉不能對乃訪于蔣義義徵引根源事甚詳悉宰臣髙郢鄭珣瑜相顧曰集賢有人矣翌日詔兼判集賢院事義祖瓌開元中𢎞文館學士父將明集賢殿學士父子代為學士儒者榮之父子代為學士上集賢院是吾家九國志南唐徐鍇為虞部員外郎專掌集賢院由此鋭意羣籍不復問家事嘗言集賢院即是吾家指所居曰此寄宿之所耳特授學士以就全給國朝皇祐四年知沙州資政殿學士吳育以疾乞盡落學士職只守本官權領西京留司御史臺仁宗曰聞吳育以力學損心以成此疾且吳育文行方為人之師表比欲召歸講習以備顧問而亟有此請且待從之又曰若止守本官則俸入差減可特授一集賢院學士以就全給宰臣等對曰陛下知育之深待育之厚亦足勵孤陋澆浮之輩天下聞之孰不知勸修撰沿革見上撰南宫故事集賢注記開元十九年盧若虗遷右補闕入院修撰若虛博綜墳史尤明族姓撰南宫故事三十卷經七年罷十九年洪孝昌以前荆州江陵主簿入院修撰在任凡經七年修撰而罷焉參議修老子疏二十年崔沔以左散騎常侍入院修撰奉勑與道士趙仙甫王虗貞并諸學士參議修老子疏奏記詞理明白國朝李昉以右拾遺集賢殿修撰周顯德中宰相李穀帥師征淮南表昉為記室世宗每覽軍中奏記愛其詞理明白多稱善問誰為之左右以昉對明年還擢為主客員外郎知制誥充集賢殿直學士冠綸閣之首王旦以虞部員外郎同判吏部銓考課院屬妻父趙昌言參知政事旦以官屬避嫌引唐獨孤郁權德輿故事辭職即改禮部郎中集賢殿修撰昌言出征蜀機務日多以旦復知制誥依前修撰仍判院事而賜金紫令冠綸閣之首直集賢院暴卒院中集賢記注天寶二年樊端應髙道不仕試拜家令丞同正直集賢院暴卒院中詞理精當有老成之風國朝至道元年翰林學士及三館學士以上新增琴絃院各獻歌詩賦頌上謂宰相曰近日朝廷文物甚盛羣臣所獻朕一一覽之校其工拙唯李宗諤趙安仁楊億詞理精當有老成之風可召至中書奬諭入曰吳淑安德裕胡旦或詞彩古雅或學問優博又其次也乙未以李宗諤為太常博士依前直昭文館趙安仁為太常丞依前直集賢院楊億賜緋魚袋賞之也宫府箋奏多其撰述三年著作佐郎直集賢院楊億為左正言依前充直億幼善屬文故太宗尤所寵待上嘉其俊敏宫府箋奏多其撰述故行慶之際首加奬拔前進士集賢記注衛包以前鄉貢進士直院其年授內黃簿集賢校理待制附習藝館內集賢記注劉光謙開元二十九年以習藝館內入院校理常選二十年史惟則以吏部當選入內院待制仍校理試文章徐闉二十一年以武功選人上博聞竒要二十卷試文章及第留院校理白衣上書天寶九年先朝以白衣上書試經及第拜右威衛倉曹集賢待制是嵗薛須以白衣上書試經及第拜左驍衛胄曹集賢待制父子相次入院十三年竇叔展以宜夀尉遷左拾遺入院待制尋李叔展入院則中書舍人華之子父子相次獻詩預㑹國朝淳化元年詔自今遊宴宣召直館其集賢祕閣校理並令預㑹先是帝宴于後苑三館學士預李宗諤任集賢校理閣門吏拒之不得入宗諤獻詩述其事故有是命直館修撰校理之職名數雖異職務略同閣門拒校理不得預宴吏失之也祕閣直祕閣祕閣校理典書楷書寫御書勾當三館祕閣公事官又置館閣編定書籍國朝端拱元年五月置祕閣於崇文院中堂按六典祕書省中外三閣掌典圖書古今文字皆在禁中兩漢或從金馬門外歷代不常其處唐季亂離中原多故百王之書蕩盡蘭臺延閣空存名號太宗崇尚儒術屢下詔購求羣書至是乃以史館之北堂建祕閣仍送三館書萬卷以實其中是月以吏部侍郎李至兼祕書監始建直閣校理之職又詔史館盡取天文占候䜟緯方術等書五千一十二卷并內出古畫墨跡百一十四軸悉藏之閣上至等言請與三館並列於是詔令祕閣宜次三館其祕書省依舊屬京百司三年八月以增修祕閣成帝作新修祕閣贊以賜近臣宰相李昉等請刻石閣下李至上表引顔真卿請肅宗題放生池碑額及賜易簡乞飛白玉堂之署為比願賜新額以光祕府後數日賜宴閣下遣中使齎御飛白書祕閣二字以賜之九月幸新祕閣帝登閣觀羣書齊整喜形于色謂侍臣曰喪亂以來經籍散失周孔之教將墜於地朕即位之後多方收拾抄寫購募今方及數萬卷千古治亂之道並在其中矣即召侍臣賜坐命酒仍召三館學士預坐日晚還宫顧昭宣使王繼恩曰爾可召傅潜戴興令至閣下恣觀書籍給御酒與諸將飲宴潜等皆典禁兵帝欲其知文儒之盛故也十月李至以御書千字文於御製祕閣贊碑隂模勒上石帝曰千字文偶然閒寫因令勒石李至更欲鐫勒且非垂世立教之文孝經一書乃百行之本朕當親書寫勒在碑隂可也端拱元年五月以吏部侍郎李至兼祕書監及提舉一作轄祕閣供御圖書直史館宋泌兼直祕閣史館檢討杜鎬充校理八月命內品裴愈監祕閣圖書是月祕閣言見管供御書籍及㸃檢抄寫封鎖庫門出納公事今乞兼委直閣宋泌校理杜鎬與裴愈同共勾當今後直閣校理及監修圖書官內有差出即令遞相交割其閣常以最上一員相承勾當永為定式從之自後直閣校理皆如此制咸平後入者始不領事務咸平初詔奉太宗聖容二本洎御集藏于閣上景德四年分內藏西庫地以廣祕閣大中祥符中詔以祕書監楊億判祕閣事自後五品以上官不兼監者止云判閣其祕書省事亦掌焉端拱二年置典書楷書各五人寫御書十人其後减典書二人又增楷書三人别置裝裁匠十二人天禧五年始命內殿崇班皇甫繼明同勾當三館祕閣公事先是劉崇超在館止云監三館書籍祕閣圖書崇超與王欽若厚善丁謂為相惡之遂引繼明與崇超同掌因為同管勾當公事內臣與大學士同職時論非之天聖五年詔監三館祕閣自今依舊例只置一員嘉祐四年置館閣編定書籍官紹聖四年四月二日敕直集賢院改為直祕閣集賢校理召試稱㫖端拱元年以殿中丞夏侯嘉正為右正言直史館兼直祕閣嘉正嘗為洞庭賦為右散騎常侍徐鉉所稱由此帝知其名召試禁中稱㫖特有是命浙右無館閣之職至道二年以都官郎中黃夷簡上言浙右人無預館閣之職者因陳故吳越王僚佐嘗從王入朝辭甚懇上憐之有是命獻詩預㑹見集賢校理木天內諸司舍屋惟祕閣最宏壯閣下穹隆髙敞相傳謂之木天筆談館閣每夜輪校官一人直宿如有故不宿則虛其夜謂之豁宿故事豁宿不得過四至第五日即須入宿遇豁宿例於缺厯相傳謂之害肚厯館閣校勘國朝天聖四年置館閣校勘五年以大理評事館閣校勘王琪簽書南京留守判官公事特令𢃄館閣校勘外任校勘官未有𢃄外任者時晏殊辟琪特有是命元祐四年七月館閣缺校勘讀書天聖四年樞密副使尚書左丞張士燧言臣男大理評事友直幼親筆硯望令於館閣校勘詔友直且於館閣讀書自今館閣校勘更不添置職官分紀卷十五
