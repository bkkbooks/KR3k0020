body:
  text: 職官分紀卷二十九宋孫逢吉撰太子家令寺家令丞簿前漢百官志詹事秦官掌皇后太子家有丞属官太子家令丞太子稱家故曰家令茂陵中書太子家令秩八百石後漢百官志太子家令一人千石本注曰主倉榖飲食職似司農少府晋職官志家令主刑獄榖貨飲食職比司農少府漢東京主食官令倉官令及晋自為官不復属家令宋書太子家令主内茵褥牀几諸供中之物及官奴婢月用錢内庫鹽米車牛刑獄隋百官志梁家令率更令僕各一人家令自宋齊以來清流者不為之天監六年帝以三卿陵替乃詔革選家令視通直常侍率更僕視黄門三等皆置丞中大通三年以昭明太子妃居金華宫又置金華家令後齊家令領食官典倉司藏等署令丞隋領内坊令丞隋家令率更令僕各一人三等各置丞録事家令領食官典倉司藏三署令丞煬帝改家令為司府令唐百官志太子家令寺令一人從四品上丞二人主簿一人録事一人唐書官品志家令掌刑法食膳倉庫什物奴婢等事六典太子家令寺家令一人從四品上後漢太子少傅属官有家令秩千石魏因之晋家令品第五銅印墨綬進賢两梁冠綘朝服晋太康八年詔曰太子家令率更令僕東宫之達宫也宜進品第五與中庶子二率同宋齊太子家令清流皆不為之後魏太子三卿從三品上太和二十二年降四品上隋煬帝改家令為司人令皇朝復為家令龍朔二年改宮府寺大夫咸亨元年復舊丞二人從七品上漢家令有丞從漢魏無聞宋家令丞一人晉置宋齊因之梁陳丞一人位不登十八班者别為七班家令丞七班後魏太和二十二年太子三卿丞從六品下北齊一人隋二人皇朝因之龍朔二年改為宮府丞咸亨復舊主簿一人正九品下晋家令署主簿宋齊因之齊職儀家令主簿一人四品勲位掌搃署諸曹事梁陳後魏無聞北齊家令有令簿員隋一人皇朝因之家令之職掌皇太子之飲膳倉儲庫藏之政令總食官典倉司藏三署之官属凡皇太子備禮出入則乘軺車具威儀先諸臣以導引若祭祀賔客則供酒食以為獻主丞掌判寺事凡食官典倉司藏之出内籍其名數以時刺于詹事主簿掌印及勾檢稽失智囊前漢文帝以􅏯錯為太子家令多所獻納稱為智囊辭禮閒雅䟽受字公子為太子家令恭謹敏而有辭宣帝置酒太子宮受奉觴上壽辭禮閒雅上甚悦之諌遊觀蜀志譙周後主為太子以周為家令後主頗出遊觀増廣聲樂周上䟽諫曰昔王莽之敗豪傑并起跨州據郡欲弄神噐世祖初入河北賢才智士思望所歸未必以其勢之廣狹惟其德之簿厚也忠心晋武帝詔曰太子家令陸亮有忠心可補吏部郎中識沈家令梁沈約嘗侍宴梁武帝時有奴婢者是齊文惠太子宫人帝問識坐中客不曰唯識沈家令約伏地流涕帝亦悲焉為之罷酒特被親遇齊文惠太子入居東宫沈約為歩兵校尉管書記時特被親遇每旦入見影斜方出尋遷太子家令號宫體徐摛㓜好學及長徧覧經史属文好為新變不拘舊體為梁晋安王侍讀王為皇太子轉家令兼管書記文體既别春坊盡學之宮體之號自斯而起食官署令丞六典食官署令一人從八品下漢詹事属官有食官令長丞後漢太子少傅属官有太子食官令一人秩六百石主飲食晋食官令職如太官令宋中庶子属官有食官令齊詹事属官有食官令齊職儀食官令一人三品勲位掌㕑膳之事梁庶子有食官局陳因之後魏五品上比齊令丞又别領噐局酒局二丞隋家令寺統食官令丞皇朝因之丞二人從九品下两漢食官皆有丞魏晋宋無聞齊建中初置食官丞四人梁選簿有食官丞三品勲位北齊太子食官丞一人隋食官丞二人皇朝因之令掌飲膳之事丞為之貳典倉署令丞六典典倉署令一人從八品下後漢太子少傳属官有太子倉令一人六百石主倉榖魏晋以下無聞後魏第五品中北齊家令寺領典倉署令丞典倉署又别領園丞隋家令寺統典倉令丞皇朝因之丞二人從九品下隋典倉丞二人皇朝因之令掌九穀入藏之數及醯醢庶羞噐皿燈燭之事舉其名數而司其出納凡諸園圃樹藝者皆受令焉丞判署事司藏署令丞六典司藏署令一人從八品下晋家令主物吏四人梁庶子属官有錫賜庫局丞又有東宮衛庫丞為三品勲位北齊家令寺領司藏署令丞司藏又别領仗庫典作二局丞隋家令統司藏署令丞皇朝因之丞二人從九品下隋有司藏丞二人皇朝因之令掌庫藏財貨出納營繕之法式丞判署事太子率更寺令丞主簿前漢百官表詹事秦官属官有太子率更令掌知刻漏故曰率更後漢百官志太子率更令一人千石本注曰主庶子舍人更直職似光禄勲掌宫殿門户之禁即將屯衛之士晋職官志率更令主宫殿門户及賞罰事職如光禄勲衛尉晋起居注武帝太康八年詔太子率更僕東宫之達官也其進品第五秩與中庶子左右衛率同職擬光禄勲宋百官志漢東宫掌庶子舍人晋世則否自漢至晋家令在率更下宋則居上隋百官志梁率更令一人後齊領中盾署令丞各一人隋率更令一人置丞録事唐職官志太子率更寺令一人從四品上丞二人主簿一人録事一人率更掌宗族次序禮樂刑罰及漏刻之政令唐書官品令率更令掌伎樂漏刻六典太子率更寺令一人從四品上後漢太子少傅属官有太子率更令魏因之晋詹事属官有太子率更令一人銅印墨綬進賢两梁冠綘朝服太康八年進品第五宋齊因之梁率更令視黄門陳因之後魏太和二十二年為從四品上北齊詹事率更令有丞功曹主簿領中盾置令丞各一人掌周衛禁防漏刻鐘鼓隋率更寺令一人皇朝因之龍朔三年改為司更大夫咸亨元年復舊丞一人從七品上後漢一人秩四百石魏晋宋齊梁更令一人後魏太子三卿丞從六品下北齊隋皇朝皆一人主簿一人正九品下晋率更令置主簿一人宋無聞齊職儀為四品勲位梁陳後魏無聞北齊隋太子率更寺主簿一人皇朝因之令掌宗族次序禮樂刑罰及漏刻之政令凡皇太子釋奠於先聖先師講學齒胄皆總其儀注而為之導引若皇太子備禮出入則乗輅車位亞家令焉丞掌判禮樂刑獄之事凡宫臣有犯理於率更者皆親問之乃斷其罪上于詹事主簿掌印及勾檢稽失凡宗族不序禮儀不節音律不諧漏刻不審刑名不法舉而正之以師道處之隋書明克讓轉率更令進爵為侯太子以師道處之恩禮甚厚有四方珍味輙以賜之于時東宮盛徴天下才學之士至于博物洽聞皆出其下狀貌醜異唐文德皇后崩百官縗絰率更令歐陽詢貌醜異衆或指之許敬宗見而大笑為御史所劾左授洪州都督府司馬清賢士物理論今有太子率更令吕子藏清賢士也太子僕寺僕丞主簿前漢百官表詹事秦官有太子僕後漢百官志太子僕一人千石本注曰主車馬職如太僕晋職官志僕主車馬親族職如太僕宗正晋起居注見家令宋百官志僕一人漢世太子五日一朝非入朝日遣僕及中允旦入請問起居自家令至僕為太子三卿三卿秩千石宋起居注元嘉中以散騎常侍荀伯子為太子僕沈約宋書太子僕秦官也隋百官志梁太子僕一人後齊僕寺領廐牧署令丞署又别有車輿局丞隋太子僕一人置丞録事僕寺領廐牧令員六典太子僕寺僕一人從四品上晋詹事属官有太子儀銅印墨綬進賢兩梁冠綘朝服太康八年進品第五宋齊品𬒮冠服同家令從駕乗安車次家令梁太子僕視黄門陳因之後魏品同家令北齊詹事領太子僕僕寺置丞功曺主簿領廐牧署丞又别有車輿局丞隋僕一人掌宗族親踈車輿騎乗領廐牧署令丞皇朝因之龍朔二年改馭僕大夫咸亨元年復舊丞一人從七品上梁太子僕有丞陳因之後魏太子僕三丞從六品下北齊隋太子僕丞一人皇朝因之主簿一人正九品下晋太子僕置主簿宋無聞職儀太子僕主簿四品勲位梁陳後魏無聞北齊隋主簿一人皇朝因之僕掌車輿騎乗儀仗之政令及䘮葬之禮物辨其次序與其出入而供給之皇太子車輅三一曰金輅二曰軺車三曰四望車凡皇太子備禮而出則率廐牧令進輅僕親馭焉丞掌判寺事主簿掌印及勾檢稽失栁肅面折隋栁肅遷太子僕太子廢坐除名為民大業中帝與叚達語及庶人罪惡之狀達曰桞肅在宫大見踈斥帝問其故荅曰學士劉臻嘗進人教太子于宫中為巫蠱事肅知而諫曰殿下帝之冢子位當儲貳誡在不孝無患見疑劉臻書生鼓揺唇舌適足以相誑誤願陛下勿納之庶人不懌他日謂臻曰汝何故漏洩使栁肅知之令靣折我廐牧署令丞六典廐牧署令一人從八品下漢詹事属官有太子廐長丞後漢太子少𫝊属官有太子廐長一人秩四百石主車馬魏晋因之齊職儀東宫属有内廐局外廐局梁陳因之後魏有太子廐位九品下隋太子僕寺統廐署牧令丞皇朝因之丞二人從九品下漢有太子廐丞自後闕文齊太子内外廐丞各一人梁陳因之北齊有太子廐牧署丞車輿局丞隋太子僕寺統廐牧丞二人皇朝因之令丞掌車馬閑廐牧畜之事凡皇太子將備禮而出則率典乗先期調習輅馬率駕士駕馭車乗及出則進輅或軺車於西閣外南靣以俟皇太子之升禮畢皇太子降輅則自西輅之外以輅及軺車歸于署其隴右羣牧𨽻於東宫者皆受其政令焉職官分紀卷二十九
