body:
  text: 職官分紀卷十一宋孫逢吉撰刑部尚書後漢百官志成帝初置尚書四人分為四曹漢舊儀曰初置五曹有三公曹主斷獄隋百官志都官尚書統刑部比部侍郎各一人唐職官志刑部尚書一員正三品上侍郎一員正四品下掌天下刑法及徒𨽻勾覆關禁之政令其屬有四一曰刑部二曰都官三曰比部四曰司門總其職務而行其制命凡中外百司之事由於所屬咸質正焉六典刑部尚書一人正三品周之秋官卿也漢成帝置三公曹主斷獄事後漢以三公曹掌天下嵗盡集諫事又以二千石曹主中都官水火盜賊詞訟罪法事晉初依漢置三公尚書掌刑獄太康中省三公尚書以吏部尚書兼領刑獄宋始置都官尚書掌京師非違得失事兼掌刑獄齊隋後魏北齊皆置都官尚書後周依周官置大司冦卿一人隋初曰都官尚書至開皇三年改為刑部皇朝因之龍朔二年改司刑太常伯咸亨元年復為刑部光宅元年改秋官尚書神龍元年復天寶改司憲至德復故侍郎一人正四品下周之秋官小司冦中大夫也漢以來尚書侍郎今郎中之任也後周依周官隋煬帝置刑部侍郎皇朝因之龍朔改司刑少常伯咸亨光宅神龍隨曹改復掌同唐職官志國朝尚書刑部掌天下刑法之政令斷五品以上官犯罪案覆開封府京諸司已决大辟審諸提刑司駁正案總內外勘核體量上簿舉催稽滯録問四品以上官及制勘死罪審開封府京諸司大辟定奪命官罪名辨其輕重敘復官秩理雪過犯勘驗獲盜僞印酬奬㸃檢催捕盜賊修理條法申明刑部領降赦敕移放配𨽻過牒收捕罪人等事及職務郎中員外通掌過尚書侍郎而施行焉官品令刑部尚書從二品妖變皆息宋書徐孝先為都官尚書自晉以來尚書寮皆携家屬居省省在臺城內下舍門中有閣道東西跨路通于朝堂其第一即都官省西扺閣道年代久逺多有鬼怪每夜昏之際無故有聲光或見人著衣冠從中出須臾復沒或門自開者多死云尚書周鶴卒於此省孝先代鶴居之經兩載妖變皆息時人咸以為貞正所致我牀非閹人所坐梁書羊侃遷都官尚書令何敬容用事與之並居未嘗遊造有宦者張生𦙍候侃侃曰我牀非閹人所坐竟不與交接時論美其貞正領羽林監後周書梁元帝以沈重領江陵遷都官尚書領羽林監又令重於合歡殿講周禮覆大獄必歔欷劉祥道遷刑部尚書每覆大獄必歔欷纍歎奏决之日為之不食庭無留事李適之拜刑部尚書雅好賔客飲酒一斗不亂夜則宴賓晝决公務庭無留事一時之俊劉道真問薛令長在吳何任曰吏書曰吳之吏何如曰並補高遷吏書皆一時之俊吏書即尚書也中人爭寫內本布於外顔真卿為檢校刑部尚書知省事永泰中元載引用私黨懼朝廷論奏其短乃請百官凡欲論事皆先白長官長官白宰相然後聞奏真卿上疏曰御史中丞李進等召百僚傳宰相語稱奉進止録諸司官奏事頗多朕不憚勞但所奏多挾私讒毁自今論事者諸司官皆須白長官長官白宰相定可否然後奏聞者臣自聞此語以來朝野囂然人心莫不衰退矣何則諸司長官者皆逺官也言皆幸達於天子也郎官御史者陛下腹心耳目之臣也故其出使天下事無巨細得失皆令訪察回奏聞以明四目達四聰也今陛下欲自屏耳目使不聰明則天下何述焉夏之伯明楚之無極漢之江充皆讒人也孰不惡之陛下惡之深得君人之體也陛下何不聽其言虛誣者則讒人也因誅殛之其言不虛者則正人也因奬勵之陛下捨此不為使衆人皆謂陛下不能明察倦于聽覽以此為辭絶其諫諍臣竊為陛下痛惜之臣聞太宗勤于聽覽庶政以理故著司門式云其有無門籍人有急奏者皆令監門司輿仗家引奏不許間遏所以防壅蔽也並置立仗馬一匹須有乘騎便往所以致天下太平正用此道也天寶以後李林甫威權日盛羣臣不先咨宰相輒奏事不過託以他故中傷猶不敢明約百司令先白宰相陛下豈得不日聞讜言以廣視聽而欲頓隔忠讜之路乎臣竊聞陛下在陜州時奏事者不限貴賤務廣聞見乃堯舜之事也凡百臣庶以為太宗之理可翹足而待也臣又聞君子難進而易退由此言之朝廷開不諱之路猶恐不言况先懷厭怠令宰相宣進止使御史臺作條目不令直進此人必不敢奏事則陛下聞見只左右數人耳目天下之士方鉗口結舌陛下後見無人奏事謂朝廷無事可論豈知懼不敢進則林甫國忠復起矣凡百臣庶以為危殆之期可翹足至也如今日之事曠古未有雖李林甫楊國忠猶不敢公然如此今陛下不早覺悟漸成孤立後縱悔之無及也臣實知忤大臣者罪在不測不忍辜負陛下無任懇迫之至其激切如此於是中人爭寫內本布於外斷姑鞭婦减死栁公綽為刑部尚書京兆人有姑鞭婦至死者府斷以償死公綽議曰尊毁卑非且其子在以妻而戮其母非教也竟得减死刑部侍郎隋百官志唐職官志六典並見尚書門國朝官品令刑部侍郎從三品朕得其人唐太宗時刑部侍郎有闕令執政妙擇其人皆不可太宗曰朕得其人也往者李道裕議張亮反形未具此言當矣雖不即從至今追悔遂授道裕刑部侍郎置格條於座右王播轉刑部侍郎播長於吏術時天下多故法寺議讞科條繁雜播備舉前後移條置之座右凡有判决疾速如神當時僚屬歎服不暇宣授栖楚見左拾遺門額叩龍墀注精於法律劉琢轉刑部侍郎琢精於法律乃裒彚二百四十四年刑敕可行用者二千八百六十五條分為六百四十六門議其輕重别成一家法書號大中統類奏行用之諫迎佛骨韓愈為刑部侍郎元和中四年憲宗令中使領禁兵迎護鳯翔法門釋迦牟尼佛指骨至京王公士庶瞻禮捨施如恐不及百姓有廢業竭産燒頂灼膚而充供養者又有市肆惡徒不懼焚烙之痛謡言供養而爇其肌膚由是佛骨在所往往盜發既擒獲多是自燒灼者農人多廢耕作奔走京兆愈上疏極諌云云刑部郎中隋百官志都官尚書統刑比部侍郎各一人煬帝改為郎又改刑部為憲部郎唐職官志刑部郎中二員從五品上員外郎二員從六品上六典刑部郎中二人從五品上周禮大司冦屬官有士師下大夫蓋郎中之任也後漢有二千石曹尚書掌刑法因立二千石郎曹魏晉宋齊並以三公郎曹掌刑獄置郎中各一人梁隋因為侍郎後魏北齊三公郎中各二人後周秋官府有小刑部下大夫一人隋初省三公曹置刑部曹掌刑法置侍郎一人煬帝除侍字添改憲部郎皇朝因之武德三年改刑部郎中龍朔二年改司刑大夫咸亨光宅神龍並隨曹改復員外郎二人從六品上周禮大司冦屬官有上士後周依之蓋員外之任也隋開皇六年置刑部員外郎煬帝改憲部承務郎皇朝因之武德三年改刑部員外郎咸亨光宅神龍並隨曹改復掌二尚書侍郎舉其典憲而辨其輕重凡文法之名有四一曰律二曰令三曰格四曰式凡律一十有二章一曰名例二曰衛禁三曰職制四曰户婚五曰廄庫六曰擅興七曰賊盜八曰鬭訟九曰詐僞十曰雜律十一曰捕亡十二曰斷獄而大凡五百條焉凡令二十有七篇分三十卷一曰官品二曰三師三公臺省職員三曰寺監職員四曰衛府職員五曰東宫王府職員六曰州縣鎮戍嶽瀆關津職員七曰內外命婦職員八曰祠九曰户十曰選舉十一曰考課十二曰宫衛十三曰軍防十四曰衣服十五曰儀制十六曰鹵簿上下十七曰公式上下十八曰田十九曰賦役二十曰倉庫二十一曰廄牧二十二曰關市二十三曰醫疾二十四曰獄官二十五曰營繕二十六曰喪葬二十七曰雜令而大凡一千五百四十有六條焉凡格二十四篇凡式三十三篇國朝官品令刑部郎中從六品不博前行駕部國史補省中語曰中行刑户不博前行駕部刑部員外郎隋百官志見吏部員外郎門唐百官志六典並見郎中門國朝官品令刑部員外郎正七品請獨往按鞫德宗時盧南史坐事貶信州司馬到郡准例得㕔史一人每月請紙筆錢一千文刺史姚驥初奏以為贓又劾南史買鉛燒黃丹德宗遣御史鄭楚相刑部員外郎裴澥大理評事陳正儀充三司往按鞫裴澥獨奏曰臣按姚驥奏狀事非巨蠹上曰燒鉛何如澥曰燒鉛為丹格令不禁今忽録此小事使三司使往恐逺方聞之各懷憂懼臣堪任此行即請獨往德宗欣然曰卿言是矣諫山陵令狐峘大厯中改刑部員外郎德宗即位將厚奉山陵峘上疏諫略曰臣讀漢書劉向傳見論王者山陵之誡良使稱歎萬古芬芳乃詔曰朕頃議山陵心方迷謬卿聞見該通識度𢎞逺深知不可形於至言非惟中朕之病抑亦成朕之躬免朕獲不子之名皆卿之力也敢不聞義而徙收之桑榆奉以始終期無失墜古之遺直何以加焉課最第一韋夏卿字雲客纍遷刑部員外郎久旱蝗詔於郎官中選赤畿令授奉天縣令以課最第一改長安令轉吏部員外郎省令不欲換他職國朝至道初張昱為刑部員外郎賜紫知雅州先是兩川招安使上官止上言部內雅州密邇蠻冦在於鎮撫須得其人伏見前知陵州張昱以孤城扼羣冦保全壁壘至今劔外服其威名望授諸司使令知雅州事以省郎之重不欲授他職故進其秩加賜令服而遣焉都官郎中隋百官志見刑部郎中門唐職官志都官郎中一員從五品上員外郎一員從六品上六典都官郎中一人從五品上都官者本因漢置司𨽻校尉其屬官有都官從事一人掌中都官不法事因以名官都官者義取掌中都官謂京師官也至魏明帝青龍二年尚書陳矯奏置都官郎曹郎中晉宋齊都官郎中二人後魏北齊一人梁陳為侍郎並掌京師非違得失事非今都官之任後周置秋官府有司厲之職掌諸奴男女男子入於罪𨽻女子入於舂饎之事蓋此今都官郎中之任也隋初置都官侍郎二人猶掌非違得失事開皇三年改都官尚書曹曰刑部其都官郎曹遂掌簿録配沒官私奴婢并良賤訴競俘囚之事煬帝置都官郎二人皇朝因置一人武德三年加中字龍朔三年改司僕大夫咸亨元年復故員外郎一人從六品上周禮秋官有司厲下士二人掌男女奴蓋此今都官員外郎之任也後周依焉隋文帝置員外郎煬帝改曰承務郎武德三年改都官員外郎龍朔咸亨並隨曹改復掌配沒徒𨽻簿録俘囚以給衣糧藥療以理訴競雪寃凡公私良賤必周知之凡反逆相坐沒其家為官奴婢國朝尚書都官掌配沒徒𨽻簿籍移放收係在京諸司無選限公人名籍天下州縣應募役人數增損廢置總軍大將軍闕額招收轉捕差遣事故敘用停放等事凡職務郎中員外通掌過刑部尚書侍郎而施行焉官品令都官郎中從六品詩人唐詩人鄭谷為都官郎中作詩自賀且為序云故許昌薛尚書能嘗為都官郎中後數嵗故建州李員外頻自憲府內禪拜都官員外郎皆一時騷雅宗師都官之曹振盛于此余早年師益實受深知今忝此官復是正秩梅都官詩詩話鄭谷詩名盛於唐末號雪臺編而流俗但稱鄭都官詩其詩多佳句但格不甚高余為兒時誦之今其集不行於世矣梅聖俞晚年官亦至都官一日㑹飲劉原父戲之曰聖俞官必止於此坐客皆驚原父曰昔有鄭都官今有梅都官也聖俞頗不樂未幾聖俞病卒為序其詩為宛陵集而今人但謂之梅都官詩一言之讖後遂果然斯可嘆也都官員外郎隋百官志見吏部員外郎門唐職官志見郎中門國朝官品令都官員外郎正七品最為清選見職官員外郎門一時騷雅宗師見郎中門詩人注比部郎中晉職官志魏尚書郎有虞曹比部隋百官志後齊都官尚書統比部隋都官尚書統刑部統比部侍郎各一人煬帝即位諸曹侍郎並改為郎唐職官志比部郎中一員從五品上員外郎一員從二品上掌同六典六典比部郎中一人從五品上魏武置歷晉宋齊後魏北齊皆有郎中後周天官府有計部郎中大夫一人蓋其任也梁陳隋並為侍郎煬帝曰比部郎自魏晉宋齊梁陳皆吏部尚書領比部後魏北齊及隋則都官尚書領之皇朝因焉武德三年加中字龍朔二年改司計大夫咸亨元年復故員外郎一人從六品上隋置員外郎煬帝改承務郎唐武德三年改員外郎龍朔咸亨隨曹改復掌勾諸司百寮俸料公廨贓贖調遣徒役課程逋縣數物以周知內外之經資而總勾之凡內官料俸以品第高下為差外官以州縣府之上中下為差國朝比部掌理放贓罰追納缺負侵請虧官錢糧物勾磨在京應用度帳籍除被支遣慿由㸃覆府界提㸃司諸路轉運司經勾文帳等事凡職務郎中員外郎通掌過刑部尚書侍郎而施行焉官品令比部郎中從六品奏許都賦魏志何真奏許都賦明帝竒之擢拜比部郎覆財賦之出入唐制天下財賦皆納於左藏庫而太府四時以數聞尚書比部覆其出入比盤比部得廊下食以飲從者號比盤勾覆錢榖裴延齡判度支宰相陸贄每極言其誕延齡又奏京兆府妄破用錢穀請令比部勾覆以比部郎中崔元嘗為陸贄所黜故也及崔元勾覆錢穀又無交涉比部員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令比部員外郎正七品放情事外沉浮宴詠唐武元衡為華原令時畿輔有鎮軍督將恃恩矜功者多撓吏民元衡苦之乃稱病去官放情事外沉浮宴詠者久之德宗知其才召授比部員外郎司門郎中周禮地官司門掌授管鍵以啓閉國門幾出入不物者隋百官志都官尚書統司門侍郎二人唐職官志司門郎中一員從五品上員外郎一員從六品上掌同六典六典司門郎中一人從五品上周禮大司徒屬官有司門下大夫掌授管鍵以啓閉國門後周依周官隋開皇初置司門侍郎煬帝去侍字皇朝因之武德三年加中字龍朔二年改司門大夫咸亨元年復故員外郎一人從六品上周禮有司門上士後周有小司門上士隋置司門員外郎煬帝改承務郎武德三年改員外郎掌天下諸司及關出入往來之籍賦而審其政凡關二十有六而為上中下之差所以限中外隔華夷設險作固間邪止暴者也國朝司門掌諸關津橋路官員過所及廢置橋梁移復道路京城門鎖官員出入譏察詐僞等事凡職務郎中員外郎通掌過刑部尚書而施行焉須有素行唐李林甫開元中遷太子中允時源乾曜為侍郎乞乾曜之男潔白其父曰李林甫求為司門郎中乾曜曰郎官須有素行望高者歌奴豈是郎官耶歌奴林甫小字也肉譜國朝淳化二年韓溥轉司門郎中博學善持論工筆札多知臺閣故事尤好談唐朝族歷可案此注文有脫誤司門員外隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令司門員外郎正七品至閣草册唐劉乃大厯年召拜司門員外郎十四年崔祐甫秉政素與乃交善㑹加郭子儀尚父以册禮久廢至是復行之祐甫令兩省官撰册文未有稱者召乃至閣草之立就詞義典裁祐甫歎賞久之遂擢為給事中工部尚書後漢百官志尚書六人本注曰成帝初置尚書四人分為四曹民曹尚書主凡吏上書事蔡質漢儀曰典繕治工作鹽池苑圃盜賊事南齊百官志起部尚書興立宫廟權置事畢省隋百官志梁有起部尚書營宗廟宫室則權置之事畢則省以其事分屬都官左户二尚書隋工部尚書統工部屯田侍郎各二人唐職官志工部尚書一員正三品侍郎一員正四品下六典工部尚書一人正三品周之冬官卿也後周依周官置大司空卿一人隋開皇二年始置工部尚書皇朝因之龍朔二年改司平太常伯咸亨元年復故光宅元年改冬官尚書神龍元年復故侍郎一人正四品下周之冬官小司空中大夫也漢以來尚書侍郎今郎中之任後周依周官隋煬帝置工部侍郎皇朝因之龍朔二年改司平少常伯咸亨光宅神龍並隨曹改復掌天下百工屯田山澤之政令其屬有四一曰工部二曰屯田三曰虞部四曰水部尚書侍郎總其職務而奉行其制命凡中外百司之事由於所屬咸質正焉國朝工部掌城池屋宇街道橋梁凡工作營造功殺材物凡百工製作舟車器械錢寶之事官品令工部尚書從二品陶家後渚監軍鄒子度以聞詔中書令沈衆兼起部尚書構太極殿器械多所創立案以上陶家云云二十六字器械云云六字俱屬注語而原本失其標目注文亦脫佚不完今姑存之名為稱職隋書長孫平為工部尚書名為稱職時有人告大都督邴紹非毁朝廷為憒憒者上怒將斬之平諌曰川澤納汙所以成其深山嶽藏疾所以就其大臣願陛下以山海之量茂寬裕之德鄙語曰不癡不聾不堪作大家翁此言雖小可以喻大兄弟相代唐閻立本代兄立德為工部尚書兄弟相代為八座時人榮之遺言毋請諡國朝治平三年工部尚書宋祁賜諡祁初遺言母請諡至是有司諡曰文工部侍郎隋百官志工部尚書統工部侍郎二人唐職官志六典並見尚書門國朝官品令工部侍郎從三品不宜委以獨務國朝乾德五年艾永遷工部侍郎是嵗上以京城諸倉受納之際而加量失平民甚苦之乃詔丞相擇廷臣以董之丞相即以班簿進呈而永首中上㫖丞相以丞郎本清望官不宜委以獨務乃授户部侍郎致仕者充其煩冗也不覺笏墮端拱元年工部侍郎同知京朝官考課雷德驤求致政先是與趙普不協普再入相制下之日德驤方立朝不覺笏墮遂拜章求退避普之仇也貴家子不可以任丞郎筆談太祖重惜名器錢昱自白州刺史求文資得祕書監遷工部侍郎連典數郡無治聲上謂宰相曰此貴家子不可以任丞郎改郢州團練使工部郎中隋百官志隋煬帝改諸曹侍郎為郎又改工部為起部唐職官志工部郎中一員從五品上員外郎一員從六品上掌同六典六典工部郎中一人從五品上周禮大司空屬官下大夫蓋郎中之任也晉宋齊後魏北齊皆為起部郎中梁陳改置起部侍郎後周置冬官小司空下大夫隋初為工部侍郎煬帝去侍字又改工部為起部皇朝因之武德三年改工部郎中龍朔三年改司平咸亨元年復故光宅神龍並隨曹改復員外郎一人從六品上後周依周禮置小司空上士蓋員外之職也隋開皇六年置工部員外郎煬帝改起部承務郎皇朝改為工部員外郎龍朔二年改為司平員外郎咸亨光宅神龍並隨曹改復掌經營興造之衆務凡城池之修濬土木之繕葺工匠之程式咸經度之國朝官品令工部郎中從六品泣諌於玉階之下唐蔣係遷工部員外郎又遷本司郎中皆兼史職宰相宋中錫為北軍羅織罪在不測係與諫官崔𤣥亮泣諫於玉階之下申錫方减死時論稱之工部員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令工部郎中正七品泣諫見郎中門屯田郎中晉職官志武帝置屯田及江左無隋百官志後齊尚書分統列曹祠部統屯田掌籍田諸州屯田等事隋工部尚書統屯田侍郎二人煬帝諸曹侍郎改為郎唐職官志屯田郎中一員從五品上員外郎一人從六品上六典屯田郎中一人從五品上漢尚書郎四人其一主户口墾田蓋今屯田之任也故汜勝之為侍郎教田三輔是也魏有農部郎曹晉始置屯田郎中東晉及齊梁並左民郎中兼知屯田事後魏北齊並置屯田郎中梁陳並為侍郎亦郎中之任也焬帝曰屯田郎後魏北齊祠部尚書領屯田陳左户部尚書領之隋則工部尚書領之皇朝因稱郎中龍朔二年改為司田大夫咸亨元年復故員外郎一人從六品上隋開皇六年置焬帝改承務郎武德三年改員外郎龍朔咸亨隨曹改復掌天下屯田之政令凡軍州邊防鎮守轉運不給則設屯田以益軍儲其水陸腴瘠播植地宜功庸煩省牧率等級咸取决焉國朝屯田郎中掌屯營職分田官莊塘濼之事官品令屯田郎中從六品不博中行都門國史補省中語曰後行祠屯不博中行都門兄弟無鄉音北史裴讓之十七舉秀才為屯田郎中與祖班俱聘宋省中語曰多竒才能祖孝徵能賦能詩裴讓之讓之弟讞之謀之訥之諏之並清立楊愔每去河東士族京官不少裴讓之兄弟都無鄉音裴文季為不亡也判高熲父子請㦸隋栁或為屯田郎中時三品以上門皆列㦸左僕射高熲子𢎞德封應國公中牒請㦸或曰僕射之子更不異居父之㦸槊已列外門尊有壓卑之義子有避父之理豈有外門既設內閣又施事竟不行熲聞而歎服有宣撫之才唐沈扶為屯田郎中充山南道宣撫使至鄧州奏曰鄉縣為布黃潤兩場倉督鄧琬等先主掌湖南江西運到糙米至淅川縣於荒野中囷貯除支用外六千九百四十九石裒爛成灰塵度支牒徽職掌所由自貞元二年鄧琬父子兄弟至𤣥孫相承二十八年前後禁死九人今琬孫及𤣥孫見在初禁敕曰如聞鹽錢度支兩使此類極多其鄧琬等四人資産全賣納禁繫三代瘐死獄中實傷和氣鄧琬等並疏於天下州府監院如此類不得禁經三年以上速便疏理以聞物議嘉扶有宣撫之才兼掌儀式隋初屯田郎兼掌儀式之事屯田員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令屯田員外郎正七品虞部郎中晉職官志魏尚書有虞曹晉康穆以後無隋百官志後齊祠部統虞曹隋工部尚書統虞部侍郎一人唐職官志虞部郎中一員從五品上員外郎一人從六品上掌京城街巷種植山澤苑囿草木薪炭供頓田獵之事六典虞部郎中一人從五品上周禮地官有山虞澤虞蓋虞部之職也魏始有虞曹郎中一人晉因之宋齊省梁陳為侍郎後魏北齊並有虞曹郎中後周有冬官虞部下大夫一人隋為虞部侍郎煬帝去侍字梁陳後齊並祠部尚書領隋則工部尚書領皇朝因之武德三年加中字龍朔二年改司虞大夫咸亨元年復故員外郎一人從六品上後周依周官有山虞澤虞中士並今員外之任也隋開皇六年置煬帝改曰承務郎皇朝復為虞部員外郎龍朔咸亨隨曹改復掌天下虞衡山澤之事而辨其時禁凡援捕畋獵必以其時國朝虞部掌山澤苑囿畋獵取伐木石薪炭柴物之屬屏絶猛獸毒藥及茶礬場鹽池井金銀銅鐵鉛錫坑冶廢置收採之事官品令虞部郎中從六品固請閒官以申侍養唐崔沔睿宗時召拜中書令時沔母老疾在東都沔不忍捨之固請閒官以申侍養由是改虞部郎中虞部員外郎隋百官志見吏部員外郎門唐職官志六典並見郎中門國朝官品令虞部員外郎正七品水部郎中晉職官志魏尚書郎有水部隋百官志後齊都官統水部隋工部尚書統水部侍郎一人唐職官志水部郎中一員從五品上員外郎一人從六品上掌天下川瀆陂池之政令以導達溝洫堰决河渠凡舟楫灌溉之利咸總而舉之六典水部郎中一人從五品上後周冬官府有司水中大夫隋文帝為水部侍郎煬帝去侍字皇朝因之武德三年加中字龍朔三年改司川大夫咸亨元年復天寶十一年改司水至德初復員舊外郎一人從六品上後周冬官府有小司水上士則員外之任也隋聞皇六年置煬帝改承務郎皇朝復為水部員外郎龍朔咸亨隨曹改復國朝水部掌川瀆河渠津梁舟楫漕運水碾磑之事凡水之政令官品令水部郎中從六品美錦未可便製梁書劉孝綽兼尚書水部郎奉啓陳謝手敕答曰美錦未可便製簿領亦宜稍習為名流所稱何遜字仲言八嵗能賦詩沈約嘗謂遜曰吾每讀卿詩一日三復猶不能己其為名流所稱如此遜為參軍兼水部郎辭控鶴之職唐員半千五遷正諫大夫兼控鶴內供奉半千以控鶴之職古無其事又授斯任者率多輕薄非朝廷進德之選疏請罷之由是忤㫖左遷水部郎中水部員外郎隋百官志見吏部員外郎門六典見郎中門國朝官品令水部員外郎正七品以水曹郎處張籍唐白居易草詩人張籍水部員外郎制云夫文教張則儒行顯王澤流則頌詩作君上以張教流澤為意則服儒業詩者宜梢進之頃籍自校祕之任而訓國胄今又核名揣稱以水曹郎處籍焉職官分紀卷十一
